body:
  text: 欽定四庫全書萬壽盛典初集卷二宸藻二文賦頌詩溥仁寺碑文康熙五十二年朕六旬誕辰衆蒙古部落咸至闕庭奉行朝賀不謀同辭具疏陳懇願建剎宇為朕祝釐朕思治天下之道非奉一已之福合天下之福為福非私一已之安遍天下之安為安柔遠能邇自古難之我朝祖功宗德遠服要荒深仁厚澤淪及骨髓蒙古部落三皇不治五帝不服今已中外無别矣論風俗人情剛直好勇自百年以來敬奉釋教並無二法謹守國典罔敢隕越不識不知太和有象朕每嘉焉鑒其悃誠重違所請念熱河之地為中外之交朕駐蹕清暑歲以為常而諸藩來覲瞻禮亦便因指山莊之東無關於耕種之荒地特許營度為佛寺陶甓於冶取材於山工用無輸挽之勞金錢無踰侈之費經始訖功告成不日歷觀往史遹溯前朝版籍有區幅員未廣兹熱河之奧壤乃紫塞之神臯名號不掌於職方形勝無聞於地志朕以涼德撫育萬方邊壖之外悉為畿甸諸藩於此建寺介福率先恐後無小無大罔不來同觀我觀民思維此理特題額曰溥仁將欲汪濊之澤均霑率土升恆之慶廣洽普天遍覆含𢎞民胞物與咸躋壽考各遂生成藉諸藩祝朕之忠誠為萬方祈純嘏之錫爰記斯文勒諸貞石􅡹髻山玉皇廟碑記距京師百里有山曰􅡹髻隸懷柔縣兩峯高矗望之如髻故得是名自元明以來號為近畿福地因上有碧霞元君之祠是以每歲孟夏四方之民會此祈禱者駢肩疊迹不可勝計古稱積高之區神明所舍况兹山北倚紫塞南拱神京岡巒回合蜿蜒磅礴而鍾秀於是則其神氣之感數有靈應理固然也康熙五十二年值朕六旬誕期諸臣民就兹山瞻禮為朕祝禧因共建玉皇閣以祈延壽經始於癸巳三月十八日落成於甲午三月十八日而請記其事朕御極五十餘年夙夜孜孜惟體上帝仁愛斯民之心以撫綏天下幸四海清晏年榖順成朕與天下臣民得共享太平之福者皆上帝之眷佑也朕之祗承於上帝者唯在天下臣民之永安而天下臣民之祝願於上帝者惟在朕躬之永年然則兹閣之建即上帝之陟降鑒觀於是乎在矣爰立貞珉載其始末以傳永久云時和年豐慶祝賦有序朕誕辰免慶賀行禮者亦多年矣近因六旬羣臣固請又有恩綸故勉從衆意前一日進宫受賀頒詔往返二日各省慶祝萬壽設壇誦經不止億兆朕握樞臨極章句之能素不為務但自幼齡讀書屬文每覽大儒雖不以華麗為尚亦間有作者似取吟詠以託性情因而有感用時和年豐慶祝賦七字為韻賦曰幸升平之泰運歷歲月之良時季春移序而大端化俗淑氣氤氲而諸政無為恐德弗類朝乾是規求賢每形乎寤寐治體未致夫昌期同心翼贊是賴多士恭已臨軒憑兹九司主不虛諛而啓千秋不拔之業臣去私饋而建百世無窮之基此前聖之至理後人之不思也爾乃揚鑾青野設輦鳴珂太昊斯啓大樂在和衡塗峻闢雲殿義路廣開偈歌新花受雨露以爭艷春鳥應載陽而舞多衆芳芬鬱麗景遮那都人士女仰望撫摩遠近長幼同歡重科於是音發簫鼓聲雜管絃百戲盈阡陌以鬭勝羣黎積岐路而各先勿驚勿動而民望如草不震不騰而神保貴天結綵繽紛惜傷物力之勞甚鋪筵絡繹止禁珍饈之易牽淳風沕穆萬物逢年此帝王所當知其然也又乃駢羅羽衛渺瀰仙宫金莖玉露福地倥侗論芝田之可種拂珠樹而還童服氣鍊精曖碧臺之錯落守神凝思參紫府之穹崇此皆耗精氣乎虛廓廢政事之全功戒黷祀弗欽之旨嗟思玄蕩志之風矣若夫遍列傳燈廣懸法鏡會衆善之並臻來靈祇之協慶布德延福高標之慧雲師導能仁衆妙之西聖香風普拂花宫真印俱揚斗柄詳考形影之實恐遺有漏之行於是明三綱斂五福法天地之無私叶神人之祕祝養老尊賢重農貴粟含生欣欣長世朴朴祈萬寶之順成望彼蒼之戩榖願永永其若兹凝休徵於茀祿原夫泰運升恆因而以濟謙尊有終恆久勿替先稼穡之維艱惠鰥寡之是務陽順敘而不愆隂應期以相附沛甘澍以咸周扇和風而廣布聞善言於詩書乃豫懷之所慕寫冀望之孔殷爰抽毫而作賦景福宫頌慈顔懿教素髮銘針福祉靈壽遐齡喜深松筠玉樹繞砌清音淑德瑤幹萱枝歲林揮毫敬頌永日葵心寧壽宫頌天開壽域地會瑶池南極添算北辰降慈螽斯衍慶白鶴來儀躬勞著訓樂不可知恭獻長頌託句腐詞吏部尚書引年致仕宋犖因朕六旬壽慶祝來京事畢五月內回本鄉朕念舊臣特書七言律一首以紀其盛云爾受祉林泉頤養年世家耆德自天全少時佩劍登三殿久任蘇臺撫九阡行儉銓衡有令譽拔才籲俊入清篇修齡善得人間壽雪作鬚眉興欲仙五月上旬避暑熱河塗中喜麥秋盈野雨暘得時賦七言一律畏暑乘輿出鳳城麥秋預卜望庚晴千村共飽連年稔萬井同歡比屋盈谷有靈泉山脈壯道無峻嶺馬蹄輕教之易俗先忠孝蕃息編氓在厚生嘉禾雙穎夜雨初晴日素商驅暑天園林變緑葉榖熟卜豐年勿訝嘉禾瑞豫看貴粟先秋成各地異大有載書篇萬壽盛典初集卷二
