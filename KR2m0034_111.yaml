body:
  text: 欽定四庫全書萬夀盛典初集卷一百十三歌頌五十三生監諸臣四萬夀詩五言排律五十韻監生臣談一豫帶礪山河壯升恆日月長一人膺五福萬夀嫓三皇花甲周初度長庚曜正芒鴻庥真有喜鳯厯兆無疆節屆暄妍好時當品彚昌仙桃蟠錦艷宫桞鏤金黃樂奏雲門振爐飄寶篆香嵩呼聨逺邇華祝盡梯航惟聖超前代乘乾著烈光沖齡登九五濬哲邁成康盤几無勞警農蠶入慮詳繪圗同七月比户足千箱夢寐猶無極恩膏正未央幾年頻賜復應念總如傷時邁巡方嶽皇衷軫八荒翠華臨塞磧紫氣遍維揚波偃獼猴靜塵開狐兔藏龍舟移鏡淨鳥迹燦碑芳此日淮河畔於今肅慎鄉遵塗咸獻斚懷德自來王業業乾行健輝輝巽命張黃麻咨節鉞丹陛簡循良謂吏親民切須賢始位當推誠方保赤求瘼慰呼蒼網必開三面刑惟弼五常心平情自恕仁被法俱臧衢巷覘風俗謳歌遍激昂南薰繞縕瑟北極但垂裳旭日蒼龍上祥雲雊雉旁清時多暇豫藝囿足翺翔博學師何有多能天縱將圗書探委宛翰墨仰天章詔每來三殿歌因守四方聳觀同跳臥敬聼叶鏗鏘前席崇文教訏謨飭狷狂森森瞻棫朴濯濯麗宫牆楨幹由兹集風雲應運祥澤身豹霧振翮躍龍驤兹值嵩南夀難將斗北量作人原久道籲俊闢𢎞綱茅茹連征吉禾苖近在場十年逢聖誕多士起巖廊自分魚依藻欣瞻鳯在岡百生逢舜日寸祿竊虞庠恭仰虹流渚虔陳兕作觴賡歌青瑣客進頌紫微郎盤獻摛仙果杯濃艷玉漿陪臣隨海澨朝列躋漁商終冀追鴛鷺長鳴和鳯凰丹忱凝葵藿紅日麗扶桑萬夀詩五言律四首監生臣吳陳琰在昔天皇氏膺圗萬八千一人今合德六御正乘乾貞固南山峙端居北斗懸仙籌難紀數寶厯永綿綿其一令節際三春嵩齡始六旬車書風盡古日月景長新舜樂聲容美堯尊氣味醇東華到西苑萬國祝靈椿其二離照文明盛綸音闢制科有天皆雅化無地不恩波十載千秋例三時萬口歌從兹培士氣寒谷得陽和其三禁桞依瑶闕宫桃簇玳筵心同無量佛人戴大羅天華祝三多集箕疇五福全小臣邀聖澤長詠萬斯年其四萬夀詩五言排律十二韻監生臣王維淮聖德開天運鴻圗寶厯長遐齡齊日月多祜協羲皇符應千祥集功垂萬福將西池王母至南極夀星昌御桞枝枝緑仙葩處處芳歌同韶樂奏舞並彩雲翔仁夀超千古謳思遍八荒羣黎欣仰德萬國樂觀光海屋增輝曜嵩呼競讚揚冠裳看拜舞童叟盡趨蹌紫氣浮仙掌紅雲繞建章從兹億萬厯嵗嵗頌無疆萬夀詩七言律一首監生臣謝珠華渚流虹誕聖祥才周甲子慶方長廷臣共進岡陵頌髦士羣歌棫朴章仙杏却疑蟾窟種瓊林還折桂枝香小儒何幸隨鴛鷺稽首躬陳萬嵗觴萬夀頌監生臣王國柱皇帝御極五十二載澤流兆民恩及四海政治穆清臣庶樂愷魁柄自挈乾綱獨振武功文德今古彪炳東西南朔罔不敬應恭默思道宵衣旰食敬天勤民朝乾夕惕定性和神斂福錫極聖夀無疆甲子星周羣后式序百神懷柔卿雲綺合湛露膏流華祝敷天嵩呼動地躋堂稱觥風雲並會俾夀熾昌天庥洊至貞符協應寶祚綿延虞絃廣被豳雅交宣式歌且舞天子萬年萬夀頌監生臣張文裕皇建其極正位當陽精明強固愈久彌彰無為致治恭已垂裳與天同運與地無疆益植根本廣培俊良有麟遊藪有鳯鳴岡一堂喜起百爾賡揚惟兹下國久被天光碩從五老敬祝堯觴萬夀詩五言排律六韻監生臣莊柟榮懷柔皆位育海甸式尊親世泰皇圗鞏時和景命申周天增聖厯應地永皇仁箕翼中天曉鶯花上苑春歡呼趨父老歌拜洽臣鄰閬苑繁桃李升平日月新萬夀詩五言排律六韻監生臣錢兆升泰階明紫極雲漢倬天章甲子周堯厯山龍耀舜裳王言傳渙汗喜氣動宫墻瑞啓貞元會星躔奎壁光鳯庭芝草秀雲路榜花香閬苑新添籍爭稱獻夀觴萬夀詩五言排律十韻監生臣周震海屋添籌日卿雲復旦年堯尊祈酌斗舜樂聼揮絃薄海恩膏遍瀛洲淑景旋禎符承泰運上瑞紀瑶編五福皇時斂三多聖自全絳人論甲子姑射致神仙御柳隨風動宮花向日妍嵩呼同舞蹈士氣早騰鶱瑜瑾昆刀發珊瑚鐵網連碩因南極宿長拱紫宸邉萬夀詩五言排律十二韻監生臣陳光祖北闕紅光燦南山紫氣新聖明懸日月恩澤溥臣民養老逾周渥蠲租較漢頻金錢頒內藏疏濬歷河漘顯赫征無戰懷柔化有神衢歌忘帝力巷舞樂天鈞治已超隆古心猶厪得人揆文調鼎鼐備武列麒麟濟濟皆楨幹勤勤念槱薪聿招巖谷隱悉作廟廊珍浪暖蒼虬舞天高彩鳯伸羣瞻閶闔啓揚祝萬年春萬夀賦有序監生臣薛雋臣聞藹然春溫天之所以育萬物確然動直乾之所以資大生卜之於理有必然信之於人亦猶是子曰大德必夀詩云君子萬年豈獨得於古時復又見於今日欽惟我皇上日長同嵗夀永配天運際貞元八百國之欃槍盡掃道當保合萬億年之磐石常安逢甲子之維新識天顔之有喜莫不梯山航海爭獻共球亦且搦管攄詞同伸頌禱炷香日上情較華封而轉殷嵩祝齊呼碩將箕疇以比擬蓋由皇上保民與保赤同意因而黎首愛君與愛親同情春日春風春色年年不老聖朝聖治聖人在在無私千綬桃花雜燕鶯而並舞九衢燈火映星月而聨輝中外為之承歡天人為之介祉猗歟帝世同唐虞之際如此其隆大哉皇猷駕湯武之君更覺其盛乾坤之策三百六天皇之夀萬八千考瑞典之所徴知至誠之無息鳯凰出而百鳥固思奮以和鳴神龍見而羣鯈亦揚鬐以煦沫同在熙皡之世豈忘高厚之恩不揣無文恭為一賦其詞曰巍巍天府蕩蕩皇圗正體乾兮出治時交泰兮分敷馭青龍兮首出命青鳥兮先驅在一人兮有慶為萬民兮歡娛爾乃卿雲呈祥條風應節六十年海不揚波大一統民無敢越拱紫微之在上森衆星之羅列陳仙醴於龍樓懸花燈於鳯闕望雉尾而光搖披螭頭而香結遏歌吹於祥雲回舞綵於明月內則蘭馨芝秀玉葉天潢拜手以奉萬夀稱觴外則金張之儔稷契之伍捧彼兕觥祝惟純嘏邇則五方羣赴四民齊來文移北斗夀獻金罍逺則流沙極漠窮海至濵拜瞻霄漢莫不尊親於是天子覽封畿之翼翼玩民物之熙熙萃一天之淑景蕩三月之芳菲渙殊恩於宇宙頒王言之綸絲雨露磅礴於臣庶吹噓倣佛乎解推郁李培多而枝茂菁莪香動而秀滋竊窺之管尤知其竒以多能而益見其聖固天縱而亦何常師而且至孝本於成性好學而又生知訪圗書於乙夜勤誦讀於萬幾精微之統已繼洙泗之文在兹深維無逸之訓三復豳風之詩農桑無不樂其業庠序亦各得夫宜纘平成之績奏安瀾之期調萬年之玉燭方履端於春時臣乃拜手稽首而為之頌曰篤生聖主總攬鴻權明無不燭勇孰敢先行之以仁三者俱全螽斯瓜瓞麟趾蟬聫降澤於民受祜於天於時保之億萬斯年萬夀頌有序監生臣章鈺欽惟我皇上臨御之五十有二年恭遇甲子初周至德廣運九霄開聖誕之祥大業覃敷萬國祝齊天之夀臣鈺草茅賤士未敢拜舞揚休蓂莢昌期竊效華封獻頌四言十首三祝萬年聖人御宇厯數中天建中立極精一心傳德敷九有仁覆八埏卓越千古永保萬年其一思皇我皇聖本天縱博學多能明體逹用恭默淵沖時雍風動成功文章衢歌巷頌其二允文允武乃聖乃神蕩平正直泰運方新聲教洋溢莫不尊親普天率土歡樂無垠其三樂以天下斂時百福宇宙清寧中和位育三王得四五帝得六億萬斯年為我皇祝其四欽哉我皇至誠盡性樂育蠲租正位凝命端拱垂裳萬邦有慶春酒載塗謳歌聿盛其五猗歟盛哉萬年天子治洽化成川流嶽峙軒轅嫓績羲皇並齒百千萬載自今伊始其六大哉乾元天子萬年殊恩丕著曠典特宣維悠維久如岡如川巍巍蕩蕩峻業光天其七三星繞殿花甲初周律中姑洗薰風解憂兩岐九穗翼翼蘨蘨生逢盛世瑞靄盈眸其八維天之命申重鴻寶自求多祜永錫難老階旋白鶴庭盈之草皇帝萬嵗天眷民禱其九時維令節聖主當陽千官拜舞萬國梯航彤廷煥彩璿宇輝煌一人有慶賴及萬方其十萬夀詩五言排律二十韻有序監生臣胡樞今夫天之高也以其無所不覆地之廣也以其無所不載惟罔不覆載凡天地間所謂飛潛動植􅍭生負氣之倫亦罔不思仰給於天俯給於地焉天地知羣類之咸仰於我也因各隨其性之所宜安之適之栽之育之雨露以滋培之風雷以鼓舞之務俾盡遂其生咸復其性而後已易曰大哉乾元至哉坤元非以天地之德為莫可思擬耶故萬類者天地之臣民天地者萬類之君父也然猶恐寒暑愆時高卑異勢風雷雨露培養之或遺乃萃山川之秀彚河嶽之祥悉畀一人使之聰明睿智神靈首出赫然居兆民之上而為天下主以輔生成之所不逮裨雨露之所不周號曰天子是天地者固萬類之君親而人君者又萬類之天地也天不生聖則天地之德不彰天不生聖主則天地之澤不溥故於唐生堯虞生舜夏生禹商生湯周生文武而於大清則篤生我皇帝陛下翩然龍鳯之姿巍然天日之表聲為律而身為度德協中和望如日而就如雲光昭上下亶聰天縱純孝性生法乾健以勤民體坤寧而鎮物制禮作樂矞增宇宙之輝端拱垂裳敻絶古今之治既敷布之咸宜更張弛之盡善親儒好學道闡孔孟之傳博籍宏通數啓圗書之祕恢𢎞豁達大度如淵克讓允恭虗懷若谷命官以器任相惟賢洵允文而允武誠乃聖以乃神雖身居九重之上未常不以黔首為心而宸衷惕若宵旰憂勞已治而猶以為未治已安而猶以為未安五十有二年以來天覺賴以益髙地覺賴以益厚日月賴以益明河嶽賴以益奠太祖太宗世祖之緒賴以益光堯舜禹湯文武之烈賴以益顯而隂陽和神人格四氣調五行序不怒威不言信風動時雍百昌咸若澤及而不知刑措而不用熙熙皥皥羣相遊於順則之天焉邇者河清屢奏海不揚波康衢擊壤之謳充然遍聞宇宙而且風回浴日之鄉罔不尊親愛戴非甚聖德孰能如是哉自生民以來未有盛於我皇上者也子曰大哉堯之為君惟天為大惟堯則之蕩蕩乎民無能名焉巍巍乎其有成功煥乎其有文章者臣敢為我皇上頌焉曰佳氣南山􅒯祥光北闕浮卿雲來紫禁麗日藹皇州景運開千祀昌期協九疇天生濬哲主世躋太平秋八彩同堯瑞重瞳似舜眸體乾勤國政好學博墳邱端拱垂衣治虗懷側席求宫闈傳至孝潢譜沐宏庥麟趾歌仁厚關雎詠好逑桐圭分未忍花萼愛常留寮宷施恩渥公孤示禮優廟堂知草野樽俎折戈矛靈囿祥麟集昆池瑞鳯遊殊方歸版籍萬國執共球德洽神人格情於翰墨投宸章回鐵畫御藻挺銀鈎宴奏簫韶樂筵供閬苑饈普天蒙帝力率土頌皇猷高湧扶桑日初添海屋籌願祈聖主夀億萬與天侔萬夀詩七言排律十二韻監生臣卜鴻生萬年甲子初周日聖德崔巍永發祥春色舒遲迎瑞靄卿雲爛熳擁霞光柳垂青瑣霑衣翠花發天衢挹御香風若雨時蘇萬象日暄雷動靖羣方蠲租户户恩膏滿解網年年雨露長久道化成仁者夀乾行不息慶無疆經天麗藻超千古福國訏謨邁百王籲俊旁求憑玉尺作人愷悌燦雲章控弦子弟能通古簮筆儒生擅貫楊棫朴菁莪儲國器共球冠帶盡梯航雲璈天籟諧音律仙仗蓬萊列鷺行遙識天顔多喜氣華封豈必羡陶唐萬夀詩五言排律六韻監生臣吳達章昌期開泰運帝位履光明晴日烘螭陛祥煙擁鳯城華雯籠寶幄彩旭麗神京湛露承仙掌仁風扇鹿蘋羣黎欣遍德多士慶連征長此堯天戴葵衷向日情萬夀詩五言排律六韻監生臣郭涵紫殿流虹日彤宫繞電時乾坤千古夀雨露萬方滋元老陳金鑑皇王進玉巵一人稱夀考多士慶昌期松柏岡陵賦菁莪棫朴詩歡呼盈北闕拜舞上瑶池萬夀詩五言排律十四韻監生臣莊鴻寶瑞應龍飛日祥開電繞辰霞光雙闕霽景色萬年春御柳垂青瑣仙桃進紫宸雲璈霄漢徹天仗鼓鐘振燕喜當三月文明被八垠舜庭儀彩鳯軒囿畜祥麟特敞圗書府兼羅嶽瀆珍騰驤千里駿鞭䇿九方歅鶚薦探春宴花簮折桂晨殊恩闢仕路大典奉皇仁寶厯綿無算璇樞運有神遐荒聲教洽莪朴頌揚頻瑞莢堯階舞瓊漿蓬島陳歡逢萬夀日舞蹈遍臣鄰萬夀詩七言律一首監生臣殷祚昌九重甲子慶初周絳節朱旗擁帝州鰲禁雍容甘露渥璇宫宴喜彩雲浮麟虞瑞應孚區夏日月光華起頌謳最幸儒生邀異典聫行逺簉鳯池頭萬夀詩七言律一首監生臣卜廷坤融融暖日洽祥煙寰宇謳歌祝萬年會際升平光復旦蔚興禮樂麗中天河山千古明良合芹藻三春雨露妍敢藉瑶池仙醴熟稱觥獻夀聖人前萬壽詩五言排律十二韻監生臣史燾靈符開舜旦寶厯記堯時玉軸圗成嶽雕筵樂奏箎香飄銅鶴篆日麗袞龍旗洞府呈瑶草衢樽進碧巵右文超自昔德化盛於斯籲俊虞廷闢求賢漢詔馳崑璜爭入彀聫璧喜無遺選使羅薪槱遴才盡鼎鼒六經資潤色五典御親披習習儒風古皇皇聖學孜昭回溯雲漢典則誦文思萬夀岡陵祝葵傾向日私萬夀詩五言律四首監生臣張齊玉聖夀齊南嶽祥雲護帝閶車書歸一統功德邁三王文治麟圗鞏天家鳯歷長丹心懷玉闕際此荷榮光其一南巡荷眷顧恩沛碧霄邉峰泖霑天潤壺漿拜聖顔長歌娛舜日擊壤樂堯年世美登仁夀岡陵景福綿其二御座開仙仗天顔笑語時萬方歌燕喜九宇沐鴻慈瑞叶三多頌祥呈五色之生逢清晏世率土慶雍熙其三八紘齊拜舞攀躋九重門霄漢星辰逈光華日月尊輸誠暨遐邇溫語煥絲綸萬嵗嵩呼者稱觥答主恩其四萬夀頌有序監生臣陳仕欽惟皇上學隆千古道冠百王心源接精一之傳文教敷於四海治術邁羲軒而上豐功洽於九州合天人而被茀祿時雨暘而卜休徴是以御極五十二年海宇承平咸頌一人有慶會同千八百國民氣和樂羣祝萬夀無疆食德飲和荷生成而永戢􅍭生樂業戴髙厚而寧忘所宜播諸樂章揚厲熙朝之偉業更碩宣諸律吕鋪張盛世之鴻庥臣草茅下士樗櫟庸材身際文明之代沐教澤於無窮躬遊仁夀之天欲謳吟而莫罄敬效衢歌用申頂祝欽明天子小心翼翼永彼萬年敬此朝夕綿綿葛藟施於松柏福祿攸從崇於有德其一天命於德作君作師典兹六籍𢎞惟教思一哉王心執德靡遺於樂辟雍濟濟熙熙其二濟濟多士執經秉德維彼賢才以楨王國至於都邑既齊既敕具曰聖人永錫萬億其三萬億之來自今伊始保定聖躬至於卿士皤皤黃髮是詢是使天子曰俞肅余綱紀其四巍巍嵩嶽培塿崇之泱泱大海江漢宗之肅肅天子小大從之赫赫王命福祿同之其五福祿之同降此黃茂農夫之慶天子之厚何以祝之厥德由舊又何祝之天子萬夀其六萬夀詩五言排律二十四韻監生臣俞鴻德帝德貞恆永皇圗帶礪長乾坤逢景運寰宇慶當陽周甲籌初記昌辰厯詎量熙熙臻夀域藹藹遍榮光天縱超羣聖心傳紹百王唐虞今復覩謨烈古難方窮髮梯航遍雕題玉帛將敉寧清朔漠威武靖南荒竹楗堅承岸桃花靜繞塘平成功已奏宵旰慮尤詳疊荷新蠲賦仍蘇舊負糧好生同覆載肆赦軫桁楊沐浴儒林盛薪槱士氣揚兩闈恩再闢十載例成常好古圗疇契怡情翰墨香宸章昭日月奎藻燦琳琅盛事書難罄蕪詞頌莫彰春光三月麗喜氣八紘洋璀璨卿雲曉蘢蔥禁樹芳綏山桃正熟瑶圃鶴羣翔銀甕天呈寶金芝地效祥龎眉爭抃舞委珮肅趨蹌碩獻千秋鏡欣稱萬夀觴華封中古意長此戴穹蒼萬夀盛典初集卷一百十三
