body:
  text: 欽定四庫全書萬壽盛典初集卷三十三恩賚六開科一康熈五十一年四月二十四日丙子上允禮部議覆直省舉人貢監生員李長庚陳大慶查克𢎞等所請特開萬壽鄉㑹科每十年一舉永著為令以昭曠典以隆文治四月十五日各省舉人貢監生員臣李長庚陳大慶查克𢎞等謹奏為太平聲教日隆多士歡騰益切恭逢萬壽之昌期請舉千秋之曠典以祝聖釐以揚文治事欽惟我皇上乾元仁壽久道化成御宇五十一年聖德神功超越千古雨露深恩無所不被而右文愛士重道崇儒作人之化日盛月新尤為史冊所未有邇者萬幾之暇御製經書文字包天羅地内聖外王允足垂教萬世復於新科㑹試中式進士親加覆試禮遇優隆御製西苑試士詩以示奬勵普天率土無不踴躍歡忻臣等鄉㑹試十五省士子雲集京師戴德如天報恩無地伏念康熈五十二年恭遇皇上萬壽正誕臣等身被皇上教育五十餘年今又躬逢盛事千載一時願竭犬馬之忱敬效躋堂之祝設立萬壽經壇鼎建萬壽碑亭慶祝聖壽其建亭之費臣等公赴禮部彚繳伏求皇上廣覆載生成之量擴天地父母之心特於京闈開萬壽鄉科禮闈開萬壽㑹科欽命題目親加睿覽更請永為定例以後每遇十年皇上萬壽正誕即加一科以彰太平盛典則光垂奕禩照耀無窮矣謹奏奉㫖碑亭不必建摺子交與禮部議四月二十二日禮部尚書臣松柱等謹題為太平聲教日隆多士歡騰益切恭逢萬壽之昌期請舉千秋之曠典以祝聖釐以揚文治事臣等議得直𨽻各省舉人貢監生員李長庚陳大慶查克𢎞等奏稱伏念康熙五十二年恭遇皇上萬壽正誕臣等身被皇上教育五十餘年今又躬逢太平盛事千載一時願竭犬馬之忱敬效躋堂之祝設立萬壽經壇鼎建萬壽碑亭慶祝聖壽伏求皇上廣覆載生成之量擴天地父母之心特於京闈開萬壽鄉科於禮闈開萬壽㑹科欽命題目親加睿覽更請永為定例以後每遇十年皇上萬壽正誕即加一科以彰太平盛典等因具奏前來欽惟我皇上聖神格被久道化成武功赫濯而六合清寧文教誕敷而萬方鼓舞加以旁求選俊明試登賢天文垂雲漢之章作人揚壽考之盛普天胥慶薄海同歡兹惟康熙五十二年恭遇皇上六十萬壽日月升恒休徴協應天下士子沐教化詠太平雲集京師䖍祝萬壽際此非常之慶合邀異數之恩今據李長庚等奏請於京闈開萬壽鄉科於禮闈開萬壽㑹科應如所請以愜輿情但此係普天大慶曠典出自皇上特恩如䝉俞允照順治丙戌科通行鄉試己亥科特行㑹試例於康熙五十二年二月内舉行鄉試八月内舉行㑹試其一應鄉㑹試事宜臣部另行酌議具奏嗣後每遇十年皇上萬壽正誕即加一科億萬斯年永為定例庶彰太平盛典益收人才實效謹題請㫖本月二十四日奉㫖依議八月十四日上允兵部議覆浙江巡撫王度昭所請照文塲例特開萬壽武鄉㑹科每十年一舉永著為令以昭曠典六月二十六日巡撫浙江等處地方提督軍務兵部右侍郎兼都察院右副都御史臣王度昭謹題為恭遇萬壽開科普天同慶懇賜題請文武竝舉以昭曠典以廣作人事康熙五十一年五月二十四日據全浙十一府七十七州縣學武生潘堯年祝永祺等呈稱伏覩我皇上御極以來功軼百王治隆三代經文緯武邁古振今兹際周甲萬壽之辰首廣棫樸登賢之路𢎞恩逺沛率土騰歡堯年等生逢盛世共享太平五十年教養之深仁文武從無二視鄉㑹科賔興之鉅典輔樞竝重一時今文生已得邀亘古未有之竒恩而武士亦願沐壽考作人之雅化仰祈俯鑒輿情特疏題請殊恩異數一視同仁俾赳桓共祝升恒師濟均霑雨露永垂定例咸慶無疆等情隨批仰布政司查例報奪兹據浙江布政使司布政使徐欐詳稱該本司查得康熙五十二年恭遇皇上萬壽正誕普天齊慶士庶歡騰特沐皇恩開科取士此誠我聖朝千載一時之盛遇也遡查順治丙戌科通行鄉試雖武生未有舉行之例但近奉俞㫖新恩各營兵丁有通曉文義者准與武生一體鄉試而現任千把弁員又准與武舉一體㑹試乃從來未有之曠典今據浙省屬學武生合詞公籲萬壽開科仰請文武竝舉士心懇摯理合詳請㑹題以慰士心以廣作人之盛典者也等因到臣據此該臣看得康熙五十二年恭遇皇上萬壽正誕特沐皇恩開科取士據浙省屬學武生潘堯年等呈稱五十年教養之深仁文武從無二視鄉㑹科賔興之鉅典輔樞竝重一時今文生已得邀亘古未有之竒恩而武士亦願沐壽考作人之雅化籲懇一視同仁文武竝舉等情經臣批司查議順治丙戌科通行鄉試武生雖未有舉行之例但近奉俞㫖新恩各營兵丁有通曉文義者准與武生一體鄉試而現任千把弁員又准與武舉一體㑹試乃從來未有之曠典我朝文武竝重萬壽開科普天同慶武生踴躍籲懇竝舉詳請㑹題前來臣不敢壅於上聞但可否俯順士心文武一體舉行出自皇仁仰候聖裁臣謹㑹同督臣范時崇合詞具題伏乞皇上睿鑒勅部議覆施行七月二十二日奉㫖該部議奏八月初十日兵部尚書臣殷特布等謹題為恭遇萬壽開科普天同慶懇賜題請文武竝舉以昭曠典以廣作人事該臣等議得浙江巡撫臣王度昭疏稱康熙五十二年恭遇皇上萬壽正誕特沐皇恩開科取士據浙省武生潘堯年等呈請一視同仁文武竝舉等語查順治丙戌科通行鄉試雖武生未有舉行之例但近奉俞㫖兵丁准與武生一體鄉試千把准與武舉一體㑹試可否文武生一體舉行出自聖裁等因具題前來欽惟我皇上學貫天人徳全智勇守成兼開創而獨隆四表八荒無思不服文教與武功而竝重六韜三畧有美皆收届兹萬壽之昌期宜舉千秋之盛典查順治丙戌科文生通行鄉試武生雖未有舉行之例但近奉俞㫖兵丁准與武生一體鄉試千把准與武舉一體㑹試此皆皇上格外𢎞仁恩澤自天而歡聲動地者也兹康熙五十二年恭遇皇上六旬大慶各省文生已邀曠典准於二月鄉試八月㑹試今武生亦應一視同仁准於五十二年四月鄉試十月㑹試使文武同霑聖壽之𢎞恩齊祝萬年之盛事如䝉俞允臣部通行各直省八旗一體遵行至鄉㑹試一應事宜臣部另行酌議具奏嗣後每遇十年皇上萬壽正誕亦照文塲之例即加武鄉㑹一科庶曠典攸昭而人才益勵矣臣等未敢擅便謹題請㫖本月十四日奉㫖依議五十二年二月初九日順天及各省布政司萬壽科鄉試禮部先期按道里逺近請差主考上以次遣官分典試事五十一年十月十二日禮部宻題請雲貴主考官本月十六日欽㸃翰林院編修周彝内閣中書查布札納為雲南主考官翰林院編修潘體震通政使司知事常住為貴州主考官雲南於三月初三日放榜取中孫士鶴等六十名貴州於二月二十八日放榜取中柴大用等四十名十一月十二日禮部宻題請四川廣西廣東福建四省主考官本月二十日欽㸃吏部驗封清吏司郎中裘君弼禮部精膳清吏司主事趙守易為四川主考官吏部稽勲清吏司郎中郭晉熙内閣中書舍人盧𢎞熹為廣西主考官翰林院編修查嗣瑮禮部儀制清吏司主事鄒琯為廣東主考官翰林院檢討謝履忠工部虞衡清吏司主事董之燧為福建主考官四川於二月二十六日放榜取中何淮等七十一名廣西於二月二十四日放榜取中王廷鐸等四十九名廣東於三月初三日放榜取中莊論等七十二名福建於三月初三日放榜取中江日昇等八十九名十二月初十日禮部宻題請浙江湖廣江西三省主考官本月十六日欽㸃翰林院侍讀學士汪漋翰林院檢討吴相為浙江主考官太僕寺少卿嚴虞惇翰林院檢討李天祥為湖廣主考官經筵講官禮部右侍郎兼翰林院學士胡作梅翰林院檢討王士錀為江西主考官浙江於三月十三日放榜取中羅鼎謙等一百三名湖廣於三月十一日放榜取中金相等一百十三名江西於三月初六日放榜取中周𢎞勲等九十四名十二月十九日禮部宻題請陜西江南河南三省主考官本月二十二日欽㸃日講官起居注翰林院編修俞長策工部營膳清吏司員外郎李士瑜為陜西主考官都察院左僉都御史吕履恒户部湖廣清吏司郎中喬雲名為江南主考官詹事府少詹事兼翰林院侍講學士梅之珩翰林院編修阿克敦為河南主考官江南於三月十一日放榜取中許遡中等一百三名陜西於三月初六日放榜取中張大本等六十七名河南於三月初六日放榜取中孟載有等七十八名五十二年正月十八日禮部宻題請山東山西二省主考官本月二十一日欽㸃吏科給事中盧炳翰林院編修俞兆晟為山東主考官禮科掌印給事中陳允恭翰林院編修俞梅為山西主考官山東於三月初三日放榜取中薛以畘等七十六名山西於三月初三日放榜取中李徽等六十七名二月初四日禮部宻題請順天主考官本月初六日欽㸃户部尚書張鵬翮日講官起居注翰林院侍講文志鯨為主考官於三月十三日放榜取中霍九錫等二百三十八名四月萬壽科順天武鄉試上遣官較射主考其各省武鄉試照例以巡撫監臨主考四月初四日兵部宻題請順天武鄉試較射主考各官欽㸃兵部左侍郎李先復兵部右侍郎巴顔柱為較射官日講官起居注翰林院檢討阿爾賽翰林院編修車鼎晉為主考官取中金璋等一百五十一名各省取中武舉名數江南王彭年等六十三名浙江戚師塘等五十名湖廣岳大忠等五十名江西劉有梅等四十名福建陳名臣等五十名山東仙磊等四十名山西姚夢熊等四十名河南劉璁等四十七名陜西盧璞等三十名甘肅周之藩等三十名廣東張斌授等四十名廣西唐斌等三十名四川蕭康侯等四十二名雲南竇和鼎等四十二名貴州譚正道等二十名八月萬壽科㑹試天下舉人於禮部欽定知貢舉主考同考等官幷八旂直省中式舉人額數八月初一日禮部宻題請㑹試知貢舉主考同考等官初六日欽㸃經筵講官禮部右侍郎兼翰林院學士胡作梅為知貢舉官經筵講官文淵閣大學士兼禮部尚書王掞經筵講官工部尚書王頊齡兵部左侍郎李先復内閣學士兼禮部侍郎沈涵為主考官翰林院檢討蔣肇編修蔡學洙嵇曽筠楊開沅檢討諸起新編修方覲須洲惠士竒檢討黄越曹掄彬編修徐葆光禮科給事中詹嗣禄吏部考功清吏司員外郎陳廷掄稽勲清吏司員外郎魚鸞翔驗封清吏司員外郎葉𢎞綬刑部江南清吏司郎中陳元工部都水清吏司郎中陸遐昌為同考官八月初十日禮部尚書臣赫碩色等謹奏為請㫖事查康熙五十一年㑹試滿洲䝉古滿字號取中四名漢軍合字號取中二名雲南雲字號取中三名廣西廣字號取中二名貴州貴字號取中二名其餘各省分南北字號共取中一百四十六名於額外取中五經五名通共取中一百六十四名又額外欽賜取中十三名康熙五十一年四月内九卿㑹議具題内稱奉上諭近見直𨽻省考取進士額數或一省偏多一省偏少皆因南北卷中未經分別省分故取中人數甚屬不均今文教廣敷士子俱鼓勵勤學各省赴試之人倍多於昔貧士自逺方跋涉赴試至京毎限於額多至遺漏朕深為軫念自今以後考取進士額數不必預定俟天下㑹試之人齊集京師著該部將各省赴試到部舉人實數及八旗滿洲䝉古漢軍應考人數一幷查明預行奏聞朕計省之大小人之多寡按省酌定取中進士額數考取之時就本省卷内擇其佳者照所定之數取中如此則偏多偏少之弊可除而學優真才不至遺漏矣著九卿詹事科道確議具奏欽此九卿詹事科道等㑹議得嗣後㑹試不必預定額數亦不必編南北字號按各省分編號印巻面既分省分不必復編官民字號止憑文取中其滿洲䝉古漢軍亦編滿洲䝉古漢軍字號直𨽻各省㑹試舉人到齊及滿洲䝉古漢軍進塲實數禮部預行查明奏聞恭候皇上酌量省分之大小人數之多寡定額於命下之日行文主考就各省卷内擇其佳者照所定之數取中等因具題奉㫖依議欽此欽遵在案今萬壽開科㑹試准至公堂查明移開舉人進塲實數滿洲七十一卷䝉古一卷漢軍二十二卷直隷四百九十三卷奉天二十一卷江南三百五十六卷浙江三百五十六卷湖廣二百五十八卷江西二百八十卷福建一百八十卷山東三百三十六卷山西二百二十卷河南三百四卷陜西一百九十卷廣東一百二十二卷廣西五十卷四川九十九卷雲南八十五卷貴州六十二卷相應奏聞恭候皇上欽定取中數目俟命下臣部交與主考官就各旗省卷内擇其佳者照欽定之數取中以仰副我皇上愛育人材公平周宻之至意又至公堂移稱分經分房之處仍照舊例遵行五經巻數無幾若再分別恐易徇私應將五經硃巻停其分編滿漢直省各印記等語應將分經分房俱照舊例遵行五經硃卷停其分編旗省各印記可也為此一并謹奏請㫖本月十五日奉㫖這㑹試滿洲䝉古取中四名漢軍取中二名直𨽻取中二十二名奉天取中一名江南取中三十名浙江取中二十名湖廣取中十二名江西取中十三名山東取中十五名山西取中十名河南取中十五名福建取中八名陜西取中九名廣東取中六名廣西取中三名四川取中四名雲南取中四名貴州取中三名五經取中五名餘依議九月初十日放榜取中舉人孫見龍等一百八十六名十月萬壽科㑹試天下武舉欽定知武舉監射主考等官十月初四日兵部宻題請武㑹試知武舉監射主考同考等官欽㸃兵部右侍郎仍兼管光禄寺事田從典為知武舉官管侍衛内大臣公鄂倫岱管侍衞内大臣侯巴渾特鑲白旂漢軍都統偏圖文華殿大學士兼禮部尚書松柱為監射官經筵講官刑部尚書張廷樞日講官起居注詹事府少詹事兼翰林院侍講學士王奕清為主考官吏部考功清吏司郎中郭晉熙考功清吏司員外郎陳廷綸户部湖廣清吏司郎中喬雲名湖廣清吏司員外郎趙成穮為同考官十月二十二日放榜中式武舉金昆等一百八名十月初九日癸未上策試天下貢士孫見龍等於太和殿十月初五日禮部宻題請用讀卷官員欽㸃文華殿大學士兼禮部尚書松柱文淵閣大學士兼吏部尚書李光地文華殿大學士兼吏部尚書蕭永藻經筵講官文淵閣大學士兼禮部尚書王掞内閣學士兼禮部侍郎綽竒常泰鄒士璁沈涵經筵日講官起居注都察院左都御史仍兼管翰林院掌院學士教習庶吉士揆敘吏部尚書暫理戸部尚書事張鵬翮經筵日講官起居注吏部右侍郎仍兼管翰林院掌院學士教習庶吉士湯右曾户部右侍郎廖騰煃經筵講官禮部左侍郎兼翰林院學士王思軾經筵講官工部尚書王頊齡為讀卷官初九日早諸貢士赴太和殿前殿試皇上賜策問奉天承運皇帝制曰朕惟治天下之要務莫先於敬持其心心者所以飭官方勵人才而消釁蘖之本也自御極以來翼翼兢兢五十餘年如一日至於大小臣工無時不以國爾忘家以人事君之義相為告戒焉邊疆雖靖尤加意於武備之修凡以立國之道徳威不可偏廢古帝王所以深根固本杜漸防微是朕之所夙夜而不敢康者也書曰儆戒無虞又曰制治未亂保邦未危今國家承平日久文恬武嬉朕惟唐虞成周之隆君臣所以動色咨警者豈過慮歟無亦察於天命人心之理而無荒無怠期以長凝上天之眷而永底蒸民之生也其何以使中外臣僚悉喻朕意歟夫洪範進人有猷有為歸於有守周官弊吏則能法之類必首以廉然則廉隅者士行之先也服官之本也督撫者州縣之師部院大臣者百寮羣吏之表故李膺按部而貪墨為之解官楊綰登朝而勲舊為之撤樂今吏道未盡澄清官邪未盡振肅其亦倡率之道有所未至歟易曰拔茅茹以其彚書曰舉能其官惟爾之能稱匪其人惟爾弗任内而部院卿貳外而督撫提鎮朕所寄腹心耳目也有所薦舉朕必虚心而採用焉然課其成效往往不能悉副任使者何也夫無至公之心則知交姻婭各徇其所私無至明之識則劣品庸流各阿其所好古大臣薦賢不使人知而補牘必爭夾袋必滿者其風豈逺歟立政之篇致意於庶言庶獄庶慎而終以克詰戎兵古者簡閱車徒一年而四舉焉朕鑒於前代慎選將勤恤兵甄微勞酬壯烈留神戎事用樹國威然自禁旅之外所在營伍盡能核軍實而肅行陣歟夫練習不素則技勇之藝疎節制不嚴則驕惰之兵衆其何以振紀宣威使國家長收衛民之用也要之潔清自勵則援引必公而小大莫非法廉之選憂危共惕則防維必至而内外永享寧謐之休朕之所以勅臣工者即其所以望多士者也爾多士其悉攄所學以對朕將親覽焉十二日丙戌上御太和殿王以下文武百官各朝服齊集鴻臚寺官傳制賜王敬銘等進士及第出身有差十二日早讀卷等官幷諸王以下公以上文武百官各具朝服赴太和殿前侍立禮部官捧黄榜置於丹陛正中黄案上鴻臚寺官傳制唱名第一甲賜進士及第王敬銘任蘭枝魏廷珍第二甲賜進士出身楊繩武等五十名第三甲賜同進士出身朱向中等一百四十三名附載恩榮次第十四日賜宴於禮部二十一日賜狀元頂㡌披領帶等物及進士折鈔銀兩二十四日狀元率諸進士上表謝恩二十五日狀元率諸進士詣先師孔子廟行禮十一月初七日辛亥上策試天下武舉金昆等於太和殿閱日復較射於西厰十一月初一日兵部宻題請用讀卷官員欽㸃文華殿大學士兼吏部尚書温逹文華殿大學士兼禮部尚書松柱文淵閣大學士兼吏部尚書李光地文華殿大學士兼吏部尚書蕭永藻經筵講官文淵閣大學士兼禮部尚書王掞内閣學士兼禮部侍郎綽竒沈涵常泰經筵日講官起居注都察院左都御史仍兼管翰林院掌院學士教習庶吉士揆敘吏部尚書暫理户部尚書事張鵬翮經筵日講官起居注吏部右侍郎仍兼管翰林院掌院學士教習庶吉士湯右曾經筵講官刑部尚書張廷樞都察院左都御史劉謙通政使司右通政王景曾為讀卷官初七日早諸武舉赴太和殿前殿試皇上賜策問奉天承運皇帝制曰自古承平日久則武備或致不修朕統御萬方永維所以久安長治之道故加意疆塲推心閫外無時不圖度於懐也夫為民之衛者兵司兵之命者將古之大將以仁義律身夫是以操如冰霜恩如雨露令之行也如風雷信之堅也如金石朕於簡任將帥訓飭有加焉而未能悉副朕心者其故安在夫必平日得士卒之懽然後臨事可以用三軍之命古未有不恤兵而能制勝禽敵者今或坐享安榮而於衆士甘苦漠不周知甚且冒兵剋餉以自肥者有焉身家之念重則營伍之恩薄欲得萬人齊心同仇敵愾豈不難歟然則恤兵之要尤在潔已故廉則生惠公則能愛古大臣之風其遂邈不可嗣歟賞罰者馭衆之大權也而於軍中尤重非信賞則無以結其心而鼓其氣非必罰則無以肅其法而厲其威今為將而或未能盡斯道者何歟毋乃漫無紀律而賞罰之不講歟抑因其吝於賞故不敢果於罰以私意苛於罰故因以私意濫於賞歟寛嚴之施恩威之用何道而適其中也要之潔已者恤兵之本而潔已恤兵者尤信賞必罰之本潔已則服人也素賞固服而罰亦服也恤兵則感人也深賞固感而罰亦無怨也為將之道宜無大於此者爾多士皆欲為國家宣力四方者其悉攄所學以對朕將親覽焉初八初九日上御暢春園之西厰親試馬步箭初十日甲申賜宋如栢等武進士及第出身有差初十日早讀卷等官并諸王以下公以上文武百官各具朝服赴太和殿前侍立兵部官捧黄榜置於丹陛正中黄案上鴻臚寺傳制唱名賜武狀元盔甲等物第一甲賜武進士及第宋如栢丁士傑趙漣第二甲賜武進士出身王聯舉等十二名第三甲賜同武進士出身江國維等八十一名附載㑹武次第十一日賜宴於兵部十二日賜武進士折鈔銀兩十三日武狀元率諸進士上表謝恩右開科盛典文武鄉㑹試及文武廷試制詳典鉅至再至三臣等撰次成帙伏念是歲特科臣等或身䝉任使分典試事或子弟被舉發科或身受殊恩成進士列史館今復備員記注載筆之餘得仰窺皇上壽考作人之化不禁抃舞之私自慶遭逢之獨盛也竊惟聖人統馭天下其所分猷而共理者賢才而已賢才聚於選舉而原本於治化之隆其涵濡也深則其發之也彌盛其陶淑也久則其取之也愈多易曰聖人久於其道而天下化成又曰拔茅茹以其彚征吉自古郅隆之世所以炳燿無窮也昔在唐虞皆以聖人登上壽闢四門明四目逹四聰其風尚矣夏有籲俊之文殷有旁求之訓爰洎成周人才尤盛棫樸之詩鄭箋以為文王是時年九十餘故有遐不作人之頌兩漢以來文有賢良孝廉諸科武有剛毅勇猛諸選州郡勸駕天子親策之若乃進士之科肇於隋代武舉之設著於唐初建隆立殿試之規治平定三年之例分經閱卷至紹定而始詳三塲條目至洪武而加宻莫不甄拔幽遐助宣王化然大抵限之以年嵗拘之以成例非有特逹之恩敦崇曠典昭示來世也考之唐志惟天子巡狩封禪文學將畧之士往往㑹見行在宋祥符元年東封車駕所經之地特令發解考試四年祀汾隂崇政殿試及第出身三十一人七年朝謁乾清宫詔舉亳州開封五十人他如嘉祐之祫饗熙寧之郊赦亦命諸路搜訪人才召試舍人院要皆行焉而未徧徧焉而為數未廣蓋特示曠舉於一時而非本於壽考作人之盛治雖欲博攬遐收永垂勝軌其勢固有所不能也我皇上秉聰明首出之姿裕表正萬邦之畧體道凝神至誠無息氛祲靖於四國淑氣徧乎里巷沉濡溥濩五十餘年民生累世相仍有畎畆衣食之饒無動容變色之慮洋洋乎郁郁乎斯固鴻鈞之所以毓祥川岳之所以降神者也屢發帑金修文廟幸闕里釋奠先師又躋朱子祀十哲之次御製訓飭士子文示以躬修實踐砥礪廉隅之要反覆惓惓家喻而戸曉啟經笥陳義府闡六經之㫖發明宋五子之書使千秋絶業煥乎若揭日月而行禁絶淫辭攘斥邪說以端士習定民志慎簡學使暨鄉㑹典試之臣仍嵗以來増進學之員廣賔賢之額異數殊恩有加無已又復嚴科舉積習之弊風清紀肅實學知勸凡所以戒用休董用威者甚詳而有則也夫本至徳以導之揚深仁以育之崇正學以率之寛採擇之途以鼔舞之嚴懲創之法以震厲之而又漸摩於數十年之久以浸尋而衍溢之是以聖教浹於肌膚淪於骨髓近自輦轂逺逮山陬海澨之間靡不蒸蒸向風管絃鐘鼓之聲道里相望而其才之足以備疏附奔奏先後禦侮者蓋不可勝數也嵗在癸巳恭逢萬壽六旬大慶四方之士景附風靡籯糧躡屩不逺萬里來集京師相與稱兕觥祝萬壽請建碑亭以垂永久夫豈作而致之哉其沐浴於教澤者深而忠愛之誠發於心之所不言而同然也我皇上運齊政之衡布垂天之網大生成之量宣昭曠之恩特諭通行各省竝舉萬壽恩科鄉㑹以次而行文武均被其澤仍定例毎遇十年皇上萬壽正誕即加一科億萬斯年永著成憲又以文教廣敷各省取中進士多寡不均或致高才遺佚特諭禮臣以各省赴試人數奏聞親加睿裁分省定額以昭公平周宻之至意方嵗之冬旅進所取文武之材臨軒次第策試之多士幸際昌期虎嘯而風從龍翔而雲集揚清問望耿光弭節天衢迴翔衡漢豈非千載一時不可逢之良㑹乎夫施徳匝於區宇至廣也取材彚於殊途至衆也嘉數協於岡陵至久也甄選均乎直省至公也權衡定於宻勿至慎也聞之天不愛道則卿雲見地不愛寳則器車作含靈仁壽鍾英孕竒將必有深厚雄傑倜儻非常之才宣化承流旁作穆穆潤色太平之偉業鋪揚格天之鴻休豈不盛哉至於天錫純嘏日月升恒億萬斯年恩流罔斁聖壽有無疆之休多士亦有無疆之慶洪輝芳躅史冊葳㽔踵事而書之固未有艾也謹附士子謝恩章疏於後用誌王多吉士媚於天子之盛焉萬壽盛典初集卷三十三
