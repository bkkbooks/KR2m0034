body:
  text: 欽定四庫全書萬壽盛典初集卷六十九歌頌九詞臣一萬壽無疆詩七言律十二首有序内閣侍讀學士臣徐元夢臣聞書衍洛疇福歸皇極詩陳天保頌起臣隣蓋有大德必壽之徵積爲百祿罄宜之應欽惟皇上濬哲挺生中和建極經文緯武禀由卓絶之神姿蹈義履仁覃自緝熙之懋學敬天以凝庥命常勤監觀欽若之思法祖而凛憲章益表揚烈覲光之美慈闈豫順竭孝養於承歡家範肅雝衍貽謀於翼訓誕綿昌祚永奠丕圖宫府協衷首本一心之正要荒在宥洪霑萬里之遥凡用人體下之誠及養士恤民之政精明渾厚睿思總協於寛仁易直和平至德要歸於惇大蔚爲文治輝雲漢而炳日星赫作武功迅風雷而寧海宇遠達四聰於無外精硏萬象而弗遺而猶儆切宵衣咨勤日御廵方省俗罷陳封禪之書恭已寧神屛上尊崇之號肫肫乎至誠不息秩秩乎茀祿無疆是以日角珠庭常潤天容如壯歲龍行虎歩彌增乾健於耆齡兹當春暉九十之辰正屆聖壽六旬之慶億萬年之寳莢日月常新八千歲之榮椿春秋永茂海晏河清之象共樂雍熈麟逰鳯舞之祥皆供符瑞歡呼徧傳於率土欣躍更極於含生臣元夢一介菲才三冬寡殖謬厠員於禁近忝伴讀於天潢問學薫陶乆荷生成之德身名拔擢全叨臨照之㤙恭遇鴻庥永深忭禱東華陪仗企賡泮奐之音南極瞻星敬附升恒之祝恭進萬壽無疆詩一十二章自媿辭指蕪淺不足攄寫高深仰凟宸聰曷勝心悚萬年歴數屬吾皇道德巍巍冠百王仁義根心恒迭見圖書過目不曾㤀神功直與河山遠聖澤方同歲月長天保祗今何待祝從來悠乆定無疆其一生安不廢聖人功典學時開講幄崇道統遥將羲孔接心源渾與性天通羣言叅錯惟歸一庶物紏紛每折衷共喜中和長建極萬邦黎獻荷帲幪其二早從堯典得眞傳欽若惟知事昊天非但夙齋無戱豫有時逰衍亦精䖍穹窿不隔明禋外顯赫如臨對越前祗爲流通成一體人神協應自年年其三三朝謨烈是鴻規實錄分明家有師欲擴前功還遠望每拈遺訓輒精思即今燕翼貽謀日猶似艱難創業時定使在天無一憾乾乾從此到期頤其四寧壽朝朝瑞靄浮承歡左右意常周春逰勸駐花間輦夏宴扶登池上樓膝繞蘭蓀供綵戲盤堆山海極珍羞從知聖孝綿昌運風化而今已四流其五方畧編成燦若陳幾經整旅靖風塵蕩平共凛天威赫指授全憑廟算神玉帳頻臨非黷武金戈一到倐成春蚩尤相繼消除盡永覩軒皇宇宙新其六披盡蘭臺萬卷餘長從枝葉得根株題來妙句皆風雅製就鴻篇是典謨書法渾包羲獻體經箋一洗漢唐儒菁莪自合人才盛五紀文明徧八區其七清時仕路任分鑣黜陟年年總自操四海英賢歸電照九州人物入鈞陶孤寒特拔垂新寵閥閱兼收念舊勞爲是無私均覆冒欣欣爭戴帝天高其八祥光東壁動昭回恩詔登龍爲急才聖壽還頒酺讌洽春風早賜選塲開枝含嘉慶遷鶯度樹號長生集鳯來佇㸔普天桃李茂盡培松桂上林栽其九鳳樓高敞拂星河魚鑰晨開吐太和歲歲蠲租輸賦少心心解網好生多綸音疉布三春暖膏澤旁流四海波最是堯民饒樂事康衢擊壤徧謳歌其十梯航萬國獻球琳仗底歡聲動禁林宇内盡應親化日人間誰不沐甘霖仰瞻聖德同天德長喜天心合聖心鳥獸蹌蹌如助慶也隨干羽舞春深其十一吾皇高厚實難名親炙多年結寸誠觸事徧徵元后德逢時惟頌泰階平卿雲繞闕參差見蓂莢緣階次第生億萬萬年長御極九重應即是蓬瀛其十二萬壽詩七言律四首詹事府少詹事臣梅之珩洪惟至治展馨香自有生民仰聖皇十六字開虞道法五千服闢禹畿疆廸知簡在風雲際嘉惠諴和草木芳信是天心申眷祐永敷淑氣麗春陽其一春度瑶樞玉殿開光騰黄道紫霞堆南山頌進千官繞北極圖呈五嶽陪俊傑生儒鳴鶴至期頤父老杖鳩來卿雲靉靆連陬壤從此周干千萬回其二嵩陽于役惕心旌到處叢霄列洞笙紫闕未遑偕獸舞丹臺惟有向葵貞康衢雲擁羣黎祝太室風傳萬歲聲正値中天開景運泰階悠遠見昇平其三簡書馳復近星躔浩浩洪庥喜自天玉詔頒恩覃宇宙瑶函秩禮徧山川夤紘就日瞻重巽蓂莢添齡竝九乾為道羲軒誰得似方輿歴服慶綿綿其四萬壽詩七言律十首有序詹事府少詹事臣王奕清臣聞王者受天之祐百禄罄宜聖人宰世之符萬年永慶福壽殫陳於圖範純禧景頌於詩篇欽惟皇上濬哲凝圖聖神錫福首出庶物誕生民未有之姿表正萬邦擴亘古莫隆之業敬天而䖍齋告明德惟馨法祖而備纘承憲章是式運精一執中之心學建蕩平㑹極之猷爲文治矞皇旣崇儒而重道武功赫濯遂戢矢而櫜弓叙府事於修和萬幾時勅躋圻封於熙皥億姓咸寧肆宥平刑常敷愷惠蠲租賜復大霈寛仁簡賢能於明試之方𢎞選造以特優之典山陬海澨總沐瀼膏卉服侏音謐歸馴教允矣丕圖無外巍乎至德難名㳟遇三春正永之期韶暉滋茂顒慶萬壽無疆之算華甲初周率土騰歡效祝釐於丹闕殊方集貢肅拜嘏於瑶階臣忝貮詹僚尤䝉聖澤一門受禄總邀大造之涵濡廿載簪毫疉被重霄之拔擢謭材侍直瞻奉龍章鳳藻之輝陋室編摩與陪虎觀石渠之列國恩隆厚莫報涓埃帝祉貞恒益叨覆載不勝鳧躍敬祝鴻庥固知蠡測管窺詎罄高深之量竊附衢謡巷舞謹抒抃禱之誠云爾軒歴天開甲子長六旬介獻萬年觴輿情祗頌純綏乆聖德深貽寶祚昌芝蓋正擎歡繞仗璚雲高擁肅垂裳千官祈格占鴻慶翹竦三淸徹御香其一秩祀郊壇秉睿誠受釐總爲福蒼生人逰衢壤多仁壽帝錫臺萊永太平五日一風十日雨三年餘食九年耕欲徵四海同春象華祝豳歌萃紫京其二雝肅儀型本德徽寢門豫順奉彤闈雕盤饋饍勤三至鳳輦扶行導六飛慶溢蓬萊登玉斚春先長信拜褘衣醴泉貢瑞綏桃熟添益慈寧愛日暉其三心源羲昊接眞傳孔思周情典學䖍廣闢四聰探䆳古直求一畫契先天璿儀浹啟敷經席寳笈勤開敞講筵旃廈從容颺對洽雅詩賡咏福如川其四郅治雍和八政陳尤將亷法飭臣隣官方大小精宸鑒吏績良楛協帝詢百辟寅恭依有道九重激勸稟如神韶簫播戞光華旦玉燭常調壽域新其五松雲端拱軫黎元引集春臺喣噢温量地總頒蠲賦令含生覃沐賜餔恩祥煙靉靆縈枌社瑞旭舒長匝柳村平糴寛刑懐帝力億人喜氣溢衢樽其六聖朝文教育菁莪曠典優開甲乙科桂子春芳增長養杏園秋榜浹搜羅祗縁乆道薪槱廣更慶𢎞收俊造多彩鳳聯翩翔翽羽梧岡茀祿邁卷阿其七巨川翕叙萬方寧恩信懐柔靖四溟王㑹極邉頒歲朔神州環海入圖經苗頑久格齊編户羗貢常輸集大廷勲蹟巍巍辭顯號遠超懿古告云亭其八四庫芸編事博蒐校書槖筆擢儒流瀛洲迥出三千界藜閣高連十二樓官禮永傳尊雒鼎典謨備錄進箕疇小臣忝効雕蟲技鎬飲欣霑奉豫逰其九叨陪法從侍璇宫世荷生成覆幬洪欲頌純庥颺聖瑞每慙樸學嗣家風身依雙闕榮光下恩浥三天湛露中祇願玉宸千萬壽歲添蓂莢獻葵衷其十萬壽盛典初集卷六十九
