body:
  text: 欽定四庫全書萬壽盛典初集卷五十三慶祝四大臣入覲二提督管古北口等處地方總兵官都督同知臣馬進良謹奏為恭謝天恩事竊臣以駑才備員畿甸恭逢我皇上六十萬壽䖍詣闕下敬展嵩呼不過少申犬馬愛戴之忱乃恩賜稠疊寵逾格外臣於本月二十八日回署隨恭設香案率領闔家老幼望闕叩頭謝恩外伏念臣年當衰暮猶叨涵蓋之仁世際昇平未有涓埃之報身為提鎮子在中軍謬荷寵榮常慚尸素復以恭祝聖壽更沐殊恩章服被躬色奪天孫之錦珍羞飫口味分尚食之香頒松子以教守清操賜端硯而訓習文字臣受恩若此報稱無由惟有益勵乃心仰荅知遇恪恭職守永頌升恒而已謹具奏謝以聞鎮守宣化等處地方副將管總兵官事臣司九經謹奏為恭謝天恩事竊臣職典戎行近居畿輔欽聞聖駕行圍弗敢自逸於二月二十三日在北格驛接駕蒙霽顔眷顧温語下詢命臣拉弓畢遂得扈從蒙賜郊兔克食臣跪領祗受訖於南海子恭請入朝慶賀聖誕叨荷俞允臣得與在廷諸臣隨班叩祝拜舞之下仰見我皇上温恭雍穆莊敬慈良壽域自天開鷺序鵷班共頌一人之有道歡聲從地起黄童白叟羣呼萬壽之無疆景星慶雲共耀文明之瑞祥麟威鳯爰昭徳化之徴盛世之風光太平之富貴真亘古所未有千秋所罕見者也復覃殊恩於三月二十二日賜臣等筵宴臣因足踝忽痛未得親侍几席過邀優旨頒𤼵御宴於臣寓所臣望闕叩謝之餘正席先嘗飽飫天厨香生齒頬饜酣玉液爽浹肌膚不覺足疾頓愈伏念臣何人斯受兹寵眷不勝感激罔知所報惟有拜祝我皇上行同乾健壽與坤貞卜年卜世八百之姬厯倍増作君作師億萬之皇圖永固而已臣於四月初三日抵署謹恭疏奏謝伏乞皇上睿鑒施行鎮守直𨽻天津等處地方總兵官都督僉事臣杜呈泗謹奏為恭謝天恩事竊臣趨赴闕廷叩祝皇上六旬大慶二十二日恩賞筵宴特命阿哥及衆大人分行賜酒筵畢賜臣線結圓頂海龍帽雙龍捧壽袍掛金織龍襪緞鞾謝恩叩領二十三日陛辭䝉霽顔垂問二十四日復䝉頒賜鳶飛魚躍寶硯一方食物果品二十色臣遵旨回汛於二十六日抵天津臣署恭設香案率領闔家老幼叩謝外欽惟我皇上體同乾健徳協坤貞肇億萬年有道嘉祥開千百國無疆大慶龎眉鶴髪爭覲天子之光海澨山陬同祝聖人之壽人意即天意和風占戩穀之宜天心合聖心甘雨報屢豐之瑞臣近承畿輔喜附班聫瞻萬國之冠裳捧九天之日月浃旬侍直親炙龍光備物蒙恩飫霑帝寵此誠古今未嘗有之盛遇抑亦臣子不敢當之恩榮圖報何從名言莫罄伏願我皇上福如川至壽與天齊五榖豐登百神効順臣惟有兢兢業業勉竭駑駘子子孫孫世為犬馬以仰荅髙厚於萬一爾所有感戴愚誠理合恭疏奏謝以聞鎮守山西太原等處地方副將管總兵官事臣馬見伯謹奏為恭謝天恩事欽惟我皇上瓊甌薦祉銀甕凝庥徳配乾坤霑仁恩者千百國壽如山嶽奠磐石者億萬年山川與沐恩膏臣民咸登壽域欣逢我皇上六旬大慶允臣入京叩祝於二月初九日至王村道左跪請聖安䝉天語顧問初十日至沙口蒙賜御馬并賜食哈密𤓰十七日至圏頭賜松子榛子蜜餞山查又賜食土衣哈特二十五日至李家渠復賜鮮兔每日同督撫提臣賜克食皇恩如此優渥臣感愧難名至萬壽正誕得以隨班拜舞外臣榮幸已極復荷恩賜御宴御酒并御用海龍皮帽萬壽無疆緞袍四團龍縀掛五爪龍緞襪緞鞾臣何人斯邀此格外殊榮頂感不已圖報愈難臣更喜見各省耆老不約而至者共祝萬壽無疆中外臣民梯航而来者咸歌一人有慶皇上猶聖不自聖特頒上諭萬姓安即朕之安天下福即朕之福仰見我皇上至聖至仁大福大壽於萬壽以前臣民環祝天道晴明至二十二日完滿䖍誠已伸甘霖大沛聖心喜慰羣情歡忭皆呼上天保佑聖主之明騐從古未有之休風誠過於堯舜逺矣臣雖未嘗學問幸生聖人之世而歡慶之私又倍於尋常昨於四月初四日恭請聖訓又䝉天顔藹若春温聖訓同於謨典臣惟有凛遵訓㫖竭盡愚忱清餉練兵安静地方少報皇恩於萬一耳為此恭疏奏謝伏乞皇上睿鑒施行鎮守山西大同等處地方副將管總兵官事臣張自興謹奏為恭謝天恩并報微臣囘署日期事竊臣駑駘微賤受恩最深得隨在廷諸臣叩祝聖壽以抒犬馬下情重荷天恩賜翎賜宴兼䝉聖訓諄諄臣何人斯乃邀恩榮如此稠疊惟有殫心供職以報知遇於萬一爾臣於四月初五日叩辭起程本月十二日囘大同公署理合奏謝恭報伏乞睿鑒施行鎮守陜西寧夏等處地方掛印總兵官都督同知臣范時㨗謹奏為恭謝天恩事竊臣以駑駘陋質生逢聖世恭遇我皇上六旬大慶具疏叩祝荷蒙俞允臣於到京之時伏見梯山航海接踵而来黄耉鮐背扶杖而至皆得親覲天顔躬承異數一時歡呼動地萬姓愛戴如天臣隨侍班行覩千秋之僅事欣同謳頌訝曠古之竒觀固已抒拜舞之忱惬瞻仰之願矣乃寵渥頻加恩賞屢錫既飽天厨之味復受章服之榮昨於五月初十日恭送聖駕又蒙召見行在煌煌訓誡字字典謨且垂問臣祖孫父子以及伯叔兄弟自顧蹇劣叨此優渥雖捐糜頂踵亦未能仰報髙厚於萬一除將臣到署受事日期另疏題報外理合繕疏恭謝伏祈皇上睿鑒施行鎮守河南南陽等處地方副將管總兵官事世襲三等阿達哈哈番臣楊鑄謹奏為聖壽無疆普天同慶敬達愚忱恭謝天恩事欽惟我皇上福與天齊壽同山永一人有慶皇恩沛而草木霑恩萬壽無疆帝徳周而昆蟲戴徳千官颺拜咸瞻有道聖人萬國来朝齊祝無量壽佛養老之典復行厚澤深仁逺開億萬斯年之基業犒師之恩特沛荷戈秣馬歡歌五十二載之昌期黎庻遮道以瞻天文武環墀而仰聖臣生逢盛世幸覩中天蒙聖主格外施恩准臣来京祝壽臣於二月二十三日在東安縣地方恭遇囘鑾俾得躬迎道左跪請聖安蒙恩顧問隨圍五日於甘泉豹尾之末仰見我皇上神威射虎射兔又隨督撫大臣之班每日賜克食二次又賜臣親射兔子臣何人斯膺此異數迨陽春三月正值萬壽聖節堯天舜日甘雨和風臣得偕中外臣民共祝聖壽復蒙恩賜臣雀翎頂戴榮被祖宗賜宴賜酒恩同髙厚陛辭之日跪聆訓旨仰荷温綸朂臣以不逮勉臣以將来臣清夜捫心殊難報稱惟有謹遵聖訓竭蹶駑駘勉供職守以仰報天恩於萬一爾理合恭疏奏謝伏乞皇上睿鑒施行鎮守福建漳州等處地方總兵官左都督臣許鳯謹題為恭謝天恩并報微臣囘任受事日期事竊臣得䝉皇上准臣来京入覲叩賀萬壽稍抒犬馬戀主微誠到京之日叩請聖安叨䝉皇恩垂問即賜翎賜宴喜覲天顔過承温旨優渥頻加著臣回任料理地方臣何人斯獲邀曠典殊恩即捐糜頂踵莫能圖報於萬一遽離天顔感深涕出凛遵聖訓不敢少怠即於四月初八日陛辭出京至閏五月初四日到福建漳州臣轄地方據臣標中軍遊擊陳祖訓賫到欽頒闗防一顆王命旗牌五面桿臣恭設香案望闕叩頭謝恩祗受照舊供職惟有益竭愚誠効力邉疆俾地方安寧以仰荅皇上髙天厚地之恩少逭尸素之罪爾理合恭報囘任日期具疏題明伏乞皇上睿鑒施行鎮守雲南鶴麗等處地方總兵官臣郝偉謹奏為恭謝天恩事竊臣西鄙庸愚濫膺邉鎮因乆離闕廷犬馬戀切忻逢我皇上六旬大慶仰籲聖慈叩祝萬壽荷蒙俞㫖准臣来京臣欽遵就道於本年三月初十日赴暢春園恭請聖安十二日瞻覲天顔霽悦問臣弓箭當經奏對十五日蒙特恩欽賜翎子十七日臣隨文武諸臣跪迎輦輅蒙賜壽桃玉食十八日萬壽聖節得隨在廷諸臣叩祝慶賀二十二日蒙賜筵宴珍饈玉露香生齒頬霑飫天恩實深感刻復蒙特賜海龍皮帽團龍袍掛鞾襪臣不知夙世何修乃得邀此曠典臣清夜思維闔家乆蒙我皇上豢養之恩今又叨此異數不獨臣一身之榮真上及祖宗下逮妻子臣受兹髙厚隆恩即捐糜頂踵何能圖報惟有恪遵聖訓勤練兵馬正已率屬仰報皇恩於萬一爾為此具本謹具題知閏五月十三日上賜山東廵撫蔣陳錫山西廵撫蘇克濟河南廵撫鹿祐御書袍帽等物有差先是山東廵撫蔣陳錫山西廵撫蘇克濟河南廵撫鹿祐於元旦前次第来京慶祝萬壽上念封疆重任且二月間特科舉行鄉試諸臣俱有監臨之責諭令先歸本任至是上駐蹕熱河三臣各差家人賫摺恭請聖安上復有是賜云廵撫山東等處地方督理營田兼理軍務都察院右副都御史加五級臣蔣陳錫謹題為恭報微臣回署入闈監臨日期恭謝天恩事竊臣蒙聖恩准来京陛見臣得瞻仰天顔時聞天語少慰孺慕之懐復蒙賜克食聖恩眷注非常正月二十五日奉㫖山東河南廵撫来的日子久了地方要𦂳定了起身日子来請聖訓罷臣隨跪奏皇上六十萬壽普天同慶之時臣等多住幾日多得瞻仰龍顔俟祝過萬壽起身不遲後奉上諭地方𦂳要著即令起身臣於二月初二日恭請聖訓蒙皇上召至御前訓誨周詳一切地方情形皆在聖天子睿照之中更荷天顔藹若春温聖訓同於謨典臣跪聆咫尺真曠世之竒榮非常之異數也臣惟有實心辦事不徇情面竭盡愚忠仰報主恩於萬一爾臣於初三日謝恩起程十一日到署即於是日入闈監臨訖臣謹具疏題報伏乞睿鑒施行廵撫河南等處地方提督軍務兼理河道兵部右侍郎兼都察院右副都御史加四級臣鹿祐謹奏為恭謝天恩并報㣲臣囘任日期事臣一介寒微荷蒙聖恩簡畀撫豫重寄三年外吏時切犬馬戀主之忱兹康熙五十二年欣逢皇上六旬正誕普天同慶臣恭請陛見叩祝萬年幸蒙俞允於去年十二月二十五日在孫河地方接駕叩請聖安仰䝉天語垂問元旦令節臣得隨在廷諸臣躬親拜舞又於暢春園賞賜克食二十五日復蒙恩㫖垂念地方𦂳要令臣即行囘任二月初二日跪聆聖訓蒙諭地方安靜軍民相安祗要守之不變又以屛絶請託清查丁口訓誨諄諄不啻家人父子臣何人斯邀兹異數聖恩優渥踵頂莫酬惟有勉竭駑駘仰報髙厚於無盡爾伏念萬壽開科實係亘古未有之曠典臣職任監臨何敢稍有怠弛以負職守敬於初三日陛辭後立刻就道晝夜兼程已於二月十三日抵開封府接印受事即於本日入塲料理以無負皇上作人至意理合恭疏奏謝天恩并將微臣囘任監臨日期奏明伏乞睿鑒施行廵撫山西太原等處地方提督雁門等闗軍務兼理雲鎮都察院右副都御史臣蘇克濟謹奏為恭謝天恩事全疏載五十卷名山祝釐中廵撫山東等處地方督理營田兼理軍務都察院右副都御史加五級臣蔣陳錫謹奏為恭謝天恩事竊臣以一介庸材至微極賤至愚極拙荷䝉我皇上特達之知簡任山東廵撫厯任五載毫無報稱日夜恐懼寤寐不寧方切蚊負之憂難免曠官之責乃䝉聖恩優渥御書敬一齋匾額御書沈佺期竝命登仙閣詩一幅御書辭闕天威和雨露出闗春色避風霜對聫内造線纓帽一頂五爪龍緞袍一領五爪龍緞掛子一領五爪龍緞韈一雙緞鞾一雙欽賜到臣付臣家人楊昇齎捧到東臣於閏五月二十五日出郭恭迎敬設香案望闕叩頭謝恩祗受訖臣謹勒之貞珉珍之什襲奉為世寳伏念山左地方億萬生民皆蒙皇上覆育愛養福壽康寧比年以来連登大有今歳二麥又已豐收甘雨和風徧於四境秋禾復加茂盛熙熙皥皥盡在聖天子光被之中臣身在山東實與小民同怙冒於生成之下巍巍聖徳蕩蕩難名臣方懼寸長無補豈意恩沛自天寵錫彌厚受恩之下感激涕零慚悚交集臣自顧庸劣奚以仰副聖慈惟有凛天威於咫尺沐春色於萬年永寶敬一之訓益勵素絲之節仰荅聖恩髙厚於萬一爾理合恭疏奏謝為此謹題廵撫河南等處地方提督軍務兼理河道兵部右侍郎兼都察院右副都御史加四級臣鹿祐謹奏為恭謝天恩事臣家人馮玉齎摺至熱河恭請聖安并報麥收分數蒙皇上欽賜臣聖製七言律詩一幅堂對一聫五爪龍緞袍一件緞掛一件緞鞾一雙緞襪一雙給臣家人馳驛捧囘到豫臣隨薫沐出郊迎至臣署恭設香案望闕叩頭祗領訖伏念臣一介庸儒身受皇上厚恩撫豫並無寸效仰頼皇上洪福幸獲歳稔民安首春入都慶賀萬壽親承天語慰問克食寵頒方愧涓埃未報今復荷天章宸翰御用服物疊錫尚方恩施踰分從此奉至寳以傳家感殊恩之下逮維堂與柱褒嘉徧被絲綸自頂及踵俯仰難忘戴履臣何人斯叨沐異數若是之渥惟有益勵職守勉竭駑駘少荅隆恩於萬一爾謹將匾聫敬摹懸掛袍帽什襲珍藏外理合恭疏奏謝為此謹題臣聞有虞之世肇十有二州州有牧外薄四海咸建五長五載一廵守羣后四朝周制春朝諸侯而圖天下之事秋覲以比邦國之功夏宗以陳天下之謨冬遇以協諸侯之慮侯服歳一見甸服二歳男服三歳采服四歳衛服五歳要服六歳九州之外謂之蕃國代一見凡諸侯入朝行三享奉束帛加璧庭實惟國所有禮畢諸侯入廟門右北面告聽事王勞之又使宗伯以圭瓚酌鬱鬯祼之有功者賜以車服采菽桑扈諸詩所由作也自秦始立郡縣置守令漢仍其法諸侯王國稍參建其中每朝十月諸侯王以下至吏六百石以次奉賀諸侍坐殿上者以尊卑次起上壽觴九行褚少孫云諸侯王朝當四見始到入小見正月朔旦奉皮薦璧玉賀三日後為王置酒賜金錢財物後三日復入小見辭去凡留長安不過二十日唐貞觀元年梁州都督竇軌請入朝上曰君臣共事情猶父子朕亦須數見之問以人間風俗許令入朝十五年詔為諸州刺史創立邸舍於京師宋沿五代舊制藩鎮牧伯入覲客省齎籖賜酒食大中祥符八年四月侍衛步軍副都指揮使王能自真定来朝宴於長春殿熙寧元年富弼以使相判汝州詔入覲肩輿至殿門歴代述職之常儀覲君之故事其可考見者如此我國家建官分職中外相維文武相濟逺超前代皇上於各省督撫提鎮簡擇而畀以重任一徳一心萬里之逺如在堂階臨遣之時加之以訓詞授之以方畧隆之以體貌寄之以腹心徳威所施極於無外其違闕既乆者輒許陛見恩禮有加奬前勲勵後效曲成而不遺故一時臣工畏威而懐徳者感厲奮興瞻仰彤廷若戴穹蒼而親父母咸思時覲天顔恭聆聖訓以成泰交之盛事今歳皇上六旬正誕薄海臣民雲集輦下而各省大臣疏請入覲者十有五國不約而同皇上念封疆重寄揆其逺近度其疏數分别聽許其得遂所請者歡忻鼓舞叩闕嵩呼仰承聖澤或對揚休命温語移時或輦轂追隨賜予稠疊明良際㑹千載一時蓼蕭之詠諸侯也曰其徳不爽壽考不忘天保之頌君也曰如南山之壽蓋郅隆之世天人訢合厚福竒龎徴於上下昔在五帝壽皆逾百而稷契臯陶之儔亦皆近百歳今恭逢聖壽入覲諸臣龎睂皓首錦衣繡裳拜舞於廷陛之下君臣相悦延厯數旬史册所書未之有也班固賦東都稱春王三朝㑹同漢京受四海之圖籍膺萬國之貢珍其鋪張揚厲至於萬樂備百禮暨然不過朝儀之常爾豈若今萬壽聖節來王來享者如百川之朝宗如衆星之拱極六服震疊萬里奔走為極尊親之盛典哉臣故厯稽古來朝覲之禮而竊慶遭逢為獨盛云萬壽盛典初集卷五十三
