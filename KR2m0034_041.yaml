body:
  text: 欽定四庫全書萬壽盛典初集卷四十三慶祝二圖記一自暢春園至西直門臣民建棚慶祝者凡十有九所為記八圖以臣民北面仰瞻摹繪而成故始神武門而竟於暢春園宫門記以御輦所經次第先後而作則始暢春園而竟於神武門義各有取爾也由暢春園花洞迤東過雙閘至宫門前直南五色錦繒大綵牆一座結萬夀無疆四字左右大綵坊各一過小東門東偏有寺曰清梵諸皇子於內建萬夀經壇直壇演劇綵臺一幡竿二寺外結大綵坊一有聯曰普天共效三多祝大地齊呼萬歲聲左右綵坊一坊外鼓亭各一先是有乾清宫太監等亦於清梵寺建萬夀經壇寺前結綵坊坊外夾道為綵廊各八楹中懸百老圖南頭仍蔽以橫坊既諸王經壇建乃撤所設於西厰今圖兼仍其舊也由清梵寺前徑南稍折而東曰太平莊為直隸九府臣民慶祝界道旁有通州進魚回民百餘人陳魚於道左稍前過街大綵坊一進坊左右鼓亭一又前路左演劇綵臺一臺前有淮揚徐沿河耆民及河兵千餘人建黃幛綵坊上書臨聖駕視河工指示方略小民豐衣足食感戴天恩等語前列萬夀亭左右旗仗宫燈黃繖中陳進上袍帽及土宜食物又前路右有漕運旗丁數百人慶祝陳設與淮揚耆民同又前夾路綵廊左為耕圖右為織圖用絹為田夫紅女按農桑事次第各録御製詩一篇凡四十楹又前路左竹式演劇臺一木質而竹理又前折而南為葡萄長亭以緑綵為葡萄橫䕃數畞中設御座旁翼以百蝶小軒外周以花籬前有小橋過橋稍折而東路右連像歌臺一歌始北方以童子結束歌甘凉西音佐以絃索過臺為小關帝廟有膳房諸臣慶祝經壇廟前為龍棚棚前有綵坊曰夀齊天地坊左右為鼓亭循鼓亭折而前過街綵坊二左曰鸞翔鳯翥右曰日升月恆前立表棚一幡竿五出日升月恆坊路右演劇綵臺一稍前路左有菴曰興隆有算法人員慶祝經壇菴前燈坊一坊有聯曰百生逢此日萬夀願齊天坊左右燈樓各一直坊路右表棚一幡竿三又前為節節高歌臺節節高以童子結束聳立人肩從高歌舞頗類連像尤加恢詭云又前連像歌臺一路左雕木演劇臺一前接杏花林周遭花䦨六十丈內十番平臺一顏曰清音長草亭一曰酒市方草亭一曰松峰六角草亭一曰團瓢右前路右有原任包衣昻邦馬武同弟李榮保慶祝龍棚前建綵坊有經壇在通慧寺圖不及又前路右有廟曰皇莊關帝廟廟旁為松亭又前松牆百餘丈路左鼇山重臺一座高四丈五尺周二十一丈下演劇上節節高歌臺前為牡丹圃圃下為荷池池底以板為之清波瀠洄錦鱗翔泳臺後石山矗起林木蔚然皆繒繭結撰者又前為直隸臣民接駕處路左有坊曰多士嵩呼路右有坊曰老人華祝又前為萬夀寶閣閣三層高五丈五尺絶巨麗閣前有綵坊曰日華雲爛坊左右為綵屏屏下綵獅六各高丈有二尺直坊路右大綵牆一座結天子萬年四字牆左表棚一又前有包衣人鄧光乾張鼎升慶祝龍棚棚外幡竿二左右鼓亭前立綵坊曰萬年有道坊下有綵橋過橋幡竿四又前路右演劇綵臺一鼓亭二又前夾道綵坊二右坊曰萬國咸寧自太平莊至此夾道燈牆綵廊曲折凡三里經萬國咸寧坊稍前有綵坊曰民和年豐進坊為蘇州臣民慶祝界坊左鼓亭一路右有演劇棕臺曰雲中天樂臺脊棕結衢歌巷舞四字又前為皇棚綵簾四映周櫩為黃幔三層下繞以朱欄中設御座座旁大理石屏二後設紅哆囉呢幔金書九如詩棚後闢小軒五楹陳設文玩盆花左右園林小景曲廊橫亘竟左有松亭曰雲生松棟竟右有柏亭曰翠柏長春亭外雜植桃李掩映飛動前建大綵坊曰聖夀同天有聨曰萬年人慶長生節三月天開四海春坊左右為燈廊中設慶祝表屏坊前有耆老貢獻土物百盤坊下綵橋一左右小紅橋二過綵橋路右大綵牆一座廣四丈綵結大夀字五左右為抱角燈棚又前路右有演劇棕臺曰萬國歡心臺脊棕結民安物阜四字直臺路左為耆老接駕棚前設龍亭御仗旗繖後張百夀黃幔長三丈繡夀字百圖中御輦直皇棚前羽葆翠華照曜雲日臣民皆跪衣冠萬衆魚鱗相切彌望無際耆老執爵上萬歲夀天顏有喜又前過街綵坊一曰四海升平坊右鼓亭一自民和年豐坊至此夾道綵廊四百楹花檻燈牆繽紛浩閙計長一里半過四海升平坊為江南江常等十三府慶祝界路右有候選候補官員建黃棚一內設萬夀圖屏金書夀字各體者萬左右鼓亭各一又前路左為松江府在籍諸臣及耆民慶祝皇棚一座左右綵廊直棚路右為表棚又前夾路綵坊二左曰六合同春右曰萬年一統又前路右為演劇綵臺又前為小景棕亭亭前為花籬駭緑紛紅蔓延二十餘丈又前路左為十三府慶祝皇棚中設御座前陳古鼎蟠桃長生花萬民宴萬民衣左右綵廊木施陛楯右平左墄高數尺棚前大綵坊曰天子萬夀有聨曰皇極建而歲月日時無易聖德大而祿位名夀並隆棚左右松柏亭各一花架四外周以綵廊廊外左右鼓亭直坊路右為表棚棚左右燈樓各一又前路右演劇臺一又前夾道綵坊二左曰舜日光華右曰堯天浩蕩徑兩坊間折而東路左有菴曰百祥自四海升平坊至此燈廊花檻數百楹紅橋二十一花樹數百計長一里半百祥菴前有綵坊曰敷天湛露過坊為浙江臣民慶祝界坊左有通州坐糧㕔慶祝龍亭設大鼎一龍燭二燭長丈又前有通漕七省旗丁陳設慶祝龍亭香亭又有一統萬年清亭萬年清草名高尺餘葉菁葱可愛四時不凋一名千年運又前有過街綵坊曰天長地久過坊路右演劇綵臺一又前有過街綵坊曰皇州春色過坊路右有扮演故事臺演海上羣仙又前有過街綵坊曰萬夀同天過坊路左為皇棚顏曰太和元氣中設御座旁引兩廊雜陳古玩廊外左右鼓亭前建綵坊曰瑞現星樞直坊路右燈棚一棚左右故事臺二左三星右五老又前有過街坊曰海晏河清過坊路左為浙江耆民接駕棚又前路右故事臺一演瑶池仙樂又前有四角擊壤亭中設玻璃屏書擊壤頌又前有過街綵坊曰一人有慶過坊稍折而東路右有廟曰茶棚關帝廟廟前為江寧蘇州杭州三織造慶祝經棚棚前有綵坊曰聖夀天齊左右為鼓亭直坊路右為表棚又前路左有綵坊曰瑞叶青陽過街綵坊曰增輝紫極過坊路左有演劇綵臺曰萬國謳歌又前香亭一夾道鼓亭二自百祥菴至此曲檻花廊計長一里半由茶棚關帝廟東行有過街綵坊曰萬福攸同進坊為福建山東江西河南廣東廣西六省臣民慶祝界路左為耆老接駕棚路右演劇綵臺一又前路左木龍亭一亭八角前柱金龍對蟠鱗爪騰攫飛動中設御座左右燈廊雙引前闢捲棚五楹棚前有大綵坊高三丈餘木幹綵章流蘇瓔珞藻繡綸連下接於地顏曰萬夀有聨曰兩地參天日月岡陵開夀域錫疇斂福鳯麟河嶽獻禎符匾聨皆銅質洗磨如鏡光閃爍奪目麗日燭之不可迫視坊下綵獅二尤猙獰亭左右各闢小園花䦨周數畝圜窗曲徑杳窱相通牡丹荼䕷丁香桃李諸名花森發條竪各建小軒珠燈密布與花栁映發爭姸出花闌由萬夀坊前過小橋直坊路右為表棚棚左右鼓亭各一又前路右有重樓曰金聲玉振上懸名燈下奏十番清樂又前松亭一亭下三面周以花䦨又前路左有綵坊曰厚德無疆又前路左八角演劇臺一有聨曰天樂動南薰彩鳯高臨青玉案瑶池供夀酒彤雲輕護紫霞杯路右六角演劇臺一又前路左牡丹棚一路右柏亭一又前路左有燈樓曰光被四表過樓稍折而東地名大栁樹有古栁一株萬絲拂空垂䕃盈畞自萬福攸同坊至此綵廊數百楹間以荔牆繡錯綺分計長三里過大栁樹有過街綵坊曰風動時雍進坊為四川陜西山西湖廣貴州雲南六省臣民慶祝界路左五綵重臺一上以絹製羣仙下陳設古玩過臺稍折而南有綵坊曰羲軒風景路左有綵坊曰德洋恩溥又前路左柏亭一路右棕亭一又前路左有燈樓曰萬物皆春路右演劇臺一又前路左為皇棚棚據高地俯視平疇澶漫靡迤陛楯鬱律歷級而上三階重軒鏤檻文㮰干霄蔽日中設御座前列粔籹如夀桃者數千棚外大綵坊曰萬邦惟慶有聨曰天申命用休四方來賀皇建其有極萬福攸同左右鼓亭一直坊綵橋一橋三洞經以綵䦨雁翅參差望之屹然如偃月垂虹蜿蜒數丈觀者訝為神速蓋木質施以丹繪儼然石梁也棚左右龍旗二竿絶高縹眇拂霄漢直坊路右十番綵臺一臺前表棚一又前路左有燈樓曰光華復旦又前有演劇綵臺曰鈞天廣樂又前夾道綵坊二左曰三台玉燭右曰八表金甌又前有清音臺曰萬籟和鳴又前有過街綵坊曰華渚神光出坊有寺曰慈獻自大栁樹至此綵廊數百楹繡栭雲楣曲折參差長三里過慈獻寺有寺曰隆昌有長蘆衆商人於寺前建慶祝皇棚棚前有綵坊曰萬年景運直坊為榜棚棚左右鼓亭一又前路右故事臺一演木公金母諸仙又前路左節節高歌臺一又前路右為小花園園中六角亭一又前夾道演劇臺二鼓亭二過亭綵坊二左曰六龍時御右曰天地同春又前路左有寺曰廣通有五旗諸王建慶祝經壇於內寺前綵坊三中曰德配乾坤左曰夀同悠久右曰福竝升恆左右折而前過街綵坊各一右坊外路右為諸王接駕處直中坊路右榜棚一幡竿五棚後迤右演劇綵臺一又前路左有廟曰天仙過天仙廟為真武廟有巡捕三營將校建慶祝經壇於內廟前為龍亭亭中以童子演八仙陳蓬瀛仙樂左右綵坊一左曰萬年玉厯右曰三祝華封直亭有綵坊曰悠久無疆稍前有菴曰五聖菴旁榜棚一又前路左有演劇綵臺曰萬年歡又前路右有西直門市民建綵坊曰共樂堯天徑南有綵坊曰天子萬福近坊折而東有綵坊曰萬年景福有經壇在元靜觀圖不及出坊過石橋有過街大綵坊曰普天同慶過坊進西直門有過街大綵坊曰萬國來朝則皆提督九門步軍統領臣隆俄多所建也圖中大駕鹵簿始於此迤邐夾道直接太平莊萬夀盛典初集卷四十三
