body:
  text: 欽定四庫全書萬壽盛典初集卷十五典禮四詔頒一康熙五十二年三月十八日乙未皇上六十萬壽御殿受朝賀禮畢特頒恩詔駕還宫諸臣隨詔出天安門外宣讀奉天承運皇帝詔曰朕五十餘年上畏下懼以敬以誡覃思上理且以一心對越上帝未嘗瞬息稍懈賴旻穹之孚祐祖宗之䕃庇邇來國家蓄積有餘民間年歲頗豐朕以凉德勉思列聖體大順公慮患操心敷景運於休期𢎞基業於光顯夙夜冰兢宵旰靡遑屈指春秋年屆六旬矣覽自秦漢以下稱帝者一百九十有三享祚綿長無如朕之久者朕之虛薄良深歉仄何敢少有倦怠有負孜孜圗治之初心况在位久者始勤終忽往往不能垂令名於後所以乾惕之懷彌殷深危之念愈切兼之承平嵗久幅員日廣户口漸增風俗益薄朕與臣鄰夙夜在茲以剛健中正惇大成裕謙尊有終持盈保泰猶恐未能豈自滿假少有逸豫朕以天下為心天下當亦體朕之衷各矢藎誠皆敦孝敬型仁講讓守己奉公務勤職業官僚胥勸人士奮興使遐邇之均被小大之咸周以享升平之福此非朕之德乃天地祖宗之賜今朕式慰中外臣民之請博考典禮大沛膏澤用稱朕躋世於仁壽之至意所有應行事例開列於後一五嶽四瀆等祀應遣官致祭著照舊例舉行一歷代帝王陵寢先師孔子闕里應遣官致祭著察例舉行一凡嶽鎮海瀆廟宇有傾頽者該地方官估計價值具奏修葺以昭誠敬一歷代帝王陵寢有毁壞者該督撫察明具奏修葺一陵寢官員兵丁執事人等俱加恩賜一自王以下宗室覺羅十五歲以上者俱加恩賜一內外大小各官除各以現在品級已得封贈外凡升級及改任者著照新銜封贈一在京滿漢文官四品以上在外三品以上武官在京在外二品以上各送一子入監讀書一在京滿漢文官五品以下在外文官四品以下在京武官三品以下在外武官亦三品以下俱各加一級一內外文武官員除大計軍政處分外現在議革議降議罰戴罪住俸等項各該衙門悉與奏明寬宥一凡文武官員現在敕督撫提問究擬者盡與豁免一內外降級罰俸等官俱著開復調用者仍照原議調用一先年出征人內有功牌應得官者除抵軍罪外其守雲南城及在隴州控告不准敘功人等所存無幾今皆老邁不能效力兹遇覃恩著兵部查明仍行補敘一昔年存亡之秋在在用兵朕所親歷今雖承平而武備不可不謹故時加訓練八旗兵丁盡已精鋭兹特大沛恩賜護軍校前鋒及護軍各賞給一年錢糧撥什庫披甲人各賞半年錢糧外省駐防之兵亦照此例一年尚未老傷廢辭職官員及傷廢退甲兵丁酌給錢糧米石一滿洲兵丁原係披甲效力行間因疾病年老閒住者著察加恩賜一各直省緑旗兵丁俱應加賞賚著議奏一海宇承平已久户口日繁地畞竝未加廣宜施寬大之恩共享恬熙之樂嗣後直隸及各省地方官遇編審之期察出增益人丁止將實數另造淸冊奏聞其徴收錢糧但據康熙五十年丁冊定為常額續生人丁永不加賦仍不許有司於造冊之時藉端需索用副朕休飬生息之意一天下地丁錢糧既沛恩澤於三年內悉豫豁免其自京城及各省房地租稅多係貧民賃僦官地棲身營業宜併蠲恤以覃恩惠著察明京城內併各省每年地租額數於康熙五十三年豁免一年其歷年逋缺若干一并察明免其追補一八旗滿洲䝉古漢軍兵丁及內扎薩克喀爾喀等䝉古年七十八十九十以上者分别賞賚至百歲者題明給與建坊銀兩一軍民年七十以上者許一丁侍養免其雜𣲖差役八十以上者給與絹一匹綿一斤米一石肉十斤九十以上者倍之至百歲者題明給與建坊銀兩一督撫係封疆大吏地方利弊聞見必真凡關係籌餉節用裨益兵民事宜如有確見著據實條奏果屬可行著有成效即從優擢用一督撫題補各官原從地方需才起見或受任之後有行事乖張貪縱虐民者該督撫不時體訪據實參奏勿得以曾經保舉瞻顧偏徇如故為隱庇别經發覺將該督撫一並從重治罪一地方大小官員當以仁慈為本妄聼奸民揑詞誣告以致陷害良民其害更甚於貪如各省督撫以下及有司官員有濫受詞狀貽害善良者事覺定從重治罪一各處關差如有將不應納稅之物額外橫征差役四出分踞津隘擾害商民者該督撫題參若不行題參事情發覺一併從重治罪一雜𣲖項款永行禁革以安民生該督撫嚴察禁革如有仍前濫征者或經參奏或被發覺定行從重治罪一濫動重刑舊有嚴禁有司官員有因小事輒行夾訊竝違例妄用非刑者該督撫即行察參具奏從重治罪一恤兵原以為民兵丁專賴糧餉養生天下兵餉皆不實給以致兵不精鋭且至失所應嚴行申飭著各督撫提鎮不時稽查禁革如有仍前虛冒扣尅不實行支給者定行從重治罪一國子監監生免坐監一箇月一各省儒學以正貢作恩貢次貢作歲貢一地方有山林隱逸懷才抱德之士著該督撫核實具奏酌與録用一滿漢孝子順孫義夫節婦該管官細加咨訪確具事實奏聞禮部核實以憑旌表一除革職降級休致回籍外地方人才果有才行著聞及學問優長者著該督撫核實具奏一罰贖積穀原以備賑冬月嚴寒恐鰥寡孤獨貧民無以為生著直隸各省督撫責令有司官將積穀酌量賑濟毋令奸民假冒支領一各處養濟院所有鰥寡孤獨及殘疾無告之人有司留心以時養贍母致失所一天下驛遞苦纍凡乘傳員役騷擾驛遞者著該督撫立行參奏如有容隱一並治罪一各省㑹設兵處所有等奸民假充兵丁溷入營內夥告夥證拖纍小民甚有借通賊為名抄掠殷實尤為大害該將軍督提鎮將嚴行約束務絶害端如有隱徇不究一體從重處治一各地方有豪紳劣襟衙胥積蠧或免本身田地差徭或包攬他人田地徭丁代為規避偏纍窮民莫此為甚該督撫行各地方官秉公嚴察如有此等情弊重加懲處一官役犯贓罪應至死與不至死者俱免罪仍革職革役追贓永不敘用一凡有叛逆殺死人強盜等罪牽連對質候審監禁人犯在獄年久恐無辜致死該部院直省督撫確審如無憑質對情可矜疑者即行奏請釋放一凡應追贓私察果家産盡絶力不能完者槩與豁免母得株連親族一凡強盜雖同夥殺人本人未經下手者自行投首准與免罪一各處盜賊或為飢寒所纍或為貪官所迫實有可憫如能改過就撫者准赦其罪一除謀殺故殺外如原無仇隙偶因一時忿激相毆傷重致死者將凶犯免死決杖一百照例追銀四十兩給付死者家屬一凡官吏兵民人等有犯除謀反叛逆子孫殺祖父父母內亂妻妾殺夫告夫奴婢殺家長殺一家非死罪三人採生折割人謀殺故殺蠱毒魘魅毒藥殺人強盜妖言十惡等真正死罪不赦外及修造宫殿陵寢工程不固冒破錢糧製造戰船軍器等項不堪靡費錢糧軍機獲罪貪官衙役犯贓監守自盜冒借官庫銀兩侵盜漕糧科場罪案關係河道漕運一應情罪俱不准赦騷擾驛遞奸細光棍誣告叛逆放火因奸致死人命罪犯亦在不赦别項死罪俱减一等內有鬭毆殺人者仍照例追銀四十兩給付死者之家其餘自康熙五十二年三月十八日昧爽以前已發覺未發覺己結正未結正咸赦除之有以赦前事訐告者以其罪罪之於戲錫民以福為皇極得壽之徴御衆以寬乃萬國咸寧之本布告天下咸使聞知是月十六日禮部尚書臣赫碩色等謹奏為禮儀事康熙五十二年三月十八日恭遇皇上六旬大慶頒詔天下和碩親王以下文武大臣官員進表行禮儀注是日黎明鴻臚寺官將安置詔書黃案陳設於太和殿內東旁又設黃案一於丹陛上正中間又設置表黃案一於置詔案次捧詔雲盤黃傘俱在丹墀下俟立香亭龍亭陳於午門前又設高臺置香案於金水橋前內閣大臣捧詔書表文安置於太和殿內所設各黃案上皇上升殿御寶座和碩親王以下文武大臣官員進表行慶賀禮畢內閣大臣請捧詔書出於太和殿簷下授於禮部堂官禮部堂官跪受由中階左旁降安置於丹陛黃案上行一跪三叩頭禮鑾儀衛鳴贊官贊鳴鞭三下皇上回宫諸王貝勒貝子公等各散禮部司官一員進跪捧詔書降階捧雲盤官跪接安置雲盤內捧盤起張蓋黃傘由中路稍旁出太和門外丹墀下又司官一員跪接捧出午門外自龍亭前北向跪安置畢行三叩頭禮校尉等擡香亭在前龍亭在後作樂文武大臣官員隨詔書至天安門外金水橋前安置香亭龍亭請詔官一員行一跪三叩頭禮由龍亭內捧出置高臺黃案上鴻臚寺贊禮官贊齊集各官排班宣詔官登臺西向立鴻臚寺官贊有制衆北向跪宣詔官宣讀滿漢詔書畢衆就跪行三叩頭禮再行二跪六叩頭禮畢俱散禮官安置詔書於龍亭內校尉擡自大清門出至禮部衙門月臺上安置於向闕所設案上供香燭禮部堂司官員行三跪九叩頭禮畢刋刻詔書頒行天下為此具奏本日奉㫖知道了四月初二日己酉分遣滿漢官齎詔頒行天下直省齎詔官員直隸內閣中書楊柱江南省內閣中書費揚古福建省內閣中書庫爾禪浙江省內閣中書翁翮江西省內閣中書富海湖廣省禮部筆帖式六十四河南省行人司行人王肅章山東省翰林院筆帖式關保山西省禮部筆帖式馬爾濟四川省起居注筆帖式逹普哈廣東省內閣中書薩爾泰廣西省內閣中書巴爾圖貴州省行人司行人褚泰陜西省翰林院筆帖式巴勒雲南省內閣中書巴顔泰總漕內閣中書鼐滿岱總河翰林院筆帖式六格朝鮮國頒詔官員正使頭等侍衛儀度額真阿齊圗副使護獵總管穆克登五官司厯何國柱六品通官德宜六品通官桑格六品通官二格七品通官袁喜臣等伏讀詔書仰見我皇上博施濟衆之心如天地之無不覆載如日月之無不照臨如和風甘雨之無不披拂所謂光被四表格於上下者何以加兹夫帝典備載於虞書王命時陳於周誥然渾噩之初未為詳備漢始稱詔中分四品其恩澤寬大之令要皆隨事立名因時間發凡重祠敬祭禮賢賜爵養老恤孤貸貧讞獄或因災眚而肆赦或遇凶歉而蠲除偶一舉行即稱盛事自是而降詔令愈繁則實惠愈少故稱漢初為最然司馬遷於高景之詔皆不書惟於文帝詔皆稱上曰以其出於帝之實意也我皇上以實心行實惠仁至而義盡德周而恩溥固已度越漢文而量之廣逺巍乎煥乎則與帝典王言後先同揆今詔㫖所頒修葺祠墓遣官致祭崇祀典也加恩宗室親親也錫封賜䕃廣孝慈也加級奬勞也開俸復級宥小過也恤軍功給兵賞重武備也嚴雜𣲖禁濫刑察牽連止誣奸重民命也除天下之全租貸積年之逋稅免日增之户口重民生也市㕓則减嵗額關梁則禁煩科惠商賈也敕督撫戒官吏崇實政也設特科增貢監訪隱逸勵人材也建百歲之綽楔賜高年之粟帛七十者許一丁侍飬免其差役飬老也申飭養濟院惠煢獨也矜不赦恕無辜計罪輕重悉加除宥廣好生與愚賤相更始也凡此一日之告令實兼千百代未備之敷施一時之恩膏實𢎞億萬年無窮之休養隋王通所云其志也博其言也典淵默負扆而澤盈宇宙者也臣等幸際昌明其踴躍歡忭寧有涯哉所有直省督撫及外藩諸臣謝恩疏其遵照成格止報奉詔日期者不録餘或抒誠頌掦或代庶僚及耆老士民兵辨題謝間録數章垂之奕祀亦以徴一時臣民慶戴鼓舞之休風云萬壽盛典𥘉集卷十五
