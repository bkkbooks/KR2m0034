body:
  text: 欽定四庫全書萬夀盛典初集卷十四典禮三祭告二五月初十日丙戍昧爽欽差致祭官員齊赴禮部領香帛祭文御仗分詣直省禮部祠祭司為欽奉恩詔事禮科抄出本部等部題前事康熙五十二年四月十六日題本月二十二日奉㫖長白山醫巫閭山等處遣覺羅歪三致祭遼太祖陵遣殷濟納致祭南海遣馬雲霄致祭顓頊髙陽氏等陵遣王臣致祭黄帝軒轅氏等陵遣蔡升元致祭西嶽華山及江瀆等處遣查弼納致祭南鎮㑹稽山遣拉都渾致祭夏禹王陵及明太祖陵遣周起渭致祭東嶽泰山等處遣孫柱致祭少昊金天氏等陵孔子闕里遣廖騰煃致祭中嶽嵩山等處遣李先復致祭太昊伏羲氏等陵遣明安致祭南嶽衡山遣羅占致祭炎帝神農氏等陵遣陳汝咸致祭女媧氏等陵遣鄒士璁致祭北嶽恒山等處遣李敏啓致祭江西賞賚綠旗兵丁著額爾氣去福建賞賚綠旗兵丁著穆賽去廣西賞賚綠旗兵丁著許廷臣去雲南賞賚綠旗兵丁著瓦哈立去貴州賞賚綠旗兵丁著朱廷柱去餘依議欽此欽遵到部隨劄欽天監叧選得五月初十日寅時吉等語相應知㑹𣲖往致祭官員於初九日齋戒一日初十日早俱齊集本部領香帛祭文御仗纛牌傘等項前徃致祭可也頭等侍衛覺羅歪三之兀喇地方及遼東祭長白山之神北鎮醫巫閭山之神混同江北海之神副都統馬雲霄之廣東祭南海之神内閣侍讀學士查弼納之陕西四川祭西嶽華山之神西鎮吳山之神江瀆之神内閣侍讀拉都渾之浙江祭南鎮㑹稽山之神吏部左侍郎孫柱之山東祭東嶽泰山之神東鎮沂山之神東海之神兵部左侍郎李先復之河南祭中嶽嵩山之神淮瀆之神濟瀆之神通政司左通政兼叅領羅占之湖廣祭南嶽衡山之神太常寺卿李敏啓之山西祭北嶽恒山之神中鎮霍山之神西海之神河瀆之神閒散大臣殷濟納之遼東祭遼太祖陵副都統王臣之近畿祭顓頊高陽氏陵帝嚳高辛氏陵商中宗陵金太祖陵金世宗陵明宣宗陵明孝宗陵明世宗陵在順天府望祭元太祖陵元世祖陵内閣學士兼禮部侍郎蔡升元之陕西祭黄帝軒轅氏陵周文王陵周武王陵周成王陵周康王陵漢髙祖陵漢文帝陵漢宣帝陵唐髙祖陵唐太宗陵唐憲宗陵唐宣宗陵後魏文帝陵日講官起居注翰林院侍講學士周起渭之浙江江南祭夏禹王陵明太祖陵户部右侍郎廖騰煃之山東祭少昊金天氏陵帝堯陶唐氏陵先師孔子闕里左副都御史明安之河南祭太昊伏羲氏陵商高宗陵周世宗陵漢光武帝陵宋太祖陵宋太宗陵宋真宗陵宋仁宗陵通政司右叅議陳汝咸之湖廣祭炎帝神農氏陵帝舜有虞氏陵内閣學士兼禮部侍郎鄒士璁之山西祭女媧氏陵商湯王陵祭長白山文維康熙五十二年嵗次癸巳月朔越日皇帝遣頭等侍衛覺羅歪三致祭於長白山之神曰維神天作崇高地鍾靈異發祥有自延祚無疆朕纘受鴻圖撫臨區宇殫思上理夙夜勤求惟日孜孜不遑暇逸兹御極五十餘年適當六旬初屆所幸四方寧謐百姓乂和稼穡嵗登風雨時若維庶徴之協應爰羣祀之䖍修特遣耑官式循舊典兾益贊雍熙之運尚永貽仁夀之休俯鑒精忱用垂歆格祭北鎮醫巫閭山文維康熙五十二年嵗次癸巳月朔越日皇帝遣頭等侍衛覺羅歪三致祭於北鎮醫巫閭山之神曰維神永障遼陽肇封虞代靈威有赫作鎮北方朕纘受鴻圖撫臨區宇殫思上理夙夜勤求惟日孜孜不遑暇逸兹御極五十餘年適當六旬初屆所幸四方寧謐百姓乂和稼穡嵗登風雨時若維庶徴之協應爰羣祀之䖍修特遣耑官式循舊典兾益贊雍熙之運尚永貽仁夀之休俯鑒精忱用垂歆格祭北海文維康熙五十二年嵗次癸巳月朔越日皇帝遣頭等侍衛覺羅歪三致祭於北海之神曰維神靈協天池位尊北陸羣生永頼大澤無涯朕纘受鴻圖撫臨區宇殫思上理夙夜勤求惟日孜孜不遑暇逸兹御極五十餘年適當六旬初屆所幸四方寧謐百姓乂和稼穡嵗登風雨時若維庶徴之協應爰羣祀之䖍修特遣耑官式循舊典兾益贊雍熙之運尚永貽仁夀之休俯鑒精忱用垂歆格祭南海文維康熙五十二年嵗次癸巳月朔越日皇帝遣副都統馬雲霄致祭於南海之神曰維神徳協離明功髙長養永資廣利流潤炎荒朕纘受鴻圖撫臨區宇殫思上理夙夜勤求惟日孜孜不遑暇逸兹御極五十餘年適當六旬初屆所幸四方寧謐百姓乂和稼穡嵗登風雨時若維庶徴之協應爰羣祀之䖍修特遣耑官式循舊典兾益贊雍熙之運尚永貽仁夀之休俯鑒精忱用垂歆格祭西嶽華山文維康熙五十二年嵗次癸巳月朔越日皇帝遣内閣侍讀學士查弼納致祭於西嶽華山之神曰維神少昊儲精崑崙競秀祥流仙掌澤布靈池朕纘受鴻圖撫臨區宇殫思上理夙夜勤求惟日孜孜不遑暇逸兹御極五十餘年適當六旬初屆所幸四方寧謐百姓乂和稼穡嵗登風雨時若維庶徴之協應爰羣祀之䖍修特遣耑官式循舊典兾益贊雍熙之運尚永貽仁夀之休俯鑒精忱用垂歆格祭西鎮吳山文維康熙五十二年嵗次癸巳月朔越日皇帝遣内閣侍讀學士查弼納致祭於西鎮吳山之神曰維神秀秉金天功齊華嶽靈威有赫作鎮西方朕纘受鴻圖撫臨區宇殫思上理夙夜勤求惟日孜孜不遑暇逸兹御極五十餘年適當六旬初屆所幸四方寧謐百姓乂和稼穡嵗登風雨時若維庶徴之協應爰羣祀之䖍修特遣耑官式循舊典兾益贊雍熙之治尚永貽仁夀之休俯鑒精忱用垂歆格祭江瀆文維康熙五十二年嵗次癸巳月朔越日皇帝遣内閣侍讀學士查弼納致祭於江瀆之神曰維神岷山導源南國作紀百川並納九泒同歸朕纘受鴻圗撫臨區宇殫思上理夙夜勤求惟日孜孜不遑暇逸兹御極五十餘年適當六旬初屆所幸四方寧謐百姓乂和稼穡嵗登風雨時若維庶徴之協應爰羣祀之䖍修特遣耑官式循舊典兾益贊雍熙之治尚永貽仁夀之休俯鑒精忱用垂歆格祭南鎮會稽山文維康熙五十二年嵗次癸巳月朔越日皇帝遣内閣侍讀拉都渾致祭於南鎮會稽山之神曰維神秀挺越山功施浙水靈威有赫作鎮南方朕纘受鴻圖撫臨區宇殫思上理夙夜勤求惟日孜孜不遑暇逸兹御極五十餘年適當六旬初屆所幸四方寧謐百姓乂和稼穡嵗登風雨時若維庶徴之協應爰羣祀之䖍修特遣耑官式循舊典兾益贊雍熙之治尚永貽仁夀之休俯鑒精忱用垂歆格祭東嶽泰山文維康熙五十二年嵗次癸巳月朔越日皇帝遣吏部左侍郎孫柱致祭於東嶽泰山之神曰維神名著岱宗位尊喬嶽發生庶類膏澤東維朕纘受鴻圖撫臨區宇殫思上理夙夜勤求惟日孜孜不遑暇逸兹御極五十餘年適當六旬初屆所幸四方寧謐百姓乂和稼穡嵗登風雨時若維庶徴之協應爰羣祀之䖍修特遣耑官式循舊典兾益贊雍熙之治尚永貽仁夀之休俯鑒精忱用垂歆格祭東鎮沂山文維康熙五十二年嵗次癸巳月朔越日皇帝遣吏部左侍郎孫柱致祭於東鎮沂山之神曰維神望配岱宗澤流海國靈威有赫作鎮東方朕纘受鴻圖撫臨區宇殫思上理夙夜勤求惟日孜孜不遑暇逸兹御極五十餘年適當六旬初屆所幸四方寧謐百姓乂和稼穡嵗登風雨時若維庶徴之協應爰羣祀之䖍修特遣耑官式循舊典兾益贊雍熙之治尚永貽仁夀之休俯鑒精忱用垂歆格祭東海文維康熙五十二年嵗次癸巳月朔越日皇帝遣吏部左侍郎孫柱致祭於東海之神曰維神秀唘扶桑祥徴析木百川向若萬壑朝宗朕纘承鴻圖撫臨區宇殫思上理夙夜勤求惟日孜孜不遑暇逸兹御極五十餘年適當六旬初屆所幸四方寧謐百姓乂和稼穡嵗登風雨時若維庶徴之協應爰羣祀之䖍修特遣耑官式循舊典兾益贊雍熙之治尚永貽仁夀之休俯鑒精忱用垂歆格祭中嶽嵩山文維康熙五十二年嵗次癸巳月朔越日皇帝遣兵部左侍郎李先復致祭於中嶽嵩山之神曰維神宅土居中極天表峻儲精二室被徳羣生朕纘承鴻圖撫臨區宇殫思上理夙夜勤求惟日孜孜不遑暇逸兹御極五十餘年適當六旬初屆所幸四方寧謐百姓乂和稼穡嵗登風雨時若維庶徴之協應爰羣祀之䖍修特遣耑官式循舊典兾益贊雍熙之治尚永貽仁夀之休俯鑒精忱用垂歆格祭淮瀆文維康熙五十二年嵗次癸巳月朔越日皇帝遣兵部左侍郎李先復致祭於淮瀆之神曰維神源導胎簪泒分桐柏黄流並乂潁水同清朕纘承鴻圖撫臨區宇殫思上理夙夜勤求惟日孜孜不遑暇逸兹御極五十餘年適當六旬初屆所幸四方寧謐百姓乂和稼穡嵗登風雨時若維庶徴之協應爰羣祀之䖍修特遣耑官式循舊典兾益贊雍熙之治尚永貽仁夀之休俯鑒精忱用垂歆格祭濟瀆文維康熙五十二年嵗次癸巳月朔越日皇帝遣兵部左侍郎李先復致祭於濟瀆之神曰維神隠見分流潔清秉徳安瀾千里沛澤羣生朕纘承鴻圖撫臨區宇殫思上理夙夜勤求惟日孜孜不遑暇逸茲御極五十餘年適當六旬初屆所幸四方寧謐百姓乂和稼穡嵗登風雨時若維庶徴之協應爰羣祀之䖍修特遣耑官式循舊典兾益贊雍熙之治尚永貽仁夀之休俯鑒精忱用垂歆格祭南嶽衡山文維康熙五十二年嵗次癸巳月朔越日皇帝遣通政司左通政兼叅領羅占致祭於南嶽衡山之神曰維神表正離宫綱維南紀靈鍾岣嶁秀挺祝融朕纘承鴻圖撫臨區宇殫思上理夙夜勤求惟日孜孜不遑暇逸兹御極五十餘年適當六旬初屆所幸四方寧謐百姓乂和稼穡嵗登風雨時若維庶徴之協應爰羣祀之䖍修特遣耑官式循舊典兾益贊雍熙之治尚永貽仁夀之休俯鑒精忱用垂歆格祭北嶽恒山文維康熙五十二年嵗次癸巳月朔越日皇帝遣太常寺卿李敏啓致祭於北嶽恒山之神曰維神標鎮冀方鍾靈北陸綱維坤軸拱衛神京朕纘承鴻圖撫臨區宇殫思上理夙夜勤求惟日孜孜不遑暇逸兹御極五十餘年適當六旬初屆所幸四方寧謐百姓乂和稼穡嵗登風雨時若維庶徴之協應爰羣祀之䖍修特遣耑官式循舊典兾益贊雍熙之治尚永貽仁夀之休俯鑒精忱用垂歆格祭中鎮霍山文維康熙五十二年嵗次癸巳月朔越日皇帝遣太常寺卿李敏唘致祭於中鎮霍山之神曰維神徳配嵩髙位侔衡嶽靈威有赫作鎮中邦朕纘承鴻圖撫臨區宇殫思上理夙夜勤求惟日孜孜不遑暇逸兹御極五十餘年適當六旬初屆所幸四方寧謐百姓乂和稼穡嵗登風雨時若維庶徴之協應爰羣祀之䖍修特遣耑官式循舊典兾益贊雍熙之治尚永貽仁夀之休俯鑒精忱用垂歆格祭西海文維康熙五十二年嵗次癸巳月朔越日皇帝遣太常寺卿李敏唘致祭於西海之神曰維神廣納坎流長涵兊澤百川永奠萬寳告成朕纘承鴻圖撫臨區宇殫思上理夙夜勤求惟日孜孜不遑暇逸茲御極五十餘年適當六旬初屆所幸四方寜謐百姓乂和稼穡嵗登風雨時若維庶徴之協應爰羣祀之䖍修特遣耑官式循舊典兾益贊雍熙之治尚永貽仁夀之休俯鑒精忱用垂歆格祭河瀆文維康熙五十二年嵗次癸巳月朔越日皇帝遣太常寺卿李敏唘致祭於河瀆之神曰維神泒衍星源精符雲漢百川咸納四瀆稱宗朕纘承鴻圖撫臨區宇殫思上理夙夜勤求惟日孜孜不遑暇逸兹御極五十餘年適當六旬初屆所幸四方寜謐百姓乂和稼穡嵗登風雨時若維庶徴之協應爰羣祀之䖍修特遣耑官式循舊典兾益贊雍熙之治尚永貽仁夀之休俯鑒精忱用垂歆格祭太昊伏羲文歴代帝王文同維康熙五十二年嵗次癸巳月朔越日皇帝遣左副都御史明安致祭於太昊伏羲氏曰自古帝王繼天出治建極綏猷莫不澤被生民仁周寰宇朕躬膺寳厯仰紹前徽夙夜孜孜不遑暇逸兹御極五十餘年適當六旬初屆所幸四方寜謐百姓乂和稼穡嵗登風雨時若維庶徴之協應爰羣祀之䖍修特遣耑官式循舊典兾益贊雍熙之治尚永貽仁夀之休俯鑒精忱用垂歆格祭先師孔子文維康熙五十二年嵗次癸巳月朔越日皇帝遣户部右侍郎廖騰煃致祭於先師孔子曰仰惟先師徳符三極道冠百王集羣聖之大成垂萬世之至教朕髙山仰止嚮往維殷夙夜孜孜不遑暇逸兹御極五十餘年適當六旬初屆所幸四方寜謐百姓乂和稼穡嵗登風雨時若維庶徴之協應爰羣祀之䖍修特遣耑官式循舊典兾益贊雍熙之治尚永貽仁夀之休俯鑒精忱用垂歆格臣聞至治馨香感於神明黍稷非馨明徳惟馨盖王者德業隆盛治道光昌而後郊焉天神格廟焉人鬼享幽明合漠之故非偶然也粤稽皇古以来國有大慶則有告祭之禮其廵狩征伐望禋類禡不在慶典至於常星不見之夜祥光照室之期肇修祀典天地交通神人和恱史冊所傳未之有也我皇上道侔天地化洽神人咸五帝登三王文徳武功被四表而格上下平時敬天尊祖每逢祀典必躬必親懐柔百神及河喬嶽幸曲阜則躬奠孔林幸會稽則親祭大禹羣祀咸修萬靈和協休哉至治久矣光於神明矣茲萬夀六旬普天率土莫不喁喁向風以身際太平躬逢盛事歡欣鼓舞於光天化日之下民氣恱和至此而極以是而交於神明其感格當更有出於黍稷馨香之外者乃際此昌期特修祀典因禮臣之請而天地太廟社稷命大臣而行禮因恩詔之頒而五嶽五鎮四海四瀆歴代帝王先師闕里遣重臣而分祭燔蕭灌鬯感格隂陽玊帛犧牲交馳海宇凡兹承祭諸臣莫不仰體聖心寅恭肅穆以供乃事煌煌鉅典可不謂隆歟有唐開元肇興聖節亦有報賽之文然黄冠土鼓僅息田夫沈貍疈辜未全古法賽白帝豈如祭天地祖宗之隆報田祖豈如祭名山大川歴代帝王之重所謂上明元天光啟大聖下彰皇化垂裕無窮以今視昔規模大小豈得並論哉至若禮臣議奏不過循例将應遣官員列名上請已耳皇上以監賞之事即寄之致祭之官差遣不致重複郵傳免於繹騷一祀事也而恤兵愛民規畫盡善於以知聖天子沖穆之衷運六合於一心涵萬幾於宥密故隨所措施凡有禆於民者無不兼舉而並行之敬神即以勤民諴民因以凝休由是而錫眉夀介繁祉垂拱萬年與天無極豈非人和神恱之所必至哉萬夀盛典初集卷十四
