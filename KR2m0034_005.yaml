body:
  text: 欽定四庫全書萬壽盛典初集卷五聖徳二謙徳二康熙五十二年正月十三日兩廣總督趙宏燦等請建萬壽宫亭幷請御書匾額詔弗許正月十三日總督廣東廣西等處地方兼理糧餉兵部右侍郎兼都察院右副都御史臣趙宏燦巡撫廣東等處地方提督軍務兼理糧餉都察院右副都御史臣滿丕謹題為聖主六旬大慶臣等敬建萬壽宫亭以申華祝幷請御書匾額光昭萬禩事竊照康熙五十二年序屆三春令節恭逢萬壽昌期甲子初周普天同慶臣等伏惟皇上聖明臨御乆道化成五十餘年深仁厚澤愛育黎元久已淪肌浹髓而風聲所被無逺弗屆梯山航海之國莫不歸誠皇上之聖神廣大雖唐虞三代之隆未有能及也臣等恭逢盛世身受洪恩顧浩蕩之難名愧涓埃之未報謹於廣州城擇地鳩工捐建萬壽宫亭至期羣集舞蹈慶祝聖壽准將軍臣管源忠副都統臣何天培咨據駐防廣東八旗四營官兵各願捐建又據廣東布政使臣王用霖等具詳闔省司道府州縣佐貳雜職等官咸願捐俸共襄盛事以報皇恩幷據各鎮協營官兵闔省紳衿士民商賈紛紛環集臣等衙門具呈口稱感戴聖主髙厚之恩無由仰報萬一各願捐資助建堅請再三臣等目覩輿情真切但臣等仰體皇上恤兵愛民至意不費兵民一絲一粟隨諭文武大小各官捐俸建造猶如爾等捐建無異只須同来叩祝萬壽即是爾等誠心等語反覆慰諭幷允其上達天聽衆始欣躍叩首齊呼萬歳無疆歡聲震地所有官紳兵民人等踴躍慶祝情由相應奏明幷請皇上恩給御書匾額俾臣恭製懸挂時時瞻仰如覲天顔且使邊海黎元以及外洋彞人獲覩綸翰共相拜舞由此億萬斯年永祝聖壽於勿替矣臣等謹會同具摺奏聞三月初九日奉旨宫亭不必建造該部知道二十二日兩江總督赫壽等以五十二年三月十八日恭遇皇上六旬萬壽請上尊號詔弗許二十二日總督江南江西等處地方軍務兼理糧餉操江兵部左侍郎兼都察院右副都御史加四級臣赫壽謹題為聖徳獨高千古請上尊號以光大典以慰輿情事據江南通省紳士叢澍等呈稱紫極呈祥兆姓進升恒之詠丹宸掞藻臣工仰奎壁之光遡華祝於堯階效嵩呼於舜陛臣民抃舞中外騰歡欽惟我皇上道隆千古徳邁百王文敎覃敷普天興仁興讓武功丕顯薄海來享來王數十年蠲賑頻施史書罕見億萬載皇圗永固厯數彌長瑞靄氤氲春風披拂河已清而海已晏感瑞應於天庥老者安而少者懐詠熙皡於聖世恭遇康熙五十二年之寶厯欣逢皇上六旬萬壽之昌期澍等名列鵷行情深雀躍開閶闔於九天香飄華葢拜冕旈者萬國彩煥金莖祝蓂莢以延年傾葵衷而向日公籲陳情請上尊號伏願俞旨一頒史冊光昭於奕禩垂訓萬世懿謨逺邁於前王矣為此合詞恭懇伏乞繕疏代題等情又據江南儒學文武生員吳啟昆等呈為聖壽之花甲初度輿情之愛戴彌殷恭懇代題請上尊號以垂盛典事呈稱竊惟景運靈長際升恒而竝燦鴻圖鞏固侔天地以同春揚復旦之光華慶中天之徳曜欽惟我皇上宏開壽域徧覆慈雲斗指宸垣天運麗長生佳節星輝南極人心快有道昌期疊沛深仁屢下蠲租之詔𢎞敷大澤頻頒宥過之文崇祀先賢配明禋而升位優隆後學廣科甲以連茹斯誠亘古所未見真乃萬世所難逢苐以九重髙逺儒林之感頌難通而一徳同心帝座之敷宣有路伏懇片言轉為入告請於萬壽之辰允上至尊之號庶愛戴不以微賤而遺輿情端藉代題得達矣等情又據通省水營兵丁李興長等呈為聖徳彌崇普天共戴仰懇代題請上尊號以光鉅典以慰輿情事呈稱一人有道四方歌樂利之休仁壽無疆萬國慶昇平之治恩波惠澤本浩蕩以難名履厚戴高效嵩呼而恐後光騰北極瑞應南天欽惟我皇上文謨武烈堯勲舜華體乾德之健行民安物阜秉坤貞以淵穆海宴河清文德覃敷訖聲敎於海宇武功赫濯靖烽火於遐陬興長等戎馬行間兜鍪下士久沐豢養之殊恩更荷鄉科之曠典恩膏稠疊莫報涓埃恭逢萬壽昌期敢效華封之祝遥叩九重宫闕難通螻蟻之忱為此合詞公籲代為題達請上尊號用慰輿情恩綸一下萬姓歡呼版冊昭垂千秋生色等情又據耆民張國祥等呈為聖壽彌高黎民歡慶公懇代題以達誠悃事欽惟皇帝陛下功蓋湯武德邁唐虞偃武修文彌著聲靈赫濯崇儒重道聿昭懿徳光華愷澤覃敷於萬方徽聲宣播於千載維兹三月十八日恭遇皇上六十之昌期五十有二年適逢聖誕周甲之大慶箕疇斂五福啟萬年永命之期華祝願三多協千載貞符之會九州四海白叟黄童願將版籍之年庚獻作一人之厯數請崇尊號以揚盛典伏乞俯鑒下情特疏具題使小草之向陽有志輿情之愛戴彌殷得以上達等情各具呈到臣據此欽惟我皇上德合乾坤治隆堯舜金甌永固邁功業於百王玉燭長調開太平於萬禩寰區敦教化從来未臣之邊陲已臣宇内戴仁威自古未闢之版圖盡闢春光披拂快值良辰瑞靄氤氲欣逢聖誕中外覩河清海宴朝野樂物阜民安叨覆載者五十二年共慶厯圖伊始被化育者億千萬國同祝聖祚無疆備禄位名壽之全極文武功徳之盛宜著非常之大典以垂萬世之𢎞謨今據江南通省紳士叢澍等生員吳啟昆等兵丁李興長等耆民張國祥等請上尊號以光大典以慰輿情各具呈環臣衙門公懇代題臣見紳衿士民兵丁仰望之切實出至誠不敢壅於上聞謹據輿情恭疏具題伏乞皇上睿鑒俯賜俞允施行臣會同總督漕運臣郎廷極總督河道臣趙世顯江寧巡撫臣張伯行安徽巡撫臣梁世勲江南提督臣師懿徳合詞具題為此具本謹題請旨二月十五日奉旨已有旨了該部知道二十九日福建巡撫覺羅滿保請於臺灣建萬歲龍亭恭祝聖壽詔弗許二十九日巡撫福建等處地方提督軍務都察院右副都御史臣覺羅滿保謹題為皇恩浩蕩薄海歡呼臺郡籲建萬歲龍亭以祝聖壽事欽惟皇上乃聖乃神允文允武建地久天長之業四海傾心立王馳帝驟之勲萬方歸極厯周甲子久看海不揚波運合貞元遥聽嵩皆呼祝兹臺郡雖居海外幸際昌期競思拜舞霑膏澤而風和雨潤凡山川阡陌共被恩波興文教而雲爛日華即草木禽魚咸登樂國及孤有恤恒忘庚癸之呼挾纊知溫樂効馳驅之職夫惟一人之湛恩汪濊滄海同深是以衆志之抃舞歡欣康衢共祝兹於臺灣府治之永康里敬建龍亭恭慶萬壽旣准臺灣鎮道據紳衿耆民兵丁番黎等呈詞幷所屬文武申請詳報前來臣不敢壅於上聞相應具疏謹題三月初五日奉旨已有旨了該部知道二月初六日浙江巡撫王度昭請建萬壽碑亭幷請御書匾額詔弗許二月初六日巡撫浙江等處地方提督軍務兵部右侍郎兼都察院右副都御史加三級臣王度昭謹題為聖壽之綿長共慶輿情之頌禱彌殷願建碑亭以遂瞻仰事據闔屬紳衿士民汪朝等呈稱蓂莢産伊耆之世衍厯無窮洛書出文教之朝添籌莫算享脩齡而多祉祝詞最善於封人本大徳以得名福應尤稱於孔子凡皆聖主之盛事詎如今日之𢎞庥欽惟我皇上徳協乾坤既博厚高明悠乆之皆至道隆今古復聖神文武仁智之咸周學貫天人探典墳於勅㡬之暇藝超漢魏録金石於勤政之餘言治必澄本以清源敷教則緩刑而尚徳克勤克儉苧蒲襏襫皆入耕織之圖惟恕惟平犴狴桁楊悉登仁壽之域蠲租之詔疊下化為四海炊烟發賑之典頻行盡被九州雨露至耆老上蒙恩䘏遐邇胥歡在節孝仰沐褒崇幽潛亦顯虛恭禮下壽考作人西清接講幄之臣恩全終始南館盛登瀛之士彚拔茅茹頖額頻加芹水魚龍競起制科增設棘闈桃李爭芳文教覃敷武功兼懋闢從來未闢之疆土一統車書隷自古未隷之臣民萬方玉帛是以海隅日出悉仰皇仁僻壤茅檐普霑帝澤莫不婆娑於日升月恒之代休養於河清海晏之時矧夫浙省屢遘時巡尤霑天澤免漕曠典特厚於苕霅之鄉賜稅𢎞施先被於吳越之地民生廑慮籌積貯以防饑歲祲勞心遣臣僚而監賑築海塘而金錢不惜永靖風濤濬水利而溝洫皆通無憂旱澇民安物阜早知姬厯無疆景淑春和恭遇堯年周甲毎懷至德莫遏羣情三竺六橋稱兕觥而欲獻鴛湖鵡水為春酒以介睂太末耆黎瞻天叩首稽山士女望闕呼嵩合樸遫之愚忱慶休嘉之盛遇伏懇俯從輿志請建碑亭鋪張莫上之𢎞規揚厲無前之偉績將見穹碑屼嵲與聖節而恒留畫棟輝煌竝皇猷以久峙庶飲和食徳旣詠歌卜年卜世之謨而望日瞻雲得常表誠歡誠忭之志矣等情又為四民同盛皇仁衆商尤霑聖澤願效封祝以展輿忱事據兩浙鹽課商人汪福玉等呈稱竊惟午市開於帝世久傳無虞無詐之風鹽莢盛於姬朝共說利國利民之術蠙珠石磬禹貢早記其文橘柚菁茅職方亦志其物必使出塗者咸頌要期藏市者胥歡惟我皇上六府孔修旣金木水火土穀之咸裕三事允治復正德厚生利用之皆宜勤以導民四海自安樂利之舊儉以立則一人不乏澣濯之風本末兼資已見菽粟多於水火珍奇不尚自將珠玉賤於泥沙弛海禁以予民吉貝金顔盡供服御開關門以懷逺雞香花蕋悉佐恒需𣙜使必遴其人巡鹺更重其任俾擅心計者稱素封於寛大之時而逐廢居者獲恒足於雍熙之世虎鹽玉米得佐烝嘗楩楠豫章足資梁棟㡬見金刀朽貫屢逢紅粟遺塗統由至德之涵濡以致比里之殷阜且因浙中商盛特加泮水額名郡邑三庠多士沐菁莪之化歲科兩試百人仰雲漢之垂户户絃歌奎壁光騰於斥鹵家家誦習縹緗焜煜於鹽人樂文治之無遺感天恩之丕著序惟三月春滿千郊欣逢聖主耳順之辰實深草野嵩呼之願在昔翠華屢幸濵海共識天顔惟兹聖甲初周江甸咸思華祝東來紫氣籠罩於龍山鳳麓之間北望祥光徧覆於越水吳山之境鶯啼柳浪盈眸咸若情形魚躍花溪滿目嬉遊景物杏村酪熟爭思挈榼以陳茅舍釀成競欲躋堂而獻舳艫雲集於柳市共聆動地歡呼燈毬烟繞於花城恍接鈞天笑語苐留金石之蹟庶存美盛之觀伏懇俯鑒商忱永鐫碑記築亭於萬姓觀瞻之地垂輝於千秋頌禱之區從此閱十載而逓新巍峩增建將見歴萬年而不朽金碧長輝庶挾筴謳吟嘗仰高天厚地而擔書誦讀時忻就日瞻雲矣等情又為兵弁久沐君恩聖壽欣逢周甲羣情踴躍請建碑亭事據撫提通省目兵張鳳政等呈稱竊惟聖德與天地同其悠久史册輝煌皇猷與河嶽竝其貞恒詩書炳赫軒帝著武威於涿鹿祕發仙傳殷宗振撻伐於淮方謨標星輔夢傳九齡之異治惟百歳之勤固多文徳之𢎞宣實羨武功之懋著孰如我皇上德威遐暢合東西南朔以来王謨烈光垂兼禄位名壽之具美漸仁摩義治化軼漢唐宋而加淳樂備禮明制度兼夏商周而益善南平三孽北靖諸蕃運淵深之妙算如江如漢虎旅一振而螳臂旋摧出敏㨗之神機若霆若雷隼旟乍摇而狐鳴絶響於是幅員極於莫外疆域靖以無虞惕震疊之聲靈共球畢至凜潛滋之教化詩禮遥馳雖已櫜矢橐弓而備常不廢亦旣閱兵講武而學必兼明校騎以察其能毎聞溫語臨賜以厚其意恒沐殊恩赳赳武夫得與鷹揚之宴桓桓虎士獲看禁苑之花峻極宫牆禮叅一體煒煌上諭講解羣聞糗糒惟時兜弁飽騰於帳下芻糧無缺驪黄奮迅於營中思豢養之有年感涵濡之已久矧江城組練樂時巡而獲覲天顔海甸水犀遇親操而常䝉恩賚巍峩孤嶼儼披閶闔千門淡蕩西湖曽效昆明萬旅已極一時之盛自然百世難忘今逢聖甲初周倍覺輿情欣躍柳營日永千花盡學葵傾虎帳樽開一觥共思芹獻旣喜河清有頌浪涌桃花更幸海晏無波雲開瀛島望觚稜而遥叩三祝堪誇瞻斗極而歡呼九如足繼但必鐫諸碑記始能久峙山河籲懇允建碑亭用慰羣願俾投戈講學仰止弗諼且戴徳銜恩謳歌不置庶五十餘載之惠澤與越水而長流而億萬斯年之厯傳共吳山而永固矣等情布政使司徐欐等會詳欽惟我皇上道配乾坤覆載必貞乎悠久明同日月照臨咸戴夫升恒聖徳神功普天同慶深仁厚澤率土均霑欣逢六旬撫御之昌期正乃萬年厯數之伊始覩太平之盛事頌聖壽之無疆兹據通省紳衿商士兵民合詞公報竪建萬壽碑亭以繼九如之祝永垂頌禱之區等情到臣據此欽惟我皇上治隆今古德邁唐虞化育同天啟仁壽無疆之域恩膏匝地開聖神有道之長欣逢五十二年之昌期恭遇六旬萬壽之初度普天同慶率土騰歡據此輿情懇切臣不敢壅於上聞謹題請旨三月初二日奉旨碑亭不必建造已有旨了該部知道萬壽盛典初集卷五
