body:
  text: 欽定四庫全書萬壽盛典初集卷一百十歌頌五十生監諸臣一萬壽無疆普天大慶賦監生臣董伸聖天子御極五十有二年歲次癸巳月紀丙辰卿雲晝爛景星夜明醴泉溢地芝草盈庭陽曦雙珥桂皓重輪瑞光晃耀而融朗嘉氣靉靆而氤氳河出馬而圖獻洛浮龜而書呈巢阿閣兮悉丹山之威鳳遊靈畤兮盡西極之祥麟巨棗逺獻兮來由蓬島蟠桃遙貢兮奉自崑崙戩榖之徵符畢集罄宜之靈貺咸臻夫是為聖天子億壽添籌之始而適當周甲大慶之春也維時大小臣藩逺近旄倪天涯地角海澨山隈窮髮不毛之族雕題鑿齒之黎莫不欣欣喁喁皥皥熙熙身效舞韶之獸心同向日之葵齊赴丹闕各叩彤墀賡純嘏之永固頌茀祿之攸宜願聖天子御玉座駕金輿召羣工以陪從飭秩宗以陳儀舞羽干與珌戚奏雲門與咸池告成功於蒼昊答隆禮於坤祇巡岱行封禪之典摩崖勒勳德之辭表休嘉於中外著徵瑞於華彝使人知聖皇之膺百福備千禧固如是其昌熾為昔后所莫幾者也乃我皇上聖德同天虛懷若谷播汗渙於絲綸却禱頌於章牘辭天保之九如謝華封之三祝述憂勤於宵晝傳惕勵於隱獨惟欲長治久安家豐户足俗敦古處士崇正學子盡孝於家庭臣效忠於君國以此介壽藉是景福則庶幾虛文之勿尚而實意之足録豈非我皇上望道未見之心雖蕩蕩巍巍固愈形其謙衷之肫篤乎然而聖意彌謙輿情益甚伏陛陳言善頌匪佞謂福在一人者為私福而慶在普天者為大慶我皇上治定功成德隆化盛跨湯駕禹逾堯邁舜由壽考之無疆斯勳業之莫並乃寰宇之大福宜歡忭之難禁則試為履數夫五十二年之內其所以覆載乎人民胞與乎逺近實億年億世之公祉而非獨一人一時之私幸者政恐飲和食德之羣倫履厚戴高之萬姓有枚舉而難窮并指屈而靡罄耳爾其奉若欽虔基命宥密法穆清之無私體乾健於不息既上下其同流復天人之合轍逮泰壇之通爟及南郊而對越配太祖與章皇列先農與后稷倍祀肅而禋明愈心齋而志潔祈榖有親撰之文燔柴有躬薦之璧推厯數兮明敬授考緯象兮志警惕上而日兄月妹朝夕維勤下而嶽公瀆侯禜雩必飭用是類禡俱歆天神胥悅屢降豐穰之庥永乏水旱之厄此皇上之敬天重祀其始終無間於五十二年之內而為普天之大慶者此其一乃若率由舊章恪循先制既無違於動履復凛遵於頒涖守武烈與文謨惕始勤而終替修三朝之寶鑑輯列祖之鴻矩功備載夫創守法不遺夫巨細裒懿行與嘉言詳立綱而陳紀窮歲月之纂集成卷帙之次第凡峻德與鴻猷咸羣萃而悉聚嫓黃農之邱索軼商周之誥誓珍諸太府若玉韞而珠藏播在明堂則天章而日麗以傳先烈等圖赤與琮球以貽後範則衡鑑而龜筮所以吾皇上五十二年之內緯武經文參天兩地皆其不愆不忘善繼善述所致也則其法祖遵先而實為普天之大慶者乃其二憶昔驕藩悍將節錯根盤或剖符於閩粵或錫履於滇黔或寄閫於楚蜀或握節於秦函類皆連城跨邑擅制專權乃獸心之罔饜忽螳臂之思搴逆幟乍張於荒徼妖氛遍熾於東南疑蜩喧而鼎沸訝蝎擁而蜂攢我皇上聖謨莫測睿算維完折衝樽俎制勝堂廉每籌兵而畫餉愈意靜而神間施芒刃於綮肯加斤斧於髀髖凡師指而軍向率醜殪而魁殱所以數年之內一賦不增一役不添農不廢耕商不輟廛翦巨憝兮等拾芥殄羣蠢兮同刈菅除纍世之隱患致海宇之復安則其內平諸逆而為普天之大慶者乃其三考夫虞夏以來詩書所紀獯鬻盛於商初玁狁強於周季冒頓常擾漢邊柔然屢侵魏鄙突厥與唐祚為始終契丹偕宋厯而興廢間弭伏而和親終猖獗而煽熾我皇上神威遐布德化遠被凡穹廬之外族悉款塞而內侍突有噶爾丹者恃其險遠逞其狡鷙貢職罔修凶鋒是肆擁僧格之餘衆侵哈密之右臂邊境為之繹騷藩籬遭其毁棄聖怒斯赫天討莫貰秉白旄與黃鉞躬長駕而逺馭先命貔貅之將斷其敗竄之塗繼總熊虎之師搗其廬帳所倚渡瀚海而疾馳抵拖諾而奮鋭果豕突而狼奔卒獸剃而禽刈登燕然而銘功進玉門而飲至從此朔漠清寧疆圉奠乂鴈磧多扶杖之叟龍沙無荷戈之士則我皇上之外攘巨寇又實為普天之大慶者此其四乃其道接中天學尊尼父崇四子之成書詳六經之遺詁探性理之淵微究典籍之繁瑣勤講讀於甲丙辨邪正於今古斥釋老而勿尚惟孔孟之是主固已參倚如見羮牆欲覩乃復仰高行景巡兖幸魯行釋奠於孔林習大射於聖圃揮毫定萬世之師作志傳闕里之譜自顔曾以及思孟羣邀宸贊之輝煌從濂洛以迄關閩各播天章之璨瑳又念集諸儒之大成惟考亭其獨數爰進位於十哲勿仍列於兩廡由是入膠序者識道統之傳心遡源流者知私淑之接武爼豆為之增光紹述因而愈溥此皇上之崇儒重道實即為普天之大慶者此其五況夫留神吏治勵精求瘼旰食宵衣達聰明目敷政則利弊之周知用人則賢否之洞燭不忘不泄昭百度之煌煌懋德懋功表四門之穆穆象魏既無叢脞鵷班復鮮佞曲猶念保世乂民惟在愼吏擇牧茍撫字之得人即惠愷之共沐爰博採夫循良用分理夫方域上而封疆大職誥誡不厭其煩下而州邑微員廷見不嫌其瀆務量能而授任勿違材而覆餗至於激濁揚清崇廉斥黷尤聖照之無遺而乾綱之獨握寇君賈父雖獲咎而恆寬乳虎蒼鷹縱微長而必逐宜佩綬者幸龔黃之聯軫而綰篆者頌召杜之盈轂草野賴其旬宣億兆資其位育此皇上之勤政知人又即為普天之大慶者乃其六而且菁莪作人薪槱儲傑愛士如珍求才若渴識相如於上林詢賈生於宣室闢門開宏博之科臨軒拔天人之策所以數十年來石渠天祿盡繡虎而雕龍藝觀蘭臺備春華與秋實乃旁求之意殷謂書升之數窄丙丁甲乙倘羅狹而網疏書判身言必珠遺而玉失爰添省試之名旋廣禮闈之額或五經或七藝寧舊制之是拘或成例或特科必真材之罔抑務使華國閎儒相踵武以登瀛勿致窮經皓士徒夢飛而貼月既博取夫才華復群勵夫德業採芹樂泮即瞻訓飭之文釋褐彈冠更蒙教習之益兵農禮樂咸研詢而講求性命身心備磨琢而磋切此日作楨聖世無非麟鳳圭璋他年宣力皇朝自盡鹽梅舟楫則普天之大慶又即在我皇上愛育人材者乃其七今試遊桐柏之川溯龍門之硤觀吕梁之洶涌覽洪澤之澎涾昔萬斛之艱渡今一葦之易達昔軸撼而維搖今波恬而浪狎昔漂平土時沉竈而産蛙今耕水濵咸荷鋤而負插何昔也馮夷之肆威而今也陽侯之斂虐蓋由我皇上勤心排決勞神疏瀹屢巡幸夫淮黃親指授夫方略相地形之崇卑權水勢之強弱捐內帑而鳩工簡重臣而分轄築高堰之新堤開攔黃之舊閘濬引河而橫流之得泄刷清口而淤沙之盡豁為馬牙樁為龍尾掃庀材無尚虛聲為桃花水為爪蔓流防汛務期預察所以金繩玉牘勿咨昏墊於三門沉璧刑牲無慮懷襄於六塔北而紫牙河永定河利濟者歌帆影之蹁躚南而白茅江吳淞江順涉者慶艫聲之咿軋未嘗不歎明德之獨遠而長策之堪法則我皇上之平成奏績又實為普天之大慶者此其八且也我皇上藏富閭閻施恩畎畝稅斂惟輕賑蠲從厚真普德而遍澤復宏濟而博受昔秦歉而齊飢幾弱填而壯走儼堯時之水橫同湯世之旱久臨淄即墨嗟屏翳之霃霪杜鄠咸陽困肥遺之紛糾聖心惻以彌殷皇仁沛而孔阜急挽粟而輿金散荒簷與窮牖招失業之蒼黎活轉壑之黃口蘇陸海之涸鱗潤焰谷之焦蔀故能不數年間齊地重慶絃歌秦川復明花柳暨江浙之微祲即補助之恐後弛販糴之禁令通楚蜀之糧糗救災則德可回天解饉則功侔反手至賜復於平時尤疊見而非偶捐正供於地丁減雜賦於林藪寬一十五國之金錢除數千百萬之逋負里胥下役不復傳呼於癸庚業户窮氓免候追徵於卯酉立常平而榖價不慮其復騰廣積貯而米多或因之易朽此皆惠洽寰區澤非升斗宜乎遺秉滯穗和氣屢致夫豐年鼓腹含哺歡聲恆兆夫大有爰稽首頓首而共進曰我皇上之頻賑迭蠲又實為普天之大慶者是其九粵稽書志五刑禮詳八辟周世傳吕侯之命漢家垂蕭相之律凡以弼教糾民防淫警慝固無刑之共期亦天討之是即我皇上摩義漸仁齊禮道德兆庶髓浹而肌淪姦頑心洗而靣革貫索為之常空圜扉可以不設逮間入於科條即愈深其愷惻浩浩乎成湯解網之祝肫肫乎夏后下車之泣實亘古所未有而從前所莫及但見當其始也明允悉登武健盡斥嘉破觚之平反禁深文之羅織寧吞舟之幸漏勿燃犀之誇晰及乎秋官定爰士師奏核五辭畢具九讞並列既難寬於十程復罔宥夫三尺聖心靡寧皇衷倍惄爰素食而齋居備審愼而矜恤沛宏慈於赤衣垂大惠於丹筆或議貨而上法夫雨雷或賜緩而取象於風澤無不感溢邱梧恩深林棘況平時之好生頻肆赦而播釋意萌則籥動杓虛議定則烏啼蠅集三代圄空刑措往古獨繼其休百年去殺勝殘從今始信其説則所謂普天之大慶即在我皇上之愼罰省刑者此其十不寧惟是彼夫春講秋誦勤經筵也採逵剖璧購遺編也臺針省銘警曠官也院甄寺别惕素餐也南巡西狩訪民艱也歷嶽遍瀆誡懷安也圖繪耕織重桑田也賜帛給粟崇高年也投珠抵璧嗜好捐也服浣御濯節儉先也考三角究八線推塵杪而測坤乾也辨黃鐘審大吕别雅鄭而定宫懸也詩則追蹤雅頌文則並駕典謨吐德音而詞章之絢日而炳天也書則龍跳虎臥射則穿楊洞札備多能而材藝之軼後而超前也此又我皇上之神授天縱有難以數計而名言者而普天之大慶尤不止於億萬而百千者也然則我皇上之駿烈偉業巨德豐功較唐而貞觀不足並其盛比漢而文景難以嫓其隆擬成康則勳高而績茂方湯武則道優而學崇緬古重華放勳軒轅羲農合數帝而為一始可近似而髣佛約略而形容自宜天鍾其瑞地育其靈山川發其佳秀草木耀其菁英無不羣獻於萬壽之日齊效於大慶之辰則試觀月示其恆日示其升象聖壽之方始而遞增也松示其茂柏示其青象聖壽之歷久而彌榮也南山昭其屼嵲北嶽著其崢嶸象聖壽之敻絶而峻極永峙而長寧也溟渤汪洋而㴐渺江河傾注而奔騰象聖壽之滔滔而莫竭浩浩而靡津也此皆頌於不言祝於無聲觸耳目而皆是合宇宙而俱盈我皇上不能却天地萬物之默慶嵩紀隱頌椿齡則亦何辭乎中外臣民鼓舞頌禱之意歡欣叩祝之誠於是普天率土萬國九州盡扶桑與碣石窮寒磧與炎洲凡有血氣之類共為知覺之儔或梯山而航海或重譯而馳郵或挈類而携族或贏糧而裹餱或束縢而躡屩或扶藜而杖鳩悉入覲而來會等雨密而雲稠齊捧戴夫玉瓚各酌注夫黃流效稽角於閶闔獻媚藎於珙球歡聲則濤翻海溢忭語則浪湧波浮雖聖意之固遜必微忱之共酬但見家同一喙人共一心極紛遝而難紀實簡約而易聽總願自今以往生生世世子子孫孫歷天長與地久常奉此有道之天子而永戴此厚德之聖人邁天皇地皇與人皇駕廣成聃耳與籛鏗計歲則羲和乏術算年則容成謝能則庶乎臣民之意慰而中外之情伸而不知此又為我皇上分內自然必得之事而中外臣民究未嘗稍抒其愛戴之意微報其覆育之恩也微臣生逢昌運幸際休明識慚酌蠡感同戴盆偕愚賤而擊壤隨士庶而稱觥戒虛詞之申祝綴實事以成文雖挂一而漏萬實共見而公聞維願巴人之曲下里之音賴帝力而不朽托鴻業以常存謹賦萬壽無疆聯句詩有序監生臣張元鏡生員臣顧際泰童生臣張士鑑臣聞仁為萬善之長壽居五福之先盤古一萬八千春祥開天地軒轅二百四十載美嫓羲農堯舜君臨咸徵悠久禹湯致治並享遐齡故唐世封人祝聖王以多壽而周時召伯歌君子以萬年至德其何能名深仁必思善頌欽惟我皇上恩覃六合德邁百王文武聖神復見光華之旦祿位名壽恆齊覆載之仁躋民物於春臺群遊浩蕩登乾坤於壽域共沐雍熙恭逢聖誕時際韶陽甲子初周南極星明之候春秋日盛東方桃熟之年榮光上燭夫紫微瑞靄遙連夫黃道普天稱慶霞蔚雲蒸匝地騰歡衢歌巷舞臣等一介小儒三吳下質沐浴聖朝之教養優遊化日之舒長皥皥王民惟識耕田鑿井巍巍聖治咸思頌德歌功生居東海之濵來拱北辰之極春城桃李家家杯泛蓬萊帝闕煙霞處處人遊仙島太平有象雲五色而日重輪聖域無疆天高明而地博厚是用各竭心思爭效賡揚帝德雖蠡測管窺無當高深之量而蟲鳴鳥語亦知天地之恩謹製千言上稱萬壽率土朝金闕呼嵩祝聖王萬齡天祿永臣元鏡一統帝圖昌出震符軒厯乘乾御禹疆華星遙貫昴臣際泰紫氣上充房吐甲騰龍馬銜圖集鳳凰瑞徵垂法象臣士鑑泰運啓陶唐樂奏雲門響人遊化日長鈞霄開扈閣臣元鏡壽域奠鼇荒大德天同峻深恩海莫量臣民惟抃躍臣際泰巍蕩泯賡揚開闔三辰正修明七政詳提封章亥步臣士鑑都會澗瀍鄉淡泊天靈治徇齊日角祥仁踰商解網臣元鏡儉邁漢裁囊明察崇禋祀郊壇致肅將精誠馨黍稷臣際泰右享潔牛羊景爍申朝踐神光燭太常珠斿星䍡􅟞臣士鑑象輅玉鏗鏘籥舞聲容盛山罍秬鬯香來思歌禘祫臣元鏡鴻祉貺蒸嘗孝奉慈寧上歡承寢膳旁徽音隆典册臣際泰純嘏譜笙簧魯衛苞桑繫河山棣萼芳展親敦玉牒臣士鑑行慶溢銀潢餘蘖殊他尉連兵踞夜郎三驅六詔定臣元鏡一怒八閩攘兔窟營孤島鯨波阻大洋車才翻霹靂臣際泰舟已碎艅艎批搗臣宣力張施帝握綱八埏歸掌運臣士鑑億載奠金湯漢北臣熏鬻天西尉婼羌南封瀰浩澤臣元鏡東境盡扶桑絶塞俄鳴鏑遊氛擅跳梁匹夫遙阻化臣際泰兩大視如傷白羽催飛挽朱提給辦裝魚麗文貝甲臣士鑑豹隊緑沉槍廟算規模濶神驅羽衛強甘泉騰馬足臣元鏡露布報龍驤石勒祁連雪花明瀚海霜出師方厲月臣際泰克敵在敦牂自是擒封豕非同獲白狼闐闐旋魏闕臣士鑑矯矯獻虞庠時邁臨鄒魯星躔應角亢報功封泰岱臣元鏡發政坐明堂盛典恩波渥穹碑嶽色蒼崇文虔俎豆臣際泰摛藻煥宫牆正學尊經籍群愚醒瞶盲邱園頒束帛臣士鑑鐘鼓樂承筐蔥犗親原隰黃輿足稻梁賑蠲施樂歲臣元鏡補助見巡方富教加無已憂勤若未遑胼胝逾汲汲臣際泰樂利普泱泱帶水通漕運銜帆給太倉迢遙來積石臣士鑑清濁渾衡漳汜濫流無凖奔騰勢莫當洪流將底定臣元鏡盛世復懷襄雷動殷荒度乾旋闢混茫搴茭堙蕩潏臣際泰乘梮審低昻使者黃金簡神人白石糧無勞沈璧馬臣士鑑已自召倉箱蔥蒨阡連陌渟泓水止防平成還較盛臣元鏡功業永相望隴秀雙岐麥飈馳百尺檣宸襟多恱豫臣際泰田畯得端相解澤迎鑾沛珍禽繞蹕翔歡聲喧越會臣士鑑淑氣靄吳閶方綵湖山麗軨軒禾黍穰農疇喜雊雉臣元鏡官舍蔽甘棠柢枑油雲覆溝塍湛露瀼室家安且吉臣際泰耆老壽而臧舶貢神香紫源探星宿黃上林生箑脯臣士鑑大麓出銀麞景慶從心至清寧協德匡聰明猶巽入臣元鏡精粹等乾剛求諫懸旌木延英立廟廊御門頻問夜臣際泰封事肅垂裳璇室圖耕織牙籖插縹緗考辭歌糾縵臣士鑑遊藝振琳琅筆落雲章煥文成鳳彩揚汪洋吞學海臣元鏡光焰燭詞場道統承先聖儒宗擢紫陽開天敷性理臣際泰揭日照康莊算出容成表書翻委宛藏義皆窮閫奧臣士鑑學不輟炎涼多士心逾奮昌期化益彰菁莪添桂籍臣元鏡霞縷映奎芒化宇韶華富中天茀祿康龍飛開甲子臣際泰虎拜輯圭璋舜琯昭華玉堯尊沆瀣漿紀年書出洛臣士鑑迎日字含王桃實三千歲天衣十二章添籌齊泰華臣元鏡擊壤協宫商城闕爐煙合街衢錦幄張九門堆玉帛臣際泰萬國集梯航臣等蓬麻質欣隨士庶行尚同蛙在井臣士鑑敢擬鳳鳴岡頌聖情何極瞻天喜欲狂簫韶聲浩蕩臣元鏡鸞鶴色輝煌競效岡陵祝臣際泰思依日月光願言隨率舞同捧萬年觴臣士鑑萬壽詩五言律二首監生臣吳景果龍鳳開昌厯岡陵祝大年三才皇建極一德聖乘乾有地皆霑澤何人不戴天太平調玉燭百福慶綿綿其一九天開壽域大地沛春溫幸值休明日長叨化育恩求賢頒漢詔籲俊闢虞門藹藹王多士南山獻壽樽其二萬壽詩五言律二首監生臣錢元台雲錦天街麗歡呼萬歲聲衢歌爭獻壽封祝並抒誠琴奏南薰叶尊開北斗盈河清與海晏交口頌升平其一校書窺祕闥給札傍丹雯久飫三霄露常瞻五色雲仁風真皥皥小草亦欣欣願進無疆頌葵心奉聖君其二萬壽詩七言律二首監生臣于樹範祥雲靉靆護層霄共際升平賀聖朝杯進紫霞春正永日呈仙掌露初調交梨火棗稱三祝象管龍笙奏九韶禮樂喜逢全盛會陳詩都採入風謡其一車書一統邁唐虞不數周家王會圖烏弋黃支知日近雕題鑿齒識嵩呼聖人多壽恩方溥天子能文道自腴此際梯航來萬國無邊春色滿皇都其二萬壽詩七言律二首監生臣于枋聲教光華亘八埏曈曈旭日正長懸乾坤有地皆霑澤雨露何人不戴天桃實千秋來漢殿鳯儀九仞和虞絃箕疇華祝尋常事聖壽還過萬億年其一臣家三世沐恩光何幸躬逢舜日長聖代作人多棫朴書生報國愧文章才離緑野朝金闕也許青衫拜玉皇千載休明當景運春風多士競稱觴其二萬壽詩五言排律六韻監生臣陳之鶴介壽奉華筵奎光紫宿聯薰風蘋野瑟膏雨杏花韀甲乙千秋鏡科名萬選錢堯階同就日周雅祝如川玉簡登封遠金繩絡繹綿皇情多愛育萬福仰光天萬壽詩五言排律八韻監生臣高車帝德逾三古仁風扇九州升恆綿日月甲子富春秋南極光彌燦長庚彩欲浮天漿斟沆瀣王會集共球化入氤氲遍恩隨渙汗流士登千佛選才副四門求玉筍朝金闕鵷行拜鳳樓明良欣會合萬載奠金甌萬壽詩七言律一首監生臣虞潢真人御極永垂裳遐邇歡擎介壽觴千里曝芹趨野老九衢琛雉舞蠻王卿雲北闕群瞻瑞麗日中天倍覺長信史漫誇開闢事於今親見古三皇皇棚恭紀監生臣周朱耒等欽惟皇上至德廣運鴻化翔洽中外禔福遐邇蒙休臨御五十二年恭逢萬壽六旬大慶臣民抃舞率土同歡俯俞羣臣之請於三月十八日萬壽正誕之辰受賀頒詔大沛恩綸前一日進宫命虎賁毋警蹕俾臣民咸得瞻拜道旁皇上御涼步輦奉皇太后自暢春園進京諸王侍輦隨行曲盡尊崇大禮仰見皇上孝治天下從古未有維時春景融和惠風初扇祥雲四繞瑞日中霄當鳴鳩乳燕之時正柳媚花明之候自暢春園前至景山西門三十里珠燈錯落繡綵繽紛高閣霄連崇臺雲蔚祝天皇之壽考夾道稱觴歌化日之舒徐所居成市連綿不斷裝來錦繡河山熙皥成風譜出太平景象十五省土風物産駢羅一舍之中千百國白叟黃童笑語九天之上百靈呵護億衆皈依萬里而南萬里而北奉尊親者直如畿甸之間八千為春八千為秋祝純嘏者且軼羲軒之右先是歲首以來四表臣民八紘耆庶或陳龍帳或貢天衣或進萬壽之圖詠天不老或舉萬年之會祝帝長生或扶杖以歌衢或襁負而觀化或請輸金於天府商賈同心或將輿賮於皇家士民齊願南金東箭貢自荆揚木難火齊來從閩粵梁珠照乘楚璧輝山東吳翡翠之帷西蜀葡萄之錦我皇上止收菽粟不尚珍竒伏稔皇上務夲以重農歸珠而返玉歡聲徹數千里拜舞日億萬人洵盛事之難名詎史册之勝紀三月初二日御駕回宫見祈福祝聖者綵旃錦幄載路填闉特頒上諭以為若或先知必令止之今已成矣難毁衆志令傳之各處必求雨暘時若萬邦咸寧為先明訓煌煌聞而生感恭儉者聖人之德慈愛者父母之恩俯鑒輿情曲從衆志更求家給而人足惟冀時和而年豐既以天地之心為心即以蒼生之福為福九州六合盡屬甄陶海澨山陬咸歸怙冒是以聖王之勤恤語益加溫而寰字之尊崇情何能已炷香盈陌設綵連衢士女紛紜連襼而瞻豹尾旄倪雜沓企踵而仰鑾輿閭閻輸芹曝之忱憶兆識山龍之采覩此徯情之踴躍彌徵聖德之淵深我皇上益沛恩膏特頒大酺命天厨備克食數千席陳於御道左右諭令分給士庶魚鱗幄並雁翅筵排豐饌嘉肴文茵翠㡩香發蘋婆之果甘分大谷之梨牢丸既弱似飛綿薄夜亦柔如積素截來鵝肪巧製如環劈破羊脂探懷積雪南産之金齏玉膾未足多誇仙家之琅菜碧芝寧堪比數農商工賈父老兒童皆得飽御府之奇饈嘗上方之珍果厥角稽首歌舞歡欣共願我皇歷年萬萬永享升平壽域時康春臺日永敢敘聖朝之盛事垂為百代之鴻模自暢春園宫門前起首為諸王經壇翠接朱甍發雲霞於窗裏光連綵闕映日月於寰中玉葉金枝拜揚萬壽天工人巧璀璨九霄次為乾清宫總管首領太監等棚綵結門坊燈圍珠繡璫貂舞蹈誦皇極以傳經宫寺趨蹌捧壺漿而上食次為直𨽻九府臣民人等棚華屏曲闥蕙圃蘭塘蔭路柔枝濃隂如蓋緑籬嘉卉吐秀如雲復廊則縹眇以連綿高閣則參差而突兀繪來耕稼儼田疇阡陌之錯陳譜出桑麻宛經緯機杼之畢具牆上舞花而不落錦幄爭姸樓頭激瀑以交飛銀河下瀉春回閬苑桃千樹以舒紅日暖蓬萊柳萬行而布緑華燈四照光遍鼇山曲水紆流波溶魚藻林邱照耀雲日輝煌次為內茶飯房官員人等棚天杯承露采來雨甲煙芽御盞流香煮就瓊蔬玉粒仙人六膳爭調金鼎以開筵玉女三漿咸捧帝壺而祝聖次為算法滿漢效力人員等棚詣精三角該天地而總隂陽術溯九章測鬼神而知造化惟聖主旁求於歷數斯多士爭效夫馳驅次為原任包衣昻邦臣馬武同弟臣李榮保次為鄧光乾張鼎升等各展丹忱亦選勝地修闌蔭於階砌崇棟拂乎旻蒼珍玩雜陳鼎彝間列次為蘇州府屬臣民人等棚竹籬茆舍異卉奇花茶肆酒罏墨林書圃儼入吳趨之市登虎邱之山貿易有無百貨具集魚子深紅之纈今獨擅長蜻蜒縹碧之綾古曾入貢砑花箋紙製出長洲裝錦燈毬詩歌茂苑笠澤彈窩之石甲乙爭誇馬鞍奇巧之峯蒲蕉錯置婁江績苧裁剪舞衫雪井餅香氤氳奩鏡關開滸墅共織草以薦牀鄉過疁城盡鏤金而作畫凡此土風之好尚悉為物産之權奇來京國以觀光充市㕓而祝嘏更有花榭風亭遍陳棐几水邊林下盡設華茵是處笙歌無邊花柳御駕遙臨而止輦香雲載道以飄煙溫諭頻加天顔甚霽尤極一時之異數焉次為八旗暨直省候選候補官員人等棚屏張萬壽之圖字成蝌蚪詩獻九如之誦筆繞煙雲韻奏薰風合宇宙太和元氣聲高華祝遍乾坤壽域春臺次為松江府屬在籍臣民棚飛閣連雲華燈匝地更陳儀仗之嚴恭迓翠華之至落花芝蓋楊栁春旗金鸑鷟而將飛玉螭龍而若動次為江寧安慶等十三府臣民棚里溢絃歌塗交酒醴芝房三秀獻來瓊島瑶山桃實千年陳列玉窗珠户更有三階八户百栱千楹無不文以朱緑飾以碧丹清風萃而成響朝日耀而增鮮次為浙江省臣民棚九枝之燈五花之采香蟠壽字酒進長生如登檇李之樓千層煙雨似放西湖之棹萬狀雲霞若耶百斛醇醪甬東千舟海錯仙羊躑躅疑遊瀫水之間藥草翩翻恍入天台之市蔗山橘岫富春夲屬名區鶴嶺芝田麗水由來神境亭開孤嶼山號爛柯簇兩浙於畫圖萃百城之秀麗何啻山隂道上應接不暇也而我皇上恩膏稠疊中使頻仍緗核芳鮮盛來玉碗紫梨津潤擎出晶盤莫不嘗珍味而齒芬飫琳腴而果腹次為蘇州織造臣李煦江寧織造臣曹顒杭州織造臣孫文成率領鹽商人等共建經棚燈綵畢具繡栭鏤檻延曜光輝虬柱虹梁杳冥雲霧得聆天語之肫肫仰見聖容之穆穆豈獨一時之盛遇實乃千載之奇逢次為福建山東江西河南廣東廣西六省臣民棚彩椽六角繡幕三圍碧疏窈窕以玲瓏畫檻盤回而輝麗門垂碧柳户映緋桃一寸二寸之魚三竿兩竿之竹園林曲折店肆參差錦帳飄揚花幡焜耀如入武彝之曲幔亭之笙管凌雲如登闕里之堂聖域之金絲殷地羣識廬山之靣咸聞嵩室之呼海不揚波珠江洵稱樂土山無伏莽桂嶺悉屬熙臺扶擕者不遠千里叩祝者奚啻萬人皇上歡進一觴臣民齊呼萬歲次為山西陜西湖廣四川貴州雲南六省臣民棚紅燈肆設翠幄重遮舞蝶遊絲帶清飈而散影分花交柳映碧浪而成文采華嶽之蓮祥開十丈酌晉池之水壽永千秋楚蜀之錦綺連雲黔滇之珍賮耀日長橋掩映俯臨九達之衢復道紆回曲繞千尋之樹採茶競唱擊壤同聲跪捧霞杯咸識天顔有喜拜依玉輅欣聞帝語如春式擴殊恩用慰輿願次為長蘆商人等棚演曼衍角抵之戲極銀花火樹之觀環以藥欄間以籬落紅花翠篠掩映崇臺網户珠簾低垂繡幕亦極一時之勝概也次為五旗諸王貝子貝勒等以下覺羅以上棚圖雲緹幕映日彩旌貴胄天潢祝三多而拜舞珠庭日角陳五福而趨蹌樂奏鈞天歌聞解慍車書王會式揚雅頌之音風景華胥用進岡陵之祝次為巡捕三營棚夾路琪花珠旗動色繞營細柳玉勒搖風十萬鐡衣奉宸歡於三月五千犀甲獻壽酒於萬年次為西直門外各行市民棚衢歌巷舞紹唐虞三代之風璧合珠聫煥日月五星之彩遍地皆韶濩咸英之曲是處悉順成和動之音帝力相忘天休滋至此自暢春園至西直門外燈花夾路錦繡干霄火棗交梨頒來天上雲璈法曲聽徹人間而我皇上德容藹藹聖諭溫溫鳩杖拜恩擁含哺之父老雲郊濡澤滋被徑之桑麻依咫尺之霽顔咸知向化效媚兹於天子皆許言情斯誠時雍風動之休要非三代以下所敢並也駕由西直門進西華門內一路懸燈設彩魚貫珠聯祝聖瞻天駢肩接迹於是文以班聯武以爵序鳬趨鷺立咸舞蹈而歡忭虎旅龍韜盡濟蹡而肅穆王侯戚畹之家期門羽林之屬下逮商賈士民以及買賣諸色人等無不各選佛場廣陳仙樂時則吏部户部倉場尚書侍郎以下筆帖式以上等為一處西四旗前鋒統領護軍統領以下護軍以上為一處寧壽宫太監并茶飯房為一處寧壽宫老福金為一處內務府正黃旗包衣參領以下護軍以上為一處大理寺太常寺卿以下筆帖式以上為一處正黃旗滿漢蒙古都統以下官兵以上為一處禮部刑部國子監光祿寺鴻臚寺尚書祭酒卿以下筆帖式官學生以上為一處兵部工部尚書以下筆帖式以上為一處都察院通政寺太僕寺六科順天府大興縣宛平縣五城兵馬司等為一處東四旗滿洲蒙古漢軍都統以下官兵以上為一處東四旗前鋒統領護軍統領以下護軍以上為一處九門提督以下步兵以上為一處內閣翰林院詹事府中書科等為一處鑲紅旗滿洲蒙古漢軍都統以下官兵以上為一處鑲藍旗滿洲蒙古漢軍都統以下宫兵以上為一處四牌樓北衆鋪户小民為一處正紅旗滿洲蒙古漢軍都統以下官兵以上為一處直𨽻各省督撫提鎮率所屬來京官等為一處莊親王為一處西華門外衆鋪户小民為一處宗室為一處上三旗三十家包衣大以下蘇拉以上為一處包衣三旗廣儲司買賣撥什庫及買賣人等為一處內務府官學滿漢教習及學生等為一處關內固北口大糧莊頭為一處二月分掣籖未引見官員為一處上三旗包衣牛彔章京以下匠役以上為一處鑲黃旗正白旗包衣護軍參領以下護軍以上為一處御前太監等為一處此自西直門內至景山西門瀰漫香雲普現吉祥之彩莊嚴寶地咸生歡喜之心盛典躬逢較傳聞而倍切隆恩目覩實歡忭而難禁至於京城內外叢街委巷亦無不焚香頂祝結綵懸燈里不能名地難悉數雖復鋪張揚厲亦難擬諸形容即或摹繪雕鏤無由得其髣佛猗歟休哉皇上如天之仁煦嫗含覆至於如此是以臣民踴躍歡忭莫可名言夫甘露霖雨有時而竭陽春惠風有時而止惟太和之元氣鼓鑰於層霄熏蒸於庶彚流行於終古亭育於兩間感之即通觸之即應昆蚑由此蠕動草木由此萌芽幽蟄由此發舒枯稿由此滋潤易曰天地之大德曰生惟天大生惟地廣生惟聖人好生所謂贊化育而參天地也皇上心天地之心事天地之事包涵遍覆德洋恩溥熙熙皥皥沐浴聖慈淪浹肌膚群情暢遂譬則聚邱山以為粟哺人而無不飽也竭淮澠以為醪酌人而無不醉也而聖主猶綢繆吏治繾綣民依闢道德之門開仁讓之户使薄海同於饒衍斯上下共其恬熙斯真三五以來未有臻此盛治者矣凡兹慶祝之隆規儒臣恭請繪為萬壽圖垂之永久上既可其奏而我皇上敬老愛民撫育元元之盛心足為億萬斯年典則者臣等披圖之下復謹撰紀盛一篇自分管蠡淺識何能宣揚於萬一聊志大槩俾後之覽者有所考焉自今年以至萬萬年每遇十年正誕之辰編為一集皇哉唐哉與二典三謨同垂天壤此泰交之盛致治之夲也敢謹記之如右萬壽盛典初集卷一百十
