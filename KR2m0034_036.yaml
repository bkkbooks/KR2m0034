嚴恩至渥葢藏至險於大順之中使天下畏威六師知感誠所謂帝徳廣運乃聖乃神乃武乃文者矣今嵗萬夀之辰特沛恩綸覃施四海正嵩呼華祝之期偃武修文之日而聖慮深遠大賚所加不忘軍士内而京師八旗所統外而直省駐防督撫提鎮所轄綜而計之奚啻百萬悉分别等差槩從優渥内則由都統統領給發外則分遣大臣監賞一時士卒盡沐鴻休歡聲雷動咸厥角叩首仰頌升恒共慶千古未逢之曠典又命直省賞兵之臣討其軍實而簡閲之既沛之以恩又齊之以法震而不黷寛而不弛此荷戈之士所以感極而知奮者乎夫蠲租賜賑養老慈幼所以䘏民也閲視戎行厚其犒賜所以䘏兵也二者國之大政皇上育之以仁正之以義悉以精神恩意流貫乎其間故兵與民雖分而一厪宸衷軫念則咸歸怙冒無一物不得其所固宜沐浴膏澤者羣戴聖人之徳而欣欣於化日之舒長也尚何畸重畸輕之足慮哉其各省督撫提鎮代題謝恩章奏附載十數通以誌士卒感戴之誠云萬夀盛典初集卷三十六
