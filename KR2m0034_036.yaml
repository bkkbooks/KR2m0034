body:
  text: 欽定四庫全書萬壽盛典初集卷三十六恩賚七賞兵一康熙五十二年三月十八日萬夀覃恩詔給八旗䕶軍校前鋒及䕶軍各一年錢糧撥什庫披甲人各半年錢糧外省駐防兵亦照此例其曽効力行間年老閒住者均加恩賜户部欽奉恩詔銀庫賞給銀數一鑲黄等八旗都統咨取每月五兩錢糧覺羅䕶軍等每名各賞一年銀六十兩每月四兩錢糧䕶軍等并䕶軍校每名各賞一年銀四十八兩每月三兩錢糧漢䕶軍等每名各賞一年銀三十六兩每月五兩錢糧覺羅阿敦梅倫等每名各賞半年銀三十兩每月四兩錢糧撥什庫等每名各賞半年銀二十四兩每月三兩錢糧披甲等每名各賞半年銀十八兩每月二兩錢糧􅛸匠撥什庫等每名各賞半年銀十二兩每月二兩錢糧歩甲撥什庫外郎拜湯阿等每名各賞半年銀十二兩每月一兩七錢錢糧匠人等每名各賞半年銀十兩二錢每月一兩五錢錢糧歩甲等每名各賞半年銀九兩每月一兩錢糧拜湯阿等每名各賞半年銀六兩每月八錢錢糧鞭子人等每名各賞半年銀四兩八錢每月五錢錢糧閒散人等每名各賞半年銀三兩共賞給銀二百五十六萬三千五百三十兩一武備院咨取每月一兩錢糧沙河氊匠等每名各賞半年銀六兩共賞給銀一千五十六兩一鑾儀衞咨取鑲黄等三旗每月二兩五錢錢糧校尉大鼓手大等每名各賞半年銀十五兩每月二兩錢糧校尉鼓手等每名各賞半年銀十二兩每月二兩錢糧請轎民校尉等每名各賞半年銀十二兩每月五錢錢糧七所執駕民校尉等每名各賞半年銀三兩共賞給銀一萬二千八百一兩一太僕寺咨取每月一兩錢糧左右兩翼馬羣固山大阿敦大梅倫阿敦人等每名各賞半年銀六兩共賞給銀一萬一百八十二兩一慶豐司咨取每月一兩錢糧牛羊羣阿敦人等每名各賞半年銀六兩共賞給銀八十四兩一上駟院咨取每月一兩錢糧馬駝羣阿敦人等每名各賞半年銀六兩每月二兩錢糧上都逹布遜諾爾馬駝羣逹里岡艾馬駝羣阿敦大梅倫阿敦人等每名各賞半年銀十二兩每月一兩錢糧阿敦大梅倫阿敦人等每名各賞半年銀六兩每月二兩錢糧醫生等每名各賞半年銀十二兩共賞給銀一萬八百八兩一盛京户部咨取盛京三陵并盛京等處撥什庫拜湯阿兵丁等共賞給銀三十五萬兩一查哈喇等處每月二兩錢糧䕶軍等并䕶軍校每名各賞一年銀二十四兩每月二兩錢糧撥什庫拿賊兵丁等每名各賞半年銀十二兩每月一兩錢糧披甲鐡匠并䝉古閒散人等每名各賞半年銀六兩每月五錢錢糧受傷閒散䝉古等每名各賞半年銀三兩共賞給銀六萬三百五十七兩户部欽奉恩詔縀疋庫支給曽効力年老人等總數一滿洲兵丁原曽披甲効力并年老告退人等共二千五十一名每名各賞山西生絹一疋三線白布三疋共賞給西絹二千五十一疋三線布六千一百五十三疋户部為欽奉恩詔事康熙五十二年三月十八日恩詔内開一昔年存亡之秋在在用兵朕所親歴今雖承平而武備不可不謹故時加訓練八旗兵丁盡已精鋭茲特大沛恩賜䕶軍校前鋒及䕶軍各賞給一年錢糧撥什庫披甲人各賞半年錢糧外省駐防之兵亦照此例欽此相應行文直𨽻各省督撫将軍将實在駐防兵丁查明動用現貯司庫銀兩遵照恩詔賞給務使各人均霑實惠仍将動用錢糧并兵丁數目造冊報部可也一直𨽻保定等十九處駐防撥什庫披甲兵共二千一十一名各賞給半年錢糧共賞銀二萬九千三百三十四兩一江南駐防八旗撥什庫三百三十六名每名半年銀十八兩披甲兵三千六百六十四名每名半年銀十二兩共賞銀五萬十六兩一京口駐防八旗撥什庫四百二名馬兵一千五百九十八名歩兵一千名砲手六名隨旗當差民砲手三十四名銅匠藥匠四名戈什哈三名弓匠鐡匠十六名共賞銀三萬三千五十四兩一浙江駐防八旗撥什庫三百九十二名披甲兵二千八百八名共賞銀四萬七百五十二兩一湖廣荆州駐防八旗小撥什庫三百三十六名披甲兵三千六百六十四名共賞銀五萬零一十六兩一福建駐防撥什庫披甲馬歩兵丁二千四十二名共賞銀二萬二千七百六十兩一山東徳州駐防撥什庫三十四名披甲兵三百三名匠人四名共賞銀四千二百七十二兩一山西太原駐防正藍鑲藍兩旗滿洲䝉古撥什庫四十名披甲兵三百七十三名弓匠二名鐡匠二名共賞銀五千二百二十兩一大同右衞駐防八旗滿洲䝉古撥什庫三百八十四名披甲兵二千六百二十名鐡匠一百一十二名䝉古撥什庫兵一千三百四十三名隨兵一十六名永吃餉銀閒散老人一名共賞銀六萬五千八百八十兩一陜西西安駐防八旗滿洲䝉古漢軍小撥什庫前鋒壮大五百三十六名披甲兵六千四百六十四名又川陜總督親隨滿洲披甲四十名共賞銀八萬七千六百九十六兩一廣東駐防八旗小撥什庫三百二十名披甲兵二千六百八十名砲手二十四名弓匠一十六名共賞銀三萬八千三百四兩四月二十二日己巳皇上分遣祭告大臣命即兼往各直省監賞緑旗兵丁務令均霑實惠其無祭告省分另遣專官四月初五日户部等部尚書臣穆和倫等謹題為欽奉恩詔事康熙五十二年三月十八日恩詔内開一欵各直省緑旗兵丁俱應加賞賚著議奏欽此欽遵查在京廵捕三營馬歩兵丁三千五百名直𨽻馬歩兵丁三萬四千八百一十二名江南省馬歩水師兵丁五萬四千七百七十二名山東省馬歩水師兵丁一萬八千四百名山西省馬歩兵丁二萬五千九百九十四名陜西省馬歩兵丁八萬五千六百二十三名河南省馬歩兵丁九千六百五十三名浙江省馬歩水師兵丁四萬六百八名江西省馬歩兵丁一萬四千一十三名湖廣省馬歩水師兵丁三萬八千五百七十七名四川省馬歩兵丁三萬六百二十名福建省馬歩水師兵丁六萬三千一百四十六名廣西省馬歩兵丁一萬九千三百三十一名雲南省馬歩兵丁四萬一千五百八十名貴州省馬歩兵丁二萬三百六十名以上緑旗兵丁共五十萬九百八十九名該臣等㑹議得康熙五十二年三月十八日欽奉恩詔内開一各直省緑旗兵丁俱應加賞賚著議奏等語現今趙申喬等前往廣東順便将該省緑旗兵丁動支司庫銀兩親行監看各賞銀一兩等因九卿㑹議具題行文應将廣東省緑旗兵丁不議外其京城廵捕三營緑旗兵丁動支户部庫銀照賞給廣東緑旗兵丁各賞銀一兩交與提督隆科鐸親行監看賞給至各直省緑旗兵丁賞給之處若交與督撫提鎮賞給恐兵丁不能得霑實惠亦未可定應将各直省派内大臣侍衞部院堂官俟皇上揀選每省各遣一員動支各該布政司存庫銀兩亦照廣東緑旗兵丁各賞銀一兩令伊等親行監看真正兵丁按名逐一查㸃散給務令均霑實惠俟命下之日将應遣大臣官員開列具奏可也本月初七日奉㫖依議提督九門歩軍廵捕三營統領隆科鐸奉㫖監賞京城廵捕三營緑旗兵丁五月十六日賞馬兵十八日賞歩兵三營馬歩兵丁共三千八百九十二名共賞銀三千八百九十二兩四月初六日禮部尚書臣赫碩色等謹題為欽奉恩詔事全疏載第十三卷祭告中本月十三日奉㫖恩詔内有各直省緑旗兵丁俱應加賞賚一款今各省鎮廟等處遣官致祭其賞賚緑旗兵丁之事即著致祭官員帶同監賞一次即可完畢不必再差且不致重復騷擾驛站若無祭祀省分另派官員前往這所差著查八旗副都統以下叅領以上并各部院衙門堂官開列具奏四月十六日禮部等部尚書臣赫碩色等謹題為欽奉恩詔事該臣等㑹議得禮部具題應差鎮廟等處致祭官員列名具奏奉㫖恩詔内有各直省緑旗兵丁俱應加賞賚一款今各省鎮廟等處遣官致祭其賞賚緑旗兵丁之事即著致祭官員帶同監賞一次即可完畢不必再差且不致重復騷擾驛站若無祭祀省分另派官員前往這所差著查八旗副都統以下叅領以上并各部院衙門堂官開列具奏欽此又查户部等部先經議奏疏内賞賚直𨽻各省緑旗兵丁應将内大臣侍衞部院衙門堂官各派一員差往等因具題奉㫖依議欽遵在案查盛京無緑旗兵丁賞賚廣東緑旗兵丁之事已交與左都御史趙申喬等監賞不議外直𨽻陜西四川江南浙江山東河南湖廣山西應令致祭官帶給其江西福建廣西雲南貴州等五省無致祭之處每省各遣官一員前往監賞将應差官員職名另行開列摺子具奏俟命下之日賞賚銀兩令其動支各省布政司庫内錢糧給與勘合由兵部給發可也臣等未敢擅便謹題請㫖本月二十二日奉㫖長白山醫巫閭山等處遣覺羅歪三致祭遼太祖陵遣殷濟納致祭南海遣馬雲霄致祭顓頊髙陽氏等陵遣王臣致祭黄帝軒轅氏等陵遣蔡升元致祭西嶽華山及江瀆等處遣查弼納致祭南鎮會稽山遣拉都渾致祭夏禹王陵及明太祖陵遣周起渭致祭東嶽泰山等處遣孫柱致祭少昊金天氏等陵孔子闕里遣廖騰煃致祭中嶽嵩山等處遣李先復致祭太昊伏羲氏等陵遣明安致祭南嶽衡山遣羅占致祭炎帝神農氏等陵遣陳汝咸致祭女媧氏等陵遣鄒士璁致祭北嶽恒山等處遣李敏啟致祭江西賞賚緑旗兵丁著額爾氣去福建賞賚緑旗兵丁著穆賽去廣西賞賚緑旗兵丁著許廷臣去雲南賞賚緑旗兵丁著瓦哈立去貴州賞賚緑旗兵丁著朱廷柱去餘依議四月二十八日都統馬雲霄等恭請聖訓面奉上諭祭吿有一定之例賞兵是要緊事督撫提鎮至千把總有一定的空糧朕都知道的是賞不得的各省多寡不等也有没有的也有頂名食糧的年貌不對你們查一查督撫的兵你們自賞提鎮以下兵㑹同督撫去賞不用提鎮各營頭都要到去你們賞了兵後馬歩箭也要看一看直𨽻山東河南山西陜西的兵都好陜西有一名兵糧缺出就有二三十人爭食此糧湖廣的兵近來也罷了江南浙江的兵都看不得若有一名缺出還有僱人頂名的凡應操演大家還要凑銀子與他們求免操演他們就不操了朕南廵時係大典不便細查近來武塲開科兵丁也都念些書曉些事你們去不可苛索你們的聲名朕裏面就曉得若有此等事你們還是人麽怎麽囘來見朕呢五月二十七日大學士温逹松柱學士舒蘭馬良綽竒啟奏折本奉㫖賞給直𨽻各省緑旗兵丁若令督撫每營到去恐致有悞地方事務督撫停其前往㑹同各該提鎮等閲看賞給著速行文直𨽻各省康熙五十三年四月初四日正藍旗䝉古都統臣穆賽等謹奏為欽奉恩詔事我皇上功徳夐隆恩威遐暢愛養軍民澤周利溥昨歲恭逢萬夀六旬正誕大沛恩綸普天同慶更加意軍士特命臣等頒賞直省緑旗官兵誠千古曠典也臣等恪遵諭㫖按名給散均霑實惠更校閲騎射試演火器大槩頗優而直𨽻陜西山東山西河南兵丁騎射尤加熟練人材亦多壮健衆兵丁仰承大賚自天共祝長生不老且各處士民擕老扶幼踴躍歡呼以為從來帝王所未有史冊所未聞至於秦蜀邊外及閩粤滇黔遠近番彝苗蠻猺獞黎岐聞恩命到時皆跪迎道左聚觀教塲羣北面稽顙備奏感恩之語咸申祝華之詞臣等躬逢盛事難罄名言謹将頒賞過直省兵丁數目開列於後為此具摺奏聞直𨽻賞兵官正紅旗漢軍副都統王臣直𨽻共兵三萬三千四百九十六名内除各官親丁三千一百三十六名新兵未補兵三百七十七名不賞外應賞馬歩兵二萬九千九百八十三名實賞銀二萬九千九百八十三兩陜西賞兵官内閣學士兼禮部侍郎蔡升元陜西省共兵八萬五千六百二十三名除各官一定親丁六千三百三十一名又各提鎮分外隨丁六百二十一名不賞外應賞兵丁