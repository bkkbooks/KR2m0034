body:
  text: 欽定四庫全書萬壽盛典初集卷九十八歌頌三十八武英殿諸臣二萬壽詩七言律各四首議敘知縣臣裘嚴生瑞氣彌綸六合中瑶光如月亘長虹人輸悃愊歸皇度天錫禎祥萃聖躬四海湯湯流愷澤九衢習習扇和風恩波正與韶華溥品彚昭蘇仰化工其一琪花瑶草慶韶年火棗交梨奉御筵堦下班齊黃閣老雲中樂奏紫霞仙湛恩汪濊原同海睿藻輝煌迥麗天至德至仁宜至壽陳詩奚啻九如篇其二萬樹宫花一色匀暖風遲日兆長春民忘帝力安耕鑿物戴天工沭化鈞薄海車書文教盛盈庭簮紱頌聲新微臣欲效華封祝齋祓相隨謁紫宸其三仙掌晴雲拂曙流霞光照耀鳯凰樓紫泥書下宣恩澤絳縣籌添拜冕旒階植堯蓂知歲月海生莊樹紀春秋良辰甲子周方始從此還輪億萬周其四議敘知縣臣蔣深甲子中天億萬春垂裳㳟已自存神箕疇厯竝金甌永離照光懸黼扆新親闢四門羅逸鳯屢行丹詔起潛鱗欲知化被無垠處羣奉車書拱玉宸其一三殿風清湛露濃先春瑞應玉芙蓉雲中迎輦翔䨇鳯天上鳴鑾駕六龍北燮南諧歸禹貢金泥玉檢陋秦封康衢父老何知識歲聽恩綸下九重其二雲璈聲奏徹層霄律轉芳㽔六氣調仁壽域中天廣大軒轅圖裏歲殷遥歌成保定追周雅懽洽華封祝帝堯共識貞符垂象逺齊瞻南極正光昭其三環列西山壯帝居氤氲瑞靄日長舒早教桃李三春放特置科名十載初化育萬年逰沕穆鈞陶四海樂華胥分曹校勘微臣職願綴班行頌九如其四議敘知縣臣程瓚韶景欣逢聖壽辰普天同慶祝長春和風披拂開金殿瑞靄繽紛䕶紫宸萬里越裳來白雉九成虞奏舞祥麟太平盛事超三古茀祿駢臻戩穀頻其一帝德如天迥莫量遲遲春日正垂裳心涵元化璣衡轉手握禎符甲子長疇範統歸皇有極升恒竝頌壽無疆建章即是蓬萊境僊露香盈萬歲觴其二道協貞元養太和華封豈止祝三多中朝共慶千秋節髦士爭趨萬壽科惠下殊恩歌湛露作人盛典賦菁莪一天淑景籠佳氣庭燎光中響玉珂其三微末追隨槖筆班承恩亦許覲天顔青鸞向日先呈瑞紫氣多時已入關星近斗杓朝北闕松高岱頂拱南山聖齡自竝乾坤永無數仙籌海屋間其四議敘知縣臣孫農祥景慶星雲集未央巍巍聖德本無疆堯天廣運兼三極舜日重華照萬方訓世文章超典誥在庭楨幹樹賢良盛朝禮樂隆千古率土羣歌有道長其一融和韶景㑹昌期共慶嵩呼萬壽時瑞日正中周甲子長春方始逓干支祥光恒繞蓬萊殿佳氣深涵太液池九奏簫韶齊祝嘏青麟率舞鳯來儀其二汪洋如海沛恩波賜復蠲租更設科洪範錫疇寕獨五華封獻祝本來多即㸔桃熟三千算共喜籌添億萬過鷺序鵷行雙闕下趨蹌羣進九如歌其三海宇昇平仰至尊草茅何幸侍金門夜窓藜火叨吟誦曉閣牙籖重討論饌飫尚方霑澤厚衣頒内府被春温感恩竊願傾葵藿拜舞同稱萬嵗樽其四議敘知縣臣王㑹紫微晴闕瑞烟濃南極星輝映九重萬國歡娯朝聖節千官歌拜頌華封螭頭曉浥金莖露仗外花飛晝漏鐘此日循環周甲子普天加額慶殊逄其一卿雲糺縵旦光華四海車書共一家重譯輸將來浴日中朝聲教被流沙科傳萬壽風雲奮令著千秋雨露加況遇新租全賜免歡聲齊拜聖恩賒其二問寢璇闈孝治光萬㡬清晏拱垂裳日星彩煥天章麗鸞鳯輝鶱御藻芳神禹九河歸底定狼胥三駕靖要荒文猷武畧皆天縱幬載勲華詎易量其三最是春光景色姸碧桃初綻栁如烟觴稱北斗呈天象曲奏南薫敞御筵湛露偏承芳草渥恩波擬占上林先忝陪鵷序趨丹陛竊效嵩呼祝萬年其四監生臣吳暄晴和春籞照曈曨聖節欣逢景福同芳樹萬年凝瑞靄青芝三秀拂祥風堯齡甲子天無極軒厯春秋日正中宇内臣民歌燕喜韶華好景自冲融其一太平厯服本無疆薄海懽心仰帝閶闕下喜聞調露樂堦前齊進衮龍裳賜衣父老瞻天表重譯藩臣覲日光共道聖朝王㑹盛普天歌舞奏陶唐其二優渥恩膏下九天紛綸五色詔書傳萬方盡免三秋税兩試重收四海賢郁郁慶雲如蓋覆漙漙瓊露似珠圓歲端更仰嘉祥見瀲灔先開玉井蓮其三嘉辰茂對値陽春玳瑁筵開蓂莢新度索仙桃餐不厭閬風玉酒御來頻三階位正逢興運八采睂生仰聖人鉛槧小臣葵藿願岡陵歲歲祝楓宸其四監生臣王曾期曈曨瑞色映蓬萊萬國梯航獻壽來鳯扆齊瞻千仗合鶯花爭向九重開南山貞固乾坤共北斗輝光霄漢廻沐浴皇恩逢六紀和風甘雨徧春臺其一爐煙縹緲曙光融鵷鷺熊羆拜舞同蓂莢當階三月翠蟠桃滿苑萬年紅和調玉燭崇文治耆定金甌炳武功厚澤深仁均雨露歡騰朝野效呼嵩其二輦道風清靜軟塵華燈法曲接丹宸無疆聖壽山川似不老龍顔氣色新日正中天承泰運陽囘大地際昌辰聨翩童叟衢歌盛欣覩昇平億萬春其三浩蕩恩波萬象姸霞觴稱壽樂齊天衣冠兩陛承仙露簫鼓千門徹御筵甲子循環綿寳厯春秋次第頌椿年小臣載筆趨金殿長寫龍綃繼玉編其四監生臣顧祖雍卿雲麗日盎陽春聖壽欣逢月在辰四海尊親瞻斗極千官拜舞肅鈎陳紫霞飛處韶光燦絳實呈來景色新率土共申三祝意承恩況復近楓宸其一上治雍熙化日長臣民齊進萬年觴階凝湛露滋蓂莢樂奏雲韶舞鳯凰萬國咸寕羣樂業一人有慶正當陽微臣願效岡陵頌堯徳如天未易量其二壽域天開八表𢎞祥光南極喜高騰循環甲子籌難紀熙皥年華嵗屢登應許乾坤叅乆大祗容日月竝升恒古來亦有維祺主全盛如今得未曾其三寶祚欣逢恰十千韶春令節太平年聖心廣運兼三極文思欽明御六乾海晏河清周禹甸衢歌巷舞戴堯天葵衷莫報陽和德擬頌南山獻壽篇其四監生臣鄒元斗萬壽初登六十春普天歡忭慶良辰風清紳珮千官集雲湧笙歌九奏新紅獻朔桃香正逺綠浮仙醖味偏醇山川如畫鶯花麗此景眞能樂紫宸其一萬壽初登六十春赤霞紫氣䕶城闉嵩齡自與乾坤永峻德長同日月新治道昌明心似鏡物情洞鑒智如神惠風翔洽桑麻茂相見無非熙皥人其二萬壽初登六十春天行維健道能純羣仙會合鸞凰舞列服趨蹌玉帛陳紀日還應看瑞莢卜年長可問靈椿遥知文囿風光美聽奏雲璈一曲新其三萬夀初登六十春陽和時節太平人苑花紅染晴光媚宫栁黄拖曉靄匀地道正同王道大天心長合聖心仁小臣戴德何由報翹首南山獻頌頻其四監生臣徐球聖主當陽日麗天早躋仁夀正乘乾萬年花甲開堯厯三月薰風入舜絃春滿螭頭金殿暖香清龍案玉階傳試聽率土升恒頌小雅羣賡保定篇其一聖人邁古亦超今沐浴臣民江海深百辟衣冠明桞外萬家歌管醉花陰仙桃果熟松喬獻野䔩香清耆老心到處南山齊介夀同聲嵩祝和虞琴其二洋溢聲名及逺人懸梯度索慶昌辰仁風入律占王㑹瑞露延齡代貢珍重譯仰瞻宫闕逈羣工羅拜衮龍新為言自古天皇後今日還開億萬春其三海澨承恩縫掖生年年槖筆到蓬瀛唐詩追琢千秋鑑御選珠璣百世程豈有涓埃醻覆載還將歌詠荅昇平敬攜春酒隨班入願獻無疆萬壽觥其四監生臣張果浚聖皇臨御萬方春階有仙蓂野有麟範衍箕疇五福永詩陳天保九如新安瀾滄海籌添屋稔嵗嘉禾地獻珍翔洽太和彌宇宙治登熙皥仰鴻鈞其一人心協慶帝圖昌嘉運昇平寳厯長二典勲華仁聖主大千尊勝梵天王西池蟠實香盈席南極珠躔彩耀芒巍蕩難名符覆戴萬斯年祝祚無疆其二多士歡騰文治隆英賢鱗萃石渠中鸞翔鳯翥天章麗風起雲飛聖藻雄百爾彚征添蘂榜四門廣闢逹宸聰菁莪樂育君恩渥率土咸歌徧叟童其三壽效華封祝聖多南山鎮古永嵯峩至誠不息乾行健恭已無為帝載歌嵩嶽三呼神眷重簫韶九奏鳯音和循環甲子周還始歲歲朝宗㑹玉珂其四監生臣周旋聖主當陽日萬幾玉衡中正紫垣輝承天功展開天大帝統心傳道統微地受徳風蕃草偃海涵仁澤衆川歸熙朝即是羲皇世黼座恒垂藻火衣其一寳厯綿綿景祚昌嵩高獻夀集嘉祥耳先尼父聞聲順徳過重華在位長甲子同天周復始乾元統地運無疆宫階蓂莢璿璣厯億萬春秋奉聖皇其二絳霄南極應昌辰早喜仙葩報獻春日月倍明宸藻麗江山不老物華新八風從律和三祝六合同心慶一人中外只今皆壽域年年歌舞荷陶鈞其三閶闔平明瑞旭臨九重佳氣暢宸襟香凝萬嵗觴稱玉光燭千秋鏡鍊金化日舒隨天福永陽春暖共帝恩深草茅忝綴賡颺後獻頌希同擊壤音其四監生臣沈經和風淑氣盎乾坤紫殿春深笑語溫閶闔九天陳舜樂衣冠萬國奉堯樽琪花瑶草來仙島桃實芝房滿禁垣騎竹扶笻盡鼔舞躋堂稱兕報君恩其一河清海晏不揚波峻德豐功布太和澤徧神臯霑雨露化深藝苑樂菁莪兩階干羽聲名盛六合梯航貢賦多風動時雍超萬古四民順則聽衢歌其二紫雲降輦集羣仙鹿脯松肪玳瑁筵鳳陛氤氳凝瑞靄龍樓縹緲發祥煙栢梁臺浥金莖露太乙池開玉井蓮徳與天長膺寳籙籌添海屋萬斯年其三秘閣翻書選茂良㣲才亦得近春陽欣㸔瑞燦星雲色快覩祥開河嶽光五十二年歌有道億千萬載慶無疆聖恩浩蕩同天地敢頌周詩保定章其四監生臣樓儼稽古陶唐癸巳年三多華祝聖人前恭逢繞電流虹日正是和風甘雨天寰海謳吟齊擊壤廣庭解愠入薰絃太和翔洽韶光好獻壽杯開禁桞邉其一欣欣海㝢慶年豐頻嵗蠲租澤倍隆物與民胞歸帝徳時雍風動愜宸衷八鴻率舞春臺上四扈咸登壽域中仙沼芳菲先獻瑞藕花元日映雲紅其二壽考由来頌作人昭囘雲漢麗青旻天邊墨榜春風潤宴上紅綾秋色新更喜鷹揚抒壯志還欣璧水荷深仁湛恩濊澤眞如海共向彤墀祝大椿其三雲開紫殿影層層太乙光分閣上燈風雅親從刪定後編摩竊忝任難勝書成金石天同壽福衍箕疇道自凝何幸小臣叨載筆萬年長願頌升恒其四貢生臣戴天瑞六飛早御統乾坤萬國同心奉至尊氣轉璿璣春授厯衣垂藻火日臨軒平天成地勞偏著綠字丹書道愈敦拜手一歌歌大徳五雲長繞紫㣲垣其一阜財解愠理薰絃歲歲頻書大有年八極共球超禹貢三春膏雨滿周田臣民咸樂昇平日逺近同歸熙皥天拜手再歌歌大徳聖皇百禄自綿綿其二巍巍蕩蕩總難名就日瞻雲獻悃誠愛戴普天齊舉手尊親率土有同情羲皇厯數疇能及堯舜光華孰與京拜手三歌歌大德山川草木盡歡聲其三和風桃李徧春芳聖節初周化日長厚澤祥徴年自永深仁瑞應祚方昌千官爭獻三多祝兆姓齊稱萬壽觴拜手四歌歌大德如天如地慶無疆其四候選知縣臣潘秉鈞天開夀域鞏皇圖電繞璇樞啓瑞符月上三霄成合璧星懸雙闕若聨珠芳時蓂葉生瑶砌清晝蓮花滴玉壺鳯紀初周堯甲子五雲拜手聽嵩呼其一河清海晏慶昌辰乆道欣逢大聖人黎首時時涵闓澤皇衷念念沛深仁中天文治卿雲麗大地恩膏湛露均共祝南山歌萬壽康衢擊壤樂堯民其二俗登仁夀世昇平稠疊恩綸下玉京旭日雞竿㸔解網春風鹿野聽吹笙西山紫氣迎芝蓋南海彤雲繞桂楹稽古有如今日否巍巍蕩蕩總難名其三小大共球集紫宸九天瑞日繞龍鱗露香桃熟當三月海碧籌添甫六旬韶舞重聞千載樂堯樽共勸萬年春恰逢雲漢為章日夀考年年頌作人其四監生臣吳廷元萬方來賀集共球鳳厯欣逢第一周軒樂入雲連帝囿堯樽挹斗㑹神州川珍嶽貢充庭獻華祝嵩呼率土謳詄蕩九閶齊介壽瑞煙常傍衮龍浮其一紫禁曈曨彩旭懸三春景物正芳妍花迎御氣全舒蕚栁惹天香半拂煙丹粒轉盤神貺集金泥封案秘文傳太平有象登仁夀從此垂衣億萬年其二南極晶熒夜吐芒西池佳㑹捧瑶觴八珍璀璨仙人饌九醞芬芳玉女漿就日天顔知有喜如山聖夀祝無疆虹流電繞長春節歲歲開筵樂未央其三壽域𢎞開清宴時微臣何幸際昌期銀河波濶纎鱗潤玉露膏流小草滋萬載定知綿寳厯三生永得戴天慈九如篇什難賡和願附衢歌效祝釐其四貢生臣孫天霖率土敷天戴德長梯航萬國頌無疆頻書甲子方開始永歴春秋益健强久道已知仁浩浩太平眞喜福瀼瀼和風麗日爭呈瑞聖世臣民樂未央其一天夀繇來畀至人巍巍功德更嶙峋聖神智勇原無匹道德文章始識眞典則逺符三代盛規模垂示百王遵昇平共進岡陵頌環海春明拜紫宸其二春日遲遲春景融欣逢聖誕慶無窮泳游魚藻環文囿飛舞鶯花滿蘂宫到處笙歌張樂盛連朝酒醴賜酺同一時民物登仁夀呼祝聲應繞華嵩其三未能通籍綴朝班兩度瞻天覲聖顔無限帡幪思賜第獨承召問到蓬山嵩呼遥聽雲霄上華祝濃書銀漢間最是小臣欣獻壽年年此日拜恩還其四童生臣嚴文照五雲高捧九重門純嘏天心貺至尊玉液香浮花甲酒瑶池春暖碧桃根萬年共樂昇平化六合咸霑雨露恩草莽微臣何以頌嵩呼聖夀並乾坤其一融融淑氣布和風品物齊歸化育中四海安瀾霑聖澤三辰協瑞贊神功璇璣獨運乾綱振寳籙長膺鼎命崇最喜序時調玉燭人人鼓腹慶年豐其二萬幾餘暇擁瑶篇益信神明縱自天徧選奇書盈御案新標妙義示經筵睿思時沛江河湧聖翰髙揮日月懸寸楮片言皆訓誥欽遵奕世永流傳其三祥雲瑞日滿神都重譯衣冠聚九衢海外占風朝聖主寰中戴德頌洪圖車書同㑹於今盛科目恩添亘古無此際臣民爭祝嘏信知有道邁唐虞其四童生臣鄒家龍嘉貺禎符萃聖躬歡呼嵩祝萬方同籌添海屋春秋富蓂吐瑶階雨露豐瑞靄逺連千樹緑卿雲深䕶百花紅須知仁壽難勝紀星麗維南日正東其一紫禁春深敞壽筵蓬萊宫殿㑹群仙臣心願獻三千實聖夀應臻億萬年獸舞鳯儀依樹羽塗歌巷祝叶薰絃可知民物皆生遂總沐神功化育全其二日角龍顔應運生萬年佳節樂稱觥要令人物還熙皥早荷乾坤毓聖明灑翰難窺文思廣垂裳已慶治功成從兹山岳同貞固軒昊焉能得竝名其三至治無為風俗淳祝堯佳氣溢良辰福同江海涵千頃壽竝岡陵鞏萬春合殿咸韶音自古盈廷冠佩頌初陳愚蒙自分尤懸隔小草何當仰大椿其四萬壽無疆賦有序武英殿監造臣和素康熙五十二年歲在癸巳三月十八日恭遇我皇上六袠聖誕萬年之化日初長三月之春光正盛九有和樂四海昇平鶴語上林徹九霄而獻夀鹿遊靈囿率百獸以呈祥雲䕶高松蒼翠實同蓂莢霞開旭日光華何啻景星進萬年之觴者徧於朝野臣民頌聖人之齡者達於要荒畿甸萬國衣冠齊來瞻祝普天胥慶千載一逢臣愚戅無似特䝉簡㧞不次遷擢奔走禁庭供應翰墨臣自成童即荷主恩指授教誨已將五十年矣榮及祖父以迄兄弟子姪自慚犬馬難酬萬一敢因大慶昌期上獻無疆一賦賦曰臣聞聖神文武皇天必眷祿位名壽大德必膺此自然之嘉慶實亘古之休徴伏見我皇上聖由天縱道本性生聚黄農虞夏於一世集堯舜禹湯之大成鴻功莫匹至治難名無黨無偏會歸有極而四方維則多材多藝體用兼備而萬彚咸亨允執厥中心法為治法之根本永保天命修身得養身之精誠固宜凌今轢古坐享長齡臣又伏見我皇上神運無方功昭有象協造化以同流致禎祥而皆當普天率土咸歸壽域之中五服九州盡躋春臺之上既瞻恭已而無爲實仰大勲之已放若我皇上文昭寰宇化被人倫嫓典謨而更美紹丘索而推陳硏究經書總㑹商周而宗唐虞之統繙閲性理淹貫程朱而得伊洛之眞同文則親裁字典叶韻則博綜佩文手批綱鑑以取法乎最上精廣類函以日習乎多聞至聖製之不一難枚舉而縷分八法取鍾王之奧吟詠諧風雅之醇筆走而飛動龍蛇珠璣璀璨句成則鏗鏘金石錦繡繽紛望雲漢之焕彩懸日月而常新至若我皇上威服萬方天鍾英武平三藩之叛逆坐運神機掃絶漠之妖氛親臨鼙鼓民胞物與本優容而無私秋肅春生亦一徃而莫禦梯山航海盡無梗化之區窮髪雕題悉屬天家之土聖德同覆載而難窺聖壽亦萬億之難數則見夫一人有慶薄海歡娱九功不忒於歌敘萬載長覺其寛舒鶴算方增而彌徴至健仙籌逓進而信見盈餘五百嵗為春五百嵗為秋何足比數三千年開花三千年結實畧與同符周而復周若循環之流轉旦而復旦似卿雲之歌呼於是乎布恩綸施皇澤九霄雨露無一地之弗霑萬國蒸黎無匹夫之弗獲大矣哉福齊天地化溢乾坤駕鶴驂鸞獻琪花於蓬島金枝玉葉綿𤓰瓞於崑崙康衢歌頌笙鏞悉通乎華祝簫韶樂舞宫商允叶乎雲門臣仰思我皇上端拱穆淸化育參贊精勤五十載正以啓千萬載之始基拜祝六十齡方以開億兆齡之華誕臣拜手稽首謹呈萬壽之賦而頌天子無疆之算萬壽盛典初集卷九十八
