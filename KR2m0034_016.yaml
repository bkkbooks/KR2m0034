body:
  text: 欽定四庫全書萬壽盛典初集卷十六典禮四詔頒二總督湖廣等處地方軍務兼理糧餉兵部右侍郎兼都察院右副都御史世襲拖沙喇哈番紀録二次臣額倫特謹題為聖壽無疆皇恩普被詳請代題恭謝天恩事據湖北布政使司布政使李錫會同升按察使仍管湖北糧儲道事張文燦詳稱欽惟我皇上道際域中澤流方外一中允執千官仰有道之聖人六位時成萬國瞻太平之天子丹綸布而命官咨嶽籲俊升賢人人得效微長庶績熙而治定功成禮明樂備事事咸登上理古今極盛史册希聞職等自揣庸材未足分猷聖世忝居要職竊慙縻祿熙時兹於康熙五十二年三月十八日恭遇皇上六旬正誕方隨班遙祝敬效華封而重巽以頒忽從金闕臣民喜溢內外歡騰職等仰荷覃恩推封所自並蒙異數錫蔭後人聞寵命之自天愧輕埃之益嶽伏願我皇上膺鴻圖於有永與天地同其久長迓景命於無疆與山河並其流峙職等感激微誠無由上逹伏乞俯賜會疏代題又據武昌道金祖誠暨湖北驛鹽上下荆南各道率各府廳州縣等詳稱欽惟我皇上中和立極參贊操權調玉燭以乘時八表陽和普被握璿璣而撫運九天湛露𢎞敷茲奉到康熙五十二年三月十八日欽頒萬壽恩詔職等深慙謭劣會際升平忝荷貤封喜光前之廣及叨蒙增秩幸品級之忽加而且議革議降之員均豫寬宥住俸罰俸之案獲邀注銷未展寸長先承曠典惟願斂箕疇之五福暢洽昌期集華祝之三多瀰淪壽域於以鞏皇圖於億祀更兼卜聖算於萬年矣理合聯銜具詳乞會疏代題等情又據臣標中軍副將丁沂中左右三營遊擊守備千把總等撫標中軍遊擊右營遊擊左右營守備千把總等詳稱欽惟我皇上文德崇隆武功赫濯靖妖氛於不作處異域者罔不來同登蔀屋於雍熙遊康衢者悉皆順則平成介福清晏呈祥兹欽奉康熙五十二年三月十八日萬壽恩詔聖世何資捍禦而封蔭及於武臣太平豈事干戈而品秩增於將辨寵榮普被報稱未能伏願我皇上膺圖御宇既合千八百國為一家纍洽重熙更綿億萬斯年於有永職等感謝之心末由上達伏乞代題等情又據湖北闔屬生員劉銘祖等呈稱欽惟我皇上重道崇儒彩煥辟雍之地右文作士光昭仁壽之天蓋典遇非常則學校雲蒸霞起而恩逢特沛斯章縫茅拔茹連萬壽加科多士已彚征而論秀六旬恩詔耆儒尤次第以聯登正貢作恩既不壅於先進次貢作嵗更不滯於後來真千載之竒逢實一時之異數羣情感激難達宸聰恭請代題叩謝天恩等情又據各屬耆民陳九萬等呈稱伏思我皇上功邁唐虞壽同天地垂裳五十二載養老頻仍為法億萬斯年恩膏疊沛七十以至耄耊衣帛食肉大賚攸同百年特重期頤發帑賜金建坊獨異遊無疆之壽域樂有道之風光扶杖陳詞叩請代謝等情又據各屬里民蕭天錫等呈稱人安耕鑿皆由帝德之高深時樂雍熙實出皇仁之廣運恭遇聖主六旬正誕萬壽恩綸户口滋生賦不加而民日衆窮黎有養田未力而食已敷關津嚴額外之征里井禁雜加之𣲖表揚節孝咨訪山林庶獄生全地租豁免到處光天化日無非厚澤深仁遙睇九閽惟呼萬壽輿情莫逹仰請代題等情又據各營兵丁萬得勝等呈稱竊惟執殳荷戈生際太平之世卧弓韜甲渾忘熙皥之風坐糜天府之金錢已屬千秋難遇復受皇家之賞賚尤蒙萬壽殊恩虛冒絶夫行間實惠霑夫士伍惟願太平有象聖壽無疆恩膏與江漢同流德位共岡陵永峙合詞公懇籲謝天恩等情各詳呈到臣據此欽惟我皇上德普如天恩深浹地欣逢六旬萬壽遍敷九有恩綸內外臣工邀異數而加級封蔭文武士子際昌時而廣額開科寬使過之𢎞仁釋可宥之成讞徴賢養老賞士蠲丁無一人不蒙其恩無一物不得其所除湖南各官民人等懇謝情由已經偏沅撫臣潘宗洛會疏代題外兹據湖北布政使李錫暨合屬文武官員並士民兵丁人等各具詳到臣懇題謝恩事屬群情感戴臣不敢壅於上聞謹會同湖廣撫臣劉殿衡合詞代題伏乞皇上睿照施行為此謹題巡撫直隸等處地方管轄紫荆密雲等關隘贊理軍務督理糧餉兵部右侍郎兼都察院右副都御史臣趙宏燮謹題為呈請代題恭謝天恩事欽惟我皇上功高五帝德邁三王御極五十二年治臻上理加恩億千萬國化洽時雍恭遇聖壽六旬普天同慶特頒詔款廣布恩綸文武臣工咸沐非常之異數兵丁耆老均霑格外之𢎞施至若崇祀典蠲租賦敬天勤民之心彌久而彌深重學校宥罪愆尚德緩刑之政盡美而盡善且於聖天子壽域𢎞開之日適龍興寺工程完竣之時御匾甫懸宸翰輝煌於寶剎天心遂應甘霖旋沛於春畦民欣含鼓世慶恬熙四海九州咸樂太平之有象黃童白叟永賡仁壽於無疆兹據保定等各府屬紳襟士民紛紛具詞公懇由道府宋起等呈請代題恭謝天恩前來事出士民感戴真誠不敢壅於上聞為此謹題巡撫偏沅等處地方提督軍務兼理糧餉都察院右副都御史臣潘宗洛謹題為仁壽齊天恩膏沛地詳請代題恭謝天恩事據湖南布政使司布政使阿琳按察使司按察使王朝恩詳稱欽惟我皇上聖神文武睿知聰明至德𢎞敷五十二年太和翔洽仁恩廣被百千萬國教化流行無瑞不臻有施畢善職等恭逢聖主身際熙時受豢養之多年無寸長之報效兹於康熙五十二年三月十八日恭遇皇上六旬大慶欽頒萬壽恩詔臣工士庶盡被恩膏僻壤􅜯陬咸霑德澤普天同慶率土胥歡臣等仰邀封蔭異數獨隆沐九重特豫之褒嘉貤於祖父荷萬壽無疆之𢎞福榮及妻孥更沛寬仁之典載施開復之恩寵錫自天報稱無地惟祝我皇上御萬年之寶厯增億載之璿籌職等感激之心無由上逹伏乞代題等因又據湖南驛鹽糧儲道副使侯惲暨守巡各道各府廳州縣等詳稱欽惟我皇上覆冒同天照臨如日配乾坤而立極巍蕩無名集功德之大成高深莫測職等欣逢聖世未報涓埃兹於康熙五十二年三月十八日欽頒萬壽恩詔既錫之封典光耀前人復豫以進階輝生章服愆尤畢宥總沐蓋載之寬𢎞開復有條益思捐糜於踵頂職等感激私衷名言莫罄惟願靈長之寶祚奏太平於十雨五風頌乾健之聖躬開壽域於萬年億祀理合聫銜具詳伏乞代題恭謝等因又據臣標中軍遊擊兼管左營事張騰雲暨右營遊擊左右營守備千把總等詳稱欽惟我皇上聖謨廣運大勇𢎞施廟算布而底定滇黔天戈臨而澄清朔漠久已八荒咸服四海無波矣職等虛糜芻豢未效涓埃兹蒙恩詔寵錫貤封復荷殊榮幸邀增秩值太平之盛世思報效以何從伏願我皇上增無量之聖算綿有永之皇圖伏懇代題恭謝等因又據湖南闔屬各學生員潘𢎞圖等呈稱欽惟我皇上道貫三才勳彌六合因萬壽以遴才已屬非常之典每十年而增試更開無盡之科兹逢萬壽恩詔正貢作恩次貢作嵗黌序寒儒頓異青衫之舊膠庠下士忽邀稽古之榮猗歟聖世殊恩允矣熙朝盛事謹聯名具呈公請題達等情又據闔屬老民范庭月等呈稱聖德如天恩施似海蠲租減賦在在沐雨露之仁養老恤貧人人荷生成之德自耕桑以至飲啄盡戴恩膏由耄耋及於期頤屢蒙賞賜欽頒萬壽恩綸遍賚綿帛肉米鼓腹而歌帝德扶杖而頌仁恩一丁侍養遂左右之扶持百歲建坊慶里門之光寵年當衰老運際升平懇乞代題恭謝等情又據闔屬里民周世臣等呈稱宵衣旰食聖主刻刻勤民鑿井耕田赤子人人樂業蠲租賑貸頻年疊下恩綸薄稅省刑無歲不頒諭旨兹逢聖主六旬大慶欽頒恩詔普沛皇仁生長之黎庶永不加丁逋欠之地租查明豁免蠲盡寰區之賦載寬官地之租賑窮黎於冬月訪隱逸於潛區寬宥罪人表揚節孝永除雜𣲖禁止濫刑雨露均霑髙深莫報惟願我聖主壽同天地福並岡陵螻蟻微忱懇求上逹等情又據闔屬兵丁黃永朝等呈稱恭遇欽頒萬壽恩詔大加賞賚禁止尅冒天語一宣萬帳得霑實惠帑金廣賜千軍盡受殊恩乞代題恭謝等情到臣據此欽惟我皇上化協乾坤光同日月恩膏久洽乎羣倫德澤彌深於宇內兹逢萬壽大慶欽頒恩詔廣沛皇仁率土蒙恩普天戴德爭祝皇恩於悠久益徵聖壽之綿長兹據闔屬臣民老人兵丁人等各具詳呈公請代題前來事關羣情感戴不敢壅於上聞臣謹會同督臣額倫特恭疏代謝聖恩伏乞皇上睿照施行謹具題知萬壽盛典初集卷十六
