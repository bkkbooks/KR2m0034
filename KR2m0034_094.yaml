body:
  text: 欽定四庫全書萬夀盛典初集巻九十六歌頌三十六詞臣二十八萬夀徳音頌有序翰林院庶吉士臣汪份欽惟我皇上因廷臣恭祝萬夀之請特沛徳音諭以御極以來惟欲萬國乂安敬天法祖垂令名於弈世今夀屆六十憂勞倍增惟願為臣清正為子孝思弟兄友愛讀正書盡職業各殫誠心為慶祝之儀外此皆無所嗜好大哉聖人之訓詞宏深奥逺剴切詳明誠非厯代帝王所能及也臣愚竊考戴記禮運篇葢孔子諭大順之實體信逹順之道而備舉家之肥國之肥天下之肥以謂如此則天不愛其道地不愛其寳人不愛其情故天降膏露地出醴泉山出噐車河出馬圖鳯凰麒麟皆在郊藪龜龍在宫沼夫家國天下皆肥則家國天下皆仁仁也者順之體也惟仁故夀聖人行徳而民仁夀者家國天下皆肥之謂也而宋儒程頥謂君子修已以敬篤恭而天下平惟上下一於恭敬則天地自位萬物自育而四靈畢至此體信逹順之道朱子則謂體信是致中逹順是致和實體斯道於身自然發而中節推之天下而無所不通蓋禮運所謂體信逹順以致家國天下之肥故諸福之物可致之祥無不畢至即論語修已以安百姓中庸致中和天地位萬物育篤恭而天下平之義臣愚竊以三書之言合諸我皇上聖諭蓋前古聖人立言以垂範當今聖人身體而力行孟子所謂其揆一者也臣愚伏覩我皇上具聰明睿智上聖之才而窮經稽史考道論治夙寤晨興孜孜不倦天戈南指大慝悉平疆土之拓軼於禹迹躬提禁旅三超瀚海平沙萬里無敢違拒由是天之所覆咸奉正朔稽首稱臣莫不賔順親視河防指授方畧束淮敵黄疏通清口一旦河神受職而潛遵聖主約束地平天成萬世永頼仁愛孚於天下無有親疎逺邇惟恐一物不得其所蠲租賑粟之詔無嵗不下近者遂盡除田賦三年而徧於海内舉凡表章經籍尊崇先賢澄清吏治奬㧞賢才減省浮靡鉤稽國計興厲學宫廣開貢舉優恤軍伍教閲武勇以逮緩獄寛刑修塘建閘鉅細之務皆盡思極神躬親聽斷奉若天道憲章祖法處之以寅畏行之以祗慎業業兢兢不敢須臾自暇自逸所謂脩己之敬致中致和不顯篤恭之徳體信逹順之道維我皇上一身備之矣今者徳教既已浹洽風俗既已淳厚天下既已興仁符貺既已委至乃聖心亹亹惕厲倍增深戒廷臣勿事虚文務崇實政俾各以盡臣道盡子道盡弟道國安民治姦宄寧息為慶祝隆儀臣愚竊謂合於禮運家國天下皆肥之指而論語中庸所謂百姓之安天下之平與夫天地萬物之位育者也且所貴於家國天下之皆肥者何也肥則仁仁則夀聖人行徳而民仁夀此大順之實也故惟聖人為能開夀域於斯世而百姓由此而安天下由此而平天地萬物由此而位育當是之時天瑞應誠而至推之而不去辭之而益多故天不愛道地不愛寳隂陽調風雨時山不童澤不涸羣生和四靈至天地之間被潤澤而大豐美而聖人純嘏天錫眉夀萬年遂與天而無極臣愚乃知聖諭所及誠人臣慶祝萬夀之隆儀方今聖世久已臻兹盛美而皇心謙抑更欲勉以新功若不敢自謂已至蓋虞書帝庸作歌責難於臣保以戒慎聖人用意大抵如此亦孟子所謂其揆一者也臣份謹拜手稽首而獻頌曰皇有大訓訓於廷臣曰余御極夀登六旬我法維祖我敬維天務俾政乂以安斯民惟日孜孜亦既蒼顔無他嗜好倍增勞勤勞勤之久如見放勲華封之祝寧非愛君堯獨固辭何為其然不堪其瘁天位孔艱孰知堯心惟余一人余亦何祈此心相傳汝欲祝夀屏爾虚文惟亷惟孝友於弟昆非聖勿讀正言日聞勉爾職業罔或因循實殫爾心效於余前慶祝之儀莫此為先訓詞深厚於古誰倫克知允迪位在徳元自始踐祚終日乾乾獨見衆表逺紹羲軒極深研㡬嚅嚌道真吐詞為經以發竒芬上探月窟下躡天根牢籠覆載克彌克綸去其稂莠既鋤既耘海外有截南踰朱垠雷厲風飛親統六軍三駕之餘北土咸賔乃眷南顧駐蹕河津河來方壯萬水奔渾乃通清口毋俾或堙千古洪流遂安其瀾辨色視朝逹於夜分令聞令望聖徳日新克詰戎兵虓虎雲屯閲其騎射時令時申簡核獄詞必躬必親化彼嚴寒予以春溫乃命冢宰飭爾官聫洗手奉職則惟汝賢乃命司農乃命春官惟民惟士沛以新恩視飽如饑視暖如寒三嵗而徧田租盡蠲逮及商賈孰嚬孰呻皇有大賚以恤其貧相彼生徒號曰席珍特創新科俾速騰鶱逮及武夫嫓於儒羣亦各執經觀聽橋門無鉅無細惟畏惟寅合諸聖諭既備於身其在魯論子思所編亦越戴記禮運之篇聖經垂範維皇克遵先聖後聖其揆則均聖心之謙聖徳之尊巍巍煌煌不自鋪陳罔或封於泰山罔或禪於云亭自古雖有徽號曰匪天𠂻所存茲因祝夀受誨諄諄惟願斯世俗易風淳士曰勗哉相與陶甄此糾彼過彼繩此愆惟民雖愚見善則遷此修於市彼力於田百𨽻師師無黨無偏弼成教化如泥在鈞問諸一鄉鄉無愚頑問諸天下天下興仁既登大順介福自繁體信逹順實維其源惟此介福大順所臻運於無形窺之有端天錫聖皇億載萬年永永難老宰我人寰天錫聖皇司造化權能開夀域在宇宙間皤皤老叟所在成村各居其所徃來不煩於時皥皥於時安安於時蕩蕩於時平平隂陽和調無祲無氛紛紛郁郁示我慶雲化及鳥獸其心克馴草木何知亦各欣欣起視田疇嘉禾駢駢起視郊藪有鳯有麟至治馨香感於明神懿哉祥嘏致之非難以兹愛君其忠乃純以兹祝君其儀彌殷信而有徵至矣皇言恭惟聖世盛美克全勉以新功抑何拳拳勤惕之實於此焉宣咨爾在廷奉以周旋各守爾典勿懈益䖍皇上萬夀無疆頌有序翰林院庶吉士臣吳闗杰臣聞帝王之生五百年而當運㑹聖神之夀八千嵗以為春秋非頌禱之虚辭實天人之至理所以羲軒御宇享祚彌長姚姒膺圖厯年最久考之上古大概如斯未有徳邁古今直軼唐虞而上夀同天地共仰覆載之長如今日者也欽惟我皇上精一傳心立文武聖神之極剛柔合徳協雨暘寒燠之宜摩義漸仁沛澤長開乎萬禩制禮作樂移風無待於百年捐三千萬之金錢足民先於足國安十五省之赤子革面抑且革心考績課功則官方由以澄叙崇儒重道則文教藉以振興欣宇宙之太和樂臣民之熈洽真所謂宜民宜人受禄于天保佑命之自天申之者也臣惟下士叨列清班覲光輦轂歴觀聖澤之覃敷伏處鄉邦備悉民情之踴躍皇仁叠沛久聞載道歌呼聖夀屆期喜見填街祝頌兹值三春令序適當六十齊年臣雖學問疎庸識見迂淺幸際昌辰於聖世能無竭慮而抒毫用展微忱採輿情於閭里敢伸下悃協衆志於臣寮謹拜手稽首而獻頌曰恭惟我皇繼天立極統承三祖萬方是則曰聖與仁唯皇之徳聖化神功恵此四國唯古有聖至誠格天天錫之福億萬斯年我皇至徳軼後超前天人協應禮樂交宣穆穆我皇聰明睿智不顯維徳中和並致聖無不通多能聿至煥乎文章萬古無二聖皇赫赫有此武功震驚南土王功是崇唯此朔野亦輸其衷武功伊濯八表來同思此多士維國之楨聖化所育聖教所成我皇不棄側陋揚明㧞茅連茹以其彚征思此邦本食為民天歛從其薄民安于田皇仁蕩蕩租免其全我倉我廩粟餘九年大法小亷維官之要明明我皇不察而照吏不生姦民歌而笑生養安全天子之詔我皇之徳無幽不通申儆吏治一道同風爰命翠華來廵其功匪獨民懐河淮奏工維野與朝被帝之徳維士與民忘帝之力維範有言錫福不忒求端於天庶㡬曰得髙髙在上實鑒我皇既錫勇智且夀而康自古在昔其道有常我皇之夀萬夀無疆臣隨臣父相繼食禄臣父吳涵屢䝉超擢歴官都察院左都御史聖澤皇仁霑濡煦育寧私天恩萬方之福敢拜萬年同於華祝臣父厯官頻膺寵命毎退而言遺忠未竟何幸微臣得逢大慶拜手颺言天子之聖萬夀無疆頌有序翰林院庶吉士臣陳大章臣聞天佑下民作之君作之師聖人者天生之以財成造化扶翼世教恵養斯民者也爰自上古道莫大於三皇徳莫髙於五帝功莫盛於三王皆應運挺生繼天有作靈貺叶其禎符鴻號光於日月秦漢以還真人代起雲氣赤光之瑞雙龍夾馬之祥莫不幽贊神祇昭彰讖緯美徳述命踵事增華竭臣子之誠顯邦家之慶然而金繩玉檢隆其典矣未適其宜寳籙徽稱章厥文矣未既其實粤若道隆化普累洽重熈契六合而居尊握神功而不宰自開闢以來未有若我國家之純懿顯鑠者矣洪惟太祖髙皇帝天作髙山丕基𢎞緒太宗文皇帝光宅四海奄有三分世祖章皇帝一戎大定萬國來同拯斯民於湯火之中奠天下於磐石之固皇上膺上聖之資際開泰之運提乾維挈坤軸緝億兆規萬葉宣三后之耿光集百靈之奥祉知天之幬如地之載鼓之以雷霆潤之以膏雨陽開隂闔仁漸義摩易俗移風淪肌浹髓蓋五十二年於兹矣臣竊觀自古帝王或躬定大業制作未遑或繼體守文恢擴不足或富强立國而名法太繁或忠厚開基而聲靈未振或狃於承平而土木甲兵之事起或忽於近習而宦官宫掖之蘖生我皇上六位時乗一中允執儀先天而作覩兼開創為守成清明在躬夙夜基命欽明上世損益百王淵黙而雷聲齋居而龍見智周萬物而無跡道濟天下而不居日新學問矢敬徳以緝熈天授英謀養神武於不殺任賢逺奸持之以斷信賞必罰劑之以寛逺不遺於萬里近不玩於目前大必謹於宫廷細不忘於户牖值民安物阜之時儉約以先天下當保大定功之後精勤無改厥初垂裳恭已而淳化流行變色動容而海内震懼是以正位凝旒寅恭對越三才奠矣備養崇名惇族叙典五教敷矣考六樂正百禮中和之極建矣飭五材釐八政曲成之用神矣蠲租賦以恤民依慎刑辟而除苛法師師者在列濟濟者盈庭型仁講讓以陶鑄羣材黜幽陟明以翼亮王路經邦論道記言箴闕之官虎節魚符振逺懐荒之使文經之武緯之參旂昴鉞奮雄冊以掃欃槍壁彩奎鉤揮天章而薄雲漢尊師拜道見寤寐於羮牆輯瑞省方鏡榮光於河洛斡璇衡而齊七政風行草偃萃萬代之邕和懸玉燭以式九圍海宴塵清躋斯民於仁夀然猶業業兢兢日慎一日宵衣自警旰食不遑升中薦岳陋封禪於七十二君尊號隆名示撝謙於六十四卦蓋我皇上以敬天為本以勤民為實乾元溥利不言長養之功江海無盈式表沖虛之量由是道際無垠澤流方外薰蒸渥洽菌蠢蕃孳上下和同神人悦穆四時均而百物遂六符見而泰階平景星矞雲醴泉甘露之禎漫空而布汜騶虞神雀芝草嘉禾之瑞徧藪而彌郊黄髪之老髫齔之童遊康衢而鼓腹截耳之豪貫胷之傑望化國而皈心維時嵗在昭陽律吹姑洗蒼龍屆節乙鳥翔風當貞元妙合之期正甲子誕彌之㑹九州四海切瞻雲就日之思萬載一時欣貫昴流虹之應天子御青陽居右个出閶闔煥離明紫氣絪縕䕶鸞旗而直上非煙縹緲映雉尾以徐開登假上穹旁孚皇祗響八音於瑶闕陳九奏於彤墀駿奔萬國鷺序千官氊裘桞塞之君參差而虎拜滄海蹄林之長踴躍於鵷行嵩呼萬嵗之聲從空而降天錫老人之兆應候畢來大禮有融休徵允暢歛箕疇之五福佐佑禎期集華祝之三多彌綸夀域巽風解雨未寸晷而匝九垓巷舞塗歌不崇朝而徧天下蓋将登三咸五苞夏掩周超混沌以建業籠萬世為一君豈直上軼漢唐俯視魏晉而已哉臣江介䜿儒山林長物濫邀清選世受國恩酌大海以一蠡未酬涓滴窺髙天於寸管無補纖毫向日輸誠謹同四方之賀後天申祝遥稱萬嵗之觴謹拜手稽首獻頌曰皇矣上帝監四方眷求同徳君萬邦星輝電繞儲嘉祥篤生聖哲嫓虞唐珠庭日角祥應彰纂圖御極熈重光巍巍三后在帝旁陟降上下福澤滂夤承玉厯升馨香濬文睿武恢天綱斟酌元氣調隂陽參侔兩曜揚焜煌六典順序百職康雲行雨施浹混茫罄天作主包八荒梯山駕海通享王化成久道滋鴻龎衍靈襲慶景祐長天旋雷動開明堂衮衣火藻臨中央紫微環拱華蓋張九功維叙七徳颺充庭萬㝢羅軒裳和氣四塞薰風翔鳯之儀儀麟蹌蹌涵液滲漉寳道章年糓用熟民熈攘還淳反樸追羲黄磅礴厚載回昊蒼舄弈千古流鏗鍾徵符考牒浩莫量祚我皇兮萬夀無疆萬夀詩五言排律二首翰林院庶吉士臣劉蛟惟天生至聖道以一中承剛健乾元統聰明鼎命凝徳隆山並永化洽海同澄大武干戈戢宏文禮樂興千秋推盛烈萬國卜休徴百禄欣滋至暉暉旭日升其一至聖由天縱生知復敏求詩書窺奥賾典籍極㝠摉睿藻珠璣燦奎章雲漢流尊儒崇正學論道啟鴻猷識逺神偏暇思勤業倍優欣逢交泰日願進萬年籌其二萬夀詩五言排律十二韻翰林院庶吉士臣孫詔聖節中天㑹卿雲復旦時堯天周甲子軒厯紀干支玉燭光昌運金甌鞏帝基休徴呈萬象寳籙握重熈文徳昭干羽神功勒鼎彞恩膏流四海鼓舞徧羣黎道與三皇並仁無一物遺榮光河瑞應仙掌露華滋靈草呈三秀嘉禾徧兩岐美祥天地報麗象日星垂瑟上薫風度寰中化雨施羣工齊拜手共上萬年詞萬夀詩七言律二首翰林院庶吉士臣鄭其儲萬年天子正當陽八表羣依日月長端拱無為開樂利太平有象慶明良四方向化民生遂一徳同心帝道光花甲初周春晝永五雲遥捧紫霞觴其一疆宇由來重薊都山河襟帶是神區千秋磐石開皇極萬載苞桑鞏帝圖玉燭自調綿景厯泰階常正啟祥符衢歌華祝敷天慶蹌濟忻陪鵷鷺趨其二萬夀詩五言排律二十韻翰林院庶吉士臣戈懋倫華渚虹光繞皇圖景運昌和風宣令節麗日靄青陽紫禁春暉永彤墀翠幙張亮工傳喜起熈載効匡襄禮樂追豐鎬恩威邁漢唐雕題遵政教重譯凛冠裳端冕臨中極宵衣問未央龍飛綿寳籙鳯羽翽高岡受命膺純嘏凝休簡俊良惠疇詢岳牧典禮重明揚聖徳彌寰海嵩呼滿帝鄉省耕聞夏諺祈糓肇農祥保定岡陵固升恒日月長三台環斗極五緯耀巖廊入覲和鸞盛來同玉珮鏘綺筵陳醁醑蘭圃薦瓊芳碧栁垂青瑣穠桃拂建章遏雲仙響奏傍日御爐香金鑑千秋録瑶池萬嵗觴小臣持獻夀珥筆頌無疆萬夀頌有序翰林院庶吉士臣王畮欽惟我皇上之御極也顯謨承烈平地成天涵太極於一心九重獨運秉乾元而首出萬國咸寧風雨露雷基化功於宥宻日星雲漢符法象於髙明固已駕禹而軼湯不啻陶堯而鑄舜猶且躬承道統手握靈機學貫天人滙百川而歸海政調溫肅偕四序以成功揮戈而一掃蠻雲敷土而頓平竹箭金雞布愷木鳯䘖恩蠲蔀屋之積逋庭無萇楚發太倉之儲粟澤有稻粱六御廵行既採風而問俗萬㡬清暇恒汲古而横經文章則二典三謨言為世則書法則兩儀八卦畫自天開䖍俎豆於尼山首崇儒術簡蒐苖於玉塞載纘武功八法持衡舉錯而吏多清白兩闈校士蒐羅而人奮功名若乃敬授人時象璇衡於儀噐聿隆孝治宏錫類於尊親此蓋自生民以來未有如我皇上者也恭逢甲子初周正及干支方始序當三月上林之錦繡爭榮節屆萬年南極之光華逺照瑞氣平添於虹渚太液池邊祥雲四達於斗樞未央宫裏共仰天顔有喜率土來王羣歌聖夀無疆普天同慶臣畮初離草莽荷托雲霄忻逄百禄之罄宜敬祝九如之戩糓推大衍之䇿萬有一千稽皇極之書十有二萬與天無極如日之升爰拜手而為之頌曰帝徳廣運巍巍則天蕩平正直無黨無偏知臨萬國玉鑑高懸仁育義正溥博淵泉道承聖統學接心傳郊壇廟祀升中告䖍廵行方岳柴望山川採風東魯瞻拜文宣頻開講席時御經筵發明理奥俎豆先賢尤勤民事夙駕桑田省耕省歛賜復賜蠲祥刑愷悌宥過釋愆人安覆載物荷陶甄我皇執競地靖𤇺煙永清邊塞蕩掃閩滇干戈用戢禮樂相先陋兹綿蕞奏以薰絃官方士習清風穆然寄情文囿託興魚鳶湖山競秀花木爭妍手繙玉軸心賞芸編千峯染翰五色飛箋宸章煥發光耀星躔武功文治軼後超前皇猷浩浩仁夀綿綿常貞日月迭運坤乾張梨安棗貢自神仙梯山航海拜舞喧闐小臣颺頌天子萬年萬夀無疆詩有序翰林院庶吉士臣卜俊民等臣卜俊民等於壬辰三月伏䝉皇上親加考試又搜㧞遺卷恩賜進士並選入庶常異數殊榮自制科以來未之有也今恭遇聖夀六旬正誕普天率土莫不抃舞懽忻羣申歌祝臣等業附翰林官後繕成詩冊進呈顧以天恩高厚感頌私情有所未盡伏讀上諭以萬姓之安為安天下之福為福大哉王言實肇億萬年無疆之休用聨長句賡和成篇謹拜手稽首而獻詩曰一人首出乗乾剛臣卜俊民健行不息恒自强臣曹鳴履中建極符禎祥臣李鍾僑南極星輝燭萬方臣陶貞一受天百禄純嘏常臣劉於義超前軼後惟我皇臣潘允敏紹聞衣徳聖圖昌臣王圖炳統一區宇恢紀綱臣鄂爾竒傳心精一追陶唐臣楊士徽豐功駿烈越夏商臣何國宗滇南漠北神武揚臣秦靖然徳威逺播鞏金湯臣田嘉糓廵行指授平淮黄臣徐雲端決排疏瀹嚴隄防臣馮汝軾修和府事庶績康臣許鎮百工喜起當明良臣俞鴻圖山龍黼黻皆文章臣杜詔聖學高深日就将臣鮑開天人性命闡微茫臣孟班網羅載籍研精詳臣楊祖楫文瀾浩瀚涵溟滄臣何應鰲鸞音鳯藻踰百王臣林昻珠璣字字聲琳琅臣顧嗣立石渠天禄盈縑緗臣王澍萬㡬餘暇探珠囊臣狄貽孫宵衣旰食彌不遑臣徐杞大綱具舉衆目張臣易簡穆然恭已臨蒞莊臣漆紹文五十二載垂雲裳臣周天祐萬年天子夀而臧臣程夢星昭陽之嵗月青陽臣薄海甲子初周稱夀觴臣春山花明上苑春正長臣秦休虹流電繞日月光臣周金簡歡聲雷動徧八荒臣王時鴻行慶施恵蠲租糧臣喬時适蒸黎樂育安農桑臣董胡宏科開萬夀春風香臣周彬紅杏林邊丹桂芳臣郭孫順士庶歡呼夾道傍臣錢廷獻風光第一推帝鄉臣楊湝蓬萊紫氣環金閶臣沈世屏敷天率土偕來王臣夏慎樞賮琛重譯爭梯航臣陳王謨師師濟濟鴛鷺行臣舒大成老人扶杖羣趨蹌臣覺羅名昌塵清輦路鳴珮璫臣胡煦千門萬户錦繡場臣李如璐星毬火樹交煇煌臣徐依衢歌巷舞喧笙簧臣張淳雲韶法曲諧鏗鏘臣湯大輅百獸率舞儀鳯凰臣莫與及錦絲歩障連宫牆臣白子雲黄鶯紫燕飛廻翔臣魯立上林春色遥相望臣王夢旭恩波太液流汪洋臣林景㧞涵濡九有登豐穰臣王遵扆熈熈皥皥樂未央臣謝濟世生成厚徳不可量臣鄭之僑聖心求瘼猶傍偟臣張旭臨深履薄永弗忘臣劉蛟載申天語何昭彰臣孫詔為民祈福格穹蒼臣鄭其儲四序均和時雨𤾉臣潘祥人給家足饒倉箱臣王畮仁風廣扇胥拜颺臣戈懋倫盈廷交泰同贊襄臣朱一鳯臣等忝竊升廟廊臣李中朝聞靈鵲鳴海棠臣汪倬蓬池有酒盈天漿臣吳闗杰金莖仙露應共嘗臣汪份涓埃未報滋悚惶臣朱綸祝禧賡韻傚栢梁臣王時憲繼聲周雅傳無疆臣張玢萬夀詩七言律十首有序鑲藍旗色勒佐領下編修降級隨旗九品臣查賚欽惟我皇上宅中圖大道高乎千聖百王開物前民徳被乎九州四海千百世之鴻基永奠羣樂中天億萬年之鶴算綿長新周六甲律中姑洗令值勾芒合中外以來朝三春日暖罄臣民而登祝萬夀筵開獻棗如𤓰殿上無非仙侣催花作果人間即是蓬瀛凡此歌樂愷以慶尊親際昇平而來遐邇者胥由我皇上孝弟之至格於幽明歆享之誠光乎俎豆危微精一接堯舜之心源中正和平垂禮樂之盛治允文允武乃聖乃神豈惟研覽乎萬㡬抑且包羅乎羣藝染翰則龍蛇競舞摛詞則風雨爭飛玉帛通乎萬方勲華被乎四海金戈所指共看載道壺漿玉轡所臨無不連城櫜甲致區域之外測海水而來歸盡宇宙之中沐雨膏而共戴乃猶量其出而為入薄賦寛徭與其重而寧輕恤刑慎罰恩霑率土慶溢通衢因萬夀以開鄉㑹之科桂樹與杏林並茂徧九州而擴蒐羅之典鷹揚偕鶚薦同升是宜厯嫓乾坤永一十五國之共球夀齊山嶽等萬八千嵗於天皇臣賚累世承恩空負含宏之廣厚恭逄大慶難伸愛戴之微忱謹稽首頓首進呈七言律詩十章章首四字恭列詩題萬夀無疆太平天子正當陽瑞氣晴薰滿殿香花甲初周三月厯瑶堦爭進萬年觴史占五岳環宫闕樂奏鈞天引鳯凰共樂雍熈歌大有華封願祝夀無疆其一徳侔天地南山獻瑞彩雲中聖澤無私處處同天地不言生大化平成永奠荷神功爐煙縹緲呈端拱仙仗依微漾曉風自是盛朝綿厯象卿雲捧日射波紅其二明並升恒魯頌賡歌舊有聲照臨不息體天行萬方莫不尊親日薄海咸深覆載情五色賦成昭泰運三階露下燦金莖歡娯此日情何限長沐恩波荷聖明其三孝隆繼述嵩嶽鍾靈駕六鑾山河形勝壯龍蟠混同地闢皇輿廓長白天開景運寛大孝莫如天下養聖人惟是寸心安應知錫類恒無匱海宴山寧嵗嵗看其四尊崇祀典聖王御極重明禋綿亘千年玉祚新感格不徒憑灌獻馨香自是格神人凌晨香靄金爐裊射旭花明翠幌陳叨沐恩施逄燕喜百靈效順媚芳辰其五文徳宣昭桃花燦爛桞枝黄獻夀同歌化日長文命誕敷超夏禹欽明克峻邁陶唐波摇天筆龍蛇動字落人間翰墨香帝徳難名今最盛載賡雲漢上君王其六武功底定戎衣底定静無譁一統車書望裏賒口授六韜平閩粤躬親三尺淨流沙迄今塞外來重譯永此寰區仰日華大夀河山歸版籍蠻荒萬國祝天家其七恤刑頒赦滿天花栁逞芳菲長養無私日有暉貫索星消占瑞象圜扉草長荷生機法於過處詳輕重仁寓威中考是非聖主恤刑全愷悌雞竿欣覩詔頻飛其八普天蠲賚蓬萊宫闕五雲屯露灑天堦未有痕紫塞歡中騰愛戴黄垓頌裏樂生存已資賑貸來天府共慶追呼罷里門中外從容歌聖化月明雞犬靜江村其九萬夀開科春雷起蟄日遲遲正是人文變化時桃杏均霑上苑雨芝蘭隨發九秋枝天顔有喜飛丹詔盛世揮毫集鳯池奎壁只今光列象百僚競獻萬年詩其十萬夀詩五言律四首有序原任翰林院庶吉士臣董泰臣聞一人有慶四海深介祉之思萬福攸同兆民切躋堂之願是以含哺鼓腹之世人祝三多羔羊朋酒之篇民稱萬夀歡聲所感大地皆春瑞景方長普天共祝欽惟皇帝陛下瑞洽虹流祥鍾電繞垂衣致治瞻雲日於堯年縕瑟歌風布春陽於舜世兹屆三春時序恭逄萬夀昌期花甲方周綿地久天長之厯椿齡伊始啟竹苞松茂之基統萬方之白叟黄童並效嵩呼三祝合九土之英才碩徳羣歌天子萬年臣等世受國恩身逄盛代頃因算學特荷掄收恩波裛自天邊異數邀於格外尚方給札草茅得進金階光禄傳餐藜藿與嘗玉食質慙謭陋尚未報夫涓埃志切賡颺寧敢辭於弇鄙雖井蛙管豹莫能窺聖徳之高深而蚓竅蟬吟聊以展微臣之頌禱謹拜手稽首而獻詩曰大徳超千聖皇猷邁百王西池呈瑞彩南極燦瑶光花滿春方盛筵開日正長太平綿厯算寰海慶無疆其一五十二年春初周花甲辰數從今衍萬徳與日俱新多夀惟仁者占星騐老人長生權自握悠久撫斯民其二萬國稱觴盛嵩呼倍徃年祝堯君徳峻歌舜日華鮮松栢長春頌岡陵介夀篇誰能名蕩蕩丕冒本如天其三雲物呈祥日歡騰紫陌周霞觴稱萬嵗金鏡頌千秋有慶人人樂無疆處處謳微臣恭獻祝億載沐宏庥其四萬夀詩五言排律十四韻原任翰林院庶吉士臣尚彤廷百福熈朝集千祥聖世駢中和隨律轉化育與時宣祝比華封進詩同天保傳載陽當令序寳祚紀瑶箋淑景移三殿條風拂九埏歡聲齊率土廣樂奏鈞天帝徳乾逾健皇仁算永綿升恒如日月鞏固若山川堯日人爭就軒圖治比肩鴻庥一氣轉慶祚萬齡延田野嬉耕鑿泥塗望濯湔恭逄嘉節至引領瑞雲邊徳沛芸生廣恩周涸轍偏陳詞歌景福雀躍戴陶甄萬夀詩五言律八首原任翰林院庶吉士臣杭宜禄景運當陽日皇仁大暢時祥雲霏鳯闕淑氣繞龍池斗拱三山秀風迎九節枝臣民齊頌祝天地樂無私其一聖天原一徳帝祚自遐昌區宇煙雲合人間日月長歡騰迎舜日拜舞捧堯觴逺近籌添獻春花繞殿香其二日暖圖書燦天清象緯申謨猷超百代綱紀耀三辰郁郁龍編煥翩翩鳯藻新川原增錦繡率土慶長春其三睿算天弧拓皇威四海通朔南均化育梅栁共春風徳沛聲光振恩深甲胄雄太平當此日萬代樂成功其四盛世掄才廣中天雅化成石渠宏夀紀金殿重科名日暖蘋魚躍秋香月桂生車書來萬國樂愷識皇情其五世泰隂陽順春溫萬物遊詔蠲十五國恩溢百千秋芳甸蒸雲暖遐荒戴露周大哉皇澤逺長與漢河流其六寳厯承乾運春深醞太和共知椿不老從此海無波化洽生成久恩流品彚多天心同聖徳浩蕩樂賡歌其七華渚流虹逺君恩大地寛卿雲恒作瑞碧海永迴瀾慶自一人見光同兆姓看萬邦登夀域歌吹滿長安其八萬夀詩七言律五首有序原任翰林院編修臣熊本欽惟我皇上御極之五十二年萬夀昌期六旬大慶景星表瑞玉燭凝庥九有謳歌八紘鼓舞河清海宴慶厯數之無疆物阜民安樂化成於久道浮琛輸賮皆淪肌浹髓之儔擊壤呼嵩盡摩義漸仁之衆歡聲似沸喜氣成雲歌天保者濟濟蹌蹌躋公堂者熈熈攘攘臣熊本仰覩鴛鸞之舞莫禁鳬趨竊懐犬馬之思尤深雀喜敬取易乾元亨利貞五字各成鄙詞恭呈御覽惟祝聖天子永享太平之福於億萬斯年而小臣本得長䝉樂利之休於南東其畆而已至我皇上聖謨神化武緯文經致治美嫓夫唐虞勘亂功髙於湯武此雖詞臣䑛筆尚莫罄其形容國史盈編猶未得其梗槩臣之蠡測管窺固未足頌揚於萬一也其詩曰乗乾首出仰垂裳徳業豐隆夀且康符瑞蚤瞻雲日麗禎祥更挹醴芝香文思光被徵悠久天祐靈長寖熾昌行健自强參贊永九如齊獻萬年觴其一體元帝徳覆春臺資始絪縕萬象胎已酌斗杓旋一氣更綿厯數統三才範圍徃聖歸陶鑄損益前王入化裁瑞靄青陽喧燕雀溫溫和煦仰昭回其二咸亨品物發舒時氣協埏垓大化滋共識巽齊資彚潔還披離照嚮明治文章炳煥超今古禮樂輝煌著鼎彞蕩蕩無名嘉㑹盛六龍乗御普雍熈其三美利鴻厖至治馨萬邦仁夀際咸寧聰明睿知尊三重謨烈勲華備九經解慍絃歌揮舜軫逄春草木頌堯蓂敷陳盛徳曾簪筆盤鼎從看更勒銘其四運貞復始見天心物物根源二氣凝久道化成欽正固太和保合慶咸登日新富有歸皇極風動時雍啟瑞徵萬福春融調玉燭山呼長此頌升恒其五萬夀詩七言律二首候補翰林院待詔臣曹曰瑛當陽日麗五雲中萬國衣冠拜舞同上際下蟠均帝徳東漸西被徧神功連天㡩幕紅霞煥寰海梯航翠羽通紫鳯銜來丹詔發無邊人物荷薰風其一熈朝無地不陽春夀域天開慶作人何幸趨承瞻盛典更叨筆札到微臣黄星煥采聨東壁緑字分編傍北辰親見籙圖初受祉太平嵗月鎮常新其二萬夀盛典初集卷九十六
