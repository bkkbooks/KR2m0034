body:
  text: 欽定四庫全書萬夀盛典初集卷十典禮一朝賀二羣臣賀表和碩顯親王臣衍潢等諸王貝勒文武官員臣等誠懽誠忭稽首頓首上賀伏以日御正於中天登五十餘年之寶厯斗杓建於辰位綿億萬斯載之昌符慶洽寰區懽騰廣殿恭惟皇帝陛下誕膺景命溥育蒸黎文武聖神嫓唐堯之廣運祿位名夀協虞舜之重華致世昇平誠哉同躋五福受天休祜允矣不替萬年亘南朔東西盡屬聲名曁訖逮山川草木咸歸徳化涵濡體乾健於一心治益思治轉璇光於六甲周而復周共霑大澤之旁流羣仰聖人之久道臣等欣逢瑞節獲覲宸光伏願介祉茂増於升恒與天皆永太和洋溢於仁夀應地無疆臣等瞻天仰聖無任懽忭之至謹奉表稱賀以聞朝鮮賀表朝鮮國王李焞兹遇康熙五十二年三月十八日萬夀聖節謹奉表稱賀者臣焞誠懽誠忭稽首頓首上言伏以徳統乾元首正六龍之位建用皇極𢎞開五福之先恭惟皇帝陛下率育蒼生誕膺景命寰區和協聲教覃敷四海一而萬國来王川嶽靈而俊乂斯出太平有象厯數無疆臣恭遇熙朝欣逢聖誕身羈藩服心戀闕廷伏願玉燭常調慶雍熙於九牧金甌永固登仁夀於萬年臣瞻天仰聖無任懽忭之至為此具本謹具奏聞十八日隨班朝賀臣民耆老一常朝諸臣王以下現任文武有頂帶官員以上如常儀行禮一外藩諸臣科爾沁土謝圖親王鄂爾吉圖科爾沁卓里克圖親王巴忒瑪科爾沁達爾漢親王羅卜臧滚布烏朱穆秦車臣親王色登敦多布喀爾喀扎薩克圖汗和碩親王多羅額駙䇿旺扎卜喀爾喀土謝圖汗汪札爾多爾濟喀爾喀和碩親王達什敦多卜科爾沁多羅扎薩克圖郡王鄂齊爾科爾沁多羅郡王諾捫額爾黒圖科爾沁多羅郡王伊錫班第巴林多羅郡王額駙吳爾滚阿覇垓多羅郡王吳爾占噶喇卜阿覇垓多羅郡王丙喀喇沁多羅都楞郡王色稜蒿齊忒多羅額爾徳尼郡王阿噶尼思塔蒿齊忒多羅郡王雅木批爾敖漢多羅郡王垂木珀爾敖漢多羅郡王鄂爾貞圖奈漫多羅郡王崔忠喀爾喀多羅郡王額駙端多布多爾濟喀爾喀多羅郡王彭蘇克喀爾喀額爾徳尼濟農多羅郡王納木扎爾科爾沁多羅貝勒阿必達科爾沁多羅貝勒巴克錫嘏烏朱穆秦多羅貝勒博穆波喀爾喀多羅達爾漢貝勒占達古米喀爾喀多羅貝勒宗對喀爾喀多羅貝勒羅卜臧阿祿科爾沁多羅貝勒汪占扎魯特多羅達爾漢貝勒阿達沙扎魯特多羅貝勒畢魯瓦毛明安多羅貝勒班第蘇尼特多羅貝勒席里喀爾喀多羅貝勒丹津多爾濟喀爾喀多羅貝勒垂扎穆山喀爾喀多羅貝勒諾爾布班第喀爾喀札薩克多羅貝勒喇嘛扎卜喀爾喀多羅貝勒汪扎爾厄魯特多羅貝勒額駙阿保科爾沁和碩額駙班第巴林固山貝子托錫納木塔爾巴林固山貝子鄂齊里桑阿霸垓固山貝子車林敦羅卜喀爾喀固山貝子巴忒瑪汪扎爾杜爾伯特固山貝子沙津阿霸哈納固山貝子額林陳達什喀爾喀札薩克固山貝子喇卜灘科爾沁鎮國公圖努滿喀喇沁鎮國公沙穆巴拉什扎魯特鎮國公蘇禮翁牛特鎮國公索諾穆蘇尼特輔國公羅壘郭爾羅斯輔國公莽色喀爾喀輔國公車穆綽克納木扎爾喀爾喀輔國公汪舒克喀爾喀輔國公索諾木伊思扎卜喀爾喀輔國公車林巴爾喀爾喀輔國公根敦喀爾喀輔國公克色克厄魯特輔國公多爾濟塞卜騰厄魯特輔國公毛海徽特輔國公羅卜臧和托徽特輔國公奔貝毛明安扎薩克一等台吉諾爾布郭爾羅斯扎薩克一等台吉畢里衮鄂齊爾克西克騰扎薩克一等台吉齊巴克扎卜喀爾喀扎薩克一等台吉汪布喀爾喀扎薩克一等台吉羅卜臧額爾得尼阿海喀爾喀扎薩克一等台吉班珠爾多爾濟喀爾喀扎薩克一等台吉多爾濟達什喀爾喀扎薩克一等台吉阿里雅喀爾喀扎薩克一等台吉車林達什喀爾喀扎薩克一等台吉齊旺班珠爾喀爾喀扎薩克台吉車臣吳爾占喀爾喀扎薩克台吉沙祿伊爾都齊喀爾喀扎薩克台吉納木扎爾喀爾喀扎薩克台吉達爾佳喀爾喀扎薩克台吉哈嘛爾帶青喀爾喀扎薩克台吉納木林臧布喀爾喀扎薩克台吉薩喇完扎喀爾喀扎薩克台吉吳巴喀爾喀扎薩克台吉席第喀爾喀扎薩克台吉托頼喀爾喀扎薩克台吉垂扎卜喀爾喀扎薩克台吉衛珍阿海多爾濟喀喇沁扎薩克一等他布囊格倫巴林公主之孫台吉根扎普等三人敖漢公主之孫台吉巴雅爾圖等十八人敖漢公主之孫未受品級台吉多爾吉喇錫等二人科爾沁公主之孫台吉畢里克圖等十人科爾沁公主之孫未受品級台吉藏布等三人喀爾沁公主之子納穆錫科爾沁和碩端敏公主之子䇿旺多爾濟科爾沁和碩純僖公主之子台吉色稜納木占喀爾喀和碩額駙䇿林之弟宫格喇卜灘喀爾喀和碩親王達什敦多卜之弟一等台吉索納木扎卜喀爾喀土謝圖汗汪扎爾多爾濟之叔一等台吉衮春多爾濟喀爾喀土謝圖汗汪扎爾多爾濟之弟一等台吉巴爾達爾多爾濟厄魯特公毛海之弟一等台吉車林喀爾喀貝勒諾爾布班第之子協理台吉帕克巴扎卜徽特公羅卜臧之子協理台吉巴濟科爾沁一等台吉吳爾都納蘇圖烏朱穆秦一等台吉塔旺扎穆蘇喀喇沁一等他布囊色補科爾沁親戚台吉卜達等六十三人烏朱穆秦協理台吉馬錫等二人阿覇垓協理台吉徳穆褚克等二十六人喀喇沁協理他布囊塔爾宛等二人蒿齊忒協理台吉安瑪第奈曼協理台吉巴都禮雅等二人喀爾喀協理台吉扎穆秦阿祿科爾沁協理台吉丹津等二人扎魯特一等台吉阿山等四人毛明安一等台吉沙克雅等二人蘇尼特協理台吉圖巴什希卜等二人杜爾伯特一等台吉卜達阿霸哈納協理台吉崔鍾翁牛特協理台吉根敦扎普等三人郭爾羅斯協理台吉鄂齊禮等三人克西克騰協理台吉班第吳喇忒一等台吉南充等五人土黙特一等台吉衮濟思扎卜等五人鄂爾多斯台吉羅卜臧扎頼特協理台吉何塔等二人喀爾喀協理一等台吉寧噶爾扎爾等四十九人阿霸垓原任王塔滿林扎卜科爾沁老台吉阿努達阿霸垓老台吉烏都等二人吳喇忒老台吉阿穆瑚朗喀爾喀老台吉扎木揚等五人附入土黙特翼老台吉昆楚恒土黙特老他布嚢商圖一世襲諸臣衍聖公孔毓圻太常寺博士孔毓埭國子監學正孔毓璋翰林院五經博士孔傳鋕顔崇敷曾尚鎔孟貞仁端木謙閔興汶東野枝盛言徳堅等正一嗣教大眞人張繼宗一等海澄公黄應纘一等侯張宗仁一督撫學政諸臣湖廣總督鄂海總督河道趙世顯直隷廵撫趙宏燮甘肅廵撫岳拜提督陜西學政潘從律等一將軍副都統諸臣寧古塔將軍孟俄洛江寧將軍鄂克遜鎮海將軍馬三竒西安將軍席住荆州將軍達爾占福建將軍祖良璧杭州副都統道服色李如松西安副都統索柱劉官統等一提鎮諸臣古北口提督馬進良江南提督師懿徳浙江提督吳郡貴州提督張文煥宣化總兵官司九經天津總兵官杜呈泗太原總兵官馬見伯大同總兵官張自興寧夏總兵官范時㨗南陽總兵官楊鑄漳州總兵官許鳳鶴麗總兵官郝偉等一卓異在京諸臣同知趙友夔等知州唐賡陶等知縣儲右文等教諭楊鰲等副將朱杰等叅將宋虎山等遊撃周士元等都司申文星等守備劉承基等千總王鑰等把總錢得受等一土司世職湖廣容美司宣慰使田旻如一致仕候補諸臣吏部尚書馬爾漢户部尚書凱音布刑部尚書安布祿兵部尚書范承勲等八旗滿洲漢軍近在輦轂致仕候補諸臣人數繁多皆與班聯不及備載吏部尚書宋犖徐潮户部尚書王鴻緒禮部尚書許汝霖工部尚書徐元正等吏部右侍郎仇兆鰲禮部右侍郎田種玉工部左侍郎李元振等内閣學士王之樞顧恱履楊瑄等大理寺少卿朱廷鋐陳嘉績等翰林院侍講彭定求左春坊左諭徳秦松齡鄭開極等左春坊左中允黄夢麟汪士鋐等右春坊右贊善田成玉尤珍等原任浙閩總督梁鼐原任福建廵撫宫夢仁原任廣西蒼梧驛鹽道彭演一復職諸臣原任刑部尚書阿山郭世隆原任吏部侍郎常書李錄予原任户部侍郎巴錫原任禮部侍郎戴都里多竒原任刑部侍郎敦多禮原任工部侍郎彭會淇原任左副都御史勞之辨原任左春坊左諭徳楊大鶴原任順天府府丞李法祖原任御史穆書邁色舒述布鹿賔袁橋原任郎中金達善索穆鼐原任員外郎黑色里白金塔海范時彦李勲李起鰲陳懐徳原任主事吳拜原任奉天府治中吳泰原任光祿寺署丞邢延原任太醫院使孫之鼎原任湖廣總督石文晟喻成龍原任山東廵撫王國昌原任福建廵撫許嗣興原任知府王興逺范承訓蔣承繼章文鐄原任通判趙命任原任知縣蒲敏政楊起鳳徐秉元沈宗潢原任都統齊什扎拉克圖原任一等侍衛烏勒原任二等侍衛塞勒原任叅將蘇繼武原任拖沙喇哈番費雅哈查林原任防禦綽英額原任守備張興文原任驍騎校多竒原任歩軍校薩海一留京教習諸臣進士查雲標等武進士萬國寧等以上俱在太和殿前行禮一外藩陪臣朝鮮國陪臣議政府右議政金昌集吏曺判書尹趾仁等以上在太和殿前西旁班末處行禮一各館効力諸臣武英殿高不騫等養心殿曺日瑛等三堂西洋人紀理安蘇霖白晉巴多明等算法房董泰等皇輿全覽館張位等子史精華館邱起元等内官學教習龔克庸等以上俱在乾清門前行禮一在籍諸臣原任内閣學士兼禮部侍郎宋大業原任都察院左僉都御史王材任原任通政使司右通政楊篤生原任翰林院侍講錢名世原任翰林院編修熊本原任翰林院庶吉士尚彤庭原任禮科掌印給事中許志進等一候補候選諸臣候補員外郎李維鈞汪錫齡等候選員外郎高浚等一舉人貢監生員諸臣舉人李長庚等武舉沈銓等國子監教習貢生李震宗等貢生徐國銓等監生查克宏等生員胡夢熊等武生祝兆鰲等以上俱在午門前行禮一直省耆老直𨽻老人曹鳳全等共三千二百一十四名江南老人莊國興等共二百三十六名浙江老人沈玉揚等共三百七十八名湖廣老人吕永年等共四十六名山東老人劉名科等共一百六十一名山西老人田畯等共九十九名河南老人蕭冲斗等共二十三名福建老人張獻福等共二十六名江西老人吳嵩齡等共三十三名廣東老人羅科等共二十四名廣西老人李楨等共四名陕西老人張席珍等共一十八名四川老人張徳夀雲南老人吳學文等二名貴州老人秦毓華各䝉古老人馬齊克等共九名一八旗三營馬歩兵丁及閒散人等不計其數一京城内外農工商賈人等不計其數一各省隨父老入京之子弟不計其數以上自午門外至端門天安門大清門前等處行禮萬夀盛典初集卷十
