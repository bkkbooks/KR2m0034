body:
  text: 欽定四庫全書萬壽盛典初集卷二十三恩賚一加恩宗康熙五十二年三月十八日萬壽覃恩詔賜王以下宗室覺羅十五歲以上幣帛有差四月二十七日户部尚書臣穆和倫等謹題為欽奉恩詔事康熙五十二年三月十八日奉恩詔內開王以下宗室覺羅十五歲以上者俱加恩賜欽此該臣等議得王以下八分公以上恩賜賞給之處俱照康熙九年恩詔賞緞親王各給滿水二匹立蟒三匹大蟒三匹粧緞三匹紗立蟒六匹紗蟒五匹紗粧緞五匹裙蟒一匹片金三匹倭緞四匹小粧緞一匹小補緞二匹大緞三匹洋緞四匹彭緞四匹福建衣素一匹福建宫紬一匹小緞三匹小宫紬一匹大紗一匹小紗四匹共緞六十匹郡王各給滿水二匹立蟒二匹大蟒一匹粧緞二匹紗立蟒五匹紗蟒四匹紗粧緞四匹片金三匹倭緞四匹小補緞一匹小粧緞一匹大緞三匹彭緞六匹洋緞二匹福建衣素一匹福建宫紬一匹小宫紬一匹小緞二匹大紗一匹小紗四匹共緞五十匹貝勒各給滿水一匹立蟒二匹大蟒一匹粧緞一匹紗立蟒三匹紗蟒三匹紗粧緞二匹片金二匹倭緞二匹小粧緞一匹小補緞一匹大縀一匹彭緞四匹洋緞二匹福建衣素一匹福建宫紬一匹小緞二匹小宫紬一匹大紗一匹小紗三匹共緞三十五匹貝子各給滿水一匹立蟒一匹大蟒一匹粧緞一匹紗立蟒二匹紗蟒二匹紗粧緞一匹片金二匹倭緞二匹小補緞一匹大緞一匹彭緞三匹洋緞一匹福建藍素一匹福建衣素一匹小宫紬一匹大紗一匹小紗二匹共緞二十五匹鎮國公輔國公各給滿水一匹立蟒一匹大蟒一匹粧緞一匹紗蟒一匹紗立蟒一匹紗粧緞一匹片金二匹小補緞一匹大緞一匹福建衣素一匹小宫紬一匹小紗二匹共緞十五匹查宗人府咨稱本衙門以未入八分公鎮國將軍輔國將軍宗室一品及二品大人章京等俱令一子著入監讀書奉國將軍奉恩將軍宗室章京侍衛等俱加一級等因議奏奉旨依議欽此欽遵移咨到部今未入八分公以下宗室覺羅大人章京侍衛等官俱既已給監生加級覺羅拜牙喇披甲人等賞給錢糧毋容議外十五歲以上宗室覺羅亦著恩賜相應酌量十五歲以上間散宗室或賞給片金大閃緞字緞補緞一匹或大緞藍素衣素帽緞一匹或小彭緞羅緞小緞線紬羅綾一匹共緞三匹十五歲以上間散覺羅各給或倭緞補緞大緞一匹或藍素衣素宫紬小閃緞一匹共緞二匹其覺羅內年老休致官員年尚未老未上衙門官員亦照間散覺羅賞緞二匹王以下間散覺羅以上查明到日照此估計賞給賞完之日臣部將緞匹數目造入奏銷册內具題可也本月二十九日奉旨依議户部緞匹庫賞過緞匹開列於後親王八位每位賞緞六十匹郡王六位每位賞緞五十匹貝勒四位每位賞緞三十五匹貝子五位每位賞緞二十五匹鎮國公輔國公共二十一位每位賞緞十五匹間散宗室四百五十七名每名賞緞三匹間散覺羅七百四十七名每名賞緞二匹共賞用中錦二十七匹草錦二十一匹立龍蟒五十二匹大蟒一百二十五匹金線蟒五十八匹粧緞二百五十九匹紗蟒二十二匹片金四百四十七匹金字緞八十六匹倭緞二百九十五匹小蟒八匹次粧緞十八匹補挂料五十二匹大緞一千四百七十九匹閃緞三百六十五匹洋緞五十七匹衣素四十四匹藍素五匹宫紬十八匹次大緞四十四匹帽緞四十四匹紗二十三匹彭緞六百七十六匹以上賞過蟒粧片金等緞共四千二百二十五匹宗室王以下蒙特賜者附載於後賜和碩莊親王御書匾一對聨一大條幅字一扇一鞍馬一匹玻璃器皿一席三十六事賜多羅平郡王御書條幅字一白玻璃碗四白金黃紅藍玻璃碟四金黃色玻璃瓶一白玻璃花瓶一白色金黃色玻璃小碟四盛京古硯一餞山查二瓶餞梨二瓶緑葡萄一瓶瑣子葡萄一瓶賜鎮國公額爾圗御書字一幅藍玻璃碟四白玻璃碟一白玻璃瓶二藍玻璃瓶一緑玻璃碟一石硯一餞山查二瓶餞梨一瓶哈密葡萄一瓶索索葡萄一瓶賜鎮國公星海白玻璃瓶一藍玻璃大盤二玻璃小碟四花玻璃花瓶二賜鑲白旗護軍統領噶渣爾啓大宗室楚宗衣服等物三月二十五日詔復給多羅平郡王訥爾蘇及輔國公門度等所停止祿米二十五日宗人府宗正臣雅爾江阿等謹題為請旨事多羅平郡王訥爾蘇因責打步兵被陶和氣題參將俸祿俸米停止為此謹題請旨奉旨一槩給與俸祿伊等照常給與同日宗人府宗正臣雅爾江阿等謹題為請旨事輔國公門度因和碩裕顯親王之事未到齊集之處將俸祿俸米停止所屬官員不行稟明將門度隨侍有品級者俸祿俸米護軍護軍校俸祿俸米護軍錢糧米俱行停止為此謹題請旨本日奉旨一槩給與俸祿伊等亦著照常給與四月初一日詔察宗室覺羅以事革去宗系者及宗室覺羅所棄之子酌量給與帶子分别注記附入玉牒四月初一日皇上召諸王貝勒領侍衛內大臣部院大臣都統先鋒統領護軍統領副都統等齊集特諭今日齊集爾等朕想有數件事朕若不説亦無人敢説自朕而外亦無人知此事所以聚集爾等下旨藍旗兩貝勒再碩託貝勒皆因事獲罪革去黃帶子黜其宗系世祖皇帝時垂憐藍旗貝勒之子薩哈連碩託之子雨薩布曾給與阿思哈尼哈畨俸祿伊等皆太祖皇帝之孫至朕方四世凡革去宗系者不入玉牒太祖皇帝有十五子其犯罪革者俱未録入似此等不入玉牒者年久之後即無人知之矣凡宗室犯死罪者自有一定法律非濫行加罪若今不察明後日年久漸至泯沒所關甚大宜將此等之處詳察各於玉牒上續行録入酌量給與帶子使之有據若無所據雖録於檔子上萬一有水火之虞竟無可稽考即如今工部檔案被火燒了並無可查矣覺羅原是一本所出亦有因罪革去帶子者若不察明有據亦至泯沒再宗室覺羅所棄之子雖記在青檔子上宗人府定法甚嚴有畏懼不敢明言者亦未可知曽有一事可據原任內大臣覺羅塔逹任阿敦昂邦時因多子言欲將婢妾所生之子棄去包衣佐領阿敦大真泰聞之曰何為棄之乞與我養塔達即與為養子後朕知之曽下旨與內務府大臣令其記明恐挑選女子時或妄行挑選也阿敦大真泰後亦無嗣有言及歸宗者此子甚孝於養育父母曰不得帶子罷了如何教我離恩養父母朕念其孝因給與紅帶子仍留在伊母處今現在包衣佐領下有似此收養宗室覺羅所棄之子者亦當查明確議具奏五月初三日和碩裕親王臣保泰等謹題為欽奉上諭事該臣等查得原貝勒莽古爾岱之孫在正藍旗者二十六人鑲白旗者七人正黃旗者五人原貝勒德格勒之孫在鑲黃旗者六人原和碩親王阿濟格之孫在鑲紅旗者三十五人原和碩親王多爾渾無後原貝勒碩托之孫在鑲黃旗者十四人原鎮國公艾都里之子孫在鑲藍旗者六十五人原貝勒拜音圗之孫在鑲黃旗者四人原貝勒公阿岱之孫在鑲黃旗者十九人原貝勒西安之孫在鑲黃旗者十人濟馬瑚之孫在鑲白旗者九人原正白旗宗室額爾濟圖今現在無子伊等之名並其子孫之名皆記在青檔子上請將伊等現在子孫皆給與紅帶子記入黃檔子內俟修玉牒之日將伊等之名録入再費揚古之孫尼雅哈皇上所知甚明給與紅帶子請將伊祖父録入黃檔子內俟修玉牒之日將伊等之名録入關柱噶靈阿圖郎厄所生三子雖未載入實録簡親王公鄂飛順承郡王公訥默孫皆云實係宗室請亦給與紅帶子載入黃檔子內俟修玉牒之日録入再阿爾通阿之孫四人在鑲藍旗伊等現在覺羅紅檔子玉牒內俱寫名訖其給帶子之處無容議外阿爾通阿原係宗室請將伊等之名記入黃檔子內俟修玉牒之日録入再革去覺羅原係鑲黃旗覺羅席安無嗣原正紅旗覺羅勒爾色所生二子原係鑲白旗覺羅杭阿拉之孫二十六人原係鑲紅旗覺羅京倉現在原覺羅吳丹之子孫十六人伊等之名並子孫之名俱記在青檔子上請給與紫帶子寫在紅檔子上俟修玉牒之日將伊等之名録入再覺羅中生子棄去他人抱養者鑲黃旗覺羅達哈布生子西薩一人原阿達哈哈番覺羅馬福塔生子烏達哈阿哈納烏達哈之子孫四人阿哈納現在正藍旗正紅旗原永陵總管覺羅阿塔所生之子六哥今現在覺羅西爾泰所生之子雅泰現在原阿達哈哈番覺羅馬星額所生之子珠蟒衣已故珠蟒衣所生之子一人現在佐領覺羅七祿所生之子巴拉現在正紅旗覺羅圗穆卜魯所生子伊都之子孫在鑲白旗者十七人鑲紅旗阿達哈哈番羅拖里所生之子花色達爾漢花色之子孫四人達爾漢之子孫五人原步軍副尉覺羅渣清所生之子海福現在阿達哈哈番覺羅灣寶所生之子馬拉現在伊等俱於康熙四十七年五月奉旨一一查明各據伊等族長同宗保結將名寫入青檔子內存記在案今請將伊等現在之子俱給與紅帶子録入紅檔子內俟修玉牒之日將伊等之名録入嗣後宗室覺羅內所棄之子被他人抱養迷失者日後知之具呈之日宗人府衙門查明應否給與帶子録入玉牒黃檔子內請旨定奪可也本月初五日奉旨依議四月十一日詔宗室八分公以下奉恩將軍間散宗室以上現任大臣侍衛官員者各依現任品級照民文武官員封贈例給與封典誥敕初九日宗人府宗正臣雅爾江阿等謹題為請旨事康熙五十二年三月十八日恩詔內開一款內外大小各官除各以現在品級已得封贈外凡升級及改任者著照新銜封贈欽此欽遵查得康熙四十二年三月十八日恩詔為覺羅官員所得封贈題奏請旨奉旨宗室官員亦應給與封贈欽此自八分公以下奉恩將軍間散宗室以上現為大臣侍衛官員者各依現任品級照民文武官員封贈之例給與誥命給過之後存檔在案今逢恩詔內外文武大小官員從前未遇恩詔未得封贈者按現在品級啓奏給與封典外先遇恩詔己得封贈之後改任者照改任品級封贈升級者升任改換頂帶者俱照新品級封贈雖升級未改任換頂帶者前次已遇恩詔封過不許重封再查定例內一品官員封贈三代二品三品官員封贈二代四品以下七品以上封贈一代八品九品官員止封本身等語俟奉旨之日通行八旗恭遇恩詔自八分公以下奉恩將軍間散宗室以上現為大臣侍衛等再覺羅官員等各自已本身封贈三代二代一代有無妻室已得封誥未得封誥之處俟該旗咨送到日將伊等應得誥命之文交與翰林院撰擬奏覽臣等未敢擅便謹題請旨本月十一日奉旨依議五月初二日詔鎮國將軍輔國將軍宗室一品二品大臣章京及未入八分公各送一子入監讀書奉國將軍奉恩將軍及宗室章京侍衛等各加一級四月二十九日宗人府宗正臣雅爾江阿等謹題為請旨事臣衙門題前事準户部咨呈恩詔內開一款自王以下宗室覺羅十五歲以上者俱加恩賜欽此王以下宗室覺羅十五歲以上查明人數送部等因前來查得恩詔在京滿漢文官四品以上武官二品以上蔭一子送國子監讀書文官五品以下武官三品以下俱各加一級又查得康熙三十六年十一月十四日兵部題公福善等應加宫保摺本啓奏奉旨這本內議輔國將軍益德照例不準加級宗室章京有何不可加級之處加級者止換頂帶坐褥宗室益德著議加一級具題仍著為例欽此應將奉國將軍奉恩將軍宗室章京侍衛各加一級外宗室一品二品大臣章京並無各送一子入監讀書之例因此亦應各加一級康熙五十二年四月初六日題本日奉旨宗室亦議各送一子入監讀書具本用印來奏欽此議得鎮國將軍輔國將軍宗室一品二品大臣章京各送一子入監讀書又查得民公有送一子入監讀書之例應將未入八分公亦各送一子入監讀書奉國將軍奉恩將軍宗室章京侍衛等各加一級恭候命下遵行臣等未敢擅便謹題請旨康熙五十二年五月初二日奉旨依議五月初四日詔宗室蔭生各照應得品級隨旗上朝四月二十七日宗人府宗正臣雅爾江阿等謹奏為請旨事臣衙門題前事恩詔內開在京武官二品以上各送一子入監讀書在外武官二品以上亦各送一子入監讀書武官三品以下俱各加一級欽此奉國將軍奉恩將軍宗室章京侍衛俱各加一級外宗室一品二品大臣章京並無各送一子入監讀書之例亦議以各加一級具題康熙五十二年四月初六日具摺啓奏本日奉旨宗室亦議各送一子入監讀書具本用印來奏欽此議得未入八分公鎮國將軍輔國將軍宗室一品二品大臣章京俱各送一子入監讀書本月初九日具題十一日奉旨依議欽此查得吏部定例一品二品大臣官員各蔭一子入監讀書宗室原無蔭一子入監讀書之例今聖主洪恩宗室各蔭一子入監讀書因此將伊等俱送國子監讀書外或照民官之子在各部院衙門選用或照伊所各得蔭生品級隨旗上朝伏候聖裁五月初四日奉旨宗室蔭生著隨旗上朝五月初八日宗人府宗正臣雅爾江阿等謹題為請旨事禮科抄出臣衙門題前事恩詔內開在京滿洲武官二品以上各送一子入監讀書在外武官二品以上亦各送一子入監讀書武官三品以下俱各加一級欽此議得奉國將軍奉恩將軍宗室章京侍衛俱各加一級外宗室一品二品大臣章京並無送子入監讀書之例相應亦加一級等因康熙五十二年四月初六日具摺啓奏本日奉旨著議宗室各送一子入監具本用印來奏欽此議得未入八分公鎮國將軍輔國將軍宗室一品二品大臣章京各送一子入監讀書本月初九日具題十一日奉旨依議欽此欽遵查得吏部定例一品二品大臣官員各蔭一子入監讀書宗室並無蔭子入監讀書之例今聖主洪恩宗室各蔭一子入監讀書因此將伊等俱送國子監讀書外或照民官之子在各部院衙門選用或照依所各得蔭生品級隨旗上朝伏候聖裁康熙五十二年四月二十七日題五月初四日奉旨宗室蔭生著隨旗上朝欽此臣等議得查一品官蔭生以五品用二品官蔭生以六品用未入八分公鎮國將軍係一品大臣其蔭生以五品隨旗上朝輔國將軍係二品大臣其蔭生以六品隨旗上朝臣等未敢擅便謹題請旨本月十一日奉旨依議臣等伏稽往制自唐虞三代以來所以保世而滋大者未有不加意於一本之戚以親親為亟者也堯典垂親睦之訓禹謨拜惇敘之言至於周道尤尚親親若湛露之篇燕以示慈惠厭厭夜飲在宗載考何其隆耶禮稱人道親親親親故尊祖尊祖故敬宗敬宗故收族推之以至於庶民安財用足百志成禮俗刑然後樂作可謂重矣故曰上治祖禰尊尊也下治子孫親親也旁治昆弟合族以食序以昭穆别之以禮義人道極焉所謂始於家邦終於四海理固然歟若夫以一人誕降之祥沛九族非常之澤衍皇室之慶源煥天潢之寵籍如我皇上今日以萬壽之慶推恩於宗室者尤曠古而僅見也三代而下漢懲秦弊頗芘本根文帝四年五月復諸劉有屬籍家無所與賜諸侯王子邑各二千户元始元年以黃鵠下建章宫太液池賜宗室金錢四年始賜宗室有屬籍者爵元鳳二年賜宗室子錢人二十萬四年帝加元服復賜宗室金帛有差然皆與臣民同賜初元元年賜宗室有屬籍者馬一匹至二駟五年亦然唐武德七年四月宴王公親屬於文明殿酒闌徙坐翠華殿帝賦詩王公遞上壽賜帛各有差宋初親親頗闕仁宗念宗族散處不親洽作睦親廣親諸宅以族屬親疏分處之時臨幸宴享又置大宗正司司訓導糾過失修纂譜牒圗籍以明恩其别五一曰皇帝玉牒二曰宗支屬籍三曰宗藩慶系録四曰仙源積慶圗五曰仙源類譜凡録以一歲圗以三歲譜牒籍以十歲修纂然當時宗室猶未有爵土之封尋因富弼之請同時封王公者九十人神宗時立宗子試法袒免親已受命者得附鎖廳試袒免外親得附國子監試十取五年四十纍舉不第者疏名録用而它恩數稍減下逮元明宗族恩禮隆殺大率如此然則上下數千年其以誕聖之節加恩宗室者槩乎其未之前聞也國家龍興發祥長嶽自肇祖以下玉葉分輝璇源疏派蕃衍浩蕩祖宗之法以帶之紅黃别親之等殺干祿百福子孫千億仙源積慶之盛玉牒不勝載矣皇上廣錫類之仁念神明之胄視堯之親睦禹之惇敘聖揆無二其所以篤厚本支崇奬蕃翰有加而無已者五十有餘歲今恭逢聖壽普天同慶而愛由親始其事尤重其禮尤隆立法創制裁自聖心舉數千年分見岐出之恩並沛於一時豈非咸五帝登三王亘古今而立隆者乎伏觀聖節典禮公以下蔭子奉國將軍以下各加一級非僅如元始賜爵之典也王以下間散以上賜豫周浹或蒙宸翰輝煌或出尚方珍異殷隆稠疊非僅如金錢帛馬之常也宗室蔭子各以應得品級隨旗上朝不必有宗子試法之煩也修明玉牒至於宗室遺棄子女稽訪畢周咸得賜帶記名務使萬派歸源五車同采非僅如譜牒圖録歲修成憲已也魯論云君子篤於親則民興於仁孟子云親親而仁民仁民而愛物蓋皇上欲民無不興仁故於親尤篤於民物無不仁愛必先以親親推之有序施之有等固已萬邦協和四方風動直接於唐虞之盛也臣等恭逢盛典謹紀加恩宗室為恩賚之首云萬壽盛典初集卷二十三
