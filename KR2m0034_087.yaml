body:
  text: 欽定四庫全書萬壽盛典初集卷八十九歌頌二十九詞臣二十一萬壽詩五言排律二十韻翰林院庶吉士臣劉於義共仰文明代羣歌燕喜時六旬逢聖旦千載屆昌期禹甸榮光燭堯封化日遲無為臻上理有慶鞏宏基元氣凝宸極和風發睿思恩深兼覆載德盛作君師豫順惟時邁謙尊每博咨仁心孚逺邇精意感神祗早覩皇威振咸欽方略竒四征恢大業一統煥鴻規治水黃淮奠蠲租雨露滋萬方皆樂愷庶物盡融怡益快賢關闢重令駿足馳幸生熙皥日永遂士民私華祝傳衢壤嵩呼徹殿墀黃童齊額手黎老各軒眉銅砌餘韶景瑤階麗暖曦自天申保定應地集純禧競上千秋鏡欣稱百福巵從今千萬祀長誦九如詩萬壽詩七言古一首翰林院庶吉士臣潘允敏太平天子秉乾綱虹流電繞膺嘉祥照臨日月光四方萬年玉厯開無疆五十二載垂衣裳巍巍至德超陶唐宣昭邃學懸圭璋仁孝不匱孚穹蒼庖羲大義探微茫象緯術數咸精詳遍吹六籍之笙簧乃復搜輯名山藏珠璣焜耀雲漢章龍蛇驅走鸞鳳翔郊壇肅穆升馨香尼山之祀典禮將祔以朱子升宫墻遐陬燮伐神武張搜狩厲飭親戎行翠華戾止露瀼瀼河渠底定波不揚賜復蠲租愷澤洋時行賑貸安農桑引年屢詔登虞庠四門式闢無留良郊遂一斥威令彰皇皇法律嚴秋霜刑期無刑臻吉康柔逺人歸盡八荒職貢職賦窮梯航宵衣旰食猶靡遑猗歟至治疇能量瑤樞紫極相輝煌和風習習日載陽花甲初周春正長自今以始壽而昌千官萬國羣蹌蹌衢歌巷舞揚恩光小臣幸廁鵷鷺旁稽首拜手稱霞觴萬壽詩七言律四首翰林院庶吉士臣秦靖然巍巍峻德頌陶唐玉燭時調際聖皇匝地恩膏流率土敷天文教洽殊方山川效順王猷逺雲漢呈祥帝道昌共慶長春佳節近歡騰四海祝無疆其一流虹瑞氣滿春臺樂奏鈞天進壽杯寶厯從今周復始鴻圖自此運方開已聞華祝來陬澨還覺嵩呼遍草菜萬國此時齊獻頌九霄雲日慶昭回其二誕膺萬福是吾皇敷錫還教及四方百職邀恩光命服八紘籲俊煥文昌纍看緑野甘霖渥共樂彤廷化日長何幸微臣逢聖世普天俱沃帝臺漿其三乾坤覆載總無私草木難酬雨露滋已覩添籌綿厯數更思移算祝昌期輿情逺邁中天日景運應超復旦時從此九如頻致詠春光常捧萬年巵其四萬壽詩五言排律四十韻翰林院庶吉士臣田嘉榖鳳紀貞元合龍飛嵗月長勳華隆百代道德嫓三皇寶運綿鴻厯禎符覲耿光執中惟作極致治自垂裳心契河圖祕胸羅石室藏生知原濬哲止敬愈顒卬廣扇仁風溥均霑膏雨滂兩儀輝晝夜四序協柔剛座右題無逸宵分問未央璿璣釐厯象律吕候隂陽制作臻明備班聨挈紀綱訓詞存爾雅理數析微茫廣運真難測淵泉詎易量文謨彌炳耀武烈倍輝煌炎朔龍旗指東西虎旅揚翦鯨清海甸驅蜃靖扶桑春豫時觀俗宸遊為省方賑民頻發粟占嵗屢蠲糧敕法雷兼電寬刑露易霜闢門招俊乂咨牧重循良衆好因箕畢休徵順雨暘平成連兖豫底定竝淮黃元朔頒槃瓠謳歌誦白狼明昭貽率育穎栗慶豐穰駢秀呈黃茂雙岐擢翠芒成功昭簡册殊瑞溢縑緗甲子星周度春秋日正昌晴霞披組繡好鳥和笙簧華嶽蓮新長瑤池桃始芳曈曨升旭日沆瀣滿銀塘金奏鐘鏞合工歌磬管鏘上公陳寶履重譯進華觴拜舞隨鵷序歡呼徹帝閶冲懷崇讓德尊號却封章五紀持兢業羣工效贊襄賜酺喧市里加幣肅壇場施惠租全給搜才網更張嘉賔來鹿野吉士藹梧岡水滙東溟裏星環北斗旁年年陳頌祝萬壽永無疆萬壽詩五言律十首翰林院庶吉士臣王時憲聖主乘乾日車書萬國同皇圖長鞏固帝德正淵沖極建禎符集仁深福祿崇今才周甲子馭宇道方隆其一雅化追隆古羣黎含哺嬉廟堂真有道天地等無私旭日懸金殿春風度玉墀臨軒頻問俗四海奏雍熙其二天文光的爍永永照寰區重道崇先聖傳經表碩儒法書垂玉府睿藻燦瑤樞綸綍方頒賜齊心拜典謨其三赫濯天威逺皇居氣自佳山川環禹甸干羽舞虞階重譯爭朝請殊方久畏懷豐碑記神武不忘舊摩崖其四湛恩同覆載百族荷陶鈞航海歸王化梯山進國珍萬方咸戴德九土自生春引領瞻天上繁星拱北辰其五聖朝嚴舉錯乾斷肅官聨總為生民計頻將德意宣大臣皆守法下吏永無愆蕩蕩平平世羣瞻尺五天其六兌悅兼離照清時實右文一人恩似海多士氣如雲聖訓銘金石鴻篇嫓典墳儒庠禎瑞叶佳氣自氤氲其七制科頻廣額寒畯共騰歡春浪成鱗甲秋風振羽翰有才誰蠖屈羣彥自鵬摶萬壽天門闢重蒙策治安其八養老頒仁政無殊上下庠高年分帛肉溫㫖出巖廊安燠裁衣著鮮肥正席嘗普天呼萬嵗化日正舒長其九主德高無極宸衷承以謙照臨齊日月惠化及蒼黔花發春方暖山呼瑞早占從今億萬載長慶海籌添其十萬壽賦翰林院庶吉士臣王時憲我皇御極五十有二年三月中浣乃甲子初周之期也夫祥光騰於紫殿瑞氣靄於丹墀頌九如者合九陔而畢至呼萬嵗者盡萬姓而交馳多富多壽多男允為昔聖所未有得位得名得祿皆由大德以致之瞻王道之平平蕩蕩幸民風之皥皥熙熙此蓋大業逺超千古而繁祉咸集一時者也然而純嘏則本於天錫至治更開於人和君心昭格天心宣室有受釐之兆帝德聿新民德康衢來擊壤之歌旰食宵衣堯階每生瑞草箕風畢雨禹甸遍産嘉禾喜篝車之既滿羡稌黍之復多觀其築場納稼也弱子寡妻遽多色笑觀其飲蠟吹豳也黃童白叟竝見顔酡而且桑饒沃葉柘茂交柯南陌春風盈盈㩦筥西郊夜月軋軋拋梭蠶餘八繭絲足五紽固已豓奪天孫之錦紛披越女之羅矣若夫紫綬拖所以寵貴客黃衣錫所以禮高年野婦績於室村夫力於田牧童常吹隴上之笛戍兵免控塞外之弦占年有雪紀瑞非煙長綿寶厯永廣幅員今者伏遇聖節之攸屆乃見衆志之至䖍焉斯時也內則派出天潢朝宗有自恩隆戚里矢報靡窮外則大小諸臣咸遊化日庸愚百姓均沐休風近則十五省懷仁慕義之流皆知愛戴逺則千百國航海梯山之輩竝切尊崇是以輸誠惟恐夫稍後備物不妨於或豐夫自帝城以至御苑爰構黃棚以造蒼穹製麗錦以作殿結彩繪而為宫遍植四時之花開皆頃刻忽種數尋之樹氣便鬱葱亭則肖夫圓蓋橋則類夫垂虹十二里錦幄參差光飛璀璨數百丈花屛宛轉影映玲瓏遍處笙歌隱隱聽鈞天之雅奏連宵燈火行行如元夜之紗籠市列多珍來去公卿欣對百代流傳之清玩肆羅異物嬉遊士女驚為千載難得之竒逢珠帽錦衣不叱牧豎擔夫之相混香車寶馬頻塞長堤廣陌而難通然此止言郊外而尚非城中也至若金闕大觀玉街全盛望而可悅即而生敬論繁華則百戲具陳語莊嚴則諸方清淨飭寶剎為誦經之所鐘魚佛號同宣創崇臺為演劇之場簫鼓仙音互競千重樓閣雲雖高而勢欲相凌百尺幢幡風雖微而影終不靜舉鞭數之未得清走馬看之豈易竟雨灑則晝絶纎埃月出則宵懸明鏡異香從天上飛來竒彩豈凡間得竝羣賡萬壽之無疆共賴一人之有慶於是天下效嵩呼興華祝集錦韉攢鈿轂旗標省㑹之名簡題進獻之目貫珠成幛影現光華鏤玉為亭香飄芬馥萬方貢物連旬得以縱觀羣彥頌言纍月難於卒讀我皇之進宫也九州童叟向鑾輅以跪迎尊親出自至性瞻雲就日以見微忱我皇之升殿也萬國衣冠對玉陛以拜揚忠愛發於至誠頌德歌功而綿景福普天率土孰不感君恩儋爵析圭疇不享天祿是以瞻儀仗則億兆歡欣望宫闕則臣工肅穆逮綸音大沛於廟堂而祀典方隆於嶽瀆異數必先於薦紳湛恩不遺於蔀屋紫泥丹誥不止及身之榮也而先後竝邀夫寵榮錫復蠲租固為良民之慶也而愚頑且寬其刑剭科添鄉㑹多士盡荷甄陶賜遍耆英三老咸䝉樂育帝德之積纍殊深天和之感召自速花甲周而萬年之觴既盈麥秋近而四郊之雨旋足嵗功成則民望納禾農務興則鳥催播穀方喜兑澤之無愆早知豐嵗之可卜猗歟休哉此真盛不可逾美不勝録也乃拜手而為之頌頌曰聖人篤生膺厯數兮昊天子之永眷顧兮首重穯事五穀樹兮山田慮旱甘霖注兮水村憂潦旭日煦兮多黍多稌倉箱裕兮民隱是恤寬徭賦兮異域向風爭內附兮欽惟我皇福祿聚兮億萬斯年綿國祚兮萬壽詩七言律八首翰林院庶吉士臣朱綸太平宇內艷陽時宫啓蓬萊獻壽期華祝三多依黼座嵩呼萬嵗徹丹墀芝生玉殿祥雲繞蓂長瑤階淑景遲幸忝鵷班隨舞蹈涓埃慙未答洪慈其一紫鳳丹麟獻瑞頻鬱葱佳氣擁楓宸九疇自昔尊皇極萬物於今覩聖人德茂普天賡復旦仁深率土慶長春試看風動時雍日擊壤聲中景象新其二日月光華仰照臨緝熙遐邇識君心昭回共見天文炳乾惕從知聖敬深南極一星隨帝座東風百卉發華林長調玉燭禎祥集國史煌煌耀古今其三皇衷無逸著丹文帝德淵深在克勤物阜民安恩早遍宵衣旰食慮猶殷平成績與天心合大小才憑睿鑒分祝嘏彤墀春正暖坐調玉軫奏南薰其四春滿皇都淑氣和溶溶太液湛恩波八紘向化車書盛四海升平雨露多文德覃敷成禮樂武功耆定戢干戈祥煙篆結雲璈叶拜手齊賡大雅歌其五太和洋溢遍昭宣壽域𢎞開紫極懸解愠阜財依舜日耕田鑿井樂堯天好生每下祥刑詔給復頻書大有年久道化成忘帝力春風處處聽揮絃其六浩蕩如天沛湛恩農民歌舞遍村村紫泥封處宸章賁丹詔宣時帝語溫北闕榮光分蔀屋南山瑞氣滿天門臨軒俯採風謠遍奏雅吹豳頌至尊其七盛典躬逢樂未央臣民歡忭效趨蹌萬方玉帛瞻宸扆億兆梯航覲帝光道契至誠原不息壽徵悠久自無疆寸心葵向何由極敬進仙人九醖觴其八萬壽詩七言律四首翰林院庶吉士臣徐雲瑞寰宇升平寶厯綿千秋萬嵗戴堯天仙璈樂奏南山外法醖筵開北斗前律應和風春似海祥迎昌運福如川臣民盡在康衢裏拜手同賡獻壽篇其一帝德巍巍被海隅特傳心契闡疇圖雲開雉尾聞天語香爇龍涎繞御爐仁壽兩間盈淑氣升恆千載握真符蒼生比戶豐亨象皆沐層霄大澤濡其二鳳城魚鑰啓曈曨穆穆垂裳坐合宫航海梯山重譯至塗歌巷舞萬方同光騰玉陛丹霞上露滴金莖瑞靄中詞苑小臣如雀躍盡隨鵷鷺競呼嵩其三應運乘龍御九垓星懸雲漢亘昭回還占甲子三千衍自叶貞元八百開鶴算真同天地永鴻禧直闢混濛來恩膏養育無遺物草木長滋雨露培其四萬壽頌有序翰林院庶吉士臣馮汝軾臣聞聖人御世大德在躬大功及物則罄宜受福享國久長上格天心下孚民志而萬壽無疆之休皆操自一己為理數所必應非偶然也唐虞三代賢聖之君莫不敬天勤民享有大年詩書所紀歷歷不爽我皇上德盛功宏為隆古帝王所莫逮萬物得所百福攸宜久道化成與天地同悠久兹當六旬萬壽之期甲子初周敷天率土罔不欣喜百寮萬民恭崇顯號䖍請慶禮而我皇上聖度彌謙德大不居功大不伐不欲侈陳貞瑞崇尚虛文顧我皇上自開天立極於今五十有二年聖德神功昭布宇宙凡有知識咸知頌揚臣伏見我皇上尊先聖崇真儒闡明道統訓士育材則文治宣焉釐正臣工奬勵廉法知人如神舉措至當則吏道肅焉蠲租罷稅省刑肆赦則仁惠溥焉刋山導河疆理溝洫則民業安焉敬老引年揚善闡幽則雅化茂焉禮河望嶽慎修祀典則神貺昭焉德如此其巍蕩也中外一統覆幬歸仁幅員之廣凖符天度往者殱除三逆神州以寧𠞰滅臺灣海隅以靖蕩平漠北荒服以歸三苗來格尺土皆臣南交西僰之倫烏弋黃支之𨽻望星受吏懸度來藩者嵗無虛日功如此其𢎞偉也功大則禮備德盛則樂具禮樂之義通乎神明天清地寧民和物阜既位既育卜厯斯長其在於詩天保所詠如岡如阜日升月恆者舉不足賡揚聖算之萬一則我皇上之萬壽無疆自今伊始臣遭際昌期歌詠盛事追隨詞臣之末敬撰萬壽無疆頌十二章章十二句獻之闕廷頌曰帝受天命撫兹下民範圍八極經緯三辰穆穆聖皇保佑重申申之自天厯數無垠惟仁斯壽惟聖斯仁仁壽之域元氣如春其一皇帝御宇九域同居斗南斗北翠幕舒舒黃龍白雉澤馬器車貢道匪逺共此扶輿苗頑干羽荒服車書大哉一統混然古初其二帝德廣運合天地貞合天之道曰敬曰誠久而不息廣大髙明堯咨舜警惟一惟精心傳道脈集聖大成德與天合至哉無名其三道惟天縱學本生知圖書河洛妙契庖羲天人一貫作君作師千聖之統聖躬肩之聖能知聖道始無岐惟子朱子崇祀清時其四聖人圖治永慎成功恢恢乾紐握自宸衷朝日中昃其勤法宫恤民問俗蒸髦觀風六樂乃奏五禮攸同一日二日寧曠天工其五萬幾清暇天章聿煥雅頌典謨炳耀雲漢鳳羽龍鱗供兹宸翰元氣元音為文字冠書編四庫筆給三館一字之安欽哉睿斷其六覃敷文教豈弟作人天子制誥經術日深三物六行用淑其身維川有英維嶽有神羅而致之野無秀民多士濟濟如星拱辰其七廟算神謀耆武維烈動若風行亦如電掣滇有鴟梟彼翮之折閩粵有狐彼穴之抉海鯨塞狼牙拔尾紲孰敢不庭來歸則悅其八皇王用人如臂運指百爾君子惟天子使文臣之驂有左右史盧矢彤弓戎行亦喜激之揚之不廉者恥臣哉鄰哉以喜以起其九帝平水土河流既瀦口咨手畫成河渠書淮揚涿灞誰復其魚帝勞於邁民逸厥居有橇有輴河伯徐徐河伯恭命漣漪如初其十上帝好生我皇協帝小民之命大君之惠租賦是蠲動億萬計不辜是矜胥脫於繫如天之仁萬物利濟鼓腹而歌羣遊聖世其十一巍巍乎天雲星風雨巍巍乎帝神聖文武日精月華乾規坤矩占厯當陽乘時位午萬國來朝式歌且舞天子萬年受天之祜其十二萬壽盛典初集卷八十九
