body:
  text: 欽定四庫全書萬夀盛典初集卷九十三歌頌三十三詞臣二十五萬夀詩五言排律四十韻翰林院庶吉士臣王澍聖主當陽日敷天獻夀時萬方同拜手百辟共陳詞舜厯韶華永堯階蓂莢遲八風和碧落五色麗彤墀玉燭調三極金鰲奠四維卿雲欣復旦元會慶昌期寒谷人皆暖春臺物正熙心傳精一藴手定治平基運啓皇王籙天開神武姿太和徵有道闓澤本無私歷歲恩膏渥周天雨露施租蠲餘舊穀稅免足新絲法網開三靣絃歌遍九逵遴材門屢闢取士野無遺户有豐年樂賢多好爵縻片長俱採録輿論必疇咨詢事官方飭頒針庶績釐滿朝皆望散一德盡臯夔已合明良契彌勤宵旰思豳風屏已繪無逸卷常披卦畫符三聖圖成鄙九師先天重閩洛全數合軒羲論道臨宸扆崇儒御講帷文章三代並綸綍六經垂解慍彈瑶瑟成功鏤玉碑翰隨辰象轉筆帶化工竒寵賚昭雲漢珍藏重鼎彝揆文風逺播偃武化潛移但見歸牛馬誰聞誓虎羆六師親朔漠一怒靖邊陲凱奏歸神算民恬賴聖慈恫瘝時在抱纎悉必周知蔀屋煩清問河渠待指麾負圖龍獻瑞應德鳯來儀交泰三陽正時雍萬福隨桃生千歲實花動萬年枝瑞麥連鉤盾嘉蓮吐御池器車來澤國華蓋結雲芝觀海將蠡測瞻天只管窺小臣慙報稱長誦九如詩萬夀詩五言排律十二韻翰林院庶吉士臣周金簡中天開寶厯元會協昌期堯莢春雲動虞裳復旦垂輿圖長鞏日甲子甫周時電繞榮光轉虹流華渚移紫宸凝瑞靄黃道介繁禧萬國車書集三千禮樂隨金莖擎玉露翠幄發琪枝淑景龍樓繞歡聲瀚海馳普天同拜舞大地共歌思鳴佩趨鸞掖揮毫集鳯池墨霑三秀草春溢九霞巵願進無疆頌千秋慶錫祺萬夀詩五言排律二首翰林院庶吉士臣秦休鳯律春長紀龍飛日正中千齡逢令節四海慶昭融官柳垂條緑仙桃結蘂紅陽和隨地遍花甲與天同湛露飛堯酒薰絃藹舜風皇州佳氣滿舞蹈盡呼嵩其一帝德髙千古皇仁遍兩儀租蠲歡蔀屋刑措樂雍熙海宴河清候風和日麗時山川俱獻瑞天地自無私士沐菁莪化人承雨露慈衢歌同巷舞耕鑿復何知其二萬夀詩七言律八首翰林院庶吉士臣王時鴻德符大地夀齊天首出原超太極先玉燭調元孚禹甸璇圖開泰應堯年歌傳豳雅歡同洽慶衍箕疇福自全遙向五雲瞻帝座衆星環拱紫垣前其一亘古欣逢孝治隆皇家典禮備尊崇發祥逺軼睢麟頌啓聖相承任姒風日御龍衣供綵服晨趨鳯輦侍椒宫肅雍盛德由天授錫類推恩萬國同其二聖朝建極奏升平功敘歌時百度貞勤理萬幾寧海宇明齊七政仰鈞衡懷柔喬嶽俱修貢底績黃河久獻清當代巍巍勳烈峻上超五德邁三正其三萬乘雲屯指朔方績髙曠代武功揚永清紫塞銷烽燧逺撫黃輿順雨㿩三蘖總歸神䇿定六韜何似睿謨長編成玉册垂方略字字髙懸日月光其四徇齊聖德本天成道契羲皇易象呈精一心傳隆作述詩書手定盛文明龍川桃浪三春暖桂子珠宫八月榮雲漢昭回𢎞教化歡呼四海溢聲名其五蠲除肆赦詔頻宣參贊兼操化育權澤灑九天霑玉粒膏流四國裕金錢好生德感騶虞瑞宥罪仁回貫索躔寬大十行敷率土春臺康樂自年年其六逺集梯航萬國歡盛陳王會版圖寬多於禹貢爭歸賮勝似虞廷尚舞干蠻表鳥言㛠禮樂炎荒卉服習衣冠皇綱式廓恢無外帶礪河山寶祚安其七詞垣新進附鵷行疊被殊恩拜舜裳咫尺龍顔瞻日角輝煌鳯藻覩天章祥開五老榮光近語獻三多華祝長聖夀自今綿玉厯萬年永御帝圖昌其八萬夀頌四言七章翰林院庶吉士臣喬時適皇帝徇齊早嵗登極克纘克承發祥世德問安視膳和氣愈色備物博施歡同萬國朝暮弗違惟殫子職願億萬年為天下則其一皇帝寬仁天地同流東西南朔無逺弗周納諸襁褓民隱是求一夫噢咻懼政不修五風十雨滿車滿篝畞粟千鍾聽民自收夜不閉户熙皥與遊猶恤刑辟矜疑是摉願億萬年撫育九州其二皇帝濬哲知人安民六卿分職論材惟真封疆大吏悉簡忠純兼聼並觀燭照若神天工寅亮政出紫宸願億萬年長秉陶鈞其三皇帝恭儉旰食宵衣男耕女織繪於彤闈基命宥密凛哉危微土階茅屋丹漆者稀端冕臨朝綺縠可揮大官上食悉屏甘肥願億萬年式兹九圍其四皇帝神武震疊萬方逆藩不軌跋扈飛揚羅施牂牁七閩蠻荒天覆地載大恩若忘神謨廟算立掃欃槍遊氛撲滅易於探囊西羌醜類蹂躪邊疆千里轉鬭豕突鴟張六龍一駕壓彼螳蜋膏我斧鑕無有跳踉願億萬年永固金湯其五皇帝文明圖書在几講幄時開研窮至理赤軸青箱抽討靡已歷聖道源如掌易指宸翰矞皇典謨並峙振玉聲金鎔經鑄史刪定纂修洙泗同揆願億萬年山海積纍其六皇帝垂裳德洋恩溥咸五登三峻極千古山陬海澨莫不歌舞就日瞻雲歡洽區宇微臣愚昧濫被簪組如管窺天安敢覼縷稽首作頌優容草莽願億萬年永戴聖主其七萬夀詩柏梁體一首翰林院庶吉士臣董宏聖人受命厯無疆五十二載開明堂璣衡手握符穹蒼包含九垓頓八荒大共小球歸職方海隅日出皆來王一人恭已垂衣裳星辰日月繪采章潤色禮樂興廟廊武功文德交輝煌夔龍臯益垂殳斨股肱元首賡明良薰風一曲琴絃張阜財解愠膏澤滂上軼殷夏嫓陶唐皇極克建夀而臧宜民宜人保佑昌五福洊膺如阜岡四海喜溢春風揚扶携老幼環天閶提挈筐篚擎壺漿瑶池酒熟紅桃香既醉齊稱難老觴紫宸髙居臨青陽山呼萬歲川浮光簫韶九奏和鸞凰率舞百獸紛趨蹌時清人悅歲則穰太和元氣協雨暘小臣稽首彤墀旁槖筆欲書雲物祥升平嘉會樂未央天清地寧共久長萬夀詩五言排律三十韻翰林院庶吉士臣周彬寶厯升恆合皇基眷祐長六旬綿景運萬歲集嘉祥德與乾坤並恩同海嶽量建中操政術垂訓作王章倫物都明察身心鎮就將隆儒傳絶學崇祀振綱常祿逮關閩後躬登洙泗堂絃歌通海國教化洽膠庠宸扆書無逸宵衣問未央照臨齊日月調燮到隂陽天上三階正朝端庶績康好生開密網圗治舉宏綱大賚周窮壤深仁浹逺鄉化行滋富庶俗美保豐穰在鎬天顔喜吹豳世道良雷霆平蜀道烽火息閩疆沙漠皇威暢邊廷聖武揚九州恢土宇重譯效梯航謨烈踰周后隨刋過夏王洪瀾遵指授巨浸息汪洋茀祿隆千古聲名溢八荒虹流華渚日電繞斗樞旁松棟紅輝抱蓂階紫靄翔帝車朝炳煥御宿夜光芒好鳥鳴蘭殿飛花散柳塘三春文囿景百福舜壺漿華祝陳宸極嵩呼徹帝閶來儀鳯翽翽率舞獸蹌蹌錫福頒綸綍揚言進縹緗清寧齊聖夀衢室永垂裳萬壽天保九如歌翰林院庶吉士臣胡煦如山髙聳鬱嵯峩地近雲霄瑞靄多占象特開仁夀域六旬初進九如歌其一如阜嶙峋盡仰瞻增髙常共海籌添寰中百族叨培植春滿郊原雨露霑其二如岡屹峙更連綿蘊藉霖膏普大千遍植桐枝棲鳯羽􅗳喈時聽頌聲傳其三如陵更覺勢崢嶸帝德髙深未易名仰嶽有情勞想像學山無術藉陶成其四如川方至浩無垠太液深涵四海春試看朝宗來萬𣲖恩波長共物華新其五如日東生海上霞扶桑萬丈吐光華離明長自垂今古普照無私未有涯其六如月金波皓滿空光含明鏡徹鴻蒙一輪髙擁青天上三五清輝萬古同其七如松挺植泰衡巔甘露和風養歲年節貫四時無改易龍鱗照灼五雲邊其八如柏菁蔥挺擢時乾坤淑氣集繁枝椒漿并祝正元會春酒同登介壽巵其九萬夀盛典初集卷九十三
