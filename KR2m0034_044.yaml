body:
  text: 欽定四庫全書萬壽盛典初集卷四十六慶祝二圖記四江南省江寧府松江府常州府鎮江府淮安府揚州府徐州安慶府徽州府寧國府池州府太平府廬州府鳳陽府滁州和州廣德州各屬臣民表文伏以聖壽齊天與三光而並久皇仁沛地偕萬物以同春運當六甲之正中虹流華渚時值五陽之盛長星貫瑶樞迓景福於無疆法乾行於不息億萬年日新月盛合軒圖堯鏡以光華千百國航海梯山向鳳闕鸞墀而拜舞普天同慶率土騰歡欽惟皇帝陛下經綸萬象綱紀三才聰眀睿知以有臨協雨露風霆之至教文武聖神而首出備禮樂刑政之宏模福祿攸同海宇共登仁壽聲靈丕振乾坤久頌升平發粟蠲租省刑肆赦必使物物得所而後愜於懷巡河咨嶽重道崇儒但覺事事合宜而可垂為法五紀之深仁厚澤普浹寰區一代之聖德神功逺超隆古太和翔洽嘉兆洊臻當三月十八之芳辰值萬壽六旬之聖節慶雲成蓋瑞草盈階天酒凝甘地泉流醴球圖寶鼎文現太平銀甕丹甑字成萬歲天不愛其道地不愛其寶人不愛其情在在布吉祥之氣士皆歌於朝農皆歌於野商皆歌於市年年增歡喜之心祿位名夀兼隆聖人必得耆艾昌熾交頌君子樂胥臣等簪纓世受輦轂親承翠華屢涖南方膏澤被江干草木紫禁深居北極趨蹌傍天上星辰徒食德而飲和均霑化育恆戴髙而履厚莫報涓埃惟統十四郡之精誠祝延聖祚願合億萬民之夀算增益皇齡華封詎祇三多海屋將添百度貢芹獻曝慙非瑶島奇珍獸舞鳳儀恍聽鈞天廣樂青陽麗日噓錦繡之山川紫氣周天接蓬萊之觀閣珠元不夜燈轉九枝草盡長春花開四照歡聲雷動瑞靄霞蒸伏願咸五登三參天兩地聖代之河山永固千秋快覩昌期天家之日月方長十載迭逢盛典勒諸金石極文章禮樂之休隆叶以笙鏞宣郊廟神人之悅豫玉函芝檢遠逾嵩岱升中化日光天上嫓星雲復旦六合衍靡涯之慶萬年垂有道之長矣都察院左都御史臣趙申喬經筵講官吏部左侍郎兼翰林院學士臣王頊齡工部左侍郎臣阮爾詢日講官起居注司經洗馬掌局事兼翰林院修撰臣張廷玉日講官起居注翰林院修撰臣趙熊詔翰林院修撰臣王雲錦翰林院編修臣沈宗敬臣叢澍臣廖賡謨臣蔡學洙臣鄒奕鳳臣嵇曾筠臣楊開沅臣莊令輿臣繆沅臣儲在文臣徐斌臣須洲臣張起麟臣徐用錫臣孫時宜臣秦道然臣方覲翰林院檢討臣劉師恕臣陳均臣張照臣黃鉞臣黃趙音翰林院庶吉士臣卜俊民臣曹鳴臣劉於義臣潘允敏臣王圖炳臣楊士徽臣秦靖然臣杜詔臣楊祖楫臣何應鰲臣王澍臣狄貽孫臣程夢星臣周金簡臣王時鴻臣董胡宏臣楊湝臣夏慎樞臣徐依臣湯大輅原任翰林院待詔今候補臣曹曰瑛山東道監察御史臣施雲翔貴州道監察御史臣吳蔚起户部福建清吏司郎中臣鄭朂四川清吏司郎中臣閔本貞雲南清吏司郎中臣阮應商江西清吏司貟外郎臣任奕𨨮江西清吏司主事臣湯震廣西清吏司主事臣朱廷寧禮部祠祭清吏司員外郎臣楊汝穀刑部浙江清吏司郎中臣汪升英福建清吏司郎中臣宮夢熊江西清吏司主事臣胡嶽齡廣東清吏司主事臣張景載工部都水清吏司郎中臣陸遐昌中書科中書舍人臣陳厚耀行人司行人臣胡廷鳳臣吳普內閣掌典籍事中書舍人臣王鳳孫內閣中書舍人臣莊楷臣樊致一臣施燾臣潘乘龍臣張祖鎬臣李炳石等恭進浙江全省臣民表文伏以乾坤覆載萬年永慶升平日月照臨八表共登仁壽聖心合天心為一瑞啓昌符君志與民志相通祥開景運一人有慶會歸拱北極之尊萬福來同保定仰南山之固千官忭舞億兆歡呼欽惟我皇上化徴悠逺治洽貞恆文武聖神聰眀睿知髙千聖而邁百王剛健中正篤實輝光貫三才而參兩大敬天尊祖一氣感孚勤政愛民萬幾時敇當物阜年豐之日迭蠲萬萬金錢值河清海晏之時篤念元元生聚平藩鎮則中土乂安征沙漠則邊烽永息謨烈垂於萬世舊章與新命同承創守兼自一身文德與武功並懋慮懷襄而巡河咨嶽何殊刋木隨山憂水旱而赦罪減租盡沐和風甘雨鳳在岡麟在囿作人逺邁於周庭河出圖洛出書觀象上追夫羲畫丙丁甲乙啓四庫之精英訓誥典謨綜百家之述作觀文製厯必抉奧而探微講射工書且出神而入聖內寧外攘廓從來未闢之版圖近悅逺來敷亘古莫通之聲教朝乾夕惕保泰持盈既以天下之心為心即以蒼生之福為福雨暘時若年穀順成聖意彌謙聖德彌廣萬册鳳鸞之紙管窺祗得其大端羣方鼓吹之詞枚舉難量夫衆美紀春王於三月開壽域於九天當花甲之初周值陽和之正麗東皇布令宏施發育之功南極呈祥丕煥光華之象雲樓氣敞綵仗晴薰膏露醴泉休徵畢至珠函銀甕上瑞駢臻惟盛朝弗尚竒祥而聖主專修實政開科取士萃六合九州之俊彥盡沐甄陶發粟蠲租統山陬海澨之黎氓胥歸怙冒鑿齒雕題之衆跂行喙息之倫重譯來朝梯航入貢望龍顔而申華祝肅虎拜而效嵩呼喜氣霞蒸歡聲雷動臣等生逢全盛幸際郅隆嬉遊於化日光天千八百國淪浹於深仁厚澤五十二年況稽山越水之間翠輦時聞警蹕而鷲嶺竺峰之勝奎章屢賜品題十一郡感荷最深百萬户謳歌莫罄自今日瑶樞燦爛遞周甲子三千計他時椿樹滋榮永歷春秋萬六心惟向日望切瞻雲伏願天地同春海山並壽三登七稔寒暑節而四時成十雨五風陰陽和而萬物得先天生而後天不老羣奉有道之聖人御世久而福世彌長共仰太平之天子則輿圖永固綿國祚於千百祀而有餘福祿攸同保泰履於億萬年而無極矣禮部尚書臣陳詵經筵講官刑部尚書臣胡會恩經筵日講官起居注翰林院掌院學士兼禮部侍郎教習庶吉士臣湯右曽內閣學士兼禮部侍郎臣沈涵臣蔡升元通政使司右參議臣陳汝咸左春坊左中允兼翰林院編修臣陳邦彥臣陳世倌翰林院編修臣髙輿臣查慎行臣萬經臣查嗣庭臣戚麟祥臣沈樹本翰林院檢討臣諸起新臣史尚節臣壽致潤臣顧五達臣陸紹琦臣盧軒臣詹銓吉臣嚴思位翰林院庶吉士臣徐雲瑞臣許鎮臣俞鴻圖臣徐杞臣錢廷獻臣沈世屏刑科掌印給事中臣錢以塏禮科給事中臣詹嗣祿掌河南道事浙江道監察御史臣胡德邁吏部文選清吏司主事臣張王典户部廣東清吏司郎中臣許維模廣西清吏司郎中臣陸雲從江西清吏司員外郎臣田軒來山東清吏司員外郎臣王洽祖雲南清吏司員外郎臣徐肇顯山東清吏司主事臣范光曦禮部祠祭清吏司郎中臣陳嵩精膳清吏司郎中臣楊存理兵部武選清吏司主事臣談九敘刑部江南清吏司郎中臣陳元主事臣俞存仁督捕司主事臣婁銓工部虞衡清吏司主事臣姚德堅內閣中書舍人臣倪璠等恭進浙江省擊壤亭歌天開景運兮篤生聖人允文允武兮乃聖乃神撫綏萬邦兮豐年屢臻帝猶厪念兮朝夕咨詢蠲租賜復兮九有咸均湛恩汪濊兮至德無垠普天率土兮莫不尊親願君萬歲兮粒我蒸民其二青陽司令兮晨現農祥雨暘時若兮百穀蕃昌桑麻被野兮婦子樂康嬉逰作息兮化日舒長扶老㩦幼兮來覲龍光王路蕩平兮以翺以翔卿雲糾縵兮南極耀芒惟天錫福兮聖壽無疆福建山東江西河南廣東廣西六省臣民表文伏以星雲獻瑞千齡啓聖之期木火司權五德當王之運值虹流之令節金闕騰輝際電繞之芳辰玉階春滿休光下燭嘉氣旁通蓋天生有道之聖人會有極歸有極必躬享無疆之厯數如月恆如日升斂諸福以彌新體一元而敷惠深仁厚澤少而壯壯而老皆大化之所涵濡強固精明誠則久久則徴與造物同其悠逺欽惟皇帝陛下保合太和緝熙純嘏天縱神武當寶祚之方新遂已櫜弓矢而奠家邦學備聖文即翠華之在御亦必對詩書而稱古昔道建疇範之極備寒暑雨暘而皆得其時心契河洛之傳歷元會運世而不愆其數所以聲靈遐振多方久慶升平福祿來同寰宇共登仁壽撫五辰而致順育萬物以皆昌乃者日麗胃維月纒青陸陽開泰而更盛正一人納慶之辰令當和以迎休乃八方禔福之日風吹大澤日照昌期黃雲覆晨赤光炳夜恭逢萬壽節是長春共賀六旬蓂舒初葉天垂雲漢仰周代作人之恩民沐雨膏陋漢家賜復之詔必得其壽必得其名命自申於穹旻俾爾熾昌俾爾多益福乃均於品庶西郊晝永夾道香濃北極星輝寰區瑞現雕題鑿齒皆航瀛海而來卉服鳥言親覩皇居之大而乃睿思謙抑更辭祝於三多玉旨昭宣願底寧於萬國此惟江海善下每有納流之心然而日月居髙共仰照臨之位汪濊普周於八裔歡呼逺匝於九圍雖罄祝嘏之詞曷稱頌揚之旨慶超邃古美冠將來臣等仰荷鴻鈞親逢景運潢汙比陋河清幸遘於千年塵壤均微山祝同呼於萬歲適天人之嘉會神聖篤生伸臣子之微情謳歌競獻傾心舜日欣福祉之彌長翹首堯天頌夀祺之永久伏願業侔地富算比天崇撫大順於璿璣萬靈效祉御至和之玉燭四海交歡民洽好生人登仁夀瞻雲煥爛擊壤逍遙自祖父以迄孫曽稱觥躋堂長奉天顔之有喜由畿甸以暨海表嵩呼華祝羣知帝祚之無疆矣文淵閣大學士兼吏部尚書臣李光地世襲衍聖公臣孔育圻福建一等海澄公臣黃應纘豫告吏部尚書臣宋犖户部右侍郎臣廖騰煃總督倉場户部右侍郎臣施世綸經筵講官禮部左侍郎兼翰林院侍讀學士臣王思軾原任刑部右侍郎臣張志棟豫告工部左侍郎臣李元振經筵講官內閣學士兼禮部侍郎臣彭始摶原任都察院左副都御史臣左必蕃宗人府府丞臣李濤內升布政使司布政使臣李華之都察院左僉都御史臣呂履恆詹事府少詹事兼翰林院侍講學士臣梅之珩通政使司右通政臣張德桂原任通政使司右通政臣楊篤生國子監祭酒臣徐日暄順天府府丞臣王懿右春坊右庶子掌坊事兼翰林院侍講臣閻錫爵翰林院侍講臣吳垣臣魏方泰右春坊右贊善兼翰林院檢討臣孫勷國子監司業臣魯瑗提督浙江學政翰林院編修臣宋至翰林院編修臣潘體震臣彭廷訓臣林之濬臣鄭任鑰臣李紱臣陳似源臣呂謙恆翰林院檢討臣王傳臣蔣肇臣柯喬年臣吳相臣張懋能臣李日更臣李掌圓臣黎致遠臣劉大轂臣何世璂臣邱尚志翰林院庶吉士臣趙泰臨臣李中臣于廣臣宋筠臣陶成臣周鳳來臣李鍾僑臣林昻臣喬時適臣漆紹文臣林景拔臣胡煦臣張淳臣孟班臣莫與及臣魯立臣謝世濟吏科掌印給事中臣潘錦户科掌印給事中臣耿惇禮科掌印給事中臣陳允恭工科掌印給事中臣劉士聰掌京畿道事山西道監察御史臣李永紹四川道監察御史臣璩廷祐稽察錢局河南道監察御史臣吳梁協理河南道事山西道監察御史臣張世祺協理山西道事江南道監察御史臣李璿協理山西道事陜西道監察御史臣李柟巡視中城浙江道監察御史臣陳書巡視南城廣東道監察御史臣李景迪巡視西城廣西道監察御史臣劉慎原任雲南道監察御史臣廖之諒吏部稽勳司郎中臣郭晉熙吏部驗封司郎中臣裘君弼户部福建司郎中今授直𨽻分巡天津道臣王光奭户部山東司郎中臣莫象年户部江南司郎中臣田肇麗户部江西司郎中臣馮肅户部貴州司郎中臣程懋禮部儀制司郎中臣鄭晃刑部雲南司郎中臣吳琳芳刑部江西司郎中臣朱綱刑部四川司郎中臣周祚顯刑部陜西司郎中臣鄒球吏部考功司員外臣林紹祖吏部稽勳司員外臣陳廷綸户部四川司員外臣謝賜履户部廣東司員外臣張為政户部雲南司員外臣范如璋兵部職方司員外臣任坪刑部四川司員外臣孫叔詒刑部山西司員外臣劉天眷刑部福建司員外臣李承祖工部屯田司員外臣夏疇工部都水司員