body:
  text: 欽定四庫全書萬夀盛典初集卷七十三歌頌十三詞臣五聖夀無疆頌有序候補翰林院侍講臣楊名時臣聞乾元行健而貞恒之體常運於穆清天徳大生而保合之和日滋於氣化唯聖人與穹蒼而同量斯厯數自悠久以無疆欽惟皇帝陛下至誠得天亶聰作后沖齡御宇照臨幷日月之升恒妙道乗權鼓舞叶雨雷之潤動揆文教而奮武衛北邊南徼登衽席者自耆耋以逮童孫飭吏治而育賢才庶士羣工頌菁莪者閱歲年而踰累紀皇澤溥矣蕩蕩乎民誠物阜既敷天享五福之徴聖徳洋矣皥皥乎上恬下熙且率土效三多之祝歲維癸巳月屆丙辰龍蛇啓蟄而暖動旌旗離坎交輝而和􅅤律吕欣際六旬之嘉慶兆景命於萬年快覩初度之昌期洽歡情於億姓奉琛獻賮朝宗逺集殊方航海梯山抃舞爭趨魏闕天開日霽喜氣接乎穹旻景淑風和榮光溢乎寰宇臣生逢盛事欲揚功扢美而莫罄形容樂紀休徴思祝嘏陳釐而未工頌禱惟是深窺集祉凝祥之本仰見體元敦化之衷良由陽徳方亨應乾乾於易象仁心為質達亹亹於文思是以精神之運量根於性而命亦同符廣厚之滋培乗乎理而數亦兼得如川方至召和悉自宸修積日彌崇歛福端存皇極爰上摭髙深之萬一用稍抒稱願之涓私詎敢慕卷阿彌性之賡庶幾康衢擊壤之詠云爾謹拜手稽首而獻頌曰天眷皇清篤生聖主貞元交㑹如日當午前有陶唐世以千數我皇之興實接其武論徳則均稱勲維侶天心佑之用秩厥祜厥祜維何永馭兆民薄海内外罔有不臣戴之如天怙之如親鴻號煥赫曰聖曰神螽斯麟趾蟄蟄振振春秋鼎盛方當向晨癸巳三月庚甲初周既望四日華渚虹流萬方咸喜巷祝衢謳内自京畿下訖方州士民呼抃童叟携遊恩膏旁霈罔遺澨陬樂以天下福被九垓沐浴詠歌僉曰盛哉邁迹漢唐比肩虞邰翳福之隆皇躬是培成性存存道備徳該臚陳梗畧紀厥由來維皇懋敬有翼其臨中心無為澹泊湛深户牖盤帶咸掲銘箴夙夜基命式玉式金嚴恭昭事時勅靡諶幾康協止穆穆愔愔維皇天縱研精經㫖羲文周孔睿思徹髓游情書數超悟神理子史旁羅存真絶似源若江河沛乎無涘膏潤所漸八表霑被多聞建事道積身修明物察倫與舜為儔大哉尊養寢門視羞慈比姬朝式穀貽謀惇叙勸親九族䝉庥家邦四海愷惠油油知人則哲建官惟賢宮府中外罔有異焉公忠賞錄僉壬屛捐離明兼照用中以權勵世磨鈍陶冶轉旋法廉輔治人樂堯天宵旰憂勞不遑食息罔餙服御以裕民力賜復蠲租積貯屢飭恤兵惠商詎惜萬億慮逺計周不動聲色八荒雖遐如在闥閾謂國之脈係於輓輸維河與漕表裏相需親臨詢度爰定訏謨指顧功成泛溢無虞昔之澤國變為膏腴農人有秋載歌黍稌赫赫皇武髙於華嵩始定逆藩廟算昭融濯征漠北聲靈益隆海隅日出正朔咸通含生負氣畢荷帡幪震耀古昔傳世無窮我皇右文宏闡儒術崇聖褒賢俾知統壹訪求後裔世予清秩禮儀之備前代罔匹愛育人材宣幽導鬱比户歌風談經接膝帝心詳慎尤恤於刑既定律例復致丁寧原情凖理虛中以聽矜疑流宥寧失不經吏咸秉徳犴獄草青溢作嘉祥至治升馨帝念耆舊時降温綸禮遇有加錄及子孫下逮庶老粟帛是分典繼虞周齒貴賢尊含和飲淳不知所云扶杖觀化俗返炎軒至徳不徳皇惟守沖不受尊號不襲登封度越百代為帝者宗緬彼陶唐克讓允恭民無能名孰罄厥功帝力何有冺然與同亶惟皇猷烜爍顯懿運世於掌若身使臂曷由而然匪恃才智以敬以誠曰徳曰義何幽不燭何艱不易得一而貞參天兩地天行曰健我皇體之自强不息百志惟熙剛中居正罔有騫虧純粹以精昭假遲遲受命式固徧徳羣黎自我天覆同躋夀祺大徳曰生我皇是秉淵黙垂衣不事威猛寛平優遊化日舒景民登春臺方外延領大君仁夀立極主静順則從心披熏晝永天錫皇祉保艾自身荷禄綿遐日盛月新九齡神畀期頤聿臻坐致舜年則百斯旬奄逾堯厯八千為春時萬及億自天用申臣昔簪筆鵠侍帝旁乾坤之容日月之光涵育照臨奚能測量兹逢誕彌稱萬歲觴載賡純嘏永熾而康仰瞻雲漢倬亘為章萬壽盛典初集卷七十三
