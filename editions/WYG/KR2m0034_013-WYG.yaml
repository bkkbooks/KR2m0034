body:
  text: 欽定四庫全書萬夀盛典初集卷十三典禮三祭告一康熈五十二年三月初六日癸未皇上允禮臣請於萬夀節前一日遣官告祭天地太廟社稷太常寺謹奏為恭逄仁夀昌期籲請舉行大典以迓神貺以慰輿情事准禮部文稱每遇萬夀聖節致祭太廟後殿真武廟東嶽廟城隍廟今嵗聖主六旬大慶非比常年除例祭外伏懇告祭天地太廟社稷祝文由翰林院撰擬其開列遣官恭設祀品等項太常寺照例備辦等因具題奉㫖是欽此欽遵到寺相應於萬夀聖節前期十七日告祭天壇地壇太廟社稷壇祝文由内閣恭捧賫送四處應各遣大臣一員行禮為此請㫖康熙五十二年三月十二日摺子啓奏本日奉㫖天壇遣崇古禮行禮地壇遣汪吾禮行禮太廟遣富寧安行禮社稷壇遣赫碩色行禮天壇告祭文維康熙五十二年嵗次癸巳三月朔戊寅越十有七日甲午嗣天子臣恭遣都統臣崇古禮敢昭告於皇天上帝曰臣仰荷景命纘承丕基臨御萬邦勤求上理於今五十二年夙夜孜孜罔敢暇逸惟以上荅天眷下阜民生為務兹者六旬始屆四方咸寧皆託鴻庥黙垂純佑歴年既久乾惕彌深惟期兆姓之安即為眇躬之福兾邀帝鑒俯順臣衷俾得時和年豐家給人足俗咸躋於仁夀世共享夫昇平謹告地壇告祭文維康熙五十二年嵗次癸巳三月朔戊寅越十有七日甲午嗣天子臣恭遣都統臣汪吾禮敢昭告於皇地祗曰臣仰荷景命纘承丕基臨御萬邦勤求上理於今五十二年夙夜孜孜罔敢暇逸兹者六旬始屆四方咸寧皆託鴻庥黙垂純佑歴年既乆乾惕彌深惟期兆姓之安即為眇躬之福兾邀神鑒俯順臣衷俾得時和年豐家給人足俗咸躋於仁夀世共享夫昇平謹告太廟告祭文維康熙五十二年嵗次癸巳三月朔戊寅越十有七日甲午孝曾孫嗣皇帝臣謹遣吏部尚書臣富寧安敢昭告於太祖承天廣運聖徳神功肇紀立極仁孝睿武𢎞文定業髙皇帝孝慈昭憲敬順慶顯承天輔聖髙皇后太宗應天興國𢎞徳彰武寛温仁聖睿孝隆徳顯功文皇帝孝端正敬仁慈荘敏輔天協聖文皇后孝荘仁宣誠憲恭懿翊天啓聖文皇后世祖體天隆運英睿欽文大徳𢎞功至仁純孝章皇帝孝康慈和荘懿恭惠崇天育聖章皇后曰臣仰荷景命纘承丕基臨御萬邦勤求上理於今五十二年夙夜孜孜罔敢暇逸兹者六旬始屆四方咸寧皆託鴻庥黙垂純佑歴年既久乾惕彌深惟期兆姓之安即為眇躬之福兾邀慈鑒俯順臣衷俾得時和年豐家給人足俗咸躋於仁夀世共享夫昇平謹告社稷壇告祭文維康熙五十二年嵗次癸巳三月朔戊寅越十有七日甲午嗣天子恭遣禮部尚書臣赫碩色敢昭告於太社之神太稷之神曰朕仰荷景命纘承丕基臨御萬邦勤求上理於今五十二年夙夜孜孜罔敢暇逸兹者六旬始屆四方咸寧皆託鴻庥黙垂純佑歴年既久乾惕彌深惟期兆姓之安即為眇躬之福兾邀神鑒俯順余衷俾得時和年豐家給人足俗咸躋於仁夀世共享夫昇平謹告十八日乙未詔遣官致祭五嶽五鎮四海四瀆長白山及歴代帝王陵􅆍先師孔子闕里四月初一日禮部尚書臣赫碩色等謹題為欽奉恩詔事康熙五十二年三月十八日恭奉恩詔一款五嶽四瀆等祀應遣官致祭著察舊例舉行恩詔又一款歴代帝王陵寢先師孔子闕里應遣官致祭著察例舉行該臣等查得致祭五嶽五鎮四海四瀆長白山歴代帝王陵寢先師孔子闕里應照例將宗人府内閣翰林院六部理藩院都察院内鑾儀衛等衙門滿漢侍郎以下四品以上堂官差徃致祭其應差官員臣部移文俟各衙門送到之日開列職名并致祭之處具題恭候欽㸃差徃其香亭木匣罩袱等項由工部預備降真等香由户部預備祭帛由太常寺預備祭文翰林院撰擬其看守祭文香帛將臣部筆帖式及太常寺筆帖式酌量差往欽天監選擇吉日起程致祭官員先期齋戒一日臣部將祭文香帛交與致祭官員前往所有致祭應用等項行文該地方官照例備辦俟命下臣部之日照例遵行可也謹題請㫖本月初三日奉㫖依議禮部祠祭司為欽奉恩詔事禮科抄出該本部題前事奉㫖依議欽此欽遵到部相應咨劄各衙門可也一咨翰林院撰祭文六十道一咨工部取黄縀銷金雲龍夾袱六十箇盛祭文竹筒六十箇用紅油漆尺寸與盛詔書筒一様帛匣六十箇寫祭文白鹿裱紙六十張香亭一座龍亭一座御仗一對一咨户部取降真香六十柱速香六十包每包重一斤一劄太常寺取帛六十叚派筆帖式一劄欽天監擇日期一遣官致祭兀喇地方長白山之神遼東廣寧北鎮醫巫閭山之神混同江北海之神遼東廣寧中屯衛遼太祖陵祭品一劄奉天府一劄太常寺一行寧盛京将軍一行古塔将軍一遣官致祭山東濟南府泰安州東嶽泰山之神青州府東鎮沂山之神莱州府掖縣東海之神兖州府曲阜縣少昊金天氏陵兖州府東平州帝堯陶唐氏陵兖州府曲阜縣先師孔子闕里祭品行山東布政司一遣官致祭陜西西安府華隂縣西嶽華山之神鳳翔府隴州西鎮吳山之神延安府中部縣黄帝軒轅氏陵西安府咸陽縣周文王陵周武王陵周成王陵周康王陵西安府涇陽縣漢高祖陵西安府咸安縣漢文帝陵西安府長安縣漢宣帝陵耀州三原縣唐髙祖陵西安府醴泉縣唐太宗陵華州蒲城縣唐憲宗陵西安府涇陽縣唐宣宗陵耀州富平縣後魏文帝陵四川成都府江瀆之神祭品一行陕西布政司一行四川布政司一遣官致祭河南河南府登封縣中嶽嵩山之神南陽府唐縣淮瀆之神懐慶府濟瀆之神開封府陳州太昊伏羲氏陵開封府西華縣商髙宗陵開封府鄭州周世宗陵孟津縣漢光武帝陵河南府鞏縣宋太祖陵宋太宗陵宋真宗陵宋仁宗陵祭品行河南布政司一遣官致祭湖廣衡州府衡山縣南嶽衡山之神衡州府酃縣炎帝神農氏陵永州府道州寧逺縣帝舜有虞氏陵祭品行湖南布政司一遣官致祭山西渾源州北嶽恒山之神平陽府霍州中鎮霍山之神平陽府蒲州西海之神河瀆之神平陽府趙城縣女媧氏陵平陽府蒲州榮河縣商湯王陵祭品行山西布政司一遣官致祭浙江紹興府會稽縣南鎮會稽山之神紹興府會稽縣夏禹王陵江南江寧府明太祖陵祭品一行浙江布政司一行江蘇布政司一遣官致祭廣東廣州府南海之神祭品行廣東布政司一遣官致祭直𨽻大名府滑縣顓頊髙陽氏陵帝嚳髙辛氏陵大名府内黄縣商中宗陵順天府房山縣金太祖陵金世宗陵昌平州明宣宗陵明孝宗陵明世宗陵順天府望祭元太祖陵元世祖陵祭品一行直𨽻廵撫一行順天府每處應用祭品牛一隻猪一口羊一羫大羮和羮鹿醢兎醢魚醢醓醢豚胉脾析芹葅笋葅菁葅韭葅鹿脯鰝魚鉶鹽榛菱芡棗栗白餅黑餅黍稷稻粱酒燭四月初六日禮部尚書臣赫碩色等謹題為欽奉恩詔事據欽天監呈稱康熙五十二年四月二十一日戊辰宜用辰時遣官致祭五嶽五鎮四海四瀆長白山等處歴代帝王陵寝先師孔子闕里吉等語應照選擇吉期遣官前往致祭照例兀喇地方長白山之神遼東廣寧北鎮醫巫閭山之神混同江北海之神遣官一員山東濟南府東嶽泰山之神青州府東鎮沂山之神莱州府東海之神遣官一員陕西西安府西嶽華山之神鳳翔府西鎮吳山之神四川成都府江瀆之神遣官一員河南河南府中嶽嵩山之神南陽府淮瀆之神懐慶府濟瀆之神遣官一員湖廣衡州府南嶽衡山之神遣官一員山西渾源州北嶽恒山之神平陽府霍州中鎮霍山之神蒲州西海之神河瀆之神遣官一員浙江紹興府南鎮會稽山之神遣官一員廣東廣州府南海之神遣官一員河南開封府太昊伏羲氏陵商髙宗陵周世宗陵河南府漢光武帝陵宋太祖陵宋太宗陵宋真宗陵宋仁宗陵遣官一員湖廣衡州府炎帝神農氏陵永州府帝舜有虞氏陵遣官一員山西平陽府女媧氏陵商湯王陵遣官一員陕西延安府黄帝軒轅氏陵西安府周文王陵周武王陵周成王陵周康王陵漢髙祖陵漢文帝陵漢宣帝陵唐髙祖陵唐太宗陵唐憲宗陵唐宣宗陵後魏文帝陵遣官一員山東兖州府少昊金天氏陵帝堯陶唐氏陵先師孔子闕里遣官一員直𨽻大名府顓頊高陽氏陵帝嚳髙辛氏陵商中宗陵順天府金太祖陵金世宗陵明宣宗陵明孝宗陵明世宗陵起輦谷地方元太祖陵元世祖陵遣官一員例有元太祖元世祖在順天府望祭今此遣官亦在順天府望祭浙江紹興府夏禹王陵江南江寧府明太祖陵遣官一員遼東廣寧遼太祖陵遣官一員此十六處應將各部院衙門送到應差官員職名開列具題恭候欽㸃差往其差往官員筆帖式由兵部照例給發勘合可也為此謹題本月十三日奉㫖恩詔内有各直省綠旗兵丁俱應加賞賚一款今各省鎮廟等處遣官致祭其賞賚綠旗兵丁之事即著致祭官員帶同監賞一次即可完畢不必再差且不致重復騷擾驛站若無祭祀省分叧𣲖官員前往這所差著查八旗副都統以下叅領以上并各部院衙門堂官開列具奏四月十六日禮部等部尚書臣赫碩色等謹題為欽奉恩詔事全疏載第三十六卷賞兵條中本月二十二日奉㫖長白山醫巫閭山等處遣覺羅歪三致祭遼太祖陵遣殷濟納致祭南海遣馬雲霄致祭顓頊髙陽氏等陵遣王臣致祭黄帝軒轅氏等陵遣蔡升元致祭西嶽華山及江瀆等處遣查弼納致祭南鎮會稽山遣拉都渾致祭夏禹王陵及明太祖陵遣周起渭致祭東嶽泰山等處遣孫柱致祭少昊金天氏等陵孔子闕里遣廖騰煃致祭中嶽嵩山等處遣李先復致祭太昊伏羲氏等陵遣明安致祭南嶽衡山遣羅占致祭炎帝神農氏等陵遣陳汝咸致祭女媧氏等陵遣鄒士璁致祭北嶽恒山等處遣李敏啓致祭江西賞賚綠旗兵丁著額爾氣去福建賞賚緑旗兵丁著穆賽去廣西賞賚綠旗兵丁著許廷臣去雲南賞賚綠旗兵丁著瓦哈立去貴州賞賚綠旗兵丁著朱廷柱去餘依議萬夀盛典初集卷十三
