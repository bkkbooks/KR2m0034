body:
  text: 欽定四庫全書萬夀盛典初集卷七十六歌頌十六詞臣八萬夀詩七言律六首有序左春坊左贊善臣薄有德臣聞文思光被基洪算於蒼旻久道化成萃祥符於紫禁御蓂階而行慶瑞日再中坐松棟而頒恩澄河一色於是天申五福運啟萬年惟聖神與文武兼全斯祿位共夀名竝永古今一致理數必然欽惟我皇上聰明天亶聖敬日躋懋建中和盡本身徵民之道緝熙學問得開物成務之能居廣廈而論唐虞闡明政要臨講帷而表洙泗崇尚聖功禮莫重於親郊展誠報本祀莫大於合禘備物薦馨有典必禋無文咸秩承顔問寢歡心始自内朝視膳奉巵孝理形乎寰海六飛幸魯留御蓋於尼山萬乗升堂題奎章於闕里更以開来繼往徽國有功因而重道崇儒孔庭配食知人則哲春秋冬夏得其官立賢無方書判身言隨其器滋萌元氣則好生洽於民心𢎞濟烝黎則蠲賦周於宇内平成永賴興水利而建河防逺邇咸寧修文事而兼武備於是舞七旬之干羽整六月之車徒三蘖蕩平九州大定朔頒狼望連韝畏提劍之征賮納鮫人異域際止戈之代具制作之道者操制作之權知禮樂之源者興禮樂之事乃至金匱玉山之蘊北堂東壁之藏五夜常披十行俱下賦詩則卿雲晨露六經不刋灑翰則寶墨仙毫八埏皆燭星辰自轉難參旭日之輝鐘鼔雖陳莫續春雷之響猶且省方問俗旰食宵衣開帑藏以犒軍聽鼓鼙而訓將以無逸書御屏以執謙却尊號治無大小其愼其難政有後先盡美盡善遂乃神人恱豫天地休明九穀有年四方無事翾飛蠕動均霑訢合之仁畢雨箕風盡感資生之徳今兹陽春三月恭遇聖夀六旬景福咸臻嘉祥薦委萬八千年之洪厯未足頌揚千八百國之諸侯相從颺拜公卿陳天保之詩父老進華封之祝以至黄支烏弋丹鳯朱鳶莫不歸貢鴻臚書琛王㑹臣竊祿蘭臺備官芸局舞庭巢閣濫叨覆載之恩蠡測管窺難名髙厚之德幸遇一人有慶萬福来同敬獻里辭伏祈聖鑒臣有德拜手稽首而獻詩曰黄麾排仗日初東華渚虹光繞禁宫香擁山龍文陛上風迴笙鶴慶雲中九門曉啟千官入萬嵗歡呼五嶽同正與乾坤參久大繁釐戩穀彚皇躬其一睿算無疆始六旬永清函夏奠三辰王風皥皥如天覆帝德巍巍又日新手定羣書倡正學詔崇先哲覺烝民鸞旂幸魯尤加禮九拜升堂俎豆陳其二表裏山河萬里遥皇威赫濯武功昭金戈撻伐蠻烟静玉鼓龔行海霧銷疆里版圖通異國共球王㑹集熙朝髙居逺望無遺照猶為防河振玉鑣其三好生聖德洽天淵欽恤潛銷貫索躔大賚滂洋成解澤太平悠久屢豐年龍圖功烈登三五鳯厯春秋越萬千更飭官方重廉法考言詢事合宫前其四衢室垂裳百度貞萬幾偶暇玉函横珠毫揮灑龍鸞舞奎藻琳瑯雅頌聲聖又多能原首出誠惟不息是乾行鴻符崇號天人應尚執謙冲業愈宏其五雲漢為章髦彦多作人雅化洽菁莪橋門士值文明代殿閣臣賡喜起歌桃實千年乗泰運葵心萬國沐恩波祝堯敬上升恒頌地久天長永太和其六萬夀詩七言排律二十四韻有序右春坊右贊善臣孫勷臣聞之大雅嘉樂之詩曰嘉樂君子顯顯令德宜民宜人受祿於天保佑命之自天申之言聖人受天之祿而天命之申重保佑無有巳時蓋皆由其宜民宜人令德所致也而既醉之詩其稱君子萬年者葢長言不足而咏歌之至於反復數四而不厭其言之重詞之複焉臣以是知聖人在上躬大德而受天命於以長享景福至於億萬斯年非天之獨私獨厚於聖人其夀一人者亦所以福天下也則夫四海之内凡厥庶民朝廷之上百辟卿士所由作為歌詩用申其􅆺於天子之意非徒臣子愛戴君父為分誼當然亦皆自幸其生逢聖世獲事聖君親覩太平躬值盛事而歡欣鼓舞不能已於言也然自生民以来聖人受命而興躬備令德以宜其民人而致天命之申重保佑未有盛於我皇上之聖德神功超越千古而聖夀萬年與天無極者臣雖文詞鄙陋無能颺述聖主功德隆盛之萬一然臣於康熙四十有二年癸未之嵗恭遇皇上萬夀聖節嘗為詩十六章臚述皇上文德武功恢乎無外縝乎無間之實而聲教所訖東漸西被朔南咸暨含生抱質之倫沐浴聖澤淪肌浹髓各遂其生各復其性無一物不得其所之效迄今又十年皇上德彌以盛功彌以隆海内臣民被澤亦彌以深且厚今年春三月恭遇皇上萬夀聖節當甲子之初周實多福之聿始惟願自今以往聖夀無疆更幾千萬甲子靡有紀極以永綏永福我兆人則我兆人之至祝也況臣遭遇聖主備員侍從垂三十年屢承聖恩任使踰格其為感激舞蹈思欲發揚聖主功德之隆盛以竊附大雅詩人萬年之祝者豈能自己謹撰皇上聖德神功萬夀無疆長句詩一篇從天下臣民後誠歡誠喜稽首頓首上獻於闕廷臣不勝踴躍歡忭之至其詩曰聖皇集福錫臣民萬夀無疆天眷申極建中和興禮樂道隆作述見經綸春秋常盛精神大甲子初周氣象新四海謳歌爭送喜萬邦黎獻共惟臣德誠蕩蕩名難定功實巍巍古莫倫天縱聰明能更裕性成孝友行彌純經文緯武光謨烈重道崇儒闢莽榛虚受不遺一得細謙光轉益盛名臻皇威有赫兵氛靖帝道無頗風化淳奏當再三心尚惻蠲租鉅億嵗常頻英賢輻輳懐飢渇宵旰勤勞㤀苦辛嵗稔農人欣濟濟時和家室慶溱溱扶藜父老游膏澤寛網禽魚沐至仁周孔淵源遥脗合程朱義解㑹精醇勅幾餘暇兼游藝書法天然自入神和璧萬年輝日月隋珠千古耀星辰天文正大垂謨逺聖訓精㣲示法諄尊合君師參兩大恩同顧復戴千春梯山航海嵩呼集擊轂摩肩衢頌振祥驗軒櫺棲舞鳯瑞徵元圃見遊麟深春花柳全呈麗重譯共球競獻珍仙仗曙開金闕逈晴光曉漾玉河勻遭時丹穴多輝羽乗運天池竝躍鱗齊祝吾皇億萬嵗普天長此荷陶甄萬夀詩七言律十二首有序原任右春坊右贊善兼翰林院檢討臣尤珍臣聞唐堯德峻申三祝於華封夏禹功髙畀九疇於洪範惟神靈首出萬年開有道之長斯福祿来同四海效無疆之頌欽惟皇上徳符健順治協清寧應厯挺生著繞電流虹之瑞握圖受御徵感樞貫昴之祥巍乎煥乎覩星雲之糺縵悠也久也仰日月之升恒五十餘載之恩澤無窮億萬斯年之尊榮未艾兹值聖齡初度適逢花甲方周天佑一人民歌萬夀是日也律回姑洗風轉清明六宇澄鮮三台朗耀佳氣浮而慶雲現和風集而旭日升閶闔晨開周廬列衛軒墀晝静羽仗齊班集劍佩於花間羣分鵷鷺拜冕旒於日下競獻共球以至窮鄉僻壤之民左食侮言之族莫不喜溢嵩呼歡騰酺宴雲璈錦瑟聆雅樂於鈞天象管鸞簫奏仙音於閬苑瓊漿玉露頻増九醖之觴火棗交梨迭進千年之果覩蕃禧之滋至信純佑之重申此由我皇上聖德神功文謨武烈民安物阜禮備樂和厚澤積於寰區深仁洽乎黎庶故使家登豐裕户慶盈寧筐篚羣將梯航畢集人心之悅豫如此天眷之崇隆可知臣幸際昌期欣逢景運仰瞻黼座願年年垂堯舜衣裳共沐恩波應嵗嵗樂唐虞宇宙不辭蕪陋敬效賡颺爰拜手稽首而獻七言近體十二章以比於塗歌巷祝云爾聖皇福祿竝齊天萬夀初周六十年紫氣氤氲浮殿閣紅雲縹緲映山川桑疇日暖清明後麥隴風輕穀雨前好是艶陽三月節百花香動玉爐烟其一旰食宵衣圖治深宫門聽政漏沉沉皇言宣出音為玉御筆批来字是金遂見廟謨平海甸還聞民隱動宸􅁭只今羣祝無疆夀誰識殷憂五夜心其二東西南朔皆中土侯甸要荒盡一家波静鯨鯢都偃伏風薫草木亦光華時清更廓輿圖大主聖還逢運㑹嘉四海九州開夀域堯天舜日正無涯其三巍乎功業煥乎文五十年来嫓放勲徳合欽明常格被心傳精一鎮憂勤瞻雲就日思扶杖鑿井耕田願獻芹華祝衢歌稱不盡嵩呼萬嵗自天聞其四風清紫禁日初長晝刻遲遲夜未央文就典謨稽上古詩成雅頌邁三唐珠聫璧綴圖書富鳯舞龍飛翰墨香正是勅幾清暇後宫庭好進萬年觴其五天山瀚海路迢遥於鑠皇師下九霄列隊羽林争出塞諸番卉服競来朝降幡䜿立風聲勁汗馬騰驤雪影銷從此邊隅烽燧息太平玉燭四時調其六艱難稼穡念民依節儉皇風振古稀每自上方裁服御却令下里被恩輝蠲租百萬禾盈野赦罪三千草滿扉天錫我皇仁者夀祥光淑氣徧郊畿其七百工師濟滿朝端思日孜孜襄贊難欲得良臣求傅說常從舊學憶甘盤老成報國輸忠藎英俊承家奮彩翰天保鹿鳴胥燕飲千官拜舞盡騰歡其八泰階文運自天開日月光華雲漢回久賁徵車招俊乂重恢鎖院廣英才春風桃李看花發秋樹梧桐待鳯来夀愷作人𢎞雅化百年士氣荷栽培其九唐虞五載便巡行總為寰區軫聖情絶塞北来山雪淨大江南去海雲生豫遊逺道皇躬健端拱深宫睿慮清不盡吳民瞻望切春風思聽屬車聲其十别業周遭禁苑西亭䑓池館俯郊堤山容水色連天映鳥影花枝入户低喬木綴燈環作樹層樓懸錦架成梯笙璈隱隱從空下玉露金莖仙掌攜其十一儀鳯遊麟在此時咸英韶濩奏彤墀彭鏗斟雉方調鼎王母稱觴正賦詩藹藹光風金殿轉悠悠化日玉階移從兹億萬千年内富夀康寧福祿綏其十二萬夀詩五言排律三十二韻有序國子監司業臣魯瑗欽惟皇上御極之五十有二年嵗首三春典崇萬夀虹流電繞君師之誕育非常海晏河清臣庶之趨蹌畢集歡聲雷動喜氣雲騰邃古以来於今尤盛臣瑗幸生聖人之世久厠侍從之班職貳成均躬逢大慶極知乾坤廣厚無能竭筆墨以形容然仰日月升恒竊願將愚誠為頌祝律賡三十二韻厯衍百千萬齡謹拜手稽首而獻詩曰卿雲垂糺縵玉律嵗長春景運方乗午衡杓恰指辰太和由德召繁祉自天申葵向傾丹闕嵩呼上紫宸無疆綿舜厯有秩溥堯仁天地同悠久君王獨聖神離明窺洞達乾斷飭因循淵鑑禔躬密澹寧體道真心思通一畫腕力運千鈞兩晉何能竝三唐孰與倫文謨宣朔漠武烈靖邊塵振旅惟三出歸師祗七旬宵衣常問夜旰食更崇晨雨雪封章奏耕桑几席陳焦勞方在抱悅豫已同民輯瑞先吳越觀風逮晉泰湛恩周蔀屋大賚沛絲綸遺秉周原徧蠲租禹甸均皇心通海宇睿慮奠河濱砥柱功尤永安瀾績不泯好生德已洽行儉化彌醇錯枉羣情協褒亷正氣伸崇儒升配享展禮潔明禋幸際敷天慶来充上國賔吉人誠藹藹髦士益彬彬師濟瞻雲日休嘉集鳯麟九重周甲子八表戴尊親萬福歸皇極三多祝聖人瑶池桃正熟寶甕露初勻徽號交章屢王言却奏頻巍巍髙莫竝蕩蕩逺無垠帝夀超千古參天仰大椿萬夀盛典初集卷七十六
