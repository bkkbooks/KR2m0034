body:
  text: 欽定四庫全書萬壽盛典初集卷九十歌頌三十詞臣二十二萬壽詩四言一首翰林院庶吉士臣鄂爾竒維天則清維地則寧維聖一之無為而成聖人之生光昭萬古三才以參五徳以伍祥紀慶雲靈應華渚恭惟我皇翼翼聖敬撫兹下民仁育義正徳實性成道則天縱澤被萬方厚生利用在昔九土僭濫猶多滇南漠北戾氣違和王師戡定永戢干戈山祗效順海不揚波黄支烏弋靡敢為他於昭聖武丕顯皇猷克勤克儉曰哲曰謀九重端拱六合胥周調元順化莫知其由夙夜維新厥惟詩書周情孔思舜典禹謨為性為命實别其區大哉乾元用契其符自彊不息文徳覃敷彼草有芝鳥有鳳凰凡兹動植猶兆嘉祥矧我臣庶日覲恩光華封有祝維壽且康繄昔聖神制為甲子為萬為億紀以六十聖人得之永以御世如環無端周而復始日之升矣月之恒矣我皇夀考不以歲紀凡在宇内如物䝉春匪曰頌祝各獻其忱萬年昌運三月嘉辰睿算無疆夀我斯民萬壽詩七言律六首翰林院庶吉士臣覺羅名昌昌時三月物華新繞電流虹叶令辰聲動嵩呼開雉尾班齊華祝近龍鱗赤光上燭千門燦紫氣平浮萬象春蓂葉全舒桃勝錦總迎丹陛擁靈椿其一萬年枝暖蔚青葱長映彤霞煥爛中翡翠旌旗排禁柳琳琅珂珮簇宸楓瑶圖凝極春秋盛寶厯延綿福履崇岳牧拜颺懷聖徳金泥芝檢紀洪功其二禧凝天保頌無疆夀域𢎞開被八荒瑞應禎符彌海嶽歡騰歌舞合梯航候逢澹蕩和風扇景際休明麗日長聽徹九霄稱萬歲年年齊奉紫霞觴其三咸韺韶濩奏鈞天控鶴驂鸞集列仙五嶽圖懸丹闕上十洲賦獻紫宸前星明南極連珠緯序應東皇敞御筵縹緲琅璈諧寶瑟卿雲影裏祝堯年其四景運中天百福來鴻鈞旋轉象昭回恒春樹䕃瑶階茂長樂花隨綵仗開浩蕩恩波涵太液沖融御氣靄蓬萊一人有慶歌昌熾風動時雍徧九垓其五紫禁初聞曉漏聲千秋令節賀昇平天家慶洽宜春苑朝列歡臨不夜城身惹御香依玉案恩霑湛露捧金莖小臣恭上升恒頌願比葵心向日傾其六萬壽詩五言律十首翰林院庶吉士臣陶貞一萬夀貞元日三春長養時鴻圖開聖運國祚永昌期北斗龍杓近東皇鸞輅隨五雲佳氣合草木盡華滋其一天縱生安聖猶勤稽古功典墳資左右道徳貫鴻䝉馳馭崆峒外探書委宛中惜陰符禹志行健本宸聰其二至孝光天壤推恩逮下民深仁頻解網厚澤每輸囷原隰桑麻徧圜扉雨露匀歡心同萬國含氣識尊親其三誰謂堂階隔離明照萬端治惟求悃愊事勿避艱難細善都兼錄遐陬敢自寛法亷咸奉訓比俗共眠安其四自昔河渠重横汾陋漢皇指麾勤日馭擘畫靜瀾狂貢已輸天外居還奠海疆東南悉安堵端拱坐明堂其五塵掃諸方靖天開九域全三驅清朔漠一夕捲烽煙崑水流源逺秋風唱凱旋從來𢎞廟算髙邁百王前其六睿藻昭雲漢紛綸配典謨不須游夏贊合與日星俱金鏡開千載殊囊攬八區國門懸述作簪筆仰型模其七開科賢禮重廣額聖恩偏曠典垂千禩聲名被八埏珊瑚懸鐵網珠玉採沉淵四海車書合衣冠賀萬年其八盛徳敷隆治禎祥集聖躬卿雲瞻化日春樹動和風位育乾元合君臣一體同太平真有象處處祝華封其九當陽逢泰運品物荷陶甄神嶽徵符瑞靈椿紀大年謳吟塞寰宇繪畫負坤乾祇竊風人義長歌天保篇其十萬夀詩五言排律二十四韻翰林院庶吉士臣李鍾僑禹甸金甌固堯年玉厯長蒼龍初建斗紫極正當陽一氣洪鈞轉三才治化彰泰階符久奏景運祿方將兌澤深江海乾維肅紀綱髙卑陳禮樂奎壁兆文章四表山河壯中街日月光休徵綏福祉美報卜康彊宿耀聨珠景川呈五采祥協風調竹律瑞草秀芝房綵列春城仗花開御苑芳連甍鋪錦繡匝地沸笙簧綘縣騰三祝嵩呼徹萬方負暄芹可獻擊壤力難忘喜溢都人士恩流薄海疆慶霄霏沆瀣湛露滴汪洋聲教彌重譯威靈暢八荒授時頒厯朔職貢集梯航戴日知葵向瞻雲望羽翔卷阿同夀愷喜起共賡揚錫福歸皇極朝天輯未央何由窺帝載竊幸仰穹蒼綿祚滋純嘏𢎞休永莫量願從鵷鷺末共進九霞觴萬夀詩五言排律四十韻翰林院庶吉士臣許鎮帝御鴻圖逺天開景祚長東瀛凝瑞靄南極耀星芒赤電徵生聖榮河喜降祥萬邦逢泰運早歲握乾綱化日光千禩春臺普八荒簡編曾未覩蠡管孰能量明旦勤齋祓郊壇薦璧璜百神咸受秩大祀必親將忠厚惟由舊艱難豈暫忘瑶函修繼述金戺肅烝嘗丹液晨調膳瓊膏晝捧觴孝能孚逺邇學更徹微茫黙㑹丘墳秘精研河洛藏立言垂琬琰考古集縑緗筆蘊三辰秀書含二曜光鴻辭追典誥雅韻叶宫商天上奎文煥寰中聖武彰龍旂收朔漠虎旅定西羗海嶠烽煙淨蠻溪瘴雨涼太平波浩蕩至治澤汪洋屢發神倉粟頻蠲比户糧省耕勤命駕問俗逺乘航夾道鶯花麗隨車雨露香歡呼迎綵仗抃舞奉壺漿榖帛髙年賜風謡太史颺懸旌興士氣祝網右春陽疏瀹勞神算經營立巨防河流承揵竹淮水靜陂塘再見平成績恒貽樂利慶和聲鶯出谷翽羽鳳鳴岡籲俊門常闢掄才網徧張膠庠多選彥巖穴解留良薄海風胥洽中天運正昌松軒雲藹藹琪樹露瀼瀼日麗金莖掌風和白玉堂謙冲還讓善恭儉自垂裳昌熾今伊始升恒樂未央嵩呼儀肅穆韶奏韻鏗鏘桃獻千年實芝呈萬歲芳願將天比夀長共戴君王萬壽詩七言截句三十首翰林院庶吉士臣俞鴻圖九重宫闕影曈曨春曉紅雲玉仗中拜舞盈廷歌聖夀萬年寶厯日初東其一普天率土被恩濃窮髮均傳玉帛供珍重蒼生嵩祝意聖朝何處不華封其二東海仙人列綵幢西山爽氣映瑶窗弧南星出當金殿斗北漿流泛玉缸其三妍暖風光淑景移萬年枝上日遲遲春臺共慶昇平福中禁新𫝊樂愷詞其四祥凝五曜固三微睿慮猶勤在萬幾舉世盡臻仁夀域羲皇以上見應稀其五鳳蠟中宵照讀書丹經綠笥繞宸居圖疇自有長生訣天保無勞頌九如其六乾坤上瑞叶貞符刻玉何曾泰岱趨若使風雷探秘冊鴻䝉闢後鞏璇圖其七紛紛鑿齒與雕題歡上彤墀雜拜稽也學繁星爭拱極君王禔福與天齊其八西苑沙平淨御街華燈錦幔入林排千官拜舞迎仙仗一片宫雲罩綠槐其九濟濟龎睂介夀來九衢歡笑沸如雷就中獨有方瞳客預喜他時到萬回其十鳳紀曾看爛熳春扶輿品物樂鴻鈞年年三月鶯花裏開徧羣芳祝聖人其十一阿閣威禽六翼文郊棷仁獸五蹄羣盛朝瑞應紛難紀又有金芝出五雲其十二大地霑濡浩蕩恩慇懃父老話深村願將四海無窮算輸與天工奉至尊其十三畫鼓朱旗出上䦨天家令節許人看千重瑞靄連金闕百囀流鶯擁玉鑾其十四鳳詔頻看異數頒無窮膏澤播人寰恩波汪濊真如海浩瀚長流四極間其十五萬夀科開蕋榜懸十年一度例求賢杏花才唱嘉賔句桂苑旋逢燒尾筵其十六花宫祝聖異香飄寶樹祥煙燭綘霄禮徧金仙無量夀梵音處處雜簫韶其十七厚澤鴻鈞六宇包爭看木鳳下螭坳唐虞時節雍熙象那得如今徧樂郊其十八列仙同日響雲璈鸞鶴廻翔黼座髙為説綏山好花實相將新試摘蟠桃其十九馳道芊綿長碧莎偏承玉輦此經過由來瑞氣加纖卉倍較他時翠色多其二十仙液華腴色勝霞菖蒲九節樹三花太平内宴多珍異不數安期棗似𤓰其二十一九階三陛集冠裳雉扇鷄翹帯曙光仗得至尊餘景福彤墀長此效賡颺其二十二請崇鴻號愜輿情聖徳謙冲未許行草野漫思歌帝力如天自古莫能名其二十三深宫宵旰萬方寧瑞應時時滿禁庭向曉宫爐煙裊處結成寶篆字長齡其二十四紫微佳氣日升騰靄靄晴光碧宇澄遥向殊躔觀法象泰階南極盡祥徵其二十五蓬萊水外閬風樓宫闕金銀煥十洲中有仙人臨海屋每逢聖算為添籌其二十六寶月光含卍字深人天萬古永欽心九州要識當今佛手握金輪盡照臨其二十七㢲風解雨徧恩覃萬有含生盡樂湛莫不尊親戴髙厚清寧定位獨參三其二十八聖朝喜起及堂亷四海蓬茅慶養恬令徳宜民受天祜萬斯年祿一人兼其二十九鳳凰池上著朝衫染翰鳴珂少長咸身際勲華觀上夀長依鷺序捧芝函其三十萬夀盛典初集卷九十
