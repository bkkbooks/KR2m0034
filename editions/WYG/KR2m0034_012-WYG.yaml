body:
  text: 欽定四庫全書萬夀盛典初集卷十二典禮二鑾儀二十八日黎明設大駕鹵簿於太和殿前皇上陞殿受朝賀羣臣行禮訖隨設行幸儀仗乗甸漆明轎幸暢春園臣民重瞻天仗填溢道左鑾儀之制凡皇上陞殿則設大駕鹵簿路輦及象列兩闕前笓頭以下鼓角金鉦以次陳設旌􅓚節鉞華盖俱在太和門内夹黄道對列直接御階焉行幸儀仗盖皇上廵方校獵行幸之所設也謹詳其制於左䝉古號六枝木質空心每枝二節上節長五尺下節長三尺八寸硃漆貼金藤箍纒以皮條上銅鍍金口下鈒花銅鍍金喇叭頭每枝拴紅黄片金小旛三首大號八枝小號八枝制俱同大駕嗩呐八枝管用花梨木長一尺二分徑一寸五分下銅碗口徑四寸六分上銅口拴黄細縧四根下有五色線縧繐三掛鼔二面髙一尺五寸上口徑一尺二寸下口徑五寸八分木匡冒以革硃漆描金雲龍貼金銅釘鈸環鼓架髙三尺硃漆描金雲龍銅㸃二箇銅鈸二對金鉦四面制同大駕笛四枝制同大駕管二枝以烏木為之長六寸八分九孔前七後二兩頭束以象牙以蘆為哨雲鑼二架架髙二尺寛一尺五寸柄長五尺五分頂雕木貼金雙龍頭各懸銅鑼十面繋五色線流蘇二掛笙二攢以匏為之黒漆上用紫竹十七管中施銅簧下垂綵線流蘇金二面制同大駕吾杖三對立瓜三對卧瓜三對御仗三對星三對已上制俱同大駕惟吾杖稍短金鉞三對斧頭長九寸寛八寸木鎗頭長八寸五分竿長五尺六寸餘制同大駕弓矢十副大刀十把鎗十桿黄小旗一對赤小旗一對青小旗一對白小旗一對黒小旗一對已上旗俱攢竹為竿上安鍍金鎗頭飾以紅纓旗長二尺四寸濶三尺三寸通長八尺六寸餘制同大駕黄龍纛一對赤龍纛一對青龍纛一對白龍纛一對黒龍纛一對已上諸纛各濶五尺九寸長三尺九寸竿長一丈二尺餘製同大駕黄雙龍扇六把徑三尺一寸木胎黄縀面背石青綾邊紅綾鑲線面繡雙龍背銷金雙龍紅油攢竹柄扇及柄共髙一丈七寸紅單龍扇四把面繡單龍背銷金單龍黄綾鑲線餘製同前黄粧縀傘二把紅粧縀傘二把青粧縀傘二把白粧縀傘二把黒粧縀傘二把已上諸傘頂徑五尺垂三簷上簷長一尺一寸中下簷各長九寸風衣二件方一尺二寸帶二條長三尺寛二寸傘􅇧竹銕相間三十二根紅油攢竹柄長九尺四寸跨綆戳筒全拆合明轎一乗金漆雕花草獸面轎身濶二尺二寸進深一尺八寸三分髙三尺四寸地平濶二尺二寸進深二尺九寸直竿二根各長一丈七尺横扛二根各長六尺七寸短扛四根各長二尺八寸肩扛八根各長六尺撑竿二根各長一尺七寸俱硃紅漆鍍金銅龍頭尾事件全大轎一乗單頂硃紅漆轎身濶三尺進深四尺六寸五分髙五尺貼金頂濶三尺八寸進深五尺六寸五分髙八寸黄綾銷金龍瀝水一層直竿二根各長一丈八尺横扛二根各長九尺短扛四根各長二尺七寸肩扛八根各長五尺三寸撑竿二根各長二尺三寸五分俱硃紅漆轎頂飾金蹲龍四金頂鈒龍文嵌珊瑚青金松子等石鍍金銅龍頭尾事件全是日上御之其扶轎大臣及輦後執事太監扈擁侍衛旗纛弓刀悉如大駕焉右大駕鹵簿行幸儀仗二通臣等敬記注於瞻仰之餘參以㑹典所載鈔輯撰次都為一篇竊見帝王輿服歴代相因損益可知汙隆隨世莫不徳與位稱道與器俱然未有如我皇上之盛者也後漢書云昔者聖人興天下之大利除天下之大害使天下之民物各得其性命是以天下之民敬而愛之若親父母夫愛之者欲其長乆不憚力役相與起作宫室上棟下宇以擁䕶之欲其長乆也敬之者欲其尊嚴不憚勞煩相與起作輪輿旌旗章表以尊嚴之斯愛之至敬之極也盖禮服之興所以報功章徳禮曰其功大者其樂備其治辯者其禮具徳盛者縟豈誣也哉昔人皇氏乘雲駕六羽以遊谷口堯制彤車舜鸞車夏鉤車殷大輅周人木輅加飾為五司常掌九旗之物各有其屬以待國事此乘輿之本可攷見者也秦平九國兼其車服故大駕屬車八十一乘漢興乗輿大駕公卿奉引太僕御大將軍驂乘備千乗萬騎西都行祀天郊甘泉備之百官有其儀注名曰甘泉鹵簿東都行祠天以法駕祠地明堂省什三祠宗廟尤省謂之小駕後漢輿服志頗記其槩晉書益詳大駕鹵簿以象車鼓吹列前繼以官吏導引公卿或駕駟駕三有司駕一或中道或分左右與㦸楯弓刀節鉞旌􅓚雜陳警蹕相沿不改唐制七輦諸仍其舊稍加簫笳横吹之屬宋初增日月星辰五方四瀆諸旗史書所記凡三惟政和最為詳善元明因之間有増損我國家禮備樂隆兼總百代酙酌繁簡皇上功徳崇隆參兩天地人官有宜物曲有序盖四海九州􅆂泳恩澤五十餘年於茲矣敬天勤民乆而彌篤或有事於南郊或有事於太廟孟春祈榖必躬必親四時武功不忘簡閲北平沙漠南定河工出震向離無嵗不與民相見百姓迎皮軒擁道游望日轂於九天見雲旓之五色踴躍歡欣謳歌洋溢揆之古人愛敬之説其蔑以復加矣夫愛則親焉敬則尊焉尊親之至則願見焉今恭逄萬夀普天同慶臣民赴闕者信宿之間仰瞻天仗至再至三參差掩映於綵棚之間望盛徳之光輝知神功之赫濯百音繁㑹萬靈奔走其可以無記耶然則鹵簿之陳雖職在有司初非剙見而聖人之徳不見而章不動而變如日月焉歴萬古而光景常新况乎功彰而飾煥徳盛而服尊每歴十年更逄大慶所以極臣民之愛敬者寧有涯量哉萬夀盛典初集卷十二
