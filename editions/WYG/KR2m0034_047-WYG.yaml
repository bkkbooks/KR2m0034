body:
  text: 欽定四庫全書萬壽盛典初集卷四十九慶祝三圖記七内閣翰林院詹事府中書科榜文伏以一人有慶十方賀繞電之辰萬壽無疆六合效呼嵩之戴推萬有一千大衍之數共祝王春稽十有二萬皇極之書宏開泰運世界咸登於極樂人天胥協於太和欽惟皇上照臨如日廣大則天深仁偕元化同流符風雨露雷之至教峻德與神功竝茂集羲炎姚姒之大成學徹天苞地符之源探賾窮微五夜常繙乎百籍慮周蔀屋茆簷之下臨深履薄一日時儆夫萬幾壽佛現眞身大地山河千八百國之慈雲永庇聖人首庶物周天日月五十二年之法象方新舒蓂葉於堯階祥開紺宇鼓薫風於舜瑟響徹琳宮恭遇聖壽六旬正值陽春三月靈辰浴佛後先在二十日之間洪算周天悠乆爲八千春之始彼海屋之仙籌無量休徵何止三多倘珠林之尊者能來令節正當十八於是麟遊鳳舞航海梯山執玉帛者萬邦獻禎符者九譯猶且念念爲含生祈福願滿三千息息以體健存心仁當五百於時協風披拂淑氣絪緼慧炬髙懸光耀金仙之座法輪四轉香霏寶殿之煙欣景福之駢臻慶昌期之綿歴繙經淨界祝聖香筵東皇亦拱北而瞻辰西竺且和南而就日臣等綸扉荷寵冰署承流職徒忝於雲從光謬叨乎露湑涓埃未報待酬髙厚之恩巍蕩難名共矢升恒之頌用諏穀旦爰集祗園樹樹檀林爭獻菩提之果層層貝葉竝開優鉢之花千二百五十人俱歡聲雷動一十萬八千願足壽域天開從此璇璣正而三階平玉燭調而五辰撫朱英翠箑草木長春野忭塗吟神人交慶皇風悠逺共球集千百國以常新佛日光華福祿歴億萬年而無極矣文華殿大學士兼吏部尚書臣温達文華殿大學士兼禮部尚書臣松柱文淵閣大學士兼吏部尚書臣李光地文華殿大學士兼吏部尚書臣蕭永藻經筵講官文淵閣大學士兼禮部尚書臣王掞内閣學士兼禮部侍郞兼管光祿寺事臣馬良内閣學士兼禮部侍郞臣傅爾呼納臣舒蘭臣巴格臣阿爾法臣蔡升元臣鄒士璁臣沈涵經筵講官内閣學士兼禮部侍郞臣綽奇臣彭始摶候補内閣學士兼禮部侍郞臣顧悅履内閣侍讀學士臣查弼納臣關保臣徐元夢臣鄂濟禮臣拉都渾臣盧起龍臣朱汝錩臣常泰内閣侍讀臣阿爾布臣吳爾泰臣殷徳納臣徳音臣海青臣色黑利臣雅圖臣衞徳立臣巴哥色臣青鼐臣桑格臣薩馬第臣朱之璋臣朱之誠内閣典籍掌誥勅撰文中書舍人臣阿進泰臣雅爾泰臣李源臣王鳳孫臣朱文龍内閣中書臣三喜保臣翁俄洛臣鄂禮善臣富海臣傅成臣常俄臣伊勒希臣赫色里臣達道臣鼐滿岱臣傅爾遜臣索柱臣那厰臣馬賽臣鐵柱臣李柱臣奚徳愼臣巴顔泰臣翁翮臣索林臣鄂爾賽臣董阿賴臣拉色臣章嵩臣祁通格臣富昌阿臣查升阿臣童泰臣雅圖臣哲爾肯臣阿賚臣齊世臣薩爾布臣額特黑臣費揚古臣馬詹臣希林臣常保臣噶禮臣海青臣納爾泰臣亨貞臣栢壽臣額爾特臣納親臣齋齊臣庫爾禪臣延福臣沙濟蘭臣勒特禮臣樹徳臣黑格臣鄂昌臣賽明善臣倉米臣劉武臣博爾多臣和善臣吳爾登臣巴喜臣戴庫臣薩爾泰臣巴爾圖臣永泰臣溫徳布臣興安臣蘓爾通阿臣鈎周臣三保柱臣根讀思查卜臣闗保臣班第臣色楞臣常都臣常祿臣偏圖臣巴查爾臣端柱臣色冷臣伊丹穆臣潘宏裔臣榮貴臣梁世鉁臣王謨臣陳良策臣李宗揚臣路士鈺臣辛雲徵臣陳都策臣蔣書升臣劉曰珪臣成説臣樊致一臣鄧廷喆臣施燾臣張祖鎬臣胡忠本臣李元起臣倪璠臣張開宗臣潘乗龍臣多時珍臣呂耀曽臣陳時夏臣李彦坳臣李樹目臣何繼曽臣楊若楙臣王允晉臣竇容恂臣黄貞乾臣趙作鼐臣莊楷臣韓暎臣范授中原任内閣中書臣閻詠督理俄羅斯文館事務内閣中書臣常度等經筵曰講官起居注都察院左都御史兼翰林院掌院學士教習庶吉士臣揆叙經筵日講官起居注翰林院掌院學士教習庶吉士臣湯右曽翰林院侍讀學士臣覺羅蘓庫臣達禮瑚侍讀學士兼户部縀疋庫郎中臣薩哈布侍讀學士臣宋衡臣汪漋臣熊葦日講官起居注翰林院侍講學士臣常壽臣勵廷儀臣周起渭侍講學士臣穆爾泰臣常壽日講官起居注翰林院侍講學士提督順天學政臣陳璋日講官起居注翰林院侍讀臣常鼐侍讀臣劉柱臣魯海臣樊澤達臣魏方泰翰林院侍講臣常海臣傅爾敦臣薩哈達日講官起居注翰林院侍講臣文志鯨臣蔣廷錫侍講臣呉垣翰林院修撰臣王雲錦日講官起居注翰林院修撰臣趙熊詔修撰臣王世琛翰林院編修提督廣西學政臣龔鐸提督四川學政臣王誥提督浙江學政臣宋至編修臣沈宗敬臣叢澍臣車鼎晉臣朱啟昆臣周彜臣高輿臣查嗣瑮臣文岱臣查愼行臣俞梅臣廖賡謨臣潘體震臣萬經臣伊太臣俞兆晟臣吳士玉臣彭廷訓臣蔡學洙臣鄒奕鳳臣林之濬臣俞長策臣嵇曾筠臣楊開沅臣宮鴻歴臣莊令輿臣戈懋倫臣索泰臣鄭任鑰臣王謩臣繆沅臣蔣漣臣儲在文臣徐斌臣戚麟祥臣阿克敦臣須洲臣張起麟臣李紱臣惠士奇臣徐用錫臣孫時宜臣秦道然臣方覲臣陳似源臣閻圻臣呂謙恒臣沈樹本臣徐葆光日講官起居注翰林院檢討臣阿爾賽提督山西學政臣孔尚先提督廣東學政臣史貽直提督雲南學政臣海寶檢討臣阿金臣王傳臣李周望臣逢泰臣劉師恕臣李天祥臣蔣肇臣謝履忠臣王士鑰臣柯喬年臣呉相臣萬民欽臣衛昌績臣彭維新臣馬豫臣李鍾峩臣張懋能臣諸起新臣李日更臣王思訓臣李掌圓臣陳均臣史尚節臣王珻臣壽致潤臣黎致逺臣張照臣顧五達臣馬益臣陸紹琦臣盧軒臣謝履厚臣劉大轂臣何世璂臣程翄臣邱尚志臣曾謹臣詹銓吉臣嚴思位臣黄越臣黄趙音臣髙維新臣張大受臣曹掄彬臣鄧葵友臣車松臣陳㑹翰林院庶吉士臣徐昻發臣董新策臣高其偉臣汪份臣趙泰臨臣吳闗杰臣湯之旭臣蔣綱臣周鳳來臣朱一鳳臣李中臣于廣臣汪倬臣張玢臣王時憲臣范令譽臣陶成臣朱綸臣卜俊民臣曹鳴臣李鍾僑臣陶貞一臣劉於義臣潘允敏臣王圖炳臣鄂爾奇臣楊士徽臣何國宗臣秦靖然臣田嘉穀臣徐雲瑞臣馮汝軾臣俞鴻圖臣杜詔臣鮑開臣孟班臣楊祖楫臣何應鰲臣林昂臣顧嗣立臣喬時适臣王澍臣狄貽孫臣徐杞臣易簡臣漆紹文臣周天祜臣程夢星臣薄海臣春山臣秦休臣周金簡臣許鎭臣王時鴻臣董胡宏臣周彬臣郭孫順臣錢廷獻臣楊湝臣沈世屏臣夏愼樞臣陳王謨臣舒大成臣覺羅名昌臣李如璐臣徐依臣林景拔臣胡煦臣張淳臣湯大輅臣莫與及臣魯立臣王夢旭臣王遵扆臣白子雲臣孫詔臣謝濟世臣張旭臣劉蛟臣鄭之僑臣鄭其儲臣潘祥臣王畮翰林院典簿臣達爾富臣李據待詔臣秦圖臣胡秦孔目臣對哈納筆帖式臣花善等經筵講官禮部左侍郞兼管詹事府詹事臣二格詹事府少詹事兼管㕘領佐領事臣拉錫希布詹事府少詹事兼翰林院侍講學士臣梅之珩臣王奕清日講官起居注左春坊左庶子臣黨阿賴左春坊左庶子兼翰林院侍讀提督江南學政臣胡潤左諭徳臣赫成額日講官起居注左春坊左諭德兼翰林院修撰臣呉廷禎左春坊左中允臣阿達海左中允兼翰林院編修臣陳邦彦臣陳世倌左春坊左贊善臣班度左贊善兼翰林院檢討臣范光宗臣薄有徳右春坊右庶子臣袁保柱右庶子兼翰林院侍講臣閻錫爵右春坊右中允臣邁米達右中允兼翰林院編修提督山東學政臣陳恂右春坊右贊善臣尼雅哈利右贊善兼翰林院檢討臣孫勷司經局洗馬臣滿都日講官起居注司經局洗馬兼翰林院修撰臣張廷玉主簿臣李潯錄事臣李珍筆帖式臣雅勒圖等中書科中書舍人臣曹廣憲臣劉斗文臣陳恪臣何道瑄臣杜述先額外中書舍人臣陳厚耀筆帖式臣張鼐等内廷纂修臣高不騫臣王曾期臣郭元釬等一統志館監生臣沈永譽等官學生臣戴留助等恭祝西安門外衆舖户小民榜文伏以聖夀綿長寶厯共慶萬年之算皇仁浩蕩恩膏先流九達之衢邁漢殿之三呼豈徒頌禱斂箕疇之五福用錫臣民扶杖而觀咸識春臺之近躋堂而獻欣瞻化日之舒慶溢闠闤歡闐卷陌欽惟皇帝陛下法天之徤如日之升合千八百國黎獻之邦普天同戴積五十二年太平之盛率土皆臣六合爲家盡乾坤而作界八荒我闥合滿漢而同風露犬紈牛款闗入貢旅獒越雉斂袂趨朝安益求安歲歲蠲租賜復治惟求治時時旰食宵衣鑿井耕田家霑甘露阜財解愠人被薰風旣緯武而經文亦左仁而右義凡此歴年之丕績實綿萬世之宏基兹當三月方中正值六旬聖誕萬靈效順欣看南極之老人七曜呈祥遥接西池之王母含生胥慶負質同歡臣民等幸居輦轂共列市㕓仰鳳詔於日邊竊比向陽草木聽鸞音於天上欣同在囿禽魚百貨競陳五材竝飭萑苻無警共沐鴻施泉布時通悉由仁政歌呼載道人襲黄絹之衣含哺偕來手策班鳩之杖羣進封人之頌用祝三多願集絳老之年合成萬歲恭拜燈王於紺宇䖍禮花首於銀龕共慶長齡用介純嘏伏願大轉鴻鈞宏開壽域瑶圖孔固億萬年萃四海之歡璇宇長清千百世獻九州之貢五日風而十日雨盡協堯梧舜栁之祥九年蓄而三年耕永息井鉞參旗之象自西自東自南自北相忘化日之舒如山如阜如岡如陵長獻介睂之斚矣西安門外各行舖户市井臣民田世盛余天佑王永昌薛大晟夏之傑于化龍郭鎭傑張國臣武紹文劉宗堯李必顯霍攀桂廖全勝鄭滿康蘇文蔚衞奉周張宏印謝璞田興文王名道吴成華王朝穩郭宏徳張天仁陳奇章趙天貴趙金鼎李貴陳彬如佟自㑹宋之勝李震芳蔡進徳李文藥周文昇潘九思于廷佐張瑞奇趙國瑞郭應熙張利韓所生趙燕楊祿徐光斗馬成龍劉文進米彪郝亮王士雄王來宣劉漢裔王洪胥王志成劉定安張君輔李長璽王守信劉虎徐國才陳三王吾興馮世昌王時祿李福俊高棲鳳牛才斗郭進寶齊卞生傅爾徳杜培王好賢劉成漢王繼昌邱起山董文仁馮國用紀之綸紀之緯李振基羅謙吉杜金龍白得朋康三紀五李青彪朱麟王嗣元楊崟陳韋葉趙養睿王錦邢宣泰馬國聖王五趙文炳許文相王詮高國元邵元龍石良輔米良趙之炳樊祚張士奇劉士爵王翠楊三白繼盛康朝佩王鳳起舒文選房世禎周性新郭璽胡有徳楊玉泰張國寶王奪魁許繼振徐興逺張宏金劉在都蔡之俊呂有徳張朝鳳鄭國璧劉秀芝髙進孝張化鳳袁秉乾張芝彦王永榮張士泰余昇馬文壯佟正已寇作棟王顯榮趙之棟鄧士奇趙良璧趙廷輔趙廷璧趙廷臣榮士琮呂洪宣吕成林等恭祝内務府官學滿漢教習官學生榜文伏以皇仁普徧九垓洽衢歌巷舞之聲聖壽綿長億載覩電繞虹流之慶雲開閶闔瑶池捧進太平觴星朗樞垣銀甕鏤成萬歲字天行永健旭照長輝欽惟皇帝陛下手握璇圖躬膺寶籙統萬靈而御六合安益求安咸五帝而登三王聖不自聖値龍飛之五十二載海宴河清卜鳳厯者億萬斯年天長地乆兹屆五陽之月欣逢萬壽之辰日彩彤融人在大羅天上春光罨靄羣逰極樂國中供養伊蒲聊比拈花之頌宣揚梵唄譬諸擊壤之歌本無當於髙深冀少抒夫涓滴臣等恩深豢養志切祝釐願為文囿之芻蕘瞻依化日竊比虞廷之鳥獸抃舞光天唱貝葉之三多誠孚猊座吐蓮花之五色歡繞龍樓行見寶厯綿延慶皇圖之鞏固鴻基永茂仰帝祚之遐昌矣内務府官學滿教習中書臣費揚古臣厄特黑臣覺羅勒忒禮臣官柱漢教習舉人貢生臣方任臣章全人臣楊飛熊臣吳錫爵臣于梓臣楊儐臣龔克庸臣季宏煥臣姚述虞臣蔡汝齊臣王希曽臣錢鋐官學生臣常夀臣哈虎臣保柱臣黑子等恭祝候補翰林院編修臣高輿率領浙江耆老三百餘人於萬壽寺恭設千佛道塲榜文伏以金輪煥采諸天共慶無疆玉厯膺符萬國同皈有道慧日麗九重閶闔瑞滿乾坤吉雲昭四表光華祥凝宇宙燃香燈而頂祝髙深遥聯星拱誦梵貝而宏宣福徳近接嵩呼稽首颺言齊心展誦欽惟皇帝陛下統接千齡澤覃萬寓握珠囊而受采承乾保泰叶虹流電繞之祥調玉燭以乗時縕瑟歌風應海宴河清之運緝熙光聖學日新月盛百王之懿範并入陶鈞乆道育羣生夕惕朝乾歴代之風施咸歸綱紀天文河漢廓洙泗之淵源聖武雷霆勒燕然之碑版慎簡雲龍之紀朝皆六相五官協和風雨之司野樂春耕秋歛宫府飭而髙卑奠定告成之圭璧乆昭鑾輿動而民物雍和望幸之謳歌四起求賢若渇覽輝之鸞鳳齊來登俊惟庸入網之珊瑚競爽省耕勸織家窺冊府之丹青發帑賑金歲拜瑶天之膏澤歴蠲逋賦金錢之數等恒河全免新租綸綍之頒如天雨爰書必愼頻宣肆赦之文決獄惟寛特下矜全之令巽風潜洽遥及南梧北栁之區解澤旁敷逺霑出日無雷之域唐虞而上極隆之盛治比此非多開闢以來未有之神功於今爲烈兹當紀元五十二年恭遇萬夀六旬正誕時則天不愛道地不愛寶黄星煥而朱草榮龍馬在河麟鳳在郊銀甕臻而金船出八紘歸極四海騰歡衍五福於箕疇未足罄人天之頌禱賡九如於周雅詎能申葵藿之對揚臣輿職忝蓬壺材慙樗杜校讐秘檢如繙寶藏於龍宮侍從屬車恍覩珠幢於鷲􅊐荷隆施於兩代生生莫報崇深享厚祿於全家世世難酬覆育幸際昌期之伊始願賡岳牧之歌欣逢景福之大來欲效兒童之頌潮音禮懺旣臨碧海以朝宗日下延僧復對青峰而獻壽敷纎㣲之意蕋竊思聚芥培山攄㸃滴之心源惟冀收涓添海伏願長發其祥永言配命後三光而不老格太清奠太寧丕顯太平於有象同二曜以貞恒斂萬福享萬祿彌昌萬壽於無疆則三十六億平等之居竝躋西方極樂八萬四千婆娑之境俱登無量壽天矣行人司衙門榜文伏以天成地平八表際雍和之運星輝雲爛萬方逢熙皥之春凝瑞靄於㣲垣合同軌同倫同文而益盛燦榮光於紫極萃多福多壽多子以全昌率土咸歡普天同慶欽惟皇帝陛下五徳統符萬齡開運經文緯武聿宏參贊之功内聖外王克建中和之極薫風遐被倉箱屢慶豐年湛露常零蔀屋時歌大有萬民樂利盡山陬海澨而並包九譯梯航舉鑿齒雕題而丕冒奉共球者千八百國上軼夏商沐膏澤者五十二年逺超堯舜厪睿慮於乆安長治底民生於累洽重熙兹逢聖夀之六旬適屆春王之三月歴無疆之甲子百福彌殷集萬禩之春秋一元復始得露泉於月館瑞應丹邱獲玉厯於河巖祥分絳闕春風晝永輝煌萬國衣冠南極宵明照耀九天閶闔臣等乆依覆載莫報高深班聯紫氣光中但祝萬年以奉天子身傍紅雲影裏惟滌一心而叩如來璇霄朗斗極之輝天回萬象金殿拱慈雲之座運協百靈嵩嶽三呼聲應華封之祝鈞天九奏祥和韶舞之成伏願日月竝恒乾坤同乆瑶樞永握總元㑹運世之昌期景命常新兼唐虞夏殷之全厯河山雨潤年年競獻嘉禾海嶽風清歲歲咸登瑞麥塗歌巷舞合鳩車竹馬以偕歡澤􅆺山輝共啼鳥游魚而咸若朞三百有六旬六日苞符登千百世之文歲八千為一春一秋椿齡演億萬年之慶矣行人司司副臣張光鏻行人臣阮士琦臣張崇禮臣胡廷鳳臣錢㵯臣吳普臣褚泰臣王肅章臣李玘尊等恭祝候補候選人員榜文伏以一人有慶九如之頌祝彌殷萬福攸同百爾之賡揚滋盛星流北斗乃聖王降誕之徴極曜南天實元后夀昌之應奉無私而成化徧九有以敷恩欽惟我皇上得一以貞兼三而治健行不息光昭乾象於中天悠乆無疆永布陽春於六合傳心紹世立本應圖德無不全冊難盡載至若慈寧侍問誠心盡色笑之歡徽號尊崇承意在形聲之表回瀾效順已平地而成天蔀屋周恩載省方而問俗敦崇正學黌序増光宏奬羣材棘闈重啟契精一之授受洞見羮牆潄六經之芳華誕登道㟁雲書絢綵散綺成霞墨跡飛煙餘光射斗萃鳳閣鸞臺之彦抽金函石室之藏咳唾宫商身言律度日星竝曜八埏目爛乎乾文金石相宣萬里普傳乎天籟雕題窮髪共照光輝海澨山陬咸承覆露周咨物力洞悉時艱萬姓傾心四方樂業豐年屢兆斗米且賤於三錢神聽終和祀典將通乎八蜡盛徳大業巍巍皇皇偉烈豐功綿綿翼翼是以休徴雲集泰運日隆上則景星慶雲下則河清海晏乃者宏開夀域蓂階之厯數方隆綿歴昌期天步之禎祥最逺三陽布暖萬類敷榮普天稱仁夀於堯年寰海頌靈長於舜日臣等乆叨天眷初問雲程敬獻泰階萬夀之圖允符聖主歴年之數字中蝌蚪挾日月以騰輝筆下蛟龍共風雲而來㑹涓涘未報敢云拜獻之先資浩蕩難名莫罄生成之大德用諏穀旦爰集羽流宣寶誥於廣塲迓玉清於上界波迴太液添海屋之仙籌樂奏雲璈集瑶池之法駕光耀金仙之座香浮玉殿之煙朝野歡呼人天抃舞春生北闕葆一氣之元和日麗東華薦三靈之茂祉伏願如日初升與天齊夀紫芝黄鶴永延帝祉於無窮旦月卿雲常見天顔之有喜從此五風十雨草木長春行見九域八紘神人胥慶梯山航海羣瞻鳳厯之悠長天府神京永奠鴻基於鞏固矣候補員外郞臣汪錫齡臣李維均等候選員外郞臣髙浚等候補主事臣胡増耀臣陳沂震等候選主事臣梁錫珩臣趙繼抃等候選内閣中書應陞臣陳學良等候選中行評博臣汪樞臣阮體乾等候補中書臣劉自潔臣朱齊名等候補鴻臚寺寺丞鳴贊臣陳謨臣周李等候選國子監典簿臣樂鳳儀臣梁德兼等候選兵馬司副指揮臣程鶴齡臣沈允陞等候選翰林院孔目臣鄧繁禧等原任布政司臣張聖猷候補㕘議道臣靳治齊候補道府臣汪清候補知府臣張國楨臣王景灝等新授知府臣髙鈴候補同知臣王襄國臣汪泰來等候選同知臣戴晉臣耿鱗奇等新授知州臣郜超候補知州臣卓士傑臣邵棠怡等新授通判臣周溥候補通判臣黄明德臣王繼華等候選通判臣髙其倫臣陳世增新授知縣臣陶元運臣齊方起候補知縣臣周元愷臣吳振武等候選知縣臣馮景夏臣蔡文等新授教諭臣朱齊年候補教諭臣胡文元候選教諭臣叢澐等候選訓導臣張無咎等新授布政司理問臣黄煒候選布政司經歴等缺臣黄國楹臣王宗城等候補州同臣陳元容候選州同臣周元鼎臣計文齡候補州判臣戴塤等候選州判臣陳仕臣汪愈等候選府經歴臣馮開成等新授縣丞臣馮廸等候補縣丞應陞臣張相柱候補縣丞臣徐廷垣臣周文隆等候選縣丞臣繆錞臣張大成等候選府知事臣羅國禔等恭祝京城正陽門各巷各行士民商賈榜文伏以聖朝調玉燭祥昭有道之符皇鼎固金甌兆啟無疆之厯恩竝地天而疊被化普八紘籌添日月以俱長光凝五位燦紅雲於雉尾畢騰率土之呼嵩瞻紫氣於螭頭益起康衢之擊壤謳歌莫罄舞蹈難揚臣民等伏聞興王履泰當五百之昌期仁主乗乾綿十千之寶祚勲華逓接深仁普播於萬方謨烈相承厚澤覃敷於九㝢出作入息俗尚清嘉鼓腹含哺民風於變是知臻上理無慙上哲更識有大徳必享大年華渚流虹最著髙辛之瑞瑶樞繞電聿傳蒲阪之祥封人獻祝以三多箕子衍疇於五福蓋人登袵席旣統四海之家以為家而詩詠岡陵自合萬民之夀而皆夀欽惟皇帝陛下道配乾元徳符坤厚政勤宵旰儼天步以雍雍治洽堂廉奉帝衷之翼翼體天地好生之徳遐邇叨未有殊恩承祖宗忠厚之傳中外邀非常曠典青壇主鬯契明旦於穆清蘭殿稱觴勤清温於定省接堯舜禹湯執中之統緒洵咸五以登三印闗閩濓洛理學之淵源果外王而内聖或丹黄載籍標大義於綱目之書或甲乙陳編賜御評於古今之集𤼵皇萬象鑄史鎔經輝映三才左宜右有天章璀璨綴金科玉律於毫端宸翰敷華驚鳳翥鸞迴於字裏書十行而官方士習訓寓勸懲籌萬姓而農事女紅圖詳耕織仁人無敵天威快三孽之驅除王者有征神武欣九邊之底定蕩平絶域聲靈騰出日之鄉煦育泰階徳教訖無雷之國梯山航海闢從來未闢之封疆漸義摩仁興亘古難興之禮樂致百靈之效順看四瀆之呈祥猶復南閲河工東封泰岱總冀敷天得所不憚廵行更欣匝地霑恩屢邀時邁邇者下蠲租之明詔務蓋藏於耕九餘三開造士之宏科俾彚萃於拔十得五征徭槩免歴三載而一周鄉㑹竝行閲十年而再舉在我后大沛宏恩於八極秀樸歡騰惟吾民欲聚純嘏於一人熾昌頌起乃推崇未及於萬一而謙讓已至於再三屢却徽稱益彰沖徳聖不自聖詎惟嫓迹於神堯安益圖安遂已齊年於太昊恭逢聖誕欣際嘉辰福祿兼隆共慶六旬之初度尊親未艾實為萬歳之始基佳氣雲蒸啟九天之閶闔歡聲雷動集萬國之衣冠溥湛露於彤階酒斟百福迴祥風於紫陌觴進九霞鶯囀上林宛轉和鈞天之奏鳳鳴阿閣翩躚覘盛世之儀被文錦之衣麻姑擘其麟脯乗綵雲之輦王母奉以蟠桃日之升月之恒鷺序鵷班齊上南山之鶴算天同長地同乆黄童皓叟競獻北闕之兕觥臣民等屬在編氓幸霑徧徳逰日中之市願受一㕓通輦下之財互交百貨地稱帝里躋蕩平正直之休風居隷皇都沐累洽重熈之雅化凡我小民之樂業皆賴聖主之鴻恩家慶昇平夙矢瞻依之切典隆朝賀彌深頌禱之私用申向日之寅衷敬祝齊天之上壽光摇寶炬華燈開太液之蓮曲度霓裳法部按雲門之節更涓吉日肅布淨壇誦寶誥於金繩無㣲不格闡梵音於瑶笈有感皆通俯鑒吾儕報効之涓埃永増哲后凝釐之悠乆伏願壽域宏開春臺廣被結道徳作長生之果何須赤鯉訪仙鍊仁義為福世之丹不藉青牛採藥和風翔九陌處處流膏甘雨灑萬方人人飲液休徵則民康物阜瑞應則時和年豐將萃六合之羣黎常戴萬年之天子參天兩地與萬物以偕春就日瞻雲共三光而永曜則已安已治不殊軒帝之靈長而卜世卜年更過周家之綿逺矣紬縀三行程得壽石璞邱聖臺等二百二十五人金行譚伯龍褚國受劉之鉅等一百四十四人金銀首飾行王世鼎汪詰方一増等一千一百六十七人珠寶行龍登雲孟齊賢周尚文等三百六十六人人參行李之郁金鑑金義檢等一百九十五人城内貂皮行蔣啟元劉世豐張祥麟等二百七人當行張士奇張名逺張景貞等一百一十七人銀行葉長林陳吉士徐國楨等五百八十二人紬縀行仲時盛任振翔沈懋昭等六百八十七人布行武人運康學文孟學呂等五百四十九人帽行陳宗顯張國岡毛潤等一百八十六人糧食行張國鋐趙元臣劉建邦等三十六人廣行劉國瓚王義趙孟遷等三十六人鞾韈行王尚禮王國臣王愛民等八十四人東河沿各行單世立劉彦宋芝秀等二百三十四人西河沿各行唐自芳王國壽金國鑑等七十八人粮倉行閆大士曹起龍孫起熊等一百五十人果行朱文進崔國秀黄士英等二百一十八人廣商梁式彩黄國琮傅瑞公等三十三人廣行伍君銘邢國泰蕭夢祥等九人西河沿各行衞全許養寛夏忠舜等一百五十六人正陽橋各行魯登雲詹銓張有道等八十四人廊房頭巷各行張桂郭宗賢趙鐸等三百三十六人廊房二巷各行王近臣王禮臣吳國華等一百八人珠寶市張明鳳李機馬國臣等一百八十人大街東各行陳宏儒徐金貴魏自秀等三百九十三人大街西各行諸鑒李忠致王之伊等一百四十四人鮮魚口内各行左志懋張茂第李文貴等三百人大柵欄内各行曹國弼張于倉徐芳等一百人梅市街各行陳友志趙國宣耿國翰等五十一人髙爵街各行趙迪吉薛進通劉敬等六十六人東大街各行李珍王建劉慶祖等一百一十七人西大街各行張志仁吳金玉趙貴尊等六十三人正陽門内各行任宏重張文煥金瑛等六十人正陽門外各行馬世俊王自富郭騰龍等二千一百八十七人各巷士民邢儼莊彦卿鄔茂馥等四百五十八人續到各巷士民汪偀孟春富司文柄等二百四十八人書榜舉人米愫副榜吳鍾芬教習汪芳藻歲貢魏大徳生員翁應庚米愼陳篤祜米悦褚瀚褚丞監生王安國儒士張鎔董事行人司行人褚泰候選州同吳毓文周道盛郭燕朱榮璧王世鼎方逺朱元俊褚清候選縣丞褚國鑑褚國受褚源葉長林鍾志淳等共一萬五百一十二人等恭祝萬壽盛典初集卷四十九
