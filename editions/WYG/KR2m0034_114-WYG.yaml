body:
  text: 欽定四庫全書萬壽盛典初集卷一百十六歌頌五十六生監諸臣七萬夀詩四言一章生員臣鄒慶魯皇帝御極寳歴光昌數周甲子歳紀昭陽化行四表澤被萬方和氣蒸洽惠風翺翔祥徵五序瑞曜三光鹿鳴鼓瑟魚藻承筐珊瑚碧樹翡翠明璫吉人藹藹碩士皇皇如松如栢如陵如岡萬壽詩四言一章生員臣馬之蘭猗歟我皇綱紀四方是彝是訓来享来王顯顯令徳克配彼天錫之多福億萬斯年維帝曰咨濟濟多士用勷厥治予其汝試英傑篤生惟國之楨後先疏附萬國以寧萬壽詩四言一章生員臣王起鴻惟天眷徳保佑命之惟德格天允受蕃釐建其有極斂時五福純嘏爾常景命有僕以薪以槱𢎞兹有造福澤綿綿恩波浩浩馮翼孝徳疏附後先思皇多祜天子萬年萬壽詩四言一章生員臣沈熙巍巍我皇照臨萬邦恩覃庻姓徳被遐荒天地合撰日月齊光取士必得立賢無方岡陵旣頌雲漢為昭揆文奮武化育鈞陶勲髙於舜徳峻於堯普天同慶萬國来朝萬壽詩五言排律六韻生員臣吴煃吉帝徳垂裳治皇圖卜厯昌紹休恢聖緒作則煥文光日月明同照乾坤算竝長杏林收桂子秋實擷春芳九服霑聲教羣英樂頌颺華封人有祝天子壽無疆萬壽詩五言排律六韻生員臣徐洵閶闔開黄道祥光集紫宸和風嘘海甸甘雨沛江濵一歲増雙榜三元閏六旬禁城煙柳細御苑碧桃新青鳥銜書日奇英待漏晨八方歌壽祉四海荷恩綸萬壽詩五言排律六韻生員臣殷承爵帝徳髙千載皇仁徧萬方梯航歸有道川阜祝無疆海宇金湯固河山日月長時雍同舜世壽考邁周王巢鳯来阿閣遷鶯繞建章東皇来獻壽卉木盡飄香萬壽詩五言排律六韻生員臣江啟鐸景運開隆治祥符兆熾昌岡陵凝壽祉雲漢麗天章曠典朝端重奇逢士氣揚文壇来俊秀藝苑集珪璋鵬路風雲㨗雞林杏桂芳師師稱獻頌歲歲戴君王萬壽詩七言律一首生員臣許開平絳甲初周鶴算長九重宫殿靄千祥東方桃獻􅅾山瑞南極星呈奕葉光聖世覃恩羅俊彦人才應運炳文章會看岳牧䕫龍軰歲歲螭頭進紫觴萬壽詩七言律一首生員臣陸允鈞時逢景運正中天令布陽和春更姸緼瑟歌風遊舜世垂裳致治戴堯年功髙萬古金甌奠道合千秋寳厯綿共沐皇恩遐邇徧嵩呼華祝樂無邊萬壽詩五言律一首生員臣劉珊一人瞻有道萬國祝長年瑞草榮堯殿薫風協舜絃九如方祝嘏三物更賔賢佳氣乾坤溢春光滿壽筵萬壽詩五言律一首生員臣汪師藺聖徳同堯舜鴻圖邁禹湯景卿瞻聖世草木煥晴光銀甕綿山阜金甌鞏廟堂含生咸鼓舞萬禩慶悠長萬壽詩五言排律六韻生員臣李士鍾佳氣凝三殿祥雲蔚九重霄盤承玉露仙樂響金鏞春色蟠桃醉晴烟御柳濃儒林邀異數海甸徧時雍爛熳南宫杏菁葱上苑松百王從未有軒昊接髙蹤萬壽詩七言律一首生員臣錢天保南極星躔麗碧空奎光遥映蘂珠宫箕疇首建惟皇極華祝三多集聖躬滄海神珠供採擷藍田瑞玉受磨礲試聽藹吉岡陵頌穆穆仁聲應八風萬壽詩五言排律六韻生員臣團豐根運値唐虞際星廻甲子周冠裳趨鳯闕簪笏拱龍樓綸綍宣三殿賢才貢九州文光輝斗極科目舉春秋就日傾葵藿瞻雲拜冕旒嵩呼與華祝歲歲海添籌萬壽詩五言排律六韻生員臣魏經五紀戴元良垂衣靖八方彌天敷雨露率土列冠裳雉尾開宫扇螭頭繞御香山川增藻麗雲漢煥文章鳯詔開賢路鴻儒觀國光野人爭獻頌夀域祝無疆萬壽頌生員臣韓任重皇帝御宇徳昭功懋中正乾綱含𢎞坤厚氤氲太和洋溢宇宙歌敘平成豐穰屢奏大化翔洽民淳士秀翽鳯来儀祥麟在囿甘露流珠卿雲出岫萬歲垂裳岡陵並壽時惟三春花明柳繡萬國衣冠歡欣幬覆芃芃棫樸槱薪日茂士氣蒸蒸唐虞復覯鼓舞振興金臺輻輳籲俊闢門徳丕平富蕩蕩難名皇天眷佑萬壽頌生員臣張之遇天亶聰明作君作師一人有慶兆民頼之皇帝御極雲行雨施歲在癸巳春王三月虎拜於廷嵩呼於闕億萬斯年天顔咫尺皇帝萬壽以安元元贊兹化育参彼坤乾無為而治軼彼羲軒久道化成溢乎四海聲教覃敷揚光耀采濟濟多士亦元亦凱惟臣欽若惟皇綏猷登三咸五莫之與儔式歌九如永承天庥萬壽頌生員臣徐大觀一人有道三階底平允文允武乃聖乃神九歌宣政八極同文為麟為鳯作􅆬作楨福祿天来俊乂雲蒸自今伊始川至日升三祝九如壽考作人聖厯無疆普天同賡萬壽頌生員臣徐肇模若稽五帝仁壽永康選賢建能輔治家邦思皇多士左右奉璋維我天子穆穆皇皇宏開壽域来享来王曠典作人雲漢為章荷天百福萬壽無疆萬壽詩五言排律六韻生員臣解撙瑞氣浮雙闕宫花燦御墀嵩呼喧晝漏仙仗簇春旗香馥爐烟細雲開雉尾随遲遲當淑景濟濟奉霞巵五福箕疇斂千秋寳鑑垂恩綸敷率土髦士應昌期萬壽詩七言律一首生員臣趙斗九重壽域初開日雲漢昭囘麗碧天元凱嵩呼金闕下夔龍華祝玉堦前鳯鳴喜値添籌日豹變欣逢復旦年自是薫風能解阜帝廷一曲聼虞絃萬壽詩五言排律八韻生員臣高玉桂海宇昇平日人才樂育時長庚輝壽域甲子展春期瑶島呈麟脯􅅾山獻瑞芝御園花放蘂上苑柳垂絲颺拜千官肅謳歌四海熙三多来華祝五福應箕推世際風雲會人霑雨露滋萬方齊獻壽歡進紫霞巵萬壽詩栢梁體生員臣李子貴聖人御極鳯厯長深仁厚徳髙穹蒼體元出治冠百王頻蠲賦稅恩汪洋黄淮交滙猶隄防山陬海澨咸梯航中外寧謐奏時康菁莪樂育歡聲揚普天同歌萬壽長萬壽詩五言排律六韻生員臣殷璉寳厯當春永璿圖應日長薫風来拂地離照正當陽弱柳垂閶闔仙桃熟建章龍飛爭利見鳯舞竝呈祥樹入瀛臺秀花歸閬苑香􅆺兹羣有願帝祚自光昌萬壽詩五言排律六韻生員臣吴煜立瑞氣籠丹陛祥雲䕶紫宸瑶階生蓂莢閬苑長靈椿特詔開天網殊恩簡席珍化源三峽浪壽域九重春棫樸謳歌徧宫牆氣象新冠裳随虎拜保佑頌天申萬壽詩五言排律六韻生員臣顧音昭運値雍和代時逢瑞靄年皇躬歌介祉聖厯慶綿延芝蓋卿雲繞楓宸湛露鮮春風看鶚薦秋日喜鶯遷異數承恩渥鴻才奪錦先儒林欣盛事願賦九如篇萬壽詩五言排律六韻生員臣黄濟生興朝多盛事奕葉著良謨雨露栽培久雲霞爛熳敷斯文歌雀躍多士競鳬趨徳顯天申命時乘玉衍符丹山来鸑鷟鐡網盡珊瑚介福迎春靄徴謡徧壤衢梧岡鳴翽鳯九有效嵩呼萬壽詩五言排律六韻生員臣陳桂恩一統昇平日三春瑞靄中休徵歸聖世福履集皇躬惠凱丹霄徹文明紫氣融玉虬騰翰苑銀漢映珠宫鯤向天池化􅉇從雲路通作人還壽世長此沐仁風萬壽詩七言律一首生員臣丁干恭閶闔晨開氣鬱葱御爐香裊瑞煙籠星流電繞符仙紀露靄雲祥叶化工閬苑有梧皆翽鳯神州無嶽不呼嵩時雍大地霑天澤擊壤衢歌處處同萬壽詩五言排律六韻生員臣歸復佺禮樂千秋盛車書萬國通寰中皆樂土宇内徧薫風應律宫商恊乘時草木豐鳯凰飛翽翽棫樸秀芃芃壽與天俱永春随化並融君王多樂愷常與兆民同萬壽詩五言排律六韻生員臣楊士標擊壤華封祝卿雲八伯歌皇仁眞浩蕩民俗喜雍和壽自齊天地恩尤被薜蘿人逢隆運起才本聖朝多楨榦須培植圭璋賴琢磨萬方歸壽域瞻拜盛鳴珂萬壽詩七言律一首生員臣王前大徳天申祚正綿遥瞻御極日髙懸光承北斗斟堯酒樂奏南薫入舜絃一統車書爭獻頌萬方玉帛盡朝天海隅同進無疆祝共沐皇仁樂大年萬壽詩五言排律十四韻生員臣莊樹嘉冠冕朝宗日君王燕喜時春諧姑洗律花發萬年枝青瑣傳宫漏丹墀簇羽旗露盤承北闕雲輦降西池瑞靄供宸賞彤闈奉聖慈樹棲五彩鳯庭産九莖芝麟趾方呈瑞滎河正衍禧彚征𢎞保泰繼照炳重離日月光文治山河萃藻思瑶琨容藴璞紈縞尚縈絲上國張銀榜𢎞才綴錦詞金臺方市駿珠海盡探驪世際貞元會躬膺福履綏流歡及草莽萬壽競陳詩萬壽詩七言律一首生員臣顧良萬國咸寧萬壽初恩綸又早徧坤輿雲門樂奏開天仗寶篆香濃繞碧虛逺貢金鵞斟玉液連登蘂榜舞瑶除龍旗虎幄祥光擁蓬島還陳秘笈書萬壽詩七言律一首生員臣楊傑遥瞻南極映奎光金殿仙蓂接砌長率土蒸民歸有極齊天聖壽祝無疆西崑曉擁星辰麗上苑春深桂杏香千載昌期逢此日萬方咸奉萬年觴萬壽詩七言律一首生員臣張澤乾糺縵卿雲䕶紫閶如天聖壽永無疆彭鏗斟雉方調鼎王母成詩為捧觴下土薪槱歌棫樸自天福禄頌鴛鴦時雍正値唐虞世八表同春歲月長萬壽詩七言律一首生員臣張蕃黄道新開御極晨萬方咸頌太平春曉鐘聲動臨金闕仙仗班移䕶紫宸樂奏鈞天來舞鳯章開雲漢映祥麟稱觴爭獻瑶池酒海甸千秋共飲醇萬壽詩七言排律二十二韻生員臣胡旨皇仁被物正沖融聖壽参天貳地中自是升恒齊日月何須方術問崆峒神和不藉金莖露階泰長披玉殿風法酒獻時揮睿藻仙韶奏處賜彤弓武功赫濯戡中外文教覃敷邁鎬豐大輅青紘三月令碧桃紅杏五雲叢簪裾珮動鴛行合桓榖圭分雁隊同萬國但知天子福羣黎豈識聖人功奠安社稷眞無間進退人才總至公悉與蠲租超古昔每於宥過廣帡幪漢唐事業殊堪陋堯舜精微實比隆澤沛臣僚兼兆庻恩流草木及昆蟲文成淵鑒標宸翰詩自天題濕彩虹鳯闕天門書法備纂修删訂道心融洪纎物格周穹壤是否幾硏乃折衷已盡熏陶歸禮樂眞如創造出鴻蒙猶虞孝秀遺三試特立科名達四聰拂拭能教駕馬驟蒐羅不厭散材充􅅾蒿巖穴無蟠蠖海嶠江涯有漸鴻從此萬方胥被澤自今八表共呼嵩巍居百代君師上誕受遐齡濬哲通玉厯金甌歌帝則千秋萬歳祝皇躬萬壽盛典初集卷一百十六
