body:
  text: 欽定四庫全書萬壽盛典初集卷五十二慶祝四大臣入覲一康熙五十二年三月十八日恭遇皇上六旬正誕各省將軍督撫提鎮諸臣先期疏請陛見慶祝萬壽其奉旨來京者先後入覲直隷廵撫總兵官俱屆聖節前赴闕行慶賀禮恭請入覲慶祝萬壽奉旨准來京大臣鎮守西安等處將軍世襲拖沙喇哈番席柱鎮守荆州等處將軍達爾占鎮守江南等處將軍加一級鄂克遜鎮海將軍世襲一等侯又一拖沙喇哈番加六級仍帶軍功紀録馬三竒鎮守福建等處將軍世襲一等精奇尼哈番加二級祖良璧總督湖廣等處地方軍務兼理糧餉兵部右侍郎兼都察院右副都御史鄂海兵部右侍郎兼都察院右副都御史總督河道提督軍務加五級趙世顯廵撫山東等處地方督理營田兼理軍務都察院右副都御史蔣陳錫廵撫山西太原等處地方提督鴈門等關軍務兼理雲鎮都察院右副都御史蘇克濟廵撫河南等處地方提督軍務兼理河道兵部右侍郎兼都察院右副都御史鹿祐廵撫甘肅寧夏平慶臨鞏等處地方贊理軍務兼理茶馬都察院右副都御史岳拜提督江南等處地方總兵官師懿徳提督浙江等處地方總兵官左都督呉郡西安左翼滿洲副都統世襲二等阿達哈哈番加一級索柱西安右翼漢軍副都統劉官統杭州滿洲副都統道服色杭州漢軍副都統李如松鎮守山西太原等處地方副將管總兵官事馬見伯鎮守山西大同等處地方副將管總兵官事張自興鎮守陜西寧夏等處地方總兵官左都督世襲一等精竒尼哈番范時捷鎮守河南南陽等處地方副將管總兵官事世襲三等阿達哈哈番楊鑄鎮守福建漳州等處地方總兵官左都督許鳳鎮守雲南鶴麗等處地方總兵官郝偉三月二十二日己亥上召入覲大臣賜宴於暢春園内苑上御樓臨觀命諸王傳觴並賜克食果品衣帽鞾襪石硯等物有差隨諭各回本任十八日萬壽禮成入覲諸臣山東廵撫蔣陳錫山西廵撫蘓克濟河南廵撫鹿祐先經奉旨於二月内回任其留京師者日侍西苑上以次召進御園賞花賜宴維時泰交異數湛露洪恩亘古罕有其宴饗之隆賞賚之渥畧備諸臣回署謝恩疏謹録如左鎮守西安等處將軍世襲拖沙喇哈番臣席柱謹奏為恭謝天恩事竊臣恭遇皇上六旬大慶前來叩祝伏見天下臣民盡皆齊集自京城以至暢春園沿途建棚誦經齊心懽慶叩禱聖主萬壽無疆此皆皇上浩蕩之恩無微不到以致六合之内不期而集頌祝萬壽真亘古未有者也臣到京隨駕至霸州蒙賜黄繫火䥥包回鑾之後又同各省將軍俱沐特恩與内大臣等命入内苑恩賜飲食且命阿哥等授酒臣受此隆恩方深戰慄乃又蒙皇上賜衣帽鞾襪至恭請訓旨蒙聖諭善養身體以保餘年久逺出力温旨疊頒何能承受伏念臣懦弱庸愚世受重恩自幼蒙皇上教育之恩漸加擢用以至今職毫無尺寸報効之處而皇上天高地厚之恩有加無已臣雖盡犬馬之力不能仰報萬一臣於回任時恭設香案率領全家望闕謝恩外謹具奏聞鎮守荆州等處將軍臣達爾占謹奏為恭謝天恩事竊臣欣逢皇上萬壽大慶叩祝來京普天率土億萬臣僚軍民人等皆有同心不期而至共效嵩呼臣荷殊恩同内大臣等入侍内苑得以仰瞻聖子神孫喜出望外又蒙恩賜飲食命諸阿哥賜酒幷賜御用線纓凉帽袍掛鞾襪御馬火䥥包等物臣子達朗阿更蒙特放藍翎伏念臣何人斯受此重恩雖粉骨碎身亦不能仰報於萬一臣恭請訓旨蒙皇上命臣善養身體以保餘年久逺出力臣跪聆之下敢不祗遵明訓竭力報効臣回任所率領妻子恭設香案望闕叩首以謝天恩再臣自京起身經過直隷河南二省以至荆州見沿途雨水得時麥穗長大村莊人民無不踴躍歡欣臣所過地方逐處詢問僉云今年麥子比往年肥壯各種糧食盡皆茂盛此聖主萬壽無疆之福普被天下人民是以年登大有臣目覩豐亨之象理合一幷題報為此謹奏以聞鎮海將軍世襲一等侯又一拖沙喇哈番加六級臣馬三竒謹題為恭謝天恩幷報微臣回汛日期事竊臣恭逢聖主萬壽大慶恩准來京叩祝屢覲龍顔比天而健疊聆聖訓如日之溫既已大慰微臣數年瞻仰之誠蒙聖恩浩蕩令得隨侍班聯日飽珍膳近而御苑放鷹逺而水圍廵幸臣皆得追隨鑾車豹尾之後塵親覩聖武天威之赫濯私心欣幸曷其有極復不以臣為駑駘陋質錫以天廏龍駒及珍羞方物三月十四日又䝉格外天恩召入内廷叩見聖子神孫之衆多盡皆龍鳯之姿天日之表十七日聖駕回宫十八日萬壽令節凡東西南北萬國九州之臣民童叟梯山航海共晉萬載之霞觴騎竹扶鳩咸上九如之寶頌臣隨班叩首祝山河而踴躍寸長莫効聞頌禱而歡欣以為自古迄今未有聖徳深入人心以致内外一詞遐邇合意普天之下莫不尊親典禮如是之極盛者也十九日復得隨侍龍舟徧遊内苑玉蘭聳日僊樂凌雲目所未覩耳所未聞二十二日又蒙召入西厰賜克食桌子特命衆位阿哥不辭天潢之尊授飲微臣之酒並賜袍帽鞾襪諭令各回任所二十三日跪請聖訓惟令微臣遵循定例綏靖地方更令調養微軀多加飲食勉以再為効力多年二十六日復召入内苑賞花觀劇至四月初一日叩辭回汛又蒙賜綠端硯一方珍品二十種臣不知夙世何修疊蒙天高地厚之恩得至於此今於本年四月二十二日已抵京口准副都統周良相委令鑲黄旗叅領董象鼎臣標中軍副將楊長春筆帖式王之騰賫送鎮海將軍銀印一顆令箭十二桿到臣臣隨恭設香案叩首收受訖臣惟有仰遵聖訓恪守定例以靖地方保養微軀以圖効力生生世世子子孫孫竭盡犬馬以報洪恩於萬一耳為此具疏恭謝幷報微臣囘汛日期伏乞皇上睿鑒施行謹具題知鎮守福州等處地方兼管緑旗都統將軍世襲一等精奇尼哈番加二級臣祖良璧謹奏為恭謝天恩事竊臣至微極陋蒙我皇上破格任使依戀之誠時縈朝夕恭遇聖主六旬萬壽請旨陛見重荷聖恩俞允得遂瞻天仰聖之私臣自行在趨叩聖安隨行至京屢蒙賜宴賜食疊霑天家異味復䝉賞看御園勝景珍禽異卉得覩生平未有之奇又命阿哥授酒臣跪飲畢頒賜線纓凉帽五爪龍縀袍掛鞾襪及臣陛辭起行又蒙賜彩漆匣夔龍池端硯乾哈宻瓜鹿肉條魚條細鱗魚蜜餞果品幷榛子松子諸珍物臣叩頭謝恩祗領伏念臣樗散庸材謬膺重任幸際昇平愧無寸長報効欣逢萬壽昌期得隨天下臣民共申嵩祝瞻仰龍顔已極微臣之榮幸更蒙異數頻施恩波疊沛有加無已真從來未有之盛遇臣何人斯當兹逾分寵榮中心感切報稱彌難惟有益竭駑駘捐糜頂踵以仰荅高深於萬一耳所有感戴之誠謹恭疏奏陳謝悃伏乞聖鑒為此具本謹具奏聞兵部右侍郎兼都察院右副都御史總督河道提督軍務加五級臣趙世顯謹奏為恭謝天恩事欽惟我聖主六旬萬壽昌期臣敬請陛見荷蒙恩准來京獲瞻天顔隨班拜舞得遂犬馬戀主之忱臣不勝踴躍歡欣之至又屢蒙賜宴賜食疊霑天家異味又命阿哥授酒幷看御園盛景巍峩燦爛真生平罕覯之奇觀更蒙賜線纓凉帽五爪龍縀袍掛鞾襪又賜御硯一方哈宻瓜乾鹿肉條蜜餞等二十様臣跪領之下蒙恩自天感激無地隨敬謹收蔵奉為至寶伏思臣一介庸愚至微極賤仰荷聖主特達之知畀以督河重寄迄今已厯四載雖殫心竭力毫無報稱乃恩賜尚方珍品迥異尋常復欽賜冠服光榮備至臣何人斯得此寵頒有加無已惟凛遵聖訓銘心刻骨益加䇿勵黽勉盡職以報高厚於萬一而已臣謹疏奏謝再照臣於四月十五日抵濟寧隨起行囘赴南工理合一幷奏明伏乞皇上睿鑒施行為此具本謹具奏聞總督四川陜西等處地方軍務兼理糧餉兵部右侍郎兼都察院右副都御史臣鄂海謹奏為恭謝天恩事竊臣孤孑一身荷蒙皇上屢次拔擢恭逢聖主六旬萬壽准臣來京先於行在恭請聖安仰蒙温旨隨駕囘宫至萬壽聖節臣得躬親拜舞且見普天共慶率土同歡臣不勝踴躍忻忭之至又令臣隨班列坐命皇子執盞授酒又賜臣克食蟒縀袍掛等物又奉特旨調補川陜總督臣恭請聖訓蒙睿謨指示臣跪聆天語感激涕零惟有恪遵聖訓始終盡心協和文武安静地方愛養兵民仰報天恩於萬一耳為此謹具奏聞廵撫直隷等處地方管轄紫荆宻雲等闗隘贊理軍務兼理糧餉都察院右副都御史世襲一等精奇尼哈番加九級臣趙𢎞燮謹奏為恭謝天恩幷報微臣囘署日期事竊臣於二月初七日在蘆溝橋跪接聖駕瞻仰天顔即隨駕廵幸蒙皇上日賜克食二次又賜御馬一匹幷賜御射兔一隻及榛松子蜜餞山查等物夫以天閑上駟頒及外臣内府殊珍賚於行在固已沐聖朝之曠典極臣子之寵榮矣乃臣於二十七日隨駕至海子蒙皇上念直屬事務殷繁命臣暫囘料理仍准臣於皇上萬壽之前到京慶賀臣於三月十一日至暢春園外附諸大臣班聯伏見寰宇耆民感戴聖天子厚澤深仁紛紛詣闕叩祝萬壽而直屬九郡老人瞻天甚邇被澤尤深扶杖嵩呼者動以萬計我皇上加恩施惠又復藹如家人父子巷舞衢歌懽聲雷動臣民尊親愛戴之誠自古未有如今日之盛者也臣得恭逢其會不勝歡忭榮幸惟是臣以受恩深重之人愧無寸芹上佐霞觴乃蒙聖恩汪濊召入内苑恩賜御筵使臣瞻上林之春樹宛在瀛洲飲良醖之瓊漿如霑玉液復命阿哥傳觴授酒又將御用龍袍龍掛貂帽鞾襪賜臣穿戴畧堂廉之分自揣難安承藻火之光撫躬惕息更蒙恩賜御硯一方并松榛子哈􅁡瓜鹿肉條蜜餞果子共二十種捧大内之墨田愈秉心於介石飫尚方之異味益矢志於飲冰臣俱即叩頭謝恩祗受訖伏念臣一介庸材八年重寄恭遇一人有慶之昌期欣逢萬壽無疆之盛典得與黄童白叟共申華祝已為榮寵非常乃荷異數殊施恩波疊沛更屬從來之所未有臣何人斯受逾其分自兹以往報稱彌難惟有捐糜頂踵生生世世永効犬馬以仰報聖恩高厚於萬一耳臣於三月二十六日已抵保定所有感恩激切幷微臣囘署日期理合奏謝為此具本謹具奏聞廵撫甘肅寧夏臨鞏等處地方贊理軍務兼理茶馬都察院右副都御史加二級臣岳拜謹奏為恭謝天恩事竊臣一介庸愚荷蒙聖恩畀以甘撫重寄在外日久犬馬戀主之忱時刻難忘幸逢我皇上六十大慶經臣疏請陛見欽承俞允准臣來京臣即起程於本年二月二十四日迎至寺垡跪叩道傍恭請聖安仰見天顔光霽無任懽忭隨駕行走屢賜克食皇上又賜親射兔一隻三月十八日臣得隨班叩祝萬壽二十二日在西厰内蒙皇上親臨賜宴命阿哥執爵又賜貂帽袍掛鞾襪榮寵已極臣跪領之下惶悚糜寧四月初二日又蒙天恩賜彩漆匣臥􅁞邊天雞池硯一方細鱗魚鹿肉條折盧魚哈宻瓜松子榛子蜜餞梨山查等果皇上洪恩疊施至優至渥臣何人斯受此格外恩寵撫躬自省愈增恐懼於初四日臣跪聆聖訓鏤諸肺腑敬謹遵行臣雖夙夜兢惕黽勉奉職亦不能仰報皇上天高地厚之恩於萬一復思天厨珍物人世罕見臣薦之祖先捧至蘭州傳集文武各官共甞御食以廣皇仁於無極理合恭謝天恩伏乞皇上睿鑒施行為此具本謹具奏聞提督江南等處地方總兵官臣師懿徳謹奏為遵旨詣闕祝釐疊蒙殊寵謹竭鄙忱恭謝天恩事欽惟我皇上至仁御世大徳祈年運一心於主善之天錫萬國以建中之化誠為美無不收因知福未可量今春三月内恭遇皇上六旬正誕蒙准來京得與在廷諸臣隨班朝賀獲覩暢春園至闕廷萬國嵩呼華祝之盛又見聖主設科養老𢎞宣恩詔俾中外臣民無一不被其澤而猶聖不自聖温諭撝謙從古至今僅聞僅見臣何幸生聖人之世躬逢盛典其踴躍歡忭真莫可以筆紀矣乃荷恩賜御宴飽飫天厨皇子傳觴當之非分復叨召入内苑看花給饌樓閣山水更為罕觀又蒙賜給凉帽團龍袍掛鞾襪兼及寶硯一函臣何人斯際兹異數復欽奉恩詔膺爵進秩凡此天恩之優渥永為臣子之希榮惟有恪遵聖訓奉為寶箴早夜率循罔敢或怠以仰報聖恩於萬一耳謹繕疏恭謝伏乞皇上睿鑒施行為此具本謹具奏聞提督浙江等處地方總兵官左都督加三級降二級留任戴罪圖功臣呉郡謹奏為恭謝天恩並報微臣囘任日期事竊臣一介庸愚荷恩最厚今歲伏遇皇上六旬大慶臣心切呼嵩情殷戀主疏請入覲幸蒙俞允臣即束裝就道於康熙五十二年三月初六日詣暢春園恭請聖安十二日瞻仰天顔見皇上仁武倍於曩時不勝懽忻抃舞乃蒙皇上顧問地方海洋安静以及臣之年歲十七日接駕蒙賜壽桃十八日當萬壽之昌期值普天之同慶微臣隨班拜颺之後隨駕至西厰又蒙賜看萬壽皇會覩未見之奇觀目康衢之抃舞千八百國雍雍肅肅咸瞻有道聖人億兆士庶濟濟蹌蹌共祝萬年天子亘古以來未有如我皇上之仁壽也二十二日蒙恩賜宴幷得霑食上方果品珍饈又命皇子賜酒非分之榮至此已極復蒙恩賜五爪龍袍幷帽鞾龍襪等件四月初一日又蒙皇上賜臣博古池硯四月初四日奉旨同漳州總兵官臣許鳯到中堂處議移鎮之事微臣謹抒管見初六日又蒙賜克食初七日恭赴澹寧居謝恩跪聆聖訓荷蒙温諭諄諄有愛惜商民體恤兵艱幷廵防事宜與文武和衷商酌之訓㫖仰見聖明洞鑒無微不照而睿謨所及指畫周詳臣欽凛之下悚惶無地感激彌深至恭逢恩詔内有䕃一子入監之條縁臣只有一子是以冒凟奏明將臣子把總呉興業改文送監讀書蒙皇上念武臣之後亦令曉識字義遂邀俞㫖臣身受隆施報稱無地惟有益勵臣節凛遵聖訓實心實力料理地方以仰報於萬一耳臣於康熙五十二年四月初八日陛辭出京於五月初七日囘至浙江所屬嘉興府地方謹恭疏奏謝並報囘任日期伏乞皇上睿鑒施行為此謹具奏聞提督貴州總兵官都督僉事加一級臣張文煥謹奏為聖徳𢎞施皇仁疊沛微臣感戴難安圖報無地謹具疏恭謝天恩事竊臣生長西陲草茅微賤叨蒙聖恩超拔鼎甲特擢侍衞不數年間旋授大同總兵天高地厚之恩未効涓埃之報兹蒙聖恩特簡貴州提督臣聞命之下驚心動魄伏念臣愚昧無知畀以巖疆重寄戀主情殷即具疏恭請陛見蒙恩准臣來京臣平昔念結而不克慰者忽得瞻天仰聖舞蹈堦前慶幸已屬無既復蒙皇恩於年節新正准臣隨内大臣侍衞班列得進侍筵宴非分之榮更出望外二月初八日隨駕行幸水圍蒙恩每日兩賜克食至沙口蒙賜御馬幷哈宻瓜至圏頭又賜松子榛子蜜餞山查圖衣合特食至李家渠賜御射兔一隻皇恩優渥愧感難安迨陽春三月正值萬壽大慶普天臣民奔趨闕下祝聖瞻天塞滿道路祝頌事畢甘雨溥徧天意人心上下響應皇上復軫念逺來臣民舉行養老之典頒賜御筵衣物又命皇子皇孫執爵徧行勸侑真亘古未聞之盛事臣得覩曠典欣幸何極乃復荷皇恩三月二十二日賜臣御筵御酒熏貂帽團龍緞掛雲龍縀袍縀鞾縀襪二十四日又賜異獸綠端硯一方臣何人斯既得御騄駬之駿復得霑瓊液之觴既有章服以壯威儀復有端硯以為世寶種種異數悉出格外臣雖捐糜頂踵未足仰荅殊恩四月初四日又蒙聖訓諄至使臣跪聽之下茅塞頓開愈切感激惟有凛遵天語竭盡駑駘鼓勵弁兵寧静地方以期仰報高厚於萬一耳臣謹恭疏奏謝伏乞皇上睿鑒施行為此具本謹具奏聞西安右翼漢軍副都統世襲拖沙喇哈番加一級臣劉官統謹奏為恭謝天恩事欽惟我皇上堯年益懋舜日彌昌恭逢萬壽六旬微臣得覲天顔隨内廷諸臣拜舞叨蒙恩賜臣冒凟陳情為母懇請御書蒙賜北堂睂壽匾額准臣省母錫類深仁榮増奕世臣敬謹賫捧於四月十七日扺里恭設香案臣母率闔門男女望闕叩謝外隨敬懸中堂用昭天貺臣母囑臣謂聖恩深重捐糜難報汝當竭蹶勉力不必以母老為念顧臣駑劣庸材承兹異數惟有鞠躬盡瘁圖報天恩於無盡耳臣省親限滿於五月初九日自河南起程二十四日至西安署所理合報明恭謝天恩謹具奏聞萬壽盛典初集卷五十二
