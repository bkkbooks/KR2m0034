body:
  text: 欽定四庫全書萬夀盛典初集卷一百十五歌頌五十五生監諸臣六萬夀詩五言排律八韻生員臣張忠鳯聖代規模逺昌時景命􅂭錫齡膺保定御宇盛朝宗懋徳超千古修和叙九功搜羅多國輔側席引文雄講學心源接敷文禮教崇闢門光舜化咨岳邁堯聰集慶三才合歌風百爾叢太平多樂事華祝萬方同萬夀詩五言排律六韻生員臣徐善謙紫氣浮金掌紅雲捧玉觴衣冠趨帝座奎壁映文昌日暖龍鱗濯春明鳯羽翔九重深徳澤多士盡賢良籲俊同元愷掄才陋漢唐虹流綿厯算雲漢煥天章萬夀詩四言一章生員臣王文奎粤稽前聖時惟三皇紀年以萬厯數綿長穆穆天子徳邁陶唐蕩蕩無名巍巍難量恭逄萬夀瑞靄雲翔山龍垂衮藻火繪裳臯夔輔弼岳牧賡颺衣冠萬國貢琛来王天顔有喜同躋夀康流膏沛澤薄海汪洋菁莪廣化雲漢為章四門既闢三宅用彰朝賡零露野頌甘棠綿綿萬嵗得人而昌雲霞蒸蔚矞矞煌煌與天不息應地無疆萬夀詩四言一章生員臣邱錫焻皇帝受命萬國咸寜配天等極為世作程躬勤萬㡬雞鳴戒曉横經典學求賢訪道誕敷文徳載纘武功覆載所及㒺弗攸同多士雲興羣材霧集揚馬鄒枚陳詩載筆咸歌聖徳㛟美虞唐化成久道至治彌光萬夀詩四言一章生員臣陳言聖人立極景運彌長聲靈赫濯化育光昌自天申之受命溥將和風麗日穆穆當陽垂紳委佩拜手稱觴衢歌巷舞山梯海航論秀書升觀國之光鹿鳴苹野鳯翽梧崗太平有象多士思皇億萬斯年福祿穰穰萬夀詩言一章生員臣卲楫乾健不息坤厚無疆天地合徳視履考祥其惟聖人離照四方四時合序利用賓王自天佑之有慶含章以其彚征觀國之光王用三錫朱紱斯皇天下文眀磐石苞桑萬夀詩四言一章生員臣伍超聖神廣運天錫純嘏徳合無疆眉夀御宇巍乎鴻績煥乎龍文仁風洋溢和氣氤氲九服大同萬邦齊􅁤文恬武熙禮經樂緯辟雍造士棘闈招英珠求照乗玉剖連城士慶風雲世登雍穆萬國咸寜三多永祝萬夀詩四言一章生生員臣賈寛生皇覆萬宇品物咸亨九賓在列百譯輸誠星雲糺縵鸞鳯和鳴仁覆如天眀照如日親賢任能愛民育物禮備樂成聲教四訖鍳觀惟徳丕命惟皇物性茂育謡俗樂康曰惟萬年同於昊蒼萬夀詩五言排律六韻生員臣張鋐運際文眀世人逢上理時祥風廻鳯輦瑞氣拂龍旗玉律當春轉彤雲繞殿披菁莪同化育棫樸並榮施鼓腹堯天乆嬉逰舜日遲草茅争獻夀願上萬年巵萬夀詩七言律一首生員臣姜昌茂山河大地呈春色聖主初開萬夀筵獻雉貢琛来禹甸阜財解愠自虞絃琪花不謝香千樹鳯羽髙翔耀九天不是盛朝求士切那能作賦逹甘泉萬夀詩七言律一首生員臣吴澍祥開南極靄恩波寰宇春深樂太和一統車書環玉帛中天日月麗山河風吹仙樂来鸞掖嵩合呼聲集鳳坡北望幾回稱萬夀華封無地不謳歌萬夀詩五言排律六韻生員臣李之琯萬年膺百禄紫極繞樞辰慶洽敷天際歡騰率土濱山河綿福祚雨露廣陶甄讀易知恒道賡詩頌作人名山收韞玉薄海􅃠竒珍踴躍来多士謳歌祝紫宸萬夀詩五言排律六韻生員臣于應薦盛徳髙千古豐功邁百王窮簷通寤寐列聖儼羮墻統接尼山席人登洙泗堂流虹書紀瑞感月史徴祥應徳芝房秀作人雲漢光嵩呼通黼座傳響叶笙簧萬夀詩五言排律六韻生員臣沈曽豐聖人綿景運垂拱莅神州恵澤敷遐甸謳思徧逺陬岡陵綿玉燭帶礪固金甌紫氣凝龍闕丹書降鳳樓驊騮馳逸足鴻鵠振髙秋萬嵗嵩呼日觀光素志酬萬夀詩五言排律六韻生員臣秦朱干南極輝朝旭東華繞瑞烟春催鸞禁栁香引鳯池蓮甘露漙璚樹流霞泛綺筵光華燦河漢經緯協璣璿一徳明良㑹三多福祉全春和閶闔啟萬舞祝長年萬夀詩七言律一首生員臣張予宏麗日初升瑞靄生瑶池春宴泰階平九重宵旰勞區畫萬國梯航謁聖明璧水薫風来北極銀河化雨洽西清瞻雲競獻無疆祝嵩嶽三呼達帝京萬夀詩五言排律六韻生員臣朱品竒山川呈異瑞運㑹自遐昌棫樸歌頻作芝蘭佩正芳普天霑雨露萬載慶禎祥仙苑青麟育瑶池紫鳯翔春光敷睿藻文采煥宸章取士英華集瞻雲捧玉觴萬夀詩七言律一首生員臣瞿義正太平端拱仰垂裳治協唐虞徳化翔六合共球環鳯闕千官拜舞肅鵷行瀛䑓春滿風雲色玉殿天開日月光多士傾心齊向日敢持銀管祝無疆萬夀詩五言排律六韻生員臣鮑楫聖朝逢泰運帝徳立乾綱玉厯初周甲春暉永載陽普天瞻瑞靄率土進霞觴閬苑夔龍集瑶池鸞鳯翔兆民欣有賴多士頌無疆鼓瑟諧鳴鹿羣歌天保章萬夀詩五言排律六韻生員臣王煥天地恩光大昇平化日舒萬年調玉燭四表拱皇居景福綿長算鴻禧洽九如宸𠂻尤重學文苑每崇書棫樸霑榮幸菁莪佩澤餘丕基長鞏固億載正權輿萬夀詩五言排律六韻生員臣朱琯夀域𢎞開日文風丕振年中天懸日月萬國璣璿華祝陳三願嵩呼動八埏陽春敷化育桃李競争妍青鳥来仙島霞觴進御筵儒臣勤虎拜歌舞聖皇前萬夀詩五言排律六韻生員臣潘玉衡作人稱夀考聖世主文昌道啟鴻鈞泰仁敷庶物康睿謀周海甸明斷肅官常人物千秋盛聲名萬禩揚羣工争獻賦多士慶觀光戬榖歌無盡靈長運未央萬夀詩五言律一首生員臣項超皇極開天運嘉祥集聖躬湛恩春共永久道化逾􅂭北斗垂光逺南山比夀崇上林花更好紫禁氣偏融萬夀詩五言排律六韻生員臣沈均禁籞通南極奎垣耀斗辰風雲輝黼黻日月麗絲綸栁汁春先染槐花秋愈新流虹綿玉厯湛露樂嘉賓擁仗朝丹陛摳衣祝紫宸眉齡齊泰岱景福洽神人萬夀詩五言排律六韻生員臣顧鎬鳯厯三皇紀鴻鈞萬象新堯階春正永舜瑟韻初匀閶闔開昌運遐陬仰化神升恒同日月奎壁燦星辰鳴鳯霑文治飛熊兆渭濱光華長旦復保佑自天申萬夀詩五言排律六韻生員臣張光宙聖主當陽日蒼生相慶時絳雲環玉輦紫氣接瑶池大地歡聲動光天喜氣随九重開鳯閣萬國拜龍墀士際風雲㑹人霑化雨滋草茅何以報願獻萬年詩萬夀詩七言律一首生員臣程倬南極昭回䕶紫宫玉階仙莢鬱青葱九衢淑氣瞻雲日千載昌期祝華嵩多士賡歌承湛露普天耕鑿沐薫風從知聖夀齊髙厚八表同春化育中萬夀詩四言一章生員臣戴鶴齡惟天職覆惟地職載位為兩儀亘古永賴惟覆故生惟載故成帡幪埏埴鼔鑄羣生聖皇撫世富有日新法天之健則地之貞徳邁三皇功髙百后蕩蕩巍巍必得其夀博施濟衆摩義漸仁養之教之多士蔚興有賢必登有才必育廣闢四門八方悅服純嘏爾常茀禄咸康至誠不息悠久無疆以篤宸修以綿萬夀惟仁與㳟彌固其後受天之祜民安物阜萬夀詩四言一章生員臣狄淮皇帝受命格於皇天介以繁祉錫以大年惟天之道不已其恒聖人則之久道化成渙頒大號施於四方蒸我髦士為邦家光自今以始無徃不復至於十年鉅典頻續十百千萬日月逓遷濟濟多士拔茅茹連我聞在昔周王夀考成人有徳小子有造維皇首出純徳孔明旁求俊乂王國之楨川媚神珠山輝瑞玉泰運𢎞開誕膺永福北辰輝映南極光騰明良喜起同慶岡陵萬夀詩四言一章生員臣李埰皥皥仁風巍巍帝徳得一以貞奉三為式萬象昭回揚休布愷日月升恒卿雲靄靄㳟逢聖誕維春之盛泰階允平珠斗輝映光被四表有華其曜神芝奕奕旭日斯照久道化成人文炳郁景運𢎞開載賡棫樸野無留良譽髦萃止東壁延英莫㛟兹美聖人當御大雅扶輪承明載筆金馬垂紳多士蒸蒸式歌且舞頌聲洋洋乃溢寰宇小臣作頌大徳同天受天之命於萬斯年萬夀詩四言一章生員臣沈汝翼於赫皇王君師萬邦功参天地徳邁陶唐五十二載㳟已垂裳綏猷建極治化畢張湛恩雨露大澤汪洋時雍風動民物熙昌車書禮樂六服輝煌聖敬日躋上荅穹蒼一人有慶特典非常海隅日出咸樂觀光濟濟多士雲路騰驤和風斯扇淑氣載陽受天之祜長發其祥河清海宴永際明良慶徴國祚歡洽膠庠小臣申頌萬夀無疆萬夀詩四言一章生員臣鄒士隨穆穆我皇受命溥將車書玉帛禮樂冠裳嵗在癸巳天子萬夀日升月恒如山如阜乃命司徒論秀書升峩峩髦士三夀作朋惟徳攸好惟賢是寳化成人文載歌天保萬夀詩四言一章生員臣曹惟均皇躬誕降福履綿長徳邁五帝功髙百王光連斗極瑞應星芒蓬山煦燠瑶草芬芳菁莪雅化文運彌昌人才蔚起奎壁輝煌治􅂭化美恩溥徳洋聲教四訖中外頌揚羣稱萬夀永祝無疆萬夀詩五言排律六韻生員臣錢拱辰寳厯開昌運椒圖映曙光洪鈞一氣轉聖夀萬年長舜樂陳彤陛堯樽進未央莘莘魚在藻翽翽鳯鳴岡四海歡聲溢三呼喜氣揚敷天齊拜手閶闔正迎祥萬夀盛典初集卷一百十五
