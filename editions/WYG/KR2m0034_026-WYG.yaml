body:
  text: 欽定四庫全書萬壽盛典初集卷二十六恩賚三加恩臣僚康熈五十二年三月十八日以萬壽覃恩詔給内外大小各官新銜封贈文官在亰四品以上在外三品以上武官二品以上各送一子入監讀書其餘文武官各加一級現在論罪者除大計軍政外悉與豁免從前降級罰俸者開復之四月初七日吏部尚書臣富寜安等謹題為欽奉恩詔事康熈五十二年三月十八日恭遇恩詔内開一内外大小各官除各以現在品級已得封贈外凡陞級及改任者著照新銜封贈欽此查康熈四十二年恩詔内外滿漢大小各官未遇前詔未得封典者俱照現在品級給與封典外凡告病告假丁憂候補等官及在詔前陞轉詔後到任之漢官俱不准給與封典在案再查定例一品封贈三代二品三品封贈二代七品以上封贈一代八九品止封本身等語該臣等議得今康熈五十二年恭遇萬壽恩詔應得封典内外各官通行各部院衙門八旗盛京五部直𨽻各省督撫除現在品級已得封典者毋庸開送外其未遇前詔未得封典在京大小漢官由各部院衙門旗員由各該旗都統盛京各官由盛京五部在外大小漢官由各該廵撫開明履歴取具應封三代二代一代妻室存殁姓氏親供幷同鄉官印結咨送臣部彚題轉掲内閣撰寫誥勅給與可也本月初十日奉㫖依議四月初九日兵部尚書臣殷特布等謹題為欽奉恩詔事該臣等議得恭遇康熙五十二年三月十八日恩詔内外滿漢大小各官未遇前詔未經受封者照現在品級具題封贈外如遇前詔已經封過後改任者照改任封贈陞級者照陞級新銜封贈如加級者前詔已照其現在品級封過今雖加級不曾換職任頂帶不便重封其陞級改任官員前任已經受過封贈今封贈臣部槩停題請即據來文印結改給新銜掲送内閣撰寫誥勅至先屢次遇詔滿洲官貟不照到任日期封贈漢官雖在詔前陞轉詔後到任者不准封贈及候缺等官俱不准封贈先封大級後兼小任者亦不照兼小任封贈今封贈亦照此例行俟命下之日通行八旗直𨽻各省遇詔各官將履歴並應封贈三代二代一代妻室存歿姓名開註曽否封過字様若滿洲䝉古漢軍各該旗都統查明用印文送部直𨽻各省官員行文督撫提鎮將應封所屬各官職名查明取具同鄉官印結造册送部臣部查明將未經受封者照例題封可也本月十一日奉㫖依議四月十三日吏部尚書臣富寧安等謹題為欽奉恩詔事康熙五十二年三月十八日恩詔内開一在京滿漢文官四品以上在外三品以上各送一子入監讀書欽此欽遵查滿漢品級考内開正二品内閣大學士各部尚書都察院左右都御史從二品布政使司布政使正三品各部侍郎内閣學士翰林院學士都察院左右副都御史宗人府府丞通政使司通政使大理寺卿詹事府詹事太常寺卿順天府府尹奉天府府尹按察使司按察使從三品光禄寺卿太僕寺卿布政使司㕘政鹽運使司運使正四品都察院左右僉都御史通政使司左右通政大理寺少卿詹事府少詹事太常寺少卿提督四譯館少卿鴻臚寺卿太僕寺少卿順天府府丞奉天府府丞從四品國子監祭酒等語再查正二品右都御史正三品右副都御史正四品右僉都御史係督撫加銜等語再查康熈六年恩詔䕃監滿漢文武官員副都統纛章京阿思哈尼哈番侍郎内閣加侍郎學士以上照實俸各䕃一子入監讀書其餘各送一子入監讀書等因在案今康熈五十二年三月十八日欽奉萬壽恩詔文官四品以上各送一子入監讀書應照現定品級考正二品大學士各部尚書都御史從二品布政使正三品侍郎等官從三品光禄寺正卿等官正四品僉都御史等官從四品祭酒等官各送一子入監讀書其送一子入監讀書之處係旗貟之子應取各該都統印文起送部院各官之子應取各衙門印文起送在外各官之子應取督撫各該衙門印文起送候命下之日通行各部院八旗直𨽻各省可也本月十五日奉㫖依議本日兵部尚書臣殷特布等謹題為欽奉恩詔事該臣等議得康熈五十二年三月十八日欽奉恩詔内文官在京四品以上在外三品以上武官在京在外二品以上各送一子入監讀書欽此欽遵將内外滿漢武官二品以上各送一子入監讀書之處照康熙六年恩詔管侍衛内大臣内大臣都統民公侯伯精奇尼哈番以下前鋒統領䕶軍統領副都統歩軍統領阿思哈尼哈番食二品俸官員及鑾儀衛食二品俸鑾儀使㪚秩大臣以上在外將軍副都統提督總兵及帶一品銜管副將事等官各准䕃一子入監讀書都督僉事管副將事及副將管副將事者各送一子入監讀書可也本月十六日奉㫖依議小銜副將亦准送一子入監讀書四月二十一日丁酉詔開復文臣因公罣誤革職留任者四月十八日吏部等衙門題為請旨事先經吏部題前事内開康熙五十二年三月十八日恩詔内開一内外文武官貟除大計軍政處分外現在議革議降議罰戴罪住俸等項各該衙門悉與奏明寛宥一内外降級罰俸等官俱著開復調用者仍照原議調用欽此欽遵除降級罰俸等官俱各開復調用者仍照原議調用外現在議革議降議罰戴罪住俸等項臣部逐一詳查奏明寛宥再有停陞住俸降職降俸等官其降級罰俸等官今既開復將伊等亦均應開復再查亦有因公罣誤革職留任者現在議革等官今既寛宥除大計并列款糾㕘革職留任者毋庸議外其因公罣誤革職留任之員應否開復伏祈上裁等因於康熙五十二年四月初六日題本月初八日奉㫖這本留著其因公罣誤革職官員交與該部逐一查明繕摺同本一幷進呈欽此吏部查明繕冩摺子具奏大學士温達等奏請折本奉㫖爾等㑹同九卿議奏欽此該臣等會議得康熙五十二年三月十八日恩詔内開一内外文武官員除大計軍政處分外現在議革議降議罰戴罪住俸等項各該衙門悉與奏明寛宥一内外降級罰俸等官俱著開復調用者仍照原議調用欽此欽遵恭惟皇上六旬萬壽大沛恩膏凡屬臣民莫不均霑聖澤誠亘古之曠典昇平之盛事似此因公罣誤革職留任諸員亦應推廣皇仁恩賜寛宥仰祈皇上睿照施行計開應開復人員内務府総管赫奕江寧廵撫張伯行四川廵撫年羮堯御史温泰内務府員外郎巴希納監督姚徳堅浙江丁憂糧道陳一夔原任福建漳州府知府趙完璧長蘆運同李滋奇富國塲大使苗光玉湖廣長沙府同知劉兆麟江南睢寧縣知縣王廷梅浙江餘姚縣知縣劉俊陜西富平縣知縣楊勤直𨽻阜城縣知縣李華國直𨽻任丘縣知縣蔡方升山東諸城縣知縣徐繼昌山西山隂縣知縣葛斗南河南舞陽縣知縣于建邦湖廣襄陽縣知縣程其成福建安溪縣知縣曾之傳福建漳浦縣知縣汪紳文福建同安縣知縣朱奇珍湖廣永州府通判葉運泰等十員直𨽻文安縣知縣程繩武江南武進縣知縣殷元福等二員江南旌德縣知縣勞啟鑑湖廣桂陽縣知縣劉光秀廣東南海縣知縣王鎮等三貟湖廣鄖陽府教授周崑直𨽻玉田縣典史李文標浙江寧海縣丁憂典史沈國忠浙江諸暨縣典史宋國弼陜西郃陽縣典史沈英祚浙江台州府司獄王廷藩直𨽻蔚縣廣昌城廵檢王加慶直𨽻静海縣主簿劉起騰等三十九員陜西同州吏目茅本彪等二十三員江南泰州吏目陳士傑等十三員直𨽻通州史目李鼎銓等四十七員湖廣瀏陽縣縣丞鄭開泰等七員内務府進士碩柱祁勒倫翰林院檢討楊萬程養心殿監造趙昌雲麾使兼佐領固山大伊都善以上人員應否開復臣等未敢擅便謹題請㫖本月二十一日奉㫖依議二十四日庚子特予大學士温達松柱李光地蕭永藻王掞一品䕃四月二十四日吏部尚書臣富寧安等謹奏為奏聞事查先經臣部於欽奉恩詔事案内照依現定品級考正二品大學士尚書都御史從二品布政使正三品侍郎等官從三品光禄寺卿等官正四品僉都御史等官從四品國子監祭酒等官各准一子入監讀書等因具題奉㫖依議欽遵在案今内閣交出大學士温達松柱李光地蕭永藻王掞啟奏摺本畢口奏皇上洪恩小銜副将等俱格外賜以監生臣等䝉皇恩忝居大學士頭等職任今部内将臣等照二品例給以䕃生臣等公同仰懇皇上賜臣等一品䕃生等因啟奏奉㫖爾等所奏是下㫖於部欽此欽遵将大學士温達松柱李光地蕭永藻王掞准給一品䕃生之處理合奏聞等因奉㫖著給與一品官䕃生五月初十日丙戌詔開復因公罣誤革職留任武臣佛保等四員住俸武臣吳保住等二十二員五月初四日兵部尚書臣殷特布等謹題為請㫖事康熈五十二年三月十八日恩詔内開一内外文武官員除大計軍政處分外現在議革議降議罰戴罪住俸等項該衙門悉與奏明寛宥一内外降級罰俸等官俱著開復調用者仍照原議調用欽此欽遵查近經九卿㑹議除降級罰俸等官俱各開復調用者仍照原議調用外現在議革議降議罰戴罪住俸等項臣部逐一詳查奏明寛宥再有停陞住俸降職降俸等官其降級罰俸既經開復将伊等亦應開復将因公罣誤革職留任官員准其開復具題奉㫖依議欽遵在案今文職既經開復查革職留任海子内看館六品官佛保英額口子章京傅色納膳房頭目釋迦保歸化城都統丹進㕘領甘國培太原防禦巴拜浙江紹興協副将陳陞等四員台州副將中營把總吳永仁等十一員浙江嘉興遊擊摽下左營把総徐文龍等四十二貟陜西清水堡把總任道禮等十員江南廟灣營千総楊致中等二十一員陜西富平營把総康兆吉等二員山東即墨營把総鄭凱等二員此等俱照文官開復再特㫖住俸武官三十六員鑲黄旗滿洲陵上噶喇大兼二等阿達哈哈番又一拖沙喇哈番吳保住陵上噶喇大多爾泰拖沙喇哈番和合禮拖沙喇哈番勒徳頭等阿達哈哈番楊保住頭等阿達哈哈番四哥正黄旗滿洲陵上噶喇大安住漢軍阿達哈哈番臧從廣拜他喇布勒哈番兼拖沙喇哈番王來儀拖沙喇哈番馬正名正白旗滿洲陵寝原任総管調補福陵掌闗防章京卜鼐一等侯兼拖沙喇哈番陳泰㪚秩大臣一等精奇泥哈番兼佐領拉馨䝉古拖沙喇哈番胡希布漢軍阿達哈哈番馬國禎正紅旗䝉古拜他喇布勒哈番兼佐領巴爾朱兒鑲白旗滿洲陵上総管恩丕䝉古阿玉璽佐領下管義馬圖等處六品官佟孝賽吳玉圗佐領下管西拉塔拉等處六品官諾米拖沙喇哈番衮渣布拖沙喇哈番喀爾喀漢軍拜他喇布勒哈番兼拖沙喇哈番丁國寳鑲紅旗滿洲三等阿達哈哈番覺羅英徳正藍旗滿洲佐領黑達色二等阿達哈哈番佐領賈爾太拜他喇布勒哈番潘三柱漢軍四品額駙伊禮布三等阿達哈哈番馬朝貞鑲藍旗滿洲拜他喇布勒哈番兼拖沙喇哈番佐領傅太佐領額爾徳拖沙喇哈番龍爱拖沙喇哈番布蘭太䝉古佐領碩色漢軍三等阿達哈哈番張起惠山東壽樂營千総孫天祜伊等應否給俸之處伏候上裁臣等未敢擅便謹題請㫖本月初十日奉㫖這因公罣誤革職留任官貟内佛保釋迦保甘國培巴拜俱准開復其住俸官貟内吳保住多爾泰和合禮勒徳安住甫哈禪臧從廣王來儀馬正名胡希布馬國貞佟孝諾米衮渣布喀爾喀丁國寳英徳潘三柱馬朝貞龍愛布蘭太張起惠俱著照舊給俸六月二十九日己亥詔中外未入流官及無品筆帖式烏林人一體加級六月二十四日吏部尚書臣富寧安等謹題為請㫖事查康熈五十二年三月十八日恩詔内開在京滿漢文官五品以下在外文官四品以下各加一級欽此欽遵隨行文各部院衙門直𨽻各省巡撫應加級各官查造職名咨送以憑註册去後今准部院衙門将五品以下官員及無品筆帖式烏林職名開列咨送前來又偏沅廵撫潘宗洛山西廵撫蘇克濟湖廣廵撫劉殿衡等咨稱未入流并革職留任降級留任等官應否加級之處咨請等因前來查康熈十四年恩詔内開在京官員俱著加一級将五城未入流吏目曽經加級在案今年皇上萬壽恩詔凡在臣工兵民莫不共沐皇恩應将各省未入流照康熙十四年五城吏目加級之例各加一級既将伊等加級其部院衙門無品筆帖式烏林人亦加一級不准食俸陞轉時仍照無品筆帖式烏林人之職陞補再革職留任等官俱已恩賜開復相應停其加級本月二十九日奉旨依議臣等伏讀恩詔及前後詔㫖所以推恩臣工者何其有加而無已耶虞書頌帝徳曰臨下以簡御衆以寛又曰罰弗及嗣賞延于世罪疑惟輕功疑惟重蓋古所以待其下者法如是其簡恩如是其寛也自時厥後誼辟代興旁流恩澤推原古義慶洽羣工亦往往而有焉遐稽封爵之制肇自唐虞六等之分詳於三代姓殊同異事因功徳其典至隆漢承秦法有二十等之别以褒勳舊爵止及身未嘗推恩先世唐定九等正従神龍中始詔内外執事官三品以上及四品清官中書門下五品官父未得官量加追贈天寳後始有封贈祖父者而李叔良以曽祖受封乃間及三世然觀宋趙槩以郊祀當進階乞以封母宰相謂槩方為學士擬封不久槩堅以母老乞許之後遂為例是宋時學士以下猶不得封其父母顯親揚名葢若是之難也加級始於西漢大夫以上賜爵一級公乘以上得移於子因有任子之恩吏二千石以上視事滿三載得任同產若子一人為郎當時名臣若汲黯杜延年蘇武劉向等皆以任子顯至唐其法益備漢唐史列傳以門䕃入仕者皆備書之至於飭官方澄吏治三考之法黜陟幽明慶典間行輙從寛大易所謂雷雨交作赦過宥罪帝王之政盛徳之所同也然而綜核之世每嘆屯膏驩虞之朝濫賜恩賞過與不及異世同流若夫清應長瀾光流華渚以一人之慶普百爾之恩史册所傳未有如今日之盛者也唐開元十八年八月以千秋節百官獻賀賜四品以上金鏡珠囊縑綵五品以下束帛乾元元年九月以降誕日宴百官賜絹三千匹號為隆盛自後歴朝聖節不過宴百僚於曲江或命中人以酒脯及仙韶樂宣錫而已若我皇上運協千年光被四表絲綸涣汗巾外䝉庥葢舉聖帝明王所以加恵臣工者無所不備遂使析圭擔爵之士並受其福上推恩於祖考下庇賴其子孫或身攖吏議名詿考功咸與滌除宥過無大以視虞書所稱若合符節先聖後聖其揆一也豈不然乎昔西漢末年除任子令宋慶厯中裁損聖節恩䕃臣等躬逢極盛載筆之餘俯仰古今乃知湛恩汪濊千載一時凡屬臣工將何以頌揚聖徳仰答髙深也哉間錄大臣謝恩疏如左總督廣東廣西等處地方軍務兼理糧餉兵部右侍郎兼都察院右副都御史帶軍功五次加一級臣趙宏燦謹奏為聖恩普及萬方㣲臣戴徳尤渥謹疏恭謝永祝萬壽無疆事本年閏五月初九日恭接恩詔開載一款一内外大小各官除各以現在品級已得封贈外凡陞級及改任者著照新銜封贈又一款一在京滿漢文官四品以上在外三品以上武官在京在外二品以上各送一子入監讀書又一款一内外文武官員除大計軍政處分外現在議革議罰戴罪住俸等項各該衙門悉與奏明寛宥又一款一内外降級罰俸等官俱著開復等因欽此欽遵伏查臣於康熙四十八年因南澳鎮右營守備潘成龍失事案内部議銷去加二級仍戴罪圗功又康熙五十一年因原任曲江縣知縣楊冲斗之子楊津叩閽案内奉旨降三級免調用各在案竊臣一介庸愚荷䝉皇上殊恩異數感切寸心毫無報稱且縁才識短淺遂致愆尤䝉我皇上不即譴斥垂天地之恩俯賜包容乃今恭遇萬壽六旬覃恩大沛誠千載之所希逢亘古之所未有而臣戴罪圗功及降級之案得以邀恩開復且膺封贈之榮更加䕃子之典臣跪聼之下感激無地不獨臣一身生逢盛世獲邀曠典永矢捐糜不足以報主恩於萬一即世世子孫當焚香頂祝聖壽於億萬斯年矣臣謹具疏恭謝天恩伏乞睿鑒施行謹具奏聞総理糧儲提督軍務廵撫江寧等處地方都察院右僉都御史臣張伯行謹奏為恭謝天恩事康熈五十二年五月初十日准吏部咨為請㫖事考功清吏司案呈奉本部送吏科抄出該本部等衙門㑹題前事康熙五十二年四月二十一日奉旨依議欽此抄出到部相應移咨前去欽遵施行計粘抄一紙㑹議得查康熈五十二年三月十八日恩詔内開一内外文武官員除大計軍政處分外現在議革議降議罰戴罪住俸等項各該衙門悉與奏明寛宥一内外降級罰俸等官俱著開復調用者仍照原議調用欽此欽遵恭惟皇上六旬萬壽大沛恩膏凡屬臣民莫不均霑聖澤誠亘古之曠典昇平之盛事似此因公罣誤革職留任之員亦應推廣皇仁恩賜寛宥仰祈皇上睿覽施行江寧廵撫張伯行因與原任総督噶禮互㕘一案奉㫖革職留任應将伊開復等因到臣准此臣隨恭設香案望闕叩頭謝恩訖伏念臣一介庸愚屢䝉聖恩格外超擢畀以廵撫重任朝夕氷兢愧無寸長足録前因㑹審科塲作弊一案䝉我皇上乾綱獨斷著令革職留任誠千載未有之隆恩臣撫躬自省報効無由兹值皇上六旬大慶臣奉差在外不獲與在廷諸臣躬親拜舞叩祝萬壽無疆正深惶悚乃以恩詔涣頒将臣革職之案開復臣聞命自天感激無地惟有夙夜黽勉益竭駑鈍以仰荅我皇上髙厚𢎞恩於萬一爾臣謹具疏恭謝伏乞皇上睿鑒施行為此謹具奏聞廵撫四川等處地方提督軍務都察院右副都御史加三級臣年羮堯謹奏為恭謝天恩事康熈五十二年五月二十八日准吏部咨為請㫖事考功清吏司案呈奉本部送吏科抄出該本部等衙門㑹題前事康熙五十二年四月二十一日奉㫖依議欽此抄出到部相應移咨前去欽遵施行計粘抄一紙内開㑹議得查康熙五十二年三月十八日恩詔内開一内外文武官員除大計軍政處分外現在議革議降議罰戴罪住俸等項各該衙門悉與奏明寛宥一内外降級罰俸等官俱著開復調用者仍照原議調用欽此欽遵恭惟皇上六旬萬壽大沛恩膏凡屬臣民莫不均霑聖澤誠亘古之曠典昇平之盛事似此因公罣誤革職留任之員亦應推廣皇仁恩賜寛宥仰祈皇上睿鑒施行四川廵撫年羮堯因不同提督岳昇龍前徃招撫番蠻一案奉㫖革職従寛留任戴罪効力應將伊開復等因奉旨移咨到臣隨恭設香案望闕叩頭謝恩並行知所屬一體欽遵外竊臣猥以菲材屢䝉超擢封疆重任自愧難堪惟念聖恩髙厚實思稍竭涓埃仰圗報効無如才識短淺奉職無能前因寧番招撫一案部議革職原屬從寛乃䝉聖主格外施仁宥罪棄過将臣革職留任令臣戴罪効力此誠亘古難遇之遭逢亦此生難報之曠典也夫以臣之駑鈍即竭力殫心亦難自免愆尤若必待臣功可補過循例開復将終無還職之期矣今幸恭遇萬壽昌期普天同慶三代之盛莫與為儔大頒恩賚嘉與維新臣亦得仰邀異數復還原職竊思皇仁普被自大小臣工以及邊方士庶莫不身霑膏澤鼓舞歡騰而恩綸所及實於臣有獨深銜感難名亦惟臣有獨切臣自問何人既䝉宥過之洪慈復荷原銜之寵錫受恩愈重圗報愈難惟有益矢清白整躬率屬仰報萬一並與白叟黄童䖍祝聖天子億萬斯年而已臣謹繕疏恭謝伏祈皇上睿鑒施行為此謹具奏聞萬夀盛典初集卷二十六
