body:
  text: 欽定四庫全書萬壽盛典初集卷六十三歌頌三大臣二恭祝萬壽詩百韻每韻以萬字祝有序原任禮部尚書加一級今致仕臣許汝霖竊聞三統稱皇五德號帝迓天庥者百千嵗垂聖治者萬億年要皆以健行不息之純衷為永命無疆之景福是以宏猷光被錫遐厯於蒼穹久道化成凝貞符於紫禁禎傳史冊瑞炳丹青然徒披往牒而興懐孰若際昌期而拜舞欽惟皇上德贊生成勲兼創守䖍將郊廟敬誠通祀饗之先尊養慈寧視聽凛形聲之外宵衣旰食軫物力而厪民依右史左圖飭官方而敦士習揆文則揮毫萬象開兩間未洩之藏奮武則仗鉞三驅拓亘古不臣之域奉玉帛者不啻千八百國垂衣裳者已歴五十二年然猶咨儆維殷恩施倍篤闢巍科以宅俊崇正學以尊儒蠲賦徧於九垓祥刑周於八表而且發一令興一事無非以恭儉為先置一吏設一官未嘗不法㢘交儆於是大化翔洽厯數彌貞同日月以升恒並乾坤而覆載兹值三陽旣泰正逢六甲初周靄旭曈曨萃蓬瀛之淑氣卿雲糺縵籠閶闔之祥輝風暖柳縈露濃花妥奏咸英於鳳凰樓下喜徹重霄施綊纊於靺鞈隊中懽騰絶塞加以謙能集益誠愈徵悠殷宗之歴祚攸長總期無逸周后之錫齡甚富要在靡遑誕播德音務崇實意朝乾夕惕何誇華祝衢歌吏肅民安不羨鳳儀獸舞頌溫綸之藹藹湯盤禹鼎難幾仰峻德之巍巍舜日堯天永戴臣汝霖一介䝉恩七旬致政感銜舊秣雖伏櫪而嘶風依戀榮光每傾心而向日幸遇天開壽域鼎命長凝欣瞻人樂春臺泰階共賀敢效躋堂之祝聊呈擊壤之謡韻叶百言如同川至句吟萬字竊比山呼謹拜手稽首而獻詩曰皇建有極錫萬方得一以貞萬禩昌萬年景運正當陽春融萬象啟混茫萬星北拱帝座旁南極輝聮萬曜芒萬祚化日舒以長普天齊稱萬嵗觴觴稱萬嵗歴顯藏萬彚重舒天地房資始萬物乾道剛資生萬物坤道常一人首出振萬綱參天兩地萬紀相化成萬姓仰垂裳遐稽萬代誰頡頏震雷鼓萬解澤滂巽風吹萬渙號煌貞憲考度萬績康漸仁摩義萬俗匡賢良萬選士氣昂黜陟萬當官方彰文超萬古聖謨洋詩含萬籟帝歌颺挿架萬籖輝縹緗揮毫萬紙珍琮璜萬㝢同文邁虞唐萬區振武駕禹湯三逆肆靖讋萬荒縱横萬陣掃欃槍親驅瀚海萬慮詳萬部稽顙皆來王從兹萬衆悉安攘乃偃萬騎櫜斧斨東西南朔萬乗翔共球贄帛萬國將河清萬象息築防海晏萬艘貢篚筐萬里威靈風泱泱萬頃恩波露瀼瀼萬類咸若慶雨𤾉萬寳告成屢豐穰秔稌黍稷萬斯箱萬億及秭溢千倉女紅萬杼織七襄瀕海萬竈煮瀛滄貿遷化居賈萬檣考工萬匠貯棟梁萬畝頻減賦與糧逋負踰萬蠲勿償肆赦萬民措桁楊恩施萬疊澤濊汪飬老表貞旌萬鄉崇儒重道飭萬庠萬世師表摛天章髙碣萬仞示周行大賢嗣續萬宮牆大儒躋祀萬烝嘗特闢賔興萬夫望併拔干城萬旅揚萬戸絃歌雜耕桑萬官黼黻贊巖廊萬禮旣洽欽顒卭萬舞樂奏諧宫商鐘鳴萬石擊鼓鏜萬聲作止何鏗鏘咸秩萬祀無遺忘綏以萬福答臐膷嵩呼萬丈徹天閶日升月恒納萬祥祥納萬籌閱星霜萬卉當春吐芬芳先甲逢癸萬揆臧將午建巳萬紀張厯宗辰月萬人慶律中姑洗萬花香萬周花甲從兹倡化萬育萬萬未央萬枝瑶草賁蒼筤萬斛丹砂映碧菖萬絲煙柳裊康莊萬囀宫鶯和笙簧鳳麟萬族効趨蹌梯航萬里奉珪璋萬域羣竪天壽坊萬呼萬祝萬難量萬仙拜舞獻瓊漿萬龍奮翼萬馬驤魚藻萬詠徧清浪柏梁萬和叢琳琅誥誡萬言示弗遑實意敦行萬事强萬幾時勤宵旰忙仁育萬民荅穹蒼晨昬萬安慈寧傍本枝萬葉慶一堂萬邦賡拜頌明良萬載昇平仰榮光萬八千歲邁九皇壽維萬壽壽無疆萬壽詩七言律四首都察院左都御史臣趙申喬欣逢龍德正當陽甲子新周慶未央八表和風調玉燭九霄瑞露燦瑶光南諧北燮梯航集海晏河清日月長萬嵗嵩聲騰率土紅雲髙捧御爐香其一光華復旦泰階隆久握貞符運化工海宇昇平惟帝力宸衷宵旰即田功茅簷到處春風暖蕋榜重開雲路通正是艶陽登壽域普天人在慶霄中其二厯服無疆跨禹甸乾行不息並堯年武功赫濯除三蘖正學淵源滙百川六氣均調玉琯定萬幾清暇墨華妍聖明天縱超皇古心契庖羲一畫前其三圖陳王㑹已開先彩鳳銜書徧九埏曉日早迎仙仗上晴霞遥映御衣鮮扶笻野老瞻丹陛擊壤衢氓捧玳筵封祝幸陪鵷鷺列敢随率舞聽鈞天其四萬壽詩七言排律六十韻有序經筵講官吏部左侍郎管右侍郎事兼翰林院學士臣王頊齡臣聞頌禱之作起於華封人之祝堯其後尚書曰欲至萬年而形為詠歌被諸金石則自三百篇始天保六章世所稱九如之頌也他若江漢之詩虎拜稽首以對揚王休一則曰天子萬年再則曰天子萬壽而假樂卷阿諸什保佑天申彌性純嘏惓惓忠愛之情溢於聲韻讀者於是知享國之長久而君臣相與泰交之美亦因之具見焉我皇上御極以來勵精圖治武功文德義問仁風以内聖而該外王以守成而兼創業治登上理運底太平嵗稔時和民安物阜唐虞三代之盛未足比倫真所謂千載一時不易逢之良㑹也五十二年之春恭遇六旬大慶乾行不息陽德方亨聖壽無疆天休滋至朝之百工野之兆姓以曁塞外遐裔海表介鱗罔不拜舞闕庭祝聖人之多壽臣頊齡久塵禁近謬厠卿班仍世蒙恩一門荷寵歡呼爵躍倍萬恒情竊不自揆逺采雅歌遺意參用唐人近體謹製七言排律六十韻恭呈睿覽以附於塗巷之謳吟蓋天宏庥無前偉績非臣愚陋所能頌揚力不宣心曷任惶愧詩曰萬年天子享豐亨誕聖昌期屬慶成華渚流虹長彩色康衢擊壤徧歡聲龍飛寳祚初周甲鳳厯新編值後庚後庚三日曰癸本易疏嵗在昭陽蘇品彚律諧姑洗中韶韺升恒日月歌難老開闢乾坤遡篤生曠古神靈真獨絶格天勲業底無名承先繼志光謨烈事帝齋心凛旦明色養宫闈同孺慕類推臣子被光榮智周萬物先柔逺慈覆羣黎亟撫􅑏圖繪􅃎風教夜織園題豐澤省春耕每於成賦寛三壤直使流膏浹八紘恩詔蠲租兼沃土義倉儲穀滿髙甍閭閻不識官徭擾雞犬全無簿吏驚懐保豈徒綏集雁乂安早已翦長鯨西南絶徼銷氛祲朔漠殊庭洗甲兵渤海提封收版籍流沙小醜就縻纓布昭聖武推神算允塞皇猷播濯征北伐總因柔逺出南廵只為閱河行湖通洪澤䨇流合堰築髙家萬丈横雪浪捲淤趨巨壑雲帆銜尾轉香稉海疆悉比中邦奠天庾常侔内帑盈並鬯百嘉滋雨露咸熙庶績飭公卿萬幾多暇披千卷乙覽忘勞達五更經旨折衷歸畫一聖言探賾闡崇閎天人統㑹根源徹厯律微參奧妙呈片語盡堪垂舜典載歌寧許嗣陶賡日華雲爛光輝逺地緯天經氣局宏捧讀宸章緘寳玉頒行御集刻瑶瓊墨林游藝三才彚綈几揮毫萬象縈抉石奮雷軒筆勢跳龍卧虎冠書評鋒藏鐡畫如山鎮跡煥銀鉤似璧瑩秘省縹緗駢冊府禁闈風日敞蓬瀛網羅百氏分曹纂鱗次羣編協力并親授規模䖍仰奉手加刋定息紛爭前賢肯綮無藏藴後學津梁有法程文治光昭天列象士風振起帝持衡典隆籲俊朝連茹禮重求賢野食苹嵗舉兩闈彰異數科開萬壽集羣英羽儀可用㸔鴻漸好爵同縻聽鶴鳴學統具俾尊孔壁道心長自見堯羮要歸正派宗閩雒升配真儒肅廟黌天德渾全私盡滌皇衷寧謐物難攖風移俗易緣更化業廣功崇益勵精磨鈍國維頻振挈析幾心鏡極澄泓四時玉燭俱含耀六合金甌永不傾勝日卷阿閒泮奐隩區靈沼稍經營龍荒萬里恢邉境鵠塞千盤護帝京鳥囀笙歌花匼匝山環屏障水洄瀠馬官草地司屯牧蕃部秋原備使令射獵馳驅揚武節山莊吟詠適皇情乾剛豫動身逾健頤飬随時體自貞勤儉為貽千葉訓寛仁專字八方甿祈天永命符元化保泰持盈出至誠薄海九州遥奉朔越裳重譯共朝正六旬聖節髙龍壽三月韶光溢鳳城南極北辰齊景曜東鶼西鰈應休禎流謙屢却尊稱上惜福惟將善氣迎八表祝筵歌頌滿九霄仙樂管絃清翾蠕也獲嬉麟囿芹曝無嫌捧兕觥萬嵗嵩呼同振響天長地久世昇平萬壽盛典初集卷六十三
