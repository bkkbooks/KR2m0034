body:
  text: 欽定四庫全書萬壽盛典初集卷八十七歌頌二十七詞臣十九萬壽詩四言六章翰林院檢討臣謝履厚瞻嵩之岡撫控八荒碧梧千尺鳳凰来翔鬱鬱葱葱氣象矞皇天子萬年治邁陶唐其一瞻嵩之阜萬山俯首黄河為帶包羅九有太和洋溢嵗豐人壽天子萬年百禄孔厚其二瞻嵩之東海日曈曈光騰瑞采景運天中露湛松栢澤及昆蟲天子萬年純嘏彌崇其三瞻嵩之西天髙月低華嶽䧺峙永䕶金堤貢獒接踵化洽雕題天子萬年聖域攸躋其四瞻嵩之南地負海涵網收麟鳳材植楩楠文德武烈咸五登三天子萬年高厚與參其五瞻嵩之北衆星拱極惟天為大惟堯是則帝治無為垂裳恭黙天子萬年同登壽國其六萬壽詩五言排律二十四韻翰林院檢討臣劉大轂金甌開景運玉律轉青陽帶礪山河永升恒日月昌泰階欣有象聖厯浩無疆瑞莢符元化卿雲絢彩祥時乗隆茂育恭已坐垂裳文物輿圖盛休徵象緯揚朝廷興禮樂海宇静欃槍制作超三古車書統萬方班行列鴛鷺藝苑鼓笙簧鏡獻趨螭陛嵩呼徧玉堂皇皇鳴劍珮燦燦賁琳瑯德教要荒逺恩波瀚海洋梯航同受朔島澨共尊王衢祝歌聲徧薰絃雅樂張彤墀懸寶鑑金掌浥仙漿鐘鼓宣鈞奏簪纓介壽觴鳳輝儀闕下獸舞集階旁霞映蓬莱殿煙浮翡翠牀仁風臻解阜淳俗邁軒唐芝蓋凌晨秀葵心向日芳陽和隨地滿福禄共天長帝澤霑無外愚忱展未遑百寮欣壽域千載荷恩光好上岡陵頌堯階喜拜颺萬壽詩五言排律四十韻有序翰林院檢討臣李日更竊聞聖人御宇際五百載之昌期王者膺圖綿億萬年之寶厯稱福稱壽致祝華封曰升曰恒爰歌天保運合乾坤交泰籌添日月胥長欽惟我皇上堯年悠久舜旦光華尚德好生率土皆登仁壽諴民阜物普天盡樂雍熈教宣出日之鄉威振無雷之俗六氣調而四時若知寰宇之咸寧九霄朗而八極明信鴻庥之萃集欣值豔陽令序恭逢聖壽昌辰瑞表流虹節屆長春之月祥開繞電躬符出震之期千年方朔之桃貢来瓊島七尺安期之棗進自蓬壺大君穆穆當陽百爾師師上祝山村野老悉㩦春酒以歡呼甕牖儒生胥獻嘏詞而樂頌是惟壽身為能壽世而宜人即以宜民臣幸際盛時實深忻忭遡西京之化彌思壽考作人讀東魯之書益驗仁者能壽敢罄丹衷於葵藿拜舞同心用賡楓陛以椿松趨蹌連袂願叶千春淑氣永昭萬壽禎符萬福攸同日一人有慶年三春方轉泰五位正承乾茀禄膺圖永純禧享祚綿俾昌還俾熾如日又如川淑景凝雙闕榮光徧八埏有功真赫矣何徳不昭然風俗皆康阜疆隅悉蕩平文明呈象緯神武靖戈鋋霧息蚩尤壘星輝太皥躔和恒能育物悠久直同天河順桃花浪山銷斥堠煙紺轅勤命駕黛耜數臨阡布穀鳴濃杏平畦灌碧泉播時躬率稼賑乏賦頻蠲農飭耕惟耦禾看嵗取千調元胥已應行徤更彌堅欽昊星辰測占儀左右旋性成神鑒逺天授智珠圓化洽垂衣治威揚秉鉞䖍矢陳来肅慎璧貢自于闐方物鴻臚掌車書王㑹傳由来尊有道洵是樂無邊晝永開三殿風薫扇五絃象功謨烈盛導豫樂音宣睿藻雲霞燦王言琬琰鐫十行瞻鐵畫五色耀銀箋富有堯章煥誕登文岸先遡源窮學海廣藝究書田大道承前聖隆儀奉昔賢講帷𢎞寶訓理窟得真詮秘笈西崑列鴻儒東觀延獻箴良史切奏事法臺専晨涖聴雞唱宵衣對燭燃蓂階新葉茂松植古藤纒自覩青虬起還徵紫鳳翩露甘珠灝灝醴湧玉涓涓必得兼名壽無疆異偓佺東華和氣靄南極瑞星騈幸際稱觴㑹歡趨祝嘏筵小臣何以頌願上萬年篇萬壽詩五言排律四十韻有序翰林院檢討臣何世璂臣聞聖王御極曾陳五福之疇哲后保和遂獻三多之祝後先揆一今古心同伏遇我皇上德懋建中化成久道仁者必壽如日升而月恒大哉無名直天髙而地厚兹逢甲子初周之嵗正值乾坤交泰之時際㑹休明幸覩唐虞之世揄揚盛美愧非班馬之才願效嵩呼敬賡里頌帝德超千古天心眷一人無疆開壽域有道布鴻鈞智勇兼文武欽明乃聖神體元先立極基命更脩身載籍東西列盤盂左右陳威儀真秩秩制作愈彬彬惕厲功加宻優游性益純永思勤繼述深愛篤彞倫致慤禋常肅承歡膳必親至誠通嶽瀆大孝格蒼旻恭已臨丹陛當陽御紫宸袞衣明藻火黼座渙絲綸濬哲推英斷謙沖好下詢百官嚴黜􅕾庶物廣陶甄治豈臯䕫贊才仍元愷掄設科遴杞梓特詔選騏驎將畧頗同牧儒宗洛與閩巖廊門大闢黌序氣常伸藹藹皆英彦芸芸悉子民賦輕知禹儉刑措見湯仁講學時臨泮披圖祗繪豳賜蠲恩最渥憲乞典尤頻敷政均荒服輸誠盡率濵戈揮三蘖靖干舞有苗馴風偃寰中草雨清徼外塵皇猷垂史冊睿算邁臣鄰化洽維端拱年豐更省廵采風占俗美問野恤農辛峰度蓮花掌河由瓠子津山川經歴歴原隰攬畇畇盛世祥符集興朝瑞應臻銜書来赤雀吐籙降蒼麟香穂如張錦甘泉若飲醇金莖仙露滿玉葉慶雲屯鳳厯頒三月龍飛屆六旬流虹傳令節就日樂芳辰海嶽争呈頌共球競獻珍樂聞韶濩美禮覩㑹同新簪筆臣何幸攄毫意未申惟將九如句稽首萬年春萬壽詩五言律十首翰林院檢討臣程翄海㝢豐亨日皇躬萬壽時矞雲彌玉宇仙露注金支福斂箕疇數祥賡天保詩小臣長獻頌拜舞望彤墀其一敦敏成天縱精微啓聖傳執中培道脈弼教御經筵帙擁芸香細函開墨寶鮮侍臣思珥筆秘府契真詮其二海結珊瑚網山開宛委藏作人增解額多士詠思皇慶際風雲㑹班聨鵷鷺行英才千百輩純嘏祝無疆其三尊養隆千古晨昏肅寢興聖情深作則和氣永相承瓊圃春暉暖瑤池麗景增臣民叨厚載日月共升恒其四軫念民依重深知穡事艱豳風不待進蠲詔已頻頒膏渙茅簷下春回黍谷間湛恩真似海天壽自如山其五瀆漲淮黄水平成底績難一從遵睿略萬派息驚瀾漕運東南逺烝徒袵席安魚龍霑廣澤堤埭穏如磐其六儒術傳斯道皇猷濯厥靈素王符制作徽國示儀型四氏宫墻富千秋爼豆馨聖賢先後轍垂訓永為經其七南靣垂衣治千官拜紫宸山河歸永定日月歴長春鑿齒同觀化雕題久􅈻民徧看天地外靈蠢共尊親其八聖徳周天壤車書萬國同梯航趨綺陌帶礪錫彤弓鼓腹昭文徳摩崖勒武功太平原有象寶厯自無窮其九欽恤垂為憲章程久可由宅心同易簡作法劑剛柔草向圜扉茂麟從春圃遊仁風翔率土保合萬千秋其十萬壽詩五言排律六首翰林院檢討臣張大受宇宙苞元運河山拱聖人雲章五色麗壽酒萬年春至性通濳躍羣生荷冶甄道嘗安簡素風已樂和醇善氣昌時集歡聲率土均瑤池重獻曲南極耀兹辰其一貢逺環滄海恩深格有苗禎符開莢葉盛德協簫韶物象因春發宸心與日昭詠歌多壽聖蹈舞太平朝露浥松常茂雲封嶽自喬曉趨天闕敞仙珮逈飄颻其二龍虎千年㑹衣冠六合同周詩壽考盛虞典闢門隆草色當階秀花香傍輦融普施因物性發育仰神功渥澤春城外薰風御苑中赤文成萬嵗報德效呼嵩其三畫鼓千夫集銀鐙百錦張野翁扶竹杖都士捧瑤觴盛業過前史祥圖應我皇豐年禾共穂壽日鶴雙翔戶戶熏罏靄人人聴漏長萬方同樂意久道仰垂裳其四麗日當天暖東風著物和雲山佳氣繞花鳥悦心多聖代升恒頌臣工伴奐歌殿頭朝舞鳳池上晚鳴鼉五采仙裾集千班御仗羅生民真錫福既醉舞婆娑其五奬善多膺紱酬勲屢賚金徳宣當宁切恩錫普天深永祐無疆命常持不已心道參元始位詩奏太和音澹泊曾聞古文明復覯今南山祈聖壽葵藿思何任其六萬壽詩五言排律四十韻翰林院檢討臣顧五達聖徳崇三古皇躬慶萬年鴻休臻壽域景運煥中天日月恩輝迥雲霄瑞彩懸履和心自適恒久化無偏喜起交逢泰剛中體合乾稱名真蕩蕩遵道已平平嘏錫三多備祥開百禄騈基凝符命永氣洽頌聲聨教育深仁浹生成大徳全憂勤宵旰切宻勿訓行宣宏業周無外豐功協自然保民殷法古體國汲求賢網解刑常恤哺含賦更蠲徵材追棫樸擷秀徧山川揚激羣寮肅儀型百度䖍崇文敷禮樂偃武息戈鋋寰宇清寧著閭閻作息便擊存堯代壤揮得舜時絃河海波流伏邊庭嚮慕専有苗干羽格窮髪版圖編膏雨零穹昊和風扇野田宸衷融造化庶彚入陶甄養性符恭黙凝神秉塞淵闡揚宗聖脈精一紹心傳軒燧原齊轍勲華正比肩麒麟遊苑内蓂莢産堦前有道禎符應無疆厚福綿流虹光始現曉日色初鮮雙闕黄雲擁三台紫氣纒海籌無算數花甲永廻旋逺服共球集陽春景物姸林葩芳灼灼池柳藹芊芊燕舞来金殿鶯歌入玳筵西山呈萬象南極下羣仙法曲調鳴玉瓊巵泛醴泉矞皇排彩仗縹緲散香煙海上桃方熟盤中露更圓呼嵩齊雀躍祝華競雷闐樂事臣鄰共嘉祥億兆連常歌九如頌應陋柏梁篇萬壽詩七言律四首翰林院檢討臣馬益太平天子久垂裳嫓美勲華邁夏商泰運韶光呈景慶昌期品彚見禎祥升恒日月天行健帶礪河山地脈長共向堯階申抃舞陳詞拜手祝無疆其一金鑑編成進御初玉墀聨􅇍珮聲徐賡歌已誌明良盛敷政猶勤宵旰餘屢荷施恩蠲賦入頻聞赦過慎爰書從来仁者原多壽天保詩篇頌九如其二化成久道慶長齡巷舞衢謠詠德馨雨露九天霑普恵車書一統志咸寧鳳麟呈瑞遊春囿稌黍占年得嵗星桃實不從瑤圃致萬年枝上自呈形其三花柳含暉分外姸欣欣士庶樂陶甄春秋選舉𢎞施網文武耆英總著鞭瑞麥嘉禾盈禹甸和風甘雨徧堯天小臣何以攄忱悃惟祝吾皇壽萬年其四萬壽詩五言律十首翰林院檢討臣陸紹𤦺雙闕蓬莱近千官羽衛森欣逢一人夀慶洽萬邦心南極明春殿東風滿上林太和蒸宇宙盈耳有韶音其一統緒詒謀逺禎符錫祉騈覲揚𢎞繼序端拱肅承乾明旦思無斁郊壇禮倍䖍神人通一氣景福自綿綿其二懿訓慈寧備塗山兆丕基孝隆天下養徳合萬方儀玉膳堯厨列金根文囿随承歡長燕喜愛日正遲遲其三聖學淵源邃純修日就將天人融妙理倫物煥𢎞章周孔思常契羲文道更光雍容歌至治喜起叶賡颺其四拓地龍沙外宣威黼座中止戈昭聖武不戰運神功干羽三苗格車書九譯通普天歸戸牖億載荷帡幪其五多士生王國彬彬集譽髦千秋歌棫樸四海仰甄陶漢詔求賢切虞門籲俊勞拔茅連彚吉泰運慶同遭其六疏濬勤皇覽廵行蒞翠華平成周薄海聲教被流沙瞻洛寧堪儷歌汾未足誇九重方畧在不籍漢臣槎其七斯民皆樂業聖主屢寛租詎假臣持節奚煩吏繪圗乾元均美利解雨更𢎞敷共荷天家澤農歌滿四衢其八好生由聖徳明允問秋官象緯光華燦恩波法網寛九天頒鳳詔三宥出雞竿肺石流慈處愚氓額手看其九巍巍應有象蕩蕩總難名不息行常健無疆道日亨貞元開甲子圖籙應長生祗願齊天壽康歌樂太平其十萬壽盛典初集卷八十七
