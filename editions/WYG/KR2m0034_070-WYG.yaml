body:
  text: 欽定四庫全書萬壽盛典初集卷七十二歌頌十二詞臣四萬壽頌有序翰林院侍讀臣魏方泰臣聞太極肇分上元初闢斗樞電繞華渚星流暨白氣與黄雲越瑶光而石紐載諸信史各有竒徴蓋寳籙之膺璇圖之握百神之主萬姓之歸大徳必昌禎符非偶欽惟皇上乗乾出震體化含元其冒如天其容如地明同兩曜信合四時義肅雷霆仁深膏雨禮節效髙卑之位樂和宣元始之音玉燭長調三靈薦祉金甌永固六合凝禧羣臣莫得罄其光百姓莫能名其大管窺蠡測天髙海深維三月之芳辰際六旬之大慶太清宫裏老君降集之期句曲山頭茅氏來游之日蓂堦舒暖杏苑敷榮熙熙萃率土之倫肅肅展朝天之禮鐘鳴九陌日邊氣盎螭頭珮集千行天上雲開雉尾仰光華之復旦睇景矞於重霄浩蕩春臺帲幪夏屋鶯歌燕語相和萬歲之聲鶴舞鸞翔盡佐一人之慶況屬能言之類誰無效詠之思曩者文思安安曾傳三祝令德憲憲載誦九如匪藉摛詞何伸積忭謹拜手稽首而獻頌曰良月佳辰天靄雲新昌期叶瑞誕生聖人登三咸五自有其眞敦敏狥齊如璋如圭質由天縱敬以日躋維耳則順維齒則齯地寧天清探策得貞兩岐四穗連理九莖乾符坤珍輻輳衆禎稚齒龎睂以恬以熙絪縕四野太和所彌民咸引考帝治無爲日浴龍光鑿齒之鄉無思不服山梯海航天子萬壽來享來王劍珮雲屯鑪香曉溫曈曈旭景萬户千門歡聲四徹共祝至尊絳甲四百四十有五昔以日計今當年數地乆天長永作民主萬壽無疆詞次唐臣楊巨源韻十首附聖主時幾勅朝端庶事康條風敷愷澤旭日煥文章駿烈超三古鴻庥被萬方桃應千歲結枝是萬年長輦路添新翠天街生遠香紅雲依玉案朶朶捧君王其一舊誦南山句今瞻北闕前氣和蒸欲雨雲淡郁如煙瑞彩凝三秀薫風肇五絃江山開壽域甲子紀周天貞下元重起冬餘春復旋循環應不竭長衍大椿年其二燕喜逢靑陸龍光耀紫虛氤氳平樂觀肅穆上淸居萬歲樞長運三春度又初海仙籌滿屋天子德爲車苑樹浮煙外宫花浥露餘人情兼物象匝地是華胥其三九地風霆迅神機秘紫宸盡湔殘沴氣普沃太平春蒐獮藏深畧干戈本至仁有心皆舉踵如臂總隨身版𨽻周鼇極朝班舞鴈臣玉堦金戺下王㑹鎭常新其四永定安疏瀹黃淮紀會同濤收千頃雪棹穩萬㠶風鴈鶩依前浦魚龍戢遠空每經親指授無不奏膚功河伯從人意塗山遜聖聰試㸔江漢外何水不朝宗其五省土勞宸矚常乗布德時晴煙方淡蕩曉日正舒遲徧慰三農望如陳七月詩花封迎紫氣柳路轉靑旗天語溫偏近龍顔喜更慈野人爭效祝咸得到堯墀其六文思先天宻餘情寄墨林衆皆驚璀璨誰可測高深翥鳯跳龍筆敲金戞玊音秘開千載鐍塵洗萬年襟雲漢迴仙掌奎章在帝心聖齡天共永稽古惜分隂其七九重延寶祚百物飲天和地産嘉禾徧庖生扇脯多雲璈鏘廣陛仙管叶鳴珂親聽鈞天奏遥連擊壤歌政成春令得律應惠風過湛露隨靈雨恩流浹海波其八極目韶華富蔥蘢滿帝京山如仁者壽日爲聖人明蕩蕩天同大欣欣物自生花攢仙禁暖虹照御溝晴玉漏春逾永瓊樓曉更淸舜衣章十二垂向五雲城其九闢闔乾坤内生成不自知栽來同小草春到發新枝金鏡慚無獻瑶觴喜共隨翰當花日染帶傍桂山垂材薄承恩厚天高下聽卑虞廷從獸舞幸接鳯凰儀其十萬壽詩七言律八首有序翰林院侍講臣吳垣臣聞帝治無爲與天同運王猷允塞乆道化成電繞虹流兆禎祥於五緯麟逰鳯舞延景祚於萬年是以封祝二多雅歌百祿莫不光垂寳厯慶浹寰瀛振古以來昌期僅覯欽惟皇上功𢎞覆載德懋勲華出震膺圖兼文武聖神而建極乗乾御宇協平康正直以揆幾至道凝自象先洪恩覃乎物表修明庶績登上理於穆清保合太和奏時雍於熈皡固已聲靈烜赫愷澤滂洋中外禔休神人效順矣兹當長春令序恭逢誕聖嘉辰是日也聖甲初周貞符申錫榮光吉曜朝北斗以呈祥虎拜嵩呼祝南山而介祉玉帛竝陳於闕下謳歌普匝於域中率土騰歡際天稱賀臣駑駘菲質侍從末員海晏河清喜一人之篤祜日升川至欣萬壽之齊天勉綴蕪詞敬揚大慶謹拜手稽首而獻詩曰祥凝寳厯萬年春薄海朝宗玉帛陳清禁雲移三殿曉芳郊瑞靄百昌新天文炳煥輝南極帝祚綿長拱北辰聖主垂裳逢道泰稱觴薦壽戴洪鈞其一遲日光風繞建章鬱蔥佳氣萃禎祥宫花耀彩瑶圖麗苑柳含煙紫陌長率土輸誠方物獻普天叶慶頌聲揚太平天子神堯聖億萬斯年樂未央其二世際文明上理時化成乆道頌無爲體天不息乾行健象日方中景曜遲睿慮常周淵鑒徹神機獨運衮衣垂山呼聖壽登封日樂奏雲韶見鳯儀其三盛世車書四海同遐陬異域盡呼嵩經陳謨典綏猷遠琛獻共球正朔通六服承流宣聖化五辰效順協神功昇平常奉君王宴日映峯霞玉醴紅其四瑶壇肅穆旭光迎聖主明禋昭事誠將享時親勤玊輅苾芬上達繞霓旌農祥已卜豐年兆慶典還嘉大禮成聖壽齊天膺百祿皇圖永固泰階平其五聖德如天蠲賜繁鴻庥覆育及元元祥風是處涵濡乆解澤無邊軫恤存萬物皆昌逰化國八方在宥樂春温共歡寰宇登仁壽仰祝難名浩蕩恩其六盛朝特下求賢詔曠典新開甲乙科曜日珠璣輝碧􅃠章天奎璧燦銀河彚征共喜茅茹拔俊造同升棫樸歌壽考作人徵壽愷上陽春色五雲多其七道洽雍熙景運開時廵豫動享王來神祇受職三辰正禮樂充庭萬國陪和氣氤氳滋雨露皇威赫濯象風雷小臣簪筆歌清晏率舞惟陳萬壽杯其八萬壽詩七言律十八首有序翰林院侍講原充曰講官起居注在籍臣彭定求欽惟我皇上功德翔洽浩蕩難名乆道化成覃敷遐邇胥寰宇而納諸仁壽之域應昌期而備集豫大之禎兹當歲紀昭陽月中姑洗欣逢萬壽大慶甲子初周貞元交㑹日升月恒與天齊永粤稽自昔首出之君羲農肇造黃顓繼興著發祥之符越期頤之算及乎唐堯御世厯數彌長卓冠百代乃至舜禹湯文迭躋遐齡竝膺景福先聖後聖一揆同符要之維祺純嘏皆咸五登三所由臻者也蓋德盛則報必隆厯綿則仁益溥我皇上禀生安之姿貫性天之學宵衣旰食言物行恒闡理數之精微䆒經史之原本凡所以誠孚對越敬懋覲揚敷文教播武威飭官方勤民事庶績釐舉百度修明本無逸以居心體健行以合德積久如一日也用是侯甸同風要荒順則苞符協運川嶽呈祥帝澤均霑乎率土聖恩倍渥於呉疆翠華所駐綸綍𢎞宣廣薪槱以作人厚粟帛而養老虞周時廵之典不是過也軫恤雨暘咨諏恒切頻蠲田賦額踰億萬簡任循良洞悉民隱含哺鼓腹之倫歡呼愛戴靡不翹首跂足喁喁向風曰聖天子惠我黎元俾登諸衽席之上如此願得趨覲闕廷以伸萬壽無疆之祝臣定求草茅微賤知識淺陋食祿懐慙跧伏田里恩銜心版感刻肌銘朝夕焚香瞻天尺五竊嘗誦詩至豳風之七月二雅之天保棫樸諸什其所以頌美君上者莫不以睂壽萬年戩榖錫嘏各致其纒綿愷摯之誠則此心此理之同也仰見我皇上以道法爲治法仁洽義周如三光照燭四氣涵濡薄海内外是訓是行謳思無斁謹抒近體詩以附於康衢擊壤之列臣蠡測管窺未能頌颺萬一無任忻惕交幷之至璇厯遐昌壽域中聖皇端拱福攸同萬年方啟平成運八表咸歸茂育功瑶殿星輝曾貫月丹山春永自流虹天顔有喜瞻依近幸附輿歌表寸衷其一聖學高深德日新仔肩道統運經綸心傳一貫宗洙泗理析羣言滙洛閩曉闢銅扉經篋啟宵分玉漏秘圖陳光華復旦星雲燦萬類陶成荷大鈞其二黼座精勤總萬幾未央月迥早求衣聖謨默斷權衡定睿慮𢎞周美備歸金匱宣揚垂典則石渠紀載覲光輝於今九鼎銘勲日景曜凝祥煥紫微其三郊壇典禮肅齋誠昭事維䖍夙夜清燎火初升鑾馭近爐香細拂衮衣行思成不假橫汾曲卜福何須泰畤名穆穆鑒觀原不遠祈年總是爲蒼生其四松杏開基燕翼隆嘉祥鍾毓集皇躬輝煌金鑑圖書秘肅穆瑶堦簴業崇瑞輯熙時修秩望旌揚吉日賦車攻萬年有道稱繩武穰簡綿綿祝華嵩其五聖孝光天海宇聞慈闈尊養淸溫勤琱輿齊度瑶池月珠幄長依玉陛雲蓂莢方添陽律潤箑蒲自扇曉風熏祥烏馴雉嘉徵應嫓美虞周是我君其六憶昔趨隨侍從班舞干親覩兩階間廟謨蚤定鐃歌奏邊檄方馳露布還乾象昭融新日月坤輿恢拓舊江山阪泉涿鹿功俱永化景舒長徧八寰其七久除苞蘖靖戈鋋方畧重頒朔漠編鐵馬遥馳嘶凍雪玉鞭徐指湧靈泉挂弓萬里天山外勒石千秋瀚海邊玉帛祗今諸部集歡呼獻壽向春筵其八奎垣朗耀拱文昌天授神竒邁百王厯象欽崇堯典命時幾懋勅舜歌颺義林薈萃瓊霄逈學海迴環鳳沼長自是聖朝嘉祉盛千年龍馬又呈祥其九龍行光賁五雲車黃繖前頭拱御書絢爛宫牆尊黼黻琳瑯嶽瀆重璠璵翔鸞翥鳯神俱運垂露懸針意有餘拜賜驪珠眞異數榮光奕奕照蓬廬其十海甸欣逢法駕臨省方問俗戴恩深金堤懸望龍旂色碧水長留鳯蹕音花栁風妍披御藻桑麻膏沃挹宸襟年來齋沐芝壇㑹祗秉焚香五夜心其十一九河底績禹功高澤國猶煩眷顧遥淼淼三江咨故道茫茫百瀆滙長橋空州已徙羣鴻宅夾㟁都忘兩鵠謡詔發金錢誠曠典籌添海屋㑹今朝其十二皇心重本軫三農渙號頻年下九重總爲閭閻充積貯不緣庾廩費租庸寒消紫陌風雷恊氣轉青旂雨露濃此日謳吟敷率土荷恩最渥是呉儂其十三東井星輝泰運開矞皇雲漢正昭囘波澄徧結珊瑚􅃠林廣多收梁棟材藻火文明臨藝苑斗牛光氣拂塵埃作人帝德深如海萬歲聲中詠有萊其十四恩溢寰區保太和慈雲晻靄䕃金坡每同夏后懸鞀鐸嘗等商王解􅃠羅鳯詔銜來興鼓舞雞竿樹處沛滂沱一人有慶民胥賴貫索星消聽頌歌其十五穆皇大度秉淵兢保泰持謙道岸登俗躋雍熙殷帝訓躬兼神聖謝徽稱形容駿烈知難罄比擬鴻謨見未曾仁讓風期淳古上羣工拜手共銘膺其十六瑞靄氤氳上綵旃靑陽協令正芳年花明玉砌春輝暖鳥囀瓊枝曉仗姸梵宇三乗翻貝葉蓬山五老貢珠編鳬趨鼇抃情何極心似葵開向九天其十七雲衢鴻漸慶昌期瓦礫兼收沐聖慈槖筆舊慚趨禁掖校書重忝遡江􅎠含容眞覺乾坤大培養還同草木滋就日瞻雲偕野老攄誠敢賦祝釐詞其十八萬壽盛典初集卷七十二
