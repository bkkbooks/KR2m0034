body:
  text: 欽定四庫全書恭纂萬夀盛典初集告成進表大學士臣馬齊臣松柱臣蕭永藻臣王掞等恭承勅㫖纂修萬夀盛典初集告成謹奉表上進者臣等誠歡誠忭稽首頓首上言伏以璇符肇祉榮河開龍馬之禎玉厯凝庥紫極煥星虹之彩重華大徳位祿名以夀而彌尊圜葢無私元亨利以貞而益久大人法天行健宇宙長春君子應地含𢎞岡陵竝固巍巍蕩蕩至化與上下同流翼翼綿綿永命共乾坤一氣祥延華渚記表環樞和溢康衢圖傳擊壤疇稱五福原本於洛書詩頌九如沿流為繪事惟茂實允揚乎簡冊斯休光聿炳乎丹青欽惟皇帝陛下經天緯地左羲右軒靜探禮樂之源動法雷霆之奮文教誕敷於有截武功震疊於無垠仗旄鉞以行誅連戡三蘖迅鑾旂而問罪立靖西陲烽燧永銷都護拓臨邊之府版圖式廓提封標跨海之疆悉子悉臣同車書而一尉候來王來享奉正朔而輯圭璋盡禋郊饗帝之誠紫壇昭事懋祈穀重農之典元日親行展敬園陵肅嵗時之孝享承歡長樂竭冬夏之凊温問夜求衣虔臨庶政卑宫菲食總攬萬幾視四海猶户庭運天下如指掌蠲租賜復養賢崇老之詔史不絶書越漠踰沙梯山航海之珍府無虚月濬川陂澤指方略而禹甸咸寧慎法䘏刑布渙汗而湯羅頻解暑耕寒織每厪宸衷十雨五風輒縈睿慮捍大災而興大利功過平成後民樂而先民憂惠深懐保加以統承洙泗道接唐虞集羣聖之大成冠百王而首出抉圖書之秘奥究貫三才闡雅頌之精微推原四始胸羅象緯潛通七曜之編手按方輿洞燭九州之勢綸音渾噩雲漢昭回奎畫輝煌鳳鸞鶱翥道竝該乎游藝聖兼擅於多能内外臣工經眸即識古今紀載流覽不忘大包穹壤而靡遺細析毫芒而無間雖抗六典之鴻議不足比測淵深備九籍之瓌詞詎能贊揚美盛者矣昨者嵗在昭陽月當姑洗值萬福來同之日正六旬大慶之期慶霄晴朗以舒光景曜淑清而啟旦羣工拜揚於鷺序多士忭舞於芹宫卒伍額手於軍屯商旅謳吟於市路南北萬四千里皆如江漢之朝宗郡國百九十州咸若星辰之拱極以逮重譯貢琛之使依風請吏之徒莫不稽首趨廷稱觴叩闕斯時也皇上朝萬國而闢虞門御六龍而回文囿執殳虎士警蹕停聲帶劍鶡冠辟除罷唱髦倪雜沓企踵而仰舜顔士女駢闐連袂而瞻堯顙山鳴萬嵗殷地以徹天日耀五雲懸晨而不夜珠幢絳節晻靄琳宫法曲仙音飄颺金界香焚夾道爐煙瑞霧俱霏綵絢交逵繡幛彤霞一色九芝萃秀競産於帝池雙觡呈斑來馴於内苑於是百僚獻頌聿宣鍾石之聲率土歌風並上升恒之祝遹哉皇哉美矣至矣而我皇上方且却鴻名而不受履至徳而弗居願以億姓安為一人之安即以皇極福為庶民之福普施大賚廣沛洪仁類錫天潢重衍榮滋於藩服秩増在位更推優異於舊臣免賦則三載一周恩覃蔀屋造士則兩闈特設化被髦儒法網𢎞開犴户遍生綠草帑金大布龍驤盡沐春波而且頌瑶宴以引髙年賜大酺而歡黎兆黄髪兒齒咸飫禁厨玉斝兕觥親勞帝胄沃澤霑乎海宇太和洽於人心含氣欣欣若耘耰之逢甘雨懐情款款譬草木之值春風自炎黄而降未都其庥即開闢以來罕聞斯盛允宜彰施於毫素陋唐家封禪之圖㸃染於鉛朱􅅓周室旅獒之畫誥謨制勅竝勒銀繩文賦詩歌都裝錦軸輯萬夀之盛典垂一代之鴻編原任户部侍郎臣王原祁修纂於前詹事府詹事臣王奕清踵事於後計歴三稔而周彚集百二十卷全書告成恭呈御覽熊熊寶氣下燭西崑爛爛文光仰騰東壁将見無疆聖厯六十年甲子方新不老大椿八千嵗春秋常在圖皆據實非誇銀甕金船言必援經逺嫓赤文綠字臣等謬忝綸扉濫塵政府幸際都俞之盛世欣逢夀考之昌辰揚勝事於璿圖願添帝籙表鴻徽於瓊版祇頌堯年剞劂初成装潢始就髙文黼繪遹昭聖代之光華傅彩開雕備覩萬方之燕喜捧琅函而欲舞抱緗帙以騰歡臣等無任瞻天仰聖踴躍懽忭之至謹奉表恭進以聞康熈五十六年正月初一日欽定四庫全書恭纂萬壽盛典初集各奏摺康熙五十三年正月初八日臣王原祁謹奏為欣逢聖壽之昌期宜備萬年之盛典恭請俞㫖纂修以布萬方永垂億世事康熙五十二年三月十八日恭逢皇上六旬萬壽喜天甲之初周慶皇恩之大沛耆庶歡呼而赴闕街衢結綵以迎鑾十七日進宫鹵簿之儀以及夾道衢歌之盛臣恭承俞㫖謹繪長圖已經鈎成初本進呈御覽奉㫖萬壽圖畫得甚好無有更改處欽此即領絹鈎摹正本外臣竊惟自古有圖則必有史圖以象形藏䇿府而傳億載史以紀實示臣民而布萬方在皇朝盛典隆恩自炳於起居之注而臣下瞻天仰聖尤望有紀盛之書臣受恩深重既繪萬壽長圖尤願恭紀萬壽盛典睿藻之輝煌恩綸之廣大典禮之詳明歌頌之洋溢俱宜修輯成書傳布永乆臣年雖逾七十部務之暇尚可兼理臣子編修臣王謩供職翰林正宜效力編纂修撰臣王敬銘向隨臣學畫亦宜一體效力伏思是書係聖朝鉅典不敢草率編摩臣前掌院學士任内素知編修臣查嗣瑮嵇曽筠儲在文修撰臣王世琛皆勤慎可任纂修其收掌擬即派候補待詔臣曹曰瑛所有萬壽圖中龍棚經棚計共五十餘處仍率冷枚等照依書式另畫刻本列諸卷中則圖紀具陳開卷瞭然用以昭示四方永垂萬世伏乞皇上俯允臣請俾天下臣民普同瞻仰慶祝萬壽無疆恭候命下其書中一應事宜容臣同纂修官員恭擬凡例摺奏請㫖臣不勝踴躍懽忭之至謹奏本日奉㫖依議二十一日臣王原祁謹奏臣於正月初八日具摺恭請纂修萬夀盛典奉㫖鈔寫著選新進士字好的用欽此萬壽科新進士情願效力者甚多臣就見聞所及選得王賚等二十四名具摺呈覽本日奉㫖著王原祁㑹同揆叙湯右曽挑選十名彀用了欽此欽遵於本月二十一日將進士王賚等二十四名傳齊公同考試挑選得王賚温儀鄒允煥周本治陳溥髙輝張榮源陸琮于本宏車敏来十員到館辦事三月十一日臣王原祁謹奏臣荷蒙聖慈允臣所請纂修萬壽盛典懽躍無似臣自愧弇陋不足𨗳揚盛事黼藻昌期惟有勉竭駑駘㒺敢稍懈謹同纂修官編修臣查嗣瑮臣嵇曽筠臣儲在文修撰臣王世琛臣王敬銘并率臣子編修臣王謩恭擬凡例條目進呈御覽伏候聖訓指示以便編輯臣又照依書式另畫萬壽圖刻本謹呈畫稿九張幷乞聖裁訓定即陸續繪圖刋刻恭進謹奏本日奉㫖交南書房翰林看十五日南書房議覆𤼵下王原祁等擬纂萬壽盛典條目凡例臣等詳議欽惟皇上功徳超邁久道化成恭遇六十萬壽人心天意景應協從一時隆典亘古未有是非紀述詳備不能形容盛美今所擬條目首紀御製諭詔詩賦二紀聖徳三紀典禮四紀恩賚五紀慶祝六載臣下歌頌詩文分類周悉體例亦當其所擬凡例内第八則擬於每條之下附以頌語臣等伏念皇上政教號令如日月經天江河行地臣下謹紀實事已足垂示萬古况盛徳大業亦非贊揚之所能盡作頌一條似可不必又第六則擬悉錄臣民所進萬壽詩文臣等伏思是書之成為我朝盛事千古美談凡臣下所進歌頌雖皆出於忠愛之誠亦應擇其詞義之典雅明順者採錄編次不宜槩載徒事卷帙浩繁餘條所擬應如所請臣等愚陋淺識伏候聖裁謹奏本日奉㫖依議康熙五十四年正月二十二日臣王原祁謹奏竊臣奏請纂修萬壽盛典荷蒙聖慈俞允隨恭擬條例進呈奉㫖交南書房詳議𤼵下欽此隨移各衙門咨取檔案臣同纂修侍講臣查嗣瑮編修臣嵇曽筠臣儲在文修撰臣王世琛臣王敬銘臣男編修臣王謩及校録進士臣王賚温儀鄒允煥周本治陳溥髙輝張榮源陸琮于本宏車敏来等十員朝夕編輯㒺敢逸懈伏見帝徳髙厚天慶綿長臣民沐浴膏澤歌舞歡忭之狀珥筆難名形容莫罄已編初稿兹謹繕寫先将恭紀第一條宸藻二卷第二條聖徳六卷第三條典禮十四卷及慶祝中之圖畫圖記八卷恭呈御覽其中恐有體例未合詞句未當應行刪改處伏乞聖訓指示恭候命下遵行將全書陸續繕寫進呈更有請者五十三年七月侍講臣查一嗣瑮奉命提督順天學政其分纂之書臣素知有翰林院編修今陞庶子臣李紱學問優長已到館代纂理合奏明伏乞睿鑒令其在館辦事其畫圖刻本現在刋刻謹奏本日奉㫖是交南書房翰林看二十九日户部員外郎臣趙之垣謹奏為萬壽盛典告成恭請校刻以垂永久事恭惟我皇上峻徳登三鴻功咸五得位得禄得名得壽一人歛福以錫民乃文乃武乃聖乃神四海稱觴而進頌歡聲徹地愷澤敷天爰咨彚輯以成書竝付丹青以示象一時盛典千載竒逢伏念臣世受皇恩歴膺聖眷祖孫父子疊被寵榮一家之受恩益厚終身之仰答愈難早夜捫心涓埃莫報况臣以翦劣庸材初任今職臣父兩廣總督臣趙宏燦諄諄誨臣恪共職守雖勤慎不遑終慚糜禄兹於本部侍郎臣王原祁纂修館中竊見萬夀盛典一書已經告成臣自愧無文未附謳歌於卷末顧念留傳不朽應付􅀥梨近見御製諸書多有恭請刋刻者臣至愚極陋未諳文理郎署辦事之餘校讐考對或堪效力為此不揣愚拙冐昧奏請伏乞聖慈俯鑒微忱准臣在寓開局恭候頒發定本校對刋刻次第進呈御覽犬馬私情庶得少申萬一縁臣父道逺未能具摺臣謹奏本日奉㫖好准他奏四月十七日臣王原祁謹奏臣同纂修官侍講學士臣李紱編修臣嵇曽筠臣儲在文修撰臣王世琛臣王敬銘臣男編修臣王謩等恭紀萬壽盛典初集正月恭進三十卷又前進畫圖二卷共三十二卷今又纂得二十八卷繕録稿本恭呈御覽恐有體例未合詞句未當應行删改處伏乞聖訓指示恭候命下再行詳細校對發刋初集擬共一百二十卷恭載宸藻及臣等撰次者已成六十卷其歌頌詩文亦擬分為六十卷容臣等採錄編輯繕寫進呈謹奏本日奉㫖交南書房翰林查看十月二十六日詹事府詹事加二級臣王奕清謹奏萬壽畫圖及萬壽盛典兩年以来開館繪畫纂修先已進呈盛典六十卷業蒙皇上允户部員外臣趙之垣效力刋刻尚有歌頌詩文六十卷亦已選擇鈔錄將成俟進呈之後一并交與趙之垣刋刻至書中小圖有在館修書修撰臣王敬銘同冷枚校閲𤼵刻已成者五十四頁未完者九十四頁其大絹畫圖於康熙五十二年十二月進呈稿本五十三年四月領到絹三十丈遴選得畫圖人員徐玫等及萬壽科武㑹元臣金昆協同冷枚共十二人盡心繪畫今已畫成十二丈未成者尚有十八丈現在趲工竊念臣雖未諳畫理然累世蒙恩全家荷寵分應效力况萬壽昌期普天同慶衢歌華祝逺盛堯年渝舞嵩呼遥逾漢日翠輦經行之處躋大地於春臺皇恩覃被之餘登八荒於壽域真頌颺之莫罄亦圖繪之難名願見為榮躬逢斯幸今書畫局中一應事宜臣願接任同臣姪編修臣謩照前料理臣未敢擅便相應請㫖伏候聖裁謹奏本日奉㫖好准他奏十二月二十八日臣王奕清謹奏臣蒙恩接管萬壽書畫事宜所有盛典中歌頌六十卷已經選擇謄稿恭呈御覽其中如有應行刪改之處伏候聖裁指示連前所進六十卷全書共一百二十卷謹奏本日奉㫖交南書房翰林看五十五年三月十七日刑部雲南司郎中臣趙之垣謹奏正月十三日南書房𤼵出臣第二次進呈萬壽盛典一套已經照簽修改訖今又刻成四十三卷至六十卷共一十八卷恭呈御覽伏乞皇上恩賜指示遵行抑臣更有請者萬壽盛典一書創自聖朝昭垂萬古臣以一介微員謬膺校刋重任恩榮已極伏查翰林院編修臣蔣漣校刋御製文集卷後竝得附列山東廵撫臣蔣陳錫及編修臣蔣漣父子姓名倘䝉皇上格外加恩准臣父兩廣總督臣趙宏燦竝臣叔直𨽻總督臣趙宏燮及臣之垣姓名附於卷末則臣父子叔姪既已身沐殊恩兼得附名典冊生生世世永矢報稱於靡涯矣臣不勝感激欣幸之至謹奏本日奉㫖准刻將此一集交南書房對看四月初十日詹事府詹事臣王奕清謹奏臣荷䝉恩命准臣接管萬壽館書畫事宜正值盛典初集告成臣伏讀循覽具見我皇上壽與天齊福如川至八方華祝萬國嵩呼茍非深仁厚澤久道化成何以航海梯山普天同慶一至於此誠振古未有之盛事亦曠世未見之竒書共繕草本一百二十卷先後進呈御覽奉㫖𤼵南書房校正隨付郎中臣趙之垣刋刻將次告成臣伏查衍聖公臣孔毓圻刋刻幸魯盛典曽請御製序文弁於卷首今盛典一書敷揚率土臣民稱觥祝嘏之誠將来昭示中外輝耀古今必得御製序文以垂永久俾萬世臣民咸知壽國壽民至意每歴十年更増一帙巍巍煌煌與天無極臣等幸與編摩曷勝榮寵所有現在本館監修分纂校録收掌人員及臣兄侍郎臣原祁臣姪編修臣謩應否仰邀聖恩附名簡末伏候聖裁至養心殿監造南書房校對翰林亦祈請照各館書成列名之例一并刻入再臣接任本館之日用有臣表兄官學教習期滿候選知縣徐榮疇經管書局校對刋刻畫圖可否同翰林院待詔曹曰瑛列名收掌之末未敢擅便伏候上裁又臣於康熙五十四年十月内進有萬壽書畫事宜一摺亦應照例附入合幷聲明謹奏本日奉㫖交南書房議奏同日刑部雲南清吏司郎中臣趙之垣謹奏為懇恩列名事竊臣䝉皇上准令校刋萬壽盛典榮寵已極但臣學識淺陋兼辦部中事務恐負校刋重任幸有副榜貢生候選教諭錢元昌同臣協力磨對勤慎周詳伏乞皇上恩准附名收掌之列俾得叨預聖朝盛典榮垂久逺戴徳靡涯矣謹奏本日奉㫖交南書房翰林二十八日南書房議覆𤼵下王奕清奏摺一件奏稱萬壽盛典初集刋刻將次告成恭請御製序文以垂永久等因臣等公同詳議萬壽盛典一書皆載述皇上聖徳神功及臣民祝嘏典禮非幸魯盛典比例况首卷已載皇上詔諭詩賦似無容更加御製序文或令大學士作進書表文一道列於目録之前似為得體臣等愚陋無知所見如是伏候聖裁又奏請開列養心殿監造職名南書房校對職名應否列名之處出自聖恩非臣等所敢擅議至其本館監修分纂人員王掞等應准其照例開列并王奕清所請校對圖畫之徐榮疇趙之垣所請校對刋刻之錢元昌亦准其開列可也謹奏本日奉㫖所奏是康熈五十五年四月二十八日奉㫖開列萬壽盛典初集監修總裁校勘分纂校録收掌校刋監造諸臣職名監修官經筵講官文淵閣大學士兼禮部尚書加七級臣王掞總裁官原任經筵講官户部左侍郎加三級臣王原祁臣王奕清南書房校勘官臣蔣廷錫日講官起居注翰林院侍講學士加一級臣張廷玉日講官起居注翰林院侍講學士加一級臣陳邦彥日講官起居注翰林院侍讀加一級臣趙熊詔右春坊右中允兼翰林院編修加一級臣王圖炳翰林院檢討加一級臣張照翰林院編修加一級臣薄海分纂官翰林院侍講學士加一級臣李紱原任翰林院侍講加一級臣查嗣瑮翰林院編修加一級臣嵇曽筠翰林院編修加一級臣王謩翰林院編修加一級臣儲在文翰林院修撰加一級臣王世琛翰林院修撰臣王敬銘校録官萬壽科進士内閣中書舍人臣王賚萬壽科進士臣温儀萬壽科進士臣鄒允焕萬壽科進士臣周本治萬壽科進士臣陳溥萬壽科進士臣髙輝萬壽科進士江南鎮江府儒學教授臣張榮源萬壽科進士臣陸琮萬壽科進士候補主事臣于本宏萬壽科進士臣車敏来收掌官翰林院待詔臣曹曰瑛官學教習候選知縣臣徐榮疇副榜貢生候選教諭臣錢元昌校刋官字位過密無法显示臣趙宏燦字位過密無法显示臣趙宏燮刑部雲南清吏司郎中臣趙之垣監造官養心殿總監造六品官臣趙昌養心殿總監造臣王道化武英殿總監造兼㑹計司員外郎臣伊都立武英殿總監造兼佐領臣張常住武英殿總監造臣李國屏原任雲南廵撫臣佟毓秀欽定四庫全書萬壽盛典初集凡例八則御製詩文如雲漢昭囘日星炳耀記載莫殫贊頌難名恭逢萬壽聖節綸詔頻頒宸章丕煥悉皆敷言成訓吐辭為經敬登卷端昭垂萬世一則聖徳隆盛富有日新因事見端一一度越前古尊養備萬方之奉保泰乘五位之乾撝謙則屢却徽稱敦化則獨先孝弟皆由至徳積中動臻美善敬輯成編以見徳福相因亦洪範推本皇極之意也二則典禮崇鉅萬國瞻仰先列朝賀威儀鑾衛出入次及頒詔中外祭告山川以逮養老大酺諸事典則矞皇神人胥慶三則恩賚優渥慶溢八紘宗室外藩親疎普給公卿庶尹大小均霑貤封錫蔭以眷舊勞省刑賞兵以廣慈惠士則兩闈特設逓慶十年租則三載一周全蠲四海博施廣被澤不勝書綱列目從猶虞掛漏四則華祝嵩呼普天同慶歌衢擊壤率土抒忱逺近雲集京師恭祝萬壽者如江漢之朝宗如風雨之和㑹不約而至不期而同誠亘古所未聞史冊所未見既繪長圖復分紀上下二卷凡京城内外臣僚耆庶不下億千萬人不啻數十百處合寰海於堂階躋春臺為壽域流傳盛事莫罄形容其直省名山之祝釐文武大僚之入覲分類就班各書本末至於聖朝不納貢獻不徴瑞應而事有當載亦謹識數端用見天人悉協云五則頌徳歌功詩書竝載欣逢萬壽慶叶昌期凡屬臣工賡颺恐後下逮草野具有謳謡衆體畢陳共申忠愛擇其尤雅謹附末編六則是書所紀悉考各衙門檔案章奏據實排纂仿紀事本末體式各為起訖各編年月其事有原始義有連及例得先後備書七則皇上功徳巍煥超邁古今峻極於天贊揚難罄祗述纂修之意各附本條一以徴運㑹之隆一以誌遭逢之盛雖管窺蠡測無當高深惟就親所覩聞紀諸簡䇿聿襄盛典嗣後每閲十載賡續成書以衍億萬年無疆之祝