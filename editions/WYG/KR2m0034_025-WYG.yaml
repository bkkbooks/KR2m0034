body:
  text: 欽定四庫全書萬壽盛典初集卷二十五恩賚二加恩外藩二閏五月二十七日癸酉以萬壽覃恩頒詔朝鮮特宣别㫖存問國王李焞以昭異數七月二十八日朝鮮國王臣李焞上言康熈五十二年閏五月二十七日皇華逺臨既頒同慶之詔又宣别㫖聖諭若曰爾等至朝鮮時諭國王自王嗣國歴有年嵗而畧無事端坐享太平可謂甚少想王之顔貌亦必少減於昔鬚髪亦必漸白矣朕此處亦無些事故頃因慶朕六十壽禮儀特遣大臣齎詔徃頒朕乃統御天下之大君惟以致普天下之人民於太平安樂為心耳餘無他願爾等以此諭王可也等因臣竊伏念臣幸逢聖世叨守先業疆域粗安莫非帝力感戴之忱恒切於中今又特降玉音念及賤質恩私勤摯迥出尋常臣俯伏恭聽不勝感淚之交頤謹奉表稱謝者臣焞誠惶誠恐稽首頓首伏以盛澤旁流匝方域而懽忭優詔别降命使華而臨宣袛承徳音惟有感涕伏念臣僻處奥壤蒙受大球數千里粗安農桑實荷覆幬累十載叨守基緒每懐憂兢不料疎逖之微軀猥煩慰撫之睿念軫蒲栁之衰謝特加垂憐際海宇之昇平嘉與同樂瞻聆俱聳含戢靡窮兹葢伏遇皇帝陛下統御寰區涵育氓庶得位得壽享寳祚於靈長無邇無遐囿羣品於熙洽爰推異數亦及外藩臣敢不仰佩訓詞俯激衷悃年齡雖暮敢忘星拱之忱福禄彌増第深岡祝之願臣瞻天仰聖無任激切屏營之至為此具本謹具奏聞十月十七日奉㫖覽王奏謝知道了該部知道十一月初八日上以朝鮮國王李焞先後所進謝恩禮物存凖年貢仍詔嗣後謝恩照常進表不必别有貢獻十一月初五日禮部尚書臣赫碩色等謹題為恭進謝恩禮物事照得朝鮮國王李焞差陪臣陵昌君李焜議政府左叅贊權尚游等為萬壽頒詔進賀禮物御前黃細苧布三十疋白細苧布三十疋黃細綿紬二十疋紫細綿紬二十疋白細綿紬三十疋龍文簾席二張黃花席一十五張滿花席一十五張雜彩花席一十五張白綿紙二千卷仁憲恪順誠惠純淑端禧皇太后陛下紅細苧布一十疋白細苧布一十疋白細綿紬二十疋滿花席一十張雜彩花席一十張為欽差勅使頒詔進到謝恩禮物御前黃細苧布三十疋白細苧布三十疋黃細綿紬二十疋紫細綿紬二十疋白細綿紬三十疋龍文簾席二張黃花席一十五張滿花席一十五張離彩花席一十五張白綿紙二千卷仁憲恪順誠惠純淑端禧皇太后陛下紅細苧布一十疋白細苧布一十疋白細綿紬二十疋滿花席一十張雜彩花席一十張為欽差勅使頒詔又宣别㫖進到謝恩禮物御前黃細苧布三十疋白細苧布三十疋黃細綿紬二十疋紫細綿紬二十疋白細綿紬三十疋龍文簾席二張黃花席一十五張滿花席一十五張雜彩花席一十五張白綿紙二千卷仁憲恪順誠惠純淑端禧皇太后陛下紅細苧布一十疋白細苧布一十疋白細綿紬二十疋滿花席一十張雜彩花席一十張為特賜書冊進到謝恩禮物御前黃細苧布三十疋白細苧布三十疋黃細綿紬二十疋紫細綿紬二十疋白細綿紬三十疋龍文簾席二張黃花席一十五張滿花席一十五張雜彩花席一十五張白綿紙二千卷仁憲恪順誠惠純淑端禧皇太后陛下紅細苧布一十疋白細苧布一十疋白細綿紬二十疋滿花席一十張雜彩花席一十張為所進方物存凖年貢進到謝恩禮物御前黃細苧布三十疋白細苧布三十疋黃細綿紬二十疋紫細綿紬二十疋白細綿紬三十疋龍文簾席二張黃花席一十五張滿花席一十五張雜彩花席一十五張白綿紙二千巻仁憲恪順誠惠純淑端禧皇太后陛下紅細苧布一十疋白細苧布一十疋白細綿紬二十疋滿花席一十張雜彩花席一十張等因到部查康熈四十八年朝鮮國王李焞為頒詔進賀禮物及為欽差勅使頒詔所進謝恩禮物臣部具題交送總管内務府在案又查康熈二十五年朝鮮國王李焞為引罪罰銀進到謝恩禮物臣部議得俱交送總管内務府照數查收等因具題奉㫖這所進謝恩陳奏禮物俱應不收即行發還念道里遥逺徃返為勞准作年貢及冬至等三次進貢禮物有不足數目著於正朝入賀時補進嗣後此等引罪謝恩進獻禮物著令停止欽此欽遵交送總管内務府又二十六年朝鮮國王李焞為進到謝恩禮物不收准作年貢及為使臣勘罪從寛進到謝恩禮物臣部議得應准作年貢等因具題交送總管内務府又五十一年正月内朝鮮國王李焞為欽奉恩命擬勘罪囚進到謝恩禮物臣部議得一應獲罪進到謝恩禮物俱經奉㫖停其收受現今引罪進到禮物亦應停其收受交與來使帶囘等因具題奉㫖依議續據來使李枋等呈懇存留方物准作年貢其不足之數照例進納等因臣部議得准作年貢交送總管内務府又五十一年五月内朝鮮國王李焞為免年貢内銀兩豹皮并修葺沿途館舍進到謝恩禮物臣部議得交送總管内務府等因具題奉㫖朝鮮國王李焞為謝恩貢獻禮物著不必收續據來使朴弼成等呈懇准作本年之貢等因臣部議得准作年貢其不足之數令其補進等因具題交送總管内務府又五十二年正月内朝鮮國王李焞為免其查議及進到謝恩方物存准年貢免其謝恩進到豹皮審定境界進到謝恩禮物臣部議得此等事件進到謝恩禮物俱經奉㫖停其收受亦應停其收受令其帶囘但去年不曽收受禮物皇上軫念伊等難以帶囘俱令存留准作年貢亦應存留准作年貢等因具題交送總管内務府俱已在案該臣等議得朝鮮國王李焞差陪臣臨昌君李焜議政府左叅贊權尚遊等為萬壽頒詔進賀禮物為欽差勅使頒詔進謝恩禮物為欽差勅使頒詔又宣别㫖進謝恩禮物為特賜書冊進謝恩禮物為進到謝恩方物存准年貢進謝恩禮物恭進到部查朝鮮國王李焞為萬壽頒詔進賀禮物為欽差勅使頒詔進到謝恩禮物數目俱與例相符相應交送總管内務府照數查收又查朝鮮國屢蒙皇上殊恩寛減年貢内銀兩等物且又將不曽收受謝恩禮物軫念伊等難以帶囘存留准作年貢誠聖恩髙厚之至矣應將為欽差勅使頒詔又宣别㫖及特賜書冊并進到謝恩方物存准年貢所進謝恩禮物俱停其收受亦存留准作年貢交送總管内務府其不足之數仍令照例補進嗣後朝鮮國毎年一定應進之冬至正朝萬壽聖節及年貢禮物令其照例進獻如遇頒詔進賀禮及為欽差􅃯使頒詔所進謝恩禮物亦令照例進獻此外一應事件進到謝恩禮物皇上俱令停其收受其謝恩照常進表不必進獻禮物將此曉諭朝鮮國進貢來使李焜等俟命下之日知㑹朝鮮國王李焞可也臣等未敢擅便謹題請㫖本月初八日奉㫖依議右臣等撰次盛典至加恩外藩竊歎我國家徳威之廣超越三古而皇上深仁厚澤彌綸無外如天之無不覆如地之無不載固宜凡有血氣者莫不尊親而鴻庥寳厯綿於無窮也昔成周之初越裳氏以三象重譯來獻白雉稱天無烈風時無苦雨海不揚波者三年意中國有聖人是以來朝周公謂徳澤不加君子不饗其質政令不施君子不臣其人言雖謙讓然當時政令實不之及也粤稽周禮職方氏辨九服之邦國五服而外極於藩服懐方氏掌來逺方之民致方貢致逺物而送迎之達之以節治其委積館舍飲食其禮意可謂隆洽然不過九畿之衆也國家龍興之始徳威遐暢雷動大隨朝鮮率先歸附蒙古四十八部落東西數千里以次臣服盡入版圖皇上纘承鴻緒克光前烈擴乾坤之量沛雨露之恩眷念逺人尤加軫卹使問稠疊錫予駢蕃或口外水潦冰雪寒凍饑饉賑貸不遺餘力康熈三十五年喀爾喀為厄魯特所侵逼則赫然震怒三策六飛蕩平兇逆使藩封式固若登衽席朝鮮年貢累蒙裁減五十年復詔禮部曰朕統御寰區撫綏萬國中外一體保育維殷朝鮮國王李焞慎守封圻恪循儀度嵗時貢獻方物四十餘年未嘗少懈朕深為嘉美嘗曲示恩誼自海洋運米賑其饑饉又屢減貢獻以至甚輕但其國小地隘貢物内有白金一千兩紅豹皮一百四十二張猶恐艱於備辦嗣後將二項永停進貢又聞貢道館舍傾圯朝貢人員甚為勞瘁其令所在修葺堅固副朕嘉惠逺人至意大哉王言一哉王心豈惟藩服感恩普天率土實共聞之矣五十二年恭逢萬壽六旬正誕蒙古五十旗集金二十萬建寺慶祝王以下台吉他布囊以上自獻嵗詣闕即留止京師至萬壽禮成然後返國皇上既憫物力之艱減建寺之費念淹宿之久厚餼牽之供又親臨西苑頒賜逾涯使尚方珍異震耀於遐陬文物衣冠光華於絶域而覃恩頒詔之時别降溫㫖存問朝鮮天語藹然有若家人父子情深而文明氣盛而化神太和流於四時春風被乎萬里東連鯷長西極冉駹南接雕題北周窮髪奉冠帶祀春秋者孰不慶生逢明盛涵煦於生成之徳乎昔漢元帝時呼韓邪内附其困乏也詔雲中五原郡轉穀二萬斛給焉唐貞觀中新羅百濟竝集京師咸遣子入侍陪臣子弟得肄業太學恩徳之隆當時稱為僅見比觀於今日九邊而外要荒萬里侯王君長累百十國莫不禀正朔奉教令朝貢以時歳事不懈黜陟定於天家慶讓同於内地蓋自五帝三王以來未之有也自非皇上仁至義盡湛恩汪濊物靡不得其所亦烏能使大一統之規獨隆於千古也哉臣等才識短淺無能鋪張盛美輙紀其實以立懐柔之極則焉萬壽盛典初集卷二十五
