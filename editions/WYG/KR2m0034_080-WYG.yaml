body:
  text: 欽定四庫全書萬壽盛典初集卷八十二歌頌二十二詞臣十四萬壽詩七言律八首翰林院編修臣沈樹本聖壽昌期敞御筵羣生抃舞徧垓埏萬年永與乾坤竝六十初逢甲子全雉尾雲開迎曉日螭頭風細起祥煙班聨肅穆衣冠集遥聽嵩呼達九天其一歴代規模竝可稽吾皇盛德獨難躋學從孔孟心源接治與唐虞事業齊平地成天垂大法經文緯武惠烝黎忻瞻福曜層霄朗遥映榮光斗極西其二彤庭介壽恰深春三月韶華景象新御苑柳垂風拂徧上林花發露霑匀都緣聖澤涵濡久更覺天工長養頻大地陽和歸樂育惟將山阜頌楓宸其三帝德如天被里閭仁風時賁紫泥書年年施惠常無盡萬萬蠲租更有餘解阜歌成登壽域雍煕俗美慶安居東南今歲䝉恩廣億兆懽同在藻魚其四六合爲家撫馭遥梯山航海祝皇朝共球何止來重譯干羽欣逢格有苖永握瑶圖増赫濯長將玉燭示和調巍巍聲教宏無外聖德神功萬古昭其五新綸特沛耀奎光多士連升沐澤長廣闢虞門羅俊傑宏敷漢詔得賢良登科正値桃花暖及第還聞桂蘂香十載每逢齊慶日普天雨露煥文章其六煌煌偉烈竝豐功玉檢眞宜駿號崇廷議協和陳典禮皇心再四示謙冲虛文不尚揚休美盡職還期守敬忠讓德彌光傳遠近咸知百福集淵衷其七微臣颺拜傍金門清問曾䝉語獨温玉陛呼名新被眷鑾坡視草世承恩涓埃無可酬丹扆文字寧堪報至尊祇有趨蹌隨父老葵衷還擬獻堯樽其八萬壽詩七言截句三十首翰林院編修臣徐葆光天長地久萬年同三月春光禁苑中灼灼繁花皆獻壽聲聲啼鳥亦呼嵩其一天長地久萬年逢此日三多祝華封牛酒賜酺天下樂春來盡沐聖恩濃其二天長地久萬年邦受賀明堂啟八牕王㑹圖成重譯至聲靈遠過混同江其三天長地久萬年枝風動祥光滿玉墀高處雙棲太平雀朝朝報道太平時其四天長地久萬年暉帝德光華徧九圍掃淨欃槍同一照斗南極北盡知歸其五天長地久萬年書爲惜分隂啟石渠四庫紛羅供聖學萬幾片暇即三餘其六天長地久萬年符五嶽眞靈有瑞圖運啟中天長御極軒皇振古握乾樞其七天長地久萬年齊五曜文明聚壁奎盛世作人歌壽考春秋兩度碧雲梯其八天長地久萬年諧鐘律調成六氣佳親定九成歌舜德鏘鏘百獸舞瑶階其九天長地久萬年杯高挹南山萬福來十里花棚連御道徹雲鼓吹動春雷其十天長地久萬年春斗柄東囘拱紫宸雨露十行寛大詔普天同日沐皇仁其十一天長地久萬年君閶闔門開五色雲日麗軒圖囘北陸風隨舜瑟轉南薰其十二天長地久萬年恩鼓腹嬉遊帝力存四海同登仁壽域龎睂世世見曾孫其十三天長地久萬年安共慶昇平萬國歡寶絡珠旛迎聖節鈴聲天半玉珊珊其十四天長地久萬年間避暑常廵駐蹕山禁匾新題三十六蓬萊縹緲出塵寰其十五天長地久萬年傳慶積天潢瓜瓞綿萬歲山前稱祝後綠車千乗御堤邊其十六天長地久萬年謠擊壤衢中共祝堯宣布中和皆聖德採成樂府比咸韶其十七天長地久萬年爻布策常逢泰運交象數演成符瑞至圖書出水鳳鳴郊其十八天長地久萬年膏亘古隆恩一日叨兩稅全蠲農扈喜聲聲布榖喚東臯其十九天長地久萬年和紫塞傳來瑞應多九穗珠莖高一丈金城彌望玉山禾其二十天長地久萬年花元日蓮開兩朶霞律轉三陽先告瑞綿綿千葉比年華其二十一天長地久萬年康化俗煕煕治日昌紀號年年編玉厯􅂞環甲子數無疆其二十二天長地久萬年清竹箭黄流似鏡明夜夜榮光燭星斗赤文綠字兆平成其二十三天長地久萬年寧乍試堯階三葉蓂斗建蒼龍杓轉處直南正對老人星其二十四天長地久萬年增朝夕常如日月升歲歲史官書大有幾何巧厯算三登其二十五天長地久萬年籌海屋添來星幾周乾策六觚常在握明良一德演箕疇其二十六天長地久萬年心烏弋黄支獻國琛八表葵傾同向日海波已定指南針其二十七天長地久萬年參㑹合三才萬象含河雒淵源歸太極深宫丙夜費幽探其二十八天長地久萬年占寶厯編成葉葉添玉策探來逢再朔渾天全數合羲炎其二十九天長地久萬年函佇望登封啟玉緘功德休陳七十二巍巍獨冠泰山巖其三十萬壽詩七言律六首翰林院編修臣繆沅龍光齊慶天長久鳳厯欣看日正中三素雲邊籠瑞色五絃琴上奏薰風昭囘法象星辰麗鼓鑄隂陽造化同熈皥春臺逢盛世仰瞻閶闔共呼嵩其一三五昌期淑景呈泰符運啟泰階平偶摛玉管雲章煥載戢琱戈海宇清四象心融觀察盡六韜天授指揮成華封頌禱年年事重譯共球祝聖明其二喜起堂廉論道時文經武緯邁軒羲金莖雨露山河潤玉衮衣裳藻火垂天壽陽和三月節聖心敬愼萬年基流沙若木聲名遠王㑹車書亘地維其三區宇生成荷至仁時聞湛露出楓宸三年禹甸蠲租徧肆赦湯圍解網頻海偃鯨鯢平遠島河浮􅖽秸接通津萬方壽考歌雲漢蘂榜重開慶作人其四豳風稼穡詠艱難民事關心到玉鑾寰海福爲天子福萬方安即聖心安桑麻春長郊原滿瀛海波流惠澤寛億載光華歌復旦羣看紫氣五雲端其五觚稜宫闕接郊坰祝聖香煙繞户庭天漢乾符輝瑞冊日車芒采耀仙蓂三霄樹色融青黛萬疊山容列翠屛南極寶躔齊湧現微垣光聚老人星其六萬壽詩七言律四首翰林院檢討臣阿爾賽鶯花三月鳳凰城繞電流虹祝聖明芝草芬芳連蓂莢景星爛熳映長庚九天閶闔陳仙樂萬國衣冠獻壽觥金闕玉階盈紫氣方知人世有蓬瀛其一軼後超前帝業隆綿綿厯數慶時雍圖書悉闡千秋上疆索全收六合中賢路恢張宏睿鑒民情纎悉徹宸聰難酬宵旰勤勞意天錫禎祥萬福同其二昌期歲歲喜晴和綺麗都城錦繡多煕皥有天皆樂國汪洋無地不恩波燈開火樹鸞笙奏香繞雲堤鳳輦過萬斛春光收不盡宫鶯銜上萬年柯其三物阜民安壽域開鳳儀鶴舞下瑶臺三多華祝千祥集萬歲嵩呼五老來日麗中天光煥爛星明南極象昭囘微臣敬獻升恒頌遥聽歡聲徧九垓其四萬壽詩七言律四首翰林院檢討臣阿金寶厯長臨道益崇昌期位育與天同化成二典三謨上德溥諴民阜物中華渚翔虹開壽國青雲干律鼓條風苞符競效登王㑹鳳舞麟遊聖治隆其一龍飛玉厯正綿綿神策軒臺紀大年聖節長春恒祝華璇圖花甲始周天平成峻業超千聖浩蕩殊恩被八埏共覩禎符書出洛榮光長繞御爐煙其二仁覃薄海治功成壽獻三春泰宇明五色雲中朝太皥九重天上燦長庚花迎紫氣呼嵩色玉振青陽擊壤聲永慶添籌齊泰華萬齡寶籙譜昇平其三門開閶闔慶三辰聖壽祥徴億萬春五福雲臻交泰世九門星拱獻琛人膺圖寰海河山固合樂鈞天歲月新竊喜葵忱依陛切得隨岳頌拜楓宸其四萬壽詩七言律四首翰林院編修臣徐斌賡颺齊獻九如詞萬歲千秋拜舞時北闕卿雲元有象南山仙露本無私升恒慶溢長庚座喜起榮霑太液池一統泰階綿寶厯鵷班濟濟肅朝儀其一萬國車書奉帝州瞻天獻壽覲龍樓波臣競進珊瑚樹譯使爭呈翡翠裘干羽森張昭聖武邊庭綏靖顯宸猷殊方到此霑恩幸航海梯山未足酬其二五十餘年聖澤深六旬周甲喜初臨陳詩每悉艱難隱解網常存赦宥心博採淵珠魚在藻宏開蘂榜鶴鳴隂欲從久道知仁壽旰食宵衣直至今其三萬年枝上好春光爲報佳辰出禁牆花撲霞觴飛錦繡鳥翻霓羽奏笙簧天生至德韶華富人樂純禧景運昌寰宇歡騰皆壽域嵩齡歲歲頌無疆其四萬壽詩七言律六首翰林院編修臣戚麟祥虹流電繞屆長春億萬斯年始六旬一甲初周天未午五陽正泰斗加辰寰中河嶽呈天瑞海外梯航頌聖人德愈恢宏心愈惕年年歡忭溢臣民其一鳴玉階墀靄瑞煙鴻符寶厯正綿延鶯花各占舒長日麟鳳同遊長養天嵩頂呼曾傳漢代華封祝亦紀堯年詎知宥宻基天命要在周書無逸篇其二六宇懽聲徹帝廷扶攜老幼祝堯齡休徴百福歸皇極月建三春紀壽星棫樸宏開雲漢麗笙歌遥沸海山青羣工漫進千秋鑑聖德神功括六經其三長年珥筆侍鸞坡拜慶今從鵷鷺過半月前人修上已浹旬後佛浴清和九重階上簫韶曲萬歲聲中天保歌億兆臣民䖍願望封人祝應嫓三多其四閶闔晨開繖影黄萬邦黎庶頌無疆桃花水暖澄仙液楊栁風和接御香大衍數重分二策貞元運轉起三皇無邊喜氣騰霄漢莫羨瑶池遠介觴其五桑麻萬里慶昇平累洽重煕久道成得一自同天地壽呼嵩聊展子臣情家書貝葉稱無量户􅅡旃檀祝上清但見升恒如日月巍巍聖德總難名其六萬壽盛典初集卷八十二
