body:
  text: 欽定四庫全書萬夀盛典初集卷十一典禮二鑾儀一康熈五十二年三月十七日甲午上自暢春園還宫設鹵簿大駕乘凉歩輦時逺方臣民結綵棚慶祝萬夀夹道數十里咸得瞻依儀仗仰覲天顔慶為希遘焉三月十六日鑾儀衛啓奏本月十七日皇上進宫時將凉歩輦備於正門前自景山西門坐轎進神武門入宫擡輦校尉𣲖作十班鑾駕自暢春園正門起擺至西華門外止立於兩邊皇城下玊輅等輦及駝寶象亦預先在皇城下逺逺擺立又奉㫖朕十八日駕行鑾駕既擺殿前駕行時恐擺不及停其擺設欽此出外鑾駕殿前不擺駕行時擺設預備十六人亮轎等因繕摺交與奏事治儀正儍子員外郎雙全等轉奏奉㫖依議大駕鹵簿先開路象四分列道左右次寶瓶象五繡韂金鞍上負寶瓶道左右各一中道一又左右各一次大馬輦一乗高一丈二尺五寸九分濶八尺九寸五分輦上平盤板前後車櫺并雁翅及四垂如意滴珠板其下轅三條皆硃紅漆轅各長二丈五寸九分用鍍金銅龍頭龍尾龍鱗葉片裝釘前施硃紅油馬搭攀皮一條平盤左右下䕶泥板及車輪二貫軸一每輪輻十有八條皆硃紅漆周圍輞全各以抹金鈒花銅葉片装釘輪内車心各一用抹金銅鈒蓮花瓣輪盤裝釘軸首左右各用銕挿拴一箇以抹金銅鈒龍頂管心裝釘軸中纒黄絨駕轅等索面至地三尺四寸五分輦亭高六尺四寸九分硃紅漆四柱各長五尺五寸四分檻座高九寸五分其上四周木雕沉香色描金雲板十二片其下亦如之門髙五尺九分濶二尺四寸五分左右門濶二尺二寸五分前并左右各槅二扇後槅三扇明栨全皆硃紅漆抹金銅鈒花葉片裝釘槅心編黄線縧穿亭内編黄線縧穿硃紅漆匡軟座黄線墜座大索四條座下蓮花墜石軟座上施素毯草席并紅織金綺褥硃紅漆座椅一座其上靠背雕沉香色描金雲龍一下雕雲板一片硃紅漆黄織金綺鞔福夀板一并衣椅中黄織金綺靠坐褥四圍椅裙全周圍施黄綾幃幔亭外用青綺緣邉硃紅簾十扇各用拽簾圓縧二條黄銅圏全輦頂并圓盤高二尺六寸五分又鍍金銅蹲龍頂帶仰覆蓮座高一尺二寸九分垂攀頂黄絨索四條盤上下俱硃漆以青飾輦盖内寶盖硃紅漆木匡鬭以八頂冒以黄綺謂之黄屋頂心并周圍繡五彩雲龍九天輪三層皆硃紅漆上安雕木貼金龍耀葉板計八十一片三層間繪五綵雲襯板八十一片盤下周圍黄銅裝釘上施金黄綺瀝水三層每層八十一摺間繡五彩雲龍文四角垂青綺絡帶四條各繡五彩雲升龍三圓盤四角連輦座板用攀頂黄線圓縧四條并貼金木魚輦亭前一字闌干一後一字帶轉角䦨干一左右䦨干二内嵌縧環板皆硃紅漆四扇計一十四柱各柱首雕木貼金蹲龍一用描金五彩粧蓮花抱柱闌干内施素毯草席太常旗二靣在輦亭後左右用黄雲縀夹為旗每靣十二斿每斿内外繡升龍一硃紅漆攢竹旗竿二左竿旗腰繡日月北斗竿首用鍍金銅龍頭右竿旗腰繡紱字竿首用鍍金銅㦸每竿綴抹金銅鈴二垂紅纓十有二纓上施抹金銅寶盖下垂青線帉錔踏梯一木質硃紅漆以抹金銅鈒花葉片裝釘行馬駕二木質硃紅漆上穿黄絨匾縧以抹金銅鈒花葉片裝釘硃紅油合扇梯一副硃紅油拓义一件駕白馬八匹鞍韉鞦轡鈴纓全列道左小馬輦一乘高一丈一尺五寸九分濶七尺九寸五分轅二條各長一丈九尺五分輦亭髙五尺五寸九分硃紅漆四柱各長五尺四寸五分檻髙一寸四分上四圍雕沉香色描金雲板十二片下如之門髙五尺濶二尺二寸五分左右門濶二尺一寸九分前并左右各硃紅漆槅二扇明栨全抹金銅鈒花葉片裝釘槅心編黄線縧穿後硃紅漆屏風雕沉香色描金雲龍五沉香色描金雲龍縧環板三雲板三周圍俱抹金銅鈒花葉片裝釘亭底硃紅漆板上施素毯草席紅織金綺褥坐椅上靠背雕沉香色描金雲龍一下雕雲板一片硃紅漆福夀板一并衣椅中黄織金綺靠坐褥四圍椅裙全周圍施黄綾幃幔亭外用青綺緣邉硃紅簾四扇各用拽簾黄線圓縧二條黄銅圏全輦頂并圓盤高二尺五寸五分又鍍金銅寶珠頂餘制同大馬輦駕白馬四匹列道右次玉輅一乗高一丈三尺九寸五分濶八尺二寸五分輅上平盤前後車櫺并雁翅及四垂如意滴珠板其下轅二條皆硃紅漆轅各長二丈二尺九寸五分鍍金銅龍頭龍尾龍鱗葉片裝釘前施硃紅油象搭攀皮一條平盤左右下䕶泥板及車輪二貫軸一每輪輻十有八條皆硃紅漆周圍輞全各以抹金銅鈒花葉片裝釘輪内車心各一用抹金銅鈒蓮花瓣輪盤裝釘軸首左右各用銕挿拴一箇以抹金銅鈒龍頂管心裝釘軸中纒黄絨駕轅等索靣至地四尺一寸五分輅亭髙六尺七寸九分硃紅漆四柱各長五尺八寸四分前二柱有瀝粉貼金升龍檻座髙九寸五分門髙五尺一寸九分濶二尺四寸九分左右門濶二尺二寸五分其上四周裝雕木沉香色描金香草板十二片前并左右各硃紅漆槅二扇明栨全俱以抹金銅鈒花葉片裝釘槅編黄線縧穿後硃紅漆屏風上雕沉香色描金雲龍五屏後下三槅雕木沉香色描金雲龍三下雕雲板如其數俱抹金銅鈒花葉片裝釘亭内編黄線縧穿硃紅漆匡軟座黄絨垂座大索四條座下蓮花墜石軟座上施花毯草席并大紅織金綺褥硃紅漆坐椅一座其上靠背雕以沉香色描金雲龍一下雕雲板一片硃紅漆福夀板一并衣椅中黄織金綺靠坐褥四圍椅裙全周圍施黄綾幃幔亭外青綺緣邉硃紅簾一十扇各用拽簾黄線圓縧二條黄銅圏全輅頂并圓盤髙三尺一分又鍍金銅蹲龍頂帶仰覆蓮座髙一尺二寸九分垂攀頂黄絨索四條盤髙二寸上以硃紅漆其下外四靣沉香色地描金雲青飾輅盖亭内周圍貼金斗拱承硃紅漆匡寶盖鬭以八頂冒以黄綺謂之黄屋頂心并周圍繡五彩雲龍九天輪三層皆硃紅漆上安雕木貼金龍耀葉板八十一片三層間繪五彩雲襯板八十一片盤下周圍黄銅裝釘上施金黄綺瀝水三層每層八十一摺間繡五彩雲龍文四角垂青綺絡帶四條各繡五彩雲升龍三圓盤四角連輅座板用黄線攀縧四條併貼金木魚輅亭前有左右轉角闌干二扇後一字帶左右轉角闌干一扇皆硃紅漆内嵌雕木貼金龍間以五彩雲三扇計一十二柱各柱首雕木貼金蹲龍一及描金五彩粧蓮花抱柱闌干四周布花毯草席太常旗踏梯合扇梯拓义俱同輦制引以一象貼金銅寳瓶并木雕貼金仰覆蓮座雕花番草貼金象鞍鞦轡氊籠全列道左大輅一乗制同玉輅惟平盤下方箱四面硃紅漆匡前後十有二槅内飾青地繪五彩雲鶴左右八槅内飾上青下緑地繪獸六麟獅犀象天馬天鹿禽六鸞鳳孔雀朱雀雉鸐輅亭前二柱戧金雲龍文下山水亭後硃紅漆屏風屏前上三槅雕沉香色描金雲龍五上硃紅漆板戧金雲龍一中三槅沉香色描金龍三下三槅描金雲板如其數屏後上三槅硃紅漆戧金龍三其次戧金雲板如其數中三槅硃紅漆戧金龍四其次沉香色描金雲板亦如其數下三槅沉香色雲板亦如之其制為稍異引以象一列道右次静鞭四校尉執之道左右各二次紅燈一對紅油竹燈􅇧銅盤外以紅紗䝉之硃漆竿貼金龍頭尾次鼔二十四面木匡紅油冒以革面徑一尺五寸五分面匡俱泥金描畫五彩雲龍硃紅攢竹架紅縀鼓衣緑縀瀝水銷金雲龍次金二面以銅為之徑一尺八寸次杖鼓四面木匡髙一尺六寸五分黑漆泥金描畫寶相花面徑一尺冒以革畫五色渠花銕圈銅鉤連以黄絨綆紅縀鼔衣緑縀瀝水銷金雲龍次板四串花梨木板各六長一尺四寸厚五分上濶二寸五分下濶二寸八分板面泥金畫五彩雲龍緑皮掩錢黄線縧繐次龍頭笛十二管截竹為之六竅長一尺七寸繋五色線流蘇次紅燈一對制同前次金二面次鼓二十四面次畫角二十四枝木質空心長五尺四寸六分徑三寸六分上下貼金銅口箍中間纒貼金藤箍五黑漆地泥金畫雲龍海馬四季花次金鉦四面銅質木匡銅環黄絨綆繋鉦於匡鉦徑九寸五分次小銅號八枝筒長二尺三寸五分座髙一尺九寸五分口徑四寸二分繋紅黄線縧繐次大銅號八枝筒長一尺七寸五分座髙一尺三寸口徑六寸三分繋紅線縧繐次紅燈一對制同前次金鼔旗一對黄質中銷金為滿漢金鼔字次肅靖旗一對黄質長四尺五寸濶七尺五寸中銷金為滿漢肅靖字紅油薰竹竿長一丈五尺一寸五分間纒以藤下用銕箍上用鍍金銀頂飾以紅纓自此至五色龍纛其竿頂纓頭尺寸款式俱同惟北斗旗用黑纓頭執旗校尉俱紅花袍歩行下同次御杖一對硃漆攢竹為之長六尺八寸五分兩頭貼金銅箍各長一寸六分自開路象至此是日先陳列西安門外次笓頭四對以竹為之硃漆柄飾黄油長五尺三寸濶三寸執事人俱紅花衣下同列為四隊凡二對以上每對為隊次吾杖一對攢竹為之硃紅漆瀝粉貼金花雲二叚長七尺七分兩頭貼金銅箍各長一寸八分次立瓜三對硃漆攢竹竿貼金銅箍刻木為瓜立置於上承以龍頭共長七尺二寸瓜及龍頭長七寸三分貼金飾次卧瓜三對制同立瓜但以瓜卧置其上承以龍頭共長六尺九寸二分瓜及龍頭長五寸五分次星三對硃漆攢竹竿長六尺一寸貼金銅箍星頭刻木為六瓣玲瓏香草承以龍頭星頂及龍頭長一尺一寸六分六角粘星珠貼金飾次金鉞三對硃漆攢竹竿貼金銅箍刻木為斧形承以龍頭置於竿首上出鎗頭八寸五分共長八尺八寸四分内斧及鎗頭長一尺七寸五分貼金飾次青小旗二對藍質銷金雲龍文濶三尺三寸長二尺五寸攢竹竿銕䂎共長九尺六寸五分畫三色金龍上安鍍金鎗頭長一尺一寸外用鎗冐長一尺三寸黄油地畫五色雲龍飾以紅纓次赤小旗二對紅質次黄小旗二對黄質次白小旗二對白質次黑小旗二對皂質制俱同青小旗次白澤旗一對紅質長六尺六寸濶二尺九寸銷金為白澤一飛形一走形及滿漢白澤二字次門旗四對紅質中銷金為滿漢門字餘同白澤制次日旗一面藍質銷金為日形及滿漢日字月旗一面藍質銷金為月形及滿漢月字次風旗一面藍質銷金為箕星四及滿漢風字雲旗一面藍質銷金為雲文及滿漢雲字次雷旗一面藍質銷金為雷文及滿漢雷字雨旗一面藍質銷金為畢星八附耳一星在旁及滿漢雨字次木星旗一面青質銷金為木星一及滿漢木字火星旗一面赤質銷金為火星一及滿漢火字次土星旗一面黄質銷金為土星一及滿漢土字次金星旗一面白質銷金為金星一及滿漢金字水星旗一面黑質銷金為水星一及滿漢水字次角宿旗一面銷金為角宿二及滿漢角字自此至軫宿旗皆藍質亢宿旗一面銷金為亢宿四及滿漢亢字次氐宿旗一面銷金為氐宿四及滿漢氐字房宿旗一面銷金為房宿四鉤鈐二小星在旁及滿漢房字次心宿旗一面銷金為心宿三及滿漢心字尾宿旗一面銷金為尾宿九神宫小星一及滿漢尾字次箕宿旗一面銷金為箕宿四及滿漢箕字斗宿旗一面銷金為斗宿六及滿漢斗字次牛宿旗一面銷金為牛宿六及滿漢牛字女宿旗一面銷金為女宿四及滿漢女字次虚宿旗一面銷金為虚宿二及滿漢虚字危宿旗一面銷金為危宿三及滿漢危字又四星在下次室宿旗一面銷金為室宿二離宫六星在旁及滿漢室字壁宿旗一面銷金為壁宿二及滿漢壁字次奎宿旗一面銷金為奎宿十六及滿漢奎字婁宿旗一面銷金為婁宿三及滿漢婁字次胃宿旗一面銷金為胃宿三及滿漢胃字􅄧宿旗一面銷金為􅄧宿七及滿漢昴字次畢宿旗一面銷金為畢宿八附耳一星在旁及滿漢畢字觜宿旗一面銷金為觜宿三及滿漢觜字次參宿旗一面銷金為參宿七玉