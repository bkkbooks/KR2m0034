front:
  text: 欽定四庫全書萬夀盛典初集卷六十八
  hash: sha256:2ec652f00084d00b105d90242c0e0bbc884fae3e51d4357179f581a336ba0883
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0034_WYG_066-1a, image: WYG0654/WYG0654-0009c.png}
body:
  text: 歌頌八南書房諸臣萬夀無疆詩有總序日講官起居注翰林院侍講學士臣勵廷儀日講官起居注翰林院侍講臣蔣廷錫日講官起居注司經局洗馬掌局事兼翰林院修撰臣張廷玉左春坊左中允兼翰林院編修臣陳邦彥日講官起居注翰林院修撰臣趙熊詔翰林院庻吉士臣王圖炳臣聞膺圖受籙大徳有禄夀之符介祉凝祥至聖著久長之效詩稱嘉樂命自天申書紀休徴福由皇建華封獻三多之祝豳土進七月之觥卷阿矢詠於鳳鳴江漢揚休於虎拜雖如天幬覆莫罄形容而率土謳吟聊伸颺頌欽惟皇上執中表正得一居貞心傳溯無極之先治行合太和之本初登寶厯即以民胞物與為心廣運旋樞遂臻久道化成之業朝咨夕儆勤宵旰於五十二年北燮南諧奏昇平於千八百國兹當三月中旬恭遇六旬萬夀厯周花甲時際陽春栁拂桃迎擁千官之劍珮霞明風暖集萬里之共球番髮龎睂扶鳩笻而拜闕山農澤賈頌燕喜以呼嵩含生禀氣之倫無逺弗屆出日無雷之域不召而来壤擊衢歌鈞天竝奏仙音佛號匝地同聲臣等職在文章分宜揚扢身依禁近誼得賡歌竊見乾行不息皇上體之以自强坤合無疆皇上法之以厚載固天亶之獨異尤聖學之加崇探精一於唐虞啓苞符於河洛圜丘仰荅誠格而上帝居歆淮浦遙臨時邁而川靈效順規模宏逺遵祖憲以貽謀寢膳周詳永孝思而錫類祀先農於泰畤朱火升中進田畯於春疇青旗行野寛文解網人樂堯天復賦蠲租民安禹甸恩覃一十五省徳垂千萬億年底定三方鯨鯢盡掃㑹同重譯雞鹿咸庭志在安綏故有征而無戰師行仁義故近悦而逺来握成算於帷幄之中播神威於寰宇之内止戈為武夀考作人璧水芹宫勒千秋之寳訓桂林杏苑開萬夀之恩科振鷺充庭羅来逸鳯霧魚騰水搜及雕蟲凡兹多士之造徳成材悉由聖主之尊經稽古曲阜修九拜之禮朱子躋十哲之班振玉摐金直接尼山統緒參天兩地深探羲畫淵源理得而數兼該乗除參九九之秘氣和而聲始達律呂調六六之元既徳性之内充自英華之外煥典謨渾噩與雲漢昭回詩易奇葩竝日星輝映龍鶱鳯翥備八法於鍾王露潤珠圓得三昧於虞褚勅幾稍暇肆力五車廵幸偶閒遊心四庫雕鐫琰琬禹山金碧之藏勘校蟲魚蓬闕琳琅之府淵深帝學莫殫名言洵乃武而乃文亦可大而可久皇上雖虛懐若谷而謙尊彌光蒼穹之景命方新黎庶之歌謡倍切臣等身値昌期生逢夀世光輝南極中天之甲子初周環拱北辰元㑹之干支復始重城不夜燭照無邊四海皆春太平有象敬承五夜維祺之願共抒萬年祝嘏之心春秋逺過八千復紀天皇之嵗厯數比隆三五重開軒后之圖竊效風人載賡周雅各成七律六章拜手稽首以獻日講官起居注翰林院侍講學士臣勵廷儀祥開聖節慶昌辰巷舞衢歌率土濵運紀上元方復始年周甲子又重新太平有象人多夀大造無私物自春徳教覃敷宏錫類由来至治在尊親其一南極常同北極光珠聨璧合燦雲章天心祇若羲爻著祖訓凝承帝道昌仁夀億齡開景運韶華三月正當陽維皇定叶蒸民願永錫繁禧主萬方其二天南漠北振琱戈六合俱安保太和格被總由堯徳峻平成共識禹功多時豐更免三年稅化洽重開萬夀科曠典古今眞極盛詞臣書頌細編摩其三文修武偃洽神功聖治光昌夲聖躬履盛鳴謙辭顯號居豐示儉喜卑宫萬幾總攝精神裡八表都歸度量中久道化成臻上理時勤宵旰仰宸衷其四芹獻葵誠徧九垓梯航迢逓到蓬莱爭傳鶴髪呼嵩侶許覲龍顔進夀杯人慶三多歸帝徳户增萬億樂春臺共言四海昇平福都自堯咨舜儆来其五垂恩錫嘏慶成時斂福皇躬百事宜嘉穀瑞徵三秀草芳蘭叢繞萬年枝無疆聖夀便蕃頌有喜天顔逺近知孰罄涓埃禆海嶽轉因華祝溥鴻慈其六日講官起居注翰林院侍講臣蔣廷錫卿雲五色䕶皇居花下千官頌九如南斗正中三月節海籌方攬一廵初瑶池紫氣浮松牖金闕祥光接玉除蕩蕩無名難載筆勲華二典紀虞書其一聖文聖武貫三才宇宙中間徳澤該日月星辰隨律轉東西南朔驗風来九州全賦周輪免兩榜恩科次第開天錫太平仁夀主歡呼嵗嵗頌臺莱其二天縱猶勤翫韋編健行聖徳日乾乾心通律呂隂陽内道契圖書象數先周禮三千條實政虞廷十六字眞傳庶民敷錫歸皇極鑿井耕田樂萬年其三至治神功古莫如應從泰岱勒璠璵玉函不受登封頌金鏡常繙治世書有識羣生皆踴躍無私大造本謙虛試聽五嶽齊呼處蒼翠山光望屬車其四膏澤涵濡八表同百年樂育太和中鸞書宣布開黄道鳩杖扶擕拜紫宫入昴遊河呈洛瑞躋堂稱兕繼豳風一人一嵗增君夀萬老春秋集聖躬其五小臣濫直近楓宸蠡管粗能仰帝鈞敬止功夫隨處見光眀徳業與時新姚虚虹繞年當甲華渚星輝月値辰拜手幸隨鵷鷺後遥瞻蓬閣祝松椿其六日講官起居注司經局洗馬掌局事兼翰林院修撰臣張廷玉欣逢聖節共呼嵩瑞靄青陽淑景融六合梯航重譯貢兩階干羽萬年功乾行不息天同健泰運方隆日正中咸仰垂衣臻上理四時洋溢太和風其一化成久道治功深帝徳巍巍冠古今海晏河清天子澤宵衣旰食聖人心好生頻見恢湯網解慍時聽鼓舜琴屏謝虚文崇實政謙光中外仰宸襟其二睿慮周詳徧八區恩膏何地不霑濡已看荒徼皆登榖更喜豐年屢賜租域外山川歸禹服田間耕鑿盡堯衢諸蕃絡繹彤墀下王㑹圖成自古無其三聖學淵微逹性天猶勤探索向芸編圖書道闡千秋上象數心通一畫前至治雍熙金石播鴻章璀璨日星懸廷臣拜手賡仙藻盡是箕疇錫福篇其四華渚流虹瑞應開星明南極亘昭回絳霄歌吹千門曉白叟歡呼萬里来湛露無邊滋草木卿雲有象繞蓬莱羣生共荷君王賜仁夀休風徧九垓其二薄海車書奉紫宸衢歌巷舞慶昌辰普天共樂舒長日大地都成浩蕩春帝夀萬齡周甲始韶華三月逐年新微臣珥筆霑恩渥願效華封祝聖人其六左春坊左中允兼翰林院編修臣陳邦彥閶闔晨趨拜舞同昇平嘉慶記流虹天開寳厯羲軒上人在春臺位育中蓂吐堯階迎瑞日籌添海屋祝喬松萬方共慰稱觥願近覩祥雲一朶紅其一重巽溫綸取次宣茅簷蔀屋總熙然體元聖化三光應圖治宸衷五夜傳浩蕩恩波淪大地舒長化日樂中天歌衢擊壤喧童叟漫説陶唐癸巳年其二欣從歌叙慶功成甲子重開樂太平景福多隨仙籙永嵗星遥拱帝垣明陳詩拜表千官頌就日瞻雲九土情誰識大君宵旰意本来乾健協天行其三金爵觚稜曉露漙日華浮動五雲端花隂轉午彤墀麗麥浪摇春繡壤寛譜叶虞絃宣玉軫圖成禹㑹寫冰紈八方共樂皇猷逺雁塞鯨波久奠安其四西山翠色儼蓬莱豫順眞同出地雷澤物瀛波通灌注作人雲漢仰昭回蟠桃初結三春實仙醖同斟萬嵗杯藪鳳郊麟胥應瑞菶萋隨處沐恩栽其五露濡雨潤普皇慈天上恩波動植知社鼔村觴人盡夀嵩呼華祝慶相隨翻階翠草金芝長捧日彤雲玉葉垂累世滋培難報稱抽毫先誦九如詩其六日講官起居注翰林院修撰臣趙熊詔雲開閶闔日中天臣庶嵩呼玉陛前三月三春方履泰六旬六甲正乘乾軒皇厯算周初度夏后書疇錫大年盛事直超千代史拜颺敢進九如篇其一天經地義藴皇衷六十年来孺慕同手定鴻圖兼創守心承家法每謙冲三朝謨烈光千載萬國尊親奉兩宫大孝徳隆膺上夀虞琴長是播薫風其二五紀垂衣化日長太和元氣本無疆蠲租分嵗周星野解網囘春滿棘廊天自好生君合徳帝惟仁夀厯增祥龎睂白叟霑恩久傳語雲孫戴聖皇其三至治光華與日新健行不息體天眞勅幾陶鑄唐虞典游藝窮探河洛津旰食宵衣時儆惕龍顔鳳表倍精神由来夀考惟無逸喜卜吾皇億萬春其四物阜民豐久化成深宫保泰更持盈尚衣浣濯頻供御玉食珍竒盡却呈祇為聖心常惜福可知儉徳是長生海籌添値歸餘嵗餘慶年年介夀觥其五昇平典禮煥丹霄手詔重頒戒百僚愛日但將忠孝盡祈天惟在雨𤾉調君王不貴陳諛頌草野何能祝聖朝聽取同聲呼萬嵗微臣珥筆採衢謡其六翰林院庶吉士臣王圖炳華甲星周祝聖君彤庭玉座氣氤氳西池算永添雙莢南極祥開匝五雲疇紀洛書尊禹錫壤歌衢野戴堯勲三春上夀觥觩洽靄作陽和萬象欣其一旰食宵衣講幄開羲爻精奥闡蘭臺乾坤動靜涵心學元㑹綱維揭睿才藻火文章騰碧漢松雲户牖儼蓬莱聖人自有長生訣金鑑千秋介玊杯其二垂裳端拱仰揮絃瑞玉眞應泰岱鐫朝野請求章屢上廟堂謙讓詔頻宣三才治法參天地二典勲華足信傳峻徳崇功書不盡賡揚拜手萬斯年其三慶善宫中七徳陳萬方送喜萃昌辰層城錦繡鋪瑶席重譯梯航貢瑞珍百福貞恒歸黼扆億齡仁夀育蒸民卷阿齊進昇平頌梧䕃深霑侍從臣其四六十年来化澤濡華胥風俗極歡娱士邀特典重升俊民被洪恩盡賜租海表山川開夀域寰中日月照仙都誠孚蒼昊方儲祉天姥来庭早授圖其五濫隨芸局捧龍編筆紀流虹貫昴年揆覽九重星拱極乾行五位日中天薄材總荷洪爐鑄寳籙綿垂象鼎傳欲罄葵忱歌在藻宫花嵗嵗傍瓊筵其六萬夀盛典初集卷六十八
