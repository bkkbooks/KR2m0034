body:
  text: 欽定四庫全書萬壽盛典初集卷六十六歌頌六大臣五敬頌萬壽詩五言排律十二韻原任經筵講官吏部右侍郎兼翰林院學士致仕臣仇兆鰲元后星周始陽和大慶頻海山呈瑞異郡國集臣鄰耳順聰逾達心澄悟入神經筵實學懋黼座讜言陳盛世昇平乆分年蠲赦均舉安尤厲治同樂豈忘民弗事嵩華頌惟期豐樂臻淵衷何抑抑國運倍振振浙水容肥遯鄞江許隱淪金丹顔色駐宫扇恵風親欲得長生訣䝉頒至寳珍蕪詞歌下里三祝比封人萬壽無疆頌有序原任内閣學士兼禮部侍郎纂修歴代紀事年表臣王之樞皇帝御極之五十有二年嵗在癸巳春三月恭逢聖夀六旬於是時也地平天成大化翔洽薄海内外含生之衆熙熙焉皥皥焉羣遊於太和之世而我皇上愛養元元之心至深且切未饑也而思食之未寒也而思衣之田賦頻蠲動逾萬萬又自康熈五十年始以次全免天下地丁三載一周東西朔南固人樂康衢户賡天保矣若我皇上加意官常則法廉交儆留心造士則涵育熏陶剔穴捜巖恩尤隆渥兹於三年鄉㑹常試外特増萬壽科文武竝舉仍著為例十年一行誠千載希遘之曠典也且自我皇上討定三逆以来海隅共服皇猷天末羣欽廟畧至厄魯特噶爾丹恃其險逺怙惡不悛斷自宸衷親統六師以平之西北萬里大小屬國俱獲袵席之安以及東南域外諸蕃莫不輸誠入貢重譯来王效嵩呼而恐後猗歟盛哉於是諸王大臣稽首九重請上尊號以塞中外臣民之望勤勤懇懇至再至三而我皇上謙冲秉徳欿然自下特降􅃯諭謂君天下之道惟以實心為夲實政為務誇功徳加尊號以取虚名無益治道諸王大臣祗聆徳音悚惕弗勝交相謂曰我皇上至誠無息博厚髙明古無與侔是即膺鴻號以樂純庥誰曰不宜乃猶堅辭弗受臣等惟有仰體聖訓以儆以勉於萬斯年長奉昇平之至治爾矣臣之樞伏而思曰自古帝王如唐虞夏商周歴年永而在位久者有之而幅員逺遜今日之廣漢唐宋元明歴年永而在位久如唐虞三代者已鮮而徳業復逺遜今日之隆至我皇上以天縱之聖益以日新之學凡六經羣史以及象數厯律詩賦書射之藝罔不究其精㣲造其極至今陽秋周甲猶手不釋卷務抉性天之奥重道崇儒以君兼師則自生民以来誠為帝王之極軌也文言曰君子學以聚之問以辨之寛以居之仁以行之君徳也我皇上之徳極其至我皇上之學極其至也中庸曰故大徳必得其位必得其祿必得其名必得其夀我皇上徳極其至所以諸福畢集受天眷佑而聖壽遂與天齊也周之先曰豳其民忠愛其君之甚故七月之詩有曰躋彼公堂稱彼兕觥萬壽無疆周宣王時召穆公旣平淮南受王䇿命詩人美之以為人臣受恩無可報謝惟言使君夀考而已故江漢之詩曰虎拜稽首天子萬年况我皇上御中外一統之世文徳武功蟠天際地凡兹臣庶盡戴生成夫豈風雅所稱得以同日而語而臣之樞猥以章句小儒仰荷主知累加拔擢早厠綸扉雖家居猶給筆札異數殊榮涓埃未報其可以弇陋不文謝風雅而忘揚扢哉謹隨遐邇臣民所共願抒葵藿傾向之寸心拜手稽首撰萬夀無疆頌以獻其詞曰於惟我后厯綿鳯紀溯自流虹聿周甲子九譯来王八方同軌衢歌巷舞以介繁祉其一封人稱夀福與之匹載徴五福兼曰好徳聖徳日躋乾行無息稽古帝王何美勿集其二罔知帝力擊壤興謡我后恭讓徳如唐堯敬天勤民宵旰忘勞瞻雲就日四序長調其三至諴感神事親惟順我后純孝徳如虞舜萱舒蘭殿承歡以敬南風載譜阜財解慍其四九河既道孔修六府我后神智徳如夏禹灑沉澹災罔非樂土平成之功巍巍萬古其五用人惟已立賢無方我后好士徳如商湯典廣闢門鳯集髙岡臨軒親試特逹圭璋其六恵鮮鰥寡懐保小民我后怙冒徳如周文常平既裕求莫時廵蠲租賜復世徧如春其七無競維烈永綏六宇我后懐逺徳如周武三臨朔漠隂山振旅柝罷玉門中邦如堵其八天降下民作君作師厥統既分我后一之外王内聖學復孶孶登三咸五獨贊兩儀其九惟學靡倦惟徳彌長心周萬里太和洋洋山川草木發為榮光一人有慶彌熾而昌其十萬邦作貢四海為家符瑞奚陳金玉非華人情忭豫天意休嘉漏遲春晝醴進流霞其十一千官濟濟嵩呼恐後賡歌松柏大椿竝茂天欲增髙地欲增厚㣲臣抒悃以頌聖壽其十二萬夀頌有序原任内閣學士兼禮部侍郎臣顧悅履臣聞惟天誕聖以佑民必篤祜多方以著靈長之慶惟聖繼天而立極必自强不息以昭茂對之符是以祝三多於華封語從其質歌九如於天保詞尚其文葢徳盛而百福畢臻化成而大美咸集理無不驗效有攸全欽惟我皇上治懋勲華道傳精一秉剛健中正之徳裕聖神文武之猷敷政寜人日深其乾惕體元御宇時厪其疇咨奏三㨗於采薇修兩階之舞羽則武功赫也攷藝文於冊府闡理學之淵源則文教彰也瞻龍翔鳯翥之宸章函天蓋地誦玊振金聲之聖製冠古型今官方有箴班聨清矣而更重封疆之選士行有訓宫牆肅矣而尤嚴衡鑑之司河水安瀾仰皇謨而底定版圖式廓欣天運之熾昌廣恤下之仁而溫綸大播宏好生之徳而解澤旁敷軫念農功萬國之雨暘入告勤求民隠九秋之斂穫其咨重蓋藏則一省而蠲租者數載宏博濟則三年而賜復者一周膏露霑濡浹於茅簷蔀屋仁風煦拂極於海澨山陬安愈圖安一人獨勞而萬民共享其逸治益求治羣臣不易而至尊先任其難推兢業之天心雖海晏河清不欲隆稱夫瑞應合尊親之衆志即衢歌巷祝莫能仰荅夫髙深澤媚山輝忻遇陽春之令序風和景麗恭逢聖誕之嘉辰花甲初周率土上升恒之頌靈椿正茂敷天抒拜舞之忱慶今兹之五十二年恩流九域覩方来之萬八千嵗厯竝三皇白叟黄童爭扶携而嵩呼闕下窮荒絶漠咸重譯而雀躍堦前南極星輝燭榮光於閶闔條風律應飄仙樂於鈞天雲漢昭回曠典開而多士常親壽域燠寒時若豐年兆而羣生同躋春臺闢百王未有之模錫萬禩無涯之福此真熙熙皥皥億兆之所難名蕩蕩巍巍羣工之所莫贊者也臣悅履職叨侍從躬際昌期昔伏衡廬共黔黎而頌祝今依廷陛瞻紫氣以趨蹌慶聖夀之綿長情深燕喜覲天顔於咫尺心切葵傾謹拜手稽首而進頌曰皇帝建極膺圖受命運啟中天授時齊正允釐百工撫綏九有至貴至尊得名得夀聖徳髙深乾行坤載恭黙凝神包函宇内聖功巍煥績底平成體元贊化式定章程聖文天授龍章鳳藻典謨煌煌昭宣至道聖武化神威宣干羽八極来廷羣黎安堵烏弋黄支雕題鑿齒航海梯山驗封成市吏清刑措禮中樂和掄才育士教洽菁莪黛耜紺轅籥吹豳雅皥皥三農深耕綠野養老懐幼蠲租賑饑省方問俗宵旰民依介以繁祉有秩斯祜時雨時暘多黍多稌泰階昇平民安物阜瑞應嘉祥符徵悠久躋登仁壽東西朔南洪庥逺被和氣同含時際陽春光風和暢栁拂龍池花明仙仗恭遇聖夀初周甲子中外騰懽臣隣志喜堯睂舜目天表夀徵喬松彭羨奚足比稱嵩嶽連呼芝英層綴星現老人雲成萬嵗筵開瑶殿桃熟三千日臨金掌露湛珠圓東海添籌南山進酒白鹿青麟羣遊郊藪鶴髮鳩笻殷勤三祝鳧藻泮芹敬賡百禄夔龍鵷鷺對揚天休榮瞻絳闕紫氣濃浮八荒拜舞共球萃止萬福攸同川湧山峙聖夀天長覆幬無極保合太和健行不息聖壽日新枝幹廻旋輿圖永鎭鳯厯長延稽古三皇三才兆始淳穆無為夀以萬紀我皇功徳逺超古聖於萬斯年一人有慶海晏河澄恩洋徳溢沐澤詠膏瞻雲就日皇風浩蕩帝治光昌㣲臣作頌萬夀無疆萬壽盛典初集卷六十六
