body:
  text: 欽定四庫全書萬壽盛典初集卷六十四歌頌四大臣三萬壽頌有序字位過宻無法显示臣揆俶臣聞景運方中兩曜之光久照太和在宇四時之氣先春行健者天至聖法天而不息永貞者地大君應地而無疆惟德與上下同流斯壽與清寧合撰故書稱五福先之錫極備徵詩頌九如首以罄宜戩穀全其理者裕其數彜叙叶乎箕疇足其實者隆其名謳歌徧乎禹甸若夫巍峩浩蕩德極於無能名斯乃通復循環壽至於不可紀槩舉盈數則數衍萬年實指元功則功侔兩大乾施坤載之象固無媺而不臻日升月恒之華皆有目所共覩傳紀元於𨽻首推甲子於大撓孰能究此貞符揆其洪算者哉欽惟我皇上道統三才心涵萬有聰明天亶聖神與文武胥全德業日新禄位與壽名俱永運璇圖而鼓大化雲行雨施握金鏡而煥宏猷星羅電耀朝乾夕惕萃千八百國為一家旰食宵衣合五十二年如一日書契所載古未之聞睹記之餘畧陳其槩竊見夫天以一誠為命而二氣五行效其能聖以一敬居心而八政五紀歸其極錫萬邦之福典莫隆於享帝享親垂百代之型道莫備於盡倫盡物皇上親郊以承蒼昊旣祇飭於齋宫對越之中祈穀以祝豐年復加䖍於用幣薦馨之表紫壇紺幄事天即以為民黛耜朱紘勤民所以足國而且因心為孝問安視膳之勤修率祖攸行盛典舊章之恪守謁園陵而展祀霜露増思侍長樂以承歡晨昏靡間勵精圖治當未央而問夜瞻星倡儉躬行享大奉而浣衣菲食燭妍􅑦於眀鏡萬象俱涵權用舍於平衡五材並庀虛懐以懸鞀鐸每執兩而用中殊禮以加股肱務循聲而核實授官分職之際必重斷於親咨月要嵗㑹之餘時加嚴於保任視羣工為同體豈文重而武輕訓外吏以率先貴小亷而大法師師有位和衷以共襄太平藹藹吉人延頸而樂觀雅化方其舉三雍之禮道岸先登屈萬乗之尊儒宫式煥几筵承蓋闕里隆九拜之儀爼豆加籩考亭躋十哲之列振濂閩之絶學簪纓下逮其雲仍訪宗派之真傳爵秩廣推其苖裔敦行崇實明訓早厲於黌宫廣額開科特恩洊加於士子投戈而􅈺齒讓弁伍觀光釋耒而奏絃歌草茆承化道德於是乎一風教於是乎同乃至廣厦細旃之上周知稼穡艱難省方問俗之時宏溥閭閻樂利酌盈虛而通計視周官國用之餘合遐邇而悉蠲陋漢詔田租之半發帑動踰百萬雨潤焦枯賑荒不惜再三雷蘇寒蟄推恩下施於驛逓寛額旁逮於闗鹺凡此損上益下之𢎞規皆屬約已裕民之至意屢紆法駕河防永固於淮揚一禀宸謨水利聿興於畿輔平成攸賴人登衽席之安灌漑為資家獲盈寧之慶豳風場圃采耕織以繪圖鈎盾田疇課農桑而下詔旱潦無愆於禱祀春秋不憚於廵行猶念愚賤之無知或致桁楊之失入虞廷欽恤三居三宅之必詳周制寛平八法八議之維慎刑罰措而畫衣不犯羣安恒性之綏風俗成而比戸可封共沐大生之德若夫聖武性優神靈天縱懐仁育義正之畧所向無前厪除殘戡亂之心有征必克摐金鉦而問罪儼烈火之燎毛仗旄鉞而行誅譬衝風之捲籜運九天於掌上如雷如霆决千里於目前不震不動前者三藩逆命奉天威而鯨觀長封後此一隅跳梁奮乾斷而狼烟立掃版圖式廓提封盡海外之疆沙漠永清都護拓安西之界鄂羅斯自古不臣之國莫不來王臺灣府從來未服之區悉皆向化迨乎櫜弓釁甲治定功成禮樂以條貫其中和詩書以導揚其美善事有因而典有創酌損益以昭垂史為緯而經為經合異同以參考國書為同文之盛翻譯加詳古文為時藝之宗選裁獨正旁通聲韻之學清濁協於元音博徴事物之原鴻纎歸於實據他如文林華什藝苑巵言莫不薈萃羣書合成全集或冠以御序如乾象之包六爻或加以手批若曦光之燭萬彚躬行心得之下一覽無遺臨朝聽政之間十行俱下尤以數為律本精研於求邉求角之間律為樂原詳審於隂生陽生之用蓋自羲爻畫卦之後堯典授時以來直窮河洛之淵源備晰疇圖之象數謂方圓未足以窮函盖必推三角以測其端倪謂晷刻未足以周古今必準五行而驗其節度天文清類纎毫無爽於列星輿地披圖尺寸不踰乎指掌名一物而源流具見舉一事而本末胥該良由質本生安復濟以鈎深致逺心通翕闢更兼之好古敏求講幄𢎞開披琅函而陳性命經筵時御啟緗帙而闡苞符彚萬理於一中統萬殊於一貫先天後天之學較若列眉無極太極之幾洞如觀火溯詞源而探學海直窮六籍之淵源羅道藪而包義林兼潄羣書之芳潤故能敷鴻文以宣化鼓盪風雷摛天藻以成章光昭雲漢㑹心呈象皆周情孔思之微寓物抒懐悉禹鼎湯盤之奥煌煌二典配御製而成三浩浩三倉推帝書為第一當萬幾之稍暇擅八法而兼工宛轉揮毫鐡畫銀鈎之筆淋漓染翰龍翔鳳翥之形散異采於行間榮光上燭運化工於掌上逸態横生而且腕力萬鈞握弛張於首出神機千變集聖智於大成羆虎應弦旣疊雙而命中騶虞為節復徹札而穿楊總之聖心多能遂爾學該游藝備顯仁藏用之德大包宇宙而靡遺極開物成務之能細入毫芒而無間敷天之下品類咸亨自古及今光華復旦自非鴻符駿業咸五而登三茂實英聲上蟠而下際孰與極可大可久之模裕貞觀貞明之量也哉茲者昭陽嵗紀南斗旦中恭遇我皇上誕生開太平之基卜厯周花甲之數於時百昌暢遂二氣交孚咸披咻噢之和風胥樂綿長之壽域鵷行鷺序趨朝聫瑞草之班虎士熊臣綰綬映桃花之色抒誠獻頌旁及乎槐市芹宫額手歡呼下徧乎黄冠野服或託仙音以致禱絳節樹於琳宫或假物力以祝釐彩幢湧於寳地以及譯鞮寄棘望紫氣者百億大千東西朔南瞻紅雲者三十餘萬喜一人之有慶祝萬壽之無疆要皆發乎至誠本乎至性旣無逺而弗屆亦不召而自來極之趾羽含仁麟遊而鳳舞山川吐潤玉耀而珠輝正使六樂偕宣八風並扇河浮丹篆未能臚列嘉祥洛出瑞圖詎足形容盛美而我皇上方且恒以一德謙而彌光尊號不居期物阜民安而壽世休徵是省願和風甘雨以寧人函夏照臨益致謹於凝旒端冕穆清垂拱惟相忘於棟牖松雲皇哉唐哉廣矣大矣臣揆叙秉質顓愚賦材譾薄備員省闥舉家叨豢養之恩竊禄卿班仍世荷生成之力欣逢聖誕莫罄頌私竊效巷舞而塗歌聊用管窺而蠡測淵鱗仰沫輙伸踴躍之誠巢翼翔庭用適翾飛之樂謹拜手稽首而獻頌曰聖人秉厯體德於乾纂承烈祖昭事上天醇風覃被文命遐宣永清大定軼後超前其一天錫智勇帝德廣運明物察倫用中好問唐虞事功洙泗義藴爰集大成昭垂典訓其二迺闡性道迺覺顓䝉詩書重煥聖賢是崇奎章宸翰開闢鴻濛式我帝訓一道同風其三人遊禮園家翔義圃負笈横經什什伍伍周旋折旋中規中矩何以化之辟雍鐘鼓其四堯茨不翦禹膳無珍匪徒崇儉實以惠民春耕秋斂沐浴皇仁衆維魚矣室家溱溱其五古亦有言知人則哲梁棟欂櫨其菑其栵引見於廷廣淵澄澈明目達聰四門胥闢其六金鏡旣清玉衡斯平登三道合明兩化行九疇式序萬物由庚日用徧德以綏我氓其七煌煌禹蹟今古罕匹喬嶽懐柔百神受職人慶那居波無汎溢海晏河清一勞永逸其八時邁省方翠華南下瑞靄扶輪榮光翊駕有租斯蠲有罪斯赦戸戸羔豚村村桑柘其九好生之德涵育生靈原情揆義按律準經仁同祝網恩邁占星罰以止罰刑期無刑其十文德光昭武功丕烈一怒安民雷轟電掣梟獍蕩除欃槍掃滅泰階以平海外有截其十一柔逺能邇道洽無垠當空日照萬象熙春来重九譯去備四賓行人嵗款殊域悉臣其十二上苑鳳鳴液池魚躍日映山龍風廻笙鶴履泰持盈席豐處約禹儉湯仁與民偕樂其十三太和保合元氣充盈根荄畢遂品物咸亨嘉禾九穗神草千莖不言所利無為而成其十四時際昌期天開長晝朗朗瑶樞輝輝御宿劍佩雲翔共球輻輳㑹同有繹為我皇壽其十五我皇之壽與時循環周而復始孰測其端合三千界歴億萬年同瞻舜日永戴堯天其十六萬壽頌有序字位過密無法显示臣湯右曾欽惟我皇上作君作師至神至聖臨御萬國於兹五十二年如天之燾如地之容如日月之照臨如雨露之濡潤五辰以撫庶績以凝羣生阜安萬類咸若協和之氣溢為豐穰仁壽之風覃於動植絪緼煦嫗之象信而有徵貞恒悠久之符衍而無極景命之申重眷佑長綿百福之祥寰區之愛戴謳歌齊上萬年之頌振古以来所未有也盖皇上以生知安行之至德兼存誠主敬之實功無一事不上合乎天心無一念不下周乎民隱自内達外自近曁逺自微之彰自鉅及細兼綜條貫淵密周詳以自强不息之精神為久道化成之事業雖髙深難於窺測而臣庶亦共睹聞有如禋郊饗帝則嵗必親行祈穀佑民則典恒再舉恢列聖之鴻緒肅四時之薦馨孝養慈闈靡間於昏定晨省優隆王室每篤於庸勲展親勵眀作者曰勤求衣問夜移風俗者維儉菲食卑宫聽覽萬幾裁决悉歸於盡善權衡庶政推行一出以大中御製臺省之箴廣開言路廷見州縣之吏式勸官方器以使人小大咸蒙收錄公能服物文武何分重輕勅法以儆官邪奬㢘以課吏最始終全護曲垂求舊之恩中外寅恭共禀和衷之訓片言可紀必兼採而無遺一節偶瑕俾自新而不棄達聰明目人一見而盡識其生平國典朝章事歴年而偹詳其本末萬里以外周知若咫尺之前百世而遥逆覩在誠明之表凡此聖神之天縱皆由敦敏之性成乃若崇尚儒風昌眀聖道舉大學三雍之禮早傳親政初年崇闕里九拜之儀爭頌省方盛事孔門諸賢苖裔增五經博士之員朱子正學淵源躋十哲廟堂之列詔武人文詞通曉亦與校藝之科訓士子行學敦崇特廣掄材之額至於勞農勸穡行補助於春秋暑織寒耕繪艱難於圖畫每見隴禾場麥輙恱豫於天顔倘愆十雨五風必縈紆於睿慮十行頻下賑恤之詔重重千古未聞放免之租萬萬時勤清問務察吏以安民一過宸輿必德洋而恩溥江臯止輦問俗以見百年吴㑹瞻雲遮道而呼萬歲淮揚之汪洋澤國重奏平成畿輔之規度河工用介稷黍皆宸謨所獨運後民樂而先民憂亦睿照之如神捍大患而興大利合黄濁淮清而注海人慶安瀾束桑乾馬邑之奔流田皆沃壤舉資生於帝力共仰戴於皇慈至若如天之神特詳於庶獄好生之德久洽於萬民情茍出於可原必三刺而三宥罪雖入於不貸猶議緩而議矜重刪律例之條𢎞昭寛大之典若夫統承洙泗集羣聖之大成道接唐虞冠百王而首出研經則叅同攷異窮奥義之源流繹史則綱舉目張示累朝之法戒推數之原出於易合羲文周孔為一人溯律之本肇於圖闡濂洛闗閩所未發心通象緯羅七曜於胷中手畫方輿指九州於掌上文章根於義理經乾緯坤比興本於性情嫓雅儷頌宸毫綰結煙雲卷舒寳墨淋漓日星昭倬挽萬鈞之全力劃若天開備八法以洞精妙皆神運教期門羽林之射的必三穿習春蒐秋獮之儀發皆百中學並該乎游藝聖兼擅乎多能煥乎文德之光華允矣武功之赫濯自三蘖肆行背叛勢極鴟張而數年以次削平威加鯨戮首申察哈爾之明罰迅擊風雷三征厄魯特之不庭永清沙漠臺灣平而化行海外紅苖定而氣懾蠻中皆指授以機宜悉禀承於方畧先期决䇿盖無慮之不詳臨陣摧堅亦有征而必克鄂羅斯各國咸稽顙而來臣烏斯藏諸畨復款闗而職貢幅員廣大真窮地鈕而接天維聲教遐敷洵一車書而同尉候矣兹者花甲方周聖厯禎符悉㑹昌辰正六旬大慶之期當萬福攸同之日卿士舞於廷農夫抃於野商賈歌於市行旅謳於塗生徒慶於庠軍卒歡於伍琳宮寳刹祝嘏駢闐綺陌銅街呼嵩踴躍鮐背兒齒之老扶杖以逺來占風候日之倫獻琛而畢至咸謂飲和食德胥邀聖主之生成自兹地久天長永享太平之樂利所由至誠感而上瑞臻也乃我皇上盛德大業有而不居顯號鴻名却而不受每綢繆於政夲用渙汗於王言謂以億姓安為一人之安即以庶民福為皇極之福孜孜上理恒如履薄臨深抑抑虚懐惟期家給人足俾海隅日出咸喻朝乾夕惕之心凡卜日諏辰但為嵗稔時和之祝此皆皇上以至誠之實心行至聖之實政淪浹布濩沐浴涵濡德意靡所不周仁恩無乎不徧至矣哉叅天兩地苞符啟矣諴民阜物功叙歌矣揆文奮武謨烈光矣制禮作樂神人豫矣稽典籍所紀未罄形容自開闢以來難為比儗臣右曾材慚侍從職忝論思屢蒙髙厚之恩仰酬無地幸際升恒之運敬祝齊天稍抒微詞下申末悃謹拜手稽首而獻頌曰維皇聖德至誠至仁以育萬物以蕃兆人煦之如日函之如春寰海四曁罔弗尊親其一生知安行曰天子聖好古敏求根心成性功崇業廣道隆徳盛與三才叅持四時柄其二祀䖍對越孝通神明躬是顯懿衡正階平克勤克儉求寧觀成萬幾時勅百度維貞其三朂爾有官小大咸秩夙夜匪懈惟和惟一旌亷懲貪黜華崇實明庶以功萬里周悉其四大澤汪濊乾奥坤區士歌黌序民舞康衢屢豐大有多黍多稌猶念民依賜億萬租其五時廵肇舉咸歌帝力淮黄安流畿輔滋殖行慶施惠爰及九域欽哉祥刑好生大德其六蔚矣天藻炳於日星詩備四始文成六經筆參造化品物流形軒圖羲畫萬禩式型其七旣敷乃文復奮乃武東西朔南臨以玉斧威行德服拓不毛土萬方殊庭若在堂廡其八用介景福用集繁釐自天眷佑罄無不宜卿雲晝靄甘露晨滋綿至聖厯永太平基其九弧南一星煌煌於斗甲子循環乾坤悠久敷天之下咸拜稽首龍德健行天子萬夀其十萬壽盛典初集卷六十四
