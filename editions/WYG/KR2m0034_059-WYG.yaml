body:
  text: 欽定四庫全書萬壽盛典初集卷六十一歌頌一皇子萬壽詩序歲維癸巳時屆艷陽我皇父御極之五十二年正聖壽嵩齡六旬花甲臣等擬山呼而致祝效萊舞以承歡仰一人之有慶願萬壽之無疆謹各為詩三章以獻誠親王華渚虹流景運開中天雲物正昭回北辰環見諸星拱南極光連帝座來品類歡心歸壽域乾坤佳氣滿春臺萬年枝上宫鶯囀惠日和風徧九垓日新乾健慶皇躬垂拱無為致郅隆萬物生成資厚德一人天地讓全功六旬花甲循環轉五紀恩波逺近同不用廷臣金鏡進共知宵旰在深宫綵衣共進躋堂觥嘉節喧闐鳳吹聲帝錫萬年天子壽史書三月聖人生詩賡保定輿情切瑞集箕疇福履成更喜早朝長樂近春風扶輦傍花行雍親王紫禁春深麗景融蓬萊仙仗五雲中瞻天有喜承顔近祝聖無疆拜手同滿獻堯樽凝瑞露和鳴舜樂應薰風待㸔甲子周千億共指南山比壽崇南極星依玉座眀壽昌有象瑞光呈華封早獻三多祝嵩岳遥傳萬壽聲四海永清綿厯祚一人有慶樂昇平普天率土禎符集㑹見彭籛進雉羮海屋籌添寳厯昌趨庭拜獻九如章椿隂覆砌春秋永桃實登筵歲月長巷舞衢歌申頌祝龎眉鶴髮應嘉祥承恩膝下瞻依切願進瑶池萬壽觴恒親王治化原從乆道成堯封萬物盡由庚彌天湛露卿雲布匝地琪花瑶草生巷舞百般熙皥象衢歌一派太平聲須知此日稱觴處早有仙人下玉京南北東西開壽域聲名文物擁天街德髙碧落原無極厯溯丹源豈有涯春暖苑花添爛熳風和巢鳳語雝喈撫時自具長生樂不讓蓬山景獨佳欣逢甲子初周日五十餘年國歩康但㸔河清還海晏足徵地乆與天長慶同遐邇歡呼徧樂出家庭笑語詳孺慕至情思自達敢將春酒祝無疆淳郡王佳辰雲物轉昭回天上人間壽域開苑樹花深三月令宫筵酒滿萬年杯九重曙色升如日六宇歡聲殷似雷火棗薦盤麟作脯一時捧入紫宸來日暖風和玊燭調千官劍佩共趨朝黄雲上覆天堦逈紫氣髙凝帝座遥御仗兩行分羽衛仙音一派奏簫韶不才幸預多男數喜共華封更祝堯宿緯星經表瑞繁老人光映紫微垣何須仙掌承膏露仰見皇心是醴源曉日徧浮千戸旭春風都為一人暄循環甲子長無盡貞下從今又起元八貝勒復旦光華煥九天五雲紛郁抱爐烟相随獻壽依仙陛長得承歡近御筵北斗杓旋春六十西池果熟嵗三千璇圖寳厯膺無極大德由來享大年和風瑞日啟芳辰闕下衣冠拜紫宸錦繡花眀朱檻畔琉璃波暖碧湖濵八荒開域皆為壽兆姓登臺總是春分依子臣恩更厚願將遐算祝君親春臺熙皥即瀛洲花甲循環始一周日下歡聲騰鳳闕人間喜氣集龍樓清寧交泰成三極参贊無遺協九疇託體恩深惟抃舞長瞻聖壽與天侔九貝子南極光輝煥紫宮歡騰率土盡呼嵩至仁覆育羣生樂大化鈞陶庶類融六籍精微歸帝德兆民懐保屬皇衷法天行健同天乆億萬斯年聖壽崇巍巍峻德邁三皇浩浩深仁徧八荒治洽無為參造化心包太極運隂陽名言莫贊乾坤壽妙手難摹日月光恩合君親同覆載瑶池長捧萬年觴海晏河清協永年衢歌巷舞樂生全眼㸔至化超堯舜心喜遐齡並地天威德互施𢎞覆被剛柔迭用普陶甄聖人自有長生德紫禁祥光映斗躔敦郡王上日榮光徹紫京十洲仙筴益蓬瀛瑞逾興慶千秋節頌溢嵩髙萬歲聲糺縵雲垂歌燦爛壽昌星現協昇平帣韝喜奉天顔近早向瑶堦供玉觥五紀純禧萬福同宏謨駿烈拄蒼穹戢寧弓矢垂衣外羅絡苞符指掌中錫極和平尊睿徳體元乾健亮天工聖恩浩蕩寰區徧鳳厯遥占軼帝鴻萬國衣冠拜玉墀青陽淑景駐鸞旂令和斗建司辰月春永虹流毓聖期雨露深霑巢鳳閣鶯花飫醉濯龍池承恩跂荅睢麟澤歲採金桃貢瑞芝十二貝子寳殿歡開介壽觴蓬萊佳氣駐春陽日融丹仗龍旂暖花繞彤墀鳳扆香華渚流虹欽誕昊康衢撃壤邁歌唐綵衣侍宴天顔喜慶自宫庭洽萬方禹圖軒籙運璣衡帝德恢宏協拜賡赫御琱戈寰宇奠靜調玊燭㤗階平體乾宵旰持兢業保豫修和集阜成花甲始周純福茂聖人有道自長生作述淵源冠古今紫闈典訓飭嚴箴光騰糺縵千秋業嘏祝升恒四海心澍澤敷天揚赤管薰風入律播清琴無私篤被皇慈懋尤比臣鄰舞抃深皇十三子日麗瑶堦蓂莢抽卿雲燦爛繞皇州人間鳳厯三春轉天上龍飛六甲周樂奏簫韶供燕喜尊陳桂醑坐優游綵斑叨侍金鑾側欣覩無疆茀祿遒天遣神皇致太平文謨武烈逈難名聲靈屆逺風雷動衮冕當陽海嶽清五夜奎章騰瑞靄萬幾乾健協輿情勲華直與唐虞並乆道年來已化成黼扆臨軒斂福長螭坳錄瑞不勝詳香縈紫氣霏金殿花引紅雲䕶繡裳率土祝釐均雀躍盈庭頌禱起鵷行瞻依倍荷生成徳介壽年年樂未央十四貝子瑞日榮光泰運宣斗樞繞電啟中天律諧姑洗逢佳節祝起華封慶大年萬里恩波周赤縣六旬功徳萃瑶編春風輦路追随近無限芳菲遶御筵九有騰歡祝聖人車書海外並尊親參天大業原天縱法日精修復日新花甲萬周旋御厯條風四被徧陽春笙歌鳳吹盈丹陛喜溢千官拜舞頻昇平物象總亨嘉聖澤遐宣未有涯極建中和成位育春從九五到鶯花萬邦化洽唐虞治六合光分日月華鸞鶴紛紛随步武蓬瀛勝事集天家皇十五子運協昌期淑景開羣生熙皥躋春臺苑中麟鳳千祥集闕下共球萬國來表裏金湯常鞏固文明雲漢自昭囬歡呼正值添籌日願借東瀛作壽杯蓬萊宫殿五雲中太液深波暖更融草木恩光流湛露河山佳氣展仁風渾忘帝力人多樸共樂康衢歲屢豐千古昇平今日㑹天教純嘏萃皇躬聖厯綿長億萬年一周花甲喜開先仙桃燦爛方舒蘂海日曈曨始麗天文徳武功齊入舞宸章寳訓幾成編趨庭共愜承歡意無限春風繞御筵皇十六子慶霄壽域闢天閶雲日増輝麗景長十二璇圖初滿甲八千椿算正當陽吹璈暢叶韶簫奏舞綵初依寳鼎香一體子臣銜帝澤九如詩侑萬年觴詢岳咨揆莅紫宸盤盂儆戒益懐新九疇啟雒傳靈瑞五老榮河感聖神乾御勤勞先百辟巽風仁壽浹蒸民普天華祝純禧茂藹作雍和四海春銀潢幸託侍瓊筵恐負生成禀訓䖍日覲龍顔恩並熾歲占鳳紀福如川貞符懋衍無疆厯淑氣常徵大有年忻傍彤闈承戩穀棠枝蕃錫慶綿延皇十七子拜舞稱觴紫禁中八方臣庶共呼蒿堯堦永曜舒長日禹甸均披長飬風民賴一人真有慶身膺萬福總來同趨庭每覩天顔喜多為時和歲屢豐治定功成樂太平彌殷宵旰軫蒼生恩膏廣沛三春澤和氣全消四海兵共仰謙光尊帝德獨純乾健協天行遥知漠北交南外盡是華封頌祝聲鯉庭聞禮復聞詩自愧沖齡鮮所知提命時時煩睿慮生成日日荷天慈典謨垂訓千秋寳雲漢為章萬世師夙夜祗遵勤砥礪承歡常喜傍龍墀萬壽盛典初集卷六十一
