body:
  text: 欽定四庫全書萬壽盛典初集卷八十四歌頌二十四詞臣十六萬壽詩五言排律二十韻翰林院檢討臣陳均華渚虹光繞樞星電影馳荅陽乘景運纘緒撫鴻基玉燭方調日金甌全盛時徳崇超往聖功懋軼前規繼述隆尊養仁慈篤本支謨猷三統接禮樂萬年垂考道心相印傳經古是師芸牕披典册綈几列鐘彞灑翰龍文炳摛詞聖藻竒臣鄰歌喜起兆庶樂恬熙問俗神堯念廵河大禹咨波臣胥順應澤國賴防維億萬金錢赦十千秉穂遺截漕紓下力積粟賑民饑讞決無寃獄征徭鮮旅羈恤民宵㒺倦勤政夜何其春月韶光麗嘉辰日影遲天顔誠有喜聖壽樂無涯南極騰輝逺西池獻斚冝願隨鵷鷺後敬獻九如詩萬壽詩五言排律二十二韻翰林院檢討臣王珻至徳乾行徤鴻圖泰運昌深仁彌宇宙上治邁羲黃共獻華封祝同歌壽考章一人稱有慶五福介無疆雨露春城曉鶯花綺陌香氤氳凝淑氣縹緲轉韶光麗旭摇仙掌晴暉拂禁牆緋桃榮漢苑翠莢映堯堂金殿爐烟静彤墀彩仗揚臣鄰紛拜手天子正垂裳祝嘏趨鵷序呼嵩接鷺行日邉森劍珮霞際度笙簧藹藹宸顔喜忻忻化日長薫風嘘解阜福曜叶禎祥華渚流虹彩星樞繞電芒卿雲環紫極瑞靄滿青陽玉檢千年籙瓊筵萬壽觴休徴㸔洊至申錫詎能量駿業升恒懋嘉符次第彰明良忻盛遇喜起樂賡颺幸際昇平㑹叨依侍從旁願將天保頌長此戴君王萬壽詩七言律八首有序翰林院檢討臣覺羅逢泰欽惟我皇上道合璿圖祥開瑶籙堯仁舜哲集千聖之大成禹儉湯勤懋百王之丕緒銀河挽而甲兵盡洗金矢貢而玉帛胥同至治無虞民安物阜太平有象海宴河清允矣業邁古今誠哉年齊宇宙茲者青陽開㤗九重甲子方躋華渚徴休百禄昭明未艾覲天顔於咫尺千官拜舞以呼嵩仰聖夀之遐長萬國梯航而上頌臣身依高厚運慶升恒日永春臺芝盖捧紅雲影裏天崇壽域海籌添碧落班中雀躍同趨葵衷曷罄敢效九如之頌用稱萬嵗之觴謹賦七言律八章拜手稽首以獻巍巍大徳仰如天久道深仁位育全極以中和昭懋建心惟精一接真傳瞻雲就日千祥集頌嶽呼嵩萬象妍甲子甫開綿鳯紀葵傾處處樂堯年其一敬天法祖殫精誠尊養慈闈本至情玉膳自調供鼎實翠輿親捧導鸞聲九州禹貢歡心愜六服周官孝治成彩耀銀潢恩下逮親親次第及民生其二旰食宵衣不敢康自令海㝢日光昌省方問俗追虞夏賜復蠲租邁漢唐道格上蒼囘水旱政先下土繪農桑徳音時渙臻安阜攸暨由來仗紀綱其三明良千載一時中寳翰箴銘勵翼同賢否豫明安職業貪㢘無混作公忠轉圜幸際昌言㑹育徳還叨壽考功音矢卷阿叶梧鳯治規二典代天工其四經文緯武總天威宸算風馳異域歸瀚海親臨波永息龍沙駕轉日増輝載櫜弓矢磨青碣式廓封疆拱紫㣲作極聲靈真赫濯古來史册見應稀其五闡揚儒術振民彞統竝君師事事釐禮重孔庭光舊典祀升徽國展新儀精深律厯三才奥剖晰詩書百氏疑惇叙陳常徧時夏此疆爾界日雍煕其六河淮效順達南陬黃鵠無勞兆姓謳不惜金錢煩帝軫每増堰埭藉神庥三洲東去風漪静九折西來砥柱收輳集梯航獻符瑞斂時五福在箕疇其七電繞虹流慶令辰罄冝戬榖自天申難名至治尊鴻號猶厪虚懐下鳯綸叩闕衣冠齊獻夀舞階鞮譯盡歸仁欣逢盛事鵷班侍稽首稱觥紀萬春其八萬壽詩七言律四首翰林院檢討臣車松車書一統㑹昌辰閶闔千門氣象新為慶堯年臻六袠忻逢舜日正三春殊方久戴恩綸溥異域常邀徳化均航海梯山來萬國齊陳天保祝楓宸其一日麗風和三月天禁城春色浩無邉旌旗影動交仙仗劍珮班齊敞御筵運啟萬年綿帝祚雲浮五色聚星躔希聲遥奏簫韶樂譜入南薫聖徳傳其二率土齊霑覆載恩皇仁疊布徧乾坤太平已快民財阜大賚猶傳天語溫瑞氣逺籠南極朗衆星環拱北辰尊瞻雲共效華封祝擊壤衢歌徹九閽其三小臣何幸近蓬萊率舞歡騰獻夀盃柱史肅儀鵷鷺整太常奏樂鳯凰來青陽氣暖桃方熟紫極風清杏已開惟願皇基千萬載敷天常荷主恩培其四萬夀詩七言律四首翰林院檢討臣張懋能氤氲瑞氣藹蓬萊萬嵗歡聲萬國來庶彚欣欣瞻化日羣英濟濟上春臺廣廷樂奏迎仙仗華渚星輝入壽盃共慶陽和符景運太平有道自天開其一天闕春融六合昌聖君端拱樂時康舜琴歌奏薫風動堯酒樽開瑞露香日月光華輝海嶽龍鸞字畫映縑緗追隨清禁知榮幸珥筆涵濡帝澤長其二巍巍至徳邁軒羲聖敬文思八表垂風雨露雷皆化育東西南朔徧恩施舞階干羽烽烟静擊壤謳謡黼座知寳厯綿長真有象祥光日繞萬年枝其三南極輝輝帝座邉卿雲縵縵繞爐烟車書一統登三五禾黍豐盈耦十千萬國咸寜當此日一人有慶永齊天涓埃何以攄㣲悃稽首惟賡保定篇其四萬壽詩五言排律二十韻翰林院檢討臣衛昌績帝徳乾坤廣鴻圖日月長聲華敷萬國治理協三皇草木霑仁澤山川效景祥健行原不息泰運自無疆宵旰勤民事盈寜樂嵗穰閭閻真皥皥雨露正瀼瀼共沐熏陶力羣欽鎮撫方笙簧歌式燕干羽舞成行莫贊堯天大惟依舜日光酉山羅典籍丙夜燦縑緗象緯昭宸翰雲霄麗睿章巖廊凝瑞氣聖夀值春陽甲子周初遡車書㑹久彰太平欣有象歴數慶彌昌玉伏翔鵷鷺仙韶集鳯凰普天同獻頌匝地盡稱觴晝永爐烟靄風和花氣香箕疇傳夏后華祝比陶唐拜手騰歡忭輸誠擬對揚遥知千萬載長此戴垂裳萬壽詩五言排律六十韻翰林院檢討臣劉師恕聖人膺㤗運萬國際昌期寳厯當全盛皇躬協罄冝生安超舜禹睿知邁軒羲崇徳惟窮理傳中每緝熙深宫安敬止薄海仰文思精一通謨典箴銘載鼎彛道承洙泗統極建帝王規開物兼成務為君更作師懋勤時亹亹尚論日孜孜好古𢎞書局談經御講帷圖疇宣奥義理學決沈疑幾暇心無逸宵深卷屢披珠毫光燦爛玉硯墨淋漓鳯翥鸞翔備銀鈎鐵畫竒宸章明性道睿詠儷風詩定禮追三代和聲詔一䕫協時衡合度布角偶乘竒命将行邉徼陳師建鼓旂皇威清瀚海宸斷奠坤維羽檄銷南國金戈偃北陲櫜弓歸虎兕解甲静熊羆紫塞登圖版紅苖入甸綏文明昭若彼英武振如斯詢事旌㢘吏臨朝簡有司百官因表正六合藉恩施野以禎符獻天將樂利貽五行煩舜儆八政荷堯咨鸞輅臨汾水虹旃幸具茨闗心寛國賦軫念惜民脂博濟無餘憾蠲輸鮮所私積年踰億萬徧地起瘡痍化育人才蔚熏陶士氣怡十年邀曠典萬禩頌皇慈棫樸興賢急楩柟為國資彚征收琬琰敦勸辨澠淄舉直褒無次懲貪法必持乾行維不息道量豈容窺徳合天常眷功崇福不訾春臺躋百爾雅化育羣黎華祝三多日山呼萬嵗時艶陽花似海甘醴物皆􅋳瑞有茅三脊祥多麥兩岐旅獒來内府楛矢輳前墀雲牖生朱草松軒長紫芝咸韶天上奏簫管殿中吹銀甕流嘉液金甌萃景禧懐柔趨嶽瀆拱衛走神祇彩仗籠晴靄觚稜映早曦鸞坡旌影漾鷺序玉聲遲黄鳥華林苑丹魚太液池和風方拂柳旭日欲傾葵鞏固綿千禩雍熙徧九逵小臣真忝竊此日獲追隨蘭省叨親切麟臺漫委蛇湛恩誠厚矣兩世更兼之拜舞歡無極趨蹌樂有儀龍光天咫尺虬漏夜何其進祝當呈鑑陳疇欲衍箕我皇登上夀天下悉安禔大被生生徳長隆丕丕基萬壽盛典初集巻八十四
