body:
  text: 欽定四庫全書萬壽盛典初集卷九十七歌頌三十七武英殿諸臣萬壽詩有總序日講官起居注左春坊左諭德兼翰林院修撰臣吳廷楨臣聞圖呈圭錫肇開有道之徴川至日升載衍無疆之厯表禎符之不偶佑自天申迓景福於方來極由皇建風雲從而萬物睹日月浴而百寶生聖乃乘時叶三靈而首出天惟眷德推五勝以代興爰自誕彌星虹感瑞洎乎歴載圖籙延祥用能坐享長年茂登上理納八方於壽域啟億載之昌期自昔為昭於今尤盛欽惟皇上體乾常健際泰方亨躬聖神文武之全自生民所未有握祿位名壽之契與造物者同遊凝神而四序成功㳟已而萬靈受職啓圖書之秘鑰百家盡入寰中張弧矢之威弦九譯胥歸闕下箕風畢雨民有欲而必從喙息跂行物竝生而不害廣矣大矣天之無不覆也皇哉唐哉民之無能名焉兹當五十二年之春㳟遇六十萬壽之誕歲方周甲月正建辰蓂砌祝堯甫飄香於三莢花宫獻佛先浴日於二旬於是萃萬國之懽心慶一人之聖節盈廷虎拜蹌濟冠裳率土嵩呼紛綸玉帛陳賀牋之斐亹南北臺萊佐貢篚之珍竒東西鶼鰈青雲干吕人皆得氣之先絳節來朝臣有遊方之外時則皇歡既浹民豫斯宣垂惠臣工豈樂鎬京之宴覃施兆庶康娛漢室之酺敞靈囿之池臺圖披益地宣洞庭之金石樂奏鈞天獸舞鳯儀每䝉天笑風暄日麗竝應人和合宇宙為大年率臣民與同樂斯即鄉通日出視此匪遥節置天長方斯猶隘者矣臣廷楨等身依化國生際昌辰瞻南極之星明去天尺五紀西池之桃實得歲三千自顧何人叨逢此日花磚載筆分裁祝嘏之章藜閣繙書竝采延釐之句敢比儒紳之嘉頌以雅以南聊同衢壤之康謡或歌或咢由此年年張樂與物皆春歲歲稱觥後天不老佇見升中岱室駕顯號於七十二君重聞合厯天靈享鴻禧於萬八千祀云爾渚虹樞電帝符昌歲月重徴誕聖祥發育乘時春出震文明啟運午當陽仙蓂三莢飛丹陛色線千絲上繡裳介壽欣承天保定􅆳歌擬進九如章其一雲從雷動㑹皇州八表同時拜冕旒軒厯一周新甲子莊椿竝紀大春秋樂張廣野嵩呼應尊設中衢鎬飲酬卜算直須論萬億海天十屋積仙籌其二德貺充庭寶物陳維皇錫福惠臣民光騰珠璧天成象數叶苞符地效珍九譯梯航全盛世萬家烟火太平春來朝黃髪懽扶杖都是堯年鼓腹人其三香案氤氲御氣通清班長在慶霄中分光雲日瞻天近取象岡陵祝聖同秀發堯眉増壽采神凝舜目轉方瞳萬年久道從今始南極宵明映帝宫其四翰林院編修臣廖賡謨曙漏聲中淑氣催層層雲影䕶蓬萊千官率舞排仙仗九陛懽傳獻壽杯共仰乾行符帝造欣逢泰運自天開璇圖寶厯知何極甲子應輪億萬囘其一南極星髙拱北辰祥開華渚耀龍鱗多時御氣流丹禁到處恩光接紫宸十丈藕花呈瑞早千秋桃實著枝新太平眞有昭囘象長駐天邊不老春其二春殿晴開白玉筵箕疇福履慶尊前衢歌正叶陶唐日華祝重逢癸巳年知有仙籌添海屋早聞廣樂奏鈞天爐烟靄靄盈襟袖竊喜身依日月邊其三入直承明主眷深頻頒御寶重南金永年銘署琅玕石壽世書成翰墨林十載甄陶涵聖澤三春雲物麗天襟趨朝彌覺嵩呼切長願葵丹展寸心其四翰林院編修臣吳士玉太平時節祝堯辰端拱垂衣坐紫宸松棟鶯飛三月曉蓂階虎拜萬年春仁風入律笙鏞協德貺充庭玉帛陳共喜百生今一遇敷天同日效尊親其一聖人首出象天行跨昊超軒帝業宏日月光華文物盛車書混一武功成九河清應千年運五岳歡騰萬歲聲正與乾坤參乆大謙尊猶自却鴻名其二皇風熙皥屢豐年鰈至鶼來徧八埏大賚深恩涵似海永清鴻烈峻於天東郊景麗華林苑南極光連太乙躔幸覩作人雲漢倬萬方蘂榜一時懸其三錦幔花燈接帝居九衢民物入華胥上林樹集鳴岐鳯太液波跳宴鎬魚山阜雅詩文陛進地天泰運史官書循環元㑹綿千億寶祚欣逢六甲初其四翰林院編修臣楊開沅帝籙𢎞開壽域同蓬萊春色滿瑶宫旬周甲子天逾健照徧光華日正中泰象三階方錫福歡心九野競呼嵩欣逢聖節齊軒厯流渚依然映玉虹其一平明絳節引班聯五老披圖拱慶筵堯酒進時膏露渥舜衣垂處彩雲連蓂増瑞莢當三月椿茂仙枝紀萬年更幸作人敷化雨普天桃李得春先其二南極輝煌映御屏八紘共戴老人星梯航玉琯來重譯河洛丹書啟秘扃華蓋五雲占大有坤輿萬國慶咸寧太平人上三多祝詎待松喬問紫庭其三武英春殿倚層城叨傍花磚珥筆行地近瑶階依黼座天垂湛露浥金莖圖書長仰奎文麗星日時瞻寶翰明拜舞敬陪鵷鷺後琅霄同聽九韶聲其四翰林院編修臣宫鴻厯慶都毓瑞自青陽華祝嵩呼徧八方萬管麟毫書德筆千番鳯紙紀功章循環花甲天行健流轉芳辰日景長南極一星朝帝座敬隨五老獻霞觴其一一廵鳯厯斗杓旋重㑹貞元景福全蓂莢舒英方十八桃枝著子恰三千龍飛利見逢辰月鶉火中天應午年步算更須煩隷首如川寶祚正延綿其二甲子千年始一輪長齡纔比日初晨壽星躔次剛三月梵帝靈辰後兩旬風雨露雷均聖德山川草木被皇仁今年歲閏聽釐祝時節舒長景運新其三一人甲帳念民勞萬姓春臺沐雨膏大地輿圖看日擴太平勳德比天髙重瞳目已瞻奇表八彩眉先出壽毫願上千秋金鑑錄豐年禾黍勝蟠桃其四翰林院檢討臣盧軒通明晨啟瑞煙浮聖節天成海益籌鳯紀喜㸔周甲子龍圖方數萬春秋虹流華渚懸朱羽星燦㣲垣拜綵旒泰運如今從古少九垓何地不共球其一歴代皇猷萃一人綿延玉厯總元辰手清寰海干戈偃坐啟明堂禮樂新直與兩儀衡乆道長令萬世仰深仁蒼黎何幸逢昌祚不羨華胥國裏民其二令序眞教四美幷遲遲宫漏出雲扃春曦恰照瑶池水歲曜方朝紫極星芳甸氣清開百卉彤堦風動㸃三蓂鸞笙吹徹龍璈㑹玉酒稱觥滿帝廷其三書成祕殿詔新鐫館職編摩許備員四庫寶籖琅笈啟九重聖訓玉宸傳寵光幸改青衫舊㸃綴慚無彩茟鮮金簡排來千萬字一春一字祝堯年其四翰林院庶吉士臣楊士徽九霄符彩慶堯曦八表同歡拜玉墀南極星輝依北斗東風律暖奏西池絳桃乍採千年實花甲初陳萬壽巵元㑹無疆鴻厯永百生何幸際昌期其一太液波深四海同羣黎戴徳共呼嵩舒長正耀中天日熙皥還符上古風耕鑿由來歌帝力盈寜常自樂年豐試看萬國躋仁壽總在皇心主靜中其二元氣氤氳繞帝閶九成韶樂下鸞凰萬年枝上和風漾百福屛中旭日光膏露自天流解澤醴泉随地溢瓊漿欲知德業超三代聽取謳謡徧八方其三雙闕晴開萬井煙鳯城三月景逾姸花交綺繡繁春苑鳥和簫韶奏御筵有佛是名無量壽何人不戴大羅天小臣擬學華封祝一寸葵心向日邊其四武英殿纂修臣汪灝天高比德報高齡紫氣雲光耀闕廷年錫禹疇圖叶福甲周堯厯歲占星煙浮栢葉呈杯緑漢接椿枝映瑣青千萬億心同頌禱仙荷瑞影現亭亭其一同來慶喜宴春長處處桃開艷吐香東海浴龍蟠日舞上林巢鳯彩雲翔功高奮武神戈止治盛隆文麗藻揚嵩祝共呼交手拜中天普樂竝虞唐其二深基命固嶽山如午位衡方紀冊書金繞電光春發盛渚流虹瑞帝生初琴絃撫處薫風細藻火垂時化日舒琛獻更聞韶奏九吟增嘏歲閏増餘其三恩如海濶澤如川萬萬籌添壽紀年尊號拜呼班禮肅廣衢歌舞樂聲連繁枝綵袖斑環座美咏霞觴錦列筵村滿頌謳吟滿市元元喜樂聖開天其四布衣臣高不騫曽聞鳯厯紀天皇四萬八千為歲長伏見鴻圖恢我后聖神文武稱身強占星躔次春臨壽承運光明世保昌月日恒升開七袠竒祥異瑞獻朝堂其一歲首香生紅白荷為濡膏露醴泉多八荒重免一周賦十載初加萬壽科縹帙詩新金斗籙黄封酒􅍄玉山禾桞邊花底華胥境稱兕觥當風景和其二五十三春造化功下情移壽切呼嵩慶流世世時方泰波及元元嵗屢豐玉瀣丹泉輸海澱雲隄芝逕接崆峒年高軒昊心堯舜不獨乾辭振大風其三淵鑑文章務去陳詩當御選韻彌新自餘四庫經編輯每弁千言廸搢紳特地雕鐫開内殿平分校理到微臣願追伏勝張蒼齒長奉無疆億萬春其四貢生臣郭元釪綺旭曈曨捧玉宸齊天御算履瑶辰暢春人喜逢三月浴佛期猶後兩旬華渚萬年鍾瑞苡彩雲千片下雕麟欲知寶厯綿長處甲子於今甫一廵其一皇猷聖壽兩巍巍久道長年自古稀萬里車書朝帝闕八方耆老獻天衣香飛玉路笙歌滿花發珠林錦繡圍從此上元兼上已萬年燈火慶王畿其二葉葉朝衫走衆寮百花春籞壽杯遥雲雷海宇占豐稔燕喜公卿詠蓼蕭香路進名來岳牧玉鳩扶杖有松喬承恩最是青袍侣彩茟紛綸賦慶霄其三千樹紅霞繞法宫玉波珍木瑞冲融一春風日三才麗四野人神萬福同化日舒長聞擊壤鈞天縹緲應呼嵩年年紫海湔衣去願獻磅磄晚實紅其四進士臣吳玉耑太平天子啟昌辰斗貫瑶樞瑞應陳億萬總教綿永祚八千何足紀靈椿堯眉舜目春秋富鳯厯麟書甲子新率土尊親同獻壽嵩呼聲裏和韶鈞其一尊號雍容讓不居淳風直欲接皇初勲華共仰中天治封禪奚勞太史書端拱無為登壽域昇平有象入華胥謙冲聖度難窺測應許詞臣紀石渠其二嵩祝遥騰六宇懽先看佳氣溢朝端賜酺處處蒸黎喜蠲賦年年兆姓安化國山川膏露滿仁王世界海天寛從今萬壽科開後又育皇家萬鳯鸞其三葑菲叨霑雨露滋生逢景運樂雍熙渚虹樞電瞻金闕澤馬山車獻玉墀南極一星呈瑞靄洪河五老告昌期躋堂􅂅效稱觥祝歌詠堯天進壽巵其四進士臣汪榯聖節初逢慶萬方同聲抃舞祝無疆瞻雲就日天儀肅跨昊超軒帝厯長豫動早知恩已徧健行從此福彌昌至誠不息膺純嘏億載椿靈邁古皇其一誕敷華渚啟祥虹久致昇平大業隆多士逢時茅茹拔三農得歲黍苗豐盈廷師濟光華旦一統山河道化同盛德形容歸樂府蹌蹌虞舞協呼嵩其二王猷永塞頌丕承累葉重熙上理登道貫三才資位育光同二曜見升恒克誠自合天心享凝命常令介祉増悠乆直將髙厚配豈惟松栢與岡陵其三靄靄卿雲䕶紫宸仙桃初熟正熙春祥徴午位尊南嶽瑞應蒼龍拱北辰祝效三多嘉頌獻壺凝百福上尊陳光天化日昌期㑹有慶常教頼一人其四進士臣李登瀛花迎鳯扆慶長春率土懽騰祝聖人禹甸恢𢎞仁壽域康衢熙皥太平民厯周花甲天行健星燦微垣斗建辰皇極貞恒開泰運含靈食徳共尊親其一統一寰區瑞氣融洪纎物􅁼啟鴻蒙雙岐嘉穗秋原實千葉仙荷春殿紅太液晴波魚泳藻上林朝日鳯棲桐禎祥協應申天眷太史占年報屢豐其二簫韶雅樂奏鈞天桂醑蘭肴奉御筵頌效華封三祝句詩歌保定九如篇萬邦輯瑞來王㑹四海同風入帝絃遥聽嵩呼綿寶厯蟠桃春宴慶年年其三雲漢為章星聚房中天日麗正當陽龍光焜耀文明晝鳯藻鶱騰翰墨塲棫樸作人歌壽考圖書啟秘竝羲皇小臣抃舞鵷鸞後珥茟榮霑日月光其四進士臣徐啟純鬱葱佳氣滿人寰風動時雍宇宙間運叶萬年開正始厯周六甲慶新頒花明陸阜凝春色翠擁岡陵悅聖顔率土共欽仁者樂九如疊頌壽如山其一綿綿景福正如川聖智怡情總自然已集大成觀海水更分衆德出淵泉文瀾濯錦浮三峽時雨零膏沛九天瑞應醴泉堪酌取代將春酒祝堯年其二升恒日月自西東繼照寰區景正中紫氣函闗朝煜煜碧雲遥島夕融融㑹逢皓白千年鶴眞見純陽五位龍慶衍無疆仙祚逺長懸雙炬寶燈紅其三蒼松翠栢勢輪囷古榦參天信有神蓋偃徂徠同建木根蟠新甫似靈椿蓼蕭湑露慈恩渥棫樸瞻雲壽考臻願製萬年歌萬首一年一度祝長春其四進士臣遲之金大統躬承寶厯綿巍巍帝德竝堯天樓臺海市煙氛靖桃李春風雨露姸百世皇仁深覆載萬年景福奠山川聖人有道應多壽四海謳歌叶管絃其一海宇欣瞻瑞氣融臣民拜舞共呼嵩八方長養春風暖萬彚昭蘓聖澤洪苑柳都依丹陛緑宫花齊傍御筵紅陽和六合皆歡忭永祝長齡竝昊穹其二三月鶯花滿帝京山光遥映玉河清日迎劍珮金門曉雲拂笙歌綵仗晴南極星輝甘露降西池仙集瑞芝生已同民物登仁壽願竭葵衷奉聖明其三璇宫建極喜當陽壽域𢎞開景正芳柳􅆺花明千色錦鳯儀獸舞萬年祥恩周大地書金鏡樂奏鈞天進玉觴下士叨陪鵷序末拜颺長頌九如章其四進士臣覺羅吳拜六龍天位正時乗奮武揆文景福増五十二年勲赫奕百千萬禩道恢𢎞羣看瑶圃仙桃熟共祝皇圖化日升民物竝躋仁壽域箕疇歛錫慶休徴其一大德從來享大年我皇受祿更超前梯航萬國供琛賮燈火千門奏管絃簇簇朱纓趨玉陛煌煌仙饌列瓊筵歡聲恰共春雷動祝嘏先賡天保篇其二六符光潤泰階平況復三春品物亨九奏樂和開鳯扆百花春暖拂龍旌欣逢華祝三多日慶衍嵩呼萬歲聲衢室一樽同獻壽如天如地擅鴻名其三垂衣致治邁軒唐寶祚珍符竝古皇金母西來呈瑞氣木公東至現祥光椿齡詎以春秋計蓂算初看嵗月長拜舞幸陪鵷鷺後觴稱萬壽祝無疆其四進士臣孫宗緒紫垣炳耀日輪紅華渚祥光䕶法宫鳯扆花明三月裏龍爐香繞五雲中千官獻壽冠裳集萬國輸忱玉帛同樂奏鈞天看拜舞一時鼇抃效呼嵩其一萬物亨嘉海國春蠲租歲歲洽皇仁恩覃動植如天覆德冠勲華又日新鼎祚熙隆垂億禩乾行化育福生民箕風畢雨皆從好景祿鴻庥次第陳其二開拓邊陲聖武昭航琛輦賮豈辭遥雲雷鼓盪煙塵靜海嶽懷柔玉燭調瑞日中天崇闕里薫風大地動簫韶巍巍功德猶無逸鑾輅時廵岳牧朝其三作人雅化啟昌期髦彦觀光拜聖慈試院新開龍虎榜上林徧植鳯凰枝升恒日月無疆厯喜起堂廉有道時玉軸金緘齊獻頌萬年天子太平基其四萬壽盛典初集卷九十七
