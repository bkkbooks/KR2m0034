body:
  text: 欽定四庫全書萬夀盛典初集卷一百五歌頌四十五武職諸臣萬夀詩七言律八首侍衛臣楊凱萬年歡慶永垂衣四海謳歈集帝畿仙仗早排雙鳯舞彩雲時䕶六龍飛琪花夾路連青瑣瑶草當階向紫微聲教覃敷由聖武懐柔到處樂瞻依其一萬象雍熙雨露新河山一統布陽春長瞻紫氣光南極共挹瓊漿夀北辰淑景移時傳大濩御筵開處肅鈎陳稱觴舞鶴連翩至綘老齊來祝大椿其二萬民愛戴競嵩呼航海梯山謁帝都三面網開頻赦罪九重詔下屢蠲租生成髙厚同天地組繡街衢儼畫圖採得紫芝堪獻夀丹砂騰瑞滿金爐其三萬國同風徳化成恩膏猶自沛民生省方屢見泥封降問俗頻煩翠輦行粟發天倉充玉粒澤施湛露足金莖黄童白叟歡無極騎竹扶鳩賀太平其四萬㡬時暇煥天章宸翰生輝御墨香筆挾蛟龍騰錦繡詩成珠玉富縹緗千門日暖煙雲麗三殿風和日月長制誥典謨垂不朽鳯凰池畔進霞觴其五萬方玉帛㑹彤廷鸞珮鏦鏘列紫扃薄海咸寧歸聖治與天齊夀祝昌齡千條細柳飄丹陛百丈喬松映翠屏宴樂已深魚在藻九州照耀老人星其六萬類霑恩大化周飛濳動植庇洪庥貢來筐篚丹霞燦集得共球瑞靄浮宵旰千年調玉燭乾坤一統奠金甌須知仁夀髙今古惟有唐虞尚足儔其七萬夀無疆頌聖君階前舜樂動南薫青龍夭矯盤雙闕黄鶴蹁躚出五雲大地祥光時繚繞上林佳氣日氤氳蟠桃花發春風裏曲奏鈞天次第聞其八萬夀表壬辰科分撥八旗武進士臣萬國寧等伏以一人有慶敷天同景運之隆萬夀無疆寰宇衍昇平之福金鑑懸於黼座日映金莖玉衡奠於泰階春綿玉厯縫掖與韜鈐竝奮藿葵與芹曝同傾望闕雲翔呼嵩雷動臣等誠歡誠忭稽首頓首上言欽惟皇帝陛下天亶神靈首出庶物虹流華渚占瑞應於髙辛電繞斗樞集禎符於軒帝仰聖孝則尊養兼隆慶叶於慈寧長信煥宸猷則作述竝茂光照乎東壁西園翕河喬嶽沛膏雨於時廵平地成天利隨刋於億載職方作貢不遺乎銅柱珠崖王㑹陳圖逺暨乎金城玉塞廣桂林杏苑之英探玉海珠淵之秘期門羽林之士亦得觀聽圜橋中逵兎罝之夫竝許覲光塲屋仰聖主之偉徳豐功無非衍慶凝休之自䝉國家之深仁厚澤總是祈天永命之基是以數應昌期天開夀域嵗徳在癸五行逓獻其休嘉月令方春萬物正當夫和㑹御宇歴五十二年之久如日方升聖誕逢六十萬夀之期普天同慶山鞮海譯萃萬國之衣冠雲燦星輝啟千門之閶闔花凝湛露競舞堯階草帶春暉齊瞻舜日疏仡循蜚而下千古未逢雲司鳥紀以還百王莫尚臣等才疎豹畧幸與鷹揚際聖世之修文偃武已能脱劍而韜戈遇盛朝之久道化成竊慕敦詩而說禮幸際太平之日可無頌禱之詞是用恭進夀詩仰邀聖鑒窺蠡測管何有當於髙深向日傾陽聊以申其忠愛伏願疇陳五福雅奏九如集帝王未集之嘉禎以萬紀年以百紀世開宇宙未開之鴻圖與天同運與地同貞從此果獻安期桃供方朔雲開青鳥非止器車澤馬之祥書吐玉麟永徵海晏河清之瑞矣臣等無任瞻天仰聖踴躍懽忭之至謹奉表稱賀以聞萬夀詩七言律各一首武進士臣萬國寧寳厯膺圖夀域長太平有道慶垂裳梯航一統尊王㑹劍佩千官列建章五色雲開閶闔曉九霄曲奏鳯麟翔駐顔無事崆峒訪化洽虞廷徳邁唐武進士臣岳旻紫雲縹緲䕶天顔海宇春深嵗月閒大小共球來下國百千玉帛㑹塗山巍然帝徳無能頌穆矣皇風孰與班自是華封人善祝願賡甲子紀循環武進士臣羅兼能日麗堯階祝聖人普天同慶太平春四時好景當三月萬夀霞觴正六旬蓬島神仙朝玉座天街歌舞洽芳辰韜鈐幸與冠裳㑹願效華封頌大椿武進士臣徐家騏四海昇平久化醇巍巍覆載徧深仁道隆虞夏心源逺學貫羲黄徳業純蕋榜重開多士喜國租全免萬方春微臣際此歡無極願效嵩呼祝聖人武進士臣袁宏譽鳯城春暖紫雲旋濟濟稱觥繞御筵至徳自應凝大寳長生原不學神仙三多作頌周華界萬嵗呼嵩震嶽巔寰宇已臻仁夀域小臣稽首樂堯天武進士臣施嘉檝盛朝作覩正當乾聖藻神謨煥九天鶚薦欣開賡鳯闕鷹揚喜集傍龍筵蓂舒望日看三莢柳曵春風拂五絃共仰紫宸𢎞夀域年年長耀泰階前武進士臣李師孟乾徳當陽景運隆天開夀域慶時豐九霄仙樂翔威鳯五色雲車駕綵龍重譯梯航瞻紫極三春花柳祝華封千秋不用陳金鏡大地欣看瑞靄重武進士臣左宗魯春暖鶯花繞建章萬方齊進萬年觴恩光與日流輝逺健徳如天被澤長化宇人人歌有慶康衢處處祝無疆小臣已洽三多願咸擬新詩作對揚武進士臣張起鵬春風暖拂萬年枝率土臣民捧夀巵甲子初周綿鳯厯卿雲復旦繞龍墀梯山航海朝天國舞巷歌衢祝聖時帝徳無疆同大造呼嵩願獻九如詩武進士臣柴基鼇禁清和敞御筵東來紫氣接爐煙萬年聖夀方周甲八極皇仁總若天厯數久膺踰亘古版圖無外邁從前春臺共躋恩波永率土争傳三祝篇武進士臣畢宗魯聖主當陽萬象昌天開夀域悉來王八荒拜舞天顔近四海謳歌寳籙長文徳昭囘雲漢曉武功震疊甲兵藏欣逢盛世新承寵共效嵩呼祝未央武進士臣王有才五色雲開麗碧天春囘甲子運初旋梧岡翽羽來三月洛水呈圖祝萬年冠珮盈廷趨閬苑車書重譯舞瓊筵草茅下士霑榮寵共沐恩波到日邉武進士臣章尚桓聖徳巍巍天徳同民依宵旰厪宸衷治逢文武成康世人在雍和熙皥中物阜民安忘帝力河清海宴頌神功化霑黎庶偕仁夀嵗嵗田疇報屢豐武進士臣焦熹五雲深處接蓬萊鳯詔銜恩沛九垓福國有徵皆樂土仁民無地不春臺西池盤獻蟠桃熟南極星輝夀域開更有作人𢎞雅化文經武緯集英才武進士臣馬純士南極祥雲䕶紫宸太平長頌萬年春盛朝有道兼堯舜帝徳無私集鳯麟神管繁吹連御苑玉臺髙處接仙真梯航共喜瞻王㑹日麗風和祝聖人武進士臣符鎮菁葱佳氣開南極斂福皇躬集衆庥佛日喜添新甲子堯年髙占古春秋航琛輦贐同朝㑹劍佩星冠拜冕旒犬馬微臣心戀主嵩呼猶得逐鵷儔武進士臣王鎮維太平天子正當陽宇宙雍熙化日長四海堯封霑雨露千秋禹甸沐恩光嵩呼共獻南山頌華祝同賡雲漢章荷寵無由抒愛戴瑶堦惟進萬年觴武進士臣蔣騄堂亷一徳慶明良化宇昇平樂未央萬國來朝争就日一人有慶正當陽瑶池春暖蟠桃熟上苑風和海鶴翔聖夀天齊山嶽永願從鵷鷺頌無疆武進士臣郭士焞雍熙盛世慶方新南極星光向紫宸快覩仁風周海宇欣瞻雨露徧黎民九重福禄歸天子萬國衣冠祝聖人恭沐皇恩無可報年年三月頌長春武進士臣郭豐年萬年枝上萬年春萬嵗樓頭萬嵗人春到萬年增爛熳人逢萬夀倍精神萬民鼓腹歡無極萬國來朝慶有辰此日聖躬涵萬福三千桃實八千椿武進士臣朱銳華渚虹流早發祥中天景運際時昌文明治定超千古武畧功髙震八荒南極春星輝紫禁西清寳翰麗奎章萬年同進無疆祝率土長瞻日月光武進士臣魏琛聖主當陽御紫宸蟠桃此日獻方新玉階瑶柱青天色甘雨和風大地春東海籌添來瑞鳯南山樽滿集祥麟太平盛事流恩逺萬嵗千秋祝聖人武進士臣朱先甫聖人天地富春秋寳厯初逢甲子周南極祥光凝鳯闕西山佳氣接龍樓千州齊頌華封祝萬國欣瞻海屋籌獻夀小臣常仰戴堯天舜日鎮悠悠武進士臣崔起潛春深御苑柳垂青羣捧堯樽祝大廷自古虎賁曾脱劍於今介士盡譚經泰階端拱千年聖玉燭常調萬國寧新進小臣何所頌願將聖夀比椿齡武進士臣金球花明景淑富春天佳氣葱蘢靄御筵瀛海靈椿多瑞彩滄州紫桂永鮮妍嵩呼有慶三千國華祝無疆億萬年蕩蕩巍巍功徳茂彤墀敬進九如篇萬夀詩七言律八首有序總河標下左營卓異遊擊臣費俊欽惟我皇上徳合乾坤恩覃中外勵精勤於五十二載開太平以億萬斯年恭逢聖夀六旬兹當春王三月龍徳正健鳯厯方新天成地平八表際時雍之運星輝雲爛萬方慶熙皥之春道統接乎唐虞心源契乎孔孟魚躍與鳶飛共樂黄童偕白叟齊歡臣俊一介武臣四聲未辨管窺蠡測豈足仰重夫髙深就日瞻雲不禁覲光而踴躍嵩呼萬嵗聲應六合之歌詩獻七言喜同百獸之舞云爾太平天子命長膺徳徧垓埏萬國承六十元辰光始旦八千寳厯日方升聖躬行健乾符合夀域宏開泰象徴春轉青陽廻斗柄絪縕北極紫霞凝其一集成聖統學深純金鏡髙懸億禩春超軼百王傳寳訓甄陶萬類入洪鈞圖疇列覽通神契洙泗傳心味道眞徳合古今隆建極苞符洽治景常新其二人樂雍熙有道年身兼創守日乾乾三朝謨烈心源在萬國尊親色養全甲帳齋居懐櫛沐泰壇䖍禱為桑田九重宵旰眞無逸不用詩陳抑戒篇其三平平周道潤恩膏蕩蕩堯封入覆幬亥歩應嫌瀛海小騫槎未覺漢津髙嵩呼㑹見來重趼華祝從今徧不毛赫濯聲靈清八表小臣猶喜記龍韜其四賜復蠲租億萬千歡聲雷動自年年三章謹飭恩彌渥五聽精詳志益䖍禮洽百神呈玉檢河浮五老授瑶編吹豳響叶雲璈奏擊壤耕歌慶普天其五萬年虎拜㑹熙朝咨命從容整百僚獨運乾綱周赤縣髙懸離照徹青霄寅恭入詠官方飭廉法垂箴睿慮遥一徳明良徵盛事賡揚倘許附簫韶其六聖世人文久道成龍鬐鳯藻振青㝠長庚巳自臨奎宿南極還看聚徳星繡仗材官知嗜學花門侍子盡横經作人夀考傳歌徧惟願思皇翼萬齡其七浩蕩深仁暢八埏星雲糺縵自章天禽魚咸若乘時樂草木争榮向日妍五十二年恩普徧百千萬載厯長綿九如稱祝瞻皇極嵗嵗霞觴進御筵其八萬夀詩五言律四首候推守備臣陳天祚鳯厯周花甲龍圖啟令辰應期千載遇錫類萬方均朱草敷丹陛黄雲䕶紫宸君王長燕喜寰宇沐深仁其一運闢貞符㑹天開聖治昌寰區登夀域恭已在巖廊旭日堯尊啟薫風舜樂張呼嵩聲一概萬國仰垂裳其二㑹逢開泰日時喜值東皇淑氣澄青瑣春膏溢建章六宫歡獻嘏百辟肅稱觴處處康衢頌謳歌化日長其三鶴算皇圖茂龍飛帝祚長眞能六五帝從此四三王威烈超周漢雄規藐宋唐小臣慙吉甫行李阻蠻鄉其四萬夀詩七言律一首原任廣東連陽營俸滿千總臣髙日巍巍帝徳大同天甲子籌添億萬年日燦五雲開鳯尾煙晴雙闕裊龍涎瓊花琪樹傳仙仗火棗交棃集御筵一曲九如環拜舞深承雨露浩無邉萬夀盛典初集卷一百五
