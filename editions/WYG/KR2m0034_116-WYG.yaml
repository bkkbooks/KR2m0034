body:
  text: 欽定四庫全書萬壽盛典初集卷一百十八歌頌五十八生監諸臣九萬壽詩五言排律十二韻生員臣程宜瑛瑞靄浮金闕祥光耀紫宸九天舒化日萬國慶靈椿秩秩歌天保綿綿頌錫純長庚明綵仗花甲應芳辰帝徳穹蒼竝皇仁雨露均珠囊𢎞擢秀珊網備蒐珍造士聮奎壁徴才集鳳麟龍門爭跋浪雁塔喜超塵春苑鳴苹鹿秋風躍藻鱗藝林揚盛典海宇拜恩綸詞進華封祝懽同虎觀臣謳吟億萬載長奉太平春萬壽詩五言排律六韻生員臣潘止敬帝闕陽春麗皇都紫氣浮天官推厯永甲子紀年周人慶南星拱恩從太液流徳同天地大福與海山侔瑞靄連三島彤雲映十洲瓊僊齊獻果海屋喜添籌萬夀詩五言排律六韻生員臣李基溥聖主膺三祝羣臣進九疇紅雲春殿繞紫氣玊階浮萬國来鞮譯千官拜冕旒湛恩深薄海甘露灑瀛洲丹鳳明廷集祥麟上苑遊泰階調玉燭千載奠金甌萬夀詩五言排律六韻生員臣左文言聖人稱有道天子慶長年蓂莢迎春長珊瑚映日鮮十年增虎榜一歳看蟬聮香裊金猊案衣籠御座煙龍門翻浪暖驥足著鞭先願上岡陵頌吹嘘到九天萬夀詩七言律一首生員臣沈謨繞電流虹慶大椿甄陶萬彚藉洪鈞望来天上昭雲漢化徧人寰起鳳麟三月欣逢桃浪暖一枝先試杏林春敢將聖主賢臣頌還向堯樽祝紫宸萬壽詩七言律一首生員臣沈之錫五色雲光映紫宸𢎞開閶闔集冠紳文章蔚起山河秀壽域長瞻天地新雁塔名題秋月桂鹿鳴宴錫杏林春太平天子崇文教繡繪山龍集鳳麟萬壽賦生員臣殷譽慶猗惟我皇與天同壽道極高深恩均載覆𢎞仁則參贊施生至德則彌綸宇宙以生民未有之聖人開萬世無疆之崇搆維久道之化成統寰區而教富既治理之郅隆亦賢才之輻輳蒐羅盡巖穴之士攬擷備山川之秀天章聿炳於昭囘棫樸早儲夫薪槱文明當糺縵之時運㑹際昇平之候蓋聖作物覩之昌期實曠古今而希遘是以四海宴安世臻熙皥五風十雨天不愛道器車馬圖地不愛寶囿来一角之麟厨扇萐蒲之草乃聖心不侈夫禎祥惟期得俊民而子孫永保宜英傑之挺生若水流濕而火就燥惟輔弼之皆賢贊久安之治道承筐爰詠夫鹿苹飲酒載歌夫魚藻茍一技之有長莫不向大廷而抒其懐抱爾乃訓誡𢎞宣廣頒條約鼓勵真儒褒崇正學士先觀其器識習無取乎佻薄煩謨誥之諄諄蓋統君師而揚夫教鐸自此文受範模行循榘矱誦法古先尋求奥博茍能績學以種文莫不離蔬而釋屩盡辟雍之與頖宫相率歡欣而頌作縱極蠡管之測窺亦安能形容海天之約畧兹者慶逢周甲律轉洪鈞祥開天地歡動臣民正純禧之大屆更景福之維新春生有脚澤被無垠將敷天之錫祉尤殷情於樹人特行曠典興我嘉賔禮闈棘院竝舉非頻應斯科而獲雋虚儒席以聘珍於是殫思頌禱悉意敷陳唐虞遜徳此後無論維川淵奫維嶽嶙峋維日月光華維雨露施仁合而擬之仍不足以盡我皇之聖神宜乎天眷令徳保佑重申卜年卜世萬禩千春萬壽詩七言律一首生員臣田掄元泰運𢎞開正艶陽萬方歡慶壽無疆鶯聲曉囀春城栁花氣風傳御苑香威鳯祥麟来玉闕蟠桃碧藕進瑶觴作人幸際文明世虎拜懽呼向建章萬壽詩七言律一首生員臣吳士雍慶雲瑞靄滿皇州獻壽南山對冕旒衡嶽祥煙浮北闕鈞天廣樂下僊樓九重樂育𢎞施網萬國衣冠集貢球此日臣民齊拜手皇恩浩蕩莫能酬萬壽詩五言排律十二韻生員臣田多稼至德千春茂陽和萬國同山川騰瑞靄人物樂條風錫慶周天壤霑恩徧叟童長庚光炯灼泰岱勢巃嵸紫氣函闗外丹砂蓬島中河清歌有道物阜兆恒豐德與年加進心隨耳順通華封歌正祝籲俊典尤崇自是唐虞盛應收屏翰功羣儒爭起鳯多士盡飛熊造物呈靈異神明感帝聰瞻天歌化日率土盡呼嵩萬壽詩五言排律十四韻生員臣陸壽登聖主稱觥日鄉書特貢年雲間敷五色桃實艶三千淑氣迎宸幄箾韶徹御筵苑鶯聲百囀宫栁日三眠海屋崇堯算薰風鼓舜絃神靈原首出濬哲自心傳揮管龍蛇動摛詞金石宣一天章燦奎璧睿藻煥山川形勝勤周覽威靈溥幅員河平安洚洞刑措慶生全吏績咨諏徧民脂萬億蠲𢎞恩遐邇暢特典譽髦宣射策春秋接掄才冰鑑懸儒生羣抃舞遙獻九如篇萬壽詩五言排律十韻生員臣徐九臯禎祥新聖厯奎壁燦文芒快覩光華被欣逢景運昌化成縁久道風動徧遐荒工尚傳先榘農猶服舊疆鳶魚歸帝澤雲漢爛天章閶闔絲綸下王言渙汗揚春桃三汲浪秋桂八枝芳一鑑無遺照千年有道長仁賢綿國脈魚藻進霞觴抃舞南山祝欣逢鵷鷺行萬壽詩五言排律十二韻生員臣陸汝賢青禁五雲連嵩呼億萬年聖人新甲子寶籙永坤乾淑氣躔黃道祥光接翠旃星辰華蓋轉日月衮衣懸瑞律調皇極薰風協帝絃醖來瓊醴熟擎出絳桃鮮金鑑千秋録瑤池萬嵗筵逺臣羅貢篚近侍挹爐煙聲教千巖接光華八表傳謳吟盡童叟歡洽徧山川鵰鶚乗時奮菁莪被澤宣小臣欣拜頌翹首祝堯天萬壽詩五言排律十二韻生員臣李東櫰聖壽春臺麗賓興萬國同奎光浮宛委道氣接崆峒異數聮三榜洪鈞轉八風獻琛金管艶充賦紫泥融共荷甄陶澤羣資化育功杏花鳷鵲觀桂樹蘂珠宫百寶投淵鑒千英簡帝衷球圖添甲乙竹箭富南東太史河成鏡文昌宿吐虹彈冠欣宴鎬珥筆願呼嵩函德芝生殿朝陽鳯萃桐綿綿增介祉申錫自蒼穹萬壽詩五言排律十二韻生員臣史薫義運泰敷文治時淸兆嵗豐堯天歌帝力禹甸仰皇風耕織安田野詩書廣學宫星雲輝域外雨露浥寰中喜值青陽轉欣看紫氣叢千官齊祝嘏萬國盡呼嵩棫樸收髦士菁莪溥化工衣霑楊栁緑㡌壓杏花紅庶類歸陶鑄羣材樂冶融殊恩光史冊大德配蒼穹薄海謳歌徧巖廊喜起同雝喈鳴盛世巷祝達宸聰萬壽賦生員臣顏欽契天鑒帝之令徳兮紛錫予以禎祥鹿銜芝以獻壽兮鸞鶴下而迴翔摘曼倩之僊桃兮羞王母之瑤觴嵗星見於南極兮占鼓翼而角芒惟聖人之卜算兮參覆載而無疆開閶闔於雲表兮香煙凝以成蓋儼九重之春色兮覲天顏之仁藹衣冠集而趨拜兮戛鸞聲之噦噦受萬國之共球兮雜南金與大貝洵六合以為家兮環九州而如帶卿雲爛而旦復旦兮厥惟時之泰也耕鑿適而利其利兮膏澤未有艾也沐時雨以發榮兮芝蘭茁而滋華猗桃李之芳菲兮披惠風而交加惟賢才之衆多兮叶周南之兔􅆯彼姝子之在浚兮保貞白而待年髙予冠之峩峩兮長予佩之翩翩潄六經之芳潤兮組百氏而窮研夢寸管之生花兮思滔滔而湧泉抱美玉以求售兮冀中選於青錢幸遭逢夫堯舜兮歌明良於喜起擷江蘺與杜若兮詔旁求而未巳爰一嵗而再試兮致才人於金戺開將軍之武庫兮霜飛清而電紫𢎞百年之化育兮允薪槱之嫓美士彈冠而致慶兮茅連茹而彚征麗奎璧之璀璨兮拱北極而耀長庚俾金甌之永奠兮調玉燭以長明頌聖壽之綿綿兮對南山而稱觥採下里之謳歌兮將以效夫載賡萬壽賦生員臣金澤茂天苞地符海宴河清星陳雲爛時物行生一人有慶兆民永寧我皇御極五十有二業咸五而登三德參天而兩地數成功與文章蓋指不可勝記一哉王心尚不遑寐勤勤懇懇安懐素志方灼之以憂勞鍛之以仁義鍊之以小心鎔之以淵毖已安而益求其安已治而更希其治恭逢甲子之初周共慶萬壽之無疆百爾咸集萬國趨蹡當天壽之方增正人文之蔚昌乃設特科舉英賢四門闢文教宣期轉甲乙於春秋例定昌辰於十年爰瞻濟濟風接雲連東箭偕南金咸利雕龍共繡虎爭先時則仙李舒榮露桃呈秀色映蓬萊光吐奎宿文星向長庚而耀彩南極拱天樞而稱壽祝天子於萬年如松栢之長茂既民人之咸宜自申命而保佑萬壽賦生員臣許祖䕶道超今古徳邁唐虞皇仁逺播大澤旁敷草木滋榮於化日士民鼓腹於康衢爾乃嵗逢癸巳令協勾芒律中姑洗治洽青陽登大年兮三月既望祝聖人兮萬壽無疆耀貞觀之日月頌孔固之陵岡振嵩呼於輦轂集車書於遐方於是特頒綸綍用廣制科東南之竹箭欲盡牛斗之光氣猶多指南山兮獻壽觴北斗兮陳歌玉燭賡兮山河固金甌叶兮嵗華新鞏基天保竝神仙而不老吐納元和偕民物以俱春萬壽賦生員臣莊橒皇奠九宇繼天立極保合太和萬邦是式惟久道其化成協天人而胥悅闢賢闗開壽域扇仁風覃惠澤握金鏡調玉厯兼容并包盛德大業稽上古而無儔按史冊而罕匹臣何人斯能窺測其萬一也緬維易著元吉詩樂嘉賓禮徵大順書稱俊民凡六經之所載典莫大乎作人故聖作物覩靡不尊親濟濟多士景附響臻鍾川岳之英異集海宇之奇珍咸拜稽於北闕願爭效乎紫宸殆將竝日月以有永統四時而皆春者矣然而至德難名神功不有渺喬松之虛無惟敬勤之益懋念樹人之為亟更儲材於林藪誠所謂得士者昌惟仁者壽歟爾迺雲漢昭囘奎躔朗映開明堂而朝百辟布陽和以順時令六位昌三階正上下交人文盛羣公卿士踴躍歡幸明哉良哉以歌以詠乃歌曰帝德廣運兮與天無極行健永貞兮自強不息海隅日出兮悉主悉臣梯航萬國兮重譯来賓所寶惟賢兮以康兆民千秋萬嵗兮長奉聖人萬壽詩五言排律十四韻生員臣李𢎞迪太和凝紫氣南極煥星芒鳯閣春風暖龍樓旭日光籌添甲子徧算衍地天長洞府滋僊李瑶池酌玉漿嵩呼呈藹吉川至衍嘉祥共效華封祝齊賡天保章升恒如日月陶淑賴君王詔自金門下才憑玉尺量杏花舒異彩桂蘂吐奇香連茹歌征吉遴才慶濟蹌仙班聮玉笋雲馭擁鸞凰治化敷寰宇裁成暨朔荒藜光同照灼湛露共汪洋值此文明代休徴仰矞皇萬壽詩七言排律八韻生員臣邢鼎鴻開運會發禎祥元后懐柔協萬方富有日新昭大業化成久道燦𢎞章已偕品物陽和布更樂英賢教澤長十里杏紅霑湛露千江桃浪湧瓊漿聮飛鵷鷺誇題雁爭握珠璣溢佩囊五鳯樓頭明錦翠萬年枝上炳霞光譽髦濟濟胥稱瑞玉帛紛紛共獻觴大徳懋昭天眷佑純禧永錫正無疆萬壽詩七言律一首生員臣何觀國聖人有道厯無疆大徳隆施邁百王萬國衣冠瞻炳蔚九天奎壁燦文章欣看蘂榜登龍虎喜見僊班舞鳯凰共祝堯年齊泰岱上林棫樸沐恩光萬壽詩七言律一首生員臣郭從先玉殿春和淑氣催千官鷺序祝臺萊琳琅韻叶鈞天樂靉靆香凝承露臺丹鳯銜書蓬島出紅綾裹餅曲江來上林有樹寒鴉借願拜龍墀獻壽杯萬壽詩七言律一首生員臣王貞恒南極昭囘䕶紫宫玉階仙莢鬱青葱九衢淑氣瞻雲日千載昌期祝華嵩上苑琪花濡雨露高岡彩羽拂梧桐遥呼萬壽情何已天保陳詩愧未工萬壽詩七言律二首生員臣陸廷墀巍巍帝徳出乗乾治法還兼道法傳正大皇圖真邁古光明睿學足開天五雲擁瑞龍顔喜三月書祥鳯紀妍草莽微臣何所頌無疆寶祚祝年年其一鷺羣蹌濟立螭頭却喜同時上十洲琪樹葱蘢僊仗外金猊縹緲御香浮嵩呼萬嵗連塗巷鏡獻千秋近冕旒此日春光渾似海洪慈覆冒任遨遊其二萬壽詩五言排律八韻生員臣查克鎔皇都春正麗聖厯慶方周歡忭盈衢路趨蹌傍彩斿山川俱被澤動植盡蒙庥臣效呼嵩瑞民喧擊壤謳貞符綿甲子祥莢紀春秋和氣三光協仁心兩大侔高岡集鳴鳯夾道擁扶鳩願進三多祝隆恩萬禩流萬壽詩七言律一首生員臣朱泓僊掌高擎玉露新宫花御栁麗昌辰三千禮樂陪青瑣萬國衣冠拜紫宸雉尾扇中開壽域獸爐香裏靄長春龍城佳氣雲初合共識恩波大地均萬壽盛典初集卷一百十八
