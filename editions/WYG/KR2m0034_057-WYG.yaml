body:
  text: 欽定四庫全書萬壽盛典初集卷五十九慶祝五貢獻六是月致仕在籍諸臣先後進獻詩冊古玩書籍土宜等物慶祝萬壽上收受詩冊及書籍土物有差餘皆却之是時致仕在籍諸臣詣京慶祝者江湖魏闕境地雖殊頌禱謳歌尊親無二莫不製為詩文寫成卷冊及家藏書畫古玩土宜物産與在位諸臣後先進獻惟是慶祝之後各旋田里别無冊籍可稽謹就三品以上耳目見聞所及畧記如左至滿洲漢軍致仕大臣近居輦轂貢獻更繁古玩而外仍照原品亦進縀馬僅載一二以例其餘其止進詩冊者竝詳歌頌卷中不備錄焉吏部尚書致仕臣宋犖㳟進太平惠民和劑局方一部歐晁琴趣一部名人法書四卷古畫三軸文玩六件經筵日講官起居注吏部尚書兼翰林院掌院學士致仕臣徐潮恭進漢紀二套小板名山藏四套趙孟頫臨道徳經二種董其昌臨顔眞卿書二種壽星圖一軸哥窑壽佛一尊杭綾一百端杭紬一百端杭扇二十匣湖筆三百枝原任經筵講官户部尚書臣王鴻緒恭進萬壽頌一冊銀晶大士一尊瑪瑙壽星一尊脂玉雙螭盃一隻脂玉花觥一品脂玉筆牀一對壽字玉水盛一品嘉窑茶盃一對萬窑宫碗一對嘉窑茶撇一隻壽字嘉窑霽青茶盃四圓宣銅案爐一座壽山福海嘉窑茶盃一對官窑黃壽芝一盆硯山紫壽芝一座天仙拱壽宋刻絲書一軸萬壽描金箋一百幅壽山石圖書一對嘉窑合碗一隻宋板唐孔頴逹周易義一部宋板唐陸徳明詩經重言重意互註一部宋板太學類編成周制度一部宋板吕氏讀詩記一部宋板劉敞七經小傳一部宋板韜畧二本宋板許愼說文解字一部宋板孫愐唐韻一部宋板王昭禹周禮詳解一部宋板資治通鑑考異一部宋板大廣益㑹玉篇一部宋板唐陳子昂集一部元板資治通鑑一部計二十套朝鮮板唐柳宗元文集一部舊板子彚一部明沈度金書華嚴經一部明董其昌審定戲鴻堂帖二部宋高宗御書杜詩一卷北宋燕文貴秋山蕭寺圖一卷北宋李公麟華嚴變相圖一卷元趙孟頫楷書道徳經一卷元趙孟頫浴馬圖一卷元錢選秋江待渡圖一卷元錢選田家聚樂圖一軸明文徵明秋林談道圖一軸明董其昌書吕祖金丹詩一軸明仇英大士一軸明董其昌畫一冊明董其昌書桃源行一冊明董其昌書清靜經唐詩一冊明項聖謨花卉一冊官窑水盛一面定窑水池一面宣窑霽紅盤一對宣窑把盃二對宋製番瑪瑙香盤一面西洋地平儀一架西洋察量逺近儀器一箇西洋小規矩一箇西洋吸鐵石一塊計吸十八觔西洋鹽露一瓶西洋流黃露一瓶西洋象牙塔一件西洋象牙簫一件西洋鼻煙二瓶西洋法琅鼻煙瓶三箇西洋化五金水一瓶西洋方石一塊西洋羅斯瑪里諾露四瓶西洋保心石一塊西洋巴爾撒木阿餑餑克里的果一盒西洋顯微鏡一箇西洋寳燒瓶二箇西洋規矩四箇西洋古巴依巴油四瓶西洋火漆一匣西洋巴爾撤木油二盒西洋葡萄酒六瓶西洋徳里亞格二匣西洋法琅珠子三十三箇西洋香二匣計二塊西洋巴爾撒木香珠十掛西洋法琅珠二掛原任户部尚書臣凱音布恭進鞍馬一匹散馬一匹縀八匹禮部尚書致仕臣許汝霖恭進萬壽詩百韻黃庭堅白鶴娯賔二賦一卷趙孟頫金丹訣千字一卷趙雍蓮經萬言一卷董其昌千字文一冊董其昌仿顔眞卿懐素二種一卷文徵明西園十詠一卷宋宣和御書鴛鴦一幅李龍眠壽仙像一幅呉鎮江村漁樂圖一卷劉松年山水一卷趙孟頫雙駿圖一幅董其昌夏山圖一幅杭綾一百疋杭綢一百疋原任兵部尚書臣范承勲㳟進萬壽寳瓶燈一對蟠桃花實燈一對八方大理燈一對六合寳瓶燈一對百壽博古燈屏一架原任刑部尚書臣阿山恭進舊板羣書考索十套爾雅註疏二套韓文全集二套歐文全集四套五音集韻二套趙孟頫泥金楷書一冊馬逺海屋添籌圖一軸王鵬梅五雲樓閣圖一軸沈香筆海一座琪南香山一座墨晶仙人一座宋窑花挿一件宣窑萬壽碗一對青綠古銅瓶一座鞍馬二匹縀十聨原任經筵講官工部尚書臣徐元正㳟進泥金佛經法書全部髮繡觀音像一軸趙孟頫百鹿圖一軸董其昌書彭祖頌一軸漢白玉連環一件銀晶壽仙一座萬壽盤龍黃磁斗一件原任吏部左侍郎臣李錄予㳟進糖果八種蔬菜八種原任工部右侍郎臣彭㑹淇㳟進宋板尚書一套宋板柳宗元集二套祝允明書王喬赤松頌一卷董其昌書王貞白宫池産瑞蓮詩一軸文徵明江閣秋雲圖一軸仇英員嶠仙遊圖一軸玉盃一對溧扇四十柄南菜二十瓶原任内閣學士臣張榕端㳟進書畫玉器十八種土産食物二十七種候補内閣學士臣王之樞㳟進萬壽頌一冊舊板書四部名人字畫四種土産食物四種候補内閣學士臣顧悦履恭進萬壽頌一冊十三經註疏一部二十四套漢雋一部一套文中子一部一套宋板韓愈集一部四套董其昌書太極眞人歌一軸李廸𤓰瓞圖一軸趙昌上苑春鶯圖一軸八仙琥珀盃一對漢玉爐一座原任福建廵撫臣宫夢仁恭進大學衍義全部國語全部公羊傳全部穀梁傳全部硃印隂符經全部說苑全部端硯一方玉硯一方水晶瓶一座銀晶水中丞一件瑪瑙筆洗一件碧玉九螭鎮紙一件錦扇二百握草葛二百端桂花香四箱芙蓉巾二百條是月直省進士舉人貢監生員先後進獻詩冊書畫慶祝萬壽上收付内閣教習進士侍講臣文志鯨諭徳臣呉廷楨率進士臣查雲標等七十七人恭進萬壽詩一套共四冊八旗教習武進士臣萬國寧等七十餘人恭進萬壽詩共二冊舉人臣李長庚等六十餘人武舉臣呉士亨等三十餘人各恭進萬壽詩共數十冊御製詩集箋註等書共數十部國子監官學教習貢生臣呉鍾芬等四十人恭進萬壽詩一冊古書五部貢生臣周崧等九十餘人監生臣王宸儁等二百二十餘人生員臣吕渶等一百三十餘人各恭進萬壽詩共數百冊華封三祝等圖共數十幅提督江南學政左庶子臣胡􅃳率江南十四府生員臣田多稼等五百三十餘人恭進萬壽詩三套共三十冊是月直省耆老民人億萬先後詣闕進獻詩冊畫幅五穀土宜及萬民衣萬民宴等物慶祝萬壽上收五穀詩畫餘皆却之直隷省耆民曹鳯全等恭進泥金彩屏一架芳蘭瑞芝八缸仙花壽石八盆萬年青一桶碧桃盆景四種千葉紅杏盆景四種宣石盆景四架時果百盤七省旗丁三百餘人隨通州坐糧㕔徳成格恭進彩亭四座彩旗二十四面壽同天地大蠟一對宋刻絲八仙慶壽圖一軸萬年龍鼎一座惠泉酒一百罈萬年青一桶吉祥草一桶古松一盤蟠桃一樹海棠一盆玉蘭花一盆蘭花一盆蝴蝶莿花一盆江南省江寧府耆民趙椿如等恭進龍衣一襲彩亭一座小菜果品壽燭等八十一盤江南省蘇州府耆民張萬春等恭進繡字萬民衣一件繡字福壽圖一幅位祿名壽龍扁一架龍旂十六面宣銅五供全副大紅縐紗珠盤龍壽燭一對常熟盆景四種五穀土宜小菜食物一百盤萬壽詩共三十餘冊江南省松江府耆民莊國興等㳟進萬壽金龍袍掛全襲刻絲龍幛一軸織金龍旂一對龍燭臺香爐全副土宜一百盤江南省淮揚等府耆民李茂玉等恭進萬壽無疆幛一架天子萬年幛一架五穀果品八十一盤兩淮鹽商項鼎玉等恭進御案寳座錦筆龍箋縀疋浙江省耆民沈玉揚等恭進萬壽無疆錦幛百幅撃壤歌屏一架古佛一百尊嘉興張爐一百箇嘉興蒲盃一百隻杭綾一百疋杭紬一百疋小菜一百二十瓶五穀十二盤萬壽詩共五十餘冊兩浙鹽商江宏茂等恭進萬壽龍衣全襲綵縀一百疋銀二萬兩福建山東江西河南廣東廣西六省耆民張獻福等恭進萬歲嵩呼圖一軸萬壽多寳香山一座萬民宴八十一桌土宜九十盤山西陜西湖廣四川貴州雲南六省耆民田畯等恭進無量壽藏佛一尊九如圖一軸三多頌一卷土産食物一百二十盤山西平陽府耆民呉逢泰等㳟進御書亭一座恩上刻歴年詔萬壽採茶歌亭一座萬壽勝㑹圖一軸土産食物二十四色湖廣耆民吕永年等隨總督鄂海恭進土産食物九十盤通州回民百餘人恭進鮮魚二百尾是月外藩諸臣或親詣闕廷或遣使入朝畢獻方物慶祝萬壽上收受如常例其有加貢者皆却之科爾沁土謝圖親王鄂爾吉圖等烏朱穆秦車臣親王色登敦多卜等巴林多羅郡王額駙呉爾滚等阿霸垓多羅郡王呉爾占噶喇卜等喀喇沁多羅都楞郡王色稜等蒿齊忒多羅額爾徳尼郡王阿噶尼思塔等敖漢多羅郡王垂木珀爾等奈曼多羅郡王崔忠等喀爾喀多羅達爾漢貝勒占達古米等阿祿科爾沁多羅貝勒汪占等扎魯特多羅達爾漢貝勒阿達沙等毛明安多羅貝勒班第等蘇尼特多羅貝勒席里等杜爾伯特固山貝子沙津等阿霸哈納固山貝子額林陳達什等翁牛特鎮國公索諾穆等郭爾羅斯輔國公莽色等克西克騰扎薩克一等台吉齊巴克扎卜等呉喇忒公逹喇瑪錫禮固山一等台吉南充等土黙特貝子喀木哈巴雅思瑚朗圖固山一等台吉衮濟思札卜等鄂爾多斯貝子魯穆布固山台吉羅卜臧札賴特貝子特古思固山協理台吉何塔等喀爾喀扎薩克圖汗和碩親王多羅額駙䇿旺扎普等厄魯特多羅貝勒額駙阿保等以上共一百二十札薩克王貝勒貝子公台吉等皆親詣闕廷叩祝萬壽常貢之外又公進銀二十萬兩請建廟於熱河詳見加恩外藩及名山祝釐中厄魯特王策林旺布遣使宰桑多爾濟進萬壽貢喀爾喀折卜尊丹巴庫圖克圖遣使多爾濟萬書克拖應等進萬壽貢朝鮮國王李焞遣使議政府右議政金昌集吏曹判書尹趾仁等進萬壽貢臣等恭紀萬壽貢獻典禮仰窺皇上恭儉之徳慈惠之仁載稽史冊聖帝明王無與倫比昔虞夏之初任土作貢周官太宰以九貢制邦國之用一曰祀貢二曰賔貢三曰器貢四曰幣貢五曰材貢六曰貨貢七曰服貢八曰斿貢九曰物貢其多寡重輕之數一以式之所用為凖漢高帝十一年詔諸侯王通侯及郡常以十月朝獻獻以口數率人歲六十三錢給獻費唐時諸郡貢獻皆取當土所出准絹為價不得過五十疋其後常貢之外或以端午或以南郊别增貢款而誕聖之節昉自開元其初羣臣獻甘露醇酎王公戚里進金鏡綬帶開元二十四年千秋節羣臣獻寳鏡張九齡獨進千秋金鏡錄自是以徃踵事增華漸以侈費永泰大歴而後更極浩繁宋太祖建隆二年始詔停止後稍稍進奉遂有定額致滋耗累乾道間至有乞蠲免聖節貢金者較之古昔奉琛獻賮之風相去奚啻徑庭哉我皇上享萬方之玉食受四海之共球猶且蠲維正之供動踰億萬減外藩之貢每至再三凡所以惠愛元元軫恤物力者歴五十餘年如一日今恭逢萬壽昌期皇子皇孫上萬年之觴效斑衣之舞山龍華蟲宗彝藻火粉米黼黻之服無不備列珊瑚翡翠火齊木難琉璃夜光之屬無不畢具典禮𢎞鉅情文該洽可不謂極盛焉若夫天潢戚畹屬在懿親百爾臣工近居輦轂或承筐篚或駕驪黃或就其家世所藏金石圖書足供玩御者亦皆倒篋傾笥羅列而進至於海内臣民擕持負戴相屬於道莫不製為詩歌以道揚盛美形諸圖畫以摹繪太平凡服物器用山肴野䔩之類盡充庭實外至奉冠帶稟正朔如蒙古朝鮮諸國稽首闕廷畢獻方物者更不可以數計也此豈作而致之廹而應之徒侈煩費之文而繩以一定之例如唐宋以來之故事哉蓋由我皇上徳洋恩溥美利不言所以感於人心者至深且久薄海内外沐膏詠勤飲和食徳歲盈五紀世逮孫曾念衣冠之榮藉耕鑿之晏安高厚覆載之不遺茍非帝力何以致此咸思展其報徳之心而無由自達今幸逢萬壽之期得以稍效其區區之意要皆發於中之不容已動於情之不自知而并自忘其物之微且陋也乃衆志彌切而聖徳愈謙凡所貢獻却而不御間有得䝉聖鑒俯受一二者即已傳為異數震為非常於此益見我皇上體臣子民柔逺能邇之至意誠足以度越千聖逺駕百王者也蓋不殖貨利不寳逺物聖人之徳所性固然今萬壽貢獻皇上雖却而弗受顧載在簡編詞煩而不汰者一以徵四海尊親愛戴之誠一以著九重恭儉慈惠之美垂示萬世傳之無窮云萬壽盛典初集卷五十九
