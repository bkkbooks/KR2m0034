body:
  text: 欽定四庫全書萬夀盛典初集卷九十二歌頌三十二詞臣二十四萬夀詩四言八首翰林院庶吉士臣錢廷獻春日載陽聖人萬夀乾坤清寧川嶽澄秀百神懷柔翼衛左右元氣氤氲爰保爰祐和風翕習敷華錯繡金石肆陳簫韶迭奏鳯巢於閣麟遊於囿載賡載歌共樂永晝其一欽惟帝德其仁如天并包巨細萬物覆焉湛恩汪濊漸漬綿延飲和食德煦育矜全橫被六合周浹八埏熙熙皥皥食息惟便式歌且舞踴躍駢闐祝我君王億萬斯年其二行健惟天至誠無息三才萬象全體太極夙夜孜孜旦明翼翼巍巍成功顯顯令德自西自東自南自北六合內外歸我邦域君子勞心小人勞力世道淳和永以為則其三結繩代逺肇始文字言以旌心辭原達意作述相承同工異致聖人天縱周情孔思麟麟炳炳經天緯地焜耀瓊林輝映寶肆倬彼雲漢小大咸識遐齡寵錫載筆恭紀其四天命幽逺監觀有常聖人敬德格彼穹蒼體信達順視履考祥郊壇殷薦圭璧笙簧禮明樂備矞矞皇皇時雨而雨時𤾉而𤾉介兹景福其樂未央小臣矢歌萬夀無疆其五芒芒九州藝藝赤子惟耕與桑衣食視此男女效績不勤何恃載筐及筥秉耒荷耜經營聖心圖繪終始物阜年豐風清俗美遵道遵路遐邇同軌一人有慶萬年燕喜其六聖學昌明有覺羣曚淵源堯舜法式周孔庶民既興是戒是董一心樞機萬物綱總河海汪洋山嶽巃嵸百家泛濫回轉濛澒貫徹天人敕幾言動膺圖受籙萬億垂統其七化洽萬方韜垂三略廟算廣淵睿謀運度師出以律風雲揮霍德威惟畏荒徼絶漠載贄稱臣䖍恭謹恪草木向榮民物康樂開闢以來增其式廓悠久無疆躋堂進爵其八萬夀詩七言律二首翰林院庶吉士臣周天祜春風左個駕蒼龍萬派笙歌列鼎鐘川嶽綿長開泰運升恆永麗祝華封金莖仙掌浮甘露玉殿祥雲出紫峰纍洽重熙歡舞日共看青鳥滿青松其一中外欣逢大慶時麟遊郊藪鳯來儀千秋日麗懸金鑑萬國星馳獻紫芝天保已賡民作頌地泉應出醴盈巵百神效順齊歡忭翊戴皇躬億萬期其二萬夀詩五言排律二十四韻翰林院庶吉士臣程夢星晴旭融閶闔和風布海陲羣倫安覆載萬象仰軒羲雨露恩同溥江河澤並瀰天心惟浩浩閭巷總熙熙旰食勤民隱宵衣緝聖規苞符開泰運疇範集純禧郊藪祥麟見梧桐翠鳯儀星雲昭上瑞魚鳥沐𢎞慈樂利人胥悅生成物不遺文謨彰至治武烈擴丕基政與刑皆理威將德互施敷求恆若渴鑒别本無私迪教興多士親賢勵百司兩河安奠日四海㑹同時廣運誰能測謙沖每自持六旬逢誕節八表慶昌期地闢春臺敞天開化日遲千林攢錦繡百卉挺葳蕤綵仗排雙闕香煙繞九逵歡聲聨逺邇喜氣接髙卑張樂聞韶濩分班列鵕䴊幸登仁夀域仰睹聖神姿緗帙陳金鏡瓊漿酌玉巵葵忱輸不盡載詠九如詩萬夀詩七言律四首有序翰林院庶吉士臣薄海皇上御極之五十有二年太和保合景福滂洋易俗移風百化興而三才正阜財豐物五辰撫而庶績凝藏山祕澤之珍月呈嘉瑞甘露醴泉之液時載祥編天下皆春日中並照王民皥皥治偕上下而同流帝德巍巍道共乾坤而立極則誠登三咸五軼後超前矣蓋由我皇上睿智聰明聖神文武紀綱六合體覆載之無私經緯三階運隂陽而不測察倫明物作之君而作之師本身徵民賢於堯而賢於舜集大成之道統建盡善之治功以惠鮮懷保之實心受戬榖罄宜之茀祿包舉六氣而藏諸用發育萬物而顯諸仁有如燔柴昭事之儀必親對越追逺薦馨之祀倍極精誠定省時勤孝敬通於國政惇庸備至惠愛浹於天潢崇往聖而覺蒸民重先儒而倡正學訓士子以維風教廣貢額以勵人材海宇澄清膠庠敦讓宵衣旰食則綱舉目張頒爵授官則考言詢事一命以上見諸殿陛之間萬里而遙若在户庭之內褒榮勳閥即採録其子孫圖任舊臣每保全其終始欽恤民命常垂寬釋之仁念切農功頻下賑蠲之詔霈敷天之湛露遞賜田租酌太倉之餘糧并留漕挽數輒盈於千萬施不靳於再三兑澤滂沱立見禾苗之長巽風發越潛消水旱之愆鑾輅西巡周嶽盡懷柔之典翠華南幸閲河傳疏瀹之方弧矢之利取諸暌禮樂之興取諸豫遂乃坐八窗而朝萬國平三逆而定九州剪沙漠之渠魁天威震地奠宗社於磐石睿算如神鰈至鶼來茅歸楛入凡在燾養罔弗尊親若夫右文稽古濡史涵經發攄義理之章陶詠性情之什莫不參贊天地燦列星辰而御藻淋漓奎鈎炳耀則又衆法咸備四表光昭矣兹當陽春三月恭逢聖壽六旬日抱紅輝雲叢紫靄五十二年之仁恩闓澤如海之深萬八千歲之景運洪符同天之久輦賮航琛者萬國揚言拜于者盈廷臣海賦材謭薄秉質顓䝉兩世俱叨國恩未效涓埃之報一門皆忝中祕常存銜戴之心今遇萬壽無疆甚幸一人有慶敬上升恆之祝略申芹曝之忱臣海拜手稽首而獻詩曰萬年天子太平基御宿光芒映赤墀受籙綿長仁者壽垂衣端拱聖之時騰歡爭納梯航貢拜手齊賡喜起詞甲子初周元㑹始九州民物盡雍熙其一執中衢室建鴻名玉振金聲集大成參贊六經興禮樂並隆三代啓文明德馨上達天心順儒術尊崇聖教行齊上春臺躋壽域青陽開動物由庚其二韎韐親征聖武昭威加塞外版圖遙虞廷干羽三苗格周室車書九譯朝法駕時巡人震疊大田蠲賦野豐饒成功永固皇王緒宵旰乾乾敕百寮其三華燈錦幄接楓宸寶地琳宫祝聖頻太液波晴三月曉上林風暖百花春雲開南極星辰麗節届東皇雨露新睿算如天長受祿年年揚拜效尊親其四萬壽詩七言律三首翰林院庶吉士臣易簡勾陳綵仗煥晨光仙珮聲聞列雁行萬里堯天周甲子九重舜日麗文章玉階春永祥蓂盛金殿風和廣樂張喜見聖朝隆景運上林應有鳯來翔其一乾元首出正當陽斗極星羅共八荒風動時雍民擊壤化成久道帝垂裳菁莪造士歌雲漢雨露生春到井疆大澤更流山海外殊方萬里盡梯航其二龎睂不見海波揚又聽三呼嵩嶽傍聖德儉勤同大禹治功巍煥協陶唐欲陳金鏡千秋録再進流霞九醖觴寰宇盡歸熙皥日小臣拜手祝無疆其三萬壽詩五言排律十八韻翰林院庶吉士臣漆紹文帝德符乾健時乘運獨隆勳華綿道脉化育贊元功典學先持敬綏猷允執中探書搜委宛訪道陟崆峒御藻千秋煥天章八法融研精披奧㫖舉義發羣䝉勤政咨民隱巡方問歲豐江河疏上下疆理辨南東懋建平成績長貽樂利風蠲租踰漢宋頌德遍兒童觀國收羣䇿臨軒達四聰喜聲喧赤縣瑞靄塞蒼穹大順承天眷蕃釐集聖躬函關佳氣繞瑶島慶雲籠景命川方至鴻基嶽永崇一人膺保定萬國仰帡幪樗質曾何補葵心夙矢忠欣隨鴛鷺末稽首效呼嵩萬壽詩七言律二首翰林院庶吉士臣王夢旭皇圖長鞏壯山河風不鳴條海不波地利桑麻書歲稔天章雲漢作人多九霄日月同光被萬國衣冠盡協和蕩蕩難名惟擊壤欣聞復旦接衢歌其一玉墀初曙日曈曨慶洽千官虎拜同雨足三春宫草緑雲飛五朵殿頭紅祥光南極星輝煜曉色西山氣鬱葱獻壽亦隨鴛鷺後萬年歡舞聖恩中其二萬壽詩七言律四首翰林院庶吉士臣顧嗣立昌期桃報瑶池熟瑞應星回銀漢流百福聖人方建極萬年天子共揚休曈曨日月神州麗錦繡山河珠闕浮西苑薰風通紫禁管絃到處起歌謳其一西峯深秀翠屏橫市列街衢簇輦行巷舞影連萬户井山呼聲徹九重城香飄花柳邀金勒春練雲霞上綵旌士庶熙熙同壽域爭將芹曝答升平其二羣工三祝玉階邊功德巍巍景福全靜極固知仁者壽乾行莫測健如天八方劍佩環宸極重譯梯航拜仗前萬國車書今渾一海隅日出遍祥煙其三七年給札步彤墀令節隨行進玉巵異數特憐五夜燭新恩許託萬年枝白環銀甕清時瑞緗帙牙籖聖德詩惟願皇躬長介福岡陵永護太平基其四萬壽詩七言排律十六韻翰林院庶吉士臣春山今古疇圖屬聖明羣工亮采荷恩榮治功獨運恢𢎞業道統相傳集大成欽恤刑章開一面痌瘝民力緩三征施仁時灑甘霖潤照物高懸玉鏡清四國邊陲烽火靖二儀法象泰階平春秋省助年長稔河海疏排水不驚寒暑無咨頒粟帛銓除式序慎權衡氣含飛動鳴岡鳳韻入風詩語禁鶯五夜翻書羅典籍兩闈取士拔竒英龍旗出塞瞻天躍翠輦巡方夾仗迎駐蹕雲山搜澗壑端居樓閣愛蓬瀛其旋㑹見千祥集迪吉從教百祿盈自此無疆開厯數從來不息配天行臣民永慶貞元㑹中外均懷覆載情渚欲流虹環瑞日星皆拱極接長庚拜稽敬進升恆頌微末難申獻曝誠萬夀盛典初集卷九十二
