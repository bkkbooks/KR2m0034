body:
  text: 欽定四庫全書萬夀盛典初集卷七十五歌頌十五詞臣七萬夀詩七言律三十首有序左春坊左中允臣陳世倌欽惟我皇上御極以來乾行不息聖徳日新恩澤徧於八垓勲業隆於萬世雨暘時若海宇乂安用能感召天和綿祚永久今康熙五十二年三月十八日為我皇上六十萬夀聖節天輝日麗氣淑風和百官萬民之衆九州六合之廣咸瞻望闕廷歡呼抃舞臣世受國恩誠積於素言莫宣心方當春陽發育萬彚昭蘇勾萌胎卵之屬皆有以自達矧臣備員史局纂修政治典訓沐浴聖化已久可無稱述上荅休隆用是不揣弇陋祗就管見所及頌揚萬一以明徳足致福聖必得夀之理謹依韻恭撰萬夀詩三十章臚列如左聖夀一東日華雲燦正天中聖主當陽徳位崇甲子三千周復始春秋萬六永無窮仙葩繡合昇平字玉軫絲調解阜風海宇一家真浩蕩紫霄垂拱聽呼嵩敬天二冬齋祓郊壇命秩宗金輿雲䕶駕飛龍香升彛鼎陳琮璧樂奏鈞韶振鼓鐘全盛臣民膺景福屢豐時歲報先農聖心久與天心契感召縁知萬事從法祖三江舊章纘述可經邦實錄三朝燦寳窗徳合聖神元莫竝身兼創守本無雙明堂象管歌純嘏下國共球頌駿厖百世百王遵道法源流直比溯岷江聖學四支聰明睿知作君師天縱神靈表異姿學集大成宗至聖徳超無外接皇羲金聲玉振中和備月窟天根動静宜十六字傳真道統心源千載紹伊耆聖孝五微獻夀慈寧戲舞歸山龍還學老萊衣避熇時奉居凉殿罷獵猶聞侍瑣闈萬國歡心尊養至九重孺慕古今稀祥烏甘露呈嘉瑞孝徳千春史册輝勤政六魚昇平有象穆清居不息乾行運太虛旰食宵衣勞黼座巡方省俗徧皇輿覃敷文教彌勤學廣育英才更著書民隠每殷前席問雞人夜半啟雙魚節儉七虞登三咸五溯軒虞儉徳淳風播九區布素躬親常澣濯茅茨坐理戒雕鏤露臺每惜中人産照乗何須徑寸珠金玉雖陳惟寳善喜看童叟樂康衢謙徳八齊君王神武絶攀躋翹首清霄莫可梯峻徳如天羅萬象虚懐似海納羣溪八紘重譯聞風至百辟連章伏闕題聖志謙冲光日月無疆頌禱徧羣黎寛仁九佳保赤誠求繫聖懐春風到處潤根荄徳洋恩溥羣生被物與民胞衆志諧推置腹心聨一體崇隆肱股似同儕堯仁禹讓包涵廣測量乾坤未有涯用人十灰為章雲漢賦昭回六位時乗握斗魁瑞輯虞廷班岳牧羮調商鼎聚鹽梅賢關大闢明聰達廣厦宏開杞梓來鳯在梧岡麟在囿巖廊碩輔總良才引見十一真郎官班列應星辰一體無分内外臣詢事考言歸藻鑑量材絜徳荷陶甄鸞書夕引來青𤨏鳯闕朝趨拜紫宸寅亮天工咨百爾聖皇長御萬千春時巡十二文行宫處處散椒芬輦路逶迤淑氣薫百隊花間移豹尾六飛雲際現龍文恩波海濶千郊徧天語春温萬姓聞南國長年同望幸向陽草木亦欣欣治河十三元功侔神禹溯河源指授親勞萬乗尊始鑿龍門通大夏直探宿海接崑崙黄淮已見神謨奠青冀重霑宅土恩西被東漸南朔暨萬年聲教普乾坤尊至聖十四寒峩峩章甫集儒冠噦噦鸞聲戾杏壇典制有加勞九拜羹牆如見肅千官備聞聖道真源合特進生徒禮數寛師表永當垂萬世奎文光射斗牛寒明正學十五刪朝宣玉㫖下天關徽國初升十哲班集自皇衷親考証文經御筆手増刪淵源百代詩書裏模楷千秋俎豆間海宇共知崇正學瓣香多在紫陽山宸翰一先雲成五色墨痕鮮鳯翥龍翔體自然法效結繩希上古心摹羲畫契先天毫端萬象煙霞繞筆力千鈞琬琰鐫寵錫臣鄰欽世寳光躔星斗盡髙懸右文二蕭金石搜羅萃聖朝萬幾餘暇對晨宵酉山討論心彌切甲帳圖書手自標經學獨隆超漢代天文丕煥邁唐堯玉函瓊笈皆仙籙永夜星鋩徹紫霄治厯三肴羲和申命朔南交太極中涵列卦爻勾股三乗窮造化渾儀萬象燦元苞璣衡剖晰周天合黄赤平量大地包佇看玉階生蓂莢厯成應有鳯來巢訓士四豪煌煌聖訓日星髙尋繹逾知睿思勞崇雅黜浮端士習戴仁抱義砥貞操千秋木鐸嚴庠序百代金科凛譽髦為國樹人真本計聞天羣仰鶴鳴臯開科五歌興歌棫樸與菁莪萬夀恩開甲乙科秋牓先於春牓發杏林今比桂林多禹門浪暖燒龍尾銀漢光騰擲鳯梭聖祚日增才日盛重重玉笋侍鸞坡平三藩六麻謨烈焜煌四海誇聲靈赫濯震荒遐雷霆破膽摧三蘖華夏傾心屬一家師出萬全皆廟算風馳百徼静邊沙欃槍手挽天河洗瑞木都開四照花平朔漠七陽三征沙漠駕龍驤聖主神威震朔方鑿齒雕題皆版籍燕然瀚海亦金湯鴈飛暑月棲軍幕斗轉南天指劍鋩太學豐碑千尺聳銀鈎鐵畫煥宸章邊防八庚烽烟斥堠九邊清甘雨祥風沛帝京挾纊共知春氣轉投醪齊拜主恩宏明珠翡翠隨時貢天馬葡萄絶塞呈作翰作屛無外警一心拱衛勝堅城訓武九青如荼如火復如霆禁旅聲威洽百靈居則為師出為將晝令談武夕談經射弸久習工穿札兵法都知勢建瓴桑土綢繆煩睿慮金戈偃息萬邦寧獮狩十蒸旌旗韎韐彩霞蒸塞上秋髙爽氣澄逐電千羣驚逸驥拏雲百中羡名鷹紫駝白象連行幄青兕黄羊積野塍手挽六鈞親射虎萬人呼噪盡歡騰御射十一尤天成智勇冠神州巧力齊臻世罕儔畫的日圓升玉帳雕弧月滿簇金鍭鼓音節處春旗展楊葉穿時赤羽浮歌罷騶虞觀盛徳歡聲雷擁徧貔貅重農十二侵元日青郊法駕臨朱紘紺耜入平林農為邦本宜躬稼食乃民天勝雨金千耦共耕天子耤萬方深慰兆人心含哺鼓腹嬉遊日作息渾忘帝力深蠲賑十三覃十行詔内渥恩覃聖徳真同造化參賑粟蠲租逾萬萬嵩呼華祝聽三三博施濟衆過堯舜保合彌綸暨朔南履厚戴髙何以報惟歌富夀與多男慎刑十四鹽剛柔允克濟寛嚴解網除刑聖主兼徳本好生時赦宥士能執法恥鈎箝星光貫索天街暗膏雨圜扉細草霑宇宙太和翔洽久萬民惟祝海籌添普天大慶十五咸五雲多處曳朝衫萬姓嵩呼感至諴南極降庭祥並集西華瞻日慶非凡雨𤾉時若人民育功徳巍峩金石鑱癸巳王春同獻夀小臣長此奏韶咸萬夀詩七言律十二首候補左春坊左中允臣黄夢麟運際中天景象新萬年天子首勤民時雍風動純熙洽海晏河清大地春統一皇輿恢八極算綿寳厯協三辰欣逢聖誕初周甲競擬岡陵拜手陳其一黼座煌煌每夙興懋勤惟冀郅隆登健行久與天同運離照方當日始升椒寢承歡賡燕及蘭宫介福詠川增羣知電繞虹流瑞億萬斯年淑氣凝其二萬幾休暇擷羣芳好學多能冠百王演洛探河開道脈編珠戛玉煥天章書箋二酉琅函富墨瀋千秋寳翰香遙睇紫垣雲五色文明運啟厯方昌其三獨秉乾符執太阿削平羣蘖靖干戈天威逺播邊無燧聖武遐宣海不波玉律大千開甲子金甌混一永山河清寧萬古舒長日華祝聲連擊壤歌其四宸衷軫念在桑田比戸頻承雨露鮮共仰至尊崇節儉長為兆姓計安全人遊化日光天下家在春臺夀域邊自是太和元氣協陶然作息不知年其五温綸屢下澤覃敷率土淪肌更浹膚肆赦宏開三面網蠲租還免十年逋含哺稚子牽𥚑舞挾纊期頤荷杖呼瑞麥嘉禾歲其有陽春何物不昭蘇其六翠盖曾經下九霄呉天額手覲神堯觀河永使金堤固問俗長令蔀屋饒細草尚知迎駐輦微波猶喜沐征橈江南望幸心殊切樂歲家家祝聖朝其七際海蟠天設象胥聲名洋溢徧寰輿龍城萬里圖王會鳯册千番譯國書貢享每蠲方外物梯航特賜指南車照臨六合光全被析木扶桑總比閭其八聖夀如天聖澤隆作人棫樸慶芃芃十年再闢書升路萬載頻霑樂育功期易春秋昭異數制兼文武表同風懸知多士歡騰處奎壁光分斗極紅其九卿雲復旦泰階平中外歡呼戴聖明道在安民先察吏法嚴激濁特揚清乾元自是無私照庶彚何曽有遁情野老年年歌帝徳獻芹亦欲效稱觥其十羣工委佩禀皇猷宵旰誰知保泰謀不假虛文崇聖號惟將實徳迓天庥堯咨舜儆同無逸禹誥湯銘總勿休載考史書洵莫並直追皇古紀春秋其十一瓊島霞光䕶紫閶萬方齊進萬年觴九城春色占天瑞四海祥烟接御香徳合貞恒長不老功成悠久自無疆主恩愧乏涓埃報為祝南山日月長其十二萬夀詩五言律四首有序左春坊左贊善兼翰林院檢討臣范光宗臣聞宅造化而開階同天之大轉洪鈞而育物如日之升必有自强不息之乾行乃膺悠久無疆之景厯蓋徳福有相因之理而仁夀為必至之符於是上帝生商之辰下臣祝堯之日蓂階氣敞盈庭進喜起之詞松棟風和薄海效君親之戴紀泰階之甲子逓嬗不窮數皇極之春秋循環無已則誠清寧合撰上下同流者矣欽惟我皇上道合乾符業光坤軸篤生睿智作之君而作之師懋建中和有其徳而有其位察倫明物備經綸參贊之才本身徴民裕輔相裁成之道若夫廟享肅薦馨之典郊禋崇報本之儀定省無間於慈闈仁孝恒聞於天下崇正學以宏教化宫牆知萬世之師重先哲而覺烝民禮制立百王之法參天地之化育四時行而百物生正朝廷之紀綱庶績凝而五辰撫捐金發帑治河建水土之功審律考音作樂通神明之徳政莫大於刑獄欽恤再三本莫重於農桑賑蠲稠疊興一利必酌古而凖今命一官每考言而詢事居髙明而照四海幽逺不遺當宵旰而理萬幾細微悉識至於學該游藝聖備多能搜萬卷於酉山闡修己治人之道硏百家於丙夜表開來繼徃之功賦詩則酌雅禀經灑翰則得心應手乃若金戈赫怒翦三蘖而奠中原玉鼓龔行環九州而登磐石察哈爾渠魁既殱聖武孔昭厄魯特巢穴斯平皇威逺暢戎衣一著垂永清大定之勲長轂親征開累洽重熙之運猶且舉三驅之典文事與武備兼修訓七萃之軍耀徳共觀兵不廢萬方在宥則問俗以觀民百姓為心則道河而周獄體乾健而無逸却尊號而不居於是九穀屢豐五刑盡措天人合應書軌混同東西南朔胥歸祿位夀名兼得真所謂咸五登三參天兩地者矣欣逢聖夀六旬正值陽春三月五十二年之厚澤振古未逢萬八千歲之洪基自今伊始内而公孤卿尹拜手賡歌外而屛翰藩垣陳詞獻祝以至候月歸琛之長占風輦賮之君莫不先後鳧趨追陪虎拜臣光宗賦材譾薄秉質顓䝉幸遇萬國咸寧一人有慶舞庭歡踴未輸臣子之誠就闕頌揚難名髙厚之徳望聚奎於東井願獻夀於南山敬竭褊辭伏祈睿鑒謹拜手稽首而獻詩曰鳯紀昇平歲龍飛開泰辰皇圖周宇宙帝徳統天人河應千年運嵩呼萬歲春衢歌並巷舞處處戴尊親其一睿智周寰宇神明出聖衷道叅無極奥物育太和中景色三雲燦車書四海同萬方齊獻夀長拱紫微宫其二天子當陽日晴空朝旭臨遐方瞻廣大亘古仰髙深輯瑞文明象垂衣聖主心南風時解愠静拂五絃琴其三春色來天地明霞擁袞裳臣民歌皥皥鳥獸舞蹌蹌甲子璣衡轉升恒日月長三皇同紀厯萬夀慶無疆其四萬夀盛典卷七十五
