body:
  text: 欽定四庫全書萬夀盛典初集卷九十五歌頌三十五詞臣二十七萬夀詩七言律四首翰林院庶吉士臣徐依聖主深仁洽九州逺人重譯集共球中天恰遇貞元㑹萬嵗初逢甲子周風雨常調輝玊燭河山永固奠金甌楓宸咫尺蓬瀛路鳯厯新增海屋籌其一乘乾御極正當陽共戴堯天化日長巷舞衢歌民樂利河清海晏世安康皇威震疊開千嶂聖治光昭邁百王嵩祝盈廷爭拜舞如天帝德夀無疆其二鳷鵲簷楹鳯鳥飛華燈錦幔滿王畿曈曈曉日臨黃道靄靄春雲護紫微宫栁千條拖翠縷林花萬樹映清暉君王宴鎬多恩澤玉座香濃染御衣其三仙掌髙擎沆瀣清明霞浮動照丹楹天厨乍進堯尊酒御饌新調禹膳羮樂奏簫韶和鳯噦花開蓬閬聽鶯鳴風光幸際唐虞世億萬斯年享太平其四萬夀詩七言律四首翰林院庶吉士臣湯大輅玉厯無疆萬祀新斗杓旋指正逢辰雲屯虎拜趨金闕日麗龍光仰聖人九有總教登夀域一元始見轉鴻鈞乾行不息符天健嵩祝傳呼大地春其一巍巍勳業邁伊耆符命由來瑞應竒石紐虹流開寶冊斗樞電繞鞏鴻基百僚夙際風雲㑹八表長瞻龍鳯姿共沐太平歌燕喜金函齊上祝堯詞其二耕鑿咸安化日長休明一德萃千祥東皇麗景迎閶闔南極祥光拱建章五色雲間開雉尾三呼聲裏進霞觴碧空韶奏騰雲起還見虞廷集鳯凰其三天開景運日方中抃舞堯衢四海同階下丹蓂能識候苑中翠箑解迎風龍池細桞含煙緑閬苑仙葩浥露紅願祝岡陵齊聖夀萬方長此樂時雍其四萬夀詩古風一首翰林院庶吉士臣張淳祥雲浮鳯闕紫氣滿楓宸旭日千門麗和風萬國春旭日和風齊獻瑞春光靄靄融天地禁苑花開三月紅宫隄栁滴千行翠寶祚龍飛億萬秋中天長正三辰位籌添海屋日曈曈雲璈初奏未央宫德星朝見晨光映霽色天開佳氣籠發祥傳貫月紀瑞協流虹乃知聖人之生不世出徇齊天亶英姿異道宗洙泗幾千年心契唐虞十六字聖學髙深天與淵宸章寶墨萬方傳異書盡檢琅嬛洞竒字如登岣嶁巔卓哉道德隆千古漢唐以後奚足數一統車書奉聖神八方底平真英武至治開天壤雄功震寰宇至治雄功已莫京勤勞惕厲保升平登俊求良培士氣蠲租減賦奠民生畇畇禹甸嘉禾秀蕩蕩堯天雨露深萬民共樂三春日九重長理五絃琴我皇天錫多景福三多共進華封祝此日南山夀域開於時北闕冠裳肅或獻霞光萬嵗觴或陳金鑑千秋録一堂喜起比虞廷萬國共球恢禹服幸厠班行拜玉除瞻天獻賦愧才疏欣逢天保岡陵永願效詩人頌九如萬夀詩五言排律三十六韻翰林院庶吉士臣陳王謨運啓貞符㑹天開玉厯長坤維欣久奠乾御喜當陽聖德三才備皇猷百度張深仁周海甸純孝格穹蒼問寢勤三殿承歡合萬方明禋親對越郊祀潔馨香禮樂超前軌中和闡祕藏典謨宣聖訓奎璧煥文章結藻雲霞麗揮毫鸞鳯翔簫韶兼美善勾股析微芒蕩蕩名難罄煌煌道愈光泰階常炳耀兑澤更汪洋屢下蠲租詔時開賑乏倉繪圖懷紡織減稅重農桑慍瑟知財阜吹豳卜嵗穰政平安樂利物阜競輸將法網開三面祥風遍八荒閭閻歸化育動植盡繁昌每敕鸞龍馭周巡江海鄉金錢開帑藏宵旰警隄防疏鑿神功祕規為睿算詳洪流歸海若茂績鄙宣房逺略皇威震親征聖武揚兩階舞干羽九譯效梯航納貢來西旅輸誠至越裳安邊皆頗牧選吏並龔黃名德旌髙爵英才萃上庠懷柔聲教訖悠久治功彰鳯厯初周甲龍圖始兆祥景星輝爛爛仙露浥瀼瀼三月韶光麗千門花栁芳嵩呼環御道華祝徹雲閶草莽誠何幸栽培感不忘一雙雕玉管八載校書郎已分歸松壑仍教上玉堂旁皇金闕下拜舞進霞觴萬夀詩五言律十二首翰林院庶吉士臣郭孫順帝德光三古皇仁遍八紘紫微星正朗黃道日方盈華祝逄花甲嵩呼動玉京鴻䝉臻上理是處樂升平其一遜志宸修切諏辰講幄開菁華探玉圃奧茭輯蘭臺稽古圖書列尊經道義恢遂令千載祕雲漢並昭回其二聖主敦倫重熙朝養志崇承歡皆至行錫類愜天𠂻愛景鶯花候勤心寢膳中臣民同感召抃舞詠淳風其三托興宸襟適髙吟奎藻鮮玉光摩潤澤珠顆轉勻圓風雅含醇味中和協化權萬年瞻制作謨誥燦中天其四萬幾逢偶暇八法見神功揮就鸞翔漢懸來鳯舞風端嚴鋒愈正流逸格彌工墨妙珍千古倉書未許同其五神武聲靈赫天威日月宣遐方苞蘖靜內庫甲兵懸重譯知依闕膚公更拓邊金甌萬里固干羽舞階前其六代有宣房議桃花浪屢驚神謨煩指畫大地慶平成瞻洛詩徒詠橫汾事可輕銀河有圖瑞特為聖人清其七宵旰時勤政深宫輾轉勞農桑民事繪補助聖恩叨澤物敷莖露祈年候土膏含哺歡父老躋祝獻春醪其八帝德真洋溢羣生共泳游蠲租寬積負赦眚恤沉幽濊澤流千祀慈雲覆九州春臺登樂育處處起歌謳其九洞徹天人祕羣驚聖學超授時窺厯象應琯叶咸韶推算三才協研音六律調從來紛錯理微妙日星昭其十華渚流祥協賢關啓運新添科遴抱玉增浪躍潛鱗格外絲綸沛寰中雨露均菁莪霑雅化疇不沐陶甄其十一弱質乘昌運遭逄古莫倫八年依紫禁一第荷皇仁筆槖金鑾舊名聫玉署新無疆臣有頌天地共長春其十二萬夀詩七言排律十六韻翰林院庶吉士臣王遵扆泰階中正紫微垣黼座垂裳大寶尊赫濯神功懸日月髙深至德統乾坤明周萬里殷求莫儀盛三雍靜體元兑澤博施咸有濟巽風時動盡成暄好生逺軼湯開網籲俊宏踰舜闢門酒誥几銘昭法誡丹書緑字接心源珠躔翰墨頻飛動金匱縑緗細討論學貫具茨兼宛委理探月脅並天根闡微明睿重霄合燭逺光華列曜繁西賮南琛歸道德雕題鑿齒鞏屏藩化風淳穆齊皇古厯數綿長邁帝軒花甲回環璿玉運卿雲重疊鳯鸞鶱天顔有喜時方泰聖德無私詔更溫萬嵗永符南嶽夀八方齊進北辰樽共欣率土春增暖矧在微臣世受恩華祝衢歌葵藿意年年拜手奉丹閽萬夀詩五言排律二十韻翰林院庶吉士臣謝濟世景祚隆今代純禧集我皇道承千聖統春滿萬年觴祝嘏羣心切賡歌元首康勤勞方夏后儉德即陶唐教訖炎荒外威宣朔漠鄉武功真赫濯文治並焜煌藻發天章煥書成御墨香還應超五帝詎止軼三王電繞星樞瑞虹占華渚祥篤生當泰運貞象應乾剛花甲周還始瑶圖永未央恩波流浩蕩佳氣接蒼茫綵仗仙幢引珠宫梵唄揚千官齊拜舞百辟盡趨蹌賞洽龍顏喜歡騰鷺羽翔光華同日麗厯數與天長忝與班行末恭逢寶運昌願將三祝意併入九如章載筆慚風雅分箋竭頌揚臣愚何所獻聖夀本無疆萬夀詩五言排律二首翰林院庶吉士臣鄭之僑玉厯韶華永楓宸瑞靄浮無疆歌聖夀有道集鴻休慶滿三千界歡同百二州芳林紅錦爛仙酒醴泉流閶闔開鰲禁雲霞煥鳯樓嵩呼環御道華祝雜村謳萬國球璜集通都閬苑遊堯蓂三莢吐羲䇿萬年周已奏垂裳治猶煩側席求阜財調舜瑟錫福衍箕疇寶祚仙人籙銅龍海屋籌願同天地久長此固金甌其一乘乾符在握交泰運初昌率土歸聲教敷天願對揚光華歌復旦端拱坐明堂夀域星辰燦春臺日景長兩岐呈上瑞大有兆農祥律吕諧崑竹賡歌陋柏梁儒林增黼黻藝苑叶笙簧治洽安絃奏仁銷貫索芒朱華昭國瑞緑字受珠囊拓宇通懸索來庭致越裳恩波滄海濶和氣景風翔簪筆慚窺管陳詩捧玉觴其二萬夀詩七言律六首翰林院庶吉士臣張旭景運天開五鳯祥聖人御宇正當陽車書化洽無雷國禮樂聲通日出鄉星拱玉衡聨太乙厯綿金簡邁羲皇小臣幸際華封祝共慶堯年春晝長其一八荒夀域啓陽春景福鴻符次第陳瑞起南山儀彩鳯雲興東海兆祥麟金甌永固同乾運寶籙無疆眷至仁一自韶華開令旦萬年元氣入陶鈞其二禁苑春深却曉寒向榮花木有餘歡南華佳氣輝天闕北極祥光擁玉鑾航海琛球重九譯呼嵩劍珮集千官雲璈聲徹璇霄上又過慈闈問早安其三初升海日正曈曈瑞氣騰輝綺殿紅鳯扆花明文陛側虹橋燈燦錦城中瑶編紀字追軒昊銀甕鐫文軼鎬豐自幸金門叨侍從長年獻夀未央宫其四普天稱慶敞華筵抃舞同賡億萬年治懋垂裳登舜世民歌擊壤樂堯天錦囊敬進三多頌鐵網宏收四國賢最是侍臣邀寵渥恩波浩蕩正如川其五三千花甲喜初開春滿長安遍八垓瓊圃青鸞方外至越裳白雉日邊來髙天露湛深如海大地歡騰動若雷鷺序螭頭瞻曉霽五雲多處是蓬萊其六萬夀盛典初集卷九十五
