body:
  text: 欽定四庫全書萬壽盛典初集卷二十八恩賚四加恩耆舊二五月初十日丙戌車駕幸熱河原任尚書宋犖徐潮王鴻緒許汝霖徐元正等跪送道左辭歸田里上止輦慰諭特賜宋犖御製詩一章以寵其行是日原任吏部尚書加授太子少師宋犖吏部尚書徐潮户部尚書王鴻緒禮部尚書許汝霖工部尚書徐元正禮部侍郎加授工部尚書太子少傅田種玉吏部侍郎李録豫仇兆鰲工部侍郎李元振彭㑹淇內閣學士王之樞顧恱履副都御史勞之辨浙閩總督梁鼐福建巡撫宫夢仁等於清河送駕跪列道左上命停輦諸臣啓奏臣民恭祝萬壽集輦下者數萬人天恩普被而臣等䝉恩最渥寵賜逾涯今臣等恭送聖駕後即各歸田里歌詠太平惟有晨夕頌祝萬壽無疆託聖主恩庇十年之後復來叩萬壽七旬臣等亦皆八十九十復得瞻仰天顔此臣等之至願也上笑云爾等必來復命宋犖至輦旁賜御書御製七言律詩一首受祉林泉頤養年世家耆德自天全少時佩劍登三殿久任蘇臺撫九阡行儉銓衡有令譽拔才籲俊入清篇修齡善得人間夀雪作鬚眉興欲仙跋云吏部尚書引年致仕宋犖因朕六旬夀慶祝來京事畢五月內回本鄉朕念舊臣特書七言律一首以紀其盛云爾宋犖跪領奏云臣䝉賜宴賜衣冠寶硯已屬殊榮而手賜御觴秩晉宫師並給誥命尤為前史所無至請安之日幼子邀恩授職且賜祕書上藥及魚乾鹿乾哈密瓜榛子松子口外蜜餞果品等物今復䝉賜御製詩章天恩稠叠莫與倫比銘刻心版口不能言隨九叩謝恩而退諸臣亦無不感頌皇上眷舊隆恩如同身受焉二十五日辛丑追叙功牌荆州將軍達爾占等加授世職有差五月二十一日吏部尚書臣富寧安等題為欽奉恩詔事准兵部具題咨稱內開本部議得荆州將軍達爾占疏稱自軍前行走以來未逢失機之處惟看守雲南城門牽連獲罪將效力所得功牌盡行革去雖不准叙功但䝉聖主洪恩歷用優升授為將軍之職聖主屢問效力行走之處將效力微勞仰祈睿鑒交與該部存案等因具題前來查達爾占係二等阿思哈尼番出征廣東廣西雲南等處所得功牌交與吏部議叙具題將達爾占由二等阿思哈尼哈番加一拜他喇布勒哈番授為一等阿思哈尼哈番又一拖沙喇哈番因看守雲南城門不准給職今康熙五十二年三月十八日恩詔內開一先年出征人內有功牌應得官者除抵軍罪外其守雲南城及在隴州控告不准叙功人等所存無幾今皆老邁不能效力兹遇覃恩著兵部查明仍行補叙欽此欽遵將軍達爾占出征廣東廣西雲南等處效力所得功牌交與吏部議叙等因於康熙五十二年四月二十七日題本月二十九日奉㫖依議欽此欽遵將達爾占所得功牌移咨吏部議叙等因前來應將達爾占出征廣東廣西雲南等處所得頭等第一功牌三箇頭等功牌一箇三等功牌一箇末等功牌一箇仍照前議叙由二等阿思哈尼哈番加一拜他喇布勒哈番授為一等阿思哈尼哈番又一拖沙喇哈番可也本月二十五日奉㫖依議吏部尚書臣富寧安等題為欽奉恩詔事准兵部具題咨稱內開鑲紅旗原任拖沙喇哈番費雅漢叩閽狀稱康熙十三年平定四川陜西等處所得功牌俱存案在部於十五年回兵軍前帶來檔案內因錯寫兵丁郭思太名字將自行效力所得拖沙喇哈番革去在四川陜西等處效力所得功牌一并不准叙功等因叩閽奉㫖將費雅漢效力之處交與該部議叙具題欽此查費雅漢於康熙十三年出征四川陜西等處所得功牌俱各在案今恭遇皇上六旬大慶奉㫖查六旬以上大臣官員給還原品內費雅漢已經給還原品其革職之處無容議外費雅漢出征陜西四川等處所得功牌交與吏部議叙等因於康熙五十二年五月初三日題本月初五日奉㫖依議欽此欽遵將費雅漢所得功牌移送吏部議叙等因前來應將費雅漢出征陜西四川等處所得頭等功牌三個二等功牌一箇三等功牌一箇四等功牌一箇五等功牌一箇照例由空銜授為拖沙喇哈番可也奉㫖依議十二月初九日壬午追叙功牌八旗將校加授世職有差十二月初五日吏部尚書臣富寧安等題為欽奉恩詔事准兵部具題咨稱恭遇康熙五十二年三月十八日恩詔內開一先年出征人內有功牌應得官者除抵軍罪外其守雲南城及在隴州控告不准叙功人等所存無幾今皆老邁不能效力兹遇覃恩著兵部查明仍行補叙欽此欽遵今八旗查送看守雲南城門檔案有名鑲黃旗部委蘇喇章京常夀正白旗一等阿達哈哈番兼一拖沙喇哈番部委夸蘭大趙三部委夸蘭大馬奇部委恭領葛伊圖正紅旗部委參領司川鑲白旗拖沙喇哈番部委恭領陳廷章鑲紅旗委署蘇喇章京永吉納正藍旗部委夸蘭大春對八人出征雲南陜西等處效力所得功牌先經咨送吏部將伊等所得功牌議叙應得官者因看守雲南城門不准給職在案今聖主洪恩看守雲南城門不准叙功人員准補叙功欽此將常夀等功牌仍咨送吏部議叙等因康熙五十二年八月十一日題本月十六日奉㫖依議欽此欽遵將常夀趙三馬奇葛伊圗司川陳廷章永吉納春對八人功牌一併咨送前來查康熙二十五年將在雲南等處所得效力功牌人員本部照例議叙給職等因具題奉㫖依議常夀馬奇永吉納春對趙三陳廷章葛伊圗俱不准給職欽遵在案看守雲南城門檔內有常夀等七人之名其授拜他喇布勒哈番之部委恭領正紅旗司川因看守僞譜房屋於康熙二十六年七月內將所給拜他喇布勒哈番革退今准兵部咨送常壽等七人出征雲南等處所得功牌應將常夀馬竒葛伊圗陳廷章永吉納春對六人仍照康熙二十五年議叙具題俱由空銜授為拖沙喇哈番此內陳廷章永吉納本身現有拖沙喇哈番歸併俱授為拜他喇布勒哈番又正白旗一等阿達哈哈番兼一拖沙喇哈番趙三出征陜西雲南召磨多地方所得功牌歸併議叙應給與拜他喇布勒哈番趙三於康熙二十六年恩詔既給拖沙喇哈畨不便將召磨多所得功牌歸并給與拜他喇布勒哈番仍照康熙二十五年議叙具題授為拖沙喇哈番趙三本身現有三等阿思哈尼哈番再加一拖沙喇哈番授為二等阿思哈尼哈番正紅旗部委參領司川出征雲南等處所得功牌亦照康熙二十五年議叙具題由空銜授為拜他喇布勒哈番可也本月初九日奉㫖依議吏部尚書臣富寧安等題為欽奉恩詔事准兵部具題咨稱恭遇康熙五十二年三月十八日恩詔內開一先年出征人內有功牌應得官者除抵軍罪外其守雲南城及在隴州控告不准叙功人等所存無幾今皆老邁不能效力兹遇覃恩著兵部查明仍行補叙欽此欽遵今八旗查送隴州控告不准叙功正黃旗委署護軍校海都正白旗部委恭領塞龍格正藍旗部委護軍參領塞克西部委恭領星格禮出征四川陜西等處所得功牌先在隴州控告不准叙功今䝉聖主洪恩隴州控告不准叙功人員准補叙功欽此將海都等功牌移咨吏部議叙等因於康熙五十二年八月十一日題本月十六日奉㫖依議欽此欽遵將海都等功牌一并咨送前來應將正黃旗護軍海都正藍旗部委護軍恭領塞克西出征四川陜西等處所得功牌照例議叙由空銜授為拜他喇布勒哈番正白旗部委恭領塞隆格正藍旗部委參領星格禮出征四川陜西等處所得功牌照例議叙由空銜授為拖沙喇哈番可也奉㫖依議吏部尚書臣富寧安等題為欽奉恩詔事准兵部具題咨稱恭遇康熙五十二年三月十八日恩詔內開一先年出征人內有功牌應得官者除抵軍罪外其守雲南城及在隴州控告不准叙功人等所存無幾今皆老邁不能效力兹遇覃恩著兵部查明仍行補叙欽此欽遵今八旗查送因隴州控告不准叙功前進兵丁鑲白旗護軍費雅思哈出征四川陜西等處所得功牌先在隴州控告不准叙功今䝉聖主隆恩隴州控告不准叙功前進兵丁准補議叙欽此將費雅思哈功牌咨送吏部議叙授職等因於康熙五十二年八月十一日題本月十六日奉㫖依議欽此欽遵將費雅思哈一併咨送前來應將費雅思哈出征四川陜西所得第一前進功牌二箇第二前進功牌二箇照例議叙由空銜授為拖沙喇哈番可也奉㫖依議臣等伏覩皇上御極以來奬忠酬庸榮及其先賞延於世而於耆舊大臣恩禮尤篤至是聖壽昌期致政之臣赴闕朝賀既破格加恩而宥過録功存亡繼絶恢文武之路續河山之封洵曠世而一遇也盤庚之篇曰圗任舊人又曰人惟求舊詩小序曰伐木燕故舊也故舊不遺則民德歸厚周官冡宰以八統馭萬民二曰敬故司冦以八辟麗邦法二曰議故春秋傳曰善善及子孫凡此皆忠厚之風惇大之本也蓋所謂舊臣者有二或少壯從政迄於衰老引年辭職旋車里門或祖父立功澤及後裔俾守世祀與國咸休故西漢酇留之風世世勿絶東漢鄧馮之覲歡如平生懿典隆文光耀史䇿然䝉恩者代不數人推恩者朝不數事若乃一時詔令萬慮周詳不遺數世之勤用樹百年之計蓋未之見也皇上大智如神至仁如天深識偉度跨越千古當行慶之時先棄過之令滿漢文武以詿誤罷職者年六十以上一體給復所以惜老成也身來覲則並令入朝齒及格則均與錫宴命服朱紫再入班聫鬚眉蒼皓上邀饋所以昭慈惠也爰念世祖舊臣隆以師保則由今全盛之日而追踐阼之初又念太祖太宗舊臣續其世封則更從踐阼之年而遡開國之始宋犖田種玉年皆逾八十晚荷殊榮五大臣十六扎爾固齊子孫以罪廢者仍登仕版此非關一身一家之私慶也皇上仁孝性成規模宏逺極錫類之藹惻緬創業之艱難是以卑崇階而不疑推懋賞而不吝也至於致政大臣悉豫封䕃封疆舊僚並從所請亦以廣孝治天下之仁追録勳伐補叙功牌廢將退卒重沐新命亦以明安不忘危之義當此時也聞命至於震驚旁觀為之感泣傳播逺近習為美談皆我皇上逺覽獨斷本於至誠舉念則上下千年行事則斟酌百代夫是故降非常之寵而衆望協符施不報之恩而人心讋服美善咸集天下歸誠焉杜鄴曰內恕之君樂繼絶世歐陽修曰有舊有勞褒寵優異以今相凖殆逺過之蓋不獨集祉於壽耉流澤於私門凡以風臣子之盡心著國家之令典休聲鴻烈傳之永永無極矣萬壽盛典初集卷二十八
