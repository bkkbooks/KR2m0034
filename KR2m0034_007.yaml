body:
  text: 欽定四庫全書萬壽盛典初集卷七聖德三保泰康熙五十一年十月十九日己巳上以禮臣疏請會議六旬萬壽應行典禮特頒諭旨宣示中外臣民共體孜孜惕厲至意勉盡職業永保升平其慶祝虛文槩不准行七月十一日禮部尚書臣赫碩色等謹題為請旨事康熙五十二年恭遇皇上六旬大慶臣等欽惟我皇上撫綏寰宇五十餘年仁澤廣布聲教覃敷四方萬國咸樂升平無不優游於堯天舜日之下是以上天垂祐景福駢臻萬壽無疆福德兼隆誠亘古所未有也今中外臣民霑沐深恩淪肌浹髓感戴大德刻骨鏤心明歲恭遇聖主六旬大慶莫不欲各罄葵忱其尊親頌祝之至願萬不能已臣等職司禮曹凡應行典禮自應預擬奉聞但此非常之慶普天率土莫大鴻庥非尋常典禮可比臣等未敢輕擬應請會同大學士九卿詹事科道詳議具題可也臣等未敢擅便謹題請旨十月十九日奉旨朕御極以來惟欲萬國乂安上則敬天法祖下則垂令名於後世孜孜然以致鬚髮盡白心血耗散歷盡憂勤蕩平險阻自古帝王在位不久享年不遐者論者往往歸於别故而未諒帝王實不勝其難實不堪其勞憂懼所迫以致短祚也朕反覆思維帝堯固辭華封之祝必似朕臨蒞年久之君方能知聖人言之有實也餘則斷不能知矣朕本凉德惟賴祖考得國之正積福之深在位五十餘年壽屆六十今憂勞倍增血氣漸憊惟恐愈久而力不支願不遂以至不全終始一世勤瘁俱屬徒然朕惟惕厲而已竝未留心祈求甲子之周也覽禮部請旨之奏悉係虛文無有實際朕惟願臣清子孝兄友弟愛人人皆讀正書勉盡職業國安民治盜賊寧息各以血誠實意為朕六袠慶祝朕即嘉納此外儀文朕無所嗜亦無所好這所奏不准行康熙五十二年三月初二日己卯上以直省臣民耆老雲集京師建立經壇綵棚慶祝聖壽者不計其數特頒諭旨宣示中外凡有祝延者必求雨暘時若萬邦咸寧仰副夙夜匪懈不自滿假至意上諭王貝勒大臣九卿詹事科道曰朕昨進京見各處為朕六十壽慶賀保安祈福祝延者不計其數朕實凉德自覺愧汗從來帝王之治天下罔不以民生為念若為一己之私即不能擴而充之矣朕若先知必令止之今已成矣難毁衆志夜來思之達旦朕所以為天下萬國蒼生之主者萬姓安即朕之安天下福即朕之福若能祈禱雨暘時若家給人足則朕安寢飽食可以却病延年此朕之求福非有妄想也傳之各處凡有祝延者必求雨暘時若萬邦咸寧為先朕已老矣有若無實若虛夙夜匪懈履薄臨深之念與日俱增豈敢自有滿假乎三月初四日和碩顯親王臣衍潢等謹題為恭聆聖訓臣庶歡騰事康熙五十二年三月初二日上諭諭王貝勒大臣九卿詹事科道朕昨進京見各處為朕六十壽慶賀保安祈福祝延者不計其數朕實凉德自覺愧汗從來帝王之治天下罔不以民生為念若為一己之私即不能擴而充之矣朕若先知必令止之今已成矣難毁衆志夜來思之達旦朕所以為天下萬國蒼生之主者萬姓安即朕之安天下福即朕之福若能祈禱雨暘時若家給人足則朕安寢飽食可以却病延年此朕之求福非有妄想也傳之各處凡有祝延者必求雨暘時若萬邦咸寧為先朕已老矣有若無實若虛夙夜匪懈履薄臨深之念與日俱增豈敢自有滿假乎欽此臣等跪聽之下不勝歡忭恱服欽惟我皇上仁竝覆幬恩深雨露四海萬國各遂生成優悠於堯天舜日之下中外臣民感佩聖恩刻骨鏤心匪朝伊夕兹遇皇上六旬大慶各抒誠悃䖍祝萬壽無疆者此不過少申愛戴之微忱至各省紳襟士庶以及耆老雲集京師叩祝聖壽不可計數亦皆發於至情不能自己總由深仁厚澤浹髓淪肌是以鼓舞歡欣趨蹌恐後我皇上秉德謙沖虛懷若谷聖不自聖安愈求安特頒聖旨曉諭臣工天語煌煌意旨深逺總之念念敬天刻刻勤民不尚一已之安逸期致萬國之咸寧雖古帝王典謨訓誥不能及也蓋皇上此心即是天心佇見天眷我皇雨暘時若年穀豐稔家給人足萬邦安寧聖壽與天同久景福如日方升普天率土永享升平於無既矣臣等無任歡躍之至為此謹題初六日奉旨知道了十月初九日癸未萬壽科殿試天下貢士欽定策題詢以警戒無虞制治保邦之道是歲特開恩科臨軒策士閣臣以策問請上欽定制策首以警戒無虞制治保邦為詢有曰朕自御極以來翼翼兢兢五十餘年如一日至於大小臣工無時不以國爾忘家以人事君之義相為告戒焉邊疆雖靖尤加意於武備之修凡以立國之道德威不可偏廢古帝王所以深根固本杜漸防微是朕之所夙夜而不敢康者也書曰警戒無虞又曰制治未亂保邦未危今國家承平日久文恬武嬉朕惟唐虞成周之隆君臣所以動色咨警者豈過慮歟無亦察於天命人心之理而無荒無怠期以長凝上天之眷而永底蒸民之生也其何以使中外臣僚悉喻朕意歟全載第三十三卷開科條中臣等伏讀前後詔旨仰見我皇上憂盛危明保邦制治之心抑何有加而無己也皇上躬承鴻業手致太平自南定三孽北掃朔漠以來內修政事而安民察吏措置極其周詳外盡懷柔而奮武揆文德威無不宣播因之天不愛道而風雨以時地不愛寶而嘉祥屢見海外賔服域中晏如措天下於磐石之安致社稷若苞桑之固世運之泰至此極矣皇上處豐亨豫大之世存朝乾夕惕之心事事切於諴民時時期於阜物上諟天命下顧民碞夙夜孜孜不遑暇逸今恭逢萬壽天下臣民雲集都城共申慶祝正與民同樂之時也乃聖心靡寧諭旨諄切一則曰惟願臣清子孝兄友弟愛讀正書勉職業國安民治盜賊寧息再則曰萬姓安即朕之安天下福即朕之福履薄臨深之念與日俱增至於臨軒策士又三致意焉大哉王言雖謨典所載未有若是之深切著明者然而皇上之憂勤惕厲非自今日始也前此康熙十年十月上謂講官熊賜履等曰人主勢位崇髙何求不得但須有一段敬畏之意自不至於差錯即有差錯尚可省改若任意率行漫不加謹鮮有不失之縱佚者朕每念及此未嘗一刻敢暇逸也皇上之不恃崇髙而心存敬畏未嘗稍自暇逸也如此康熙二十八年夏旱皇上深宫齊戒聖容清减既而各省得雨羣臣以勞瘁過甚請臨幸暢春園頤養聖躬上曰朕可與他人比耶先人而憂後人而樂理固宜然今近省固已得雨北邊䝉古盛京烏喇寧古塔諸處更切於懷因此憂勞以致癯弱人或可欺天亦可欺耶倘荷天之澤皆得霑澍朕自出行也康熙三十四年六月霪雨連綿上曰雨太多慮傷禾稼朕思天時與人事恆相感召未可謂災沴為天時適然之數全不關於人事也明日傳九卿詹事科道集議政事有宜興宜革者令各抒所見奏聞時廷臣以時方盛暑乞少紓聖慮上復曰堯舜之時猶有都俞吁咈蓋已治而益求其治已安而益求其安古之聖人兢兢業業始終如一朕朝夕以此警惕於衷三十餘年以來未嘗一日少自寬假亦有請間日理事者朕不以為然惟存恆久之心時時乾惕耳朕思地方間有荒歉正可動人警戒之心古人所謂遇災而知懼也夫水旱災荒時所恆有皇上不以為偶然之事而恐懼修省也如此康熙四十五年三月上以三冬少雪入春不雨諭大學士九卿等曰朕總理幾務甚久年歲日益乾惕滋深自去冬無雪及今春深尚未得雨地氣熯燥不和又雲色多細縷狀此非僅無雨且恐别有變異與其有變而後講求不如君臣於未事之先將政事得失任為己責竭誠攄忠詳加計議之為當也但數語頌揚虛辭省改未可即以塞責夫民為邦本食為民命朕自東作以至收穫廑念靡寧逮秋成以後歲果豐登然後此心少釋若有歉收之處即别為籌畫爾等俱係大臣或司言職事有闕失各宜直陳皇上未事綢繆而念切民依也又如此總之皇上不狃一時之安而必欲貽萬世以安不尚一已之逸而必欲豫天下以逸不恃一事之得而必欲事事之皆得故持盈保泰有頃刻無間於中者夫自古所稱郅隆之世莫如堯舜當日上有欽明濬哲之主下有亮采惠疇之臣亦云盛矣而君臣之交相警者不曰無教逸欲無曠庶官即曰克艱厥后克艱厥臣甚至賡歌揚拜猶懷叢脞之虞聖人之用心大槩如是然堯舜之世洪水方割黎民阻饑非若今日之淮黃底定百室盈寧也堯舜之世草昧初開文明漸啓非若今日之漸摩已久親遜成風也乃運會之盛過於唐虞而警戒之心勤於堯舜從來盈虛消息天道之自然惟聖人能持其盈以留其有餘故可以久安而長治古聖人之作易也於大有之後次之以謙次之以豫孔子序卦傳曰有大而能謙必豫明乎有而不矜其有是以豫也以古聖人之書合之聖天子之心不誠與之同揆也哉蓋由萬幾之暇精研經史凡千古帝王政治之得失聖賢理道之精微靡不兼綜條貫於中故德愈崇而心愈謹治彌隆而惕彌深載見之詩曰以介睂壽永言保之又曰俾緝熙於純嘏其我皇上孜孜保治之謂歟萬壽盛典初集卷七
