body:
  text: 欽定四庫全書萬夀盛典初集卷七十八歌頌十八詞臣十萬夀詩七言律四首有序翰林院編修臣文岱欽惟我皇上聖神天縱文武夙成德懋業崇河清海晏紹帝王而立極邁今古而獨隆欣逢御厯之五十二年春三月萬夀六旬池桃甫實海屋初籌天保定於無疆朝賡周雅人騰歡而靡罄野徧華封四律恭成萬年誌頌繞樞電影月流虹寶厯祥開屬聖聰濬哲逺昭千古合欽文時仰萬方同星熒南極當宸幄鳥下西池集蘂宫至德難名無以祝普天抃舞共呼嵩其一神功奠麗慶無疆綘闕時懸奎壁光嶺外旌旗馴韎韐殿中禮樂重縑緗榮生苑樹春光繞瑞啟瑶臺夀域長山海梯航稱盛事微臣何以效賡颺其二鹿鳴歌罷聚羣僊鷺序班隨進錦箋竊擬升恒如日月還期崇盛比山川鈞天自協簫韶奏宵雅惟陳保定篇甲子初周春正永祥光嵗嵗繞微躔其三帝星常映夀星明巷舞衢歌頌太平五福箕疇綿睿算三多華祝紀長庚堯天浩蕩歡無極舜瑟薫和俗已更自是萬年膺寶籙宸居髙處即蓬瀛其四萬夀詩七言律三首翰林院編修臣索泰軒臺春色浩無邊一道恩波泝八埏虎拜彤墀時震嶽龍飛上甲始周天金桃瑞結三千實寶厯祥開億萬年咸慶昌期多樂事麟遊鳯舞聖人前其一東鰈西鶼協氣通雲蒸霞起競呼嵩九重天近恩三接萬嵗聲長日再中紫氣騰輝髙北斗青雲占律應東風海隅已自登仁夀胞與猶然切聖衷其二聲名洋溢徧遐方夀域𢎞開帝道昌八表太平原有象兩儀悠久本無疆湛恩世戴堯天大化宇人遊舜日長願繼衢歌隨率舞彤庭一進萬年觴其三萬夀詩五言截句十二首翰林院編修臣朱啟昆瑞日行黄道祥雲捧紫微千周花甲始南極永呈輝其一四海同華祝心心獻夀觴衢遊千載接嵗德叶昭陽其二誕彌前佛日二十肇禎期夀比恒沙數年年溢水湄其三瑞秬盈芳甸靈泉湧玉池天心垂景貺竝侑萬年巵其四御氣雲棚敞含風日牓髙萬方齊獻夀瑞露浥金桃其五文昌依夀宿甲乙啟祥科萬夀千千度菁莪育幾多其六崇文捜秘簡闡道續瑶牋萬玉山為檢長河帶作編其七精一傳心妙文明撫運全統承堯舜後夀邁昊軒前其八好生天覆育含氣浹深仁上夀疇環衍千春與萬春其九虞苗今革面沐浴大清春蠻曲諧銅鼓聲聲祝聖人其十嵗蠲逾萬萬秉穗積山邱願以倉箱實添皇海屋籌其十一乾苞開一畫妙道契宸衷聖算天長久生生不息同其十二萬夀詩五言律十首翰林院編修臣涂天相旭日遲丹陛和風拂紫宸雲開三月曉運啟萬年春推厯天臨午陳詩命自申歡聲中外集獻祝效封人其一稽古探金匱談經御講筵詩書歸手定洙泗接心傳建極皇猷茂崇儒聖教宣健行方未己帝徳峻於天其二玉硯揮宸翰珠躔煥彩虹文章三代上綸綍六經中握算璣衡正和聲氣化通多能原首出未許百王同其三郊廟隆親祀祈年瑞雪霏精誠通帝座仁孝慰慈闈黼黻昭皇極河山載德輝百神咸受職巡幸䕶鸞旂其四撻伐皇威震親征聖武昭六師平絶域九譯欵王朝德耀金戈偃時清玉燭調久安勤保泰大事重蒐苗其五命官文石陛睿照自天臨詢事勤宏訓旌賢下德音水平神禹績刑措帝堯心永固皇王緒謀猷越古今其六環海蠲邦賦深仁洽漏泉金雞頒赦令銅雀報豐年景運貞元㑹鴻功三五全撝謙却尊號宵旰尚乾乾其七式廓今無極梯航域外臣只看賔服衆愈見德威神獻矢来庭逺焚裘却貢頻海波長此静奕世戴尊親其八抃舞騰黌序恩綸沛澤長作人周道盛籲俊夏圖昌蘂榜盈龍虎梧岡集鳯凰開科稱萬夀史冊永流芳其九寶厯升恒永貞符甲子旋侍臣多鶴髮獻夀集耆年雲日瞻堯表賡歌叶舜絃帝星千萬嵗炯炯麗中天其十萬夀頌有序翰林院編修臣鄒奕鳯臣聞瑶光貫月哲后呈祥華渚流虹聖人啟瑞天地之髙明博厚必經悠久以成功帝王之富夀康寧斯歴綿長而永命欽惟皇上體符乾健用普離明心傳十六字之微光華復旦身應八千年之厯運㑹長春布愷悌於八紘蠲賦恤刑恒恐一夫弗獲擴聰明於萬里揚清激濁用成六合咸熙人人解慍阜財處處耕田鑿井是以民熙物皥時聞百嵗於民間日升月恒還集三多於我后兹值三春令旦正逢萬夀昌期星現長庚卿雲糺縵庭張廣樂法曲悠揚香靄氤氳乍啟九天閶闔春光駘宕齊来萬國衣冠梯山航海以朝宗不數西鶼東鰈虎拜鳬趨而獻夀疑瞻方丈蓬莱臣濫列清班叨逢異數涓埃未報莫酬髙厚之恩巍蕩難名載祝貞恒之運謹拜手稽首而獻頌曰惟天長清以健為行於穆不已主宰生成聖人法天道惟一誠誠則不息厯數斯貞運啟中天猗惟我后太和元氣涵濡宇宙天縱以德必兼以夀氣運綿綿超前軼後夀以道統心印羲皇圖書剖蘊萬古煌煌夀以文章雲漢輝光藝林學圃歴久琳琅夀以作人譽髦斯士卜世卜年早培基址夀以奮武神謨親指萬里蕩平永垂青史夀以治河浪息鯢鯨金隄孔固終古澄清夀以蠲賦百萬弛征衣豐食給户祝長生夀國夀民一人是戴臨御之期於焉萬載凡我臣民子孫世代以就以瞻龍光鳯采春當三月晴日麗天宫鶯競囀禁柳方妍謳吟頌禱九譯爭先嵩呼望闕拜舞駢闐寶幄方開簫韶九奏風日融和川原錦繡榮光竟天嘉祥輻輳旦復旦兮長歌萬夀萬夀詩五言排律二十四韻有序翰林院編修臣王謩欽惟我皇上緝熙至道保合太和致宇宙之殷昌納人民於仁夀心符元化功與天地參焉統集大成賢於堯舜逺矣時際三春令節慶逢萬夀昌期斗柄指辰韶景暢恩光而彌溥嵗華周甲玉衡衍寶厯以長新九重之福履天齊萬國之歡聲雷動臣職慚翰墨世荷寵榮常含小草之心涵濡湛露願試微禽之羽翔舞和風頌擬九如歌賡百祿竊效嵩呼之響敬攄華祝之誠景祚天樞正熙朝寶籙昌帝心涵造化王道洽隂陽上理勤尤切丕承烈更揚德風披浩蕩愷澤沛汪洋動靜昭仁智洪纎肅紀綱神明軒鑄鏡端拱舜垂裳聲教髙千古光華被八方參天功莫尚觀海學難量奎壁懸宸翰雲霞煥睿章圖書傳秘典謨誥示周行乾運行彌健天申命有常雪呈郊日瑞蓮發嵗朝祥韶景三春候瑶漿萬嵗觴天顔真有喜聖徳自無疆花甲循環始箕疇永錫臧嵗符華祝好日共帝恩長道久恒占吉時雍泰運康㑹嘉殷百福齡永邁三皇悠逺乾坤夀貞明日月光露凝仙掌滿莢繞禁墀芳紫氣連丹闕香雲靄玉堂鵷班羣抃舞卉服悉梯航燕喜春方盛賡歌樂未央昇平億萬載長此戴君王萬夀詩七言律四首翰林院編修臣查慎行鳯紀龍飛六十年周天景運正中天衆星拱極雲霄上萬國瞻光日月前難老祥徵仁者夀誕生聖在佛之先欲知帝力占甿俗擊壤吹豳徧八埏其一爐香馤馤䕶楓宸花甲循環厯象新玉燭萬年三月節鴻鈞一氣四時春闢門典曠收羣士錫福疇多及庶民野老祝釐還自賀子孫同作太平人其二厚澤深仁物物霑直從動植到飛日暄雷動恩威竝秉鉞垂衣創守兼久運乾行神倍旺屢辭尊號德彌謙太和宇宙無疆慶長願春隨閏嵗添其三極盛皇猷冠古今無涯聖學仰髙深已隆咸五登三業猶厪堯咨舜儆心天大固知難比擬人歡爭欲效謳吟小臣拜手情尤切十載䝉恩在禁林其四萬夀詩五言排律六韻十首翰林院編修臣萬經寶厯膺昌運時和庶彚康日輪瞻聖表雲漢煥宸章瑞靄凝三殿仁風育萬方湛恩同海濶上夀竝天長春晝罘罳暖花晴彩仗香願將芹曝意嵗嵗獻君王其一旭日螭㘭上祥雲黼座前宫鸎初囀曙禁柳正含烟考厯明三統歌風播五絃嵩呼聲動地虎拜㑹朝天海棗堆柈麗仙桃簇苑妍太平忻擊壤萬國慶堯年其二聖德符乾象陽和滿太虚瑶光涵月殿鈞奏集宸居南極騰輝始西池獻夀初捧觴多碩輔入覲有安車鳯輦巡郊後龍樓視膳餘幾康時有勅聲教被扶胥其三青嶂環丹禁紅雲䕶紫宸蜨飛西苑午鵲報上林春草木均霑化騶麟總被仁天人一貫統禮樂萬年身釐祝盈畿甸賡歌徧侍臣玉階叨染翰慙乏綵毫新其四至道傳精一諸家辨異同易圖探奥窔性理闡儒風鳯至占昌運河清上泰濛文追典謨體武邁夏殷功制度髙三古精明達四聰長春開夀旦百谷盡朝宗其五陽徳方亨日嵩齡周甲時影分雀扇早香度玉爐遲好古勤編帙多能擅賦詩琱弓親試射鏤管愛臨池學問誰窺測天章倍繹思仙籌添海屋青鳥下彤墀其六薄海融春澤天顔駐太和梯航歸恐後筐篚貢方多匣底弢金甲堦前振玉珂九邊修耒耜八塞起絃歌版宇今無外輿圖古莫過蠲租逾億萬太液溢恩波其七鵷鷺飛金闕冠裳聚玉京王言傳渙號文治振離明漢殿芝長茁堯堦莢又生西秦甘露湛東觀彩雲晴麟脯雕盤擘霞觴醁酒清天街歌吹盛歡徹九重城其八仙杏開長樂蒼松繞上林鶴鳴盤嶼久燕舞入簾深金鑑千秋籙簫韶一代音髙明恢帝度浩蕩見宸襟廣闢求賢網難名愛物心大椿誰紀嵗六幕芘餘隂其九仁夀中天㑹嘉祥上帝知雲璈来海島迦鳥集璚枝化日勾陳列神光太乙隨瑶壇香徧拂仙掌露頻垂卜世年彌永居髙聽每卑升恒長拱極萬載肅朝儀其十萬壽盛典初集卷七十八
