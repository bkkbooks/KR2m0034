body:
  text: 欽定四庫全書萬夀盛典初集卷三十恩賚五蠲賦二巡撫直𨽻等處地方管轄紫荆密雲等關隘贊理軍務兼理糧餉都察院右副都御史世襲一等精竒尼哈番加九級臣趙𢎞燮謹題為欽奉上諭事據直𨽻守道參政臣李育柱詳稱直屬五十年地丁錢糧欽奉上諭通行蠲免并歷年舊缺亦盡免徵奉文到日一時巽命風行歡聲雷動欽惟我皇上御極五十年來深仁厚澤如天地之無不覆載如日月之無不照臨崇節儉於一身思飢溺於天下今又將通天下錢糧蠲免一周稽唐虞之世一夫無不得所未聞終歲無徵考三代以還斗米亦有三錢幾見輪年免賦況直屬地方被澤獨先䝉恩最近歷年之補助河海同深此日之蠲除丘山並厚軍民感戴仰帝德而難名紳士謳歌祝聖夀於罔極積天下之福以為福逺邁軒昊之輿圖散天下之財以為財永逾商周之厯數既據各道府紳襟士民合詞恭謝天恩理合據實轉請代題以達輿情等因到臣該臣竊查京師為王化之首雨露常霑直𨽻乃萬國之基陽春先到欽惟我皇上恩同天地德邁唐虞大小共戴生成遐邇咸臻熙皥數十年來四海升平萬民樂業考之史冊實所罕見猶䝉皇上時厪宵旰節用愛民蠲賑頻施不啻萬萬率土羣黎固已備極休養共安袵席而直屬人民幸生畿輔屢年受恩較之他省尤深尤渥兹復䝉聖德汪洋恩綸渙汗自明年康熙五十年始將天下錢糧三年內蠲免一周歷年舊缺并免催征此誠有加無已之隆施萬古難逢之曠典直𨽻士民首沐恩膏歡呼特甚臣准部咨欽遵刋示遍行曉諭并嚴飭地方官實心奉行去後兹據順天等九府屬士民各稱黃童白叟歡聲動地家家感戴皇仁户户謳歌帝德但聖恩浩蕩無由仰報惟有額手歡呼敬祝萬夀於無疆等情公懇道府李育柱等詳請代題事出士民感激真誠不敢壅於上聞臣謹恭疏代題伏乞睿鑒施行奉天府府尹臣廖騰煃謹題為皇仁浩蕩萬姓歡呼恭疏代謝天恩事竊惟奉天黎庶幸生發祥之地長沐覆幬之仁我皇上恩膏翔洽感召天和連年秋斂俱慶盈寧今歲西成尤稱豐穰民之樂堯天而歌舜日者比户皆然今又將康熙五十年地丁錢糧各省盡皆蠲免奉天州縣一體免徵臣接准部咨隨即刋示遍行曉諭奉錦九州縣家家忭舞户户歡呼咸誦皇仁之汪濊齊祝聖夀於無疆紳士里民葉珍文等焚香匍匐環集臣署懇具題代謝天恩臣謹率領在城大小各官并紳士里民人等望闕叩頭謝恩訖所有輿情歡躍陳情代謝真誠理合具題上聞伏乞皇上睿鑒施行總理糧儲提督軍務巡撫江寧等處地方都察院右僉都御史革職留任臣張伯行謹題為帝德獨隆千古皇仁廣被寰區謹據輿情恭陳天聽事據江蘇等八府州蘇太等十衛紳襟軍民彭㑹淇等呈稱伏惟我皇上化嫓勳華功兼謨烈統三才而立極念切阜民撫六合以為家心誠保赤獨我江南尤深帝眷留漕發賑動帑濬河蠲賦蠲租賜粟賜帛茅屋窮簷久已同霑聖澤黃童白叟於今復被皇恩欽奉恩綸特頒曠典蠲積年之夙逋免來歲之新條慶溢江沱歡騰海澨伏願聖夀天齊綿綿甲子皇圖地久永永春秋集太和於盛世呈上瑞於昌時永享升平長臻富庶末忱無由上達環叩代疏奏謝等情據此該臣看得江蘇等屬為財賦重地仰荷皇仁眷顧疊沛恩膏旱潦偶聞必蠲租而發賑蓄泄有備更發帑以濬河加之留漕減糶發粟賜帛久已老安少懷無一夫不獲其所矣今又特頒上諭將康熙五十二年地畞人丁并歷年舊缺銀兩并著免徵前署撫臣王度昭接准部咨檄飭江蘇布政司暨江南都使司一體欽遵并刋刻告示遍行曉諭務使遐邇咸知均霑實惠去後兹據布政司金世揚都司章秉法詳報八屬軍民感頌情由轉請題謝前來欽惟我皇上仁𢎞九有澤遍八埏薄海均荷博施環江倍䝉大賚兹者欽承上諭預蠲來歲新條并免歷年舊逋催科無擾軍民忭舞於堯天耕鑿有資童叟謳吟於舜日將見餘三餘九比屋盈寧皆由蠲舊蠲新頻年優恤焚香而祝萬夀者自祖徂孫望闕而頌三多者摩肩接踵臣䝉聖恩復撫江蘇蒞任之日各屬紳士軍民環赴臣署籲請代題恭謝天恩臣謹㑹同總督臣赫夀合詞具題伏乞睿鑒施行巡撫安徽寧池太廬鳳滁和廣等處地方提督軍務都察院右副都御史加四級紀録八次臣梁世勳謹題為皇仁疊沛萬姓歡呼臣謹據情具題恭謝天恩事據安徽等各府州屬紳襟士民孫元衡等呈為皇恩浩蕩蠲免錢糧十郡歡騰懇乞代題事竊惟上膺天祿我后宜享貢賦於萬方下切民瘼聖主每播恩施於九土恭遇籌添海屋欣看澤沛江村正供蠲而百室寧十郡被倉箱之澤夙逋免而九歌敘兆民鮮箕斗之嗟隆恩與萬夀俱長士民踴躍大德偕一陽並至里巷歡呼元衡等恭逢盛世快覩殊恩布澤施仁薄海仰升平之化蠲租減賦羣黎䝉樂利之休共戴堯天敢忘封祝緣輿情未能上達謹叩代題謝恩以達微忱等情到臣據此該臣看得賦稅原一定之舊章蠲免實非常之曠典我皇上軫念民生頻蠲租賦凡屬編氓固已久霑樂利矣今荷皇仁浩蕩特沛恩綸率土正供三年之內全免一周安徽所屬康熙五十二年應徵地丁銀兩欽奉上諭俱著察明全免歷年舊缺亦并免徵臣接准部咨隨即檄行所屬一體欽遵去後今據闔屬紳襟軍民環擁臣署咸稱恭逢盛世疊沐皇恩聖德汪洋有加無已扶老攜幼頂謝天恩齊祝萬夀無疆懇臣代題并據布都二司暨安徽等十府州縣具詳前來臣身在地方目覩輿情真切不敢壅於上聞謹㑹同帶理江南江西總督印務江西撫臣郎廷極合詞具題伏乞皇上睿鑒施行護理浙江巡撫印務浙江等處承宣布政使司布政使加四級臣徐欐謹題為聖主愛養彌𢎞臣民受恩無既籲懇代題恭謝天恩事據杭處等十一府屬紳襟徐潮等合詞呈稱為聖澤同天皇仁廣被特請代題恭謝天恩事欽惟我皇上德備中和心存胞與大天保而居位備集九如體皇極以建中用敷百福殿書無逸見家室之盈寧圖繪豳風厪農桑之耕織垂衣裳而治逺近默運於一心受玉帛以朝大小咸歸於五服恤艱難於赤縣恩膏遍春夏秋冬普臨照於蒼黎政教暨東西南北禹甸周疆之內浹髓淪肌堯天舜日之中含哺鼓腹允臻至治莫罄名言惟浙省夙號沃饒為財賦膏腴之藪今越地久安耕鑿有民物安阜之休傳警蹕而遙臨澤已周乎萬姓念雨暘之未若恩又沛乎九重省斂省耕快巡行之盛舉議蠲議賑傳補助之休風九年蓄而世躋春臺百萬家之炊煙相接八蠟通而人登夀域十一郡之户口咸寧洵至德之無加實生民之罕覯乃者留有餘以逮下更煩睿慮之周詳務實惠以與民再見聖恩之汪濊頒詔遍加於直省蠲租首及乎浙江吏胥跡絶溝塍催科不擾雞犬聲聞廬舍逋缺皆停留白粲於官倉粒粒啄殘鸚鵡減朱提於國課家家飽過蟫魚釀酒炮羔千村樂歲烹葵剝棗萬井同春山農澤農地農共熙熙而皥皥五榖九榖百榖皆翼翼而芃芃臣懷愛日之忱民效呼嵩之祝伏願一人有慶樂太平者水永金甌萬夀無疆頌屢豐者綿綿玉厯情深感切藉封章以謝帝德之彌殷歲泰年豐望入告以動天顔之有喜葵心傾吐皆在奏疏之中鳩杖優游竊附謳歌之後等情又據闔屬耆民王國瑞等呈為聖恩浩蕩如天萬姓歡呼動地謹抒下情籲請代題恭謝天恩事呈稱欽惟我皇上治秉一中功隆兩大恩波益溥三載而逺近全蠲德澤彌深一歲而舊新並免快覩九重綸綍欣聞兩浙謳歌物阜民安即是太平有象河清海晏咸賡萬夀無疆瑞等恭逢聖主幸被陽春浹髓淪肌難酬髙厚伏乞代謝以伸輿悃等情又據杭州前右紹寧台溫處等八衛嘉湖衢嚴海五所呈請據各衛所屯運伍老軍丁趙恩潘美等呈稱欽惟我皇上大德𢎞敷至仁廣被疊沛恩膏處處塗歌巷舞羣霑雨露人人刻骨銘心今又䝉特㫖念切軍民將五十年額賦敕賜全蠲歷年舊缺又復免徵聖恩疊沛如天萬姓歡聲震地惟願千秋益永共慶萬夀無疆備瀝下情頂謝伏乞據情轉詳題達等情到臣據此該臣看得補助偶行尚喧傳於夏諺田租減半猶志美於漢書未有屢蠲屢賑愈久愈加如我皇上之愛養勤恤誠千古所罕覯者也浙省康熙四十八年錢糧曽䝉蠲免今又蠲免五十年錢糧三載之中兩載被澤康熙四十五六七年舊缺分年帶征今又免徵歷年舊缺一歲之內數歲霑恩有司省催科必勞心於撫字萬姓皆溫飽寧致慮乎飢寒是以十一府之紳襟士民八衛五所之運丁屯伍莫不歡聲震天咸仰一人有慶頓首動地共祝萬夀無疆將見金甌永固毋庸卜世而卜年玉厯綿長允矣如帶而如礪綸音遍布率土均歡兹據布政使徐欐掌印都司繆肇祺詳請代謝天恩前來臣謹㑹同署福浙總督事務福州將軍臣祖良璧合詞具題伏乞皇上睿鑒施行巡撫湖廣等處地方兼提督軍務都察院右副都御史加五級降一級臣劉殿衡謹題為蠲免疊沛皇仁臣民頂戴彌篤公懇詳請題謝上達輿情事據布政使司布政使張聖猷都使司郭大受詳據武昌等八府十二衛所紳襟耆庶張希良等呈稱竊惟聖澤汪洋雨露不遺夫三楚民情真切嵩呼望達於九重我皇上六合為家萬民同體凡海內黎庶靡不含哺鼓腹共樂雍熙而聖心軫念民生有加無已各省錢糧次第蠲免不特近代所罕覯實為曠古所未聞至楚地濵江帶湖幅員遼濶前康熙四十四年荷䝉恩綸下沛將楚省四十五年正供槩豫蠲免未完逋缺並停徵輸嗣又特奉上諭將康熙四十三年以前未完錢糧通行豁免三楚臣民業已感戴皇恩刻骨銘心矣今五十一年應徵地丁銀兩復䝉上諭全免并歷年舊缺俱著免徵綸音甫下歡頌遍騰江漢之間既庶而富荆襄以上實盈且寧全楚老幼人民靡不遙瞻北闕稽首拜揚共祝聖夀無疆特此公籲轉請代題恭謝以達微忱等情到臣該臣看得則壤成賦為從來惟正之常供下令免租乃自古偶行之曠典從未有湛恩大沛至再至三愷澤𢎞敷自近自逺如今日者也欽惟我皇上九圍化溥一統仁涵宵旰日勤知耕織乃足民之本雨暘時警念農桑為生物之原惟兹三楚編氓尤荷九重軫恤前於康熙四十四五兩年疊奉恩綸蠲除四十五年地丁銀米豁免四十三年以前未完錢糧固己家霑户被莫不戴德含恩矣今又特頒上諭將康熙五十一年地丁銀兩通行全免歷年舊缺俱著免徵臣接准部咨遵即遍示曉諭黃童白叟沐綸音之屢渙羣皆巷舞衢歌窮谷深山感聖澤之頻施咸效嵩呼華祝兹據湖北紳士軍民合詞公籲題謝前來臣敢不據實上聞謹㑹同督臣鄂海具疏代題恭謝天恩伏乞皇上睿鑒施行巡撫偏沅等處地方提督軍務兼理糧餉都察院右副都御史臣潘宗洛謹題為聖主普沛恩膏兆姓遍霑德澤伏陳謝悃懇達輿情事據湖南布政使佟國勷湖廣都使司郭大受詳據長沙等七府二州七衛紳士軍民黃中理等呈稱欽惟我皇上駿德遐昌益勵厚生之政鴻圖鞏固屢𢎞恤下之仁固己六宇均霑雨露萬方同煦陽和矣兹乃特沛恩綸大施惠愷將康熙五十一年地丁錢糧全免歷年舊缺俱著免徵於時聞命自天歡呼匝地惟是湖南地方屆百粵之衝湖山繡錯接五嶺之峻民苖雜居久勞宵衣旰食之心漸臻解愠阜財之盛食毛踐土羣知惟正宜輸仰秣懷芻共荷太平有本猶且周咨下隱廣錫𢎞恩從此僻壤遐陬不聞追呼之小吏將見飲和食德遙同鼓腹之盛時理等地處南疆星拱北極衡山開夀域學嵩呼以歌頌萬年洞庭挹恩波望海若而朝宗百谷值此淪肌浹髓孰不鏤骨銘心但鰲戴有懷蟲鳴莫達伏乞俯徇下悃恩賜轉詳上達等情到臣欽惟我皇上明並照臨仁同覆載雨露之澤萬物循環無窮元氣之育羣生周流不息六合至廣撫綏無異一家兆庶至多痌瘝實同四體蠲租之詔屢下賜賑之典頻施顧猶大施德政特沛恩綸凡此率土正供盡於三年周免湖南所屬五十一年應徵地畞人丁銀兩察明全免并歷年舊缺俱著免徵臣接准部咨即欽遵出示并檄藩閫二司通行闔屬遍為曉諭深山窮谷罔不周知鑿井耕田誰非食德歡呼載道惟願聖夀之無疆頂祝盈庭共慶太平之至盛兹據湖南所屬七府二州七衛紳士軍民公願題謝前來臣敢不據實上聞謹㑹同湖廣總督臣鄂海合詞具題恭謝天恩伏祈皇上睿鑒施行巡撫陜西等處地方贊理軍務都察院右副都御史加三級紀録十次臣永泰謹題為籲請代題恭請天恩事據西延鳳漢四府興安一州各屬紳士軍民梁鼐等呈稱世際郅隆黎民久遂含哺之樂時逢豫順蒼生已登袵席之安皇上猶夙夜孜孜勤圖利濟至我三秦百姓尤加軫恤於康熙四十二五年間將一應未完地丁錢糧特恩蠲免十年之內浩蕩恩波已䝉再沛今又仰荷皇仁將五十一年錢糧并歷年積缺皆蠲免免徵真千古未有之殊恩也鼐等幸生聖世舉家銜感萬姓同心惟有朝夕焚香頂祝天子萬夀無疆而已但九重髙逺輿情不克上達懇祈轉申繕疏代陳等情到臣恭惟皇上御極五十年宵旰靡寧時切民隱薄以自奉務崇儉約之風厚以養民屢布寬仁之政或一年而蠲數省或一省而蠲數年蠲發之數何止億萬金錢而皇上惓惓軫恤之意猶恐一夫不獲其所乃因户口日繁食用或未殷阜特沛恩綸以五十年為始將天下錢糧於三年之內通免一周將使僻壤遐陬户户享豐亨之福茅簷蔀屋人人登仁夀之年似此天髙地厚之恩誠為亘古所未有也兹康熙五十一年陜屬地畞人丁額徵銀兩并歷年舊缺銀兩欽奉諭㫖盡行豁免隨即遍示曉諭闔屬紳襟士民黃童白叟無不踴躍歡呼焚香頂祝聖天子夀同天地景福無疆今據士民籲請代題恭謝天恩等因前來相應㑹同督臣殷太合詞具題伏乞皇上睿鑒施行巡撫甘肅寧夏臨鞏等處地方贊理軍務兼理茶馬都察院右副都御史臣嶽拜謹題為皇仁大沛萬姓歡騰懇請代題恭謝天恩事據蘭州㕔衛闔屬紳襟士民劉雲􅀈等公呈為𢎞恩普被萬方感德尤切邊土恭陳謝悃仰祈上達事恭遇我皇上御極五十年文德武功蟠天際地深仁厚澤浹髓淪肌而猶旰食宵衣厪念窮簷蠲租發帑已逾萬萬之數兹復誕敷雨露親渙恩綸蠲免五十一年地丁又免從前積年民缺恩深滄海舉東西朔南之所屆無一或遺惠遍陽春自唐虞商周迄於今適逢未有􅀈等身處邊陲親承曠典五十年以前坐享歲月升平安如磐石億萬載以後永沐恩波浩蕩德若川流惟有比户焚香瞻雲就日頂祝聖夀之無疆益鞏皇圖於萬祀為此連名陳謝仰祈轉達天聽等情到臣欽惟我皇上仁同天地德邁唐虞施古帝王未普之恩遍今海宇無疆之澤甘肅地處邊陲向賴皇上洪福比年以來五榖豐登萬姓樂業今復奉上諭將甘肅五十一年地丁銀兩通行全免并歷年舊缺亦俱免徵隆恩浩蕩有加無已臣接准部文敬將上諭恭刋印刷遍示城郭鄉村深山窮谷咸使周知隨據闔屬紳襟士庶懇請代題前來臣以輿情真切不敢壅於上聞謹㑹同川陜督臣殷太合詞具題伏乞皇上睿鑒施行萬夀盛典初集卷三十
