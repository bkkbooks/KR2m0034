body:
  text: 欽定四庫全書萬壽盛典初集卷一百六歌頌四十六舉貢諸臣一萬壽表舉人臣李長庚等伏以聖壽同天萬國獻升恆之頌皇恩似海八紘賡卿旦之歌仰南極之星輝長與璣衡並運值西池之桃熟端知雨露旁敷天皇紀萬八四千典册於焉常炳歲度起三百六十花甲從此初周易象則數書一元洪範則壽先五福此所以普天華祝大地嵩呼者也欽惟皇帝陛下超軒軼昊駕舜賢堯臻久道之化成域開仁壽著允恭而光被世樂雍和祥徵泰運之隆鳳在郊而麟在藪瑞集昌期之盛魚有藻而鹿有蘋巍巍蕩蕩以難名皥皥熙熙而順則原夫虹流示慶篤生有道之聖人瑶彩鍾祥保佑萬年之天子聰明睿智合四德以立誠文武聖神統庶邦而建極甲帳觀書之暇由洙泗以迄紫陽細旃染翰之餘邁鍾王而超顔柳巡行鑾輅春生翠鳳之旗指授河漕波靜金牛之渚圗繪煙蓑雨笠如披月令豳風搜羅邁軸考槃載詠菁莪棫朴時時解網善教得民疉疉蠲租誠心保赤奮揚沙漠天河洗紫塞之兵弭戢海疆夜月上朱崖之貢三百屬聯常奏績秩然禮樂兵農千萬國黎庶騰歡赫矣東西南朔是以宇宙之內沐盛德而效來臣覆載之中被仁風而歌壽考太和保合垂衣裳於五十二年厯數綿長集共球於萬千億葉陽春三月暖鼓融風聖壽六旬光迎曉日預沛恩綸而免賦不用瞻蒲望杏自然井養無方特從夀域以開科頓教握槧懷鉛共喜書升有路黃童白叟都為佺侣之仙燈樹花棚盡是蓬壺之境扶杖者國老而兼庶老咸曰多富多壽多男憲言者上庠以及下庠苐願如川如岡如阜民壽合成帝壽人心即是天心况當雨暘時若之辰天不愛道而地不愛寶益際運祚升平之會川以增媚而山以增輝臣等言愧無文情深釐祝獻芻蕘之一得稔知聖主久憐才望葑菲之無遺羣仰大君能造命輦轂歡呼之下謹罄葵忱星雲陳燦之間式瞻楓陛摘仙果於長生之樹挹流霞於太液之池伏願六合同春萬年不老道隨時泰絲綸潤滴金莖壽與天齊仁義煉成丹顆厯算春秋之歲富有日新無窮甲子之期久安長治臣等不勝踴躍歡忭之至萬壽詩五言排律二十韻舉人臣李長庚皇圗綿寶厯奠定此坤垠疉疉嵩呼壽遙遙嶽降神惠風初應律淑氣正宜春是草中庭莢凡柯上古椿朔桃紅似火安棗大如輪鳳輦隨龍種鵷行列雁臣英才誠濟濟公姓果振振閶闔千門曉鶯花三月辰蓮燈待奇士甘雨潤良民遍學絃歌魯齊吹稼穡豳經綸抒睿慮保定及君身箕畢諳時節郊原愛比鄰太平人見慣大有史書頻堯則惟天大湯銘又日新萬幾殊逸豫四庫乃紛綸尊號升丹陛謙光出紫宸道髙心益下名者實之賔侯甸要荒合禽魚草木均謳歌通寤寐拜舞表尊親來自蓬瀛外梯航祝聖人萬壽詩五言排律十首舉人臣陳大慶紅日初生曙青陽正麗辰萬年天子壽一統太平春海嶽籌方紀羲軒厯更新風傳率土慶露浥普天均丹陛千官擁金爐五色陳願言隨鳳羽儀舞向楓宸其一睿德同天運昌齡與日長星辰環玉几沆瀣引霞觴樂奏簫韶永花迎劍珮香祥麟遊在苑靈象舞成行蚤已神人洽因之品類康萬方齊拜手長此奉君王其二仰挹文思聖誰窺濬哲衷精微兼廣大履蹈悉中庸華渚虹流瑞圖書天錫聰自然披閫奧無事訪崆洞直與乾行並還將離照同未央宫漏永萬古闢鴻蒙其三穆穆難名德巍巍丕顯謨八荒歌帝力一氣鼓洪爐垂拱文明盛生成雨露濡天章時煥發地道日昭蘇仙掌浮元氣祥雲捧瑞圖九重金鑰啓振響雜嵩呼其四錦纜來方國文騶擁上京舟車何絡繹拜舞盡聃彭往者時巡幸羣然望斾旌天山指顧靜淮甸洑波平神武豐碑紀訏謨底績成坦途來頌禱貢賦有餘情其五黃道臨閶闔金泥降掖垣時聞解澤沛更與巽風溫祝網開三靣蠲租下九閽星辰稀貫索椒飶遍乾坤紅朽家家粟花封處處村遙知千萬載飲啄是君恩其六不夜昭雲漢長春滋植培千門縈鳳闕六典出鴻裁恭領王言渙欣逢壽域開十年當虎拜兩榜萃龍媒遍下珊瑚網環稱瀲灧杯風雲隆際會元首詠康哉其七水殿金鼇鎮宸居爽氣澄時雍豐豫暇藝事藹騫騰日月天文麗雲霞睿藻蒸字真龍負出律與鳳鳴應不假人工代驚看天縱能英風昭萬古金石可相勝其八自闢陰陽撰還披紀載文誰能髫齔日即是聖明君我后膺圖早乘乾保泰殷旰宵皆惕慮逺邇足氤氲靡事陳無逸寧須戒倦勤賡歌與擊壤旦旦仰卿雲其九草莽何知識嬉遊共庶黎百生逢運泰萬壽正天齊碧沼羅瓊液和鈴集介圭皇風暄斗北紫氣滿關西壺溢金莖露封題玉檢泥卷阿如有作載詠繼鳧鷖其十萬壽詩七言律二首舉人臣葉王前春雲靉靆繞天閶花甲新周歲月長五十二年多雨露萬三千里集冠裳花明珠樹蓬壺近煙靄金爐寶篆香此日人文當景運嵩呼動地綴鵷行其一浩浩恩波滙百川功成禮樂足三千九苞鳳翽朝陽地四照花開不夜天曲奏雲璈看鶴舞風和玉宇聽鶯遷升恆有象文明盛壽域𢎞開霄漢邊其二萬壽詩五言排律十首有序舉人臣劉嵩齡臣聞兩儀之大惟君兼天地生成之合五福之一曰壽得乾坤清淑之全歲以衍而彌增業高千聖者年高千聖嘏以純而永錫德冠百王者齒冠百王敬陳三祝之詞恭效九如之詠欽惟我皇上一人有慶萬壽無疆道雖逸而勿休肅乂哲謀統貫於歲月日時之內心自強而不息剛健中正直超於元會運世之前備兹聖德之淵深獲此帝心之眷注固已丹文緑字天頒不老之符金簡琅函地出長生之籙矣乃猶聖不自聖安益求安常存兢業之心永底郅隆之盛湛湛九天膏雨即為益壽之醴泉蔥蔥萬里桑麻盡是呈祥之芝草斯蓋唐虞而下未能多際之昌期抑亦漢唐以來無由偶見其盛事者也乃者昭陽建歲辰月當春計膺圖握寶之長則五十已踰其二溯貫月流虹之始則六十正值其全天皇之紀萬八千始基之矣封禪之代七十二莫能及焉於是四海謳歌九州鼓舞指南山而獻頌歡聲遙答夫舜琴斟北斗以稱觴喜氣遍浮於堯酒天庥滋至幸值斯時物類咸亨欣逢此日臣草茅賤士章句庸流家受國恩疉畀一方之寄名登鄉榜久叨三物之榮兹因代父以瞻天敢不矢歌而祝聖敬擬唐人聖壽無疆詞十章上呈睿覽聽韶音之嘹喨願隨百獸以趨蹌仰魏闕之嵯峨樂共九苞而抃舞云爾道洽時逢泰人欣日麗中一元春浩蕩萬象早昭融璿玉三辰合權衡八表同普天尊正朔大地遍薰風已慶禎符應遙看淑氣通歡呼稱聖壽直欲徹蒼穹其一帝德符元化宸心契穆清壽從無逸得政以有恆成兢業膺多福憂勤致太平功高原不宰道大轉難名寶儉常居約存仁本好生海隅欣丕冒熙皥世咸亨其二地比恩膏厚天同厯數長和平皆道德豐稔即禎祥化俗歸忠厚安人迪吉康登三咸在運畫一自成章侯甸車書合梯航玉帛光風行兼日出稱壽盡來王其三典學周終始單心本緝熙鍾鏞諧律度金玉合威儀綸出親揮翰經成自吐辭畀疇重夏禹畫卦又包羲語默爻兼象方圓矩共規壽高由德劭天為作君師其四解作千家雨升回萬國春祥刑歌帝德偃武頌皇仁飢溺真由已痌瘝若在身蠲租蘇下里貸賦恤窮民户有含飴叟衢多鼓腹人從今祈聖壽億載更如新其五詢嶽同虞帝掄才闢四門涉林求梓杞剖璞出瑶琨霧變南山豹風搏北海鯤有文同漢倬無語不春溫羅入咸知德珠遺亦感恩作人逢壽考聯袂祝天閽其六參贊謨猷合經綸宥密全以身兼作述惟道備高堅心法傳欽允神功契廣淵勞常甘夏檋愠欲解虞絃休恤籌千載艱難計萬年九州咸引領祝壽願瞻天其七朗日含王字明星授帝圗堯階通閬苑禹室接蓬壺瑞色龍樓綵晴光貝闕珠卿雲分象緯和氣鼓鴻爐不借三枝樹寧須九節蒲萬年占聖壽驗取泰階符其八御幄祥煙敞春旗湛露開鳳從丹穴出麟自碧山來座對千秋鑑筵陳萬歲杯天中聽簫鼓海上見樓臺紫氣呈星象青雲映斗魁歡聲傳合殿拜舞沸如雷其九金波明鶴禁玉宇接龍樓物色三春麗天齡六甲周時平瞻玉燭祚永奠金甌瑞露明初浥香煙密欲浮元芝綿嵗月碧樹歷春秋早識滄溟外應增壽屋籌其十萬壽詩五言排律一百韻有序舉人臣博山伏思至誠首出定享遐齡大聖開天必臻睂壽蓋惟天眷德於焉申錫無疆惟德動天固爾禎祥誕集龍河兆瑞乘寶籙而運啓中天華渚呈休握乾符而德隆上古黃雲覆蓋金篋籌添紫電繞樞皇圖祿永稽之在昔則皆然考之於今而益信伏惟我皇上仁義中和神聖文武孺慕本乎至性色笑承歡禮儀篤於孝思恭順將志仰一人之至德仁讓成風生萬國之歡心惇庸化俗若乃學兼六藝道貫三才默契一畫之先理精河洛會通萬物之本體順隂陽集堯舜禹湯之大成宏開道統晰孔孟程朱之祕奧洞啓心傳是以崇禮素王標人道之歸極顯褒徽國定儒宗之指南姬代前賢胥蒙曠典宋家往哲並被隆恩况乃臨朝聽政之暇即事觀書行鑾清道之餘手不釋卷博極瑶編萬軸赤水珍流精融金簡千函丹溪韻寫涵滄溟於墨浪日爛紅霞蹴衆有於詞壇花翻白雪出經入史氣孕宫商扢雅揚風調鏗金石况夫條貫精粗旁通理數啓霞莊而璿璣齊政蟻磨迎衡披月館而寶厯授時蠶功順序坐虬牀而括宇宙術密容成慿鶴几而運鈞陶法精隸首以至六書獨步煙雲縹眇毫端八法相生龍鳳盤拏腕下鵠綾捧去巍班傳作竒觀翠錦收來甲第藏為寶玩於是雅化作人咸願䇿名於翰墨闢門造士爭思奮迹於風雲花淹蘂榜之期荆無棄璧名溢笋班之額海乏遺珠尤以士貴力行學期知本著文戒飭天語叮嚀勒石垂規宸衷愷摯人文煥矣大德昭焉若夫六軍電激塵掃滇黔七萃霆驅蕩平閩粵餘烈震於鼉室島嶼澄清偏師指於蠻鄉渝猺底定旗翻豹尾風清瀚海之波星落旄頭霧霽天山之月罽賔突厥接踵稱臣鐵勒呼韓歸心欵塞爰乃告功陵寢有事郊壇篤敬凝承非徒鬱鬯騂犧之薦追思繼述不僅馨香幣帛之文三禮初成翠靄氤氲於寶籙九韶誕奏仙音繚繞於天街於是華嶽􅌢弓桃林散甲風無破塊海不揚波渝舞狼歌爭來頌德賨幪火毳咸樂輸誠海隅日出之鄉度索攀藤而至沉毛反景之地梯山航海以朝獻土産之恢奇旅獒白雉貢篚筐之靚麗鮫織龍琛舟車所通盡稟皇輿之化霜露所墜不遺赤縣之封蓋文德如彼而武功如此所謂筆不勝書史難盡載者也乃猶頻咨州牧詢事考言日親廷臣觀風問俗詠豳風而慮周田事讀無逸而念切民依輕徭之紫詔頻頒薄賦之丹書屢下驕暘火烈禱六事而霖雨應期瑞雪花飛慰三農而天顔有喜約槐衢之典沐浴春臺舒棘序之風嬉逰壽域澤周貢舶逺人就日以抒懷羡減鹺征商竈瞻雲而灑志功髙排決迎神紘而鼉浪安瀾績懋隨刋駐乾絡而鯨濤底定書屛察吏事事為此羣黎發粟賑飢念念不忘衆庶寰中雨潤域外風施夫賑恤一隅雖詩書所習見而租蠲萬國豈開闢之曽聞河內河中衢歌巷舞遼西遼左野忭塗吟魯柝聞邾神絲被野吳雲入越遺穗棲田三秦饒板屋之歌八閩多茅簷之樂荆楚之煙波成市吠犬宵恬梁益之茶笋饒資里門夜闢山村野店開襟當解愠之風川飲谷居披户煦燭幽之日澤周動植化洽胎萌於焉卿雲生嘉秀出千祥集百福登物阜民蕃乃天心之眷顧歲和時序實聖德之休徴玉磬金雞曷能嫓美丹芝紫箑不足相誇今也和風布暖麗日當陽南極輝煌北辰朗耀九天閶闔開宫殿聖壽無疆萬國衣冠拜冕旒一人有慶椿齡正茂花甲方周太乙波晴錦簇仙桃萬樹上林煙碧香搖紅杏千枝蘭坂晨趨酒浥青城之緑鳳筵高列羮傳桂圃之香帝子鸞翔嵩呼濟濟天孫鵠舉華祝蹌蹌玉葉金枝躋金門而拜手鴛班鷺序望貝闕而稱觴綺綴花懸快覩臣民愛戴香飄霧羃欣瞻逺近謳吟臣草茅賤士駑劣無知幸際盛時恭逢大慶既同士庶霑濡養育之恩願竭愚蚩祝禱神明之德華渚流星日姚墟啓聖時九陔縈瑞靄三正曜光曦紫電臨雙闕黃雲羃九逵乾符標斗極寶籙奠坤維祿永申多益籌添集慶宜無疆歌孔固廣運頌維祺久道成神化鴻基擴逺規論功超舜禹比德邁黃羲陟降誠相洽凝承事克祇敬天供鬱鬯尊祖奉宗彞孺慕根天性仁親篤孝思兩宫歡愛洽一體湛恩滋德業渾無間詩書念在兹亶聰惟默契成務本生知直剖危微訓精探爻象辭性天通祕密道法悉宗支闡奧宣前烈傳心闢後疑孔門尊聖範朱氏表賢綦盛典光璀璨璇題絢陸離宸衷何亹亹聖學益孳孳錦帙披藝閣瑶編映寶帷百厨羅玳瑁萬軸積琉璃淹貫三才藴宏通七略奇淵涵充浩博泉湧寫清漪吟詠賡歌賁文章謨誥垂行間聞告戒字裏見疇咨珠玉霞流焰珊瑚翠滿枝望洋深莫擬觀海杳難窺誦讀時相勸觀摩俗轉移熏陶兼貴賤砥礪及氓蚩赩赫文明盛聲靈武略施蜀鯨翻渤澥閩寇觸藩籬聿定殲渠策爰興伐罪師公孫攖斧鉞餘善仆鞭笞螺女恬風浪蠶叢闢嶮巇三巴收脫兔百粵伏張鴟島嶼胥柔輯關河盡撫綏連城欣擊壤比户暢彈絲德化儼風播威靈霩電馳方區爭效順醜類敢相持蜂蠆針思逞蜣蜋臂欲搘雪山飛羽檄狼望指星旗球斧飄文豹鑾輿駕赤螭令嚴申密訓軍入戒輕齎邀擊紆籌策成擒決指揮崇朝清漠北永世靜邊陲德盛恢鴻緒功高拓丕基瞻雲來大食就日走波斯貢逺南溟外賔從北海涯輸誠由若木懷服抵崦嵫王會圖難遍方輿記或遺謳吟同逺邇覆載凖高卑和氣同繁植仁風及動跂如天真蕩蕩保泰倍孜孜論議親儒雅咨詢到碩耆問風開紫閣講藝集丹墀優禮崇勳舊隆恩答鼎司操觚登棫朴貫札課熊羆匡直先身率陶甄亟耳提增科收拓落覆試振頽靡恭已勤多務垂裳勵百為宵衣循著令昃日動如期庶績時寧矣羣黎日念之女紅勞紡織農力恤耘耔救弊恩常洽蠲租算不訾五聽寬酷急三刺去偏私律轉春回谷刑輕澤潤脂鹺征全減羡關市薄收資考績懲貪墨書屛杜蔽欺救荒荒有備禱雨雨相隨井養知淪髓乾施覺切肌千倉宣積貯四載繼胼胝故老承榮賚孤貧仰惠慈羈臣咸寵錫貢舶亦酬資平壤旋遭饉呼韓忽洊飢漕輸全凍餒陸挽濟窮羸綜理時調燭旁搜盡探驪乾坤齊玉律躔次凖銅儀坤軸諧周算宫懸叶密推九章窮肯綮八法析銖錙玳管揮柔翰桃花展陟釐盤拏光的爍飛灑勢淋漓一貫融今古多能罕等差管窺慙末技蠡測愧蕪詞節序當春月天人介壽眉堯封當淑景禹甸布雍熙長樂花添色恆春樹溢姿勾陳珠影燦華蓋瑞光披輦路鋪瑶靄爐煙裊玉蕤寶筵陳貝闕桂醑薦蓬池金穴呈瓊液天潢泛羽巵龍樓趨望散鴛砌拜臯夔太史書靈莢儒林詠赤芝期門環綺閣仙仗護文㮰慶遍籃輿老歡騰竹馬兒臣民嬉浩浩中外樂怡怡伏忖誠如芥微忱竊比葵蟲鐫抒蜿蜿獸舞效僛僛願繼崆洞祝興歌保定詩南山齊聖壽北海頌鴻禧萬壽無疆頌集五經舉人臣吳麟天地設位聖人成能首出庶物南靣而治天下克明俊德允執厥中茂對時育萬物陳常于時夏養賢以及萬民光天之下至于海表無此疆爾界罔不率俾各得其所盛德大業弗可及也已大矣哉與天地合其德故能彌綸天地之道天地之道恆久而不已也惟聖時憲德合無疆久于其道而天下化成古人有言如山如阜如岡如陵固有之也求福不回受天百祿蓋得其道矣兹蓋伏遇皇帝陛下允文允武乃聖乃神保合太和多歷年所元吉在上海隅蒼生實受其福仰以觀于天文日月星辰彰厥有常俯以察于地理草木鳥獸咸若其於人也敷天之下五典克從以言乎逺聲教訖于四海以言乎邇好生之德洽于民心非天下之至神孰能如此乎夫是以自天祐之以引以翼至于萬年永底蒸民之生是謂承天之祜下及兆民民恱無疆故不知手之舞之足之蹈之也兹惟癸巳春王三月既望越翼日乙未一人有慶四方來賀聖人之道謙尊而光不自滿假施命誥于四方行慶施惠康濟小民此之謂也是月也民大和會式歌且舞以近天子之光小大之臣虎拜稽首濟濟多士是用作歌嘉言孔彰瞻望弗及于是道古以矢其音敢對揚天子之休命北靣再拜稽首乃歌曰帝德廣運萬國咸寧各正性命品物流形九德咸事百姓昭明廣大悉備天地和同皇天眷佑降之百祥罄無不宜申錫無疆永孚于休以畜萬邦萬邦惟懷稱彼兕觥又歌曰皇王蒸哉位乎天德莊敬日強乃見天則受命既固聿懷多福壽考維祺惠此中國無疆惟休德音是茂羣黎百姓拜手稽首合敬同愛為此春酒自今伊始天子萬壽萬壽詩五言律一首舉人臣江發萬國來同日山呼祝我皇人瞻景運泰天眷帝齡長蕩蕩金甌固綿綿玉厯昌六旬方有慶萬壽正無疆萬壽詩七言律一首舉人臣宋照流虹繞電啓禎祥運協瑶圖寶厯昌萬國恩膏承巽命九重宵旰握乾綱淳風已布寰區逺壽域還同日月長此際八荒齊舞抃嵩呼聲裏祝無疆萬壽詩五言律四首舉人臣徐陶璋玉厯年周甲珠衡月建辰一人膺上壽萬物荷陽春莖露霑仙杏巖雲護大椿生成悠久澤錫福感洪鈞其一峻德超千古鴻恩沛八方瞻依趨玉闕稽拜獻瑶觴日映樓臺麗風和草木香普天開壽域聖世集嘉祥其二景物三春艷車書萬國同祥雲迎帝輦淑氣繞皇宫擊壤歌君德含哺祝歲豐聖慈同大造八闥仰昭融其三旭日開宫殿薰風拂御筵春臺人皥皥淑景草芊芊士選鴛鸞侣文呈錦繡篇光華賡復旦萬載荷陶甄其四萬壽詩七言律三首有序舉人臣邵元龍欽惟皇帝陛下日月並明乾坤同久握璇圗而御極清晏呈祥調玉燭以乘時平成介福具仁義禮智之全理生而知安而行仍不廢有為有作有養有存之功允矣心符乾運集堯舜文武之大成動而正用而和適協乎毋意毋必毋固毋我之量洵哉道接尼山蠲赦遍寰區鼓腹者逰羲皇以上輿圖增式廓效貢者挾筐篚而來大德曰生已統千八百國而同登衽席至仁必壽自合億萬斯年而長享康寧值甲子之初周正春秋之方盛千官稽拜近看紅燎臨花萬姓躋堂遙矚金爐傍日龍宫高紫極波霑北海共稱觴鳳厯屆青陽春滿南山齊獻頌僚寀記升平之盛繡帙千層詞臣進祝嘏之文瑶箋百幅普天喜洽率土歡騰臣仰荷生成久蒙教育望祥光於南極共慶籌添聆謡詠於西崑願申華祝爰踴躍歡忭稽首頓首而獻詩曰太平風景麗春陽瑞氣蔥蘢繞建章九有貢琛歸福祉八荒稱壽捧圭璋綵旗日照曈曈影金殿爐縈細細香最喜聖皇億萬壽十年一度進瑶觴其一福祿來臨日熾昌聖人恭已正當陽政成宵旰施霖雨樂奏簫韶舞鳳凰萬國共欣湯解網千官同拜舜垂裳會看大慰蒼生望天上人間日月長其二皇躬建極本無私錫福黎民利濟施心統智仁參位育道傳精一作君師範圍造化經綸出剖析賢愚舉措宜萬物幸逢巍蕩日同登壽域樂雍熙其三萬壽詩七言律四首舉人臣汪守鑾聖躬億載慶呼嵩六帙初升海日紅率土鸞毫歌至德盈朝鴛序頌神功時逢有喜升平久治到無為化育同此際萬邦人仰首一星南極正天中其一三月蟠桃遍暢春笙簫騰沸樂臣民樓臺夾路連仙苑童叟摩肩覲聖人百戲魚龍天半出三多歌曲道旁陳猗歟自古稀聞事史筆編來紀載新其二衡嶽雲開峙午方根源悠逺本無疆世登壽域山河濶運闢中天日月長華渚昌期先浴佛慶都嘉瑞正陶唐史書若比延綿算萬八千年駕古皇其三萬里來朝不計程一時耄耋盡光榮女瞻聖母頒華綺男拜金枝送玉觥野服袖聯鵷列坐杖頭香結篆煙清相逢都是神仙侣今日蓬萊在帝城其四萬壽詩七言律二首舉人臣王奕仁五雲爛熳鳳城春南極星光燭紫宸率土臣民歡欲舞一天雨露浩無垠金樽應佐西池果玉殿長依上古椿從此萬年歌保定太平人共沐洪鈞其一翠華曽駐泖峰間道左歡迎仰聖顔壽域六旬開北極臣心萬載頌南山梯航重譯共球集耆老欣隨鵷鷺班歌澤三春時雨降十年一度祝區寰其二萬壽詩七言律二首舉人臣陸翼淑氣春融化日長帝廷方獻紫霞觴鶯花競麗東皇節宫殿遙連南極光海外梯航陳玉帛寰中歌舞滿笙簧太平玉燭人歡豫天保年年祝聖皇其一帝澤頻頒蔀屋傳升平歲月更無前白頭共飫皇家饌令節遙分御府錢仙露不須承掌上薰風早已徹天邊臣民共有雍熙樂虎拜惟期壽萬年其二萬壽詩七言律二首舉人臣徐江普巍巍帝闕五雲中萬歲聲呼萬國同日麗春陽升若木星輝南極動薰風垂裳直邁天皇厯握紀從侔造化功恆見泰階平似砥年年歌頌達宸聰其一電繞虹流大地光獨鍾上聖越皇王經文緯武通三極出震乘乾馭八荒草莽得承天漢澤衣冠新染御爐香元辰集慶真無似拜手瑶京祝未央其二萬壽盛典初集卷一百六
