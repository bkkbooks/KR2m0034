body:
  text: 欽定四庫全書萬壽盛典初集卷一百三歌頌四十三京職諸臣萬壽無疆詩七言截句二十首原任大理寺少卿臣朱廷鋐帝德承乾子兆民三階玉燭太平春螭頭雉尾紅雲動萬國梯航覲紫宸其一同天有識徧賡堯亘古無雙只聖朝繼體守文仍締造武功不藉漢驃姚其二九重至性篤親親歡洽宫闈感化神一德汪洋千萬國風移俗易盡興仁其三皇衷洞達究人天萬事機樞睿智圓不借文辭糟粕理靈犀獨契象爻先其四五經同異有真詮虎觀蘭臺取次編鳯幄不辭還手定危微千聖續心傳其五男耕女織隔深宮聖主勤民翠輦逢環海九州齊望幸膏腴砂磧免租庸其六斑管朝擕蘸紫雲朱絲闌寫恤農文莫將瓠子秋風曲比我廵河堯舜君其七按圖刻玉禹功多聖意非徒理濁河但有淤流皆赴海水鄉魚鼈枕陂陀其八無端三蘖勢紛紜十宥深仁置罔聞平蜀平滇由廟算漫勞諸將奏功勲其九脅從首䑕費追求一道丹綸肆赦周賣劍賣刀非細故潢池赤子半田疇其十端拱無為却有為宵衣每問夜何其奠安方夏懸金鏡日日臨朝事事宜其十一休明鼓吹邁三唐㸃綴江山字字香興感隨人堪佐政臣工捧得作官方其十二白簡擎天吐藎誠宸衷嘉納仰寛宏更刋讜論垂為典皇道羣知有蕩平其十三塞漠昆池簇羽林春秋獮狩翠華臨辛勤不為承平後未雨綢繆一片心其十四知人則哲舜其難敢謂臯夔布兩間皇上用賢加愛䕶肯令和玉借他山其十五萬方玉帛貢朝端被服常思布素完誰似我君昭儉徳庶幾三代以前看其十六懿哉一歲兩開科文武兼收取士多聞道周詩稱棫樸昭囘雲漢近如何其十七包荒六合聖恩寛柔逺情殷古更難鑿齒雕題争拜舞相忘四海久安瀾其十八嘉禾岐麥徧郊坰嶽瀆清時也效靈不是尋常争獻瑞萬年大有紀彤庭其十九嫓五兼三帝不居功歸三祖有成書明禋孝思通天地萬載常看旭日舒其二十聖壽無疆頌集五經有序内閣中書臣莊楷欽惟皇上誕膺天眷統御寰區秉聰明睿智之至徳具神聖文武之鴻猷勤政愛民敬天法祖博施濟衆實堯舜所未能輔相財成補造化所未逮功成治定物阜民安萬國咸寧八埏在宥用能感召嘉祥綿厯永久今康熙五十二年三月恭遇皇上六十萬夀聖節天開日朗氣淑風和景星慶雲見於上醴泉芝草産於下雨暘時若上瑞洊臻我皇上惟以實心行實政誠求保赤布惠施恩夀考作人闢門籲俊聖徳彌廣聖志彌謙而萬國九州雷動雲合咸踴躍懽忭拜舞闕廷慶千載之竒逢祝萬年之寶厯蓋由我皇上視萬物為一體故萬衆報皇上如一心一時臣歌於廷士歌於學農歌於野工歌於市商歌於塗雕題漆齒之衆跂行喙息之倫無不重譯來朝梯航進貢猗歟盛哉自開闢至今功徳之昭垂厯祚之永久幅員之廣大生齒之殷蕃人才之日新月盛未有隆於今日者也臣等伏讀帝王統系書天皇氏夀一萬八千歲地皇氏夀一萬八千歲人皇氏夀四萬五千六百歲彪炳史書昭示無極今我皇上聖徳神功超越隆古敷天率土共戴生成羣黎百姓均霑化育固宜夀與天齊竝三光而不老福如川至偕萬物以同春勒諸金石洽東西南朔之謳吟叶以笙鏞宣天地神人之悦豫者矣臣等草澤鄙儒沐浴聖化歌詠太平五十餘載伏見我皇上徳盛化神彌綸溥博美難徧述善不勝書豈蠡測管窺所能周悉惟念古帝王賢聖典謨訓詞或能仰贊髙深頌揚萬一敬集五經成語同申三祝嵩呼乃拜手稽首而獻頌焉頌曰天子萬夀福禄攸同光被四表清明在躬懋昭大徳允執厥中皇天眷佑永世無窮聖徳也右一章章八句頌克寛克仁惟和惟一濬哲文明振民育徳穆穆皇皇兢兢業業應天時行萬邦作式聖化也右二章章八句頌行慶施惠以康兆民肇修人紀立愛惟親章志貞教氣盛化神百事乃遂萬國以貞聖治也右三章章八句頌欽若昊天隂陽合徳至治馨香祗敬必飭上帝居歆百神受職保佑命之動罔不吉天也右四章章八句頌敬祈天永命多歴年所率由舊章昭假烈祖登歌清廟下管象舞肅雝顯相天錫純嘏祖也右五章章八句頌法徽柔懿恭介以繁祉夀考維祺黄髪兒齒雝雝在宮式燕且喜永言孝思令聞不已聖孝也右六章章八句頌誕敷文徳其道大光旁求俊彦左右奉璋詢事考言顯忠遂良知人則哲邦乃其昌文治也右七章章八句頌布昭聖武赫赫厥靈肅將天威以征不庭陳師鞠旅克成厥勲載櫜弓矢偃武修文神武也右八章章八句頌上有大澤如川之流時萬時億敷政優優政在養民虞夏商周民説無疆萬福來求蠲賑也右九章章八句頌百辟卿士告爾祥刑赦過宥罪洽於民心發號施令咸與維新保合太和澤潤生民肆赦也右十章章八句頌所其無逸庶績咸熙立政立事維時維幾論道經邦翕受敷施股肱耳目百僚師師勤政也右十一章章八句頌天降時雨歲則大熟廼宣廼畞既霑既足百穀用成竝受其福皇心則寧帝命率育重農也右十二章章八句頌九河既道三江既入登是南邦覃懐底績奠厥攸居下民祗協地平天成世世享徳治河也右十三章章八句頌帝庸作歌天下文明聖謨洋洋志氣如神多材多藝是訓是行萬邦為憲展也大成聖藻也右十四章章八句頌天子視學和鸞鏘鏘彞倫攸叙邦家之光烝我髦士示我周行教之誨之誕受多方訓士也右十五章章八句頌春王三月長發其祥奄有四海協和萬邦小大稽首黼黻文章一人有慶萬壽無疆聖壽也右十六章章八句頌萬壽詩五言排律二十韻候補員外郎臣汪天與帝厯天同永皇齡日正中祥光先繞電華渚見流虹湛露臨仙掌香煙篆法宫八紘瞻舜日九宇沐堯風夀域車書逺春臺物象融通神侔太昊訪道擬崆峒雉扇排雲紫珠旗映水紅鶯聲和樂琯花氣暖宸楓帳殿三階接燈樓九陌通千官扶御輦五老狀仙翁琛賮來無外酺觴賜獨隆八方霑大賚萬國啟羣䝉造士瓊林盛蠲租繡壤豐推恩頒誥綍門䕃及兒童饗卒氊廬徧祥刑貫索空一人歌有慶萬國享來同似此恩何既于胥樂不窮升恒符杲曜久大協蒼穹甲子籌方始春秋運益崇十年環載筆萬歲疉呼嵩粉署郎官末鵷班祝聖躬萬壽詩五言排律百韻户部山西司主事臣唐崇勲癸巳春三月皇王夀萬年六旬今始度五福昔稱先南極星辰燦東風品物妍曈曨升若木縹緲靄非煙丹陛夔龍肅彤墀鵷鷺聯輿情歡率土廣樂奏鈞天輯輯和鸞至熙熙綺陌填雉開羅節鉞虎拜列戈鋋豈識舟車逺咸遵道路平名藩隨舞象譯使泛樓船祝嘏陳方物揚休彚錦箋琪花迎日麗石髓滴珠圓春暖浮瓊液陽和湧醴泉齊班同祝聖輯瑞共稱仙彩煥虹流渚祥凝電繞川繼離時出震體㢲以行權智勇天將縱聰明性所全心源符太極學海揭真詮道㟁誕登矣斯文兹在焉宸衷猶亹亹聖學益拳拳遊目親圖史垂髫設豆籩羮牆通寤寐孔孟劇周旋無逸籌經畧乗閒御講筵芻蕘常下問鞀鐸自髙懸大度涵江海虛懐納滴㳙仁心基宥宻義問播中邊陟降誠相接凝承志克䖍敬天供秬鬯奉祖潔牲牷一念通三極羣靈妥八埏光舒四表日愠解五琴絃今古洵無匹唐虞或比肩時雍徵雨燠鈞轉握璣璿世盡登仁壽民皆侶偓佺烹葵還剝棗酌斚更輸豜鼓腹嬉閭里行歌樂市廛春耕占布穀秋穫聽鳴蟬墉櫛家家比倉箱處處連芳郊童竹馬綵架女鞦韆貫索星芒斂圜扉草色嫣漢章疎五百唐宥越三千共喜薰風被寧憂化雨偏臨軒明黜陟操鑑别愚賢課績嚴三載官才慎四詮誰非經冶鑄人盡荷陶甄丞弼官無曠髙深助莫前從容調鼎鼐安稳守蹄筌直仰乾坤泰無虞旱澇愆絲綸頻歲下租賦不時蠲偶爾聞災眚多方示恤憐截漕敷井養發粟濟民瘨化被春回谷仁覃澤潤淵窮黎咸食徳耆叟悉衣綿恩錫天厨宴榮分内府錢嘉肴麟脯擘法酒鵡盃湔多士叨汪濊羣儒釋毳氊千章儲棟柱一擊備鷹鸇細結珊瑚網相看鸞鳯騫特科開曠典隔歲再臚傳林宻施罝兎花明耀錦韉張羅真罔漏入彀豈無緣璞玉齊來楚驊騮竝赴燕廵方喬嶽徧時邁翕河沿九曲環襟帶千渠潤陌阡翠華臨瓠子蒼玉鎮淮田耎白粲漕長運黃流道不遷獼猴已見鎖畫鷁可徐牽至治名何有武功猶赫然方區争負版小醜絶投鞭蠢動同温蠖幺麽似井蜎曾何風鶴警祗作釡魚煎廟算無遺策師貞遂搗堅犂庭訖沙漠掃穴靖黔滇奏績非司馬行軍豈站鳶鐃歌敲鐙入石碣負雲鐫多藝神難測餘閒習必專有書皆討論無物不精研玉律窺霄漢銅儀測度躔九章窮肯綮三角悉句弦六合叶周算五音諧大卷毫端鳯翮舞羽末蝨心穿詠矢卷阿際聲髙太嶽巔風飄律呂和響振濩韶宣久道成神化鴻基擴幅隕賔來無畛域貢逺自羗零王㑹圖難繪方輿記屢編上林叢棫樸薄海獻珠蠙靈産瑶堦筴祥生陸地蓮歡呼山響應波静水清漣日月開雙闕衣冠拜䆳綖和風披紫禁旭日麗花甎碧見爐煙裊紅知寶炬燃瑞浮雲靉靆聲徹珮褊褼幸值飛龍㑹欣同舞獸躚質慙千里駿賞遇九方歅粉署金章貴綸音翰墨鮮撫躬思蹇蹇抱器愧戔戔介夀平為格迎禧徳秉乾湛恩歌既醉嘉祉慶來駢至徳瞻喬嶽遐齡驗福田百生逄舜日願效祝堯篇萬壽詩五言排律十四韻候補主事臣羅復晋錦繡滿前川春風百卉妍宮桃酣旭日官柳裊晴煙帝澤深如海民心戴若天初周花甲歲久歴太平年宇擴超前代功髙振古先㑹歸誠有象聲教訖無邊鶴髪稱觴至鳬趨獻夀前香花千户合斿綵萬家連藹藹天顔喜琅琅玉語宣勞來申孝悌酺宴錫金錢惠及扶藜老恩霑搢笏賢賡颺均亮采雅奏叶宫懸曲譜康衢句詞陳天保篇含毫莫能罄慙愧筆如椽萬夀詩五言律八首行取候補主事臣章焞聖徳莫能名當陽久化成恰逢春發育齊慶泰階平霮䨴深仁逺聯翩衆類榮萬方翹首望紫氣滿神京其一中天瞻麗日元㑹協芳辰夀域開羣覩嵩呼頌聖人玉階雲鳥紀黼扆典謨陳萬國梯航集千官舞蹈頻其二帝道周天壤卿雲到處多省方施大澤寰海不揚波青鳥金精萃朱英玉露酡有情皆愛戴隨地是笙歌其三釀淳昭物阜伊始定時豐夀字爐煙裊琪花旭日紅豈惟岐穗滿更見棘圜空敢以颺嘉瑞應知參贊功其四龍御廵行處耆年候輦迎租連三歲免恩播八荒平無逸宵衣惕如傷旰食情陽春欣有脚膏雨沃新耕其五雲漢昭囘久菁莪樂育時殊方覘禮教四海見雍熙玉軸披丹殿琅函進講帷萬年枝上露滴滴紫靈芝其六仙露調金鼎宮花綴紫微上林珠樹曉碧瓦瑞煙圍桃自瀛臺熟盃從閬苑揮酡顔趨拜舞丹陛若庭幃其七大澤開三網榮光起二毛世登仁夀域人樂雨隂膏草木含新意雲泉接近臯歌詩賡萬歲拜手慶臣遭其八萬壽詩七言律二首候補主事臣姚華仙仗千官盡拜揚虹光電彩繞青陽車書禹甸真無外建錫箕疇正未央膺祚乾符徵鼎策來庭重譯奏梯航共欽帝徳同天徳億萬斯年奉聖皇其一文物謳謡滿禁林徵歡綺陌暢宸襟九衢霑醉斟堯酒六宇和風鼓舜琴身向班聯瞻聖切家從奕葉荷恩深欣逢交泰昌隆日天保長賡周雅音其二萬壽詩七言律一首候補主事臣黄振國車書絡繹慶堯年正值春和淡蕩天萬國共瞻雲日表三多争祝聖人前旗開翡翠分鵷鷺地湧樓臺奏管絃雨露徧霑無有極小臣獻壽自綿綿萬壽詩七言律二首通政使司經歴臣朱象鼎齊天壽厯紀初周匝地歡呼慶錫疇造物同遊涵萬象生民獨盛邁千秋平飛雲盖龍蛇動細轉風烏沆瀣浮竊幸小臣陪式道甘分玉箸拜珍羞其一元首康哉世太平巍巍金闕耀長庚親藩執爵承恩詔父老擕笻被寵榮樂奏九成和中節禮隆三讓序分行引年盛典真希覯史冊揚光垂令名其二萬壽盛典初集卷一百三
