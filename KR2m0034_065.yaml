body:
  text: 欽定四庫全書萬壽盛典初集卷六十七歌頌七大臣六恭賀萬壽大慶詩五言排律五十韻有序原任內閣學士兼禮部侍郎臣楊瑄蓋聞道侔易簡常操化育之權德備生成永作清寧之宰遡天人之交合屢著嘉祥推理數之相因疊彰誠感瑶圖綿逺實由昭受之功鼎祚宏長咸出自然之應廣稽聖牒歷志禎符若夫法乾元之行健至誠所以無疆秉上帝之好生仁者於焉必夀斯又軼炎超昊包頊駕軒膺景命之維新中外同深愛戴荷天庥之洊至臣民共慶升平者也欽惟我皇上至德體元宏勳開世七政齊而八風叶五行敘而六氣調禮樂文章新亘古未新之制作東西南朔擴從來未擴之輿圖仁恩沛而肆赦蠲租登兆人於袵席愷澤敷而賙飢賜帛躋蔀屋於春臺績奏平成河清海晏化隆參贊物阜民安博觀黎庶之情無求不給遐考簡編所載有美必包兹逢五十二年恭遇六旬萬夀當百物彚昌之候正三陽開泰之時先因八表之歡心肇舉一時之曠典特增闈試廣羅天下蒸髦大闢賢關永著千秋令甲時則四方來賀萬福攸同黃道呈祥嵩嶽效三呼之祝紫微凝極箕疇錫五福之徴岐麥嘉禾坤瑞並陳於王會龎睂秀髮耆英畢集於大廷慶滿寰中聲洋海外復申巽命益示謙沖念撫世以諴民必圖實政欲祈天而永命無事繁詞惟萬姓之恬熙即一人之福履五風十雨乃是休徵老安少懷斯稱上治羣服皇言之大彌欽帝德之深同日月之升恆光如初旦並乾坤之幬載功不能名溯鳯紀而莫京洵龍編所未有臣瑄向叨侍從尤沐光華久霑高厚之洪慈未展涓埃之微悃仰瞻黼座頌寶算之日新肅拜彤墀覩聖顔之有喜祚更綿乎周厯願歌天保之九如世適際夫堯年擬效封人之三祝謹拜手稽首而獻詩曰壽厯迎禧日皇躬介祉辰斗樞符電繞華渚協星陳御籙通三極垂衣仰一人書禎呈洛水圖瑞獻河濵經緯兼文武生安擅聖神宫闈崇孝養郊廟肅明禋精一心源密和平政事醇訏謨常秩秩典禮具彬彬府事歌惟敘明良契自真懷柔馨烈茂昭格恪誠伸久道宸猷布同風王路遵萬幾深自敕百職凛維寅治厯璣衡正明時節序均龍章輝琬琰芝翰燦㻞璘東壁開書庫西清集侍臣宣威三蘖靖奮武九邊馴帷幄抒方略封疆拓廣輪導河旋底績問俗展時巡輯瑞延羣牧求寧軫兆民恩覃十五國帑給萬千緡壤賦蠲除數科條肆眚頻流膏隨處渥行慶與年新師濟饒賢俊搜羅及隱淪山林邀賞鑒黌序荷陶甄黎獻咸登進耆英倍撫循遐陬歸有極懿德暢無垠就日烏蠻服趨風象卉悛騰歡傾衆志章教式羣倫丕冒乾坤大宏施雨露勻昌期逢令節曉漏報司晨韶景方三月璿編始六旬列星環拱衛雙闕峙嶙峋嶽逺俱修貢川長並效珍露華金掌淨符色泰階純采覩堯睂近光瞻舜目親殿煙籠綵㲨庭旭耀華紳備見休徴洽重看景命申淵衷彌抑抑天語更諄諄祗願人胥樂惟期俗盡淳泰寧同海宇豐稔遍郊畇厚意涵洪澤殷懷發至仁微臣叨侍從自昔被溫綸玉署依仙籞鑾輿望後塵罷間歸櫟社祝嘏覲楓宸芹獻偕農叟鳧趨綴禁闉山桃紅熳熳苑栁緑蓁蓁巢閣欣瞻鳯遊郊喜見麟衢歌傳擊壤里句叶吹豳應地綿鴻運齊天秉大鈞貞元周復始億載慶長春聖壽同天頌有序原任內閣學士兼禮部侍郎今革職臣宋大業臣聞邃古肇命之主首出庶物傳有天靈治萬八千嵗尚矣書契既作帝王世紀具載炎帝黃帝少昊顓頊帝嚳帝堯殷太戊武丁在位多百年上下歷歷有徵至若帝舜伯禹晚而受禪殷湯始為諸侯周文終為西伯武王末而受命雖皆以聖人登上夀猶未可與正位一統者並較其年嵗嗣是以降非無英君誼辟乘時撫運而享國之數可以追五帝而軼三王者循考史乘寂寥疏濶概未之有見也夫此古帝王久逺盛迹豈惟敦龎之代氣運特殊要以御世立極德茂功隆參天二地用能誕膺福祿配合無疆禎祥之兆集元會之期應理數相符非偶然者蓋閲數千百年而今乃覩大聖人作焉伏惟我國家受天成命太祖太宗創造東土世祖混一區夏治理初定教化方行天乃蘊靈蓄祉篤生我皇帝用廓千百國無外之規模鞏億萬載無窮之基業非徒握圖據鼎近踵漢唐宋元明之賢后已也恭惟我皇帝陛下至神至聖允武允文寬大包乎覆載明聰耀乎日月仁慈沛乎雨露威斷肅乎雪霜自古帝王贊稱所及咸備於一人之身是以昭德建功無善不臻無美不暢謹為細繹敢序宏模皇帝沖齡踐祚仰思皇考付託重器朝夕祗畏若涉淵冰入朝太皇太后皇太后兩宫問寢視膳動遵慈訓罔敢或違太皇太后問所欲為有願天下無事人民安樂共享太平之對春秋有事太廟祼鬯執爵慤致孝享外而圜丘卜郊農祥祈榖肅將壇壝嶽瀆神祗古先聖賢類遣重使祭告尤念勝國陵寢命官祠守戒戕松柏此古帝王率祖奉親懷神繼代之鴻圖也始總萬幾太阿在手姦宄立除於時滇蜀未附折衝萬里以次削平其後逆藩拒命煽動三方坐運籌略遂定六詔收百粵拔七閩獻俘檻囚駢磔於市逋寇阻島乘間搪突乃鼓巨艦凌洪濤遂搗其窟穴鯨鯢悉靖已而朔漠遊魂跳梁邊境乃秉旄仗鉞統師親征不崇朝而追奔獲醜妖氛蕩滅龍沙狼望之野牧馬無聲其餘塞下屬國稽顙朝會天下幅員之廣山盡西北海盡東南跨越乎歷代此古帝王誅黎放兜敘戎貢旅之偉烈也子惠下民痌瘝在體薄稅斂均徭役勸農桑繪耕織之圖以時省覽四方官吏入覲輒問天行雨㿩土物豐歉賜天下民租或全或半前後無虛嵗近復恩綸疉沛三年之內通免天下地丁銀兩三千二百六萬有竒凡司寇讞囚屢停秋決或豫肆赦嘗謂守令親民官每謁選出必引見甄别其賢否陛見督撫監司諄諄訓誥惟以察吏安民為務此古帝王重農散財泣罪愼罰之篤意也內外文武任用必得其人其廉吏正士雖負瑕被譴每加拂拭或擢不次之位封疆守臣時遣家人奏對輒下問起居兼有賜物尤親重老成謂奉事日久龎睂華髮有故舊之感又念諸先大臣恩禮殊異且澤及其子孫此古帝王知人任賢崇耉求舊之休風也作人造士以興文教鎖闈兩榜黌舍諸生嵗漸增額海內弦誦之聲遍於閭巷間徵博學宏詞以補中祕又録工詩善書者供奉殿廷操觚提槧之士稍名一藝皆爭自鼓舞願進獻於鴻都石渠之間此古帝王旁求翕受思皇譽髦之巨典也崇尚經術表章聖道嘗幸闕里謁孔子修北面之禮愼選詞臣以備日講輒親為反覆指示開導經筵大典舉行無少間數十年如一日每讀儒先性理深契濂洛之旨尤推崇朱子傳注有功世教躋從祀於十哲之次博求天下遺書充牣館閣命各校讐雕鐫頒示來者廣廈細旃乙夜討論弗輟御選歷代古文以資淵鑑翻閲通鑑綱目凡有關世道者必有闡發評論以昭垂萬世於是海外琉球諸國聞風向化遣子入朝執經太學三年肄習更考鍾律稽算數伶倫所不能審隸首所不能計一一研摩務窮其蘊宫庭晏間娛情翰墨揮灑入神詩邁唐音書超晉法多寵賜臣僚家藏珍寶奉為赤刀宏璧此古帝王尊師問道敷文典學之丕光也止戈釁甲不忘武備羽林禁軍常以搜苗講武於郊甸其外貔虎之雄師干城之徑卒碁布星羅分守要害之地提鎮將領受任臨遣必試之騎射罷其疲弱簡其鋒鋭或賜膳羞衣裘以彰賞勞兜鍪靺鞈之徒因日勤訓練士飽馬騰又設武科與文科並行且令行伍通文墨者亦與其試以盡收天下之材力此古帝王治兵振旅論將詰戎之逺圖也端拱無為間出省方觀民巡行天下嘗東至於魯西至於泰北至於代其南以臨視河工五至於淮遂至於吳越河決有年既賴聖謨指授克底厥成塞瓠子之口築宣房之宫其他鑾輿所過詢疾苦咨風俗斥浮華崇節儉履阡陌屬者老布慶施惠膏澤四周臣民瞻仰翠華多得望雲就日以為幸此古帝王輯瑞執玉封嶽觀河之勝軌也統而言之自皇帝在宥庶績咸熙萬邦時乂天下含生之屬翾飛蠕動如躋柏皇如登栗陸淳和景鑠醲郁彪炳固未易以簡牘臚陳者也德極茂矣功極隆矣於是天保定爾錫以遐福今康熙五十二年聖夀始臻六十保躬嚴愼精神彌固於岡陵勤政清明綱紀益張於寰宇從此歷年永命萬夀無疆又豈僅上追五帝下軼三王云爾哉恭惟上夀之日九州六合之人為臣為庶內自華夏外訖邊徼莫不梯航麋至朝賀於闕廷之下車馬冠裳之會琛賮玉帛之陳鐘鼓管絃之奏歌謡賦頌之作環繞輻輳齊拱皇極猗歟天地亘古昌期之盛也臣大業竊念先臣德宜位升端右臣兄弟俱備官內外世荷國恩而臣大業更向直禁近久侍講幄效力邊陲繼參綸閣寵遇深厚靡有倫匹今雖放歸田里犬馬戀主之私未嘗刻忘兹者欣逢大慶不敢自外於鳳儀麟遊之列謹從邑父老後拜手稽首而為頌曰粵稽往初大聖上夀由帝迄王五三希有維天生人作之元后眷德鑒功降福斯厚於赫皇清奉天立極崛起東邦奄宅中域皇祖皇考景命始集如堂其奐如葘其殖維我皇帝穹蒼篤生龍章鳳質生有神靈克仁克孝克寬克明崇基洪緒是繼是承踐阼以來天人叶贊政舉風行教施俗變以武之揚為霆為電以文之敷為星為漢普天以土率土以臣金甌奠定玉燭調均阜我品物育我蒸民沐膏濡潤振秀含醇濟濟在朝熙熙在野握其權衡運以陶冶帝驟王馳無躡迹者宜升云亭宜播韶夏改元至今多歷有年聖夀開六聿無疆焉太和宇宙人生其間但祈永命悠久配天四海八方百僚萬姓芳月良辰欣逢大慶並會闕廷持觴祝聖樂響騰歡禮容展敬帝曰勤哉爾官爾牧暨爾有衆遐邇匍匐豫豈自恃保天福祿尚其日愼式副爾祝羣下蹈舞嵩呼迭遞奏賦獻詩義髙辭麗臣辱舊史序以頌繫恭祝延綿歷萬萬嵗萬夀盛典初集卷六十七
