body:
  text: 欽定四庫全書萬夀盛典初集卷三十八恩賚七賞兵三鎮守山西太原等處地方副將管總兵官事臣馬見伯謹題為籲懇代題叩謝天恩事據蒲州營目兵李在榮等呈稱欽惟我皇上至仁如天大德如地疉沛恩賞薄海咸沐生成之化屢蠲租賦率土俱霑雨露之施真一世莫比而獨隆於千古者也榮等身充伍卒之中生逢聖人之世厯年以來仰賴皇上洪庥時和年豐常享清平之福坐食糧餉復叨科第之榮今嵗聖主六旬大慶榮等心切赴京叩祝緣身在伍卒不敢遠離祗於平陽府萬夀宫庭誦經叩祝以伸蟻悃茲蒙聖恩欽差大人親詣各營逐名賞給銀兩榮等雖日勤操防不足以仰報髙厚於萬一惟有日夜焚香頂祝我皇上夀與天齊俾海內士卒常沐恩施於億萬斯年耳獨是微賤下情不能上逹懇乞俯準代題等情到臣據此伏惟今嵗恭逢皇上六旬聖誕普天同慶率土嵩呼今蒙皇恩大沛特命欽差會同頒賞微臣目覩各營兵丁踴躍歡欣嵩呼雷動羣聚當場望闕遙叩皇恩外復具呈籲懇代題叩謝臣見各營兵丁感激情殷不敢壅於上聞謹恭疏代為題謝伏乞皇上睿鑒施行巡撫山西太原等處地方提督鴈門等關軍務兼理雲鎮都察院右副都御史臣蘇克濟謹題為皇恩浩蕩感荷非常懇請代題恭謝天恩事康熙五十二年七月初五日據山西撫標左右營百隊兵丁李伏豹等呈稱竊照豹等身充伍卒之中生逢聖人之世坐食糧餉寸長莫效前蒙俞旨俾入科第隆恩曠典千古未有今嵗恭遇聖主六旬大慶豹等心切叩祝未敢遠離祗於省會萬夀宫庭諷經叩祝少伸蟻誠茲蒙皇恩特典欽差大人賞賚豹等受此格外洪恩無以報答髙厚於萬一惟有朝暮焚香祈願我皇上夀與天齊福同嶽永綿厯數於億萬斯年耳但微賤下情豈能上逹懇乞俯準代題等情到臣據此欽惟我皇上仁同天地德並唐虞化洽雍熙中外樂升平之福治登康阜軍民歌覆載之恩亦既無一夫不得其所無一物不遂其生矣今年三月十八日恭逢皇上六旬大慶恩詔普頒凡在臣民盡霑雨露乃復軫念行伍賞賚有加特命廷臣親歷各營逐名散給務使均霑實惠給賞之日兵丁莫不感戴皇恩歡聲雷動共祝聖夀無疆兹據臣標左右兩營百隊兵丁李伏豹等呈請代題恭謝天恩等情前來臣不敢壅於上聞相應具題巡撫江西等處地方兼理軍務都察院右副都御史臣佟國勷謹題為皇仁浩蕩如天營卒歡呼動地懇請題謝以伸輿情事據標下左右二營袁州九江兩協各營兵丁王福等具呈詞稱竊惟福等叨入營伍欣逢盛世薄海內外同奉一統車書率土軍民渥承九霄雨露愷惠遍沛於閭閻膏澤尤霑於師旅蒙恩豢養糧餉足給士馬飽騰恭逢皇上萬夀昌期中外共慶大沛綸音加恩營伍特命欽差按名給賞務使均霑實惠似此格外殊恩真亘古罕見從此有生之嵗月永祝無疆之遐齡福等下情不能上逹聫名冒懇題謝等情又準南昌鎮總兵髙文熠咨據南瑞撫建廣饒各營兵丁徐應節等呈稱竊應節等荷沐皇恩月給糧餉事育得以有資涓埃深愧莫補欣逢皇上萬夀正誕特沛綸音欽差蒞營每兵賞銀一兩誠為千古之曠典萬世之竒逢俯思報效無由惟有望闕焚香頂祝萬夀無疆呈請轉咨代題恭謝等因又準南贑鎮總兵韓祖蘄咨據南贑吉各營兵丁劉德瑞等呈稱竊惟瑞等身𨽻戎行遭逢盛世深沐聖恩豢養常欣海晏河清共樂堯天舜日恭遇皇上六旬萬夀大慶特沛覃恩殊施格外每兵各賞銀一兩欽差親行監看散給瑞等膺此異數跪領之下銜感無地惟挈合室老幼焚香頂祝聖主福如川至夀與天齊瑞等願長作太平犬馬但遙望君門無由上逹為此呈懇轉請題謝等因到臣據此欽惟我皇上德邁唐虞功髙湯武際此車書一統萬國來王之日恭遇萬夀昌期特霈九天異數停徴蠲賦比户霑雨露之恩頒賞錫類營伍沐優渥之德此誠千載曠典亘古殊恩宜乎三軍嵩呼遍地頌皇仁之浩蕩允矣萬竈歡聲若雷祝聖夀於無疆凡屬臣工莫不歡忭稱慶臣準部咨欽奉恩詔內開一各直省緑旗兵丁俱應加賞賚部議派內大臣每省各遣一員動支布政司存庫銀兩照廣東緑旗兵丁各賞銀一兩等因隨即移行各鎮協營欽遵去後今江西通省緑旗兵丁蒙欽差親臨按營賞賚訖所有賞過各營兵丁姓名銀兩數目另疏具册題報外茲據臣標袁州九江兩協各營兵丁環呼跪籲并準南昌南贑二鎮咨據所轄各營兵丁懇請題謝前來理合據情彚疏代題恭謝天恩臣謹會同江南江西督臣赫夀合詞具疏伏乞皇上睿鑒施行總督福建浙江等處地方軍務兼理糧餉兵部右侍郎兼都察院右副都御史臣范時崇謹題為籲懇代題叩謝皇恩以逹下卒感激深情事準福建巡撫臣覺羅滿保水師提督臣施世驃陸路提督臣楊琳又據臣標中軍副將羅光乾等各據所轄副參遊守呈據闔營百隊馬步戰守兵丁咸沐賞賚殊恩具呈僉叩代題呈稱竊惟推心愛士乃盛朝下逮之深仁破格優兵尤聖主特行之曠典膏澤遙頒九域恩波遍及三軍茲者欣逢皇上六旬萬夀宸衷眷念各省緑旗兵丁欽命大人特發帑金按名給賞誠亘古未有之殊恩千載竒逢之異數歡騰海嶠慶溢邊陲隨望闕叩頭謝恩祗受但頌禱維殷無計籲九重而羅拜瞻依是切庶幾藉一紙以陳情伏願帝德日隆偕堯天而並麗皇圖嵗永同禹甸以常新僉懇俯鑒下卒微誠轉求代題叩謝等情到臣該臣看得閩省水陸緑旗兵丁恭遇皇上六旬萬夀大沛恩膏欽差副都統臣穆賽到閩親臨各標鎮協營按名給賞各兵承領歡呼雷動感激皇恩情詞懇切臣謹會同福建巡撫臣覺羅滿保水師提督臣施世驃陸路提督臣楊琳合詞恭疏代題叩謝伏乞皇上睿鑒敕部查照施行總督廣東廣西等處地方軍務兼理糧餉兵部右侍郎兼都察院右副都御史帶軍功五次加一級降三級戴罪圖功臣趙𢎞燦謹題為聖主賞賚普頒官兵感激彌切謹據情代題恭謝天恩事據臣標下中左右前後水師戎旗七營目兵張士輝等呈為聖主仁夀齊天官兵感激無地伏請代題恭謝皇賞事欽惟我皇上至德同天深恩似海普天之下無一夫不獲安全率土之濵無一物不使得所幅員廣大宇宙升平官兵黎庶自聖主御極以至億萬萬年享太平之福者皆沐我聖天子宵旰精勤治化翔洽所致家傳户頌焚頂難名今嵗恭逢皇上六旬正誕甲子初周喜慶非常歡聲振地祗有望闕叩頭共效華封之祝乃蒙浩蕩天恩欽差大人臨粵按名頒賞衆兵均霑實惠九叩謝恩輝等荷戈小卒何能仰報惟日夕泥首朝天焚香共祝聖主萬夀無疆但感激下情無由上逹伏懇代題施行等情又據撫標提標并各鎮協營寨目兵具呈到臣欽惟我皇上治超今古德合乾坤沛惠澤於九州巍巍莫並播仁風於八表蕩蕩難名厯五十二載宵旰之勤初屆大年周甲開億千萬世太平之業共知景命方申兹因聖誕之昌期爰頒肆赦之大典合寰區之臣庶無不加恩凡內外之甲兵盡蒙優賞而粵東特命重臣令其按名親給務使實惠均霑宸衷之軫恤甚殷士卒之感鏤彌切是處歡聲動地愈奮捐糜圖報之心咸稱帝德如天共祝萬夀無疆之慶此誠亘古未有之恩施洵為史册罕聞之盛事臣等躬逢聖世謬任封疆目擊輿情曷勝抃舞現據臣等標營目兵及各鎮協營寨兵丁紛紛呈懇代題恭謝天恩臣不敢壅於上聞謹會同廣東撫臣滿丕提臣王文雄合詞具題伏乞皇上睿鑒施行巡撫廣西等處地方提督軍務兵部左侍郎兼都察院右副都御史加三級臣陳元龍謹題為聖夀洪恩普被遐方兵卒均霑環籲代題恭謝天恩事欽惟我皇上文德武功深仁厚澤度越千古本年三月十八日恭遇萬夀六旬正誕大沛殊恩中外臣民罔不霑被復垂念直省緑旗官兵盡加賞賚特遣官􅊩止會同頒給務使無一兵一卒不受實惠紫詔一宣遐方軍士歡聲動地兹閏五月二十六日欽差副都統許廷臣至桂林省城臣率闔城文武大小各官出郊迎接跪請聖安副都統許廷臣隨入城駐劄公館即於閏五月二十八九兩日傳集臣標左右兩營兵丁細查年貌詳加核實每兵一名面給欽賞銀一兩衆兵歡呼感激齊稱萬嵗臣即率同遊擊臣張溥等及兩營兵丁望闕叩首謝恩訖茲據兵丁吳得珍等具呈稱珍等荷戈賤卒幸際太平盛世久沐豢養隆恩徒糜糧餉無可報效今逢聖主六旬大慶特沛恩綸頒賜皇賞珍等跪領舉家霑受雖竭犬馬之力不足仰報萬一惟有朝夕焚香上祝聖夀天齊但下情無由上逹懇乞代題等情前來除提臣鎮臣統轄各營兵丁俟陸續給賞事竣聽提臣鎮臣另行具題外所有臣標兩營兵丁籲請恭謝天恩理合先行代題伏乞皇上睿鑒施行提督廣西總兵官左都督臣張朝午謹題為恭報微臣遵旨頒賞事竣叩謝天恩跪請聖安事康熙五十二年六月初一日接兵部劄付奉旨賞給直𨽻各省緑旗兵丁著令督撫每營到去恐致有誤地方事務督撫停其前往會同各該提鎮等閲看賞給著速行文直𨽻各省欽此臣業將遵旨會散緣由及起程日期題報在案臣於六月十一日自桂林由水路往平樂富賀梧州鬱林潯州而至南寧由南寧而至上思新太龍憑馗纛各營復回南寧由陸路至思恩泗城鎮安上林安隆及三里營而抵臣駐劄之柳州府再由慶遠河池至永寧仍從桂林於九月初六日抵全州凡屬右江諸營臣會同欽差臣許廷臣給賞凡屬左江諸營則兼同左江鎮臣趙廷棟給賞沿途挨營次第給散臣所到處皆仰體我皇上加意營伍愛恤士卒深恩推廣宣布不獨營兵身受恩賜者感激殊常即各府州縣漢土百姓士女道旁觀者亦無不嘖嘖稱為盛典今臣頒賞事竣查廣西一省臣屬各標協營共計馬步戰守兵丁一萬七千九百零九名內各官隨丁字識不應領賞者一千二百一十三名實領賞兵丁一萬六千六百九十六名給發過皇賞銀一萬六千六百九十六兩除令各標協營造册到日另行呈送兵部查核外竊思臣樗櫟庸材荷蒙皇恩不次超拔畀以封疆重寄今復蒙恩特遣大臣親臨給賞俾臣屬兵丁得霑君澤臣實同身受惟是遠處邊末天顔萬里不獲躬親叩謝謹於欽差臣許廷臣出境之日恭疏叩謝天恩跪請聖安并將頒賞事竣日期及給賞過兵丁銀兩數目理合一并題報伏乞皇上睿鑒施行總督雲南貴州等處地方軍務兼理糧餉兵部右侍郎兼都察院右副都御史臣郭瑮謹題為衆兵感蒙皇賞恭謝天恩事康熙五十二年十月十二日據臣標中軍副將胡駿等呈詳又於康熙五十二年十月十三十四等日據雲南永順鎮總兵官段騰龍等各詳稱據馬步兵丁魏大勝等呈稱竊勝等滇末戎行荷戈小卒久蒙聖恩豢養圖報無期坐享升平之樂虛糜糧餉寢食難安今恭逢皇上六旬大慶復荷殊恩欽差部臣來滇逐名賞賚領受銀兩人人感戴户户歡欣父母妻子莫不額手焚香朝天叩祝皇上萬夀無疆則邊徼之兵得永霑覆載之恩所有下情伏乞轉逹代題恭謝天恩等因到臣欽惟我皇上恩同天地德邁古今恭逢萬夀之昌期特沛亘古未有之大典遠頒恩詔喜溢臣民又欽差部臣來滇親到各營賞賜兵丁逐名實受皇恩衆兵舉家老幼歡聲動地莫不焚香望闕叩首恭祝皇上聖夀與日月俱長四海戴照臨之德國祚同乾坤並久萬年蒙覆載之恩兹據各標鎮協營總兵副將參將遊擊守備等據衆兵籲請代題恭謝天恩等因前來臣謹會同雲南巡撫臣吳存禮提督臣張谷貞合疏具題伏乞皇上睿鑒施行巡撫貴州兼理湖北川東等處地方提督軍務都察院右副都御史加三級降四級留任臣劉蔭樞謹題為恭謝天恩事欽惟我皇上六十大慶聖夀天齊率土同忭念緑旗官兵勤勞欽差副都統臣朱廷柱來黔遍加賞賚臣飭令布政司取在庫銀兩如數封足委員賫解同欽差臣朱廷柱提臣張文煥遍厯各鎮協營按名賞給深山窮谷盡霑化雨黃童白叟無不歡呼據各鎮協營兵丁具詞到臣求為代題恭謝天恩除提臣於本年九月二十二日自黎平事竣就近題謝外所有各鎮協營兵丁感激忱悃臣不敢壅於上聞謹會同雲貴總督臣郭瑮合詞代題恭謝天恩伏乞睿鑒施行萬夀盛典初集卷三十八
