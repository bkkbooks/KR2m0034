body:
  text: 欽定四庫全書萬壽盛典初集卷四聖德二謙德一康熙五十一年十一月十八日和碩顯親王衍潢等以五十二年三月十八日恭遇皇上六旬萬壽普天同慶請上尊號以愜輿情以光大典詔弗許十一月十八日和碩顯親王臣衍潢等謹奏為聖德崇隆已極臣民感戴無已恭逢六旬大慶普天同歡請上尊號以愜輿情以光大典事欽惟我皇上至聖至神允文允武道貫三極勳配兩儀御極以來敬天法祖勵政勤民聖德日躋乾行無息親祀郊廟殫竭精誠承歡慈闈備隆尊養篤念本支則廣推親愛加厚宗室則大沛恩榮宵衣旰食日親覽夫萬幾勸織省耕時殷懷於兆姓水旱災傷天行偶沴蠲除賑糶惠澤頻頒歷年蠲免之數已逾萬萬而三歲一周之令復渙德音盛京朝鮮年穀不登特遣官員航海運賑以水利河道所關甚要躬臨相度指示修防南北各河皆得奠定民生漕運永獲安瀾尤重祥刑以全民命爰書必慎決獄惟寬屢頒肆赦之文特下矜全之令且優恤禁旅之勞時沛非常之澤設官庫以濟緩急賚帑金以清宿逋一應逺近差役給與駝馬行糧至於用人時命保舉以簡才能務親引見以試賢否整嚴兵備則內外時加乎訓練追眷世勳則奕葉常延夫懋賞朝列舊臣務全終始行間宿將倍錫恩榮察訪髙年時頒優賚功則超越三謨德則包涵二典篤敬純孝厚澤深仁洵千古所未有也至於三孽拒命六師用張奮雷霆而進虎臣殄鯨鯢而為京觀收察哈爾於邊隅輯俄羅斯於荒服東溟逋寇悉就殲除塞北窮畨咸歸版籍惟厄魯特噶爾丹恃其邊逺敢肆陸梁洊噬鄰藩至干天怒當衆議之遲疑賴聖心之獨斷大張天討親整王師六飛踰瀚海之津三駕極狼胥之域跋扈之寇終獲剪除依附之奸咸皆革面呼呼腦兒厄魯特及西域之土白特等遂乃輸誠款服其餘茅龍山寇東齊俞七打箭爐紅苗猺人黎人等𠞰撫兼行恩威竝用武功既震於邊陲文教聿光乎時夏崇儒重道親詣闕里千官陪祀九拜致䖍而御藻宸章光昭雲漢𢎞闡經學之精微褒録諸賢之後裔特命表揚朱子祀大成殿列十哲之班又復優禮前王倍崇儀典駕幸浙省則拜祀禹陵幸秦中則命書御名致祭周文武陵寢幸江寧則於明洪武陵屢經拜禮且聖心遜敏經史融貫文藝書射超類絶羣象數厯律探賾入奧帝王之聖哲誠數千年來未有如我皇上者也今綜考輿圖東至朝鮮琉球暹羅南至交趾西至呼呼腦兒土白特諸域北至喀爾喀厄魯特俄羅斯諸部以及哈密畨彞之族逐鹿使犬之區皆嵗時朝貢輸誠恐後幅員之遼濶誠數千年來未有如我朝者也遡自皇上蒞政以來五十餘年大小幾務咸仰睿裁施行征勦叛逆悉賴宸謨指授且皇上親擐甲胄跋履山川寒不加裘饑不再膳與士卒同甘苦削平寇盜誅戮止屬元憝脅從盡皆寬宥即噶爾丹之子宜䝉顯戮尚荷矜全納厄魯特之款服則優給其爵祿准喀爾喀之回籍則咸遂其生成扎薩克屬我內旗分遣教訓而捕其寇賊朝鮮國享貢維殷屢免金幣而厚其來使廣柔逺之恩無分於內外勞一身以綏萬國誠數千年來未有如我皇上者也是以運際昌期一人有慶天錫純嘏萬壽無疆率土咸寧兆民永賴似此福壽之兼隆平成之極至誠數千年以來未有如我皇上者也巍巍聖德蕩蕩神功恭遇五十年之昌運臣等曾率同文武大臣官員軍民人等屢表請上聖神文武大德廣運尊號我皇上秉德謙沖未䝉俯允今欣逢六旬大慶禮部請旨又欽奉天語煌煌聖衷惕惕捧讀慚惶何敢再奏洪維皇上大德如天臣民愛戴無已萬方普慶千載一時因是罔知罪戾再罄葵忱籲懇皇上俯順輿情允上尊號綸音特沛巨典聿昭俟命下之日臣等繕表於來歲元旦皇上升殿歡忭恭進則臣等幸甚臣等拜首稽首無任激切屛營之至謹此具奏伏候敕旨本月二十日奉旨朕臨蒞日久每於讀書鑒古之餘思念君天下之道惟以實心為本以實政為務若誇功德侈祥瑞加上尊號以取虛名無益治道朕所不喜以前諸王大臣等屢有奏請朕手書批示諭以斷不允行之故歷旨甚明這所奏知道了十二月初一日福建巡撫覺羅滿保請於九仙山恭建萬壽碑亭詔弗許十二月初一日巡撫福建等處地方提督軍務都察院右副都御史臣覺羅滿保謹題為聖主萬壽無疆兆姓建亭恭祝籲請詳題以達輿情事據福建布政司署司事鹽運司運使劉涵等呈詳據福州等九府一州鄉紳余正健等貢生監生生員力子僑等耆民王萬齡等呈稱竊惟日月光華率土仰升恆之照星雲景慶敷天瞻瑞應之徵聖壽日躋羣情雷動欽惟我皇上功參化育治協唐虞建五位以當陽山河鞏固乘六龍而御極宇宙諴和藝生盡植夫蕃昌庶類共登於仁壽兹值康熙五十二年恭遇皇上六旬正誕遙瞻北闕之巍峩莫罄封人之祝頌敬從省會恭建碑亭山號九仙蓬島進長生之瑞亭名萬壽乾坤彰悠久之符止同獻曝微忱奚報如天帝德伏懇俯順輿情賜詳題達尊親有地欣忭無涯等情到司又據福州知府姚讓等各詳同前由到司又承准陸路楊提督署水師提督朱總兵照會准漳州鎮總兵官許鳳等各移呈為聖厯無疆軍心忭舞恭同建亭慶祝萬年事據全省水陸各營目兵吳印等呈同前由詳咨到提督照會到司又准駐防福州鑲黃旗協領范時桂等移為恭達下情共祝萬壽事據四旗小撥什庫甲兵管士貴等呈同前由移司又准福州將軍標副將朱杰等詳為恭逢萬壽共效嵩呼敬達下忱同伸慶祝事據各營目兵高億等呈同前由移司又據本司經歷郎文炯呈蒙鹽院牌為聖壽同天萬民戴德事據通省商竈林長亨等呈同前由牌行經歷具呈到司又准督理海關稅務吳爾泰移為聖德廣被萬方建亭恭祝聖壽事據各省商人謝國珍等呈同前情備移到司據此該署布政使劉涵等恭照河嶽呈祥天子懋萬年之統鳳麟協瑞聖人昭泰運之徵華祝方長繁禧彌集欽惟皇上參天兩地咸五登三作君作師靡有一夫之不獲允文允武式看萬國之咸寧惟大德之諸福畢臻斯盛世之昌期益永恭逢康熙五十二年三月十八日為我皇上六旬聖誕乾坤溢慶億兆騰歡獻曝心殷常切瞻依於北闕呼嵩念切冀深拜舞於南山䖍建碑亭用抒誠敬九仙山迥長生紀寶籙之篇萬壽亭高峻德仰崇臺之表從此龍光日覲咸依有道綿長鳳厯逾新共祝無疆悠久既據通省紳士耆民僉呈又據福州等九府一州懇切具詳復准水陸二提督照會各旗營移會據經歷呈䝉鹽院牌行並准海關備移前來相應詳請代題以達輿情據此先據通省紳士耆民商賈旗營兵丁等各具詞到臣欽惟我皇上聰明睿知文武聖神行健法天聲教光昭於四表安貞應地德威宣布於八紘大一統之車書玉帛共球萬國梯山航海髙百王之制作典謨訓誥千秋仰日瞻雲時邁省方先閭閻而憂樂蠲租賜復登億兆於豐寧仰睿慮之周詳河渠底定本聖心為矩矱理學昌明欽恤期於無刑豫大徵乎有象巍巍帝德咏歌莫罄其揄揚蕩蕩皇功史冊難名其美盛惟此太和之翔洽聿宜景福之懋膺今康熙五十二年三月十八日恭遇六旬正誕萬壽昌期率土同歡普天胥慶顧閩疆之黎庶雖遠京畿而聖主之生成無殊衽席頻蠲正賦恩流紫野青郊特發天儲喜溢茅檐蔀屋五十餘年之深仁厚澤無遠弗周億千萬姓之巷舞衢歌有懷莫報兹據通省紳襟士庶旗營兵丁翹首陳情環庭布悃敬擇九仙勝地爰興萬壽碑亭臣等慰諭頻加衆志歡欣倍切僉謂望雲霄而華祝無非獻曝微忱瞻山嶽以嵩呼實出抒葵至願地不愛寶落其實而取其材農有餘閒鳩乃工而庀乃事已見美輪美奐昭盛事於萬年式同靈沼靈臺告成功於不日臣等生逢泰運位竊崇階共覩黎元頌聖之誠益勵臣子報君之志惟願皇圗鞏固寶厯綿長日之升月之恆祿位名壽羣歸大德聖人天所覆地所載南北東西共祝太平天子緣係通省紳士兵民在於九仙山鼎建萬壽碑亭恭祝聖壽事宜臣不敢壅於上聞臣謹會題伏乞皇上睿鑒施行康熙五十二年二月初三日奉旨凡碑亭不必建造已有諭旨甚明滿保於九仙山建造碑亭不合著飭行該部知道十二月十九日鎮海將軍馬三奇以五十二年三月十八日恭遇皇上六旬萬壽請上尊號詔弗許十二月十九日鎮海將軍世襲一等侯又一拖沙剌哈畨加六級臣馬三奇謹奏為聖主功德應地配天率土臣民瞻雲望日恭請加上尊號以昭盛典以慰輿情事竊惟聖神文武之號肇自虞書祿位名壽之稱傳於尼父蓋有其實自必得其名而感之深所以望之切未有豐功偉烈集三王五帝之大成振古超今享一統萬年之景福如聖主今日者也欽惟我皇上盡善盡美作君作師御禹甸於八齡德本神授頌堯年之六秩福與天齊上侍聖母之起居必敬必誠而允稱大孝逺紹皇初之治統惟精惟一而直接真傳振武功則閩粵風清滇黔月朗皆出九重之勝算敷文德則澎臺設郡沙漠稱臣獨開千古之鴻圖賜復蠲租俾海澨山陬共樂升平之世緩刑宥罪使含生戴髮羣遊熙皥之天旰食宵衣無非治益求治安益求安之德意右文稽古悉皆道之以德齊之以禮之盛心凡此泰運常亨總見乾綱獨攬堯舜禹湯文武未有過焉漢晉唐宋元明孰能及此自應俯順輿情恭請加上尊號乃臣於康熙四十二年合疏上請復於康熙五十年專奏具陳而我皇上聖不自聖所以明旨謙而又謙未允准行難安寤寐兹者來春令序欣逢聖壽昌期八千歲以為春八千歲以為秋初周甲子億萬人之善頌億萬人之善禱不老河山在臣等犬馬報答之私既已共相激切而京口兵民呼籲之衆更見莫不尊親伏祈皇上俯念民心即係天心今禮本於古禮敕儀曹之擬議上尊號之崇髙則聖德神功與日月而竝曜金甌玉燭如松柏之長春矣臣無任踴躍歡忭謹同副都統臣周良相臣劉起芳合詞陳懇伏祈皇上睿鑒敕部議覆施行康熙五十二年正月二十四日奉旨已有旨了該部知道萬壽盛典初集卷四
