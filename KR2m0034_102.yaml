body:
  text: 欽定四庫全書萬夀盛典初集卷一百四歌頌四十四外任諸臣萬夀詩七言律八首并序附詞八闋廣西廵撫兵部左侍郎兼都察院右副都御史臣陳元龍臣聞乾坤健順用貞覆幬於無疆河嶽髙深爰亘古今而獨久惟聖人能參天兩地作配三才斯盛朝之福海夀山逺超百代駕羲軒而軼堯舜治隆則厯數增長光日月而麗星雲道盛則神人胥悅大聖為生民所未有遐齡亦前史所希聞喜效嵩呼歡騰華祝欽惟我皇上照臨如日悠逺同天文武聖神眷命隆於四海淵泉溥博聲名施及兩間五十二年以來莫罄豐功偉烈千八百國之内胥䝉厚澤深仁久於其道而天下化成於萬斯年而四方來賀出日無雷之域皆能效舞蹈於梯航流虹繞電之辰無不致岡陵於頌禱況天南州郡在幅員萬里之中嶺外臣民實宇宙一家之近固宜樂舒長之化日慶福履於光天喜值三春恭逢萬夀紀蓂堦之寳厯甲子初周仰楓陛之昌期春秋方永惟道建中和之極而手操氣數之權所以受天百禄罄無不宜垂拱萬年必得其夀乘乾體艮天子方行春令而受朝就日瞻雲羣下皆近天顔而致賀臣夙叨侍從今任封疆祝釐維有歴年戀闕更無虛日在粤右已兩逢聖誕未能趨黼扆而頌九如與闔省之百職庶司今且就湘山而祝萬嵗自大小之僚吏暨漢土之士民無不誠忭誠懽稽首頓首呼聲動地五嶺皆聞翹首瞻天三江竝集足騐王民熙皥偕遊仁夀之天所祈聖體貞恒永享靈長之祚臣殫抒愚悃撰就律詩八首博採衢謡譜為詞調八章既詠且歌繕册以獻情䖍志切謹當十屋之籌語複辭眞廣被萬年之頌云爾斗樞電繞大虹流聖節長生古莫儔六十肇端環甲子八千分厯紀春秋華封豈但三多祝海甸皆為萬嵗謳炎徼承恩今最久呼嵩聲已逹皇州其一兩儀和樂四方寛聖主乘乾久治安寳祚延長超史冊慶雲綿亘擁朝端長庚太乙三垣拱周甲靈辰萬國歡海内彭籛能上夀年年斟雉到金鑾其二寳厯今逢五十餘盛朝功徳不勝書天垂象緯眞相配史頌勲華總未如千聖集成超帝極百靈羅列拱皇輿太和元氣熏蒸久大地同春化日舒其三蠲租賜復沛温綸浩蕩恩波處處春六合盡為仁夀域萬年總是太平人遐陬樂嵗占豐稔野老齊聲頌聖神蒼昊亦知宣帝力五風十雨四時匀其四聖世菁莪教澤新栽培多士慶逢辰髙明惟久能成物夀考於今更作人四序春秋添俊乂兩途文武入陶鈞十年一舉垂無極萬夀皇科萬代遵其五太和宇宙太平時悠久宸躬集罄宜天厯周環交癸甲海籌重疊轉干支慈宫上夀春俱永皇極稱觴福更綏乾健從來行不息萬年鴻號紀康熙其六聖朝盛徳駕陶唐蓂莢春榮厯數長太極紫垣臨七曜仙人神鼎獻三漿鴻圖鞏處齊天永戩榖多來偕海量復旦光華曕不盡年年夔契費賡颺其七端拱垂裳萬國欽九重閶闔慶雲深梯航共賀長春節舞蹈俱呈捧日心螭陛風和卿士繞龍爐香暖聖人臨㣲臣嶺外瞻天逺願奏嵩呼入舜琴其八附獻詞調八闋浩蕩沛恩波普天同潤嶺表遥霑數州郡四方風動競獻芹私葵悃瞻雲呼萬嵗歡聲震南極騰光西陲效順盡道今皇勝堯舜唐虞之世吾粤平章無分車書今一統長安近右調感皇恩鳯扆當陽蓂堦紀厯殿上仙桃醉春色欣逢萬年天子夀歡呼萬國衣冠集夀無疆夀無量乾坤匹永永幅員為樂國永永太平如磐石永永臣民受恩澤當今聖人天所命自從開闢誰能及邁三皇駕五帝居其極右調千秋嵗康熙御極五十二年春王三月十八萬夀聖人生日干支轉花甲喧皇㑹環帝闕賀六十誕辰時節載陽晴晝永宫花御柳齊發疇昔記時廵駕幸燕齊秦晉暨吳越布得陽和滿地恩膏最遼濶神京逺唯百粤也户户沐恩天末到今日競歡呼皇帝菩薩右調應天長天子正當陽六合呈祥瑞到處熙熙皥皥太和元氣恭逢萬夀永逺昇平世風雨調日月華天地位龍飛九五甲子循環起聖子神孫上夀百官齊侍稱觴舞蹈仰識蒼天意佑吾皇享遐齡億萬嵗右調千年調聖夀齊天看春光每年尤盛三月化日舒長浩蕩太平民物處處嵩呼萬嵗慶繞電流虹嘉節今年是花甲初周比常加倍歡悅輪流嵗租免納又開科曠典杏桂齊發海様恩波沁入士民心骨無限青山緑水滿地是太和團結遐陬外遥仰宸躬一尊無量夀佛右調萬年歡粤西州郡春光徧歡呼萬年天子海宴河清天髙日朗極盛古來無比明良喜起是堯舜當年差相似耳還遜熙朝竝無十日九年水揆文兼重奮武更移風易俗東漸西被商旅塗歌士農輿誦眞是淪肌浹髓神京萬里聽蔀屋茆簷頌揚丹陛夀與天齊自今六十始右調齊天樂天子御極聲名徧蠻貊率土普天久已偕登太平祍席願得每人持一嵗共添助九重鴻厯使年年夀與山髙福如海溢能上律兼下襲從六十至千億似乾健天行話長生總是個至誠無息何必麒麟鳯凰見勝似河圖洛書出自地闢天開未有如今日右調帝臺春上古羲軒中天堯舜後來神禹成湯聖人代起誰能學得今皇配著髙天厚地一般覆載等悠長承平久天顔喜悅聖體安康五十二年之内記鴻功碩徳毫管難詳從今伊始年年端拱垂裳使我子孫黎庶大家接續看禎祥恩深處人人頂祝萬夀無疆右調慶清朝萬夀詩七言律一首候補捐工叅議臣任三益華燈照徹鳯城邊動地歡呼列絳仙海屋晴霞鋪禹甸蓬萊佳氣布堯天東皇日暖春三月南極星明夀萬年幸際昇平多樂事恩波流出總潺湲萬夀詩七言律六首有序原任江南蘇州府知府臣陳鵬年臣聞召奭矢音不忘祝嘏相如報國惟有文章當虹流電繞之期正華祝嵩呼之日長懐蟻悃敢効蟲吟欽惟我皇上乾行不息坤應無疆春秋億萬嵗而花甲甫周宵旰六十年而龍顔愈渥昨者海屋籌添先自運中而得世今者椿齡厯永更從貞下以起元譬若丹霄日麗周天既徧而復起扶桑亦如紫極辰環次舎全臨而再回星紀俾爾熾俾爾昌百福悉從於㡬式莫不興莫不庶九如難罄其形容四方抒來賀之忱萬國同媚兹之戴至若臣者蠕動無知罔識天髙而地厚枿生重肄幸逢春育而陽噓殊恩欲報以無從至徳難名其奚自不揣固陋敬製蕪辭豈曰卿雲作頌用申拜手之思聊願天保陳歌竊附介睂之意云爾斗樞再繞閼逢辰聖主當陽景運新蓂朔纔經二萬葉椿齡未老八千春仰瞻雲日光華盛近接蓬萊道術眞無限鶯花煩㸃綴普天同是奉觴人其一昨年夀域自天開諟譯共球萬國來五色葳蕤闐陸海九衢呼拜響春雷西山瑞靄神山似上苑奇珍閬苑猜此日小臣重得見擬將詞賦問鄒枚其二解澤旁敷似海深萬方同此祝釐心聚觀五老浮河至㪚作三農擊壤吟竝穂嘉禾登繡陌連房芝草擢瑶林禎符協應天人際申錫無疆始自今其三南山稱祝總尋常聖徳如天報未央開闢乾坤同太極主持元㑹邁三皇承平日久人皆夀熙皥風成物共昌不用華胥誇入夢萬年端拱見垂裳其四保泰持盈宵旰并怡顔有道自長生不湏函谷逢闗尹何用崆峒問廣成玉液人間持作酒青雲天上列為城試看紫極中環處獨有長庚亘古明其五九天雨露總無私枯朽重生分外奇弱草仍依三殿樹寸心長捧萬年枝徧教螻螘含元氣得伴鵷鸞振羽儀剰有微軀無處報盆香䖍祝太平時其六萬夀詩五言排律一百韻原任江南常州府知府臣章文鐄聖祚山河鞏鴻禧日月長三才中建極五位正當陽乾徳眞施溥天行本自强謳歌同㝢甸福禄眷穹蒼華渚虹流瑞瑶樞電繞光應期開太皥凝籙誕軒黄智勇超神授經綸運斗綱纉圖輝列祖奠鼎撫羣方悠久龍編逺和恒鳯厯昌六旬周甲子萬夀介春觴式慶逢熙運純綏仰聖皇貞元綿氣化宥宻慎㡬康神契苞符外心周亭育旁郊丘躬祼獻柴望肅蕭薌迓福霑黎赤孚誠若雨𤾉三朝尊寳訓六典播彝章遹駿維增廓丕承祗覲揚彤幃怡色養綵輦恪扶將長信供雕饍慈寧饋玉漿慶霄方靄郁愛日亘煇煌豫順諧親志詒謀發後祥皇庥滋莫紀睿學較難量析理綜千聖垂文綴七襄出言調玉律修徳琢金相道闡羲文奧儒嚴鄒魯坊圖書蒐秘閣典禮振膠庠論史三墳彚陳詩六義張羣言傾液潤百氏掃粃糠夙讚文敷懿還徵武奮剛運籌深翠幄建策固金湯蚤遏滇黔蘖旋除閩粤瘍鳶波寧負險鯨海敢披猖北討俄平羯西征逺服羗雷風馳虎旅冰雪驟龍驤櫜戢函三畧懐柔靖八荒劍聲銷玉壘弓影掛扶桑端拱侔眞宰時廵契昔王省方明黜陟諮野騐凶穰神畧勤疏壅洪波立障狂川平侔禹鑿坎順飭冥匡𤓰蔓流無墊桃花水不颺投芻異瓠子沉璧陋宣房廣堰栽髙柳淤田裕宿粱源澄九曲帶瀾静一葦航動念闗黎獻勞心自廟堂誠求眞若保怙冒總如傷貢篚憐操柚登禾憫插秧十千均罷稅億秭屢蠲糧賑贍開中帑常平設義倉均輸通市貿轉運駕艅艎物阜滋連穂年豐愜滿箱男耕欣比耦女織効携筐解網宏三面寛刑宥一創命官詳聽棘勅吏徧栽棠春藹圜扉草宵停貫索芒雞竿嘗耀日狴犴早融霜雅化薪槱盛昌期莪棫芳名科增甲乙儒彦廣宫牆紫詔新頒殿丹苞逈翽岡桂叢舒暖律杏宴發秋香選俊收瑚璉呈材備杞樟演疇歸正直習禮範康莊巍煥尊無上謙沖凛未遑鴻名辭顯鑠公聽杜愆忘積致禎符萃洪敷郅治彰岡陵彌益算雲日夐垂裳彲虎聨班序䕫龍拱御牀官僚欽濟翼耆艾効匡勷糺縵華暉矞零湑甘露瀼共球豐砮錫琛獻徹琳琅西旅逾葱雪東鯷泛碧滄島寧來卉服苖格拜奇裝異羽供馴雉名駒進驌驦雕盤珍赤豹春酒饌黄羊鎬飲逢嘉樂萊篇嘏夀臧巴童歌雋僰邠叟詠甘凉載徳齊歡忭銜膏更激昻普天瞻象魏率土拜巖廊溫樹連重翠宫花匝萬行嵐光明繡籞泉液汎銀塘碧綴千年實香生九節菖御酺羅鼒鼐廣樂奏笙簧釐祝輿情翕尊年聖澤汪躋陪延耉老宣勸命天潢鮐背分千列厖睂序兩廂海仙輸巨棗河伯獻華魴法醞黄金醴殊珍白玉肪國耆深醉飲野老得欣嘗既飽天厨饌尤霑太府藏朱提溢璆貝錦叚映珩璜大賚敷天浹𢎞仁九野滂寵逾分玉杖光渥賜珠囊睿祉占靡極皇圖卜未央微臣䝉覆載大徳沐汪洋昔綴羣僚末嘗陪列署郎心依雙闕下職忝五湖鄉謭劣叨矜宥卑跧切感惶承恩慚報稱祝聖肅趨蹌蝱蟻膺孳育寰瀛荷夀慶願隨儀舞後稽首頌無疆萬夀詩七言律一首有序原任浙江溫州府同知臣徐益哲臣聞大徳必夀萬年歌有道之祥景福如天四海獻長生之頌黄流注於玉瓚福禄攸宜白環來自瑶池禎符協應欽惟我皇上中和建極功徳兼隆文武聖神邁古今而首出髙明博厚配覆載以無疆申永命於穹蒼重開甲子之厯慶三多於盛世適逢癸巳之年固已喜溢寰區歡騰率土矣臣葵藿為心犬馬同戀深懐日升月恒之祝不盡天長地久之情伏願純禧永享睂夀益綏八千嵗為春秋歴耄期而不倦億萬年奠匕鬯賡保定於靡涯臣無任踴躍歡忭之至春臺喜氣動民情聖夀無疆宇宙清大地風光承道泰中天膏雨對時亨詩書振起千年運禮樂彰為百代程自此霑恩靡有已稱觴嵗嵗樂昇平萬夀詩七言律四首有序福建福州府海防同知臣沈宗敘欽惟我皇上功髙五帝徳邁三王納萬國以咸寧登兆民於仁夀欣逢聖誕率土歡騰微臣宗敘昔充鳯閣清班今厠海疆下吏幸隨貢賦得近闕廷跪瞻華渚飛虹快覩堯天介夀巍巍至徳莫罄贊揚渺𣺌微臣奚容稱頌惟是臣父詹事臣荃仰荷聖慈龍章疊錫臣弟編修臣宗敬更䝉天眷久附鵷行世受殊榮涓埃莫報一門席寵總在天髙地厚之中薄海呼嵩曷勝抃舞謳歌之願敬賦近體四章以誌萬年盛事華渚瑶光照萬方時逢清宴慶無疆普天黎庶歡聲洽大地山河瑞靄彰城闕春風舒錦繡野田膏雨徧農桑小臣此日何多幸拜舞嵩呼逹建章其一九重深處沛恩綸解網蠲租更作人細草新花增景色和風湛露被陽春歡呼巷陌歌還舞瞻仰羲皇夀益仁久道化成眞盛治慶雲爛熳照芳辰其二殿前獻夀禮崇隆鳩杖龎睂謁帝宫葵藿微誠依日月圖疇嘉瑞勝崆峒千官式序趨蹌肅萬國朝宗仰望同天保聲中看舞鳯細聽九奏頌膚功其三聖世欣逢喜氣偏承恩曾傍五雲前螭頭日上瞻堯厯雉尾風來鼓舜絃忝列分符供外吏幸隨貢賦近髙天一門戴履真難報願借南山祝萬年其四萬夀詩五言律二首候選州判臣俞忠謨垂裳乘景運御世惕宸衷日正來靈鳯天髙度玉虹曉煙隄柳翠甘澍露桃紅嵗嵗韶華好民多擊壤風其一玉殿垂旒日黄星出現年甘泉涵聖澤溫室對虞絃綵燕翻珠綴宫花隐瑞煙皇仁原自渥咫尺戴堯天其二萬夀詩七言律一首候選通判臣陳世增和風披拂景暄姸萬彚争舒聖主前宫柳緑飄迎鷺侣林花紅放耀龍㫋綸書特下恩波暖蘂榜新開桃李鮮曠典幸逢堯舜世熙熙化日不知年萬夀詩五言排律八韻原任順天府懐柔縣知縣臣林元桂六合同風日修齡紀大椿祥光呈鳯闕紫氣繞楓宸春酒堯尊獻工歌舜樂陳衣冠忻拜舞筐篚貢奇珍澤沛寰區徧嵩呼率土親彼蒼眷有徳維帝念安民蕩蕩遵王路巍巍仰聖人無疆祝萬夀保佑自天申萬夀詩七言律一首有序新授福建漳州府龍溪縣知縣臣吳元豐欽惟皇帝陛下健體天行徳符坤載仁風普被萬方莫不尊親愷澤覃敷九有咸深愛戴鴻禧丕懋山陬海澨人人祈天子萬年景運聿新白叟黄童念念祝一人有慶兹值陽和令月恭逢聖誕良辰瑞氣靄龍樓初周花甲祥光騰鳯闕永慶天長稷契臯䕫齊列堯階而介夀要荒侯甸均歌舜樂以稱觴海屋籌添億萬禩年豐人夀瑶池桃熟千百國巷舞衢歌率土騰歡普天稱慶微臣豢養日深纎埃未報久沐恩波忝竊八年珥筆新承雨露謬膺百里花封思進九如之章賡颺玉陛願效三多之祝拜舞彤廷敬賦俚詞仰希睿鑒聖人有道正當陽瑞靄祥雲繞建章景福咸歌同嶽峙遐齡共祝與天長千官抃舞金甌鞏萬國歡呼玉厯昌幸沐恩波隨鷺序巍巍帝徳夀無疆萬夀詩七言律一首新授廣東肇慶府廣寧縣知縣臣鄭韻萬年桃實始開花甲子周時夀正加蓬島初生仙李核瑶池剛發大椿芽車書大地朝丹闕日月中天燦錦霞亘古一人惟我后虞廷應不數重華萬夀詩七言律一首新授貴州安順府安南縣知縣臣范聖文嵯峨雙闕瑞煙濃抃舞嵩呼徧宇中玉液光分椿樹緑蟠桃色映御筵紅厯從花甲開洪運健比天行頌法宫此日拜颺歌主徳萬年仁聖幸躬逢萬夀詩七言律一首新授廣東廣州府新寧縣知縣臣鄔維新巍巍至徳邁陶唐運㑹方新寳厯昌四海文明安且治九重仁聖夀而康金樽瓊液長庚酒玉册琅函景福章寸草春暉慙莫報天長地久戴君王萬夀詩七言律一首新授直𨽻順徳府鉅鹿縣知縣臣秦培億萬斯年祉籙新千官拜舞集重闉貞元遇合時方泰景象雍和物盡春珠樹傳燈連繡陌錦圍成市接丹宸身依蓬島欣瞻仰幸沐恩波及小臣萬夀詩七言律一首新授福建漳州府詔安縣知縣臣許懋徳樂愷頻歌徧萬方欣陳天保進堯觴巍巍蕩蕩乾坤大嵗嵗年年日月長覆載有心綿厯數山河無物不芬芳小臣稽首懽騰甚願獻三多帝座旁萬夀詩七言律一首新授山西平陽府岳陽縣知縣臣鄒宏志盛朝寳厯正繁昌帝徳巍峩冠百王澤沛萬方霑恵雨歌傳三祝慶垂裳氤氳瑞結乾坤永駘蕩春融日月長繞電流虹花甲麗普天懽頌夀無疆萬夀詩五言排律十二韻新授廣西陽朔縣知縣臣方任帝啟中天運維皇建極年咸池升日馭黄道粲星躔至徳方乾健神功法斗旋三朝昭聖孝八蜡致躬䖍旰食因求瘼旁搜貴得賢車書同絶域禮樂彚前編宸翰披縑灑奎章礲玉鐫廟謨宏逺畧勝算拓窮邉王道平平候堯民皥皥天南山髙捧日西極近浮煙擬獻封人祝慚陳下里篇欲知無量夀應與佛齊肩萬夀詩五言排律十二韻新授福建建寧縣知縣臣章全人天地人皇紀都歸萬夀年百齡扶杖至八表貢琛前齊執香花祝争求碑碣鐫聖人謙不受臣子請彌堅功徳稱堯舜神仙數偓佺何如無量佛髙拱大羅天壠秀三岐麥池開九品蓮太平時有道熙皥本無邉不見耕牛喘長看戰馬眠甲科還特設丁賦已輪蠲比户登仁夀羣工荷保全皇慈何以荅寳祚祝綿綿萬夀詩七言律一首候選知縣臣吳顧行虹流電繞正春陽萬姓羣稱萬嵗觴動地謳歌齊獻祝普天膏露亦呈祥千門縟采迎朝日九陌和風拂御香何幸小臣逢曠典得隨野老奉壺漿聖夀萬年頌有序候選州判臣徐元琠欽惟我皇上徳竝清寧功符易簡經天緯地備聖神文武之全咸五登三建正直蕩平之極用能神庥感召羣卜享祚綿延慶天子以萬年普天嶽頌占一元之復始動地嵩呼統御遐陬合千八百國咸登夀域乘乾立極歴五十二載盡入春臺輔相裁成補造化所不逮博施濟衆實堯舜所未能省刑之詔頻頒湯網開而萬家見日蠲賦之書屢下虞絃奏而大地生春問俗省方用登斯民於祍席平天成地悉本聖主之綢繆奮六師以靖邊陲烽煙永息震一怒而安天下苞蘖俱消將士遄征感深挾纊闗津利渉澤逮牽車凡兹帝徳髙深莫非皇仁浩蕩抑且陟圜丘而主鬯必躬必親歴長白以薦馨致誠致慤臨雍尊聖鑾輿增闕里之光廣額求賢鳯羽振髙岡之采煥天章而敦士習言言玉振金聲頒宸藻以示官箴字字珠聨璧合雖已治而思治況日新而又新學海汪洋覺金匱藏書之未富筆花璀璨笑蘭亭禊帖之非珍攷之史册昭垂巍巍莫竝合諸臣工頌禱蕩蕩難名敬集經史陳言用誌岡陵大慶爰稽首拜手而獻頌焉頌曰春王三月長發其祥保佑命之其道大光聖敬日躋協和萬邦百福是荷萬夀無疆聖夀也右頌誕敷文徳清明在躬行健不息允執厥中光被四表福禄攸同令徳夀豈永世無窮聖徳也右頌徽柔懿恭徳音是茂亦右文母遐不睂壽純嘏爾常亦孔之厚永言孝思保艾爾後聖孝也右頌振民育徳濯濯厥聲布昭聖武赫赫厥靈允文允武克寛克仁萬邦為憲永觀厥成聖化也右頌立政立事所其無逸維時維㡬祇敬必飭論道經邦萬邦作式氣盛化神世世享徳聖治也右頌溫恭朝夕克廣徳心緝熙純嘏日新又新多材多藝是訓是行克明峻徳展也大成聖學也右頌奄有九有地平天成保合太和爰及矜人帝命率育皇心則寧錫兹介福懐柔百神聖功也右頌奬順天則元亨利貞時雍風動澤潤生民小大稽首以事一人天子萬夀夀考且寧聖恩也右頌萬夀詩七言律一首新授浙江紹興府㑹稽縣縣丞臣吳學禮九州玉帛輳神臯瑞靄氤氳集衮袍治洽四靈來上苑雲呈五色拂旌旄彤廷共進瑶池酒御宴同餐金母桃此日天心申篤祜臣民萬載沭恩膏萬夀盛典初集卷一百四
