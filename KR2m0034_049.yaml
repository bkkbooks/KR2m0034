body:
  text: 欽定四庫全書萬壽盛典初集卷五十一慶祝三名山祝釐二廣西臣民修建桂林府全州湘山寺無量壽佛道塲慶祝萬壽撫臣陳元龍疏請御書題額上親灑宸翰書壽世慈䕃四大字賜之康熙五十一年十一月十九日廵撫廣西等處地方提督軍務兵部左侍郎兼都察院右副都御史臣陳元龍謹題為邊方感恩心切祝聖情殷俯順輿情重修無量壽佛道塲告竣共懇恩賜御書匾額以慰瞻仰以垂萬古事欽惟我皇上治功道徳冠於古今仁壽健行同於覆載自天開地闢以來從未覩此昌期極山陬海澨之遥無不登於樂土兹者明年三月恭遇萬壽齊年粤西地雖僻逺而村墟溪洞之間白叟黄童無不知感戴聖徳羣思望闕呼嵩況臣等大小各官蒙恩豢養食禄一方而以封疆職守道里遠隔不能隨在廷諸臣抃舞叩首於堯階之下犬馬之私無由自展兹查桂林府全州之湘山寺供奉無量壽佛眞身崇巖秀麗紺宇𢎞敞自唐迄今厯數千年每年二月初八日値無量壽佛誕辰通省及鄰省漢土百姓不逺二三千里皆來進香蓋以祈福壽得福壽祈豐年得豐年靈感福庇其來已久今年二月間逺近萬民齊集之時咸稱我聖主即無量壽佛現身相約明年三月畢集寺中叩祝萬壽幷商量廣募重新殿宇億兆黎元㒺不同心臣聞之不勝欣慶而仰體我皇上愛民至意誠恐下費民力臣同司道各官率先捐俸修理委全州知州臣沈元佐桂林府通判臣慕國琠敬謹督修經臣具摺奏明數月以來隨有臣屬各府各縣諸臣先後樂輸凡應用物件俱現發價値採辦一切匠工照民間現給工食百姓子來趨事踴躍歡呼兹據知州臣沈元佐通判臣慕國琠報稱奉委修理湘山寺小心監督自壽佛塔殿大雄殿伽藍殿真武殿天王殿兩廡配殿鐘鼓樓戲臺龍鳳山門竝東西之毘盧殿大悲閣凖提閣景徳堂等處俱重加修整油漆大小佛像羅漢像共一千餘尊悉皆裝金綵畫即於寺前西首山岡之上建造萬壽行宫七間自大門二門戲臺至後廊共五進東西走廊一百零八間工程俱已告竣臣委布政使臣黄國材單騎親往查閲闔州老幼百姓並往來商賈行旅至寺中瞻仰者同聲齊呼萬歲聲震林谷復據紳士唐暄里民馬祥林兵丁向仁等環擁呈稱我聖主為當今壽佛今幸覩佛殿重輝行宫新建壽佛之金身普䕃厯千百刼而無量聖主之玉厯長調更億萬年而彌永但遐方就日情殷必得懇請御書匾額昭示正殿俾荒服黎民仰覩雲日之光華永霑雨露之恩澤從此歲歲豐登人人樂利實為邊逺非常之慶幸等情前來臣伏思皇上宸章寶翰如日月之經天江河之行地而粤西士民遠在邊鄙未得遂其瞻仰之誠若蒙恩賜御書匾額不異錫福逺方兼可永鎮邊土真千載一時之盛事臣不敢不下順民情上凟天聴伏乞我皇上萬幾之暇推恩頒賜臣當䖍造匾額摹刻即於三月萬壽令辰懸掛御匾俾琳宫寶刹奎光與慧日同輝山阜岡陵聖澤與慈雲並永用慰八千里外數百萬臣庶之心臣等慶幸何極事關萬民感恩祝聖輿情臣不敢壅於上聞理合具題十二月二十二日奉㫖該部議奏五十二年正月十八日禮部尚書臣赫碩色等謹題為邊方感恩心切等事禮科抄出廣西廵撫陳元龍題前事奉㫖該部議奏欽此該臣等議得廣西廵撫陳元龍疏稱我皇上治功道徳冠於古今仁壽健行同於覆載明年三月恭遇萬壽齊年粤西地雖僻逺而白叟黄童無不望闕呼嵩兹查桂林府全州之湘山寺供奉無量壽佛真身崇巖秀麗紺宇𢎞敞今厯數千年遠近萬民齊稱我聖主即無量壽佛現身相約明年三月畢集寺中叩祝萬壽幷商量重新殿宇臣仰體我皇上愛民至意誠恐下費民力臣同司道各官捐俸修理兹據知州沈元佐通判慕國琠報稱奉委修理壽佛殿寺前西首建造萬壽行宫復據紳士唐暄等呈稱今壽佛佛殿重輝行宫新建壽佛之金身普䕃厯千百刼而無量聖主之玉厯長調更億萬年而彌永但遐方就日情殷必得懇請御書匾額昭示正殿黎民仰覩實為邊逺非常之慶幸等情前來臣不敢壅於上聞理合具題等因具題前來欽惟我皇上仁周萬國徳被羣生雖在山陬海澨白叟黄童莫不羣興一人有慶聖壽無疆之頌今粤西士庶咸以我聖主即當今無量壽佛樂修殿宇該撫仰體皇上愛民之心不費民力同司道等官捐俸修理今寳殿重輝復上達紳士輿情恭請御書匾額應如所請乞皇上於萬幾之暇特賜御匾頒發懸掛則天章璀璨慧日光輝逺土黎民得以時時瞻仰感戴聖恩億萬斯年於無既矣臣等未敢擅便謹題請旨本月二十一日奉旨依議著候頒發三月十一日廵撫廣西等處地方提督軍務兵部左侍郎兼都察院右副都御史臣陳元龍謹題為微臣恭詣湘山無量壽佛道塲啟建經壇慶祝聖壽事欽惟我皇上道徳崇高治功巍煥健行不息與日月而同光悠久無疆並乾坤而永泰兹者三春令旦恭遇萬壽齊年慶滿寰區恩周海㝢粤西雖地處天末而自城市以至村墟黄童白叟無不含哺鼓腹瞻舜日而樂堯天望九重而呼萬歲臣等逺羈職守不得隨在廷諸臣抃舞叩首犬馬之誠無由自展臣因俯順民情與文武大小各官捐俸重修全州湘山之無量壽佛古寺即於湘山之陽建造萬壽行宫以為祝聖之地於上年十一月内工竣經臣具疏題請御書匾額在案兹當聖誕屆期臣謹於三月十一日起程前詣湘山就於無量壽佛大殿啟建萬壽經壇七日偕文武諸臣望闕叩頭慶祝伏願陽和浩蕩千百國永沐恩波化日舒長億萬年常霑福澤臣無任踴躍歡忭之至所有起程日期理合題報伏乞皇上睿鑒施行謹具題知四月十四日奉旨該部知道三月初二日提督廣西總兵官左都督臣張朝午謹奏為慶祝聖壽恭報微臣赴全日期事欽惟我皇上功徳邁古仁壽同天普慶寰區效靈川嶽粤西全州湘山寺供奉無量壽佛真身厯今數千年邊方士民欣逢聖天子六旬正誕靡不歡欣抃舞籲請撫臣陳元龍重新壽佛殿宇建造萬壽行宫臣同鎮臣趙廷棟亦捐俸協修工程告竣正屆聖壽誕辰臣於三月初二日率屬員自栁州起程前赴湘山寺叩賀聖誕䖍設無量壽佛經壇禱祝皇上茂膺嘉瑞衍億萬年禄位名壽之長永荷天庥受千百國紳士軍民之慶臣無任懽忭之至所有赴全日期理合題報四月初九日奉旨該部知道二月十九日鎮守廣西左江等處地方副將管總兵官事臣趙廷棟謹奏為恭報微臣赴全慶祝萬壽無疆事欽惟我皇上聰明睿知文武聖神徳邁百王治隆千古聲教遐敷處處蒙庥咸享昇平之福恩膏普被人人樂業共遊仁壽之天業廣功高道隆徳備誠曠代所無於今為烈者也康熙五十二年三月十八日恭遇我皇上六旬聖誕普天稱慶率土歡呼臣不獲與在廷諸臣隨班拜舞謹於二月十九日自南寧府起程前赴全州同文武諸臣於新建萬壽宫内啟建祝聖延齡醮壇齋沐叩首慶祝萬壽無疆所有微臣赴全日期理合題報四月初六日奉旨該部知道四月十三日廵撫廣西等處地方提督軍務兵部左侍郎兼都察院右副都御史臣陳元龍謹題為宸翰寵頒奎光逺照恭謝天恩永綏邊土事本年四月十一日臣姪左春坊左中允臣陳邦彦遣家人李祥呉慶等齎捧欽賜湘山壽佛匾額御書壽世慈䕃四大字到粤臣率同在省文武大小各官出郭跪迎捧至公所敬設香案望闕叩頭祗領闔城紳士軍民耆老人等齊集瞻仰無不踴躍歡抃咸稱僻處遐方覲天無自今得仰覩宸翰恍如身近闕廷聖主加恩邊土真從來未有之盛事臣等敬觀御書筆力遒勁神彩煥發不異日月經天江河行地共瞻羲畫之健强益慶堯天之悠逺伏思壽世二字聖心益謙聖徳彌廣仰知我皇上視民如傷逺邇一體不以一已之壽為壽而必欲使舉世之人皆登仁壽之域是則以聖主無疆之壽俯錫下民億兆人之壽而凡下民各有之壽總歸我聖主億萬年之壽一人之錫福無量萬邦之受祉靡窮在壽佛久鎮湘山原因䕶國祐民有大功徳於兹土今蒙天語表彰仁心黙感壽佛益當垂慈廣䕃從此雨暘時若歲歲豐登瘴癘永消人人壽考臣現在製造匾額敬摹鐫刻俟匾額告成選擇吉辰送往壽佛大殿懸掛另行奏報外所有接到御書理合具疏題報五月十七日奉旨該部知道外藩蒙古諸部落各於所屬地方修寺諷經恭祝萬壽幷請勅賜寺名上從之康熙五十二年正月二十六日禮部為公務事准理藩院文稱准乾清門侍衞拉什文稱康熙五十二年正月十二日阿霸垓多羅郡王呉爾占噶喇卜旗分辦事台吉徳穆褚克為皇上萬壽在西里河地方蓋廟塑佛已完乞皇上恩賜廟名又阿禄科爾沁多羅貝勒汪占旗分辦事台吉衮塔爾等為皇上萬壽蓋造佛廟已成乞賜廟名等因具奏奉旨著給與廟名又正月二十二日科爾沁扎薩克圖郡王鄂齊爾為皇上萬壽於陶爾河地方蓋造廟宇已完乞恩賜廟名等因口請轉奏奉旨著給與廟名欽此等因前來相應移咨禮部照例給與廟名等因到部應將各給廟名之處送内閣撰擬可也正月二十八日禮部為公務事准上駟院文稱管轄尚都達布孫瑙兒地方馬羣總管阿拉納奏稱蒙古臣等荷蒙聖主宏恩無際未能圖報萬一故臣等公議自備紙張筆墨選屬下善書之人敬書紺珠爾經一部不時諷誦誠意祈佛祝聖主萬壽無疆俾臣等安生樂業紺珠爾經已於去年十二月内書畢今恭逢聖壽大慶之期諷祝九日又近見蒙古地方所修廟宇俱奏請聖主欽賜廟名而馬羣地方所蓋廟宇内供喀陽齊禮娃佛有看守喇嘛十名尚無廟名念經人亦少伏乞聖主賞賜廟名添給十名喇嘛賞賜度牒等因具奏奉旨著給與廟名交與該部議奏欽此欽遵移送到部應將給廟名之處送内閣典籍㕔撰擬可也欽賜西里河地方廟名誠壽寺阿禄科爾沁廟名戴恩寺陶爾河地方廟名仁壽寺尚都達布孫瑙兒地方廟名𢎞濟寺駐劄西寧主事格勒爾兎呈報為轉奏事親王扎什巴圖魯咨文内開得聖天皇帝睿鑒呼呼腦兒老親王扎什巴圖魯奏為今歲聖主六旬大慶小老臣惟願聖主皇圖永固在顧木卜郭隆沙沖過茫等大廟内祝頌福壽將紺珠爾經阿玉璽經即魯克經及各種經盡力多多諷誦再皇上正誕之日小老臣在本處望闕遥拜䖍誠諷經外何以出力報荅聖恩為此謹奏前來理藩院將親王扎什巴圖魯所奏䝉古字本一扣黄絹一疋主事咨呈文案交與乾清門侍衞拉什於五十二年二月二十三日轉奏奉旨知道了呼呼腦兒貝勒羅布蔵為萬壽大慶同伊母念萬壽經外又親到郭茫廟念紺珠爾經阿玉璽經答拉厄克西達達嘛呢卓里克烏格等經叩祝先是直省督撫提鎮諸臣咸以康熙五十二年恭逢皇上六旬大慶預期疏請詣闕行慶祝禮皇上以封疆任重鎮撫需人間許一二入朝其不獲所請者無所發其尊親愛敬之忱而黄童白叟末由親詣輦轂以伸其謳歌頌禱之私者亦不可以萬萬計乃各就境内名山集緇黄建壇宇為萬壽祈福其先期陛見未及聖節即以事還所治者亦各詣名山為慶祝之舉臣等抄撮前後章奏撰為二卷竊有以仰窺我皇上聖徳之厚恩澤之深而諸臣之所以祝釐者亦各有依據不違古義而非如有唐以來誕聖諸節尊崇二氏講論三教藉為笑譁而已也昔在有虞順時之方柴燎五嶽望於山川徧於羣神故曰因名山升中於天所以昭神祇饗報功徳是以災厲不作而風雨寒暑以時此天子為天下祈福而於己無所私焉者也然而天子祭五嶽諸侯亦得祭其境内山川其奉牲以告祝史正辭將使大備盛徳諸福可致之祥咸萃於一人之身康彊逢吉至於萬年永保民而後己此則天下為天子祈福庶幾藉一人之福以福天下者也唐張嘉貞北嶽碑銘云事舉必祈神行宜賽則有公卿而奉告命或四時薦熟三獻酌洗則有侯牧而奉新章其事雖殊其義豈逺乎哉蓋五嶽視三公四瀆視諸侯名山大川百靈所㑹各有擁扈一人之誼人之所奉即神之所憑故曰寤寐靈嶽肸蠁神文玉帛未陳幽贊必先意而啟椒醑雖薄景福乃應期而集人神所協良不誣也嘗厯稽名山之靈風俗通稱泰山有金篋玉䇿探䇿知壽徴諸漢武華嶽古之惇物雲笈七籖稱山頂有千葉蓮花服之長生故曰華山韓愈稱衡山最逺而獨為宗其神必靈北嶽所居隂終陽始其道常久故曰常山嵩山尤為神異漢武帝詔云朕用事華山至於中嶽御史乘屬在廟旁吏卒咸聞呼萬歲者三乃以三百户為奉邑命曰崇高焉其他若匡廬為三天子鄣黄山以軒轅得名峩􅖭五臺則文殊普賢之所示現也武彞君幔亭之宴昉自秦漢沂山呉嶽則東西鎮山也登蓬萊閣以望安期訪湘山寺而知壽佛百神震疊萬方鼓舞光嶽効其靈臣庶鳴其豫衆之所往神必據焉蓋二氏之説不足憑萬衆之心有可恃雖謂名山祝釐之舉皇王令典以之協祚厯數昌期以之交泰何不可者以視昔人封泰山禪梁父躬告成功於上帝者其情之公私義之廣狹豈直相逕庭已哉至於外藩蒙古諸部各建佛寺請賜寺名諷紺珠爾等經膜拜懽呼以祝萬壽所謂不易其政不違其俗且宸翰所加即為典記備載不遺以見普天同慶無間中外焉萬壽盛典初集卷五十一
