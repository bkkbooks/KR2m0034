body:
  text: 欽定四庫全書萬夀盛典初集卷三十九恩賚八恤刑康熙五十二年二月二十一日戊辰禮刑二部以三月恭遇萬夀六旬大慶請如直撫趙𢎞燮所奏一月內不理刑名每十年一舉永著為例上從之康熙五十二年二月初五日巡撫直𨽻等處地方管轄紫荆密雲等關隘贊理軍務兼理糧餉都察院右副都御史世襲一等精竒尼哈番加九級臣趙𢎞燮謹題為聖夀恭遇六旬寰宇欣逢大慶請寬鞫審之限期以專臣民之祝頌事欽惟我皇上聖德法天屢措好生之政𢎞慈夀國常垂寬大之恩廣額作人蠲租益下有施盡善無美不行五十二年厚澤深仁盡是太和翔洽百千萬國民安物阜無非德化流行是薄海臣民得以享堯天舜日之舒長者皆我皇上仁育萬物感召天和之所致也臣查定例每年三月恭逢萬夀聖節不理刑名者七日停刑者一月蓋所以廣聖主如天之仁亦以盡臣民慶賀之誠實至善而無以復加矣惟是今歲伏遇皇上六旬萬夀遐陬僻壤莫不嵩呼白叟黃童咸知華祝臣見在真定府之龍興寺保定府之玉清觀遴請真修僧道設壇誦經虔祝萬夀倍於恆嵗推之各省莫不皆然但三月內不理刑名僅止七日此外如遇限滿重案不得不照常刑鞫臣思今嵗乃非常大慶之年大小臣工在在竭誠誦祝即昆蟲草木猶知向榮若是月仍然用刑審事使桁楊之下復有搶地呼天之慘致違皇上仁育萬物至意此豈臣子敬祝之心所敢安乎臣請每遇聖夀大慶之年應自三月初一日至月終止除平常事件仍行辦理外其承審重案凡應刑鞫者均照停刑日期展限一月不理刑名定為曠典亦如加增文武鄉會兩科之例自皇上六旬以至萬萬旬每遇十年一行庶普天臣子得以專其虔誠慶祝之心而率土小民亦得申其巷舞衢歌之悃臣叨沐聖恩最深最重犬馬寸心無可圖報惟有祝願聖天子純嘏萬年以盡毫末報主之忱故敢冒昧題請如蒙俞允伏祈皇上即賜敕部通行各省一體遵照則皇恩彌見浩蕩而聖夀永與天齊矣理合具題伏乞皇上睿鑒施行為此具本謹奏請旨本月十五日奉旨該部議奏二月十九日禮部等部尚書臣赫碩色等謹題為聖夀恭遇六旬寰宇欣逢大慶請寬鞫審之限期以專臣民之祝頌事禮科抄出直𨽻巡撫趙𢎞燮題前事奉旨該部議奏欽此該臣等會議得直𨽻巡撫趙𢎞燮疏稱查定例每年三月恭逢萬夀聖節不理刑名者七日停刑者一月所以廣聖主如天之仁亦以盡臣民慶賀之誠實至善而無以復加矣惟是今嵗伏遇皇上六旬萬夀乃非常大慶之年若是月仍然用刑審事有違皇上仁育萬物至意豈臣子敬祝之心所敢安者應請自三月初一日起至月終止除平常事件仍行辦理外其重案應刑鞠者照停刑日期展限一月定為曠典自皇上六旬以至萬萬旬每遇十年一行則皇恩彌見浩蕩而聖夀永與天齊矣等因具題前來欽惟我皇上仁周萬物澤被羣生普天率土莫不霑恩今嵗三月恭逢皇上六旬萬夀乃非常大慶凡屬臣民莫不虔祝應如該撫所請於三月初一日起至月終止除平常事件仍照常辦理外其應刑鞫者展限一月不理刑名嗣後每遇十年舉行一次永著為例以彰聖主仁夀洪恩殫臣民虔祝至意俟命下之日即通行各部院衙門及八旗并直𨽻各省一體遵行可也臣等未敢擅便謹題請旨本月二十一日奉旨依議三月十八日萬夀大慶特頒恩詔欽恤刑獄肆赦天下凡一應罪犯分别減等寬宥有差恩詔備載頒詔條中凡係恤刑肆赦者録如左一凡文武官員現在敕督撫提問究擬者盡與豁免一地方大小官員當以仁慈為本妄聽姦民揑詞誣告以致陷害良民其害更甚於貪如各省督撫以下及有司官員有濫受詞狀貽害善良者事覺定從重治罪一濫動重刑舊有嚴禁有司官員有因小事輒行夾訊並違例妄用非刑者該督撫即行察參具奏從重治罪一官役犯贓罪應至死與不至死者俱免罪仍革職役追贓永不敘用一凡有叛逆殺死人強盜等罪牽連對質候審監禁人犯在獄年久恐無辜致死該部院直省督撫確審如無憑質對情可矜疑者即行奏請釋放一凡應追贓私察果家産盡絶力不能完者槩與豁免無得株連親族一凡強盜雖同夥殺人本人未經下手者自行投首準豫免罪一各處盜賊或為飢寒所纍或為貪官所迫實有可憫如能改過就撫者準赦其罪一除謀殺故殺外如原無仇隙偶因一時忿激相毆傷重至死者將凶犯免死決杖一百照例追銀四十兩給付死者家屬一凡官吏兵民人等有犯除謀反叛逆子孫殺祖父母父母內亂妻妾殺夫告夫奴婢殺家長殺一家非死罪三人採生折割人謀殺故殺蠱毒魘魅毒藥殺人強盜妖言十惡等真正死罪不赦外及修造宫殿陵寢工程不固冒破錢糧製造戰船軍器等項不堪糜費錢糧軍機獲罪貪官衙役犯贓監守自盜冒借官庫銀兩侵盜漕糧科場罪案關係河道漕運一應情罪俱不準赦騷擾驛遞姦細光棍誣告叛逆放火因姦致死人命罪犯亦在不赦别項死罪俱減一等內有鬭毆殺人者仍照例追銀四十兩給付死者之家其餘自康熙五十二年三月十八日昧爽以前已發覺未發覺已結正未結正咸赦除之有以赦前事訐告者以其罪罪之四月初六日刑部題為欽奉恩赦將釋放人犯細數奏聞事監候待質發遣寧古塔等處入辛者庫當差軍流徒枷號杖笞人犯與恩赦相符者俱已釋放等因具奏初九日奉旨依議四月初六日刑部等衙門題為欽奉恩赦將減等人犯細數奏聞事斬絞人犯與恩赦相符者照例分别減等寬免等因具奏初九日奉旨知道了四月初六日刑部題為欽奉恩赦不準寬宥人犯細數奏聞事人犯沙克都爾等與恩赦不符不準減等釋放等因具奏初八日奉旨知道了內色楞老瞻阿玉璽綽爾門乂蘇齊姚自亮逹色阿爾虎納布嗒蘇張國相李元璽王文弼張八兒張士政七濟兒乂哈兒伊等之罪雖與赦款不符但情由有可憫之處俱著從寬免死減等照例發落是嵗欽奉恩赦後刑部等衙門將盛京刑部及各地方將軍各直省督撫所屬一應重罪人犯現在監候及現在具題與恩赦相符者視所犯情罪遵照赦款或決杖釋放或減等發遣先後具題俱奉旨悉與寬宥施行是日頒詔後上諭三法司立釋罪犯十八日巳刻駕幸暢春園部院大臣官員各於經壇前送駕上謂刑部尚書哈山曰頃已頒赦爾可至衙門將人犯立行釋放駕至江南綵棚上見左都御史趙申喬諭曰頃有諭立釋應赦人犯汝應速去釋放申喬奏云臣已𣲖官至刑部會同查理臣送駕後亦即至刑部遵旨查釋矣本日自午至暮三法司堂司各官俱齊集刑部將應赦人犯立行釋放囹圄一空十九日刑部等衙門謹奏為奏聞與恩赦相符減等釋放罪犯數目事臣等伏惟我皇上好生之心如同天地普天之下官民莫不共霑聖主洪恩臣等仰體聖主好生之至意再三詳察與赦欵相符應減等之重犯共一百六十五名應寬宥釋放軍罪以下之犯共三百五十七名督捕司逃人共一百三十九名將伊等即行減等釋放俱向北望闕叩稱聖主再造之洪恩惟祝我皇上福夀綿長於萬萬年矣謹將罪犯減等釋放數目奏聞本日奉旨知道了五月二十九日乙巳上諭停止本年內外秋審是時恩赦既頒繫囚解釋各邀浩蕩其監候者皆與赦款不符已無更生之望而皇仁特沛又傳諭旨停止秋審終嵗刑措不用太和元氣洋溢宇宙焉天地之大德曰生聖人之大德曰好生是以聖人之於民雖有弗率訓典自麗於法者猶欲委曲而開釋之凡以仰答天心俯全民命爰乃揚化理播鴻名丕集休徴永膺多福其端莫不由此也羲軒以上敻乎邈焉粵稽唐虞眚災肆赦釋昭欽恤他若下車泣罪解網施恩鋪觀二代其揆一也赦過之象紀於周易三宥之典詳於周禮疑赦之文並見於吕刑及王制夫其風俗成於下嘉祥集於上良由布德行仁助流政教也自漢迄明數千年來流風雖遠規制代興或以郊赦或以享廟赦或以封禪及國慶而有赦大赦則逮乎四方曲赦則專乎州郡復有遞減其罪異乎大赦曲赦之例者謂之德音伐鼉鼓樹雞竿抒巽風沛解雨騰躍乎綘幡之旁回集乎畫臺之側吏投丹筆人脫赭衣可不謂幸焉然而澤有所限則施之弗周恩不由𠂻則行之多壅出於權宜者以為要結之私術沿於故事者以為奉行之具文未有慶流既溢之餘德被太和之會量極於八埏九垓令速於隤丸拊鼓恩意遍而有加盛典垂而罔斁若我皇上之隆者也我皇上蒞宇以來平暴亂禁裒刻輕徭賦勸農桑隆學校頒教令四海九州罔有內外沐浴膏澤而涵泳德化者五十餘年矣夫驅其殘害而民知自安厚其物力而民知自樂彰其禮教而民知自重然則觸冒禁網罹於有司之法者蓋亦幾希而僅有皇上又禁濫受之詞慎非制之刑嚴失入之令釋淹繫之囚絶株連之纍開自新之路設詳覆之職固已天下無寃獄矣每嵗秋審覆奏臨朝太息徘徊詳審雖情真之罪猶求其生或乃竟嵗停刑五十年秋詔矜疑緩決者照例具奏情真者仍停決所以憫惠元元者澤至渥也癸巳之春恭際六旬萬夀光天之下莫不嵩呼華祝額手稱觥涵煦太平前歌後舞皇上乃􅍀然動容念狴犴之內幪扉之徒猶有不得與於覆幬之列者特敕中外臣庶明昭並生之至意蓋自數十年來每逢萬夀七日勿理刑名今乃寬期一月每厯十年永為成憲復頒恩詔肆赦天下輕者即行釋放重者亦皆減等其與恩赦不符者又曲賜原情從例減釋至於情事萬無可解者雖在監候亦復停止秋審又恐有司奉命需時親發玉音諄諭諸司速遵赦令何言之重而意之勤仁之至而義之盡也是故綸綍朝宣陽和夕溥渙汗之號若風雲歡呼之聲若雷霆仁心與日月同懸盛迹與乾坤並久猗歟休哉覽夫三五六經載籍之傳方斯蔑矣夫有好生之心必有刑措之治何則湛恩愷浹淑氣濡蒸誠有以潛發其感愧之心而大作其協中之化也且夫至誠所以動物盛德所以格天蓋孔子曰仁者夀夫仁之所謂夀者豈惟植本清凝堅固不拔而已哉其哀矜憯怛之意足以默當夫天心而純嘏之錫有不自知其所由然者行見億千萬載申命用休長膺有秩之祜永底蒸民之生矣夫寬刑宥罪其於聖德髙深直緒餘耳然而巍巍蕩蕩無得而名絶迹殊尤配天罔極臣等珥筆而書用仰窺萬一云爾萬夀盛典初集卷三十九
