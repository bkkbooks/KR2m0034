body:
  text: 欽定四庫全書萬夀盛典初集卷八十六歌頌二十六詞臣十八萬夀詩七言律四首翰林院檢討臣嚴思位萬年黼座慶長春嵗嵗花時拜紫宸鳯厯貞元周復始鴻鈞甲子運還新綏桃上苑紅垂蕚御栁天街翠拂人不待披圖廵洛水榮光五色滿雲津其一銀簧玉琯奏英韶天地清寜氣序調端拱鴻猷開萬葉重華駿烈協三朝景星向月光常滿甘露成漿味自饒巷舞衢歌歡聖徳嵩呼處處徹青霄其二仁風翔洽樂堯天浩蕩如遊耕鑿年世㤗華平呈瑞木政和甘醴出清泉白題烏弋圖王㑹朱草青芝供御筵億載無疆春晝永三多時祝聖人前其三化成久道自垂衣龍徳天門拱紫㣲曉日樓臺饒氣象芳郊草木徧光輝欣承禮樂朝初罷共沐恩波醉始歸得與簮裾無報効葵心長竊向春暉其四萬夀詩七言律六首翰林院檢討臣黄越花甲初周祝聖人八方歡忭慶芳辰直連海嶽施華幄總徧山河拜紫宸億萬正供常大賚百千髦士盡垂紳殊恩異數頻嘉恵上夀從來屬至仁其一畿内承恩感更親黃童白叟拜清塵醵金鑄鼎銘心切結彩懸花矢念真四野笙歌連上苑萬年烟景入冝春不縁衢舞瞻天表庶草何由識大椿其二班聨濟濟覲丹宸一體朝儀倍覺新御柳垂絲添萬縷宫桃結實動千春堯樽北斗酙天釀舜樂南薫轉法輪撰得無疆頌成帙當階稱獻盡惟寅其三岳牧聫鑣覲聖神幾行鵷鷺拜楓宸恵風徧澍羣方雨淑氣遥開萬國春共濟夙曽聞訓誡和衷今已見臣鄰小亷大法天顔霽仁夀知能浃兆民其四邇安逺至樂甄陶紫極星臨南極髙海表不聞馳露布朔方久已掛弓刀渥洼此日多神馬西國頻年進旅獒禹貢九州今更廓𢎞開壽域溥恩膏其五後樂先憂仰聖明幾勞宵旰致昇平思維北伐南征日多少持盈保㤗情四逺已無戎馬迹八荒皆報器車成却因無逸能常逸萬嵗千秋介夀觥其六萬夀詩七言排律二十韻翰林院檢討臣曹掄彬三皇享國萬餘嵗五帝遐齡數百年聖主初周花甲子芳辰恰遇艶陽天蟠桃結實時方熟椿樹盤根色正鮮永固精神行健順新輪斗柄運璣璿九疇斂錫無疆祉五福駢臻有道前眉夀重申昌熾逺恩波洋溢海隅邉聖神不測超今古功徳難名駕後先萬國梯航陳玊帛九州爐鼎鑄山川香凝寳盖麒麟動燭徹金蓮星斗懸鷺序鴛班承委珮龍章鳯篆唘雲箋乾坤不老春常在人物峥嶸興倍妍瑞接南山盈几席酒移東海浥瓊筵管絲迭轉簫韶奏輦路廻還錦繡牽禁栁摇晴宫闕麗金莖拂露殿庭宣衢歌巷舞昇平世户静風恬熙皥傳賜復蠲租流愷澤省方肆赦荷生全百年棫樸栽培久四逺弓旌姓氏聨玉筍風迎千圃直瀛洲月映九秋圓人文世運爭雙美松竹岡陵慶久延邉逺㣲臣何所祝獻詩惟上九如篇萬夀詩五言排律二十四韻翰林院檢討臣丘尚志春色皇圗麗和風夀域昌晴霞浮閬苑朝旭映扶桑宫栁凝烟秀仙桃浥露香千官承黼黻萬國㑹冠裳至徳髙虞夏神功邁漢唐道追東魯逺理遡考亭長仰止尊彛貴褒崇爼豆光宸章森琬琰御額燦琳瑯澤被詩書盛心維禮樂張特科求俊乂廣額重膠庠閱武天威壯敷文甸服揚逺氛中外靖重譯去來常海氣歌清宴河流静渺茫錫金優耄耋解網任翺翔賑粟開倉廩宵衣啟廟堂八蠶從溢瑞五穗屢呈祥令序調風雨豐年兆雪霜皇𠂻殷保合聖澤沛汪洋上苑飛鸚鵡瑶池展鳯凰蓬萊紛綘節姑射進瓊漿玉燭光初引匏笙夜未央星辰輝碧宇頌禱徧羣方賜宴興歡忭陳詩起拜颺猗歟綿寳厯允矣固金湯萬夀詩五言排律四十韻翰林院檢討臣曾謹聖夀逢三月嵩呼祝萬年雍熙追太古景慶嫓中天智勇天為錫欽明性所全厥中常自執一敬逺相延睿學圗書啟宸章日月懸精華探玉圃麗藻潤珠淵饗帝嚴昭格仁民溥恵鮮無為時穆穆守正每乾乾頒政明倫急移風教讓先恩同解澤沛令比㢲風傳獨契軒轅律時調虞氏絃九州分土壤七政合璣璿臨幸恩波浹時廵徳恵鮮晴光摇豹尾瑞色滿龍船恤舊飛丹詔崇儒賜錦箋法寛刑自減用節賦頻蠲湛露周千國甘霖徧八埏敷文惟表正講武且安邉瀚海舟飛雪天山馬逐烟苖民稽首格譯使指南還雷動驚神武風行協化權梯航歸輦轂冠佩集幽燕稌黍千村積倉箱四野連家餘紅朽粟人剰太平錢虹渚呈天瑞龍樓敞夀筵宫鶯隨栁囀簾燕受風旋桃結千年果花開十丈蓮春光廻禁苑紫氣繞金仙御輦臨天闕瑶星近斗躔霞飛雲錦織香散篆烟聫將相金貂列王侯錦幔搴鞭鳴三殿曉車擊六街闐露浥金莖燦光暉玉燭燃龍顔何晬穆鷺序各蹁躚葵性瞻依切芹心愛戴専分班慙玉筍珥筆候花磚盛世皇圖永熙朝寳厯綿飲和頒玉露澡徳啟丹泉核積崑山外籌添海屋前小臣何所祝恭獻九如篇萬夀詩五言排律四十韻翰林院檢討臣高維新四海昇平日千祥㑹萃時晴烟㸔縹緲佳氣轉葳蕤紀厯方周甲添籌正介眉三多争效祝百爾願陳辭睿性由天縱禎符協帝規繞樞綿寳厯貫月肇鴻基快覩昌明世欣瞻龍鳯姿平平歸有極蕩蕩總難窺天徳占行健皇心本緝熙時和調玉燭風古樂茅茨振武清羣蘖敷文賁九陲有苖胥格被薄海徧寜綏覆載真無外苞桑永不移物皆依化育人盡沐春滋精一傳堯典羮牆厪孔思諧聲編管籥考禮詰宗彛天象璣衡在坤維玉斧施中天超舜禹太古邁軒羲觀化游於藝陶情樂在詩從容頻染翰伴奐毎臨池鳯藻垂千古龍章耀兩儀聖能包小大天授作君師禘祫三齋肅壇壝五璧持東山光屢錫南國澤無遺教浹𢎞陶冶恩覃慰畢箕栽培同大造寛恤竝無私省俗陳鞀鐸捐租軫饉饑萬民忻就日多士樂傾葵以此嘉徴集應知茀禄冝慶雲多五色秀穂盡雙岐喜值長春節爭將萬夀巵仙階添蓂葉春沼秀金芝日暖宫花麗風暄御栁遲啼鶯雙闕曙鳴鶴九霄知仙佩環丹仗雲璈和玉箎翩翩廻鵷鷺矯矯集熊貔筐篚來沙朔車書到宛氐呼嵩依禁籞擊壤在莊逵恰報瑶池信蟠桃熟滿枝萬壽詩五言排律二十四韻翰林院檢討臣陳㑹泰運天心協乾行帝徳純萬方歌聖夀四海沐皇仁位育中和致昇平道路遵普天歸正朔率土盡來賔保合符元化鴻蒙振大鈞雲祥輝象闕日藹麗楓宸華祝虹流候嵩呼燕喜辰四時三月盛五福九疇陳北拱長庚燦東瞻紫氣新千官翔赤舄百爾綰青綸槐影階摇玉蓮籌漏滴銀宫鶯鳴上苑禁柳拂城闉簇簇排仙仗遲遲御日輪扇開森雉尾旗繞動龍鱗待旦雞鳴早朝天鳯舞頻碧霄聞廣樂蓬島降高真神鼎羮調渥冰壺醴酌醇頁恒同晝永保佑自天申海澨咸呈瑞山陬共效珍洪庥方洊至景福慶駢臻六十周花甲八千衍大椿心隨金鏡獻才愧石渠掄戩榖賡天保隆恩逮小臣南山欣作頌齊祝萬年春萬夀詩七言律四首翰林院檢討臣黎致逺峻徳同天受命長初周甲子禄方將頌聲地徧三多祝淑氣春濃萬嵗觴乃武乃文真莫竝得名得夀總無疆箕疇斂福歸皇極瑞應欣逢大道昌其一淵源心法接唐虞天縱生安道自腴敬以日躋崇聖徳誠從不息握璿樞圖書一畫傳羲易理學千秋表宋儒乾健功深兼夙夜治平聲教久涵濡其二累洽重熙道化成鈞天雅奏擬雲英蠲除租賦全和樂賡唱菁莪共太平解愠阜財千載遇宵衣旰食一人情好生屢見頒明詔仁夀長㸔六宇清其三日晅雨潤溥生民純佑應知天所申北極卿雲凝黼座南山佳氣靄楓宸升恒永御光華旦悠久常同覆載新踴躍喜從虞舞列萬年鴻運祝長春其四萬夀詩五言排律二十二韻翰林院檢討臣張照鳯紀璇圖逺龍飛寳厯昌泰階調玉燭南極耀珠鋩至徳侔羲昊神功邁漢唐誕敷文教訖奮伐武威張異地争臣屬無雷盡享王車書一統盛禮樂萬年長義路遵平蕩恩膏布濊汪河流安既道海水静無揚丹詔勤民事清心問下方堯咨同儆惕孔思接㣲茫睿藻披盤鑑宸情寄縹緗星辰觀帝象雲漢倬天章廣大乾坤位升恒日月光虹流周甲子燕喜及春陽王㑹梯航逺龍墀劍佩鏘謳歌來率土保定祝如岡奔走陳筐篚提攜獻酒漿民風何皥皥聖訓益洋洋難老由天錫咸和卜嵗穰休徴禾黍秀化洽雨風翔有氣皆成紫無雲不覆黄瑶樞㸔永運金鏡愧靡將萬夀詩五言排律十首翰林院檢討臣詹銓吉泰運開天久仁風育物長乾坤綿夀紀河洛發榮光彌性金為質含真玉是糧一元同布濩三極共陳常草結千齡字花呈百和香繪圗成五嶽天保頌君王其一鵷鷺趨蹡進䕫龍拜舞前九霄開日月八表望雲烟湛露霑堯酒薫風發舜絃稱觴環大地獻夀徧周天鶯囀如調曲花明欲照筵無邉真冨有歡賞自年年其二瑞氣凝中禁祥光滿太虚物皆含美利民各遂攸居運屬文明㑹風猶沕穆初時廵勞舜蹕問道降軒車化久謨無缺恩深澤有餘普天同愛戴嵩祝到樵漁其三曙色明丹陛韶音出紫宸朝盈萬國使門闢九重春視履占元吉觀民識至仁羣倫資鑑别庶類樂陶甄純嘏綏元后殊恩及小臣年年桃李放景象一時新其四兩儀歡永奠萬福慶攸同禮樂成需養絲綸載㢲風皇猷何浩蕩元氣自沖融衆識尊親戴羣知髙厚功九衢時獻頌四達更延聰至矣懐柔徳精禋契六宗其五徧地陽和景中天日麗時蓂枝舒葉早蓮漏出花遲不數横汾樂胥吟燕鎬詩碧霄傳管籥紅旭映罘罳動植知皇豫飛潛仰睿慈昌期千載遇何以答恩施其六鴻厯占昌熾淳風躋協和天方申百禄民更祝三多琪樹分行列珠珂四靣羅仙人張内樂野老撰衢歌重疊龍旗繞悠揚鳯吹過梯航來異域海水久無波其七縹緲黄金闕玲瓏白玉京東華昇曉日西極燦長庚喜氣晴花笑恩波春水生瑶筐盈玉帛繡幄列簮纓樂奏簫韶美盃承沆瀣清罏烟凝作蓋徧覆鳯皇城其八碧草鋪芳甸繁花綴上林年光三月好春色十分深人醉羲皇酒工歌太始音百靈扶聖祚萬象列宸襟浹地沖和氣彌天化育心皥熙成一體端拱撫虞琴其九勲華嫓峻徳贊頌絶文辭事事蒸民極言言列辟師循環周甲子次第配干支至健天同運貞恒日竝垂深仁成有象淳化格無知竊效啁啾響因風上玉墀其十萬壽詩七言律四首翰林院檢討臣黄趙音蓬萊佳氣日初長南極星明拱御牀功徳已㸔髙五帝春秋行復繼三皇萬年枝暖卿雲爛百福川增景運昌寳厯無窮周又始歡心齊傍衮龍裳其一普天加額拜恩施紫禁花繁燕喜時萬夀盃浮仙掌露千秋鏡録侍臣詞勲華事業尋常見雲日光輝逺近知甲子未須簪筆紀森森蓂莢滿彤墀其二海屋仙籌滿帝家天顔有喜正無涯御厨擗得麟為脯上苑攜來棗似𤓰鼎篆香烟浮紫氣盃濃琥珀燦明霞欲知聖夀應難比試數恒河一一沙其三三月光風景色妍謳歌是處頌堯天直同蒼昊無疆夀不數華陽此日仙宸極熙春金闕永恩波如海石渠傳鳯池忝竊慙何補願祝君王萬億年其四萬壽盛典初集巻八十六
