body:
  text: 欽定四庫全書萬壽盛典初集卷一百八歌頌四十八舉貢諸臣三萬壽詩七言律二首貢生臣韓省曾太平天子壽無疆滄海恩波雨露瀼佛日仙霞雙闕敞吳綾蜀錦九衢張臣民喜奏琅璈樂川嶽欽陳沆瀣觴共祝三多呼萬嵗今皇功德勝軒黃其一聖代求賢盡席珍更於萬壽沛恩綸鹿鳴歌處春風暢鳳翮翻時杏蘂新南極瑞光連北斗茅廬喜氣達楓宸小儒無限呼嵩意葑菲應霑帝澤均其二萬壽頌貢生臣郭彭齡惟仁斯壽惟德動天湛恩汪濊聲教遐宣聖神文武廣運實兼富壽康寧箕疇所先曰攸好德惟急親賢龍門競躍雲路齊騫以萃能升保泰乘乾玉燭永調金鑑常懸皇王蒸哉億萬斯年萬壽詩五言律四首貢生臣沈曾虹帝德山河永皇圖日月長八紘開壽域六宇仰榮光匝地歡聲起齊天福履將初周枝幹㑹從此日無疆其一久道觀成化承平樂事多春深芝草秀韶奏鳳鳴和童叟朝金闕官僚響玉珂齊聲呼萬嵗世世沐恩波其二紫禁飛龍翰光芒起燭天典謨垂萬世風雅振千年染墨書稱聖臨池筆欲仙琳琅多侍從翹首望雲煙其三當代生儒重吾皇愛養深特恩開萬壽曠典降綸音璞向深山剖珠從淵海尋膠庠齊鼓翼敢負至尊心其四萬壽詩七言律一首貢生臣程泰京羣趨玉陛曙光分仙仗聯班率土欣嶽頌兆民三殿近嵩呼萬嵗九霄聞蟠桃集闕浮丹醴芝草盈庭擁絳雲竊效衢謡同巷祝齊天寶祚戴堯勳萬壽無疆詩五言律六首有序貢生臣周志伉欽惟皇帝陛下德盛道崇功深學懋太和在宇四時之氣長春景運方中兩曜之光久照天庥洊至綿寶厯而遐昌國祚永康握瑶圖而鞏固率土仰詩書之澤文教誕敷普天欽赫濯之威神靈逺布盡倫明物垂百世之型宥罪蠲租錫萬邦之福禮隆闕里宏洙泗之宗風巡覽河渠奏平成之偉績敦行崇實彞訓早厲於黌宫廣額開科特恩遍加於多士乃至萬幾之暇每勤寸晷之功天藻成章契羲畫文言之奧鴻篇宣化符周情孔思之微宛轉揮毫運化工於掌上淋漓染翰散異采於行間極開物成務之能入毫芒而無間備顯仁藏用之德包宇宙而靡遺春秋合撰於清寧經綸同流於上下兹以載陽之月恭逢聖誕之辰淑氣氤氳涵河山而竝壽和風暢遂扇民物以交榮吉士虎臣綰綬映桃花之色黃童白叟稱觴霑瑞草之香億萬人仰頌堯年由於至性千百國欣瞻舜日本乎至誠既不召而自來亦無逺而弗屆盛德難名其所至嘉祥畢集以效靈臣志切嵩呼願同華祝聽鈞天於閬苑雲裏鏗鏘進瓊液於瑶池杯中瀲灧喜一人之有慶欣萬壽之無疆擊壤而歌莫竟九如之頌望塵而拜常賡五福之書鳳厯綿千祀欣逢景運隆瑶京祥靄合紫極瑞煙籠治越百王上功成一敬中太平多樂事率土效呼嵩其一聖王開治象元化重親親慈命常䖍凛徽音每恪遵養寧惟玉食樂更有天真瑞自璇宫育升恆慶萬春其二垂衣臻上理民物樂堯年和煦千花麗祥開萬彚妍謙如虛受谷勤若健行天皇極深宫建寰區文教宣其三至德光天地神威遍海隅風雷施自順干羽舞交孚虎旅千行肅編氓萬户蘇宸衷日乾惕億兆鞏皇圖其四德大能禋帝功成告碧霄神歆靈爽格心潔雨𤾉調七政祥光朗三辰泰象昭天庥應洊至南極一星朝其五聖壽當春晝祥光靄以熙林花迎綵仗陌柳映青旗浩浩恩長渥欣欣物自怡蓬萊今始到願進萬年詩其六萬壽詩七年律一首貢生臣潘光烘天開閶闔漏聲遲浩蕩春光獻壽巵萬國貢琛瞻舜日九衢擊壤樂堯時液池波泛蓬壺水玉殿春深閬苑枝鶴髮龎睂來輦下爭隨百獸舞彤墀萬壽詩七言律一首貢生臣俞忠謀玉繩灼灼紫微東庭燎髙陳萬炬紅五百昌期膺景命十千寶祚萃皇躬香飄丹陛爐煙細花映彤墀日色融翠管金絲歌萬壽康衢鼓腹頌維嵩萬壽頌貢生臣周龍藻聖人受命育才是亟元氣陶鎔太和充塞平格為徵思皇在國芃芃棫朴遇春斯榮蔚為國楨皇心以寧薪之槱之展也大成古亦有言生才實難豐芑之瑞叶於猗蘭移彼桂樹植我杏園日引月長羣生在宥如山出雲積而彌厚有人有文有孝有秀一人有慶萬邦來同東西南朔暢茂仁風堯舜在上如日方中穀成乂明才俊滿前麟遊鳳儀太和盤旋臣願皇帝壽萬萬年萬壽詩五言排律十二韻貢生臣張若霖景運中天㑹陽和大地春萬方欣聖澤四海頌皇仁大德膺多壽休徵協一人儀庭瞻鸑鷟遊藪見麒麟甘露時霑渥祥雲每郁紛明良歌合德草野鮮遺珍特渙求賢詔旁羅觀國賓春先攀桂子秋更躍龍津羣彥咸爭奮竒才盡獲伸盛朝多吉士聖主得賢臣濟濟思皇集綿綿純嘏臻芹私何以獻天保九如陳萬壽詩五言排律十二韻貢生臣龔克庸帝啓無疆歷人遊大地春金蓮徵瑞應珠斗協芳辰極建山河固乾行日月新自天方佑聖惟壽必歸仁羲畫開元㑹堯心運至神八紘同覆載萬象入陶鈞是處吹豳蠟頻年致鳳麟事由三宅又俗以屢豐淳異域遙輸貢靈祇近獻珍鸞書傳草澤鳩杖拜楓宸陪位身雖賤承恩地最親願常霑雨露嵗嵗奉絲綸萬壽詩五言排律十二韻貢生臣蔡汝齊望日趨丹陛呼嵩祝聖君璣衡頒舜歷星斗煥堯文晝漏三春永宵衣五夜勤九州四海逺一日萬幾紛德本同軒昊辭難贊放勳鳥聲晴谷弄花意暖風熏有草皆承露無山不出雲願隨耆老杖薄獻野人芹未得臣心展翻勞帝念殷溫綸百道下恩詔十方聞同樂天顔喜加科士氣欣遙瞻雙鳳闕瑞靄自氤氳萬壽詩七言律四首貢生臣吳鍾芬巍巍聖德信難名恭已垂衣撫四瀛寶籙久膺龍馬瑞卿雲長麗鳳凰城由來主極端皇建洵是宸修體健行嶽贊臣揚真莫罄康衢只有和歌聲其一淵淵聖學本傳薪洙泗真源振自今日旰退朝金殿暇夜寒尋緒玉釭深翻經豈直窺千帙探道從知惜寸隂還御邇英時講誦圖開太極見天心其二煌煌聖治邁前勳偉績豐功古未聞舞羽兩階苗自格導河九曲水能分時清麟鳳遊郊藪澤潤山川出雨雲翠輦時巡勤問俗不同簫鼓泛橫汾其三熙熙聖澤沛遐陬如海恩波到處流木鳳雙飛來闕下金雞三尺出竿頭花村茅屋歡情洽墨榜紅綾瑞氣浮大啓賢關垂盛典珊瑚網底一時收其四萬壽詩五言排律十二韻貢生臣楊儐皇恩深似海聖壽久齊天湛露和仙酒春風拂御筵上林花錦繡北闕瑞雲煙拜舞千官集共球萬國闐光華同日月宥密轉坤乾治嫓黃軒美心存太極先握符千億歷建極一中傳至德詩書頌神功泰岱鐫衢歌全盛日巷舞太平年錫福超三正覃恩遍八埏葵傾原待照芹獻本來田頌禱臣工職惟賡天保篇萬壽頌貢生臣張廷璐維皇御極大化涵濡德超羲昊治軼唐虞平成奏績一統車書河清海晏化日長舒恩周海甸澤洽寰區純嘏永錫受福孔訏萬壽無疆天地同符星輝南極春滿皇都雲生玉棟瑞靄金鋪千官虎拜萬國嵩呼瞻雲就日異域遐陬蒼黎黃髮擊壤含哺歡騰多士化雨𢎞敷名山蘭芷碧海珊瑚春華秋實盡入天衢作人雅化亘古所無既開曠典還定成模億萬斯年永固皇圖萬壽詩五言排律十二韻貢生臣于梓淑景三春麗鴻圖億載綿麟遊偕鳳舞璧合與珠聯聖主垂衣日熙朝紀瑞年至誠通鳥獸大智握璣璿聲教殊方暨勳華振古傳恩波融太液膏露湛甘泉文武恬熙久人民愛養全協風恆應候霖雨自霑田望嵗農祥見延齡梵唄宣霞香流玉斚旭彩映金蓮緑莢盈堯砌紅芝拱御筵小臣持獻祝壽域等長天萬壽賦貢生臣徐瑶繄昊天之右序實眷歆乎懿德稽古帝之相承至我皇其罕匹洽元㑹以當陽首庶物而建極格百神以懷柔奠九州而寧謐㑹八表之車書卜萬年之寶厯嫓覆載以參三超古今而獨立若乃綏猷以德致治以文求賢若渴賞善惟殷經經緯史耨義耕仁鈎河摘洛抉典搜墳羅書巖於星漢繪道藪於煙雲開石渠而講義敞虎觀以討論採春華而擷秋實振夕秀而挹朝芬陳辟雍之鐘鼓培泮宫之藻芹闢四門以穆穆宅三俊而彬彬於是運啓文明㝢當清晏蕩蕩堯天迢迢禹甸八風咸調三階竝燦歲德在已律應姑洗春日載陽時維中浣綺旭曈曨卿雲糾縵華渚流虹斗樞繞電西池則金母朝臨南極則老人夜見千官鞠􅛏以祝九如兆姓歡忭而賡復旦廷喧萬嵗之三呼戶慶六旬之初洊時則三靈衍祉萬彚呈禎九歌既勸百度維貞爰申㢲命載敕春卿詳稽典例愼簡司衡再行籲俊特舉賔興恩首覃於髦士澤先被乎儒生擴賢關於九域恢文網於八紘鳳翽與鷹揚交奮兔罝偕鴻漸同升京闈特隆乎首善列國咸樹之風聲紛乘時而利見誇稽古以知榮儲鹽梅於上國備舟楫於明廷期發皇乎鴻業用黼黻乎太平爾乃日月光華山川輝媚桃花浪暖杏林春麗聲傳岡上之梧香吐月中之桂文昌之宿宵澄太史之河曉靄化成久道恩溥德洋洪鈞鼓鑄協氣旁皇人文濟濟德造蹌蹌歌媚兹於藹吉賡一德於明良蓬島奉十華之帙遐陬陳八㑹之章螭陛羅九天之玉幣鑾坡萃萬國之冠裳莫不威威祗祗炳炳烺烺快覩天顔之有喜歡呼聖祚之無疆斯則我皇之壽兼祿位名而必得合熾富艾而益臧如日始升而正旦如漏初轉而未央將修容乎道德之圃彌性乎仁義之鄉翺翔禮樂之藪容與翰墨之場永遍覆夫八十一州之瀛海而豈惟逺邁夫萬八千歲之天皇也哉萬壽詩七言律二首貢生臣張紹懿紫殿筵開廣樂張太平天子萬年長彩霞繚繞凝青瑣瑞靄氤氲繞建章率土嵩呼齊獻壽普天華祝共稱觴星高南極光芒燦恆耀君王玉案旁其一如天聖德頌升平萬國衣冠拜帝京游泳禽魚咸自若扶踈草木共含榮綵棚錦布春城麗珠樹燈懸夜月晴得覲天顔真異數功髙德懋總難名其二萬壽詩七言律四首有序貢生臣王士錦欽惟皇帝陛下天祿萬年八表祝乾坤竝茂聖德廣被九州喜嵩嶽長春壽考作人玉宇煥文章之盛隆恩逮士辟雍歌雅化之長立君師之模範道貫天人集帝王之大成學通今古允文則詩書為苑囿而彌年闡究精微允武則仁義作干城而暇日嚴明訓練觀天文察地理無非哲人之游藝審聲音定律呂類皆至聖之多能河圖獻而洛書呈文明共集於當代景星出而慶雲現祥瑞較勝於昔時實千載之昌期真萬世之盛業今值春王三月欣逢聖壽六旬五十二年頌德歌功羣知思服千八百國瞻雲就日不約來同樂奏鈞天看鳳儀而獸舞恩周禹甸覩柳媚而花明在廷之夔龍賡歌仁壽遐方之士庶遙祝華封紫陌童謡皆成頌禱錦囊佳句盡是祈年壽比日月之升恆不必羡三皇之世如春五帝之世如秋而春秋常富福同山川之流峙不必執天干之數首甲地支之數首子而甲子恆周景運日新咸頌太平天子建極錫福齊稱有道聖人臣士錦世受皇恩常思仰報有心捧日無路登雲素守青箱幸際風雲之㑹常披黃卷每懷雨露之恩用是誠歡誠忭願效躋堂之頌敢不稽首頓首同稱萬壽之觥敬獻詩曰壽域𢎞開天地同逺來近恱效華嵩循環花甲乾坤久燦爛長庚景象隆蓂莢呈祥千葉翠蟠桃獻瑞萬年紅塗歌巷舞歡聲遍南朔無殊西與東其一慶雲燦爛滿堯天正值三春萬壽年桃栁爭妍迎輦路鶯花煥彩照瓊筵香濃黼座聆仙樂日暖龍池散瑞煙頤養冲和顔不老古今福德一人全其二南極星臨春晝長百千萬國頌無疆仙人早獻金盤露王母欣擕玉液漿聖壽臣民均感德天恩草木亦霑光籌添海屋誰能算一統車書廟略昌其三鴻膺寶厯慶長春中外歡呼賀六旬百老圖呈瞻瑞氣九如歌奏屆芳辰琪花夾路迎仙仗瑶草當階茁紫宸不必載賡金鏡録聖人仁壽自天申其四萬壽詩五言律二首貢生臣楊銘鼎昌時洪泰運寶厯與天長帝德高千古王功洽萬方臣鄰咸抃舞山嶽共呈祥仁壽初周甲賡歌樂未央其一垂裳端黼座列辟效呼嵩萬舞笙歌繞千燈日月同天香匝地起仙樂滿雲中既醉承恩渥陳詩達聖聰其二萬壽盛典初集卷一百八
