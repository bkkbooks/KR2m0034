body:
  text: 欽定四庫全書萬壽盛典初集卷一百二歌頌四十二教習進士館諸臣三萬壽詩七言律四首教習進士臣張秉亮厚澤涵濡遍萬方太平天子慶當陽東皇氣協春臺暖北斗文增帝座光建極無疆天久大膺圖有道日舒長兩階合聽雲韶奏仙管鏘鳴樂未央其一夀字凝煙寶篆縈惠風調暢播芳馨詠詩吉日聞庚戊占象祥星見丙丁德已參三行自健道惟得一體長寧璿源深濬川方至聖祚綿延億萬齡其二六服胥還古治淳如天聖德握洪鈞貞元際會周黃道景慶紛綸浹紫宸仁夀鏡懸軒厯永昭華玉效舜廷珍從兹章蔀增籌策咸五登三逈莫倫其三疆索𢎞開禹甸功東西南朔凛皇封輿圖辨壤金湯固朝集充廷玉帛通樹號萬年蟠上苑鼎垂億載炳層穹歡騰瀚海扶桑外茀祿天申佑聖躬其四萬壽詩七言律四首教習進士臣何隆遇瑞氣祥虹甲子新巍巍德業共尊親萬年寶厯承天眷五色祥雲捧聖人仁沐蒼生皆得壽恩流緑野總如春韶韺奏處披閶闔浩蕩郊原集鳯麟其一上林曉樹囀新鶯和入南薰慶阜成端拱松雲祥自集照臨函夏物咸亨蒼精早映華星朗黃道中懸瑞日明遙聽衢歌騰繡壤喜將耕鑿答升平其二屢頒綸綍浹春溫純嘏天心錫至尊一統車書同六合九霄景物煥千門南山峙作無疆夀滄海波流不竭恩拜手歡呼何所願惟應厯數並乾坤其三繞殿祥風拂紫煙葵誠敬上九如篇願同夀佛名無量長與靈椿紀大年蓂葉舒時增玉紀桃花開日燦瑶天球圖永奠如茨福歲歲霞觴進御筵其四萬壽詩七言律四首教習進士臣李五福瑞氣晨浮紫禁中春光聖化兩融融千官齊上升恆祝萬國胥還渾灝風樂奏鈞天翔彩鳯祥開華渚憶流虹五雲深處紅輪展喜溢龍墀拜舞同其一風物雍和氣候清由來乾德致升平韜鈐授處周戈戢疏瀹籌時禹烈成匝地陽春方浩蕩一天遲日正文明嵩呼自叶華封祝重譯占風萬里情其二閶闔門開逹四聰左圖右史在宸衷向明已敕庚先治乘暇猶存丙夜功頻有恩波盈蔀屋時聞康阜應薰風侍臣朝夕披青簡未必商周可比隆其三蓂莢呈祥泰宇明熙熙動植慶生成插天嶽鎮凝還峙亘古曦輪耀轉明擊壤羣思歌帝力育才何幸到儒生小臣忝附班聯後猶被青陽雨露榮其四萬壽詩七言律二首教習進士臣徐永祜泰符啓運慶中天一色霞光繞御筵玉厯初周堯甲子金甌永奠禹山川春融繡野祥麟舞日麗丹霄綵鳯旋復旦光華今再覩小臣歡頌九如篇其一治際雍熙壽域開鬱蔥佳氣滿蓬萊九重春色濃於錦五嶽呼聲殷若雷南極景星雲外燦西池仙果日邊來虹流電繞祥何限願進瓊瑶獻夀杯其二萬夀詩七言律二首教習進士臣畢潚璚雲芝蓋照宸居六十年來慶有餘睿藻紛披輝日月鴻圖鞏固萃車書太平人樂騰三祝純嘏天申頌九如符籙已傳周甲子紀年才是大椿初其一風光淡沱日華清又值堯年浹玉衡瑞露早隨仙掌湛彩雲時傍翠旗生六旬寶厯周還始五紀珠躔久愈明聖壽無疆徵大德不須金鑑助升平其二萬壽詩七言律二首教習進士臣髙鍾嶽浩蕩鴻恩被八荒欣逢聖節正迎祥璇璣久運經綸逺蓂莢新生化育長人在春臺歌復旦天開夀域遍遐方葵心向日歡無極敬頌升恆拜手揚其一追隨劍佩列班行閶闔晨趨曉色蒼暖日仙桃三月麗瑞煙寶鼎五雲光時逢華祝披仙籙遙聽嵩呼進御觴甲子初周瞻紫氣恩波從此共天長其二萬壽詩七言律二首教習進士臣景崙條風習習靄祥光物彩欣隨聖厯昌峻德日新同日麗遐齡天保與天長謳歌萬國霑聲教抃舞千官競拜揚瑶草琪花齊獻瑞九重端拱樂無疆其一蓂莢敷榮紫氣迎舒長化日慶文明根源精一皇心粹磅薄垓埏帝業宏萬歲聲呼綿寶籙五雲色燦映金莖小臣欲獻南山頌長附鵷行慶太平其二萬壽詩七言律二首教習進士臣黃之綬巍峩聖德逈難名瑞氣舒為寶厯禎學裕緝熙天並健化徵悠久物咸亨武功永勒河山壯文教常懸日月明花甲才周渾未艾添籌預欲指東瀛其一千門向曉百花紅虎拜山呼絡繹同夾路縈回香靄細分曹祈祝好風融謳歌想見皇情豫宵旰彌增帝業崇豈獨神畿情倍切歡騰早已遍寰中其二萬壽詩七言律二首教習進士臣凌霄玉帛充廷共拜揚虹流嘉慶記禎祥天開寶厯經綸逺人際昌期日月長夀域鴻庥滋雨露春臺遍德樂耕桑郊原一望平如砥遐邇同稱萬歲觴其一遙看霽旭擁祥煙花舞鶯歌拱御筵早喜共球𢎞禹甸却逢花甲慶堯年嵩呼處處歌謡地華祝村村熙皥天幸際聖朝𢎞樂育相隨拜舞玉墀前其二萬壽詩七言律二首教習進士臣三格玉觴齊介九重春令節觀光慶典新瑞叶祥麟遊上苑歡隨儀鳯拜楓宸華封遍效三多祝箕範長兼五福陳從此萬年膺百祿恩波纍世戴皇仁其一擊壤喧闐聽逺謳九區同慶綘虹流晴光乍向罘罳拱瑞靄髙臨藻火浮輦路共球來萬國軒庭寶厯誦千秋鈞天仙樂聞何處應有青鸞集鳯樓其二萬壽詩七言律二首教習進士臣歸璉欣然此日見唐虞縹眇祥雲擁帝圖厯數宜同山嶽永恩波久共海天敷絪緼萬象陽和溢炳耀三階泰運符民物咸登仁夀域試聽歌詠遍寰區其一九重佳氣日清醇亘古長年屬大椿華祝才逢周甲始嵩呼更遇起元新雲垂玉葉輝丹闕露滿金莖近紫宸為頌升恆綿寶算歡聲雷動洽臣民其二萬壽詩七言律二首教習進士臣竇祖禹閶闔連雲紫氣浮太平玉厯甲初周瑶階遍長春秋莢海屋新添日月籌萬國嵩呼通帝座千官華祝拜宸旒草茅幸傍夔龍後遙聽簫韶奏鳯樓其一瑶樞明潤耀星躔旭日融和敞御筵到處春光彌宇宙呈來瑞氣出山川箕風畢雨休徵應舜厯堯蓂寶籙傳薄海羣生登夀域千秋萬歲樂鈞天其二萬夀詩七言律二首教習進士臣劉大輹罘罳瑞靄入宫槐繚繞爐煙綵仗開丹鳯翔雲臨太液金鰲捧日出蓬萊萬年春色增籌算八表歡聲進夀杯東鰈西鶼重九譯都緣嵩祝聖人來其一螭頭宫漏曉遲遲正值稱觴玉扆時曠代榮光逾鎬飲無疆祝頌叶豳詩東皇氣扇蒼龍駕北闕風熏赤羽旗偏幸薪槱王化逺小臣長此頌鴻禧其二萬壽詩七言律二首教習進士臣韓三善丹地金鋪淑景新無疆福祿自天申車書一統遵皇極雲日千秋捧紫宸南極華星常獻夀東皇茂莢總添春青疇緑野寬無際湛露年年福兆民其一萬户謳歌三月天鳯城桃柳曉含煙陽春盤礴垓埏外聖厯舒長羲昊前化日悠悠聞擊壤仁風藹藹動揮絃春暉寸草知難報虎拜同賡保定篇其二萬壽詩七言律二首教習進士臣王鈞湛露春陽淑景融九重嘉慶萬方同碧空天樂來雲際紅綻仙桃出禁中華渚鍾祥傳貫月瑶房獻瑞憶流虹由來聖厯符天地殊愧封人祝未工其一川嶽懷柔競效珍箕疇諸福自咸臻四維奠定恢疆索萬國梯航奉聖神道統淵源洙泗接文章璀璨日星陳我皇天錫多純嘏共向楓宸慶大椿其二萬壽詩七言律二首教習進士臣劉軼政如天聖德握鴻鈞萬國衣冠集此辰世際平成欣禹烈人遊熙皥慶堯仁羣工天保歌應遍率土華封祝更新從此皇圖綿億載升恆日月慶長春其一靉靆祥雲霽景鮮鏘鳴廣樂奏鈞天傳來寶厯膺三萬聞道靈椿紀八千海外行添籌作屋樽前還兆福如川鵷班拜舞情何限共效嵩呼繞御筵其二萬壽詩七言律二首教習進士臣王瀛重熙帝德樂無疆猶記瑶樞繞電祥鳯厯一周天並永龍飛萬載日俱長西山紫氣輝金戺北闕紅雲捧玉觴喜溢臣鄰同拜舞願賡天保九如章其一龍樓瑞色曉曈曨沐浴皇仁五紀中環海舒長同化日普天翔洽慶和風桃開御苑環青瑣樂奏雲門響碧空身際太平何報稱欣隨鴛鷺效呼嵩其二萬壽詩七言律二首教習進士臣鄒啓孟春深丹陛日舒長瑞擁明霞五色光有象太平歌擊壤無為至化紀垂裳桃成瑶圃千年實露湛金莖萬歲觴欲向箕疇推甲子聖朝厯服邁羲皇其一上苑春和放柳條蔥蘢佳氣上璇霄綿長寶厯天同永朗潤瑶樞日並昭綺殿薰風宣帝德光天復旦應民謡碧空彩鳯看翔集為是元聲奏九韶其二萬壽詩七言律二首教習進士臣髙澤宏鳯闕雲開日正長霏微香靄進霞觴千官虎拜天顔喜萬國嵩呼帝道昌輝映山川俱獻瑞榮敷草木競呈祥小臣才薄慚豳雅敬撰巴詞佐頌揚其一璇宫甲子慶初周海屋方添第一籌曼倩金桃來閬苑安期瓜棗貢瀛洲鶯聲囀處雲璈奏花色明時玉液浮從此春光和聖節年年愷宴侍螭頭其二萬壽詩七言律二首教習進士臣牛元弼萬年純嘏自天申寶厯重周祝帝辰瑞氣氤氲籠雉尾祥光靉靆耀龍鱗作人廣益姬圖壽蠲賦洪霑禹甸春更識蓬萊多景色拜揚王會抃臣鄰其一熙皥淳風景福綿升平人樂太和天金桃熟後三千歲寶鼎傳逾億萬年小草與霑雲表露褎衣喜拂殿中煙聖朝慶溢三多祝忝附衢歌獻頌篇其二萬壽詩七言律四首教習進士臣李慎修甲癸重周夀域開彩雲喜傍紫宸回晴光暖入金莖露花氣濃熏玉液杯淡泊和聲諧律吕鬱蔥佳景見蓬萊昌期千載真難遘遙聽嵩呼動地來其一聖世崇文典獨優作人雅化遍薪槱杏花早沐三春露桂子還分八月秋十載增科驚曠舉萬年定例重旁求多才喜際明良會雲漢章天映九州其二深宫無逸為勤民浩蕩洪波沛澤均六合輪期蠲正稅三年無地不陽春雲瞻北闕叨光久酒對南山獻頌新為樂普天登夀域薰風一曲見皇仁其三紫氣蔥蘢自上清人間物物荷生成東琛西賮偕春集畢雨箕風應候平純嘏仰承大造眷歌衢俯順老農情聖皇厯數符天運聽取三呼萬歲聲其四萬壽詩七言律二首教習進士臣侯靖翔洽和風溥萬方欣逢聖節屆春陽功超法象乾坤大手握禎符日月長疇範胥歸皇有極升恆相慶壽無疆龍樓直與蓬山接桃實應供萬歲觴其一道協貞元養太和華封寧止祝三多中朝共賀千秋厯髦士爭歡萬壽科詔出紫宸垂湛露人依丹闕沐春波試看淑景籠佳氣燎火光中響玉珂其二萬壽詩七言排律十二韻教習進士臣劉正逺紫極光臨北斗邊虹流華渚紀星躔花開初旭迎宸幄桃熟深春上御筵景運升平方履泰皇心欽翼正乘乾三皇厯數咸踰萬六甲干支幾邁千合德真符天地永膺圖直剖混濛前梯山航海同文治甘雨和風大有年明並日輪懸舜日治賡天保戴堯天恩垂膏露江河潤聲動歡呼嵩嶽連靈物應圖胥在囿休嘉洊至更如川九重鵷鷺爭呈瑞百卉芳菲並吐妍羲畫一元貞復始箕疇五福夀居先小臣願獻華封祝擊壤髙歌復旦篇萬壽詩七言排律十韻教習進士臣楊森秀垂衣廣運德難名率土歡娛戴聖明獨闢乾坤恢帝宇髙懸日月耀神京圖書益闡苞符祕禮樂胥歸冶鑄精極建中和時用泰道兼悠久物咸亨淳風自返閭閻古氛氣全銷海甸清已見堯階生瑞莢更開瓊圃産華平越裳以外還重譯韶舞於今復九成糾縵卿雲浮黼座濃瀼瑞露滿金莖花迎柳拂三春節華祝嵩呼萬國情從此年年賡保定無須海上訪蓬瀛萬壽詩七言排律十四韻教習進士臣于棻品彚鮮妍並效祥乾行久協帝圖昌山河旋壯罘罳色日月平增藻火光鳯厯紀元春並永龍廷對景晝方長福如岡阜休徵協道邁羲皇景運康文治星辰森布列武功雷電合成章廟堂敕典偕三事蔀屋流膏潤八荒已奏平成同有夏還欽厯象嫓陶唐域中輯瑞圖王會海外歸忱隸職方四表歡心騰壤甸三階瑞氣炳穹蒼仙桃結子春三月御柳垂條歲萬行晴旭早迎金榜煥曉花時傍玉爐香風輕繡壤馴青雀水暖瑶池下彩凰周雅頌揚陳保定虞廷愷豫慶明良小臣謭陋安能賦惟願齊天介夀觴萬壽詩七言截句八首教習進士臣吳振鎬解澤欣同湛露垂春光聖化兩融怡箕疇五福相傳久未若吾皇萬福宜其一如天如地荷生成萬國歡娛慶太平遙聽嵩呼三萬歲何須候氣問東瀛其二東風入曲轉南薰寶篆香縈夀字紋遙見龍輿徐度處繽紛五色總祥雲其三海日騰光照御筵花如錦繡柳如煙芙蓉春殿開芳宴不數蟠桃會裏仙其四夀星躔次曜辰宫明潤天街一望同寶厯祥開新甲子扶桑旭日看初紅其五並戴堯天樂未央千官齊奉萬年觴時和歲稔天顔喜夀域真看遍八荒其六南北東西文命敷起占瑞氣滿寰區梯航鶼鰈來重譯勝似當年禹會圖其七山色遙臨帝座尊九微燈火徹天門和風甘雨為民瑞地久天長戴聖恩其八萬壽詩七言截句八首教習進士臣王珍盤礴和風遍八埏欣逢聖節益熙然上林春色花如海競吐芳菲拱御筵其一無邊柳色映青旗桂月榆星獻瑞時天為吾皇開夀域春光多上萬年枝其二仙掌承天曉露漙鏘鳴劍珮擁千官祥光縹眇藏金闕瑞靄縈回護玉鑾其三瓊枝滿酌貯流霞一色香清四照花率土普天同拜舞願將聖厯比恆沙其四幾暇披圖日影遲心源道岸接軒羲乾行不息符天運厚德無疆鎮地陲其五綿長何物紀春秋甲子循環億萬周想得仙人臨海屋每逢聖夀為添籌其六千門相聚頌升恆皇極平康協庶徵恰勝觀燈元夕會星橋火樹一層層其七澄徹三階應候平歲星遙拱帝垣明年年長日光風裏遙聽嵩呼萬歲聲其八萬壽詩七言截句八首教習進士臣李祖望睂壽常居萬福先頻將甲子紀堯年功成治定恩施普仁覆蒼生德配天其一得一能為天下貞卿雲燦爛肇文明垂衣端拱彰君極久道由來化自成其二咸五登三德本侔功施上下與同流髙明博厚兼悠久綿歷皇圖億萬秋其三深仁厚澤洽臣民僻壤遐陬化被均令德從來歌保佑一人有慶自天申其四瑞氣氤氳燦物華上林春色逈如霞蟠桃一熟三千歲為報枝頭始放花其五虹流電繞叶禎祥壽域𢎞開遍八荒鷺序鵷班多燕喜年年拜手祝無疆其六袍染春羅柳汁新菁莪長此荷陶鈞榮光五色章天漢萬壽君王廣作人其七華封此日祝三多噓拂薰風鼓太和四海共登仁夀域萬年天子樂卷阿其八萬夀詩七言截句八首教習進士臣郁瑞夀域天開甲子新堯階蓂莢恰三春太平樂事陽和滿萬國歡騰拜聖人其一九重春暖氣氤氲鳯闕班齊綵仗分匝地嵩呼同介夀綘霄玉座擁彤雲其二南極華星映紫微文明覃被有餘輝欣瞻堯舜垂裳日雲漢光昭遍九圍其三上林花發正芳時雨露涵恩湛湛施無限春風桃與李托根都傍萬年枝其四日麗中天仰照臨天心原是兆民心太和一氣洪鈞轉永荷生成帝造深其五河山錯繡拱金湯處處陶成仁夀鄉任使八方聲教逺貢琛重譯祝君王其六祥徵長發協苞符獻頌多隨闕下趨麟趾從來歌盛世無疆景福慶皇圖其七層霄瑞靄氣蘢蔥至德潛孚總化工卜厯自應過億萬簫韶聲裏奏薰風其八萬壽盛典初集卷一百二
