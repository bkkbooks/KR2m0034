body:
  text: 欽定四庫全書萬壽盛典初集卷二十七恩賚四加恩耆舊一康熙五十二年三月聖壽六旬直省致仕大臣及詿誤罷歸者咸詣京師八旗文武勳舊下至廢將退卒踴躍朝賀十二日己丑上命來京諸臣內有詿誤者年六十以上酌復其官大學士臣溫達等謹奏為欽奉上諭事康熙五十二年三月十二日奉上諭今嵗來京年老之人甚多此內除本身特犯私罪外或有因公詿誤降級革職者酌量復還原品似應於十八日令其隨班行禮大學士九卿等公同㑹議即行奏聞欽此恭惟我皇上寬仁厚德優渥無加中外臣民均霑靡已兹降級革職年老之人俱各欣忭自數千里奮勉來京特為聖主六旬大慶以期瞻仰天顔祝頌萬壽者誠因受恩深重感戴諄切之所致也皇上復廣宏仁寬宥罪愆還其原品於萬夀正誕令隨現任臣工班列行禮實亘古未有之曠典不惟獲罪之人得霑異數感激歡忭即現任臣僚靡不欣躍既奉諭旨殊恩應察明各省來京年老之人除原品解任者令其照常行禮外其降級革職之人還其原品於十八日朝賀令入廷臣班次行禮俟命下臣等即將姓名情罪逐一詳查另奏請㫖定奪奉旨依議三月十五日大學士九卿等摺奏臣等遵㫖㑹同問明各省來京人員年嵗并詳查犯罪緣由除年不及六十犯重罪近日革職者不開外今將年老之文官李録豫等二十三人武官王世臣等二人姓名開列具奏此內何員應復還原品頂帶之處伏候上裁奉旨原任提督王世臣原任侍郎李録豫彭會淇原任副都御史勞之辨原任諭德楊大鶴原任御史袁橋鹿賔原任院使孫之鼎原任署正邢儼原任知府章文鐄原任通判趙命任原任知縣沈宗潢俱給與原品十五日壬辰命八旗官貟詿誤罷職者年六十以上亦與酌復大學士臣溫達等謹奏為欽奉上諭事康熙五十二年三月十五日奉上諭漢官內年逾六十者俱已查明施恩滿洲䝉古漢軍官貟著亦照此例查奏欽此欽遵臣等行查八旗公同詳查犯罪緣由除曾擬重罪者不開列外遵旨將六十嵗以上官貟職名並犯罪緣由開列具奏此內何貟應復還原品頂帶之處伏候上裁俟命下之日准令隨班行禮可也奉㫖依議十六日大學士九卿等摺奏臣等遵㫖㑹同查明八旗滿洲䝉古漢軍犯罪官貟緣由除曽擬重罪者不開列外將六十以上原任尚書阿山等一百二十三人原任都統齊式等四十八人姓名開列具題此內何貟應還原品頂帶伏候上裁奉㫖原任尚書阿山郭世隆原任總督石文晟喻成龍原任侍郎常書敦多禮巴錫戴都禮多奇原任巡撫王國昌許嗣興原任府丞李法祖原任御史穆書邁色舒述布原任郎中金達善碩木鼐原任知府王興逺范承訓姜承基原任員外郎范時彥李勳黑色禮李起鰲陳懷德北京塔海原任主事吳拜原任治中吳泰原任知縣蒲敏政徐秉元楊起鳯原任都統齊式扎拉克圗原任一等侍衛烏勒原任二等侍衛塞勒原任參將蘇繼武原任拖沙喇哈番費雅哈查林原任步軍校薩海原任防禦綽英額原任守備張興文原任驍騎校多奇俱著給與原品是日奏事治儀正儍子等又捧出御書諭㫖交與吏部尚書富寧安等欽遵諭㫖曰朕所知大吏及七旬以上者理當給與原銜或有當年少時得罪並無效力而又年嵗未及七十者有何功勞亦給與原銜乎十八日乙未上御殿受朝賀致仕大臣及年六十以上復職官員並隨班行禮是日頒恩詔録舊勞恩詔內開一先年出征人內有功牌應得官者除抵軍罪外其守雲南城及在隴州控告不准叙功人等所存無幾今皆老邁不能效力兹遇覃恩著兵部查明仍行補叙一年尚未老傷廢辭職官貟及傷廢退甲兵丁酌給錢糧米石二十一日戊戌命給原任吏部尚書徐潮等封䕃本月二十三日吏部尚書臣富寧安等謹奏為恭逢盛典仰籲皇仁事准原任吏部尚書兼管翰林院掌院學士事致仕徐潮等奏稱竊臣等幸際昌明欣逢聖壽當六旬之大慶協萬國之歡心中外臣民秉赤誠而來輦下祝三多而頌九如者以億萬計德音誕布解澤旁敷浩蕩難名洪􅊏畢暨真亘古帝王之所未有也苐臣等係致仕候補之員皆未得與邀恩之列伏思萬壽覃恩普天臣庶盡以霑沐為榮臣等自翰林洊至崇班俱荷聖明格外知遇今復躬逢盛典獲與在廷諸臣同效嵩呼實屬大幸不揣冒昧仰懇皇上廣錫類之仁慈溥作忠之教澤俾臣等數人隨現任京官遵照詔款一體霑恩臣等舉家世世益戴髙厚於無既矣等因具摺於康熙五十二年三月二十一日交與奏事治儀正儍子等轉奏奉旨伊等於大慶朝賀而來理當給與著交與該部欽此欽遵查定例內告病丁憂給假候補等官不在現任不准封等語原任尚書徐潮徐元正原任侍郎仇兆鰲原任學士王之樞顧恱履俱係年老告病丁憂之員例不准封不准䕃監今原任尚書徐潮等五員既經具奏請照現任京官一體霑恩應將伊等照現任京官一體止給封誥停其照依現任京官給與䕃監可也奉旨伊等為朕大慶自逺而來人亦不多著照伊等職銜照現任京官並給與䕃監二十五日壬寅賜直省老人宴於暢春園致仕大臣及復職官員年六十五以上並預宴賚有差終宴特宣諭㫖加授原任吏部尚書宋犖原任禮部侍郎田種玉宫保大學士臣溫達等謹奏為欽奉上諭事康熙五十二年三月二十五日臣等接讀皇上硃筆諭㫖這年老諸大臣內於世祖章皇帝時居官者惟宋犖田種玉而已今年齒老邁雖閒居林下朕覩之不禁軫恤宋犖現有尚書品級在身田種玉著給與工部尚書銜俱准給誥封宋犖田種玉著酌加宫保以示朕不忘耆舊之至意欽此恭惟皇上篤念舊臣恩禮優渥凡屬臣僚銜恩戴德者五十餘年矣兹以宋犖田種玉係世祖章皇帝舊臣年齒髙邁特沛隆恩田種玉居家已久既還原職復加尚書且均與誥封榮及祖先而又令酌加宫保此不獨身受者銘佩髙厚在廷百爾臣工亦皆感激歡忭頌皇上之垂眷耆老始終不替即豫告投閒莫不寵錫隆厚有加無已誠千古之僅遇史册所罕覯也其作何酌加宫保之處應交與吏部察例具奏為此謹奏請㫖是日命給原任護軍統領洪海等封䕃二十五日原任護軍統領洪海原任尚書馬爾漢凱音布安布祿范承勳原任都統查拉克圗散秩大臣薩布素博第等奏為恭逢盛典仰籲皇仁事繕摺授奏事治儀正儍子等轉奏奉㫖薩布素新近給與散秩大臣品級停其給與封䕃餘著給與原任都統七十奏為懇祈洪恩事繕摺授奏事治儀正儍子等轉奏奉旨著給與封䕃四月初一日戊申上召集諸王貝勒管侍衛內大臣部院大臣都統先鋒統領護軍統領副都統等命查五大臣十六扎爾固齊世襲子孫內有詿誤削職者悉復其爵四月初一日諸王大臣等面奉上諭今日齊集爾等朕想有數件事朕若不說亦無人敢說朕外亦無人知此事所以傳集爾等下旨我朝行間效力大臣其勇無過於鰲拜者其效力之處現在檔案中朕常向侍衛大臣言之念其效力欲與世職因其子那摩佛所生之子達禮善達福皆糊塗不堪所行甚亂不與官職但鰲拜效力之處甚明應給世職令伊弟兄中承襲可也再五大臣內蘇萬扎爾固齊彭城公之祖鄂善之祖現今俱有官職鑲藍旗順科洛巴圗魯安費揚古效力之處曽經裁去今阿靈阿之祖額宜都巴圗魯效力之處實録所載甚明現今陪饗太廟似此效力之人身後子孫因罪革職誥命敕書俱皆遺落伊等皆太祖太宗皇帝時創業輔佐功臣子孫治罪並牽連情由不忍將效力所得之官削去此乃朕之明知查出當給官職并五大臣十六扎爾固齊內詿誤獲罪革職及得官子孫承襲因罪革職者亦當明白查議此等之處不便入於恩詔今遇此大慶爾等公同查明確議具奏康熙五十二年四月二十四日和碩裕親王臣保泰等謹題為欽奉上諭事該臣等查得原五大臣內額宜都巴圗魯因效力有功曽授左總兵官身故後將伊子鄂必隆襲為精奇尼哈番因詿誤將所襲之官革退今上諭額宜都巴圗魯係創業輔佐功臣現今陪饗太廟因詿誤獲罪不忍將伊效力所得之官革去應給與世職又查得原五大臣內順科洛巴圗魯安費揚古隨從太祖皇帝行間效力未在得官之列世祖皇帝御極時曾授其二子為拜他喇布勒哈番今上諭順科洛巴圗魯安費揚古係創業輔佐功臣其效力之處曽經裁去應給與世職又查得鰲拜巴圗魯因其功甚大順治九年由一等侯又一拖沙喇哈番特授為二等公康熙六年由二等公授為一等公後因獲罪革去今上諭鰲拜行間效力諸大臣中無有出其右者應給與世職此三人子孫應與何官之處伏乞聖裁如䝉恩賜官職鰲拜巴圗魯之孫達禮善達福不襲外查伊弟兄之子孫并額宜都巴圗魯順科洛安費揚古之子孫交與該旗引見為此謹題請㫖五月初二日奉㫖額宜都巴圗魯著給還伊原品精竒尼哈番安費揚古現有兩個拜他喇布勒哈番著添給一阿達哈哈番鰲拜其罪甚明朕念其效力著給一阿思哈尼哈番餘依議初四日辛亥命給原任禮部尚書許汝霖等封典四月初四日吏部尚書臣富寧安等謹奏為恭逢盛典循例懇恩事准原任禮部尚書加一級致仕許汝霖奏稱竊臣一介寒儒屢䝉破格洊陟卿班康熙四十九年冬引年乞休重荷溫綸致仕歸籍兩年無日不拜祝萬壽欣遇六旬大慶匍匐趨叩以表微忱不敢妄有所冀今伏讀恩詔內有封贈入監大典優禮臣工普天同慶昨原任吏部尚書臣徐潮等五人具摺奏請欲隨現任京官遵照詔款仰懇均霑幸䝉俞允千載一時臣思三品以上致仕諸臣與徐潮等一體者祗臣一員若不循例上請是自外於生成重負聖天子推恩之至意矣為此謹奏伏祈睿鑒敕部施行等因具摺於康熙五十二年三月二十三日交與奏事治儀正儍子等轉奏奉㫖該部議奏欽遵到部又准原任户部尚書王鴻緒奏為恭遇我皇上六十萬壽千古以來莫大之榮慶我皇上加恩中外亦千古以來未有之曠典凡在臣工皆邀隆澤致仕尚書臣徐潮等具摺上請並荷洪慈准給封贈送子入監臣前任經筵講官戶部尚書加七級䝉聖恩以原官解任回籍今赴闕嵩呼幸遇慶典竊思解任與致仕者俱屬原官事同一體若不比例陳請是虛負聖天子推恩之異數矣為此謹奏仰祈皇上均賜浩蕩一視同仁則臣生生世世感戴天恩於無極矣等因具摺於康熙五十二年三月二十四日交與奏事治儀正儍子等轉奏奉㫖該部議奏欽遵到部查定例內告病丁憂給假候補等官不在現任不准封等語許汝霖係原品致仕之員應照現任京官止給封典停其給與䕃監王鴻緒係原官解任之員停其給與封典可也奉㫖伊等既遇大慶著給與封典原非現任京官停其給與䕃監初十日丁巳加授原任吏部尚書宋犖為太子少師原任禮部侍郎田種玉為工部尚書太子少傅四月初七日吏部尚書臣富寧安等謹題為欽奉上諭事該臣等議得內閣大學士溫達等奏稱臣等接得皇上硃筆諭㫖這年老諸大臣內於世祖章皇帝時居官者惟宋犖田種玉而已今年齒髙邁雖閒居林下朕覩之不禁軫恤宋犖現有尚書品級在身田種玉著給與工部尚書銜俱准給誥封宋犖田種玉著酌加宫保以示朕不忘耆舊之至意欽此查品級考開太子少師太子少傅太子少保俱係正二品內閣部院大臣督撫加銜宋犖原任吏部尚書田種玉今給工部尚書職銜應將宋犖加授太子少師銜田種玉加授太子少傅銜謹題請㫖本月初十日奉㫖宋犖加授太子少師田種玉加授太子少傅十三日庚申命給原任閩浙總督梁鼐恩䕃四月十三日吏部尚書臣富寧安等謹奏為叩懇聖恩事准原任福建浙江總督梁鼐奏稱竊臣世受國恩至深極重犬馬報效之忱未能仰盡於萬一欣值我皇上六旬萬壽普天同慶臣在籍䖍誠齊沐匍匐來京重䝉恩眷被飫殊榮撫衷激切何敢復有陳奏因恭讀恩詔內開文武在外三品以上各送一子入監讀書又降級罰俸等官俱著開復綸音涣布寰宇均霑凡現任內外臣工三品四品以上者俱得䝉䕃一子臣受恩優渥冀邀一視之仁再臣前於閩浙總督任內有降二級戴罪圗功一案並懇聖慈恩准開復在臣矢塗肝腦於畢生臣子并切捐糜於世世伏乞皇上睿鑒謹遵恩㫖具摺奏聞等因於康熙五十二年四月初八日授奏事治儀正儍子等轉奏奉㫖交與該部議奏欽此欽遵到部查定例內告病告假丁憂候補等官不在現任不准封等語乂定例現任官員降級留任者三年無過准其開復等語原任閩浙總督梁鼐係降二級留任戴罪圗功今已丁憂離任非係現任之員其䕃子復級之處俱無容議為此謹奏奉㫖梁鼐自逺而來准其一子送監讀書所降之級不必給還萬壽盛典初集卷二十七
