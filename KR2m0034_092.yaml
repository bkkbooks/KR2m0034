body:
  text: 欽定四庫全書萬夀盛典初集卷九十四歌頌三十四詞臣二十六萬夀無疆賦有序翰林院庶吉士臣李如璐臣聞衡正階平允矣皇王氣象日華雲爛煥乎天地文章蓋參贊經綸合三才而建極斯祿位名夀亘萬古而常新德邁黃農率土樂岡陵之算齡齊虞夏普天近日月之光華祝歡騰嵩呼抃舞欽惟皇帝陛下手握璿圖心涵穹蓋內聖外王之學至中至和經天緯地之功乃文乃武萬物得所舉昆蟲草木樂春臺四方攸同統南北東西登夀域此清寧合撰遐齡其覆載俱長保佑常申聖夀與地天交泰者矣臣樂生隆盛幸荷甄陶仰瞻華渚之虹爰效康衢之頌其辭曰維貞元之既合集聖主之鴻休鞏輿圖以受瑞綿玉厯以垂旒明庶物而察人倫理抉天根之奧亶聰明而作元后心探月窟之幽竒偶圖書知一畫開天之始危微精一見厥中允執之由羲軒堯舜之傳函三五而皆歸聖學商周鄒魯之緒作君師而覃布皇猷溯濂洛徹源流辨朱陸别薰蕕大德日新合古今而一貫至誠無息與上下而同流且也天縱多能左宜右有鳯翥鸞翔之瑞苞采呈毫川流嶽峙之書權衡在手赤文緑字衍全數於九疇天祿石渠探羣書於二酉蓬萊殿內開映日之龍章太液池邊結古文之蝌蚪炳然雲漢之麗天儼若星辰之環斗上同球璧而稱珍長懸日月而彌久矧夫誕敷文德大展雄圖物阜民安扇薰風於宇宙垂裳端拱奏大化於唐虞星掃欃槍廓緑水天山之界圖成王會盡雕題鑿齒之徒察大吏以安民共凛知人則哲蠲兩租而賜復均霑大澤𢎞敷圜土屢空久洽好生之德賢書迭進廣開登俊之塗無小無大咸霑雅化如綸如綍共仰王謨以故諸祥輻輳萬象光昌澤馬器車皆呈地寶景星慶雲並耀天章噦噦鳴郊鳯有五苞之采英英度曲芝含三秀之房嘉禾連莖而獻瑞玉泉合醴以稱觴揲羲䇿於先天方開景運展堯蓂之三莢乍應青陽願戴一人而長歌有道欣逄萬夀而共慶無疆於是時也禁苑開雲衢歌匝路夾花柵於御道雷動歡聲散麗色於皇州錦纒春樹觀開鳷鵲直在雲霄樂奏仙璈疑聞韶濩瞻雲就日盡傾葵藿之心抒筆陳辭敢上太平之賦萬夀詩七言律一首翰林院庶吉士臣楊湝六合清寧寶厯新八紘歡忭拱楓宸靜調玉燭星辰正快覩金甌海嶽春寰宇早教歸化育羣生何處不陶鈞從知億萬斯年算甲子初周第一巡萬夀詩五言排律二十韻翰林院庶吉士臣沈世屏安貞祥應地廣運德先天至治隆千古昌時厯萬年維皇膺寶籙叶瑞紀珠聫淑景循黃道榮光幕紫淵崇卑通默契精一啓真詮學已高前聖仁尤遍八埏盈寧人盡樂汪􅐮賦恆蠲蒼赤痌瘝切要荒雨露偏平成恢禹績解阜應虞絃蘋野興羣䇿梧岡藹衆賢山陬欽日厯澤國靜風煙駿業辭難贊鴻禧理自延誕辰當六帙協氣繞三躔綵仗晴霞護金爐寶篆連緋桃原似斗碧藕羡如船貢篚來重譯恩波會百川冠裳依闕下韶濩舞階前華祝歡無限嵩呼意更虔陳符方履泰觀象得純乾神與人胥洽名將夀共綿萬夀詩七言律四首翰林院庶吉士臣夏慎樞曈曨朝旭麗芳辰喜見卿雲拱紫宸聖夀久長開七甲天光妍暖正三春芝浮瑞彩稱神草樹載嘉名記大椿自是歡心孚萬國謳歌長共嵗華新其一八表欣逢燕喜時無疆萬夀祝同詞春深上苑鶯頻囀樂合鈞天鳯自儀垂拱經綸髙紫極梯航拜舞溢彤墀恩波若欲論汪濊滄海猶難比聖慈其二宵衣旰食總乾綱健法天行本自強萬世日星瞻事業九重雲漢仰文章金根巡省人心樂玉燭調和國步康每繪豳風誦無逸八方夀域慶綿長其三廣運功由久道成虞琴揮處太階平九河清兆千年瑞五嶽歡同萬嵗聲籌滿東溟占益夀星輝南極驗長生小臣敬效華封祝率舞欣隨百獸行其四萬夀詩五言排律四首翰林院庶吉士臣舒大成玉燭輝皇極璿樞拱紫宸九重天闕迥六宇嵗華新開泰文明啓膺圖眷佑頻瑶光紛綺陌旭日藹芳辰鐘鼓層霄上衣冠率土濵試看仁夀鏡萬象已同春其一帝德兼文武神謨軼禹湯人遊春浩蕩化共日舒長大業光霄漢深宫尚就將圖書開祕籥風雅麗宸章瑞草呈三秀卿雲覆八荒香風吹玉砌載詠萬年昌其二盛世咸遵路皇威在止戈兩階曽試舞七德蚤成歌過化雷霆速流形雨露多好風蓮漏轉深殿栁煙和鳯吹傳金管龍池響玉珂小臣同拜手太液沐晴波其三雲日天顔近山河夀域開祥煙浮上苑佳氣自蓬萊翠陌流鶯囀彤庭舞鳯來平成歸夏甸民物陟春臺花雨逄三月恩膏遍九垓未央歌管徹長進紫霞杯其四萬夀詩七言律二首翰林院庶吉士臣林景拔聖主乘乾景命新昭陽紀嵗啓昌辰羣黎遍德歡心洽八表同風雅化醇夀屆六旬凝帝祉躬膺百福慶天申欣看雲陛稱觥日上苑花明大地春其一敷天同頌主仁慈草木都霑雨露滋鳯詔屢頒恩浩蕩鴻鈞遍覆景昭垂人當擊壤歌衢日士詠吹笙鼓瑟詩最是太和多順應祥風披拂萬年枝其二萬夀詩七言律二首翰林院庶吉士臣潘祥連珠合璧見中天絢爛朝霞敞御筵萬國歡呼依舜日千官抃舞慶堯年花迎喜氣浮宫殿鳥解歌聲應管絃甲子從兹周萬祀升恆敢獻聖人前其一帝德巍巍集大成日華雲爛慶升平心符造化深仁洽學究精微至道宏簪紱從來慙世受草茅何幸沐恩榮欣逢誕節殊無報願祝三多答聖明其二萬夀詩五言排律二十韻翰林院庶吉士臣莫與及福從皇極斂春共物華鮮泰運禎符積昌時寶祚綿無疆頻錫祉有慶永乘乾羣仰光華日咸瞻咫尺天彤墀多瑞靄綺陌有祥煙百卉爭舒艷千林共鬬妍南山蒼翠滿北極彩雲翩元氣流雙闕仁風扇八埏為民時邁舉行慶嵗租蠲稼穡艱難稔宫庭感召專恩覃歌湛露慍解撫薰絃統自唐虞接心由洙泗傳摛章森典則會道極髙堅德盛彰謨訓功崇志簡編淵沖澄有量海潤浹無邊喜入康衢頌歡騰聖主筵臣工鳴佩進父老杖藜前四表文明盛三千禮樂全九成鏘古奏二雅詠新篇夀域山河固光昭億萬年萬夀詩五言排律二十四韻翰林院庶吉士臣白子雲帝德符堯舜皇猷邁夏商流虹初啓瑞繞電更呈祥聖質原英敏深宫復就將崇儒經術重建極治功張禮樂追三代車書遍八荒泰壇隆灌獻大祀肅蒸嘗祈穀虔牲幣占年順雨㿩皇威加海內睿算靖邊疆農隙仍修備時清每省方蠲租恩廣大解網澤汪洋瑚璉登廊廟楩楠備棟梁列卿多簡在循吏必明揚喬嶽懷柔久蒼旻眷佑長太和恆保合景福愈繁昌元會初周甲春秋正未央惠風來紫禁協氣繞青陽黃道開金闕紅雲護玉堂千官同舞蹈萬國效梯航螭陛陳華祝龍爐挹御香祥麟遊禁囿威鳯集髙岡率土皆歡忭無人不拜揚慶雲騰靄靄甘露降瀼瀼金鑑千秋録瑶臺萬嵗觴九如天保頌永永見垂裳萬夀詩五言排律二十四韻翰林院庶吉士臣魯立聖德三辰正皇圖萬載基光天開景運寶厯啓昌期日候方中景爻占交泰時精微心有契端拱治無為禮樂追三代恩慈浹八維體元成位育建極統君師武烈邊陲靜文謨簡策垂表章崇正學尊禮邁前規造士煩親試蠲租荷聖慈閭閻登衽席廊廟切疇咨黜陟輿情協虛公萬物知生民從未有首出獨如斯八表尊親戴三多祝頌詞登封章屢却徽號嵗堅辭蕩蕩名難罄巍巍鑒不遺春風回玉陛淑景動丹墀瑞靄蔥蘢合祥雲爛熳披北樞環衆曜南極次重離應地安貞吉參天福履綏一心涵廣運四海樂雍熙日月光華滿春風雨露滋共當三月吉競獻九如詩稽拜同葵向敷陳只管窺幸隨鵷鷺末齊上萬年巵萬夀盛典初集卷九十四
