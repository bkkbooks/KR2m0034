body:
  text: 欽定四庫全書萬壽盛典初集卷一百二十歌頌六十直省耆庶萬壽詩七言律二首布衣臣顧景軾仙仗遙開出栁堤翠華來自鳯城西九衢日色迎車駕十里風和傍馬蹄到處花村都擊壤及時繡陌正耕犂歡聲雷動騰朝野聖夀無疆天與齊其一帝城綵翠結樓臺簫管瓊筵處處開雲輦九重雙鳯下海山三月六鼇來安期火棗攜瀛島金母蟠桃映夀杯地久天長呼萬嵗年年春色醉蓬萊其二聖德詩五言律二首布衣臣楊峻聖主當龍御長綿玊厯期萬年成久道億載頌昌時丹鳯恩波溢珠淵制作垂升恆方未艾天保願賡詩其一解網連年被蠲租幾嵗頻太平真有象至治洽無垠擊壤家家遍歌衢處處新小臣逢聖世翹首上林春其二聖壽無疆詩七言截句二首布衣臣王觀聖壽無疆甲始周壽開聖域共蒙庥萬千耆耉來歌德車賜蒲輪杖賜鳩其一聖壽無疆億萬年齊天聖祚自綿綿卜年卜世還過厯咸五登三更軼前其二萬壽詩七言律一首布衣臣金世鉽維皇至德邁陶唐沕穆淳風被萬方象緯包涵綿道脈苞符點畫燦天章河濱瑞氣騰龍馬阿閣祥雲舞鳯凰耕鑿優遊皆帝力草茅何以報垂裳萬壽詩五言排律二十二韻有序布衣臣馮守典臣聞詩傳天保景運綿長書美時雍昌期恆久塗歌巷舞普天申嵩嶽之呼嵗稔人和率土效華封之祝是以備大德者必得大年敷純治者多膺純嘏康衢擊壤兆民切愛戴之誠瀛宇添籌薄海遇升恆之會歡騰八表喜溢三春欽惟皇帝陛下仁壽天長遐齡地久德超羲昊道以大而難名治駕商周福更洪而莫量統往代不賓之疆域開前王未闢之山川凡兹奕祀之鴻模總出九重之英斷蓋微無所不照而惠無所不周在風俗已躋於雍熙而聖主愈深其惕厲省方問俗八荒之望幸彌殷御世諴民萬類之霑濡普遍千萬鎰正供疊赦億兆姓安堵久承縱地厚天高詎形寬大而江涵海濶莫喻洪深今當甲子初周正值昭陽屆令臣守典才疏巴里家受國恩渡春江而就日虔祝長庚叩曙闕以陳詞恭抒誠悃謹拜手稽首而獻詩曰聖壽天為則綿長歷萬春遐齡地共久嘉樂際昌辰華祝逢三月嵩呼慶一人賡揚歌帝德愛戴感皇仁有道乾行健無為化育均蒸黎咸樂業宇宙共還淳至治超前代良謨造大鈞波恬深島靜政肅百僚循約慎三章法租蠲歷嵗緡移風恆訓飭問俗幾時巡規畫羲皇上疏防神禹倫恩覃南國遍惠滿大江濱在鎬咨籌裕居豐撫恤頻金甌承鞏固玊殿美絲綸禮樂藝臺作詩書虎觀論吟篇追雅頌灑藻勢嶙峋浩蕩科添設升平景聿新琪花鋪似錦瑤草結成茵億萬載喬嶽八千年大椿簫韶聲沸沸桃杏葉蓁蓁霞綵連雲漢爐香達禁闉天長與地久歡洽祝楓宸萬壽詩七言律三十首布衣臣何元坦帝矅光聮華渚虹昌期慶溢紫微宫罘罳晝捲祥雲裏閶闔晨開瑞靄中百辟咸歌百福備萬年獻頌萬邦同皇輿此日真無外常信虞廷景運隆一東堯年億兆慶奇逢帝德如天雨露濃壽考作人飛綵鳯青陽行令駕蒼龍三公喜起趨三殿九有歡呼達九重仰看瑤樞光繞電拜揚更欲效華封二冬幅員遼濶古無雙異域歸心萬里降赫赫王師非好武煌煌聖略永安邦鳯輿日馭臨宸幄鸞斾雲飛繞御窗會見臣工多紀載千年青史燦銀虹三江草木霑恩識盛時柏松齊獻萬年枝靑垂御苑朝偏好緑罩仙官晚更宜夾道鋪雲迎羽騎回廊帶露拂雲旗無疆應肇君王壽影動依稀拜玉墀四支鶯囀春城萬緑肥大廷佳氣籠朝暉千門管鑰環青瑣萬國冠裳傍紫微御墨光騰玉案硯宫花香拂侍臣衣東皇欲獻彤廷祝遲日條風滿禁闈五微乾清嘉宴萃簪裾樽俎新排樂奏初聖酒霞生白玉斚天厨銀燦紫鱗魚果傳西域龍文馬膾運蓬萊鳯羽車甘露金盤呈進後侍臣咸沐大官餘六魚一堂喜起慶都俞聖德巍巍四海敷取士無方昭盛典蠲租有詔懋皇圖伶官侑食宣天樂仙子稱觴捧帝壺豈獨侍臣魚藻詠還聞父老頌康衢七虞皇躬仙算共天齊到處名山御筆題璀璨宸章輝宇宙巡行鳯輦遍東西遺編舊拓千金購祕笈奇書萬國齎一代文明昭聖化琳琅圭璧燦虹霓八齊御書淵鑑自名齋俯視晴川愜聖懷底定百年澄濟漯安瀾萬里奠江淮水皆效順寧須瀹河盡朝宗不用排源逺流清開寶鏡聖明萬古照無涯九佳六御巡行遍八垓九重壽域自天開十洲瑤草金為砌三島琪花玉作臺喬木遙從丹禁茂大椿齊向內廷栽共傳青鳥雲中見帝里應知阿母來十灰暢春春色十分春馳道紆徐達紫宸待蹕宫桃迎綵仗承恩御栁迓金輪萬方獻壽當三月四海稱觴慶一人遙望鎬京開宴後仙杯次第到羣臣十一真禁城淑氣繞氤氳春色蒼蒼日漸昕香裊爐煙看似霧影搖斾帶望如雲金罍遍向金門賜玉饌遙從玉殿分朝野霑恩咸拜手吾皇聖算邁羲文十二文五雲深處是端門劍珮蹌蹌禮至尊丹陛彤廷初拾級黃旗紫蓋早臨軒臣民共識天顔喜中外欣傳詔旨溫更幸銜恩陪宴樂流霞滿酌進堯樽十三元祥雲麗日繞金鑾八表同風處處歡僻壤梗頑熏禮義遐陬鱗介化衣冠王言直共乾坤大國祚還同磐石安玉漏猶遲雞未唱東華門外簇朝官十四寒瀛臺佳氣接西山路達金鼇玉蝀間長白萬峯從北繞蘆溝一水自東環百靈護蹕趨宸幄四海傾心仰聖顔科目殊恩真異數簮花恰喜預朝班十五刪香騰玉案噴龍涎仙仗齊班慶萬年堯殿蓂開符寶厯虞廷獸舞協鈞天聲傳鼉鼓開宫扇光徹金門啓御筵歌遍九如人既醉油油環侍衮衣前一先風動時雍鼎鼐調皇家瑞氣滿丹霄千門魚鑰黃金勒兩陛螭文白玉雕鳯舉九天騰煥彩鵬飛萬里遂扶搖花韉駿馬雲衢躍報道君王正早朝二蕭時逢景運泰初交瑜瑾同登類拔茅萬國英賢歸上舍百年遺老養東膠談深宣室雞三唱炬徹金蓮鼓四敲豈但鳯鸞棲得所鷦鷯也得一枝巢三肴恭已垂裳擁赭袍通明殿外紫雲高金盤霞裹如瓜棗玉篚冰攢似斗桃直共羲軒敷德化寧同子姒較勤勞萬年聖壽知無極甲子從頭起大撓四豪千秋曠典育菁莪聖節宏開萬壽科杏代桂花迎俊傑秋開春榜笑嫦娥不聞梁灝嗟遲暮共喜劉蕡入網羅應識殊恩垂永久棘闈遙望綵雲多五歌卿雲爛熳燦如花玉珮金鑣慶未涯禹稷功成時豫泰臯夔績著日光華鵷行鷺序千官騎虎賁龍驤百辟車選舉已登三代盛良臣入夢更宣麻六麻星河嵗嵗燦農祥蔀屋騰歡豐且穰瑞貢千航隨厥土琛輸萬國裕天倉青連南畝甘霖沛緑滿東郊曉露瀼賦稅頻蠲民樂業栽培國脈益延長七陽廟算無遺海甸清八埏咸喜際升平兵銷戈止皇仁懋武偃文修帝業成邊塞聞風徹夜柝蠻邦帶雨樂春耕遐荒僻逺無知識也望堯階祝聖明八庚植禾鋤莠萬邦寧盛世全消貫索星天澤宏施敷雨露皇威丕振霽雷霆訟清政簡人皆樂俗美風淳户不扄四海一時咸向化虞廷直欲頌無刑九青柳椐棫朴一時登梁棟何愁任不勝百度就繩咸適用八材庇化各呈能琅函瑶版文章重大呂黃鐘器量宏共慶盛朝無棄物紫閶常見紫雲騰十蒸御氣遙騰五鳯樓禁中海淀喜宸遊青岑緑樹雲邊聳翠羽霓旌水上浮仙鹿銜花迎鳯輦遊魚排荇迓龍舟芳辰行慶皇情愜艷舞妍歌幾度留十一尤玉殿崔嵬禁苑深翠華遙向九霄臨雲官丹陛含雞舌虎將黃扉部羽林萬里風雲欣會合四時魚鳥樂飛沈自慙葵藿生蓬蓽望闕難忘捧日心十二侵麟趾關雎帝德覃推恩豈獨頌周南道彰宫壼仁兼孝化洽家邦樂且湛疊沛陰膏功邁五頻頒巨典治同三緬思六十年來政上下流行天地參十三覃咫尺龍顔喜共瞻文華殿閣午風恬金爐香裊紅蘭省銀燭光搖翠羽簾九有歸仁忘逺近四時合序遂洪纎年年海屋春常在願把仙籌萬祀添十四鹽天下和平萬姓諴皇恩汪濊八方銜龍荒廣進來庭表海澨遙飛納貢帆雀躍羣黎遊壽域嵩呼野老出重巖禎符更向楓宸達石室天書啓玉函十五咸萬夀詩七言律四首布衣臣李惟愈紫宸瑞色靄蒼蒼遐邇嵩呼祝聖皇萬里河山開壽域九重雲日煥天章洪鈞乍轉陽和永甲子初周厯數長華渚恰逢虹繞後羣仙簇仗獻霞觴其一物象恬熙海宇清車書禮樂暢休明圖呈龍馬三才會韶引鸞凰九奏成有象珠囊懸日月無疆寶厯紀升平聖朝文教遐陬洽已見天樞正玉衡其二東郊農事動芳辰鳯輦巡遊物候新霄漢即今多雨露江山何處不陽春兩岐瑞麥生青隴九穗嘉禾獻紫宸蠲賦頻頒寬大詔康衢擊壤盡堯民其三長庚影裏啓晨光風動爐煙裊御香瑶島蟠桃千嵗熟玉階仙杏萬年芳帝齡直與乾坤永聖世咸知日月長何幸草茅逢盛事從兹奕世祝無疆其四萬夀詩五言排律十八韻布衣臣朱芳巖聖紀原無量皇齡進六旬彤墀輝旭日春殿慶良辰品物承鈞造羣生盡化醇嵩呼聞已數華祝聽尤頻大道彌霄壤深仁洽羽鱗觀民勤愛育養士盡陶甄甘雨滋青甸祥風溢紫宸九重𢎞保合四表悉尊親龍德時行健天禧日見臻永隆千代祚丕佑萬年身東海瓊巵滿南山淑景新騰歡胥父老躍舞遍臣鄰火棗連枝獻冰桃帶蕊陳星雲齊見瑞草木並呈珍倚玉芝常秀巢林鶴最馴銀潢真浩瀚華嶽更嶙峋上苑榮松柏芳郊育鳯麟仰惟天子壽長樂太平春萬夀詩五言律二首布衣臣李天錦淑氣麗芳辰蓬壺瑞靄新山應呼萬嵗樹亦號千春白鹿遊林圃青蓮出水濱禎祥歸有道南極耀楓宸其一日麗和風暖春波灔野塘湛恩深似海多夀祝如岡玉帛聮羣辟車書會萬方臣民齊拜舞歡躍頌無疆其二萬夀詩七言律二首布衣臣李泳太平天子夀無疆滄海恩波雨露瀼佛日仙霞雙闕敞吳綾蜀錦九衢張臣民喜奏琅璈樂川嶽欽陳沆瀣觴共祝三多呼萬嵗我皇功德勝軒黃其一萬年聖夀祝如嵩臣庶歡呼萬國同閶闔門前瞻節仗芙蓉闕下覲山龍青虹紫電旋天上碧藕冰桃獻禁中自古修齡歸有道升恆日月算何窮其二萬夀詩七言律四首布衣臣文永豐曉開閶闔駕臨軒瑞日晴懸紫鳯垣鵷鷺千官環斗極車書萬國會屏藩雍雍禮樂威儀盛濟濟衣冠氣象尊聖代升平超萬古普天稱慶到金門其一垂裳景運協中天披拂薰風聽五絃百嵗老人頒大酺九重春色遍瓊筵瞻雲就日三千里厚澤深仁億萬年草莽何緣躬拜獻嵩呼聲徹鳯樓前其二宏猷默運啓昌期天縱聰明萬世師壽域皇圖同孔固天章宸翰共昭垂恩綸海宇雍熙日春洽人情燕喜時雙闕拜聽仙樂奏願隨百獸舞階墀其三綵勝雲和夾道回禁衢春色擬蓬萊桃含嬌靨迎仙仗鶯度清歌引夀杯萬嵗正從花甲始一生頻沐聖恩栽小臣謹獻岡陵頌敢望天顔一笑開其四萬壽紀恩詩七言截句二首江南蘇州府常熟縣耆民臣蔣拱辰黃衣鳩杖列分行鹵簿前頭拜聖皇邀得至尊親駐輦老人齊進萬年觴其一金盤敕賜上方珍萬口歡騰紫陌春玉麵蟠桃紅夀印親王手裏給耆民其二萬夀詩五言律九首有序雲南楚雄府南安州耆民臣錢潞康熙五十二年春王三月恭逢皇上六旬萬夀普天同慶率土騰歡草莽耆民臣潞沐生成之德六十餘年爵躍歡欣倍萬恆品謹自滇南匍匐京師仰效華封之祝欽惟我皇上繼天立極久道化成文德武功彪炳霄壤臣潞逺方黔庶莫能頌揚萬一敬採滇南全省土俗民風謳歌聖德之盛繪為九章以仿天保九如之意恭呈睿覽不勝歡忭悚切之至普天同慶兩儀符帝德五福斂皇躬玉帛千方集梯航萬國同堯樽開北斗舜樂動薰風僻逺滇南地傾葵結寸衷曠典開科乾坤齊夀域學海沛恩波花結長春樹人逢籲俊科儲材看棫朴時雨遍菁莪久道文明化堯衢擊壤歌蠲免錢糧殊恩超曠古耕鑿樂陶唐户罕催科擾農惟力作忙升平藏富足至治有馨香鼓腹苗蠻俗光天化日長匾額輝煌天章頌渙汗南海仰陶甄造士朝無偽崇儒自有真金橋堪永鎮寶翰更長新於變時雍世生成教養仁御書育俊二字賜昆明書院虹飛彼岸四大字賜永昌鐵索橋煌煌宸翰輝映中天滇海士民萬代瞻仰文風丕振聖主敷文教風聲暨海隅心源宗孔孟理境徹程朱黜冗還崇雅刪膚已就腴起衰功萬祀窮髮盡喁喁官吏奉法百寮承德意惠此海南天奉法冰霜凜宣慈愷澤傳嘉禾呈聖世甘露降豐年帝力忘何有謳歌遍市田土司懷德皇恩春浩蕩苗俗久歸心異域陽和浹敷天化育深聖謨溫似玉王度式如金血氣尊親奉嵩呼振海岑康熙四十八年姚安軍民府同恩準陛知高厚德揚見歸滇宣聖訓苗蠻感戴如躋春臺開設礦厰聖主因民利恩綸沛大廷山應興寶藏地亦效神靈商旅胥安業間民盡戢寧嬉遊歌帝載洞户總添丁礦厰開設俗益豐饒商民俱安分樂業夜户不閉俗易濡皇化時和樂嵗豐萑苻胥斂迹草木盡從風結綵懸蓬户焚香祝聖躬天長與地久嵗嵗效呼嵩殊方感化道路太平已成路不拾遺之俗欽惟我皇上膺圖出治久道化成聖德神功與天無極康熙五十二年春恭遇聖誕六旬萬夀海宇歡騰敷天慶協祝嘏遍乎紘埏梯航萃於輦轂熙熙皥皥履春臺登壽域覆載以來未之有也於是前兵部侍郎臣宋駿業代臣民籲請恭繪萬夀圖以傳盛事垂之永久而臣兄户部侍郎臣原祁繼掌其事臣原祁言圖以象形史以紀事故自古有圖必有史特請修萬夀盛典隨奉俞旨選員編輯五十四年十月臣奕清復奉恩命接管萬夀書畫局事今年十一月長至日初集告成共為書一百二十卷內附圖畫二卷並校對刋刻恭呈御覽臣因得拜手稽首揚言於簡末蓋聞上古之世三皇篤生夀俱萬有千嵗然而世紀荒略典禮未聞自唐虞以迄成周並享祚靈長然其時祝聖壽者不過若華封三多之祝天保九如之頌而外此未數覯也漢唐以後蓋無聞焉惟我皇上以不世首出之聖人膺亘古未開之景運天人協應福德兼隆澤普恩洋化神治盛真有圖繪之難窮而頌揚之莫罄者是故紀宸藻則煥乎日星昭於雲漢詔誥協典謨之美詩歌諧雅頌之音紀聖德則萃萬國之歡心以隆孝養却九州之籲請以示撝謙保合太和敦崇教化景命所以日隆茀祿於焉永康也紀典禮則朝賀有儀鑾衛有制祭告而百神受福布詔而八表蒙庥敬養高年肆行大酺矞皇巨麗典則永垂紀恩賚則宗戚之與外藩大僚而迄庶尹貤封錫類恩覃中外又復蠲賦恤民開科惠士勞軍旅則邊陲挾纊省刑罰則文網𢎞開深恩厚澤殆不勝書紀慶祝則會朝陳萬國之衣冠拜舞集千官之劍佩外而元侯之覲享逺而望嶽之祝釐神人景從休徵疊應紀歌頌則上逮天潢下沿羣辟史館載筆之臣上國觀光之士以至塗歌巷祝天籟同聲斯又康衢擊壤之世所未聞而結繩書契以來所僅覯者也臣奕清世受國恩恭逢盛際幸預纂修之末得觀大典之成雖帝德難名未免挂一漏萬之慮而臣心忭躍無任繪天頌聖之忱臣又伏念天道運行循環不已故皇極元會運世之數歷億萬百千而未有紀極我皇上元化渾淪體天不息德皆天之德也夀即天之壽也臣等仰測乾元推衍皇極從此每遇十年編纂一書殆萬萬年而未有艾也夫右臣恭奉聖旨校刋萬夀盛典初集於康熙五十四年春正月開雕越明年冬十一月校刋告竣計二千七百三十五版五十三萬四千四百八十八字為書一百一十八卷合畫圖二卷為一百二十卷次第進呈御覽欽惟我皇上盛德在躬至仁及物如天之覆如地之載如日月之照精神洞徹元化流行萬物致和五辰協敘正值千載昌期共慶六旬聖夀黃輿告瑞蒼昊降符萬國會同八紘鼓舞於時巽恩彌溥乾德彌謙一言出而天人協萬口呼而嵩嶽應奇逢曠典口不能名爰輯成書用昭萬世巍乎煥乎盛矣美矣臣躬逢泰運世受隆恩初列曹司即膺重任絶無雞鶩之長略辨豖魚之誤心粗質陋祇抱慚惶乃荷洪慈曲加覆庇兼許臣父兩廣總督今升兵部尚書臣趙𢎞燦臣叔總督管直隸巡撫事臣趙𢎞燮及臣之垣姓名並得附列於後寵光疊被震悚交懷鏤版既成反覆誦讀仰窺有爛之文實表無疆之瑞普天慶祝願寶算之齊天大地謳歌感湛恩之匝地臣不勝欣忭踴躍忘其材劣分卑敬紀數言贅於卷末若夫百靈之所以效萬福之所以集羣黎之所以感庶績之所以凝則皆自我皇上聖德神功參天兩地之所致高深莫量廣運無窮閲十年而成一集積至百千萬卷未能殫述又豈管窺蠡測所能頌揚萬一也哉萬壽盛典初集卷一百二十
