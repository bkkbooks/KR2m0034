body:
  text: 欽定四庫全書萬夀盛典初集卷八聖德四教化康熙五十二年三月十八日以萬夀覃恩詔直省督撫舉山林隱逸懷才抱德之士核實具奏酌與録用其滿漢孝子順孫義夫節婦該管官細加咨訪確具事實奏聞禮部核實旌表以廣教化康熙五十三年二月二十日湖廣總督臣額倫特謹題為欽奉恩詔事康熙五十二年三月恭逢皇上萬夀頒宣恩詔內一地方有山林隱逸懷才抱德之士著該督撫核實具奏酌與録用欽此欽遵在案欽惟我皇上御極以來歷今五十三年宵旰不遑勵精圖治保民無一夫之不獲取士則有美之畢收乃猶頒宣詔旨惟恐野有遺賢臣等敢不虛衷採訪仰副恩綸竊查湖廣地方古稱才藪自蒙皇恩教育廣額搜羅士皆奮志科名不甘棲心巖穴求可上應明詔實鮮其人臣謹以素所聞知如陜西隱士王心敬者為我皇上陳之查王心敬籍𨽻陜西鄠縣年近六十家世業儒學有真傳得程朱之正脈行為鄉表領月旦之嘉評品既端方孝尤純篤母年八十餘晨昏定省未嘗少間樂志田園罔競榮利日以閉户著書誨人不倦為務臣生長西安習聞其名未識其面比至湖廣聞前撫臣陳詵敦請再三心敬始遵母命負笈來楚居未浹旬即以親老辭歸至今江漢人士猶憾遽失典型以是知王心敬茍非真懷才抱德不能使人企慕至此微臣識暗才疏受恩深重無可報效惟思為國薦賢少伸犬馬之忱是以不嫌越境冒昧薦揚伏乞敕下陜西督撫將隱士王心敬再加核實奏聞如果臣言不謬令地方官起送赴京引見賜之明試或德行果優或才能足用是懇皇恩量與擢用於以副恩綸而昭盛典不惟史册流光林泉生色臣且不勝歡欣抃舞慶至治之得人矣緣係奉旨舉賢事理不敢隱尤不敢忽伏乞皇上睿鑒施行為此謹具奏聞三月十五日奉旨該部議奏本月二十三日吏部尚書臣富寧安等謹題為欽奉恩詔事吏科抄出湖廣總督額倫特奏前事內開案查康熙五十二年三月十八日恭遇皇上萬夀頒宣恩詔內一地方有山林隱逸懷才抱德之士著該督撫核實具奏酌與録用欽此欽遵在案欽惟我皇上御極以來歷今五十三年宵旰不遑勵精圖治保民無一夫之不獲取才則有美之畢收乃猶頒宣詔旨惟恐野有遺賢臣等敢不虛衷採訪仰副恩綸臣謹以素所聞知有如陜西隱士王心敬者謹將立身行己為我皇上陳之查王心敬籍𨽻西安鄠縣年近六十家世業儒學有真傳行為鄉表品既端方孝尤純篤母年八十餘晨昏定省未嘗少間樂志田園罔競榮利日以閉户著書誨人不倦為務此臣生長西安所習聞而未謀面者比至湖廣聞前撫臣陳詵敦請再三心敬始遵母命來楚居未浹旬以親老辭歸至今江漢人士猶憾遽失典型以是知王心敬茍非真懷才抱德不能使人企慕至此微臣識暗才疏受恩深重無可報效惟思為國薦賢少伸犬馬之忱於萬一是以不嫌隔省冒昧薦揚乞敕陜西督撫即將隱士王心敬再加核實奏聞如果臣言不謬著該地方官起送赴京引見賜之明試或德行果優或才能足用是懇皇恩量與擢用於以副恩綸而昭盛典不惟史册流光林泉生色臣且不勝歡欣抃舞慶至治之得人矣康熙五十三年二月二十日奏三月十五日奉旨該部議奏欽此欽遵於本月十六日抄出到部相應行令陜西督撫將王心敬細加核實具題到日再議可也臣等未敢擅便謹題請旨本月二十五日奉旨依議禮部儀制司為欽奉恩詔事準奉天將軍唐保住咨稱看守福陵總管尊住等咨稱正白旗多奇禪佐領下阿克楚之孫族長觀保寧古里九什格龍噶爾圖孟戈絡等呈稱族叔祖席十五嵗父故晝夜侍奉孀母不倦母自四十七嵗孀居至八十二嵗於康熙四十九年二月二十九日病故祖席三日不食三七後在原籍遂田里安葬於母墳旁結茅廬一間日則修墳夜則秉燭坐守效古之孝子能竭其力夏耘草冬掃雪三年之久並無倦怠於五十一年三月二十九日二十七月已滿親族人等迎接來家祖席係間散人今年五十三嵗父名馬拉原任拖沙拉哈哈畨蒙恩詔查孝子順孫合族將祖席盡孝之處舉出七品官劉丫圖八品官非丫圖族長寧古里九什格龍噶爾圖孟戈絡具保前來查祖席於母墳前結茅廬看守二十七箇月是實等因於康熙五十二年六月二十九日咨送前來查孝子祖席盡孝之處與例相符應存案俟年終彚題可也鑲黃旗都統副都統欽奉恩詔查咨請題旌表節婦滿洲船住佐領下護軍瓦色妻巴雅拉氏等四十口蒙古佛保佐領下護軍賽音圖妻佟氏等九口漢軍祖良卿佐領下俊秀郎應參妻吳氏等七口正黃旗都統副都統欽奉恩詔查咨請題旌表節婦滿洲明德佐領下披甲神保住妻烏雅拉氏等二十七口蒙古策汪諾爾布佐領下護軍那蘇克妻鄂者忒氏一口漢軍金無極佐領下間散文之祥妻李氏等十三口正白旗都統副都統欽奉恩詔查咨請題旌表節婦滿洲張格佐領下撥什庫卞他哈妻佟嘉氏等二十六口蒙古和尚佐領下護軍齊倫妻八林氏等五口漢軍李維新佐領下間散董有亮妻張氏等二十口正紅旗都統副都統欽奉恩詔查咨請題旌表節婦滿洲常來佐領下護軍哈什那妻瓜爾嘉氏等九口蒙古敦住克佐領下護軍紐牛妻郭爾吉氏等十一口漢軍王永成佐領下原任拖沙拉哈畨趙之瑜妻劉氏等七口鑲白旗都統副都統欽奉恩詔查咨請題旌表節婦滿洲覺羅海蘭佐領下親軍吳漢妻武扎拉氏等三十九口蒙古新多爾吉佐領下護軍阿第妻關氏等十一口漢軍髙其倬佐領下披甲陳三逹妻鍾氏等十四口鑲紅旗都統副都統欽奉恩詔查咨請題旌表節婦滿洲蒙古佐領下護軍保孫妻佟嘉氏等二十五口蒙古班第佐領下護軍尚圖妻王氏等五口漢軍趙珀佐領下間散于邦臣妻薑氏等三口正藍旗都統副都統欽奉恩詔查咨請題旌表節婦滿洲車克車渾佐領下護軍博圖妻王氏等二十口蒙古索諾木喇什佐領下親軍昻阿來妻薩爾屯氏等六口漢軍張永正佐領下間散于顯亮妻孫氏等八口鑲藍旗都統副都統欽奉恩詔查咨請題旌表節婦滿洲薩克慎佐領下護軍桑哥妻邱氏等三十三口蒙古孟和尚佐領下護軍巴爾藏妻查罕氏等六口漢軍李楠佐領下間散王朝英妻徐氏等四口奉天將軍伯唐保住欽奉恩詔查咨請題旌表節婦鑲黃旗滿洲殷泰佐領下撥什庫逹羊阿妻巴牙喇氏等三口杭州將軍宗室諾洛布欽奉恩詔查咨請題旌表節婦鑲黃旗滿洲那穆布佐領下撥什庫滿珠妻莫爾齊氏等五口西安將軍席柱欽奉恩詔查咨請題旌表節婦鑲黃旗滿洲色柱佐領下披甲敦泰妻由庫盧氏等十五口寧古塔將軍覺羅蒙鄂洛欽奉恩詔查咨請題旌表節婦鑲黃旗滿洲邁圖佐領下披甲科布索活妻傅查氏等二十二口禮部尚書臣陳詵等謹題為彚題旌表事準八旗奉天等處將軍咨稱等因前來該臣等議得各該都統副都統各該將軍副都統既稱伊等自三十嵗以下守節至五十嵗以後貞恪守節及孝子盡孝是實照例年終彚題應請旌表俟命下之日行文户部每人給銀三十兩聽其建坊可也臣等未敢擅便謹題請旨康熙五十二年十二月十七日題本月十八日奉旨依議廣東巡撫滿丕欽奉恩詔題請旌表節婦南海縣民梁俊客妻陸氏南海縣儒士方士成妻吳氏東莞縣生員趙奕爵妻李氏東莞縣儒士庾瑚妻黎氏東莞縣儒士周祥慶妻袁氏順德縣儒士蕭英俊妻張氏潮陽縣民姚爵士妻陳氏偏沅巡撫潘宗洛欽奉恩詔題請旌表節婦桂陽州生員雷電妻鄧氏安仁縣民李任賢妻唐氏四川學政王誥欽奉恩詔題請旌表節婦宜賔縣生員樊澤迥妻尹氏富順縣武舉王于蕃妻尤氏貴州巡撫劉蔭樞欽奉恩詔題請旌表節婦鎮寧州生員洪可選妻項氏福建巡撫覺羅滿保欽奉恩詔題請旌表節婦連江縣生員陳獻琳妻鄭氏莆田縣儒士鄭翰徵妻許氏邵武縣儒童李如璋妻聶氏連城縣民童才良妻俞氏浙江巡撫王度昭欽奉恩詔題請旌表節婦仁和縣儒童汪雲瑞妻王氏仁和縣民沈士昭妻劉氏仁和縣民范玉珍妻朱氏仁和縣監生周之暹妻沈氏仁和縣民嚴甡妻俞氏山陰縣民吳乾復妻朱氏山陰縣民劉士茂妻朱氏平湖縣貢生程溥妻戴氏海寧縣監生楊中惺妻勞氏山西巡撫蘇克濟欽奉恩詔題請旌表節婦靜樂縣原任光祿寺署丞李室妻周氏又妾邸氏禮部尚書臣陳詵等謹題為彚題旌表事據廣東巡撫滿丕等具題前來該臣等議得查山西巡撫蘇克濟疏稱靜樂縣原任光祿寺署丞李室妻周氏妾邸氏臣部查周氏曾否受過誥封邸氏病故年分不符一併行查該撫去後至今未到俟該撫查覆到日於康熙五十三年年終彚題外廣東等屬共節婦二十五口該撫該學政俱疏稱伊等貞恪守節是實照例年終彚題應請旌表俟命下之日行令該撫該學政轉行該地方官各給銀三十兩聽其建坊可也臣等未敢擅便謹題請旨康熙五十二年十二月十七日題本月十八日奉旨依議二十五日壬寅上宴廷臣及直省來京慶祝萬夀臣民年六十五嵗以上者於暢春園宴畢特降敕旨頒賜耆民令歸傳諭鄉里敦孝弟厚風俗上諭各直省老人云書稱文王善養老者孟子云七十者非帛不暖非肉不飽帝王之治天下發政施仁未嘗不以養老尊賢為首務近來士大夫只論做官之賢否移風易俗之效驗所以不暇講究孝弟之本心朕因今日之會特宣此意若孝弟之念少輕而求移風易俗其所厚者薄而其薄者厚矣爾等皆是老者比回鄉井之間各曉諭鄰里須先孝弟倘天下皆知孝弟為重此誠移風易俗之本禮樂辭讓之根非淺鮮也昨日甘霖大沛四野霑足朕心大悅爾等毋誤農時速回本地特諭本日户部即將上諭刋刻分給直省老人七月三十日乙亥詔以頒發老人上諭載入上諭十六條內通行直省府州縣及凡有土司之處於月朔並行宣講以廣教化閏五月二十五日廣西巡撫臣陳元龍謹題為聖朝養老恩隆惇倫化逺謹據輿情恭謝天恩事據廣西桂林府等屬耆老李昌泰等呈稱昌等幸逢仁夀之世皆登耄耋之年生長邊方未嫺禮教伏讀聖諭講究孝弟之本心昌等在各鄉村傳集老幼宣讀講論人人聳聽有感激而涕泗交頤者有愧恧而頭低面赤者有歡忭而踴躍鼓舞者北望叩頭齊聲皆呼萬嵗從此父慈子孝兄友弟恭各愛其親各敬其長獄訟自息盜賊自銷真成熙熙皥皥之風昌等年老之人仰荷皇恩賞賚皆得衣帛食肉似此養老仁政亘古所無今見風俗淳厚子孫孝敬相與含哺鼓腹歌詠太平正未有艾普天耆老無非聖夀錫福但微賤小民感戴之情無由上逹籲請代題恭謝復疏題為請行宣講養老上諭以正人心以厚風俗事本年五月初二日準部咨開頒發各直省老人上諭一道臣跪讀之下仰見我皇上端治化之本原明孝弟為首務就施仁養老之典寓移風易俗之權藹藹綸音如父子家人之告語煌煌詔旨示綱常名教之防間雖二典三謨奚以過是若普天率土皆能守孝弟之本心則閭里盡屬良民學校無非端士風俗咸歸淳厚化理益至雍熙現今直省各府州縣每月朔宣講上諭十六條臣請通行直省地方將頒發老人上諭并行宣講俾里民聽聞之下提撕警覺裨益非淺鮮矣至廣西等處土司地方教化尤屬緊要乞一並頒發土司官員宣講以廣聖化冒昧條奏伏乞睿鑒施行七月初二日奉旨該部議奏七月二十六日户部尚書臣穆和倫等謹題為請行宣講養老上諭等事禮科抄出廣西巡撫陳元龍奏前事等因康熙五十二年閏五月二十五日題七月初二日奉旨該部議奏欽此欽遵於七月十六日禮部將原抄咨送到部臣等查得廣西巡撫陳元龍奏稱頒發老人上諭一道臣跪讀之下仰見我皇上端治化之本原明孝弟為首務若普天率土皆能守孝弟本心風俗咸歸淳厚化理益致雍熙現今直省各府州縣每於月朔宣講上諭十六條臣請通行直省地方官將頒發老人上諭並行宣講俾愚民聽聞動其感發興起之念裨益非淺鮮矣至廣西等處土司地方教化尤為緊要並乞一體頒發土司官員講解以廣聖化等因具奏前來查頒發老人上諭臣部已經通行直𨽻各省在案今該撫既請頒發老人上諭與現今直省各府州縣月朔宣講上諭十六條並行宣講及廣西等處土司地方並乞一體頒發土司官員講解等語均應如所請將頒發老人上諭載入上諭十六條內行令直𨽻各省府州縣及凡有土司之處照例於月朔並行講解以廣聖化可也臣等未敢擅便謹題請旨本月三十日奉旨依議臣等伏讀詔旨何其愛民之深憂民之切而兢兢於化民成俗如此乎其至也書曰惟天陰隲下民厥有恆性克綏厥猷惟后又曰天降下民作之君作之師蓋非徒遂其生必且復其性焉在昔堯舜之世既設司徒之官教以人倫使知父子有親君臣有義夫婦有别長幼有序朋友有信又申命以勞來匡直輔翼使自得之又振德之蓋聖人之憂民如此而又慮司徒之官未能遍及鄉國也更設為庠序學校以教之而申之以孝弟之義老者衣帛食肉斑白者不負戴於道路三代相因其法益備於是秀民之列膠庠者蔑勿循循知齒讓矣而村野愚民身不被詩書之澤口不誦仁義之言何所督率而化導之於是命遒人以木鐸徇於路以振文教而周禮大司徒正月之吉始和布教於邦國都鄙乃縣教象之法於象魏使萬民觀教象挾日而斂之乃施教法於邦國都鄙使之各以教其所治民令比閭族黨互相保恤人倫明於上小民親於下唐虞三代之隆化行俗美君子樂得其道小人樂得其欲風何淳歟漢時興廉舉孝猶為近古又立縣三老鄉三老専主教民明帝臨辟雍行養老禮諸儒執經問難於前圜橋門而聽者億萬計維時風俗淳厚彬彬有君子之風焉夫古之為教也無過命司徒設學校警以遒人勸以讀法極之臨雍講藝如是止矣未有煌煌聖訓進十五國之父老而面命之與父言慈與子言孝正教化之本明禮讓之原如今日者也我皇上臨御以來敬天勤民事事以堯舜為法而孝弟之大原尤躬行倡率於上極天下之尊養以奉皇太后而先意承志久而彌純至於篤厚天潢推恩宗室孝友之誠有加無己固宜推此以仁民則視民如傷推此以愛物則萬物並育化民成俗之方至隆極盛矣猶恐天下之民匹夫匹婦有不與聞教化者爰頒示聖諭十六條通行郡國雖一鄉一邑之中每逢月朔令官師黨正明切而宣講之逺近齊民負販者弛擔而前秉耒者輟耕而聽有拊心點首歎息泣下者又念士為四民之首興行育德禮義相先尤庶民之所則而效也特御製訓飭士子文通頒學宫命師儒之官立章縫於庭下而訓之其束身修行之子得聞聖訓爭自濯磨而躍冶者流靡不愧悔生心同歸於善教化之勤拳雖唐虞三代何以加諸宜乎清和咸理兵革不作四譯嚮風享億萬載承平之福而未有已也兹屆萬夀六旬大慶九州垂白之老不逺千里而來望闕嵩呼四方和會自古書傳所紀上下數千百年未聞有若斯之盛者非聖天子之德教溢乎四海何以得此於遐邇中外哉我皇上慰答輿情升殿受朝賀十七日先自暢春園奉皇太后還宫皇子皇孫步行扶輦十八日先率臣民朝皇太后然後升殿固己身先天下而教之孝矣二十五日宴廷臣及直省赴闕朝賀臣民年六十五嵗以上者於暢春園設宴千四百席席四人皇上親御門諭以敬老尊賢弗拘常禮又命皇子皇孫年十五以上者傳觴勸侑其臣工年八十耆民年九十以上者特許前席賜以巵酒又已先天下而教之弟矣乃復親賜溫綸諭以孝弟力田為本務禮樂辭讓為化源使歸教其鄉里樹之風聲當是時也孝子順孫義夫節婦既已各戴覃恩旌其宅里而王言所播雷動天隨不啻家人父子之交相勸勉固宜遐陬僻壤舉踵思慕感激涕零而咫尺天顔親承聖訓者更不自知其歡欣踴忭詠歌聖德於無疆也書所謂明俊德親九族百姓昭明協和萬邦黎民於變時雍者何以加於此易曰聖人久於其道而天下化成蓋惟有聖人之大德然後享聖人之上夀有聖人之上夀然後成聖人之大化自非久於其道化亦未易言成也我皇上以德致夀享厯彌長非三代以下人主所及故大化翔洽亦非三代以下所可幾自今以往萬有千嵗睂夀無害漸仁摩義淪肌浹髓將使户皆可封進於淳古所謂咸五帝登三王豈筆札所能盡記也哉萬夀盛典初集卷八
