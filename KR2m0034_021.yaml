body:
  text: 欽定四庫全書萬夀盛典初集卷二十一典禮五養老四禮部尚書赫碩色等先後題明欽奉恩詔請給百嵗以上老人建坊銀兩八旗直省及喀爾喀所屬共三十有三人康熙五十二年五月理藩院尚書阿靈阿咨送喀爾喀多羅郡王和碩額駙端多布多爾濟所屬格龍册臨年一百四嵗本年八月福建巡撫覺羅滿保題報德化縣老人張嶽榮南安縣老人李華天俱年一百一嵗本年九月河南巡撫鹿祐題報鹿邑縣老民王國年一百嵗虞城縣老民种天章年一百二嵗汝陽縣老民夏旻年一百二嵗西平縣老民焦倫長年一百一嵗本年十一月寧古塔將軍孟俄洛咨送管理驛站官嶽贑本佐領下鄂默和索洛驛驛夫李三年一百三嵗康熙五十三年正月貴州巡撫劉蔭樞題報思州府老人張鶴雲年一百一嵗印江縣老人陳紹泰年一百二嵗餘慶縣老人張三祥年一百嵗本年二月浙江巡撫王度昭題報餘姚縣民謝兼才之妻傅氏年一百嵗本月護理偏沅巡撫印務布政司阿琳題報桃源縣老人龔文楚年一百一嵗本年三月山西巡撫蘇克濟題報屯留縣老人蕭自富年一百三嵗臨晉縣老人陳之璠年一百二嵗本月福建巡撫覺羅滿保題報龍溪縣老人林敬李邦龍俱年一百嵗詔安縣老人鍾志髙年一百嵗本年四月雲南巡撫吳存禮題報尋甸州老人李輝祖年一百一嵗本月陜西巡撫永泰題報盩厔縣老人毛竒年一百二嵗蒲城縣老人宋永熙王日中曹允龍俱年一百一嵗吳朝銀年一百三嵗澄城縣老人王天祐年一百二嵗本年五月陜西巡撫永泰題報醴泉縣民劉芳節之妻邱氏年一百二嵗本年六月直𨽻巡撫趙宏燮題報文安縣副將馬自新之妻徐氏年一百嵗本年七月江寧巡撫張伯行題報山陽縣民任邦經之妻張氏年一百嵗本年八月湖廣巡撫劉殿衡題報江夏縣民黃太位之妻歐陽氏年一百嵗本年十一月廣東巡撫滿丕題報南海縣老人生員黃猶顯年一百一嵗三水縣老人羅萬祥年一百一嵗髙要縣老人梁楚環年一百三嵗開平縣老人張子標年一百嵗臣等伏覩皇上御極五十餘年一道同俗引年尚齒凡七十以上老人恩例每逢國家慶典遍行賜給光天之下化日之中含飴扶杖嬉逰太平者多歷年所矣至是以慶祝集京師皇上稽古禮文肇行盛典國老庶老次第錫宴以示慈惠而恩賚所及則荒陬逺徼罔弗霑濡蓋虞夏以來未有也六經之言養老者書稱羞耉詩詠授几條目之詳具于三禮王制曰有虞氏養國老于上庠養庶老于下庠夏后氏養國老于東序養庶老于西序殷人養國老于右學養庶老于左學周人養國老于東膠養庶老于虞庠所謂國老者有六鄉之鄉老有卿大夫致政之耆老有三老五更之老所謂庶老者有引户挍年之老有司徒以保息養之之老有遺人以委積養之之老有司門以其財養之之老虞夏商之禮周人修而兼用之祝噎祝哽執醬執爵羅氏獻鳩外饔掌亨酒正供酒稿人供食彬彬極盛矣顧以其時考之王制言七十養于學逹于諸侯周官言夫家老幼鄉遂大夫董其事月令養衰老授几杖行糜粥亦申命有司故王巡狩之禮就見止及百年鄉飲酒之禮齒位秩于黨正凡天子春秋入學合樂所親行燕饗食之禮以養之者國老庶老度不過近郊數百里間而又兼考德行鄭氏注所謂老人衆多不可皆養者是也東遷以後禮制漸湮漢文始詔問民間長老八十以上賜肉九十以上賜帛歷代多遵行之光武建三雍之禮明章繼統尊事三老兄事五更號為隆軌魏晉而降依倣其議然辟雍所養特三老五更二人而羣老不與焉既非古禮之意而嵗時粟帛之賜長吏怠事莫肯躬親甚至粳粃相半不可飲食延及唐宋登板授之官則濫給恩澤降存問之詔則空飾文辭四代聖人以孝弟風示天下之意闕焉未講蓋二千年于茲矣皇上逺覽古今事以義起于慶祝禮成特行養老之典上自公卿下逮氓庶咸造几筵古國老庶老之位也年六十五以上即得預宴周官六十有五不任役事之義也臣民則同日而别其班滿漢則分日而均其惠推恩訖于廢疾錫類下及婦人合九域之歡心介百順之景福燕衎者三日飫德者萬人此虞夏商周之所未能儷也親臨閲視臣民八九十以上手授杯斚諸皇子皇孫率宗室子弟往來勸侑執爵饋食之文也敕諭耆老俾各歸訓里閈儀禮大夫士老于鄉尊為民師以教鄉人士之式也登降則並集宗藩酬酢則不遺疏賤降天潢而修子弟之職發德音以培風俗之原協萬邦于孝悌力田措一世于和平寬大敦崇根本導迎善祥此漢唐宋明之所不敢望也至于方域遼廓則戒有司以時拊循塞徼遐荒則敕邉吏所在存恤臣等竊揆恩詔所及蒙恩不下億兆人經費不下百萬計兒齒台背鳩杖逍遙朝有三夀之朋野多百齡之瑞天人欣合中外禔福其信然矣然則本之以誠秩之以禮教之以義終之以仁一舉而衆善備焉董仲舒曰堯舜行德則民仁夀司馬遷曰煙火萬里人民樂業自年六七十翁逰敖嬉戲如小兒狀以今凖古殆于兼之皆我皇上老老之一心有以握其原而衍于無窮也臣民銜恩奏謝凡遵照成格恭報人數銀兩者概置不録間采數章于後以附曠典鴻施永垂奕祀云內大臣和碩額駙臣尚之隆等奏為恭謝天恩事欽惟皇上至仁性植景福天申躋一世于春臺享萬年之厯服大德必夀聖言明徴昌後燕天詩篇炳煥茲者恭逢萬夀六十自近畿逺省暨于海澨邉陬老幼扶攜奔趨闕下盈千纍萬祝聖瞻天此誠發于愛戴之公心故不覺其歡呼之同願自三月朔日至二十一日日霽風和塵霾不挂輦路所經萬姓跪伏焚香填塞道路咸得仰觀天表俯愜輿情蒙皇上賜席數千張自暢春園至禁城沿途擺設命皇子皇孫百餘人步行看視醉飽天恩普及臣庶逮至祝頌事畢二十二二十三兩日甘雨應時淋漓普遍貽我來年兆啓豐穰臣等愚昧有以竊窺天意人心上下嚮應斷斷乎其不爽者也更蒙皇上軫念逺來數萬官民于二十五二十七等日舉行養老之典且使臣等在朝滿漢大小臣僚以至八旗兵丁間散人等齒及格者皆得與焉皇上御殿令皇子皇孫執爵皇上親賜臣民耆老者酒又命皇子皇孫執爵傳觴遍行勸侑二十八日又齊集八旗數萬年老婦人于皇太后宫賜宴隆儀渥澤振古稀聞凡兵民男婦人等自六十五以上者賜縀匹衣服及銀兩有差又進臣等于內自六十五以上者賜暖涼帽袍挂鞾襪寶硯各有差詩所稱般賚之恩旨酒之貺衮黼之錫未足為喻也至于庶臣以詿誤落職者咸矜其年老還以原官使完晚節其中大臣逮事世祖章皇帝者則復特加宫保以示殊恩故事恩詔封蔭止于現任特旨休廢之臣亦得破例均霑此皆歷代之所未有者也皇上手撰諭旨示天下老人以朝廷優養之恩實為草野風勵之本俾各歸家教導子孫力行孝弟以篤風化之原以興禮樂之基訓詞深厚臣等跪讀之下莫不竦然動心焉伏念臣等生際明期躬逢曠典平昔之所未聞者今日皆得親見千載一時欣幸何極况乃共沐恩波光榮逾分感極生愧又未知枯朽之身何以仰酬雨露之施于萬一也臣等不勝歡忭感激之至謹合詞具奏稱謝以聞總督淮揚等處地方提督漕運海防軍務兼理糧餉兵部右侍郎兼都察院右副都御史臣郎廷極謹題為天心下逮髙年野老親霑皇澤隆恩曠古下悃難酬謹據輿情代疏題逹事據淮屬耆民龎爾淳等呈稱竊惟哲后有引年之典昔王有養老之文虞夏以降或僅得之傳聞漢唐以還久不逢茲盛事何期生當聖世乃得躬覲天顔殊恩為千載所難逢感激尤寸忱所莫罄茲康熙五十二年三月十八日恭逢聖主六旬萬夀淳等身沐揮絃之化虔申曝日之私不過如螻蟻之望雲豈敢企草茅之登陛若使得邀天聼便為生世之榮寵以俞詞已沐雲霄之澤乃蒙九重賜宴三殿陳籩天漿法饌竟霑藜藿之腸玉膾金羮遍飫田氓之腹皇子皇孫之貴手遞霞觴不識不知之民親嘗雕俎更復黼帷近啓黃幄遙開紫綍親傳真喜去天不逺玉音時降咸誇近日偏多既以次而問年復計人而頒賜皇恩遍及聖澤胥霑竊考古書所載執爵執酳僅為鄉里尚齒之文賜帛賜租已極盛朝逮下之德未有躬履雲階月地之貴身近龍顔日角之光引以家人父子之親被以異數隆施之渥如今日者也淳等喜極若驚固已永鐫肺腑感深入骨無由自獻闕廷為此籲請専疏代題恭謝天恩又據淮安府知府梁星煜具詳前來等因到臣欽惟我皇上仁𢎞覆載澤遍寰區恩德被于萬方臣僚稱慶聲教訖于四海野老均霑今據淮屬耆民龎爾淳等籲請代題臣目擊輿情真切理合具疏代題恭謝天恩伏乞宸覽施行兵部右侍郎兼都察院右副都御史總督河道提督軍務加五級臣趙世顯謹題為聖德廣被海宇野老親霑帝澤謹據輿情恭疏代謝天恩事據江南淮揚徐府州縣沿河耆民髙天成等呈稱伏惟我皇上功髙五帝道邁百王乃聖乃神仁恩周于四表允文允武聲教及于八荒海不揚波頌太平者五十餘載山無伏莾奉正朔者億萬斯年中外歡騰臣民抃舞成等生長東南窪下之地曩有泛濫不時之虞自鑾駕數臨神謀屢頒兩河悉臻底定澤國盡屬沃壤頻年以來民生安業士樂絃歌皆聖天子良謀睿算之所致也成等身受皇恩圖報無由欣逢康熙五十二年三月十八日聖主六旬萬夀昌期臣等赴京叩祝萬夀虔申草野之愚忱獲覲龍顔乃遂生平之素願蒙賞御宴得嘗天家異味又命皇子皇孫手賜霞觴受寵九重成等草野愚氓何以當此異數隆施仰沐天恩有加無已復計年頒賜野老遍霑真亘古罕覯千載難逢者也成等還家喜不自禁欽遵上諭遍告里鄰以及親族子姪教之孝悌勉之禮讓以期毋負皇上諄切訓誥至意宣布之下里鄰士民聞之無不感激歡騰與成等蚤夜虔禱惟願皇上夀與天齊福同地久成等生生世世永戴皇仁于無既矣為此籲情特疏代題恭謝天恩臣目擊輿情真切不敢壅于上聞理合具疏題報謹題巡撫廣西等處地方提督軍務兵部左侍郎兼都察院右副都御史加三級臣陳元龍謹題為聖朝養老恩隆惇倫化逺謹據輿情恭謝天恩事臣于本年五月初五日接準户部咨文為移送事準內閣典籍廳文開本月二十五日奉上諭各直省老人諭旨欽此刋刻刷印一千張發户部均發順天府府尹并各直省撫院轉給來京祝夀耆老不可遺誤等因前來應將所頒上諭行文各直省巡撫并順天府府尹照依所頒上諭如式刋刻刷印轉給該地方耆老不可遺誤仍遍行曉諭可也等因到臣臣即行布政司照依所頒上諭如式刋刻刷印轉發各府州縣查給地方耆老仍遍行曉諭自城市以至鄉村雖山陬溪洞至逺極僻之處務期宣示周遍咸知我皇上以教孝教弟為移風易俗之根本御筆親撰諭旨不憚諄諄告誡雖堯之平章百姓舜之敬敷五教未有如聖諭之愷惻深摯切近詳明入人者深動人者逺即至愚夫愚婦無不為之感發而興起也茲據桂林府臨桂縣耆老李昌泰陳三生黃雲極等公呈稱昌等幸逢仁夀之世皆登耄耋之年生長邉方未嫻禮教伏讀聖諭講究孝弟之本心昌等在各鄉各村傳集老幼人等宣讀講論人人聳聼有感激而涕泗交頤者有愧恧而頭低面赤者有歡忭而踴躍鼓舞者北望叩頭齊聲皆呼萬嵗從此父慈子孝兄友弟恭各愛其親各敬其長獄訟自息盜賊自銷真成熙熙皥皥之風矣昌等年老之人仰荷皇恩賞賚皆得衣帛食肉似此養老仁政亘古所無今見風俗淳厚子孫孝謹相與含哺鼓腹歌詠太平正未有艾普天耆老無非聖夀錫福所賜但微賤小民感戴之誠無由上達籲求代題等情又據布政使黃國材具詳轉據桂林府吳元臣等各據所屬耆老等公呈懇乞代題恭謝天恩等情前來臣不敢壅于上聞理合據情代題伏乞皇上睿鑒施行謹具題知巡撫福建等處地方提督軍務都察院右副都御史臣覺羅滿保謹題為聖夀同天皇恩如海籲請詳題代謝以達輿情事據福建布政使司布政使李發甲呈詳據福州興化泉州漳州延平建寧邵武汀州臺灣九府并福寧州會詳據各縣詳據通省在京領賞八十嵗以上老人張獻福郭日新陳萬春等在籍領賞侯題建坊一百一嵗老人李華天張嶽榮等呈稱福等幸生聖世飽食暖衣抱子弄孫不識不知優遊于光天化日之下熙恬于歌衢舞巷之中身享太平之樂至矣極矣恭逢聖天子六旬大慶福等有赴京叩祝者有在家遙祝者欽蒙皇上大沛殊恩在京叩祝者既已袖滿帑金脣霑御酒在外遙祝者亦得身披輕暖腹飽肥甘又蒙諭旨渙頒令福等教訓里閭共敦孝弟福等蒙此天恩無可圖報惟願合天下萬國九州億萬老人之夀為皇帝萬萬嵗一人之夀不勝踴躍歡呼伏乞轉詳代題等情前來臣目覩輿情真切不敢壅于上聞理合具疏題報謹題萬夀盛典初集卷二十一
