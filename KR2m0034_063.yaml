body:
  text: 欽定四庫全書萬壽盛典初集卷六十五歌頌五大臣四萬夀詩五言律十二首有序經筵講官户部左侍郎加一級臣王原祁臣以凡庸謬膺寵遇恭逢聖夀冀展愚誠黼黻依光敢附華蟲而作繪苞符呈瑞希同龍馬之負圖末綴蕪辭上申華祝其數取十二者竊效虞書之封秩十有二山衍皇極之干支十有二萬云爾嵩岳齊天喬岳首維嵩巍巍作鎭雄一峯髙在上億載屹居中峻極天關逈恒齊聖壽崇祝釐騰萬嵗率土頌聲同蒼嶺雲松嶺髙懸紫翠松茂䕃崚嶒濤捲風聲合根盤露氣凝雲霞成組繪日月竝升恒逺邇齊翹首叅天最上層仙館雲泉暖風開館宇瑞靄接蓬瀛雲斂重霄淨泉涵萬象清青山恒不老綠樹自長生髣髴聞仙籟時和鳯鳥鳴山莊豐樂農事因時節耕餘聽鳥歌所欣春浩蕩相與舞婆娑花栁村村接風光日日和大田多稼樂聖世湛恩波春山布澤膚寸春雲合氤氲出翠微舉頭山靄靄轉瞬雨霏霏潤及寰中徧甘從樹杪飛乗時施大澤天意念民依桃源日永雲山阡陌沃四面少風塵人樂舒長日花明爛熳辰溯源皆活水接地盡陽春聖化隨方滿年華萬載新層岡晴碧曉色標雲漢晴光轉翠屏居髙明自逺歴久氣常青地厚人煙古春多草木馨岡陵堪獻夀拜舞向彤廷溪亭春靄清晏時光好溪山簇衆芳熙熙韶景麗灔灔碧流長俗美因豐嵗居安賴聖皇茅簷春酒熟願進萬年觴關山煙霽一統昇平日千山氣象開青雲隨日上紫氣自天来春度關門栁晴舒驛路梅方輿無逺近到處是蓬莱金闕松泉殿閣齊霄際山川繞座前水清恒浴日松古不知年疊翠千尋嶂跳珠百尺泉願依䨇闕下長此戴堯天富春春曉公望留眞蹟披圖試一臨聖朝無隱逸雅化到山林開霽江天勢同春造物心今時踰漢代歌頌繼元音和風應律陽和生玉琯吹萬布春温草偃皆知徳溪平盡覺暄從容能中節淡蕩自培元共仰時雍盛三多祝至尊聖壽萬年詩七言律十首有序經筵講官内閣學士兼禮部侍郎臣蔡升元伏以天行不息運元化於洪鈞聖壽無疆叶昌辰於寳厯車書大一統正際河清海晏之期宇宙樂同春共申華祝嵩呼之願恭惟我皇上參天贊地邁帝超王性夲神靈更見日新月盛治登熙皥猶勤旰食宵衣孝思深篤於宫庭誠悃肅將乎郊廟允文允武一身兼創守之隆同軌同倫萬國仰徳威之大傳自古不傳之韜畧覺隂符陳篋亦猶衍厥浮詞廓從前未廓之版圖即重譯来朝詎足方兹駿烈奏安瀾於千載龍馬呈祥消伏莽於崇朝鯨鯢息浪凡此治功之立效悉由睿算之如神况府脩事和咸臻上理而省刑薄賦尤厪皇心爰書必推至再三羣仰好生若帝正賦亦蠲踰千萬總期藏富于民爾迺離照方中値五十餘年之景運巽風廣被賜一十九省之全租侯甸要荒無一夫而不獲東西南朔歴三載而咸周粤夏王補助之施僅傳遊豫即漢主田租之復未盡蠲除若我后無窮無盡之深恩實從古未見未聞之曠典為蒼生而惜福豈徒澣濯以朝比古帝之齋居仍是茅茨不剪躬行儉徳節用正所以愛人親製官箴安民必先於察吏寮寀與公卿並恤而錄舊褒忠之典并及先臣儒官偕武士俱升而敷奏明試之條不遺一命尊賢崇祀芹宫頖璧盡生輝增額開科桂籍瓊林齊戴澤當夫憂勤罔逸最厪念乎農桑有時幾務偶閒即精研乎經史發瑯嬛之秘摛文則玉振金聲騰奎壁之輝灑翰則龍翔鳯翥是惟濬哲文明之聖乃致康寜富壽之全兹者嵗在昭陽天開夀域律當姑洗人樂康衢八千嵗一大春秋靈根不老六十齡初周甲子寳厯方新羲畫夲重三倍覺體徵剛健坤爻兼用六愈知徳合清寜是以器車澤馬之禎紛呈丹闕獻雉貢獒之衆羅拜彤墀忭于野舞于廷額手擎觴羣相賀一人有慶山之陬海之澨駢肩接踵皆不逺千里而来紺宇琳宫香靄長春之國華燈綵幔光浮不夜之城盛事重逢湛恩彌溥在昔膺圖首出早矢諴民阜俗之懐迄今久道化成果徴風動時雍之盛蓋大聖人規模宏逺夲自性生而數十載明旦糾䖍愈承天眷巍巍蕩蕩自三代而降漢唐宋無此功徳之夐隆奕奕綿綿即二帝以還夏商周誰比昇平之悠久臣升元弇鄙庸材單寒下士榮叨禁地卅年濫厠清華寵賁兼金三世均霑浩蕩錫類既推于祖父賜居更庇乎妻孥顧供職多愆常䝉涵蓋而問心孔疚徒負高深每懐犬馬之忱一飯不忘黼座忽荷龍鸞之詔全家再傍金門矢報無從銜恩有願願我皇多福多壽多男子逺過堯年願我皇如山如阜如岡陵直逾軒厯敬抒蕪句聊展葵忱大聖膺符景福綿日華雲爛慶中天無疆國祚常開泰不已王心獨體乾蓬海籌初添六十綏山桃正熟三千竹書不用誇羲昊甲子從今次第編其一功徳巍巍亘八荒身兼創守邁前皇洗心革靣遵王路鑿齒雕題隷職方胞與早懐初踐祚昇平果見永垂裳須知聖主勤民切始願於今不暫忘其二六十年来法健行聖躬彌固徳彌貞堯睂舜目添神采禹鼎湯盤益勵精天意欲教民久治人心實願帝長生共言遭際勲華代永得䝉庥樂太平其三蠲賑恩深久浹膚年来况復賜全租百千萬億周天渥南朔東西動地呼野老三時安作息官司終嵗罷徵輸自聞擊壤歌衢後盛事從稽舊史無其四關心農事切疇咨瑞應先歌多稼詩首善地呈禾七尺是年北直稻穂皆髙七尺屢豐嵗過麥雙岐好生最是延年徳行儉無非養福基徳福兼隆天錫祉遐齡豈止邁期頤其五一統車書薄海同更隆文治振儒風闡揚正學心源合升配先賢禮數崇特闢兩闈齊入彀每逢十載徧呼嵩作人壽考光雲漢喜覩離明日正中其六記得華封祝五旬河千獻頌及兹辰康熈四十二年頌聖駕南廵恭進聖壽萬年䝉褒奬賜金上元又啟循環運初度重逢保佑申厯算正長方一甲韶光最好是三春年年中外騰歡日航海梯山拜紫宸其七望道虛懐滄海深愈徵道岸逈千尋尊稱屢却廷臣表往籍如披座右箴徳本性生常睟面嵗增耳順漸從心自兹積算無窮紀萬國呼嵩總似今其八矜憐愚魯得投閒忽拜恩綸復賜環自昔虚慙陪豹尾此生重喜覲龍顔五年職忝清華地四載神依供奉班最是趨朝剛介祝康衢處處頌南山其九和風瑞日靄千門春暖仙桃引御樽田野爭来添景福駑駘何處答深恩撫心五夜空流汗稽首三辰學負暄常願追隨鵷侣後年年嵗嵗祝羲軒其十萬壽賞兵詩附皇上萬夀齊天嵗癸巳恭逢六旬正誕大沛恩綸普天同慶更加意軍士分遣廷臣頒賞直省綠旗官兵臣升元奉使秦省目覩兵弁歡呼輿情愛戴恭賦軍中樂二十四首以誌盛事銜命西来父老迎千村萬井賀昇平喧傳盛典眞希覯聖夀今年特犒兵其一河山百二地圖雄勁旅强兵冠宇中渙汗宣来三殿詔黄沙紫塞總春風其二敷天大賚首秦關銖兩都将正賦頒較昔西廵恩更逺新膏萬里到天山其三天語煌煌下直廬按營親要歴村墟全秦人拜朱提寵十萬曾無涓滴虚全秦之兵不下十萬其四撿籍呼名里系詳家分户給徧戎行欲知帝徳難窮處太華山髙渭水長其五恩波直己過龍堆絶漠春從天上回兕虎熊羆齊手額歡呼動地一聲雷其六原從仁夀沛宏施不是尋常等犒師北向山呼天咫尺笙歌一𣲖儼朝儀每賞軍畢皆北向謝賜恩必令奏樂以榮君昭盛典也其七捧得精鏐馬上歸全家老穉沐恩輝時平豈羨唐宗事辛苦沙塲始賜衣其八八郡三邊感切膚千羣萬騎竝歌呼投醪挟纊傳聞舊我后深仁振古無其九軍營已徧沐恩綸訓練還傳誥誡諄一日不教忘武備天心篤眷是西秦其十角弓影抱闗山月組甲光生邊塞秋正是聖朝全盛日軍威到處震遐陬其十一竒正方圓陣勢分縱横變化入風雲軒轅心法誰傳得指授成謨夲大君每營賞閲後皆各演陣法其十二白羽琱弧壓寳刀旌旗簇簇馬蕭蕭縱教名列賢書貴仍向雲中日射鵰各營中多有中式武舉仍遵㫖食糧操演武藝其十三雍雍甲士有文儒豈特赳桓羨武夫韜畧盡從書卷得古来兵法在孫吳其十四况今聖誕闢恩科棫樸干城竝網羅夀考作人無二視鼔鼙聲裏聽絃歌萬夀恩科特開文武兩闈近又奉㫖許文武交互應試其十五塞外諸酋久戴恩聞風絡繹叩旌門環呼聖德天来大膜拜朝朝禮世尊凡榆林寜夏凉州甘肅西寜及洮岷等處番彜聞恩命到時皆叩迎道左備奏感恩之語其十六不逺天威對使星欣逢盛事到邊庭羌絃也效南山曲莫作伊凉塞上聽其十七遐邇穹廬總一家風清四塞靜鳴笳書生全未諳軍旅奉使還勝博望槎其十八日覩諸營祝華封瀕行還見整軍容擎觴願藉皇華使好把愚忱達九重每一營賞畢臣臨行時衆兵仍列隊伍携酒肴送至郊外感頌天恩籲臣代奏其十九吾儕生長在邊荒沙磧難耕賴月糧格外又霑新雨露從教瘠土亦豐穰其二十五十餘年豢養深况承内府錫兼金彎弓躍馬尋常事未盡酬恩一寸心其二十一鑄得銀牌供佛前感恩晨夕爇香烟太平時節無由報只祝君王萬萬年其二十二迢遞三秦隔帝臺未能介祉上蓬莱呼嵩猶喜南山近長戴堯天作夀杯其二十三戢矢櫜弓百億春乾行益健益精神每逢十載恩加渥地久天長戴聖人其二十四萬壽盛典初集卷六十五
