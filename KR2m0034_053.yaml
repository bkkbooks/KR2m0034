body:
  text: 欽定四庫全書萬壽盛典初集卷五十五慶祝五貢獻二三月十五日壬辰諸王貝勒貝子公以下內外文武大臣官員各進縀匹鞍馬等物慶祝萬壽上皆却之康熙五十一年十二月初一日禮部為通行事查三十九年恭遇皇太后六旬大慶四十九年恭遇皇太后七旬大慶俱係欽奉上諭本部具題和碩親王等以下八分公等以上各酌量進獻器皿鞍馬蟒縀等物頭等大臣進獻縀八匹二等大臣進獻縀六匹在案四十二年恭遇皇上五旬大慶本部亦行具題王等大臣官員各酌量進獻今來歲恭遇皇上六旬大慶相應通行知㑹中外除八旗各省督撫本部行文外將軍提督副都統總兵等官移咨兵部轉行知㑹可也五十二年三月十二日禮部尚書臣赫碩色等謹奏恭逢聖主六旬大慶諸王貝勒貝子公內外大臣官員各盡臣子之心進獻縀馬等物若令自行進獻恐參差不齊十八日萬壽正誕閒散宗室覺羅并內外紳襟舉人生員軍民商賈耆老等在午門前行禮者甚衆若將進獻等物陳設一處恐致擁擠臣部傳齊於十五日在暢春園正門外恭設將所進物件數目另繕摺子具奏為此謹具奏聞本日奉㫖著停止十二日禮部尚書臣赫碩色等謹奏恭逢聖主六旬大慶諸王福晉格格亦各進獻衣服等物若令同日進獻似屬煩雜臣部傳齊於十六日在暢春園正門外恭設將所進物件數目另繕摺子具奏為此謹具奏聞本日奉㫖著停止十五日王以下文武大臣官員咸以停止進獻雖奉明㫖而慶祝大典不能自已仍齊集暢春園宫門外陳設恭進上仍却弗收所進儀物宗室王以下八分公以上金銀珠寶器皿蟒粧縀匹鞍轡等物隨便進獻例無一定者俱細載於後其不入八分公以下及文武大臣官員所進縀馬各以品級為差悉依官階叙列不更書名至奉國將軍以下閒散宗室以上天潢懿親禮以義起所進縀馬數亦不等附載宗室後諸王福晉格格於十六日亦仍各進衣服等物因已奉停止之㫖未有總摺可稽附載一二以志一時典禮庶每厯十年舉行大慶有所考焉宗室和碩康親王臣冲安恭進珊瑚念珠一盤木米念珠一盤金爐一座金箸瓶一副金香盒一箇金執壺一對色縀一百匹鞍馬六匹和碩顯親王臣衍潢恭進鑲嵌珊瑚一座青金孔雀石一座鑲嵌孔雀石金乂拉一箇金茶桶一箇金執壺一對金杯一對金托碟一對色縀一百匹鞍馬四匹和碩莊親王臣博果鐸恭進金鼎一尊金執壺一對鍍金銀插瓶一對鍍金銀乂拉一對色縀一百匹鞍馬四匹附莊親王太福晉進獻禮物東珠帽二頂團龍掛一件補掛一件金線龍袍一件團龍袍一件香色縀襖一件月白寧紬襖一件珊瑚雲荷包牙籤筒小刀手帕帶全副朝鞾二雙蟒襪二雙坐褥一箇扶手二箇靠背一箇莊親王福晉進獻禮物東珠帽一頂石青縀補掛二件紅青縀掛一件香色八團袍一件寶藍縀袍一件醬色縀袍一件米色綾襖一件藍色寧紬襖二件珊瑚雲荷包手帕帶全副朝鞾二雙粧縀襪二雙和碩裕親王臣保泰恭進金執壺一對金杯一對金托碟一對色縀一百匹鞍馬四匹和碩簡親王臣雅爾江阿恭進珊瑚念珠一盤鍍金壽壺一對金杯盤一對金瓶一箇金盒一箇金乂拉一箇色縀一百匹鞍馬六匹多羅信郡王臣德昭恭進嵌石金執壺一對鍍金銀杯一對鍍金銀托碟一對鍍金瓶一箇長春玉杯一對朝天鼎一座四喜鼎一座百環瓶一座白玉壺一座鶴鹿同春玉筆架一座碧玉筆筒一座端溪硯一方瑪瑙水盛一器成窰杯一對𢎞治嬌黃盤二對上林圖一幅色縀八十匹鍍金鑲嵌鞍二副銅鍍金鞍二副繡鞍二副鞍馬六匹多羅安郡王臣華玘恭進珊瑚念珠一盤金壺一執鍍金杯盤二副鍍金銀多木一執鍍金銀馬爐一座蟒色縀八十匹鞍馬六匹多羅平郡王臣訥爾蘇恭進金盤一座金杯二對金壺一執色縀八十匹鞍馬六匹多羅順承郡王臣布穆巴恭進軒轅明徽圖一冊宋版文章正宗二套治水圖一卷樓閣仙山圖一卷戴晉山水圖二幅翠木圖一幅山隂圖一卷唐寅字一卷董其昌集錦圖一冊宋鼎瑶臺一座宋瑪瑙葵花洗一器宋磁秦爐一座宋均窰洗一器白玉長春花杯一對水晶仙桃一座方玉花尊一座青金方花尊一座琥珀仙一座飛翠八寶瓶一座琪南香山一座梅黃瑪瑙一座玉水盛一器成窑雙冠瓶一座汝窑瓶一座法琅爐一座花蜜蠟杯一對金杯一對金壽星一座小念珠一串鍍金銀執壺一對鍍金銀乂拉一箇萬壽縧環一對色縀八十匹鞍馬三對多羅貝勒臣克貞恭進色縀六十匹鞍馬四匹多羅貝勒臣延壽恭進金壽星一座金壺一執金盤一對色縀四十匹鞍馬四匹多羅貝勒臣滿都護恭進金壺一對金杯盤二副色縀六十匹鞍馬四匹附貝勒夫人滿都護之妻進獻禮物龍衣一襲縀衣一襲扶手二箇靠背一箇坐褥一箇固山貝子臣蘇努恭進珊瑚念珠一盤緑松石念珠一盤金執壺一對金杯盤二副色縀四十匹鞍馬四匹固山貝子臣魯賔恭進珊瑚念珠一盤鍍金銀執壺一對鍍金托碟一對鍍金杯一對色縀四十匹鞍馬四匹鎮國公臣經希恭進色縀四十匹鞍馬四匹鎮國公臣吳爾占恭進色縀三十匹鞍馬四匹鎮國公臣凖達恭進色縀三十匹鞍馬四匹鎮國公臣登塞恭進珊瑚念珠一盤金壺一對金杯一對色縀三十匹鞍馬四匹鎮國公臣額爾圖恭進玉瓶一對玉杯一對金盤一對色縀三十匹鞍馬四匹鎮國公臣吞珠恭進色縀三十匹鞍馬四匹鎮國公臣德普恭進色縀三十匹鞍馬四匹鎮國公臣敬順恭進色縀三十匹鞍馬四匹鎮國公臣楊桑阿恭進色縀三十匹鞍馬四匹鎮國公臣普貴恭進蟒粧色縀三十匹鞍馬四匹散馬二匹鎮國公臣普竒恭進色縀三十匹鞍馬四匹散馬二匹鎮國公臣星海恭進珊瑚念珠一盤色縀三十匹鞍馬四匹鎮國公臣諾音托和恭進色縀三十匹鞍馬四匹輔國公臣門度恭進色縀三十匹鞍馬四匹輔國公臣訥默孫恭進金瓶一座金杯盤一副色縀二十匹鞍馬四匹散馬四匹輔國公臣塞勒恭進色縀三十匹鞍馬四匹輔國公臣普照恭進色縀二十匹鞍馬四匹輔國公臣蘇爾金恭進色縀二十匹鞍馬四匹輔國公臣阿布蘭恭進香亭金佛一座色縀二十匹鞍馬四匹輔國公臣星尼恭進詩畫古董二十件色縀二十匹散馬二匹和碩簡親王之子應封宗室臣雍乾恭進米芾字一卷董其昌字十幅李昭道畫一卷仇英畫一軸玉磬一座玉鼎一座玉尊一座玉象碁一盤映青太平車一架洋漆盒一對定窑磁碟一對哥窑花尊一座宣窑梅瓶一座昌窑碗一對正德磁碗一對嘉靖小磁碟二對不入八分公鎮國將軍各恭進縀八匹馬四匹輔國將軍各恭進縀六匹馬二匹奉國將軍奉恩將軍宗室章京侍衛應封宗室閒散宗室等各恭進縀匹鞍馬不等亦無定數滿漢世襲官員民公侯伯輕車都尉各恭進縀八匹馬四匹馬四匹者鞍二副後倣此雲騎尉各恭進縀六匹馬二匹馬二匹者鞍一副後倣此內務府八旗滿洲䝉古漢軍官員內大臣都統各恭進縀八匹馬四匹護軍統領前鋒統領副都統各恭進縀六匹馬二匹參領各恭進馬二匹部院衙門滿漢官員大學士尚書左都御史各恭進縀八匹滿洲加馬四匹侍郎學士副都御史宗人府府丞通政使大理寺卿詹事太常寺卿府尹太僕寺卿光祿寺卿鑾儀衛使各恭進縀六匹滿洲加馬二匹僉都御史左右通政大理寺少卿少詹侍讀學士侍講學士祭酒庶子侍讀侍講諭德洗馬太常寺少卿太僕寺少卿鴻臚寺卿順天奉天府丞通政司參議光祿寺少卿中允贊善司業鴻臚寺少卿給事中御史郎中各恭進縀四匹滿洲加馬二匹一匹不等直省滿漢文武官員鎮守將軍總督提督各恭進縀八匹巡撫副都統總兵官各恭進縀六匹萬壽盛典初集卷五十五
