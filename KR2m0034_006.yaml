body:
  text: 欽定四庫全書萬壽盛典初集卷六聖德二謙徳三三月二十日和碩親王衍潢等請以萬壽節慶祝盛典宣付史館撰文立碑以垂永久詔弗許三月二十日和碩顯親王臣衍潢等謹奏為聖壽無疆大慶普天頌禱難名恭請宣付史館記載碑文以慰輿情以垂永久事欽惟皇帝陛下惇大裕民視中外爲一體憂勤飭治垂法則於萬年大孝格天至仁匝地惟聖德日茂合撰乾元斯福壽兼隆同符大造允文允武教化浹於遐方克寛克仁恩澤及於庶類自御極五十二年以來内安外靖皆出廟算之周詳肆赦頻蠲總賴宸衷之獨斷憂勞節儉以爲萬姓而非圖一已之安敬止緝熙以孚萬年而不僅一時之計有感必通至微畢照仁民愛物始自親親尊位重祿同其好惡外自公卿以至匹夫匹婦無不霑被厚恩内自親王以至九族九宗無不感䝉聖澤恭遇皇上六旬大慶天下臣民踊躍歡呼齊集京師經營不愛其財子來不惜其力自暢春園以至京城繡幙懸燈錦樓結綵不分晝夜巷舞塗歌十七十八兩日皇太后皇上進宫鑾輿出入以天下之樂爲樂不加警蹕使得共仰天顔文武官員老㓜婦子萬萬百姓道左焚香頌禱之聲不絶實係古今未有史冊未聞之事也臣等䝉恩最重仰見洪福齊天歡聲動地不勝抃舞伏祈勅下内閣大臣以今日盛事命史臣編次勒石立碑其應在何處立碑請勅下該部確議奏聞倘䝉俞允則四海之輿情大慰萬年之盛事永垂矣爲此謹題請旨本日奉旨此事伊等自然記著不必立碑四月二十四日和碩親王衍潢等復請建立萬壽碑文上仍不許四月二十四日和碩顯親王臣衍潢等謹題爲聖德貫乎上下大慶洽夫神人請紀盛典永垂萬年事欽惟我皇上睿質天亶至仁至聖君臨天下撫綏萬國誠越百王而邁千古恭逢皇上六旬大慶衆心感戴不能自已具疏請上尊號奉旨未允臣等從前疏内所稱聖德神功俱係實事竝非虛語我皇上御極以來五十二年間敬天法祖勵政勤民不遑日昃親祀郊廟殫竭精誠承歡慈幃備隆尊養篤念本支則廣推親愛加厚宗室則大沛恩榮宵衣旰食日親覽夫萬㡬勸織省耕時殷懐於兆姓水旱災傷天行偶沴蠲除賑糶惠澤頻頒歴年蠲免之數已逾萬萬而三歲一周之令復渙德音盛京朝鮮年穀稍歉特遣官員航海運賑又以水利河道所關甚要躬臨相度指示修防南北各河皆得奠定民生漕運永獲安瀾尤重祥刑以安民命爰書必慎決獄惟寛屢頒肆赦之文特下矜全之令且優恤禁旅之勞時沛非常之澤設蓋營房俾獲寧宇立官庫以濟緩急賚帑金以清私逋一應遠近差役給與駝馬行糧至於用人時命保舉以簡才能務親引見以試賢否整嚴兵備時加訓練追眷世勲則延懋賞以及於累葉特編史冊則錄副本以賜其後人追念舊勲均錫爵位朝列舊臣務全終始行間宿將倍錫恩榮察訪高年時頒優賚功則超越三謨徳則包涵二典篤敬純孝厚澤深仁洵千古所未有也至於三孽拒命特指授方畧用張六師量地方之逺近山川之險要水陸竝征舟騎兼行奮雷霆而進虎臣殄鯨鯢而為京觀收察哈爾於邊隅輯俄羅斯於荒服東溟逋宼悉就殲除塞北窮番咸歸版籍惟厄魯特噶爾丹恃其邊逺敢肆陸梁洊噬隣藩至干天怒當衆議之遲疑賴聖心之獨斷大張天討親整王師六飛踰瀚海之津三駕極狼胥之域跋扈之宼終獲剪除依附之奸咸皆革靣呼呼腦兒厄魯特及西域之土白特等遂乃輸誠款服其餘茅龍山宼東齊俞七打箭爐紅苗徭人黎人等𠞰撫兼行恩威竝用武功旣震於邊陲文教聿光乎時夏崇儒重道親詣闕里千官陪祀九拜致䖍而御藻宸章光昭雲漢𢎞闡經學之精微褒錄諸賢之後裔特命表揚朱子祀大成殿列十哲之班又復優禮前王倍崇儀典駕幸浙省則拜祀禹陵幸秦中則命書御名致祭周文武陵寢幸江寧則於明洪武陵屢經拜禮且聖心遜敏經史融貫文藝書射超類絶羣象數厯律探頤入奥帝王之聖哲誠數千年來未有如我皇上者也今綜考輿圖東至朝鮮琉球暹羅南至交趾西至呼呼腦兒土白特諸域北至喀爾喀厄魯特俄羅斯諸部以及哈密番彞之族逐鹿使犬之區皆歲時朝貢輸誠恐後幅員之遼濶誠數千年來未有如我朝者也遡自皇上莅政以來凡大小㡬務咸仰睿裁施行征𠞰叛逆悉賴宸謨指授且皇上親擐甲胄跋履山川寒不加裘饑不再膳與士卒同甘苦削平宼盜誅戮止屬元憝脅從盡皆寛宥即噶爾丹之子宜䝉顯戮尚荷矜全納厄魯特之款服則優給其爵祿准喀爾喀之囘籍則咸遂其生成扎薩克屬我内旗分遣教訓而捕其宼盜念朝鮮國享貢維殷屢免金幣而厚其來使廣柔逺之恩無分於内外勞一身以綏萬國誠數千年來未有如我皇上者也是以運際昌期一人有慶天錫純嘏萬壽無疆率土咸寧兆民永賴似此壽福之兼隆平成之極至誠數千年以來未有如我皇上者也此皆普天率土所共覩聞巍巍聖徳蕩蕩神功恩澤廣布淪肌浹髓是以今歲三月恭逢萬壽王以下大臣官員軍民人等自初一日起恭祝萬壽外省耆老雲集京師各獻維祺無分貧富均効葵忱我皇上於老㓜黎庶俱賜恩饌離任老臣倍加榮賜又六十五歲以上年老男婦齊赴筵宴各賞衣服緞疋銀兩等物皇上手書諭旨給與來京耆老著各訓子弟敦行孝弟勤治農桑又因大慶廣沛恩綸頒詔天下越聖壽之日期而天降時雨大沛甘霖如此德福兼隆神人共慶誠自古所未有也臣等合詞恭疏懇將聖朝盛事永垂勒石奉旨未允臣等仰望之心萬不能已臣等躬逢盛世幸遇大聖人在上若不彰明聖徳闡揚神功後世將謂有此臣何臣等更何以自安再四思維實不容已臣等至愚至昧未能盡述我皇上崇功峻徳深仁偉烈謹據衆所共覩聞者勒之貞珉用昭萬年垂之無極為此謹具奏聞等因本月二十九日奉旨建碑等事屢旨甚明這所奏無益該部知道從來古帝王徳隆道洽告成功於天地則有封禪之典登泰山禪梁父啟金泥玉檢之藏飛英聲而騰茂實厚福慶以篤民生蓋七十二代之君踵相接也至若文德武功巍巍蕩蕩深仁厚澤洋溢六合一時公卿士庶沐如天之化際明盛之休相與崇尚尊號以抒悃忱蓋稽古放勲重華之稱文武聖神之頌而竊仿其意有唐以來實始行之以後奉為故事雖其間賢君誼辟亦未嘗不以之垂世示典焜燿史冊蓋紀颺頌於廷陛聆謳歌於草野尊親之戴四海同風用以敷揚至治潤色鴻業誠盛典也我皇上臨御五十餘年兢兢業業無日不以敬天法祖爲念旰食宵衣上奉慈寧宫備極尊養敦睦九族協和萬邦勵政勤民正禮作樂宇宙登於仁壽天地底於平成誕敷文徳煥乎有章綸音宣布允與二典三謨光昭天壤每歳臨御經筵講求治平之要崇儒重道躬詣杏壇行釋奠之禮萬㡬稍暇即綜覽羣書上自典墳下及子史百家天文地理樂律厯數諸書靡不探賾窮源條分縷晰勒為成書昭示萬世至於除殘去暴大奮武功蕩平三孽綏靖海壖三征噶爾丹靺鞈親臨寒不加衣饑不再食以萬乘之尊與士卒同甘苦六師用命電掃風馳不崇朝而凱旋告廟東西朔南聲教四訖以及殊方異域梯航萬里重譯來朝幅員之廣自開闢以來未之有也彌復軫念民生普天之下有一夫之不獲咸在帝心黄淮合流為東南之患於是規度形勢指授方畧水伯效靈河工奠定重念穡事為民生大命每歳首必親祀祈穀匕鬯告䖍比年以來野有多魚之兆史書大有之祥猶且蠲租賜復惠澤頻施平獄緩刑欽恤備至耕鑿作息之民固已熙熙然見唐虞三代之風矣若夫造士作人闢門籲俊屢増解額特詔開科御製訓飭士子文頒示天下釐剔官方内外大吏下至州縣末職俱引見殿墀量才授任揚清激濁大法小廉吏治旣清四民樂業風俗之美比户可封和氣致祥百靈薦祉是以膏雨降瑞麥登榮光四塞河潤千里山川獻其禎瑞雲物吐其光華湛恩汪濊率土䝉休光天之下至於海隅蒼生靡不咸若矣乃康熙二十三年詞臣曹禾請行封禪皇上再三不允昔建武先却封禪後感會昌符復議行之未有若我皇上之至誠堅却始終讓而不居者也然猶曰封禪之事功成告天帝王躬行之非臣下所能請也至於尊號之請則出於臣民拜手贊揚之意以章駿烈鴻休奉之者無私受之者不愧昔唐宋之君功徳不逮皇上至逺也然天寶元年感靈符之應遂上尊號宋天僖元年秋七月乾興元年春二月以羣臣請亦上尊號告宗廟而名正質人民而言順矣矧我皇上功徳至隆極盛不啻咸五帝登三王於以昭至德於萬世垂鴻號於無窮何多讓焉乃自三藩蕩平之後羣臣即請上尊號其後平臺灣則又請平噶爾丹則又請四十一年十二月憲臣等公疏請四十二年正月諸王大臣及文武大小官員請上尊號曰聖神文武大徳廣運皇帝四十四年五月科道官又公疏請五十年三月諸王大臣官員復合詞籲請我皇上謙徳沖懷溫綸慰荅俱堅辭不許兹康熙五十二年恭屆萬壽六旬久道化成時雍風動皆由我皇上功德隆盛坐致昇平諸王臣民復合詞有尊號之請我皇上即俯順輿情加上徽號慰率土臣民之望愜天下愛戴之心適足以昭至治之無外乃諭旨諄諄允恭克讓堅不允行惟萬壽節陞殿一受朝賀而其他請立碑文則却之請建宫亭龍亭則又却之謙沖之德久而彌光蓋自有書傳以來未有謙徳若斯之隆者也仰惟我皇上於堯舜事功之外探性天之祕奥抉聖道之淵微於十六字之心傳與之黙契而無間故能不事虛文不蹈故轍無論唐宋以來之空名屛而不居即七十二君登封告成之典行之於先而無異詞者以我皇上視之泊如也臣等生逢盛世幸際昌期不克仰贊高深於萬一而謹誌其大畧如此萬壽盛典初集卷六
