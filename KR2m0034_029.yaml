body:
  text: 欽定四庫全書萬夀盛典初集卷二十九恩賚五蠲賦一康熙五十二年三月十八日萬夀覃恩以天下地丁錢糧已經輪免一周其京城及各省房地租稅五十三年額征併歷年逋欠亦豫豁免恩詔內開一天下地丁錢糧既沛恩澤於三年內悉豫豁免其自京城及各省房地租稅多係貧民賃僦官地棲身營業宜并蠲恤以覃恩惠著察明京城內并各省每年地租額數於康熙五十三年豁免一年其歷年逋欠若干一并察明免其追補先是康熙四十九年上欲大沛恩膏將天下錢糧通免一年命廷臣集議以各處需用兵餉撥解之際兵民驛遞恐致煩苦應於三年內輪免一周上允其議於本年十月初三日特頒上諭諭户部曰朕恭膺天眷祗承列祖鴻庥統御萬方子育兆庶厪懷至治宵旰靡寧幸際海宇同風邊隅嚮化遐邇中外帖然袵席之安者是皆仰荷天地祖宗福祐之所致也方朕八齡踐祚之初太皇太后問朕何欲朕對臣無他欲惟願天下治安生民樂業共享太平之福而已迄今五十年矣惓惓此心未嘗一日少釋每見民為邦本勤恤為先政在養民蠲租為急數十年以來除水旱災傷例應豁免外其直省錢糧次第通蠲一年者屢經舉行更有一年蠲及數省一省連蠲數年者前後蠲除之數據户部奏稱通共會計已逾萬萬朕一無所顧惜百姓足君孰與不足朝廷恩澤不施及於百姓將安施乎朕每歲供御所需槩從儉約各項奏銷浮冒亦漸次清釐外無師旅餉餽之煩內無工役興作之費因以歷年節損之儲蓄為頻歲渙解之恩膏朕之蠲免屢行而無國計不足之慮亦恃此經畫之有素也比來省方時邁已厯七省南北人民風俗及日用生計靡不周知而民生所以未盡殷阜者良由承平既久户口日蕃地不加增産不加益食用不給理有必然朕洞矚此隱時深軫念爰不靳敷仁用蘇民力明年為康熙五十年思再沛大恩以及吾民原欲將天下錢糧一槩蠲免因衆大臣集議恐各處需用兵餉撥解之際兵民驛遞益致煩苦細加籌畫悉以奏聞故自明年始於三年以內通免一周俾逺近均霑德澤直𨽻奉天浙江福建廣東廣西四川雲南貴州各巡撫及府尹所屬除漕項錢糧外康熙五十年應徴地畝銀共七百二十二萬六千一百兩有竒應徴人丁銀共一百一十五萬一千兩有竒俱著察明全免並歷年舊欠共一百一十八萬五千四百兩有竒亦俱著免徴其五十一年五十二年應蠲省分至期候旨行民間舊欠既經豁免嗣後每年額徴錢糧務如數全完倘完不及額或别有虧空託稱民欠則負國甚矣即責令督撫以下官員償補仍從重治罪夫地方大吏以及監司守令皆與吾民誼均休戚者也誠克體朕孳孳保赤之懷實心愛養力杜侵牟朘削則閭閻咸得衣食滋殖無有失所而為官吏者亦身名俱泰豈非升平樂利之盛事歟爾部移文各督撫諭旨到日即刋刻頒布遍示窮簷令咸知悉特諭康熙五十年十月初三日復頒上諭諭户部曰朕誕膺大統撫育寰區夙夜孜孜不自暇逸凡以為民也勤圖利濟休養安全即無水旱之虞時布寬仁之政蠲租除賦務使遐方率土無不均霑或值雨暘偶愆出帑發粟多方賑恤其有益於吾民者靡勿備舉而亟行之朕殷懇周詳之至意前四十九年所頒諭旨申晰甚明原欲將五十年天下錢糧通行蠲免以諸臣集議恐需用兵餉撥解之際兵民驛遞益致煩苦故自五十年為始三年之內全免一周除將直𨽻奉天等九直省康熙五十年地丁錢糧一槩蠲免及歷年舊欠錢糧一并免徵外山西河南陜西甘肅湖北湖南各撫屬除漕項外五十一年應徵地畞銀共八百四十萬四千兩有竒人丁銀共一百二十萬八千一百兩有竒著察明全免並歷年舊欠共五十四萬一千三百兩有竒亦俱著免徵其五十二年應蠲省分至期候旨行民間舊欠既經豁免嗣後每年額徵錢糧務如數全完倘完不及額或别有虧空託稱民欠即責令督撫以下官員償補仍從重治罪該督撫須實心力行期副朕惓惓愛民之意如有指稱事故侵欺科派事發之日必嚴行究治諭旨到日遍示城郭鄉村深山窮谷咸使知悉爾部即遵諭行特諭康熙五十一年十月初三日又頒上諭諭户部曰朕宵旰孜孜勤求民瘼永惟惠下實政無如除賦蠲租除每歲直省報聞偶有水旱災傷照輕重分數豁免正供仍加賑恤外將天下地丁錢糧自五十年為始三年之內全免一周使率土黎庶並被恩膏除將直𨽻奉天浙江福建廣東廣西四川雲南貴州及山西河南陜西甘肅湖北湖南各直省康熙五十年五十一年地丁錢糧一槩蠲免歷年舊欠錢糧一並免徵外所有江寧安徽山東江西各撫屬除漕項外五十二年應徵地畞銀共八百八十二萬九千六百四十四兩有竒人丁銀共一百三萬五千三百二十五兩有竒俱著察明全免其歷年舊欠銀二百四十八萬三千八百二十八兩有竒亦並著免徵計三年之內總免過天下地畞人丁新徵舊欠共銀三千二百六萬四千六百九十七兩有竒各該督撫務須實心奉行體朕軫念民生至意如有侵欺隱匿使惠不及民借端科派者督撫嚴行察參督撫失察事發之日亦嚴加究治諭旨到日立即遍示城郭鄉村咸使知悉爾部即遵諭行特諭臣等伏稽往古赦免田租始於炎漢嗣是以後亦有踵而行之者大抵多由水旱間以軍興或擇地而蠲或計分而免從未有國家全盛人民和樂普天率土共沐皇仁如今日者也惟我皇上踐祚之初即以天下治安生民樂業為念宵衣旰食勤恤閭閻節用阜財務臻熙皥御極五十二年蠲賑之令不一而足如截漕平糶山陜之地則由陸運閩廣之地則由海運無不先時籌畫因地制宜博施濟衆之德過於堯舜逺矣至蠲免錢糧户部會計歷年所蠲已逾萬萬茲復大沛恩膏通免天下地丁銀三千二百六萬四千六百九十七兩有竒而且念户口之日繁籌撥解之煩苦後先遞及遐邇均霑國用常充民生日裕恭逢聖夀六旬之期正值輪免初周之日食德飲和之衆競赴闕廷謳歌頌禱方謂直省通免殊恩已遍於域中豈知房地並蠲新綸又頒於格外乾元廣大坤德含𢎞豈戴髙履厚者所能測哉自漢迄今上下近二千年其通免天下田賦者史不數見隋開皇九年以江表初定唐武德四年以鄭夏初平若貞觀開元都非無故而舉惟漢文帝十三年以勸農免天下田租最為近古至於房地租稅悉與豁除則數千年絶無而僅有者也蓋皇上以三代以來未有之聖施三代以來未有之恩天無不覆地無不載直使含生負識之儔無一不得其所而後即安猗歟休哉何其盛耶謹録順天一疏以槩其餘至若三年周免允屬非常曠典所有天下臣民謝恩章奏并採數則附載於後一以見聖恩之有加無已一以見輿情之歌頌最真焉爾順天府府尹臣屠沂謹題為恭謝天恩仰祈代題以達輿情事據琉璃亮瓦二厰九門窵橋以裏居民夀國楨祝萬年程世顯萬邦寧等呈前事內稱竊楨等生逢盛世居住神京鼓腹而樂堯天每先四表安居而依舜日頻祝三多凡蠲賑之𢎞頒必恩波之首及淪肌浹髓刻骨銘心自堯舜以來未有如我皇上今日仁民愛物之深博施濟衆之盛者也茲屆六旬大慶之昌期復頒九重非常之恩詔將五十三年在京房地租稅準免一年並將歷年逋欠銀兩免其追補聞命自天感恩無地伏念禎等兩厰居民年等窵橋以裏居民自三十七年及四十年有新增國課止因小民輸納維艱是以歷年拖欠今蒙天心仁愛察及人民疾苦恩詔下頒既免一年之追徵又蠲厯年之積欠湛恩汪濊霑被者何止數萬餘家聖德𢎞深頌祝者自當億萬斯世扶老擕幼望帝闕而歡呼巷舞衢歌叩君門而拜手伏願我皇上日月升恆億萬年景福於此方昌岡陵鞏固千百載𢎞庥自今伊始但小民無具奏之例而輿情有欲達之私為此具呈伏乞俯賜代題俾下情得以上達等情到臣欽惟我皇上智周萬物仁覆羣生𢎞恩遍滿於寰區大澤先霑於畿內業己蠲直省地丁之正項今復免內外房地之租銀睿慮周詳無微不照皇仁浩蕩有願畢通盛世之日舒長至誠之徵悠久兹據琉璃亮瓦二厰九門窵橋以裏居民夀國楨祝萬年等環集臣署焚香頂祝聖夀兼請恭謝天恩臣不敢壅於上聞謹恭疏代題伏乞皇上睿鑒施行附録謝蠲免地丁疏文華殿大學士兼户部尚書臣張玉書等謹奏為𢎞恩普被萬方盛德逈超千古敷天胥慶敬布謝忱事恭惟皇上躬膺景運手致太平御極五十年間文德武功蟠天際地薄海內外羣生乂安而猶旰食宵衣厪思飢溺儉一身以為天下勞一己以拯萬民時邁省方周咨民隱賜租發帑歲不絶書因此歷年所蠲遂逾萬萬之數是誠從來希覯之盛事矣今歲隂陽協和雨暘時若四方禾稼咸獲有秋間有微災旋經賑給民生斯時可稱至幸而聖主孳孳愛民之切仍未有已也茲復誕敷雨露親煥絲綸自明年康熙五十年始合天下地丁錢糧於三年以內通免一周又以舊逋不蠲則民困不釋遂於應蠲之嵗並屢年積欠一并豁除通計應免額數二千八百萬兩而所免積欠又數百萬計以頻歲撙節蓄儲之帑悉散為隂膏而聖心如傷保赤之懷一無所顧惜總期留有餘之物力俾成家給人足之風用是𢎞休養於生民曲盡老安少懷之量恩周似海東西朔南所屆無一或遺世遍如春虞夏商周以來未嘗有此遙知刋諭頒示丕布寰區或扶杖以觀或秉耒以聽無有不感德音而垂涕飫大澤以銘心者臣等忝列班聯親承曠典五十年以前升平之歲月如日方升五十年以後浩蕩之恩波如川方至德盛則福備羣仰聖夀無疆本固則邦寧益信鴻圖有永此在廷諸臣祝頌之至願而亦天下臣民舞蹈之輿情也臣等謹合詞攄誠奏陳謝悃伏祈宸鑒為此奏聞經筵講官文淵閣大學士兼吏部尚書加四級臣陳廷敬等謹奏為恭謝天恩事康熙五十年十月初三日欽奉上諭諭户部茲康熙五十一年所蠲山西河南陜西甘肅湖北湖南地丁錢糧共計一千一十五萬三千四百兩有竒臣廷敬等在京諸臣欣逢盛典溥沐𢎞施欽惟我皇上德永升恆功髙化育深仁厚澤休養生息垂數十年賜復蠲租財賦金錢以億萬計雨暘時若常殷省歲之憂勤家室盈寧猶念含生之疾苦宸衷無逸恩膏普遍於萬方聖澤有加綸綍旋施於四省山陜為翠華所及民隱周知楚豫當水陸要衝皇情尤切德音下逮父老擊壤以歌衢玉旨遙頒官吏焚香而拜詔行見隂陽和會之地屢慶豐年魚米負販之鄉永稱樂國雍絳少泛舟之役秦晉無乞糴之文四民悉頌皇仁九有咸登化宇夫博施濟衆雖堯舜其猶難老安少懷直天地同一體我皇上以愛養臻樂利之休本節儉成太平之福豐膏四沛解澤殷流臣等身列班聯親承綸命皇恩似海感深髙天厚地之仁帝德如春欣切就日瞻雲之願自此羣遊熙皥永祝景祚於無疆共樂升平益慶鴻圖之克鞏矣臣等謹合詞攄誠奏陳謝悃伏乞聖鑒為此具本謹具奏聞經筵講官文淵閣大學士兼禮部尚書加四級臣王掞等謹奏為恭謝天恩事康熙五十一年十月初三日奉上諭户部將康熙五十一年江寧安徽山東江西地丁錢糧新徵舊欠共計一千二百三十四萬八千七百九十七兩有竒槩行蠲免臣掞等在京諸臣恭逢盛典溥沐𢎞施聞命自天感恩無地欽惟我皇上功髙覆載德懋生成登六合於雍熙久殷休養撫羣黎而解阜彌切綏安凡賦稅之頻蠲非策籌之可算爰稽隆古從未前聞藝生之謳頌方深聖主之照臨倍至載申綸命𢎞沛恩膏同大曜之循行煦育必周乎四海喜甘霖之遍及涵濡旋被於三方封疆首重夫江南財賦實甲於天下山左則官山而府海江右則引越而控荆帝眷有懷周知土俗天行所蒞洞悉民依不徒溫飽為既安必使盈餘而始足於是春耕秋斂恆在宵衣旰食之中賜復蠲租尤加物阜民安之後德音渙發聖澤𢎞敷以千萬數之多特行盡免俾億兆人之衆罔不均霑官僚之喜氣雲屯市野之歡聲雷動山農石户咸叩首而祝九重白叟黃童胥焚香而呼萬歲本豐穰而蓄儲益厚由樂利而俯仰彌饒聖人之道洋洋注而不息王者之民皥皥恱且無疆我皇上以乾坤化育之心致宇宙平和之福無一夫之不得合萬國而靡遺蕩蕩乎莫罄賡揚濟濟者惟知抃舞臣等身依輦轂親荷絲綸帝德崇髙允矣博施而濟衆聖恩洪大猗歟厚載以資生欣當萬夀之昌期行共萬方稱慶願奉三多之華祝敢先三沐抒誠自此化宇升平羣遊風動時雍之盛皇圖鞏固永戴堯天舜日之長矣臣等謹合詞恭繕奏陳謝悃伏祈聖鑒為此奏聞萬夀盛典初集卷二十九
