body:
  text: 欽定四庫全書萬壽盛典初集卷六十慶祝六瑞應康熙五十二年三月天下臣民億萬雲集闕下結綵棚數十里慶祝萬壽自初一日至二十一日風日晴和天宇澄霽至二十二日大慶禮成甘霖即沛時麥苗方秀田疇霑足慶有秋焉先是二月初旬臣民經營規度結綵張燈錦天繡地彌望無際畫閣飛梁川原相屬綺疏網户衢陌交通而典禮重大距聖壽時日尚逺咸慮風雨載途淋浸霑漬無以光萬年之盛典又四方臣民環集無算耆老扶杖婦孺㩦持溢巷填闉肩摩轂擊而公卿以下各以蟒袍補服奔走執事倘衝泥霑雨何以盡萬國之歡心乃霽旭暄妍連旬浹日比送駕迎鑾諸禮既集呼嵩祝華大典告成然後甘霖徐沛二十二二十三兩日興雨祁祁既霑既足麥苗懷新郊原緑遍焉初皇上聞臣民建壇祈福以祝萬壽特傳諭㫖令所在祝釐者當祈雨暘時若民和年豐毋遺萬姓以私一人至是甘澍應時而至臣民驚歎謂聖心與天心感應相通若合符節云易稱大人與天地合其德先天而天弗違後天而奉天時書陳庶徵配於五事曰肅時雨若曰乂時暘若曰聖時風若人事修於下天道應於上非偶然也夫民為邦本食為民天年穀順成歲登大有使百室盈婦子寧國家之瑞孰有大於此者哉敢書時雨為瑞應之首七月十七日壬戌直隸巡撫趙𢎞燮奏秋成大熟并進一莖三穗五穗瑞穀上命頒示內大臣大學士九卿等傳覽巡撫直𨽻等處地方管轄紫荆密雲等關隘贊理軍務兼理糧餉都察院右副都御史世襲一等精竒尼哈番臣趙𢎞燮謹奏為恭報大有豐收分數并逹萬民歡慶真誠志休徵以祝聖壽事據直隸守道參政宋起呈稱准霸昌通永二道各移稱順天府屬秋禾收成實有十分及九分八分不等據永平府呈報各屬收成俱實有十分及九分八分不等據順德府呈報各屬收成實有九分及八分不等據廣平府呈報各屬收成實有十分及九分八分不等據大名府呈報各屬收成實有十分據宣化府呈報各屬收成實有十分及九分八分不等等情呈報到道轉報到臣又據各府耆民獻雙穗三穗五穗瑞穀百餘本六尺七尺高穀五百餘本咸稱今歲我皇上六旬大慶雨暘時若年穀順成春間二麥大稔秋收五穀豐登嘉禾疉産於田疇異穀遍生於阡陌我等小民從來未見考之上古亦所稀聞皆因聖主愛民深切是以上天降福繁多時和年豐共樂太平有象民康物阜益徵萬壽無疆等情懇臣代為進呈臣已擇瑞榖之三穗五穗者兩經摺奏恭呈御覽在案欽惟皇上德邁唐虞功高羲昊治臻上理猶厪宵旰之懷民躋雍熙尚切胞與之念今春聖壽六旬大慶更荷恩波大沛寰區文武臣民盡沐高深之德昆蟲草木皆霑雨露之榮凡有曠典殊恩悉屬天高地厚自應恆錫維皇之五福長滋宇內之太和既時若夫雨暘爰瑞徵於年穀春登二麥已千倉而萬箱稼穫三秋復崇墉而比櫛三穗五穗之異披玉穟於千郊六尺七尺之竒值金莖於萬井誠自古難逢之異瑞為聖朝特出之竒禎蓋郅隆之世則嘉瑞頻生而協應之休惟農祥為最所以苾芬黍稷爰慶邦國之光婦子盈寧用介君王之壽斯真景運昌隆之攸兆而聖主壽考之明徵將見賴及兆民皆一人之有慶亦惟樂以天下斯萬國之咸寧從此朋酒稱觥草野競效無疆之祝屢豐嗣續國家益綿有道之長矣兹據各屬呈報收成分數並據耆民叩頌嘉穀休徵等情前來臣犬馬私衷歡慶更深理合恭疏題報伏乞睿覽施行二十日內大臣大學士九卿謹奏本年七月二十二日䝉皇上頒示嘉禾雙岐三岐暢茂蕃碩仰見我皇上至德同天太和育物軫恤民隱召此嘉祥稼穡早登歲時豐稔中外交慶咸戴皇仁臣等恭覩上瑞不勝踴躍歡忭之至是歲恭遇萬壽昌期年豐人壽所在官司欽奉恩詔先後題報百歲以上老人詔各給銀建坊旌表以昭人瑞禮部尚書臣赫碩色等謹題為欽奉恩詔事准户部咨稱户科抄出廣東巡撫滿丕題前事康熙五十三年十月二十二日題十二月初四日奉旨該部知道欽此欽遵於十二月十九日將原抄一並移送到部該臣等議得廣東巡撫滿丕疏稱三水縣耆民羅萬祥年一百一歲髙要縣耆民梁楚環年一百三歲開平縣耆民張子標年一百歲南海縣生員黃猶顯年一百一歲查得康熙五十二年三月十八日恭遇皇上萬壽恩詔內開年登百歲者題明給與建坊銀兩欽遵在案所有百歲耆民羅萬祥等請給銀建坊以廣皇恩等因題請前來查康熙五十二年三月十八日萬壽恩詔內開壽至百歲者給與建坊銀兩又㑹典開載壽至百歲者題明給銀建坊等語再查現行例內壽至百歲旌表者給與升平人瑞字樣今該撫既稱三水縣耆民羅萬祥年一百一歲高要縣耆民梁楚環年一百三歲開平縣耆民張子標年一百歲南海縣生員黃猶顯年一百一歲相應照例旌表俟命下之日行令該撫轉行該地方官照例各給銀三十兩聽本家自立牌坊其旌表字樣臣部照例給與升平人瑞字樣可也康熙五十四年正月十九日題本月二十五日奉㫖依議是歲八旗直省及喀爾喀所屬先後題報百歲以上老人二十有八人百歲以上老婦人五人籍貫姓名俱詳二十一卷養老條內兹録禮部一疏如右以例其餘不備載焉臣聞聖人之世雨暘時若庶草蕃廡景星慶雲揚其輝鳯儀獸舞呈其瑞雖帝王不侈嘉祥不徵符驗不致四方荒逺竒異之物以為休徵然而史書所紀載草野所謳吟傳之永久恆班班可考則瑞應之所由來豈細故哉我皇上秉聰明聖智之德致時雍風動之休自御極以來五十餘年夙夜憂勤孜孜罔倦凡所以參贊天地怙冒羣生者靡所不至迄今四海晏安民多康樂物無疵癘而禎祥之應亦時在人耳目間豈非聖人德盛化神之所致歟往見四十二年皇上遣儒臣祭告南嶽修建廟宇工成之日復御製匾額碑文懸立殿庭時嶽廟厚載門外梓樹一株大數十圍枯巳數年自奉㫖建造相度之日忽爾重榮扶疏翠藹視昔逾茂逺近驚異以為梓材冠衆木之首衡嶽主壽星之次今效靈獻瑞為我皇上無疆福壽之慶顯而有徵此瑞應之見於數年前者然也逮乎癸巳正當萬壽之年乃於元日金蓮花盛開碧葉黃英敷榮吐艷伴瑞莢於彤墀雜靈芝於青瑣蓋是花秉中正之德平時於夏孟始開而兹則發於歲朝抑又竒矣若夫萬壽聖節億萬臣民歡呼踴躍咸集闕廷陳設供帳數十里為祝釐之舉當此之時日朗氣清纖雲不起及大慶禮成閲三日而甘雨滂沱田疇霑渥不先時而降不後時而至則以時雨為天之瑞也無疑矣若夫嘉禾瑞麥豐穰之徵偶見於史冊然雙岐兩穗已占休嘉三岐五穗實為罕有乃黍與稷翼之中翹然挺秀應期疉産屢呈御覽喜動天顔坤道資生上承天施大順之世地不愛寶托之禾麥以顯其竒謂非地之瑞歟天地之間惟人為貴箕疇五福壽乃居先昔人謂化國之日舒長又曰治世之民壽今黃耉鮐背之倫服疇食德坐享天和誠不可以數計至於年登百歲者尤為天地篤生之竒歲不數人史難迭見乃癸巳逄大慶之年甲午值貞元之㑹而督撫先後題報兩年之中䝉恩建坊者至數十人之多和氣致祥壽昌叶應然則百歲非人之瑞歟是皆我皇上體天地之德立生民之命深宫繪耕織之圖郊壇有祈穀之典耆老有粟帛之賜故天降時雨地獻嘉禾而人之沐浴膏澤者亦優游於光天化日之下而咸臻上壽也宋符瑞志云體睿窮幾含靈獨秀謂之聖人所以能君四海而役萬物使植動之類莫不各得其所又曰龍飛九五配天光宅有受命之符天人之應符瑞之義大矣自昔帝王之興羣瑞畢臻惟在上者建中和位育之功盡裁成輔相之道張弛運量實與天地同其流乃能畢致休祥章章若是耳彼夫明璫翡翠馴雉旅獒未嘗不在梯山航海獻琛貢賮之列而臣則不敢以是侈言盛世之禎符也萬壽盛典初集卷六十
