body:
  text: 欽定四庫全書萬壽盛典初集卷一百一歌頌四十一教習進士館諸臣二萬壽詩五言律四首教習進士臣張世文甲子周璇紀蓬萊敞壽筵貞符方履泰午位正當乾瑞莢添蒼厯榮光繞紫躔遐齡綿鼎祚景福億千年其一曉漏遲清晝天香滿上林柳含青瑣色花轉玉階隂和暖三春節勤勞五紀心誰能名聖德覆載協髙深其二廵輦隨時舉恩綸取次頒仁心周品彚春色滿人寰光被垓埏表祥開藻火間天行符聖壽迭運若循環其三率土颺鴻慶千官拜衮袍稱觴三祝備望闕五雲髙似海𢎞涵納如天廣覆燾忝陪芸館士樂愷沐恩膏其四萬壽詩五言律四首教習進士臣崔楙厯數貞元會陽春暢遂時君王膺茂祉宇甸際昌期異草移蓬島瑶光映玉墀仙韶雲外奏㑹見鳳來儀其一和氣三階應祥光六合同卿雲輝復旦晴旭麗方中帝徳包無外天庥日向隆西山凝瑞靄遥接紫微宫其二籙自丹書出恩從紫詔流雨𤾉調玉燭日月鞏金甌已應華封祝還添海屋籌長生符至道不向羽人求其三作人霑聖化廣育逮菁莪獻頌颺金闕隨班聽玉珂蓬萊瞻瑞氣太液潤恩波嘏福同衢祝葵衷向日多其四萬壽詩五言律二首教習進士臣吳玉耑景運祥開聖鴻圖治法天熙時方履泰至德本乗乾嫓禹勤敷命超周遠卜年梯航齊萬國拜舞紫宸前其一壽曜輝南極祥雲䕶北辰花明艶陽候人樂太平春福履便蕃集恩波浩蕩新從兹億萬歲嵩祝洽臣民其二萬壽詩五言律二首教習進士臣覺羅吳拜一人長有慶六甲賀初周瑞景蒼龍幄仙韶彩鳯樓嵩呼盈列服華祝徹遐陬海屋論綿算頻添萬萬籌其一瑞氣三辰協昌期萬福同體元行不息敦化道長充壽域開堯日春臺播舜風龍文五色鼎聖厯本無窮其二萬壽詩五言排律二十韻教習進士臣洪澤乾行膺寶厯鼎命纘洪基雙闕祥光映千門淑景遲曈曨輝紫幄靉靆麗丹墀治統超三古心傳配兩儀流虹開聖瑞繞電啟昌期道契先天秘書勤五夜披敷華同日月揮翰走蛟螭謨烈神功逺綏懐睿算竒農桑親省覽疏鑿切疇咨歲下蠲租詔時𢎞解網慈陽和噓冷谷汪濊潤窮黎化洽嘉祥至年豐景物滋元音馴百獸嘉瑞秀三芝柳䕶春郊路花明上苑枝太平調玉燭繁祉獻瑶巵協氣依龍衮薰風拂鳳池海籌周甲子雲紀厯干支衢聽華封祝人賡天保詩綏桃霑曼倩瀛棗進安期敬上南山頌康强叶壽祺萬壽詩五言排律十二韻教習進士臣陶必達甲子初周日貞元啟瑞年三階平已久萬夀慶方綿南極祥雲繞東皇淑氣旋和風三月裏春殿百花前對景龍顔藹颺休虎拜聯光浮仙掌露瑞起御爐煙柳際金鶯度霞邊彩鳯騫稱觴調玉管錫宴列瓊筵歌聽維祺祝恩銜既醉篇歡呼騰禹甸康阜入虞絃不息乾行健交孚泰運全九如齊獻頌永此戴堯天萬壽詩五言排律十六韻教習進士臣張鏞睿德膺蒼籙鴻禧集紫閶髙深原合撰廣大本同量㑹極金甌固培元玉厯昌神功超五帝景命埒三皇福祉江河注升恒日月光數方周甲子時正際春陽寶莢廻環茁仙桃次第嘗車書咸順軌藻火煥垂裳法曲鳴鸞鶴簫韶下鳯凰雲階陳綵仗月殿捧霞觴花燦宸章裏春融帝座傍昇平歌有祜歲紀頌無疆華祝千官舞嵩呼萬國颺普天遊浩蕩化日共舒長何幸蓬茅質能霑雨露香相將賡保定永對衮龍揚萬壽詩五言排律十二韻教習進士臣夀奕磐北闕紅雲麗南山翠靄長萬年綿厯數五福集禎祥景運星周紀良辰日載陽醴泉彌地潤甘露自天香玉帛交紛錯衣冠儼濟蹌嵩呼聞羽衞華祝見班行花映蓬萊色霞連雲漢章八方欣茂育億載慶明良雙觡麟馴囿九莖芝照房日新天徳健垂拱帝圖昌動植胥咸若生成詎易量春光同聖壽常此頌無疆萬壽詩五言排律十韻教習進士臣翟正經淑景輝雙闕純禧集一人涵濡成久道汪濊播深仁祓濯盤銘古敦勤几訓新堂廉恩禮重邊徼徳威申薄海鯨波静平疇麥浪匀淳風還至樸大化洽羣倫景慶天呈瑞圖書地獻珍人登康阜世物際艶陽春日月光同運苞符福竝臻無疆天子壽萬國頌良辰萬壽詩五言排律十六韻教習進士臣崔鶴齡炎運猗蘭耀姬圖瑞雀神何如今睿哲誕錫自天申揆慶初周甲祥暉正及春桐華延集鳯芝草匝遊麟膏露千條浥璚雲五色匀綏桃登茂實瀛棗貢殊珍培植臺萊久觀光棫樸新真元涵大造率土載鴻仁寶籙傳基永昌謨壽世純含生歸化育奕葉荷陶鈞謡祝諧童叟歌颺洽縉紳書從五老授琛自萬方陳湯鼎仙庖飫堯樽法醞醇祥煙籠紫極廣樂盛丹宸頌矢朝章穆風期髦士淳羣歌雲漢倬億禩忭臣民萬壽詩五言排律十四韻教習進士臣張燾春滿黄輿早暉延紫禁遲祥光開殿陛晴旭耀罘罳道叶三才貫功成庶績熙八方嫻禮樂全厯紀干支香自螭頭繞雲從雉尾移十千占寶籙五百慶昌期箕範陳疇日虞絃寫豫時太平真有象帝治本無為送喜鶯初囀呈新柳乍垂朝端多黼黻閫外寄熊羆北慎寛征矢西池却貢驪休禎來玉琯瑞産出銅池易卜升階吉詩申介壽宜民安由主聖長此祝純禧萬壽詩五言排律十二韻教習進士臣耿之昌星拱瑶樞正天開寶厯長謳謡文物盛豐阜歲時康玉律風初暖金莖露愈瀼九霄懸日月萬國集冠裳煙向螭頭羃雲從雉尾颺鑾旂陳羽衞天樂動笙簧蓂葉宣元化葵心向太陽嵩呼齊介壽鶴舞更呈祥春永餘清漏花明綻曉芳桃蟠千歲果人獻萬年觴海屋籌何限華封祝未央微臣恭進頌虎拜頌無疆萬壽詩五言排律十四韻教習進士臣張坦淑氣環宸殿和風溢甸畿萬年嘉慶節三月載陽輝南極連金闕東皇轉玉璣明霞籠苑柳曉色晃朝衣帶露仙桃放穿花翠羽飛文明星彩煥遲日漏聲稀劍佩千官擁梯航四海歸皇仁真浩浩帝德峻巍巍已奏同風治常餘不戰威起居皆至道動静應天機瑞莢緣階秀卿雲繞殿飛春波流大澤天樂播清徽向日瞻依久呼嵩報稱微幸隨鵷鷺後抃舞望朝暉萬壽詩五言排律十二韻教習進士臣孫宗緒天宇和風静春陽淑景開鶯花迎黼座宫闕儼蓬萊聖德三才貫皇仁九有該羣倫歸覆載庶品荷栽培瑞展雲千葉祥鳴鳯幾囘純禧綿寶厯厚澤播遐垓仁壽千秋鏡瓊瑶萬禩杯星從南極拱霞自上清來苑樹濃於畫春山綠似苔班聯分鷺序歌頌滿麟臺海屋初添算庭蓂更茁荄小臣欣捧日拜舞逐鄒枚萬壽詩五言排律十二韻教習進士臣張春慶萬國尊皇極三多頌聖人祥徵熙皥世壽介太平春紫氣敷天宇紅雲捧日輪清寧鍾景祚元會啟鴻鈞純嘏南山峻洪庥大地均億齡綿厯數五徳表樞辰龍馬昭天瑞梯航奉國珍職方今僅見王會古無倫泰運開閶闔亨衢接鳯麟恩榮叨蘂榜喜氣傍楓宸快覩山河固欣逢甲子新願言隨率舞嵩祝共臣民萬壽詩五言排律十二韻教習進士臣叢元燦晴旭融宸殿洪庥被海疆泰衡占景運河洛布榮光黼扆方垂拱垓埏正乂康噓如春浩蕩潤若海汪洋厯數綿無極恩波湛未央梯航來玉帛拜舞肅冠裳天保升恒祝華封福壽揚詩陳兼雅頌樂奏啟咸章露滴金莖滿風傳玉樹香禎符天地合稱願古今長樗質慚無補葵衷庶可方嵩呼何限意願進萬年觴萬壽詩五言排律十六韻教習進士臣周楨寶厯綿千億寰區盡享王春光隨日永聖節届天長共慶三多頌咸稱萬歲觴衣冠鏘劍佩水陸集梯航紫氣凝宸幄黄雲繞帝鄉衢樽欣共酌仙樂喜相將瑞靄中天麗和風大地翔南山瞻嶻嶪北海讓汪洋聖澤深無外文明久愈昌菁莪𢎞士類雲漢想天章慶溢垓埏表春生鵷鷺行坤珍欣畢効乾道正當陽露帶明珠色星含皓月光鈞天齊覆幬祥莢邁軒唐甲子籌何限昇平樂未央天顔垂咫尺拜手頌時康萬壽詩五言排律十二韻教習進士臣劉公津寶籙三皇永淳風萬國同辰髙星象北春靄日華東川嶽申嵩祝乾坤翼聖躬太和涵茂育元氣接鴻蒙甲子周初始干支迭未窮祥輝傳貫昴禎瑞紀流虹雲漢彰文教雷風迅武功鴻圖賡帝德丕造屬天工綠野歡無際丹輪候正中咸韶鸞鳯奏琛贄海山通富夀三多茂優游百福崇懸知天祜篤永錫自蒼穹萬壽詩五言排律十六韻教習進士臣應朝昌昌期開聖節淑氣動芳辰浩蕩洪恩沛彌綸大化均幾康人丕應煦嫗物皆春河嶽懐柔遠山川鞏固新詩書𢎞教育禮樂徧陶甄金闕黄雲覆瑶池青鳥馴庭前生瑞莢苑内擾祥麟玉燭休徵備蟠桃綺席陳歌謡聞野叟抃舞溢朝紳遲日延清賞暄風被廣仁泰階平有象湛露渥無垠韶景敷蒼震和光近紫宸同文咸順軌異域競來賔入律休聲暢頒綸渙號頻貞恒瞻岱嶽悠久紀靈椿願效卷阿奏恭隨珥筆臣萬壽詩五言排律十六韻教習進士臣沈曽發萬國雍熙日忻逢六十春河山蟠孔固日月燦常新華渚先徵兆樞星早降神東皇舒淑景北極耀髙旻仁孝禔躬宻聰明履道純交孚成泰治徧徳浹坤垠六合人安業千村粟滿囷蠲租流大澤給復溥深仁刑簡彌欽恤衡平尚慎詢梯航來譯貢劍珮肅朝紳景運超虞夏殊恩羅鳯麟雨𤾉胥順叙風俗愈還淳草木知榮幸川原競效珍花迎遲日麗柳展曉煙匀雙闕和風溢九霄瑞靄均無疆億萬禩歲歲頌靈椿萬壽詩五言排律十四韻教習進士臣許基山泰運開黄道乾樞炳紫宸厯元周六甲景物麗三春禁柳含煙媚宫桃濯露新九衢張錦繡萬國集冠紳寶蓋璚雲映瑶階彩仗陳虞絃呈雅樂禹貢列殊珍聖德天行逺民風古治淳明良賡喜起親遜廸彝倫遐邇風聲播和平道路遵山川長底定宵旰更精勤汪濊仁恩洽康强福履純昌圖垂鞏固大冶樂陶甄寵錫霑元老歡娛逮小臣為賡嘉樂什保佑自天申萬壽詩五言排律十二韻教習進士臣鹿耿令節春光好和風淑景芳流虹曽誌瑞貫月久鍾祥多福膺圖永咸宜受祜長清寧天地泰燦爛日星光浩蕩皇謨逺貞恒帝業昌臣工修府事兆庶樂耕桑文教垂千代神功震八荒心源傳孔孟治統接軒唐琛賮通重譯衣冠集對揚瓊筵齊獻斚黼座儼垂裳魚藻那居慶卷阿茀祿康箕疇推建極乾德正乗陽萬壽詩五言排律十二韻教習進士臣陳惪榮聖德由天縱皇圖卜世昌日星昭象緯麟鳯獻禎祥萬國衣冠盛三春桃李芳車書歸有極覆載頌無疆民隠通耕織官常飭紀綱武功看舞羽文治羡垂裳日麗天常旦風和海不揚遐陬皆向化重譯盡來王虎拜千官肅龍文五色光柳絲添錦繡鶯語應笙簧盤湛仙人露煙凝王者香願隨金鑑錄長進紫霞觴萬壽詩五言排律十二韻教習進士臣徐啟統春陽開淑景聖節履嘉祥禮樂隆千古經綸被八荒乾剛原不息仁夀自無疆符應三階正榮滋萬彚昌厯元周甲子運會首羲皇草映瑶階色花呈上苑香豐年調玉燭顥氣炳瑶光藹藹和風溢恢恢大化翔已占仙祚逺更賀太平長玉檢封東岱金泥出尚方微臣將燕喜多士挹龍章忝附班聯後歌謡樂且康萬壽詩五言排律二十韻教習進士臣甄之璜融洩春光滿謳謡聖厯昌自天申眷顧率土奉嘉祥居正調元化垂衣靖逺荒神周黎庶溥德與景風翔禮樂追豐鎬恩威越漢唐心傳宗孔孟道統接羲皇宵旰時無逸廵行歲有常菁莪懐教育蔀屋樂耕桑玉帛來重譯共球集八方武功昭赫濯文治仰輝煌化已周川嶽徵先若雨暘良辰逢燕喜薄海覩龍光上苑瓊筵列彤庭廣樂張和聲吹律暖遲晝兆年芳御柳垂青帶仙桃拆絳房雲霞開雉尾劍珮集鵷行金鏡千秋錄瑶池萬歲觴麟遊隨輦輅鳯舞應笙簧競獻封人祝咸歌天保章矢音同擊壤圖籙正綿長萬壽詩五言排律十六韻教習進士臣王箴輿繡壤和風溥丹墀化日長聖人天竝壽率土物皆昌寶厯綿方永嵩齡慶爾臧葵傾羣獻頌蒲伏共稱觴令節當三月芳華徧八方仙桃緋漾紫御柳帶垂黄鳥囀髙枝韻花開上苑香瑶池清仗逈玉陛翠旗揚淑氣熏長樂晴光藹建章春臺熙萬物韶樂動三廂芝草來馴鹿卿雲下彩凰嘉休何郁郁至德本洋洋職貢踰沙漠歸忱自越裳海籌添歲序庭莢茁暄陽銀甕流千祉金甌萃百祥九重多愷豫億載祝康彊萬壽詩五言排律十六韻教習進士臣倪見龍聖厯逢周甲嵩呼徧萬方來王依日月獻瑞極梯航春殿風初暖彤墀晝乍長彩虹流縹緲青雀舞廻翔紫氣浮閶闔紅雲擁衮裳聖人眞有道哲后正當陽徳業追姚姒規模駕漢唐一元貞以固五福夀而康景叶天心順祺綏物應彰芝抽麟戲囿梧䕃鳯鳴岡籌溢仙洲慶圖呈巨嶽祥山川榮氣象草木暢容光共祝堯年永還占姬籙昌太平歸至治悠久自無疆鳷鵲春長駐蓬萊樂未央小臣陪鳬藻敬進九如章萬夀詩五言排律二十韻教習進士臣遲之金我皇乗泰運寶厯慶長綿節届嵩呼日祥徵電繞年勲華𢎞治統精一印心傳振武櫜弓矢崇文播管絃山河環禹甸朝野戴堯天氣在元亨㑹辰周甲子躔迎暉龍炳耀戞石鳯騰騫人喜昇平久天開景物妍芳郊呈瑞麥太液産嘉蓮甘露傾天酒條風敞御筵棘闈才更舉圜府貢胥蠲畿甸謳歌滿要荒拜舞䖍霞光承扇影花氣入爐煙賀表繽紛集鴻恩次第宣小臣來草莽盛典簉班聯葵藿傾陽切菁莪被澤偏中和懷樂頌藹吉恧詩篇長育恩何極趨蹌禮未便籌添春似海睂錫福如川願祝無疆夀長依化日邊萬壽詩六言六首教習進士臣林佶寶厯序周花甲太和瑞滿中天人遊春臺三月山呼聖夀萬年昇平河清海晏雍容軒奏虞絃稽首載賡喜起箕疇備福綿綿其一神聖原推天亶睿哲更擅淵謀治兼勲華徳業學該河洛圖疇無逸時勤問夜惟幾豫戒操舟五十餘年郅治巍巍萬古誰侔其二琛賮來廷逺服梯航修貢殊方共戴髙天覆幬咸依化日舒長無息健行道徳日新富有文章圖治安民睿志而今久道彌昌其三樗質亦含地徳管窺敢測天文何幸遐方樸學得從就日曕雲榮叨科名甲第恩深教習陶熏矢將蟻忱珥筆年年恭夀聖君其四紫氣晴縈玉闕紅雲祥覆天衢三十萬人逺至百千億兆懽呼善氣熏來花鳥謳聲喜溢川塗博徵編年紀載盛事軼典超謨其五天欲民安久治眷兹厯數無疆乾坤環周伊始日月迭運彌長深仁淪霑蔀屋新恩澤沛遐方瑞占璿圖七政珠聯璧合煌煌其六萬壽盛典初集卷一百一
