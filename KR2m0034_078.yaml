body:
  text: 欽定四庫全書卷萬壽盛典初集卷八十歌頌二十詞臣十二萬壽詩七言排律三十韻翰林院編修臣須洲萬年厯數膺仁壽一統車書㑹蕩平鞏固金甌鼇極正調和玉燭泰階明乾施廣大同元始坤載含宏合利貞皥皥王風眞有象巍巍帝德本難名問安内殿金門曉視膳天厨玉饌精至孝獨能天下養承歡兼合萬民誠聰明睿知皆天亶仁聖中和悉性生造化祗從一德運人情共仰四時更陽舒隂斂神功普秋肅春温大道行日月露霜同布濩畢箕風雨竝生成經天緯地文章大凖古宜今制作宏六籍闡揚開秘妙百家補綴采菁英黄農逸事猶蒐討秦漢遺文有定評彝訓周詳傳士庶箴規明肅飭公卿克修職業先忠謹欲立功名務潔清交讓風成由好禮協恭情切自無爭綸音貶斥嚴霜重天語褒嘉華衮榮善政涵濡兼善教仁言彪炳更仁聲八方若在堦墀近六合如同咫尺程蠲賦比閭咸鼓腹輕徭編户倍添丁幅員禹甸方加廣稅額周官較未盈武耀邊陲除小醜威行滄海截長鯨豐功不盡鐘鏞紀盛德還看筐篚迎徼外萑苻多自化域中雞犬總無驚輝煌御筆江山麗焜耀宸章宇宙晶至治恬熙天子福多能爾雅聖人情九如天保祥俱集三祝華封瑞巳并紫氣氤氲環魏闕卿雲縹緲起蓬瀛千官拜手申嵩祝萬姓躋堂酌兕觥慙愧小臣何所獻載歌惟欲繼臯賡萬壽詩七言律四首翰林院編修臣孫時宜聖壽綿長億萬春初周甲子慶堯辰嵩呼處處聞仙語華祝時時見野人芝草常依雕輦出景星特傍紫微陳蓬萊侍立瞻雲近金鑑愚情效小臣其一三階啟泰麗三春六位時乘屆六旬帝治光華昭宇宙天章璀璨煥星辰八荒赤子歸仁壽九有蒼生仰大鈞咸慶舒長逢化日耕田鑿井是堯民其二遐齡何止頌莊椿南極西來萃紫宸帝誕兩旬先佛誕良辰三月慶元辰慈雲覆處甘霖沛湛露濃時渥澤均長捧衢樽歌舜日太平有道萬年春其三梯航重譯八方臣萬歲樓前拜舞頻特典開科歌異數曠恩蠲賦頌深仁翕河永固川增福登岱還崇嶽立身榮比星精何所獻瑶池介酒祝尊親其四萬壽無疆詩七言律八首有序翰林院編修臣周彝臣聞乾行不息懸象緯以常新坤載無疆麗高深而永固上聖法天保合自應年與天齊至誠配地含宏遂致福同地厚潙水之必得者四祿位偕名壽兼隆華封之獨多者三福壽與男子竝萃祥徵在昔瑞紀今時欽惟我皇上德懋日新化成久道溯微言於泗水易闡天心崇正學於考亭集經御訂春温秋肅統武功文德而莫罄形容旰食宵衣兼開創守成而竝垂典則撫萬方於在宥光昭湛露卿雲合四海爲一家喜協箕風畢雨烏弋黄支之國越海外而來同白麟赤雀之祥普寰中而獻瑞一昨昭陽紀歲姑洗司辰欣逢尼山順耳之期實合軒轅推筴之始普天歌舞聚躬桓蒲榖而齊效嵩呼率土趨蹌㑹南朔東西而共申嘏祝方謂戴高履厚難抒愚賤之悃忱庶幾㫖酒兕觥稍報生成於萬一顧臣民介福咸思申錫自天而聖主垂慈惟願推恩下逮春華秋實兩增額外之科火耨水耕盡免區中之賦晉階錫類酬奔走之微勞宥過省刑渙矜疑之大澤潔陳牲幣肅羣望之明禋頒賜帛糜恤民間之耆耉任子而鵷班濟美賚金而虎旅騰歡維時鮐背之民捧觴而至黄髪之老扶杖以觀皇上特行養老之儀創舉引年之典煌煌清問尤重力田孝弟之氓藹藹天顔布爲甘雨惠風之賜爰有兩岐瑞麥九穗嘉禾隨紫陌以翻風映青陽而吐實宸章璀璨聲自協乎薰琴御墨淋漓義更超乎豳雅餘三餘九頻年登大有之書俾熾俾昌長日樂太平之運蓋聖天子以日升川至之福爲爾百姓永家給人足之休義洽仁漸民胞物與恩深覆載偕萬物以長春明竝照臨配三光而不老金泥玉檢遠邁登封之七十二君天幹地支定周甲子之萬八千歲矣臣彝職叨侍從業在丹鉛校多士於南天惟勵冰霜之守望五雲於北極未隨舞蹈之班兹當一元復始之昌辰幸際萬國同春之泰運敬抒蕪製擬東海之添籌竊比葵心指南山而獻壽從此年年歲歲常陳一統之車書蕩蕩巍巍永享億齡之厯服臣彝不勝歡忭踴躍之至垂裳端拱涖山河景運雍熙沐太和萬姓同時呼萬歲三春長日祝三多自天淑氣盈仙仗匝地歡聲動玉珂南極光中齊拜舞溥將瀛海注恩波其一聖主當陽澤愈隆屢辭鴻號守謙沖八紘共仰光天業乙夜尤勤汲古功禹鼎湯盤垂典訓豳風無逸契宸衷試看寰宇昇平樂盡在宵衣旰食中其二櫛比龍棚綺陌連碧桃花下即芝田如雲翠葆鳴天樂夾道香爐祝大年北闕氤氲凝瑞靄西山飛動拂晴烟康衢歌舞紛綸集鳩杖相逢宛偓佺其三龎眉鶴髪太平人歷歷堯天長養身方擬丹心爭向日旋霑帝澤更如春九霄路迥頒金渥五色雲高勸酒頻復簡耆年蒙召問恩榮重疊古無倫其四擔簦士子應旁招萬壽科名起聖朝史奏卿雲傳姓氏人憑協氣作扶摇淳風渾噩書皆古至治雍和律自調薄海琅琅騰雅頌遥隨儀鳳和簫韶其五聖學齋居儼大廷太和保合見清寧一源上下通三極四府旁羅貫六經雲漢昭囬成翰墨盤盂肅穆對箴銘指南獨正千秋脉從此儒宗式考亭其六甘雨和風洽四時天顔有喜兆民知禾揺翠浪皆同穎麥曵黄雲盡兩岐造化鈞陶工肖物開成心事托摛辭侍臣雒誦年豐賦儼對南薰解愠詩其七六詔掄才道路長遥瞻宸極荷榮光九重盛事超今古萬里臣心切對揚惟願得人襄教化敢云報國在文章從兹益勵趨承力歲歲常依黼座旁其八萬壽恭紀樂府十首翰林院編修臣俞長策上苑香風接帝城太平歌管勝韶韺堯眉舜目齊天壽更扈鸞輿聖母行其一山龍黼黻色斑斕孝治心殷有詔頒千億萬人齊上壽至尊先自謁慈顔其二紛紛耆宿詣安車匍匐彤庭禮數疎幸際君王憐耄耊笑看鮐背拂金魚其三五色龍棚百和香千官隨輦効趨蹌更看鶴髪支笻叟也著黄衣捧玉觴其四聖德神功孰與倫廣輪無不效尊親柳舒花放増妍麗都爲吾王祝萬春其五介壽曾來百歲人扶藜拜舞也精神萬年自是天家厯諄囑兒孫記此春其六九重賚予下天章釀作甘霖沛八方忽看西山呈霽色由來時雨復時暘其七天潢酬酢有光輝飶酒椒馨染賜衣一自湛恩零露後六街扶得醉人歸其八留後長春付畫圖太平有象古今無從今甲子周囘日萬歲千年總不殊其九家家絃管入風謠巷舞衢歌祝聖朝暄負微臣差自喜也將愚悃達層霄其十萬壽詩七言律四首翰林院編修加一級臣俞兆晟春深大地徧祥光六㝢欣臻壽域昌綺陌鶯簧諧舜律衢樽鳩杖沃堯觴蓬壺紫氣傳桃熟閶闔紅雲覩鶴翔童叟九天均拜舞聖人恭已正垂裳其一一從開闢到賡歌戴德誰知此日多鑿齒奇肱嘉惠浹白環銀甕瑞琛羅崇卑參兩眞無外日月升恒總不磨試取澥籌添聖算永瞻皇極建中和其二太平持世是金仙萬里河山鞏固年兜率花辰先浴佛圓儀歲甲甫周天恩如甘雨蘇羣物頌比春潮漲百川願聚一時耆耊壽上歸我后慶綿綿其三集賢春殿聚羣儒記聽温綸感獨殊清逈玉堂容委珮栖遲鳳沼許將雛百千萬億占庥厯南北東西合大酺臣職自慚叨珥筆清時長進九如圖其四萬壽賀表翰林院編修臣蔣漣康熙五十二年三月十八日恭遇皇上六十萬壽之辰翰林院編修臣蔣漣誠歡誠忭稽首頓首上言蓋聞不息者聖心膺齊天之寶籙得壽者大德握凝命之貞符所以千齡則水德開先萬歲則神山響荅粤稽皇古代起神人御氣乗龍開天執象鼓鑄鴻厖之世綿延萬億之年樞電呈祥渚虹叶瑞康寧壽考書既衍於疇圖保佑天申詩亦歌夫嘉樂豳風七月酌獻兕觥江漢一章對揚虎拜蓋敷天裒對固帝王有道之長率土同歡實臣庶維祺之願欽惟皇帝陛下體天以健如日之升秉貞恒於覆載之中㑹歸有極躋仁壽於梯航之外保合太和功德高冠百王制禮定樂盡典物聲容之大治教逺超三代稽古崇儒觀人文久道之成惟時惟幾無逸作所立綱紀於精明果毅一遊一豫時邁省方秩山川於震疊懷柔奮神武而一掃黔滇八埏歸化運籌畧而三征朔漠六服輸誠永定訖功西北之安瀾有慶大河底績東南之衆壑朝宗歲歲蠲租恩周十五省而無外家家拜賜數及百千萬而有贏頻施解網之仁赦過宥罪恒厪好生之念尚德緩刑愼簡賢能邀天顧而人無不識躬親聽斷經聖聰而事未嘗忘頒訓誥於澤宫咸遵模楷繪耕桑於丹扆洞悉艱難宏奬羣材棘闈重啟敦崇正學黌序增光兼之上哲生知羅百家之富有萬幾餘暇擷六藝之菁華奎章即是天文日經星緯御墨無非雲彩鳳翥龍騰剖析鴻䝉精求象數究觀蟲篆細燭豪芒誠天縱之多能洵生民所未有聲名洋溢旁孚血氣之倫期運昌明正值光華之旦猶且虛衷彌切尊號固辭秉洪鈞而敬天肅將明祀膺寶厯而尊祖率由舊章孺慕無違慈寧問視驩心普洽孝治光昭盛美則新而又新謙讓則聖不自聖臣民同樂合四海之心爲心中外飲和以萬方之福爲福既霑被五十餘年之雨露遂歡騰數千萬里之謳歌凡兹德意覃敷悉本精神强固紀年次癸建月維辰欣向九重恭逢萬壽天顔有喜卷簾共識龍鱗春色無邊酌斗初周花甲海縣銜恩已久朝章獻壽方新大有年華長春節序瓊枝玉葉拜稽百福金筵鷺列鴛班捧獻萬年康爵縹緲浮來銀闕萬井祥煙霏微飄入丹階九城瑞靄香街繡陌蔀屋茆簷近自郊畿遠而海甸鸞歌鳳吹爭飛南極星躔玉髓龍涎總設大羅仙供雕題鏤齒拜手福庭烏弋黄支稱觴仙禁翠柳織昇平之字高映南山緋桃帯度索之霞遠來西極杯擎沆瀣川后來同樂奏簫韶鳳凰翔集天心仁愛方爲萬姓求安御路喧闐羣頌一人有慶瑶算與金甌俱永聖恩共仙祚靡涯蓋乾象占爻尚屬絪縕之始河圖考數仍爲開闢之先赤光紫氣之宵旋轉長爲令節甲觀畫堂之日迴環總是元辰大地升符何用麻姑觀海後天同壽無煩金母授符臣漣海隅蒲栁之姿江介蟲魚之伎恩私三世恒分照於太陽感激寸衷難効塵於山嶽幸叨禁近曲被殊榮得展誦於雲章竊校鐫於藜耀獻慚金鑑同將野老之芹傾是葵心敢代天漿之斚喜聆歌衢擊壤樂我太平快隨騎竹扶鳩祝皇純嘏伏願益躋聖敬長法天行資生始以陶冶羣倫可大可久運世更踰於三五鼓陽和而燮調元化寖熾寖昌春秋豈數於八千行見瑞露宵零壽星晝見九光擢秀還瀕五老之河六穗生禾竝入長年之舘登封玳檢駕七十有二之勛猷解阜金徽衍悠久無疆之厯服矣臣漣無任瞻天仰聖踴躍懽忭之至謹奉表稱賀以聞萬壽詩七言律十首翰林院編修臣蔣漣瑞氣瑶光䕶絳霄萬年聖節萬方朝銀河映徹壬寅露珠斗迴環甲子宵仁壽化鈞調玉燭太和天籟奏簫韶懽騰率土無疆頌何獨三多願祝堯其一百千億載開元運五十餘年涖萬幾混一河山光帝治經營宵旰切民依觀貞日月升恒體乾統風雷闔闢機葵藿寸衷輸不盡鋪張舞蹈向彤闈其二慈寧問視日勤劬鶴禁驩心萬國俱碩輔龎睂爭拜手老人鳩杖自歌衢梯航卉服占風至絃誦儒冠向日趨禮節樂和臻至化觀成久道浹寰區其三霜肅天戈萬里秋廟堂謨畧叶神謀黔滇一掃塵氛淨朔漠三征戍火收渤澥崑崙無駭浪黄支烏弋總投矛今看八闥皆門户虎拜堦墀進鶴籌其四上古平成數禹功我皇指畫與天通北釃漳滏波如鏡南戢黄淮堰似虹璧馬豈須循舊事蛟龍先已懾天衷還從岳牧朝宗日川瀆波臣亦㑹同其五編氓情隱入巖廊盡布春和闓澤長鑾輅省廵因婦子宸居圖畫是耕桑金錢歲歲蠲無算雞黍家家樂未央試聽農歌嵩祝裏熙朝大有即禎祥其六多能天縱至神奇五夜旁搜發睿思文配典謨盤灝氣詩兼風雅黜凡辭奎章絢爛青鸞紙御墨鶱騰彩鳳姿開闢二儀從未有三辰輝采共昭垂其七握樞執象應精神咸五登三孰比倫自覺聖朝無闕事羣推帝德在知人精求物理高深見洞悉機宜聽斷親正是健行常不息轉旋元氣得長春其八昇平海宇徧謳歌猶讓鴻名咨儆多無逸箴銘躋聖敬撝謙綸綍暢人和卿雲自靄三春日膏澤分流太液波珥筆繪天難擬議朝朝鵠立在鑾坡其九光分南極繞奎躔萬象蒸濡景氣鮮壽考譽髦雲漢麗人文炳蔚日中天小臣技竊蟲魚末三世恩霑雨露偏㳟遇慶成觀典禮長賡周雅九如篇其十萬壽盛典初集卷八十
