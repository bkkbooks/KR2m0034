蒙特遣大臣至此賞賜自古所未有也臣民年老無用均霑聖恩不能圖報惟願皇上萬夀無疆共祝于天將年老臣民之夀上增聖夀求為轉奏謝恩謹此奏聞本日奉旨知道了萬夀盛典初集卷十九
