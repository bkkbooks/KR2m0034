body:
  text: 欽定四庫全書萬夀盛典初集卷十九典禮五養老二二十六日癸卯命二十七日賜八旗老人宴于暢春園正門前復諭户部等衙門會議恩賞從優具奏領侍衛內大臣內務府總管户部等衙門遵旨會議八旗六十五嵗以上未及七十嵗及不能來者俱不議外其能來七十嵗以上老人婦人各賞布四匹八十嵗以上老人婦人各賞布五匹九十嵗以上老人婦人各賞布六匹繕摺具奏奉旨這所議老人年老婦人恩賞殊為太輕其革職官員兵丁俱係年幼時行間效命中傷得功牌出力最久之人今皆年老矣伊等子孫亦有為官者年至九十者亦不多帶至朕前筵宴賞賜如何以布賞之九十嵗以上者人各賞銀二十兩八十嵗以上者各賞銀十五兩七十嵗以上者各賞銀十兩六十五嵗以上者不在賞內亦著各賞銀一兩其不能來者俱賞給一半九十嵗以上者各賞銀十兩八十嵗以上者各賞銀七兩七十嵗以上者各賞銀五兩著將銀兩數目算明再奏二十七日甲辰禮部等衙門引八旗滿洲蒙古漢軍六十五嵗以上老人大學士以下間散人等以上至暢春園正門前東西嚮列坐東坐西嚮內大臣和碩額駙臣尚之隆內大臣公舅舅臣佟國維領侍衛內大臣公臣海金領侍衛內大臣侯臣巴渾特大學士臣溫逹臣蕭永藻户部尚書臣穆和倫禮部尚書臣赫碩色刑部尚書臣哈山吏部侍郎臣傅紳户部侍郎臣塔進泰兵部侍郎臣巴顔柱理藩院侍郎臣諾木齊代副都御史臣舒蘭大理寺卿臣孟世泰儀度額真臣佛保臣賽音敞都統臣善丹臣馬爾賽臣朱瑪喇臣敖三寧古塔將軍臣孟俄洛護軍統領臣騰額忒副都統臣毛竒他特臣石如璧臣偏圖臣薩爾禪臣道服色間散大臣伯臣四格臣圖拉等一百餘人次列耆老二千餘人西坐東嚮原任領侍衛內大臣公臣阿爾泰原任尚書臣馬爾漢臣凱音布臣安布祿臣范承勳臣阿山臣郭世隆原任總督臣石文晟臣喻成龍原任侍郎臣常書臣敦多禮臣巴錫臣戴都里臣多竒臣牛黑納臣奴黑臣卾竒臣楊舒原任總漕臣馬世濟原任巡撫臣王國昌臣劉光美臣許嗣興原任學士臣瓦爾逹臣黃茂原任都統臣圖世希臣魯白合臣車納福臣查拉克兔臣齊式臣班第原任護軍統領臣洪海臣蘇黑原任副都統臣禪布臣安圖臣艾有仕臣黃象坤等三百餘人次列耆老二千餘人有司陳設几席簠簋之儀膳羞燔炙之品如二十五日禮飭毖有加諸皇子率諸皇孫及宗室子弟執爵授飲東西前後各十餘行次第以遍頃之上出御幄升座衆耆老進前跪獻萬夀觴上命扶掖八十嵗以上者至御座前親賜酒一巵于時瑞靄絪緼惠風披拂太和翕聚歡若家人內大臣臣尚之隆等跪奏曰臣等生逢聖世身受殊恩如天之福懼不能勝未知何以仰答髙厚于萬一也駕起還宫隨傳旨賜內大臣尚之隆等大學士溫達等致仕尚書馬爾漢等袍帽有差又賜八旗耆老人等銀兩有差諸臣及耆老各謝恩而退是日宴賚八旗官員八十嵗以上鑲黃旗滿洲三品官鄧光乾一人漢軍原任知縣蒲敏政等五人正黃旗滿洲六品官達巴納等三人漢軍五品章京孫應麟等二人正白旗滿洲原任護軍統領蘇黑等十九人漢軍原任知縣員養純等二人正紅旗滿洲原任侍郎敦多禮等八人蒙古佐領古穆一人鑲白旗滿洲先鋒校賽龍阿等五人蒙古驍騎校毛什喇一人鑲紅旗滿洲章京三泰等三人漢軍原任員外郎陳懷德等二人正藍旗滿洲原任拖沙喇哈番蘇黑等八人蒙古原任護軍校厄楞特等二人漢軍雅鼐一人鑲藍旗滿洲原任禮部侍郎戴都里等九人蒙古原任拖沙喇哈番厄爾色等三人七十嵗以上鑲黃旗滿洲內大臣公舅舅佟國維等六人蒙古都統朱瑪喇等六人漢軍原任尚書范承勳等十七人正黃旗滿洲原任尚書凱音布等四十二人蒙古護軍統領騰額忒等八人漢軍原任副都統黃象坤等二十人正白旗滿洲原任尚書馬爾漢等六十一人蒙古佐領梯第等三人漢軍原任總督石文晟等十六人正紅旗滿洲原任都統查拉克兔等四十二人蒙古原任拖沙喇哈番滿逹希等三人漢軍步軍校鍾世孝等七人鑲白旗滿洲都統圖世希等五十二人蒙古護軍校馬巴朗等二人漢軍大學士蕭永藻等四人鑲紅旗滿洲大學士溫達等四十一人蒙古原任拖沙喇哈番葛穆德等三人漢軍大理寺卿孟世泰等十人正藍旗滿洲原任學士瓦爾逹等五十人蒙古步軍校特古思等二人漢軍拜他拉布勒哈番郭函臣等十人鑲藍旗滿洲户部尚書穆和倫等五十五人蒙古原任護軍參領查木素等六人漢軍原任巡撫許嗣興等五人六十五嵗以上鑲黃旗滿洲寧古塔將軍孟俄洛等六人蒙古原任佐領波第等七人漢軍內大臣尚之隆等十人正黃旗滿洲內大臣侯巴渾特等三十人蒙古原任副都統艾有仕等五人漢軍原任府丞李法祖等九人正白旗滿洲都統敖三等三十九人漢軍佐領張國柱等十二人正紅旗滿洲原任副都統安圖等三十人蒙古拖沙喇哈番花色等二人漢軍步軍校王雙全等六人鑲白旗滿洲原任侍郎鄂竒等三十四人蒙古原任拖沙喇哈番莽鼐等二人漢軍原任守偹魏士英一人鑲紅旗滿洲頭等侍衛朱常鳯等六十九人蒙古步軍校托泰等四人漢軍原任總漕馬世濟等十人正藍旗滿洲原任副都統禪布等六人蒙古拜他拉布勒哈番耨楞等四人漢軍驍騎校朱國璽等六人鑲藍旗滿洲原任二等侍衛色克巴等二十六人蒙古理藩院侍郎諾木齊代等二人漢軍步軍校徐全周等七人右各員內賜內大臣和碩額駙尚之隆舅舅佟國維侯巴渾特大學士溫達蕭永藻尚書穆和倫哈山寧古塔將軍孟俄洛原任尚書馬爾漢凱音布范承勳原任都統查拉克兔暖帽各一頂團龍縀袍挂各二件鞾襪各二雙副都御史嶽蘭原任尚書安布祿原任侍郎敦多禮涼帽各一頂團龍縀袍挂各二件鞾襪各二雙原任護軍統領洪海原任都統班第原任副都統黃象坤六品官達巴納于地都袍挂各二件其餘八十以上銀各十五兩七十以上銀各十兩六十五以上銀各一兩凡現任大臣官員與宴不與賞原任官員未與宴者領半賞是日宴賚八旗披甲間散人等九十嵗以上鑲黃旗滿洲碩吉輝等二人正黃旗滿洲孫朝福等二人正白旗滿洲花鳯彩等二人正紅旗滿洲哈世泰一人鑲白旗滿洲靈印等二人漢軍王國敬一人鑲紅旗滿洲王逹等二人以上各賞銀二十兩未與宴者領半賞八十嵗以上鑲黃旗滿洲烏納布等二十六人蒙古托克托和等二人漢軍何豹等十二人正黃旗滿洲張進忠等三十一人漢軍張起雲等二十九人正白旗滿洲富哈納等三十四人蒙古四兒等三人漢軍張汝秀等三十二人正紅旗滿洲趙之英等四十二人蒙古巴顔等三人漢軍劉光表等七人鑲白旗滿洲根泰等二十二人蒙古博恃羅等二人漢軍李雲元等十人鑲紅旗滿洲甘楚喀等二十八人蒙古桃色等五人漢軍張福等十六人正藍旗滿洲勒色禮等三十人蒙古里格等四人漢軍張百祿等十二人鑲藍旗滿洲葉庫納等五十七人蒙古薩爾圖等八人漢軍孟猷粲等五人以上各賞銀十五兩未與宴者領半賞七十嵗以上鑲黃旗滿洲黨大等二百十一人蒙古巴拜等四十一人漢軍王成等六十二人正黃旗滿洲黑色等二百十九人蒙古黨色等十六人漢軍張義振等二百零一人正白旗滿洲光柱等一百八十五人蒙古造經等二十七人漢軍董竒等一百七十八人正紅旗滿洲張治宇等二百零七人蒙古保柱等八人漢軍陸登朝等二十四人鑲白旗滿洲長夀等一百九十六人蒙古巴木布什等十八人漢軍顧邦懷等五十五人鑲紅旗滿洲吳大禪等一百七十五人蒙古柯士德等十二人漢軍辛喜等七十三人正藍旗滿洲沈陽等一百六十一人蒙古六兒等三十人漢軍陳秉治等三十六人鑲藍旗滿洲費雅逹等三百五十三人蒙古哈希泰等三十人漢軍金夀等三十七人以上各賞銀十兩未與宴者領半賞六十五嵗以上鑲黃旗滿洲二黑等四十人蒙古南超等二十八人漢軍張魁等四十人正黃旗滿洲三竒等一百四十二人蒙古阿玉璽等七人漢軍朱治國等一百五十四人正白旗滿洲舒爾黑等一百四十九人蒙古歪拉海等九人漢軍周文方等十三人正紅旗滿洲多爾濟等四十二人蒙古二哥等十一人漢軍張進忠等二十四人鑲白旗滿洲朝什喜等八十二人蒙古趕年兒等十三人漢軍郭有功等四十八人鑲紅旗滿洲色勒等一百八十三人蒙古三兔等八人漢軍羅竒生等二十六人正藍旗滿洲哈賴等四十九人蒙古艾都等十五人漢軍李大韓等四十二人鑲藍旗滿洲姑圖氣等八十七人蒙古阿穆呼朗等二人漢軍周有夀等六十八人以上各賞銀一兩是日命二十八日賜八旗年老婦人宴于暢春園皇太后宫門前領侍衛內大臣內務府總管吏部等衙門會議大臣官員之妻革職部院官員之妻革職官員兵丁執事人員間散人等之妻七十嵗以上年老婦人擬于二十八日賜宴繕摺具奏奉旨依議筵宴處朕親指示二十八日乙巳禮部等衙門引八旗滿洲蒙古漢軍七十嵗以上年老婦人至暢春園皇太后宫門前東西嚮列坐頃之九十嵗以上者召至宫內凡大臣之妻年不及九十亦酌量召至宫內賜坐皇太后皇上親視賜宴分頒果餌食席八十嵗以上者丹墀下列坐七十嵗以上者宫門外列坐諸皇子率諸皇孫暨宗室子弟分視賜宴頒給果餌食席宴畢賜召至宫內年老婦人豐貂文綺素珠銀兩有差是日八旗官員之妻進宫內賜宴者共五十二人九十嵗以上共六人正黃旗滿洲原任侍衛烏爾佳齊之妻賴普氏等二人漢軍原任逰擊李向日之妻劉氏等二人正白旗滿洲原任郎中噶哈之妻一人漢軍原任副都統徐治通之妻毛氏一人八十嵗以上共十一人鑲黃旗滿洲原任侍衛薩木哈之妻一人正黃旗滿洲原任一等阿逹哈哈番逹哈泰之妻覺羅氏等二人正白旗滿洲原任杭州將軍郭丕之妻等二人漢軍原任阿逹哈哈番王美之妻秦氏一人正紅旗滿洲原任副都統莫逹之妻老氏一人鑲紅旗蒙古原任驍騎校石大逹之妻完顔氏一人正藍旗漢軍原任總兵官吳萬福之妻蘇氏一人鑲藍旗滿洲原任副都統馬齊之妻等二人七十嵗以上共三十五人鑲黃旗滿洲內大臣舅舅佟國維之妻等八人正黃旗滿洲原任尚書哈雅爾圖之妻那喇氏等九人正白旗滿洲原任都統瓦爾逹之妻等五人漢軍原任精竒尼哈番曹希林之妻李氏一人正紅旗滿洲原任都統查拉克圖之妻佛嶽洛氏等六人鑲白旗滿洲原任都統年哈之妻陳氏等二人鑲紅旗滿洲原任護軍參領蘇敏之妻羊察氏一人正藍旗滿洲侍郎布爾賽之妻等二人鑲藍旗蒙古原任阿思哈尼哈番巴爾賽之妻一人以上各賜袍挂縀匹素珠等物有差八旗披甲間散之妻九十嵗以上進宫內賜宴者共二十八人百嵗以上一人鑲白旗滿洲于二之妻富氏年一百三嵗賜銀三十兩素珠一盤宫紗手巾一條九十嵗以上共二十七人鑲黃旗滿洲桑格之妻等四人蒙古克什兔之妻一人漢軍楊成名之妻王氏一人正黃旗滿洲李大之妻賈氏等五人蒙古額布根之妻一人漢軍劉應元之妻吕氏一人正白旗滿洲布什圖之妻一人蒙古雨沐之妻等二人正紅旗滿洲哈世泰之妻吳氏一人鑲白旗滿洲布爾泰之妻完顔氏等四人鑲紅旗滿洲哈爾薩之妻金氏等二人漢軍張忠之妻陳氏一人正藍旗滿洲蘇喇之妻一人漢軍髙文登之妻楊氏一人鑲藍旗漢軍龎起龍之妻一人以上各賜銀二十兩及素珠夀杖等物其九十以上年老婦人未與宴者八旗共三十一人各領半賞銀十兩四月初二日己酉命