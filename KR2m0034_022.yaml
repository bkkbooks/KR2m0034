body:
  text: 欽定四庫全書萬夀盛典初集卷二十二典禮六大酺康熙五十二年二月二十九日丁丑上以直省臣民來京慶祝萬夀者人數繁多榖值騰貴命吏部尚書管倉場事富寧安等發京倉米石减價平糶自三月初一日至于三十日本年三月十八日恭遇聖夀六旬九州萬國以迄蕃衛遐荒之地凡含抱血氣禀受正朔者莫不鼓舞歡忭嬉逰太平自冬及春逺近趨赴京師百道並集都城內外衢弄填塞至車馬不能通行二月二十九日奉上諭諭吏部尚書管倉場事富寧安户部左侍郎塔進泰右侍郎噶敏圖朕今日自暢春園來詢問米價云比往年稍貴緣今嵗天下各省人民來集者甚多米價故較往年翔貴現今倉內米數充足先發一萬石照時價减糶則來集人民可以賤價得米而京城米石又得盈餘于民生大有裨益若一萬石不敷再發一萬石糶賣亦止需米二萬石而已爾等將價值定議具奏即發米自明日初一日糶起至月終止特諭三月初一日吏部尚書管倉場事臣富寧安等題為欽奉上諭事本年二月二十九日奉上諭朕今日自暢春園來詢問米價云比往年稍貴緣今嵗天下各省人民來集者甚多米價故較往年翔貴現今倉內米數充足先發一萬石照時價减糶則來集人民可以賤價得米而京城米石又得盈餘于民生大有裨益若一萬石不敷再發一萬石糶賣亦止需米二萬石而已爾等將價值定議具奏即發米自明日初一日糶起至月終止欽此欽遵查京城米石時價老米每石銀一兩二錢􅀈米每石一兩粟米每石六錢今所糶米石比時價每石各减一錢其米石自京倉發出令五城滿漢御史并𣲖出各部院賢能滿司官五員公同收領在于城外關廂通衢地方設立米厰照比定價糶賣務使天下來集人民實獲裨益至此米倘有糴買積貯販賣者嚴行查拏臣等親身不時巡察倘有時價多賣或將米石糶出或被旁人首告即行題參將官員人等一并交與該部從重治罪恭侯命下將此現發米石自三月初一日起在于月內糶賣如有不敷奏聞續發不過一萬石亦照定價糶賣相應刋刻告示張掛五城九門曉諭可也奉㫖依議三月初一日戊寅直省來京耆庶分建龍棚祝釐于是日經始民始大酺樂是月初一日都城內外臣民祝釐各從其班不下百餘所其自西直門至暢春園二十里直省耆庶夾道營搆雕鏤綺繡為樓臺亭榭之屬宛然天成駕以飛梁中絶馳道每數百步恭設御幄臣民㑹迎法駕各從其鄉左右如雁行前後如魚貫往來縱觀飲食宴樂諸王貝勒以下出入止呵殿八旗添設巡徼員役以修火禁詰遊民之鬭囂陵擾于道者其餘郊圻逺近選勝祝釐之地不可勝數俱于初一日始天下人民所在酺樂亦于是日始也初八日乙酉宗人府奏進諸王大臣慶賀桌張命于十七日回宫給賜沿途直省耆庶并𣲖八旗大臣侍衛及王府護衛官監視遍行賞給初八日宗人府奏請皇上六旬大慶諸王大臣進貢餑餑桌子二百張飯桌子二百張奉㫖皇太后所用桌面朕所用桌面并內裏所用桌俱交內飯房備辦諸王大臣所進餑餑桌子飯桌子俱不必過二百張十七日朕進早膳後進城欲賞沿途各省耆庶人等賞賜之時著𣲖出大人侍衛監看諸王亦各𣲖出所屬才幹護衛官員監看賞賜十三日庚寅西直門至暢春園御道所經直省耆庶張燈奏樂彌望無際人民自為曹偶席地飲酒行炙遍滿繡陌歡聲如雷停夜逰之禁燈火數十里宵行如白晝禁任重車不得出入西直門以便行者自十三日至于二十一日每年逢萬夀節自十五日起至二十一日止百官朝服不理刑名照常辦事今則廣七日為二十一日而自十三日至二十一日縱民酺樂停止夜禁皆前此未有也十七日甲午昧爽八旗諸王大臣各遣所屬員役陳列慶賀桌張自暢春園至神武門鱗次櫛比數十里不絶每席槃匜三層覆以黃封食窮甘脆之味果備水陸之産八旗大臣侍衛及王府護衛官往來監視頃之上起駕還宫監視官員遙望華蓋將近即揭黃封芬馥盈路諸皇子皇孫扶御輦徐行止警蹕聖容溫霽遍行頒賜耆老進前者别賜內製粔籹如蟠桃大容一升人給一枚多者三四枚于時黃童白叟充滿懷袖俟屬車豹尾過訖飽飫歡笑淋漓狼藉是日受賜者億萬人凡散桌張一千七百六十有竒諸皇子四百九十五張親王三百六十張郡王二百七十張貝勒一百八十張貝子一百五十張鎮國公輔國公共二百十張八旗鎮國將軍以下散宗以上共五十張覺羅共五十張已上共桌一千七百六十五張十八日乙未上受朝賀禮畢仍幸暢春園止警蹕萬國耆庶再覲天顔人人喜躍是日頒恩詔大赦天下人民新沐聖澤歌舞升平各從其類為宴樂西直門內外數十里遨逰徴逐至于逹旦是日所頒覃恩詔款普天率土無不沾濡又奉有月內筵宴來京老人之㫖人心翕然欣喜百倍二十三日庚子吏部尚書管倉場事富寧安等以都城人數益繁請遵前㫖再發京倉米石平糶從之二十三日吏部尚書管倉場事富寧安等摺奏發出倉米一萬石自本月初一日起至二十一日已經糶完今請再發倉米五千石賣至月終奉㫖發米糶賣于民大有裨益著再發一萬石照前糶賣是月也百官出入朝服自初一日至于二十一日不理刑名訖于三十日冠裳肅雍曹司清暇萬國人民忘所疾苦坦坦熙熙惟以酺樂為事自三月初一日至二十一日百官朝服從禮臣題請自初一日至三十日不理刑名從直𨽻撫臣趙宏燮題請也詳見朝賀恤刑二卷中是月也直省將軍督撫大僚各率其屬就所近名山祝釐其省㑹府州縣治耆庶畢㑹張設宴樂以及十室之邑一閧之市郵亭墟落無不含哺鼓腹謳歌聖德至于朝貢諸國邉徼諸部亦皆內嚮歡呼各從其俗相聚為酺樂直省臣庶酺樂詳見將軍督撫提鎮題報赴嶽日期及恭謝天恩等奏疏中外藩臣庶酺樂詳見朝鮮國王等慶賀表及恭謝天恩等奏疏中是月也自初一日至于二十一日風和日麗晴雲卷舒酺樂浹旬人心愈暢二十二日澍雨應時上隨命宴賞來京耆老諭令歸農訖于是月萬國人民各還本業聖朝恩賚之典次第舉行矣先是每年萬夀節中外臣民慶賀宴樂先後三日嵗以為常至是聖夀六旬溥天之下酺樂者一月而京師萬國和㑹賜酺之盛尤史書所未覯也粵稽陶唐之世天下雍和百姓無事有康衢之謡擊壤之歌華封之祝含哺鼓腹傳誦至今詩三百篇多善禱萬夀之辭其逹于氓庶者大率春秋祈報躋堂稱觥上以抒忠愛之誠而比閭族黨以其間相與為樂然觀酒誥有羣飲之刑周官嚴屬逰之禁則其時民間酒食徴逐初無禁忌者匝嵗之中間一行之孔子所謂百日之蠟一日之澤是也漢文帝時始有賜酺之令酺之為言布也王者布德于天下也漢律三人已上無故羣飲者罰金今詔橫賜得㑹聚飲食故曰大酺自後逢國慶興必推行之東漢迄于隋唐悉遵其制今按史書所載賜天下百户牛酒給京師酺布户一匹或兩户三户共一匹又慮逺方觀者來往狼狽詔夜開坊門金吾鎮護所謂大酺之㑹與人同歡然考其期多不過五日少則三日而已至唐肇置三令節令民人至于其日宴飲為歡于是曲水褉亭重陽射圃登臨逰覽之樂九域同風流傳篇什然無關于國典其就誕聖之辰令村社置酒宴樂先行報賽尤附㑹不經未合禮制以視中天之世天下一家與民偕樂之氣象相去穹壤蓋不可以逺近計矣皇上臨御五十餘年子養元元湛恩汪濊六合之中同一父母恭逢聖夀六旬人心說豫行者踴躍朝賀居者瞻望謳歌臣等伏覩行慶施惠始自京師人民衆多則發御廩數萬石老稚忭舞則徹御饌數千席臣僚耆老倣古躋堂獻夀之儀夾道分曹陳設燕樂四裔來覲喜而忘歸萬姓縱觀戀戀而不忍去經旬涉月遊泳太和自古大酺之㑹未有比隆者也至于名山之靈異都㑹之繁昌荒陬窮澨逺徼絶塞舟車之所通達日月之所出沒追逐良辰嬉逰髙㑹者所在成聚山川雲物並助光華鳥獸草木罔不咸若小雅蓼蕭之詩澤及四海大雅既醉之詩醉飽太平此其徴矣夫自唐以後寬羣飲之禁賜酺間見于史書然國家令甲所及與人情和樂所致孰大而孰小推恩于三日五日與飫德于上旬下旬孰久而孰暫孟子曰樂以天下韓愈曰樂而不失其正所以同其休宣其和感其心成其文也今之酺樂正合斯義皇上宵衣旰食端拱於穆清之中以一人之憂勒成天下之逸樂海宇寧謐時和嵗豐適遘昌期表茲盛事蓋堯典稱協和萬邦于今再覩休烈豈三代以下所能仿其萬一也哉萬夀盛典初集卷二十二
