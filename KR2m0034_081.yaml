body:
  text: 欽定四庫全書萬夀盛典初集卷八十三歌頌二十三詞臣十五萬壽詩七言排律四十韻有序翰林院編修臣李鍾峩臣聞三多之祝願首肇於封人五福之陳疇實衍於箕子稽長年於帝牒自大電繞樞以來考永命於王編暨流星貫昴而後祥凝殿陛鴻休慶於無疆瑞靄宫廷純嘏歌夫有秩或德本神聖明可並於升恆或功則平成能可贊乎化育或宵旰而煕庶績或儉素而撫皇圖頌以罄冝則天淵比盛介以眉夀則松柏嫓休要惟氣運值夫昌隆遂乃茀祿徴其悠逺欽惟我皇上符地以貞合乾之健沖齡登大寶善繼善述纘緒而長發呈祥碩畫靖多方乃武乃文垂統而永清著績天戈遙指四海波恬玉輦時巡萬邦風動河流永奠隄防無衝決之區水利肇興墳埴盡膏腴之壤怙父恃母畎畝之賤咸得親黼座以言情就日瞻雲山林之逸靡不向康衢而驤首家給人足坻京之積良豐政簡刑清象魏之文徒設蠲租賜復黃童白叟交欣廣額開科春試秋闈疊舉而且典隆闕里大道與河漢同流配進考亭正學偕日星並著加以心勤乙夜更博典墳躬親萬幾兼綜技藝宸章璀璨鏗鏘聲若琳琅寶翰聫翩翔舞形如鸞鳯大而博學聖又多能紹虞夏商周而集其成萃南北東西而會於極普天俱登衽席家室和平薄海同在陶鈞民安物阜惟性學之並懋冝福祿之來同乃者序屬三春日過上已紅霞縹眇香飛上洞之桃碧浪瀰漫青滿平疇之麥睇堯衢而似繡鳥語花香瞻禹甸以如雲風和日麗走金貂於紫陌寶馬嘶楊度翠幰於虹橋朱輪漾日頻年豐稔人生沕穆之天匝地殷盈民在熙皥之世聖人臨乎九有較昔大衍之用已羡三籌君子實惟萬年喜今花甲之周政當六帙旌旗旖旎虹霓繞而天宇高車馬縱橫雲錦鋪而皇都壯濟濟皆垂紳委佩鷺序趨蹌桓桓盡韜甲偃戈虎臣稽拜敦詩説禮辟雍之鐘鼓喤然望杏瞻蒲阡陌之桑麻沃若别有雕題鑿齒窮髮竒肱習俗各殊胥叩關而輸賮語言重譯咸向闕以來王甘屬鄰國之附庸竊慕中華之文教歡聲騰沸恍回萬疊之潮香篆絪縕頓靄層霄之霧仰南山之嵂崒猶莫倣其崇隆指東海之汪洋尚難方其廣逺在聖皇垂裳之治謙讓未遑而臣庶稱觥之心歡欣何極貢獒獻雉方物不限於梯航肄雅歌風禱頌堪銘於金石有能畢獻子來之願良殷無美不呈媚茲之情甚篤農工商賈萃域內之珍竒僸佅兜離貢逺方之音樂九州同豫而奉堯樽六合偕來而觀韶舞奠丕基於有永曰安曰冨曰尊曰榮景福冠乎古今膺定命於無窮為位為祿為名為夀純禧昭於天壤祥呈南極何須方朔之桃德注東華奚貴安期之棗一人有慶萬福咸冝臣飲河有素擊壤無稱誦習遺經私幸服官已久景行曩哲深愧知非未能縱稱五而述三猶挂一而漏萬擬天保之致告但賦罄冝效楚茨以陳言惟歌攸酢謹拜手稽首而獻詩曰一人至德超隆古福斂箕疇寶祚昌天際結成雲有霱海心飛上日當陽運惟履泰三辰順世遇恆豐百度彰丹殿垂裳敷政教碧霄抒藻煥文章四時草木俱呈瑞八表山河悉效祥郡邑道原均逺邇蠻荒貢弗限梯航曽聞蓂莢開前殿屢産嘉禾報􅕄方下國熙恬忘作息深宫靜穆肅珩璜間調玉勒收還縱細按朱絃卸復張睿算含𢎞天浩浩皇仁汪濊露瀼瀼氐羌振古為邉圉嶽牧於今是棟梁籜捲輕飈歸浩渺冰迎朝旭散淋浪迅雷震後春偏麗澍雨晴餘草倍芳保介苐聞修錢鎛有司真欲措桁楊豐功於鑠昭霄漢雅化霑濡暨井疆崇儉規模侔夏后還醇風俗等陶唐東巡闕里觀車服西閲岐周憶鳯凰往哲盡皆馨俎豆真儒特詔晉宫牆黃淮底績勞符禹盤劍垂銘敬紹湯銅柱山川花漠漠玉關亭障月煌煌閭閻殷阜仁為美壁壘森嚴勇不妨幾向爨餘遴異響早從伏櫪識調良已同度木施成室尚恐遺珠未入囊那惜位高優廩祿奚論地逈隔巖廊八垠耆定防猶密六合咸寧慮益詳蠲賑殊恩浮億萬搜羅曠典邁尋常典墳博洽時探討才藝多能日就將御筆揮題皆琬琰宸章寵錫各琳琅德容粹美昭金錫政治精詳振紀綱問視寢門情罔極殷勤棣萼意難量恭逢六帙千秋節恰值三春百卉香冉冉桃華紅爛熳畇畇麥浪碧低昂兩班簪紱隨臚序九域共球列雁行貴若王公虔俯仰逺於象譯恪趨蹌旌旗飄曵虹霓影車馬駢羅錦繡光野色正濃新雨緑山容輕染曉煙黃笙簫合沓頻堪聼樓觀參差逺可望薪槱自然儲棫朴畢羅久矣萃鴛鴦胥歌厚載生成大共慶高明怙冒長衆福罄冝仁者夀敬陳無逸侑霞觴萬夀詩七言律四首翰林院檢討臣彭維新春永堯階景運長九天晴日麗垂裳三多華祝當三月萬嵗嵩呼徹萬方沆瀣氣凝仙仗外蓬萊雲近御爐傍升平有象乾坤泰德業巍巍仰聖皇其一不息宸衷日體乾圖書祕藴藉昭宣智周軒歷三辰內道契羲爻一畫前金石鏗鏘摛鳯藻雲霞燦爛染龍箋光華覃被崇文教棫朴興歌億萬年其二治並蒼穹雨露深雍熙民物入虞琴宣威永靖要荒域布澤頻勞宵旰心川嶽百神欽衮黻梯航萬國貢璆琳鈞陶庶彚歸仁夀甲子環周肇自今其三紫霄瑞露濕春城丹篆琅函映上清盛世不崇圖籙事普天彌切詠歌情瑶階趨走稱觴隊芳甸喧闐祝嘏聲喜溢臣民陳廣樂太和氣象洽寰瀛其四萬夀詩五言排律二十四韻翰林院檢討臣史尚節睿慮超三代中和冠百王體元因建極膺籙久垂裳倫物皆明察春秋每就將研幾通律數正樂審宫商典學崇洙泗知人駕舜湯赫聲加海內文德耀邉方士沐詩書化人登翰墨場菁莪都應瑞雲漢自成章勤政書無逸臨朝問未央勞心堯獨警菲食禹頻嘗嵗發蠲租詔恩頒出日鄉綸言天廣大愷澤海汪洋物阜安耕鑿時和順雨暘是邦俱覆載何處不梯航重譯來荒域飛車會帝閶六旬當泰運九有仰榮光日映蓬萊閣雲連鵷鷺行華燈明綺陌彩仗列巖廊祝聖香花繞揚言劍珮鏘斑麟遊上苑翠鳯集高岡獻頌華封境歡呼嵩嶽傍一人今有慶萬夀正無疆景福承天祐遐齡與日長璇圖綿厯算嵗嵗奉霞觴萬夀詩七言律六首翰林院檢討臣萬民欽慶溢層霄夀幄開千官聳立會蓬萊九天瑞靄看如錦萬國歡聲聽若雷嵗久山川宏蘊蓄年深草木荷栽培小臣幸際承平世同向虞廷拜手來其一布澤流膏雨露新萬方人久在陽春金錢百萬蠲恆遍漢律三千宥獨頻為靖邉隅勞北伐每占豐稔望時巡羣工端肅來閶闔一朵紅雲衛紫宸其二五雲樓閣翠微間雉尾朝迎識聖顔有喜近臣瞻北闕無疆洪算頌南山功先千聖傳心法術薄羣真餌大還鷺序鵷行齊拜舞嵩呼申祝滿塵寰其三民隱真能達九重頻年體恤到村農人懷飽暖家恆足路接絃歌户可封引奉朝班勤選擇臨軒䇿問每從容太平氣象昭雲日君德乘乾馭六龍其四摳衣納陛向金鑾銘玉鐫勳紀不刋政首授時精治厯功先導水慶安瀾數推蓂莢垂謨逺浪息桃花沛澤寬聖德巍巍真莫並如天浩蕩欲名難其五配合三才貫古今尊崇聊展庶僚心皇衷倍斂窺還逺帝德彌謙測愈深航海梯山看並至玉真金闕望俱臨循環花甲周初始長侍宸居共矢音其六萬夀詩七言律六首翰林院檢討臣柯喬年瑞氣絪縕繞建章星明南極映瑶光皇恩廣被春風普壽域𢎞開化日長苑栁煙籠青瑣闥宫花露滴紫霞觴歡騰萬國冠裳集拜舞龍墀切對揚其一化成久道共歸心寶籙長膺普照臨兩試重開恩賜榜三年盡免額征金寰中就日輸誠久域外聞風向化深盛治光華彌宇宙昭功象德合元音其二至德難名起化先乾綱運用廣無邉三春日月韶光麗萬嵗君王景福全禹貢山河歸率土堯封雨露戴高天陽和盡在雍熙世共樂昌期不記年其三運際中天釀太和岡陵松柏歷年多西山草茁千番細上苑花開萬遍過化共祥風噓淑氣恩偕甘雨溢春波時隆業峻流光逺直接虞廷續九歌其四萬幾雲集日昭融問夜祈年厪聖躬畢雨箕風時序順高原下隰黍苖豐民登樂利悠還久治比勳華盛且隆四海同聲申祝願名言莫罄共呼嵩其五夀筵開處五雲浮拜舞千官集鳯樓上日舜方周甲子六旬堯正冨春秋聲諧律吕歌天保數彚蓬瀛記海籌正值皇都春色滿瑞煙芳靄繞城遊其六萬壽盛典初集卷八十三
