body:
  text: 欽定四庫全書萬夀盛典初集卷七十七歌頌十七詞臣九萬夀詩五言律首翰林院修撰臣王雲錦聖德髙千古龍飛六十春金甌凝瑞厯翠莢麗昌辰夏服車書㑹周官玉帛陳嵩呼同擊壤歌祝上楓宸其一聖治髙千古精勤邁百王明禋嚴薦璧舞彩慶垂裳雲牖書無逸松軒警未央萬幾方在御地久共天長其二聖學髙千古微言遜志求心源遡周孔道法契圖疇講藝筵頻啓崇儒典特修健行恆不息金鏡握千秋其三聖藻髙千古光華復旦賡龍蛇蟠體勢金石發鏘鳴討論蟲魚祕編摩嵗月并萬年垂述作雲漢仰文明其四聖武髙千古從容靖八埏潢池消反側瀚海息烽烟手自除三蘖兵皆出萬全雕題重譯者享贄戴堯天其五聖澤髙千古春臺溢頌聲蠲租環赤縣解網祝蒼生政簡刑胥措民安吏不驚萬方登夀域長此樂升平其六聖績髙千古黃淮息激湍神功親指授上策定隨刋澤國蛟龍偃桑田士女歡浮河五老出億世紀安瀾其七聖鑒髙千古虞廷達四聰懲奸去貪墨表善勵清忠日月無遺照絲綸沛至公臣民齊額手景福頌昭融其八聖化髙千古英賢盡網羅拔茅占泰運翽羽集卷阿挾䇿爭揮翰掄才及荷戈作人真夀考十載一加科其九聖夀髙千古無疆景運新鶯花三月麗雲日萬年春電繞初周甲星輝正鄉晨小臣同率舞天保願常陳其十萬夀頌十首有序翰林院修撰臣王世琛臣聞惟聖法天斯健行而不息惟天佑聖必悠久而無疆若日月之升恆常垂碧落似川嶽之流峙永奠黃圖良由一德之感孚用是三靈之協應民胞物與惟至人之無私萬載千秋知仁者之必夀既稽古而云然乃徵今而益信欽惟我皇上聖神天縱睿知性成備九德以當陽五辰效順握六符而御極八表同歸視民如傷蒼黎時厪其寤寐惟日不足宵旰弗徹其焦勞上清下寧乾坤於焉交泰化行俗美品物由是咸亨開國家磐石之基百千萬世慰寰宇雲日之望五十二年洵史冊所罕聞實開闢所未有雖神功聖德浩蕩難名而測海窺天約略可舉仰惟聖學莫罄髙深猶惕皇衷彌勤遜敏闡禹湯文武之道直溯危微探濂洛關閩之書盡窮閫奧宸章璀璨垂典謨而渙堯言睿藻繽紛超晉唐而追羲畫尼山泗水天文煥闕里之碑入室升堂恩波沐孔門之裔加之右文稽古開局以編摹養士作人闢門而籲俊千古昭其明備六合被其光華此從來未有之文德也若夫寧民戡亂去暴除殘或秉鉞而臨戎或推轂而命將莫不風馳電掣指日獻俘掃窟熏巢刻期奏捷八閩六詔息瘴癘而落欃槍雞塞龍沙殄蚩尤而殱鑿齒無雷出日之地咸入版圖胸穿鼻飲之倫悉承聲教幅員無外陋禹貢之九州廟算若神鄙黃石之三略八埏既靜九服大同跨四海以為家奄萬邦而為宅此從來未有之武功也至夫己饑己溺憂百姓之未安念兹在兹恐一物之失所偶逢災䘲賑貸頻施即屬豐穰蠲租屢詔憫澤國之昏墊親閲堤防矜耆老之桑榆特頒粟帛刑多末減類大禹之泣而下車法必從寬似成湯之祝而解網上下咸若四靈近在郊坰草木向榮百卉咸歸茂對蓋萬物之得養由一念之好生所謂其仁如天也乃若明目達聰洞幽矚隱若氷壺之澄徹遇物呈形如金鏡之髙懸隨人鑑影揚清激濁黜陟必當乎公心兼聽竝觀毀譽不淆於衆口深悉閭閻疾苦先事綢繆灼知稼穡艱難因時補助人之情僞逺近不遺事之幾康曲折俱見端拱於九重之上明察於萬里之遙所謂其智如神也是以二儀默佑百神薦庥甘雨和風不愆期而應候嘉禾瑞麥每匝地以呈祥九莖連理之珍産於園囿羽毛鱗介之瑞貢自梯航兆人躋春臺之上大地開仁夀之域直且竝三皇而兼五帝豈特軼商周而逾漢唐也哉兹以姑洗應律之芳辰恭遇萬夀大慶之聖節宫庭燕喜樂奏鈞天上苑鶯花春來蓬島兩行鵷鷺拜手而共祝堯年萬國共球傾心而爭趨禹甸扶鳩父老歌舞於康衢騎竹兒童喧闐於紫陌嵩嶽則遙呼萬嵗華封則競祝三多僉謂宜民宜人渥澤周於天壤自爾如山如阜禔福集於皇躬陳天保而指南山酌春酒而傾北斗真人間之嘉㑹千載之一時也臣以猥末備數詞林遭遇聖明幸逢盛典仰天邊之夀曜祗益歡欣數海上之仙籌徒知抃躍敢抒寸藿之心敬上萬年之頌其詞曰天佑下民篤生聖皇亶聰作后君臨萬方發祥儲祉源逺流長綿延寶厯寰宇永康其一聖敬日躋遜志時敏書倉學海探微晰隱屢絶韋編恆多束筍渙為天章日星彪炳其二勵精求治憲章文武旰食宵衣不遑寧處憂心如堯勞形如禹平地成天兼三邁五其三亦有小醜梗化陸梁赫斯一怒我武唯揚南清嶺徼北掃龍荒滌除剪剃恢我昄章其四既靖氛塵誕敷文德聿尊素王倡明儒術樂育人材士子訓飭車書一統聲教四訖其五知人則哲任官惟賢內而丞輔外而旬宣因才器使百職罔愆彰善疸惡無黨無偏其六視民如傷念兹蔀屋博施濟衆蠲租發粟優養髙年矜恤㷀獨元后父母恩勤鞠育其七俯憫澤國淮黃競流室廬疆理載沉載浮特紆法駕相度綢繆水由地中農服田疇其八立國播政維兹刑賞嗟彼冥蠢橫罹法網爰書既定睿懷悽愴宥之曰三恩洽天壤其九德侔造化功竝穹蒼嵩嶽獻祝南極耀􅉭永瞻雲日謳歌八荒天長地久萬壽無疆其十萬夀詩七言律十首翰林院編修臣叢㴻聖人龍德正當陽景福天申寶厯長四海不波羣奉朔萬年有道永垂裳桐花桃萼開瑶圃麗日祥雲繞建章率土騰歡誠悃祝綿綿帝夀協穹蒼其一晨開閶闔曙光紅玉珮成行拜舞同韶濩聲中來祝華金猊篆裏效呼嵩敷天共覩升恆象大造長資參贊功乾健自强真不息駐顔何事訪崆峒其二寶籙維新電繞樞車書八表㑹皇圖一心獨滿中和量萬象𢎞敷久大模北闕恩波蘇地軸南山佳氣應乾符堯樽舜樂天開日紫極祥烟徹九衢其三卿景昭回碧漢邊九重勤政典謨宣宸章直啓三陽泰御翰宏開一畫乾稽古右文研孔思阜財解慍播虞絃淵深聖學難窺測海水由來滙百川其四萬方輯瑞凛皇威謀略先天天不違親總羽林三出塞逺清瀚海一戎衣貢從鑿齒雕題至忱為懷仁慕義歸神武安民非耀武兩階干羽倍光輝其五盛世嘉祥洽井閭刑清政簡樂安居金泥每下蠲租詔丹鳯遙頒宥過書天上恩綸洵浩蕩域中嵗月盡寬舒太和元氣滋培厚禹德湯仁較有餘其六宸念懷柔感百神禎符大地應時巡河清海晏平如掌鳯舞麟遊藹似春五老星精歡覲聖九霄日馭總勤民龍鑣駐處豐年慶天授平成信有真其七聖德如天覆育𢎞巍巍蕩蕩總難名治安已駕羲軒代府事彌殷堯舜情萬夀科開隆選造九垓士奮佐升平愚民自是無知識順則年年鑿與耕其八小臣草載侍金門兩世深邀覆載恩殿上呼名聫父子日邊授簡逮箎塤直廬飽飫天厨味斗室榮霑御墨痕祝聖敬隨鵷鷺後倍餘葵藿寸心存其九東風調暢吹丹陛南極光華照赤墀帝德後天長不老皇猷匝地本無私秪勤阜物誠民計那羡冰桃雪藕竒百祿九如申命逺聿開億萬太平基其十萬夀詩七言律八首翰林院編修臣車鼎晉寶厯綿延聖夀長扶輿淑氣萃禎祥清寧位定承三正創守身兼御八荒鳯闕五雲瞻黼扆龍墀萬國肅冠裳經文緯武彌寰宇珥筆何能罄頌揚其一旰食宵衣治獨超法天行健八風調寸隂是惜踰神禹分命惟欽邁帝堯氣轉洪鈞春浩蕩化成久道嵗豐饒瑶編甲子循環數萬紀初周賀聖朝其二宇宙重開運㑹嘉如川方至日升華層霄爛熳卿雲繞率土霑濡湛露奢蠲賦恩隨三載遍掄才科每十年加菁莪蔚起耕桑靜億萬升平詎有涯其三天祚休隆篤祜新星輝南極世同春璇圖瑞叶通丹陛玉燭光調護紫宸六合精英藏宥密百王禮樂受經綸生民未有於斯盛純嘏端應集一人其四徽號由來奉至尊謙懷特渙大哉言欲求實政皇衷切屢却虛稱帝語溫有道昌期光海嶽無名峻德贊乾坤輿情莫竭涓埃報齊效華封祝九閽其五五十餘年百度貞光華復旦泰階平功開神禹難開地誠服軒轅未服氓父老兒童皆順則山川草木盡欣榮歸仁自是懷柔逺大德同天曰好生其六道岸巍巍已誕登固天縱聖又多能萬幾日暇圖書煥千古心傳厯數膺統接尼山真契合禮隆徽國特崇升右文曠典昭垂久斂福惟時協庶徵其七彤階春暖太和天豹尾班中拜舞連花照四時三秀草香浮九鼎萬年煙賡揚欲勝咸池曲宴樂遙輕在藻篇史職微臣䝉澤渥衢歌願矢寸心䖍其八萬夀詩七言律四首翰林院編修臣莊令輿星光啓厯映瑶樞蓂莢呈祥協寶符八表共臻仁夀境萬年常鞏海山圖無疆泰運歸皇極不息乾行仰聖謨花甲循環今正始普天此日盡歡呼其一卿雲層護日華紅元氣絪緼總化工神禹九河勤睿慮庖羲一畫亶宸聰頻蠲泉布蒼生足盡採珊瑚碧海空竊喜溫綸天際下九圍無日不春風其二福斂箕疇帝澤深萬方玉帛慶咸臨山川竝效呼嵩祝草木齊傾捧日心隨地湧泉皆玉醴自天行雨盡甘霖莫言廣運無能贊詩頌絃歌譜德音其三閶闔晴開集鷺鵷羣趨丹陛正春暄上陽景麗舒長日太液波流浩蕩恩香篆九重凝瑞霧桃花千樹接仙源小臣喜聽鈞韶奏拜舞堯階獻夀樽其四萬夀盛典初集卷七十七
