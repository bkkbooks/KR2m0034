body:
  text: 欽定四庫全書萬壽盛典初集卷十七典禮四詔頒三廵撫福建等處地方提督軍務都察院右副都御史臣覺羅滿保謹題爲聖壽同天皇恩如海籲請詳題代謝以逹輿情事據福建布政使司布政使李發甲呈詳據福州興化泉州漳州延平建寧邵武汀州臺灣九府幷福寧州㑹詳據各縣詳據通省在京領賞八十嵗以上老人張獻福郭日新陳萬春等在籍領賞候題建坊一百一歲老人李華天張岳榮等呈稱福等幸生聖世飽食煖衣抱子弄孫不知不識優游於光天化日之下熙恬於歌衢舞巷之中身享太平之樂至矣極矣本年恭逄聖天子六旬大慶福等有赴京叩祝者有在家遥祝者欽䝉皇上大沛殊恩在京叩祝者旣已袖滿帑金脣霑御酒在外遥祝者亦得身披溫軟腹飽肥甘又䝉諭㫖渙頒令福等教訓里閭共敦孝弟福等䝉此天恩無可圖報惟願合天下萬國九州億萬老人之壽爲皇帝萬萬歲一人之壽不勝踴躍懽呼伏乞轉詳代題等情又據通省里民方隆遇等呈爲籲請代題恭謝天恩事本年三月十八日萬壽恩詔内開一海宇承平已久户口日繁宜施寬大之恩共享恬熙之樂嗣後直隷各省地方遇編審之期察出增益人丁止將實數另造淸冊奏聞其征收錢糧但據康熙五十年丁冊定爲常額續生人丁永不加賦仍不許有司於造冊之時藉端需索用副朕休養生息之意欽此恩綸到日兆姓歡呼鑿井耕田鼓舞方深於帝德食毛踐土輸將敢後於丁男乃户口之日增竟正供之永定孳生不已賦額無加真小民意外之殊恩實亘古未聞之曠典山陬海澨僻壤窮鄉莫不同祝萬年與天無極伏乞轉詳代題等情又據同安縣詳據厦門環海四里里民曾天祜等呈爲懇賜代題恭謝天恩事竊祜等身戴光天生居窮島依棲王土僦租分所應輸結搆茅簷逋欠情非得已乃荷皇恩浩蕩聖澤𢎞深伏讀康熙五十二年三月十八日恩詔一款内開一天下地丁錢糧旣沛恩澤於三年内悉予豁免其自京城及各省房地租稅多係貧民賃僦官地棲身營業宜幷蠲恤以覃恩惠著察明京城内幷各省每年地租額數於康熙五十三年豁免一年其歴年逋欠若干一幷察明免其追補欽此旣免明年之正額復蠲歴歲之積逋澤國蒼生同申華祝海隅赤子共效嵩呼但螻蟻下忱末由自逹特懇轉詳代題等情各詳到司據此該本司布政使李發甲㸔得世際昇平群頌一人之有慶時逢泰運共祝萬壽以無疆喜溢臣民歡騰中外本年三月十八日恭遇皇上六旬大慶萬國嵩呼恩詔渙頒皇仁遐被賚予周於耄耊賦額定於丁男僦地窮簷尤邀聖澤積逋新賦總荷蠲除凡兹子惠之殊恩遠軼唐虞之盛事一時山陬海澨白叟黃童無不歡聲雷動叩首輸忱兹據通省各該府州縣詳據闔省老人里民等環籲詳請代題等情前來事關萬民感謝眞情所當據呈轉詳乞賜代題以達輿情等因到臣據此欽惟我皇上道備髙深治超今古立文武聖神之極四海尊親受位祿名壽之歸萬邦和會璇圖廣運巽風共解雨頻施寶籙光昭華祝與衢謡共進當久道化成之日正六旬萬壽之期歛多福於一人沛覃恩於九有鳳詔來從天表喜溢臣工星軺馳自日邊歡騰士庶已備呈其謝悃終莫罄乎名言况夫孝弟力田返淳風於禮讓乞言憲老追隆治於雍熙扶杖觀太平帝錫高年之粟帛躋堂介睂壽人嘗天府之壺觴乾資始坤資生户口日增億萬天之高地之厚賦役盡緩二三念廣大之幅員尺地莫非王土蠲市㕓之租稅千村盡是樂郊凡此殊恩更爲異數皆由我皇上愛民以實而不以名斯致治務本而不務末含哺鼓腹羣知帝力之難忘浹髓淪肌共感皇仁之莫報輿情激切衆志攸同謹代達其眞誠兾仰邀於宸鑒從此閩疆日暖益深蒼生激勸之私海嶠波恬永藉聖主靈長之福兹據布政使李發甲詳據闔省老人里民等僉籲代題恭謝天恩前來臣不敢壅於上聞謹會同閩浙總督臣范時崇合詞具題伏乞睿鑒施行爲此謹題廵撫貴州兼理湖北川東等處地方提督軍務都察院右副都御史臣劉䕃樞謹題爲懇請代題恭謝天恩事據貴州布政使司布政使遲炘按察使司按察使李世仁詳稱欽惟我皇上德竝乾坤功高宇宙統百千萬國欣戴𢎞仁歴五十二年漸濡厚澤恭逢聖壽之初度敬仰恩綸之特頒禮洽幽明天人恱豫惠周朝野老幼懽呼地租與丁賦俱蠲閭閻盡遊化日淹滯共𤯝災竝豁囹圄無泣秋風恤商旅而減征軫戎行而頒賞羅英拔士不令野有遺賢表善旌良務俾封堪比户至文臣武弁尤荷殊恩合裕後光前總霑異數敷天懽慶率土謳歌本司等謭劣庸材猥邀盛典旣榮及夫祖考且蔭逮乎妻孥感激難名私衷莫達伏祈代題恭謝庶得少展微忱又准貴東道白璜貴西道鄧之琮移稱欽惟我皇上堯仁蕩蕩舜德巍巍作君作師允綏猷乎九有曰富曰壽行錫福於萬方恭遇大慶之期特頒覃恩之詔格神尤思重道睦族亦尚引年念切養民蠲租同減稅而竝舉慮同衛國錄舊共恤勞以兼施湯網三開眚災必宥虞門四闢潛伏咸收猶復加惠臣僚俾得均邀增秩雖恩榮不無差等而感激固有同心本道等自媿凡材亦叨加級且䝉封贈准照職銜揣分奚堪感恩難已懇請代題達謝等情到司准此又准兩營遊擊魯岱等移稱欽惟我皇上文謨定鼎武烈承乾威震殊方羣仰雷霆萬里澤流薄海共欣雨露九天兹當癸巳仲春恭際六旬大慶遂飛鳳詔特煥綸音禮幽於以格明由内因而達外旣親親老老之徧及亦貴貴賢賢之倍優會見士慶彈冠民嬉鼓腹更知商安歸市兵樂休戈伏讀詔書内開在外武官三品以下各加一級又照新銜封贈岱等韜鈐下士介胄末員獲叨加級之榮復沐封贈之典心殊感激分實暌違合移請轉詳代題恭謝以伸微忱等情到司准此又據貴陽十一府知府同知通判楊文鐸等詳稱欽惟我皇上聰明睿知文武聖神德軼唐虞九土咸忻光被厯符羲昊萬年永慶凝庥恭逢花甲初周快覩龍章誕布天地鍾靈而首出郊祀特先帝玉嬗運而挺生明禋用徧親親是篤恩沛天潢聖聖相承禮隆曲阜厪保赤則槩蠲稅租敦引年且優給粟帛貸罪恤刑囹圄不枉減征絶擾關市無稽賞賚特周乎武夫搜羅尤徧於髦士迨夫内外俱霑優賚臣僚更予恩施非徒爵秩之槩增亦且封蔭之有等信大澤涵濡罔極宜羣情忭舞無涯職等猥以凡材膺兹非分身承加級恩被貤封頂戴不勝悃忱莫達爲此􅅹情陳懇轉請代題恭謝天恩又據貴筑等三十七州縣焦延祉等詳稱欽惟我皇上德竝勲華仰光被者百千萬國恩侔天地沐膏澤者五十二年恭遇壽躋六旬喜見澤加四海深山父老扶杖而慶詔書之頒滿路兒童騎竹以迎天使之至合祀賞蠲宥之竝舉統􅜯邇内外以䝉庥至詔書内開在外文官自四品以下俱各加一級又陞級改任者著照新銜封贈欽此聞命自天感激無地惠徧盈廷而不遺夫荒徼寵渥大吏而亦及於末僚仰見聖明周詳皇恩浩蕩敢不深自策勵圖報禮於將來惟有喜叶賡颺祝添籌於無量爲此籲請代題恭謝天恩又據闔省舉貢生員楊長春等呈稱竊惟萬壽無疆沛殊恩於天末一人有慶普大化於邊陲旣天人之胥洽抑中外之交孚廼者設科增額尤重賓興兼之髦士明經亦加異數俾赤水潛鱗咸思奮躍黔山小草亦被欣榮長春等曷禁懽呼難伸頌禱伏乞代題庶大鈞之溥被永泐於巖疆下士之微衷上達夫天聽又據闔省鄉耆民人商賈舒炳等呈稱康熙五十二年三月十八日恭遇我皇上六旬萬壽恩詔􅜯頒雖覆載之高深非愚氓所能測識而絲綸之宣布在黎庶實共見聞享帝格神敦倫重道官僚盡沐渥澤兵弁亦荷恩施伏念免糧免丁有加無己恤貧恤老每進彌周軫獄訟之牽誣好生德洽嚴征徭之科𣲖藏富恩深禁豪惡禁猾胥閭左免擇肥之患飭假兵飭奸棍花村無夜吠之驚且關稅絶橫征牽車牛者忻適樂國津途鮮騷擾服羈絏者快履周行洪恩固亘古希聞欣戴亦生民未有轉請代題用伸恭謝又據兩營兵丁雷士龍等呈稱竊惟本年三月恭逢萬壽六旬詔㫖遠頒皇恩誕播其他祀神尊聖睦族庸勲以及體臣子庶之仁養老育才之典洪慈莫量戎士何知惟是睿謀安不忘危文兼奮武爰録功而恤舊滿漢不遺且飭伍而賞勞要荒一視惠施普逮寧惟恩比投醪賚予親霑不止感同挾纊憶當年投石超距士厲同仇看此日士飽馬騰人多矢報區區有志耿耿欲伸敢懇詳請代題等情到司據此該本司看得幽明上下無非廣運所周中外邇遐難罄涵濡攸暨仰湛恩之汪濊不遺乎蠻僰羅番欣被德而懽呼豈辨夫官民兵衆微獨本司感戴肫誠廹求上達且據通省文武大小各官移詳曁紳士民商兵丁人等亦各具呈前來情詞廹切合之本司感謝之私無異不敢壅於上聞理合彚詳統候題達等因到臣該臣看得道久化成共知仁者必壽澤流潤物羣歌至德難名合中外以均霑貴賤一體舉遠近而兼施大小胥孚戴天而忘其高亦思祝禱仰聖而忘其力不廢謳吟願旣結於中心欲賡颺而無路情實廹而思吐爰繕疏以陳詞旣據布按二司貴東貴西二道臣標兩營遊擊兵丁各府州縣官員闔省紳士耆老商民詳呈前來臣謹代題恭謝天恩伏乞睿照施行謹具題知廵撫廣西等處地方提督軍務兵部左侍郎兼都察院右副都御史加三級臣陳元龍謹題爲欽奉詔書事欽惟我皇上仁壽推恩昇平錫福太和洋溢於宇宙德意感格於神人在位奉職者邀錫類裕後之榮因公罹咎者開補過自新之路肆𤯝解網而囹圄爲之一空息訟除苛而閭里從兹不擾廣諮訪則利弊無不周知崇節孝則風俗咸歸醇厚以逮嚴加𣲖飭關津禮髙年賑無告煌煌詔旨滿地春溫藹藹綸音普天膏雨凡屬大小諸臣以及紳士軍民人等無不踴躍懽忭羣呼萬歲隨即日行布政司謄黃賫送提鎭及頒發闔省文武各衙門一體欽遵曉諭軍民外謹將奉到詔書日期理合具題伏乞皇上睿照施行謹具題知朝鮮國王臣李焞言康熙五十二年閏五月二十七日欽差勅使特頒皇上慶壽詔㫖臣與一國臣民不勝懽忻感激謹奉表稱謝者臣焞誠惶誠恐稽首頓首伏以鳳厯方綿匝寰區而同慶鸞書誕降辱使節之載臨懽忭之餘感篆曷已伏念臣謹保緒業叨際昌期荷字小之洪恩無階報荅殫拱極之微悃祗切瞻依何圖一視之仁遠頒十行之札珍函乍啟恍玉音之親承睿澤旁流仰聖眷之罙篤榮出恒例寵冠諸藩兹蓋伏遇皇帝陛下德洽邇遐運屬亨泰光前軼後超百王而罕倫厚往薄來致萬國之咸恱遂令鰈域亦被鴻施臣敢不永戴皇靈彌䖍侯度地褊東海迹雖阻於筍班壽獻南山誠自罄於華祝臣瞻天仰聖無任激切屏營之至爲此具本謹具奏聞萬壽盛典初集卷十七
