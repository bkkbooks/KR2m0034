body:
  text: 欽定四庫全書萬壽盛典初集卷五十七慶祝五貢獻四吏部尚書臣富寧安臣吳一蜚侍郎臣孫柱臣李旭升臣𫝊伸臣王頊齡恭進呂氏家孰讀詩記一部柳宗元文集一部通鑑總類一部通鑑考異一部史記摘抄一部源流至論一部大儒學粹一部書史㑹要一部老子或問一部南唐書一部纂圖互注荀子一部音注揚子法言一部法藏碎金一部格古要論一部舊板九經一部蘇軾書唐詩黃庭堅書博學道詩米芾書唐詩米芾行書長樂花賦米芾書正月臨朝詩趙孟俯書柳宗元蘇軾詩元人楷書伊洛精義一冊文徴明書遊西苑詩董其昌臨顔真卿書董其昌書樂壽堂歌董其昌草書杜甫詩董其昌書白羽扇賦董其昌臨米書天馬賦董其昌臨懷素帖董其昌臨米芾書董其昌臨趙孟俯書談曰選草書漢詩祝允明書宋詩李昭道仙山樓閣圖李公麟羅漢渡海圖郭熙擕琴聽鶴圖馬遠溪山雪意劉松年軒轅問道圖劉松年耕織圖趙孟俯泥金海屋添籌圖倪瓚溪亭山色圖黃公望江山勝槩圖蘇漢臣購訪蘭亭圖林良蘆雁圖呂紀花鳥圖唐寅墨筆山水仇英山園訪梅圖仇英水閣揮毫圖仇英閬苑仙葩圖仇英宮蠶圖仇英春溪宴集圖沈周溪山無盡圖董其昌江臯圖楊宗白泥金羅漢相宋榻米芾行草墨刻孔子周流圖墨刻宋製玉爐宋製玉杯碧玉花囊白玉提梁卣白玉花巵碧玉小盞白玉筆捵漢玉筆捵玉聯珮扇器十件銀晶水盛官窑菱花盤宣窑描金填白把碗宣窑填白大碗一對宣窑海馬大碗一對𢎞治窑緑龍碗一對正德窑嬌黃盤四面正德窑嬌黃盤十面嘉窑百子碗一對嘉窑文王鼎嘉窑雙環瓶嘉窑花尊萬厯窑白蓮霽藍碟四面青緑天雞硯滴古銅花尊戶部尚書臣穆和倫臣張鵬翮侍郎臣塔進泰臣王原祁臣噶敏圖臣廖騰煃倉場侍郎臣施世綸恭進宋板五經二套宋板周禮二套春秋左傳一套稽古録一套元板易傳義一套古今合璧事類備要十套千家注杜甫詩集四套詩緝四套萬寶詩山四套漢雋一套宋板爾雅翼一套宋板花間集一套事類賦一套蔡雍集一套王通中說一套柳宗元集二套包拯奏議一套蘇洵集一套趙抃集一套博古圖二套元板真篆金剛經朱子字一冊蘇軾書四時行樂詩米芾書獅子說董其昌泥金字册董其昌楷書閶闔篇董其昌小楷董其昌草書董其昌書應制詩陳所翁雲龍圖李唐江村漁樂圖朱瑤風雲際㑹圖朱瑤雙鳳朝陽圖宋元明人畫蹟王淵花碟圖劉松年登瀛圖趙伯駒五雲樓閣圖趙伯駒滕王閣圖元人鷹揚圖元人夏景圖仇英溪山深秀圖仇英春景豐樂圖仇英夏景豐樂圖仇英秋景豐樂圖仇英冬景豐樂圖仇英設色山水陸治花卉圖唐寅喬松壽藤圖柳休元喜霑天祿圖林椿花鳥圖王牧之墨梅漢製蟠龍玉瓶漢玉圖章二方漢製玉斚宋製玉巵一對宋製玉芝水盂宋製夔龍玉爐宋製福祿連環玉巵宋製燕喜玉杯盤一副宋製萬壽蟠桃玉盤宋製玉蟾水盛哥窑香墊哥窑卍字手爐哥窑香碟定窑素花筆洗宣德窑寶青碗六隻宣德窑龍壽鼎函宣德窑甜香罐宣德窑素花盤十隻宣德窑純素大碗一對宣德窑團龍盤宣德窑雲龍把碗一對成化窑五彩嘉蓮盤成化窑五彩萬壽杯嘉靖窑萬福攸同壺瑪瑙盤龍杯洋雕漆香盒洋漆香几洋漆鍍金爐靈雲珮并紀一卷朱三松竹刻青牛老子禮部尚書臣赫碩色臣陳詵侍郎臣二格臣王思軾臣馮忠臣胡作梅恭進永樂泥金法華經成化泥金延壽經大板四書五經大全大板書傳大板詩經傳序大板禮記繫辭精義十七史詳節乾坤鑿度舊板白孔六帖樂典四套樂考一部律吕直解律吕解注韻補一部筆叢三套張九齡集司馬光集王十朋集陸龜䝉集顔真卿座位帖趙孟俯書赤壁賦蘇軾書喜雨亭記董其昌書天街曉望詩趙孟俯倣陸探微畫倪瓚荆溪清遠圖沈周擬謝雪村山水書唐寅觀海圖宋元冊頁董其昌冊頁宋製脂玉萬壽鼎宋製脂玉龍鳳尊宋製脂玉壽觥宋製脂玉雙喜筆洗脂玉夔龍筆閣脂玉聯環章一對脂玉扇器一盒脂玉香盒玉東方朔玉壽字壺碧玉九螭印章一對碧玉三喜水盛成窑五彩太平雙喜碗成窑九龍盤成窑雙鳳盤成窑獅球碗一對成窑把碗一對成窑僧帽壺成窑水盂成窑膽瓶萬厯萬壽碗十全萬厯龍鳳尊青緑義尊青緑雷尊青緑百環尊青緑提梁卣青緑筆洗宣銅宫聯爐宣銅秋耳爐銀晶龍瓶銀晶八方筆洗銀晶獅子鎮紙銀晶雙喜杯一對天然如意天然羅漢天然香几天然石硯山硃砂寶山宋琴二張官窑四喜尊哥窑菱花洗哥窑七賢瓶定窑乳耳爐定窑雙喜瓶宣窑王母蟠桃碗宣窑雙龍捧壽碗宣窑梵書碗宣窑一龍九種碗宣窑霽紅盤宣窑填白梅瓶宣窑霽紅把杯兵部尚書臣殷特布臣孫徴灝侍郎臣覺和托臣李先復臣巴顔柱臣宋駿業恭進無量壽佛經九經綱目宋板禮記舊板漢書六書音義文獻通考類書纂要書傳問答杜詩論事杜詩論言博古圖詩傳一套畫紀一部陸贄奏議葉適文集宋三朝文集楊時文集孫覿尺牘宋百花集天源發微集藝文類聚宋徽宗畫鷹小李將軍人馬圖李唐松溪仙館圖趙伯驌瑶臺上壽圖李公麟十六印證圖宋人羅漢圖邊景昭三喜圖吳鎮墨竹譜黃公望長江萬里圖趙孟俯泥金羅漢趙孟俯溪山行旅圖趙孟俯八駿圖趙孟俯人物一幅趙孟俯松風流水圖吕紀翎毛一幅吕紀花卉四幅王振鵬大士妙觀圖仇英王母獻壽圖仇英設色山水仇英水閣揮毫圖唐寅邃壑琳宫圖文徴明宫殿圖董其昌設色山水張平山福祿圖王羲之鵝羣帖蘇軾大字米芾行草書董其昌倣虞歐字董其昌行書衛夫人小楷蘇夫人織錦回文管夫人璇璣圖仙芝一座周鼎一座漢鬲一座古琴一張古鏡一圓古劍一執古玉珮魚一枚宋甌磁硯海宋磁蕉葉筆捵宋硯一方周嵌筆屏古磁水注脂玉印盒玉水盛一具法琅瓶一座玉桃杯一隻哥窑葵花盤永樂填漆盤永樂雕漆敞盤宣窑桃杯十隻宣窑澆鉢宣窑豆罐宣爐一座嘉窑膽瓶隆慶窑筆洗紅瑪瑙書鎮端硯一方雕漆三星拱照盤刑部尚書臣哈山臣胡㑹恩侍郎臣薩爾泰臣艾芳曽臣博音岱臣王企靖恭進大學衍義二套昭明文選四套唐文粹二套文獻通考全部事類一部對類一部宋板字彚一部宋板詩韻一部柳公權行書一卷米芾書天馬賦趙孟俯章草董其昌書唐宋人詩董其昌臨英光帖董其昌臨黃庭經董其昌大字董其昌草書郭熙春林圖劉松年雪霽圖趙孟俯設色山水謝時臣墨筆山水董其昌倣倪瓚山水董其昌倣米芾畫楊紹卿雙鶴圖夏昶墨竹蘆雁圖雙鴛圖唐人畫馬宋諸家山水卷集宋人畫元人山水花筐圖蟠桃圖玉杯一對玉碗一隻十錦扇器一匣舊墨一匣工部尚書臣滿都臣張廷樞侍郎臣張格臣阮爾詢臣馬晉泰臣劉謙恭進舊板九經舊板易經大板詩經大板書經舊板易詩書三經注疏舊板書傳㑹選易史二函周易傳義舊板楊萬里易傳範衍二函舊板四子書大板四書舊板十七史舊板國策文林綺繡舊板事文類聚兩漢博聞舊板文章正宗舊板事類賦舊板初學記宋板朱子韓文考異舊板五音類聚舊板水經注大板大學衍義舊板王通中說舊板周伯琦六書正訛樂律全書舊板朱子校昌黎集舊板司馬光詩集舊板嘉祐集舊板南豐集真德秀集舊板三蘇文粹舊板蘇軾詩舊板元文類大儒奏議野客叢書舊板亷平録吳萊全集舊板禮部韻略舊板法書要録舊板漢隸分韻廣韻藻一套六書賦一函吳棫韻補趙孟俯楷書趙孟俯行書董其昌行書董其昌臨米書董其昌臨趙書董其昌草書董其昌行草董其昌大字董其昌小楷董其昌八仙歌文徴明楷書文彭五言詩陳獻章行書郭熙松柏長春圖徐世昌仙桃瑞鶴圖壽松百祿圖陳居中春獵圖李昭道仙山樓閣圖錢選蟠桃圖趙孟俯羅漢圖趙孟俯竹石趙伯駒高士圖趙伯駒羣仙獻壽圖冷謙江山平遠圖李公麟竹林七賢圖文徴明蟠桃圖董其昌山水宋政和年製鎮紙玊尺宋玊蟠螭水汲宋官窑一統爐宋製銀晶筆山萬窑萬壽盤宣窑梅瓶陸子剛製桃紅玉扇器洋几一具壽山圖書四方萬壽盛典初集卷五十七
