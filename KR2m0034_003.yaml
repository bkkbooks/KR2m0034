body:
  text: 欽定四庫全書萬壽盛典初集卷三聖德一孝德康熙五十二年三月十八日皇上六旬正誕允羣臣請升殿受朝賀先一日甲午奉皇太后由暢春園還宫初羣臣以皇上六旬萬壽恭擬請駕升殿受朝賀上方侍皇太后於暢春園禮臣以三月初六日啓奏典禮上允所請乃於十七日自暢春園全設鹵簿奉皇太后還宫是日天下臣民赴闕祝釐者不下億萬由暢春園至紫禁城夾道綵棚綿亘數十里獻壽迎鑾喧闐絡繹皇太后御填漆龍轎皇子皇孫扶輦步行臣民耆老婦孺竝於道左俯伏警蹕不加傳呼勿擾而恪恭肅穆與歌舞愛戴之心一時竝集皇太后親見普天共慶率土同歡之盛慈顔悅豫聖心怡暢猗歟休哉誠亘古以來所未有也十八日乙未上率諸王貝勒貝子公內大臣侍衛滿漢大學士朝皇太后於寧壽宫未入八分公文武官員暨天下耆民於午門外隨班行禮三月十二日禮部具疏題奏萬壽聖節行慶賀禮儀注又另具摺奏聞皇太后為禮儀事恭照康熙五十二年三月十八日萬壽聖節行禮儀注是日早皇太后儀仗於寧壽門前陳設中和樂於簷下陳設丹陛樂於寧壽門外南牆下兩邊陳設皇上具禮服於寧壽門丹陛上東旁立王公等在寧壽門外丹陛下立大臣侍衛在儀仗末兩旁立其未入八分公等文武各大臣官員在午門外排立禮部堂官說與太監轉奏請皇太后升座位皇太后出宫作樂升寧壽宫座位後皇上於寧壽門中檻外正中立王公等於寧壽門外丹陛下兩旁分翼排立大臣侍衛在儀仗末兩旁排立聽鳴贊官贊行三跪九叩頭禮其未入八分公等文武各大臣官員在午門外亦同隨班行禮此行禮時作樂鳴贊官贊禮畢皇上回原立處立禮部堂官說與太監轉奏請皇太后還宫作樂皇太后還宫後皇上還宫為此謹奏十八日黎明寧壽門外陳設儀仗樂器皇上率諸王貝勒貝子公內大臣侍衛滿漢大學士至寧壽門序立未入八分公以下文武羣臣於午門外序立皇太后出宫升座丹陛樂奏豫平之章其詞曰有懿慈闈惟天下母厚德之符含𢎞九有式嗣徽音以昌厥後寵綏受之遐不單厚福祿來求如山如阜皇上率諸王以下羣臣行禮丹陛樂奏益平之章其詞曰品物咸亨景光清泰展禮孔偕式瞻嘉會金石相宣貫珠編貝思媚思齊德音四沛以介繁禧萬年保艾曰壽而臧曰昌而大行禮畢皇太后還宫丹陛樂奏履平之章其詞曰百禮既洽燦然其章瑞雲承輦麗日舒長萬方玉食怡愈未央言還彤幄凝祉儲祥一人有慶萬壽無疆皇上還宫三月二十八日乙巳命八旗滿洲䝉古漢軍以及包衣佐領年七十以上老婦人俱赴暢春園皇太后宫門外賜宴九十歲以上及大臣之妻召至宫內賜坐八十歲者分列丹墀下宴畢皇太后皇上各賞賚有差三月十七日上諭部臣將滿漢六十五歲以上臣民查奏賜宴八旗滿洲䝉古漢軍以及包衣佐領無論官員閒散人等七旬以上老婦人查明具奏於老人賜宴後再擬定一日赴皇太后宫賜宴部臣遵㫖擬於二十八日年老婦人赴暢春園皇太后宫賜宴又奉特諭伊等皆係婦人而又人多似乎不便於是分别年齒凡九十歲以上及大臣之妻召進殿內八十歲以上分列丹墀下七十歲以上俱於宫門外賜宴是日也時雨新晴惠風和煦副笄䄖翟望仁壽而摳衣鶴髮皤顏向慈寧而斂衽凡宫門內外盡瞻帝母之尊共識慈顔有喜而皇太后於上賜之外復加恩賚以昭盛典於是諸老婦人及大臣之妻無不歡欣拜舞齊祝皇太后皇上聖壽無疆謝恩而出至是日宴饗之隆賞賚之渥詳紀養老條中兹不具載臣等伏見皇上尊養皇太后於兹五十二年矣歡心洽於萬國玉食遍於九州深愛之忱久而彌篤致敬之禮進而有加如疊上徽號以致尊崇日侍寢門以勤溫凊凡國家大事必恭請懿㫖以肅祇承南巡江浙北幸熱河必奉聖母同行以極游豫至於王師遠指法駕省方問安之使不絶於道遇四方獻新之物雖一瓜一果之微必遣官星馳進奉皇太后然後供御定省嚴焉甘旨備焉每年十月初三日皇太后聖誕及元旦令節皇上必詣皇太后宫行禮以祝純嘏以祈萬壽莫不本於至性極於自然所以超軼前聖昭示來兹者起居既已詳注典訓亦有專書矣夫聖人之福必本於德而聖人之德無加於孝在昔惟有虞之聖五十而慕三代以還闕有間矣至唐始崇誕聖之節元和十五年七月尚書左丞韋綬請降誕日詔百官詣光順門先賀皇太后然後上皇帝壽書之史册光示萬古憲宗欣然嘉納至長慶元年七月降誕日百僚於紫宸殿稱賀畢始詣昭德門外命婦於光順門竝進門奉賀皇太后典禮雖行後先失序非盛德也寶厯初復以綬所陳奏禮無所據竟罷不行太和七年修復祖宗故事亦不過以慶成節奉迎兩宫太后於宫中歡宴羣臣於延英門上壽而已若我皇上孝德天成周旋中禮躬率羣臣先朝皇太后然後受朝賀敬誠備至文物兼隆至於推恩錫類使年老婦人咸得拜舞慈寧均霑異數以聖天子引年尚齒之文為皇太后臣妾億兆之樂孝思不匱豈非聖人之極致哉孟子稱人慕父母惟少為然故至孝者惟舜今皇上萬壽六旬而孺慕之誠有加無己以視五十而慕者猶或過之豈三代而下帝者所敢望耶臣等躬逢盛典雖聖孝髙深仰窺無自輒紀其實傳之億萬世以見皇上孝極其至德極其隆故福亦極其盛焉至皇太后六旬七旬兩大慶所行典禮皆天家盛事人倫極軌義得併書於左康熙三十九年歲次庚辰十月初三日恭遇皇太后六旬萬壽聖節皇上御製恭祝皇太后萬壽無疆賦敬書於屏先期初一日陳設天府奇珍於養心殿皇上躬親展閲洪纖必遍採天保九如之義每物皆用九數黃金以九計則九九八千一也白金以九計則九九八萬一也以至錦繡文綺翡翠珊瑚火齊木難懸黎夜光極陸海之所産梯航之所貢難以數計枚舉者莫不稱是初三日皇上躬詣寧壽宫行慶賀禮自擇玉糈萬粒以供天厨壽膳其所進儀單并宴品名目一一詳列於後佛三尊御製萬壽無疆賦圍屏一架御製萬壽如意太平花一枝御製龜鶴遐齡花一對珊瑚進貢一千四百四十分自鳴鐘一架壽山石羣仙拱壽一座千秋洋鏡一架百花洋鏡一架念珠一九皮裘一九雨縀一九哆囉呢一九畢機縀一九沉香一九白檀一九降真一九雲香一九古玩九九書册卷九九攢香九九大手帕九九小手帕九九金九九銀九九縀九九連鞍良馬六匹萬方玉食宴飯湯麵等名萬國玉粒飯萬縷長春麵五嶽獻瑞㸃五盤千祥瓊液湯四海呈祥酥糕四盤九有乾坤閣九高碗閬苑交梨火棗蓬萊雪藕冰桃八仙捧壽果鍾八鍾果西池桃實鮮桃靈根仙種公領孫葡蔔灼灼丹華荔枝玉瑩珠駢岡榴安期仙棗棗上林蘋實蘋果閬苑花紅沙果洞庭朱實橘茂苑香橙橙長生壽果延壽果延壽仙果長生果金絲千縷蓮鬚碧雲千瓣青蓮瓣蓬島桃膏蟠桃九重嘉慶糖李金花獻瑞金雀花玉柱奇珍蜜門冬西王母棗洋棗九轉金丹蜜金棗絳片神漿狀元紅饌萬壽無疆福如東海壽比南山海屋添籌羣仙拱壽蟠桃勝會百靈效順三仙拱壽金掌清波河清海宴十洲三島受天百祿不老仙姑甘露垂天南極呈祥瑶池瑞靄芝花獻瑞玉液凝香萬國來朝萬歲長春湯茶酒等名與天同壽不老湯金芽萬葉壽山茶萬壽霞觴長生藥酒御製恭祝皇太后萬壽無疆賦有序蓋聞世運升平內庭懋儀型之慶天心錫嘏彤管高姻睦之風惟度協於中和斯福昭其美偹我聖母皇太后仁慈夙秉恭儉習成濯龍明德久冠宫闈致治宣仁胥稱堯舜兹當冬月之初正逢周甲之喜敬泐蕪詞上介遐壽聿抒孺慕之微忱兼採臣民之共願瞻依莫殫抃舞惟殷謹拜手而賦曰惟坤作則配天行健圖籙祥呈璇衡瑞獻西池之青鳥飛來南極之明星乍現佐治登三流歡吹萬筐篚玉帛萬國獻其球琳夏凊冬溫一心慰以至願婉妗降於華渚飛瓊舞於綺苑祈厯算之永延湛精神而靡倦碗盛沆瀣之漿鼎熟胡麻之飯織壽字以成圖捧霞觴而進勸序屆初冬花明永晝欣拜舞以爭先肅趨蹡而恐後岡陵之禱嵩岱同巍松柏之篇椿桃竝茂雲璈響徹協鸞鶴以雙清砌草憂忘報嶺梅之先秀指海屋以籌添睇斗杓而錫祐山若積而彌深地以增而益厚普天率土咸頌仁慈閬苑蓬壺齊呼聖壽若乃春秋佳勝媚景舒徐奉晨昏於軒榭親顔色於庭幃岸柳汀花依依含笑隄鶯梁燕嚦嚦相呼於是泛龍艦扶鳳輿或怡情於碧沼或攬勝於金鋪叙天倫之樂事暢逍遙以共娛尊養樂愷古昔所無誠乃邁徽猷於任姒臻至治於唐虞詠兹懿淑富有嘉祥身與心而俱泰福因德而逾彰謹集萬方之玉帛肅百序之冠裳剪鮫人之千錦貢織女之七襄寶座烟霏層層珠蓋博山香繞陳陳都梁樂奏雲門之曲仙來瑤島之疆竊欣侍奉膝前趨迎朝暮浥霞彩於靈萱酌太和於甘露臣則禀誨諄諄撫兹寰宇際日吉以時良樂和風而甘雨恭逢壽域之開䖍製荒蕪之句願母壽之靡涯享鴻圖之景祚優游悅豫金石比其堅貞綿亘扶疏楩楠同其蟠固愧莫罄於頌揚載降階而陳賦康熙庚辰十月朔日恭書進康熙四十九年歲次庚寅十月初三日恭遇皇太后七旬萬壽聖節先是正月壬午上詣淡泊為德行宫問安傳㫖諭禮部尚書穆和倫等曰舞者滿洲歡慶之勝事向使諸王大臣行之今歲皇太后七旬大慶之年朕亦五十有七欲親舞稱觴午時上以元宵節設宴於萬樹紅霞皇太后升座諸樂竝作上近前起舞良久乃進爵三月丁亥上謂大學士等曰皇太后今年七秩矣應行典禮照六旬時所行之禮行著交禮部夏月皇上駐蹕口外預敕養心殿監造臣趙昌等謹備儀物製造精䖍回鑾後特命出內府所藏九州所貢奇珍瓌寶靡不悉具先以御製書屏頌祝萬壽爰及冠袍簮紱錦繡珠玉彝鼎圖書金銀諸物琳琅充牣未可枚舉璇題標識悉取嘉名初二日臣趙昌王道化張常住和素奉命齎至寧壽宫凡百有二十餘案皇上恭詣寧壽宫命臣趙昌和素宣讀儀目一一皆經聖覽親定行列珍玩金銀則陳殿中錦繡文綺陳月臺之左其所進儀單詳列於後無量壽佛一尊係藏裏班禪喇嘛進般若母實勝塔一軸御係金字心經書御製萬壽無疆賦圍屛一架御製萬壽如意太平花一枝御製萬壽金簪九對御製萬仙慶壽自鳴鐘一架萬壽禎祥玉仙人一座宋均窰飛㦸花樽一座永樂霽紅花露壺一對千秋洋鏡一架念珠一九冠一頂皮裘一九雨縀一九哆囉呢一九畢機縀一九沉香一九檀香一九降香一九雲香一九古玩九九畫册卷盆景萬年根盤九九攢香九九大手帕九九小手帕九九金九九銀九九縀九九連鞍良馬六匹萬壽盛典初集卷三
