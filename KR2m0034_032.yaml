body:
  text: 欽定四庫全書萬夀盛典初集巻三十二恩賚五蠲賦四康熙五十二年三月十八日萬夀覃恩以承平已久生齒愈蕃直省人丁錢糧以五十年丁冊著為定額續生人丁永免加賦先是康熙五十一年二月二十九日滿漢大學士九卿等奉上諭朕覽各省督撫等奏編審人丁數目並未將加増之數盡皆開報今海宇承平已久户口日繁若按現有人丁加徵錢糧實所不可人丁雖増地畝並未加廣應令直省督撫將現今徵收錢糧冊内有名丁數勿増勿減永為定額徵收錢糧嗣後所生人丁不必徵收錢糧編審時止將増出實數察明另造清冊題報朕凡巡幸地方所至詢問一户或有五六丁者止一人交納錢糧或有九丁十丁者止二三人交納錢糧詰以餘丁何事咸云䝉皇上洪恩並無差徭共享安樂各安生理優游閒居而已此朕之訪聞甚晰者前雲南貴州廣西四川等省遭叛逆之變地方殘壊田畝抛荒不堪目覩自平定以來人民漸増相與墾種無有遺業或堆沙積石難於耕種之地間或有之其山谷﨑嶇毫無棄地盡皆耕種矣由此觀之民之滋生者實多朕欲知人丁之數非為加徵錢糧今國帑殷裕屢嵗蠲免雖至千萬凡國用所需并無遺悮不足之虞故將直省現今徵收錢糧冊内有名人丁永為定數嗣後所生人丁免加錢糧止將實數另造清冊具聞豈特有益於民亦一盛事也直省督撫及有司官編審人丁時不將實數開報特恐加徵錢糧是以隠匿不據實奏聞朕並不為加徵錢糧止欲知其實數耳嗣後督撫等倘不奏明實數朕於就近直𨽻遣人逐户挨察即可得實彼時伊等亦復何詞此事毋庸速議俟典試諸臣出闈後爾等㑹同詳加確議具奏五十二年三月十八日萬夀恩詔内一海宇承平已久户口日繁地畝並未加廣宜施寛大之恩共享恬熙之樂嗣後直𨽻及各省地方官遇編審之期察出増益人丁止將實數另造清冊奏聞其徵收錢糧但據康熙五十年丁冊定為常額續生人丁永不加賦仍不許有司於造冊之時藉端需索用副朕休養生息之至意四月十九日户部尚書臣穆和倫等謹題為欽奉恩詔事該臣等議得直𨽻各省康熙五十年編審丁數定為常額續生人丁永不加賦之處謹照恩詔遵行外嗣後遇編審之期將新増人丁實數繕造清冊名為盛世滋生户口冊奏聞如額徵錢糧人丁數内有開除者即將各該省新増人丁補足額數至新増人丁倘不據實造冊開報或有私派錢糧造冊之時藉端需索等弊該督撫嚴查題叅可也本月二十一日奉㫖依議臣等竊思丁之有徵由來舊矣攷之三代力役之征與布縷粟米等王制曰用民之力嵗不過三日豳詩曰上入執宫功蓋謂此也後世易為輸將制雖異於古而實便於民自五方之風土不齊因而立法各異有丁由户起者亦有丁隨糧辦者由户起者一户止一丁自髙曽以至孫子户不改丁亦如故也隨糧辦者有糧即有丁以糧數之多寡定丁數之多寡而無糧者不與焉大抵列於冊之内者少而逸於冊之外者多即遇編審之期要亦徒循故事畧為増減而已周禮秋官司民掌登萬民之數自生齒以上皆書於版嵗登下之三年大比以萬民之數詔司冦司冦獻之於王原未有不登之民數也皇上動與古合深悉民隠命廷臣㑹議令天下督撫據實上聞正在奏報又於萬夀特恩詔令續生人丁永不加賦仰見睿慮周詳寛仁之典格外有加俾林林總總之衆咸得熙熙皥皥共登夀域慶生息之蕃免丁徭之擾意美而法良德洋而恩溥生聖人之世為聖人之民何其幸與謹録粤西人民謝恩一章其餘奏章俱彚入報謝恩詔疏内幷詳誌直省人丁實數俾千萬世而下知盛世户口之繁多皆聖主休養生息之所致焉巡撫廣西等處地方提督軍務兵部左侍郎兼都察院右副都御史加三級臣陳元龍題為呈懇俯賜轉詳代題恭謝天恩事據布政使司布政使黄國材詳據桂林等九府屬紳衿里民秦琮等呈稱琮等生逢聖世素沐皇仁德教𢎞敷淪肌浹髓恩膏普被老安少懐欣逢萬夀昌期又沐皇恩肆宥特頒恩詔新増幼丁永不加賦蠻煙瘴雨之鄉盡沐涵濡煦育之澤斯誠曠古難逢千載一時琮等仰戴髙深感激下忱無由上達伏乞恩賜轉請據情代題等情到臣該臣看得粤西地界極邊户口向來稀少䝉我皇上休養恩深施生德溥比來生齒漸加蕃庶從此千年萬載日増月盛並未有量兹恭逢萬夀六旬大慶特頒詔㫖續生人丁永不加賦凡厥兆民子子孫孫得免力役之征攷之史冊亘古未聞逺邇歌頌老幼歡騰無不焚香叩首頂祝聖夀無疆兹據布政使黄國材詳據桂林等九府屬紳衿里民秦琮等公呈懇乞代題等情前來臣不敢壅於上聞所有輿情感戴恭謝天恩臣謹㑹同兩廣總督臣趙𢎞燦合詞代題伏乞皇上睿鑒施行康熙五十二年六月二十七日題八月初三日奉㫖該部知道附載直省編審人丁數目直𨽻撫屬舊管人丁共三百四十四萬一千二百八十四丁新増人丁共二十八萬四千六百二十丁半開除抵補外實在人丁共三百四十四萬九千二百八十四丁半奉天府屬舊管人丁共三萬八千八百九十六丁新増人丁共三千二百九十七丁開除抵補外實在人丁四萬一千九百四十三丁江寧撫屬舊管人丁共二百七十一萬三百六十九丁新増人丁共一萬九千二十五丁開除抵補外實在人丁共二百七十二萬九千三百九十四丁又歸幷省衞黄快軍丁舊管人丁共二十萬五千九百三十二丁新増人丁一百九十二丁開除抵補外實在人丁共二十萬二千三百八十二丁又蘇太等十衞舊管人丁共三千八百七十三丁新收人丁一百一十二丁開除抵補外實在人丁三千八百七十三丁安徽撫屬舊管人丁一百四十萬三千七百七十七丁新増人丁六千九百八十二丁開除抵補外實在人丁一百四十一萬七百五十九丁