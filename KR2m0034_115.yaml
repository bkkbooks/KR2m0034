body:
  text: 欽定四庫全書萬壽盛典初集卷一百十七歌頌五十七生監諸臣八仁壽鏡賦生員臣宮耀亮猗惟仁壽之宮有此千秋之鑑雖潛形於幽獨如揚光於明旦浩乎秋水之澄鮮皎若夜珠之璀璨向陽烏而燧發初日流輝照金波而水泠明星有爛其始制也太隂呈精歐冶錬形蠲日則天中之節擇地則揚子之津蒼龍蟠而鱗鬛鼓動乾鵲墮而羽翼生成屑金膏以磨洗比玉液之晶瑩映若無質洞碧虛而何際循之有體象止水之無心寶匣初開練光飛出規對月而為雙色合天而為一樹之瑶墀置之密室隔簾幕而重掩誘雲山以低入煙蘿遙列於金階青翠倒瀉於素壁於是飾以珊瑚裝之玳瑁躍蟾蜍而洞達行姮娥其窈窕雖復晉有金飾之美魏有銀華之妙皆不足儷此空明嫓兹朗照况其亦堅亦白不淄不磷非塵㙠之可蝕在篋笥而亦珍屢照不疲寧遁於妍􅑦美惡含虛以待無煩於意必將迎天子膺圖出震明象重離以人為鑑法天無私日月光華如聖作而物覩乾坤融朗亦先天而弗違乍闢堯階流渚之赤虹遠燭獨持軒鏡繞樞之紫電下垂宜其合千百國而成大統綿萬斯年以應昌期者也萬壽詩七言律一首有序生員臣吳鐘欽惟皇上御極五十有二年日升月恆星輝雲燦綿兩間之景運協萬載之昌期甘雨和風正當歲始吹豳擊鼓共樂春臺物應候以敷榮地成文而列繡重以皇都之麗羣瞻天子之光閶闔門開蓬萊路近桃花千樹天上春多楊柳三眠人間日暖和氣風行於八表歡聲雷動於九衢户進堯尊家陳舜樂極太平之盛事筆不勝書當普慶之良辰人胥效祝顧奉觴上壽祇應玉珮羣仙乃詣闕陳詩許附青衫多士臣等身依輦轂名厠膠庠望一簇之青旗捧九天之紅日五雲深處遙識龍顔萬歲聲中叨陪虎拜雖才非風雅敢稱秋實春華而志切敷揚祇屬鶯簧蝶拍行來上苑隨輯瑞以呼嵩載詠南山數添籌而觀海詩成七律韻叶三多行處笙歌御苑通蓬萊路近日光紅雲開拱獻三春壽人聼傳呼萬歲嵩綵結堯天臺榭迥醉霑周宴海邦同陽春譜作升平調長此均瞻景物豐萬壽詩七言律二首生員臣劉璣恩深雨露普堯天羣沐皇仁頌萬年宫扇日臨開雉尾爐香風裊噴龍涎柳垂仙島迎宸幄花馥瑶階敞御筵共仰九重𢎞壽域山呼常近五雲邊其一盈盈仙樂鳯樓中綵仗班聯拜舞同青鳥自來青瑣闥紫雲常繞紫微宫乾坤交泰昌期合宇宙長春景運隆四海臣民皆獻壽籌添海屋盡呼嵩其二萬壽詩五言排律六韻生員臣馬緒聖世登仁壽清時利用賔金莖凝玉露紫氣集楓宸雲物光華異山川景象新蒼生三古盛黎獻萬邦親更舉掄才典重逢造士春普天同獻頌盛代得賢臣萬壽詩五言排律十韻生員臣朱揆荃聖后超千古𢎞仁育兆民哲宣參造化文武裕經綸盛典飛丹詔深恩沛紫宸八埏䝉覆載四海共尊親樹德膺年永承天獲福新樂成看舞鳯世治見逰麟雙闕垂華袞重霄列近臣蓼蕭歌樂愷棫朴詠槱薪奎井文光聚函關瑞氣臻嵩呼騰率土願祝億千春萬壽詩五言排律八韻生員臣許捷闔闢乾坤大升恆日月長九天開景運四海沐恩光瑞靄凝龍袞仙班列雁行瑶芝輝錦砌玉液注霞觴紫禁來鸞鶴丹墀集鳯凰金甌歌永固寶厯慶遐昌率土同歡忭蓬山共拜揚願將天地壽稽首獻君王萬壽詩五言排律十韻生員臣朱藻貫月徵嘉瑞流虹協吉祥乾坤溥惠澤朝野沐恩光應運賢豪起如天雨露長良辰新鳯厯淑氣囀鶯簧御柳垂閶闔仙桃奉建章瑞凝金掌露曲度紫霞觴萬國衣冠集遐方玉帛將採珠來碧海探王出崑岡盛世輿圗鞏熙朝文物昌謳歌盈海甸三祝效陶唐萬壽詩五言排律八韻生員臣丁翔帝治當陽盛羣心就日同西庚輝壽域南極麗璿宫宴鎬歌文德征苖頌武功離明光萬域井養溥羣䝉海晏皇圖鞏春融聖澤洪堯樽傾法醖舜樂協和風筐篚來遐邇歌謡遍叟童康衢遙頌聖拜手罄葵衷萬壽詩五言排律八韻生員臣蕭𢎞毅四海歌天保無疆頌聖人雞鳴宫漏曉鶯囀上林新綵仗和風暖仙樓瑞靄勻泰階瞻盛治率土被深仁令節當三月歡心協八垠臨軒敷化雨建極樂天申歲序乘鴻運文章蔚國賔草茅多藹吉抃舞慶良辰萬壽詩五言排律十二韻生員臣張集成人際升平世天開景運昌南山春日麗北闕彩雲翔聖德嫓堯舜𢎞猷邁漢唐祥麟逰上苑鳴鳯集髙岡共識天顔喜欣瞻士氣揚菁莪徵雅化遇合慶明良瑶島桃初實蟾宫桂並芳掄才符令望選彥悉思皇教澤流偏廣恩膏沛未央遐方羣獻瑞薄海盡來王共沐和風暖同逰化日長願隨耆老後競上萬年觴萬壽詩五言排律二首生員臣張蕚咸垂裳昭至治大地扇仁風兼有三皇壽彌欽五位崇恩從霄漢下樂與庶民同動植俱霑溉熙然化育中其一文命敷環海膚功奏逺方濬川符禹跡時邁駕周王蔀屋租全賜圜扉網不張普天觀化日扶杖拜恩光其二萬壽詩五言排律六韻生員臣徐留臣壽域開閶闔陽和澤萬方金莖承瑞露珠斗酌瓊漿鳷鵲鶯花麗蓬萊歲月長八紘恢地軸五緯煥天章濟濟排鵷鷺嗈嗈賦鳯凰普天歌有道拜獻萬年觴萬壽詩五言排律六韻生員臣曹培廉世際時雍日華封祝聖人桃經千載熟花試萬年春上苑光風滿寰瀛化雨均普天同擊壤率土樂吹豳瑞氣迎南極祥雲拱北辰草茅無限意作頌獻楓宸萬壽詩七言截句十八首有序生員臣關本欽惟皇帝陛下五德統符萬齡開運文謨武烈賢堯舜而集大成聖德神功配乾坤而符太極合同軌同倫同文而益盛九譯來王偕多福多壽多子以全昌百祿是荷於今五十二載萬國咸寧自此億萬斯年一人有慶兹當春王三月恭逄聖壽六旬海晏河清四海同登壽域日升川至九州盡入春臺蕩蕩巍巍億姓難名而莫贊熙熙皥皥百獸率舞以呈祥將總元會運世之昌期用綿寶厯且兼炎黃羲昊之景命永握瑶圖臣本一介書生欣逢聖世沐髙厚之長育早有葵忱被日月之照臨亦同雀躍呼嵩頌嶽附於揚拜賡歌搦管陳詞比於康衢夏諺句成七字頌進萬年詩曰萬年天子體乾行軼舜超堯久太平三萬二千成一歲元辰六十正方亨其一萬年天子纘宗功祖德欽承百紀隆帝命靈長親有道精誠一氣總能通其二萬年天子洽天心肅穆郊壇儼式臨明德馨香徵至治春祈到處灑甘霖其三萬年天子首尊親孝治從今仰一人養志還將天下養慈闈瑞色護長春其四萬年天子煥文章雲漢昭回典冊光玉屑遠超唐李杜銀鈎不數晉鍾王其五萬年天子武功揚屢奏鐃歌振八荒貔虎䇿勳皆睿算九州清晏四時康其六萬年天子接心傳洙泗源流一脉連契合紫陽隆異數千秋金鏡自高懸其七萬年天子奏平成玉輦時巡指授精早有皇心籌海晏羣歌帝力奠河清其八萬年天子重農桑圖繪豳風惕廟廊一穗九岐歌麥秀和風歲歲報君王其九萬年天子富詩書玉笈竒探萬卷餘丹筆箋疏勤乙夜人間珍重似璠璵其十萬年天子惠元元賜復蠲租歲益繁不獨康衢人鼓腹梯航重譯盡銜恩其十一萬年天子飭官針激濁揚清勸勵深百爾承恩皆鼓舞忠君還切愛民心其十二萬年天子布祥刑玉律親裁例秉經和氣殷流成久道如天大德翼長齡其十三萬年天子協星垣三角精微識有源經緯生心心運物神竒遠已邁羲軒其十四萬年天子訓如綸長育惟期士有真字字典謨為世則六經奧旨一時新其十五萬年天子振人文曠典欣承自五雲永定科名新雨露百王千聖未曽聞其十六萬年天子廓鴻圖治洽山陬遍海隅近說遠來修職貢卿雲爛縵燦天衢其十七萬年天子海添籌嶽頌嵩呼遍九州草野小臣齊拜祝八千歲是一春秋其十八萬壽詩五言排律六韻生員臣張廷珅舜日卿雲縵堯年化日長九天垂紱冕萬國肅冠裳紫禁鳴仙樂黃扉繞御香蛟龍騰變化桃李吐芬芳川至符三祝嵩呼動八荒瑶池陳玉液願引萬年觴萬壽詩五言排律六韻生員臣王步青祥光擁太乙佳氣靄東皇天上洪鈞轉人間化日長萬方皆擊壤百辟盡稱觴鄉會賢關闢春秋士氣揚祥麟逰上苑彩鳯集髙岡共慶輿圖鞏同瞻帝道昌萬年頌生員臣吳霌著大哉皇王繼天立極欽明文思克純其德待旦孜孜居乾翼翼治臻太和勳被四國久道化成至誠無息厯數靈長卜年萬億聖誕乘春和風瑞色爛縵舜雲光華堯日乃用作人俊門是闢文教覃敷東西南北有斯罝野無遺逸雕龍繡虎彬彬文質為國之楨皇曰豫弼用翼升恆泰階呈霱皥皥熙熙實惟帝力萬壽無疆載歌九域萬年頌生員臣朱霞皇帝御宇五十二年三辰增耀五嶽旬宣恭逢聖壽六甲周環八荒之內元氣駢闐近自畿甸以達九壥涵濡長育俊乂實繁如海出珠如山吐雲星辰作繪雲漢章天皇帝神聖比隆羲軒神功默運旋坤轉乾俾此多士矩方規圓會極歸極泳沫游源皇帝純孝色養承歡惋愈問視為天下先俾此多士內行純全遐邇遍德孝弟力田皇帝聖武不怒而嚴神謀睿算四海蕩平俾此多士策力髙騫雲臺麟閣功勒名鐫皇帝制作圖書並懸日華月彩彪炳八埏俾此多士經術紛綸理則程朱文則歐韓於皇多士彚征茹連子子孫孫雲日常瞻戴髙履厚恩無不霑矢其忠孝永載陶甄祥由寶善瑞在得賢天降甘露地出醴泉聲明艷野文物藻川於千萬載拱此壽筵萬壽詩五言排律六韻生員臣蔣典道德尊千古勳華駕百王太平欣有象純嘏祝無疆鳯厯貞元起龍飛甲子長卿雲三月錦春色萬年觴玉帛森朝㑹雲韶引拜揚斗光環帝極處處仰垂裳萬壽詩七言律一首生員臣文楫萬壽祥開六合春賢關特啓煥恩綸南山瑞氣鴻圖永東壁輝光鳯藻新應運甲周綿玉厯格天申錫慶嵩辰草茅幸際風雲㑹競祝無疆仰聖仁萬壽詩五言排律十二韻生員臣湯萬保神聖超千古恩威普萬方豐功歌俊偉愷澤頌汪洋雲牖生蓂莢髙岡集鳯凰蒼生登衽席黎獻侍巖廊南極星初耀西池宴未央添籌盈海屋拜舞肅鴛行錫嘏瞻金闕呼嵩晉玉堂祥光縈輦轂喜氣溢梯航幸值唐虞盛欣瞻雨露瀼瞻雲依覆載含哺樂羲皇自愧雕蟲技長懷翰墨香作人宣雅化萬壽祝無疆萬壽詩五言排律十四韻生員臣于春曉浩蕩乾坤德涵濡帝澤宣八方承舜日四海戴堯天擊壤康衢樂薰風解阜絃太平欣有象愷澤被無邊一統車書盛三春景物妍南山增茀祿北斗耀奎躔華祝三多備箕疇五福全輿情歡舞蹈宸眷篤英賢多士登庸㑹盈庭喜起年謂騰青海駿須飾錦雲韀和玉呈荆石蠙珠貢碧川聖恩春皥皥藹吉羽翩翩保佑申天命賡歌逹御筵風雲從此際厯服正聯綿萬壽詩五言排律十四韻生員臣顧琳大化嫓姚姒神功並昊羲太平垂象日玉燭應調時壽域開宸極文星映玉墀萬方羣祝嘏多士盡摛詞舜奏南薰曲堯傾北斗巵太和凝聖節諸福㑹昌期氣轉洪鈞遍恩將湛露施九重方穆穆百爾盡師師雲漢同天麗奎文並斗垂萋梧集靈羽棫朴茂新枝蔚作天家棟來為聖世儀祥雲呈鳯閣化雨灑蛟池藹吉欣趨拱共球獻媚兹嵩呼齊望闕愧乏掞天辭萬壽盛典初集卷一百十七
