body:
  text: 欽定四庫全書萬壽盛典初集卷三十七恩賚七賞兵二一鎮守宣化府等處地方副將管總兵官事臣司九經謹奏為羣兵沐恩深重籲懇代謝事竊臣同欽差副都統臣王臣閲賞臣屬兵丁遍歷大小城堡逐名給散踰月方完續據闔鎮協營路兵目何崇先等公呈僉稱崇先等形同草木質若螻蟻幸生盛世得享升平飲和食德被覆載之𢎞庥履厚戴髙沐生成之雅化豢養多年寸長未報今逢大慶良辰更受覃恩遐播特命大臣遍施膏澤一身在伍舉室沾恩上而父母胥飽食而暖衣下及妻孥咸安居而樂業感激有心圖報無地惟有仰祝聖夀與乾坤悠久皇圖偕日月升恆而已等情到臣臣不敢壅於上聞謹恭疏代謝伏乞皇上睿鑒施行鎮綏將軍仍管陜西提督事務世襲拖沙喇哈番加五級降一級留任臣潘育龍謹題為代奏恭謝天恩事竊臣前欽遵上諭於閏五月二十八日自固原起程前赴西安府㑹同欽差內閣學士臣蔡升元在於臣所屬鎮協營路給散皇賞緣由業已題明在案臣按程東行於六月初六日抵西安㑹省候欽差臣蔡升元祭畢陵寢於六月十一日進省宣布皇恩首先賞賚督撫兩標兵丁臣㑹同欽差臣蔡升元督臣鄂海撫臣永泰賞西安城守營兵丁每兵一兩稱足按名散賞閲射於六月二十五日臣同欽差臣蔡升元自西安府起程北行按營逐名足數散賞閲射歷固原鎮屬之富平營金鎖關營行至延綏鎮屬宜君營㑹同總兵臣李耀由宜君鄜州延安綏德延綏鎮標竝城守營及神木波羅定邊三協所屬各營堡汛賞畢於八月初七日欽差臣蔡升元行至寧夏鎮所屬花馬池地方㑹同甘肅提督臣江琦寧夏鎮總兵臣范時捷赴寧夏鎮屬賞賚臣與欽差臣蔡升元相議臣在所屬下馬關營駐劄俟將寧夏鎮標營路賞畢來至下馬關臣㑹同賞下馬關營紅德城營赴固原賞臣標伍營及城守營慶陽協屬平凉各營暨靖遠協屬蘆塘等營賞畢欽差臣蔡升元赴甘肅凉州等處散賞臣暫回衙署俟蔡升元將甘提所屬各鎮標營路賞畢之日東來臣計日仍預先起程前赴臣所屬之關山汛地等候迎㑹賞賚關山西鳳等營從寶雞縣入連雲棧道赴漢中等處㑹同興漢鎮總兵臣楊世昌賞該鎮屬各營兵丁事竣出大泥峪口往潼關等處行賞畢另疏具題外茲臣等據賞過標協營堡兵丁咸跪聽欽差臣蔡升元宣諭皇恩領畢皇賞羣望闕叩頭謝恩歡聲雷動齊言我等兵丁父母妻子荷䝉皇恩豢養已屬恩同天地今恭逢皇上六旬大夀九重萬里垂念兵卒特沛殊恩我等無從仰報萬一惟有䖍製萬歲牌位每逢朔望闔家焚香叩頭共祝萬夀無疆籲懇臣等代題謝恩等情各具公呈到臣欽惟我皇上德竝乾坤恩洽萬姓兹恭逢萬夀六旬大沛洪恩特命學士發蔡升元臨秦賞賚使均霑實惠臣目擊衆兵領賞之際歡忭踴躍感激之衷發於真誠不敢壅於上聞所有賞過延綏鎮標協各營堡事竣情由及士卒感激下悃理合繕疏一并代奏恭謝天恩以聞伏祈皇上睿鑒施行巡撫四川等處地方提督軍務都察院右副都御史加三級臣年羮堯謹題為籲恩代疏恭謝皇仁事康熙五十二年三月十八日萬夀恩詔內開一各直省緑旗兵丁俱應加賞賚四川省特命內閣侍讀學士臣查弼納到川賞給今於閏五月二十六日欽差學士臣查弼納抵川致祭江瀆事竣隨行散給臣標兵丁兹據標下左右兩營馬步兵丁馬尚等呈稱尚等置身戎行生逢盛世櫜弓戢矢遊舜日之舒長海晏河清樂堯天而鼓腹五十餘載豢養之恩有加無已百千萬世樂利之休實符大造茲當五十二年恭逢皇上聖夀六旬又荷隆恩下逮大賚兵丁誠古今未有之盛事從來莫覩之曠典也尚等頂恩戴澤蕩蕩難名惟願我皇上夀與天齊德同地載區區下情末由稱謝伏乞代題等情到臣據此欽惟我皇上功侔造化德遍羣生措天下如磐石之安登斯民於仁夀之域河清海晏天開厯數方新日升月恆瑞叶禎符伊始欣逢聖夀甲子初周中外臣民咸䝉恩澤乃至荷㦸之戍夫猶勞聖懷之厪念兹者欽差內閣侍讀學士臣查弼納赴川致祭江瀆事竣先行賞賚臣標兵丁臣已遵㫖未敢㑹同今據臣標兩營辨兵馬尚等呈請題逹代謝天恩揚言莫罄少抒螻蟻之忱請祝聖人聊效華封之頌所有感激歡忭輿情臣不敢壅於上聞謹恭疏具題伏乞皇上睿鑒施行提督四川等處總兵官副將世襲拖沙喇哈番臣康泰謹題為恭報微臣回署日期事竊臣奉命同欽差㑹同各鎮臣給散兵丁皇賞查四川全省四鎮以下副參遊都守各汛大小五十六營駐防深山者居多臣等按臨給散兵丁望闕嵩呼叩謝天恩已於四鎮四協各疏代題在案更有各處番蠻亦皆聞風齊集如松潘鎮屬之安撫司蘇文輝等土通判王懋恩等長官司董德新等土巡檢司蘇天恩等土千百户札布吉等建昌鎮屬之宣慰司土婦瞿氏安吉茂等宣撫司慕枝等安撫司俄車等長官司張秀等土千百户嶺安泰等永寧協屬之長官司王嵩齡等土百户路引等化林協屬之招討司髙若璠宣慰司楊自唐堅參逹結等長官司周至德等打箭爐之宣慰司土婦工喀等土百户噶布玉等大小數百蠻官各領蠻兵或千餘人或數百人不等各穿蠻􅀈蠻甲刀鎗器械各於該管地方跪道迎送歡呼動地此皆我皇上如天如地之帝德誕敷遍及中外感化之所致也臣䝉皇上特命彈壓全川漢土官兵今見各土司如此之心悅誠服歷考史冊所載未之前聞臣同欽差復面宣聖澤伊等愈加歡躍更竭微臣寸私仰體我皇上柔遠之聖意於大小土官頭目分别給與銀牌縀匹綾綢布茶等物衆蠻兵給與牛羊米酒等物令其各安住牧遵守國法永不為非以盡臣撫綏地方之職耳臣同欽差於康熙五十二年十二月二十二日散畢全川兵丁皇賞欽差回京復命臣望闕跪請聖安今臣於十二月二十七日回署訖所有微臣回署日期理合題報臣謹具題伏乞皇上睿鑒施行提督浙江等處地方總兵官左都督加三級降二級留任戴罪圖功臣吳郡謹題為彚叙輿情代謝天恩事欽惟我皇上仁同覆載化洽乾坤御極五十二年恩施千八百國既已無遠弗屆無微弗至矣際今三月十八良辰恭遇聖主六旬大夀覃恩廣布於寰區賞賚復加於軍伍此誠亘古之曠典希世之竒逢也臣同欽差內閣侍讀學士臣拉都渾先放紹寧杭嚴楓衢次放嘉湖等屬標營皇賞凡所到之處但見目兵衢歌巷舞感激歡呼所有臣標五營寧波城守營竝准定海鎮臣吳升咨據該標三營及鎮海營又據紹杭嚴楓衢等營將轉據各目兵具呈感激天恩籲請代題緣由先經具疏題報在案今先後接准處州鎮臣崔相國溫州鎮臣胡泮黃巖鎮臣李近咨據各該標兵丁并據金華溫州城守平陽瑞安樂清磐石大荆太平台州寧海象山嘉興湖州太湖各協營將轉據各營目兵劉安邦等呈為僉懇代題恭謝天恩事詞稱竊惟邦等日䝉豢養虛糜國帑之金錢坐享升平實乏涓埃之報答恭遇皇上六旬大慶復荷賞賚欽頒按名各給千古之曠典欣逢實惠均霑三軍之歡聲動地從此每遇十年共沐洪恩於無盡則雖犬馬奕世難酬至德於靡涯惟有朝夕焚香頂祝皇上夀與天齊福同地久而已僉懇轉詳彚題代謝等情各咨詳到臣緣係三軍感激輿情臣不敢壅於上聞理合彚叙具疏代題伏乞皇上睿鑒施行總督江南江西等處地方軍務兼理糧餉操江兵部左侍郎兼都察院右副都御史臣赫夀謹題為兵丁感戴情深臣謹據情代題恭謝天恩事據臣標中軍副將楊𢎞基署江寧城守營副將事左營遊擊周涵詳稱據臣標中左二營馬步戰守兵丁髙延齡等江寧協標左右二營馬步戰守兵丁何邦祚等呈為聖恩髙厚叩謝代題以伸蟻悃事內稱竊延齡等生逢盛世食糧充伍䝉豢養之天恩際升平之覆被犬馬微勞未曽寸展恭遇皇上六旬大慶凡大小臣工恩加襲䕃普天士子特賜裁成老人盡荷恩賚解網赦罪大沛皇仁誠亘古未有之隆恩也然猶念一夫不獲澤及荷戈小卒咸使飽騰發數十萬之帑金特命大臣按部賞給延齡等實霑聖恩均䝉天賚真淪肌浹髓不足以報稱萬一惟有恭祝聖夀與天地同春皇圖共山河竝永是所朝夕頌禱者也但蟻情不能上逹伏叩代題恭謝聖恩等情轉詳到臣據此該臣看得恭逢皇上六旬大慶遍沛恩膏普天臣民無一不霑聖澤而猶軫念天下滿漢兵卒不惜數十萬之帑金特命廷臣按臨逐一頒給賞賚此誠亘古未有之殊恩也今臣標中左二營竝江寧城守營各兵經欽差詹事府詹事臣周起渭先臨省地宣播皇仁於六月十一日將臣標中左二營兵丁按名賞銀一兩又於十二日臣㑹同將江寧左右二營兵丁俱經先後按名賞銀一兩訖各營士卒無不歡聲雷動望闕叩頭敬祝聖夀無疆茲據臣標中軍副將楊𢎞基署江寧城守營副將事遊擊周涵詳據臣標中左二營兵丁髙延齡等江寧城守營兵丁何邦祚等呈請代題謝恩前來臣不敢壅於上聞謹具疏題報伏乞皇上睿鑒施行巡撫江寧等處地方總理糧儲提督軍務都察院右僉都御史臣張伯行謹題為寰宇均霑聖澤營兵竝沐恩施叩懇轉詳代題恭謝以伸忱悃事據撫標左營遊擊宋琯等㑹詳前事內稱據標下三營兵丁張天祐等呈稱祐等投營注冊荷戈戍守已有歲支糧餉依期放給俾得藉以仰事俯育豢養鴻恩時切頂戴本年三月十八日恭逢皇上六旬大慶䝉頒恩詔款開各省緑旗兵丁俱加賞賚隨奉部文江南兵丁照賞給廣東緑旗兵丁動支司庫現銀每兵賞銀一兩欽差大人㑹同督撫親臨演武場將藩司解到庫銀每兵一兩稱足包封按名散給祐等叩頭秪領訖惟是祐等欣逢盛世詠歌太平先奉上諭各省緑旗兵丁內有通曉文義者准與武生一體鄉試今嵗又䝉皇上格外恩賞聖恩優渥千載難逢用敢瀝情叩懇伏乞轉詳代題恭謝皇恩俾下情得以上逹等情轉詳到臣據此該臣看得臣標左右二營與蘇州營額設馬步戰守各兵欽奉恩詔每兵賞銀一兩臣准部文隨行江蘇布政司動支司庫現銀按各營經制兵丁數目稱凖包封移解各營收貯時值總督臣赫夀來蘇盤查司庫實存銀兩隨於本年六月二十一日臣㑹同欽差詹事府詹事臣周起渭總督臣赫夀親臨演武場將司庫移解之銀逐封查驗按名唱給莫不歡欣抃舞望闕叩頭敬祝萬夀無疆茲據各營遊擊宋琯等據呈轉請代題叩謝皇恩前來臣謹㑹同總督臣赫夀合詞具題伏乞皇上睿鑒施行巡撫山東等處地方督理營田兼理軍務都察院右副都御史加五級臣蔣陳錫謹題為懇請代題恭謝天恩事康熙五十二年七月十二日據布按二司據撫標二營馬步兵丁徐得功等鎮標各營馬步兵丁趙培厚等河標馬步兵丁張萬春等呈稱竊得功等荷戈行伍䝉皇上隆恩餉銀月米豢養備至方以無由報答日切於心今恭逢我皇上萬夀六十初度欽頒恩詔普天士庶無不共沐聖恩而得功等微賤武卒更復上煩睿慮欽差大人按名給賞誠使得功等感激涕零莫可言喻下情無由上逹伏乞轉詳代題謝恩等情轉詳到臣該臣看得康熙五十二年三月十八日恭遇皇上萬夀六十初度欽頒恩詔內開一各直省緑旗兵丁俱應加賞賚復又欽差大人按名賞給衆兵以天下太平無事長治久安初無臨陳折衝之勞乃受天府金錢之賜戴德感恩歡聲雷動惟願萬六千嵗之椿齡與天共久三百六旬之莢厯偕日長新士飽馬騰謳歌難盡赴臣衙門籲請代題謝恩臣不敢壅於上聞臣謹㑹同總河臣趙世顯鎮臣李雄合詞㑹題伏祈皇上睿鑒施行巡撫河南等處地方提督軍務兼理河道兵部左侍郎兼都察院右副都御史臣鹿祐謹題為萬夀特頒大賚三軍同效歡呼恭疏代題叩謝天恩事康熙五十二年六月初十日欽差兵部左侍郎臣李先復都察院左副都御史臣明安賞完南陽鎮標營兵抵省即將臣標左右二營兵丁唱名給賞閲看騎射隨皆踴躍叩頭謝恩訖嗣據兵丁喬永年甘天祿王道行等呈稱年等身居行伍䝉我皇上豢養五十餘年仰賴德威遐暢薄海內外共享承平又奉恩㫖俾辨目一體中式誠亘古未有之殊榮今春三月十八日恭逢皇上六旬聖誕復䝉特恩賞賚即命祭告大人按營散給務使人霑實惠如此軫恤深仁真是超前軼後年等領賞回家老幼男婦望闕叩首莫不歡欣感激焚祝聖夀無疆惟有益矢捐軀世為犬馬以圖報效於萬一但下情無由上逹為此連名籲懇代題到臣欽惟我皇上躬全五福同日月以升恆澤被萬方竝乾坤而髙厚放牛歸馬久昭脫劒之風推食解衣曲體披堅之士歡倍騰乎挾纊欣普惠之自天感彌切於投醪願酬恩而無地從此九霄文德長舞干羽於兩階伏知八表武人共呼太平之萬嵗矣茲據衆兵環籲代題叩謝前來理合恭疏題報伏乞睿鑒施行提督湖廣總兵官都督僉事加一級世襲二等阿逹哈哈番臣高其位謹題為㑹賞已竣士卒感戴情殷謹據懇代題叩謝天恩事准據襄陽鎮總兵官佟國弼彝陵鎮總兵官王允昌副將丁沂等參將林焞等遊擊夏林等守備吳天祚等咨呈據各該營兵丁趙珩任士禮等呈為皇恩浩蕩感戴情深籲懇代詳請題叩謝皇恩以伸下悃事內稱欣逢我皇上聖明在御海晏河清恩德覃敷時豐嵗稔珩等坐享升平虛糜糧餉雖有報稱之心竝無效力之處恭遇聖主萬夀大沛洪恩特命廷臣按臨全楚賞賜帑金實霑聖惠此誠古今特出之殊恩堯舜所未有之盛典也珩等跪領之下感激無地全家老幼敬捧皇封欣為至寶世世子孫圖報不盡惟有朝夕焚香叩祝皇上福夀天齊然犬馬微忱莫由上逹懇乞轉詳請賜具題叩謝天恩以伸下悃等情前來據此欽惟我皇上文德誕敷再見兩階干羽武功赫濯遠來萬國梯航統御五十二年恭逢萬夀昌期大沛恩膏普霑實惠臣遵㫖㑹同欽差通政使司左通政臣羅占左參議臣陳汝咸先將湖南各營賞畢業經具疏代兵題謝外復由荆州至武昌等府閲賞湖北所屬各營兵丁按名分給三軍焚香齊祝聖夀無疆咸頌皇圖永固歡聲動地為亘古所未聞乃於今而僅見兹據湖北各鎮標協營懇請題逹代兵謝恩前來臣不敢壅於上聞謹㑹同署督臣印務湖北撫臣劉殿衡合詞代兵叩謝天恩伏乞皇上俯賜睿鑒施行巡撫偏沅等處地方提督軍務兼理糧餉都察院右副都御史臣潘宗洛謹題為萬嵗天恩疉沛等事欽惟我皇上仁同天覆德嫓離明夀永無疆率土享含哺之樂福𢎞敷錫三軍叨挾纊之溫兹恭遇皇上萬夀昌期六旬大慶錫賚普施恩膏疉沛欽差通政使司左通政臣羅占等到楚頒賞每兵銀一兩臣標衆兵歡呼踴躍望闕叩頭頂祝聖天子萬夀無疆從此十嵗一頒之曠典壁壘如新行見萬年不盡之恩波烽烟永靖茲據臣標中軍遊擊臣張騰雲等呈請代題臣不敢壅於上聞謹題萬夀盛典初集卷三十七
