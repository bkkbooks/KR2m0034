body:
  text: 欽定四庫全書萬壽盛典初集卷五十慶祝三名山祝釐一康熙五十二年三月各省督撫提鎭諸臣以皇上六旬正誕各就其地之名山勝境率所屬大小文武臣僚耆老士庶建壇設醮慶祝萬壽二月十一日廵撫山東等處地方督理營田兼理軍務都察院右副都御史臣蔣陳錫謹題為恭報微臣擇吉前赴泰山進香恭祝萬壽事欽惟我皇上學貫三才功髙千古作君作師沛恩膏者千八百國得名得夀鞏磐石者億萬斯年厚徳深仁逺邁乎商周虞夏文謨武烈𢎞敷於南朔東西民思帝澤之隆普天嵩祝臣荷君恩之重率土山呼兹當萬夀開科大典臣俟監臨文闈事竣擇於三月十一日自省起行恭詣泰山嶽廟十三日薰壇十四日至二十二日圓滿九晝夜功徳臣即於泰山嵩呼萬壽伏願天行彌健聖厯常新自京師以至九垓處處樂皇仁之高厚由六旬以臻萬歲年年慶聖壽於無疆矣所有微臣擇吉起程日期相應題報伏乞皇上睿鑒施行三月初五日奉㫖該部知道三月十一日提督山東等處學政右春坊右中允兼翰林院編修臣陳恂謹題為恭逢萬夀共效嵩呼敬達輿情以伸下悃事據青州府屬文武生員髙延齡等呈稱齡等生際唐虞身居學校䝉我皇上徳隆覆載夀考作人屢頒廣額之𢎞恩復賜開科之曠典頻年賑貸寒儒共被春温今歲蠲租下士咸登仁夀荷生成於淪肌浹髓安誦讀於舜日堯天兹於五十二年恭逢聖誕昌期萬年有祜伏惟沂山東鎮素稱靈異兹聞設壇建醮深愜輿情闔郡諸生僉願隨行拜舞共效無疆之祝伏乞轉達等情到臣欽惟我皇上治懋勲華徳敷宇宙揆文奮武集千八百國之共球平地成天綿億萬斯年之厯算恭遇聖夀六旬甲子初周普天同慶臣駐劄青州境内沂山即係東鎮東方之鎮於五行屬木木號長生於四序為春春司發育沂山列在東方聖誕正當春月臣謹擇於三月十二日為始䖍祝九日頌寳籙以比南山望瑶光而瞻北斗青陽日麗長施出震之功紫極流輝懋集乘乾之福自今伊始年年慶萬夀於昇平以莫不増歲歲進九如於天保今據闔郡士子數百餘人踴躍呼嵩情詞懇摯不敢壅於上聞為此謹題四月初一日奉㫖該部知道三月十一日鎮守山東全省等處地方總兵官左都督臣李雄謹題為恭報微臣率同兵民共赴蓬萊仙閣恭祝聖夀無疆事欽惟我皇上宵衣旰食膺圖方五十二載禄位名夀錫祚自億萬千年臣自蒞任來向年恭値皇上萬夀俱同文武官弁在本城内萬夀宫敬設龍亭啟壇建醮三晝夜序班行禮恭祝聖夀兹五十二年三月十八日欣遇皇上六旬大慶正率土歡騰普天胥慶之時據登州府耆老兵民王嘉玉等又據臣標中右水師營馬步兵丁王永年等呈稱今遇皇上六旬聖誕請啟壇建醮恭祝聖夀萬年連名具呈前來惟是萬夀宫規模基趾窄狹今闔城内外兵民紛紛雲集人多地狹不足以肅觀瞻謹擇登州府水城之蓬萊閣臣同本城文武官弁暨百姓兵丁於十三日啟建佑聖延齡道塲九晝夜瞻海山而祝遐算天庥永懋望日月以呼萬年帝道彌昌縁係兵民公祝歡躍輿情臣不敢壅於上聞理合具題謹具題知四月初二日奉㫖該部知道三月初七日廵撫偏沅等處地方提督軍務兼理糧餉都察院右副都御史臣潘宗洛謹題為恭報微臣親率屬員士民赴嶽慶祝萬夀起程日期仰祈睿鑒事恭遇我皇上六旬萬夀良辰海内臣庶受恩既久頌禱愈殷値此化日舒長蒼生樂業湖南百姓扶老攜幼捧香朝嶽願我皇上萬萬歲絡繹在塗嵩呼動地至於土司苗猺愛戴眞誠聞亦赴嶽慶祝臣謹於本月初七日由長沙起程前詣南嶽廟齋戒竭誠率屬員士民登祝融最高之峰祈聖主無疆之壽億萬生靈衆願僉同山川神祇昭假協應神人既和天休滋至我皇上承受皇天上帝眷顧景命永與乾象同長坤儀竝久此乃自然之理必得之符也臣同城司道等官除委令按察使臣王朝恩率地方文武官員仍在長沙城内醮壇行禮外其布政使臣阿琳驛鹽糧道副使臣侯惲俱隨臣前詣嶽廟行禮所有微臣赴嶽慶祝萬壽起程日期理合題報謹具題知四月初六日奉㫖該部知道三月二十六日提督湖廣全省軍務總轄漢土官兵兼軍衛土司控制苗彝節制各鎮左都督加三級臣額倫忒謹題為恭報微臣敬同全楚官兵赴嶽䖍祝聖壽無疆事竊照五十二年三月十八日恭逢我皇上六旬大慶臣疏請赴闕躬祝未䝉俞允用是諏吉齋心敬詣南嶽建壇恭祝聖壽而全楚之鎭協標營以及士卒俱有同心齊願赴嶽叩祝臣諭令各在本汛率衆建壇望闕呼嵩臣仍挈全楚官兵姓名冊籍赴嶽恭祝萬壽於康熙五十二年二月二十六日起程理合恭疏題報伏乞皇上睿鑒施行謹具題知四月初一日奉㫖該部知道三月初八日鎮守湖廣襄陽等處地方總兵官都督同知世襲二等阿達哈哈番臣高其位謹題為恭報微臣敬赴武當慶祝聖壽萬年事欽惟我皇上徳合乾坤道隆堯舜兹逢三月十八日恭遇皇上六旬正誕臣䖍誠齋沐謹擇於三月初八日自穀城縣起程躬詣武當啟建醮壇率同官弁兵丁至誠叩祝聖壽綿長所有微臣起程日期理合恭疏題報以聞四月十一日奉㫖該部知道三月初九日廵撫河南等處地方提督軍務兼理河道兵部右侍郎兼都察院右副都御史臣鹿祐謹題為恭報微臣赴嵩叩祝聖壽無疆事欽惟我皇上乾坤合徳開天長地久之昌期聖智超倫綜帝徳王功之盛業仁民愛物盡攜兆姓納春臺航海梯山咸仰衆星拱北極濊澤誕敷於四海謳歌普徧於兩河兹値樞星繞電之辰正逢甲子方周之歲神人胥慶率土歡騰理宜恭設醮壇以迓景福敬詹三月初一日穀旦就嵩山中嶽廟設壇延請僧道啟建祐聖延齡道塲臣因在闈監臨先委署河南府事開封府南河同知臣武登科鹽捕同知臣呉元錦暫司齋事䖍誠叩祝今於三月初六日揭曉塲務甫竣臣於初八日率同布政使臣李苾按察使臣張伯琮馳赴嵩山齋宿醮壇稽首焚香與民同慶伏願皇躬永固帝徳彌昌同日月之升恒九如常歌天保並山川之悠久萬歲時聴嵩呼所有微臣赴嶽恭祝萬壽無疆日期理合恭疏具題伏乞睿鑒施行四月初六日奉㫖該部知道二月二十六日鎮守河南河北等處地方副將管總兵官事降一級留任臣馮君洗謹題為恭報微臣赴嶽慶祝萬壽事恭遇皇上六旬正誕普天同慶萬國歡呼臣謹㑹同河南廵撫臣鹿祐在於嵩嶽設壇建醮率領軍民人等頌祝高深仰南山而聴嵩呼望北極以申華祝卿雲擁玉座而騰輝笙吹洛浦旭日映微垣以交晃香繞華筵伏願聖壽齊天八千歲之莊椿同茂遐齡如岱億萬年之玉燭長調臣於二月二十六日自懐慶起身前赴嵩嶽謹將離署日期題報伏乞睿鑒施行四月初五日奉㫖該部知道二月二十七日廵撫山西太原等處地方提督鴈門等闗軍務兼理雲鎮都察院右副都御史臣蘇克濟謹奏為恭謝天恩事切臣一介庸愚荷蒙聖恩簡畀晉撫身任地方久遠闕廷幸逢皇上六旬大慶臣疏請陛見欽承俞旨准臣來京臣於去歲封印日星馳北上十二月二十六日到京即在景山前恭請聖安跪瞻天顔歡忭何極至二月初七日隨駕行圍荷蒙特賜親騎良馬并哈宻𤓰等物又奉諭旨著臣跟隨看視水圍至叚村地方即於御座船内召見跪聆聖訓諄摯令臣有所遵循十七日臣在船上跪送聖駕又蒙皇上命臣將船𦂳靠龍舟溫綸下及復蒙賞賜御食珍奇臣何人斯膺此格外殊恩即捐糜頂踵奚能仰報高深惟有益加惕勵不負聖主之洪仁於萬一耳兹臣於二月二十二日回署即於二十六日肅秉䖍誠馳徃五臺恒山於三月初一日為始建醮諷經一月圓滿率同官民拈香叩首以慶萬壽同天地無疆永祝聖齡與岡陵竝久理合一幷奏聞伏乞皇上睿鑒施行三月初九日奉旨該部知道三月十一日廵撫江西等處地方兼理軍務都察院右副都御史加三級臣佟國勷謹奏為謹報微臣赴廬山進香日期恭祝聖壽無疆事欽惟我皇上睿知聰明聖神文武盛徳合乾坤而廣運蕩蕩難名大業超今古以遐昭巍巍莫竝宵衣旰食五十二載正遇昌期端拱垂裳億萬斯年長綿福祚際此堯天舜日欣逢電繞龍飛普天沐帝澤之深共效三多封祝微臣荷君恩之渥倍切萬壽嵩呼兹惟南康府星子縣廬山高與天齊名標江右奉宸章之璀璨寺額特賜秀峰頌聖壽之光華石號舊呼華蓋五老峰連慶雲岫捧出五色祥光白鹿洞接歡喜巖浮來千重紫氣春和景媚瞻靈嶽萬古之休徴日升月恒逢聖人六旬之大慶臣文闈事竣頌祝心䖍謹擇於二月十二日自省起行恭詣廬山秀峰寺占吉十三日啟建祝聖延齡道塲九晝夜齋戒醮壇叩首焚香與民同慶伏願乾行彌健坤厚永貞天禄重申仙厯循環於甲子壽杯長捧仙靈拱極於春秋以莫不增亦孔之固則一人有慶九州萬國處處頌有道之長而天子萬年白叟黄童人人永無疆之祝矣所有微臣起行日期相應奏報伏乞皇上睿鑒施行四月初九日奉旨該部知道三月初七日廵撫四川等處地方提督軍務兼理糧餉都察院右副都御史臣年羮堯謹題為恭報微臣躬詣峩􅖭仰祝聖壽事欽惟我皇上化洽虞琴瑞徴禹範播仁風於八表己綿厯服無疆沛惠雨於九州更紀太平有象厪五十二載之宵衣旰食景命方申卜百千萬世之日升月恒天年周甲歡騰近甸童叟共樂夫康衢慶溢荒陬臣庶如遊乎蓬島福隨川至願切山呼臣謹於三月初七日㑹同提臣康泰學臣王誥率同布政使臣宋致按察使臣沙木哈松茂道臣佟世禄永寧道臣李我郊等躬詣峩􅖭山伏虎寺卧雲菴兩處擇於本月十二日各建道塲七晝夜恭祝萬壽履三巴之勝境春滿祗林誦千佛之名經香流貝葉山農志喜咸瞻南極之輝野老興歌競奏西池之曲伏願昌期叶運寶籙呈符松柏岡陵竊俯躬以著頌聖神文武敢驤首以揚休所有微臣起程日期理合具題伏乞皇上睿鑒施行四月初六日奉㫖該部知道三月初六日提督四川等處總兵官副將世襲拖沙喇哈番臣康泰謹題為恭報微臣親赴峩􅖭慶祝萬壽事康熙五十二年三月十八日恭逢我皇上六旬萬壽普天同慶臣受恩深重祗縁初蒞四川僻處邊隅不獲入覲隨班慶祝惟有㑹同撫臣年羮堯學臣王誥帥領所屬副將臣王之俊臣李元洙叅將臣趙璉臣馬元等齊赴峩􅖭山䖍誠誦經七晝夜慶祝萬壽於無疆少盡微臣之愚願耳臣謹於三月初六日自成都起程所有微臣起程日期理合繕疏題報伏乞皇上睿鑒施行四月初六日奉旨該部知道三月十三日鎮守四川松潘等處地方副將管總兵官事臣程正李謹奏為恭祝萬壽事欽惟我皇上至聖配天大徳受命虹流雷繞為聖主誕降之徴海晏河清實至尊壽昌之應普天之下人人共祝無疆率土之濱處處咸歌有慶壽齊日月仁靄乾坤臣樗櫟庸材兜鍪下質身羈邊汛心戀闕廷恭逢萬壽之昌期欣遇六旬之大慶舞蹈莫遂踴躍時深謹擇於康熙五十二年三月十三日薰沐齋戒率領官兵士庶商賈喇嘛土目前至雪山黄龍寺延集僧道自十五日起至二十一日止拜諷經懴七晝夜䖍祝聖壽無疆皇圖永固為此具本謹具奏聞四月十七日奉旨該部知道萬壽盛典初集卷五十
