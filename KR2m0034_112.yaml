body:
  text: 欽定四庫全書萬夀盛典初集卷一百十四歌頌五十四生監諸臣五萬夀頌言七言截句十首有序監生臣鄒士夔皇上御極之五十二年嵗次昭陽律吹姑洗躋六旬之大慶届千載之昌期天下臣民懽忭鼓舞雲集京師而士子之感戴尤深頌揚彌切臣士夔一介草茅恭逢萬夀開科来都應試適奉上諭許在京舉貢生監人等報名註册叩祝聖夀恩皆出於望外慶自發乎中情謹獻臣自繪長春圖一册并頌言十章凡以草木昆蟲胥霑聖澤而衢歌巷詠並效愚忱云爾上日花開千葉蓮紅衣翠扇映交鮮緣知太液恩波暖佳氣氤氳萬夀年其一旰食宵衣厪至尊為民祈福詔書温雨𤾉時若休徴集萬彚都霑萬夀恩其二六合同風洽太和蠲租賜復受恩多士林遭際尤難得曠典新開萬夀科其三重疊溫綸喜共聼八方休請建碑亭天心愛惜惟民力止列瑶堦萬夀屏其四南極星光耀紫㣲山龍藻火並争輝由来萬物如同體萬姓装成萬夀衣其五如日長升如月恒星橋璀璨綵層層祥雲捧出齊瞻仰天上髙懸萬夀燈其六日麗旌旗翠輦廻天厨絡繹御筵開一時醉舞瑶池畔玉露金莖萬夀盃其七仙闕蓬莱䕶絳紗繁枝交綺發竒葩祗緣雨露栽培久上苑齊開萬夀花其八頌禱都無綺麗詞盈廷拜舞慶良時小臣竊附衢謡末願進瑶箋萬夀詩其九淑景暄風本配仁艷陽時節嵗華新昇平景象堪圖畵幅幅丹青萬夀春其十萬夀頌集五經八章有序監生臣鄭維新臣聞乾行至健離照當陽徳合清寜兩大之禎符永集天開甲子五行之氣序常新故乗景運以貞觀藴靈獨異斯由久道而成化卜厯無疆三多獻祝於堯階百禄罄宜於周室頌九如者歌天保稱萬夀者躋公堂倚歟慶澤流長允矣箕疇福歛欽惟皇帝陛下瑞應虹流祥凝電繞備聖神文武之至徳兼聰明睿智以有臨勤政愛民敬天法祖博施濟衆實堯舜所未能輔相裁成補造化之不逮得位得禄得名得夀集諸福而駢臻自南自北自西自東萃四方而心服天不愛道地不愛寳煥發天長地乆之徴日増其光月増其華永著日升月恒之象㑹貞元而吸沆瀣望雲物而迓禎祥河出圖洛出書榮光上燭蓂生庭松生牖瑞靄髙凝率土均歡普天胥慶兹者嵗在癸巳届聖夀之六旬律應姑洗協呼嵩於三月宫鶯啼曉霞明五鳯之樓仗馬連宵炬徹千官之陛一人臨軒而受賀萬邦集珮以来朝合内外大小之臣鄰聚士農工商之誠懇雕題鑿齒之倫莫不梯航而至跂行喙息之衆亦皆鞮譯而朝臣幸際昌明深霑樂育稱觥誌喜珥筆生輝敬集五經上祝萬夀頌曰天子萬夀徳合無疆惟精惟一如圭如璋王道蕩蕩聖謨洋洋自今以始長發其祥其一帝徳廣運與時偕行首出庻物萬邦以貞無偏無黨乃聖乃神綏以眉夀福禄来成其二欽若昊天小心翼翼夙夜維寅威儀是力敬天休命順帝之則夀考萬年如㡬如式其三文明以健其道大光禮樂眀備黼黻文章蹌蹌濟濟穆穆皇皇皇天眷佑受福無疆其四濬哲文眀布昭聖武以征不庭陳師鞠旅萬國来同受天之祜夀考維祺百獸率舞其五永康兆民俶載南畝本固邦寜終善且有羣黎百姓拜手稽首天子萬年酌以大斗其六順天休命克寛克仁上有大澤政在養民眚災肆赦告爾祥刑萬有千嵗宜民宜人其七既多夀祉如岡如陵百辟卿士来獻其琛發號施令慶賞遂行並受其福三夀作朋其八萬夀詩五言排律十六韻監生臣劉義林萬國車書集三春寳厯長曈曨旭日曉縹緲慶雲翔莢應堯階瑞芝生禹甸祥爐烟凝瑣闥仙樂播笙簧藻井垂金殿朱旗拂畫梁衮衣臨斗極環珮繞天潢鷺序趨楓陛龍綸出尚方曝芹野老獻玉帛逺藩將雲漢廻閶闔天文入建章明良同遇合山海盡梯航寳墨揮宸翰琅函發睿光作人賡夀考養老列膠庠特詔開雲路同文徧海疆崇儒遵孔孟致治邁軒皇大勇兼仁武𢎞慈協㑹昌小臣無所獻長進萬年觴萬夀詩七言律一首監生臣程世綏瑞靄天開海日紅祥雲争繞紫㣲宫玉階獻夀千官肅曉漏呼嵩萬國同仙仗花明添霽色御筵春暖送香風紛紛齊上升恒頌都在皇仁雨露中萬夀詩七言律四首有序監生臣王廷擢欽惟我皇上以天亶之聖膺首出之姿邁華渚之虹流協瑶樞之電繞徇齊敦敏道統冠乎百王文武聖神治法超乎千古仰聖孝則尊養兼隆煥宸猷則作述並茂翕河柔嶽歌時邁者七廵平地成天利隨刋者億載恵下則蠲租賜復家家共躋春臺卹民則解網除殘䖏䖏同逰化日職方作貢不遺乎銅柱朱崖王㑹陳圖逺暨乎金城玉塞至於薪槱造士茅茹拔材廣杏林桂苑之英四門盡闢探玉海珠淵之秘八表無遺凡聖主之偉徳豐功無非集慶凝休之自而國家之深仁厚澤總為祈天永命之基是以數應昌期天開夀域嵗徳在癸五行逓獻其休嘉月令方春萬物正當其和㑹御宇歴五十二年之久如日方中聖誕逢六十萬夀之期普天同慶數較逾於大衍五十蓍倍益其占夀更邁於靈椿八千秋適逢其始山鞮海譯萃萬國之衣冠雲卿星輝啟千門之閶闔花凝湛露競舞堯階草帶春暉齊瞻舜日昔華封三祝曾致獻於唐年天保九如亦見歌於周雅况臣幸逢鼓舞太平之日敢後頌颺仁夀之辭敬獻七言㳟呈四律窺蠡測管本無當於髙深向日傾葵聊以申其頌禱云爾太平天子介純禧四海歡呼拱玉墀蒲長堯厨輝寳箑香飄文囿燦靈芝九成暢恊簫韶奏一徳欣歌魚藻詩齊禱岡陵来獻夀鸞翔雀舞萬年枝其一武緯文經昔代無逺超二典軼三謨吹嘘兆姓陽春律鼓鑄人材造化爐南極祥星依黼座東郊佳氣滿皇都貞元倍衍無疆厯嶽凟羣靈翼鼎圖其二紫籞祥烟繞帝宫玉階綵仗颺和風瓊池芝草年年長仙圃蟠桃嵗嵗紅夏屋連雲千里合春䑓布暖八方同還占天意孚人願甘雨隨時百榖豐其三户興禮樂蔚桑麻王㑹梯航道路賒重譯盡供琛是玉十洲新貢棗如𤓰億千嵗月同春晝大地乾坤總帝家草莽㣲臣霑聖澤敬隨衢祝獻東華其四萬夀詩七言律一首監生臣楊于芳中天景運煥文章南極星輝寳厯昌芹藻㡬回霑雨露菁莪常自被春陽九閶旭日開元化六宇奎文曜帝光造士古来稱夀愷一廷藹吉頌無疆萬夀詩五言排律六韻監生臣顧若霖帝治超千古皇仁徧九垓普天飛化雨大地震春雷夀域南山聳恩波北闕開龍津神變化杏苑廣栽培同赴看花宴争稱獻夀盃欣逢交泰世殊媿洛陽才萬夀詩五言排律六韻監生臣何景儀四海同春日堯天慶未央繞樞呈電瑞盤棟燦龍光金鏡千秋錄瑶池九醖觴恵風迎劔珮旭日麗冠裳南極星辰拱西清麟鳯翔聖人長有道萬夀祝無疆萬夀詩有序方畧館監生臣林世俊欽惟皇帝陛下巍巍聖徳赫赫神功綱維四氣之全統㑹八紘之表經文緯武亘日月以常新贊地參天並乾坤而永大五十二載朝乾夕惕擴性命之真𫝊千八百國物阜民安臻治平之極盛兹陽春之三月届聖夀之六旬来享来王集共球於四海是遒是荷𢎞茀禄以千秋臣等草木欣榮幸戴光天之麗日禽魚咸若歡逰樂國之和風九重峻徳難名徒切捧山之願一介葵心欲展聊陳擊壤之歌不盡颺言敬抒排律帝福升如日君心溥若天道隆千載後勲邁百王前建極中和合綏猷制作全兩儀資定位庶物藉陶甄盛徳原臻化純修更體乾存存功愈宻亹亹意彌専敬自丹書得誠從大易傳作銘依黼座講學御經筵纉緒仁為本惇倫孝是先禮儀俱美備義問復昭宣玉食常豐養馨香必告䖍棣華欣韡韡𤓰瓞慶綿綿旭日臨堯陛薫風理舜絃欽明躬有度正直治無偏垂拱敷聲教端居運化權輿圖光逺被象魏法髙懸已擅羲軒聖仍求元愷賢泮池增藻采棘院廣茹連石室寧誇漢金臺豈慕燕珪璋陳左右杞梓列班聨四海深懐保羣黎普恵鮮好生刑屢恤益下賦頻蠲睿慮觀河箭宸遊望嶽蓮廵方朝玉帛障水發金錢胞與通疆域要荒總幅員修文歸版籍偃武息戈鋋大沛寰中雨全消塞外煙共球加舊貢方畧著新編是嵗春三月吾皇夀萬年東王旋斗柄南極現星躔祥鳯鳴岐嶺神龜出洛川瑶階滋瑞草銀沼湧丹泉入覲皆屏翰来瞻盡偓佺嵩呼牋競奏華祝鼎争鐫稽拜環䨇闕謳歌動八埏㣲臣隨忭舞願上兕觥篇監生臣董紹美聖徳參天地鴻恩徧八荒車書鼇極外琛帛衮衣旁瑞應千春節歡騰萬夀觴甲花周復始蓂荚吐方長糺縵星雲麗升恒日月光雙籌添海屋九葉秀芝房栁外鸞旂迥花邉鳯葆張爐烟何馥郁劒佩競趨蹌野晉三多祝朝賡百禄章歡聲喧紫陌盛事紀青緗景福超堯舜𢎞禧陋漢唐小臣依輦轂永此慶遐昌監生臣耿國翰帝徳巍巍邁百王欣逢令節啟青陽蒼黎共獻千秋鼎岳牧同稱萬夀觴露潤玉階朱草發風吹金浪醴泉香葵心願效三多祝遥望紅雲拜建章其一圖經日闢驗皇輿夀厯徐推慶有餘問夜深宫披玉藻省方薄海識金車崆峒不講求仙訣黼扆惟陳無逸書自是乾元行健力卿雲糺縵擁皇居監生臣唐秉彛佳氣黄圖迥榮光紫極張九天𢎞夀域六宇頌神皇聖徳恢無外宸衷豫且康仁風方浩蕩淑景正芬芳蕙沼融融暖桃花灧灧香盤流金掌露樽挹玉壺漿閬苑風雲㑹蓬山日月長九賓咸率職百譯盡来王淳化彌三極深恩浃萬方名言真莫罄載筆豈能颺敢擬封人祝聊陳擊壤章監生臣王學㢲乾健超千古陽和被萬方紀年𢎞寳鼎歌曲駕芝房仰徳隆堯舜論功邁禹湯巍峩山莫並浩蕩海難量租赦周三嵗刑寛約九章藻芹争煥采桂杏益飄香聖學原髙峻天文更矞煌王民仍皥皥表海復泱泱帝厯乾坤久皇年日月長六旬當大慶萬夀永無疆童叟謳吟徧衣冠禮樂張寵榮誠莫覯恩遇出非常燕雀歡騰色旌旗喜溢光小臣霑化雨拜手頌天皇監生臣李孔嘉海晏河清日民安物阜時和風来上苑淑氣布彤墀景運金甌卜芳辰玉律吹八方開夀域九有覩昌期覆載乾坤大恩膏雨露滋雲璈聼宛轉仙仗肅威儀民獻華封祝臣歌天保詩趨蹡齊岳牧拜舞盡臯夔聖徳嘉祥兆天申福禄宜綿長周甲子悠久數干支桃實剛逢熟嵩呼亦效竒幸當全盛世葵藿願陳詞萬夀詩有序子史館監生臣吴從龍欽惟我皇上與天同運如日方升五十餘年宵旰之勤見聖人之無逸百千萬國昇平之久沐天子之至仁時届三春㳟逄萬夀嵗周花甲星燦長庚於是賜復蠲租開科取士布鴻恩於望外溥大澤於寰中真史䇿所罕聞古昔所希有也一時臣庻願進萬年之觴四野謳歌競效三多之祝而臣等䝉皇上豢養八載感覆載之髙深培植多年荷生成之廣大未能圖報殊切悚惶輙獻蕪辭㳟呈睿覽以下里之句代康衢之謡臣等不勝踴躍歡忭之至寳厯𢎞開億萬年升恒日月祝堯天西池桃熟呈宸扆南極星輝拱御筵盤浥紫霞金掌露芝生青嶠玉田煙臣民共仰瞻雲表瑞靄蘢葱慶祚綿其一欣逢清晏效嵩呼萬嵗聲傳繞巷衢率土普天登夀域醴泉甘露獻禎符九如載詠申臣願三祝重賡永帝圖時届陽春風物麗太和洋溢徧寰區其二監生臣丁圖南重譯梯航祝聖人杖藜跋渉慶長春須知百禄殷勤降總為民情愛戴真獻曝獻芹風最樸如山如阜願方申歡騰到䖏鈞天樂抃舞聲遮輦路塵監生臣王䭲紅雲凝斗極天夀慶昌辰徳普三才協恩敷萬國春舜琴風逺播堯荚嵗恒新瑞啟箕疇應綿綿景福申其一體天膺寳位厯數並三皇帶礪山河固升恒日月長衣冠羅殿陛包貢集梯航抃舞呼嵩切欣逢泰運昌其二維新開鼎祚淑景麗春城苑樹籠筵碧宫花映殿明仙桃陳玉椀湛露浥金莖自得長生理何須問廣成其三内殿依芸局承恩歴歳年觀光雲日爛紀瑞鳳梧聨夀擬豳詩獻詞将華祝傳載徴圖籙永健徳夲齊天其四監生臣錢阿瑛帝徳行惟健天心眷獨長六旬綿甲子三月正春王運配山川久恩昭日月光禁城開錦繡御路繞芬芳玉帛盈千里衣冠集萬方樂從四野奏綵為九重張夀域成瑶島春臺陋栢梁物情滋動植世界入羲皇草獻千巖秀花霏百和香共球分大小山海盡梯航婦子欣瞻日農工擬進觴聖皇復軫念溫㫖特宣揚只欲安黎庶因教發太倉睿圖周逺邇文運啟宏昌厯並乾坤永仁如雨露瀼嵩呼延億萬華祝邁尋常徳福兼隆著謳歌到䖏将八方同一願萬嵗永當陽天子萬年頌集雅頌六章監生臣楊相維清緝熙長發其祥允也天子穆穆皇皇受命既固萬夀無疆一章顯顯令徳如圭如璋聖敬日躋載錫之光以引以翼四方為綱二章矢其文徳日就月將令聞令望金玉其相逺猶辰告四國是皇三章載纘武功式辟四方赫赫厥聲幅􅊷既長海外有截莫敢不来王四章立我蒸民自天降康俾民稼穡如茨如梁日用飲食豐年穰穰五章受天之祜為下國駿厖子孫千億休有烈光介以繁祉恵我無疆六章維清六章章六句監生臣楊樟維此聖人昊天其子之有秩斯祜莫不有之永言配命于時保之一章我受命溥將百禄是荷思皇多祜四方来賀受福無疆俾爾昌而大二章有嚴天子允文允武柔逺能邇徹我疆土外大國是疆罙入其阻三章追琢其章下土之式訏謨定命我求懿徳陳常于時夏聞于四國四章福禄来崇天子萬夀式歌且舞以介景福保佑命之克昌厥後五章夀考維祺萬民之望永錫爾極宜君宜王百禄是總申錫無疆六章維聖六章章六句萬夀詩七言律四首監生臣周簡閶闔春融紫氣浮臣民歡忭繞龍樓九重天上呼嵩華五色雲中拜冕旒貫月流虹昭景慶玉書金管紀春秋萬年介夀從兹始花甲初開第一周其一聖主乗乾冠古今雲蒸霞起頌君臨綿長泰運膺軒厯浩蕩薫風拂舜琴九曲澄清王者瑞萬方胞與聖人心太平有象歡無極永戴中天雨露深其二運際昌期上瑞臻天庥洊至效封人星流華渚朝南極河出榮光夀北辰薄海添籌髙日月康衢擊壤協韶鈞無疆慶兆軒臺策寳厯恒歌億萬春其三歡騰重譯勸梯航夀國來依天子光一道恩綸彌六合萬齡天禄邁三皇麟逰鳯舞圗王㑹海湧山朝入職方何幸小臣逢此日得隨率舞介霞觴其四萬夀詩五言排律十二韻監生臣陸載濤龍飛開夀國虎拜頌軒宫花甲周天始葵心率土同九逵歡擊壤八表慶呼嵩巍蕩符堯徳平成廓禹功紀年書出洛誕聖渚流虹日月青陽麗河山紫氣融霞觴傾湛露仙樂動薫風彩仗臣民擁彤庭玉帛充四靈馴禁籞五老聚璇穹扈閣春常在鴻霄晷再中金桃三島綻寳厯萬齡崇願繼封人後歌衢祝聖躬萬夀盛典初集卷一百十四
