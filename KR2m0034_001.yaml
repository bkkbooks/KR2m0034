body:
  text: 欽定四庫全書萬壽盛典初集卷一宸藻一詔諭恩詔詔曰朕五十餘年上畏下懼以敬以誡覃思上理且以一心對越上帝未嘗瞬息稍懈賴旻穹之孚祐祖宗之䕃庇邇來國家蓄積有餘民間年歲頗豐朕以凉德勉思列聖體大順公慮患操心敷景運於休期𢎞基業於光顯夙夜冰兢宵旰靡遑屈指春秋年屆六旬矣覽自秦漢以下稱帝者一百九十有三享祚綿長無如朕之久者朕之虛薄良深歉仄何敢少有倦怠有負孜孜圖治之初心况在位久者始勤終忽往往不能垂令名於後所以乾惕之懷彌殷深危之念愈切兼之承平歲久幅員日廣户口漸增風俗益薄朕與臣鄰夙夜在兹以剛健中正惇大成裕謙尊有終持盈保泰猶恐未能豈自滿假少有逸豫朕以天下為心天下當亦體朕之衷各矢藎誠皆敦孝敬型仁講讓守己奉公務勤職業官僚胥勸人士奮興使遐邇之均被小大之咸周以享升平之福此非朕之德乃天地祖宗之賜今朕式慰中外臣民之請博考典禮大沛膏澤用稱朕躋世於仁壽之至意所有應行事例開列於後以下諸款俱未載入於戲錫民以福為皇極得壽之徵御衆以寬乃萬國咸寧之本布告天下咸使聞知康熙五十二年三月十八日諭户部朕恭膺天眷祇承列祖鴻庥統御萬方子育兆庶厪懷至治宵旰靡寧幸際海宇同風邊隅向化遐邇中外帖然衽席之安者是皆仰荷天地祖宗福祐之所致也方朕八齡踐祚之初太皇太后問朕何欲朕對臣無他欲惟願天下治安生民樂業共享太平之福而已迄今五十年矣惓惓此心未嘗一日少釋每見民為邦本勤恤為先政在養民蠲租為急數十年以來除水旱災傷例應豁免外其直省錢糧次第通蠲一年者屢經舉行更有一年蠲及數省一省連蠲數年者前後蠲除之數據户部奏稱通共㑹計已逾萬萬朕一無所顧惜百姓足君孰與不足朝廷恩澤不施及於百姓將安施乎朕每歲供御所需槩從儉約各項奏銷浮冒亦漸次清釐外無師旅餉饋之煩內無工役興作之費因以歷年節損之儲蓄為頻歲渙解之恩膏朕之蠲免屢行而無國計不足之慮亦恃此經畫之有素也比來省方時邁已歷七省南北人民風俗及日用生計靡不周知而民生所以未盡殷阜者良由承平既久户口日繁地不加增産不加益食用不給理有必然朕洞矚此隱時深軫念爰不靳敷仁用蘇民力明年為康熙五十年思再沛大恩以及吾民原欲將天下錢糧一槩蠲免因衆大臣集議恐各處需用兵餉撥解之際兵民驛遞益致煩苦細加籌畫悉以奏聞故自明年始於三年以內通免一周俾遠近均霑德澤直隸奉天浙江福建廣東廣西四川雲南貴州各巡撫及府尹所屬除漕項錢糧外康熙五十年應徵地畝銀共七百二十二萬六千一百兩有奇應徵人丁銀共一百一十五萬一千兩有奇俱著察明全免竝歷年舊缺共一百一十八萬五千四百兩有奇亦俱著免徵其五十一年五十二年應蠲省分至期候㫖行民間舊缺既經豁免嗣後每年額徵錢糧務如數全完儻完不及額或别有虧空託稱民缺則負國甚矣即責令督撫以下官員償補仍從重治罪夫地方大吏以及監司守令皆與吾民誼均休戚者也誠克體朕孳孳保赤之懷實心愛養力杜侵牟朘削則閭閻咸得衣食滋殖無有失所而為官吏者亦身名俱泰豈非升平樂利之盛事歟爾部移文各督撫諭㫖到日即刋刻頒布遍示窮簷令咸知悉特諭康熙四十九年十月初三日諭户部朕誕膺大統撫育寰區夙夜孜孜不自暇逸凡以為民也勤圖利濟休養安全即無水旱之虞時布寬仁之政蠲租除賦務使遐方率土無不均霑或值雨暘偶愆出帑發粟多方賑恤其有益於吾民者靡勿備舉而亟行之朕殷懇周詳之至意前四十九年所頒諭㫖申晰甚明原欲將五十年天下錢糧通行蠲免以諸臣集議恐需用兵餉撥解之際兵民驛遞益致煩苦故自五十年為始三年之內全免一周除將直𨽻奉天等九直省康熙五十年地丁錢糧一槩蠲免及歷年舊缺錢糧一併免徵外山西河南陜西甘肅湖北湖南各撫屬除漕項外五十一年應徵地畝銀共八百四十萬四千兩有奇人丁銀共一百二十萬八千一百兩有奇著察明全免竝歷年舊缺共五十四萬一千三百兩有奇亦俱著免徵其五十二年應蠲省分至期候㫖行民間舊缺既經豁免嗣後每年額徵錢糧務如數全完儻完不及額或有虧空託稱民缺即責令督撫以下官員償補仍從重治罪該督撫須實心力行期副朕惓惓愛民之意如有指稱事故侵欺科派事發之日必嚴行究治諭㫖到日遍示城郭鄉村深山窮谷咸使知悉爾部即遵諭行特諭康熙五十年十月初三日諭户部朕宵旰孜孜勤求民瘼永惟惠下實政無如除賦蠲租除每歲直省報聞偶有水旱災傷照輕重分數豁免正供仍加賑恤外將天下地丁錢糧自五十年為始三年之內全免一周使率土黎庶竝被恩膏除將直隸奉天浙江福建廣東廣西四川雲南貴州及山西河南陜西甘肅湖北湖南各直省康熙五十年五十一年地丁錢糧一槩蠲免歷年舊缺錢糧一併免徵外所有江寧安徽山東江西各撫屬除漕項外五十二年應徵地畝銀共八百八十二萬九千六百四十四兩有奇人丁銀共一百三萬五千三百二十五兩有奇俱著察明全免其歷年舊缺銀二百四十八萬三千八百二十八兩有奇亦竝著免徵計三年之內總免過天下地畝人丁新徵舊缺共銀三千二百六萬四千六百九十七兩有奇各該督撫務須實心奉行體朕軫念民生至意如有侵欺隱匿使惠不及民借端科派者督撫嚴行察參督撫失察事發之日亦嚴加究治諭㫖到日立即遍示城郭鄉村咸使知悉爾部即遵諭行特諭康熙五十一年十月初三日諭禮部朕御極以來惟欲萬國乂安上則敬天法祖下則垂令名於後世孜孜然以致鬚髮盡白心血耗散歷盡憂勤蕩平險阻自古帝王在位不久享年不遐者論者往往歸於别故而未諒帝王實不勝其難實不堪其勞憂懼所迫以致短祚也朕反覆思維帝堯固辭華封之祝必似朕臨蒞年久之君方能知聖人言之有實也餘則斷不能知矣朕本凉德惟賴祖考得國之正積福之深在位五十餘年壽屆六十今憂勞倍增血氣漸憊惟恐愈久而力不支願不遂以至不全終始一世勤瘁俱屬徒然朕惟惕厲而已竝未留心祈求甲子之周也覽禮部請旨之奏悉係虛文無有實際朕惟願臣清子孝兄友弟愛人人皆讀正書勉盡職業國安民治盜賊寧息各以血誠實意為朕六袠慶祝朕即嘉納此外儀文朕無所嗜亦無所好這所奏不准行康熙五十一年十月十九日諭吏部尚書管倉場事務富寧安户部侍郎塔進泰噶敏圖朕今日自暢春園來詢問米價云比往年稍貴緣今歲天下各省人民來集者甚多米價故較往年翔貴現今倉內米數充足先發一萬石照時價減糶則來集人民可以賤價得米而京城米石又得盈餘於民生大有裨益若一萬石不敷再發一萬石糶賣亦止需米二萬石而已爾等將價值定議具奏即發米自明日初一日糶起至月終止特諭康熙五十二年二月二十九日諭王貝勒大臣九卿詹事科道朕昨進京見各處為朕六十壽慶賀保安祈福祝延者不計其數朕實凉德自覺愧汗從來帝王之治天下罔不以民生為念若為一已之私即不能擴而充之矣朕若先知必令止之今已成矣難毁衆志夜來思之達旦朕所以為天下萬國蒼生之主者萬姓安即朕之安天下福即朕之福若能祈禱雨暘時若家給人足則朕安寢飽食可以却病延年此朕之求福非有妄想也傳之各處凡有祝延者必求雨暘時若萬邦咸寧為先朕己老矣有若無實若虛夙夜匪懈履薄臨深之念與日俱增豈敢自有滿假乎特諭康熙五十二年三月初一日諭南書房翰林朕聞各省為祝萬壽來者甚衆其中老人更多皆非本地人時屆春間寒熱不均或有水土不服亦未可知爾等即傳與漢官等儻有一二有恙者即令太醫院看治務得實惠以知朕愛養老者之至意特諭康熙五十二年三月初八日諭南書房翰林各省祝萬壽老人俱於十七日在西直門外本省龍棚下齊集接駕十八日齊至前朝外聽禮部指地方行禮行禮後若再至龍棚恐城門擁擠老年之人實有未便况十七日朕進宫時經過各省龍棚諸老人已得從容瞻仰十八日行禮後諸老人不必再至龍棚下接駕爾等傳與各省漢官遍諭各省老人知悉特諭康熙五十二年三月十一日諭大學士溫達等今歲天下老人為朕六旬大慶從數千里匍匐而來如何今其空歸欲賜伊等宴然後遣回著查八旗滿洲䝉古漢軍漢人大學士以下民以上年逾六十五歲者奏聞在本月二十二三兩日擬定一日賜宴預為奏聞便於備辦內有艱於動履不能前來者聽其勿來能來者俱令其來即不能來者應得分例朕必另行頒賜詔內有恩賜老人一款凡在恩賜款下者於各名下注明已在恩賜之列至於奴僕不在所查數內今時令漸暖賜宴後即令伊等各回原籍耕種再查八旗滿洲䝉古漢軍以至包衣佐領下不論官員閒散人等年七十以上老婦奏聞俟老人賜宴後再定一日送至皇太后宫賜宴內有艱於動履不能前來者聽其勿來能來者俱令其來若有貧乏不能來者著各該管處協助車馬使之前來俱開真實年歲不可揑報特諭康熙五十二年三月十七日諭宗人府王以下至宗室子孫內年二十歲以下十五歲以上人品聰慧能備衣服者揀選六七十人送至朕前以備授飲老人使令朕之子孫亦皆𣲖出青帶之人一員不用特諭康熙五十二年三月十七日諭大學士溫達等年老諸大臣內於世祖章皇帝時居官者惟宋犖田種玉而已今年齒老邁雖閒居林下朕覩之不禁軫恤宋犖現有尚書品級在身田種玉著給與工部尚書銜俱准給誥封宋犖田種玉著酌加宫保以示朕不忘耆舊之至意特諭康熙五十二年三月二十五日諭各省老人書稱文王善養老者孟子云七十者非帛不暖非肉不飽帝王之治天下發政施仁未嘗不以養老尊賢為首務近來士大夫只論做官之賢否移風易俗之效驗所以不暇講究孝弟之本心朕因今日之㑹特宣此意若孝弟之念少輕而求移風易俗其所厚者薄而其薄者厚矣爾等皆是老者比回鄉井之間各曉諭鄰里須先孝弟儻天下皆知孝弟為重此誠移風易俗之本禮樂辭讓之根非淺鮮也昨日甘霖大沛四野霑足朕心大悅爾等毋誤農時速回本地特諭康熙五十二年三月二十五日萬壽盛典初集卷一
