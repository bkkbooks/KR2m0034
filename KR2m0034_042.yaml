body:
  text: 欽定四庫全書萬壽盛典初集卷四十四慶祝二圖記二自西直門至神武門臣民建棚慶祝者凡三十有一所為記四進西直門過萬國來朝坊路左樺皮厰衚衕内有廟曰西三官廟有吏户二部尚書以下諸臣建慶祝經壇於内臨街設龍亭一亭前有綵坊曰天成地平坊左右鼓亭循亭折而前過街綵坊各一左曰華祝三多右曰嵩呼萬歲路右直兩坊間綵坊一坊後燈樓一樓下為牓棚棚後旛竿五棚左演劇綵臺一又前路右馬香兒衚衕内有廟曰闗帝廟有西四旗前鋒綂領護軍綂領以下諸臣建慶祝經壇於内臨街結綵坊三中曰天人胥慶左曰金闕垂光右曰瑶池獻夀坊前綵結須彌座座上為萬夀景命亭亭後設金書百夀字圍屏左右堆紗屏各一屏外為鼔亭亭外周以綵牆廣十有七丈循牆折而前為過街綵坊二左曰徳邁古今右曰道參天地直中坊路右牓棚一旛竿五棚右有五綵重臺曰祝堯歌舜臺高六丈廣稱之下演劇上放飛鳥棚後有皇十四子小綵坊二又前路右有寺曰崇夀有寧夀宫太監等建慶祝經壇於内寺前皇棚一棚外有大綵坊曰慶洽天人坊左右鼓亭循亭折而前過街綵坊二左曰運獻長庚右曰天開夀域路左牓棚一旛竿五又前路左北草厰内有菴曰萬福有寧夀宫老福金建慶祝經壇於内臨街建皇棚棚外綵坊三中曰建中錫福左曰雨順風調右曰日升川至左坊外鼓亭一折而前有過街綵坊曰堯天舜日右坊外鼓亭一折而前有過街綵坊曰景星慶雲路右牓棚一旛竿五棚左右有綵坊左曰春臺右曰夀域出堯天舜日坊有放生綵臺日放鳥雀無算厰内又有寺曰萬夀有内務府正黄旗包衣㕘領以下護軍以上建慶祝經壇於内臨街建皇棚一棚外八字綵牆中闢圜門門外綵亭一左右鼓亭旛竿各一前結大綵坊三中曰允執厥中左曰羣黎歡慶右曰列聖鑒臨左右折而前過街綵坊各一左曰祥洽萬方右曰夀同南極直兩坊間路右牓棚一旛竿七出祥洽萬方坊演劇綵臺一又前路左有廟曰東三官廟有大理寺太常寺卿以下諸臣建慶祝經壇於内臨街建八角萬夀松樓左右松棚各一棚右演劇綵臺一樓前鼓亭二過亭綵坊三中曰萬國尊親左曰慶集三辰右曰徳周八表左右折而前過街綵坊各一左曰七曜騰輝右曰五雲絢采直兩坊間路右牓棚一旛竿七棚左右松棚各一又前路左有觀曰崇元有正黄旗滿洲䝉古漢軍都綂以下建慶祝經壇於内臨街為經棚棚左右為鼓亭前建綵坊三中曰聖夀無疆左曰慶洽同文右曰光昭大象左右折而前為過街綵坊左曰道超九聖右曰徳覆萬方直兩坊間路右牓棚一旛竿五出道超九聖坊過石橋路左演劇臺一臺左右綵結海山如赤城霞起巑岏可觀又前路左有寺曰北廣濟寺有禮部刑部國子監光禄寺鴻臚寺尚書祭酒卿以下諸臣建經棚於内寺外左右鼓亭一前結綵坊三中曰夀節天開左曰咸歌舜日右曰同祝堯年左右折而前過街綵坊二左曰百祿是荷右曰萬福來同直兩坊間路右牓棚一旛竿五萬福來同坊外演劇綵臺一過此為新街口折而南矣由新街口折而南路右有寺曰祝夀有兵工二部尚書以下諸臣建慶祝經壇於内寺外左右鼓亭前結綵坊三中曰文武聖神左曰寳厯宏長右曰金甌永固左右折而前過街綵坊二左曰皇仁廣運出坊演劇綵臺一右曰帝徳覃敷直兩坊間路左為牓棚棚前上諭龍亭一上内書諭棚後旛竿五又前路右有寺曰龍泉有都察院通政司太僕寺順天府六科及宛大二縣五城兵馬司諸臣建慶祝經棚於内寺外左右鼓亭前結綵坊曰日麗星輝坊前大綵坊三中曰天開夀域左曰九龍洽聖折而前為過街綵坊曰瑞靄千門右曰五緯聨光折而前為過街綵坊曰春明九陌直兩坊間路左牓棚一旛竿五出春明九陌坊路左演劇臺一又前路右有東四旗滿洲䝉古漢軍都綂以下建百老獻夀臺顔曰南天門臺九級扮百老人各執金夀字層累而上有經壇在大佛延禧法華境靈四寺圖不及又前路右帽兒衚衕内有廟曰闗帝廟有東四旗前鋒綂領護軍綂領以下䕶軍以上建慶祝經壇於内衚衕口有綵坊曰同登仁夀出街有綵坊曰太平有象坊前鼓亭二右有綵坊曰金輪現采左有綵坊曰寳厯呈祥又左有綵坊曰翠柏長春左右過街綵坊二左曰乾坤交泰右曰宇宙同春旛竿各二直兩坊間路右牓棚十六楹棚前綵亭二棚後旛竿十四出乾坤交泰坊路右演劇臺一路左綵坊三中曰集聖大成左曰大地山呼右曰鈞天雅奏又左有過街綵坊曰日麗天衢又前路右有寺曰寳禪有九門步軍綂領以下將校建慶祝經壇於内寺前綵坊一曰卿雲五色稍折而左有綵坊曰寳厯萬年出街大綵坊一曰九州向化坊前鼓亭二左右過街綵坊各一左曰瑞輯共球右曰祥開景慶直兩坊間路左牓棚一旛竿五瑞輯共球坊外路右演劇綵臺一出祥開景慶坊又前路右有寺曰普慶有内閣翰林院詹事府中書科諸臣建慶祝經壇於内有綵坊曰聖人首出寺外為經棚左右鼓亭棚前綵坊三中曰化日舒長左曰徳輝三五右曰道煥古今過街綵坊二左曰就日瞻雲右曰參天贊地直兩坊間路左牓棚一旛竿五出參天贊地坊外演劇綵臺一又前路右石碑衚衕内有寺曰西方有鑲紅旗滿洲䝉古漢軍都綂以下建慶祝經壇於内寺前有綵坊曰萬年鴻祚稍前有綵坊曰南極呈祥出衚衕左右鼓亭前結綵坊三中曰與天齊夀過街綵坊二左曰九天花雨右曰萬國衣冠直兩坊間路左牓棚一旛竿五出萬國衣冠坊外路左演劇臺一又前路右有菴曰般若有鑲藍旗滿洲䝉古漢軍都綂以下建慶祝經壇於内菴前綵坊一左右鼓亭前結綵坊三中曰乘乾景運左曰玉厯凝休右曰皇圖永固左右折而前過街綵坊二左曰聖徳光華右曰皇仁浩蕩路左兩坊間為牓棚棚内萬夀詩屏二棚後旛竿五出皇仁浩蕩坊路右演劇綵臺一又前為毛家灣路左有副都綂賴都母吴蘇氏接駕龍亭一又前為街心觀音菴有大市街北小民建慶祝經壇於内菴外經棚一旛竿二又前路右有廟曰真武有正紅旗滿洲䝉古漢軍都綂以下建慶祝經壇於内廟前綵坊三中曰夀嶽巍峩左曰萬年永命右曰九徳當陽坊前綵門一左右為綵牆牆左右為鼓亭循鼓亭折而前過街坊二左曰四海騰歡右曰六符御極直兩坊間路左為牓棚棚後旛竿五出六符御極坊路左面北演劇臺一臺以五色繒帛結為流蘇網户當目輙嵌小鏡燦若千星亦竒觀也又前路右有廟曰雙闗帝廟有直省督撫提鎮率所屬來京諸臣建慶祝經壇於内廟前綵坊曰萬方仁夀坊前鼔亭旛竿各一左右為綵牆近牆綵坊一綵亭二左右過街綵坊二左曰河山永固右曰雲日増輝直兩坊間路左為牓棚棚後旛竿五出雲日増輝坊路右演劇綵臺一又前路左有寺曰栴檀有莊親王建慶祝經壇於内臨街為皇棚棚外綵坊三中曰雲開兠率左曰花連上苑右曰樂應中和坊左右鼓亭折而前過街綵坊二左曰天衢耀彩右曰輦路嵩呼直兩坊間路左為牓棚棚後旛竿五左右綵坊二左曰盛徳凝圖右曰鴻庥協極出天衢耀彩坊路左演劇綵臺一又前為四牌樓圖中旗手衞樂器自此陳設直至西安門四牌樓徑南市民夾道為燈廊百餘楹有過街綵坊曰慶洽無疆竟南頭有坊曰恩光普被出恩光普被坊路左有寺曰普恩有宗室阿哥建慶祝經壇圖不及近坊折而東有過街綵坊曰如日之升圖中陳設鹵簿始此巨象神駒與御輦間列望之如山嶽如雲霞然又前過街綵坊曰物被仁風過坊路左有廟曰闗帝廟有西安門外小民建慶祝經壇於内廟前有綵坊曰九州同慶直坊路右有綵坊曰萬靈効順又前為皇城西安門進西安門路左西十庫口内有上三旗三十家包衣人因天王殿舊址建寺諷經慶祝萬夀奉勅賜名慈雲寺前夾道新植松柏百餘株臨街為綵坊曰福祿來同坊左右鼔亭亭外濟貧錢棚循棚折而前過街綵坊二左曰八方夀域右曰一氣鴻鈞直兩坊間路右為演劇綵臺臺左為濟貧餅棚右為牓棚棚後旛竿六出一氣鴻鈞坊路左有包衣婦女千百人於此接駕又前路左有包衣三旗廣儲司人員慶祝綵坊曰卜年兆億左右鼓亭一循鼓亭折而前過街綵坊二左曰乘六御乾右曰兼三出震右綵坊内路左演劇綵臺一有經壇在三佛寺圖不及出左坊稍前路左有内務府官學教習及官學生慶祝綵坊曰五福陳疇左右鼓亭循亭折而前為過街綵坊左曰大徳曰生右曰至誠無息直兩坊間路右為牓棚棚後旛竿三有經壇在清涼菴圖不及出大徳曰生坊稍前路左有古北口大糧庄頭等建演劇綵臺一左右為過街綵坊左曰人夀年豐右曰時和世泰有慶祝經壇在静黙寺圖不及出人夀年豐坊稍前路左有二月分新選諸臣建慶祝皇棚棚為六角飾以五彩左右六角鼓亭前結大綵坊曰太平景象過街綵坊二左曰億萬斯年右曰受天之祜直兩坊間路右牓棚一旛竿五有經壇在興隆寺後殿圖不及出億萬斯年坊又前為金鼇玉蝀橋過橋由團殿後折而北登堆雲積翠橋望隔河西北有寺曰栴檀有上三旗内大臣延喇嘛千衆建慶祝經壇於内梵聲殷地􅓚影拂空縹緲隠現間過橋有寺曰白塔有上三旗包衣佐領等建慶祝經壇於内壇前大綵坊曰健配天行坊外左右鼓亭由堆雲坊北折而東路左為經棚棚左右為燈棚折而前過街綵坊二左曰瑞叶斗樞右曰光流華渚直兩坊間路右為演劇綵臺出瑞叶斗樞坊稍折而北路右有御前太監等設接駕龍牌儀仗又前有過街綵坊曰菁葱佳氣過坊路右有演劇綵臺遙望西㟁團殿東有鑲黄正白二旗包衣護軍叅領以下將校演劇綵臺若相應和焉二旗有慶祝經壇在興隆寺前殿圖不及又前過石橋進雪池紅門夾道燈廊數百楹半道左右鼓亭各一又前有過街綵坊曰誕膺多福過坊夾道綵坊二左曰翠籙凝庥右曰紫苞肇泰又前僧道經棚各一夾道綵牆直接景山南瞻禁城雙闕聳出霄漢北顧五龍亭波光森動周遭繡幕相連笙歌互起金石千聲雲霞萬色葢莫能殫述焉是時京城内外金碧相輝錦綺相錯華燈寳炬霏霧氤氲彌漫周匝其輦路所經既已繪圖系之以記至於翠華未歴之境慶祝同心幾無隙地若海淀則有上清正一嗣教真人張繼宗建金籙醮壇於永寧觀翰林院編脩高輿率領浙江耆老三百餘人建千佛道塲於萬夀寺地安門外則有養心殿武英殿御書處景山玻璃厰各監造諸臣建經壇於藥王廟正陽門内則有太醫院諸臣建經壇於衙門内外城則有提督四譯館太常寺少卿以下諸臣行人司司正以下諸臣各建經壇於衙門内候補候選諸臣三百九十二員建經壇於仁威長夀觀正陽門外士民商賈萬餘人建經棚於珠市口郊畿則有兩淮商人集黄山僧衆建經壇於西頂廣仁宫莫不樹坊立木張樂然燈寳榭層樓成於俄頃宫牆綺陌忽改常觀至於溢巷闐街肩摩轂擊琳宫梵宇繙瓊籖貝葉之篇火樹銀花放鐵鎖星橋之禁周遭百里延歴數旬萬户千門繁絲脆竹深坊小巷繡額珠簾雖游騎輕車莫能窮際誠非丹青所及詳毫翰所勝載矣先是三月初二日上自霸州囘鑾有㫖云朕昨進宫見臣民慶賀為朕祈福者不計其數朕若先知必令止之今已成矣難毁衆志其即傳之各處必祈雨暘時若萬國咸寧為先大哉王言真天地父母之心也臣等伏惟自古聖人繼天立極將建非常之功必有非常之夀是以三皇踰萬五帝盈百孔子曰大徳者必得其夀理固然也稽古華封祝堯首曰聖人多夀書言欲至萬年詩稱萬夀無疆葢上之深仁厚澤所以夀身夀世者既乆且長而臣民忠愛其君之甚無可以報稱者亦惟有祝君夀考而已若夫緣情之禮因時而作竭臣子之情顯邦家之慶紀乃誕日崇以美名聖節所由昉也有唐開元十七年降誕節宴百僚於花蕚樓丞相源乾曜張說率百官上表請以八月五日為千秋節著之令甲布於天下咸令宴樂休假三日羣臣是日獻甘露醇酎上萬歲夀酒王公戚里進金鏡綬帶士庶以絲結承露囊更相遺問村社將夀酒宴樂唐開元之治號稱絶盛然典禮不過如此降至有宋夀寧天申瑞慶諸節歲脩故事盛典無聞未有合千八百國之歡心聚四海九州之方物稱觥獻斚隨輦路而樂太平飛閣雕甍徧康衢而邀聖豫王言雖曰勿亟民心自切子來如今日之盛者也葢我皇上道集大成化超隆古四海臣民登仁夀者五十餘年於兹矣平時天施地生所以益民者既已無方乃恭逢大慶愈沛鴻施典禮方行軫念雨暘不忘萬國益動而巽日進無疆固宜普天率土莫不尊親航海梯山極於無外而衢歌巷祝直接陶唐氏之風也然則是圖也即豳風繪屏猶不足以擬其美盛又豈王㑹職貢所能仰希萬一也哉其慶祝表文經壇詞疏附著於篇用紀頌禱之實焉萬夀圖畫紀臣聞梁有職貢之圖唐有王㑹之圖圖者所以比物象形寫兹盛美以昭示來世者也然或失則侈或失則誣僅為鋪張揚厲以藻繢太平之象而無當於勤民愛物之心是以雖盛而弗傳也惟昔帝堯氏之有天下也地平天成六府三事允治其時之民則有含哺鼓腹者矣有巷舞衢歌者矣有請祝聖人者矣而後之人或有繪為擊壤圖以傳其熙熙皥皥之風者至今覽之猶有餘慕焉我皇上至仁覆育大化翔洽五十二年以來徳洋恩溥物靡不得其所當兹三月十八日喜天甲之初周慶皇恩之大沛先一日駕由暢春園還宫千官雲擁萬國山呼祝嘏之盛曠古未聞惟我皇上之心即帝堯之心故民氣雍和風俗淳美熈熈皥皥而祝聖人之多夀者亦即與帝堯時先後同符也皇上與民同樂特允臣民之請繪為長圖傳之萬世以垂永久兵部右侍郎臣宋駿業經始其事分為五十餘處而臣原祁復受命續成勾摹數月進呈初本幸䝉嘉賞抃舞莫勝臣又惟自古有圖則必有史是以恭請恩綸纂修盛典凡宸章之璀燦聖徳之高深與夫恩賚之廣大典禮之詳明歌頌之洋溢無不備載罔有缺遺矣而於臣民慶祝之處既案其里地悉其規模一一詳列於書而猶恐未足以盡其曲折也特就長圖裁為短幅次第臚列共計百有四十餘頁定為上下二卷亦欲使後之披圖者如登春臺如遊樂國既幸生聖人之世為聖人之民得親見聖朝之鉅典鴻規與聖世之時和年豐嘉祥協應如此其章章可攷歴歴可指也而我皇上勤民愛物之心亦庶幾藉是以少傳其萬一此亦擊壤圖之遺意云爾經筵講官户部左侍郎加一級臣王原祁恭紀萬夀盛典初集卷四十四
