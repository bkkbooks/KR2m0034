body:
  text: 欽定四庫全書萬壽盛典初集卷一百七歌頌四十七舉貢諸臣二萬壽詩五言律四首舉人臣張榮源春旭彤墀麗宫花紫禁明普天均覆冒匝地起光榮瑞莢堯階吐緋桃漢陛呈君王明德逺永永慶升平其一爛熳春星曙蘢蔥瑞靄舒千官分隊肅萬嵗合聲呼鳳吹隨仙仗龍香潤御爐升恆歌未足五嶽畫成圗其二八埏安聖治百福集皇躬玉帛殊方至車書四譯同擬斟堯甕酒快被舜絃風俗尚還醇朴垂觀愜睿𠂻其三流膏虹渚渥含潤藝林均化宇銜恩久元辰獻夀新幸逢熙皥世慶溢草茅臣願效華封老三多祝聖人其四萬壽詩五言律四首舉人臣馬翼贊萬國梯航集千官劍佩前爐煙成卍字桃實結三千環拱星辰上謳吟日月邊聖恩方浩蕩澤與福俱綿其一淑氣滿皇京􅗳喈叶鳳鳴天開三月節人祝萬年聲作所原無逸延年在好生誰能歌帝力蕩蕩自難名其二道接羲軒統心傳洙泗燈生民推獨盛壽域慶同登學海勝瀛海書乘即上乘九如歌祝處旭日正東升其三行健與天同鴻鈞一氣中闢門欣曠典賜復沛祥風智勇承神亶升恆集聖躬小臣慚拜手葵藿罄微忠其四萬壽詩五言律四首舉人臣陳峋帝德千秋煥宸禧億祀凝自天申保定與日並貞恆序引鵷鸞肅觥容父老稱洪庥宣尺一恩溥萬方承其一八表煙雲麗三春日月遲禎祥凝紫極呼祝徹丹墀仙圃呈桃實乾符應蓂枝草茅思獻頌還詠九如詩其二治當雷鼓物運際日中天鳳紀書三月虹輝燭八埏祥徵仁者壽聖誕佛之先帝則編氓順欣歌萬祉駢其三御苑韶華暖仙源氣象新競含恩似海共快物皆春疇範呈河洛郊原集鳳麟神功真邁古萬祀戴尊親其四萬壽詩五言律四首舉人臣查祥閶闔朝迎日紅雲捧玉宸千官齊獻瑞萬屋盡回春海上羣仙至天邊衆樂陳欲從瞻帝力鼓腹看堯民其一禮樂昭明備文章盛典謨直須參造化何止駕唐虞鞏固山河並升恆日月俱九重春色麗抃舞在寰區其二德並乾坤大功兼創守奇百昌資位育一代作君師率土騰歡日諸天拱瑞時彤霄纒紫氣春日正遲遲其三花甲周初始如川莫不增化成惟久道天縱况多能棗熟俱然火桃鮮欲獻冰百寮齊蹈舞搢笏幸同升其四萬壽頌舉人臣陳廷璋旋乾轉坤登三咸五建極維皇淳風邃古惟天啓聖惟聖繼天清寧廣運三才斯兼聰明睿智與神無極至德難名管蠡莫測浩浩蕩蕩貞元始復億萬斯年宜其遐福萬壽詩四言八章有序舉人臣王時濟欽惟我皇上御極之五十有二載至德覃敷湛恩汪濊百姓安樂萬物各得其所三月十八日恭逢萬壽六旬正誕於是太皥布和坤靈定位星緯聯珠日月合璧協氣充於四表祥光遍於九垓覆載之內含生之屬莫不踴躍歡忭奔走數千里環繞闕廷瞻雲日之輝申岡陵之祝臣竊惟壽者受也天生聖人授之以德錫之以福也聖人承天修德集厥福也有能受之德斯有必得之壽考之於史按之於經自天地人皇壽各萬八千歲而五帝之德莫盛於黃帝莫峻於帝堯其年皆逾百歲以至舜禹湯文武之君皆視其德之廣大髙深而壽亦如之此一定之理自然之符也我皇上聰明睿智文武聖神亘古未有而又好學不倦咨訪無遺以如天之仁育萬物以如神之智察萬幾以義正不德以禮齊兆民五十餘年以來文治既已光昭武功既已丕著府事既已修和禮樂既已釐定百官既已儼恪風俗既已淳龎考課述職之典既已修舉興賢育才之法既已廣博而嚴明而皇上謙尊而光無逸作所夙夜基命宵旰不遑時御經筵屢辭尊號蠲租宥罪之詔無歲不頒勸農課士之文無時不謹復全免天下正供以千萬億計俾登斯民於衽席此皆開闢以來僅見於今日者也而尤於讀書士子加意栽植特開萬壽鄉會科每十年舉行著為成例逺近嚮風恐後次第榜發合計鄉國貢士不下千五百人同鼓舞於一人萬壽之中而謭劣如臣亦得均霑聖澤忝列賢書值景運之方長喜榮光之旋被弱草乘春欣欣欲託仰戴鴻恩更逾尋常萬萬謹拜手稽首而作頌曰皇帝萬壽天錫繁祉既宴且寧申命不已重譯來朝一人燕喜於萬斯年太平之紀其一皇帝神聖德博化溥平衡唐虞俯視湯武以綏萬邦俾有寧宇於萬斯年為天下主其二皇帝至孝超虞軼姬先意承旨融融怡怡推恩無間遍及艾耆於萬斯年孝治昭垂其三皇帝好文懋昭睿智聖謨洋洋金相玉粹海滙其源日揭其義於萬斯年辟雍同肄其四皇帝神武廓清氛壒苞蘖永除玉帛咸會撫臨萬方海襟江帶於萬斯年並包無外其五皇帝勤民不遑寧處鑾輿時巡周視疆土惠我斯人春風春雨於萬斯年式歌且舞其六皇帝視河河流湯湯神謨用授永奠其防分支灌畝禾低麥昻於萬斯年議息宣房其七皇帝惠愛蠲逋開網既滌既除是革是嚮翔泳優遊萌生長養於萬斯年熙皥有象其八萬壽詩五言排律十二韻舉人臣季宏煥世泰開元運時和暢聖襟升平歌自昔樂利到於今民氣如春氣天心即佛心宫花紅似幄苑草碧如簪驗朔占堯莢垂裳理舜琴都俞傳作誥言動記為針文教歸漸被賢才量使任賜酺娛父老蠲賦活蒼黔鶴髮爭扶杖雕題盡獻琛九州霑曠典百道沛綸音此日歡呼切多年惠愛深綿綿億萬載長慶壽星臨萬壽詩五言排律十一韻舉人臣錢鋐覆載乾坤大升恆日月長河山綿寶祚樞斗燦瑶光鳳律聲依永龍書勢激昻彤墀瞻紫氣碧漢灑銀章授厯稽宣夜凝旒正答陽雲松生棟牖藻火仰衣裳綸綍傳三殿恩膏遍四方九衢同抃舞百爾效賡揚時覲旌旗轉常聆鐘鼓喤小臣依內苑湛露沃餘香競進嵩呼祝羣稱天保觴萬年君有道歲歲頌無疆萬壽詩五言排律十二韻舉人臣吳錫爵望闕勤三祝呼嵩進九如春秋萬歲始甲子一巡初紫氣浮金殿紅雲傍玉除存神民在宥過化德為車日月雙輪扇蓬瀛八景輿春臺登赤子樂國建華胥禹甸共球集堯階蓂莢舒勤勞天下見功德史臣書裘帶間鈴閣章縫盛石渠太平欣有象高拱慶端居光被三千界名垂億萬餘繩繩綿寶算瑞靄燭周廬萬壽詩五言排律十二韻舉人臣姚述虞萬國盡呼嵩敷天祝聖躬祥開樞繞電瑞叶斗流虹肅穆朝儀盛氤氲佳氣充御筵丹陛上仙樂紫霄中玉闕鐘初曉金莖露漸融龍顔親咫尺鷺序列西東不息天行健生知帝達聰山河謳頌遍日月照臨同舞蹈兼殊俗趨蹌半上公歡聲三殿徹樂意九州通卜厯欣無盡添籌慶未窮鴻慈霑覆冒永永戴蒼穹萬壽詩五言排律十二韻舉人臣楊飛熊天心元廣運民隱自相關北極羣星拱西池三島環瑞煙縈寶篆春色駐龍顔灑翰雲松畔揮琴藻火間禎符凝帝祉光被遍人寰御酒黃封啓仙桃碧海攀中天高日月大地統河山抃舞螭拗側歡呼鷺序班文章雲煥爛功德水潺湲萬古心燈續方春手詔頒加科多士勸樂業四民間聖壽綿無算何須羡九還天長久樂府三十章附九重開壽域四表暢仁風壤擊衢歌意都歸華祝中天長久萬年昌瑞靄水雲重晴薰仗外峯籌添向海屋海澱緑煙濃天長久萬年昌琛貝集千江歡誠合萬邦君王却貢獻只愛俗敦龎天長久萬年昌蓬海被恩私壽星躔度時從今數花甲花滿萬年枝天長久萬年昌玉塞警宸威嵩呼入紫微兩階羅拜處歌舞戀恩暉天長久萬年昌御路籠晴旭春煙散玉除何須金鑑獻自有萬年書天長久萬年昌百僚齊虎拜更老競鳬趨黑髮龎睂叟都成王會圖天長久萬年昌鳳詔恤蒼黎鸞章濕紫泥野人何所祝聖壽與天齊天長久萬年昌梵夾演天街香花色色排民思酬帝力翻厪聖明懷天長久萬年昌春殿絳河隈歌聲動若雷三皇齊壽算四萬八千來天長久萬年昌皇上一右十章章六句頌同也人有慶而萬國來獻節趂晴春喧闐紫陌塵深宫崇儉德飛詔敕元臣天長久萬年昌幅員開拓逺振古總稀聞猶恐恩難遍占風仰瑞雲天長久萬年昌帝治邁羲軒撝謙德更尊衢歌元不禁率土頌聲喧天長久萬年昌民福君王福人安社稷安絲綸紛布處一語萬情歡天長久萬年昌聖域契元關羲文寤寐間居安思保泰晬穆仰龍顔天長久萬年昌未緑瀛洲草先開北塞蓮漫誇玉井上十丈藕如船天長久萬年昌雙岐將合穎表異盛明朝試聽揮絃化春深暖律調天長久萬年昌天心通帝謂瑞雪灑南郊聖壽川方至千年慶泰交天長久萬年昌雨暘時應禱宵旰不言勞欲繪勤民意研朱點露毫天長久萬年昌廣運承天運時和應太和雲龍兼鳳紀寶厯數應過天長久萬年昌皇上大右十章章六句頌德不居也帝德協重華車書混一家道成觀化久謳頌總非夸天長久萬年昌孝治推恩廣慈寧愛日長年年當聖節親捧白雲觴天長久萬年昌聖學仰欽明淵源集大成道心傳道統毫髮辨惟精天長久萬年昌御墨昭雲漢奎章絢日星幾多珥筆士待詔侍彤庭天長久萬年昌七政齊還察九章法更增璣衡握聖算曲處總從繩天長久萬年昌時巡駕翠虯方嶽覲羣侯萬歲聲相應歡呼處處留天長久萬年昌乾惕一生心宵衣玉漏沈誰知端拱意履薄更臨深天長久萬年昌膏雨流瀛海榮光照斗南鳳綸傳萬壽共慶聖恩覃天長久萬年昌萬壽加科始春秋兩度兼露桃雲杏濕知是雨重霑天長久萬年昌路入蓬萊島雲依日月函小臣同獻頌按節譜英咸天長久萬年昌皇上聖右十章章六句頌本神文武之德以推祿位名壽必得之由也萬壽恭集長句十二章有序舉人臣李茹旻臣聞王者五百年而應運上叶璇圖聖人八千歲以為春遙占寶厯是以流虹繞電天示休徴溫洛榮河地呈瑞應兆三多於華祝斂五福於箕疇自古有然於今為盛欽惟皇帝陛下聰明睿知文武聖神保合太和包兩儀而立極含𢎞光大普萬物以常亨臨御五十餘年興治戡亂蠲賦祥刑合帝德王功廣大悉備勵精九重之上建官育才巡河周嶽凡民生國計纎悉不遺既已於緝熙單厥心抑且念終始典於學天文藻繢摛詞則四始六義二典三謨宸翰邃精操筆則羲畫周文穗書龍篆凡皆餘緒悉佐高深新以又新日慎一日敕幾不遑於朝昃而聖治彌勵其儉勤海宇既底於升平而皇躬日形其暢恱仁者必壽聖言有徴乃者序屬三春恭逢萬壽青旗載甲乙之日以初為常玉厯紀甲子之年自今復始乾度三百六十歷元會運世而不訛易䇿萬有一千含剛柔變化而無盡星輝南極萬年枝上琪樹成花果熟西池八景輿中蟠桃作饋萬方禹鼎珍錯交陳九奏虞絃雲韶互動千官虎拜洞開閶闔之門多士鳬趨廣集風雲之彥梯航來萬國衣冠之輻輳如雲燈燭列九衢闤闠之輝煌不夜敷天紀帝率土來王臣沐日微塵蒙暉小草祖孫父子世荷帡幪禮樂詩書躬叨教育厠賔興之三物志切觀光偕吏計以十年情深捧日聞鶴書之下隴遂雀踴以呼嵩重趼裹糧先期赴闕屆春王之三月既鹿苑以翻經祝天子之萬年望龍顔而稽首恭集長句一十二章用陳擊壤之音冀附採風之聽固知管窺蠡測難量天海之宏深所幸嶽戴淵涵不棄涓埃之微細敬歌周雅頌獻九如舞向虞階歡同百獸祝堯佳氣靄樓臺羅鄴金闕銀宫相向開張正見五色芝和仙露長裴説九天花逐瑞風來曹唐龍銜寶蓋承朝日盧照鄰鶴舞瓊筵獻壽杯羅隱共遇聖明千載運崔鉉願將巴曲奏康哉楊巨源禁城春色曉蒼蒼賈至侍史傳柑玉座傍蘇軾萬里梯航歸大國王禹稱八方風雨會中央劉禹錫星辰列位祥光滿權德輿天子垂衣厯數長盧照鄰自顧下儒何以祝羅隱惟欣頌德奉時康馬懷素蓬萊闕下是天家韓翃鸚鵡杯中弄紫霞李嶠金鼎對筵調玉膳盧綸珠盤承露餌丹砂李康成越人自貢珊瑚樹張謂宛馬常銜苜蓿花鮑防幸願一生同草木趙彥昭普將雷雨發萌芽韓愈碧城十二曲欄干李商隱龍燭輝煌五夜闌羅朋金闕曉鐘開萬户岑參玉階壽酒舞千官鮑溶堯厨啓宴羅珍膳劉筠漢殿延年啜露盤楊億正覩人間朝市樂蘇頲風吹歌管沸雲端韓偓五夜疏鐘漏箭催薛逢銅龍曉闢問安回賈曾翠雲影外來金母劉爚太液池邊送玉杯王安石已喜皇威清海岱杜甫還持綵服詠南陔蘇頲萬方臣妾同瞻望劉長卿孝治如今遍九垓傅與礪花源藥嶼鳳城西張諤桑柘悠悠水蘸堤儲光羲九穗嘉禾垂綺陌黃滔千尋緑嶂夾流溪蜀徐賢妃珍禽競集髙林霧楊載路馬遙翻白玉蹄傅與礪耕饁畫圖豳國俗徐鹿卿天章爛熳象明奎馬祖常雕楹羽帳紫金牀李商隱滿手瓊瑶更有光韋渠牟五色綵毫裁鳳詔黃滔九天氷樹劑龍香馬祖常學窮儒釋三千架王建日下珍珠十二行羅隱四海宣文今極盛吳師道昭回雲漢煥奎章馬祖常邊陲萬里注恩波崔鉉勃律天西采玉河杜甫七德龍韜開黼帳駱賔王五營飛將擁霜戈岑參指揮貙虎皆神算馬植封戮鯨鯢入網羅朱沖和今日聖明家四海杜牧却緣威令到陽和顧況龍韜決勝服時英賀朝清滄海無波絶洗兵曹唐虞舜薰風鏗劍珮羅鄴周王白羽掃欃槍儲光羲千官整肅三天夜曹唐五嶽齊呼萬歲聲陳陶聖道逍遙更何事楊巨源長長久久樂升平上官昭容文明天子念孤寒張昱多士爭彈貢禹冠徐經孫兩榜設科開大比歐陽元九賔陳仗建朱干栁貫杏花滿地堆紅雪劉兼桂樹吹香出寶欄陳旅食葉蠶聲行入聽陳造殿頭持卷隔簾看馬祖常太平天子䇿賢良周伯琦萬歲聲傳震八荒楊萬里聖代即今多雨露高適皇恩寧肯間沉翔徐鉉苑中苜蓿空騏驥傅與礪竹下鵷雛繞鳳凰蘇頲早晚虞庠誇得士孔武仲侍臣應奏慶雲章馬祖常鸞鳳旌旗拂曉陳韋元旦樓懸日月鏡光新釋廣宣千官黼帳杯前壽沈佺期萬井鶯花雨後春耿湋已奏黃鐘歌大吕唐樂府共賡天保答皇仁虞集雖然未得陪鵷列羅隱願挹瓊漿祝聖人韋元旦萬壽詩古體二十首有序舉人臣蔡文等臣聞大聖人而在天子之位者其壽必永載稽史册所稱天皇氏地皇氏人皇氏歷年皆以萬計逮及羲農堯舜莫不享祚長久歷厯可徴也我皇上神姿首出道統中承聖學殫乎精純神功極其隆駿自臨御迄今五十餘載開從古未開之疆域服從古未服之人民威德布昭聲靈赫濯海內乂安民氣和樂生齒繁盛風俗大同東南之河患久平西北之藩籬永固猗與太平之業無疆之休歷萬萬年如一日矣乃猶宵旰加勤痌瘝倍軫計從前蠲免直省正供不下億萬兹又三年遞免八表咸周惠下之仁如此直省所上爰書其略有纎微未協者必敕所司詳讞再三𢎞施矜恤好生之德如此每當遴用督撫重臣必詳加訓諭以察吏為安民之本奬廉為率屬之原其勤求治理又如此至於崇右正學表章六經培養人材增廣解額特開萬夀鄊會科每十年一舉與凡先賢後裔加立博士而以朱子集諸儒之大成接宣尼之餘緒升祀廟廷為萬世宗文德之光昭至矣整飭制防奠安疆宇崇山大海生苖之所居小醜之所伏務為搜輯戎備之修明至矣又恆於萬幾餘暇發為文章精極藻翰照耀日星且又通究易元精研卦氣參理數之合一析律厯之淵微蓋已得羲文之祕奧允執中而立極備道法於一人也易曰觀乎天文以察時變觀乎人文以化成天下久道之原大率由此臣文等章句鄙儒何能窺聖神之萬一而生際隆平沐浴聖化深有見於至誠悠久之徵大德必夀之效切願歌詠其盛於是各賦萬夀詩一章取唐王維百生逢此日萬夀願齊天句為韻庶幾自附於歌衢擊壤之儔以各竭其獻曝貢芹之悃云爾舉人臣鄭之良元會運世來君哉昭典䇿自古惟貞恆綿綿貫道脈我皇凝景命遙踵羲昊迹元氣開先天精思徹大易象緯夙包涵苞符親點畫以茲孚妙運弛張叶翕闢歷歷致太平久道正無斁聞諸書有云維天壽平格而況聖者宗福與日俱積算數數無窮何啻千與百監生臣朱星渚維皇綿厯服廣運推精誠鴻功亘絶域大化流環瀛遐哉此宇宙在宥融羣情東南息洚洞西北靖鼙鉦生齒日以盛風俗日以清不言普美利順則登豐亨爰從衽席上優逰樂升平三春齊獻壽協氣浮金莖星雲徵景慶草木呈精英太和正翔洽錫福遍含生監生臣朱耒曠觀寰宇內處處勤三農多稌復多黍所餘有宿舂頻年霑渥澤次第蠲正供至計在藏富比户皆可封含哺而鼓腹小大歌時雍昭陽值嵗建三月春溶溶聖誕甫周甲乾健愈篤恭輿情胥慶祝所願茀祿從瞻雲張舜樂擊壤進堯鍾莫謾誇前史勳華今日逢舉人臣朱齊名渾穆乃天心至誠惟帝旨寬仁邁商王欽恤光虞史敷奏重參詳爰書慎比擬起看寰宇中風俗清且美負耒有良農橫經多吉士東西南朔鄊罔不共率俾皇圗曷可量聖壽曷勝紀甲子今一周還周萬甲子普天頌無疆朝野慶繁祉試看古今來全盛誰如此貢生臣劉光然聖世肅官方選建皆常吉其慎復其難惟和亦惟一方召列九州臯夔萃一室勸賞有褒嘉考績心寧謐察吏以安民奬廉為表率御屏歷歷陳謨誥言言實所以世風醇俾爾民生逸集福祝三多歷年開萬帙渾噩追循蜚瞻仰心如怵望之則如雲就之則如日監生臣張鵬翼盛代恆文明石室蘭臺建五星聚奎躔熠耀光華逺開館勤搜羅傑閣搆雲蔓增廣解額多設科貯文獻經術聿昭明士風皆謹願訓飭有天章敷教愜輿論雨露廣栽培滋蘭植九畹所以大業𢎞卜世知孔曼慶祝遍遐荒貢金還貢瑗地久與天長春秋歷萬萬貢生臣翁甫生聖文既以敷神武靡不狩六龍涖行間方略親指授羣策稟廟謨奇功已立奏中外同車書南北一尉候大開王會圗賮貢惟恐後臨軒受來賀恩惠並下究行慶申朝章止戈篤天祐垂衣坐紫宸四靈悉在宥雅樂陳咸英實昭功德茂嵩呼遍階庭惟以介睂壽監生臣沈樹􅎝周詩歌緝熙時敏志益遜萬幾有餘間惜隂較分寸天葩燦奇芬珠玉隨風噴宸翰灑臨池仰見筆力健桞骨與顔筋猶覺姿神嫩學海揚餘波藝林得成憲遂使儒家流濡毫競相勸歷久瞻奎文往往勤拜獻竊效康衢謡酬唱重繾綣稽首進螭階聊抒芹曝願舉人臣胡彥頴龍馬出河濵一畫為端倪皇衷發淵塞至理供取擕推之治律厯要眇親提撕黃鍾萬事本纍黍煩參稽九章有成算三角開群迷維天縱異敏妙合如印泥臣聞通卦驗元氣苞蒸黎引之升壽域期頤作階梯如地莫可極如天莫可躋下與川嶽並上與日星齊貢生臣孫參行粵自定甲子歲月頻推遷五行既順布二氣相聫延至誠最悠久理足數自綿干支周復始常若循環然方今誕聖節萬象爭鮮妍曈曨升曉日次第榮祥煙風光開上苑景物融春田宸襟一以舒純嘏方連連榮恩逮縫掖拜舞偕喧闐聳身望九重萬紀輝光天舉人臣蔡文於鑠皇清神京是宅四海來同時千八百其一巍巍聖德浩蕩難名聰明睿知首出羣生其二天葩璀璨舞鳳飛龍文明之盛曠古欣逢其三神武英姿奠安遐邇赫赫德威萬邦懷此其四海嶠鯫生藏修爾室觀國之光瞻雲就日其五蠢彼鯨鯢海洋竊販一旦輸誠稽首萬萬其六帝命小臣往赦其咎格則庸之俾躋仁夀其七奏對丹墀天顔不逺海晏河清普天共願其八惟帝之祐惟民之禔一人首出萬物潔齊其九自今伊始億萬斯年我皇錫福永戴堯天其十萬壽詩五言排律十二韻舉人臣王希曾玉燭輝南極瑶樞映上台梯航重譯至琛賮四方來覆冒圓穹廣涵濡湛露培人人逰化宇處處陟春臺雲漢昭文治菁莪育俊才欣逢聖壽節共進太平杯鳳闕和風遞龍樓瑞氣回賜酺三輔近錫宴百寮陪花甲年初遍貞元運始開綸音同日下鶴算後天推卜厯超千古呼嵩徹九垓小臣持獻頌長此祝臺萊萬壽詩七言律十二首舉人臣李棟電繞庭樞渚貫虹聖人當璧剖鴻蒙版圖日擴聲靈逺勳德天高象緯通耕鑿隨時歌帝力恩膏煦物協春工明堂輯瑞班朝政萬國嵩呼列辟同其一帝座星輝傍玉繩綿綿景福似川增鳳扆負處天方曙龍德亨時日始升䇿衍八千添歲月治看三五盡咸登頌揚大業何時罄百管麟毫萬剡藤其二衣德紹聞總孝思更看五十慕親時纘基四葉承鴻運垂統千秋篤燕貽天上乾符開寶厯人間鼎祚應昌期却從隸首從頭算萬八千年永祝釐其三陽和噓煦遍林臯又向閭閻沛雨膏旰食下舂勤國恤宵衣午夜念民勞體元心似天行健出震功同斗極高莫訝洪纎同一照宸衷原未間秋毫其四遺俘漲海敢猖披三蘖炎方骨已糜始信雷霆同雨露更銷刀劍鑄鋤犁空羣鐵騎翔鵝鸛下瀨戈船躍虎羆枌木扶桑皆郡縣南溟清淺即天池其五宛馬蒲桃肯力爭不堪小醜日橫行萬全師出原無敵九地兵來信有名丹鳳摶霄宣露布黃龍夾日轉雲旌只今候尉通西極雞塞龍荒不算程其六圖疇一覽契先天豈似儒生坐席穿詞賦逺推風雅祖絲綸高出典謨前酉山萬帙回蓮炬丙夜千函敞御筵白首詞臣常儤直矢詩先和鳳梧篇其七睿藻天開象緯明有時宣喚賜公卿南山鳳翥珠毫潤北海魚飛硯水清寶跗垂芒凌草聖文綾散綵燦芝英微臣類璧橫經日親見庖羲一畫呈其八春水桃花浪拍天秋風瓠子日沉煙八年橇􅞬勞三過萬里梯航順百川眼底江河行地後望中龍馬負圖前錫圭幸遇平成日竹楗金隄版築堅其九逺近謳歌遍道塗陽和萬彚盡昭蘇不徒災地常平糶更喜年豐屢賜租擊壤有人同作息省方無地困追呼君王特切如傷志七月豳風入畫圖其十際海蟠天設象胥羲輪照處盡方輿龍城萬里圖王會鳳册千番譯國書果下逺供蠻户馬指南新賜越裳車功成應有咸英奏好采風詩到比閭其十一泰階如砥六符聫花柳長春畫錦妍南極一星看若月矞雲五色望非煙尊開衢室歌堯酒樂奏咸池鼓舜絃獻賦定逢天一笑蓬瀛長祝萬斯年其十二萬壽頌集詩經武舉臣沈銓維此聖人蒸蒸皇皇立我蒸民四方之綱其命維新率由舊章百僚是試維德之行聖敬日躋不敢怠遑求民之莫以綏四方柔逺能邇思輯用光矢其文德時維鷹揚民莫不穀匪居匪康順帝之則好樂無荒農夫之慶如茨如梁多黍多稌乃積乃倉迄用康年以假以享天子萬壽稱彼兕觥為此春酒有飶其香彼茁者葭零露瀼瀼吁嗟麟兮乃陟高岡鳳凰于飛景山與京靈雨既零蔽芾甘棠華如桃李其葉牂牂東方未晞明星煌煌朝既盈矣鐘鼓喤喤樂具入奏吹笙鼓簧洵訏且樂萬舞洋洋媚兹一人犧尊將將宜民宜人宜君宜王時萬時億福祿攸降寬兮綽兮金玉其相樂且有儀顒顒卭卭式序在位其德不爽增其式廓幅員既長賁然來思出車彭彭山川悠逺乃裹餱糧來獻其琛于橐于囊四方攸同亦孔之將穀旦于差會朝清明懷之好音和鈴央央文茵暢轂鉤膺鏤鍚肆筵設席籩豆大房率履不越則維其常以綏後祿以畜萬方于焉逍遙將翺將翔來遊來歌鞗革有鶬顔如渥丹萬民所望永錫難老壽考不忘子孫千億長發其祥勿替引之江漢湯湯于胥樂兮降福穰穰受天之祜萬壽無疆萬壽盛典初集卷一百七
