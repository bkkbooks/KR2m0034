body:
  text: 欽定四庫全書萬壽盛典初集卷八十一歌頌二十一詞臣十萬壽詩集唐七言律四首翰林院編修臣李紱聖人佳節遇長春劉兼朝野俱歡萬壽新劉憲金殿早開親鳳扆李中玉鑾嚴蹕望初晨鄭愔瑶臺含霧星辰滿李白霄漢無雲日月真王建休氣榮光恆不散裴罐山河迤邐淨纎塵耿湋雞人罷唱曉瓏璁李賀清蹕鳴鑾出禁中盧象一嶺桃花紅錦黦杜牧萬條銀燭碧紗籠袁不約施行聖澤山川潤王建共識皇恩造化同張說幸預柏臺稱獻壽盧藏用惟應率舞樂薰風崔湜蓬萊正殿壓金鼇王建天仗宵嚴建羽旄韓愈雙闕薄煙籠菡蓞楊巨源九重春色醉仙桃杜甫風傳刻漏星河曙皇甫曽雲捲珠簾劍佩高許渾更對樂懸張宴處包何日華遙上赤霜袍耿湋東郊道上轉青旗劉憲龍德先天天不違沈佺期鑾殿對時親舜日李中蘭香同處撲堯衣李山甫中天彩殿籠佳氣張說北闕晴雲捧禁闈岑參自顧下儒何以祝羅隱并將歌舞報恩暉沈佺期萬壽詩七言律二首翰林院編修臣方覲佳氣氤氲拂禁林瑶池獻壽起謳吟三春景麗同天節萬國人傾捧日心蓂出堯階瓊露浥松生禹牖瑞雲深小臣拜舞歡無極進祝恭隨廣樂音其一罄宜茀祿慶重申海屋籌增鳳紀新天上宏開仁壽域人間長樂太平春九霄笙鶴呈嘉誕六合鶯花屬令辰南極輝聨東井爛光華氣象古無倫其二萬壽詩五言排律一百韻翰林院編修臣秦道然帝德高千古皇仁被八埏東皇開壽域南極耀中天泰運當全盛乾宫介大年健行誠不息景福集方駢憶昔虹流渚羣瞻日麗躔天符垂厯祕地紀發源綿鴻業膺圖早昌期保定堅九重開運㑹八柱奠坤乾先烈丕承肅貽謀誦法䖍乾元體自合皇極建無偏智勇真天錫生安孰比肩宏慈參大造濬哲裕停淵德洽重熙後勤當萬國先蒼黎雖皥皥宵旰自拳拳甘雨滋堯壤薰風叶舜絃普天遊化日率土頌如川文教敷蠻服雄圖震罕开簫韶九功備干羽兩階填南徼狂籓肆中權指顧平朱旗揮七校黃鉞靖三邊令肅千山月威清萬里煙神謨心獨運廟算氣無前小醜心難革雕弓手自挻直教超瀚海何止勒燕然窮髮師方入穹廬跡已跧犁庭三奏凱絶域一投鞭亘古功無敵含生色竝鮮百神齊降祉四瀆任洄漩帝念其咨切淮黃患未悛六巡周擘畫萬井乃安眠百爾勞奔走羣公盡胝胼欲成永賴績不惜水衡錢為計千秋善圖功億兆便險陂天地意補救聖人權河伯恬波浪陽侯靜蜿蜒平成明德遠疏瀹大功全秉穗千倉積車書九土聨年豐歌沸溢人樂舞蹁躚視遠猶如邇窮源更及巔敕幾勤乙覽集議辨真詮子史供清暇詩書入講筵周情復孔思新義與陳篇厯究天人祕儒宗精一傳微言恆闡發奧㫖每尋研道法歸條貫隂陽受節宣智神周萬品學博彚羣編教士儲梁棟掄才得梓楩文風秦漢上聖訓日星懸染翰龍蛇走臨池風雨騫補戈難學步飛白敢爭妍筆陳千鈞弩詞源萬斛泉金聲諧大吕銀榜耀如椽日月誰能繪星辰不可搴飭躬為律度御世有方圓師保開黃閣公孤賚錦韉台階尊帝簡槐位擇賢遷敬老資方藥憐才授屋㕓官評憑丙鑒仕路絶夤緣側席常虛席求賢每得賢疇咨先德望器使及愚顓寒谷無遺植春風鮮葉捐衆流皆茹納萬類盡陶甄别敘天官職清通物望專羣流嚴六計九品賴三銓掌土司民利多稌詠大田雨暘天意洽饑溺聖心憐望實充華選衣冠尚勉旃軼倫歸玉署超擢自花甎九伐旗常載三驅鼎鼐鐫森森武庫仗烈烈夏曹鋋貫索無芒角寃誣有洗􅀈祥刑心惻惻詔獄草芉芉山澤時弛禁園林無廢田耎民功看畢舉地利更無愆既重公卿矣兼資庶寀焉循良奬冰檗俊乂挺蘭荃吏畏民安業風和俗不儇省刑兼宥過逋釋更租蠲户户皆高廩村村辦獻豜桑麻盈樂土粱稻滿橫阡黨孰絃歌盛閭閻揖讓還耆英多伏勝人瑞有彭籛兹值青陽月欣逢紫氣闐銀籌添海屋鸞鳥下蓬仙濟濟鵷凰繞桓桓虎豹圜淮南叢桂秀商洛紫芝娟宫樹含甘露名山貢白環瑶池餉玉棗大陸湧金蓮煙柳飄香砌仙葩爛錦箋風吹紅杏絢絲裊碧桃牽瑞氣朝朝滿祥雲處處連謳歌遍黔首踴躍到華巔上苑遊麟擾彤墀舞鳳翩香攜煙細細樂奏鼓鼘鼘瑶圃花如玉瀛洲藕似船三漿調寶鼎六膳獻仙佺龍德施方普離明燦若璿箕疇五福備元運六符延頌德唐虞夏綿齡億萬千齊天瞻聖壽花甲似璣璇萬壽詩七言律三首翰林院編修臣張起麟鳳厯無疆億載期和風瑞日引旌旗天䦕金闕臨黃道春擁珠旒映碧墀舜樂自調三象正堯衣不動五雲垂康衢耕鑿成淳俗帝德惟歌擊壤詞其一撫辰輯瑞仰高穹運際中天氣象同四表璿璣光玉燭三時雲稼答金風圖成禹㑹車書遠治紀周官禮樂崇壽考作人開盛典鵷鸞集處聽呼嵩其二龍旓鳳扆轉鴻鈞萬物昭蘇雨露新皇極衍成無量壽乾元合作一家春星雲燦爛咸垂象川嶽懷柔不愛珍正是東風受吏日黃支烏弋慶楓宸其三萬壽詩七言律六首翰林院編修臣惠士奇芙蓉金闕紫雲端吹管聲清引鳳鸞蓬島結成千歲實玉階齊奏萬年歡羣仙簇仗擎瓊液諸部朝天執寶盤南極一星開壽域八方長沭帝恩寬其一充庭獵獵動旌旄一片紅霞映赭袍百尺樓前雞唱早萬安宫外漏聲高華池煙鎖長春柳月幌風開露井桃內殿稱觴浮紫氣遙聞天上奏雲璈其二史臣恭奏協風來祈穀東郊宿霧開春色漸生觀麥殿曉霞遙映望耕臺嘉禾競獻青囊種勞酒頻斟白玉杯農事未興宸念切陽和先向日邊回其三集賢書院㑹羣英仁壽新編四部成已詔蘭臺增算學更開虎觀待儒生宓羲圖裏占三象洪範書中論五行聖代文章今最盛聨珠夜夜聚奎明其四天兵猶記出居庸十萬旌旗耀日紅大將暗排龍虎陳至尊親挽鳳凰弓威行沙漠雷霆肅恩入河源雨露通自古豹韜尊廟略千秋碑碣紀神功其五黃金為闕玉為沙縵閣繒樓散綺霞洞府真人持絳節諸天菩薩獻香花盤登羊角千年棗碗貯龍芽萬壽茶三月正逢天慶日鶯啼春色滿京華其六萬壽詩七言律四首翰林院編修臣儲在文聖人久道自長年景運重逢虞夏前洋溢聲名川納海光輝事業日中天德容穆穆貞元合睿性安安厯數綿稽古帝堯今再見初回甲子六乘乾其一五紀勳華五位崇萬年謳頌萬方同數全易象先天裏義在周書無逸中主靜淵衷函歲月體元善氣亘蒼穹八荒壽域歸皇極棟牖松雲仰法宫其二緯武經文協雨暘蕩平王道拱明堂奠安海嶽乾坤正歌舞耕桑日月長四表職方勤貢賮九重典學靜垂裳從今聖厯知無極自有貞符紀百祥其三苑花如錦日邊開遙挹山光紫翠來景麗煙凝連綺陌歲豐人樂上春臺南薰遍奏鈞天樂北斗平臨萬壽杯三月年年雲五色小臣何幸到蓬萊其四萬壽詩七言律四首翰林院編修臣徐用錫星繞虹流六十年蹡蹡鵷鷺仰堯天爐煙近裊雲霄上扇影徐分日月邊陶淑萬方周禮樂平成億載禹山川彤庭何限華封祝寰海三多次第傳其一松雲棟牖俯丹除元氣含和在碧虛九野豐年綿甲子萬邦殊俗一車書玉階蓂莢占時遍金母桃花結實初此日梯航重譯至弧南星極拱宸居其二太和宇宙慶昌辰上苑岧嶤接綺闉輦路鶯花三月麗康衢簫鼓萬年春黃圖帶礪彌天壽紫府星辰與日新久道化成文治盛周詩棫朴頌皇仁其三三五淳風泰運清承恩珥筆際升平蓬萊莫罄添籌數嶰谷惟調擊壤聲金鏡凝暉初日照珠囊絢瑞五雲生更看北斗堯樽滿拜舞年年葵藿情其四萬壽詩五言排律四十韻翰林院編修臣陳似源華渚天開瑞金芝早發祥萬年花絢爛九陛日輝煌甲子星周紀融和候載陽莊椿初挺秀堯莢正含芳蓬島卿雲見瀛臺紫氣翔仙籌添海屋春酒進霞觴瑣闥朝初曙庭燎夜未央趨蹌朝鳳闕拜舞肅鵷行競獻延齡頌齊賡景福章午方增紀算閏歲慶綿長衢祝膺多祉塗歌遍八荒鴻圖超古聖上壽匹天皇保定乘時泰升恆際運昌皇仁垂宇宙帝德嫓虞唐繼述宏謨烈清寧若雨暘旦明恭對越禴祀夙齊莊行健時乾惕勤修務就將宸章懸日月睿藻煥縑緗筆挾虬龍勢霞飛翰墨光尊賢崇道學惇典正倫常禮樂高三代詩書纂百王壁經傳統緒羲易闡精詳厯律通淵奧璿璣發祕藏黨庠興齒讓山海集梯航式廓恢邊塞謀猷勒廟廊涵濡文教遠赫濯武威揚無逸圖屏上豳風繪座傍豐亨寧婦子祈報重耕桑免賦寰區遍蠲租大澤滂時巡舒碩畫治水愼隄防禹績歌清晏神功達混茫好生刑可措御下惠彌彰廣額羅多士遴才恤遠方河山聨帶礪土宇鞏金湯輯瑞來西旅稱藩自越裳嵩呼呈寶鑑華祝聚朝堂至治隆端拱羣工勵贊襄悃誠抒殿陛聞望仰圭璋曲奏簫韶舞漿分沆瀣香巍巍戴高厚悠久頌無疆萬壽詩五言律八首翰林院編修臣吕謙恆寶厯開基遠皇圖啓運昌光華齊日月禮樂煥文章道脉承千聖徽猷冠百王拜揚偕嶽牧萬壽祝無疆其一含哺貽恩厚遊衢沛澤汪租蠲春浩蕩厯卜道靈長四表光同被三農樂未央升平難頌德萬壽祝無疆其二聖學符洙泗先賢重紫陽千秋真繼統十哲許登堂闕里雲章賁新安寶額光右文逢盛世萬壽祝無疆其三南顧湯湯水深宫厪慮長已殊歸碣石未可塞宣房刻玉將河瀆搴茭問築防淮陽安堵慶萬壽祝無疆其四遠徼隂山北由來備享王奮螳聞小醜秉鉞度遐荒王者征無戰兵機授有方聲靈真赫濯萬壽祝無疆其五棫朴占王化茹茅慶士昌皇心常若渴賢路信無方騏驥天間集珊瑚鐵網張作人雲漢詠萬壽祝無疆其六聞道紅苖欵還同漢白狼星躔安翼軫樵牧靜湖湘舞樂陳干羽儀庭感鳯凰遠人頻稽首萬壽祝無疆其七符瑞昭華應鴻名垂拱彰仙盤承湛露河水出榮光通國歡酺飲千官獻兕觴普天同抃舞萬壽祝無疆其八萬壽詩五言排律六韻二首翰林院編修臣朱元英日出山川麗春深花鳥和萬年枝外舞三秀草邊歌隨仗臨丹地調音叶紫鼉五雲敷御座七萃給恩波鳳展開閶闔龍翔拱玉珂華封願無限福祿擁江河其一序轉三陽盛人看百福多漏蓮時日永階莢鳳麟和大化還同育文瀾自擁波西園收祕籍東序振靈鼉飲德康衢舞懷恩蓽户歌絳宫覘治象佳氣拂仙蘿其二萬壽盛典初集卷八十一
