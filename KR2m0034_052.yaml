body:
  text: 欽定四庫全書萬壽盛典初集卷五十四慶祝五貢獻一康熈五十二年恭遇皇上六旬萬壽普天同慶皇子誠親王𦙍祉等十三人率皇孫𢎞昇等二十六人謹擇吉日於萬壽節前預祝遐齡恭進萬壽之觴三月初九日暢春園淵鑑齋設宴諸皇子皇孫三十九人稱觴獻壽十一日暢春園淵鑑齋設宴諸皇子福晉皇孫女皇孫媳共四十三人稱觴獻壽十三日諸皇子設宴於皇三子花園皇上臨幸是日諸皇子作斑衣戲綵之舞稱觴獻壽十六日諸皇子皇孫恭進慶祝萬壽詩屛并慶祝品物諸皇子福晉皇孫女皇孫媳恭進慶祝萬壽繡屛衣服等物誠親王進萬萬壽無量壽佛壽星圖宋李小仙畫祝壽詩宋米芾書萬壽圖明吳偉畫南極老人星賦宋米芾書天保九如篇宋髙宗書圖趙千里繪律吕管窺一套五本通典詳節二套十六本宋板少微通鑑節要四套二十本壽山金母獻壽萬嵗山呼盆景萬壽九龍圖章壽比南山萬壽文房四寶石渠閣瓦硯萬厯雕香筆玉管筆盛萬厯窑筆瑪瑙水古墨萬厯八寶筆筒萬壽無疆六合同慶玉壺萬年喜慶雙龍捧壽玊杯萬年太平盤萬厯雕漆寶篆漢玉方鼎萬壽百乳彞三陽開泰法琅花尊天顔有喜法琅花瓶一十二洲拱宸環罍二儀有象花尊官窑龍鳳呈祥花觚萬厯窑萬年喜慶花尊均窑仙花獻瑞花籃嘉窑長生花果盤宣窑誠親王福晉進萬壽繡金五彩團龍天馬皮掛石青色萬壽繡金五彩團龍天馬皮袍棕色長春紬綿襖米色團龍捧壽銀䑕皮掛石青色江山萬年銀䑕皮袍天藍色長春紬綿襖灰色二龍捧壽青膁皮掛石青色二龍捧壽青膁皮袍香色長春紬綿襖米色五彩團龍捧壽綿掛石青色五彩坐龍捧壽綿袍天藍色長春紬綿襖灰色坐龍捧壽綿掛石青色坐龍捧壽綿袍灰色長春紬綿襖米色坐龍拱壽綿掛石青色萬壽無疆綿袍醬色長春紬綿襖灰色五彩坐龍捧壽夾掛石青色五彩坐龍捧壽夾袍古銅色長春紬夾襖米色坐龍捧壽夾掛石青色坐龍捧壽夾袍棕色長春紬夾襖灰色雙龍慶壽夾掛石青色雙龍慶壽夾袍灰色長春紬夾襖米色衲紗繡五彩金龍捧壽引手靠背坐褥一分誠親王長子𢎞晟進天祿萬年漢玊圖章萬壽蟠桃杯萬壽雙喜白玉花尊青鸞金母圖宋人畫萬壑松濤圖宋何浩畫神仙篇宋米芾書青綠夔耳敦仙果玉壺瓶宣窑萬花慶壽盤龍泉窑誠親王長子𢎞晟福晉進二龍捧壽綿掛石青色二龍捧壽綿袍灰色長春紬綿襖米色坐龍捧壽綿掛石青色坐龍捧壽綿袍棕色長春紬綿襖灰色誠親王次子𢎞曦進萬壽無疆一人有慶玉磬誠親王三子𢎞景進萬嵗山呼斑衣戲彩筆架誠親王長女進六合同春五行順序花挿萬年桃實圖誠親王次女進東方獻壽圖宋刻絲雍親王進萬壽海屋添籌玻璃揷屏萬壽鎏金鑲嵌集錦寶鼎萬壽法琅四方平安花尊天然靈芝獻壽仙桃盤羣仙慶壽壽山法琅盆景天仙祝壽合景宋磁花籃福祿壽三星仙山松竹盆景萬壽紫金葫蘆獻壽同山嶽花萬壽百祿仙芝天然盆景萬壽鸞翎鏤金㸃翠宫扇萬壽十錦吉祥四時盆景九龍捧壽羊脂玉花籃萬壽香靈芝瑞鶴八仙山進桃獻壽雕嵌東方朔仙山珊瑚彩石盆景天然萬年樹根達摩萬壽蟠桃葫蘆壽鼎萬壽無疆雕鑲玻璃鏡五老問壽圖戴文進畫仙山儀鳳圖唐寅畫蓬萊八仙慶壽圖宋刻絲靈山祝壽圖趙孟頫畫瑶池春會圖仇英畫南極呈祥圖仇英畫十洲仙侶圖唐寅畫靈山慶會圖仇英畫仙島方壺十二景人物山水松鶴圖圍屛雍親王福晉進五彩團龍拱壽天馬皮掛石青色五彩團龍拱壽天馬皮袍香色長春紬綿襖月白色萬壽團龍元狐膁掛石青色萬壽團龍白狐膁袍寶藍色長春紬綿襖米色團龍拱壽銀䑕皮掛石青色團龍拱壽銀䑕皮袍醬色長春紬綿襖米色繡五彩團龍拱壽綿掛石青色繡五彩立龍拱壽綿袍秋香色長春紬綿襖灰色壽字團龍綿掛石青色壽字雲龍綿袍香色長春紬綿襖魚白色素縀綿掛石青色團龍綿袍醬色長春紬綿襖魚白色五彩團龍拱壽夾掛石青色五彩團龍拱壽夾袍沉香色長春紬夾襖月白色壽字團龍夾掛石青色壽字團龍夾袍寶藍色長春紬夾襖米色素縀夾掛石青色團龍夾袍醬色長春紬夾襖米色鵞黄縀繡萬壽龍引手靠背鵞黄縀繡五龍坐褥塡漆萬壽無疆寶座雍親王長子𢎞時進如意麻姑爪雙螭捧壽鼻烟壺恒親王進無量壽佛四尊萬壽嵌玉寶座南極壽星仙山羣仙祝壽圖趙孟頫畫鶴鹿長春瑪瑙壺萬壽白玉彞爐九龍捧壽璽漢玉永保萬年章萬壽白玉盌萬字白玉花尊萬年梅瓶永樂窑萬年一統尊霽紅窑吉祥蓮花洗宣窑瑶池萬壽犀觴萬年青綠銅奩萬年青綠銅觚萬壽法琅方瓶萬年如意雙獅熏冠爐萬歳花嚢哥窑晝錦堂圖仇英畫仙山樓閣圖趙伯駒畫泥金道德經趙孟頫書萬年安信趙孟頫書長春帖行書蘇軾書行樂詞行書董其昌書朝陽仙鶴圖呂紀畫海天拱日圖宋旭畫恒親王福晉進萬壽團龍元狐皮掛萬壽團龍青膁皮袍繡龍捧壽銀䑕皮掛繡龍捧壽銀䑕皮袍萬壽團龍補天馬皮掛萬壽立龍天馬皮袍繡龍捧壽補綿掛繡龍捧壽綿袍盤龍獻壽綿掛立龍拱壽綿袍團龍捧壽補綿掛立龍捧壽綿袍繡龍捧壽補夾掛繡龍捧壽夾袍盤龍拱壽夾掛立龍獻壽夾袍素縀夾掛素縀夾袍萬壽繡龍引手靠背坐褥一分恒親王長子𢎞昇進萬壽白玉蟠桃杯萬壽漢玉雙喜花尊碧玉連環圖章華封三祝圖唐寅畫瑶池春會圖仇英畫萬年靈鶴圖吕紀畫八仙慶壽碗萬厯窑萬壽菱花瓶宣窑萬壽雙龍洗恒親王長子𢎞昇福晉進雙龍捧壽綿掛雙龍捧壽綿袍長春紬綿襖團龍捧壽綿掛團龍捧壽綿袍長春紬綿襖恒親王次子𢎞晊進萬壽白玉牌恒親王三子𢎞昻進八仙慶壽杯成窑恒親王四子進白玉連環福祿壽三星恒親王五子進壽桃白