body:
  text: 欽定四庫全書萬壽盛典初集卷二十四恩賚二加恩外藩一康熙五十一年十月初六日上允蒙古內五十旗王以下台吉他布囊以上於五十二年詣闕朝賀仍詔厚其資糧以示柔逺至意康熙五十一年九月二十日理藩院題為內五十旗王以下台吉他布囊以上來朝等事十月初六日大學士臣溫達等啓奏摺本奉旨元旦來朝蒙古諸王內或公事差遣或正務羈絆以及有病不可行動之外左右兩翼王貝勒貝子公台吉他布囊等一槩聽其前來爾等會同理藩院議奏欽此欽遵大學士臣溫達等會同理藩院議得左右兩翼王以下協理旗務台吉他布囊以上一槩聽其前來伊等來時其扎薩克台吉他布囊俱留一人令其護理印務不可荒廢地方再公主之子孫俱係親戚台吉等內有年歲大者亦令其前來其不能來之王貝勒貝子公扎薩克台吉他布囊每一旗令其來一台吉他布囊如有公事差遣正務羈絆有病不可行動者並年未及歲者俱不必令其前來又查從前元旦來朝人內未經出痘者不令前來今或令其前來或不必令其前來伏候聖裁等因具題奉旨依議其未出過痘之人不必令其前來欽此欽遵康熙五十二年王以下台吉他布囊以上赴闕朝賀元旦咸以今春恭逢皇上六旬正誕願得留住京師隨班慶祝上以時日尚遙特詔給與口糧俾得久住維時皇仁優洽羊豕魚蔬不時頒賜其倉厰所給計白米二千餘石老米四千餘石豆二萬四千餘石草一百萬二千餘束他物稱是飲和食德謳歌莫罄焉五十二年正月十五日上以衆蒙古醵金建廟熱河慶祝萬壽特頒諭旨減銀數之半併省安設喇嘛口糧毋致纍民以昭恩恤正月十五日科爾沁土謝圖親王鄂爾吉圖四十九扎薩克喀爾喀七旗厄魯特扎薩克等共一百二十扎薩克王貝勒貝子公台吉等奏稱臣等纍世荷蒙聖恩無從報答恭逢六旬大慶祝皇上萬壽永久公同集銀二十萬兩蓋造大廟每旗安設喇嘛一名念經永祝此安設喇嘛之所食口糧應用物件令各旗年年交送稱頌徽號等因啓奏本日奉旨朕為衆蒙古等在多倫諾爾處建造廟宇每扎薩克安設喇嘛一名今蒙古等既公同欲為朕建造廟宇準其建造但銀二十萬兩為數甚多十萬兩足矣令在熱河建造將喇嘛等食用俱在此十萬銀兩之內通融置地立産伊等所安設之喇嘛不用伊等之物若伊等每扎薩克每年交送喇嘛口糧路逺勞苦非一二年之事日月久逺借此支給安設喇嘛口糧為名必至用一湊十朕是大主惟願共享升平之樂非但喜諷誦嘛呢衆蒙古等當仰體朕心毋得擾纍在下愚民向因朕食羊肉每年令烏朱穆秦色登敦多卜王將牧放肥羊每送六隻供御經年食之心甚不忍將朕蘇魯克羊隻賞賜一萬又每年在喀喇沁處行圍因設筵宴用羊一百朕又下旨每年食爾等之羊欲賞爾等羊隻能養多少伊等回奏地方窄狹不能多養三旗能養羊一萬隨賞伊等羊一萬朕素性不愛索取即今喀爾喀所進好馬羊隻不可勝用今已限定數目且行幸端多布多爾濟額駙册王諾爾布喀爾喀地方之時朕下訓旨爾等勿因進朕馬匹向人求馬朕馬匹甚多爾等雖不進馬毫無介意況爾等即尋馬匹好馬斷然不得又何必求人若因進上向人尋取關係朕之聲名似此因進上擾纍下人之事甚多朕辦事五十餘年何所不知朕非同喇嘛喜向人需索也正月二十五日上幸暢春園西厰御樓頒賜科爾沁土謝圖親王鄂爾吉圖等二百二十六人服物有差科爾沁共九十一人土謝圖親王鄂爾吉圖賜貂帽一頂石靑色緞四團補銀鼠皮挂醬色蟒緞天馬皮袍一襲帶全副鞾襪各一雙鄂爾吉圖固山下五人親戚台吉卜達賜線纓涼帽一頂紗夾袍挂一襲親戚台吉馬禮親戚二等台吉阿穆禮瑚親戚未受品級台吉巴扎爾哥圖爾格克齊等四人賜紗袍挂各一襲卓里克圖親王巴忒瑪賜染貂帽一頂石靑色緞四團補綿挂香色蟒緞天馬皮袍一襲帶全副鞾襪各一雙達爾漢親王羅卜臧滾布賜貂帽一頂石靑色緞四團補青膁挂香色蟒緞貂鼠皮袍一襲帶全副鞾襪各一雙羅卜臧滾布固山下六十六人親戚協理台吉畢禮克圖公主之孫台吉阿濟格鄂齊爾吳爾嘏滿綽克圖巴雅爾圖賴巴親戚台吉噶爾璧甘梯沙額爾和圖畢里古達禮等九人賜涼帽各一頂紗袍挂各一襲親戚協理台吉畢里滾達賴公主之孫台吉畢禮克圖蘇朱克圖畢馬利阿穆瑚朗吳巴錫蘇珠克圖公主之孫未受品級台吉藏布薩禮達爾瑪親戚二等台吉沙薩阿木瑚朗畢里克圖親戚三等台吉阿林古桑拉禮達四等台吉齊巴垓塞不騰阿穆爾林古喇布南阿爾薩拉阿里古桑巴魯扎納喇錫巴雅禮席喇圗額爾和圗達布瑚爾喇竒特古思綽克圗三聘畢禮克阿克首阿穆瑚朗席爾哈額爾德尼山扎普杜貞爾扎卜諾穆齊阿禮喇瑚額穆爾錫第巴濟斯瑚朗親戚台吉蘇朱克圖吳巴錫綽克圖關保納遜阿穆噶納木喀滾機思扎卜羅卜臧阿禮古山拉什希布親戚未受品級台吉達錫拉納穆扎爾吳巴錫薩都瓦布庫等五十六人賜紗袍挂各一襲老披甲烏几賜斗蓬一件多羅扎薩克圖郡王鄂齊爾賜染貂帽一頂石靑色緞四團補銀鼠皮挂香色蟒緞綿袍一襲帶全副鞾襪各一雙多羅郡王諾捫額爾黑圖賜貂帽一頂石靑色緞四團補綿挂古銅色寧紬綿袍一襲鞾襪各一雙多羅貝勒阿必達賜染貂帽一頂石靑色緞貂皮挂醬色蟒緞綿袍一襲帶全副鞾襪各一雙多羅郡王伊錫班第賜貂帽一頂石靑色緞四團補綿挂香色緞綿袍一襲伊錫班第固山下三人台吉卜爾尼賜線纓涼帽一頂紗袍挂一襲協理台吉蘇馬第賜紗袍挂一襲老台吉阿努達賜緞夾袍一件多羅貝勒巴克錫嘏賜染海騾皮帽一頂石靑色緞綿挂醬色寧紬綿袍一襲鞾襪各一雙鎮國公圖弩滿賜秋帽