body:
  text: 欽定四庫全書萬壽盛典初集卷一百十一歌頌五十一生監諸臣二萬壽詩七言律八首監生臣查克宏海寓欣瞻日正中乘時乾德配蒼穹八方長養春風暖萬彚昭蘇聖澤洪繞闕祥煙丹鳳翥盈階淑氣紫芝豐周天花甲從今數南極星躔帶華嵩其一五采龍文御幄披薰風來拂萬年枝香凝寶露開銀甕色艷瓊漿泛玉巵天帝佑靈仙祚遠地祇效順海疆綏上蟠下際春常在旭日曈曨百卉宜其二巍巍勳業與天齊昭格知從聖敬躋堯酒滿斟宜介福舜琴頻拂洽羣黎南山松柏榮垂䕃北極星辰朗聚奎歌詠太平千載盛喜瞻嶽瀆鎮元圭其三翠華南幸沐殊恩豹尾叢中識至尊樓下瞻天顔獨霽江頭獻頌語猶溫一身踴躍留京國十載殷勤戀闕門葵藿尚知傾向日微臣自矢寸心存其四受天之祜萬斯年咸賀興朝玉厯綿麟趾呈祥公族茂兔罝被化庶材全爐飄瑞靄雲山曙壺捧仙籌霄漢懸願祝無疆歌雅什如岡如阜復如川其五到處惟聞鼓吹歌襦衣粒食湛恩多搜羅八愷宏開網震疉三苖靜偃戈暇日省方辭寶賂應時觀稼問嘉禾即今海晏河流潤猶警雞籌聽玉珂其六水鏡虛涵徹底澄容光普照協休徵靈蓍百尺青雲護異雀千羣紫禁騰甲子永隨坤軸轉精神長共海山增衆星環拱宸居壯萬里金湯瑞氣凝其七青陽煦噢盡敷榮閶闔齊來舞蹈聲鶴繞蟠桃銜海樹露漙仙掌握金莖花飛星佩千官集樂奏雲璈百伎呈競祝聖朝無量福皇圖一統萬年清其八天長地久圖賦有序監生臣黃千人欽惟我皇上神功聖德久道化成恭逢萬壽昌期普天同慶臣浙水愚䝉觀光上國伏念臣祖宗羲兩荷徵綸復命抄録著述宣付史館世沐天恩末由報效臣幼承家學略涉九章欣逢皇上欽明厯象闡發周髀廣招海內願學算法之士以宏教育自顧管窺有志蠡測常殷恭摹天長地久圖約之扇靣以志乾坤掌握之機用昭覆載一統之盛爰踴躍歡忭而係以賦曰粵鴻䝉之既闢分太極於兩儀覆穆清而健運載寧靜而順隨媧石補而五色亥步周而四維冒圓穹之渾蓋布方輿之分支或圭影而下測或衡數而上窺命羲和以規度合禹益以疇咨雖銅儀之可象孰職方之不遺必合清寧於得一乃協覆載於無私欽惟我皇至德參兩厯紀昌期恩周俯仰景星爛而慶雲流器車碾而銀甕朗甘露墜於上林醴泉湧於繡壤星輝南極應聖壽之延綿日絢東華沐恩波之泱漭人無一夫之不獲土無一物之不長然而蚩蚩者衆日戴天而不知天之高藝藝何知日履地而不辨地之廣於是草茅臣庶家學流長心儀象緯目擬元黃山川指畫脉絡分張乃含毫而睂舞展半靣而神揚思穿月窟布畫土疆蓋以上為天子壽而下以將愚賤之頌揚也其如天之長也中定樞星旁環列宿圓如卵心細如縠皺曾不假乎璿璣自包羅乎宇宙赤道與黃道交通太微與紫微輻輳五帝六甲之有理有條三階四輔之宜左宜右閣道河鼓之繽紛文昌武曲之騰凑若網之在綱如機之錯繡初無一星之或遺仰見天體之常覆其如地之久也高山為界瀛海周旋里道可計城郭瞭然帝居中而御極拱要衛而勾連鴨緑為發祥之地雞浪浮方物之船棧道飛梯之必悉金門南澳以相沿森如碁布劃若星懸翠攢雲嶺碧映珠淵於此彰幅員之廣大益以知地道之流謙爾乃上濟下行皇風永暢蟠際極於無窮禎祥萃於難量日星川嶽之垂博厚高明之象雖難擬諸形容或可得倣佛而想像潔圖繪於九如附華封而獻上萬壽詩七言律一首監生臣陳嵩環海車書奉一人萬年玉燭喜常新帝功浩蕩風雲會蔀屋汪洋雨露勻盛世夔龍爭向日光天麟鳳遍游春承平共聽嵩呼切處處霞觴進紫宸九如賦有序監生臣王宸俊欽惟皇帝陛下天行以健日照方升包元會運世之符太和永保建正直蕩平之極彌性常貞至聖無為統資始資生之德維皇有道開卜年卜世之祥立天立地立人紀干支而歷久得位得名得壽同尊富以兼隆返淳風於懷葛之間躋郅治於唐虞以上運璣衡而建極常存作所無逸之心彚玉帛以來朝式臻久道化成之候精明强固躬理萬幾喜起賡揚體聫一德物阜民安之際不倦先勞宵衣旰食之餘尤精探討借古人為淵鑑自成一代瑶函集多士以雲從毋假千秋金録宸章海溢馳古驟今御紙風馳掩前襲後既緝熙而昭文德更耆定而著武功消反側於域中削三藩而清疆宇靖氛祲於海外廓萬里而入版圖當夫小醜陸梁大軍撻伐萬乘從天而降六師剋日而還侯甸要荒莫不來王來享親賢樂利安於是訓是行猶且次第免租後先賜復周制千八百國家家無懸磬之嗟虞書一十二州歲歲有循環之詔由東西以訖南朔鑿井耕田率子姓而奉高曾飲和食德此開闢以來所未有實覆載以內之希逢者也夲仁心而仁政即壽國以壽民兕觥於以介睂志豳風之愛戴虎拜因而稽首樂化日以舒長蓋午是天中天子實誕生甲午而寅為人正聖人則頒厯壬寅調玉燭者五十二年兩儀合撰算椿齡於萬八千歲一甲初周聿彰聖敬之躋共識天顔之喜花迎劍佩定號恆春日暖旌旗長逢令節鶯歌燕語鳥吐綬以鳴歡獸舞鳳儀鶴載觴而獻醉履順而成豐豫泰交以應坤乾道契崆峒受萬物之生於各足書呈河洛備二篇之策而尤多兼清任和而得聖之時合動靜樂而為仁者壽日麗陽春之永雲開復旦之光臣宸俊呫嗶陋姿蓬茅末品父叨薇省曾邀詔祿之頒臣父丹林乙丑拔貢中書科中書舍人身厠雍宫久沐作人之化隨士民而獻壽共此戴高履厚之忱冀鉛槧以矢勤同在就日瞻雲之列生成永賴頌禱難忘雖負曝之私祇慙巴里而傾陽之願敢祝華封維百福之攸同擬九如而獻賦不勝惶悚彌切歡欣帝德陽和皇情隂隲盤奚假乎銘新室自揆之卜吉方中朗曜普天同傾藿之誠始旦光華薄海指扶桑之出何以祝之祝云如日八千之是春亦秋三五之有盈無闕竝太陽而照清虛掩列宿而光發越九霄懸鏡廣寒屬既望之宮一角垂鈎西厭認哉生之窟何以祝之祝云如月猶未已也其象如山下因之而仰止高不可以躋攀泰岱居五嶽之長崑崙聳兩大之間羅列衆峰洵不讓夫土壤翹瞻仙島已迥絶乎塵寰猶未已也其象如阜既盛而通且高以厚若天衢之坦坦曾何有於崚嶒夲王道之平平乃俯觀乎培塿於何名曲聖德斯符試以徵歌民財此有至於由山而及復得如岡謂有倫而有脊等無期而無疆自常生夫琬琰每待鳴於鳳凰當寧三台中天屹柱振衣千仞北闕垂裳由阜而及復得如陵下民不患其咨毋煩九載君子而欣既見似錫百朋禽果能仙音遍十方之界鴻曽占漸爻同五位之乘詎因為谷而始著何得與邱而竝稱也乃者庶績咸熙有功而利涉焉群工效職若濟而用作焉竝育於天奚分大德小德朝宗於海寧論三百三千繼岡陵而製頌又況之以如川含星漏日之竒溜雨參天之格長青青兮四時儼亭亭兮千尺延年而脂可頻餐貫歲而葉真不易維彼永貞式如松柏方登嶽以呼三亦衍疇而數九放勳堯而重華舜治邁唐虞博厚地而高明天德同悠久伏蓬蓽而戴君王進臺萊而歌父母思以將東海之籌行且如南山之壽萬壽詩五言排律八韻監生臣尤貞恆麗日浮丹殿和風拂紫宸萬年天子壽三月上林春仙杏花光發瓊芝草色新香煙凝瑞氣雅吹奏韶鈞幸際唐虞世欣隨祝頌人九重敷雨露四海覲君親鶴舞依雲仗嵩呼動地垠長為太平主愛養萬方民萬壽詩五言排律八韻監生臣徐時揚浩蕩仁恩大綿延厯數長乘乾行不息御世壽無疆至德超軒昊神功軼夏商山河鞏帝祚雲漢煥宸章禁柳青飛翠宫桃紅吐芳萬方欣祝聖九有率來王日轉銅溝麗風飄合殿香臣民共瞻拜恭進萬年觴萬壽詩五言律二首監生臣高輯南極星辰燦東瀛喜氣凝山河同帶礪日月竝升恆海屋籌無算蓂階厯更增普天咸慶賀萬歲福初升其一萬國操觚士于于向闕來文明方獻瑞宵旰正憐才五位推中極三星列上台誰言雨露逺咫尺近蓬萊其二萬壽詩五言排律一百韻有序監生臣邱起元皇帝御宇五十二年功德隆盛久道化成東漸西被靡有涯極維兹季春三月十有八日恭逢皇壽六旬聖節薄海內外臣工士庶輳集京師罔不歡欣抃舞仰祝萬壽無疆臣起元猥叨恩遇珥筆修書喜覲天顔躬與頌禱爰成五言長律詩一百韻載紀鴻庥雖摹繪萬一尚不足比於蠡測管窺或庶幾歌詠太平妄托於古賡揚之義謹拜手稽首以獻詩曰太和時保合天子壽無疆花甲欣初度春風樂未央升恆如日月福祿擬陵岡玉帛朝千國車書統八荒衣冠聫煥爛劍佩肅鏗鏘曼倩桃紛進安期棗敬將玉階凝瑞露金闕下神漿作貢饒騏驥來儀集鳯凰九天陳廣樂三殿裊奇香厯紀何能數籌添莫可量西池來紫氣南極耀星芒竊上千秋録同稱萬歲觴地天高厚久河海晏清長頌禱情怡恱鋪揚筆悚惶流虹徵泰運繞電啓嘉祥早識龍犀表還欽金玉相英齡登寶祚恭已秉乾綱問凛重闈切心懷百姓詳當年圖治語今日保民方孝足超前古誠能格上蒼慈寧常燕喜花蕚舊輝煌洵是隆尊養遙知永熾昌淳龎開富庶乾惕理隂陽吁咈侔堯舜疇咨邁漢唐五風和十雨親睦繼平章黍稷馨郊廟詩書教序庠傳心承道統拜手際明良淵穆符規矩威儀振紀綱好生刑已措克儉用彌臧旌善崇蘭芷懲貪去莠稂清忠標宋璟殘酷戒張湯麟閣圖熊虎烏臺樹桂薑施仁解網獸弭害摘飛蝗監夏卑宫室從周重稻粱上尊辭旨酒珍味省炮牂爇錦憎新樣焚裘叱侈妝八埏齊作息三蘖漫猖狂睿算除藩鎮神謨出廟廊整師昭撻伐遣將鋭鋒鋩倏爾精兵震頽然鐡甲藏幾時煩韎韐不覺掃欃槍南粵還符印西川靖戰場韔弓平八桂傳箭定三湘龍里銷烽燧螺江蕩野航旗降金馬外璧納碧雞旁執馘猶餘力歸心在扼吭臺灣還附籍土宇盡輸糧共服威靈遠羣安德教彰如何傳狡兔亦復效貪狼邊塞私侵掠梟雄失主張帝心憐蟣蝨賊意逞螳蜋師出非誇武親征慰衆望隂山窮鹿竄瀚海伏鱗僵但正渠魁罪仍矜醜類創七旬同凱奏三載笑戎裝指顧收諸部驅馳定一匡武功殊赫赫文教更洋洋重道巡東魯賡詩續柏梁勵臣書訓誥程士有文章學尚朱徽國才儲張子房百家函韻府萬彚譜羣芳玉軸宵盈案牙籖月一箱乾乾惟不足矻矻肯相忘聘盡耕莘尹徵空釣渭姜乾坤安且治宵旰視如傷屢下蠲租詔頻憐負土囊咨詢咸麥菽籌度只淮黃惠溥聞雷國恩先積水鄉六飛臨御壩五度閲隄防張福新通達歸仁善保鄣審形從仲閘就勢瀹楊莊底定由圖畫平成錫玉璋觀風歡士庶問俗歷蘇杭減額鹽餘竈寬征貨積商引年矜杖履肆赦恤桁楊擊壤村村稻繅車處處桑闢門羅竹箭側席廣宫牆子美鳴和盛齊賢備贊襄那圖司馬賦總達衮龍牀入罻皆鸚鵡升間盡驌驦東南偏帝澤太乙拱文光幾暇親三管書成動十行龍跳竝虎卧鳳翥復鸞翔落紙煙雲繞臨池風雨忙鋒回凌魏晉戈轉逼鍾王瀟灑兼思白風流壓子昻臨摹神倣佛題署勢淋浪賜遍湖山寺榮傳翰墨堂多能天縱聖久道壽從康賜復農熙皥加科士濟蹌三多供御宇十有見垂裳不允誇嵩嶽翻教祝雨暘撝謙頒諭㫖抑畏却琳琅蕩蕩期宗海兢兢謂覆霜作人歌棫朴宜福誦鴛鴦自幸生蓬蓽深慙侍縹緗追隨香案吏濫冒校書郎碧玉杯初獻金莖露欲嘗矢忠應砥礪感德自騰驤萬八千餘歲維皇接九皇萬壽詩五言排律十二韻監生臣顧祖望端拱乾坤合謳謡品類通八埏齊獻壽萬福實攸同帝念從民欲天庥集聖躬勳華稱美備德業等崇隆敷教敦三事勤民叙九功五方雖異俗四海會朝宗教育寧遺類升平幸樂逢花明御溝水香暖禁城風行健原無息流膏夲自洪微臣疏翰墨引領向丹楓樂聽簫韶發杯傾琥珀紅願言隨百獸拜舞共呼嵩萬壽詩七言律四首監生臣沈曾佑寶厯欽承邁帝王太平天子正垂裳巍巍聖德高難量皥皥民風樂未央霞起赤城丹陛煥風來太液碧蓮香盛朝事事皆奇瑞協應輿圖帝運昌其一深宮幾務日孜孜乾健天行不息時水火工虞煩睿慮雷霆雨露總恩施和恆萬載臻仁壽禮樂千秋奉鼎彞自是九重凝瑞靄春風已遍上林枝其二佳氣葱蘢溢帝京天家燕喜百祥生三多五福迓純嘏玉振金聲集大成紫掖碧梧儀彩鳳丹墀緑柳囀流鶯爐煙萬縷飄香篆結就晴雲擁上清其三嵩嶺聲聲萬歲稱普天歌頌祝升恆絪縕紫氣龍樓曉靉靆紅雲鳳閣凝河洛圖書呈聖瑞蟠桃火棗協嘉徵皇王福壽真無算天與長春日與增其四萬壽詩五言律二首監生臣沈章太平欣有象天子慶無疆日麗銅龍彩雲飛玉佩祥鳳鸞頻度曲桃李共舒芳春色蓬萊遍臣工進壽觴其一呼嵩聲動地舞抃感皇仁花映瀛洲燦波流太液新萬方稱萬壽三祝慶三春日月岡陵頌純禧集紫宸其二萬壽詩五言排律八韻監生臣顧乘智帝治中天日文明煥百王金甌垂永固玉厯紀綿長聖壽開南極皇仁溥萬方敷天欣衽席多士慶冠裳王路驤騏驥巖廊裕棟梁堯年初甲子豳俗早稱觴純嘏如川至隆恩挹露瀼歡迎當此日衢壤詠陶唐萬壽詩七言律一首監生臣項鋐聖人首出洵天生體健承乾道永貞神瑞當年驚電繞貞符此日際河清堯天浩蕩形容泯舜日雍和愛戴誠萬衆歡騰盈壽域躋堂朋酒盡稱觥萬壽詩七言律四首有序監生臣繆日芑皇帝御極五十二年時和世泰物阜民安薄海內外罔不感恩戴德歌詠升平恭逢萬壽聖誕天下臣民扶老擕幼梯山航海馳赴闕下獻萬年之觴進九如之頌臣幸生聖世同沐皇仁更念臣祖臣父曾叨甲第忝侍從之班歷卿尹之任受聖朝之殊遇效百職以宣猷更䝉天語褒嘉頒賜匾額御書煥發傳為瑞寶聖恩高厚纍世靡窮臣葑菲下材蘚苔賤質捐糜有志報稱無階隨萬姓之嵩呼近帝光於北極同兆人之雀躍慶聖壽於南山技愧雕蟲歌成擊壤謹稽首頓首而獻詩曰皇極禎符集聖躬紅雲旭日映曈曨百千甲子年方始億萬春秋位正中鳳翥麟翔遊禁苑花明栁揚被和風臣民歌祝升平久淑氣芳華四海同其一化成久道嫓中天玉殿垂衣繞瑞煙萬壽無疆時際泰一人有慶運承乾瓊枝發囿凝甘露仙液流霞出醴泉此日康衢齊抃舞好從熙皥樂堯年其二慶惠行施屢賜租雨暘時若兆豐腴豳風日暖柔桑沃禹甸春深瑞麥敷九市華樽盛琥珀千行寶炬插珊瑚詩歌令德宜嘉樂願進仙人五嶽圖其三衆星歷歷拱辰居神武維揚播廣輿貢矢貢琛歸島嶼來王來享達舟車八紘臣庶陳三祝萬國衣冠頌九如爛熳卿雲欣復旦扶桑共仰日升初其四萬壽詩七言律一首監生臣朱丕麟旭日初升碧海東蓬萊春滿蘂珠宫萬方爭獻華封祝八表欣看壽域同玉軸早符軒后厯璿圖咸樂帝堯風太平天子當陽日拜手嵩呼達聖聰恭祝萬壽無疆頌有序監生臣張鍾臣聞華封之祝有三斂祉必歸大德洪範之福曰五迓休端在聖人蓋剛柔悉協益符兩大之貞恆而健順咸宜自卜萬年之秩祜瞻泰階之既啓慶久道之化成欽惟皇帝陛下德夲性成質由天縱出東方而秉震應五百歲之昌期居南靣以乘乾開億萬年之寶厯崇效天卑法地高深合撰既氣協乎清寧仁以育義以正德化覃敷更聲振乎南朔蓋展矣建其有極而粹乎允執厥中者也乃猶宵旰不遑勵精靡懈體乾乾於宥密存翼翼於淵微由是治定功成恩深澤溥宜乎登咸三五超軼古今兹當御極五十二年恭遇萬壽六旬令節聖甲初周普天同慶執玉瑞者赤芾金舄咸懷獻壽之忱越山海者白叟黃童共有躋堂之願獻祝則嵩呼動地揚休則虎拜盈廷誠亘古所希聞生民之未有也臣欣依日下慶比寰中雖峻德宏猷有慙蠡測而稱觥獻壽彌切葵傾爰拜手稽首而獻頌焉頌曰穆穆我皇文明濬哲克憲於天維敬作極四隩既奠九圍用式聿求厥寧乃罔或逸稽古式訓聖而多能摛詞掞藻錦爛雲蒸孝思不匱承歡慈幃應侯順德萬民化之田禽利執撻伐用彰白旄黃鉞綏靖多方釁甲升雍聿昭文治益額增科譽髦斯士復租寬賦勤恤民依恩流蔀屋喜溢黔黧刑以弼教罪疑惟輕圜扉草秀肺石風清既治且寧虛懷若谷所其無逸求民之莫五十二載久道涵濡惟皇立極治嫓唐虞日在婁星姑洗中律壽域宏開聖誕屆節近而宫府遠而郊圻外薄四海漆齒雕題搢笏秉圭扶鳩騎竹載道歡呼同聲致祝萬壽無疆萬壽無期惟我聖皇作君作師百祿是遒百祿是總於萬斯年惟皇垂拱海籌添屋長庚耀樞小臣獻頌敬繼歌衢萬壽盛典初集卷一百十一
