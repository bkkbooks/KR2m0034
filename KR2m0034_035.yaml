body:
  text: 欽定四庫全書萬壽盛典初集卷三十五恩賚六開科三巡撫福建等處地方提督軍務都察院右副都御史臣覺羅滿保謹題為聖壽無疆皇仁廣被懇疏代題恭謝天恩事據福建布政使司布政使金培生詳稱據闔省鄉紳鄭開極舉人貢生監生生員鄭仁陳嘉誠等呈前事內稱欽惟我皇上功高九有德協三才謨烈開天玉帛來雕題漆齒勳華炳日聲名極瀚海流沙造士右文學校普菁莪之化崇儒重道黌宫興棫朴之歌五十載海晏河清共戴太平天子億萬年日升川至爭祝有道聖人兹康熙五十二年恭遇萬壽正誕特加鄉㑹恩科多士嵩呼萬方雀躍真千古未有之竒逢實萬世僅覯之曠典也極等跪讀恩綸曷勝歡忭伏念極等幸生盛世適際昌期沭聖化之煦濡三多是祝被皇恩之浩蕩萬祀常新合情籲懇具題代謝天恩俾海嶠儒生得露葵忱於鳯闕全閩下士獲通蕪悃於螭坳等情到司據此該本司布政使金培生看得世際升平慶康熙於九域時逢泰運躋仁壽於萬年粵稽虞帝作人爰奏薰風之治周王壽考聿昭雲漢之章欽惟我皇上德配清寧壽同河嶽旁求俊乂稱有道之昌期掄拔英才頌無疆之瑞應兹康熙五十二年恭遇皇上萬壽正誕允直省士子之請開萬壽鄉㑹之科普天共慶文光射斗宿之區多士同春瑞氣拱紫垣之曜理合據呈轉請代題陳謝等因到臣欽惟我皇上稽古右文體元建極聖神廣運乾坤符悠久之徴壽考作人日月動光華之照化溥於詩書禮樂薄海同風頌興於棫朴菁莪敷天遍德南金竹箭爭呈珍異於王家威鳯祥麟共效羽儀於盛世乃帝壽方增之㑹正人文大啓之時寶厯無疆初應昌期於周甲聖人有道預頒異數於寰區特俞多士之嵩呼爰舉兩闈之曠典自今伊始永作成規每遇十年用加一次春風省院鹿鳴高協笙簧秋雨容臺雁塔爭題姓氏緬兹率土共沐恩波惟此全閩尤涵聖澤玉藴羣峰之表九曲朝輝珠懷環海之中十洲宵媚從此日升川至三台常拱於北辰鳯起蛟騰五緯恆昭於南極既據布政使金培生詳懇代題前來臣不敢壅於上聞謹㑹同閩浙總督臣范時崇合詞代題恭謝伏乞皇上睿鑒施行巡撫山東等處地方督理營田兼理軍務都察院右副都御史加五級臣蔣陳錫謹題為聖主壽考作人曠典歡騰多士懇賜代題恭謝天恩以逹輿情事據濟兖東青萊登六府舉貢監生員李壽彭李仁壽等呈前事內稱欽惟我皇上德協清寧道隆今古聲靈赫濯闢百王未闢之封疆政教光昌興千古未興之禮樂五十載虞門四闢籲俊無方數十科周制三升登賢有路固已江蘭湘芷無非王者之香荷版投綸盡是聖人之佐兹五十二年恭遇皇上六旬萬壽國慶舒長會風虎雲龍而類聚士歌仁壽萃岡陵松柏以駢臻特沛洪恩於二月鄉試八月會試凡遇萬壽正誕即加一科億萬斯年永為定例桃花浪暖湧出千層桂子香清飄來萬里一人參三才而竝永綿厯無疆多士應一德之旁求瞻顔有喜萟林慶溢舉頭見五色之雲朝士感深拜手進九如之頌壽彭等獲生齊魯教久被乎杏壇喜近雲霄恩先霑乎楓陛禮隆闕里欣瞻鑾輅之遙臨念切民依數沐恩綸之下沛昨秋廣額已慶連茹來歲增科更欣樂育沐𢎞膏於無已蕩蕩難名際泰運之極隆巍巍莫贊得名得壽但有詠歌寖熾寖昌尤深抃舞為此具呈恭謝伏乞代題等情到臣欽惟我皇上功高湯武德邁唐虞重道崇儒率土仰光華之治右文稽古普天霑教育之恩恭逢聖壽昌期特舉掄才曠典每十年而增一試開億萬祀壽考之長以一歲而試兩科萃十五省人文之盛帝德與天同運皇猷如日初升朝野騰歡儒林動色兹據闔省士子籲懇代為題謝臣不敢壅於上聞臣謹會同學臣陳恂合詞具題伏祈皇上睿鑒施行巡撫山西太原等處提督雁門等關軍務兼理雲鎮都察院右副都御史加四級臣蘇克濟謹題為呈請代題恭謝皇恩事康熙五十一年六月初三日據闔省舉貢生員劉璋等呈稱欽惟我皇上道冠古今德參天地體乾行而出治逺過周厯千年本離照以崇文快覩虞門四闢固已人登壽域普天共效嵩呼世躋春臺率土齊霑帝澤矣乃六十年之景運方地久而天長十五國之人文復雲蒸而霞蔚特允章縫之請遂頒渙汗之音曠典𢎞開恩綸廣沛設特科於制科之外搜竒士於多士之中從此臺敞黃金明月與夜光竝進班聯玉笋鳯毛兼麟角齊收二月桃花翻同丹桂中秋紅葉疑是杏林璋等久沐殊恩彌深歡忭欣逢異數愈切頌揚但草野微忱無由上逹伏懇俯准輿情代題恭謝庶億萬斯年長沐菁莪之化而八千為歲永來嵩嶽之呼矣等情到臣欽惟我皇上與天同運如日方升奮武揆文聖教誕敷於四海崇儒重道宸章光耀於萬方兹康熙五十二年恭遇皇上六十萬壽華封有祝厯服無疆特行鄉會兩科用彰太平盛事嗣後每遇十年皇上萬壽正誕即加一科永為定例此真千古未有之曠典也恩綸到晉通省士子無不歡忭踴躍感激皇恩浩蕩欣瞻聖壽升恆紛紛具呈公請代題恭謝天恩前來臣不敢壅於上聞謹會同學臣孔尚先合詞具題伏乞皇上睿鑒施行巡撫河南等處地方提督軍務兼理河道兵部左侍郎兼都察院右副都御史加四級臣鹿祐謹題為萬壽之特科肇舉多士之欣戴彌深恭疏代題叩謝天恩事據河南通省紳士原任吏部尚書宋犖工部侍郎李元振內閣學士兼禮部侍郎張榕端舉人貢監生員閻式礦李永福等呈為萬年之曠典特加九土之士心齊奮敬懇代題恭謝天恩事欽惟我皇上化成久道時際文明舜日方長咸慶䕫龍為佐商霖是用益賡仁壽無疆民務農桑賀升平者由中及外士陶禮樂沐教育者軼後超前尺璧寸珠搜羅遍夫四海春華秋實採掇及於兩河兹康熙五十二年恭遇萬壽聖誕特賁恩綸於二八月舉行鄉會試嗣後每遇十年萬壽正誕即加一科永為定例隆恩溥浹多士歡騰犖等實感高深未能報答惟願聖壽彌增於有永皇圖鞏固於無窮伏乞恭疏代謝天恩等情又據各司道據呈轉詳到臣欽惟我皇上如日之升與天無極綜文武聖神之盛德邁百王合位祿名壽之全躬膺多福徽音久著載歌棫朴之作人純嘏常新咸喜梧桐之鳴鳯聖澤遍敷雨露特加殊渥於八荒庶士齊奮風雲愈固太平於萬載恩綸大渙士子歡呼仰戴如天感激無地理合恭疏題報伏乞睿鑒施行巡撫陜西等處地方贊理軍務都察院右副都御史加三級紀録十三次臣永泰謹題為聖主萬壽無疆人文千載竒遇籲請代題恭謝天恩事康熙五十一年七月二十五日據西延鳯漢興五府州屬舉貢監生生員周延壽朱輔煌等呈稱竊惟陜西鄙處邊陲去京遙逺前者䝉恩給種哀鴻興還集之思嗣後賜復蠲租庶類有樂胥之慶由是風氣蒸蒸而日上人文蔚蔚而改觀户禮樂而家詩書樂辟雍而聞鐘鼓五十二年值我皇上萬壽正誕宏開鄉㑹恩科四海英流共切二天之戴三秦逺地亦邀一視之仁久道化成望天章而歌雲漢百年必世頌棫朴而詠菁莪從此每遇十年思皇驤首於王路恭逢萬壽羣英雲集於天家多士一心食德敢忘圖報君門萬里下情無以上陳伏乞俯賜題謝以逹輿情等因到臣據此欽惟我皇上德竝高深功同化育太平至治開萬年有道之祥異數掄才彰壽考作人之盛惟兹康熙五十二年恭逢皇上六十正誕普天同慶曠典特行十五省邀破格之𢎞恩億萬載垂無疆之定例從兹周楨益茂士林竝效嵩呼舜壽無疆臣庶咸思華祝兹據士子合詞呈懇題謝又據布政使魏圖布按察使薩穆哈㑹詳前來臣不敢壅於上聞謹繕疏代題伏乞皇上睿鑒施行巡撫甘肅寧夏臨鞏等處地方贊理軍務兼理茶馬都察院右副都御史加二級臣嶽拜謹題為萬壽𢎞作人之化重熙沐千載之恩公籲代題以伸謝悃事康熙五十一年七月十八日據甘肅寧夏平慶臨鞏舉人貢監生員吳郡尹誥等呈稱竊郡等生長西陲遭逢盛世橫經負耒安耕鑿而戴堯天吹雅歌風樂升平而遊舜日自荷頻年廣額士氣罔不奮揚驟聞來歲賔興奎宿因而倍煥欽惟皇上文武聖神固已東漸西被祿位名壽宜其地久天長爰於明年二月特開鄉試八月特開㑹試陶成造就凡成人小子靡不眉宇飛揚教養涵濡即老生宿儒亦各神情鼓舞況垂為定例永逺遵行自十載而至億萬載聖壽遐昌由一科而加數十科人才輩出此真盛世之殊恩亘古所僅見者也所有感謝下情乞祈上逹天聽等情到臣據此欽惟我皇上聖學如天皇猷炳日建中表極八埏文命覃敷詣聖入神億載光華茂著崇黌儒以重道澤及前賢親廷試以掄才恩流多士康熙五十二年恭逢皇上六十萬壽正誕之辰特行鄉㑹兩試嗣後每遇十年即加一科億萬斯年永為定例斯誠太平盛典千秋曠事也兹據闔省士子感激皇恩環集臣署歡欣抃躍望闕叩首齊祝萬壽無疆并具呈懇請代謝出自真誠理合恭疏代題以聞巡撫廣東等處地方提督軍務兼理糧餉都察院右副都御史臣滿丕謹題為恭謝天恩代逹輿情事康熙五十一年八月初三日據鄉紳鄭際泰等舉貢監生生員何有略等呈為萬壽開科千古竒遇士民感沐殊恩懇請代題恭謝事竊惟三年取士乃國家之常經一道同風實帝王之盛治何幸干支癸巳之歲正值皇上花甲之周特設恩科欣逢曠典沛澤倍深於雨露作人實冠於古今萬壽無疆已增十五省太平之象一人有慶自綿億萬年壽考之科仰五嶽之峯難形厚德測八溟之水莫罄深恩泰等身際唐虞恩霑覆冒擬申封祝莫罄輿情懇祈俯准下悃代逹宸聽等情到臣欽惟我皇上學貫古今功同覆載崇儒重道六十載之文運彌新壽考作人億萬年之科名特設不惟宫牆多士欣逢曠典之加而且草野遺賢羣仰聖朝之化兹據紳襟等趨赴省城踴躍歡呼焚香叩首環臣衙門懇請代題恭謝天恩臣謹㑹同兩廣總督臣趙𢎞燦合疏具題伏乞皇上睿鑒施行巡撫廣西等處地方提督軍務兵部左侍郎兼都察院右副都御史加三級臣陳元龍謹題為天厯無疆人文有幸謹據輿情代題恭謝皇恩上祝聖壽事欽惟我皇上治邁唐虞道綜洙泗文思光被歷五十餘載之漸摩德化覃敷開億萬斯年之樂育升平既久戶盡絃歌作養恩深人知磨礪所以山陬海澨皆率教於詩書即使蠻土洞獠亦回心於禮義欣逢聖主之在御共慶壽考之作人亘古以來未有盛於今日者也臣於本年六月初一日准禮部咨文內開康熙五十二年恭遇皇上萬壽正誕照順治丙戌科通行鄉試己亥科特行㑹試之例於二月內舉行鄉試八月內舉行㑹試嗣後每遇十年皇上萬壽正誕即加一科永為定例仰荷俞㫖通行等因臣即出示曉諭并檄布政司轉行各府州縣遍行曉諭俾逺方士子早聞曠典共戴殊恩隨有桂林府屬貢監生員唐時儒等歡呼環繞呈稱廣西地最僻逺人皆朴陋邇年仰䝉我皇上撫綏澤溥作養恩深讀書之士漸多觀光之念頗切今年㑹試廣西於中式一名之外復䝉欽賜進士一名逺方聞之無不踴躍思奮兹明年二月又䝉特恩開科從此蠻烟瘴雨之鄉漸覩棫朴菁莪之盛不覺歡聲動地惟願聖壽齊天但感激下情無由上逹懇乞代題等情續據布政使黃國材詳稱據桂平慶梧潯栁太思南等府申據各屬士子具呈籲請代題恭謝天恩等情到臣該臣看得遐方慕化慶文治之彌隆率土呼嵩綿寶厯於莫量似此羣情歡忭不敢壅於上聞理合據實具疏代題伏乞皇上睿鑒施行提督四川等處學政翰林院編修加一級臣王誥謹奏為恭逢萬壽開科普天頂祝懇請題謝以逹輿情事康熙五十一年七月初八日據通省舉人貢監生員趙瑄李正茂等呈前事呈稱竊惟北辰瞻文教覃敷南極偕奎光並永恭惟我皇上聖神文武濬哲欽明風動時雍薄海沛升平之澤禮明樂備遐陬均陶淑之仁乃者壽域𢎞開共效升恆之頌恩膏廣被務羅廊廟之材歌革鹿於春風杏林艷發宴瓊林於秋月桂樹香飄萬口歡騰多士重霑化育一時傳布九圍仰慶岡陵懇乞俯察輿情代疏題謝等情到臣欽惟我皇上文明御世仁壽承天統萬國之衣冠道翔化洽萃百王之禮樂治定功成猶乘萬幾之餘特闡五車之藴宸章璀璨布家絃戶誦之書睿鑒精微啓內聖外王之學彚征連茹四海恭際昌期壽考作人三殿新頒曠典凡兹多士悉荷恩榮况屬邊陲彌深愛戴從此卜年卜世永垂選士之規為春為秋盡效封人之祝矣理合繕疏代題伏乞皇上睿鑒施行巡撫雲南兼建昌畢節等處地方贊理軍務兼督川貴兵餉都察院右副都御史加七級臣吳存禮謹題為聖主當萬壽之昌期多士沐千秋之曠典呈懇代題恭謝天恩事據通省舉貢監生生員熊載趙璽等合詞呈稱伏遇我皇上握乾符而御世秉離照以當天文德敷於八荒令典垂之奕祀𢎞開壽域配天地而無疆特沛恩波詠菁莪而不息桃花浪暖羣霑蕊榜之春桂子香清分錫紅綾之餅自此祥徵雲漢長庚炳耀於層霄行看光射斗牛奎壁騰輝於東井載等邊荒下士久沐深仁聞命自天感深率土伏乞俯念微誠恭疏具題恭謝皇恩等因到臣欽惟我皇上聖神立極覆載同符帝德當陽萬國祝齊天之壽皇猷煥日千年頌育聖之祥欣當華渚之期特舉闢門之典堯齡益茂沛膏雨於乾坤舜旦增華普文明於宇宙真從來所未有千古所難逢自此東西南朔之人益鼓忠孝尊親之志願歌聖壽同地久而天長爭祝皇圖並川深而嶽永謹㑹同雲貴督臣郭瑮合疏具題伏乞睿鑒施行巡撫貴州兼理湖北川東等處地方提督軍務都察院右副都御史加三級臣劉䕃樞謹題為萬邦欣聖壽之方升多士感皇仁之誕被仰祈題逹恭謝天恩事據貴州布政使司布政使遲炘詳稱據貴州闔屬紳襟萬民欽王萬年等呈稱欽惟我皇上德叶乾坤功侔日月厚生正德躋編氓於仁壽之安重道崇儒迪髦士於文明之盛蓋王者鍾靈而出宜集慶夫三多况聖人拔萃以生必化隆乎九有曩者格中破格青襟已廣棘院之名科外設科白衣亦直玉堂之署猶復特恢解額大啓賔興洵乎普天咸頌昌期僻壤亦欣文治矣兹值元辰之初度猶䝉恩詔之𢎞頒浪暖桃花看俊造龍門早躍香飄桂子喜英才鴈塔聯標由首善以迄遐荒並邀曠典自周甲以臻萬祀長荷殊恩民欽等幸際休明躬承雅化縱黔山小草難同楩梓以爭榮而富水纖鱗亦附蛟龍而思奮既幸觀光有路曷禁華祝惟誠伏懇俯念輿情轉請題逹等因到臣據此該臣看得惟天帡冒九州霑茂育之仁如日照臨萬物切升恆之慶既久道之化成自人文之蔚起雲蒸豹變永作國家之楨連茹彚征常收梁棟之用自此萬壽無疆日見人文丕振不惟十五省歡呼踴躍沐化雨與春風固應億萬年沐浴詠歌慶天長與地久矣謹恭疏代題伏乞皇上睿鑒施行總理糧儲提督軍務巡撫江寧等處地方都察院右僉都御史臣張伯行謹題為恭逢萬壽昌期等事該臣看得久道化成四海荷一人有慶闢門籲俊八埏頌萬壽無疆崇文既特設巍科重武亦並頒曠典欽惟我皇上聖教𢎞敷帝謨廣運恭遇楓宸六十之寶厯載拔干城欣占黼座億萬之璿籌永開蕊榜從此科名展綵皆由壽考作人宜乎士子辨兵莫不呼嵩抃舞環請代謝天恩也兹據布政使金世揚詳報前來相應恭疏代題伏乞皇上睿鑒施行巡撫山東等處地方督理營田兼理軍務都察院右副都御史加五級臣蔣陳錫謹題為聖壽之洪恩普遍武科之曠典宏開公籲代題以申嵩祝事據濟兖東青萊登六府武舉王永祥等武生張壽昌等呈稱我皇上道冠百王德隆五帝恭逢五十二年皇上六十大慶各省武生准於四月鄉試武舉十月㑹試皇猷重道鄉與㑹一歲兼行壽考作人文與武兩途並進曠典垂為定例長歌萬壽無疆遐方悉荷殊恩羣頌一人有慶愚賤下忱無由上逹伏懇代題等情到臣欽惟我皇上功髙千古學貫三才文德覃敷率土沐光華之盛天威休暢遐方仰耆定之勳恭遇萬壽昌期特舉掄才曠典每十年加增一科合文武永為定例巍巍帝德𢎞開萬年登進之階蕩蕩聖恩永宣壽考作人之化聖德與天而同運皇猷如日之初升朝野騰歡旗常動色兹據闔省武舉武生紛紛環繞臣署籲請代為題謝臣不敢壅於上聞謹㑹同學臣陳恂合詞具題伏乞皇上睿鑒施行巡撫河南等處地方提督軍務兼理河道兵部右侍郎兼都察院右副都御史加五級臣鹿祐謹題為萬壽開科曠典疉沛紳士辨目感戴彌殷謹公請代題叩謝天恩事據武舉趙元璧武生杜進才等呈稱欽惟皇上文德覃敷武功赫濯車書遍於萬國懷德者無不畏威聲教訖於九圍瞻雲者皆思就日先文後武大開籲俊之門一視同仁再舉賔興之典兹康熙五十二年恭逢皇上萬壽正誕特沛恩綸於四月十月舉行武鄉㑹試嗣後每遇十年萬壽正誕亦照文場之例即加一科隆恩溥浹士子歡騰璧等感戴髙深無由報稱謹焚香頂祝惟願聖壽彌增皇圖永固伏乞俯鑒輿情恭疏代題叩謝皇恩等情到臣欽惟我皇上文教覃敷武功赫濯崇儒重道屢廣科名明目達聰𢎞開籲俊既棫朴之兼收恩流魚麗復韜鈐之並進澤沛罝越十載而一行歷萬年以為例是以恩綸下賁歡騰騏驥之林盛典方頒喜溢赳桓之隊既據各呈請題謝前來臣不敢壅於上聞理合恭題代謝伏乞皇上睿鑒施行萬壽盛典初集卷三十五
