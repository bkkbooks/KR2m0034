body:
  text: 欽定四庫全書萬夀盛典初集卷九十一歌頌三十一詞臣二十三萬夀詩五言律十首翰林院庶吉士臣何應鰲四海升平日千祥會集時皇圖綿寶厯帝祚永鴻禧甲子周方始貞元運在兹微臣欣拜手天保擬陳詞其一天縱多能聖𢎞開有道長授時齊厯象敷土奠金湯理闡羲文奧光增孔孟堂萬幾清晏暇揮灑麗奎章其二郊祍升香肅蒸嘗薦豆虔巍巍光嶽峙靄靄慶雲聫源逺宗功茂流長世德綿天人同感應誠敬萬方傳其三聖孝髙千古皇仁式九圍婉容承色笑愷樂布光輝玉液陳春殿金罍燕瑣闈太和同保合淑氣正芳菲其四禮樂京華盛聲名海甸遙梯航來萬國干羽格三苗共仰文心燦還看兵氣銷不矜弧矢利九奏叶簫韶其五臨軒咨吏治入境採民風舉錯歸乾斷甄陶仰化工閭閻敦禮讓嶽牧盡和衷朝野騰歡日岡陵祝聖躬其六已慶羣生遂尤思大澤深屢施寬賦令時厪下車心覆載同天地裁成邁古今薰風能解愠長拊五絃琴其七草野安耕鑿膠庠著典型籍田勤秉耒講席重談經大地滋甘雨中天見德星萬邦歸教養喜起軼虞廷其八崇儉財恆足垂恩賜每頻彤弓歌屢奏湛露燕長新粟帛優耆老衣裘逮下臣盛朝熙皥象同享太平春其九聖神文武后蕩蕩實難名快遇長春節欣攄效順情年光三月麗宫殿百花明共祝齊天壽嵩呼滿鳳城其十萬壽詩七言排律二十六韻翰林院庶吉士臣林昻聖德覃敷匝八方綿綿景祚萬年長天開寶厯符元會化啓鴻圖集篚筐紫氣絪縕雲是慶青陽鼓動物皆芳協風披拂農祥應甘露霑濡穡事忙兩曜騰輝聨璧彩五星同舍貫珠光山川封濬同堯舜土宇恢宏陋漢唐久矣百神皆獻瑞猗歟四海盡來王旅獒效命通西極馴雉輸忱貢越裳人仰中天日方午政孚六合運初昌勤勞不覺常宵旰訓誥皆堪作表坊文教優優超夏禹武功烈烈駕殷湯聖經此日傳精奧正學千秋賴憲章綵簇霞飛珍麗藻銀鈎鐵畫捧琳琅天弧拓處邊陲靖木鐸宣時大化翔才俊連升天地泰賡歌交警股肱良省方問俗民風悉勵節懲貪國法張海外珊瑚多網得人中騏驥盡雲驤仁流圜土無拘繫租賜窮黎有蓋藏手握三才參造化人遊四序並春陽嘉辰聿至休徵集花甲初周福履將壽比岡陵長有道籌添海屋自無疆衢歌巷舞皇情豫鑿井耕田庶事康世樂升平民皥皥史書大有歲穰穰芝房擢秀楓宸側雲漢昭回黼座旁聖主隆恩同覆載微臣報答愧毫芒願隨鵷鷺丹墀下率舞年年慶未央萬壽長春詞有序翰林院庶吉士臣杜詔蓋聞鳳厯常新樂製雲韶之曲鸞音競奏歌傳燕喜之詞六舞交陳萬歲樂韻諧玉琯四聲互叶萬年春響應黃鍾凡以歌詠太平發揚至德者也欽惟我皇上御極之五十二年歲紀昭陽律吹姑洗當六旬之聖旦錫福寰區屆普慶之良辰騰歡輦轂九州父老扶杖偕來四國人文觀光畢至既請建亭而未許屢上尊號而弗居豈盛美尚待鋪揚而休明聿成鼓吹自南郊雪霽日麗青旗正上苑花開春深紫禁碧桃天上携來曉露風前紅杏林邊宛若秋香月裏滿鳳城為歡笑錦市千門遍鸞掖以喧傳瑶箋百幅臣詔受恩彌至戴德滋深昨歲路指蓬山思登瀛而尚逺今者身依藝署共簪筆以俱來喜倍羣情欣逢萬壽金莖珠綴愧乏三唐應制之篇蝶拍鶯簧竊擬兩宋倚聲之作詞成十闋祝效三多青帝東回載一色青旗春自天來駕乘鸞輅響動春雷不煩畫鼓聲催有非常春色介春酒萬壽筵開重徘徊恍風微殿角身在蓬萊回頭五雲深處看紅杏枝枝早倚雲栽百和香濃九華光爛金莖露泛霞杯聽宫壺滴罷笙歌滿花柳成隈繡成堆遍九州四野共樂春臺右調春從天上來青陽歌裏歡聲閙説今歲風光好雪痕消去紅雲罩遍萬户千門曉望紫氣絪縕繚繞柳條上春風來了吹得禁林春滿日暖花含笑右調迎春樂紫禁日華東旭日曈曨曉光融鳴珂夾道躍花驄香霧散翠煙濃瑞氣髙浮雙闕迥是五鳳樓中啓重重玉殿玲瓏千行仙仗萬條宫燭早朝人立東風方共慶聖人生日花甲喜初逢逡巡拜手徹地呼嵩右調鳳樓春春滿上林如繡正爛熳百花開後四圍疊嶂重裀窣絲絲宫牆御柳秋千影裏弄永晝看太液緑波紅皺湛恩汪濊如春恰剛逢暢春時候右調上林春萬年枝上露浥日華仙掌樂奏雲門酒進霞觴誰劈花箋鼓吹文明意多在春風白玉堂聽得幾聲靈鵲分明栖海棠可待來朝芍藥吟成後香案前頭侍玉皇右調玉堂春嘉蓮上日吐丹宸竒葩獻歲新杏花時節曲江濵偏多折桂人玉早看呈素彩金波先為洗香塵正是風柔夜暖瓊樓天上春右調月宫春九天風露五雲髙年年開碧桃況逢燕喜共趨朝桃花春更饒依輦路映宫袍明霞籠絳霄三千結實在今朝蓂階瞻帝堯右調碧桃春風送暖日籠晴百花明夾路紅燈簇錦棚滿春城盡是九重春色傳來萬户春聲共説長安春正好樂升平右調春光好倚天樓閣揭天絲管好景春三須知此日普天同慶第一是江南蠲租詔後還喜丹鳳書銜月明淮水風移海甸天賜吏淸亷右調慶春時何況殊恩身被曾玉局紬書八年來矣思昨歲今朝簪花猶未忽聽句臚讀書厠中祕承平樂事須記方殿上稱觴載歌春喜翻樂府新聲紅牙初試願祝長春萬年自今始右調慶春澤萬壽詩七言律二首翰林院庶吉士臣鮑開皇帝垂裳御八方車書一統邁陶唐武功文德乾坤大厚澤深仁海嶽長玉陛和風披緑野金城暖日麗扶桑今朝率土齊聲祝萬歲三呼進壽觴其一金殿祥光徹九天鬱蔥佳氣滿山川三春好景惟三月萬姓同心祝萬年巷舞衢歌聲欲遍鶯啼花笑樂無邊宸遊更奏南薰曲一𣲖簫韶奉御筵其二萬壽詩七言律二首翰林院庶吉士臣孟班欣逢聖節慶昌辰億載鴻基始六旬九陌歡呼雷出地千官拜舞日長春雲凝紫殿來重譯露湛彤庭列逺臣五十二年堯舜厯躬膺百福歲華新其一雲璈一闋擬蓬萊南極芒髙映斗魁玉燭光浮青瑣闥金莖露泛紫霞杯宸顔有喜禎符集聖壽無疆泰運開欲效九如陳頌祝微臣愧乏掞天才其二萬壽詩七言律二首翰林院庶吉士臣楊祖楫鶯花三月滿皇州雙闕晴開拜玉旒王會廣陳重譯貢樂音遙和萬民謳盈衢酒泛仙盤露比屋香添碧海籌十載特行文武試鳳麟長向網中收其一元日嘉蓮發紫宸早回薰律啓昌辰福釐自遍羣黎德歌頌難酬聖主仁徽號同聲歸黼座謙尊三度謝廷臣更無一物堪持獻惟願禎符歲歲新其二萬壽賦以萬夀無疆普天同慶為韻翰林院庶吉士臣徐杞聖德同天眷膺萬夀感格神人化育宇宙蕩蕩巍巍貞恆永懋追羲軒以頡頏並唐虞而馳驟星回躔次方行五分之餘厯視璇璣始兆一周之候若乃祥開蓂莢瑞叶球圖流虹繞電貫月吞珠神光鬱於寶室紫氣映於雲衢固知受籙之最久誠為前古之所無通書夜於萬年奚待松喬之術合翕闢於兩大何須金石之書原其備福而受釐咸本業隆而德建制作遵為規模典型垂為章憲振聲教於遐荒慶清寧之永奠揆文奮武績已邁夫五三貢賮獻琛國寧止於千萬上天之保佑維殷下土之尊親競勸至若教養具軫恤彰蠲賦稅省桁楊既春臺之溫煦亦化日之舒長觀河而五老覲於霞表巡方而嵩嶽拜於巖傍頌聖來夫華叟作人超夫周王宜寰區之歡忭願奕祀而無疆爾乃遲日暄妍庶物揚詡燕語鶯啼花明柳嫵吹來習習無非解慍之風散作絲絲悉是作甘之雨彤庭則拜手賡歌緑野亦頓足起舞岡陵之詠方新滲漉之恩更普亦有遐邦逺甸瞻海來同上真列宰降自蒼穹鮮鶴翔於金闕青鸞集於瑶宫八千歲靈椿葳蕤始緑三千年桃樹的皪初紅莫不應瑞而生輝效順而呈慶相忘帝力只知發耕鑿之歌共戴天長不必進軒轅之鏡若夫傳之金石載在簡編箕疇之稱百福風詩之頌億年鴻禧之克承者由德而降鑒之肇錫也自天方將樂太平之浩蕩誇景福之芊綿每屆三春祝三多而踴躍逺過萬歲偕萬姓以喧闐小臣濡翰以紀事大哉無得而名焉萬夀盛典初集卷九十一
