body:
  text: 欽定四庫全書萬壽盛典初集卷四十慶祝一圖畫一康熙五十二年三月十八日皇上六旬正誕天下臣民赴京慶祝者以億萬計時上方幸霸州水圍臣民擬自暢春園至神武門輦道所經數十里內結綵張燈雜陳百戲迎駕登殿受朝賀既上自霸州回鑾經營業有成規止之不可始允臣民之請於十七日由暢春園奉皇太后還宫上御凉步輦設鹵簿大駕皇子皇孫二十五人扶輦不施警蹕令臣民咸得仰瞻天顔頒賜克食數千席於道左耆老夾道歡呼萬歲越日直省臣民咸以幸生盛世恭逢天子萬年慶祝之隆古所未有願得繪圗垂之奕祀兵部右侍郎臣宋駿業具摺代請上可之即付臣駿業經始至五月初三日續命戶部左侍郎臣王原祁總理繪事為圖二卷五十四年十月二十六日復命詹事臣王奕清藏其事焉四月初一日兵部右侍郎加一級臣宋駿業謹奏為普天同慶萬姓騰歡恭請繪圗以昭盛典事竊臣世受國恩欣逢聖代伏覩我皇上六十大慶之辰四海詠歌萬方趨赴雲屯巷祝雷動嵩呼皆本孺赤之誠以報生成之德此開闢之所未聞唐虞之所莫紀者也恭惟我皇上備天地清寧之氣膺祖宗亶厚之基無逸作所宵旰憂勤者數十年如一日視民如傷扶持保抱者遍天下如一人幅員及於無外悅服逮於要荒仁育義正浹於肌膚過化存神捷於桴鼓此熙皥之民所由輸誠愛戴而不能自已也時維三月節屆暄妍萬物皆春和風微扇外由馳道內至宫城於二十里之中聚千百國之衆袂踵駢闐歌謡雜㳫帷幕夾路笙璈沸天於時鸞旗徐動禁蹕無聲玉輦遙臨天顔有喜更施曠典特賜大酺番番父老共含哺於勾陳穰穰黎民咸近光於咫尺聲騰列肆慶溢九逵雖華祝之微忱實天心之感動臣粗知繪事久被鴻恩向承命畫南巡圖幸賜觀覽今欣際昌期臣民同心欲踵斯盛謹將都城內外經棚黃幕萬姓擎花獻果之誠遮輦迎鸞之盛共五十餘處彚寫全圗敬呈御覽伏祈皇上俯允臣請許臣私寓次第加工造成墨本以付剞劂昭示遐邇共識升平從兹十年一舉例寫萬壽長圖將見玉軸初開千百國之葵衷若揭球圖竝永億萬年之福祚無疆矣其圖稿即帶冷枚等畫成進覽先此具摺不勝踴躍歡忭待命之至謹奏閏五月初三日戶部左侍郎臣王原祁謹奏五月初三日養心殿監造趙昌等傳旨發下兵部右侍郎臣宋駿業所畫萬壽圖稿命臣繪畫欽惟萬壽聖節中外臣民詣闕恭祝者不可勝計而巷舞塗歌遠邁衢謠華祝皆我皇上功德同天恩膏匝地輿情歡悅踴躍爭先荷蒙軫懷黎老頒賜大酺天駕徐行特許億萬臣民瞻仰殊恩曠典真開闢以來所未有允宜繪圖紀盛昭示無窮臣欽遵諭旨隨即率同臣冷枚並更選工畫人物界畫者就私寓繪畫臣粗習山水未諳界畫人物然畫理實是相同臣宋駿業所鈎之稿止有一半其半尚未鈎出臣細閲已鈎稿中其長短踈密尚有未盡善處就臣愚識斟酌指示另為鈎稿其未鈎者亦為續鈎稿本初定未免粗率不敢進呈御覽現在再鈎細稿約至九月後可成俟稿成時恭呈御覽奏請聖訓裁定理合先行奏聞奉旨王原祁所奏甚是十二月二十六日户部左侍郎臣王原祁謹奏臣於康熙五十二年五月奉旨繪畫萬壽長圖臣細閲前所鈎圖稿止有城外一半自西直門至景山一路尚未鈎出粗定稿本不無踈密參差之處應加改補具摺啓奏奉㫖王原祁所奏甚是欽此臣隨率同冷枚等在臣私寓就宋駿業所鈎未完之稿細加斟酌竝城中各處鈎畫完全恭呈御覽欽惟我皇上聖德神功遠超堯舜深仁愷澤覃被寰區三月十八日恭逢聖壽昌期快覩輿情慶祝歡聲雷動都㑹雲屯京城內外凡祝聖龍棚恭諷萬壽經棚街衢巷陌真如櫛比不可枚舉自馳道以至宫城為輦路經由之處龍棚經棚共計五十餘所詠歌擊壤夾道紛陳燈幄綵幢連宵匝布十七日聖駕進宫皇太后鳳輦前行我皇上鑾輿徐駕天潢列從警蹕停傳特許臣民仰瞻天表軫懷黎老遍賜大酺斯皆曩古未聞惟我聖朝獨盛者也維時鹵簿之威儀尚方之頒賚以及億萬人民之衆歡欣拜舞之誠計算難窮形容莫罄臣粗諳筆墨豈易描摹今所繪圖稿僅髣佛其萬一以紀盛事伏祈皇上俯賜全覽其中有應行增改之處恭請聖裁訓誨至圖中各處匾額對聯各體字樣擬派曹曰瑛照式恭寫為此合行奏明謹奏奉㫖萬壽圖畫得甚好無有更改處字位過密無法顯示臣趙等燦字位過密無法顯示臣趙𢎞燮刑部雲南清吏司郎中臣趙之垣謹校刋萬壽盛典初集卷四十
