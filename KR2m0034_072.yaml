body:
  text: 欽定四庫全書萬夀盛典初集卷七十四歌頌十四詞臣六聖夀萬年普天同慶詩七言律八首有序左春坊左諭德兼翰林院修撰臣鄭開極臣謹按周易恆卦之象曰聖人久於其道而天下化成蓋自古帝王乘乾御籙必上協天心久膺天命斯政教翔洽治定功成而頌聲作求如我皇上之德夀兼隆功業巍煥則信乎前古後今之所未有者也臣開極叨中順治十八年辛丑科進士特授庶常讀書中祕五十餘年備悉我皇上聖德神功嘉謨善政誠非史册所能詳書敢竊志其大者仰見皇上之德與天地同其廣大聖夀即宜與天地同其悠久質之書傳確有明徴固非徒為頌美之文而已蓋帝王之德莫大於仁孔子之言曰仁者夀我皇上仁覆萬方恩膏淪浹蠲租免賦纍年至數千萬而雨𤾉豐歉無刻不在宸衷大案必慎株連人命覆詳至再即如三逆平定寬宥者至數百萬人且恩及屬國䝉古朝鮮歲祲見告而水運陸輸大宏賑賚浿水千村龍庭萬帳無一人不在生成之中甚者至於御膳天庖皆有常經不容濫取歲所全物命以數千萬計此其好生之德與天地同仁固宜與天地同夀也帝王之德莫大於孝孔子稱舜之大孝曰必得其夀我皇上孝奉兩宫承顔養志無一不周上體列祖之心繼志述事無一不至甚者每歲萬夀聖節篤念慈和皇太后之劬勞五十餘載中外臣庶再三敦請而升殿受賀僅一再舉此皇上之孝邁於舜之五十而慕則聖夀不又有百倍於虞舜者乎帝王之德莫大於誠中庸言至誠無息而曰悠久無疆我皇上之誠於勤政也庶務必周庶官必飭深宫宵旰念兹在兹其誠於舉賢才也則選擇必公搜羅必廣甚至於薄技微長無不旁收博採其誠於體羣臣也則不獨欲保其身家兼欲曲全其名節其誠於子庶民也則不徒以賑饑肆赦取煦育之具文而必使惠遍澤均有利賴之實濟是我皇上之精神念慮無一息不在蒼生而萬國臣民傾心愛戴共切萬夀無疆之祝有不為天地神明所眷祐者乎帝王之德又莫大於敬周武王之銘曰恭則夀我皇上於郊廟之饗必躬必肅至於闕里岱宗暨前代帝王靡不䖍加敬禮褒祀尊崇功業蓋宇宙而涖事時存執玉捧盈之心樂利遍海隅而臨衆時懷載舟馭朽之戒其兢業之心與天地同其不息則與天地竝其無疆又孰非理數之必然者哉至於旁通遊藝則書兼八法之長算擴九章之奧球圖叶璇璣之祕玉律調鐘吕之和其尤卓絶古今者神謨獨運則安攘奏功玉輦親臨則平成底績此其開物成務制作垂於萬年又非愚賤之倫所能蠡測者也臣海濱豎儒年七十有五矣幸生我皇上仁夀之世得以飲和食德年雖將耄而耳目手足猶能勉力修途匍匐五千餘里一瞻闕廷自慙弇鄙不文不敢謂隨平格之老共賡天保九如之歌庶幾附擊壤之民聊抒華封三祝之願不揣為詩八章以獻華渚祥開蔚彩虹徇齊天縱仰宸聰冲齡便裕安民志久道真成保泰功五十二年膺寶厯百千萬祀祝喬松史臣珥筆賡堯典蕩蕩誰能寫化工其一南極熒煌表瑞徴臣民共覩日方升三朝嘉慶庭闈喜萬國歡心色養承禮樂修明神格享馨香祈賽歲豐登皇心永念艱難業夙夜貽謀燕翼宏其二乾健貞恆萬化成聖功無息應天行談經清晝儒臣接析理中宵大道明統遡羲軒紹舜禹文宗孔孟表朱程體元居正垂裳日朝野難將至德名其三聖學淵深竝典謨龍章鳯采炳寰區日華麗藻光宸極雲漢昭回貫斗樞詩邁三唐成雅頌書兼八法冠歐虞柏梁叨與升平宴猶憶賡揚玉殿趨其四盛德鴻功耀簡編仁風膏雨遍堯天蠲租春滿寰瀛外解網氛清貫索前四國桑麻成樂土萬家燈火慶康年鸞笙鳯吹稱觥日好譜衢歌入管絃其五虎略龍韜聖武雄貔貅百萬鎮寰中欃槍久掃妖氛靖車騎來庭塞漠通春狩佽飛還試馬夏苗太史祗占熊應知赫濯聲靈逺薄海銷兵早掛弓其六聖世恩威遍海隅時雍化洽盛都俞龍堆萬里銷烽燧鮫島千村入版圖績邁漢唐成偉烈德侔姚姒拓鴻謨年年職貢修王㑹銀甕金車接九衢其七六合清寧帝道光箕疇符應備禎祥春回花甲時方泰厯紀龍飛運正昌入覲萬方陳玉帛貢琛八表萃梯航小臣趨闕隨嵩祝聖夀同天願更長其八萬夀詩七言律八首有序原任左春坊左諭德兼翰林院修撰革職河工效力臣楊大鶴臣伏見我皇上御宇以來敬天法祖加惠元元恩溥德洋化成久道五十餘年如一日歲在癸巳春王三月恭遇萬夀六旬中外臣民詣闕朝賀者爭先恐後而遐方士庶頂戴皇仁皆隨地效華封之祝臣大鶴自江南進京三千餘里所見郡縣村落焚香結綵兒童黃耉抃舞呼嵩絡繹於道而我皇上特霈德音謂萬姓安即朕之安天下福即朕之福大哉皇言臣在路聞詔目覩民間歡欣踴躍無不同聲曰一人安即萬姓安一人福即天下福上下交孚君民一德猗歟休哉雖古二帝三王之治蔑以加矣臣大鶴父子祖孫一門三世受恩深至感激倍常兹幸隨耆老後叩祝萬夀不揣蕪陋謹賦長句八章以道羣黎百姓齊願聖天子億萬年受天景命悠久無疆之意詩曰粵若陶唐癸巳春衢謠華祝世風淳臣謹按綱目前編堯時衢謠華祝皆在癸巳載聖皇丕啓中天運寶算欣逢大慶辰比户可封歌帝力萬邦胥協頌堯仁勳同鳯紀還相合從此貞元萬萬巡其一帝御鴻圖始六旬八方元氣拱丹宸近光咸欲親天子斂福還將錫庶民治化每占星象應禎符長共歲華新皇心主靜常無斁建極綏猷政事醇其二惟天輔德佑吾君德盛彌承帝眷殷恩沛九州蠲壤賦科開萬夀蔚人文財當既阜彌崇儉民已俱安更克勤儉乃有常勤可久物遊化日盡含欣其三河出榮光燭九天小臣親見自河邊瑞雲浮處波濤靜休氣騰時景象姸春泛桃花含解澤秋滋玉黍兆豐年一從九曲安流後愈卜皇朝夀厯綿其四神功治水善隄防指授人王由帝省方淮甸六巡勞玉趾江城三度覲雲光鑾臣在河工謁見輿者三平成共仰宸謨大清晏懸知鼎祚昌澤國盡看成沃土年年擊壤慶天長其五百舍星馳謁帝京長途厯厯見輿情千村綵幔連瓊樹萬縷香煙接鳯城法曲仙音紛滿耳龎眉秀髮盡登程無分遐邇同歡忭久道貞恆驗化成其六輦下遙聞賀聖躬特宣㢲命示謙冲祈天祗願羣生遂受祉惟期四海同普合臣民為一體永圖樂利切宸衷皇言甫出爭傳頌喜聽歡聲溢道中其七芳時百物荷春暄小草傾心倍感恩微力深慙輸犬馬殊榮何幸及兒孫壬辰科臣子祖楫暨臣姪孫士徽俱䝉恩賜進士出身選授庶常三霄濃露涵雙闕一寸丹忱戀九閽今日敬隨耆老後躋堂共進萬年尊其八萬夀詩七言律五首有序給還原品原任日講官起居注左春坊左諭德臣秦松齡欽惟皇帝陛下建極中天體文武聖神而作則握符御宇統元㑹運世以為年合萬國而承歡聿隆孝治軫一夫之弗獲丕布仁慈肅官方則大法小廉敷文教而東漸西被震風霆於異域海不揚波蕩氛䘲於崇朝野無鳴柝爰逮黑齒雕題之俗咸致白環銀甕之祥兹者歲紀昭陽律占姑洗仰春秋之鼎盛值甲子之初周籌鶴算於三千方兹未艾計椿齡於萬六詎足云遙慶洽堯階歡盈禹甸况乃蠲租載霈感兌澤以宣流造士彚征樂㢲風之鼓動蓬茅生色葵藿傾心臣舊忝朝班夙慙報效晚棲隴畝益荷矜全寵賁林泉榮施翰墨恩既隆於山嶽喜更溢於家門幸際昌期敢辭駑鈍龍鍾鶴髮重依日月之光竭蹶鳧趨庶效華嵩之頌躬陳蕪末自託封人臣無任踴躍歡忭之至謹拜手稽首而獻詩曰序轉陽和淑景舒星瞻南極煥宸居欣逢薄海稱觴㑹正值深宫視膳餘雲母屛開花隱隱水晶簾捲日徐徐上林果熟三千歲知是瑤池燕喜初其一學富嫏嬛本六經心傳精一啓虞廷山龍黼黻皆成象几杖盤盂總勒銘貫串珠囊研五夜編摩金鏡燭千齡皇情最是關民事教寫豳風入御屛其二康衢化日誦聲長賜復綸音出未央頻見九重施惠澤早聞四野樂豐穰杏花菖葉原頭麥細雨柔風陌上桑晝永緑窗添線後盡翻錦字織無疆其三天保陳詩喜共賡况聞新詔下延英龍墀露濯千章栁鳯律春調百囀鶯藜閣校書隨太乙錦袍飛韻叶長庚橫經舊日青衫士留得張蒼與伏生其四簪筆螭頭侍從臣荷衣猶戀屬車塵曽隨擊壤迎鸞輅又逐呼嵩望玉宸彌覺恩波垂似續深慙世掌在絲綸何當重沐金莖露冰雪陳根也自春其五聖德如天詩七言律八首有序原任左諭德今候補臣魏學誠臣聞夀丘表軒轅之瑞感神電之流樞瑤光紀顓頊之祥兆彩虹之貫月蓋聖人御宇雲物煥其休徴天子垂裳乾坤昭其順應况夫鴻圖廣大萃千百國之車書寶厯綿長衍億萬年之統緒生民未有振古為昭欽惟皇帝陛下道冠苞符心涵疇畫履五位而首出集千聖之大成至德難名巍乎聖文而神武淵衷廣運允矣緯地而經天以天下養慈闈大德者得位得祿得名得夀用時巡為侯度悅服者自南自北自東自西文治光華雨露深而菁莪滋盛聲教赫濯風雷震而兵甲全銷宏浩蕩之仁免賦蠲租數盈萬億廣生成之德省刑肆赦恩曠古今地平天成睿慮周而兩河底定小廉大法天語重而庶職寅恭瞻河嶽之與日星制作發先天之祕自洙泗以及濓洛表章極重道之心典謨經史之書咸窮閫奧律厯辭章之學悉抉精微寶墨淋漓紙上作烟雲之氣天章璀璨毫端仰鸞鳯之翔總由聖德日新兼之多能天縱普天慶溢率土歡騰兹當聖夀六旬正誕之辰恭逢景運五十二年之盛維時民諴物阜觀久道之化成海晏河清樂昌期之再見合殿之香風乍轉宫樹花深中天之淑景方新上林春永獻夀杯於九重闕下奏天樂於五色雲中燕慶龍光儀來鳯舞雖聖天子謙尊而辭祝頌總未忘宵旰之殷而我臣民歡忭以效嵩呼竊願學巷塗之詠臣生逢盛代世受隆恩猥以下材疊霑異數一思舊笏夙夜之愧悚彌深濫附清班拜舞之賡歌欲效仰見如天之德莫罄贊揚敬成祝聖之章深慙鄙俚一人有慶偕斯民斯世咸登夀域之中萬國同歡即不識不知亦在康衢之內云爾聖德如天夀亦同瞻天仰聖盡呼嵩包含宇宙中和氣涵養皇王道德功曠世難逢堯舜主前徽不數漢唐風更教萬世登仁夀盡在精神保合中其一聖德如天夀自侔萬年甲子此初周道隆孝治超千古澤沛恩波遍九州仙草似知堯歲月大椿敢擬聖春秋天顔咫尺欣開霽紫氣紅雲繞鳯樓其二聖德如天夀竝長歡呼稽首頌無疆心傳道法宗先聖言出絲綸賚萬方每為蒼生勞旰食還從恭已仰垂裳擬將金鏡千秋録用佐瑤池萬歲觴其三聖德如天夀等倫維皇眷命自重申九天佳氣浮雙闕萬國歡心奉一人川嶽精靈齊獻瑞羲軒世界總如春星雲燦爛聞占奏南極光輝近紫宸其四聖德如天夀復然從知精一有真傳心同日月無私照福與山川共亘綿刑措兵銷成至治天長地久祝遐年得生盛世臣何幸親見堯階與舜絃其五聖德如天夀域開九重宫闕近蓬萊日星河嶽瞻宸翰禮樂文章仰睿裁丙夜尚勤天下事講筵常見聖人來萬年枝上花如錦知為君王獻夀杯其六聖德如天夀與齊天光近處五雲低河山長拱瑤臺北麟鳯時遊上苑西耕鑿歌曽聞擊壤梯航貢直到雕題宏敷雨露霑濡遍又仰丹霄降紫泥其七聖德如天夀益髙春深閶闔映仙桃士霑異數菁莪化民沐深仁江海濤繚繞香煙浮劍佩鏗鏘仙樂動雲璈受恩獨有微臣重欲效賡歌愧彩毫其八萬夀盛典初集卷七十四
