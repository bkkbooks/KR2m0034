body:
  text: 欽定四庫全書萬壽盛典初集卷四十八慶祝二圖記六吏部戸部倉塲榜文伏以鴻圖永固萬方瞻有道之庥鳳厯綿延億載衍無為之治鈞天與梵天竝奏發育同春化日與慧日齊輝光華復旦禎祥集而得名得壽福祿崇而俾熾俾昌率土歡騰普天申祝欽惟皇帝陛下執兩用中參三建極聰明作后合容執敬别以有臨睿聖通微兼肅乂哲謀而竝用至仁育物大生成胞與之恩純孝格天極愛敬尊親之至覃敷文徳肇開理學之淵源焜耀武功快覩干戈之偃戢祥刑肆赦曲予生全正賦頻蠲時籌積貯聖不自聖凡事闗軍國必集百爾以相咨恩復加恩縱言出芻蕘亦執兩端而是察樹人蒸耄士特開萬壽之科越格取英才竝采五戎之士休徵疉見奚啻器車澤馬之効靈謳頌時興實合朝野臣民之愛戴恭逢萬壽昌期慶屆六旬聖節稽諸魯論正聖學耳順之初遡厥虞書適道統心傳之始牟尼御世尚隔二旬泰岳降神獨先十日花迎劍佩薦桃實以餐霞栁拂旌旗潤楊枝而灑露允矣太平樂事猗歟盛世榮光臣等忝列班行彌慙報稱頌祝幸逢乎嘉㑹賡揚冀展夫愚誠羲歴軒圖欽聖朝之有道象筵蜺座知佛法之無邊伏願用錫繁禧歛時五福大徳必壽賀天子之萬年悠久無疆慶本支之百世從此山川流峙福竝髙深日月升恒光同臨照康衢鼓腹年年歌天保之章大地嵩呼歳歳賡華封之祝矣吏部尚書仍兼管總督倉塲事務臣富寧安尚書臣吳一蜚左侍郞臣孫柱臣李旭升經筵講官右侍郞臣𫝊紳經筵講官左侍郞管右侍郎事兼翰林院學士臣王頊齡郞中臣佛爾和臣郞固里臣余國璧臣逹蘭泰臣馬際蘭臣厄僧臣吳逹海臣布詹臣鄭崑璽臣蘓琠臣郭晉熈臣裘君弼員外郞臣鉢賴臣存柱臣牛鈕臣花善臣長保臣那思泰臣魯之傑臣董哲臣葉宏綬臣陳廷綸臣林紹祖主事臣巴爾泰臣色赫里臣勒徳臣賽章阿臣五格臣蔣永祿臣魚鸞翔臣謝乃果司務臣朱夀臣吳科筆帖式臣常德等户部尚書臣穆和倫臣張鵬翮左侍郞臣塔進泰經筵講官左侍郞臣王原祁經筵講官右侍郞臣噶敏圖右侍郞臣廖騰煃郞中臣𫝊舒臣湯竒臣赫杜臣孫塔哈臣華善臣永泰臣儲隆阿臣森圖臣佛保柱臣馬凖臣色納臣常明臣赫伸臣孫泰臣薩木岱臣雙禧臣南泰臣吳賽臣趙徳臣薩哈布臣常保臣許維模臣莫象年臣王世繩臣王光奭臣田肇麗臣馮肅臣程懋臣金一鳳臣喬雲名臣王奕鴻臣王克貞臣阮應商臣陸雲從臣閔本貞員外郞臣廷桂臣花善臣鄧柱臣圖禮臣鄂起善臣赫昌臣達哈塔臣白雅圖臣達林臣勾色臣烏禮臣費遥色臣邁圖臣嗒呼喇臣阿延圖臣七哥臣傅保臣聘阿那臣烏達禮臣觀音保臣拜哈喇臣阿爾哈兎臣布爾賽臣殷達禮臣勒色禮臣商義圖臣恒格對臣包衣暈臣吳色臣甘來臣懽起臣薩克薩哈臣阿圖臣邁柱臣孫達禮臣勒起臣田軒來臣江景瑞臣馬鍾華臣李舜卿臣趙成穮臣王洽祖臣張爲政臣任奕䥸臣王珍臣姚謙臣范如璋臣謝賜履臣鄭朂主事臣阿禮臣諾岷臣蘓新臣傅徳臣馬躍龍臣董起弼臣傅璽臣劉保柱臣保武臣海夀臣鄂璽臣鈕牛臣那親臣傅通阿臣朱麟臣馬林寳臣那郞阿臣邵保臣張如緒臣唐崇勲臣湯震臣張友程臣黄叔璥臣林霖培臣吳瓊芳臣朱廷宁臣陳瓚臣李鼎徴臣蔣洪㴻臣李文麟司務臣徳眀臣楊道存司庫臣常明臣保柱臣滿保臣樂周筆帖式臣陳世則等總督倉塲户部右侍郞臣施世綸工部郞中管坐糧㕔事臣江藻大通橋監督臣阿達海臣閻純璽大西倉監督臣穆騰臣范振徳中南倉監督臣孟耒臣王洽祖祿米倉監督臣毛岱臣范光曦興平倉監督臣鄂索禮臣張振嗣太平倉監督臣朝奇臣李承祖富新倉監督臣蘓伯霖臣王珍北新倉監督臣克聲臣李來章南新倉監督臣齊什臣章祖烈舊太倉監督臣道色海運倉監督臣張景載本裕倉監督臣鄂齊禮宗人府府丞臣李濤候補三品京堂臣李華之内府廣善庫郞中臣徳成格臣厄里得黒等内閣侍讀臣姚光祖等恭祝正黄旗都統榜文伏以壽域宏開五緯萃協和之氣福星朗耀中天發濬哲之祥惟上帝之眷佑仁君鑒觀有赫斯聖主之誕膺寶籙景命彌新用蠲六祝以陳詞敢叩三清而籲請欽惟皇帝陛下道備參三功髙咸五湛恩浹於寰宇下際上蟠駿烈炳如日星外寕内謐乾符丕振而憂勞宵旰不忘左御圖右御書泰運重熙而喜起明良猶矢朝謀綱夕謀紀定樂章以敷陳九奏奚啻教胄而命夔隆祀典以懷柔百神直比禋宗而類帝道統傳於堯舜功業冠乎禹湯兹當萬壽之辰正値三春之吉五十二年之景運前古稀聞千萬億載之昌期於今喜覯哲謀肅乂陳箕子之九疇抃舞謳歌效封人之三祝花迎淑氣初開百子池頭鳥識歡心咸集萬年枝上臣等職居環衞位忝戎行祖父子孫沐列聖之恩波於累世春秋冬夏霑九天之膏澤於四時報徳無由拊心知愧爰集黄冠之侶拜手金仙敢延紫府之流叩靈玉局瑶章乍啓香浮五嶽之雲琳篆初飛光映萬川之月冀神眀之共照俾昭格以咸通伏願永錫純禧茂膺繁祉壽身壽國駐顔之仙訣無垠生物生人濟世之金丹有要將見一人凝命玉燭慶以長調萬國騰歡金甌欣其永固矣滿洲都統臣孫查齊䝉古都統伯臣蟒坎漢軍都統臣汪吾禮副都統臣恒祿臣燕布臣滕額德臣山壽臣趙􅀈臣黃秉鉞率合旗官兵人等恭祝大理寺太常寺榜文伏以帝祉悠長寳籙錫千春之福皇圖鞏固禎符開億載之祥綿甲厯於升恒瀛籌添盛播樞光於格被華祝增髙率土歡騰一誠介福欽惟皇帝陛下亶聰立極睿聖綏猷首出庶物以咸寧表正萬邦而率廸繼唐虞之道法直接中天紹洙泗之心傳深通一貫劑剛柔於三德善政與善教偕修奏歌叙於九功仁聞共仁聲懋著郊壇之明禋必肅凛圭璧以薦馨香宗廟之對越維䖍潔豆籩而修祭祀合歡心而事壽母盡誠盡禮之交隆推厚澤以及本支曰義曰恩之竝篤禮大臣則始終勿替撫喬木以加恩課庶職則䇿力兼收植羣材而樂育愛士而芹宮有訓黨庠知道徳之尊求賢而蕋榜増名科甲廣奮庸之路慮周於男耕女織開兆人樂利之源念切於暑雨祁寒錫萬姓和恒之福寛催科以舒物力罷逋租蠲正賦綏懷屢徧於窮簷大欽恤以察爰書宣赦令止行刑矜慎不遺於庶獄運太倉之白粲拯赤子以出溝渠發内府之朱提活蒼生而登袵席時廵屢勤於吳越江津淮浦奠千里之安瀾歲幸頻蒞於郊圻趙北燕南導九河而底績經筵廣啓探往哲之㣲言講幄恒開闡昔賢之要㫖尊闕里而表章聖學煌煌典制有加宗考亭而崇尚儒修奕奕景行彌摰宸章布而金聲玉振叶雅奏於宮商御墨灑而鳳翥鸞翔絢鴻文於奎壁包羅子史以逮夫厯法算法咸加討論而折衷博覽詩詞以及於書家畫家罔不淹通而洞徹天威震疉自西自東自南自北遐方桴鼓無驚聖武布昭曰荒曰要曰采曰流逺道烽烟盡戢雜猺獞於編户獻琛貢雉而玉帛來同列島嶼於版圖享䞇臣人而共球畢集天所覆地所載慕聖徳者咸稽首來庭海之澨山之陬沐至仁者盡皈心戀闕日再中而雲五色皆云天瑞駢臻穀五穗而麥兩岐共識地靈類應麟遊鳳舞太和之洋溢有徴海晏河清大澤之瀰綸無極信矣羲農軒嚳總歸陶鑄之中誠哉堯舜禹湯莫出範圍之内者也兹者喜値六旬之聖誕正當萬國之昇平五十二載之旰食宵衣克致民安物阜千八百國之塗歌巷舞共祈地乆天長閏歳景増花栁媚蓬壺之日月春風暖布燕鶯熙瑶閬之乾坤縈紫氣於六街石髓與瓊漿並獻散青陽於九陌菊泉共桃實偕陳臣等身效鳬趨心同葵向殫靖共於職業難酬髙厚生成諧搏拊於宮懸莫慶形容美善雖大徳必壽無須頌禱之文而愚悃莫伸竊效媚兹之義乃㳙吉日式啟齋壇伐鼓考鐘敬求多福琅函玉簡䖍祝明神道有感而斯通祜如期而自屆伏願天行不息日進無疆沛民胞物與之膏近者悦遠者來播聲名於罔外敷道一風同之治禮則明樂則備普美利於不言協洪範之休徴曰暘曰雨曰燠曰寒調歲功於悠乆合周詩之戩穀如岡如陵如山如阜承天眷之綿長將見八千歲為春八千嵗為秋莫測聖人之壽三千年一花三千年一實常榮天子之廷矣大理寺卿仍兼太常寺卿臣荆山大理寺卿臣孟世泰少卿臣巴霽納臣邵觀左寺正臣牛麻泰臣江際泰臣孟孫繩右寺正臣黒爾忒臣尤清臣徐儀右寺副臣林宏烈堂評事臣常保左評事臣呂應聲右評事臣莫宏濟司務臣薩爾岱臣區廷選筆帖式臣墨進泰等太常寺卿臣李敏啟少卿臣佟靄臣黃叔琳寺丞臣紀爾賽臣孫致福臣高萬霖贊禮郞臣穆騰臣武進泰臣德壽臣圖思海臣何密臣武哥臣盛寳山臣德壽臣傅德臣白色臣文清臣楊桑阿臣雅爾虎達臣傅儀德臣劉什巴臣杭吉達讀祝官臣三泰臣來柱臣孫柱臣楊安臣商阿圖博士臣張格臣張經典簿臣色白黒臣陳玫筆帖式臣陳福壽等恭祝禮部刑部光祿寺國子監鴻臚寺榜文伏以有道聖人御世卜軒圖堯鏡於萬年無量壽佛現身轉寶象金輪於三界運合地天而竝泰大撓之甲子初周福如山海以俱増極樂之仙眞畢集三十二相圓滿具足人人仰日角珠庭百千萬載光景常新在在見香雲華雨東皇拱北隨震旦以來朝西竺和南望中華而膜拜祝鴻圖之鞏固集法侶以敷揚欽惟皇帝陛下氣轉洪鈞化成久道太平有象八埏共躋春臺壽考維祺萬姓同居樂國値中天之景運慈雲徧覆千官布大地之陽和聖節正逢三月一十五省和風甘雨如遊忉利之天五十二年厚澤深仁詎止恒沙之數祥符璇錄法轉寶華天竺香城仙雲靉靆祗園金地瑞靄氛氳爲日月燈栴檀海龍華百卷啟珠函如珊瑚舌琉璃咽貝葉千聲清玉磬虹流電繞聖主先期浴佛在二十日時以前髪字齒輪如來此際親臨去五百由旬而近蓮花現處繽紛十地三天法雨霏時徧滿雙林八水百靈呵䕶萬衆皈依見九五之大人共生歡喜布三千之世界一切吉祥臣等忝綴班聮承恩輦轂星辰曵履疑登兠率天宮殿陛句臚恍侍玉皇香案俾昌俾熾莫罄賡颺如阜如山難工頌禱不稽首於鹿苑鷲峰之頂曷獻誠於鵷行鷺序之中借梵唄以當衢謡就福田而申嵩祝花明猊座彤堦祉集千春雲湧鴈堂紫禁祥呈五色神人胥恱遐邇具瞻伏願一統萬年登三咸五雨暘時若咸歌物阜民安聲教覃敷長頌河清海晏廣大雄氏之願力錫福無疆極聖天子之隆平禎祥靡既矣禮部尚書臣赫碩色臣陳詵經筵講官左侍郞兼管詹事府詹事事臣二格經筵講官左侍郞臣王思軾右侍郞臣馮忠經筵講官右侍郞兼翰林院學士臣胡作梅郞中臣張保柱臣索柱臣松努臣瓦哈立臣圖朗阿臣徐瑞麟臣鄭晃臣陳嵩臣黃叔琬員外郞臣佛延壽臣喀賽臣噶祿臣偏圖臣𫝊鼐臣郭泰臣偏圖臣噶爾薩臣祖良卿臣四格臣陳有義主事臣徳成臣牙忠阿臣額森特臣殷達禮臣蘇海臣佟泰臣希福臣楊汝穀司務臣孟來臣宋瑞司牲官臣席珠筆帖式臣常泰等教習進士臣查雲標等欽取効力算法人員臣覺羅倫達禮等刑部尚書臣哈山經筵講官尚書臣胡㑹恩左侍郎臣薩爾泰臣艾芳曽右侍郞臣博音岱臣王企靖郞中臣布賴臣黨吾禮臣常保臣福柱臣常明臣陳廷夔臣巴泰臣王國翰臣伊克拖布臣厄和諾臣順岱臣張國棟臣查達海臣蔡起俊臣辛格特臣鄂奇臣色徳臣常保臣劉天眷臣汪升英臣宮夢熊臣周祚顯臣郝之英臣鄒球臣吳琳芳臣胡范臣宋周臣臣劉承啟臣朱綱臣楊瑛森臣范如璋員外郞臣壽柱臣保在臣阿進泰臣闗保臣林清臣常命保臣何順臣爾泰臣張保臣齊格臣色爾徳臣那齊哈臣岳色臣胡色臣王之進臣圖巴海臣托克拖和臣毛岱臣馬爾賽