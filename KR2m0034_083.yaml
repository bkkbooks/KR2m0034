body:
  text: 欽定四庫全書萬壽盛典初集卷八十五歌頌二十五詞臣十七萬夀詩五言律十首翰林院檢討臣李周望虹渚開宸極嵩呼啟帝閶日臨三殿曉春到九天長禮樂超千古車書統八荒華封應獻頌聖壽永無疆其一垂拱王心正升中帝徳隆政符乾造廣恩與嵗陽同瑞莢占堯厯薫絃鼓舜風治成臻上理景祚自無窮其二問寢龍樓曉從遊鳯輦平聖人光大徳至行溢鴻名甘露天呈瑞祥蒲地效禎萬方欽孝治率土慶同聲其三濬哲原天縱生知本睿聰文章雲漢倬經術古今崇翰藻追皇頡歌詩陋大風更聞昭聖武盛徳協豐功其四徳逺天能動誠孚感自神戈韜四野靖干舞兩階陳龍塞迥瞻斗鯨溟早問津兆人同燕喜長奉太平春其五宵旰勤民隠乘時紀豫遊乾行天自健㢲令澤常周竟野瞻龍蓋環門拜玉旒翠華臨幸地處處沐恩流其六碩畫𢎞疏瀹神功邁禹王兩河勞底定萬井慶農桑蛟鱷潛藏跡黿鼉逺作梁澄清逢聖代五色兆榮光其七户盡倉箱慶人聞秭億歌廟堂心更切補助徳偏多每嵗霑天澤全蠲普太和堯衢㸔擊壤江海是恩波其八品類恩常洽刑書念獨欽下車知聖徳開網見仁心旭照圜扉暖芒銷貫索沈不須吹黍律春入萬方深其九精一唐虞統淵源洙泗傳天文自垂象聖學早開先述作兼前哲尊崇徧昔賢辟廱鐘鼓盛陶淑萬斯年其十萬夀詩五言排律三十韻翰林院檢討臣蔣肇帝徳乾行健皇圖景運亨虹流長啟瑞電繞久呈禎寳厯綿千禩衢歌惬衆情華封來聖代嵩祝動歡聲淑氣三春麗陽和萬彚生碧霄涵潤雨瓊島漾新晴拂仗千條栁迎鑾百囀鶯芳辰逾上已嘉節近離明帝治調雲瑟天心静玉衡禮興文教洽威振武功成道統淵源逺㣲言剖晰精萬幾方暇逸六藝悉兼并無復洪河慮長令瀚海平睿謨親指授廟畧幾經營恵澤周邉徼綸言下帝京九州頻賜復四海疊蠲征報國文章重觀光士類清加科昭異數特勅定章程大化同天地尊稱普士氓謙謙不自聖蕩蕩更難名甲子周初始貞元運迭行祥光彌紫極瑞氣煥長庚鵷鷺欣多士簪𥚑羨列卿歡呼騰鳯闕拜舞奏鸞笙共遂岡陵願咸抒葵藿情千秋金鏡唘萬國篚筐呈著作㣲臣忝承明近侍榮叨恩窺石室隨列到蓬瀛果熟瑶池薦籌添海屋盈願將天保什敬向聖明賡萬夀詩五言律六首翰林院檢討臣王思訓甲子昌期㑹龍飛早答陽黃圖貞寳厯紫極貫瑶光度合乾坤徳衣垂日月章文明天下盛臣庶恱無疆其一久道徴神化由來若昊天體元心翼翼法健日乾乾大冶咸陶鑄洪鈞任斡旋永資叅贊理覆載乃無偏其二誠至原無息箕疇景福全位隆三極上道集一中前典訓超今古陶鎔及聖賢入神與精義萬古賴心傳其三皇仁天廣大浩蕩總難名雲繪光華色風傳雅頌聲太和彌宇宙嘉樂沛生成屢兆時雍瑞維階與太平其四萬類敷榮徧欣然樂育時燕鳴巢鳯閣魚泳躍龍池玉殿蓂添莢瑶林草盡芝綏山桃萬樹齊介壽維祺其五四海冠裳㑹香爐繞翠烟嵩呼騰大地韶舞動鈞天太乙南華燦長庚北闕聫苞符恒啟瑞疊詠九如篇其六萬夀詩五言律二首翰林院檢討臣李掌圓繁祉從天錫時當景運長金莖滋秀草玉燭現祥光聖學心源契皇猷治化彰協和彌四表允矣嫓陶唐其一久道歌成化時雍萬國寜欣逢長治世恒燦老人星燕喜罘罳彩龍光閶闔青丕基年億萬皇極懋長齡其二萬夀詩七言律八首翰林院檢討臣諸起新聖主當陽體應乾徴祥寳籙厯綿綿天開桃核三千嵗雲聚蓬萊六十年曙色乍晞金掌露晴光欲拂御爐烟嵩呼萬國冠裳集拜手齊賡戬榖篇其一生知天縱本神竒䆳學真堪百世師道統已傳宣聖脉心源直接帝堯咨銀鈎争識天章字玉局新編御製詩萬卷圖球歸造化王猷不獨在摛詞其二黎民熙皥萬方同無逸誰知在聖躬闡盡危㣲謨誥外全收疆索版圖中頻聞來享翻重譯却喜綏邦見屢豐父老耕田忘帝力稱觥争願拜宸楓其三神武丕昭駕六龍要荒朔塞有軍容受降築壘惟𫝊檄撻伐犂庭在折衝橫海樓船歌夜月屯雲甲帳靖邉烽祗今卧鼔櫜弓日多少貔貅勒鼎鐘其四自昔龍門禹績多重煩睿慮幾經過翠華臨幸周方獄鹵簿時廵溯翕河争覩淮黃歸底定欣㸔江海得澄波廟謨指授堪千載不數宣房瓠子歌其五雲漢昭回樂育深思皇夀考託宸襟天章疊渙崇儒詔御筆親題訓士箴兩度掄才登蕋榜多方擢秀到瓊林試㸔殿上夔龍武應奉卷阿一矢音其六深仁浩蕩軫民艱賜帛蠲租嵗嵗間大地歡呼𫝊鳯詔普天踴躍覲龍顔直教野外京坻積豈獨雲中鴻雁還婦子霑恩何所報惟歌東海頌南山其七旭日曈曨晝漏長工僚羣捧紫霞觴趨承螭陛登蘭省慙媿鴻文賦柏梁湛露醴泉膺寵錫金芝瓊液自天将紅雲影裏簫韶奏香案前頭侍玉皇其八萬夀詩五言排律六首翰林院檢討臣夀致潤仰覩皇階泰欣逢庶物康山河朝帝極雲漢爛天章至治超三統𢎞慈育萬方時和風正美春暖日初長柳映龍池碧花含鳯詔香年年當此際眉夀祝君王其一劍佩龍樓側衣冠鳯闕前瑞凝仙掌露晴裊御爐烟河嶽聞三祝歌鐘應五絃衢樽傾聖酒仙樂奏鈞天簾幙和風度鶯花淑景妍南山方作頌長詠萬斯年其二端冕臨丹禁摳衣拜紫宸星河仙闕曙花栁鳯城春禹徳思無間堯天識至仁篚筐通鑿齒劍履化文身設學榮三老分猷命五臣謳歌中外竝欣奉景光新其三潤澤三春徧歡娱萬國同晴明占上已長養是東風玉戺花迎日金溝水映空雲霞開麗景雨露湛神功輯瑞朝羣后賔門闢四聰也知江漢表相望仰朝宗其四岳牧來庭日君王讌鎬時遷鶯辭谷早歸雁渡河遲蒼玉㸔紉佩彤弓入賦詩三千環虎旅十乘啟龍旗雲物迎韶節江河入睿思萬方同致祝春酒獻丹墀其五宫殿連長樂風光自太和花間金闕迥林下羽觴多草色霑衣袂鶯聲雜佩珂重華占日景復旦紀雲歌谷映霓旌出橋廻鳯艒過御溝流不盡處處是恩波其六萬夀詩七言律三十首校刋歴代年表翰林院檢討臣馬豫長慶朝元萬國同十洲正與紫㣲通禁城春鎖卿雲曉貝闕晴開旭日紅華祝三多來白叟衢謡九陌擁黃童天顔有喜臨丹陛純嘏無疆祝聖躬其一九重端冕致時雍萬載垂裳頌篤恭聖徳巍巍超舜禹仁風皥皥軼黃農春融殿閣爐烟細花鎖蓬萊仙露濃寳籙遥㸔瀛海貢瑶函玉笈紫泥封其二閶闔千門照夜釭宵衣旰食永經邦如天大業垂千禩似水恩波布九江閬苑鶯花催淑氣蓬山簫鼓振瑶牕萬年天子初周甲嵗嵗紅漿醉玉缸其三萬夀宫中絳節隨風吹仙樂繞瑶池綏來九有光鴻烈尊養千秋奉聖慈薄海同聲歌景福殊方望闕頌維祺朝陽亦效稱觥祝遥映南山入御巵其四紫極紅雲傍瑣闈庭燎花影晃朝輝天章奕奕球圖現御詔煌煌珠玉揮帝徳有文星斗煥聖朝無缺諌書稀小臣競作繁禧頌萬古乾坤載玉璣其五人樂堯天化日舒熙朝典册重璠璵百城圖史輝銀漢萬卷縹緗照石渠北極雲垂丹鳯詔南山日捧衮龍裾請㸔夀域多佳氣中有文光布太虚其六萬里鶯花繞帝都普天丕冒仰宏模百王謨烈當今備六合車書自古無北海清尊開御宴南山紫氣入天衢遥瞻劍珮趨蹌處玉宇琪花䕶蘂珠其七王㑹圖中拜舞齊紛紛鑿齒共雕題琅玕翡翠遐陬貢篠蕩瑶琨萬國齎􅌄窱含烟縈寳麝棼楣迎曉帶晴霓流鶯似解無疆祝故趂飛花繞闕啼其八草莽瞻天吉士偕青雲路廣歩金階别無人老商巖下更有誰留渭水涯閶闔平臨三殿迥笙簧疊進八音諧稱觴願獻如岡頌華嶽葱蘢瑞靄佳其九雉尾風和寳扇開香烟遥䕶玉皇來千門鼓腹安耕鑿五夜宵衣切解推青陌緑楊隨路合紫㣲瓊樹倚雲栽小臣拜逐嵩呼隊獻賦慙非司馬才其十共沐恩波近紫宸風飄花氣滿冝春臣工喜起承俞㫖中外賡歌拜聖人藻井日蟠金翡翠玉牀烟吐赤麒麟千行鷺序瞻天處願數春秋比大椿其十一帝道𢎞敷不世勲龍韜纔震息游氛千秋作覩遵仁化萬國咸寜奉聖君南極霞光融曉霧西山爽氣入朝曛羣黎處處歌繁祉遥望皇都五色雲其十二聖朝勤政日臨軒億兆章程秉至尊禮樂三千綿奕葉山河百二控屛藩冝春風轉珂聲細長信烟縈花氣繁青鳥年年來御闕蟠桃知熟幾千番其十三禹蹟經過拂寳鞍不縁麗景壯遊觀行旌日暖青虬舞歩輦雲移彩鳯摶淮海從茲波蕩蕩崆峒無復水漫漫皇圖萬禩春秋冨長戴堯天雨露寛其十四萬國朝天入玉闗皇州春鎖五雲間金㣲雪散銅烏静沙塞風清鐡馬閒日出光凝青瑣闥山呼聲動紫宸班六符帝瑞齊瞻仰願覲鼇扉識聖顔其十五帝徳無私秉化權恩隨時雨徧桑田頻霑大澤千門樂又感皇租一嵗蠲丹嶺鳯凰傳寳籙彤墀鵷鷺集長筵泰階景曜開瑶闕春滿蓬萊尺五天其十六絳烟郁郁傍丹霄物阜民康萬國饒三月春暉盈隴陌九天甘雨潤禾苖星移北斗堯樽滿風動南薫舜樂調草野承恩無可報歡呼聲徹紫宸朝其十七一人宵旰念民胞粟帛慇勤徧草茅濟濟英賢朝北闕熙熙黎老集東膠海天雨露恩周浹南朔東西徳竝包百物解依仁聖主祥麟率舞鳯來巢其十八環橋頖璧荷鈞陶親灑珠璣運綵毫教化覃敷周里巷人文蔚起選英髦翠烟春染金臺栁麗日晴熏玉井祧多士席珍朝北極瀛洲縹緲奏雲璈其十九熙朝仁義久漸摩清廟臣工慶協和皥皥民風忘帝力循循吏治息催科恩周出日人霑化徳普流沙海不波六合共生安樂國千秋長獻萬年歌其二十参天聖澤渾無涯大有頻占萬姓家九陌黄雲嬉婦子千村紅粟飽豚豭瓊林花發蒸晴日玉殿香飄縷絳霞處處桑麻呈帝瑞不須海上棗如瓜其二十一萬方介夀進霞觴三月鶯花滿帝鄉金錫徳音歌藹吉圭璋聖表頌顒卬鸞階花覆䕫龍隊螭陛雲隨鵷鷺行健運體天同丕冒遥知玉厯與天長其二十二巍巍帝徳本無名父老扶笻話太平入貢已傳良馬却尚衣不貴雉裘成九天風雨調元化萬國春秋協玉衡海宇昇平人共樂紫㣲深處現長庚其二十三堯天品物自流形雲鎖雞竿耀日星文教覃敷皆率化徳威竝馭漸無刑風㣲玉殿縈仙樂春暖瓊筵醉醁􅌬四海朝宗齊獻夀一人有慶萬千齡其二十四作人夀考徳恢𢎞特廣雲衢多士興雨露從天滋棫樸波濤盈海化鯤鵬瑶堦新緑和風染上苑深紅淑氣凝九土盡為天子祝遥将日月比升恒其二十五龍旗鳯輦出皇州四國廵方溯上游配地配天承帝澤一遊一豫為民謀躋堂共趂三春好介夀歡呼百禄遒漫伺䕫龍隨拜舞觀光髣髴在瀛洲其二十六龍飛九五帝天臨雨露風霆仰聖心閭里雍熙敦俗尚臣工精白凛官箴轆轤車馬闐朝市蹌濟冠裳煥古今物阜民安隨日永年年入貢萬方琛其二十七金門待漏集纓簮頻仰烟雲御筆酣寵錫欽承青玉案賡颺珍重碧瑶函長筵乍集春無限仙管初調樂且湛彷彿山靈呼萬嵗欣逢聖節赴朝參其二十八熙熙作息慶安恬世世蒼黎雨露霑上夀士民來草野稱觴童叟徧閭閻貂蟬映日千官拜旌斾迎風萬國瞻共祝皇仁如覆載長春永慶海籌添其二十九嵩呼拜闕媿琅函世沐恩波夙夜銜三殿堯樽傳紺雪九成舜樂奏英咸卿雲靉靆留青陌山氣巃嵸鎖碧巖何幸躬逢仁聖主萬年御極慶和諴其三十萬壽盛典初集巻八十五
