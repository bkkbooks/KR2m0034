body:
  text: 欽定四庫全書萬夀盛典初集卷二十典禮五養老三直𨽻巡撫趙宏燮等先後題報欽奉恩詔賞給老人絹綿米肉銀兩有差直𨽻巡撫趙宏燮題報所屬順天等九府八十以上老人一萬九千六百八十一名九十以上老人一千九百三十名共給過絹綿米肉價銀三萬五千八百五兩有竒又宣化府屬給過本色米一千三十二石江南江蘇巡撫張伯行題報所屬江寧等七府一州七十以上老人五萬六千四百八十八名八十以上老人一萬四千七百八十八名九十以上老人一千六百四十五名共給過綿米肉價銀二萬七百八十九兩七錢又本色絹一萬八千七十八匹江南安徽巡撫梁世勳題報所屬安慶等七府三州七十以上老人三萬七千七百五名八十以上老人一萬九千二百二十五名九十以上老人一千三百五十五名共給過綿米肉價銀二萬四千九百三十三兩有竒又本色絹二萬一千九百三十五匹山東巡撫蔣陳錫題報所屬濟南等六府七十以上老人七萬三百五十三名八十以上老人二萬六千七百三十四名九十以上老人八百二十三名共給過絹綿米肉坊價銀六萬三百七十六兩有竒又永利等各場竈七十以上老人二百六十四名八十以上老人七十一名九十以上老人十名共給過絹綿米肉價銀一百五十三兩有竒山西巡撫蘇克濟題報所屬太原等五府三州八十以上老人一萬八千一百四十二名九十以上老人二千一百七十一名共給過絹綿米肉價銀三萬七千五百四十八兩有竒河南巡撫鹿祐題報所屬開封等八府一州七十以上老人二萬一百九十一名八十以上老人六千四百八十九名九十以上老人一千六百五十名共給過絹綿米肉價銀一萬四千八百二十三兩有竒陜西巡撫永泰題報所屬西安等四府一州八十以上老人一萬三百八十一名九十以上老人一千五百九十八名共給過絹綿米肉價銀二萬七千二百八十九兩有竒甘肅巡撫嶽拜題報所屬平凉等四府七十以上老人一萬五千一百五名八十以上老人三千九百九十四名九十以上老人一千三百八十八名共給過絹綿米肉價銀一萬三千八十八兩有竒湖廣巡撫劉殿衡題報所屬武昌等八府七十以上老人二萬一百六十八名八十以上老人一萬三百三名九十以上老人一千九百六十二名共給過絹綿米肉價銀二萬七百七十一兩有竒偏沅巡撫潘宗洛題報所屬長沙等七府二州七十以上老人一千五百八十名八十以上老人一千二百四名九十以上老人九百六十四名共給過絹綿米肉價銀四千二百五十九兩有竒浙江巡撫王度昭題報所屬杭州等十一府八十以上老人一萬二千三百十九名九十以上老人八百七名共給過絹綿米肉價銀二萬六千二百四十一兩有竒江西巡撫佟國勷題報所屬南昌等十三府七十以上老人一萬五百四十二名八十以上老人三千七百五十名九十以上老人二千三百八十名共給過絹綿米肉價銀一萬三千四百四十五兩有竒福建巡撫覺羅滿保題報所屬福州等九府一州七十以上老人三萬四千九百六十一名八十以上老人三千八百五十四名九十以上老人八百九十二名共給過絹綿米肉價銀一萬一千一百四十四兩有竒又臺灣府屬給過本色米一百八十一石廣東巡撫滿丕題報所屬廣州等十府一州八十以上老人一萬一千六百一十二名九十以上老人八百五十一名共給過絹綿米肉價銀二萬五千七百一十三兩有竒廣西巡撫陳元龍題報所屬桂林等十二府七十以上老人五百五十名八十以上老人二百九名九十以上老人七十一名共給過絹綿米肉價銀五百五十九兩有竒又本色米二百十三石四川巡撫年羮堯題報所屬成都等十府六州七十以上老人四百九名八十以上老人一百八十四名九十以上老人五十四名共給過絹綿米肉價銀六百三十兩有竒貴州巡撫劉䕃樞題報所屬貴陽等十二府七十以上老人一千三百四十八名八十以上老人三百七十一名九十以上老人一百二十三名共給過絹綿肉價銀八百二兩有竒又本色米六百十七石雲南巡撫吳存禮題報所屬雲南等二十府七十以上老人六千三百七十九名八十以上老人四千五十九名九十以上老人四百四十六名共給過絹綿肉價銀五千六百四十四兩有竒又本色米四千九百五十一石奉天府府尹董宏毅題報所屬奉天等二府七十以上老人二百十五名八十以上老人六十五名九十以上老人八名共給過絹綿肉價銀九十五兩有竒又本色米八十一石川陜總督鄂海等先後題報欽奉恩詔賞給駐防八旗老人銀兩有差康熙五十二年三月十三日兵部題為欽奉上諭事准行在理藩院咨稱康熙五十一年五月二十七日太監梁九公傳㫖查內扎薩克喀爾喀厄魯特歸化城察喀爾老人先有查民人老人之例這次亦照此例查不必急速或他們有已來者或有探信來者即將印文交與他帶去著各固山照此嵗以上查明保來將此文交與扎薩克等元旦來朝之人親身帶來其不來之扎薩克即著協理台吉帶來再八旗滿洲䝉古漢軍盛京黑龍江寧古塔右衛江寧杭州荆州西安福建廣東等處並漢軍將軍副都統城守尉防守尉所在地方該衙門俱各行文亦照此將老人查明報部具奏欽此除內扎薩克喀爾喀厄魯特本院行查外為此咨㑹等因前來准此臣部通行八旗各省駐防等處並察哈爾八旗去後其京城八旗年老之人都統查明具奏外今各省將軍副都統城守尉防守尉關口守禦察哈爾總管各將所屬地方老人查明保奏前來查得奉天將軍伯常保住等來文七十以上老人一千二十五名八十以上老人二百七十五名九十以上老人一十二名共一千三百十二名此內官員二十九名另户一千二百八十三名統領恩丕等來文七十以上老人八十名八十以上老人十八名共九十八名此內官員十四名官員之妻二名另户女人十五名寧古塔將軍孟俄洛等來文七十以上老人三百四十四名八十以上老人七十九名九十以上老人五名一百三嵗老人一名共四百二十九名此內官員十六名另户人四百一十三名黑龍江將軍宗室楊福等來文七十以上老人二百五十三名八十以上老人五十名九十以上老人四名共三百七名此內官員十五名另户人二百九十二名奮威將軍公費揚古等來文七十以上老人三十名八十以上老人二名共三十二名此內官員五名另户二十七名西安將軍西住等來文七十以上老人一百九名八十以上老人三十一名九十以上老人一名共一百四十一名俱另户荆州將軍逹爾占等來文七十以上老人三十七名八十以上老人五名共四十二名俱另户杭州將軍宗室諾羅布等來文七十以上老人十三名八十以上老人二名共十五名俱另户江寧將軍鄂克遜等來文七十以上老人五十五名八十以上老人六名九十以上老人二名共六十三名俱另户鎮海將軍侯馬三竒等來文七十以上老人五十九名八十以上老人二十四名九十以上老人一名共八十四名俱另户廣州將軍管源忠等來文七十以上老人七十名八十以上老人二十三名九十以上老人一名共九十四名俱另户福州將軍祖良璧等來文七十以上老人二十六名八十以上老人六名九十以上老人一名共三十三名俱另户太原城守尉阿琳來文七十以上老人十一名八十以上老人一名共十二名俱另户德州城守尉努勒布來文七十以上老人二十三名八十以上老人五名共二十八名此內官員之妻一名另户男人十二名另户女人十五名滄州城守尉索住來文七十以上老人三名俱另户保定府城守尉馬海來文七十以上老人十名八十以上老人一名共十一名俱另户良鄉縣防守尉胡什巴來文八十以上老人一名係另户女人順義縣防守尉常存來文七十以上老人四名八十以上老人二名共六名此內官員之妻一名另户女人五名寶坻縣防守尉吳爾泰來文七十以上老人三名俱另户東安縣防守尉賽住來文七十以上老人十一名八十以上老人三名共十四名此內官員一名另户女人六名包衣男人二名包衣女人五名昌平州防守尉王愛來文七十以上老人一名另户人固安縣防守尉伍勒來文七十以上老人一名另户人玉田縣防守尉郭里來文七十以上老人四名八十以上老人一名共五名此內官員二名另户人三名永平府防守尉阿爾賽來文七十以上老人三名八十以上老人一名共四名俱另户三河縣原任防守尉索顔來文七十以上老人二名此內官員一名另户男人一名霸州防守尉阿逹哈來文七十以上老人二名八十以上老人一名共三名俱另户山海關總管逹里來文七十以上老人十九名八十以上老人十名共二十九名此內官員一名官員之妻一名另户男人九名另户女人十一名包衣男人四名包衣女人三名張家口城門尉馬鼐來文七十以上老人六名八十以上老人三名共九名此內官員二名另户男人七名張家口外牛羊羣總管折庫納來文七十以上老人四名俱另户獨石口守禦花善來文七十以上老人二名俱另户喜峰口守禦薩克查來文七十以上老人三名八十以上老人二名共五名俱另户冷口守禦烏爾禪來文七十以上老人一名八十以上老人一名共二名此內另户男人一名另户女人一名鑲黃旗察哈爾統領肯太等來文七十以上老人一百七十九名八十以上老人十名共一百八十九名此內官員五名官員之妻五名另户男人五十九名另户女人一百二十名正黃旗察哈爾統領色楞敦住等來文七十以上老人一百七十一名八十以上老人二十名九十以上老人三名共一百九十四名此內另户男人四十名另户女人七十八名包衣男人三十九名包衣女人三十七名正白旗察哈爾統領常齊保等來文七十以上老人一百三十七名八十以上老人十二名共一百四十九名此內官員一名官員之妻二名另户男人五十二名另户女人九十四名正紅旗察哈爾統領常明等來文七十以上老人二十七名八十以上老人二名共二十九名此內另户男人十八名另户女人十一名鑲白旗察哈爾統領阿育什等來文七十以上老人四十五名八十以上老人四名共四十九名此內另户男人二十五名另户女人二十四名鑲紅旗察哈爾統領阿里渾等來文七十以上老人三十八名八十以上老人四名共四十二名此內官員之妻二名另户男人十七名另户女人二十三名正藍旗察哈爾統領黑森等來文七十以上老人一百名八十以上老人十三名共一百十三名此內另户男人四十一名另户女人七十二名鑲藍旗察哈爾統領佛保等來文七十以上老人六十九名八十以上老人八名共七十七名此內另户男人二十四名另户女人五十三名以上老人七十嵗以上者共二千九百八十名八十嵗以上者共六百二十六名九十嵗以上者共三十名一百三嵗老人一名共三千六百三十七名此內官員九十二名官員之妻十四名另户男人二千九百一十三名另户女人五百二十八名包衣男人四十五名包衣女人四十五名為此謹題奏聞本日奉㫖交與內閣陜西西安布政使司為知㑹事䝉總督川陜鄂按驗准户部咨前事內開西安駐防八旗滿洲䝉古漢軍年老七十八十者賞給銀兩另造清冊緣由案行到司䝉此遵將支過銀兩數目兵丁花名冊理合造報施行內開鑲黃旗滿洲七十老人一名漢軍七十老人八名正黃旗滿洲七十老人三名八十老人二名漢軍七十老人八名八十老人三名正白旗滿洲七十老人十二名八十老人二名漢軍七十老人五名八十老人一名正紅旗滿洲七十老人七名八十老人二名漢軍七十老人八名鑲白旗滿洲七十老人一名漢軍七十老人八名鑲紅旗滿洲七十老人六名八十老人一名漢軍七十老人九名八十老人三名正藍旗滿洲七十老人三名漢軍七十老人六名八十老人二名鑲藍旗滿洲七十老人八名八十老人二名漢軍七十老人十一名八十老人一名以上共七十老人一百四名每人賞銀四兩八十老人一十九名每人賞銀六兩共賞過銀五百三十兩各省駐防八旗老人并察哈爾八旗老人賞給恩例俱照此不備載萬夀盛典初集卷二十
