body:
  text: 欽定四庫全書萬壽盛典初集卷一百十九歌頌五十九生監諸臣十萬壽無疆頌集經有序生員臣胡夢熊臣聞元亨利貞廣大無加於乾徳高明博厚悠久莫過於聖人蓋盛徳應於無疆斯壽身因以壽國大業徵於不息而壽世益以壽身三皇御世代擅大年五帝乗權時傳過厯夏商受籙克享用以凝庥文武開基誕膺厥惟多福自来哲后必得遐齡振古如兹於斯為盛欽惟皇帝陛下統貫三才綱維萬有握乾符而出震履泰運以知臨乃聖乃神乃武乃文徳邁百王而上自西自東自南自北功薄四海而遙綏萬邦而仁為育義為正百姓昭明既錫福而保極熙庶績而府以修事以和九功歌叙亦戒威而董休積五十二年之旰食宵衣克勤克儉合千八百國之民瘼吏治惟幾惟康喜聖壽值夫揆初適帝年正當鼎盛珠聮璧合重逢六甲之周雲爛日華纔見一元之復海添籌而多益山獻壽而彌增八表同歡兆人具慶天開閶闔九重披離照之輝地簇衣冠六㝢徧巽風之拂嵩呼金殿千官鳴珮以来朝星拱紫宸萬國獻琛而上賀統下土之戴高履厚羣依有道之光華萃普天之負性含靈共祝無疆之福祉允矣萬年盛事誠哉一代𢎞庥臣志殷錫極學愧陳疇舉頭日近神遊鵷鷺之班極目天高跡逺星辰之列躋堂而循邠俗願進一觥擊壤而詠堯風擬申三祝用賡經語以効揚言爰拜手稽首而獻頌曰維天之命陰隲下民有相之道毗於一人首出庶物為天下君成性存存乃見天則濬哲文明溫恭允塞含𢎞光大剛健篤實克綏厥猷下土之式參天兩地其道大光奄甸萬姓寵綏四方增其式廓幅員既長建其有極若網在綱左右有民率由厥匹佛時仔肩所其無逸思日孜孜不遑暇食柔逺能邇亮采惠疇旁求俊乂周爰咨謀六服羣辟克壯其猶知人則哲安民則惠既富方穀罔不咸賴天施地生裒時之對布昭聖武赫赫厥聲幹不庭方四海永淸九有有截展也大成建中於民彰善癉惡象刑惟明式遏寇虐庶獄庶慎萬民是若思皇多士有壬有林惟帝時舉克廣徳心三宅三俊大輅南金省方觀民式是百辟眚災肆赦時萬時億阜成兆民兆民允殖相土烈烈來遊來歌聖謨洋洋允猶翕河纘禹舊服九澤既陂地平天成以康四海萬世永賴罔不率俾帝徳廣運無怠無荒有嚴有翼表正萬邦克寛克仁允文允武赫赫明明照臨下土光被四表各得其所無射亦保不顯亦承聖敬日躋受之以恒福禄来求以莫不増重巽申命亦孔之厚罄無不宜天子萬壽有物有則耳目聰明以引以翼血氣和平一人有慶萬國咸寧基命宥密施於孫子於萬斯年自今伊始如月之恒如日之升大亨以正六位時乗依其在京以受方國敷天之下會其有極知微知彰知柔知剛顒顒卬卬穆穆皇皇日就月將長發其祥降福穰穰萬壽無疆萬壽詩集唐二十韻生員臣周師周聖徳超千古宋之問車書會萬方陳陶千門欣應瑞李中五嶺盡来王李嶠勲共山河列崔曙恩霑士庶康沈佺期普天霑愷澤許敬宗率土慶輝光張九齡賜帛矝耆老沈佺期歌詩冠柏梁獨孤及立言成雅誥李中搖筆起風霜李白才傑俱登用杜甫邊城詎假防楊巨源四時調玉燭劉禹錫萬里轉旂常唐太宗神武威兼徳盧肇徽猷柔濟剛李嶠觀風隨按察孟浩然敦俗勸耕桑唐元宗煥爛聲明發張文琮參差歌管揚賈玉焦勞皆實錄韓偓聲績著周行唐元宗習習東風扇王轂油油聖澤旁崔禹錫歌謡連上苑鄭畋雲物麗初暘李竦此處雲霄近宋迪前攀鸞鶴翔李羣玉福庭增氣象盧肇壽酒樂城隍杜甫符應千齡運陳陶功垂萬世昌沈佺期生逢堯雨露徐仲雅願補舜衣裳杜牧北極星遙拱杜牧南山壽更長梁鍠小臣持獻壽韋莊惠化且無疆王若嵓萬壽頌生員臣李樹徳皇矣天子至徳昭清受天之命居常以貞辟如天地博厚高明其徵悠逺壽靡斯京其一亹亹聖徳匪居匪康既勤宫府以及四方薄海内外莫不來王曰天子壽民説无疆其二休徵上叶景星在天瑞氣下應醴泉在淵俊民以章百穀以堅曰天子慶億萬斯年其三瞻彼中田禾黍麥菽粢盛馨香黎民是育天子萬年貽我嘉穀天子萬年宜其介福其四皇帝曰咨余維敬哉顧兹禎祥益厪余懐勉勉令徳靡止靡囘允矣天子五福方來其五天子之壽超乎古今天子之徳協乎高深如岡如阜如玉如金永綏四方上帝之心其六萬壽詩五言排律十四韻生員臣張廷琳貞恒開景運奎壁煥文光久道昭千古深仁洽萬方乾坤隆帝治禮樂飭王綱至徳超三五神功軼漢唐九重凝福祉萬國靄春陽仁至靜而壽徳純熾以昌華衢三祝詠周室九如章瑞氣彌天煥彤雲繞殿翔廷呈金鏡錄杯泛紫霞觴鳯闕傳綸綍鵷班藉翊匡昇平編雅頌芹藻叶笙簧多士騰懽忭羣寮益豫康八紘歌有道四海頌無疆共沐恩波永堯天日正長萬壽詩五言排律六韻生員臣孟芾平成開泰運熙洽著升猷大徳年俱永至誠業自悠有天皆浩蕩何土不懐柔茂育培楨榦歡騰益海籌龍光承紫極鳯翽出丹丘竊效南山頌皇躬正迓庥萬壽詩五言排律二十八韻生員臣葉舒瑞色凝珠殿薰風溢帝鄉一人初甲子萬國獻賡颺大徳乾坤運欽明日月光巍巍齊泰岱皥皥嫓羲皇讓號謙沖著崇儒理學彰修身敦孝弟勵俗振綱常巡幸施膏澤登庸擢俊良春秋勤補助河海靖汪洋疊沛蠲租詔頻頒宥過章文謨皆典誥武畧邁周商預課司民吏𢎞開選士塲褒功隆世裔尚老錫冠裳禁苑松筠茂南宫翰墨香揮毫融八法琢句駕三唐膺籙龍飛峻添籌鶴算長卿雲籠翠葆旭日浴扶桑碧茁千年藕青敷九節菖觴稱瑤闕下桃捧御爐傍歴歴花羅錦嚶嚶鳥弄簧鈞天仙樂奏雕䍐綵斿揚虎拜歡聲動麟呈淑氣翔車書歸正朔政教訖遐方臣質慚蓬梗葵衷向太陽父曾叨寵眷家共戴君王喜遇昇平會欣霑雨露瀼晨昬瞻斗極踴躍籲穹蒼犬馬情彌切涓埃志未忘金甌綿永固玉厯慶無疆萬壽百萬頌有序生員臣楊邦彦臣聞盤古一萬八千年首三皇而建極伏羲百九十四嵗先五帝以開祥或推神策於軒臺得天之紀或應瑤光於若水爲厯之宗莫不寶祚靈長享無疆之上壽因而天休洊至集方富之鴻圖欽惟皇上徳合兩儀恩覃八表承乾膺籙齡齊日月之長出震披圖治邁唐虞之盛文教隆而三統備武功定而九伐彰心有感以皆通澤無逺而弗届開闢未臣之宇咸奉車書光華復旦之民恒安耕鑿固已宏開壽國地久天長廣覆春臺衢歌巷舞矣慶届陽春之三月恭逢聖誕之六旬鳳厯編年周甲子而循環迭運龍飛御極統元會而恒久彌光集萬國之衣冠梯山航海開九天之宫殿鳯翽麟遊煌煌千古之祥符皥皥兩間之景運臣生逢盛世幸際昌期沐教養於高深橫經有日仰升恒於浩蕩濡翰難名集古百言效三多之祝華敬稱萬壽陳五福之齊天頌曰天子萬壽詩經萬福攸同詩經萬邦惟慶書經萬國承風樂府三稱萬嵗晉書萬物資生易經萬世永賴書經萬國咸寧易經朝宗萬宇隋書公庭萬舞詩經於萬斯懽隋書萬方觀禮齊書仁育萬物性理義正萬民性理吹萬不同莊子萬表星陳魏書率育萬類宋書為萬物主史記萬夫之望易經萬氣之祖内經篇撫綏萬邦書經奄甸萬姓書經師保萬民書經萬流仰鏡文選商𣙜萬俗吳都賦萬世為福鬻子萬姓為心文選萬物竝育中庸萬邦作孚書經萬方以祗籍田賦且萬且億文選萬民賴之東巡誥萬理明淨論語註言經萬世文選萬物我賴晉書功流萬世文選萬國攸平文選式固萬世文選於萬斯年詩經萬民以濟易經萬箱億庾梁書萬穴俱流五車韻瑞千門萬户漢書萬福来求詩經萬燧星繁文選萬騎雲屯圜丘歌萬殊之本中庸註萬乗之尊鄉飲酒賦知周萬物易經萬物覆焉中庸曲成萬物易經萬物育焉中庸或相千萬孟子萬舉萬全漢書萬物納慎晉書萬國陶甄隋書萬古一遇文選壽考萬年詩經萬福維新唐函類萬物化醇易經萬端麟崪漢文萬祥必臻聖主得賢臣頌君臨萬㝢唐史衣裳萬國樂府萬萬有餘海賦時萬時億詩經萬億及秭詩經非止萬㡬石銘闕大樂萬嵗漢詩一本萬殊性理以一行萬韓詩外傳萬户如一文選天子萬年詩經萬邦獻力郊祀歌萬寶增煥文選萬物一齊莊子呼吸萬里江賦萬國相維文選萬嵗冰桃拾遺記千枝萬葉淮南子萬物以嘉爾雅以成萬業五車韻瑞八萬法藏漢文萬物祖矣高唐賦云云萬有齊書萬邦是紀漢書萬邦黎獻書經情固萬端文選萬事既具史記萬國齊懽晉書萬世長策五車韻瑞萬代一時齊書道行萬類文選萬物熙熙封禪頌保兹萬方郊祀歌萬里呈祥文選經營萬億漢詩萬舞洋洋詩經千秋萬嵗文選萬壽無疆詩經萬壽詩七言排律十二韻生員臣王沖北闕春融紫氣翔禎符泰運厯逢昌雲開璧月流華渚風淨瑤樞繞電光瑞旭舜廷賡復旦晴霞軒陛覲當陽八方獻壽共球集四海陳詩錦繡張上苑花明縈劍珮鈞天樂奏應笙簧文謨已著昭囘象武烈羣欽撻伐彰雲雨施行多愷澤風雷鼓厲屬乾剛成天丕績兼平地問俗殷懐更省方遂有深恩蘇草木肯教薄海阻梯航九如自昔垂風雅百禄於今效拜颺蓬島金芝從地秀瑤池玉醴自天將小臣欣附衢謠後熙皥同游化日長萬壽詩七言截句十首生員臣陳康元曈曨曉日上蓬萊周甲初逢壽域開童叟稱觴齊抃舞山呼萬口一聲雷其一條風遲日景昭融霮䨴恩膏薄海同黎庶已忘熙皥樂太和元氣滿寰中其二端拱垂裳仰化神清時盛治更無倫雕題窮髪梯航徧四海尊親奉一人其三閶闔初開曉箭遲蒼蒼春色靄罘罳冠裳雍肅臨軒早鹵簿分行侍玉墀其四宫花苑栁麗昌辰處處雲璈綵翠新邀得至尊添霽色一時繡陌十分春其五郊圻酺樂嵗時豐比户含哺祝華嵩青鳥乍來齊跂望彩斿仙樂紫雲中其六一徳虞廷共拜颺昌期髦士慶觀光躋堂漫獻千秋鏡日月中天照萬方其七糺縵卿雲拱御樓河山長此鞏金甌縁知五福箕疇備瀛宇初添第一籌其八六宇同風樂太平瞻雲就日共抒誠歌謠擬效康衢意蕩蕩巍巍不可名其九鳯闕觚稜傍五雲遙瞻佳氣自氤氲小臣拜手無他願天保升恒頌聖君其十萬壽頌生員臣任湖欽惟我皇上聖冠勲華壽參天地金符長祉隆教育之豐功瑶籙永年凝君師之駿命臣民歌舞羣抒介壽微誠逺近悅來共仰作人雅化允邁百王上治誠符元會昌期宵衣旰食之猷已垂謨訓規天條地之徳盡播聲詩兹者宸厯甫周花甲樂調風順雨之良辰天心自協輿情喜就日瞻雲之嘉會浮河五老瞻左个而来朝輯瑞九州坐華堂而受賀湛露與鸞旂竝逺虎拜千官惠風隨豹尾俱翔嵩呼萬國臣湖生成聖世沐浴王畿戴高厚以懐慚敢擬九如之頌仰龍光而敬祝䖍稱萬嵗之觴頌曰當今聖皇祉籙方昌三才竝位五緯齊光龍徳中正天行自強恩深四海徳被八方歡騰黎庶禄眷穹蒼維兹華節司候勾芒瑶光貫月蒼帝臨房神聖篤生允協嘉祥甲子甫周景祚積慶爰開閶闔坐於明堂九州玉帛萬國圭璋東漸西被山海梯航鈞天齊奏仙音寶坊敷天之下罔不稱觴或流雲液或瀉桂漿下逮父老同酌兕觥萬人獻壽萬年壽長青陽布徳百卉芬芳露零赤黍日照柔桑十日雨沛五日風颺嘉禾瑞麥千倉萬箱休徵稠疊降福穰穰自古蕃熟六合歡康百年教育多士濟蹌共遵王路咸示周行驊騮千里控馭康莊東連閩越北訖幽荒趨闕祝壽彈冠促裝聖朝之澤如露瀼瀼每逢十載更啟文塲苑畜祥麟材收豫章鶴鳴琪樹鳯噦高岡殊恩莫報厚禄難償聖教所敷恭已巖廊王度是式金玉其相統接杏壇道法紫陽羲文易象堯舜羮牆宣暢六經義窟微茫成章焜燿天文七襄揮毫藻殿得句林塘筆摇五嶽詞映三湘字重上估學富書倉人瞻月露家誦琳琅文徳孰竝武功難量謀深幃幄策定金湯神機獨運龍騰高驤兵驅羆虎劍掃欃槍克除跋扈實靖披猖百粤拜手滇黔搤吭燕然封雪沙漠凝霜旌旗西指鴈塞来王河流淼淼海水泱泱永成堤岸久罷􅯕艡方畧親授韜鈐莫當料人運掌闢地探囊龍君効順河伯望洋三山鬱鬱淮泗湯湯恢廓鴻績簡冊輝煌三上尊號猶讓未遑多能天縱藝事精詳日月定位星宿分張音諧律呂氣辨笙簧數推三角弓發大黃秋擒白額冬獵黃羊樂和天籟聲召鸞凰手拈筆札親纂縹緗宸襟粹美令聞令望賜租退責嵗以為常刑措如周開網如湯天心本恕陽徳尤剛百寮整飭神威肅將羮調金鼎溪釣玉璜銓衡清厲訟絶桁楊倉廩鎖鑰山林禁防禮司宗伯武戢天狼祗承寶訓業著垂裳民調寒燠時若雨𤾉仁同覆載功邁軒唐康衢擊壤帝力相忘幅員無外時際明良易占恒久詩歌壽臧天徳難名庶竭中藏敢効華祝萬壽無疆萬壽詩四言四首首五言律四首七言律四生員臣周監我皇神聖古莫與京徳暨函夏澤漸萌生堯階蓂莢壽域天增下土拜颺茀禄永膺其一遐觀往聖崇本後末問寢視膳彜倫攸植尊養兼至孝思維則禄位名壽大徳必得其二天開景運世際昇平垂裳而治體乾健行春風春雨惠我羣生九圍式化載歌載賡其三亶聰亶明我皇作則乃啟乃沃從敬是吉緯史經經朝乾夕惕詢於黃顓萬世不易其四瑤圖綿寶厯玉笈著長生貢獻重三譯聲歌叶九成熙熙元有象蕩蕩莫能名羽葆迎仙馭行厨進兕觥其一南極祥光燦西池瑞靄浮椿齡常不老花甲數從頭酒自麻姑勸桃從曼倩偷絃歌鳴皥皥人世有丹丘其二聖主齊年日雍熙邁盛唐梯航来玉帛雲漢富縹緗帝力歸何有民情頌不忘小臣瞻仰切稱祝介無疆其三旭日龍樓曉當陽帝徳全箕疇膺五福莊算衍千年黼扆和鸞盛彤庭振鷺鮮萬邦歌惠愛川至日升篇其四天開壽域燦長庚問夜如何夜向明闕下春臨雙鳯集車前雲捧六龍迎西循弱水來金母北抵崆峒見廣成聖世無為安作息臣民有幸樂昇平其一輯瑞朝端職貢殊太常引贊效嵩呼桐花始放卿雲爛榆火初燃湛露濡四海無疆綿聖壽萬年有道亘皇圖天恩寵渥傳宣急勅賜瀛臺有大酺其二絳節霓幢下九天螭頭嵩祝會羣仙祥符貫月歌重旦慶洽流虹享大年味溢金莖梨徑尺香生玉液藕如船霞觴獻自餘杭姥不用方平買酒錢其三午夜鐘聲報曉朝尚方重獻漢宫桃星臨燭影開朱户煙靄爐香引赭袍曉樹流鶯金縷曲晴梁語燕紫雲璈作人雅化垂無極臣為吾皇賦譽髦其四萬壽詩七言律四首生員臣秦應陽閶闔昭融氣象新萬年聖節正陽春和風浩蕩迴芳野旭日曈曨耀紫宸道藴苞符開壽域厯環枝榦轉鴻鈞川增松茂申歌詠永賴皇圖佑下民其一華渚虹流溯發祥瑶宫佳氣䕶垂裳中天廣大星雲燦薄海雍熙日月長疇範總歸皇建極乾坤應并壽無疆西山直與蓬壺接桃實方傳萬嵗觴其二聖徳含𢎞養太和風傳泮渙協菁莪羣工喜溢三多祝髦士恩承萬嵗科豐稔已占禾㡬穗安恬早見海無波清寧景象誰摹繪只有聲聲擊壤歌其三萬國瞻依仰聖顏昇平樂事滿人寰鳯鸞絲管紅雲外錦繡樓臺碧漢間扶杖紛来朝北闕獻芹齊許祝南山草茅最幸龍光近進頌容隨鵷鷺班其四萬壽詩五言律一首生員臣魏雲繞電欣良月璿圖有道長雲翻五色曉鶴舞萬年觴玉露天開瑞神芝地獻祥蓬萊真不逺瞻拜肅冠裳萬壽詩七言律一首生員臣朱承恩華闕丹山仰帝都天申佳節應祥符蒼生久沐雍熙治黃閣新霑雨露敷秋水魚龍神變化春風桃李氣昭蘇太平景運留終古竚見文河出瑞圖萬壽詩七言排律十二韻生員臣黃之洵閶闔𢎞開化日長寰區競進紫霞觴籌添海屋呼嵩岳樂奏簫韶繞上方萬國朝宗歌有道千官拜手祝無疆金甌卜厯河山永玉燭調元日月光八百春秋周甲子三台奎壁耀精鋩網開俊乂𢎞遴選會起風雲慶對揚鳯詔頻宣来紫禁龍門爭躍盡思皇致身自得詩書效華國行看黼繡彰鎖院風清文作錦棘闈春暖字生香嘉賓式燕瑶池醉吉士承歡杏苑翔自是休明增福祉共知清宴樂平康聖神文武超皇古億萬斯年頌熾昌萬壽詩七言律一首生員臣魏鵬天際長庚映紫宸作人曠典下絲綸澤施棫樸殊恩重算等岡陵甲子新白玉階前紅日曉黃金殿上碧桃春昇平共樂明良際願祝春臺感至仁萬壽詩七言律一首生員臣唐貞觀聖主雍熙洽萬方賢良喜起煥文章千官競進南山頌多士羣稱東海觴紫氣乍浮仙掌露紅雲遙接御爐香普天率舞休徵集萬嵗歡呼祝未央萬壽詩七言排律十韻生員臣楊瑛詩賡天保頌如岡世際熙和萃百祥宫栁籠煙春正麗階蓂含露日初長御爐香靄飄仙仗紫禁鐘嚴肅衮裳屢慶年豐歌有道欣逢聖壽祝無疆武功全定昇平久文治休昭日月光樂奏南薰揚白雪尊傾北斗瀉天漿宏霑雨露覃多士逺沛絲綸及萬方大地羅才儲翊贊儒生報國顯文章西山桂馥開瓊宴南國桃舒攄錦囊嵗嵗菁莪邀異典歡逢景運軼陶唐萬壽詩七言排律十韻生員臣賈應元萬國嵩呼百福同九重廣闢四門聰雲開鳯闕天顔喜日麗瑶池壽域崇靈草堦前三秀紫仙桃枝上萬年紅鳯銜丹詔恩何溥鶴舞彤庭日正融共獻瑶觴三月裏爭看蕋榜百花中千官虎拜隨仙仗三殿龍光貫采虹栁汁染袍明玉陛桂香盈袖映蟾宫九成仙樂簫韶進八表才人頌禱工玳瑁筵開霞燦爛珊瑚網盡玊璁瓏綿綿寶厯齊天慶願效華封祝聖躬萬壽詩五言排律十二韻生員臣朱韓帝徳符天運皇心協健行堯階𢎞雨露禹甸躋昇平遲日江山麗和風嵗序清六旬周甲子八表慶長庚寶厯傳金鑑丹宸獻玉觥九如聮虎拜三祝雜鸞笙南極輝長耀文昌瑞早成章從雲漢煥星看玉衡明秋實垂垂擷春華燦燦呈九重施渥澤多士戴殊榮覆載真同量勲華未易名普天歌萬壽嵩岳應連聲萬壽詩五言排律二十四韻生員臣劉文煊世際雍熙盛躬應寶籙昌虹流符運會電繞叶禎祥敦敏齊軒后平章邁聖唐普天同樂育曠代遇明良恰喜薰風度兼欣化日長呼嵩爭虎拜搢笏列鵷行共效三多祝咸稱萬壽觴瑶琨通卉服筐篚徧梯航擊壤歌初起鈞天樂未央獻琛傳絶域執玉自遐方徳被無雷國恩覃出日鄉九州歌樂土百辟盡来王為進岡陵頌還依雲漢光禁鐘聞逺近庭燎羨輝煌舞蹈瞻圭璧賡颺雜珮璜歡呼洽士女愛戴極要荒樺燭明歌席爐香襲舞裳天威凜咫尺臣職肅趨蹌絳節来蓬島青鸞下建章銅盤承玉露金椀注瓊漿居鎬詠魚藻登臺賦柏梁數當符二策厯自邁三皇卜世真堪羨添籌詎易量小臣何以報長此頌無疆萬壽盛典初集卷一百十九
