body:
  text: 欽定四庫全書萬壽盛典初集卷五十六慶祝五貢獻三是月親王以下閒散宗室覺羅以上醵金鑄佛慶祝萬壽詔送栴檀寺宗人府摺奏恭逢皇上萬壽無疆大慶親王以下閒散宗室以上共一千四十五人覺羅共一千五百五十六人宗室覺羅共二千六百一人公同斂金敬造金佛金滿搭已經告成供奉何處相應請㫖本年三月十三日轉奏奉㫖著供奉在栴檀寺是月內閣及部院衙門諸臣先後進獻古玩書畫詩冊等物慶祝萬壽上收受書畫詩册有差餘皆却之是時內外文武諸臣各照品級進獻鞍馬縀匹皇上槩却不收諸臣末由稍展或形為歌詠或施諸藻繪以自寫其忠愛之心又各出其家藏所有古玩書畫等物先後進獻或以九計或以十計或以百計璀璨羅列陳於殿陛者殆無虛日皇上却之如初隨即宣發本人無從記注至於輦下各衙門諸臣公進之物雖較之天府竒珍萬不逮一然亦芹曝之忱所寄且係衙門公摺尚有檔案可稽特槩為編次備著於篇至滿洲內府諸臣公進儀單無檔可稽止就其各行進獻者附載一二以存其槩一時筐篚玉帛之盛尊親愛戴之誠於此略見焉內閣大學士臣溫達臣松柱臣李光地臣蕭永藻臣王掞學士臣馬良臣傅爾呼納臣舒蘭臣巴格臣阿爾法臣綽竒臣蔡升元臣彭始摶臣鄒士璁臣沈涵恭進元板貞觀政要一套宋板文選類林二套舊板考亭淵源録一套舊板晦菴文抄一套舊板理學語要一套宋人手抄文翰類編一套舊板五音集韻一套橫渠易說一套正䝉㑹稿一套列子二套舊板柳柳州集一套舊板稽古録一套舊板儀禮圖二套舊板自警編一套舊板直音篇一套陳賢良樂書二套合刻考古博古圖八套事類賦一套朱子詩真蹟一卷黃庭堅正書二詩一卷米元章書詩一卷米元章書十紙說一册趙孟俯泥金真蹟一卷趙孟俯書西王母記一軸趙孟俯跋趙大年畫一卷趙孟俯書池山賦一卷董其昌書詩一卷董其昌書天馬賦屏幅全副文徴明行書真蹟一卷董其昌書唐人詩一軸董其昌行書一軸趙千里瑤池春曉圖一卷劉松年瀛洲圖一卷黃筌花鳥一卷趙孟俯春郊牧馬圖一卷仇英太平春社圖一卷百鹿圖一軸董其昌書畫一卷黃公望巒容川色圖一卷李成蕭寺晴巒圖一軸趙孟俯春山聯轡圖一軸李辰虬松圖一軸宋製蟠桃玉杯一隻宋製荷葉玉杯一隻玉天鹿筆架一座玉桃杯一隻宋製夔龍玉水注一具漢玉書尺二條玉方印池一具蓮子玉壺一執玉花瓶一座玉筆洗一具玉龍盤四面玉水盛一具玉桃杯一對向日葵玉盤一面漢玉圓巵一隻天雞夔龍玉卣一座漢玉方巵一隻銀晶杯一隻靈鳩石一座祥雲硯一方磁荷花囊一具宣窑花囊一座哥窑乳爐一座正德緑龍盤二面龍碗二隻宣窑寶月瓶一座八仙碗一隻官窑筆洗一具正德緑龍盤六面萬厯福祿壽碗一對宋粉定窑花盒一對宋官窑雙耳爐一座成化窑五彩杯一對萬厯窑五彩髙足杯一對宣窑把盞二隻成化窑白磁爐一座嘉窑磁瓶一座哥窑香爐一座翰林院掌院學士臣揆叙臣湯右曽及侍讀學士侍講學士侍讀侍講修撰編修檢討庶吉士等官詹事府少詹事臣王奕清及左右春坊庶子諭德中允贊善司經局洗馬等官恭進萬壽詩册九套計九十本南書房翰林諸臣恭進萬壽詩册一套計二本養心殿諸臣恭進尚書臣胡㑹恩晉書十套合璧事類十二套續文章正宗二套歐陽修集二套梅聖俞集一部曽鞏集一部董其昌書老人星見詩一軸文徴明書御溝新柳詩一軸祝允明書麥穗雙岐詩一軸侍郎臣王原祁考工記解一部張栻集一部祝允明字帖二套倪瓚林亭遠岫圖范寬層巒疊翠圖黃公望翠嶂瑶林圖吳鎮秋山蕭寺圖臣畫册頁十幅臣畫挑山二幅侍郎臣宋駿業宋板書二十四套唐寅畫江山萬里圖一卷青緑百環漢鼎一座青緑雷文花尊一座漢玉荷葉杯一隻羊脂玉筆洗一隻漢玉夔龍書鎮一箇十錦皇扇二十匣每匣十把臣畫嵩山積翠圖一幅臣畫丹臺春曉圖一幅編修臣沈宗敬紀瑞一册臣父詹事臣荃臨顔帖一幅録唐人早朝詩一幅臣宗敬畫山水十二幅監造臣趙昌釋迦如來古佛一尊金珠自轉寶塔一座陸晃五老呈祥圖一軸商喜泥金狻猊圖一軸册府元龜全部潛確類書全部成窑寶相茶杯一對宣窑暗龍把碗一對金龍全副鞍轡良馬一對監造臣王道化萬壽靈芝獻瑞盆景一座數珠一盤敬書北斗延生尊經一部武備院固山大臣伊篤善無量壽佛一尊宋板史記一部宋板陶淵明集一部舊板朱子大全一部朱子書白鹿泉記一卷趙孟俯泥金書金剛經一部董其昌書天馬賦一卷郭熙華封三祝圖一卷宣窑填白暗龍碗十隻定窑筆洗一件鞍馬二匹原任巡撫臣佟育秀呂祖謙集一部文玩六種候補待詔臣曹曰瑛恭書法華經全部烏林達臣沈崳恭畫萬松圖一軸明板性理大全一部馬一匹附三堂西洋人紀理安蘇霖白進巴多明等進算法運軸一匣大規矩一箇小規矩一套葡萄酒一箱鼻煙二瓶玫瑰醬一瓶木瓜膏八碗香餅一匣保心石數箇巴斯弟略一瓶如糖果味美糖果一瓶撒硼一匣如胰洗垢金幾那兩包武英殿諸臣恭進翰林進士舉人貢監生員等萬壽詩冊共一套計二本諭德臣吳廷楨舊板六臣文選一部藝文類聚一部錦繡萬花谷一部韓文考異一部許氏說文一部閔板莊子一部編修臣廖賡謨臣吳士玉臣楊開沅檢討臣盧軒庶吉士臣楊士徽貢生臣郭元釪布衣臣高不騫禮經㑹元對制談經班馬異同貞觀政要諸史品節南河志考泉河紀略藏書通博古通雅宣和博古圖漢𨽻字源周詩遺軌杜甫詩集胡雲峯集楊維楨樂府監造臣和素玉壺一執玉杯盤全副玉琢壽星一座銀晶水盛一件大磁盤一件沉香油一盒萬壽詩滿漢二冊萬歲壽譜一部十本六家文選一部十二套六十本