body:
  text: 欽定四庫全書萬壽盛典初集卷八十八歌頌二十八詞臣二十萬壽詩七言律十首翰林院庶吉士臣汪倬旭日曈曨映紫宸瑤樞繞電太和辰聖人有道文明治造化無私浩蕩春寶籙𢎞開千載盛鴻鈞長展萬年新小臣共進南山祝幸逐鵷班拜舞頻其一天開聖壽厯綿綿逺過周姬論卜年自是勤勞兼夙夜共知高厚合坤乾圖陳洪範彞倫叙屛繪豳風稼穡篇一曲南薰賡復旦雍熙何地不堯天其二萬幾親總久當陽五十年來聖治長睿略纍朝貽顯烈鴻圖今日更輝煌遐陬修貢傳蔥嶺重譯來庭致越裳薄海欣欣躋壽域和風甘雨慶豐穰其三道統躬承致治平聖神文武本天生周情孔思超千古玉振金聲集大成敬以日躋通帝載誠從無息體乾行表章更有新恩在鹿洞傳書賴闡明其四一人孝治萬年基共慶貞恆福履綏瑞應金莖陳樂府歡承瑤殿進瓊巵丹砂桃核香青筥玉膳駝峰捧翠錡介壽普天彰錫類祥風和氣遍羣黎其五六師親統出如雷智勇原從天錫來露布曾傳青海靖捷書早奏玉門開受降築壘踰千譯式序成圖遍八垓偃武櫜弓歸衽席將軍虎拜進霞杯其六淮黃萬里接崑崙幾度巡方次第論鹵簿初臨楊栁岸旌旗遙拂杏花村訏謨指授關民命睿慮經營濬水源河伯自應爭效順一時底績紀龍門其七堯仁禹儉惜民艱賜復蠲租嵗嵗閒直使桑麻盈曠野豈惟膏雨下塵寰敷天盡被帡幪德大地咸霑惠澤頒父老謳歌稱萬壽不辭跋履覲天顔其八四海涵濡訓士針崇儒屢詔厪皇心欣看雲漢昭回久更識菁莪化育深西苑花香凝蕊榜南宫桂影動華簮聖朝文治昭千祀翼運應多作傅霖其九太液蓬瀛淑靄通春光駘宕日華東敬陳五福推皇極競祝三多集聖躬湛露恩深周燕鎬鈞天聲徹漢呼嵩榮叨兩世誠難報翹首瞻雲咫尺中其十萬壽詩七言律四首翰林院庶吉士臣朱一鳳聖主垂裳宇宙春萬年福履自天申欣逢柳緑桃紅日正是虹流電繞辰瑞叶嵩呼重譯國觥稱華祝八紘民更瞻南極星呈彩燭漢輝光映紫宸其一帝德高深冠百王獨勤丙夜展縑緗龍圖逺邁羲軒厯鸞輅親登洙泗堂奎璧光華欽御翰卿雲爛漫仰宸章君師兼總洵天縱治統𢎞開道統昌其二盛世諴和海宇清彌殷宵旰恤民情覃恩屢免田疇賦偃武都銷戍衛兵聖慮河淮交底績睿裁禮樂合休明歌衢擊壤何知識順則惟安鑿與耕其三浩蕩恩波寰宇周禎祥協應滿皇州庭前鳳為聞韶舞郊外麟因獻瑞遊旭日暖開金雉尾卿雲光動玉螭頭小臣拜進無疆祝海屋祈添萬萬籌其四萬壽詩七言律四首翰林院庶吉士臣李中帝德乾行協化工𢎞開壽域播春風苞苻涵藴原無極枝幹循環紀不窮萬里恩暉明旭日一天佳氣煥流虹微臣擬進升恆頌百祿攸來集聖躬其一皇州春色正芳鮮淑景融融映壽筵瑞露曉浮金掌上祥蓂暖茁玉階前試看瑤珮來羣服何似雲璈集衆仙常沐升平歸帝力時雍真幸戴堯天其二閶闔晨開刻漏長欣瞻帝座繞榮光三階象緯明瑤殿五色雲霞耀繡裳化入絪緼包宇宙風含淳穆返炎黃嵩呼同效無疆祝聖壽綿綿寶厯昌其三金罍仙釀進彤墀瑞氣濃蒸五色芝周雅三章魚在藻虞韶九奏鳳來儀萬年圖籙歸皇極四海謳謠樂聖時端拱垂衣瞻有道羣生永賴作君師其四萬壽賦聖壽以天乾行無息為韻齊翰林院庶吉士臣陶成粵惟泰運𢎞開昌期際盛一人篤生萬方表正天柱立而垂景星地維奠而誕至聖得位得祿兼名壽以滋庥宜民宜人自保佑而申命聨宇宙於一體根柢在心通古今為一身保合成性化自成於久道百福攸同代適遘夫文明普天胥慶欽惟皇帝陛下首出承天亶聰作后祥呈雲漢瞻華渚之流虹瑞應精靈感神光之繞斗如岡如陵以如阜申命用休俾昌俾熾而俾臧惟仁乃壽緬夫性成敦敏質賦徇齊龍犀日角之竒令儀令色鳳表雲姿之異如璋如圭擅神明于天縱彰聖敬以日躋玉燭象有道之徴河清海宴銀甕鏤太平之字芝檢金泥合符乎清寧易簡廣運乎南朔東西當此三春太和之候共賀六袠純嘏之年紫禁流鶯囀圓吭於省掖彤庭語燕回喜氣於簷前臨階瑞莢全舒竝雲芝而璀璨滿苑仙葩盡綻䕃朱草以便娟白鶴青鸞來仙真於蓬島雲璈寶瑟奏廣樂於鈞天於時三光啓泰五位乘乾丹霞炳蔚綺旭髙懸映徹九重唱雞籌於天際洞開萬戶移雉尾於雲邊承艾葉之千衫霏霏宫草惹桃花之萬綏細細爐煙翠羽繽紛曵霓旌而傍金雀珠纓攢簇搖玉珮以立花甎從此同歡侍宴集慶初行報西池之果熟指南極之星明惟大造之涵濡草木戴德隨洪鈞於旋轉葵藿輸誠鷺序謳歌矢華祝三多之願鵷班拜舞和嵩呼萬嵗之聲矧乃恩流畿甸風動寰區好生洽而省刑肆赦德施普而賜復蠲租重築金臺招殊方之騄駬恢張鐵網羅滄海之珊瑚南郊之瑞雪立應西成之岐穗疊輸重譯奔趨於闕下萬方抃舞夫康衢永執一中以康四海咸臨九有而奉三無以是乾行愈健至誠無息道協天人而薦祉不競不絿功周遐邇以迎禧如幾如式禹甸貢琛箕疇錫極遇聖誕之日升喜休徵之駢集唯祝億載無疆之祚永被皇風益頌萬年有道之長咸歌帝德萬壽詩五言排律四十韻翰林院庶吉士臣卜俊民金闕開天象丹宸啓壽觴衣冠趨曉仗劍履集朝陽華祝皇風盛嵩呼寶厯長雍雍麟閣畔濟濟鳳池旁掞藻陳謨烈揮毫職頌揚斗樞從啓瑞虹渚屬流光膺籙通三極垂裳御八荒誕敷平海㝢一怒靖邊疆西訖流沙界東漸溟渤鄉無思不臣僕有路盡梯航軫念周民瘼垂情歷下方湖光明㶑灩江水碧滄浪夾道雲霞擁迎鑾花草香關津蠲𣙜算華皓錫膏薌編戶休征役京坻積糗糧嘉禾雙穗熟異麥兩岐穰愠解南風操恩覃北斗漿太和真盎溢聖訓復周詳屢飭官方弊仍嚴禮教防絲綸宣井邑翰藻錫膠庠舜日光天覩堯文率土望褒崇輝俎豆訓誡勒宫墻氏族靡淪棄心傳獨發皇酉山披簡牒甲帳按縑緗直接庖羲祕窮搜史頡藏詞源通碧海武庫積青箱若谷惟虛受如淵詎測量八紘羅鸑鷟九罭舉鱒魴鼓篋人思奮懷鉛氣畢張羣材爭決拾上舍進笙簧顧問移蓮炬傳呼出玉堂宫雲方奕奕仙露正瀼瀼此際逢蓂莢同聲頌柏梁萬年初甲子三月屆春王久道持元㑹遐齡享樂康葆光仁者壽斂福熾而昌北極居常拱南山祝未央曈曨佳氣鬱璀璨泰階芒再紀乾坤策恆瞻日月章小臣何以報拜手奉賡揚萬壽頌翰林院庶吉士臣曹鳴皇帝御宇至治開先執中建極資始統天欽明文思齊聖廣淵錫類不匱尊養兼全繼志述事裕後光前克勤克儉日闢幅員威加四海化被八埏重譯來享贄貢雲連聖不自聖夕惕朝乾精専圖治旰食宵眠省方問俗不驚市㕓深仁厚澤淪浹無邉蠲租發賑詎止萬千普天率土鑿井耕田風淳俗古私豵獻豜詳刑慎讞無黨無偏雷霆雨露渥化兼權禮陶樂淑民善日遷斂福敷錫蕩蕩平平知人器使矩方規圓振興士類教育𢎞宣工僚師濟譽髦駢闐維聖念典特重經筵昌明大道剖析簡編陶鑄百氏崇禮先賢圖書啓祕律厯精研發微詣極得意忘詮郊廟祀事俎豆潔蠲祁寒暑雨不懈益䖍懷柔河嶽底定百川成天平地解愠揮絃太和保合飛躍魚鳶功參覆載元氣自然維天佑德諸福綿綿精明强固視履其旋堯階禹甸瑞靄祥煙南極長護喜氣永延小臣筮仕未竭細涓欣逢聖壽願上瑶箋敬拜稽首天子萬年萬壽詩五言排律四十韻翰林院庶吉士臣狄貽孫聖主當陽日貞元應運時芳春凝淑景佳氣繞彤墀黼座陳金鏡瑤階進玉芝華封爭效祝天保擬敷辭睿質根天厚昌符叶瑞竒繞樞繩寶厯貫月紹鴻基快際風雲㑹欣瞻龍鳳姿太平真有象至德總難窺悠久符行健光明本緝熙和恆調玉燭恭儉樂茅茨履泰謀多裕求寧食每遲威儀仍抑抑問學更孜孜夙禀生安質長存信好思典墳參奧㫖邱索決沉疑厯數齊天象輿圖畫地維允宜超舜禹直欲邁軒羲宵旰心無逸經綸志不移異同歸獨斷威福必相資志道兼游藝怡情輒賦詩來遊歌翽鳳紀績勒蟠螭不數橫汾句羣誇闕里碑書竒雲若擁心正筆俱隨宸藻輝千古奎章煥兩儀多能包小大立教仰君師端拱居寧謐精勤見設施齊明承祫禘對越肅壇壝大道今無外豐功詎有涯和衷嚴吏治欽恤荷皇慈養士𢎞陶冶勤民切撫綏栽培同大造視聽奉無私問俗懸鞀鐸安邉任指麾萬方蒙愷澤一德㑹昌期以此休徵集於今茀祿宜有禾皆九穗無麥不雙岐旭日中天麗條風四野吹慶雲飄爛熳祥靄轉葳蕤花甲逢初度仙桃熟滿枝瑞凝鳷鵲觀喜溢鳳凰池韶樂喧天奏嵩呼匝地馳小臣思獻壽長捧萬年巵萬壽盛典初集卷八十八
