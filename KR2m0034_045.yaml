body:
  text: 欽定四庫全書萬壽盛典初集卷四十七慶祝二圖記五四川陜西山西湖廣貴州雲南六省臣民表文伏以聖人首出凝鞏固之金甌天子萬年啟綿長之寶厯盛徳爰膺上壽同日月以常貞至仁聿享純禧竝乾坤而不老欽惟我皇上乗六御時兼三出治聰明睿知神武允執厥中剛健篤實輝光日新其徳紹謨猷於列聖纉承兼繼述之隆奉色養於慈闈視聽在形聲之表躬親郊祀薦馨香於冬饗春祈齋祓明禋神感召於和風瑞雪天威有赫四征髙振旅之勲聖武維揚一怒顯安民之畧苞蘖盡除於蠻徼版圖式廓於海疆龍駕開邊永息北庭之烽火狼胥勒石逺通西極之共球三廵淮海之區獨厪宸衷之慮閉六壩築髙堰開引河快覩平天成地拆欄黄闢陶庄建御埧咸歌海晏河清修歸仁以洩灘河之怒加遥堤而遏南北之衝暢流若河漢之歸㑹同為漕渠之助來貢輸之萬艘錦纜徐牽閲轉運之千㠶長風竟渡逺追夏王之明徳皆由聖主之神謨化沮洳為桑田民情孔樂集輸將於輦轂國賦常充禁園標豐澤之名先知稼穡郡邑倣常平之制廣積囷倉手題耕織之圖親試鋤犂之法值天時之水旱立沛積儲方農畝之菑畬早邀寛税酌劑數年之經費溥蠲一歲之正供縣官無鞭朴之勞閭井免追呼之擾數逾億萬實為前史所未聞恩出再三更非斯民之敢望天舒協氣五風十雨之均調地效靈符九穗兩岐之競獻旣諴民而阜物彌旰食以宵衣慎簡屏垣大法乃小亷之本旁咨守令安人在察吏之中飭法明刑三宥毎存寛大臨朝蒞政萬幾不憚精勤下情無壅上聞民隱動陳天聽務揆宜而節用惟約已以愛人萬邦協和羣黎徧徳聖治歸原於聖學性功流露於事功尊闕里為萬世之師躋考亭於十哲之列錄先儒之後裔明斯道之正宗心貫六經探丘索淵源之義言成二典冠唐虞渾噩之書倬雲漢以昭回絢日星之光彩聿皇御集片言垂百代之章程燦爛奎鉤一字洩六文之秘蘊偶乘閒而逰藝必出聖而入神象數微茫三角引伸於八線測量變化九天推凖於半弧黙參衆妙以無言廣輯羣書而示訓士林㑹萃賢路宏開懐一藝者皆庸獻㣲長而必錄頻年廣額復加萬壽之科一歲兩闈懋舉三升之典譽髦斯士共荷生成懷保小民竝登仁壽際六旬之聖誕逢三月之良辰盛徳難名却徽稱而不受太平有象感瑞應以咸臻無前之勲業長新不息之精神倍勵臣等生當盛世運際昌期秦晉蜀中山絡北條之脉滇黔楚境地聯南服之區合六省之臣民效三呼於輦路流虹繞電覩開天闢地之祥結彩焚香懷就日瞻雲之悃伏願乾符益茂泰運彌亨斟元氣於四時鴻鈞自轉播太和於六宇化日恒春玉燭常調咸聽南薫之舜樂金甌永固齊傾北斗之堯樽莫罄蟻忱惟深雀躍誥封資政大夫兵部尚書兼都察院右都御史總督河道提督軍務臣張烺户部尚書臣張鵬翮工部尚書臣張廷樞吏部左侍郞臣李旭升經筵講官禮部右侍郞兼翰林院學士臣胡作梅兵部左侍郞臣李先復都察院左副都御史仍兼管光祿寺臣田從典内閣學士兼禮部侍郎臣鄒士璁順天府府尹臣屠沂翰林院侍讀學士臣汪漋翰林院侍講學士臣周起渭詹事府左春坊左庶子掌坊事提督江南學政臣胡潤日講官起居注翰林院侍講臣文志鯨翰林院侍讀臣樊澤逹通政使司左㕘議臣張大有左春坊左贊善兼翰林院檢討臣范光宗翰林院編修臣車鼎晉臣朱啟昆臣涂天相翰林院檢討臣李周望臣萬民欽臣謝履忠臣衞昌績臣彭維新臣李鍾峩臣馬豫臣王思訓臣謝履厚臣王珻臣曹掄彬臣陳㑹臣曾謹臣馬益臣程翅翰林院庶吉士臣董新策臣田嘉穀臣易簡臣周天祐臣秦休臣周彬臣王夢旭臣鄭之僑臣張旭臣孫詔臣劉蛟臣鄭其儲臣潘祥臣白子雲吏科給事中臣盧炳户科給事中臣冷宗昱兵科給事中臣馬之鵬江南道監察御史臣董宏彪山東道監察御史臣成文運湖廣道監察御史臣荆時中福建道監察御史臣鄒汝魯吏部文選司郞中臣鄭崑璽吏部考功司主事臣魚鸞翔户部湖廣司郞中臣喬雲名戸部福建司員外郞臣王珍户部陜西司員外郞臣馬鍾華户部河南司員外郞臣姚謙户部河南司主事臣張友程户部山西司主事臣唐崇勲户部江南司主事臣蔣洪㴻户部湖廣司主事臣陳瓚兵部武庫司郞中臣張應詔兵部職方司主事臣余慶祚刑部督捕司郞中臣楊瑛森刑部貴州司主事臣汪澐工部營繕司郞中坐糧㕔臣江藻工部營繕司主事臣程大聿工部屯田司主事臣楊廷璋中書科中書舍人臣陳恪臣劉斗文行人司行人臣張崇禮内閣中書舍人臣李彦􅀈臣楊若懋臣陳時夏國子監監丞臣李秉儉博士臣馬汝爲典簿臣弋薫兵部司務臣韓鎭東城兵馬司副指揮臣劉祥生鑾儀衛治儀正臣馬苓候補郞中臣嚴昉候補員外郞臣徐克祺臣劉天祐候補主事臣方文瑞臣張謙臣陳坦臣黎大觀臣戴朝選臣姚華臣岳綸臣羅士柏臣傅霦臣趙璐臣李思沆臣馬開秦臣楊一璋臣康行僴臣武介宣臣髙淳臣王澤臣梁錫珩臣王錫瓛臣張鐸候補司務臣冦鏻候補國子監典簿臣王鍾珣候補光祿寺署正臣梁景岳候補京府通判臣馬建解餉到部江南徽州府同知臣張叔珽河南懷慶府管河通判臣唐賡陶新選浙江嚴州府分水縣知縣臣向日昇廣西荔波縣知縣臣田㴶簽掣直𨽻寧津縣知縣臣朱紱新授荆州府宜都縣教諭臣姚之珂河工効力州同臣張懋行縣丞臣任恂原任陜西學道今候補臣江鼎金候補按察司僉事臣陳廷統候補知府臣胡克寛臣張雲翰臣張慶曽臣裴繡標候補同知臣李秉溫候補通判臣項鍾嚴臣許觀候補知州臣張瓚臣余光焈候選知州臣吳焯臣劉藩長候補知縣臣熊同仁臣胡瑋臣王輅臣羅廷璋候選知縣臣范光諭臣祁琮臣呂奏雅臣馮長發臣張恂臣荀子楠臣李先益候補敎諭臣樊如樟候選州同臣馮超臣宋璽候選縣丞臣劉泰候選經歴臣魏聘賢候選吏目臣蘓暿候選從九品臣許之英臣賈全忠原任廣西分廵九江道僉事臣李世仁原任陜西肅州通判臣毛鳳儀原任貴州安順府通判臣張調鼎原任直𨽻邯鄲縣知縣臣蕭秉楷原任江西南康縣知縣臣王材成廣西永寧州守偹臣王宏績浙江領運千總臣鄒述麟候推守備臣康士榮候選千總臣陳功武英殿纂修進士臣汪榯進士臣陳鋭臣李湜臣髙鍾嶽臣竇祖禹臣溫儀臣陸琮臣崔鶴齡臣田長文臣張春慶臣景崙臣王開運臣徐永祐舉人臣陳大慶臣李近陽臣髙元貞臣于霈臣楊溥臣楊乆臣王祜臣崔璟臣王翼臣王親臣臣黄裳臣劉璨臣張釗臣徐岱臣張縉臣邢世觀臣孫鵬臣瞿鵬佳臣盧侯瓚臣段一騤臣劉俊蔭生臣杜照貢生臣樊澤逖臣張玠臣衞惇臣陳豳臣劉瑄等十八人一統志館効力監生臣閻學機監生臣熊志伊臣劉正熿臣馮超臣張瑞臣陳琮等三十一人生員臣孫譓臣衞維正臣譚一豫臣冉騰鳳臣李從紳等三十二人武進士臣孔毓潤武舉臣王聯舉臣朱宣晦臣孔興鈞臣沈肇先儒童臣閻學杼等三人耆民陳于兹張席珍李蒞陳永年李長春湯執中等八十二人恭進四川陜西山西湖廣貴州雲南六省頌臣聞元統天徳之全健行而不息仁統君道之極容保於無疆幸遘昌期忻覘至治欽惟皇上允文允武乃聖乃神集百王之大成履五位而首出論徳則乾坤合撰六經之美善咸該紀功則日月同光全史之聲名莫及自纂承洪業正位凝命於今五十二年恩溥澤洋蟠際穹壤記注之所不能盡贊揚之所不能名謹就蠡測管窺鋪陳萬一竊以為運世有本制治有原我皇上功徳巍巍所以措天下於久道化成之盛者皆可以仁統之也蓋聖性之生而安者中和咸備與兩大而同流而聖學之粹以精者公溥無私偕萬物爲一體法天法祖仁著於敬而清明在躬止孝止慈仁著於愛而太和自近言而作則行而合宜仁熟則禮義同貫也動而有常靜而不貳仁純則誠信一原也仁達爲智而仰觀天文俯察地理中悉人事旁燭物情自立政用人知明處當以及六藝之繁曲而濬哲無所不周天縱多能智莫大焉仁必有勇而東窮蟠木西盡流沙北過幽陵南踰交阯自除殘服貳軌合文同以至八表之遐荒而聲敎無所不訖徳威惟畏勇莫神焉以仁心行仁政尤在養民察吏則亟進廉平慎刑則數行寛大至九河故道亦荷睿算而千里安瀾沛然無涯之大澤矣以仁政騐仁民莫如蠲賦賜復則數盈億萬議賑則歲紀再三至萬國正供竝損神倉而三年徧徳夐乎未有之洪施矣方今宇宙清寧中外禔福官方日以澄序民生日以阜成風俗日以敦龎人心日以安樂凡皆我皇上之至仁運之於於穆之表施之於巖廊之上有以兼綜而條貫之而精神徧注乎四海九州規模大定乎千秋萬禩也夫天徳統於元而一元之運循環而不息君道統於仁而至仁之運悠久而無疆自尚書肇於唐虞下逮元明三千九百有餘歲其間享國長久代不數君歴年之多亦略相準而仁之淺深純雜則前後懸殊若我國家積徳累功而皇上如天之仁與天同運日新月盛永永無窮無論漢唐宋明之令主有不能及即遐稽三代以前求其以人協天以徳備福如神堯得天地之中數而成功文章壽考益光者蓋於今而始再見焉此眞開闢以來之景運而天下臣民萬世一遇之時也兹當三月良辰恭遇六旬萬壽敷天胥慶忻看甲子初週率土協和共仰光華復旦臣遭逢四紀沗列九卿受恩百倍於同朝見知竊附於往哲謹就覩記所及恭撰頌辭一章以推聖壽無疆之符以明至仁合天昭受有本之意爰拜手稽首而獻頌曰大清受命三聖相傳我皇纘烈其仁如天功恢八紘徳暢九埏蕩蕩巍巍振古無前同天覆幬不遺一物包含山川吞吐日月我皇丕冒六合寧謐旁及無垠仁聲洋溢天心慈愛元氣絪緼暢遂草木飛躍羽鱗我皇建極萬彚陶甄出作入息九域同春天降之恩和風惠日天降之威風馳電擊我皇律天動靜闔闢緯武經文人皆徧徳達天之用舒而為陽立天之體健而且剛我皇配天不息日強所其無逸恭已垂裳大哉乾元萬物之紀大哉皇仁萬事之宰焜耀三光磅礴四海徳盛化神體乾用泰河清不波邊靖無煙五風十雨嘉禾在田六廉計吏三物興賢歌舞太平踰五十年自兹以前修和府事頌徳紀功周後無二由今以後如川方至五帝可六三皇可四自兹以前治定功成超夏軼商美具善并由今以後月恒日升兩儀奠麗七政貞明書契以來功徳備列天人相應若合符節惟我皇壽膺圖無極如天之仁漸被暨訖一元迭運始而復周至化廣運蓄而復流惟我皇壽古無與儔百千萬億爲一春秋臣拜稽首天子萬壽四川省誥封資政大夫兵部尚書兼都察院右都御史總督河道提督軍務臣張烺户部尚書臣張鵬翮兵部左侍郞臣李先復等陜西省工部尚書臣張廷樞等山西省吏部左侍郞臣李旭升都察院左副都御史仍兼管光祿寺臣田從典等湖廣省經筵講官禮部右侍郞翰林院學士臣胡作梅内閣學士兼禮部侍郞臣鄒士璁順天府府尹臣屠沂等貴州省翰林院侍講學士臣周起渭等雲南省翰林院檢討臣王思訓等恭頌長蘆商人邵鼎延馮士昌等榜文伏以華渚流虹率土頌無疆之祉璿樞繞電普天徵有道之祥合聖神文武以竝隆至徳廣運極祿位名壽之必得諸福咸臻朝野歡騰商民慶洽欽惟皇帝陛下道握乾符躬承泰運神功歴奏八方之聲敎攸同峻徳宏敷萬國之車書畢集時雍風動登仁壽於堯年地平天成載和恒於禹甸省刑薄罰毎至再三免賦蠲租已逾億萬有年有幹普樂利以靡窮惟幾惟康致昇平於勿替兹屆三春之月恭逢萬壽之辰甫徧干支數周而復始歴推元㑹祚積而彌長壽域𢎞開直嫓羲軒而上鴻鈞大轉爰符翕闢之期航海梯山獻球琳於絡繹歌衢舞巷輸忱悃以勤拳惟兹析木之津近屬神臯之地東連斥鹵收成筴於熬波北拱宸居戴榮光而就日矧從比歲屢沭殊恩緩税而税有常期恤商而商皆樂業春生萬竈齊望闕以祝三多景麗千檣悉焚香以伸九叩伏願健行不息純嘏彌長運元氣於兩間道成悠久鼓太和於四序象著升恒則甘雨惠風占一人之有慶光天化日歴億紀以長春矣五旗諸王以下覺羅以上榜文伏以帝徳久符天徳已昭卜年卜世之休禎君心俯鑒民心務盡為子為臣之丹悃香煙披拂結祥光而徧覆慈雲花舞繽紛布淑景而宏開壽域歡騰玉牒慶溢天潢欽惟皇上仁合三才智周九有堯舜禹湯文武之傳至聖出而㑹其統易書詩禮春秋之作大成集而闡其微臨萬物而用中育羣生以無外憂勤惕厲享從來未有之昇平運㑹貞元拓自古未開之疆土蓋因一人有慶遂爾萬國咸寧兹當季春中浣之辰正值花甲重周之日麟逰天圃鳳噦髙岡南極老人捧進長生之酒西池王母擎來初熟之桃七曜增輝萬靈効順凢兹戴髙履厚咸思就日瞻雲臣等幸附金枝忝依玉葉執霞觴而踴躍欣隨華祝之班傍鑾輅以趨蹌願效嵩呼之頌敬宣貝葉䖍叩龍華開不二之法門結大千之善果伏願光華復旦壽考維祺體太極之生成乾坤立於久大順五行之時序造化著其休嘉於以久視長生至人原有自然之效即此祈天永命大徳眞有必得之符矣康親王臣崇安顯親王臣衍潢莊親王臣博果多裕親王臣保泰簡親王臣雅爾江阿信郡王臣徳昭安郡王臣華玘平郡王臣訥爾素順承郡王臣布穆巴貝勒臣克振臣延壽臣滿都䕶貝子臣蘓努臣魯賓鎭國公臣景希臣吳爾占臣凖達臣登塞臣額爾圖臣吞珠臣徳普臣敬順臣楊桑阿臣普貴臣普奇臣訥託和臣星海輔國公臣門度臣訥墨孫臣賴士臣色欽臣蘓爾錦臣阿布蘭臣敬嚴臣雍乾臣鄂飛臣普照鎭國將軍臣納圖臣明保臣永期臣富爾臣臣舒爾臣臣伊克他哈臣顔徳臣富曽輔國將軍臣佛爾起臣陵泰臣巴爾圖臣薩穆當臣善福臣對勤額臣巴哈穆臣馬石里臣法布蘭臣富爾善臣荼爾代臣東海臣貞保臣善壽臣初宗奉國將軍臣韋色臣色爾都臣色黒圖臣額起里臣額爾和蒲臣馬永臣色爾和臣勒色里臣胡連臣八十三臣藍乃臣趙來臣五哥臣阿爾素臣色和里臣阿有里臣阿爾乃臣陀佛臣鄂岳臣什哥臣西秦臣壽原臣徳義臣多穆圖臣恒徳臣悉蘭圖臣塞徳臣噶爾圖臣成仁奉恩將軍臣尼了哈臣寶樑臣寶山臣貴㑹臣實顯臣深徳臣際壽臣吳爾登臣喜文臣朝乃臣巴金泰臣林康臣田象臣華賓臣康吳里臣黒勒布臣重揚和臣達里白臣納爾徳臣南圖臣徳倫臣壽海臣馬府他臣恩特何里臣蘓爾泰臣徳顔臣福清臣陛拉什臣查穆布臣金壽臣塞貝臣查哥單臣白内臣寧靜宗室臣海善等覺羅官員臣佛倫等恭祝廵捕三營榜文伏以法雲縹緲祥呈萬國山河花雨繽紛香繞九重閶闔如山如阜如日月載歌天保之章曰壽曰富曰康寧悉協箕疇之福昇平有象保佑重申欽惟皇帝陛下乾徳方剛離明普照竝兩儀而立極獨致中和與萬物以皆春同登仁壽兹當陽春三月恭逢聖夀六旬瑞啟蓬瀛鶴算永萬年之厯光生璿軸龍文輝五色之雲率土歡騰普天慶洽臣等戴髙深之有日矢報効以無由爰集緇流敬宣梵唄用干蜺座敬達蟻忱祝天子之萬年肅申虎拜慶同風於九有咸沐龍光伏願得一常貞兼三永治徳敷六合恒歌萬福攸同澤洽八紘羣頌一人有慶堯風共宗風廣被舜日與佛日齊輝將見祗樹林中普聖化於千八百國栴檀香裏鞏皇圖於億萬斯年矣提督九門步軍廵捕三營統領臣隆科多左翼步軍總尉世襲頭等阿達哈哈番兼管佐領協理三營臣鄂三右翼步軍總尉協理三營臣伊什泰京城内外廵捕南營署都督同知管㕘將事臣吳道輔遊擊臣宋可進守備臣魏雲龍臣盛徳貴臣羅永鎭臣趙洪鈞臣陳金秀臣何祥書臣李三友京城内外廵捕北營都督僉事管㕘將事臣卜應奎署㕘將管逰擊事臣武綱守備臣艾國朝臣姚文玉臣葛明心臣侯宗周臣王前京城内外廵捕中營㕘將臣張登第遊擊臣趙世升守備臣郞應箕臣陳武臣李成臣陳永圖臣張雄臣劉振明千總臣胡璟等把總臣張存孝等恭祝萬壽盛典初集卷四十七
