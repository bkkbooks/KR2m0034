body:
  text: 欽定四庫全書萬夀盛典初集卷十八典禮五養老一康熙五十二年三月十八日恭逢聖夀六十正誕直省在籍諸臣及人民耆老赴京慶祝者四方雲集三月初旬咸㑹闕下上命查耆老人數有水土不服習者令太醫院察治是月初一日大學士王掞等傳㫖問各省老人有多少在京各省現任京官扵十二日咨送内閣典籍㕔查明啟奏初八日南書房大學士王掞等奉上諭朕聞各省為祝萬夀來者甚衆其中老人更多皆非本地人時届春間寒熱不均或有水土不服亦未可知爾等即傳與漢官等倘有一二有恙者即令太醫院看治務得實惠以知朕愛養老者之至意欽此傳知在京官員遵㫖欽奉施行十七日甲午上自暢春園還宫直省臣寮士庶夾道懽迎耆老進前跪獻萬夀觴上輙止輦慰勞夙辦果餌食席徧行頒賜是日諭大學士温達等查八旗滿洲䝉古漢軍漢人大學士以下民以上年逾六十五嵗者扵本月内擇日賜宴其八旗滿洲䝉古漢軍以至包衣佐領下年七十以上老婦扵老人賜宴後擇日送至皇太后宫賜宴三月十七日大學士温達等奉上諭今嵗天下老人為朕六旬大慶從數千里匍匐而來如何令其空歸欲賜伊等宴然後遣囬著查八旗滿洲䝉古漢軍漢人大學士以下民以上年逾六十五嵗者奏聞在本月二十二三兩日擬定一日賜宴預為奏聞便扵備辦内有艱扵動履不能前來者聼其勿來能來者俱令其來即不能來者應得分例朕必另行頒賜詔内有恩賜老人一欵凡在恩賜欵下者扵各名下註明已在恩賜之列至扵奴僕不在所查數内今時令漸暖賜宴後即令伊等各囬原籍耕種再查八旗滿洲䝉古漢軍以至包衣佐領下不論官員閒散人等年七十以上老婦奏聞俟老人賜宴後再定一日送至皇太后宫賜宴内有艱扵動履不能前來者聼其勿來能來者俱令其來若有貧乏不能來者著各該管處協助車馬使之前來俱開真實年嵗不可揑報特諭欽此是日又諭宗人府選宗室子孫充授飲老人使令大學士温達等奉上諭諭宗人府王以下至宗室子孫内年二十嵗以下十五嵗以上人品聰慧能備衣服者揀選六七十人送至朕前以備授飲老人使令朕之子孫亦皆𣲖出青帶之人一員不用欽此是日又傳諭直省老人十八日齊至前朝聼禮部官指示行禮先是十一日南書房翰林等奉上諭各省祝萬夀老人俱扵十七日在西直門外本省龍棚下齊集接駕十八日齊至前朝外聼禮部指地方行禮行禮後若再至龍棚恐城門擁擠老年之人實有未便况十七日朕進宫時經過各省龍棚諸老人已得從容瞻仰十八日行禮後諸老人不必再至龍棚下接駕爾等傳與各省漢官徧諭各省老人知悉特諭十八日乙未上御殿受朝賀直省來京耆老臣民各隨班次行禮是日頒恩詔通行天下令所在有司察例賜恤耆老詔欵内一八旗滿洲䝉古漢軍兵丁及内扎薩克喀爾喀等䝉古年七十八十九十以上者分别賞賚至百嵗者題明給與建坊銀兩一軍民年七十以上者許一丁侍養免其雜𣲖差役八十以上者給與絹一疋綿一斤米一石肉十斤九十以上者倍之若百嵗者題明給與建坊銀兩二十四日辛丑命二十五日賜直省老人宴扵暢春園正門前復諭户部等衙門㑹議來京耆老恩恤從優具奏户部等衙門遵㫖為皇上六旬大慶各省來朝六十五嵗以上官員百姓數目查明繕摺具奏奉㫖將伊等明日齊集正門外賜宴遣皇子領侍衛内大臣侍衛部院衙門官員内廷翰林公同賜宴令得均食百姓俱係生扵村野之人即有失禮者亦聼其便此内在詔欵應得恩恤者吏户禮兵四部㑹同查明比彼處畧為加厚今日即行議奏户部等衙門㑹議六十五嵗以上不議外七十嵗以上者詔款内應賞綿絹等物折銀給與外加賞布各二疋八十嵗以上者加賞布各四疋九十嵗以上者加賞布各六疋繕摺具奏上硃筆批出諭㫖伊等逺來絹布等物如何稱朕之意九十嵗者人各賞銀十兩八十嵗以上各賞銀八兩七十嵗以上各賞銀六兩六十五嵗以上伊等既來亦各賞銀一兩二十五日壬寅禮部等衙門引六十五嵗以上老人大學士以下民以上至暢春園正門前東西嚮列坐敷席設几自北而南東西前後各十餘行東坐西嚮大學士臣李光地臣王掞吏部尚書臣吳一蜚户部尚書臣張鵬翮禮部尚書臣陳詵刑部尚書臣胡㑹恩都察院左都御史臣趙申喬吏部左侍郎臣李旭升右侍郎臣王頊齡户部左侍郎臣王原祁右侍郎臣廖騰煃工部左侍郎臣阮爾詢右侍郎臣劉謙内閣學士臣彭始摶臣鄒士璁左副都御史臣崔徴璧通政使臣郝惟諤翰林院檢討臣嚴思位兵部郎中臣許康錫工部員外郎臣夏疇欽天監右監副臣臧積徳春官正臣何君錫靈臺郎臣劉一葵等二十餘人次列直省耆民二千餘人西坐東響致仕吏部尚書臣宋犖誥封户部尚書臣張烺致仕吏部尚書臣徐潮原任户部尚書臣王鴻緒致仕禮部尚書臣許汝霖原任工部尚書臣徐元正原任吏部左侍郎臣李錄予致仕吏部右侍郎臣仇兆鰲原任禮部右侍郎臣田種玉原任工部左侍郎臣李元振右侍郎臣彭㑹淇原任左副都御史臣勞之辨原任福建廵撫臣宫夢仁原任右通政臣楊篤生原任大理寺少卿臣朱廷鋐臣陳嘉績原任翰林院侍講臣彭定求原任左諭徳臣秦松齡臣鄭開極臣楊大鶴原任右贊善臣田成玉臣尤珍原任御史臣鹿賔原任廣西蒼梧道臣彭演原任四川什邡知縣臣俞曰都等二十餘人次列直省耆民二千餘人坐定領侍衛内大臣公阿靈阿等傳諭曰今日之宴朕遣子孫與爾等分頒食物執爵授飲當頒食授飲時勿得起立以示朕養老尊賢之至意扵是執事人員次第陳設殽饋八簋品列庶羞百果之槃六榖之飯領侍衛内大臣侍衛部院官員内廷翰林往來勸侑前後以徧無不充飫食畢南書房翰林等捧出御書諭㫖宣讀扵衆曰諭各直省老人書稱文王善養老者孟子云七十者非帛不煖非肉不飽帝王之治天下發政施仁未甞不以養老尊賢為首務近來士大夫只論做官之賢否移風易俗之效驗所以不暇講䆒孝弟之本心朕因今日之㑹特宣此意若孝弟之念少輕而求移風易俗其所厚者薄而其薄者厚矣爾等皆是老者比囬鄉井之間各曉諭隣里湏先孝弟倘天下皆知孝弟為重此誠移風易俗之本禮樂辭讓之根非淺鮮也昨日甘霖大沛四野霑足朕心大悦爾等無悞農時速囬本地特諭宣讀畢衆耆老懽忭稽首諸皇子乃出率諸皇孫及宗室子弟五十餘人親執爵觴授老人飲佐以名茶自大學士以下民以上往來勸侑前後以徧無不酣適頃之上出御幄陞座衆老人皆翹首仰瞻聖顔嵩呼之聲浩若山海上命扶掖八十嵗以上官員致仕吏部尚書宋犖誥封户部尚書張烺等數人至御座前親賜酒一巵又命扶掖九十嵗以上耆民莊國興等數人至御座前親賜酒一巵扵時風日清和禮儀詳整皇情霽暢衆志歡騰萬國一家熙熙皥皥近在階陛大學士臣李光地臣王掞等跪奏曰聖夀前逾月晴和聖夀後應時雨澤皆由皇上大徳上格天心百祥協應臣等不勝忻躍今䝉恩賜宴徧及臣民天潢執爵寵踰非分誠曠古未有之隆施也致仕吏部尚書臣宋犖臣徐潮等跪奏曰臣等違覲天顔近者數年逺者十數年今見皇上精神倍扵從前真是法天行健䝉恩賜宴恩禮隆重萬國臣民人人感激惟願自今以後十載一來慶祝聖夀無疆也駕起還宫隨傳㫖賜大學士李光地等致仕吏部尚書宋犖等四十八人𫀆㡌硯有差又賜直省來朝耆老四千二百六十八人銀兩有差諸臣及耆老各謝恩而退是日賜七十嵗以上大學士李光地王掞尚書吳一蜚陳詵左都御史趙申喬侍郎王頊齡王原祁廖騰煃致仕尚書宋犖許如霖原任尚書徐元正致仕侍郎仇兆鰲煖㡌各一頂團龍縀袍掛各二件松花石硯各一方誥封尚書張烺原任侍郎田種玉李元振彭㑹淇原任廵撫宫夢仁凉㡌各一頂團龍縀袍掛各二件松花石硯各一方靈臺郎劉一葵原任諭徳秦松齡煖㡌各一頂團龍紗袍掛各二件松花石硯各一方副都御史崔徴璧通政使郝惟諤檢討嚴思位春官正何君錫原任少卿陳嘉績原任諭徳鄭開極原任蒼梧道彭演原任知縣俞曰都團龍紗袍掛各二件松花石硯各一方賜六十五嵗以上尚書張鵬翮胡㑹恩侍郎李旭升阮爾詢劉謙内閣學士彭始摶鄒士璁郎中許康錫員外郎夏疇監副臧積徳致仕尚書徐潮原任尚書王鴻緒原任侍郎李錄予原任副都御史勞之辨原任通政楊篤生原任少卿朱廷鋐原任侍講彭定求原任諭徳楊大鶴原任贊善田成玉尤珍原任御史鹿賔松花石硯各一方是日宴賚九十嵗以上老人直𨽻曹鳯全等二十三人江南省莊國興等八人山東省劉名科一人湖廣省吕永年一人浙江省沈玉揚等三人銀各十兩八十嵗以上老人直𨽻張聘潛等四百三十三人江南省邱體華等八十人山東省閆見等十九人山西省田畯等二人河南省蕭冲斗等三人陜西省張席珍等二人湖廣省劉元志等四人浙江省鍾國浩等三十五人江西省吳嵩齡等五人福建省張獻福等三人廣東省羅科等二人銀各八兩七十嵗以上老人直𨽻張竒䕃等一千四百四十九人江南省應元等一百十四人山東省王銓等七十八人山西省李錦等三十六人河南省董朝輔等七人陜西省張鴻等十一人湖廣省辛國忠等十五人浙江省鮑守一等二百二十五人江西省甘象龍等十一人福建省呉宏祖等十人廣東省劉遐齡等十人廣西省李楨等三人雲南省呉學文一人銀各六兩六十五嵗以上老人直𨽻李三省等一千四百九人江南省梅竒等九十一人山東省于定邦等六十三人山西省商丕祚等七十一人河南省徐元亮等十三人陜西省王丕猷等五人湖廣省沈岐注等二十六人浙江省徐聖功等一百六十二人江西省曽譽等十七人福建省林洪京等十三人廣東省鮑亦輔等十二人廣西省宋珍玉一人貴州省秦毓華一人雲南省湯執中一人銀各一兩萬夀盛典初集卷十八
