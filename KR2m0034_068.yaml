body:
  text: 欽定四庫全書萬壽盛典初集卷七十歌頌十詞臣二萬壽頌言柏梁體一首有序翰林院侍讀學士臣宋衡臣聞帝運當日中之㑹三祝載歌皇躬聚天寶之庥九如有頌惟五百載之昌期獨盛斯億萬年之歷服常新恩與民物同春壽自乾坤不老欽惟我皇上瑞育龍圖德隆鳯紀瑶星耀紫微之座六合皆庇榮光璇宫麗南極之輝九有咸霑福祉大業共勳華永著盛德與覆載同流感沐天恩欣逢聖誕自五十二年而紀無疆之厯太平之日月愈長由甲子一周而綿有道之祥神聖之春秋正富天人胥慶中外偕歡臣衡南國鄙儒西清末品披泥金檢玉之籙摹巍煥而難名繪歌衢擊壤之聲擬雅頌而未肖爰抽蟲篆仰贊鴻文敢言珥筆之才少效呼嵩之祝謹拜手稽首而獻詩曰升騰旭日耀輝光蒼龍應候接勾芒淑氣和暢協履祥巍巍聖德衍無疆壽域𢎞開振八荒欽明文思軼陶唐聲教光昭四海揚敬天勤民衆所慶登三咸五茂胥匡體乾四德無偏昂恩湛春溫膏澤瀼資生資始萬類昌統天景運六龍驤尊親山海共梯航宜民宜人道濟臧美利不言沐濊汪致恱致養洽隂陽貞元復始大用藏太和保合蘊難量尊崇至聖道統彰特表朱子源流長恩沛賢裔照宫牆心傳默契歸聖皇南征滇閩掃欃槍睿謀方略靖疆場北討沙漠驅虎狼外寧內安視如傷巡省河淮重隄防瓠子無歌陋宣房觀民休助樂熙攘求寧求瘼靜封章司徒掌教明倫詳三德乂用兼柔剛家喻户曉聖訓莊蒸民粒食祈豐穰躬禱南郊時雨暘普賑黎庶足稻粱蠲賦蠲漕裕倉箱貢鹺寬策恤羣商減征關𣙜澤汪洋時行解網德意將春隨芝詔措桁楊如天好生恩流滂大法小亷肅官常片長一節容劻勷盈廷師濟叶笙簧闢門籲俊洵無方屢邀曠典承篚筐連茹彚征盡琳琅天章炳煥謨誥揚宸翰揮掃龍鳳翔睿研理數測穹蒼授時厯法開混茫文治武功輝巖廊八紘九有治馨香禮樂明備制作煌道一風同儼羲黃羣上尊號遜未遑蕩蕩難名超百王星雲爛熳覩敷張效珍川嶽呈玊璜天縱神聖握乾綱參贊天地允相當祿位名壽備且康壽身壽世垂衣裳九如三祝際時芳千條新柳拂鵷行仙桃萬樹映珠韁金莖承露溢瓊漿琅璈韶濩奏鏗鏘羣工舞蹈珮璁瑲億兆瞻雲欣躋堂太平久道樂未央嵩呼齊獻萬年觴萬壽頌有序翰林院侍講學士臣熊葦臣聞惟德動天昭受聿邀申命惟仁得壽安敦必享大年開萬世之太平乾坤覆載介億齡之景福日月升恆欽惟我皇上誕縱自天生知在御履至尊而家六合撫時夏而子兆人本嚴恭寅畏之小心彰濬哲文明之峻德北燮南諧東漸西被躋唐虞三代之隆春生夏長秋收冬藏齊天地四時之量錫福由於建極敬天正以勤民南至饗郊欽翼而䖍昭事上辛祈榖肅雍以奉明禋惟每嵗之躬親輒應時而感格占豐瑞雪兆霡霂於先春從律東風轉氤氳之淑氣天人相與協應年榖於焉順成既克享乎帝心益重光夫祖德守成而兼創業道不僅於紹聞承烈斯能顯謨功尤高於善述春秋匪懈懷降福之孔皆黍稷惟馨企於昭於在上寰宇之歡心允合庭幃之福履永綏德劭年高深愛不弛乎孺慕冬溫夏淸幾微無拂於慈顔廣推恩錫類之𢎞仁盡愈色婉容之至孝篤行逈超乎千古鴻名丕著於兩間聖武布昭既安邦而禁暴皇猷允塞頻奏凱以銘勳蠻陬之苞蘖皆除山無伏莽渤澥之鯨鯢盡掃水不揚波法雷電以三犁親征漠北示風霆於九譯遠懾天西永淸日逐之窟巢誕受堅昆之琛賮屬蕃效順護近邊者五十家異域來王越巨海者四萬里塞外風煙永息域中膏雨常流涖淮浦以六巡奠黃河之九曲湖通洪澤酌資淸瀹濁之宜堰築高家底戢浪安瀾之績轉雲帆於海國儲香稻於神倉中外乂安公私充實更恤近畿之沮洳俾成沃壤之膏腴疏漳滏之末流河名永定建陂渠之大利堤屹子牙他若濵湖下濕之區悉行蓄閘灌輸之法凡以足民而裕國良由節用而愛人親題耕織之圖丁寧勸誡廣積常平之榖酌劑盈虛水旱偶聞遂發倉以平糴軍民既足猶賜復而寬逋八方盡蠲惟正之供萬井無復追呼之擾漢帝恩霑半稅豈能潔美皇仁宋祖惠止數州未足同符聖德嘉禾九穗應協氣而被東阡瑞麥雙岐呈休徵而盈北陌念安民莫先察吏惟息事所以寧人愼選巨寮每臨軒而訓飭不遺庶職亦御扆以咨詢俾大法而小亷務懲貪而奬善刑賞總歸忠厚常存欽恤之心赦原一出寬仁遍洽好生之德信時平而歲稔且俗易而風移乙覽從容萬幾暇豫講筵經幄肇開初政之時聖學天文大煥承平之日溯道原於精一接千聖之心傳搜藝苑之菁英鑒百家而手定校規矩測量之法䆒極纎毫審中西厯數之衡括囊宇宙因心作則國書衍河洛之精考迹尋微字典發羲皇之奧觀人文以成化賁皇極之敷言堯典舜歌渾噩昌明之氣象禹謨湯誥矞皇炳蔚之文章芟月露之浮靡詎止起衰八代耀斗奎之光彩允堪垂範千秋藝苑餘閒偶揮毫而染翰法書擅美洵入聖以超神鳳翥鸞鶱璀璨日星之麗瑶函琬册昭回雲漢之章值兹文治之休明自爾儒風之振起尊尼山以師表萬世躋紫陽以肩隨四科褒崇歷代之名賢爵祿先儒之後嗣士林競勸榮路廣開鄉㑹之額頻增文武之科並設榜名萬壽爭鼓抃於作人歲慶聮登盡縈懷於好爵鴻詞博學羣集鳳池賦客詩流同游虎觀作太平之黼黻徵至治之光華生徒與朝序均歡士氣共民情偕暢化行俗美還熙皥之淳風治定功成臻郅隆之上理兹者昭陽獻歲姑洗諧音蓂莢紀時際六旬之周甲攝提旋柄當三月而建辰鳥囀鶯歌韶華正好塗謳巷舞慶節常新人間煦噢之風遍吹薄海化國舒長之日正耀中天雖保泰持盈屢辭尊號而鳴謙履盛倍著休光備聖神文武於一身緝熙純嘏膺富壽康寧之多福申錫無疆臣職在文詞班隨侍從快春臺之共躋欣壽域之宏開拜手堯階願效封人三祝揚言周雅式歌天子萬年頌曰惟天覆幬惟地持載惟聖立極居中成位皇矣我皇并包無外軼帝超王敻出百代博厚高明與兩儀配悠久無疆德洋恩濊萬國咸寧百福來㑹蕩蕩巍巍孰名其大皇帝敬天明旦嚴恭肅將郊祀翼翼宸衷有誠斯格無感不通雨暘時若年榖屢豐皇帝法祖德峻功崇守兼乎創作述無窮文謨武烈炳蔚昭融恢𢎞前緒孝治日隆初討叛臣三逆是滅旋靖邊烽殄厥遺孽臺灣逋寇歸我版籍漠北巨憝犁其巢穴赫濯天聲焜煌武節凱歌頻奏勳碑高揭海外邊疆莫不震疊豫兆民安豫萬世逸帝眷東南財賦之區黃淮未乂漕粟安舒六飛時邁導湖築堤二水歸壑萬艘坦途亦越近畿沮洳多淤載疏載堰盡成膏腴南北之水滙歸漕渠指授方略悉稟睿謀涖政惟勤朝乾夕惕日昃不遑幾康是敕居身惟儉卑宫菲食能節而愛與民休息惟儉惟勤惟禹之德臣工式之興亷效職兆民化之風移俗易返朴還淳曰惟帝力帝念農人稼穡艱難御園豐澤種植時觀倉儲廣設賦稅頻寬猶懷咨警暑雨祈寒特沛𢎞仁雨潤露漙正供悉蠲民不知官數逾千萬薄海騰歡百室盈止九州乂安內謐外寧萬幾暇豫游心典籍淹該象數擷彼菁華詎尋章句時灑鴻篇八極精騖帝典王謨周詩漢賦五色卿雲九章韶濩根柢性命研深㫖趣入聖超神千秋獨步崇儒重道見聖羮牆尼山師表御墨輝煌發明六經推功紫陽爰躋十哲自廡升堂儒風丕振文教聿昌加科廣額澤浹宫牆士林歡躍天路騰驤榜名萬壽德造斯長化行俗美功成治定萬類樂生百昌遂性協氣旁流符瑞順應宜其優游斂福凝命惟帝守謙彌懷執競無逸居心緝熙止敬安益求安聖不自聖五十二年猶如初政維兹辰月化日曣㬈旬有八日誕聖昌辰甲子初周景命長春率土嵩呼共獻堯尊願歌周雅保佑天申自今伊始日新又新與天無極與地無垠億萬斯年長奉一人萬壽頌有序曰講官起居注翰林院侍講學士臣周起渭臣聞德業之盛久大協於乾坤茀祿之來升恆比於日月蓋仁為化育生成之體而誠有高厚悠逺之徵誠則常存仁者必壽恭惟我皇上體天行健象地安貞心涵至道之元身備太和之氣聰明睿知禀於性者獨隆精一執中稽於古者有獲武烈所布擴從前未關之方隅文命誕敷播無遠不屆之聲教為萬國神人所仰作之君作之師校千古帝王之中賢於堯賢於舜禮明樂備府修事和而猶求衣未明忘餐永晝豐年屢告而蠲租之令遍於九州刑措已臻而好生之心彌勤三宥既富而教首重田功惟誠則明益殷民瘼至於渾儀象數之學洞徹星辰河圖洛書之微直探羲禹㸃畫昭於雲漢歌詠叶於韶鈞麟鳳在郊芝蘭遍野盛世之民淳厚化國之日舒長草木愈覺欣榮昆蟲咸得遂性往昔鴻名之受尊號之加倘酌古以論今既登三而咸五我皇上有其實而不居其名抑其文而惟崇其質蓋天長覆而地長載不自以為功德言盛而禮言恭乃愈彰其聖祗無逸以作所益久道而化成巍巍蕩蕩難名歲歲年年無極德惟超世斯閲世以常存道協先天乃後天而不老六十年甲子今歲初周億萬載遐齡來朝伊始因上天久久之福祚咸畀吾皇并斯時蠢蠢之臣民亦登夀域臣謹拜手稽首而為頌曰赫矣寶命集我聖皇首出庶物奄有萬方武功耆定文治輝光既邁啇周亦超虞唐神由性生聖從天賦行健永貞建中垂裕日躋時敏聲律身度大德昭宣湛恩布濩萬邦表正萬姓儀型上下咸若覆載清寧遐荒受朔重譯來庭無有逺邇盡為藩屏作民君師為之父母五十二年化行俗厚士興庠序農安隴畝家習禮樂人躋老夀我疆我理維耦十千斯倉斯箱户三百㕓既富方穀和樂且安皇益軫念夙夜拳拳謀我衣食恤我飢寒我無徭役逸我於田我有租賦豐歲而蠲野無遺才登庸在位府罔弗修事罔不治樂職中和休明鼓吹猶增制科以省以試相彼英賢益羅而致肅肅在郊雍雍在宫享祀惟誠養志克恭四海則之禮讓成風莫不敦倫以協皇衷化洽無外功高往古宜上鴻名聖神文武以孚神人以光寰宇吾皇念之虛文勿取聿修厥德益厚而溥用是感召五風十雨斯民乂安永阜永康天子萬年茀祿遐昌如日之升如川之長如松柏茂如陵如岡月屆三春時維聖節閶闔宏開廣樂肆設慶雲錦舒壽星珠列萬國來同九有欣悅天則佑之皇則受之自天申命與天為期億萬斯年無疆無涯臣自遐陬獲登天祿譬之小草蔭於喬木際此昌辰敢後嵩祝洪算靡極嘉頌是陳敬從千官永慶一人萬壽盛典初集卷七十
