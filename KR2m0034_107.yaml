body:
  text: 欽定四庫全書萬壽盛典初集卷一百九歌頌四十九舉貢諸臣四萬壽詩五言律四首貢生臣韓御李閶闔排仙仗千官祝至尊鶯呼調舜樂虎拜獻堯樽南極紅雲繞西池青鳥翻共球來萬國淑氣滿乾坤其一盛世求賢切科因聖壽開甄陶齊萬類鼓舞盡羣才麟鳳遊金殿芝蘭茁玉臺儒生何以報恭進萬年杯其二聖主勤民隱天心格至誠和風披禹甸甘雨沛金城禾結三岐穗人偕千耦耕豐年歌帝力豳雅叶歡聲其三臣父䝉天眷叨居侍從班雲峰宸翰賜鴻業御書頒報國心常在承家學罔攀聖恩霑世世長此祝南山其四萬壽詩五言排律六韻貢生臣周謹纍洽重熙後昭融萬國春普天施雨露率土荷陶鈞廣育寰中秀旁求席上珍帝廷儀鸑鷟御苑騁麒麟壽愷羣稱聖咸熙廣樹人臣民霑化育拜手祝靈椿萬壽詩七言律二首貢生臣宋鍠梯航重譯逺來庭五色雲中廣樂聽獻壽蟠桃看結實迎恩宫栁正舒青陽春永駐韶華日花甲初開億萬齡藝苑祗今多盛典文光長映老人星其一聖人端拱衮衣垂久道欣逢化洽時自是生成皆至德由來覆載本無私舉頭日近趨金闕拜手嵩呼步玉墀世受國恩何以報吮毫先詠萬年詩其二萬壽詩集毛詩貢生臣陳其素維暮之春萬壽無疆維嶽降神宜君宜王穆穆皇皇顒顒卬卬如圭如璋令聞令望下民之王四方之綱四方來賀濟濟蹌蹌百辟卿士朱芾斯皇庶民小子承筐是將京師之野萬舞洋洋值其鷺羽吹笙鼓簧君子至止衮衣繡裳龍旗陽陽和鈴央央來游來歌為龍為光桃之夭夭春日載陽鳳凰鳴矣于彼髙岡實惟豐年壽考不忘介以繁祉惟天降康如岡如陵爾熾爾昌萬有千嵗惠此四方萬壽詩五言排律十二韻貢生臣郟肇基律轉春臺暖籌添瑞靄融千官爭祝嘏萬姓共呼嵩雲日天顔近岡陵聖壽崇笙歌碧檻裏鸞鳳紫霄中禁栁含煙碧仙桃帶露紅陳風知世泰進鑑識臣忠大德栽培厚人才棫朴同圭璋成國器追琢賴皇功有詔開金榜方春啓蘂宫珊瑚頻入網鵰鶚早騰空雨露霑濡遍風雲際會隆萬年歌樂愷四海慶遭逢萬壽詩五言律一首貢生臣葉馨太和翔宇宙率土戴堯天仁日光三極薰風被五絃春鶯啼曉樹御栁拂晴煙共效封人祝無勞羡偓佺萬壽詩七言截句四首貢生臣朱式紫禁遙瞻瑞靄濃露華初湛玉芙蓉太平天子當春殿萬嵗嵩呼徹九重其一海晏河清景物融此時歡慶萬方同君王有道民生樂共擬南山祝聖躬其二御苑風和淑氣開九城歌舞接蓬萊臣民不惜金錢數莫報君恩萬一來其三世際升平日月長重回玉厯衍無疆道同天地還同壽永慶年年萬嵗觴其四萬壽詩七言律二首貢生臣王見麟九重佳氣五雲邊四海歡呼祝萬年常對南山依舜日擬將北斗獻堯天雲霞煥發當春殿花柳爭明媚御筵樂府定知絃管盛衢歌補入六英篇其一宫殿蘢葱曙色開千官雲擁集蓬萊共依天仗逢春晝爭捧霞觴進壽杯重譯已通殊俗貢萬方多見老人來祗因聖德周無外到處嵩呼應似雷其二萬壽詩七言律一首貢生臣傅王露宫殿參差碧栁斜衣冠共拜進流霞未央燭影遲明月長樂歌聲舞落花浩蕩皇恩同雨露舒長化日遍桑麻普天齊叶南山頌壽比岡陵福自遐萬壽無疆頌有序貢生臣周士裕欽惟帝德同天既極千秋之巍煥臣心嚮日敢從億姓之頌揚時值陽春恭逢聖誕集古今帝王之成生民未有進日月岡陵之詠萬古為昭敬獻衢謡用申華祝頌曰皇帝御極五十二春律中姑洗周甲之辰聖敬日躋神符竝臻大德必得受命聿新壽惟仁者生為聖人羣工獻頌曰自天申於惟聖學窮理盡性道在執中功惟主敬精一心傳微參默證圖籍之外别有心鏡於惟聖德天亶崇隆民胞物與默運深宫溫溫春旭浩浩鴻䝉乾坤獨闢奕世休風於惟聖孝椒寢依依為尊為養玉冊流徽翠華出狩青鸞同飛晨昏問視允矣無違於惟聖治太和在宇禮明樂備教養兼舉上自朝廷下逮草野矞矞皇皇雍雍與與蠲租賜復遍於率土赦過省刑邁乎皇古時奏薰風時敷甘雨草木昆蟲咸得其所於惟聖藻天象成章日華星燦雲流錦襄萬幾餘暇篇什琳琅直追雅頌陋彼柏梁文治日盛文風日開增科廣額益致栽培朝多吉士野鮮遺才芃芃棫朴壽考康哉國之大事厥惟河漕皇帝曰吁天庾宜饒兩河分道奔激不交指授方略投璧除蛟躬親周視不憚勤勞於今底定緑野青郊臣也錫圭民也流膏含哺順則接武唐堯天生我皇錫極萬國為生民主中和位育泰階方升天心其復生民何幸家給人足泰山巍巍大椿郁郁春日載陽山河秀育遊於華封聽歌三祝匪曰摛藻用介景福紅雲作屏紫霞為觴如日如月為龍為光盈廷佩玉舞蹈鏘鏘草莽微臣未列鵷行舉頭日近天宇煌煌拜手稽首萬壽無疆聖壽無疆詩五言排律五十韻有序貢生臣周嵩聖天子御極五十有二年仁風翔洽德日雍熙四海升平八紘治理時維三月斗柄在辰恭遇萬壽令節率土咸歡普天共慶草茅微賤沐浴帝治亦得含哺鼓腹載頌無疆焉欽惟皇帝陛下福全洪範德契苞符大撓之甲子初周羲后之乾坤永奠星流華渚朝閶闔者萬國衣冠雲繞瑶樞來玉帛者九州臣庶運方泰而健行不息日當升而光燭無垠亘古罕儔惟今為盛夫體乾之元與天無極聖之壽也乘震以出握符而興聖之瑞也恭儉莊敬樂善好生聖之德也邇無不綏逺無不化聖澤之光被如雲行雨施也天人並貫德藝兼成聖學之日新如乾健離明也聖藻垂而萬世永以為寶聖武昭而四海咸震其威熙熙皥皥寧謐八方仰聖化之時雍焉蕩蕩平平垂統萬祀慶聖厯之綿長焉莫罄際天蟠地之勳願上北海南山之壽接黃帝推策迎日之統以莫不增過周家定鼎卜年之期自今伊始既為聖世之民敢效華封之祝謹拜手稽首而獻詩曰聖壽符乾運皇圖協地維一人膺永命千億受天祺曙色開金闕晴光轉玉墀冠裳紛拜舞文物共葳𬎼香傍龍樓出花臨鳳扆欹殿鶯春睍睆宫栁曉參差萬象雍熙洽三辰節候宜春秋欣肇始福祿永如茨聖瑞多靈異休徵軼姒姬重華瞻舜目竒表見堯睂禁苑三千樹瑶階五色芝麒麟常出豫鸑鷟自鳴岐聖德侔天德文思運睿思訏謨自霄漢恩詔日宣披經緯通文武方員中矩規八方賡治化萬國仰仁慈聖治超三五洪疇配偶竒邇言頻好問大道廣疇咨方虎分屏翰伊周列鼎鼒垂紳依紫極珥筆侍彤幃聖澤無涯涘深仁拯溺饑蠲租過億萬錫福遍羣黎渙汗生成遂敷膏動植知金錢散㷀獨粟帛賚期頤聖學窮今古璇宫懋緝熙右文尊孔孟側席問臯夔思道宵無寐求賢野不遺大鈞羣物鑄天籟萬噫吹聖藻敷文命天章煥令辭異花生栗尾竒采發隃糜韶濩傳仙奏球琛燦碧箕奎光耀縑素宸翰煥罘罳聖武崇寬大神謨異設施九重經濟略奕葉太平基詔發黃金殿威行赤羽旗兩間淨烽燧萬井樂煙炊聖化追軒后皇風嫓伏羲朴淳還太古渾噩過伊耆歲歲倉箱滿村村婦子嬉豐年多黍稷天廪積京坻聖歷綿千祀乾元運四時休明真有象大化浩無私法服山龍被神霄黼黻垂輝煌丹闕衮鞏固玉盤螭特重髙科選還隆好爵縻草茅至微賤蹤跡愧孤羈蓬島春光麗寰瀛曙色隨生逢郅隆世敢獻頌揚詞地厚能成物天髙望聽卑願從鵷鷺侶常侍鳳凰池萬壽詩七言律三首有序貢生臣查宏道臣聞嵩齡永錫昊天之眷顧方殷純嘏長臻兆姓之歡呼靡已悠也久也惟不息乃為至誠皇哉堂哉斯大年必歸仁者星流虹繞無非花甲之禎祥日麗春融盡是長庚之耀彩歡騰中外算永春秋欽惟皇上德懋聖神道隆文武體乾行健釐萬幾於旰食宵衣盡性存誠㑹一貫於文江學海開千古未開之域大勇本之深仁集百王未集之勳守成兼夫創業宸章璀璨永垂士訓官針御墨繽紛咸仰龍蟠鳳舞頻年肆眚光天化日同輝屢嵗蠲租甘雨和風竝潤靖烽煙於九塞文命覃敷格干羽於兩階天威逺播固宜受元符於泰岱功高七十二君錫洪範於靈圖齡長萬億千嵗維此三春之月恭逢萬壽之辰麗日曈曨三殿曉迎華蓋彩霞縹眇千官早集彤墀栁垂太液之絲簪裾競艷花綴上林之錦劍珮分榮鳳閣風和紫氣乍浮於仙掌龍樓日暖紅雲遙拂乎爐煙萬國共呼嵩人獻華封之祝八荒齊上壽年增海屋之籌臣山陬下士海澨庸儒幸依日月之光齊慶升恆之運祥開閬苑羣瞻有道聖人瑞啓蓬萊共祝萬年天子敢摛七字上介千春虹流電繞正佳辰浴佛先天早二旬栁外鶯聲仙闕曉雲邊鳳吹上林春朝端仁渥恢王道海外波澄識聖人酺飲合歡盈輦路賡揚今日遍臣鄰其一南極星輝紫禁煙祥光環繞御筵前龍池花栁揚三月螭陛冠裳祝萬年瑞麥多岐生盛世嘉禾疊穗遍中田蠲租歷嵗踰千萬賜復猶聞下九天其二治接勳華久道成中天斗宿泰階平邊銷戈甲傳神武鑰啓圖書賴聖明闕下逺歸重譯貢掌中神授九河清至人上壽如椿茂千百春秋敢比榮其三萬壽詩七言律一首貢生臣沈士舂容佳氣滿蓬萊新翠光生萬壽杯運合地天占泰象籌添日月樂春臺聖神天子符三祝浩蕩皇恩遍九垓欣際普天同慶日衢歌巷舞萬方來萬壽詩五言律二首貢生臣沈曾雲壽域開瑶島年年三月中彩斿迎栁緑御幄映花紅和應丹山鳳祥流華渚虹八方同樂意萬嵗聽呼嵩其一一人膺壽愷萬物被恩輝淑氣開黃道瑶光護紫微昌時供黼黻春色獻芳菲重譯誰言逺梯航滿帝畿其二萬年歡集唐詞有序貢生臣徐國銓路登雲巢宏幹竊聞瑞啓蓬萊蓂葉紀堯時之甲子祥開閬苑卿雲傳舜日之光華得壽而兼得名爭頌聖人有道大壽必歸大德咸稱天子萬年率土胥歡敷天同慶欽惟皇上壽同川至德與日新曠典時頒士氣之栽培尤盛恩科特設藝林之感戴彌深恭逢聖誕昌辰欣值艷陽令序山村野老對北闕而歡呼甕牖儒生頌南山而拜舞臣等學慙弇鄙質愧疏庸幸同草木之依陽時效葵心之向日賡揚百福敬陳難老之觴採集三唐韻叶萬年之調其詞曰悠久且長李宙主普天之下陳正卿太平天子韓休野老熙熙元稹察五雲而有備杜牧胥樂兮千萬嵗王淮稱觴彼此情無異馮宿蓬萊宫闕對南山杜甫照瓊樹以增麗張藴古天浮喜氣王諲就之稱堯舜之聖席夔負扆恭已張欽援輝映儒林王起拂曙光而蒼翠錢起滿袖桂香風細薛昭蘊共歡天意同人意王維來賀薰風一萬年陳陶望堯旌以來試歐陽詹道暢經綸樊珣解吾氓之慍李叔域中殷阜周拱萬國歡心韓休遙聽鈞天九奏毛文錫早綻青門之栁吳仲舒微臣欲獻唐堯壽王涯和鳴雙鳳喜來儀沈佺期在乎宫沼郊藪喬琮繩樞甕牖席瓊深恩重德無言處羅隱日月來就李宙天地同久李為瞻斗牛而既遘韋展豈間之於博厚羅讓吟中景象千般有白居易光臨天子萬年春閻朝隱湛鮮輝以交透袁兌風靜蓬萊李庾祝壽思明聖薛能更求多祜賈登瑞氣長凝張仲素出入千門萬户王維犬吠雞鳴幾度皇甫冉太平時節身難遇韓愈我皇應運太平年白居易覩卿雲之飛吐李惲金門獻賦鄭錫四時最好是三月韓偓飛液花塢白行簡瑶草先春李子卿百囀宫鶯繡羽鮑防正是芳菲欲度溫庭筠玉爐香暖頻添炷毛文錫語來青鳥許從容曹唐出層巒以髙翥姜公輔𢎞濟蒼生王維德暉覃率土許敬宗咸遂其性謝觀天下和平柳宗元體渙汗而施令封孟申乃昊天之眷命張叔良垂衣而八極居正李庾年年嵗嵗樂於斯趙彥昭美皇運之方永無名氏紅桃春映髙無際從今結子三千嵗徐彥伯萬國稱慶吳仲舒碧沼凝光唐太宗寓目巉巖之頂白行簡懸樹色而涵靜李蒙一人奏南風之咏無名氏水晶宫殿勝蓬萊花蘂夫人魚從容以游泳姜公輔萬壽詩五言律二首貢生臣吳襄至德符三極深仁浹九圍乾行天共健恆久日同輝瑞靄開春殿祥雲護紫微萬方齊獻壽喜氣滿皇畿其一民物登仁壽車書紀㑹同垂衣正南面縕瑟鼓薰風帝學還時敏皇圖協亮工箕疇占斂福長萃聖人躬其二萬壽詩五言律二首貢生臣張宏敏歡心合萬國聖壽竝三皇南極羣星拱東風庶卉芳瑞蓮呈上苑仙樂奏康莊永慶升平盛皇情樂未央其一道統千年續詩歌百祿宜從來仁者壽真乃聖之時洙泗源流逺蓬瀛嵗月遲小臣情倍喜三世沐恩私其二聖壽萬年頌貢生臣吳日燦粵稽上古帝皆神聖電繞虹流秉懿獨正雷澤感靈龍河交慶瑶光貫月史編可鏡三皇五帝後先輝映遞衍而王緝熙敬勝於萬斯年永言配命自昔為昭於今逾盛繄我大清踐祚自天天作髙山長白蜿蜒鬱鬱葱葱王氣盤旋瑞鍾列聖有開必先逮我世祖定鼎於燕創業寬大垂統恪䖍廓清海宇恢拓幅員修明禮樂政體宏宣厯傳我皇冲齡岐嶷天縱神竒英姿挺起誕膺大寶萬幾咸理乾健離明純亦不已隂陽合撰剛柔協美六合休和三才綱紀雨暘時若郊壇歆祀是維敬天萬壽伊始三后既往實首儀型文謨武烈是訓是程率由舊章真知力行敬承勿替遹觀厥成丕光前休泰階康平鴻猷日懋奕祀攸寧佑啓後嗣麟趾祥呈是維纘祖萬壽永貞思齊太任徽音夙著昔承色笑永言追慕聖母嗣音令德有素龍樓鳳閣寢膳必預尊養兼隆心猶童孺錫類不匱嘉祥屢覩百行之原天倫樂叙是維孝親萬壽天祜千秋義理孰為導揚藉有孔孟正學始彰諸賢翊贊入室升堂躬親幸魯盛典煌煌補䕃後裔奉祀蒸嘗復念宋儒錫額表章尤推考亭升配宫墻是維重道萬壽無疆自昔帝王不廢文翰二典三謨卿雲復旦三代針銘文彩何煥猗歟我皇道綜一貫天亶多能詩文燦爛九重昭示一辭莫贊更擅法書跨唐凌漢是維聖學萬壽無算由來治化莫盛唐虞運際中天人慶康衢我皇御宇端拱辰居宵衣旰食是究是圖用人行政舉措自如巨細悉當熙皥奚殊日昃不遑事豫躊躇是維勤政萬壽嵩呼水旱頻仍堯湯不免我皇重農省耕止輦仁育兆民撤懸減膳賜復蠲租湛恩匪淺古稱曠舉今為常典户絶追呼村安雞犬人知禮義萑苻患鮮是維勤民萬壽彌逺憶自寅卯滇閩出軍逆藩抗命立掃煙塵父老安堵露布頻申以逮漠北偶擾妖氛龍驤出塞用兵如神殲厥渠魁野無隻輪海外萬國莫不來賔是維神武萬壽無倫東南民患莫如河道賈讓奇策屢試罔效帝憫懷襄方略親教更勤翠華利害燭照萬靈效順百神所勞砥柱安瀾或塞或導玉食無虞生民再造是維平成萬壽是報國家士氣風俗所基甄陶天下如水滙歸我皇掄材不拘成規制科而外旁求詩詞廣增解額纍下綸絲今嵗聖辰加開兩闈十年一舉造就靡遺是維作人萬壽昭垂凡兹至德古帝其難聖神文武詞莫能殫請上尊號屢辭彌堅允恭克讓美善畢兼聖不自聖安愈求安謙尊而先終日乾乾久道化成咸五登三山陬海澨雷動鳴歡昔華封人曾獻三祝載考箕疇壽歸五福欽惟聖皇俾以戩榖花甲方周籌添海屋草茅懷感願獻芹曝或擬九如或歌百祿莫罄髙深難名楮幅長戴堯天萬年寶籙萬壽詩五言排律八韻貢生臣陳纘宗龍飛周甲子景運日方中錫極疇全卑敷文譯盡通威靈揚海北聲教訖天東禮樂侔三代車書總大同溥天開壽域率土沐薰風兩露周羣彚甄陶即化工國楨生濟濟棫朴秀芃芃幸際熙隆世應知久道功萬壽詩五言排律六韻貢生臣朱克用端冕居宸極垂衣衍厯長榮光浮斗柄瑞氣耀文昌青鳥來蓬島紅雲捧玉皇菁莪承德澤川嶽發光芒天路驤騏驥桐岡翽鳳凰嵩呼欣壽考拜手效賡揚萬壽詩七言律二首貢生臣湯居業長庚朗耀啓禎祥運協瑶圖寶厯昌一統車書歌聖治九重宵旰握乾綱虹流華渚輝天宇電繞星樞煥斗光甲子初周徵瑞應岡陵共慶福無疆其一率土來王獻壽觴帝城佳氣靄蒼蒼風和日霽三春麗物阜年豐百卉芳壤擊康衢歌順則嵩呼金闕樂趨鏘普天黎庶同歡慶願祝純禧萬祀長其二萬壽詩五言排律二十八韻貢生臣耿國祚運際中天盛時逢化日長一人稱有道五位正當陽保合乾坤泰生成民物康鴻基綿孔固寶厯慶無疆景色三春麗韶華滿眼芳虹流徵聖瑞電繞覩期昌制作超前古聲名邁百王巍巍功莫竝蕩蕩德難量威振無雷俗仁施出日鄉車書同萬國烽燧絶遐荒嵗稔占禾麥時和兆雨暘賦寬過夏禹刑措勝商湯民俗何熙皥君恩復濊汪謙冲猶好問勤省每巡方治豈臯夔贊材搜梓杞良諧音精律呂闡易得羲皇學富窮源委詩成薄漢唐雲霞光睿藻日月煥天章言動皆謨典臣鄰肅紀綱河山如帶礪玉帛盡梯航花甲欣初度明良共一堂太平殊有象恭默但垂裳蓂葉瑶階秀爐煙寶篆香百靈齊效順萬象盡呈祥日暖龍旗動風和雉尾張衣冠何濟濟劍佩競蹌蹌頌禱盈丹陛謳歌徹御旁葵忱何以展願進萬年觴萬壽盛典初集卷一百九
