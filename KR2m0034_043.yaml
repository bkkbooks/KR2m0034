body:
  text: 欽定四庫全書萬夀盛典初集卷四十五慶祝二圖記三直隷順天府保定府永平府河間府真定府順徳府廣平府大名府宣化府臣民表文伏以皇猷廣被介百福而躋春臺聖祚方昌統八紘而開夀域道備於蕩平正直永享昇平化行於歌叙修和誕膺茀祿率土之尊親孔切邦畿之歡忭彌殷瑞滿彤庭慶流錦陌欽惟皇帝陛下丕承丕顯乃聖乃神秉聰睿之姿昭肅雝之範遡淵源於洙泗一貫相傳紹道法於唐虞中天逺接經筵頻啟探羣聖之微言講幄恒臨闡六經之奥旨煥竒文於奎壁御墨淋漓叶雅頌於宫商宸章璀璨仁心仁聞之並著樂利成風善養善教之兼修和恒有效蠲賑貸以舒民力綏彼窮簷大欽恤以察臣工慎乃庶獄散神倉之白粲萬方衽席咸登發内府之朱提六宇閭閻胥被靖水患於江津淮浦軫河防於越北燕南聖武布昭沙漠烽煙永息天威震叠遐荒桴鼓無驚貢雉獻琛共球畢集梯山航海玉帛攸同天瑞駢臻日再中而雲五色地靈類應穀雙穗而麥兩岐鳯舞麟遊見太和之洋溢河清海晏知帝澤之瀰綸府事罔愆平成有賴歲臨已位乃巽風申命之時月值辰鄉正龍徳方亨之會歴五十二年之宵旰聖體康强集千八百國之車書皇圖悠逺聖人御宇於今花甲方周上夀凝祥自此春秋彌永花明栁媚縈紫氣於六街燕語鶯鳴散青陽於萬户石髓共瓊漿竝獻漢桃與期棗偕陳臣等學守一經世居三輔首被大君之化惠愷偏多近依天子之光訓行恐後欽九重之瑞祉瞻天捧日每切葵傾仰五位之憂勤沐雨櫛風真如乾健耕夫牧竪衆口嵩呼白叟黄童濟聲華祝伏願健行不息日進無疆沛民胞物與之膏播一道同風之治協庶徴於洪範曰雨曰暘曰寒曰燠調四序以迎和賡景福於雅詩我黍我稷我倉我庾慶屢豐而集祉則天長地久億萬年之玉厯永綿日升月恒千百載之金甌孔固矣工部右侍郎臣劉謙都察院左副都御史臣王企埥臣崔徵璧通政使司通政使臣郝惟諤太常寺卿臣李敏啟太僕寺卿臣周道新通政使司左通政臣郝林右通政臣王景曽大理寺少卿臣邵觀翰林院侍讀學士臣熊葦日講官起居注翰林院侍講學士臣勵廷儀翰林院提督四譯館太常寺少卿臣陸經逺左春坊左贊善兼翰林院檢討臣薄有徳翰林院編修臣宫鴻歴翰林院檢討臣高維新翰林院庶吉士臣朱一鳯臣朱綸臣何國宗臣薄海臣舒大成臣李如璐臣戈懋倫兵科掌印給事中臣常紳刑科給事中臣郭徽祚掌江南道事監察御史臣樊紹祚掌浙江道事監察御史臣陶彝吏部文選清吏司員外郎臣董哲户部河南清吏司郎中臣王克貞浙江清吏司員外郎臣李舜卿山西清吏司員外郎臣曹鑛貴州清吏司員外郎臣江景瑞廣東清吏司主事臣蔣書升雲南清吏司主事臣黄叔璥禮部主客清吏司郎中臣黄叔琬兵部武選清吏司郎中臣許康錫職方清吏司主事臣李其旋刑部湖廣清吏司郎中臣郝之英廣東清吏司郎中臣胡范山東清吏司郎中臣劉承啟山東清吏司員外郎臣劉沖山東清吏司主事臣閻純璽山西清吏司主事臣張振嗣工部虞衡清吏司製造庫郎中臣魏嗣多屯田清吏司郎中臣楊國琳營繕清吏司員外郎臣李士瑜虞衡清吏司員外郎臣蔣仁錫虞衡清吏司主事臣馬璵大理寺左評事臣吕應聲右評事臣張光鏞中書科中書舎人臣曹廣憲行人司司副臣張光鏻行人臣阮士竒臣褚泰臣李屺尊内閣中書舎人臣多時珍臣胡忠本臣韓暎臣何繼曽臣成說臣王允晉臣趙霖國子監助教臣趙續美等恭進算法滿漢効力人員牓文伏以帝徳崇高四海仰昇平之景運皇仁溥博萬國懐覆載之宏恩綿寳厯於無疆貞恒效順慶鴻圖之永固福祿攸同喜溢普天歡騰率土欽惟皇帝陛下政符四序道契三才首出庶物而咸寧表正萬邦而率迪紹百王之道統治功逺接乎唐虞闡千聖之心傳理學直追乎洙泗聰明由於天亶孝友本於性成謨誥遙宣勸忠而教孝絲綸普煥褒徳而崇儒更重農功時求民瘼用一緩二久昭在宥之仁耕九餘三快覩屢豐之慶葢歴乎五十餘年之盛治乃超乎七十二代之成功兹者時屆三春節臨萬夀東皇司令嘘大地之陽和南極騰輝耀遙天之景色黄童皓首咸拜手而祝有道聖人北塞南雲竝驅車而頌太平天子凡有血氣莫不尊親臣等小草微生管窺薄技欣逢曠典幸沐宏仁聴玉漏於蓬瀛澹寧日麗覩瑤英於上苑淵鑑花明自顧何人叨逢此日念切鏤肝銘腑莫抒葵藿之忱惟祝地久天長庶竭涓埃之報煥佛輪之普照堯天與慧日俱光宣貝葉之宏文舜樂偕梵音齊奏純嘏不求而自至神明有感而斯通伏願萬福來同百禄是荷金篋之齡益固日月竝其升恒瑤圖之算彌長天地同其悠乆則民安物阜常登兆庶於盈寧海晏河清永迓天庥之滋至矣算法効力臣董泰臣博爾和臣穆世泰臣穆成格臣余掄臣潘藴洪臣沈承烈臣朱崧臣馮壡臣葉長揚臣王羾臣徐覺民臣王元正臣陳世眀等恭祝江南省蘇州府吴縣長洲縣崑山縣常熟縣吴江縣嘉定縣太倉州崇明縣臣民表文伏以皇圖日懋萬方受覆載之恩聖夀天齊億載衍熾昌之祉鼓洪鈞而鑄物太和保合於無涯輝金鏡以凝庥純嘏緝熈於不已紫氣氤氳乎閶闔卿雲環䕶夫樞垣日下歌騰寰中慶洽欽惟皇帝陛下道協乾元化成恒久心周六合每諮詢而弗遑躬理萬幾獨勤勞而罔逸日新富有抜萃於至神至聖之中旰食宵衣加意於已治已安之後闡心傳為治法不止堯見於羮舜見於牆裕創業以守成實踰丕顯文謨丕承武烈凡風聲之廣樹由聖敬之日躋殫昭事於郊壇天眷倍申茀禄告明禋於宗廟神庥黙賛昇平孝事慈闈娛色笑而舞傳宫綵友于昆弟極和樂而禮展家人備膺天慶之歡洵立人倫之至誕敷文徳車書大一統之模耆定武功韜畧啟九天之秘運神明之睿算鯨鯢久翦於炎荒統赫濯之王師氛沴旋消於邉塞海嶠務除其强暴苖民盡革其愚頑大擴版圖通自古未通之境偕來奔走順從來未順之區暨治河工頻邀宸慮聖謨所授績遂奏乎平成法駕斯臨徳永垂乎清晏滌源刋旅較神禹而尤勞耕籍勸農視漢文而倍切神倉少府已蠲億萬之緡錢暑雨祁寒猶厪九重之宵旰向逢五十年之昌運陽春隨地以皆温特賜十五省之全租瑞日周天而盡照允矣博施而濟衆猗歟厚載以資生盛典引年恩隆養老皇仁在宥化洽祥刑溯益下之宏施非度支之可紀頌好生之大徳實元化之同符亘古未聞於今獨盛表章聖學尊彝陳闕里之堂崇尚真儒俎豆升考亭之配御經筵而親宣微旨直接天心臨講幄而近接儒臣深探道藴皇綱總歸於獨㫁大智必察乎邇言文吏與武士交嚴而敷奏明試之程必親必慎百職與六卿竝簡而心膂股肱之寄以禮以誠不拘格以求才益金馬玉堂之盛事更開科而選士増春闈秋榜之嘉榮及幾務之偶閒即圖書之是究製官箴以示則義喻六計之嚴立士訓以垂型功等五經之大天章敷布言言皆帝典王謨宸翰昭囘一一成奎光壁彩包羅子史以迨夫詩詞書畫咸溯本以尋源量度山川以及乎月令羣芳亦晰微而盡致寳符焜燿懋著文明玉食崇隆式昭儉徳深宫惜福福遂錫於兆民明旦清心心乃周乎四海天行永健自致康寧福夀之全世運維昌益臻豫大豐亨之美賡穆穆皇皇而莫罄仰巍巍蕩蕩以難名兹者歲在昭陽律當姑洗恭值六旬之聖誕共稱萬夀之仙觴斗柄指辰韶景暢而天恩益渥歲華周甲玉衡轉而帝祉方新溯元運之時行自六十以至百千萬億循環靡極推至誠之不息由久徴而及博厚高明悠久無疆緬衢歌華祝之年正逢癸巳喜風動時雍之世即是陶唐惟五十二年之物與民胞登宇宙於春臺之上而千八百國之梯山航海獻悃忱於丹闕之前遐邇之石户山農歡騰大地中外之經幢燈樹彩徹長天羣情之愛戴至真萬口之頌揚如一重荷温綸諄諭毋為華侈務期物阜民安愈瞻至徳謙光已極雍熈尚冀年豐時泰跪聆之下感頌逾深咸祈聖主長生等乾坤之無量永使吾儕樂業沐雨露於靡涯萬歲同呼如聴春雷之響九霄共覩羣遊化日之天臣等吴苑庸才海隅下士身依日月長親復旦之光華首戴星辰欣仰貫珠之躔次昔荷翠華駐蹕恩波倍厚於吴閶邇䝉黼座揮毫宸藻徧題乎虎阜何幸彈丸之下里乃䝉如海之洪施徹震澤以為醪莫展稱觴之願盡靈巖而作硯難窮獻夀之文爰偕父老於康衢并挈兒童之春服同聲頌禱沸山謳村管以皆和舉袂婆娑映栁媚花明而胥樂快際貞元之嘉會喜臻熈皥之休風伏願夀考維祺思皇多祜同天不老三皇之厯數未足云崇與物長春九域之幅員益増其廣禾秀延齡之粒歲獲豐穰玉流益算之漿世成仁夀則塗歌巷舞應年年而申慶奚必拘十載之期地久天長自永永以同歡豈止上萬年之頌矣經筵講官文淵閣大學士兼禮部尚書臣王掞吏部尚書臣吴一蜚經筵講官户部左侍郎臣王原祁兵部右侍郎臣宋駿業廵撫山東等處地方都察院右副都御史臣蔣陳錫詹事府少詹事兼翰林院侍講學士臣王奕清日講官起居注翰林院侍講學士提督順天學政臣陳璋日講官起居注翰林院侍講臣蔣廷錫日講官起居注左春坊左諭徳兼翰林院修撰臣吴廷楨太僕寺少卿臣嚴虞惇翰林院提督四譯館太常寺少卿臣陸經逺翰林院修撰臣王世琛翰林院編修臣吴士玉臣王謩臣惠士竒臣蔣漣臣徐葆光翰林院檢討臣張大受翰林院庶吉士臣汪份臣王時憲臣陶貞一臣馮汝軾臣鮑開臣顧嗣立臣郭孫順臣陳王謨臣王遵扆臣王畮翰林院五經博士臣言徳堅廵視東城湖廣道監察御史臣徐樹庸吏部驗封清吏司員外郎臣葉宏綬户部山西清吏司郎中臣王世繩户部浙江清吏司郎中臣王奕鴻户部湖廣清吏司員外郎臣趙成穮兵部武選清吏司員外郎臣陶昱刑部山西清吏司郎中臣宋周臣刑部廣西清吏司郎中今陞廣東肇慶府知府臣宋志益刑部湖廣清吏司主事臣徐涵内閣掌典籍事中書舎人今掣河南南陽府同知臣朱文龍行人司行人臣錢􅘶宛平縣知縣臣李采中城兵馬司指揮臣馬吉臣南城兵馬司指揮臣張緒候補左春坊左中允臣汪士鋐候補主事臣程國珍候補光祿寺典簿臣毛世稭候選員外郎臣席瑗候選主事臣王瑋候選行人司司正臣陸燮分守直隷口北道山西布政使司㕘議臣徐炯分守河南開歸河三府管理驛鹽糧道按察使司僉事臣張孟球分守湖廣武昌道布政使司㕘議臣金祖誠分廵湖廣下荆南道按察使司僉事臣金秉掄直隷河間府知府臣宋師曽湖廣岳州府知府臣顧用霖浙江温州府知府臣陶範雲南楚雄府知府臣張嘉頴直隷真定府同知臣程侯本山東兖州府同知臣宋基業山西太原府同知臣趙友夔湖廣辰州府同知臣顧燇雲南雲南府同知臣何煜直隷廣平府通判臣朱維均陜西鳯翔府通判臣張宗日四川夔州府通判臣許炳新授廣東惠州府通判臣徐慎新授廣東韶州府通判臣張安國廣西太平府通判臣宋建業雲南永昌府通判臣韋士宏雲南琅井提舉司提舉臣沈鼐貴州大定州知州臣張介睂雲南雲州知州臣馬澂雲南大理府賔川州知州臣周鉞順天府武清縣知縣臣王原博直隷保定府博野縣知縣臣費洪學新授直隷順徳府鉅鹿縣知縣臣秦培山東濟南府鄒平縣知縣臣沈從隆山西太原府祁縣知縣臣姚馪山西平陽府太平縣知縣臣顧欽山西平陽府萬泉縣知縣臣戴治河南開封府西華縣知縣臣歸鴻河南彰徳府安陽縣知縣臣徐樹敏河南衞輝府淇縣知縣臣王珩河南河南府新安縣知縣臣錢汝駜河南河南府澠池縣知縣臣金竒玉浙江温州府平陽縣知縣臣王元位浙江温州府樂清縣知縣臣周鼎江西廣信府興安縣知縣臣陸彪江西贛州府興國縣知縣臣張尚瑗湖廣武昌府崇陽縣知縣臣高位湖廣襄陽府宜城縣知縣臣葉文昌陜西西安府醴泉縣知縣臣汪俊陜西平凉府崇信縣知縣臣董永朝陜西鞏昌府秦安縣知縣臣魏士升四川成都府新繁縣知縣臣王禮四川成都府徳陽縣知縣臣吴雙四川夔州府巫山縣知縣臣章鏡承廣東高州府東安縣知縣臣張沆廣東瓊州府瓊山縣知縣臣孫起範新授廣東肇慶府廣寧縣知縣臣鄭韻廣西栁州府上林縣知縣臣錢晉珏新掣陜西平凉府通判臣湯萬烺候補知縣臣史鳯霄候選知縣臣徐志培臣陸宸鎔侍衞臣汪蕭貴州貴陽府城守營遊擊臣宋振業等恭進萬夀盛典初集卷四十五
