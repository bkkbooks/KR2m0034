body:
  text: 欽定四庫全書萬壽盛典初集卷三十四恩賚六開科二順天府府尹臣屠沂等謹題為普天士子感沐皇仁仰祈代題恭謝天恩事據直𨽻各省舉人貢監生員李長庚陳大慶查克𢎞董俊等二百四十一人呈前事内稱欽惟我皇上徳侔天地功竝生成剛健文明集百王之道統雍熙仁壽開萬世之昌期作人冠於古今教澤深於雨露科名特設曠典欣逢十五省太平之化日盛月新億萬年壽考之科天長地久實熙朝之盛事極多士之殊榮俞㫖自天歡聲動地長庚等躬逢盛世幸列儒林聖壽無疆益切嵩呼之願皇恩似海長深華祝之私謹焚香頂祝叩謝天恩懇祈俯准輿情代逹宸聽等情到臣欽惟我皇上道協乾行徳符仁壽右文稽古重道崇儒俯鑒十五國之輿情特頒億萬年之曠典凡兹人士咸思奮志昌期即在臣工亦慶觀光文治從此作人之化如日方升永依壽考之君與天同運今據士子感激真誠恭請題謝天恩臣不敢壅於上聞為此恭疏代題伏乞睿鑒施行巡撫直𨽻等處地方管轄紫荆宻雲等關隘贊理軍務兼理糧餉都察院右副都御史世襲一等精竒尼哈番加九級臣趙𢎞燮謹題為萬壽無疆俞准開科普天慶祝恭謝天恩事據署理直𨽻守道事務巡道李成龍詳稱據保定等九府屬舉貢生監張嵩齡耿永年等呈稱欽惟我皇上聖敬日躋壽域天開文徳邁勲華登四海崇文之治道源接軒昊啟萬年有道之祥禄位名壽之徴獨超千古高厚悠久之盛合撰兩儀兹以來嵗三春恭遇六旬萬壽慶泰運之無疆萃人文而同慶特允十五省士子之請舉行鄉㑹兩科十里杏林花發預薦鹿鳴九秋桂子香飄還題雁塔毎遇十年𢎞開兩試自六旬以至億禩定為成規由畿輔以逹九州欣逢特典嵩齡等幸瞻化日仰慶遐齡願申三祝以抒誠先望九重而鳴謝伏祈轉逹俯賜代陳等情到道欽惟我皇上徳邁三皇四海樂無為之治化隆五帝萬年慶有道之禎彩溢瓊臺堯年益茂籌添海屋舜旦彌長今以五十二年恭際萬壽六旬之期特頒一嵗兩科之制臣工奉詔喜溢盈廷多士䝉庥歡呼動地將見峩峩髦士盡為盛世之楨藹藹吉人悉作聖朝之彥理合據情呈請代題等因到臣欽惟我皇上神姿天授聖徳日新重道崇儒屢廣科名之額闢門籲俊大開登進之途固已薄海沐甄陶咸仰堯天之浩蕩寰區䝉教育共瞻舜日之舒長矣兹以來歳五十二年恭逢皇上六旬萬壽俞允多士之請特開鄉㑹之科益徴久道之化成羣頌作人之壽考璿璣廣運人文佐壽域而俱昌玉燭常調奎壁拱㣲垣而彌燦普天同慶士庶騰懽兹據署守道事巡道李成龍詳請前來所有感激懽忭輿情臣不敢壅於上聞理合代題稱謝伏乞睿鑒施行奉天府府尹加一級臣李濤謹題爲皇仁浩蕩難名士子感戴無已籲請代題恭謝天恩事據奉天府九屬舉貢監生員唐廷儀鐵如金等呈稱欽惟我皇上統紹一中功高萬古聖德廣被沐大造之生成文教攸隆歌太平之歲月兹康熙五十二年特開萬壽恩科日月光華久覩闢門之典風雲遭際更瞻曠世之恩從此集禮樂於三千共見菁莪布化抑且紀春秋於八百欣㸔蓂莢呈祥儀等才慚雁塔志切鵬程綸綍自天喜常新之聖治歡呼動地頌永固之皇圖懇冀俯鑒輿情具題代達宸聽等情前來臣不敢壅於上聞理合具題伏乞皇上睿鑒施行巡撫浙江等處地方提督軍務兵部右侍郎兼都察院右副都御史帶理江寧巡撫印務臣王度昭謹題為聖壽萬年文治彌光於九有皇恩特沛科名益盛乎八埏懇詳華祝微忱題謝賔興異數事據江蘇布政使司布政使金世揚詳稱據江蘇等屬舉人貢監生員朱士履范仁沛等呈稱士履等欣逢盛世幸際昌期久道化成咸荷一人有慶闢門籲俊更瞻多士彚征兹惟康熙五十二年恭遇皇上六十萬壽升恒遐祉綿寳厯於無疆仁壽永貞握璿圖而建極祝聖久切躋堂之悃作人尤開壽考之科文星依御宿以増輝歌騰棫樸南極竝奎躔而永煥澤徧菁莪從兹憶萬斯年長慶英賢入彀名言莫罄感頌維殷伏乞轉詳代題以逹輿情等因到司據此該本司布政使金世揚看得文垂天象微垣騰奎壁之光化育人才吉士比鳯凰之羽欽惟我皇上至徳遐敷洪恩廣被時雍風動寰區久慶太平日升月恒來歳恭逢大壽當禎符之協應頒曠典以掄才登賢書而頌九如瑞凝閶闔奮雲程而歌十有喜溢蓬瀛定例永垂奕世丕顯相應據呈轉詳伏候代題等情到臣據此該臣㸔得瑶樞恒朗萃萬年篤祜之祥蕋榜重開啟奕禩得人之慶欽惟我皇上道隆千聖徳竝兩儀已治已安皥皥羣遊於舜日維仁維壽喁喁環舞乎堯天恭逢皇上六十萬壽之昌期欽奉俞㫖正誕加科之盛典禮闈選俊看花上苑而嵩呼鄉校拔尤握瑾計偕而封祝國楨倍植寳籙無疆宜乎多士之感頌聖恩籲請代題恭謝也兹據布政使金世揚詳報前來臣謹㑹同帶理總督印務江西撫臣郎廷極合詞代題伏乞皇上睿鑒施行巡撫安徽寧池太廬鳯滁和廣等處地方提督軍務都察院右副都御史加四級紀錄八次臣梁世勲謹題為聖主壽考作人多士欣逢曠典懇賜代題恭謝天恩事據安徽等十府州舉貢監生生員彭齡祝如山等呈稱我皇上心傳洙泗徳茂唐虞雨露沛於九重普天動華封之祝文教敷於四海多士賡天保之章恭遇五十二年之寳厯欣逢萬壽六十之昌期大沛洪恩特開鄉會兩科億萬斯年永為定例此誠亘古所未聞巍巍聖徳極盛難名縷縷輿情感深莫報謹連名具呈謝恩伏望轉逹宸聽等情到臣欽惟我皇上徳隆覆載化洽生成發賑蠲租無一夫不被聖澤崇儒重道俾多士咸沐殊恩恭逢萬壽之昌期特舉掄才之曠典十年増一試慶壽考之作人四海悉同文開萬年之景運仰荷皇恩之優渥羣欽帝徳之高深兹據士子籲懇代題謝恩臣不敢壅於上聞謹㑹同帶理江南江西總督印務江西撫臣郎廷極合詞具疏題逹伏乞皇上睿鑒施行巡撫浙江等處地方提督軍務兵部右侍郎兼都察院右副都御史臣王度昭謹題為普天仰聖壽之仁多士樂同文之治公籲詳題代陳謝悃事據浙江布政使司布政使徐欐詳稱據杭處等十一府各屬舉貢監生生員李庚星包芝豫等連名合詞呈稱竊惟人才培於百世文運開於萬年自古為難於今特盛康熙五十二年恭逢皇上六十萬壽特㫖開科通行直省四海仰作人之化八垓誦壽考之章士子舒睂臣鄰拜手庚星等躬䝉恩詔感激無涯懇請據情轉詳題謝等因由各府轉詳到司欽惟我皇上功參化育道協清寧盛世文風廣被東西南朔熙朝雅化逺邁虞夏商周兹康熙五十二年恭遇皇上六旬萬壽人文蔚起聖朝慶得英才海宇歡騰多士悉登雲路永彰太平之有象共祝國運於無疆兹據各士子籲請前來所當轉詳題謝等因到臣據此該臣看得三年取士本一代之𢎞文萬壽開科實千秋之特典恩覃士類慶溢儒林欽惟我皇上聖神文武博厚髙明五十一年之化澤旣周被乎兆民六旬萬壽之恩光又先施於多士厯逢癸巳特㫖開科試舉春秋通行直省國楨藉國本以長培奎曜附庚躔而竝燦宜多士感頌無疆而籲請題謝也兹據布政使徐欐詳報前來理合恭疏代題伏乞皇上睿鑒施行巡撫湖廣等處地方提督軍務都察院右副都御史加五級降一級又降二級留任臣劉殿衡謹題為聖壽同天地無疆人文與星雲竝煥羣沐作人盛化謹請恭謝天恩事據布政使司布政使李錫詳稱據武漢黄安徳荆襄鄖八府屬舉人貢監生生員蔣天柱孫昌運等呈稱伏惟貞元際㑹太和保合於九州道學昌明雅化昭垂於千古蓋上有仁壽之主則禮樂綿長下闢俊乂之門斯人文蔚起慶升恒之日月喜遭際於風雲康熙五十二年恭逢皇上六旬正誕繞萬歳之瓊枝共見峩峩髦士上千秋之金鑑欣看濟濟鵷班乃猶博採旁搜惟恐遺賢於草野崇儒重道必期登俊於廟廊爰開萬壽之科用著千秋之例由京畿以迄千八百國中外均霑自周甲而至億萬斯年天人叶應此真亘古難逢之盛典實聖世特沛之𢎞恩也柱等草茅下士樗櫟庸材聞綸綍之自天末由九叩惟歡呼之匝地願祝三多伏祈俯采輿情代請題逹等情到司欽惟我皇上功隆宇宙徳冠古今樂育菁莪久闢賢闗以籲俊栽培杞梓尤徴壽考之作人兹當康熙五十二年恭遇皇上六旬萬壽特允開科彚春華秋實以同登仰壽海福山而齊祝歡騰九有喜溢三湘理合據情呈詳伏乞俯賜代題等情呈詳到臣欽惟我皇上道洽三才恩敷九有功德邁百王而上文章集羣聖之成重道崇儒四海慶休明之治興賢造士普天沐化育之仁疊䝉廣額鴻慈久被右文雅化兹於康熙五十二年恭逢皇上六旬萬壽特下絲綸之命允開鄉㑹之科十載加行萬年為例斯真聖朝獨舉之曠典亘古未有之殊恩也從此作楨作幹永綿厯服於無疆為拜為颺長奉天顔之有喜兹據布政使李錫詳懇題謝前來臣敢不據實上聞謹㑹同督臣鄂海具疏代題恭謝天恩伏乞皇上睿鑒施行巡撫偏沅等處地方提督軍務兼理糧餉都察院右副都御史降三級留任臣潘宗洛謹題為聖主萬壽無疆人文千載竒遇恭謝徧錫隆恩謹請轉陳微悃事據湖南長靖等九府州屬舉人貢生監生生員李天柱沈鏞等呈稱伏惟金甌鞏固九紘祝聖壽無疆玉厯綿長萬國慶人文丕振漸仁摩義治以悠逺而化成説禮敦詩士因教養而蔚起固已菁莪竝育久見茅茹彚征兹康熙五十二年恭遇皇上萬壽正誕繞樞紫電瑞叶飛龍煥日長虹輝聯苞鳯迺因非常之慶得邀異數之加爰開鄉㑹兩科竝及中外各省碧桃浪煖快看鱣鮪飛騰丹桂風高疊見鵷鸞翀舉從此朝皆髦士抑亦野鮮遺賢冀北空羣賞在牝牡驪黄之外斗南拔萃收來楩楠杞梓之材秦中本是帝王都勿歎蒹葭霜露洛邑由來天地合羣歌鐘鼓辟雍鄒魯之芹藻長新鄘邶之榛苓不作五瀦學海湧萬斛之珠璣三峽詞源挾九天之風雨廬阜之精英欲降豫樹翻風錢塘之間氣重浮江潮吼月鯨波滄海寧餐火棗於蓬萊鳥道滇黔豈折露葵於空谷同人文於四海雲漢為章舉曠典於十年莊椿常茂柱等跧伏南隅心依北極自天渙號早知壽考作人匝地鳴歡樂附思皇多士但以輿情鼓舞難逹天閽伏乞繕疏敷陳獲通宸陛行見洞庭浩蕩永祈河清海晏之休衡嶽嵸嶐長慰華祝嵩呼之願矣等因到臣欽惟我皇上功超千聖徳邁百王恩膏久洽乎羣倫教育益深於多士軫念人才難得更令茅茹彚征欣逢康熙五十二年皇上萬壽正誕特開鄉㑹兩科自兹億萬斯年永為定例綸音徧布士氣奮揚將見人文蔚起齊祝聖壽之無疆俊乂咸登共贊皇圖之悠久兹據舉貢生監等呈請具題前來事關輿情感戴不敢壅於上聞臣謹㑹同督臣鄂海恭疏代謝聖恩伏乞皇上睿鑒施行巡撫江西等處地方兼理軍務都察院右副都御史加四級降一級臣郎廷極謹題為恭逢萬壽加科共慶千秋曠典公懇詳請特疏具題以謝浩蕩之皇恩以祝綿長之聖壽事據江西布政使司布政使傅澤淵詳稱據南昌等十三府屬舉人貢監生員萬物覩郭文正等呈稱欽惟皇上聖教𢎞敷天恩覃被千百國之人才蔚起億萬年之文運日隆兹惟康熙五十二年恭遇皇上六十萬壽瑞叶升恒祥徴清晏際此非常之慶特頒異數之恩爰於二月内開萬壽鄉科於八月内開萬壽㑹科嗣後毎遇十年皇上萬壽正誕即加一科億萬斯年永為定例物覩等忻遇太平盛典欲申感激微忱為此連名具呈公籲轉詳題逹庶使士子塗歌巷舞之誠上徹宸聽益見聖朝地厚天高之德徧愜輿情敬謝有加靡已之皇恩䖍祝悠久無疆之聖壽等因轉詳到臣欽惟我皇上學邃聖神心參化育治功廣運配行健以無疆德教遐敷體至誠而不息四海慶昇平之治蕩蕩巍巍三呼歌福祚之長熙熙皥皥日星雲漢天開炳蔚之華棫樸菁莪士際休明之盛兹康熙五十二年恭遇皇上六十萬壽惟天祐聖齊景福於升恒惟帝作人潤皇猷於黼黻俯俞羣願特沛殊恩俾一歳而竝行鄉㑹科均霑聖澤越十年而一舉億萬齡永作成模自此輿情鼓舞統八方九有而愛戴咸周聖厯綿延偕地久天長而文風遐播臣躬逢隆盛心切歡欣兹者臣所屬地方舉貢監生生員萬物覩等感聖徳之洪敷冀㣲忱之上逹沐恩如水與彭蠡以俱深戴徳如山偕廬峰而比重歡聲雷應千里皆同衆志葵傾三霄不逺懐文而至皆願瞻天子之光載筆而來惟咸祝聖人之壽兹據布政使傅澤淵詳請具題前來理合恭疏代題伏乞皇上睿鑒施行萬壽盛典初集卷三十四
