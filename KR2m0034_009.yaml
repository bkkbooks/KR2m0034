body:
  text: 欽定四庫全書萬夀盛典初集卷九典禮一朝賀一康熙五十二年三月初六日癸未禮臣以聖夀六旬正誕請於聖誕日升殿受朝賀上從之三月初六日禮部尚書臣赫碩色等謹題為恭逢仁夀昌期籲請舉行大典以迓神貺以慰輿情事欽惟我皇上冠百王而首出撫萬國以咸寧久道化成無逸作所敬天法祖朝乾夕惕者五十二年聖德神功慕義懷仁者千萬餘國用是蒼穹垂佑夀福兼隆考之前古孰能嫓美前於五十年欣逢泰運諸王大臣會同懇乞皇上升殿受賀新撰表文恭進嵗以為常等因具題蒙皇上俯念公疏奏陳情詞懇切如所請行輿情歡忭得遂微忱今恭逢聖主六旬大慶臣民尤深鼓舞中外更屬歡騰羣欲抒瞻雲就日之思效華祝嵩呼之盛愛戴頌祝倍勝於前查每遇萬夀聖節致祭太廟後殿真武廟東嶽廟城隍廟今嵗大慶非比常年除例祭外伏懇特遣大臣告祀天地太廟社稷祝文由翰林院撰擬其開列遣官恭設祀品等項太常寺照例備辦至十八日萬夀正誕伏乞皇上升太和殿受諸王貝勒內外臣工軍民耆老等拜表慶賀表文由內閣撰擬恭候命下遵行嗣後每遇十年著以為常用昭天祖神靈保佑申命之意並慰薄海內外尊親愛戴之誠則億萬年永享升平千百國長祝仁夀矣臣等謹拜首稽首無任踴躍歡忭之至為此謹題伏候敕旨初八日奉旨是十二日禮部尚書臣赫碩色等謹題為禮儀事恭照康熙五十二年三月十八日萬夀聖節行慶賀禮儀注是日早皇上鹵簿大駕於太和殿前照常陳設皇太后儀仗於寧夀門前陳設中和樂於簷下陳設丹陛樂於寧夀門外南牆下兩邊陳設和碩親王以下入八分公等內大臣侍衛及滿漢大學士等俱穿朝服於景運門外齊集禮部堂官以行禮時已至奏請皇上具禮服升輦禮部堂官前導由景運門出王等以下入八分公等內大臣侍衛及滿漢大學士等隨至皇太后宫西角門皇上降輦至寧夀門皇上於寧夀門丹陛上東旁立王等以下公以上在寧夀門外丹陛下立大臣侍衛等在儀仗末兩旁立其未入八分公等文武各大臣官員在午門外排立鳴贊官在寧夀門丹陛上側身立禮部堂官説與太監轉奏請皇太后升座位皇太后出宫作樂升寧夀宫座位後皇上於寧夀門中間檻外正中立王等以下公以上於寧夀門外丹陛下兩旁分翼排立大臣侍衛等在儀仗末兩旁排立聽鳴贊官贊行三跪九叩頭禮其未入八分公等文武各大臣官員在午門外亦同隨行禮此行禮時作樂監察御史在寧夀門外丹陛下一處儀仗末一處午門外一處視儀鳴贊官贊禮畢皇上回原立處立禮部堂官説與太監轉奏請皇太后還宫作樂皇太后還宫後皇上還宫皇上還宫後衆皇子在月臺上空角路兩旁排立行三跪九叩頭禮禮畢禮部堂官奏請皇上升中和殿內大臣侍衛內閣翰林院詹事府禮部都察院鴻臚寺官員引進不贊行三跪九叩頭禮禮畢皇上升太和殿座位內鑾儀衛鳴贊官贊鳴鞭鳴鞭三下聽鳴贊官贊王公等率文武大臣官員進表行禮行禮時作樂禮畢內鑾儀衛鳴贊官贊鳴鞭鳴鞭三下皇上還宫作樂還宫後王公大臣官員各散謹具奏聞禮部儀制司為禮儀事恭照康熙五十二年三月十八日萬夀聖節皇上升太和殿受諸王大臣文武官員進表行慶賀禮所有儀注并一應事宜相應知會各衙門可也一咨都察院太和殿行禮時差監察御史照例視儀外皇太后行禮時亦差監察御史於寧夀門外丹陛下一處儀仗末一處午門外一處視儀一咨武備院於行禮處預備坐褥一劄順天府府丞傳示進表行禮生員於十八日在午門外齊集聽鴻臚寺官指引行禮一咨都察院轉行五城傳示進表行禮民人於十八日早在午門外齊集聽鴻臚寺官指引行禮一咨內務府預備行禮處鋪設棕毯一劄欽天監行禮預備時辰香一付祠祭司行禮備樂一劄鴻臚寺知會行禮儀注并午門外行禮士民兵丁另行差官引禮一咨詹事府知會行禮儀注一咨翰林院知會行禮儀注一咨內大臣知會行禮儀注一咨護軍統領知會行禮儀注一咨上駟院知會行禮儀注一咨內鑾儀衛知會行禮儀注一行內閣典籍廳知會行禮儀注一行禮科知會行禮儀注先是二月二十九日禮部尚書臣赫碩色等謹奏為請旨事每年三月十八日恭逢萬夀令節王以下文武大臣官員俱七日穿朝服往暢春園穿蟒袍補服但今嵗恭逢皇上六旬萬夀大慶非尋常可比相應自三月初一日起至月終止穿朝服蟒袍補服嗣後每遇十年照此例舉行一次為此謹奏請旨本日奉旨著自初一日起穿至二十日十一日戊子上以直省臣民耆老來京慶祝萬夀者人數衆多詔禮臣於朝賀日指引行禮十一日大學士傳上諭各省紳士耆民為祝萬夀來京者甚衆恐禮部臨期想不到爾等即預為傳知廢官舉人貢監生生員耆老百姓於午門端門外一路指引行禮之處倘行禮少有參差不齊不必苛求禮部謹奏為請旨事今嵗恭逢聖主六旬大慶各省紳襟士庶耆老并在京舉貢生監耆老兵民等歡忭鼓舞均欲大慶行禮者不可勝數若不預行指與伊等行禮處恐參差不一相應於十八日令在午門前儀仗末行禮人多分在端門外行禮再多復分在天安門外行禮酌量派臣部官鴻臚寺官指引行禮可也為此謹奏十五日壬辰詔復因公詿誤諸臣李録豫等職令於萬夀日隨班行禮十二日上諭大學士九卿云頃傳諭旨內有一事未曾言及今嵗來京年老之人甚多此內除本身特犯私罪外或有因公詿誤降級革職者酌量復還似應於十八日令其隨班行禮大學士九卿等會同會議即行奏聞十五日大學士九卿等具摺奏覆詳第二十六卷加恩耆舊中十六日癸巳詔復八旗因公詿誤諸臣阿山等職令於萬夀日隨班行禮十五日上諭大學士九卿云漢官內年逾六十者俱已查明施恩滿洲蒙古漢軍官員亦照此例查奏本日大學士九卿等具摺奏覆詳第二十六卷加恩耆舊中十八日乙未黎明上詣寧夀宫朝皇太后禮畢還宫隨御太和殿升座王以下文武官員進表慶賀致仕及給還原品官隨班行禮其餘耆老軍民俱於午門外列至大清門外行禮慶賀是日黎明鑾儀衛官預陳皇上鹵簿儀仗於太和殿前陳步輦於太和門外陳大駕於午門外陳馴象於大駕之南陳仗馬於丹墀中道之左右俱東西相向教坊司設中和韶樂於太和殿簷下之東西設丹陛樂於太和門內北向禮部官設黃案於太和殿東簷下諸王貝勒貝子公等俱朝服齊集太和門未入八分公以下文武百官俱朝服齊集午門外禮部官捧諸王大臣所進萬夀賀表由午門東旁門入至太和殿前置黃案上鴻臚寺官引諸王貝勒貝子公等於太和殿前丹陛上立引文武百官由東西兩掖門入至太和殿前丹墀內分翼排立引朝鮮等使臣由西掖門入立於西班之末紏儀御史二員於殿前西簷下東向立又四員於丹陛上立又四員於丹墀內立俱東西相向又八員於東西班末立鴻臚寺鳴贊官四員於殿簷下立又四員於丹陛上立又四員於丹墀內立俱東西相向又指引紳襟耆老兵民行禮官自午門至大清門各處分立鑾儀衛鳴鞭官於丹陛南三層階之西每層各二員俱東向立班行既定欽天監官至乾清門報時禮部鴻臚寺堂官奏請皇上升殿上具禮服出宫御中和殿升座內大臣侍衛內閣翰林院禮部都察院詹事府鴻臚寺執事各官於殿前排班行三跪九叩頭禮畢駕興午門鳴鐘鼓中和韶樂作奏乾平之章曰二儀清寧三辰順則維帝凝命函冒區域仁恩廣覃至於動植久道化成隆功駿德聖人多夀年世萬億上御太和殿升座樂止鑾儀衛官贊鳴鞭丹墀內三鳴鞭鳴贊官贊排班內外諸王率文武百官及紳襟耆老兵民人等各就拜位立贊進贊跪王以下各官俱跪贊宣表宣讀官從案上捧表詣殿簷下御道之中北向跪宣畢表文載後丹陛大樂作奏慶平之章曰皇覆萬宇品物咸亨九賔在列百譯輸誠濟濟卿士式造在庭帝仁如天帝明如日親賢任能愛民育物禮備樂成聲教四訖鳴贊官贊跪叩頭王以下各官行三跪九叩頭禮此行禮時紳襟耆老兵民人等亦隨行禮禮畢樂止贊退王以下各官俱復原班立鳴贊官贊排班鴻臚寺官引朝鮮等國使臣以次就拜位立贊進贊跪叩頭行三跪九叩頭禮丹陛大樂作奏治平之章曰天盡所覆以畀我清我德配命涵濡羣生萬國蹈舞來享來庭俁俁蹲蹲視彼干戚天威式臨其儀不忒禮畢樂止贊退各復原班立鑾儀衛官贊鳴鞭丹墀內三鳴鞭駕興中和韶樂作奏太平之章曰鑒觀惟德丕命維皇肇兹夀域薄海要荒物性茂育民俗樂康冠帶之國望斗辨方曰惟萬年同於昊蒼皇上回宫樂止王以下各官以次出是日皇子分封者同諸王大臣進表行禮未分封者率皇孫在乾清宫行禮外省入覲之督撫提鎮卓異來京之文武各官及致仕給還原品官員各照品級附於班末直省紳襟耆老兵民人等自午門直至大清門摩肩接踵遙望殿廷叩拜而退臣考周制天子之朝羣臣有四曰外朝曰中門曰內朝曰詢事諸侯之來朝亦有四春曰朝夏曰宗秋曰覲冬曰遇若夫朝賀之制起於漢初長樂宫成諸侯王以下至吏六百石以上以次奉賀後漢惟嵗首正月大朝受賀又以冬至陽氣起君道長受賀至降誕之辰未有以朝賀聞者蓋功德未底於極隆制作未臻於大備遂令此典闕如莫光史册即或間有節名舉行慶賀亦不過內庭奉觴上夀百官稽首舞蹈而己從未有薄海內外臣民耆老齊赴闕廷嵩呼華祝如今日者也欽惟皇上德盛化神禮明樂備耿光大烈丕冒出日之鄉仁漸義摩逺及無雷之國固己東鶼西鰈來享來王航海梯山極於無外矣今恭逢聖夀六旬集萬國之衣冠肅千官之劍佩曙光才動曉日方升零露霑濡惠風和暢宫扇團圞之影御爐縹眇之煙奏韶樂於彤墀列鵷行於玉陛千旗雲擁萬嵗山呼一人穆穆以當陽百爾雍雍而上夀蓋自王公大臣而下至班聨寮寀之餘有中外藩封入覲稱賀者若蒙古朝鮮諸臣是也有世受殊恩拜舞彤廷者若衍聖公諸臣是也有職任封疆慶祝來京者若督撫提鎮諸臣是也有適逢引見之期得與拜稽之列者若直省卓異文武諸臣是也有己遂初服重覲天顔者若致仕在籍諸臣是也有幸蒙恩宥復厠清班者若復職諸臣是也若夫直省耆老當祝哽祝噎之年僅知田里桑麻之樂乃黃髮鮐背扶杖觀光罄折傴僂歡呼動地他如士農工賈為類不齊或來學校或自田疇或出市廛或由工肆仰瞻天日匐伏闕廷莫不睂飛色舞自以幸際昌期獲觀盛典猗歟休哉東西南朔不合而同貴賤賢愚不期而至合萬國之歡心成一朝之典禮所謂聖人出則日月記其初王澤深則風俗傳其後載榮史册其在斯乎臣等忝列班行獲隨忭舞猥慙葑菲莫罄揄揚惟紀一時之盛以補千古朝會之所未有云爾至於朝賀諸臣自常朝王公及現任文武官員不備書外其詣闕祝夀臣民備載於後慶賀表文亦附見焉萬夀盛典初集卷九
