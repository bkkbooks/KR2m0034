body:
  text: 欽定四庫全書萬壽盛典初集卷九十九歌頌三十九蒙養齋諸臣萬壽無疆詩七言律三首翰林院庶吉士臣何國宗運協中天景祚昌萬方玉帛拱當陽車書一統仁風合花甲重新化日長雲燦金階舒睿藻霞輝銀漢麗宸章微臣世沐恩綸渥願借蓬壺作壽觴其一聖節天開淑景融五雲擁出日曈曨九重宫闕煙霞滿萬里江山雨露同政洽升平歌帝力民登熙皥識皇風時和物阜人心樂共仰甄陶造化功其二經緯宸衷本燦然敕幾清晏倍精研胸羅日月綜三極手運璇璣自一天律呂音聲由耳順圖書祕奧得心傳聖朝厯數超千古鞏固金甌億萬年其三萬壽詩五言排律二首中書舍人臣陳厚耀宸翰輝煌揭天章雲漢同作歌符帝世陳典軼皇風灑墨繁星燦揮毫曉霧空鍾王添後徑顔栁奪前功天縱兼遊藝多能信亶聰莫窺淵海富百氏盡朝宗其一鼎運逢昌熾坤輿載悅康虹流昭帝瑞電繞發天祥白雉通鞮譯黃支𨽻職方皇年天並永聖祚日俱長政教風雷合恩膏雨露香嵩呼朝北極萬歲祝君王其二萬壽詩五言排律二首監生臣梅玨成四海歡心合三春麗日舒堯階垂緑桞靈沼躍丹魚底績河平候敷文甲偃餘化成欣久道風動識皇初聖節開宸宴嵩呼徹玉除共球同萬國拜舞奉龍輿其一智勇由天錫精微學問殊圖書綜四聖詞賦軼三都寶翰光奎壁宸章焕典謨璇璣周象緯道器溯根株健順乾坤運知能易簡敷仁風彌六合華祝遍寰區其二萬壽詩七言律三首舉人臣何國棟聖朝膏澤被蒿萊擊壤謳吟振八垓白叟歡呼攜杖至黃童踴躍踏歌來桃源日暖秧旗插桞陌風和社鼓催千古升平今日會熙熙皥皥樂春臺其一闢門籲俊厪宸衷文運𢎞開曠典隆佳士翩翩咸就日英髦濟濟盡呼嵩沈鱗起躍桃花浪奮翮高鶱桂子風壽考作人真雅化無疆寶祚與天同其二三春淑氣轉青陽爛漫宫花五色光闕下衣冠齊獻瑞苑中麟鳳共呈祥香飄玉殿千秋節酒泛瑶池萬歲觴聖厯綿綿天地永堯年舜日正舒長其三萬壽詩有總序生員臣潘蘊洪臣聞至仁御宇合壽國夀民以壽身大德乘時統得位得名而得夀是以三皇厯算各垂綿衍之春秋五帝享年共卜期頤之甲子貞恆紀於周易久道化成欽允載於虞書時雍光被禎符效順名上應夫璇圖福履恆綏祚逺延乎苞厯溯竹書而遼逺啓金匱以輝煌自昔攸隆於兹為盛欽惟皇帝陛下道洽生成功𢎞位育履仁蹈義備聖神文武之全膺籙握圖際元會運世之盛風雲從而萬物覩德業配乎乾坤雨露滋而六位成高厚同於天地繞電流虹而後早占有道之光華榮河溢洛以來載紀無疆之寶厯固已至誠之徴悠且久氣轉洪鈞中天之日舒以長祥開夀域矣兹屆御極之五十有二年闓澤覃敷湛恩汪濊民安物阜景運日進乎熾昌邁五登三至治益臻乎渾噩諸福可致之物奚啻東鰈西鰜太平有象之徴不數江茅鄗黍禎祥屢至德契三才瑞應頻臻化彌六合廣矣大矣皇哉唐哉時則令在青陽月軌蒼陸雲開華景當風暄日麗之辰聖際昌期正地久天長之節年周花甲八方瞻南極之輝壽並椿齡三月應西池之瑞紫氣高迎仙掌鳳閣風微紅雲近接爐煙螭坳日暖開九天之閶闔集合殿之衣冠千官既蹌濟以朝天萬姓亦歌呼而動地樓前陳舜樂鶯歌燕舞共揚和風陌上進堯樽瑞麥嘉禾咸符泰運臣蘊洪等微埃浥露小草傾暉伏遇召試於丹墀尚方給札比蒙引見於紫禁光祿傳餐恭聆天語之煌煌重沐皇仁之蕩蕩步履蓬山之禁地身霑滄海之恩波自顧何人得邀異數躬逢盛事敢謝蕪言竭一念之愚誠奉揚駢祉賦七言之近體恭紀鴻庥用申天保九如敬效華封三祝忘其分卑才下冒塵乙夜之觀期於述德達情竊展萬齡之願由此年年張樂與物皆春歲歲稱觥後天不老常仰天顔之有喜日繞龍鱗永祝聖夀之長生籌添鶴算謹拜手稽首而獻詩曰青陽淑氣轉洪鈞正值蓬萊獻夀辰瑞結彤雲環杏苑香凝紫霧護楓宸蒼龍闕下堯樽滿丹鳳樓前舜樂陳億萬斯年綿寶厯聖恩長共物華新其一仙桃爛漫醉春光此日瑶池會正長率土共聞三夏奏普天齊上萬年觴歡聲喜氣盈庭際鼓腹含哺滿道傍願得河山同聖夀微臣歲歲侍君王其二貢生臣沈承烈春晴蘭殿日華鮮甲子初周聖夀綿緑野歡聲傳擊壤彤墀喜氣叶鈞天蟠桃結實陳雙闕仙李蟠根歷萬年滿捧瑶觴齊拜舞鴻休已備九如篇其一運協中天寶厯昌昭回率土被雲章西山霞氣縈長樂南極星光照未央鑿齒雕題羅貢獻青麟赤雀效嘉祥歡呼同進三多祝遙指山河壽共長其二監生臣朱嵩南極輝騰北極高日華初照衮龍袍上林暖氣熏紅杏禁苑春光醉碧桃漢殿神芝生玉砌虞廷仙樂奏雲璈新來仰覩天顔喜五彩堯眉出壽毫其一升平玉燭萬年枝喜遇瑶池上夀時爛漫仙桃開紫禁曈曨旭日映丹墀九圍共效華封祝八表齊賡天保詩慚愧草茅何以獻願將海水注金巵其二貢生臣馮壡海日初高瑞靄新朝宗玉帛拱居辰中天雨露時時足萬里農桑處處春齊祝享年同海岱更宜申祐福民人無疆聖厯從兹始願共莊生紀大椿其一紫氣紅雲滿鳳城雍容雅樂奏升平曾趨上苑霑天寵更飽官厨荷聖情南極老人揚夀彩西池王母祝長生微臣感激慚無報歡聼嵩呼萬歲聲其二舉人臣葉長揚淑景花明紫禁香千官齊進九如章無疆聖夀看山色有喜天顔就日光受祿只今超五帝卜年從此過三王小臣忝學箕疇算不盡皇圖寶厯長其一聖人敷政與天同耳順精神達四聰日月有光常煜爚乾坤無物不帡幪斂將五福歸臣庶祝得三多報德功願萬萬年君有慶嵩呼嶽拜百花風其二童生臣王元正帝德難名帝治昌五麟七鳯正呈祥巍巍蕩蕩乾坤大歲歲年年日月長愷澤已看周近服深仁更復遍遐荒太平天子當陽久保佑申重契昊蒼其一六十年來宵旰勤民間幽隱悉知聞瑶池日暖恩波濶瓊島春深花氣芬電繞虹流當景運黃童皓叟亦歡欣小臣幸際唐虞世地久天長祝聖君其二監生臣陳世明建章鐘漏曉初傳玊帛衣冠儼列仙金掌雲中凝瑞露御爐花外靄祥煙春桃正值三千歲聖夀方當六十年四海歡騰同此日齊呼萬歲祝堯天其一和風霽日滿仙衢萬國朝天樂有餘壽獻南山當輦道星環北斗拱宸居雲霞色映蓬萊近劍珮聲同嶽牧俱共喜千年符寶厯瑶芝瑞莢吐階除其二萬壽詩七言律八首有序監生臣王羾臣聞至治法天必慶齊天之壽𢎞休炳日羣懷望日之誠舜逢甲子之周方膺寶厯堯當癸巳之歲共祝華封蓋久道化成並山河而永固泰階慶集同覆載以無疆欽惟皇上德懋日躋功高光被和剛柔於三德奏歌敘於九功運聖神文武之能八紘風動立睿智聰明之極九有時雍道契精微會一貫三才而出治學綜今古通五車四庫以成章仁孝著於璇宫遠邁問安視膳友愛孚於紫禁更逾胙土分茅勤宵旰於萬幾璣樞獨攬寄股肱於三事賢俊畢登潔簠簋以薦馨香明禋必肅升爼豆而崇理學儒教宏開聖武昭宣畿甸要荒四海烽煙永息皇仁周浹東西南北萬方玉帛來同覲嶽省方時切已溺已飢之念蠲租肆眚彌深如傷如保之懷搜博學於儒林咸登虎觀採微長於藝苑供奉螭坳造士特開萬夀之科每十年而必舉愛民普發太倉之粟不半月而頻頒海晏河清大澤之彌綸莫極禮明樂備至治之美利無涯允矣巍巍獨盛遐哉蕩蕩難名兹者時屆三春人欣萬夀花鳴閬苑好供千歲之桃鶯囀上林宛和長生之曲瞻星輝於南極珮列千行看仙降於西池香聞百里臣羾蒲葵弱植蟣虱微生技乏占星幸仰龍光於九重天上學慚測景欣蒙帝詢於五色雲中兹效嵩呼敬申華祝伏願調歲功於悠久皇圖常固萬年膺厯數之綿長聖祚永昌千祀謹拜手稽首而獻詩曰八埏浩蕩布陽和聖壽千官響玉珂當午堯天開景慶方中舜日照山河仙門春動花能笑重譯人來海不波草莽幸隨鵷鷺後揚塵拜舞祝三多其一首出乘乾仰聖神車書一統靜煙塵兩階文舞三苗格五瑞羣朝四嶽巡風暖交河虛飲馬花明芳甸見遊麟今朝夀域同登日薄海同歡皥皥民其二天亶聰明不可量萬幾餘暇試鉛黃縹緗夜映金蓮燭翰墨朝浮玉几香韻轉珠璣登雅頌箋飛雲露紹羲皇傳來中外騰榮彩拱璧長增日月光其三心源精一自唐虞贊述經書闡聖謨契合天人還嗜學廓清黃老特崇儒樂翻韶濩臯夔遜數究圖書𨽻首愚文運化成開至治蕩平千祀邁三途其四年豐物豫慶桑麻蠲賑頻仍厚澤加頒出天庾同雨粟收來地寶等量沙煙炊玉粒農家飯苔沒蒲鞭漢吏衙黎首被恩惟禱祝萬年夀算正無涯其五貢舉𢎞開金榜題旁求俊彥拔塗泥紫芝幽谷來蒲轂丹桂仙宫與玉梯騏驥連鑣天廏舞鸞凰接翼上林栖羣才此日岡陵頌應與賡歌喜起齊其六三吳聖眷荷偏深問俗頻邀玉輦臨草木添榮霑雨露山川增色被歌吟福星帝簡隆司牧卿月人多備作霖一介草茅私感激惟懷芹曝獻丹心其七纍世榮施寵遇殊光天幬庇愧微軀全家半食皇朝祿台鼎分參紫極樞恩去夏臣嫡叔祖臣掞擢文淵閣大學士刻楮也邀天一笑傾葵竊效嶽三呼生逢盛世顓愚奮萬祀千秋遠聖圖其八萬壽頌演連珠九首有序貢生臣徐覺民臣聞聖人出則日月紀其祥王者生則天地呈其應故詩稱百祿八方瞻有道之光書祝萬年四海慶無疆之厯降西池之王母曾言桃實三千志南楚之莊生早識椿齡八百民知順則野聞耕鑿之謡治進雍熙朝有賡揚之頌千百國車書丕集億萬載景運方新先後同揆古今不異欽惟皇帝陛下聰明睿智文武聖神法四序以平分運陰陽而不息位兩儀以立極體覆載之無私治洽唐虞接精微之統緒學宗孔孟紹洙泗之淵源雲漢天章點畫燦龍鳯之筆日星翰墨歌詩聽金石之聲三年而各省齊蠲南北東西萬室羔羊共慶一歲而四闈兼試春秋冬夏中原麟鳯咸遊豐功紀河漢江淮允矣經天而緯地盛德遍照臨霜露大哉武烈而文謨世際昌期開八荒於壽域祥呈禹服躋兆姓於春臺恭逢聖夀六旬正是陽春三月東皇司令淑氣乘時南極呈祥榮光映漢千官濟濟羣瞻北闕之星萬國攘攘共獻南山之酒士民愛戴嶽牧歡欣臣世受國恩身叨異數管窺蠡測敢言厯算之微長尺線寸材遂沐生成之大德竊比九如之祝敬陳萬壽之辭臣聞多福多男史有華封之祝如松如柏詩陳天保之章是以乾坤呈其瑞應雲物驗其禎祥海嶽來朝稱景命者曰一人有慶岡陵致禱荷神庥者曰萬福無疆其一臣聞聖人有道端政教於北辰帝治無為運璣衡於南面是以王風暢而玉燭常調至德隆而金甌永奠八表慶時熙之象過化存神萬民安樂利之天衢歌巷諺其二臣聞瑞呈甘露廣要道者必格乎天草長祥蒲備大德者更徴乎地是以處深宫而愛敬無違闢寢門而晨昏不二以天下養聖人之至行維昭為四海型萬國之歡心共遂其三臣聞羲畫初開萬古之圖書肇啓堯文聿煥千秋之制作爰興是以聖既本乎天縱學自見其多能集條理之始終金聲玉振煥文章之璀璨霞蔚雲蒸其四臣聞六師致討弭兵者不能無兵九伐正邦用武者必先止武是以三蘖靖而牛馬胥歸兩階陳而羽干並舞海島玉塞凛王法之威嚴沙漠滇黔頌皇恩之公普其五臣聞虞廷欽恤象典有五等之刑漢室蠲苛立法奉三章之約是以寬而不弛威而不虐夏后之車屢下日暖圜扉湯王之網頻開星沉貫索其六臣聞頌紀周詩百室有盈寧之樂書陳禹貢千年瞻底定之功是以皇謨獨運睿慮恆周籌黎庶之農桑蠲者蠲而賜者賜息波濤於南北濬者濬而修者修其七臣聞易象茅茹見彚征於交泰詩歌棫朴頌夀考之作人是以羣英之栽培共遂朝廷之化育常新文武全昌鳯翽與鷹揚競奮春秋四試鹿鳴偕雁塔同登其八臣聞執中之法萬古仰道統之傳洪範之疇千載遡聖王之治是以陳書講藝重道崇儒念切修明學必宗乎鄒魯功兼述作理獨契乎程朱其九萬壽詩五言律四首監生臣博爾和為頌聖人夀賡歌萬國同普天瞻麗日大地暢條風氣近西山紫雲連北闕紅羣生霑化育咸在太和中其一帝德隆今古車書四海同祥光生黼座仙酒晏春風上苑桞舒緑瑶階花映紅稱觴當此日喜氣遍寰中其二聖主無疆夀惟天乃可同九重施化雨八表被仁風瑶草承春緑琪花向日紅抒誠齊獻祝遙拜五雲中其三重譯梯航至歡呼萬里同惟兹孺慕意益見聖慈風樂奏鈞天盛霞凝仙仗紅小臣榮幸甚拜舞百官中其四舉人臣穆成格禹甸山河壯虞廷玉帛將一人真有道萬夀慶無疆蓂莢香三月冠裳集四方誰言山海逺此日共梯航其一龍旗輝曉日鳳管叶鈞天鵠立千官侍鳬趨百職宣獻來金是鑑撤去燭成蓮共快瞻天近歸擕滿袖煙其二羣黎欣化日聖主鼓薰風大有頻年慶輕徭是處同賜酺真額外恩賚且宫中厚澤淪肌髓含哺頌帝功其三盛代崇文治熙朝愛士深杏花紅照騎桞色緑霑襟天上星辰燦人間沆瀣斟小臣叨世澤拜手罄葵忱其四監生臣穆世泰暘雨欣時若春和化日長一人宜景福萬象自輝光雲物天開瑞岡陵地獻祥永言綿厯算大德夀無疆其一賡歌盈帝里佳氣遍皇州不盡山川色無窮天地流萬年開寶厯五福衍箕疇海屋多瑶算初添第一籌其二聖德齊天地山川共效靈榮光瞻黼座春酒介嵩齡象舞陳丹陛韶音奏大廷八方同獻祝萬載樂淸寧其三盈廷稱萬夀拜手頌無疆北闕清光近南山紫氣長瑞凝芝草秀花發玉階香歲歲逢華祝承恩正未央其四監生臣佘掄萬國慶咸寧遐哉帝德𢎞瞻雲欣共覩就日喜同登香氣衣冠襲歌聲輦轂騰頌揚情未巳拜手祝升恆其一春光綿寶厯聖夀正無疆禹甸和風暖堯天化日長宫桃初綻蘂御桞早含芳抃舞丹墀下賡歌樂未央其二帝德乾坤永歡聲遍九州恩綸常播遠惠澤每旁流桃熟三千歲椿榮萬六秋臣民同獻祝海嶽作觥籌其三紫微光北極景運啓東皇德共乾坤大壽同天地長九重端衮冕萬國盡梯航拜舞彤廷下嵩呼祝聖王其四萬夀盛典初集卷九十九
