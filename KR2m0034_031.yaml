body:
  text: 欽定四庫全書萬夀盛典初集卷三十一恩賚五蠲賦三巡撫山東等處地方督理營田兼理軍務都察院右副都御史加四級臣蔣陳錫謹題為皇恩溥博如天萬姓歡呼動地籲請代題恭謝天恩事據濟兖東青萊登六府紳襟里民戴璠等呈稱欽惟我皇上文德武功際天蟠地車書一統萬方臻樂利之休聲教旁敷率土慶升平之象七政齊而三靈協瑞四時順而百榖豐登固已擊壤歌衢羣遊熙皡矣我皇上念切民依頻加軫恤復將天下錢糧三年之內輪蠲一周兹奉聖㫖東省五十二年地丁俱著全免歷年舊缺亦俱免徵灑十行之綸綍萬歲山呼蠲億萬之金錢歡聲雷動況山左為齊魯之邦與畿輔最近二東草木屢被恩膏十二河山咸霑解澤從此淳風益茂永享河清海晏之休年嵗屢豐常見婦饁夫耕之樂惟有焚香叩首祝聖夀於無疆鼓腹含哺慶洪圖之克鞏兹因九重萬里輿情不能上達懇請代謝等情到臣欽惟我皇上德合乾坤道隆堯舜深仁厚澤長養生息者億萬年賜復蠲租食德飲和者千百國當兹雨暘時若猶懷四海之憂勤值此家室盈寧彌軫一夫之疾苦特命將天下地丁錢糧自五十年為始各省輪蠲兹奉上諭東省五十二年地丁俱著全免歷年舊缺亦並著免徵統計三年之內總免過天下地畝人丁新徵舊缺共銀三千二百六萬四千六百九十七兩有竒皇恩似海大地咸周帝澤如天無人不被佇見物無失所羣遊化日之中民不能名共躋春臺之上臣准部咨即刋刻告示通行曉諭山陬海澨處處霑恩白叟黃童人人戴德莫不扶鳩嵩祝感天髙地厚之仁盥手焚香切就日瞻雲之願咸頌天子無疆之夀直與天齊聖人有道之期永同山峙兹據合省紳襟里民紛紛環繞臣署籲懇題謝理合具題恭謝天恩伏祈皇上睿鑒施行巡撫山西太原等處地方提督鴈門等關軍務兼理雲鎮都察院右副都御史加四級臣蘇克濟謹題為租賦屢蠲恩波普被懇祈代達輿情恭謝皇恩事據山西闔省陽曲等九十七州縣并各衛所紳襟里民劉璋等呈稱皇上御極以來文教振興武功赫濯勤稼穡則時厪雨暘重農桑則圖成耕織五十年太平天子樂海晏而慶河清億萬載有道聖人沐春風而霑化雨固己飲和食德登四海於春臺抑且戴義履仁偕萬姓於夀域矣乃猶軫念深山窮谷無傷若覺有傷因而深思夏稅秋糧一免且加再免次嵗新租槩行全豁歷年舊缺亦著免徵歡騰海宇扶杖而觀者皓首龎睂喜溢郊圻鼓腹而歌者黃童稚子誠哉舜日重遊允矣堯天再覩璋等躬逢盛世久沐宏仁效華祝而爭先學箕疇而恐後但九重既逺莫聞嵩嶽之呼使衆志徒殷難達康衢之頌伏祈俯念輿情代達帝座恭謝皇恩等情到臣欽惟我皇上惠政覃敷四海戴汪洋之澤仁風廣布萬方霑浩蕩之波賑恤之典頻頒蠲租之詔屢下三晉人民從前屢沐皇仁兹又䝉綸音特沛將康熙五十一年應徵地丁銀全免並歷年舊缺亦著免徵民既不困於輸將吏得專心於撫字終年休息比户盈寧此真髙天厚地之生成抑亦從古及今之曠典也臣接准部咨當即欽遵通行頒示曉諭凡兹軍民人等無不歡呼雷動焚香叩首齊祝聖夀無疆今據通省各屬紳襟里民呈請代題恭謝天恩前來理合據實上聞伏乞皇上睿鑒施行巡撫河南等處地方提督軍務兼理河道兵部右侍郎都察院右副都御史加五級臣鹿祐謹題為聖恩浩蕩難名萬姓銜感至切謹抒輿情恭疏代題叩謝天恩事據河南通省紳襟里民宋犖等呈稱竊惟皇上德配勳華功隆參贊伏自御極以來宵衣旰食躬理萬幾薄賦省刑心勤四海固已率土懷恩普天同慶矣犖等生長中州與畿輔接壤聖主加意撫綏日享升平之福時䝉怙冒之仁今特沛恩綸將河南省康熙五十一年應徵地丁錢糧除漕項外通行免徵跪誦上諭感激無涯凡窮鄉僻壤童叟婦女莫不歡忭拜舞遙叩九重頂祝聖躬享無疆夀考皇圖歷億萬斯年伏乞俯賜代題叩謝天恩到臣欽惟我皇上巍巍至德蕩蕩神功物阜民康猶存已溺己饑之願損上益下彌𢎞與聚勿施之仁今將天下錢糧數千餘萬三年之內全免一周大哉皇恩真曠古所未逢史冊所罕覯者也茲豫省康熙五十一年地丁錢糧欽奉上諭盡行蠲免臣准部咨隨即刋刻告示通行曉諭頒示之日老幼擁觀望闕叩頭環繞臣署咸稱臣等幸生聖人之世得為聖人之氓疊荷殊恩無可報答惟有家家焚香拜祝聖夀無疆皇圖永固但下情無由上達懇請代題恭謝天恩前來臣不敢壅於上聞理合恭疏題報伏乞睿鑒施行巡撫江西等處地方兼理軍務都察院右副都御史加四級臣佟國勷謹題為皇恩均霑於萬國輿頌更切於西江公叩代題以伸謝悃事據闔省鄉紳士庶宋一瑞等呈稱欽惟皇上仁同天地德邁唐虞饑溺為心惟恐一夫不獲痌瘝在念真令萬物皆春甘雨和風久慶雨暘之時若丁男紅女已看耕織之成圖而且賜復蠲租大地咸霑雨露停徵減賦何年不沛絲綸更䝉軫念民生𢎞施聖澤周一十五省之疆域免數千百萬之金錢宸眷及於大江以西皇恩真自九天而下潯陽江畔人人重上春臺章貢城邊處處盡登樂土含哺鼓腹覺至德之難名擊壤歌衢識太平之有象瑞等未申芹報長切葵丹樂井養之無窮致兌和之有喜為此瞻雲泥首望闕抒心祝天子之萬年頌聖人之多夀伏乞代題以伸謝悃等情到臣欽惟我皇上聖德如天皇仁匝地嵗稱有嵗猶蠲免之時聞年屬豐年尚賑恤之下逮蓋臻已安巳治益切如保如傷康熙五十一年十月十四日准户部咨康熙五十一年十月初三日奉上諭將江寧安徽山東江西各撫屬五十二年地丁錢糧全行蠲免歷年舊缺並著免徵等因隨經前撫臣檄行布政司刋布告示分發府州縣遍處張掛務使里民盡霑實惠去後今據闔省紳襟耆民宋一瑞等呈懇題謝前來情詞懇切臣何敢壅於上聞謹㑹同江南江西督臣赫夀合詞具疏伏乞皇上睿鑒施行巡撫福建等處地方提督軍務都察院右副都御史加二級降五級戴罪效力臣黃秉中謹題為皇恩蠲賑疊沛海甸頂戴靡深謹抒輿情轉詳代題叩謝事據福州等九府一州紳襟耆老軍民陳子威等呈稱竊聖主怙冒萬方恆厪饑溺之由已愚民利賴百畝惟知衣食之為天故暑雨祁寒每咨嗟乎旱潦而寬征減賦用補助乎春秋欽惟皇帝陛下懋建中和聿𢎞參贊聖神天縱普覆載以無私道德日新調隂陽而式序肅雍宫廟文德舞干羽於兩階赫濯聲靈武功平遂達乎三蘖蛟宫蜃窟盡入車書砂磧窮荒咸來琛賮不特地擴於漢唐明宋抑亦功髙於虞夏商周遡自臨御以來海宇同風邊隅向化孳孳保赤不啻顧復之懷殷殷足民莫釋宵旰之念一夫無失所之嗟萬國有咸寧之慶乃猶賜復之㫖頻頒逾億萬金而弗惜豁免之詔屢下歷五十載而聿新澤不比於屯膏道大光於益下惟茲八閩𨽻於海濵聖天子居九重之上眷注獨殷無待疇咨遂頒敕諭緩現征而兼撥賑宥宿缺而免新糧更恤兵餉莫資悉撥鄰省協濟躬逢雨露咸知帝澤之深手捧絲綸仰見王言之大玉鳩為杖老人多拂薰風竹馬堪騎童子盡遊化日黃卷勤燈前之讀縫掖何須入縣之庭緑野催雨後之耕婦子不見呼門之吏惟是長安千里情詞難達於楓宸所願天子萬年頌禱尤殷於海澨僉呈籲懇冒乞奏聞等情到臣欽惟我皇上厯符軒昊道冠羲皇流膏澤於普天損上者斯以益下沛恩波於大地足國者必先裕民固己餘一餘三人人樂業求千求萬處處䝉休矣然而聖心未已復又大沛恩綸特頒上諭直𨽻等省康熙五十年地丁銀兩俱著全免歷年舊缺亦俱著免徵此誠千古未有之𢎞恩史書所罕載者也聞命之下黃童白叟踴躍歡騰齊祝萬夀無疆臣准部咨隨行各屬一體欽遵去後茲據各府紳士耆老軍民人等僉籲代題恭謝天恩前來臣不敢壅於上聞伏乞睿鑒施行巡撫福建等處地方提督軍務都察院右副都御史臣覺羅滿保謹題為皇恩浩蕩難酬黎庶歡騰無地籲請代題以達輿情事據布政使金培生等詳據臺灣府屬紳襟里民陳逸等呈稱閩省為濵海要區臺灣尤海外重地聖恩之漸被彌深黎庶之瞻依益切蠲閩省九府一州五十年之地丁銀兩既咸感皇仁免臺屬一郡三縣五十一年之正供稻榖又盡霑實惠誠亘古所未有亦史書所罕見帝德之廣運靡逺弗周萬姓之銜恩有誠宜達等情到臣欽惟我皇上德被八埏恩濡九有舜風和暢羣黎咸解愠阜財堯日舒長兆姓盡含哺鼓腹廣厦細㫋之上時厪民依茅簷蔀屋之間實霑聖澤昨年免賦全閩已户溢朱提今嵗蠲租臺郡復家盈玉粒是以黃童白叟效嵩呼於薄海之濵行看東作西成廣露積於遐陬之壤既據司道詳據臺灣府屬紳襟里民呈請代題恭謝天恩前來臣不敢壅於上聞謹㑹同閩浙總督臣范時崇合詞具題伏乞睿鑒施行總督廣東廣西等處地方軍務兼理糧餉兵部右侍郎都察院右副都御史加三級仍帶軍功五次臣趙𢎞燦謹題為皇恩廣被士庶歡呼據情代題恭謝天恩事據廣東鄉紳鄭際泰并闔省軍民人等公呈稱伏惟聖澤旁敷爰灑一天膏雨皇仁廣被遍吹五嶺薰風追虞廷解愠之絃邁漢室蠲租之詔千百代難逢之曠典五十年特沛之殊恩六宇歡呼萬方感戴欽惟我皇上至仁育物大德統天極建深宫統萬方而遍德恩覃薄海胥九有以同春盈廷協師濟之休刑清政簡比户沐雍熙之化物阜民康萬姓固已登衽席之安九重猶復厪宵旰之慮於是正賦全蠲甘露來從天上分年遞免隂膏先及海濵丹詔初頒山川育瑞玉書同捧草木回陽父老慶盈寧自堯舜以來才逢此日室家樂康阜凡乾坤之內共戴吾君蕩蕩周疆均沐風風人雨雨人之澤畇畇禹甸共霑衣衣我食食我之仁泰等涓埃莫報豢養徒深惟願皇圖與日而俱長共祝聖夀同天而並久敬陳下悃伏祈俯准代題等情到臣欽惟我皇上恩同覆載軫念民生歷年蠲免數逾萬萬茲復䝉特頒諭㫖將康熙五十年地畝人丁錢糧并歷年舊缺銀兩槩行豁免此實亘古未聞之盛事也臣因㑹審欽案在省接准部咨當即轉行各司道府州縣衛所一體欽遵兹據闔省紳襟軍民人等環臣行署歡呼踴躍焚香叩首懇請代題前來臣恭逢盛世身任地方目覩輿情真切并據廣東布政使髙必𢎞呈詳到臣不敢壅於上聞謹㑹同廣東撫臣滿丕合詞具題伏乞皇上睿鑒施行巡撫廣西等處地方提督軍務兼理鹽法都察院右副都御史臣梁世勳謹題為呈懇代謝天恩事據桂林各府紳襟里民鄧佳植等呈稱我皇上宵旰不遑勵精圖治者五十年恩施普及薄海內外固已民歌康阜士樂盈寧自堯舜以來未有如今日之盛者也康熙三十三年四十三年內䝉皇上軫念邊氓特加恩恤將應征錢糧槩行豁免感戴之私至今難忘今又將五十年地丁蠲免僻壤遐陬恩施一體億兆歡忭祗有焚香九叩頂祝我皇上之德真天地無疆之德我皇上之夀真天地無疆之夀而已伏祈俯准代題等情到臣該臣看得粵西僻處邊陲猺獞雜處耕鑿之外民鮮生業屢荷皇上厚澤深仁加意軫恤今又欽奉上諭將康熙五十年應徵地丁銀兩通行蠲免仰見我皇上至德𢎞仁無逺弗屆臣即欽遵宣布一時溫綸逺播萬姓歡呼白叟黃童靡不焚香頂祝感激天恩兹據桂林等九府屬紳襟里民鄧佳植等紛紛赴臣衙門呈請代達又據布政使黃國材具詳前來臣何敢壅於上聞謹㑹同兩廣督臣趙𢎞燦合詞代題伏祈皇上睿鑒施行巡撫四川等處地方提督軍務都察院右副都御史臣年羮堯謹題為蠲賦諭出九重感恩歡騰萬姓公陳下悃叩謝天恩事據成都府屬紳襟士庶羌民向庭賡吾只木保等呈稱切賡等四川編民生逢盛世仰沐皇恩念僻壤之凋殘教養日勤宵旰叨深仁之浹洽風俗克躋雍熙兹特大沛恩綸來嵗錢糧盡免澤以三年普被知覆載之無私恩同八省先施仰照臨之逺屆賡等惟有鼓腹含哺共樂太平有象嵩呼華祝羣頌聖夀無疆望闕叩謝天恩環庭公懇上達等情到臣該臣看得蜀省天末遐荒仰賴我皇上擴胞與之深懷振勞來之至德愛養備至軫恤頻加地方日有起色矣兹又欽奉上諭將康熙五十年應徵地丁各項錢糧俱著全免臣接准部咨即通行司道府㕔州縣衛所土司一體欽遵去後隨據布政使吳存禮詳據通省紳襟士民歡呼踴躍感頌聖恩且言川省錢糧不足仰供經費每嵗尚賴别省協濟兵餉五十餘萬兩今七年之內兩荷全蠲厚澤深仁實倍他省從此玉壘錦江一時增色茅簷蔀屋到處騰歡惟歌聖人有道之昌期益祝天子無疆之寶祚懇請代題謝恩前來臣不敢壅於上聞理合具題伏祈皇上睿鑒施行巡撫雲南兼建昌畢節等處地方贊理軍務兼督川貴兵餉都察院右副都御史加七級臣吳存禮謹題為聖恩遍及遐方萬姓情殷感戴籲請代題恭謝天恩事竊臣前任四川布政司時䝉四川巡撫臣年羮堯川陜總督臣殷太牌開欽奉上諭事等因到臣臣隨班恭設香案望闕叩謝臣旋䝉聖恩升授雲南巡撫由蜀而黔途間經過大小村莊父老子弟感頌皇仁聲滿山谷及入滇境所屬軍民人等扶老㩦幼咸稱我等生長邊方荷䝉聖主生成安享太平今又䝉皇恩浩蕩蠲免五十年分地丁錢糧我等小民無可報效惟有家家户户頂祝萬夀無疆懇將下悃代謝天恩等情臣於四十九年十二月二十八日抵臣駐劄衙門雖經升任撫臣郭瑮出示曉諭臣復刋示通行務令百姓均霑實惠毋許地方官私自徵收外隨據雲南布政使李華之詳據雲南等府詳稱闔省紳士軍民凃崇等呈稱崇等僻處邊隅遭逢聖世輕徭薄賦時叨怙冒之仁賑榖蠲租屢沐矜全之德桑麻閭井共荷天庥子弟田疇羣霑聖化感皇仁之無外頌帝德之難名乃滇省五十年分地丁錢糧又䝉皇上宏恩盡行蠲免真千載所難逢史冊所罕見也崇等惟有䖍祝聖夀於無疆叩頌瑤圖之罔極轉請代題等情到臣欽惟我皇上乾坤為量日月同輝蠲賑頻施四海共徵樂利痌瘝在念萬方咸戴生成乃猶三年以內蠲千百萬之錢糧率土之中免十數省之正課殊恩異數德邁百王厚澤深仁治越千古惟此洱海滇池之地並沐堯天舜日之華萬里陽春四時雨露戴君恩於罔極祝聖夀之無疆既據該司詳報前來臣又目擊輿情感戴懇切不敢壅於上聞理合恭疏具題代謝天恩伏乞皇上睿鑒施行巡撫貴州湖北川東等處地方提督軍務都察院右副都御史加五級臣劉䕃樞謹題為仰懇詳題代謝天恩事據貴州布政使司布政使張建績詳據貴陽等十一府紳襟民苖周俊等呈稱竊惟耕九餘三史頌仁明之政什一而賦書稱有道之年從未有蠲周天下之租免及歷年之逋愛民如子沛德如天者也欽惟我皇上聰明睿知文武聖神親決萬幾定萬世不磨之制恩流九有擴九州莫外之圖與凡要荒侯甸之區重譯不毛之地莫不鑿井耕田雨暘時若家慶屢豐史書大有真五十年如一日十五省如一家兹復特頒上諭將天下錢糧以及歷年逋缺自五十年為始通免一周黔省邊方先行蠲免俊等雖生長邊隅君門萬里而慈暘甘雨霑霂無殊從此大地盈寧萬邦溫飽皆出皇恩之所賜惟有扶老㩦幼羣望闕庭共祝聖夀於無疆伏懇詳題代謝天恩以洽輿情等因呈詳到臣欽惟我皇上愛同天普化與日新卑服而即康田心懷保赤揮絃而思解阜念切勤民數千萬之金錢灑為一天化雨億萬姓之衣食咸沐九陛春光鳳詔初頒雷聲四布臣准部文即刋刻通行出示遍諭咸使聞知隨據布政使張建績詳據貴陽等府闔省紳襟民苖周俊等公同具呈求代謝天恩到臣謹㑹同雲貴總督臣郭瑮合詞具題伏乞皇上睿鑒施行萬夀盛典初集卷三十一
