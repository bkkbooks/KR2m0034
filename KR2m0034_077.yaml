body:
  text: 欽定四庫全書萬夀盛典初集卷七十九歌頌十九詞臣十一萬夀詩七言律四首翰林院編修臣彭廷訓綵仗金鼇瑞靄籠衣冠拜舞萬方同天階麗景迎黃道斗柄祥光繞玉虹六葉堯蓂初應日五絃舜樂久歌風共歡垂拱升平代紫氣氤氳滿碧空其一武功文德冠前徽乾健先天天不違永固河山齊夀域無私日月遍春暉舞階不待三旬格沛澤真同萬派歸從此千秋逢聖節衢歌巷舞頌巍巍其二雕題黑齒趨文陛卉服雞翹拜紫宸四海來稱萬夀日九州合作一家春璇穹樂奏鈞天響玉檢聲呼華嶽神願酌瑤池供夀酒仰瞻帝座侍鈎陳其三天門蕩蕩排閶闔翠蓋紅輪丹鳯吹玉殿瑞生三秀草杏花春上萬年枝無疆大化膺神契率土羣情叶睿思微賤幸逢歡慶日身隨百獸舞丹墀其四萬夀詩七言律四首翰林院編修臣伊太中天景運慶無疆甲子初周寶厯長萬國梯航趨殿陛千官拜舞肅冠裳冰桃雪藕來蓬島仙樂雲璈集建章處處歡欣齊獻頌恭逢聖莭正春陽其一斗柄髙懸恰向辰和風三月物華新羣黎遍德歸皇極四野謳歌祝聖人惠澤多年霑化雨蠲租遍地沐恩綸共歡厯數同天久仙杏喬松萬樹春其二百花爭發柳含煙紫霧祥雲敞御筵仁夀榜開文治盛期頤人集聖恩宣聰明睿智髙千古日月山河祝萬年鼓舞熙恬春晝永嵩呼碩上九如篇其三紫殿歡騰動八紘當年電繞慶雲生中天日麗丹霄淨南極星臨玉座眀春暖九重饒氣象時和寰宇樂豐亨小臣何幸蒙恩澤得侍班聨紀頌聲其四萬夀詩七言律六首翰林院編修臣林之濬金闕蘢蔥曉氣佳太和天仗正衙排星輝北極聨南極符協中階與下階自是羲軒昌運啓共聞韶濩雅音諧荷囊簪筆年年侍長沐恩波未有涯其一日麗端門繞紫煙嵩呼聲徹玉墀前學宗洙泗心崇聖道貫圖書德合天州郡縣餘猶萬里漢唐宋上更千年欣逢聖節桐華候共捧霞觴進御筵其二習習和風拂玉除殊恩下霈共春舒羣瞻雲漢章天日又溯虹光誕聖初受命三朝綿厯數執圭萬國集車書歡承衮彩先稱夀鳯輦朝回慶有餘其三光華文教煥皇圖神武尤推廓逺謨鑾輅三臨清朔漠樓船六月下澎湖化行海外詩書盛德洽寰中衽席俱最是頻年蠲正賦恩霑九有盡歡呼其四非霧非煙郁氣騰暢春夾道望層層花宫梵唄千年祝綵幔笙歌萬國燈帝德好生天與夀皇仁纍世嵗常登耕田鑿井康衢老扶杖欣瞻曉日升其五升平海宇共歌謳徽號堅辭德更優聲入帝心通萬象甲周聖夀歷千秋爐煙晝靄雙龍闕花氣春深五鳯樓百爾承恩同拜慶無疆寶厯固金甌其六萬夀無疆賦有序翰林院編修臣嵇曾筠皇上御厯之五十有二年景卿敷華光輪煥彩剛柔協序百神效順於清寧肅乂隨時萬象增休於上下祥風播暖桃開千歲之花淑景昭和莢舞浹辰之葉幸遇陽春三月恭逢聖夀六旬紫微朝朗映南極以生輝華蓋宵澄值東皇而愈耀四維開其景運慶在一人二曜自此再中夀先五福祥雲靉靆不離鳷鵲之宫瑞靄霏微常傍蓬萊之館應龍在淀丹鳯儀廷芝草産於房中醴泉湧於階下效九如之祝逺近無違稱萬夀之觥廣輪罔外臣葵忠世守芹志時存感激聖慈似向陽之草木泳遊帝澤如霑化之鳶魚因録節而荷恩綸蒙垂問而叨館職飽餐仁粟僅懷將母之思重被榮褒願紹匪躬之志遭逢大慶幸際昌期禎符萃合於一時絪縕特隆於千古垂衣端拱元會遞嬗不窮戩穀罄宜甲子循環無已萬八千年之洪算未足頌揚千八百國之諸侯相從揚拜天行不息比堯睂舜目而獨隆乾健彌強偕日升月恆而並久臣不勝踴躍歡忭之至謹拜手稽首而為之賦辭曰太和保合乾坤萃精扶輿旁礴聖人以生巍巍乎繼三皇而並懋赫赫乎軼五帝而常貞乃聖乃神乃武乃文集成本於天縱詣極由於性存聖質維何徇齊而慧敦敏而淳岐嶷而睿豈弟而溫守中以一擴道以文由仁行義明物察倫心源印乎洙泗神契合乎洛閩至德難窮既超前而軼後名言莫罄亦越等而邁羣神功維何不言而雍無為而化馨洽神明光被上下沕穆擬於羲軒敬信同於虞夏欲驅積水靈龍奮甲以開河思廣仁風極星現光以照夜首春出塞竟泉甘而山青大祀格天忽霞飛而雲架何年無九穗之禾歷嵗有屢豐之稼風雨節而五祀歆寒暑調而八方蠟文德維何潄芳六藝擷潤羣言宸章包乎彖繫睿製冠乎典墳精華摘乎子史編纂殫乎藝文搜騷壇之風雅萃詞苑之芳芬雲漢昭回卓筆而蛟龍起珠璣璀璨摛詞而風雷屯武略維何靖伏戎除亂首剪三蘖黜羣醜恢八紘廓九有東極扶桑之津西及虞淵之口南暨明都之前北通隂山之後瀚海置郵天山罷守阻化之苗忽孚撼波之鯨絶吼殊方重譯以來朝逺域極誠而上夀而且粟帛養老鐘鼓作人崇儒術而五經之理闡𢎞樹植而百行之士生十里杏紅遣星軺以羅俊三秋桂馥啓瓊宴以延賔立賢有無方之德用人多破格之恩小善必收恆受詩而止輦微長不棄每接士而停輪而且英敏性生智勇天錫陳樽爼而化戈矛舞干羽而銷鋒鏑玉門關外萬餘里稽首稱藩賀蘭山前四十部編名受厯漢關秦月不矜師武之功雞塞狼胥悉覩修文之績而且峻德巍而克讓文聲溢而謙居辭徽稱於盛隆却封禪於雍熙航海梯山逺者遙隨日馭尊王奉朔近者習拜丹墀幕南無飲馬之泉斗北有晾鷹之圃穹廬築望幸之宫沙磧列來同之宇丹喙翠羽向靈囿以飛鳴朱鴈青麟環紫宸而馴舞至若恩溢函夏澤沛海隅解雨行而三千之屬有赦巽風布而億萬之賦忽除父老擎觴競下車前之拜野人獻曝偏多道左之呼是處頌南山聲叶鳴春之鳥有天皆化日歡同得水之魚更商周之未有亦唐虞之所無乃以執徐之月清和之候日當扶嚮辰移鶉首階蓂猶榮宫桃若綬昌熾欣其疊承福祿徵其單厚流虹繞電慶當日之篤生巷舞途歌快普天之額手爰乃乾行愈健離照彌光睿容煥發天表康強無逸而寸隂是惜懋昭而小物不忘旰食宵衣每厪咸和之念懸鞀設鐸用求懷保之方於是內外臣工遐邇士庶三多陳百福志詠日升頌川至兕觥稱馨椒備樂未艾慶錫類引嘉祥稱上瑞淮獻其象兖貢其蠙楚入其茅揚奉其珍檿絲織貝琅玕璆銀箘簵砮丹橘柚柏杶莫不由沱逾洛達濟浮汶而且陬有騶虞郊來鸑鷟仙鳥啁啁瑞鹿濯濯紺露降林赤芝挺朴甘泉噴瀑於文階竒木敷榮於丹幄素王後裔秉禮樂以來朝蔥嶺遺宗攜鉢衣而致慤皤皤黃髮躬逢舜日之光奕奕秀睂競聽堯階之樂而且烏弋黃支航琛入覲竒肱窮髮輦賮來庭番舶驗東風以遣介鮫人測海水以通名苜蓿葡萄槎竟浮於牛渚木難結緑帆乃照於魚燈接踵駢肩競瞻雲而蹈舞稽時歷日喜效欵於升平於是天子燕焉升丹陛臨寶座進臣鄰延卿佐宣九韶爇百和播德惠受朝賀恭已垂裳明作惇大於萬斯年百祿是荷萬夀詩七言律四首翰林院編修臣鄭任鑰電繞瑶樞渚貫虹長庚炳耀寶光融日輪正午行馳道星緯周天護法宫甲子初回昌運逺貞元重會太和同欣逢聖節嵩呼候物阜民安六合中其一九重天際正春深柳穗桐華滿上林五福斂敷仁者夀萬邦和協聖人心向榮更長階前莢占候還來海外琛億萬斯年皇極在長瞻玉座衮衣臨其二黃麾仗外起笙歌雲護瑶墀淑景和萬嵗華嵩同夀考千尋江海比恩波乾坤策合堯年盛河洛圖兼舜厯過御世天皇無量佛誕生只隔兩旬多其三暖日霏煙映綵斿聖君當個御雲裘階符共羡三台正軒厯初看六甲周寶算千齡推嵗月仙籌十屋紀春秋小臣載筆慙枚乘金鑑長期黼座留其四萬夀詩七言律四首翰林院編修臣蔡學洙曈曨瑞氣映層層金闕晨開慶日升五百昌期逢聖主八千上算協嘉徵傳心直溯惟精一紹業還兼丕顯承六十年來宵旰意禎符純嘏自頻仍其一帝德髙深總莫攀梯航鱗集仰龍顔宜膺尊號辭尤切又免全租詔屢頒三月春光融玉陛萬齡聖誕應嵩山禁林載筆承恩渥拜慶欣同鵷鷺班其二盛朝寶命自靈長土宇𢎞開邁漢唐湛露恩濃霑杞棘薰風調發叶宫商西郊景煥雲霞麗內苑春深草木香萬姓歡呼同致祝年年歌舞樂東皇其三九牧車書入賀辰條風花柳正芳新時逢萬夀初周甲世值中天盡是春雲漢騰輝昭雅化鳶魚翔洽見深仁儒臣更有葵心獻億載光華映紫宸其四萬夀盛典初集卷七十九
