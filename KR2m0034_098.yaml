body:
  text: 欽定四庫全書萬壽盛典初集卷一百歌頌四十教習進士館諸臣一恭頌萬壽無疆詩有總序教習進士侍講臣文志鯨教習進士諭德臣吳廷楨教習進士編修臣俞長策臣聞昌期載啓宇宙溢為太和壽域方開星雲呈夫上瑞五百年而運世上應璇圖八千歲以為春遙推寶厯虹流電繞天示嘉徵日升月恆人膺戩榖是以纂承一統享有萬年華祝稱禧願聖人之多壽軒遊訪道受古籙以長生遼乎皇代之春秋竹書告備煥矣帝廷之簡牒金匱司存代有令聞今兹重覯欽惟皇上泰治方亨乾行不息運璿璣而鼓元化參贊成能握金鏡而煥大猷懷柔式序成天平地勤宵旰者歷五十二年緯武經文慶安全者遍千八百國固已箕風畢雨應皇極以備徵藪鳯郊麟迓天休而畢至當仁恩之纍洽值聖壽之開祥序屬三春厯周六甲於時百昌暢遂咸披明庶和風二氣交孚胥樂暄妍化日共球和會占靈莢於瑞圖鵷鷺雍容醉仙桃於春色别有龎睂皤髮扶杖來朝鑿齒雕題獻琛入賀莫不瞻雲就日跂踵傾心伏北闕而揚言指南山以介壽雖皇衷沖穆猶循讓善之文乃帝厯綿長自致福謙之應天顔有喜民説無疆既德協覆載而同符宜夀與清寧而合撰豈止樓前賜宴節慶千秋域內時巡嵩呼萬歲而已哉臣等職膺翰墨學本疏蕪幸遇聖世儲材俾新進被甄陶之化重荷皇心愼簡令小儒兼教習之司典實出於特恩士盡歸夫樂育用是祕書寓目快覩生平未讀之篇因之餘藝遊心略窺聲律相宣之旨恭逄聖節喜覲天儀諸臣芒屩甫離預趨蹌於朝會爾日葵忱難已抒傾向於謳吟各分體以成章先綴詞而為序固知日月光華莫能繪畫所冀海山容納不讓涓塵仰陳乙夜之觀俯展萬齡之祝由此夏絃春誦長承壽考之作人亦如巷舞塗歌並和康衢之擊壤云爾萬壽詩四言十首教習進士臣查雲標天眷我皇乘乾首出德契苞符道傳精一浩蕩堯天光華舜日上際下蟠前超後軼其一敕幾明作久道化成河清海晏衡正階平禾生六穗芝産九莖一人建極萬物由庚其二莫大於天則之唯聖執兩用中體元居正川嶽效珍飛潛遂性有雨稱甘有雲名慶其三猗歟聖誕際此昌期花明紫陌柳映青旗共球絡繹劍佩委蛇般般百獸率舞階墀其四我皇謙沖俯念六宇禹儉彌敦湯仁益溥崇實為先隆名無取大哉皇心登三咸五其五師師有位載筆玉除連名進表拜手陳書箕疇五福天保九如誰識我皇德盛弗居其六彼歌且謡或童或叟鼓腹含哺携樽叩缶就日傾心望雲稽首誰識我皇功崇弗有其七古亦有言壽以云酬巍巍帝治兩大為侔六十甲子八千春秋循環迭運始而復周其八我皇之德存神過化我皇之壽東岱西華里社羔豚村籬桑柘斂福錫民壽以天下其九我皇之德處靜若淵我皇之壽方至如川人遊化日樂奏鈞天霱雲五色寶鼎億年其十萬壽詩四言八首以聖神文武祿位名夀為韻教習進士臣李登瀛一人有慶膺圖凝命德並羲軒學宗孔孟精一執中緝熙止敬俯育羣生仰齊七政久道化成皇矣至聖其一篤生聖人六合長春肅雍起化沖穆葆真其天浩浩其仁肫肫薄海內外莫不尊親同流天地過化存神其二萬幾克勤遊心典墳金簡玉軸華采成雯纂組藻繪宸翰霙紛網羅百代景爍揚芬倬彼雲漢天下同文其三普天率土我皇悉主禁旅奮揚如貔如虎風動霓旌雷鳴天鼓廓清宇宙德孚干羽永永太平止弋曰武其四凝承寶籙介兹景福玉食萬方貢金九牧敬天重農省耕祈榖昭格上穹屢豐洊熟皇王蒸哉受天百祿其五聰明睿知拔萃出類重譯來王五玉輯瑞端拱太清四表光被建極開天功崇德備穆穆皇皇永隆天位其六地平天成盛莫與京百靈協應三光融明宣昭義問遹駿厥聲塗歌巷舞俯順民情巍巍蕩蕩帝德難名其七髙明博厚道兼悠久籌溢東瀛星輝南斗太極涵心乾綱握手薰風揮絃愷樂飲酒日升月恆天子萬壽其八萬壽詩四言四首教習進士臣周王春爛彼卿雲呈於中天光華復旦曦曜髙懸維皇建極出震乘乾百靈效順諸福殷闐臣拜稽首天子萬年其一臣拜稽首祗承天休陽和應律六甲一周惠風東來扇被九州川原膴膴卉木油油登彼春臺百祿是遒其二春臺蕩蕩太平之象維道化民裁成輔相譬彼洪鈞剛柔劑量豈繄小補歡虞是尚大哉皇猷天參地兩其三大哉聖言黜華崇實德盛守謙自強不息百辟卿士彝教率迪愛敬尊親恪共乃職於萬斯年躋仁壽域其四萬壽詩四言一首教習進士臣璩廷慶行健唯天我皇是則作君作師建其有極三春良辰籌添厯數士喜開科農欣免賦恩及狴犴澤加鵷鷺侯甸要荒輻輳豫附貢列球琛樂陳韶濩遍宇榮光敷天湛露聖心憂勤始終無倦屢却鴻名何言封禪謙德既孚泰交孔遍久道化成治臻美善懷柔河嶽和會隂陽緝熙純嘏俾熾俾昌五福稱祝九如拜揚億萬斯年覆載同長萬壽詩四言六首教習進士臣何騰三天保我皇乃聖乃神執中致和乾德精純時雍風動錫慶兆民萬方攸暨媚兹一人其一天保我皇百福孔臻山嶽修貢川谷效珍豐年穰穰室家溱溱洪鈞一氣金鏡常新其二天保我皇覆幬無垠平康建極道路咸遵殊方通贄重譯來賔一人有慶六合皆春其三六合皆春萬物化醇惠風和暢披德拂仁五雲三秀布濩彌綸躋堂稱觥長此芳辰其四稱觥拜舞露液雲津連蜷霞幔明淨花茵咸英韶濩大樂具陳氤氳佳氣儀鳯翔麟其五佳氣氤氳何物不均普天率土山陬海漘以生以育既蕃既淳髙明悠久景命用申其六萬壽詩四言一首教習進士臣虞景星綿綿宇宙闢自洪荒聖神迭起建極中央文明啓運篤生我皇亶聰首出厯服無疆髙乘離照靜體乾剛化成久道寖熾彌昌慶周花甲鑾馭靑陽和風條暢麗景舒長日輪耀彩霞斾騰光川嶽貢瑞雲物呈祥西鶼東鰈山梯海航敷天擊壤夾道焚香華封善頌豳什稱觴三多五福莫罄拜揚長懸金鏡永揭珠囊億萬斯年端拱垂裳萬壽詩五言古四首教習進士臣吳翊貞符啓睿聖纂圖廓區宇祥源濬文明懿光鑠神武鳯編周六十龍御綿九五錫祺本道髙遒福緣仁普苞涵貫亭育觀察籠仰俯四維翕森張七政歸凝撫松雲淡契堯樏輴勤追禹奠極拜金書綏邊劃玉斧精思運樞機公聽懸鞀鼓於赫冠百王遹駿超三古覽揆始攝提長籌詎能數天子壽萬年純禧膺永祜其一純禧協五紀垂衣仰穆淸靜諴飭户牖動運周埏紘頻行時邁典屢肅不庭征樹羽宣文教麾戈揚赫聲宥𢎞三面網櫜戢六鈐兵紀雲矞瑞郁占星泰階平法宫奏慶善至樂諧韶韺薰風入瑶瑟華黍播瓊笙舜觚頒愷飲湯鼎劑和羮九逵歡豐大一心警恆貞不登封禪議載却鴻嘉名天子壽萬年郅治勝蓬瀛其二郅治葆太和誠通自悠久運開龍鳥先澤衍睢麟後含生被喣噢踐土銜髙厚庥氣浹巖廊薰風播農畞南山松柏榮濃暉潤花柳瓊霄捧紫霞輿壤齊拜手巴舞抃孺童豳歌躋龎叟鴻慶更無邊胥譯拓九有西旅總浮河東鯷盡瞻斗黃支并烏弋琛貢先奔走欣誦未央詩洪霑長樂酒天子壽萬年尊親戴元首其三尊親遍寰宇沐浴先儒流天文倬呈象河漢垂清秋疇畫闡羲昊典謨邁殷周選辭尚體要作人訓姱修飫霑壽考澤朴􅈪供薪槱大科慎品鑑特試精研搜微臣忝論造重瞳賜甄收讀書育藜館習禮瞻龍樓彤庭與三祝仙闕擬十洲栁衫厠章黻鳬藻依旌斿弇鄙蘊寸丹衢謡讚鴻庥天子壽萬年卷阿湛恩優其四萬壽詩五言古一首教習進士臣張謙宜堯天浩蕩蕩舜日麗遲遲化成由久道寶厯開昌期六合興禮樂萬國偃旌旗仁風多翔洽黎庶樂雍熙藉問何能爾聖敬惟日孜涖祚五十二乾綱獨握持聰明察邇言虛衷廣疇咨朝堂列稷契邊徼委熊羆羣策各效力纎悉皆周知簡賢專付託量能授官資節儉惜物力恆慮生齒飢頻年蠲租賦含哺相娛嬉育才隆教化菁莪廣被滋髙岡多翽羽和鳴上梧枝春光轉韶景草木紛葳蕤千官慶聖節九如陳鴻詞我皇體天德淵穆儼若思樂與兆人共神仙何足竒瑞粟逾丹粒嘉禾勝靈芝爾民歌擊壤九重天顔怡升平稱上壽覆幬無偏私臣本草茅士教養荷洪慈操筆事編纂華藻愧掞摛所願億萬載歌詠太平時萬壽詩七言古一首教習進士臣咱茹頴粵稽帝堯癸巳年康衢華祝垂簡編峻德則天萬古傳我皇癸巳慶周天六合呼嵩聲駢闐先聖後聖揆一焉健行不息躬體乾與天同大覆蓋圓與天同久泰運旋大德曰生仁育全大法執中精微研大知光昭天下先久道雍容臨廣淵久安黎庶勤服田久照升恆常轉還明威赫濯風雷宣求寧懷保心惓惓時巡江海滙百川洪河疏鑿指劃便恩波浩蕩流無邊蔀屋茅簷頻賜蠲羣材樂育荷陶甄苗民革面頑梗遷南朔梯航廣幅員東西漸被彌九埏自古功烈難比肩沖懷謙讓加惕虔宵衣咨治警官聯奎章巍煥星日懸宇宙大文恣包纒妙契理學搜真詮圖畫探追倉史前銀鉤玉薤爭摹鐫夀世應同金石堅太平歲月恆久延時雍壽域開八千和風三月淑景妍昆蟲卉木咸熙然皇心自操造化權元會億萬鞏綿綿萬壽詩七言古一首教習進士臣黃天球南極夀星生紫芒四表上下多榮光九重當陽流大化如雲如日垂衣裳德心廣懋運乾始萬幾一貫精誠裏大含海壤納鴻苞細别毫芒徹精理默鼓仁風鑄八埏神功無迹恩無邊淳朴直追懷葛氏恬熙宛在羲皇年宵旰猶然勤保惠異數紛綸時下逮共竭茅簷方寸心願祝彤庭億萬歲鳯城三月五雲新重譯梯航拜玉宸瑞符寶厯惟仙莢福蔭寰區是大椿何幸天階作桃李雨露濃霑未有底追陪鷺序覲龍光並效嵩呼歌燕喜蓬萊花滿海籌盈長覩升恆日月明祈將率土無疆頌播入春風慶泰平萬壽詩七言古一首教習進士臣田長文昌期載啓誕我皇凝圖握瑞總乾綱光華日表鍾天祥禮樂經緯文治彰聲威赫濯武功揚堂廉喜起會明良車書四海共來王宵旰精勤軫萬方巡河周嶽湛恩滂租賦頻蠲兆姓康好生棘寺看鸞翔萬幾餘暇親縹緗精一傳心遙相望天文典誥遹輝煌龍蟠鳯翥煥奎章崇儒重道飭膠庠追琢多士成圭璋作人壽考壽無疆淑景融和物候芳鶯歌花舞御筵張觴連瀛海酌瓊漿樂奏鈞天來鳯凰卿雲紛郁爐煙傍甘露濃滋萬彚昌千官獻祝韻鏗鏘率土呼嵩樂洋洋小臣纍代荷恩光葑菲重蒙化雨瀼竊愧無才效賡揚惟願聖壽比昊蒼萬壽詩七言古一首教習進士臣卜兆龍我皇神聖致升平極天茀祿何崢嶸六宇祥光凝紺碧萬年景命符元貞武功文德逈超越涵濡滲漉彌埏紘體元居正調玉燭巍巍蕩蕩誠難名昌辰正喜當三月萬象昭融怡睿情卿雲靉靆應圖瑞薰風披拂鳴韶韺上苑青蔥森玉樹御筵沆瀣浮金莖宫花爛熳珍禽集苑柳霏微仙仗迎虎戟鸞旗盛環衛香煙瑞靄相旋縈兆民擊壤效衢祝羣工拜手聞歡聲天顔喜溢陽和色紫氣絪縕滿太清小臣朴鄙愧善頌願指南山與東瀛萬壽詩七言古一首教習進士臣汪榯巍巍莫並惟穹蒼我皇則之御萬方黼扆端拱垂衣裳心傳精一接虞唐五十二載際時康神聖文武邁百王清晏熙恬化日長共球絡繹紛琳琅雕題鑿齒咸梯航久道化成世運昌文明剛健彌自強宵衣旰食勤不遑含哺鼓腹慶倉箱倬彼雲漢麗天章郊藪麟遊並鳯翔萬類敷榮戴青陽煥赫紅日上扶桑曉開閶闔延景光羣指南山獻壽觴休徵嘉瑞呈虹祥會極歸極慶無疆萬壽盛典初集卷一百
