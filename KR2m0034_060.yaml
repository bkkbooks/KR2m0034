body:
  text: 欽定四庫全書萬壽盛典初集卷六十二歌頌二大臣一恭祝萬壽詩七言律二首户部尚書加三級臣張鵬翮南極星輝映紫宸乾坤齊壽德相親九重天上來和氣五色雲中拜聖人金殿爐煙浮瑞靄玉階紅日麗陽春臣民共效華封祝億萬斯年頌至仁其一太平天子壽無疆萬國嵩呼玉厯長乆道化成逢令節梯山航海共稱觴笙歌徹路迎僊仗朝野懽忻祝聖皇此日龍顔真有喜萬年春色滿朝堂其二萬壽詩七言律十二首有序經筵講官刑部尚書加一級臣胡㑹恩欽惟我皇上峻德神功統天御世道𫝊河洛綜法象以成能恩浹垓埏徧臣民而錫福並神堯之廣運嫓宣聖之大成保合太和五十餘載兹當癸巳春王三月恭遇聖壽六旬龍德健而百祿膺華甲周而一元復率土屆升恒之運含生逢熙皥之春猗惟嘉祉方新式慶大年伊始歡騰華祝喜溢衢歌九譯梯航羣黎抃舞臣㑹恩受恩深重垂四十年乆依清禁之光莫報皇穹之德願言億嵗長賡純嘏之篇每歴十齡益進維祺之頌謹拜手稽首敬賦萬年天子詩十二章上呈黼座一人乆道奏昇平治洽和恒益勵精百代圖書歸聖學普天耕鑿注皇情儉勤盛德能居泰寅畏深衷若捧盈無逸從來臻上壽萬年天子體乾行其一郊壇肅穆儼居歆每歲欣瞻翠輦臨冬饗即時霏瑞雪春祈應候灑甘霖頻親獻侑躬逾健屢荅豐亨志益欽至治馨香潛感格萬年天子洽天心其二皇朝謨烈古難儔上聖膺圖慰作求繩武良規侔創業薦馨嘉德永凝庥思通櫛沐經營逺道在恢𢎞典則修率土歡心孚陟降萬年天子廓前猷其三璇宫問視藹春暉福履交綏自古稀五紀承歡儀物備九州尊飬景光依瑶齋梅馥霞觴暖丹嶠芝榮寳籙輝麟趾繩繩齊介福萬年天子奉慈闈其四君師兼總振𢎞綱覺世諴民聖統彰理貫羲爻思特睿心傳虞典治彌光陶鎔六籍尊洙泗綜攬諸儒重紫陽海㝢同風趨正學萬年天子道遐昌其五鐃歌屢奏萬方平赫濯聲靈暢八紘虎旅勲髙由睿算龍荒膽懾為親征良時清晏恒籌逺至計綢繆在恤兵干羽格苖同舜世萬年天子武功成其六彤庭著作萃琳琅手闡苞符駕百王律厯真源通象數詩書精義發文章銀毫勁正喬松榦寳畫昭融旭日光羣仰奎躔徵聖壽萬年天子永當陽其七官方澄肅勵朝紳激濁揚清注念真㢘法共期心似水光榮長被澤如春寶書玉饌承恩渥桂苑芹宫濯志新壽考作人昭曠典萬年天子福臣鄰其八民依常徹九重尊南北河渠碩畫存稼閲十千行畎澮賦蠲億萬惠黎元丁徭額定施仁永戸口書増錫慶繁長享太平歌壽愷萬年天子歲頒恩其九好生仁德並蒼穹勅法原情衆志通每奏丹書煩乙夜親裁玉律見清衷三章克慎加勤恤五聽惟詳朂在公盛世祥刑元氣浹萬年天子慶咸中其十中朝威德播遐陬王㑹來同淑氣稠波靖鮫宫澄島嶼風清雁磧闢田疇遥輸貢篚通重譯式廓輿圖大九州寰宇一家真盛事萬年天子受共球其十一欣逢虹渚耀嘉祥天錫遐齡厯數昌草木並知春浩蕩翾蠕爭愛日舒長遊衢叟効三多祝望闕家薰百和香忝附清班颺景福萬年天子壽無疆其十二萬壽頌有序原任戸部尚書臣王鴻緒皇帝御極之五十二年春三月為六十萬壽之辰王公卿士四裔列藩之長雲集天閶踴躍歡忭共效嵩呼薄海内外黄童白叟以及婦人女子莫不巷舞衢歌家謳户頌臣鴻緒夙忝九列兼直内廷仰覩聖天子盛德神功曠古無兩兹雖跧伏里閭而詠歌太平實臣職分用敢率先南省耆民匍匐輦下敬舉萬年之觴臣惟箕子之陳洪範曰皇建其有極斂時五福而五福之首曰壽小雅江漢之篇曰矢其文德洽此四國而歸之以天子萬壽孔子贊舜之大德而推言之曰必得其壽蓋至道格穹歴年斯永天人協應理所固然我皇上懋千古帝王莫竝之德則必臻千古帝王莫竝之壽臣請據實以徵焉帝王之大德曰孝周武纘緒受命孔子稱其達虞帝五十而慕孟子贊其大蓋綦難已我皇上誕膺寳籙肇造鴻圖拓太祖太宗世祖神戈未定之疆宇成皇家一統無外之規模苞蘖盡除清寧永奠文謨武烈炳耀千古豈止秉鉞商郊僅承先志至於圜丘告䖍明堂宗祀一嵗再舉必躬必親典禮洽於肅雝馨聞達於殷薦而且奉養慈闈懋昭愛敬備萬方之玉食博壽母之歡顏定省寢門不渝寒暑自冲齡踐阼以至於今孺慕之誠如一日重華齋栗何以加兹是聖孝之聿修者至也帝王之大德曰仁顧澤有廣狹時有豐嗇成湯拯夏衆於塗炭之中文王綏商民於頳尾之際來蘇志頌孔邇興歌時處其困易為澤也我國家運際雍熙閭閻康阜乃皇上咨求民隱未饑也而思食之未寒也而思衣之圖耕織以教其勤發倉廪以濟其乏猶且寛徵已責無嵗蔑有數盈千萬復大頒渙汗廣沛恩膏盡蠲天下之正供悉免歴年之逋賦期均三載惠普萬邦官省催科農恬畎畝穰穰皥皥四海盈寧其濟衆之博如此而節儉是敦衣御浣濯嗇一已以裕天下非愷悌宅衷烏能若是是聖仁之漸被者大也帝王之大德曰知知非小用之謂我皇上聰眀天亶睿思通微事無難易物無鉅細皆燭照數計朗然在懐而好問好察劑量極致以歸大中詔㫖一出洞鑒毫末且萬幾决於俄頃千慮折以片言謀畧所周動及百年必世非所謂清明在躬志氣如神者歟若夫虞帝創璿璣之制姬公著周髀之經圓弧之象難窮勾股之術未顯我皇上妙析靈機深入無間究三角之形立八線之表方圓極其變参伍盡其神大如山岳小如銖黍逺在萬里近在一室髙至九天深至九淵不煩隷首坐測而得是聖知之開先者𢎞也帝王之大德曰文虞書之頌放勲周易之繋西伯尚已篤生我聖皇藴經天緯地之才裕金錫圭璧之質生知不恃古訓是耽奥義研於六經閎論稽於羣史而尤以綱目凖春秋之法性理洩圖疇之秘奉尼山為折衷据紫陽為標的原原本本統彚於心由是發為文章無非至理御製前後四集詔諭詩賦紀序論説無體不偹無美不臻出典入謨含風吐雅允足邁堯文而超姬易矣顧猶採訪先哲遺編搜羅百家異本開設館局延集儒英計天文地志以曁音韻字學詩詞書畫論次千百年纂撰數十種悉出聖裁津梁後學兼復幾暇臨池龍翔鳳翥翰墨之精直使漢帝扶輪唐宗承蓋是聖文之丕煥者隆也帝王之大德曰武禹征湯誥泰誓常武詩書所載鋪張赫濯但僅在中土未聞逺駕我皇上智勇天錫用兵如神殄察罕而朔陲寧誅三逆而南徼靖籍臺灣而漲海平臣喀爾喀征厄魯特而漠北永清撫俄羅斯收打箭爐而天西大定附塞諸部受封爵者五十家絶洋逺人重譯而至者數萬里田官設於邉外牧地開於沙表烏桓濊貊為蒐狩之隩區天山瀚海設士馬之郵傳有銷烽弛柝之安無變容動色之慮謳歌徹華裔聲教徧垓埏是聖武之布昭者赫也帝王之大德曰寛天以好生為心覆物為量皇上奉天出政禮以御下善以養人崇簡去繁任賢蓄衆百寮師師咸式其序鹿鳴以示慈惠天保以頌罄宜一堂喜起賡歌再見即或有牽於吏議觸於文法小臣則曲假以自新大臣則保全其終始又念鴻儒碩士抱蕝懐書棲遲丘園罔由自達乃廣鄉㑹之選増生徒之額恢薦舉之門闢召試之路復允輿請重開一科作人之法盛於成周已至若懸布象魏律令修眀金科玉條萬民祗守懲秦法之秋荼崇湯網之疎濶厝而不用以德導之洽於民心蒸蒸向化和氣所被休徵畢集是帝德之克寛者廣也帝王之大德曰信易言有孚盈缶傳言信以成義義以成命天下未有誠信不孚而為下土所式者我皇上立誠以御宇坦白以示衆推心置腹不猜不疑故萬國歸懐殊方託命罔不翹首内向奔走恐後至行一政發一令籌之深宫參之羣議或經累月逮權衡旣審綸綍聿宣雖歴數十載守之不變畫一清淨下用不攜是彰信於兆民者逺也帝王之大德曰敏我皇上法天行健乾惕自强六龍時御雲行雨施自秦晉河洛周歴萬里清問下民湛恩汪濊而江浙地廣賦稠尤加軫恤疊荷鑾輿之至止頻施膏澤於非常而經營清口指示挑壩逼黄流於北岸引淮水以暢行昔之漕艘逆排觸浪動經旬月今沿波十里即達中河利國利民皆由不憚時廵親授方畧所以地平天成大功立奏是聖德之勤敏者茂也帝王之大德曰公昔子夏問三王之德於孔子孔子告之曰奉三無私以勞天下蓋言天無私覆地無私載日月無私照也我皇上德懋懋官爵祿所加惟其賢功懋懋賞賚予所及惟其績舍已從人平康正直惟其義故奉行於下者偏黨悉化遵道遵路以近天子之光是大公之服物者溥也帝王之大德曰謙然有其實者不辭其名五帝祗命皆修封禪夏禹成湯踵行懿烈降而漢唐勲業雖遜於前而盛事猶傳於後我皇上道叶二儀恩覃九有巍巍蕩蕩古無與侔即躡梁父登太山封金刻石増髙附厚顯報告之德意揚英聲於無窮誰曰不宜天子顧遜謝未遑也數載來廷臣之情抑而未伸乃倣太祖太宗之盛烈援漢唐誼辟之故事以為世運郅隆黄圖廣大遐島奉珍幽荒獻賮河清海宴府修事和真千載之一時勤勤懇懇請建尊號至再至三乃手諭堅辭欿然自下務修實政不事虛文是聖德之謙沖者切也夫孝塞天地仁敷動植知察倫物文被區夏武定要荒而又寛如江海之有容信如四時之不爽敏如陽曜之周行公如造物之無頗備茲懿美猶謙以自牧道光宇宙臣敢昌言於天下曰我皇上之德聖矣神矣自生民以來莫有竝焉者矣所謂莫有竝者非泛設之辭無稽之説也古來以生知之聖而居天子之尊者首推唐虞二帝然舜以六十升庸而皇上正位凝命仁滂施厚深入於民心者已歴數紀是恩澤百倍於舜矣惟堯嗣位之早畧與上同然考當日荆揚南境皆在五服之外則民不霑化者已多兹地大於陶唐則恩加於百姓者愈廣以為遜美今日也固宜然則均為生知之聖而我皇上功德之盛百倍於堯舜則受天之眷佑者亦必百倍於堯舜此又可援古訓以决之矣易有之視履考祥其旋元吉傳有之九德不愆故襲天禄詩有之聿懐多福厥德不回又云昌而大耆而艾萬有千嵗我皇上聖躬强固精神充裕光輝篤實博厚髙眀如乾之不息如恒之不已繼自今久安長治天禄永綏以至聖而膺上壽殆與五岳比寧三皇比年何待探符籙而始信哉謹作頌曰惟天誕聖惟聖承天仁敷萬姓惠普八埏東西南朔無思不服自老及幼旣生旣育登阼以來五十三春帝齡周甲歡聲雷震逺而省㑹近而輦轂内而郊圻外而屬國或公或卿或侯或王庶僚百執奉圭帝閶野有髙年載白其首扶杖千里來祝我后煌煌鳳闕逢逢鼓鼖爐烟之裊結為五雲鵷班列左豸冠列右欽帝功德古未曾有帝德維何鑄虞甄唐欽眀濬哲光被萬方帝功維何手靖沙漠華夏敉寧兵銷民樂民樂於野咸歌大田嵗嵗蠲租萬萬千千藏富於民民用饒洽擇人牧之小㢘大法人以賢升連茹彚征菁莪棫樸際此休明治定功成彌勤於政鴻號不居日躋聖敬道崇洙泗學闡紫陽為典為謨煥乎文章凡我臣庶並荷陶淑廼生廼植受帝之福六合一家萬國一人率土胥頌文武聖神溯自開闢迄今億載獨集大成允符真宰貞元之運聖厯之昌治化之盛茀祿之長何以紀之稽首拜手曰我聖皇與天齊壽萬壽盛典初集卷六十二
