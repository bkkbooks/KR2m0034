body:
  text: 欽定四庫全書萬壽盛典初集卷五十八慶祝五貢獻五都察院左都御史臣揆叙臣趙申喬左副都御史臣瓦爾達臣明安臣田從典臣崔徵璧恭進宋板易象大㫖一部宋板尚書注疏一部宋板周禮一部嚴氏詩緝一部稽古録一部隆平集一部五經圖一部朱載堉歷書一部朱載堉樂律書一部陳則通春秋提綱一部唐文粹一部三體唐詩一部朱子六經四書圖一部列子一部揚子一部重編廣韻一部杜詩一部董其昌臨顔真卿書趙孟俯書耕織圖詩文徵明書四體千字文祝允明書梅花詩趙孟俯草書千文趙孟俯學書筆法董其昌倣懷素帖米芾書天馬賦白玉龍荷花杯宣窑荷花盤一對宣窑花澆一對西洋半圈儀西洋蜜蠟罐蟠桃玉杯一對萬年一統玉水滴萬壽無疆墨宣窑馬掛瓶雙螭法琅鼎澄泥硯玉香爐永樂填白碗一對趙孟俯八駿圖宋元諸名家千金冊勾龍爽堯民擊壤圖仇英維摩講法圖米友仁春山煙雨圖唐小李將軍仙山樓閣圖黃公望層巒聳翠圖通政使司通政使臣劉相臣郝惟諤通政臣羅瞻臣郝林臣王景曾臣張德桂參議臣蘇伯霖臣關保臣陳汝咸恭進經濟類編四套通鑑紀事本末十套六臣文選六套近思録一套三蘇文粹二套人物志一套詩學大成二套趙孟俯行書梅花詩趙孟俯楷書蘭亭跋解縉大字遊南嶽贊董其昌書四勿針董其昌書唐柳宗元觀慶雲圖詩劉松年天保九如圖馬逺松雲瑞鹿圖戴嵩松林虎嘯圖趙孟俯扁舟待月圖趙孟俯湖山秋色圖倪瓚平林詩思圖林良碧梧棲鳯圖吕紀掇錦圖仇英竹溪仙館圖仇英漢宫春曉圖唐寅秋山訪友圖藍瑛千峰雪霽圖雙螭捧壽玉鼎脂玉壽杯一對水晶筆架瑪瑙水中丞哥窑筆洗宣德五彩盤一對宣德窑把碗一對𢎞治窑盤一對正德緑龍盤一對嘉靖窑碗一對漢玉筆屏澄泥硯大理寺卿仍兼太常寺卿臣荆山大理寺卿臣孟世泰太常寺卿臣李敏啓大理寺少卿臣巴霽納臣邵觀太常寺少卿臣佟靄臣黃叔琳恭進元刻五經全文二函二十一史文選二十四函元刻國朝文類二函宋刻南華經四函元刻列子至德真經一函元刻王通中說一函宋刻陶潛集一函宋刻柳宗元集二函元刻翰墨大全八函元刻紺珠集二函太史華句一函金石韻府一函米芾行書聖德詩朱子書錦江春詩趙孟俯金書金剛經趙孟俯行書文賦趙孟俯書逍遙齊記董其昌行書晝錦堂記董其昌行書春晴詩董其昌行書春雨詩李公麟諸天梵象圖趙令穰春江逺眺圖趙幹桃塢春雲圖曹雲西溪山平逺圖徐賁浮嵐暖翠圖宋刻絲蟠桃獻壽圖李公麟瀛洲文㑹圖黃公望天池石壁圖趙伯駒仙山樓閣圖雷瑛大㑹慶壽圖仇英春夏秋冬四景圖仇英春和覽秀圖瑪瑙福德文星銀晶壽仙萬壽玉尊夔龍玉壺夔龍玉瓶夔龍合璧慶雲玉杯四喜玉杯蟠桃玉杯水仙玉杯青緑商尊哥窑乳爐均窑元壽花尊官窑飛㦸花尊宣窑青花水盛宣窑葵花杯二對宣窑青花盤一對萬窑彩色慶壽宫碗一對萬窑龍鳯呈祥盤十面景星宋硯龍尾宋硯名人畫扇二十柄內務府包衣昂邦臣赫奕恭進壽佛一尊靈芝一本古書一部古畫一軸臣畫炕屏一架臣畫一軸營造司郎中臣佛保恭進太極寶坐一座晉書一套古琴一張萬壽玻璃鏡百子拱壽圖金剛子念珠豆瓣楠書架蟠桃盒吉慶如意天然葫蘆百仙拱壽靠背洪福似海坐褥芝鶴雙瑞迎手一對順天府府尹臣屠沂府丞臣王懿恭進宋抄歐陽修全集宋板韻疏舊板古今談薈文徵明手録通鑑董其昌書唐張嗣初春色滿皇州詩董其昌畫千巖競秀圖趙孟俯墨竹萬年如意玉壺夔龍拱壽玉香爐太僕寺卿臣阿錫鼐臣周道新恭進水經二套喻林四套米芾書閶闔篇蘇軾書四時行樂詩戴文進三星圖唐寅江村漁泊圖宋磁梅瓶明宣德爐玉連環壺國子監祭酒臣查喇臣徐日暄司業臣察爾岱臣登德臣魯瑗恭進文獻通考二十函朱子經濟文衡二函董其昌廣文字㑹寶二函趙孟俯學士登瀛圖仇英仙山樓閣圖謝小仙萬年福祿圖李公麟瀛洲㑹奕圖郭熙嵩山疉翠圖魏之璜瑞芝仙鹿圖董其昌關山初霽圖馬逺仙山瑞靄圖漢玉壽桃杯一對漢銅鼎一座漢銅尊一座宋端石宫硯墨晶獅鎮紙成窑青瓶嘉窑紅瓶鴻臚寺卿臣安保恭進壽佛一尊趙伯駒山水黃居寀花竹仇英十公圖仇英龍宫圖周之冕畫柏周之冕畫松漢銅瓶宣銅爐欽天監監正臣明圖治理厯法臣紀理安恭進大清康熙萬年厯一套計四本平立方根萬數表一套計一本萬壽盛典初集卷五十八
