body:
  text: 欽定四庫全書萬壽盛典初集卷七十一歌頌十一詞臣三萬壽詩七言律八首右庶子臣閻錫爵紫氣東來映彩虹一人有慶兆民同安期火棗堆盤赤方朔仙桃滿袖紅甲子八千惟祝華春秋三萬但呼嵩普天齊上岡陵頌總在元和聖德中其一豔陽淑景樂韶光五色雲中啓九閶燕語鶯啼三月麗桃紅李白滿城香恩如滄海洪波濶春比扶桑旭日長身際太平熙皥世萬年天子壽無疆其二睿藻繽紛見拜揚萬幾清晏理縹緗筆花舞出金鸚鵡研匣飛來紫鳳凰染翰雲霞真雅頌經天日月大文章小臣何以酬高厚競進三多祝我皇其三意在毫端萬象隨鸞停鵠峙幾人知絳霄盡仰龍蛇筆緑字曾傳岣嶁碑神妙自能通篆籕墨飛今欲識之而雲箋歷落揮金管卅四驪珠顆顆垂其四光華文治象星躔十斛明珠耀日邊已見金臺收駿馬又看瑶島降羣仙秋深桂子常飄殿水漲桃花欲上天一立螭頭欣載筆升恆歲獻九如篇其五神武天威奏九韶萬方日月盡光昭雕題鑿齒歸王會烏弋黃支拜聖朝殿上珥貂班定遠帳中執戟霍驃姚春搜秋獮勤宸慮奕祀臣民頌帝堯其六遊豫歌成動四民彩雲長傍翠華屯頻來補助農夫慶遍采風謡德化醇河伯波平因效順雨師灑道為淸塵江南江北霑恩渥大地長回黍谷春其七威鳳祥麟集禁鑾年年百福滿長安和風甘雨隨金律瑞麥嘉禾獻玉盤鎬飲已逾千歲樂豳詩還奏萬年歡懸知聖壽同天地為奉春尊北海寬其八萬壽詩七言律四首有序翰林院侍讀臣樊澤達臣聞日在天中綿億萬年之景運風行地上鞏千百國之皇輿華渚祥鍾天開太昊瑶光瑞啓帝奮高陽況乎擊壤興歌來歡聲於函夏躋堂稱祝靄佳氣於長春至聖足以有臨大德必得其壽欽惟我皇上心符五帝治邁三王績奏平地以成天咸熙紀慶功昭泥金而檢玉大有書年沛古今難遘之殊恩勤宵旰不遑之盛軌誕敷文德光華瞻出日之鄉載纘武功赫濯被無雷之國仰琳琅之御製真符二典三謨揮絢爛之天章盡是銀鉤鐵畫聖業已躋於廣大皇圖益進於高深宥過蠲租甘雨祥雲並布掄才課吏景星化日齊輝七政肇修百神效順兹屆三春令節恭逢萬壽昌辰鶴舞仙階兩掖香飄劍珮鳯鳴禁苑九重彩映旌旗賀有道之鴻基卜升平於奕葉臣才慚珥筆職忝垂紳謬校玊署之編幸與華封之祝天長地久步寮采以賡歌日升月恆偕野民而獻曝敬擬豐年長庚之韻聊抒鳬趨雀躍之忱恭竭褊辭伏祈聖鑒太平春暖景方東玉燭元調歲屢豐萬葉堯蓂周大甲四乘禹迹奠高嵩聲名早被遐陬外溫肅齊施丕冒中自是聖功綿厯服不須問道訪崆洞其一閬苑蓬壺到列仙蟠桃火棗萬斯年曈曨曉氣開宫殿蕩漾薰風入管絃寰宇並攄三祝願盈廷共進九如篇春和布惠新恩渥雨露霑濡遍八埏其二六龍時御正當陽四海波恬泰道長巢鳯逰麟爭薦瑞洛書河馬再呈祥天家帶礪朝羣后下國共球集萬方五色雲深南極燦一人介福慶無疆其三紫陌新煙報曉晴禁林高柳囀倉庚化行品物咸增慶德洽羣黎悉遂生萬歲聲呼喬嶽壯千年韻叶大河清康衢童叟何知識歌咏長春樂太平其四萬壽詩五言律十二首有序翰林院侍讀臣樊澤達臣聞天皇御極支干綿衍於萬年夏后承庥玉帛會同夫萬國盛德必膺純佑福集長春至仁爰享大年祥開復旦欽惟我皇上體天廣運配地安貞四表被光勵精加進於初政九圍式命懷保不遺乎一民聖德與聖學齊徽聖謨偕聖猷並大齋居肅穆儼天祖之式臨惠布汪洋統臣民於在宥允文允武𢎞致治保邦之模克寬克仁廣蠲租恤刑之澤翠華望幸南朔東西欽天子之聲名玉燭調和天地民物得至人而位育並三皇軼五帝參贊成能斂五福祝九如尊親共戴時當有道運叶太平天其申命用休帝益自強不息六旬大慶璿玉常新三月芳辰鶯花最麗風和西苑化國之日舒長曲奏南薰治世之音安樂臣澤達叨榮史職久點班聯謬晉官階難酬高厚揚厲無前之駿烈竊效管窺賡揚有秩之鴻禧聊同壤擊臣無任歡忭悚切之至極拱星環北春長日麗冬堯蓂周甲子禹甸屹衡嵩卜運方臨泰書年正履豐一元欣復始謳祝萬方同其一景物三春盛芳華上苑穠九區皆壽國八表盡華封令節星辰燦高天雨露濃細微霑草木生植慶遭逢其二宵旰勞宸扆沈思總萬幾從容攄大略赫濯奮皇威海晏鯨鯢息河清粳稻肥治安圖未雨時駕六龍飛其三丹鳳傳天語紅雲擁帝居絲綸聲是律渙汗德為輿寶訓千秋鑑瑶編右史書煌煌堯舜典渾噩溯皇初其四景命祈天永親郊仰睿謨風雲依後乘星月照前驅合德三才並升中一氣孚慣看霏瑞雪臣庶足歡呼其五列祖垂模逺前徽事可稽三朝貽寶籙萬載耀金泥道協乾坤正功髙作述齊丕承逾武烈遍德在羣黎其六大統皇輿廓平成定八荒圖陳河效順車出器呈祥莽息全無伏波恬久不揚天休正滋至拜手賀蕃昌其七高柳囀倉庚靑郊百室盈聖朝嚴課績吏治急揚淸牧笛聞漁艇農歌答杼聲秀睂諸父老扶杖樂觀成其八德茂羣生育年豐萬國寧條柔歸禹貢儀舞樂虞廷嘉種羅千品靑郊出五靈史書符瑞志奇異表山經其九仁體同山靜堅強聖壽徵仙峯環拱護天柱矗崚嶒景仰歌單厚攀躋想誕登巋然千萬載時覩五雲興其十純禧江共永嘉祉海同深運轉周天壤流行自古今大亨君子道不息聖人心四極安瀾會河宗日獻琛其十一日麗千官就雲高九服瞻梯航盡山海淪洽及飛潛周祜年斯萬箕疇福自兼恩波原溥博先許近臣霑其十二萬年頌表提督江南學政左春坊左庶子兼翰林院侍讀臣胡潤伏以皇極永建斂五福於乾坤帝德難名集三多於朝野太平有象正逢開世之期喜氣騰輝共慶儲祥之會普天壽域遍地春臺臣竊聞至仁必壽惟德動天有道稱皇三皇各萬八千歲無為曰帝五帝總千有餘年商宗無逸以勤民並臻上壽周文惟純以配命用享遐齡有永愼修非關導引以知無疆之慶皆歸不息之誠欽惟皇帝陛下道高堯舜功邁禹湯神聖文武之光旁照四表位祿名壽之福永極萬年錫智亶聰早縱前民之哲橫經稽古久勤訪道之心知人安民不待臯揚益贊怡神彌性莫非孔思周情惟體立而用自行斯理精而事畢貫問安長樂則慶溢璇宫睦族內朝則祥延玊葉仁心廣被一民亦荷矜全和氣充盈庶彚胥歸涵煦自削平滇粵而率土稱藩暨拓地澎湖而尺天入貢乃至風行地上服歷朝所不臣瀾息河源安前古所易潰勤一心於兆庶蠲租宥眚之屢加眀四目於萬方督撫守令之愼簡出膺宰牧先召對於九重盡得人才更責成於六計重膠庠而三倉四庫之並訂必探其源飭營伍而五伐七步之無譁益修其備固已爭摛雲漢各布風霆更且益植菁莪廣培杞梓兹者陽和令節值我皇上六十萬壽之辰一氣洪鈞四時玉燭天人合慶恭逢周甲方新卿景揚光敬值遐齡伊始屢却榮號不貴嘉祥陳粟萬箱即是芝明三秀英才百輩便同桃熟千年特開鄉會兩科以廣作人雅化蛟騰鳯起悉收川嶽之祥車庶馬間盡入鞭馳之手臣幸際休明忝承簡任望北闕以瞻雲未盡拜揚之忱合南國以歌衢用採士民之祝維大江南北既新蠲億萬之征輸而癸巳春秋復廣闢文武之榜額淪肌浹髓喜溢扶輿擢秀登良歡騰膠序臣敬從録科之餘於校試經藝外即以萬年頌命題令諸生各撰成篇以志頌禱恭録賦頌而下得詩數百篇加以裝潢分為三十卷敢云十五國風足備軒輶之採尚期億萬千載同兹愛戴之誠臣無任瞻天仰聖踴躍歡忭之至謹奉表稱賀以聞萬壽詩七言律十章有序曰講官起居注翰林院侍講臣文志鯨帝王體天立極淳懿敦固上光日月星辰下逮昆蟲草木太和薰蒸洋溢宇宙俾天下民物蕃祉仁壽享有諸福與天同德斯與天齊壽堯舜禹湯文武其明徵也我皇上以生知安行之聖體至誠無息之德臨御五十二年屆兹六旬萬壽懋德勤學治定功成際天蟠地咸五登三四方萬國熙熙皥皥福壽康寧之休萃於聖躬尤兼被於天下乃宸衷謙抑讓善弗居凡侈言祥瑞崇尚尊號皆所不事惟訓誡臣民務實不務名勉盡忠孝為祈天永命之基大哉王言真與二典三謨並垂萬世在昔箕子之陳洪範也曰五皇極皇建其有極斂時五福言皇以極而獲福也曰維時厥庶民於汝極錫汝保極言民以極而獲福也曰人之有能有為使羞其行而邦其昌言臣以極而獲福也所謂極者惟是蕩平正直之理無偏陂好惡之私而遂以收福壽康寧之效皇上以務實訓天下而敦本忠孝所謂率天下於蕩平正直而必去其偏陂好惡者也易之大有上九自天祐之吉無不利其謂是矣德與天合斯壽與天齊億萬斯年固愈引而愈長也臣楚南豎儒受恩深重不揣固陋謹抒七律十章呈進巍巍帝德本難窺古聖心傳續在兹早與苞符成默契尤將聖道共昭垂倫常樹範臣民仰軌物彰身海宇知端拱衣裳聲教遠正看風動四方時其一紅燭宵分映紫微圖書左右有光輝六經異授端宗尚諸子爭鳴定指歸旭日常臨香篆繞宫花好共墨光飛羣瞻泰岱卑培塿聖域高深自古稀其二化啓文明咏載櫜萬幾宵旰總勤勞主恩早達殊方外民隱能通九陛高十雨五風調玉燭河清海晏奠金鼇寰區愷樂齊歡忭尚繪豳風念索綯其三龍飛九五正當陽海國朝宗祝聖皇六十方周清晝永八千為歲大椿長風和日麗天垂象澤媚山輝物吐芳試看衢尊人共樂重登醇朴入羲皇其四久隱川巖未上書科加文武舉行初飛鴻盡振天衢羽勸駕還隨計吏車束帛已來環海士弓旌重到野人居菁莪造就賢才盛共戴皇恩頌九如其五山陬詰曲水潺湲白叟黃童遍頌言鑿井耕田安草野春風社酒樂花村連枝桑柘人煙盛一室妻孥笑語溫帝力不知同覆載齊呼萬歲九陔喧其六深仁厚澤靄如春草木禽魚長養勻動植舒和皆各得飛潛茂對總無垠丹山碧水饒滋孕淑氣晴光適性真咸若功施彌上下肖翹微細荷陶甄其七遠覽高超獨異前聖君舉動美瑶編九莖芝草非關瑞六穗嘉禾樂有年咫尺星雲輝殿陛尋常麟鳯遍山川臣工未敢陳竒異渾朴王風萬古傳其八健行不息與天同日進無疆靡有窮不以豐亨侈滿假惟將謙抑秉虛沖德臻太上難言德功極洪鈞弗自功尊號請加頻遜謝蒼茫海嶽仰皇風其九皇極為昭衍禹疇臣民五福在純修蕩平曩日垂𢎞訓忠孝於今秩大猷風俗勿為澆薄易文章務俾渾淪留煌煌寶誥惟崇實舜日堯年億萬秋其十萬壽盛典初集卷七十一
