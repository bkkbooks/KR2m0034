body:
  text: 欽定四庫全書萬夀盛典初集卷一百十二歌頌五十二生監諸臣三萬夀詩五言律二首監生臣張位純嘏應天錫精誠勵聖修乾坤長合撰枝幹喜初周旭日輝龍衮晴霞護鳯樓八方齊獻夀拜舞集共球其一天慶當三月春暉照御筵彈琴操舜曲鼓腹樂堯天宫柳迎風緑蟠桃浥露鮮河山明萬象長拱聖人前其二萬夀頌有序監生臣汪祚臣聞祿位名夀有大德必享大年睿知聰明惟至誠斯稱至聖理數未嘗或爽古今實有同符欽惟皇帝陛下廣運齊堯文明嫓舜道貫百王而立極位參兩大以成能萬族並育於春臺率土咸登夫夀域兹者節當嘉慶時值陽春花甲初周占嵗紀者自今伊始箕疇載衍徴祥應者以莫不增凡屬含生之倫盡知華祝惟臣章鄙之士益切衢歌伏覩皇上膺圖御極五十二年統奠金甌光調玉燭允文允武極巍蕩之難名乃聖乃神洵頌揚而莫罄妄加蠡測竊用管窺則有若郊壇禋祀禮必修虔明且欽承日嚴昭格是聖人事天之誠也享廟薦馨對越不懈祖功宗德繼述彌隆是聖人繩武之光也奉慈聖之歡心而尊飬備至禮稱純孝何以加焉篤天潢之仁愛而恩禮偏周書稱睦族何以過焉至於田租遞賜而澤霈敷天商稅並蠲而雨蘇大地惠下之慈至矣仁行法外而屢減重條治期無刑而頻加寬釋好生之德溥矣猶且沐風雨以歷茅簷命鑾輅而巡方嶽是以疏瀹一施而畿輔之沮洳盡為沃壤隨刋既授而黃淮之泛濫悉就安瀾奠定之功其大矣乎亶聰明以為立政之源簡人才以為安民之本是以濟濟多士加遴選而務别材能桓桓武臣慎校閲而爰搜技勇論官之法其備矣乎若夫尊崇前聖𢎞奬諸儒述經史而炳若日星重學校而施同雨露敦風勵俗之意其厚矣乎至於文德既隆武功克奏九州率服萬年鞏磐石之基四海歸誠億祀慶河山之固而且瞻雲就日擴從來未擴之版圖獻贄奉琛開自古未開之土宇東西南北一尉一侯綏甸要荒同文同軌蓋溯乾坤成列而後天地剖判以來未有並此崇隆擬兹赫濯者也況復智由天縱不費研精德本性成猶加博覽時而發抒義理煌煌羲畫文謨時而陶泳性靈隱隱周情孔思允矣經天而緯地卓哉驟帝而馳王且也八法通神直會指事象形之始兩儀在握尤精授時定律之方是惟至聖之多能實備統天之全量離能普照廣大自致高明乾本健行覆載同歸悠久譬江河之行地常此流通比日月之當天寧有紀極哉臣謹稽首頓首而獻頌曰我皇受命時敏日新德參載覆道貫天人昭哉舜智宏矣堯仁九州四海稽首悉臣理本存誠治惟恭已不猛不寬盡善盡美事天如親愛民若子厚澤深仁淪肌浹髓惟大一統億萬斯年武功赫濯文德敷宣爰稽史册載考簡編盛德大業莫與京焉久道化成諸福咸備河海呈祥日星效瑞卜世卜年日昌日熾協氣旁流蒸黎廣被時㿩時雨萬邦屢豐耕田鑿井率土歌功人多富夀世享帡幪康衢擊壤樂事相同甘雨和風霑拂九有履戴乾坤寧知高厚祝我聖君與天同夀穆穆上穹申命保佑一介草莽幸際虞唐寸草春暉敬效頌揚詞慚風雅文愧圭璋敢隨百獸率舞趨蹌既歌九如更詠百福亹亹令名綿綿厯服祥覩星文籌添海屋萬夀無疆八方同祝萬夀詩七言律二首監生臣呂鍔南極星輝接御筵泰階玉燭慶聨綿九霄雨露涵雙闕四國歌謡祝萬年大化聿昭文盛日春風長暖艷陽天華籌海屋頻添算嵗嵗恩波溥日邉其一生成至德並乾坤寰宇陽和沃聖恩鼎盛春秋膺福履無疆甲子起貞元宫雲五色祥光合御柳千絲淑氣繁最幸草茅能就日躋堂相慶獻堯尊其二萬夀詩五言律一首監生臣王正學乾健天行道惟皇大德同甲周長祝嘏日永共呼嵩寰宇恩光繞方州愷澤蒙瞻雲滋湛露康阜被仁風萬夀詩七言律四首監生臣張之頡瑞靄氤氲滿碧霄虹流電繞慶今朝籌添花甲龍顔喜琴奏薰風鳳律調至治時雍敷率土鴻庥天保愜羣僚瞻雲莫罄謳謡意共祝三多拜帝堯其一春暖銅龍刻漏垂花深紫陌照丹墀珠囊煥采綿昌運金檢呈祥鞏盛時習習爐煙添柳重盈盈絲管出雲遲遙瞻南極光華爛草木常霑聖澤滋其二羣向光天仰覆幬珠星環拱北辰高來朝萬國雲隨馬臚拜千官栁映袍紫燕翻飛依玉宇黃鶯宛轉和雲璈太平更喜敷文教獻夀盈庭盡譽髦其三九重春色接蓬萊雲裏簫韶風更催淑景人人爭就日歡聲處處欲成雷已看湛露霑仙掌更借春流泛羽杯白叟黃童齊舞蹈山呼遠自萬方來萬夀詩五言律一首監生臣徐模帝德超三古皇圖鞏萬年雲山當曉麗花木向春姸日暖供堯酒風和拂舜絃升恆占久道載頌九如篇萬夀詩五言排律十韻有序監生臣姚浩德合無疆自永萬年之夀恩敷率土斯騰兆姓之歡兹值三春令序恭逢萬夀嘉辰淑氣融和咸樂熙熙化日祥光凝靄共瞻燦燦長庚闢彚征之路多士奮興頒寬恤之條萬民樂愷於是赴闕者雲集四方莫不尊親獻頌者風馳百祿由之遒總何意微臣欣逢盛典伏念草茅下士拙陋無能擬效華封之祝願切三多難名我后之仁情依五鳯謹賡十韻爰用五言雖蟬吟蚓竅未足罄其高深而巷詠塗歌亦可抒其忠愛云爾景運中天啓皇恩造化同無疆稱帝夀久道見成功時值陽春麗年當甲子豐龍樓凝瑞靄鳯闕拂和風南極星長拱西池果正紅鑾儀陳殿陛仙仗下崆洞朝野歡聲合山川淑氣融聖情應有喜天祿正無窮獻頌華封切車書文教隆小臣慚拙陋拜舞效呼嵩萬夀詩五言排律一百韻監生臣杜庭珠玉厯綿千祀皇圖總百昌協風開廣莫旭日麗朝陽北極清都永南華翠嶺長謀猷多鳯觀聲教浹龍光竹杖通卭笮軺車接夜郎黃支同獻賮烏弋盡來王大道恩隆沛豐年福屢穰嘉禾垂九穗珠樹矗千行瑞莢流泉府神輸溢太倉體元仁作宅訓俗禮為坊寤寐勤宵旰聰明若雨暘巡河翕喬嶽問俗遍耕桑化洽東南尉恩深上下庠儒風敦采藻吏治奬甘棠日月懸霄漢風雲起驌驦萬英隨玉璧九室坐明堂肆覲恭陳燎升中肅薦薌萬花餘翰墨四庫富縹緗丹粉輝天祿圗書列建章宸奎河漢爛廣樂洞庭張韶濩爭宣豫臯夔日贊襄九歌勞董勸一德頌明良紫閣巢鵷鷺丹墀集鳯凰論思清劍舄特逹重圭璋嚴樂抽中祕淵雲掖廟廊蘭苕棲羽翠芍藥和瓊粻共振蓬山筆同霑玉瀣香圎珠霏錦繡美句製琳琅玉帛分堯座山龍補舜裳神功看鼎象盛烈在司常兹喜三辰合同傾萬夀觴東瀛開寶籙西母奉瓊箱度索桃堪摘琅琊稻已嘗綺筵斟桂醑玉墄立芝房椒菌申巾帶芙蓉雜佩纕流霞飛片片零露浥瀼瀼海閣千秋鏡仙人九節菖御筵調紫鳯天膳獵黃麞虬箭傳長樂鸞旗簇未央陛階凝穆穆環珮舞洋洋閶闔陳王會鈞天叶鳯翔八公趨絳幘十叟進瑶漿況復春明候欣逢草木芳紅綾滋艷杏緑綬映垂楊桐乳巢金鵲萍紋浴彩鴦九枝聨火樹百子躍文魴時藿兼青筍蘘荷並紫薑槐衢方舞燕柘館恰鳴鶬綘縣同申瑞青祇各效祥披圗方入洛刻玉便過唐景物中天麗謳歌匝地揚宸襟舒浩蕩大澤汜長康化逐銅儀轉才將玉尺量龍門重啓鑰駿坂許羣驤赤水光逾發豐城氣有鋩乘風思鼓浪捧瑟更承筐月樹千層秀星槎一葦航穿楊誇接葉脫頴羡飛囊鼂董才先後鄒枚賦頡頏三條催吐鳯什龍貢鳴璫鶴算宜緱嶺鸞棲必翠筤探花曲江上駐馬杏林傍此日栽桃李他年即棟梁玉衡停水鏡雅韻叶笙簧共卜鵬雲遂誰甘豹尾藏階蓂占嵗序嶰竹應宫商泰運宜征吉嘉謨矢拜揚飛翎還奮擊踠足自康莊地迥仁風被時熙吉士彰福占歌夀熾韶舞綴鏗鏘有喜同薪槱無才愧粃粳菰蘆蒙草澤蛙黽局池潢寶謝雙環玉鉛輸百鍊鋼談經逢輔嗣末學忝毛萇寸晷何由惜三冬只自蘉蔚天依曲阜桂子到餘杭瞻仰隨師濟趨承凛肅將溪芼思薀藻秋菊間餱糧在鎬魚溱首鳴臯鶴引骯一邱身欲致千里首重昂試上三多祝寧辭數仞墻嶽圗膺祕牒洞府檢神方赫赫熙鴻號遙遙沃令望八紘歸巽命六位總乾剛漢殿威儀盛周官禮樂詳波澄青雀舫苖秀白駒場國迓升平福家承積善慶樹人勝樹木如阜亦如岡莘野資調鼎磻溪獲釣璜洪爐同在石大木可為杗瀚海長無浪長庚亦曜芒天文高炳蔚聖度表顒卬得預笙鏞奏聊同鳥獸蹌懋哉賡已再樂只誦難忘倣佛窺三島分明傍九閶陳詩遵古義臚筆頌天皇佳氣聨丹紱祥雲拱赭黃恭吟一千字拜首祝無疆萬夀詩七言律四首監生臣張紹曽含元春旭景彤融聖主當陽夀域崇繼繼繩繩綿寶厯巍巍蕩蕩仰神功填成樂府天長久候得堯階日再中五十二年調玉燭吉祥雲裏聼呼嵩其一和風習習御爐香電繞虹流慶發祥銀甕鏤成綿算字瑶池捧獻萬年觴夀兼天地人皇永厯過殷周夏后長七政璣衡全在握雲松棟牖仰垂裳其二雲潤星輝正玉衡低空燕雀荷生成龍飛萬嵗春三月虎拜千官漏五更似海皇恩真極樂如天帝德本難名多年機務勤宵旰默運神工定太平其三鵷鸞拜舞列丹墀苑柳宫花漾碧漪紫氣遙浮雙鳯闕紅雲高覆萬年枝法天自與天齊夀祝聖還為聖獻釐從此籌添盈海屋綸言布處奉恩私其四堯天擊壤歌七言截句三十首有序監生臣林珠皇帝御極五十二載聖德遍於天覆之區神功極於坤載之上昔軒后方制天下畫野分州自幽陵至於交趾蟠木距於流沙歷代繩承未能逺廓我皇上德威所臨邇懷逺服自朝鮮琉球以外至於青海烏斯諸域珠崖交趾以南迄乎魯特俄羅諸部凡血氣所鍾聲教所及莫不三譯來朝獻琛奉貢此誠皇古開天以來從未有大一統若斯之盛者也我皇上勵精圗治益勤宵旰以天地之心行堯舜之政精誠以答天心纘緒而光烈祖孝事兩宫則合萬國之歡心以為養惇睦九族則聫百世之本支以為榮重道禮隆乎尼山封嶽典成於泰岱文德以綏來服神武以討不庭養老求賢省刑薄斂至於蠲千億萬之常額以厚民生頒十六條之聖諭以淑民性優禮以待大臣覃恩而隆勳戚草野章句之儒懷獻賦者咸登於詞苑衛鎮赳桓之士嫻文藝者競奮乎棘闈巡狩省方咨民間之疾苦疉沛恩綸大搜講武順秋肅之天時合圍振旅善政史不勝書事事皆為世法聖人為人倫之極規矩為方圓之至則自天地權輿精華啓造未有如我皇上之盛德者也臣識字塗鴉皆蒙聖恩之培養含哺鼓腹並遊帝世之光華兹者天開紫宸日躔黃道雲璈叶瑶池之奏琪花明上苑之春鵷行虎拜羣工擎萬嵗之觴嶽祝山呼兆姓慶如天之夀夫雅頌進於公卿非庶人所及而衢歌巷祝之言無由上逹於宸聼臣因思皇途開廣采風爰及於芻蕘聖主鴻慈獻暄嘉納於野老於是謹倣古者康衢擊壤之遺縷述童叟謳頌之意雖未能仰贊高深之萬一聊以表歡欣鼓舞之微忱得詩三十首以獻彩鳯扶輝玉殿東氤氳瑞氣拱三宫聖明天子躋仁夀拜舞衣冠萬國同一東金闕初開動曉鐘露華凝挂萬年松羣瞻聖主無為象堯舜垂衣在九重二冬聖德如天覆萬邦直教含識盡歸降千村萬井嵩呼動喜氣騰為寶勝幢三江開成神化繼庖羲今日虞廷覩鳯儀帝德自同春浩蕩恩霑花桞更無私四支列宿輝煌拱紫微九天閶闔慶雲飛萬年景祚唐虞逺玊燭金湯鞏帝畿五微欣瞻六合盡車書今日閭閻慶有餘長碩百生逢聖世年年長拜紫宸居六魚巍巍聖德紹唐虞天語煌煌並典謨千載明良今復旦賡歌喜起慶都俞七虞多能天縱聰明主運應貞元福祿膍纘述光承三后緒燕謀垂統萬年齊八齊郊壇禋祀肅燔柴馴象和鸞踏御街昭格靈祗深眷顧萬年福祿永兼該九佳西來青鳥集靈臺王母瑤池捧玉杯青帝九天開夀國回看六合盡蓬萊十灰寢門三至問安頻萬國歡心奉一人天母慈容添色笑光昭聖孝萬年春十一真化成久道轉憂勤峻德欽明過放勳參天兩地神功在萬嵗千秋頌聖君十二文普天來慶一人尊金闕巍峩闢四門億兆齊聲君萬嵗南山北斗介堯樽十三元六龍巡幸出長安補助春遊警蹕寬租稅蠲除天下足聖心猶切問飢寒十四寒太平天子福如山巡狩東南浩澤頒童叟焚香車下拜歡聲動地喜天顔十五刪幸魯鑾輿禮聖先尼山道統契心傳須知精一超湯武成化雍熙億萬年一先備樂歌功列視瞭笙簧鐘鼓徹重霄雅音直叶咸英奏干羽從今是九韶二蕭湛露歌來燕近郊吹簧鼓瑟列嘉殽聖朝慈惠陽和遍一德君臣協泰交三肴彤弓朱矢錫勳勞况復琳琅宸翰褒夙夜在公思匪懈頌揚福祿與天高四豪神功底定慶淮河聖德今知海不波江漢朝宗歸帝闕平成還奏九功歌五歌天高雲淨騁龍騧校獵高原射五豝秋獮順行金氣肅霓旌千隊日光華六麻聖學臨池邁二王銀鈎輝映墨生光萬幾餘暇常揮染競仰雲煙出建章七陽大德由來是好生恩寬解網見祥刑臯陶執法原無二三宥時時切聖情八庚上庠國老錫安寧絹肉猶頒廣外廷聖主𢎞開仁夀域滿朝盡是老人星九青萬夀恩科解額增九州多士喜難勝公車逺邇趨王會楨幹他年弼股肱十蒸聖德崇隆敷政優況當春令遍宣流皇恩廣被懷柔逺萬國來同拜冕旒十一尤廣頒聖諭見天心十六條成萬世針早識閭閻歸孝讓山陬海澨總鳴琴十二侵漸被東西暨朔南禽魚猶自沐恩覃􅍭靈有福逢堯舜共效華封拜祝三十三覃康衢擊壤樂安恬作息嬉遊化日暹試問恩波今近逺已周西鰈與東鶼十四鹽皇仁沕穆同丕冒天授丹書彩鳯銜聖敬日躋隆上治康謡碩得比英咸十五咸萬夀頌有序監生臣宫懋臨臣聞上元開闢啓無極太極於鴻蒙一氣氤氳肇天皇地皇之統緒黃河清而聖人出衍昌期者五百年里社鳴而王者興隸版圗者千百國故張寰立宇兩地參天合覆載而執樞握苞符以建極欽惟皇帝陛下如日初升法天行健萬册書功之紙管窺止得其大端千枝頌德之毫蠡測難該夫衆美兹值五陽之旺律恭逢萬夀之昌期辰月發祥乾飛得位午年育瑞離照方中花甲一周嵗在朝陽之次芳春三月日移婁宿之宫紫蓋黃雲坐明堂而頒國政金繩玉版登日觀而受天符臣藝愧全牛學慚半豹徒知鄭璞齊竽之好未忝秦冠漢綬之榮挈瓶之智屢空短綆之才不及雖無為光宅得歌比屋之封而有道賤貧耻作歸田之賦儻蒙動薰風於舜海沛甘雨於堯雲則涓滴微流向銀潢而望若勾萌細物依瑶圃以揚輝謹竭葵誠敬成蕪頌頌曰皇帝立極海宇肅清三靈叶吉百度維貞禮兼文質樂奏咸英邇安逺至久道化成欽明文思溫恭允塞天覆地載靜翕動闢高勳大業巍巍赫赫澤普四方光熏萬物大孝不匱承先啓後政教維新典章由舊宗祏贊幣郊壇奉酎必躬必親以妥以侑學逹天人文炳日星出言如絲吐辭為經几杖有戒盤盂有銘龍章鳯藻照耀千齡春溫秋肅仁漸義劘發號施令信於四時聲靈雷迅大化風馳上德不德無為以為炎州氷海蔥山狼望俶擾封疆竊窺亭障王師一怒煙消霧蕩我武維揚天威遐暢八紘歸命萬璧來王馳書折簡山梯海航穴胸反踵雞塞龍荒奉珍貢賮莫敢怠遑翠箑生厨丹蓂在户駢目喁池比翰棲樹醴溢春泉甘凝秋露五風十雨民和物煦昭陽之嵗月維載揚律中姑洗氣逹勾萌聖人御厯日景舒長乾坤貞觀烏兔光芒箕疇甲子莊椿嵗年昌期五百泰運三千休祥絡繹景福駢聫百葉千祀瓜瓞綿綿聖德無方神功不朽惟日月恆惟天地久羣工揚言多士拜手躋堂稱觥敬祝萬夀仁夀鏡賦監生臣宫懋猷太嵗當貞元之合一人受厥初之祥飛電繞樞慶乾坤之貞觀長虹流渚頌日月之光芒天子執軒轅之十二鏡以遍照乎公卿百辟更逺燭乎上下四方有千秋之金鑑懸仁夀之堂皇雖處潛而必照亦遇暗而更彰當其考工辨器匠氏呈能擇太隂之純質取從革之金英迢迢揚子之津江心飛焰赫赫端陽之節日中鑄成鵲墮懷而呈象龍盤冶以成形及其列在瑶墀懸之藻井嫓夜月之沉沉比明星之耿耿清光曉徹則碧落流輝高明逺矚則長空寫影不澄不撓類止水之淵涵無盈無闕同太陽之彪炳於是鏤之菡萏之奩樹以珊瑚之架鸞翼高鶱菱花不謝户庭洞逹搖紫電而迅飛表裏澄泓湛清潭而輕瀉況乎光侔照曕明比臨池其為用也不淆於同異不虧於堅白雖屢照而不疲其為體也無憂於磨磷無患於涅淄歷顯晦而不移是故聖天子取焉手平者必正體靜者必安水清則鑑徹表正則影端執明鏡者無所私其照對明鏡者無容匿其姦將共躋黎庶於仁夀寧徒存銘戒於帶鞶萬夀詩七言律一首監生臣范大德帝德如天被萬方太和宇宙慶無疆光凝松牖星雲燦瑞靄蓂階日月長自古至仁全夀理由來元善集嘉祥聖人福極靡涯量拜獻千秋紫玊觴萬夀詩七言截句二首監生臣顧日熾旭日曈曨照玉京緑雲紅霧慶霄明遙知薄海嵩呼處比户春風萬嵗聲其一嵗嵗恩綸沛德音蠲租賜復總天心陽春大地無私照更有三吳被澤深其二萬夀詩七言律二首監生臣宋訥太平有象萬方同共喜時清嵗屢豐夀域正開霑帝澤長庚臨耀暢皇風仙璈聞處和聲叶瑞靄飄時淑氣融今日侍臣將進酒年年齊拜紫雲中其一御宿光中坐聖人至尊三月正生辰流虹繞電占祥運甘雨和風會好春彩結蓬萊常五色杯浮沆瀣列千珍九如頌裏臣民樂碩祝無疆共大椿其二萬夀詩七言律四首監生臣金玉樹聖明天子應昌期六十年來化澤滋玉厯初回新甲子金甌永固奠坤維山陬海澨歡堯日鳯舞麟遊紀舜時聖夀天長今正始三呼處處樂雍熙其一飢渴求賢更不侔朝端輔弼有伊周三千奏牘金門獻尋丈珊瑚鐵網收惟喜丹山翔鳯鷟總教文囿出麟騶即今夀考饒嵩祝處士廬空感應求其二蕩平無處不安恬聖澤汪洋率土霑屢見史臣書大有時聞天語恤窮簷桑麻萬井歡童叟雨露千春到鰈鶼尺土一民咸感德岡陵長頌夀頻添其三天街樂奏日遲遲玉葉金枝進夀巵九族麟趨齊頌禱千官雲集盛威儀龍顔霽處聞行惠春殿晴時合介睂桃實如瓠瓜似棗羣仙歡奉下瑶池其四萬夀盛典初集卷一百十二
